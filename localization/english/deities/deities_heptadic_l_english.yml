l_english:
  ## Default ##
 deity_targitaos:0 "$omen_targitaos$"
 omen_targitaos:1 "Targitaos"
 omen_targitaos_desc:3 "Targitaos is the progenitor of all our tribes, and a forefather that we still revere. Besides his role as a forefather of our people, he also plays a role as a patron of the skies and partly as a fertility deity.\n\n#! Apotheosis Effect: $military_apotheosis_manpower_effect_tt_description$"
 deity_goitosyrus:0 "$omen_goitosyrus$"
 omen_goitosyrus:1 "Goitosyrus"
 omen_goitosyrus_desc:3 "We will ask the god for insight and knowledge into matters of the unknown. As we receive the gift of wisdom, we hope our scholars and scribes can bring our nation into greater prosperity and strength.\n\n#! Apotheosis Effect: $culture_apotheosis_civic_tech_effect_tt_description$"
 deity_papaios:0 "$omen_papaios$"
 omen_papaios:1 "Papaios"
 omen_papaios_desc:3 "The great Papaios will bring our people the wealth and resources we need. This new influx of wealth will bring happiness and fortune to our people.\n\n#! Apotheosis Effect: $economy_apotheosis_province_improvement_effect_tt_description$"
 deity_thagimasadas:0 "$omen_thagimasadas$"
 omen_thagimasadas:1 "Thagimasadas"
 omen_thagimasadas_desc:3 "The royal Thagimasadas will approve of our expansion into foreign lands. With this god at our side, our people are sure to pick up their weapons and ready for war once more, for who can deny the wisdom of the gods?\n\n#! Apotheosis Effect: $naval_apotheosis_effect_tt_description$\n $storm_of_the_century_effect_tt_description$"
 deity_api:0 "$omen_api$"
 omen_api:1 "Api"
 omen_api_desc:3 "Api will bless our merchants with an abundance of resources for trade. Newfound trade goods, home and abroad, will surely enrich our mechants on all their endeavors.\n\n#! Apotheosis Effect: $economy_income_effect_tt_description$"
 deity_tabiti:0 "$omen_tabiti$"
 omen_tabiti:1 "Tabiti"
 omen_tabiti_desc:3 "We will beseech the queen of the gods with our worship, asking for blessings of peace and prosperity for our people. With Tabiti at our side, our lands will be pacified and calm, letting us focus our efforts and resources outwards.\n\n#! Apotheosis Effect: $economy_apotheosis_capital_citizens_effect_tt_description$"
 deity_argimpasa:0 "$omen_argimpasa$"
 omen_argimpasa:1 "Argimpasa"
 omen_argimpasa_desc:3 "The great goddess of the heavens will bless our harvests and people with life and growth. As we receive the gift of life, our crops will flourish and our young will be sure to grow up strong and healthy.\n\n#! Apotheosis Effect: $fertility_apotheosis_capital_effect_tt_description$"
