  trade_goods_flavour.46.desc_1:0 "Katastrophe! [ROOT.GetCountry.GetRuler.GetName] hat tapfer gegen das Tier gekämpft, doch sobald das Tier aufgespürt war, war klar, dass es alle unsere Jäger überflügeln musste und kaum jemand mit dem Leben davon kam. Unser [ROOT.GetCountry.GetRulerTitle] wird mit allen Ehren beerdigt."
  trade_goods_flavour.46.desc_2:0 "Es war einfach, das gejagte Tier aufzuspüren, aber sobald es gefunden war, war es keine so leichte Beute, wie viele dachten, und fügte den Jägern viele Wunden zu. Zum Glück ist niemand gestorben und [ROOT.GetCountry.GetRuler.GetName] kann den Sieg über die Bestie für sich beanspruchen, aber waren die Wunden die Jagd wert?"
  trade_goods_flavour.46.desc_3:0 "Sieg mein [ROOT.GetCountry.GetRulerTitle]! Vom Aufspüren des Tieres bis zur Beendigung seines Lebens waren die Götter die ganze Zeit auf unserer Seite. Die Jagd verlief unfallfrei und nur wenige Teilnehmer wurden leicht verletzt. Es war ein toller und aufregender Tag!"
  trade_goods_flavour.46.a:0 "Vielleicht hätten wir das nicht tun sollen..."
  trade_goods_flavour.46.b:0 "Es war die richtige Entscheidung."
  
  trade_goods_flavour.47.t:0 "Bärenjagd"
  trade_goods_flavour.47.desc:0 "Innerhalb weniger Tage vor [ROOT.GetCountry.GetCapital.GetName] wurde ein Bär gesichtet, der sich für eine große Jagd eignet. Es wäre sicherlich eine gewaltige Demonstration königlicher Größe und Stärke, ein so prächtiges Tier zu Fall zu bringen. \nNur die stärksten und versiertesten Jäger sind in der Lage, ein solches Tier zu jagen, ohne sich eine Wunde zuzuziehen - ist [ROOT.GetCountry.GetRuler.GetName] einer von ihnen?"
  trade_goods_flavour.47.a:0 "Dem Tier nach!"
  trade_goods_flavour.47.b:0 "Es ist zu gefährlich."
  
