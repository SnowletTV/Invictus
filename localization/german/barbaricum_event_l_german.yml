  #Startup events
  startup_events.10.t:0 "Die Frisi"
  startup_events.10.desc:0 "Vor etwa drei Jahrhunderten haben unsere Vorfahren das Land, auf dem wir leben, dem Meer abgerungen. Sie schichteten Schlamm auf Schlamm, bis die sogenannten Terps entstanden waren.\n\nUnser Volk betreibt Viehzucht und Handel über das Meer hinweg, was dazu geführt hat, dass immer mehr Einwanderer hierherkommen, um sich niederzulassen und buchstäblich gemeinsam mit unserem Volk ihr eigenes Glück aufzubauen.\n\nWas die Zukunft bringt, ist schwer zu sagen, aber vielleicht könnten wir einen Blick auf die geheimnisvolle Insel #E Albion#! werfen..."
  startup_events.10.a:0 "Wir, Frisii, sind freie Männer!"

  startup_events.11.t:0 "Die Suebi"
  startup_events.11.desc:0 "Die #E Suebi#!, auch #E Irminones#!, entwickelten sich aus der lokalen bronzezeitlichen Bevölkerung rund um den #E Fluss Albis#!, die heutige Elbe. Der Beginn der Eisenzeit ging mit einem gesellschaftlichen Wandel einher: Fortan waren alle im Tod gleich, da jeder nach der Einäscherung seiner sterblichen Überreste in einer lokal hergestellten Urne beigesetzt wurde. \n\nDoch militärische Fähigkeiten spielten eine immer größere Rolle, was schließlich dazu führte, dass die Suebi zum Inbegriff der germanischen Kultur wurden. Junge Männer anderer Stämme frisierten ihre Haare nach Suebenart, bekannt als der #E 'Sueben-Knoten'#!. \n\nIhre Nachbarn halten ständig ängstlich Ausschau nach ihren Überfällen. Aber vielleicht kann ein populärer Anführer die Tradition der Gleichheit im Tod brechen ..."
  startup_events.11.a:0 "Lasst [GetDeityDefinition('omen_irmin').GetName] uns führen!"

  startup_events.12.t:0 "Die Vandalen"
  startup_events.12.desc:0 "Das Phänomen der Verwendung von Totenurnen mit Gesichtern begann im modernen Pommern und verbreitete sich nach Süden in das Gebiet, das später zum polnischen Festland werden sollte. Diese Totenurnen hatten Deckel in Form von Hüten, deren Gesichter vermutlich den Begrabenen nachempfunden waren und mit Gravuren versehen waren. \n\nDie Unterschiede zwischen den nördlichen Völkern der Ostseeküste und den Völkern des Festlandes haben sich im Laufe der Zeit verstärkt, und beide werden in Zukunft unterschiedliche Richtungen einschlagen. \n\nIm letzten Jahrhundert kam es zu einem Zustrom von #E Suebischen#! Migranten, die in separaten Siedlungen unter unserem Volk leben und ihre Traditionen und Kriegertraditionen bewahrt haben. Welche Wechselwirkungen zwischen unserer Kultur und ihrer entstehen, liegt an uns."
  startup_events.12.a:0 "Lassen wir uns von  [GetDeityDefinition('omen_alcis').GetName] leiten!"

  startup_events.13.t:0 "Die Germanen der südlichen Ostseeküste"
  startup_events.13.desc: "Kultur, Glaube und auch Menschen aus der Urheimat der nordischen Bronzezeit, der skandinavischen Halbinsel, kamen in der Antike in das Land Pommern, wo sie sich mit der lokalen Bevölkerung vermischten. Dies waren die Wurzeln der in diesem Gebiet lebenden #E Germanen#! und möglicherweise auch später überlieferter Mythen und Legenden. \n\nSpäter begann in dieser Gegend das Phänomen der Verwendung von Gesichtsurnen und breitete sich nach Süden bis in das heutige kontinentale Polen aus. Diese Gesichtsurnen hatten Deckel in Form von Hüten, Gesichter, die angeblich den vergrabenen und eingeritzten Zeichnungen nachempfunden waren. \n\nDie Unterschiede zwischen den südlichen #E Vandalen#! und den Völkern der Ostseeküste haben sich im Laufe der Zeit verstärkt, doch einige gemeinsame Traditionen, wie beispielsweise die Gesichtsurnen, sind erhalten geblieben und zeugen von einer schwachen Verbindung, die im Laufe der Jahre immer weiter abbröckelt."
  startup_events.13.a:0 "Lassen wir uns von [GetDeityDefinition('omen_gautr').GetName] leiten!"

  startup_events.14.t:0 "Die Ingvaeoniker"
  startup_events.14.desc:0 "Als Teil der aktiven Handelsrouten, die sich von Pritannia bis Scandia erstrecken, hatten die Ingvaeoniker einfachen Zugang zu Waren aus beiden Ländern und profitierten als Zwischenhändler davon, dass sie sowohl keltisch als auch germanisch sprechen konnten. \n\n Ihre Heimat ist die Ostküste der Nordsee, die hauptsächlich durch Sandstrände, Flussmündungen und das Wattenmeer gekennzeichnet ist. Mit ihren robusten Schiffen sind sie Meister dieser rauen See und könnten bald ihren Blick auf neue Länder richten."
  startup_events.14.a:0 "Die Nordsee erwartet uns."

  startup_events.15.t:0 "Die Istvaoniker" #NT!
  startup_events.15.desc:0 "An der Kreuzung zwischen #E Kelten#! and germanischen #E Suebi#!, zwischen den Flüssen Rhenus (Rhein) und Visurgis (Weser), leben die Istvaoniker. In unterschiedlichem Maße von all ihren Nachbarn beeinflusst, sind ihre Kultur und ihr Glaube eine Mischung, die sich von Stamm zu Stamm unterscheidet, da ein Stamm mehr zu dieser Seite neigt und der andere Stamm zu einer anderen. \n\nDennoch ist die Errichtung von Hügelfestungen für eine starke Verteidigung eine Tradition, die bis heute von allen Istvaonikern geteilt wird, die Menge an sozialer Koordination und Arbeit, die mit dieser Tradition verbunden ist, kann nicht unterschätzt werden. \n\nWelchen Weg diese Stämme einschlagen werden, ist unklar. Werden sie sich vereinen oder von fremden Mächten absorbiert werden? Nur die Zeit kann es verraten."
  startup_events.15.a:0 "Lassen Sie sich von Istio leiten!"
 
  #Gaulish events
  flavor_gaul.1.t:0 "Die Gallizenae"
  flavor_gaul.1.desc:0 "Du bist weit gereist, doch die Frauen lassen dich nicht weiter. „Niemand mit einem Schaft zwischen den Beinen darf das Wasser überqueren“, krächzte eine alte Frau. „König, Häuptling oder Bauer, nur eine Frau darf die heilige Insel besuchen.“\n\nDu blickst über das neblige Wasser und siehst nur die schwachen Umrisse der gesegneten Insel hinter den Wellen. Die neun Priesterinnen der Gallizenae lebten auf dieser Insel, und wenn man den alten Frauen Glauben schenken durfte, konnten sie sich in Tiere verwandeln und den Wind beherrschen. Du bist hierher gekommen, weil du ihre Hilfe brauchst. \n\n„Dann geh du, alte Frau“, brüllst du die alte Frau an. „Ich habe etwas mit den Gallizenae zu besprechen, aber ich werde die Götter ehren und nicht weiter gehen.“ Die alte Frau lächelte breit, ohne einen einzigen Zahn zu zeigen, und streckte erwartungsvoll ihre offene Handfläche aus. Ihre trüben Augen rollten wie verrückt hin und her und sahen alles außer dir. \n\nWiderwillig legst du einen Beutel mit Münzen, die leise klimpern, in ihre Hand. „Was will mein Häuptling mit den heiligen Priesterinnen?“, fragte sie in spöttischem Ton, während ihre Augen plötzlich ohne zu blinzeln auf dich gerichtet waren."
  flavor_gaul.1.descf: "Du blickst über die Meerenge, hinter der die mystischen Gallizenae herrschen. Eine gebeugte, freundliche alte Frau steht neben dir und zeigt schwach auf eine dunkle Kontur am Horizont. „Dorthin muss meine Herrin gehen, um die Orakelmädchen zu finden“, sagt sie schwach. \n\nDie Insel dahinter ist in Nebel gehüllt, und nur Frauen dürfen sich dort aufhalten. „ Ich suche eine Überfahrt und bringe Geld mit“, sagst du der alten Frau, woraufhin sie strahlt. „Dann gehen wir jetzt“, strahlt sie und rennt mit unnatürlicher Energie davon. \n\nDu weißt, dass du ihr folgen musst, und findest die alte Frau bald, wie sie einigen Fischern gestikuliert, damit sie aus ihrem Boot steigen. Es ist mit einer großen Laterne am Bug und einem Satz Ruder ausgestattet, aber die Frau versichert dir, dass sie dich allein zur Insel bringen wird. „Wir brauchen keine Männer, und außerdem dürfen sie nicht mitkommen“, murmelt sie, als die Fischer widerwillig gehen. \n\nDu befindest dich auf dem kleinen Boot, und die gebrechliche Frau wirkt plötzlich gar nicht mehr so gebrechlich. Sie rudert kräftig, und auf halbem Weg über die Meerenge fragt sie: „Was hat die Dame mit den Priesterinnen vor?“ Ihre Augen sind auf dich gerichtet, und sie scheinen zu einer jungen Frau zu gehören, nicht zu einer alten."
  flavor_gaul.1.a:0 "Ich bin krank geworden und suche Mullos Heilung." #NT!
  flavor_gaul.1.b:0 "Ich verlange von ihrem Orakel, dass es eine Fackel für mich anzündet, denn die Zukunft ist düster."
  flavor_gaul.1.c:0 "Ich wünsche Teutates' Glück auf See."
  flavor_gaul.1.d:0 "Ich muss die Gunst von Smertrios in den kommenden Kämpfen gewinnen."
  flavor_gaul.1.e:0 "Ich habe meine Meinung geändert, altes Weib, gib mir meine Münze zurück!"
  flavor_gaul.2.t:0 "Die Heilkräfte der Gallizenae"
  flavor_gaul.2.desc:0 "Die Tage vergehen, während Sie ungeduldig am Ufer zelten, aber eines Abends, als der Mond tief steht und Nebelschwaden über den Strand ziehen, erscheint ein Licht über dem dunklen Wasser. Du erkennst eine orangefarbene Laterne, die am Bug eines kleinen Bootes befestigt ist, und sobald das alte Weib mit einem jungen Dienstmädchen im Schlepptau auf dich zugeeilt kommt. \n\nDie Magd ist in einen feinen Leinenmantel gekleidet, der mit einer verzierten Brosche über ihrer Brust befestigt ist. „Die jungfräuliche Priesterin hat die Götter beraten“, sagte die Alte respektlos und schlenderte in den Wald davon, wobei sie die Magd mit dir allein zurückließ. Die junge Frau vor dir ist unglaublich schön und du verspürst einen verbotenen Drang. \n\nSie nähert sich Ihnen und spricht leise: „Mein Häuptling, Sie haben Mullos Rat gesucht?“ Du spähst in ihre dunklen Augen und die Düfte mehrerer Kräuter hängen schwer in der Luft. Ihr Atem wird schwerer und die Metallbrosche drückt gegen deine Brust. „Mullos Geschenk gibt man am besten privat“, murmelt sie und legt ihre Hand in deine."
  flavor_gaul.2.descf:0 "Am nächsten Tag befinden Sie sich in einem Wäldchen im Zentrum der Insel. Der Mond wirft dunkle Schatten über den Hain und in seinem Herzen sitzt ein großer, gemeißelter Stein. Neun verhüllte, schlanke Gestalten umgeben es, jede flüstert einem unsichtbaren Wesen zu, aber jedes Flüstern scheint die Stärke von zehn zu tragen. \n\nZusammen sind die Stimmen eher eine Kakophonie aus Murmeln als die sanften Stimmen der neun anwesenden Dienstmädchen. Eines der Dienstmädchen wird durch Ihre Anwesenheit alarmiert und nähert sich Ihnen. „Mylady leidet an einer Krankheit, Priesterin, und braucht Mullos Segen“, sagt die alte Frau schwach, die Energie, die sie während der Reise plötzlich gezeigt hat, ist verflogen. \n\n„Ich verstehe“, sagt die Priesterin zögernd. 'Komm mit mir'. Du drehst dich um, um dich von der alten Frau zu verabschieden, aber sie ist verschwunden, und du beschließt, stattdessen die Priesterin einzuholen. Ihr beide gelangt wenig später an einen Bach, an dem die Priesterin Halt macht. \n\n„Mullo ist ein gütiger Gott, aber nichts wird umsonst gegeben“, flüstert sie fast und holt aus ihrem Umhang einen kleinen Topf hervor, den sie dir reicht. „Trink“ ist alles, was sie sagt, als sie fünf lange Schritte von dir weggeht. \n\nDu trinkst viel und bald beginnt sich die Welt heftig zu drehen. „Schlaf“, hörst du die beruhigende Stimme der Priesterin, aber die Welt ist dunkel geworden und auf den Kopf gestellt, und alles, was du siehst, ist der niedrige Mond über dir, außerhalb deiner Reichweite."
  flavor_gaul.2.da:0 "Du wachst am nächsten Tag alleine auf. Du erinnerst dich nicht an die vergangene Nacht, aber ein eigenartiger Duft erfüllt dein Zelt."
  flavor_gaul.2.a:0 "Mir geht es schon lange nicht besser."
  flavor_gaul.2.db:0 "Wenn Sie morgens zu sich kommen, haben Sie das Gefühl, am Abend zuvor zehnmal auf die Ehre der Götter getrunken zu haben. Die Priesterin ist nirgends zu sehen."
  flavor_gaul.2.b:0 "Wo ist diese Frau hingegangen?"
  flavor_gaul.2.dc:0 "Du erwachst mit einem Juckreiz und ohne Erinnerung an die vergangene Nacht. Was ist mit dir passiert?"
  flavor_gaul.2.c:0 "Es juckt sehr, wo ist der Holunder?"
  flavor_gaul.2.daf:0 "Am nächsten Tag erwachst du mit dem Rauschen des Baches, mit einem gesprungenen Topf in der Hand. Du stehst auf und fühlst dich schwindelig, aber irgendwie wird deine Stimmung gehoben."
  flavor_gaul.2.af:0 "Ich fühle mich seltsam gut."
  flavor_gaul.2.dbf:0 "Sie wachen mit nur einer schwachen Erinnerung an den vorangegangenen Tag auf. Die alte Frau sitzt am Bach, badet ihre Füße und dreht sich um, um dich mit einem zahnlosen Lächeln zu begrüßen."
  flavor_gaul.2.bf:0 "Wie kam ich hier hin?"
  flavor_gaul.2.dcf:0 "Am nächsten Tag werden Sie von einem lauten Geheul geweckt und Sie finden sich an einem von Möwen umgebenen Strand wieder. Sie spüren sofort einen stechenden Schmerz im Bauch und müssen sich wieder hinlegen."
  flavor_gaul.2.cf:0 "Was war in dieser Schüssel?"
  flavor_gaul.3.t:0 "Das Orakel der Gallizenae"
  flavor_gaul.3.desc:0 "Tage vergehen, an denen Sie am Ufer zelten und ängstlich auf die Rückkehr des alten Weibs warten. Eines Abends, bei tief stehendem Mond und Nebelschwaden über den Stränden, erscheint ein Licht über dem dunklen Wasser. \n\nBald erkennst du eine orangefarbene Laterne, die am Bug eines kleinen Bootes befestigt ist, und sobald das alte Weib mit einem jungen Dienstmädchen im Schlepptau auf dich zugeeilt kommt. Die Magd ist in einen feinen Leinenmantel gekleidet, der mit einer verzierten Brosche über ihrer Brust befestigt ist. \n\n„Eine Priesterin, wie mein Häuptling es befohlen hat“, verkündete das alte Weib mit gespielter Ehrerbietung. Während das alte Weib andere mit Fackeln am Strand versammelt, kommt die Priesterin auf dich zu. „Du suchst eine Audienz bei den Göttern“, sagt sie in feierlichem Ton. Du versuchst zu sprechen, aber sie bringt dich mit einem weißen Finger an deinen Lippen zum Schweigen. \n\n„Die Götter wissen es“, sagt sie und zwingt dich auf die Knie, während die Fackeln beginnen, in der Dunkelheit um dich herum zu tanzen. Die Priesterin beginnt in einem erschütternden Ton zu singen, spricht einmal deutlich, dann in Zungen, während die Frauen und Männer, die Sie beide umgeben, murmeln und tanzen, Feuer in der Dunkelheit wirbeln. Die Priesterin zuckt jetzt, dreht und wendet sich dann, als ob eine jenseitige Macht über sie wäre, und ihre Gesänge lösen sich in Schreie des Schreckens und der Ehrfurcht gleichermaßen auf. \n\nPlötzlich erlöschen die Feuer und das Mädchen bricht schweißgebadet vor dir zusammen. Erschüttert kriecht sie langsam auf dich zu, und das Dienstmädchen spricht."
  flavor_gaul.3.descf:0 "Am nächsten Tag liegst du in einem Wäldchen im Zentrum der Insel. Der Mond wirft dunkle Schatten über den Hain und in seinem Herzen sitzt ein großer, gemeißelter Stein. Neun verhüllte, schlanke Gestalten umgeben es, jede flüstert einem unsichtbaren Wesen zu, aber jedes Flüstern scheint die Stärke von zehn zu tragen. \n\nZusammen sind die Stimmen eher eine Kakophonie aus Murmeln als die sanften Stimmen der neun anwesenden Dienstmädchen. Eines der Dienstmädchen wird durch Ihre Anwesenheit alarmiert und nähert sich Ihnen. „Meine Herrin bittet die Götter um Führung“, sagt die gebeugte Frau und versucht zu knicksen, aber sie ist wieder ihr schwaches altes Ich geworden. \n\n„Ich möchte wissen, was die Götter für mich auf Lager haben“, erklärst du, aber die Priesterin hat bereits deine Hand ergriffen und sich auf den Stein zubewegt. Die anderen acht verstreuen sich in den dunklen Wald, wenn Sie sich nähern, und der linke fordert Sie auf, vor dem Stein zu knien. \n\nSie nimmt eine Holzschale und hebt sie zum Mond und beginnt zu singen. Der Gesang ändert seine Intensität, aber du bleibst auf den Knien, bis die Priesterin plötzlich aufhört und der Inhalt der Schale über dich geschüttet wird. Du riechst Eisen und das Dienstmädchen kniet vor dir, legt ihre Hände um dein Ohr und spricht leise."
  flavor_gaul.3.a:0 "Du hast die Götter geehrt, sie werden deinen Weg erleuchten."
  flavor_gaul.3.b:0 "Erwarten Sie das Unerwartete, die Zukunft ist schwer zu erahnen."
  flavor_gaul.3.c:0 "Sei ängstlich, denn die Götter sehen Unglück auf deinem Weg."
  flavor_gaul.4.desc:0 "Tage vergehen, an denen Sie am Ufer zelten und ängstlich auf die Rückkehr des alten Weibs warten. Eines Abends, bei tief stehendem Mond und Nebelschwaden über den Stränden, erscheint ein Licht über dem dunklen Wasser. \n\nBald erkennst du eine orangefarbene Laterne, die am Bug eines kleinen Bootes befestigt ist, und sobald das alte Weib mit einem jungen Dienstmädchen im Schlepptau auf dich zugeeilt kommt. Die Magd ist in einen feinen Leinenmantel gekleidet, der mit einer verzierten Brosche über ihrer Brust befestigt ist. \n\nObwohl sie in hysterisches Gelächter ausbricht, schafft es die alte Frau zu sprechen. „Die Meere sehen für mich gut aus, aber was weiß schon eine alte Frau!“ Gackernd lässt sie dich bei der jungen Frau zurück. „Du suchst den Rat von Toutatis?“ fragt sie, bevor sie sich von dir abwendet und dem Meer zusieht, ohne eine Antwort abzuwarten. \n\nSie streckt dir ihre Hand entgegen und du greifst unsicher danach. Sie zieht dich ins kalte Wasser hinaus, und ihr zitternder Gesang ist alles, was du über dem Rauschen der Wellen hören kannst, die dich umhüllen. Du hältst die Hand der Priesterin fest und fürchtest, dass die Brandung sie ins Meer stehlen würde. \n\nDie kalten Wellen überfluten jetzt ihren goldenen Kopf, doch sie drängt weiter, während du ihr folgst. Das Letzte, was Sie sehen, ist das dunkle Wasser des kalten Meeres, und das Letzte, was Sie hören, ist ein tiefes Brüllen unter dem Meer."
  flavor_gaul.4.descf:0 "Am nächsten Tag liegst du in einem Wäldchen im Zentrum der Insel. Der Mond wirft dunkle Schatten über den Hain und in seinem Herzen sitzt ein großer, gemeißelter Stein. Neun verhüllte, schlanke Gestalten umgeben es, jede flüstert einem unsichtbaren Wesen zu, aber jedes Flüstern scheint die Stärke von zehn zu tragen. \n\nZusammen sind die Stimmen eher eine Kakophonie aus Murmeln als die sanften Stimmen der neun anwesenden Dienstmädchen. Eines der Dienstmädchen wird durch Ihre Anwesenheit alarmiert und nähert sich Ihnen. \n\n»Mylady sucht den Rat von …«, begann die alte Frau, wird aber von der Priesterin unterbrochen. »Toutatis. Ja, wir wissen. Die alte Frau lacht und warf dir einen seltsamen Blick zu, als sie den Hain verließ. \n\nDie Priesterin fordert dich auf, ihr in den Wald zu folgen, und du gehst schweigend. Als du ans Ufer kommst, steht der Mond noch tief und die Sonne muss noch aufgehen. „Toutatis verlangt seinen Beweis“, sagt sie feierlich und nimmt deine Hand. \n\nMit dir im Schlepptau geht sie in die kalten, schwarzen Wellen und beginnt, eine göttliche Hymne zu singen. Sie befürchten, dass Sie beide von der Woge weggerissen würden, um nie wieder gesehen zu werden, aber die Priesterin macht unvermindert weiter. \n\nAls die Wellen Ihre Köpfe verschlingen, festigen Sie Ihren Griff, und Sie konnten den Gesang nur schwach über dem Rauschen des Ozeans hören. Das Letzte, was Sie sehen, ist das dunkle Wasser des kalten Meeres, das Sie überwältigt, und das Letzte, was Sie hören, ist eine tiefe, brüllende Antwort unter dem Meer."
  flavor_gaul.4.da:0 "Sie wachen am sonnenverwöhnten Strand auf, husten heftig und haben einen brennenden Schmerz in Ihrer Brust. Über dir ragt die Alte auf, die dich anscheinend aus der Tiefe gerettet hat. Sie lächelt dich zahnlos an."
  flavor_gaul.4.a:0 "Ich hasse dieses Weib."
  flavor_gaul.4.db:0 "Die Priesterin weckt Sie mit einem schwachen Lächeln, während die Sonne scheinbar ihr goldenes Haar entzündet. „Morideus Toutatis“, spricht sie leise, während sie Sand von deiner Brust wischt."
  flavor_gaul.4.b:0 "Der Wind des Gottes begünstigt mich!"
  flavor_gaul.4.dc:0 "Plötzlich von tiefster Angst überwältigt, zerrst du die Priesterin trotz ihrer Proteste zurück an Land. Sicher zurück am Strand sieht sie dich leer an."
  flavor_gaul.4.c:0 "Was hat Sie gemacht?!"
  flavor_gaul.5.desc:0 "Tage vergehen, an denen Sie am Ufer zelten und ängstlich auf die Rückkehr des alten Weibs warten. Eines Abends, bei tief stehendem Mond und Nebelschwaden über den Stränden, erscheint ein Licht über dem dunklen Wasser. \n\nBald erkennst du eine orangefarbene Laterne, die am Bug eines kleinen Bootes befestigt ist, und sobald das alte Weib mit einem jungen Dienstmädchen im Schlepptau auf dich zugeeilt kommt. Die Magd ist in einen feinen Leinenmantel gekleidet, der mit einer verzierten Brosche über ihrer Brust befestigt ist. „Hier ist er, der einen Speer braucht“, sagt die Alte fröhlich und zeigt mit einem furchteinflößenden Grinsen, das ihr faltiges Gesicht teilt, auf deine Unterwelt. \n\nSchaudernd wendest du dich der Priesterin zu, die sich dir langsam nähert. „Smertrios verlangt, dass ein Opfer gebracht wird“, murmelt sie. „Du weißt, was er braucht“, fährt sie fort, und du weißt es. Du ziehst deine Klinge heraus und streckst ihr den Griff entgegen. Sie greift danach und legt dir das kalte Eisen in die Hand und beginnt zu singen, während sie mit der Klinge spielt. \n\nDer Gesang ist zunächst leise, wird aber intensiver, wenn sie in deine Hand schneidet und das Blut den Sand darunter tränkt. Du fühlst dich schwach, und als die Priesterin in Schreie ausbricht, fällst du auf die Knie, während dich Dunkelheit umhüllt."
  flavor_gaul.5.descf:0 "Am nächsten Tag liegst du in einem Wäldchen im Zentrum der Insel. Der Mond wirft dunkle Schatten über den Hain und in seinem Herzen sitzt ein großer, gemeißelter Stein. Neun verhüllte, schlanke Gestalten umgeben es, jede flüstert einem unsichtbaren Wesen zu, aber jedes Flüstern scheint die Stärke von zehn zu tragen. \n\nZusammen waren die Stimmen eher eine Kakophonie aus Murmeln als die sanften Stimmen der neun anwesenden Dienstmädchen. Eines der Dienstmädchen wird durch Ihre Anwesenheit alarmiert und nähert sich Ihnen. „Priesterin, unsere Dame wünscht Smertrios Hilfe“, krächzt die alte Frau. \n\n„Und er wird ein Opfer verlangen“, antwortet die Magd, bevor sie die alte Frau anstarrt. „Lass uns“, sagt sie nicht unfreundlich, und die alte Frau huscht davon. Du gesellst dich zu der Priesterin am Stein im Hain, und die acht anderen sind jetzt gegangen. \n\nDie Priesterin löst einen Dolch von ihrem Gürtel und legt die Klinge in deine Hand, während sie dir die ganze Zeit in die Augen blickt. Sie beginnt zu singen, und nach und nach schneidet der Dolch in dein Fleisch und tropft Blut ins Gras. \n\nDer Gesang der Priesterin wird intensiver, während sie tiefer schneidet, und am Höhepunkt schreit sie in scheinbarer Begeisterung, als der Schmerz in deiner Hand zu viel wird, um ihn zu ertragen. Deine Augen verdunkeln sich und du sinkst auf deine Knie, während Schatten dich einhüllen."
  flavor_gaul.5.da:0 "Du widerstehst dem Schmerz und die Priesterin hilft dir auf die Beine. Mit heiserer Stimme sagt sie „Smertrios freut sich über deinen Mut“ und zeigt dir die rote Klinge, die im Mondlicht glänzt."
  flavor_gaul.5.a:0 "Smertrios wird meine Hand führen."
  flavor_gaul.5.db:0 "Du wachst Stunden später auf, als es im Osten hell wird. Die Priesterin steht ausdruckslos über dir. Als Sie versuchen, sich aufzusetzen, geht sie davon."
  flavor_gaul.5.b:0 "Ich fühle mich nicht stärker."
  flavor_gaul.5.dc:0 "Am nächsten Tag wachst du mit pochenden Schmerzen in deiner Hand auf. Es ist mit deinem Blut verschmiert, und du fühlst dich schwach."
  flavor_gaul.5.c:0 "Das sieht überhaupt nicht gut aus."
  flavor_gaul.6.t:0 "Die Lugian League - Ein freundlicher Vorschlag"
  flavor_gaul.6.desc:0 "Jetzt, da wir uns in unserem Besitz sicher fühlen, wurde beschlossen, freundschaftliche Beziehungen zu benachbarten Stämmen zu suchen, um den zukünftigen Wohlstand Böhmens zu gewährleisten. Es gibt Stämme in unserem Norden, die Vandalen, die gute Verbündete abgeben würden – vielleicht können wir Gesandte schicken und feststellen, ob Interesse an der Bildung einer Liga besteht? Es gibt Stärke in Zahlen."
  flavor_gaul.6.a:0 "Schicken Sie unsere besten Diplomaten und sagen Sie ihnen, sie sollen großzügig sein."
  flavor_gaul.7.t:0 "Der Lugische Bund - Ein suggestives Angebot"
  flavor_gaul.7.desc:0 "Botschafter aus Böhmen sind mit einem Angebot zu uns gekommen. Der böhmische Herrscher, [GetCountry('BOA').GetRuler.GetName], schlägt vor, dass wir uns einer Liga unter seinem Schutz anschließen, denn in der Zahl liegt die Stärke. \n\nDer Vorschlag ist unverschämt, aber wir haben vielleicht keine Wahl. Der ständige Konflikt und die Ungewissheit, die durch die endlosen Kämpfe zwischen den Vandalenstämmen verursacht wird, hat Vandalia stark verarmt, sodass wir keine Chance gegen die boihämische Macht haben."
  flavor_gaul.7.a:0 "Tritt dem Bund bei."
  flavor_gaul.7.b:0 "Verteidige unsere Souveränität!"
  flavor_gaul.8.t:0 "Der Lugische Bund-Antworten"
  flavor_gaul.8.desc:0 "Vor nicht allzu langer Zeit haben wir Abgesandte in ganz Vandalia entsandt. Sie hatten die Aufgabe, so viele lokale Mächte wie möglich davon zu überzeugen, einer Liga unter unserer Führung beizutreten, um ihre Sicherheit in diesen turbulenten Zeiten zu gewährleisten. Heute sind endlich alle unsere Abgesandten zurückgekehrt."
  flavor_gaul.8.a:0 "Sehr gut..."
  flavor_gaul.8.desc_1:0 "Eine gesunde Anzahl von Staaten hat zugestimmt! \n\n[GetCountry('BOA').GetRuler.GetPraenomen] ist demütig und geehrt durch das Vertrauen, das die Vandalen in [GetCountry('BOA').GetRuler.GetHerHim] gesetzt haben. Unser Herrscher verkündet die Geburt des Lugischen Bundes, die die Aufgabe hat, die Händler der Bernsteinstraße unter dem wohlwollenden und schützenden Auge von [GetCountry('BOA').GetName] zu verteidigen."
  flavor_gaul.8.desc_2:0 "Leider bringen sie schlechte Nachrichten; kein Land hat unser Angebot angenommen. \n\nEs gibt jetzt keine Möglichkeit, mit ihnen zu argumentieren." #nt!
  flavor_gaul.8.tt:0 "Die Missionsaufgabe wurde abgeschlossen."
  flavor_gaul.8.tt1:0 "Kein Vandalenstamm nimmt unser Angebot an."
  flavor_gaul.8.at:0 "[THIS.GetCountry.MakeScope.GetVariable('bohemian_league_counter_var').GetValue|0Y] Vandalenstaaten haben das [lugian_league_head_scope .GetFlag][lugian_league_head_scope .GetName] als unser neues Thema angenommen und kombiniert!."
  flavor_gaul.9.t:0 "Eine Boian-Föderation"
  flavor_gaul.9.desc:0 "Seit sich unser Volk erinnern kann, sind wir nach Belieben gewandert; Auch wenn wir vorübergehend Wurzeln schlagen, sind die Boii immer in neue Länder gezogen, wenn es uns passte - so wurden die Dinge gemacht. Dieser Zustand war zufriedenstellend, aber eine Zeit des Wandels steht bevor, und obwohl einige sich den von [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] vorgeschlagenen Zentralisierungsbemühungen widersetzen, werden sie sich bald fügen. Durch die Vereinigung zu einem föderierten Stamm sind die potenziellen Vorteile vielfältig – wir alle werden dies mit der Zeit sehen."
  flavor_gaul.9.a:0 "Das mir entgegengebrachte Vertrauen werde ich nicht vergessen"
  flavor_gaul.10.t:0 "Der böhmische Standard"
  flavor_gaul.10.desc:0 "Eines Morgens brechen Sie Ihr Fasten mit etwas Aufschnitt, Resten vom gestrigen Essen, als ein Berater hereinkommt, der praktisch einen schweren Jutesack hinter sich herzieht. Gestikulierend mit einem Kaninchenknochen in der Hand fragen Sie, was sie tragen, und zu Ihrer Überraschung werden Ihnen eine Handvoll Goldmünzen angeboten. 'Ah ja, jetzt erinnere ich mich.' sagst du zwischen den Bissen. Ja, [SCOPE.GetRootScope.GetCountry.GetRuler.GetName], wir haben die erste Ladung Münzen erhalten, deren Herstellung Sie befohlen haben. Dies wird der neue Standard sein, der in unseren Ländern verwendet wird.' \n\n Mit einem langen Schwung aus Ihrem Becher nehmen Sie eine der Münzen und halten sie gegen das Licht, wo das Gold wie Feuer funkelt, und Sie werden sofort von dem furchterregenden Antlitz auf der Vorderseite getroffen."
  flavor_gaul.10.a:0 "So sehe ich aus, oder? Ich habe keine schönere Münze gesehen"
  flavor_gaul.10.tt: "$mission_completed_tooltip_1$ '#Y Die boihämische Standarte#!' $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.11.t:0 "Der große Tempel von Baemia"
  flavor_gaul.11.desc:0 "Du bist alt genug, um dich daran zu erinnern, als die Baemia eine bloße Siedlung war, ein nicht der Rede werter Ort im Hinterland der Hauptstadt, aber unter deiner Führung haben sich die Dinge geändert. Eine echte Stadt hat nicht nur die baufälligen Hütten und Schuppen ersetzt, die einst die bewaldete Landschaft übersäten, sondern eine noch größere Errungenschaft wurde erreicht; Ein großer Tempel, wie man ihn so weit im Norden noch nie gesehen hat, wurde im Herzen der neuen Stadt Baemia errichtet."
  flavor_gaul.11.a:0 "Endlich ein richtiger Ort der Anbetung, einer, der den mächtigen Boihämern würdig ist."
  flavor_gaul.11.tt: "$mission_completed_tooltip_1$ „#Y Der Große Tempel von Baemia#!'“ $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.12.t:0 "Vernichtung der Deutschen"
  flavor_gaul.12.desc:0 "Wir haben die Nachricht erhalten, dass unsere einstigen Feinde, die verachtenswerten Stämme der Quadi und Marcomanni, von unseren Männern völlig vernichtet und wie Hunde in den Wäldern und Wäldern ihrer ehemaligen Heimatländer verstreut wurden. Sie sind völlig ruiniert und werden unsere Hegemonie nie wieder in Frage stellen können; Das ist eine bemerkenswerte Leistung, [SCOPE.GetRootScope.GetCountry.GetRuler.GetName]."
  flavor_gaul.12.a:0 "Wir sind nicht fertig, sondern beginnen erst mit unserer Arbeit."
  flavor_gaul.12.tt: "$mission_completed_tooltip_1$ „#Y Vernichtung der Deutschen#!'“ $mission_completed_tooltip_2$!" 
  flavor_gaul.13.t:0 "Dakische Zerstörung"
  flavor_gaul.13.desc:0 "Einst hatten wir viel von den wilden Daker zu befürchten, und einige in unserem eigenen Stamm wagten zu behaupten, dass wir unseren östlichen Rivalen in jeder Hinsicht unterlegen seien, insbesondere militärisch. Während Sie sich über diese Kritik sträubten und sie für kaum verhüllte Angriffe auf Ihre Führung hielten, haben Sie sich erneut den Sieg über Ihre Feinde gesichert und die keuchenden Zungen derer zum Schweigen gebracht, die Ihre Autorität in Frage stellen. Am Ende war der dakische Falx dem boischen Speer nicht gewachsen!"
  flavor_gaul.13.a:0 "Um die Daker brauchen wir uns keine Sorgen mehr zu machen."
  flavor_gaul.13.tt: "$mission_completed_tooltip_1$ „#Y Dakische Zerstörung#!'“ $mission_completed_tooltip_2$!" 
 
  flavor_gaul.14.t:0 "Böhmische Wanderungen"
  flavor_gaul.14.desc:0 "Wir haben einige unserer besten Männer in den Norden geschickt, mit dem ausdrücklichen Ziel, Gebiete zu finden, die für unsere Expansion geeignet sind, und ihre ersten Berichte sind vielversprechend. Unsere Späher zogen weiter durch weite Landstriche, machten nur an den Ausläufern der Berge halt und kommen zurück mit Geschichten von unberührten Wäldern, Grasfeldern, die sich perfekt für die Viehzucht eignen würden, und sogar große Lehmvorkommen sind vorhanden - wir könnten anfangen Herstellung von Steingutgefäßen. Diese Kolonisierungsbemühungen werden natürlich mit Kosten verbunden sein, aber darauf haben Sie sich im Voraus vorbereitet, nicht wahr?"
  flavor_gaul.14.a:0 "Wir haben die Münze, um dies zu finanzieren"
  flavor_gaul.14.b:0 "Unser Geldbeutel ist knapp, aber wir haben die Manpower"
  flavor_gaul.14.c:0 "Beim zweiten Nachdenken habe ich meine Meinung geändert - sag ihnen, sie sollen aufhören"
  flavor_gaul.14.tt: "$mission_completed_tooltip_1$ „#Y Boihämische Migrationen#!'“ $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.15.t:0 "Die Länder zwischen den Bergen"
  flavor_gaul.15.desc:0 "Mein Häuptling, unser Volk gedeiht in den neu kolonisierten Provinzen, in die Sie uns so weise geführt haben, und die Geschichten über die fruchtbaren Felder und Urwälder inspirieren mehr unserer Leute, ihre Heimat zu verlassen und sich weit weg niederzulassen. Es gibt Reiche zwischen den Bergen, die wir noch besiedeln müssen, aber wir sollten unsere Bemühungen verdoppeln und sie sofort sichern – warum, fragst du dich vielleicht? Dort kann man gut jagen, mit vielen wilden Tieren, die man wegen ihres Fells fangen kann, und Steine ​​und Waid sind in diesen Regionen in Hülle und Fülle zu finden."
  flavor_gaul.15.a:0 "Die Kosten sind vernachlässigbar - ich befehle es"
  flavor_gaul.15.b:0 "Wir werden etwas verteilt sein, aber es ist den vorübergehenden Rückschlag wert"
  flavor_gaul.15.c:0 "Eile macht Verschwendung – geben wir uns zufrieden mit dem, was wir haben"
  flavor_gaul.16.t:0 "Böhmisches Becken"
  flavor_gaul.16.desc:0 "Jetzt, da wir die Länder in unserem Norden besiedelt haben, kommt mir ein altes Sprichwort in den Sinn; je mehr man hat, desto mehr Probleme scheint es zu geben. Wir vertrauen auf unsere Fähigkeit, unsere Heimat gegen jeden zu verteidigen, der uns herausfordern könnte, doch im Vergleich zu unseren anderen Besitztümern ist unsere Ostflanke beschämend exponiert. Und es besteht kein Zweifel, dass die Stämme in unserem Süden, sobald sie Wind von unserem Wachstum bekommen, versuchen könnten, näher an uns heranzurücken, in der Hoffnung, uns von einer weiteren Expansion abzuhalten. Vor diesem Hintergrund sollten wir erwägen, nach Osten vorzudringen – einige der örtlichen Flüsse würden eine gute natürliche Grenze abgeben. Was denken Sie?"
  flavor_gaul.16.a:0 "Wir haben den Willen und die Arbeitskraft - es soll so sein, wie Sie sagen"
  flavor_gaul.16.b:0 "Schicke sofort Siedler, egal, was es kostet"
  flavor_gaul.16.c:0 "Alles zu seiner Zeit ... der Moment ist nicht jetzt"
  flavor_gaul.17.t:0 "Das Boihämische Becken"
  flavor_gaul.17.desc:0 "Oh Häuptling, wir brauchen deine Erlaubnis für eine neue Initiative. Es scheint, dass wir ein kleines Überfüllungsproblem haben, aber glücklicherweise ist dies etwas, das leicht zu bewältigen ist. Einfach ausgedrückt, unser Volk schreit nach neuen Ländern, die bewohnt werden können; unsere Zahl wächst täglich, und das Weideland, auf dem wir derzeit grasen, wird nicht ausreichen, um unser zukünftiges Wachstum aufrechtzuerhalten. Und doch sind wir von attraktivem Land umgeben, mit guten Feldern und vielen natürlichen Ressourcen, die es zu erobern gilt, und wenn du es nur gibst, werden wir die Spähtrupps aussenden. Wenn sie Gebiete finden, die für unsere Bedürfnisse zufriedenstellend sind, wirst du der Erste sein, der es erfährt."
  flavor_gaul.17.a:0 "Das freut mich - ich gebe meinen Segen"
  flavor_gaul.18.t:0 "Vorbei an den Bergen"
  flavor_gaul.18.desc:0 "Häuptling, wenn ich Ihnen diese Neuigkeiten mitteile, werden Sie zweifellos genauso aufgeregt sein wie wir alle. Es ist wahr, dass wir uns über die Länder verteilt haben, die Sie jetzt beherrschen, aber wir haben noch mehr Gebiete gefunden, die es wert sind, eingenommen zu werden. Nördlich der Sudetenberge wimmelt es in den Provinzen von Wildtieren, und die Steinbrüche von Gothinia schreien förmlich danach, geleert zu werden. Ehrlich gesagt, unsere Leute sind bereits da ... Sie müssen es nur offiziell machen."
  flavor_gaul.18.a:0 "Das ist ausgezeichnet - machen Sie es möglich"
  flavor_gaul.18.b:0 "Warum belästigst du mich damit? Habe ich nicht genug getan?"
  flavor_gaul.19.t:0 "Das Boiohämische Commonwealth"
  flavor_gaul.19.desc:0 "Endlich ist die Stunde unseres vollständigen und totalen Sieges gekommen! Dank [SCOPE.GetRootScope.GetCountry.GetRuler.GetName], der uns bei jedem Schritt begleitet hat, haben wir viele Dinge erreicht; die Ausdehnung unserer Territorien, das Wachstum unserer Handelseinkommen. Nie zuvor in unserer Geschichte waren die Boii so erfolgreich, noch nie waren wir so groß wie jetzt; Mögen die Götter unsere Bemühungen weiterhin segnen!"
  flavor_gaul.19.a:0 "Tolle Zeiten erwarten uns!"
  flavor_gaul.199.t: "Der Aufstieg Boihaemies"
  flavor_gaul.199.desc: "Am frühen Morgen fand in [ROOT.GetCountry.GetCapital.GetName] eine schlichte und unscheinbare Zeremonie statt, und obwohl die Sonne kaum über den Horizont gestiegen war, waren Hunderte von Anwesenden bei diesem bedeutsamen Ereignis dabei. [ROOT.GetCountry.GetRuler.GetName] hatte alle #E Stammesältesten#! aufgefordert, sich in der Hauptstadt zu versammeln, denn [ROOT.GetCountry.GetRulerTitle] wollte keine unnötige Aufmerksamkeit auf [ROOT.GetCountry.GetRuler.GetHerHim] selbst lenken. Der Grund für dieses Treffen war einfach: Jetzt, wo wir zu einer mächtigen Nation herangewachsen sind, verlangen die Menschen nach einer neuen Form der Regierung..\n\nDank der herausragenden Stellung von [ROOT.GetCountry.GetRuler.GetFirstName] in unserem Land fällt die Wahl letztlich auf [ROOT.GetCountry.GetRuler.GetHerHim]."
  flavor_gaul.199.a: "Ich verspreche, meine Autorität als Monarch verantwortungsbewusst auszuüben"
  flavor_gaul.199.b: "Die gesamte Macht in [ROOT.GetCountry.GetName] liegt bei den Menschen"
  BOHEMIAN_REPUBLIC_FINAL_NAME: "Boihaemische Republik"
  flavor_gaul.20.t:0 "Die Küsten Kantabriens"
  flavor_gaul.20.desc:0 "Heute Morgen erhielten wir die Nachricht, dass die ersten Importe aus der Provinz Kantabrien, unserer letzten Eroberung, [SCOPE.GetRootScope.GetCountry.GetCapital.GetName] erreichten, was auf den Marktplätzen für große Aufregung sorgte, da alle versuchen, so viel wie möglich zu kaufen. Während die kostbaren Edelsteine ​​aus dieser Region nur an die Reichsten verkauft werden, ist feines kantabrisches Leder von allen begehrt, ob reich oder arm, zweifellos wegen seiner besonderen Feinheit. \n\nWährend Sie über den Trubel auf den Straßen nachdenken, werden Sie daran erinnert, dass es andere Probleme in Bezug auf Kantabrien gibt, die Ihre Aufmerksamkeit erfordern. Wie sieht die Zukunft dieser Provinz aus?"
  flavor_gaul.20.a:0 "Halten wir die Kantabrier an der Leine"
  flavor_gaul.20.a.tt:0 "Wir werden die betreffende Provinz als Klientenstaat freigeben."
  flavor_gaul.20.b:0 "Unsere Kerngebiete dehnen sich aus und gedeihen unter unserer Herrschaft"
  flavor_gaul.20.b.tt:0 "Wir werden unser Land behalten und die Assimilation der neu Unterworfenen beschleunigen."
  flavor_gaul.21.t:0 "Die Zukunft von Lusitania"
  flavor_gaul.21.desc:0 "An einem besonders geschäftigen Tag, an dem man die bessere Hälfte des Vormittags mit Treffen mit örtlichen Landbesitzern und ihren Begleitern verbrachte, wurde [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] von einem Berater an Angelegenheiten weit weg vom Hinterland von [SCOPE.GetRootScope.GetCountry.GetCapital.GetName] erinnert; die Provinz Lusitania. Nachdem wir die Angelegenheit, zweifellos aufgrund unseres vollen Terminkalenders, verschoben haben, müssen wir eine Entscheidung darüber treffen, wie dieses Gebiet verwaltet werden soll."
  flavor_gaul.21.a:0 "Nicht jede Provinz ist es wert, als unsere Heimat betrachtet zu werden"
  flavor_gaul.21.a.tt:0 "Wir werden die betreffende Provinz als Klientenstaat freigeben."
  flavor_gaul.21.b:0 "Die Lusitaner werden sich schließlich unserer Wege annehmen"
  flavor_gaul.21.b.tt:0 "Wir werden unser Land behalten und die Assimilation der neu Unterworfenen beschleunigen."
  flavor_gaul.22.t:0 "Mons Calpe"
  flavor_gaul.22.desc:0 "Unsere siegreichen Armeen haben weit und breit erobert und diese Städte, die töricht genug waren, Widerstand zu leisten, in Asche und Elend verwandelt. Wir haben nicht nur die streitenden Stämme, die uns umgeben, dominiert, sondern uns auch gegen größere Mächte gestellt und uns behauptet, was beweist, dass wir keine Barbaren sind, sondern allen ebenbürtig. Lasst uns jetzt, in diesem kurzen Moment der Ruhe, während wir unsere Erfolge feiern können, über die Zukunft einiger unserer neuesten Besitztümer entscheiden."
  flavor_gaul.22.a:0 "Uneingeschränkter Besitz ist verlockend, aber das ist eine Frage unseres Rufs"
  flavor_gaul.22.a.tt:0 "Wir werden die betreffende Provinz als Klientenstaat freigeben."
  flavor_gaul.22.b:0 "Durch die Aufnahme dieser alten Städte wächst unsere Legende"
  flavor_gaul.22.b.tt:0 "Wir werden unser Land behalten und die Assimilation der neu Unterworfenen beschleunigen."
  flavor_gaul.23.t:0 "Friesische Entscheidungen"
  flavor_gaul.23.desc:0 "Als sich die Ältesten heute zu einem Rat versammelten, war eines der dringendsten Geschäfte auf der Tagesordnung sicherlich die Angelegenheit Friesland, und insbesondere das, was unserer Meinung nach mit der Region geschehen soll, nachdem wir die vollständige Kontrolle erlangt haben."
  flavor_gaul.23.a:0 "Ein anderer Client-Staat kommt unseren Interessen entgegen"
  flavor_gaul.23.a.tt:0 "Wir werden die betreffende Provinz als Klientenstaat freigeben."
  flavor_gaul.23.b:0 "Wir werden dieses Territorium als unser Eigentum behalten"
  flavor_gaul.23.b.tt:0 "Wir werden unser Land behalten und die Assimilation der neu Unterworfenen beschleunigen."
  flavor_gaul.24.t:0 "Die fernen Orkaden"
  flavor_gaul.24.desc:0 "Wenn wir über unsere einfachen Ursprünge nachdenken und sie mit unseren gegenwärtigen Umständen vergleichen, fühlen wir uns gedemütigt angesichts der enormen Verantwortung, die uns von den Göttern geschenkt wurde; wer hätte ahnen können, wie weitreichend unsere Herrschaft werden würde? Sogar die fernen Länder der Seemannsmythen sind Realität geworden, die wir eifrig annehmen. Wir müssen jetzt eine Wahl treffen; absorbieren wir diese fernen Inseln oder schaffen wir einen anderen Klientenstaat?"
  flavor_gaul.24.a:0 "Sie sollen uns dienen, aber bestimmte Privilegien behalten"
  flavor_gaul.24.a.tt:0 "Wir werden die betreffende Provinz als Klientenstaat freigeben."
  flavor_gaul.24.b:0 "Die Orcades werden immer ein Teil unserer Heimat sein"
  flavor_gaul.24.b.tt:0 "Wir werden unser Land behalten und die Assimilation der neu Unterworfenen beschleunigen."
  flavor_gaul.25.t:0 "Die Meister des Atlantiks"
  flavor_gaul.25.desc:0 "Vor einigen Wochen befahl [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] seinen Beratern, sich zu einem wichtigen Treffen in [SCOPE.GetRootScope.GetCountry.GetCapital.GetName] zu versammeln. Als der festgesetzte Tag kam, stand [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] feierlich vor der versammelten Versammlung und sprach mutig, indem er an unsere jüngste Geschichte und die ungeahnten Erfolge erinnerte, mit denen unser Volk gesegnet wurde. Am Ende dieser Rede mit „Der Tag ist gekommen, an dem die Welt anerkennen muss, dass wir die Herren des Atlantiks sind“, brach der Saal in tosenden Jubel aus. \n\nEine Hand hebend und Schweigen fordernd, überlegte [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] dann laut, ob wir unser Regierungssystem ändern sollten, um unsere veränderten Umstände widerzuspiegeln."
  flavor_gaul.25.a:0 "Unser Reichtum hat uns zu diesen luftigen Höhen geführt und bleibt unsere Priorität"
  flavor_gaul.25.b:0 "Verkünden Sie der Welt, dass unsere Ära gekommen ist!"
  flavor_gaul.26.t:0 "Ein römischer Triumph"
  flavor_gaul.26.desc:0 "Wir haben eine der großen Mächte Italiens, die kriegslüsternen Römer, gedemütigt, indem wir diese Tyrannen aus ihrer eigenen Hauptstadt vertrieben haben – sicherlich eine bittere Ironie für sie, da ihnen das angetan wurde, was sie so vielen anderen kaltblütig angetan haben. Geschichten über die Belagerung Roms haben sich in Ihrer Armee verbreitet, wobei die Tapferkeit unserer Männer einen fast mythischen Status erlangt hat. Sogar jetzt versammeln nervöse Könige an fernen Höfen außerhalb unserer Einflusssphären ihre Ratgeber und fragen atemlos nach der Stärke unserer Armeen und Flotten; Sind wir eine Gefahr? \n\nGut - mögen sie uns alle fürchten."
  flavor_gaul.26.a:0 "Feiern Sie die Soldaten! Sie waren es, die dies taten"
  flavor_gaul.27.t:0 "Ein Geschmack für Luxus"
  flavor_gaul.27.desc:0 "Während unsere ausländischen Verflechtungen dem Staat sicherlich zugute gekommen sind, gibt es andere, manchmal unmerkliche Veränderungen, die mit allem Neuen einhergehen; so war es und wird immer so sein. \n\nUm es ganz klar auszudrücken, unser Volk gewöhnt sich zunehmend an die schönen Dinge des Lebens, importiert Luxusgüter von den Königen des Ostens und gibt eine verblüffende Menge an Münzen aus, um diese Gegenstände zu bezahlen. Tagaus, tagein sind unsere Häfen voller Kaufleute, die Ladungen von Seide und Aromastoffen aus Wüsten am Ende der Welt feilbieten, und unsere Leute können einfach nicht genug bekommen. Aber wer sind eigentlich diese Ausländer, die uns seltsame Dinge wie „Zucker“ bringen? Niemand hat jemals von solchen Dingen gehört. In der Hoffnung, diese weit entfernten Regionen allgemein besser zu verstehen und dabei vielleicht mehr Handelsverbindungen aufzubauen, hat [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] beschlossen, eine Gruppe von Abenteurern nach Osten zu schicken und sie zu bitten, alles Mögliche zu entdecken."
  flavor_gaul.27.a:0 "Ich frage mich, was diese Abenteurer finden werden ..."
  flavor_gaul.28.t:0 "Kosmopolitische Einflüsse"
  flavor_gaul.28.desc:0 "Vor Wochen wurde befohlen, dass eine Gruppe Abenteurer, tapfere Krieger, die von unseren Truppen handverlesen wurden, sich auf eine Art Aufklärungsmission nach Osten begeben würde, und sie sind endlich zurückgekehrt! Er befahl, dass die Männer sofort herausgebracht werden, und rief aus, dass sie die Gelegenheit haben werden, sich auszuruhen, nachdem sie ihre Berichte abgegeben haben, und eilte ihnen entgegen, begierig darauf, zu hören, was sie erfahren hatten. \n\nWährend die erschöpften Soldaten sich zurücklehnen, wird Wein eingeschenkt und die Geschichten beginnen nebenher zu fließen. Unsere Männer segelten nach Osten, folgten den Gewässern des Mittelmeers bis zu ihrem Ende, wanderten entlang der Küsten und hielten unterwegs in jeder größeren Stadt an. Mit lauter Aufregung sollen sie sogar das alte Land [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] besucht haben. Unsere Männer sprechen von der Gastfreundschaft, die ihnen entgegengebracht wird, und sagen, dass es in diesen fernen Ländern viele Wunder zu sehen gibt, doch schwere Kriege haben die Region seit Jahrhunderten heimgesucht; das Gezänk der Könige, die den Frieden für ihre eigenen Ambitionen zerstören. \n\n[GetProvince('(int32)7691').GetArea.GetRegion.GetName] fragt, ob die Männer etwas mitgebracht haben, und lächelt, als er hört, dass sich in den Frachträumen unserer Schiffe ein wahrer Schatz an Informationen befindet; Wir haben nicht nur ausgezeichnete Karten der Region, sondern unsere Abenteurer hatten den Weitblick, so viele Schriftrollen und Texte zu kaufen, wie sie finden konnten – philosophische Texte, medizinische Abhandlungen, Geschichten und Genealogien. Unser Volk schätzt Weisheit, und wir werden viel aus den Schriften der Fremden lernen."
  flavor_gaul.28.a:0 "Ein Toast auf Ihre erfolgreiche Mission!"
  flavor_gaul.29.t:0 "Ein angenehmes Land"
  flavor_gaul.29.desc:0 "[SCOPE.GetRootScope.GetCountry.GetRuler.GetName], jetzt, da wir unsere Feinde besiegt haben, müssen wir eine Entscheidung treffen. Wie Sie wissen, ist es bei uns üblich, in neu eroberten Gebieten eine Stadt zu bauen, denn wir finden, dass dies das Beste ist, wenn es um Angelegenheiten der lokalen Verwaltung geht. Wo sollen wir jetzt mit dem Bau beginnen? Ich habe gehört, dass uns mehrere Standorte zur Verfügung stehen, alles gute Kandidaten für unsere Zukunftspläne."
  flavor_gaul.30.t:0 "Südliche Erweiterung"
  flavor_gaul.30.desc:0 "Die Berge und Hügel im Süden waren kein Hindernis für unsere Streitkräfte, die es gewohnt sind, schwieriges Gelände zu durchqueren. Wenn unsere Feinde dachten, sie könnten sich in den Wäldern und Vorbergen vor uns verstecken, irrten sie sich gewaltig. Jetzt, da wir die Region unterworfen haben, müssen wir einen Ort auswählen, um eine Stadt zu errichten; Nachdem wir dafür gekämpft haben, dieses Land für uns zu beanspruchen, werden wir es nie wieder verlassen."
  flavor_gaul.31.t:0 "Genuesische Gewinne"
  flavor_gaul.31.desc:0 "Wir haben die Küste von Genua erobert und unseren Besitz bis zu den Gewässern des Sinus Genuensis erweitert, worauf [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] stolz ist. Einst fristeten unsere Völker ihr Dasein an den Hängen der Berge, aber jetzt ergießen wir uns wie ein Fluss ins Meer. Es gibt heute Abend in [SCOPE.GetRootScope.GetCountry.GetCapital.GetName] viel zu feiern, aber wir müssen zuerst unsere Entscheidungen treffen, was wir mit unserem neuen Land machen."
  flavor_gaul.32.t:0 "Sieg über Venetien"
  flavor_gaul.32.desc:0 "Pferde, Oliven, Fisch, Salz; Das Land, auf dem einst die Veneter lebten, ist wirklich von den Göttern gesegnet, voller Ressourcen, die wir gerne annehmen werden. Kein Wunder, dass sie so erbittert gekämpft haben, denn wer wollte schon auf diesen natürlichen Reichtum verzichten? Zum Glück konnten sie uns nicht daran hindern, zu expandieren ... jetzt stellt sich eine neue Frage. Wir sollten einen Ort zum Bauen wählen, um unsere Macht in dieser Region zu verankern."
  flavor_gaul.33.t:0 "Ende der Etrusker"
  flavor_gaul.33.desc:0 "Seit vielen Jahren kennen wir die Etrusker; Ihre befestigten Städte, gefüllt mit Reichtümern, wie wir sie noch nie gesehen haben, haben unsere Soldaten lange in Versuchung geführt, die sich nichts mehr wünschten, als ihre gewaltigen Mauern zu erklimmen und sie für unsere eigenen zu nehmen. Niemand, der unseren Kämpfern verweigert, was sie wollen, [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] gab den Befehl und schickte unsere Soldaten in das Herz von Etruria. Alles, was von ihnen verlangt wurde, haben sie erreicht, und jetzt feiert unsere ganze Nation. Wir haben jetzt die angenehme Aufgabe, die Zukunft dieses Gebiets zu bestimmen."
  flavor_gaul.34.t:0 "Die Zukunft Korsikas"
  flavor_gaul.34.desc:0 "Heute ist ein großer Tag für unser Volk, denn wir haben uns auf die Insel Korsika ausgedehnt und sie für uns erobert. Wie stolz wären unsere Vorfahren auf uns! Zu sehen, wie ihre stolzen Nachkommen die Wellen erobern, ferne Inseln erobern, die unbestrittenen Herren des Landes und der Meere ... sie würden unsere Bemühungen sicherlich segnen. Komm, lass uns entscheiden, was wir mit Korsika machen; Was sagst du, [SCOPE.GetRootScope.GetCountry.GetRuler.GetName]?"
  flavor_gaul.35.t:0 "Römische Asche"
  flavor_gaul.35.desc:0 "Unser letzter Krieg ist zu Ende gegangen, und die Nachricht von unserem Sieg hat sich weit und breit verbreitet und weit über die Küsten von [GetProvince('(int32)4').GetArea.GetRegion.GetName] hinausgereicht. Es gibt einige, die nicht glauben können, dass wir die Römer besiegt haben, und behaupten, dass eine so mächtige Republik niemals bloßen „Barbaren“ zum Opfer fallen würde. \n\nWir laden alle Zweifler ein; Kommen Sie in die Stadt am Ufer des Tiber und sehen Sie, wer die Stadttore kontrolliert. Jetzt, da wir die Römische Republik in Schutt und Asche gelegt haben, müssen wir Entscheidungen treffen."
  flavor_gaul.35.a:0 "Die Stadt Romulus."
  flavor_gaul.35.b:0 "Capua passt gut zu uns."
  flavor_gaul.35.c:0 "Die antike Stadt Neapolis könnte einige neue Einwohner gebrauchen."
  flavor_gaul.35.d:0 "Ostia ist der Ort."
  flavor_gaul.35.e:0 "Buca, eh? Ich mag diesen Namen."
  flavor_gaul.36.t:0 "Magna Graecia reicht ein"
  flavor_gaul.36.desc:0 "Während unserer Eroberungen durch [GetProvince('(int32)4').GetArea.GetRegion.GetName] sind wir vielen fremden Völkern begegnet, aber jetzt, da wir das äußerste Ende der Halbinsel erreicht haben, richten wir unseren Blick auf alte Städte, die errichtet wurden, lange bevor unser Volk zum ersten Mal die Alpen überquerte. \n\nTrotz ihrer vermeintlichen Überlegenheit haben wir die Stadtbewohner abgeschlachtet, ihre Macht zerstört und durch unsere eigene ersetzt. [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] hat die sanften Städte von Magna Graecia lange verachtet, wohl wissend, dass sie uns für bloße Barbaren halten – was für ein bitterer Tag muss dies für sie sein. Nun, da wir die Region kontrollieren, lasst uns über ihre Zukunft entscheiden."
  flavor_gaul.37.t:0 "Mediolanum erhebt sich"
  flavor_gaul.37.desc:0 "Obwohl es eine beträchtliche Menge an Ressourcen gekostet hat, haben wir die Nachricht erhalten, dass unsere Arbeit in der Provinz [GetProvince('(int32)3571').GetName] endlich abgeschlossen ist - unsere Stadt ist nun schon eine Weile fertig, und es leben dort eine respektable Anzahl von Menschen , und hoffentlich werden noch viele weitere folgen. [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] betont seit langem die Bedeutung dieser Region und sieht eine Zeit voraus, in der unsere Stadt alle anderen dominieren wird. Ob sich diese Prophezeiung erfüllt, wird die Zeit zeigen."
  flavor_gaul.37.a:0 "Wir sind stolz auf das, was wir hier erreicht haben."
  flavor_gaul.38.t:0 "Italienische Kultur"
  flavor_gaul.38.desc:0 "Einen Rhyton an [SCOPE.GetRootScope.GetCountry.GetRuler.GetHerHis] Lippen hebend, [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] probiert etwas von dem angebotenen Wein. »Du sagst, diese Trauben werden in der Nähe des Berges Falernus angebaut? Ich glaube, ich habe schon einmal von dieser Weinsorte gehört.“ \n\n'Ja, [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName]. Der Berg Falernus ist nicht weit von hier ... gefällt es dir?' Die Wärterin, eine Tänzerin von zwanzig Sommern, senkt sittsam die Augen, als sie zurücktritt. \n\nLachend entleert [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] augenblicklich [SCOPE.GetRootScope.GetCountry.GetRuler.GetHerHis] Hupe und gestikuliert, dass es wieder aufgefüllt werden soll. „Ich habe eine Vorliebe für den Rhätischen Wein, den besten, den ich je probiert habe, aber es gibt Dinge an der Kultur hier, die mir ans Herz wachsen.“ \n\n„Wie das Getränk …“, flüstert die Kellnerin zu sich selbst, während [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] eine weitere Tasse leert."
  flavor_gaul.38.a:0 "Unsere Wege sind besser, aber wir könnten ein oder zwei Dinge von den Italienern lernen"
  flavor_gaul.39.t:0 "Eine aristokratische Republik"
  flavor_gaul.39.desc:0 "„Und ich möchte Ihre Aufmerksamkeit auf die Tatsache lenken, [ROOT.GetCountry.GetRuler.GetFirstName], dass unsere derzeitige Regierungsform unhaltbar ist; Was einst für unsere Vorfahren funktionierte, kann nicht für ihre Enkelkinder funktionieren, die die Meister von viel mehr als den Bergen sind. Dennoch bietet sich uns keine einfache Lösung an.' \n\nDie Luft ist stickig und heiß, wo der Rat tagt; eine unangenehme Realität, an die sich die darin versammelten Adligen gewöhnt haben. Es ist spürbare Erleichterung im Raum, als [ROOT.GetCountry.GetRuler.GetName] mit der Hand winkt und signalisiert, dass die Debatte beendet ist. \n\n''Vielleicht ist die Zeit für eine Veränderung gekommen.'' Er erhebt sich zu [ROOT.GetCountry.GetRuler.GetHerHis] Füßen und sagt leise: ''Wir könnten die Wege der Menschen um uns herum nachahmen ...''"
  flavor_gaul.39.a:0 "Der Adel soll uns förmlich weiter zum Ruhm führen"
  flavor_gaul.40.t:0 "Sicherheit ist eine seltene Sache in dieser Welt"
  flavor_gaul.40.desc:0 "Wir haben nicht nur unsere Bauinitiativen in den Bergen abgeschlossen und unsere angestammten Festungen mit der vollen Kraft unseres mächtigen Staates im Rücken gestärkt, sondern wir haben auch unsere Beziehungen zur wahren Quelle der Verteidigung unserer Nation gestärkt – den Menschen. Alle führenden Familien glauben an die Vision, die [SCOPE.GetRootScope.GetCountry.GetRuler.GetName] für unser Land aufgestellt hat, und niemand stellt [SCOPE.GetRootScope.GetCountry.GetRuler.GetHerHis] Zukunftspläne an diesem Punkt in Frage. Alles ist sicher; Niemand stellt unsere Herrschaft in Frage."
  flavor_gaul.40.a:0 "Wir werden diejenigen beschützen, die an uns glauben"
  flavor_gaul.41.t:0 "Alle Wege führen nach Mediolanum"
  flavor_gaul.41.desc:0 "Als wir [GetProvince('(int32)3571').GetName] zum ersten Mal erblickten, war es kaum eine Festung, ein halb zerbrochener Turm inmitten einer wunderschönen Ebene. Im Laufe der Jahre haben unsere Herrscher viel für die Stadt getan, und es gibt keine Städte in [GetProvince('(int32)4').GetArea.GetRegion.GetName], die es mit ihrer Eleganz und ihrem Charme aufnehmen können. Egal, woher man reist – sei es Rom, Kroton, Neapolis oder eine unzählige andere Stadt – was sie sagen, ist wahr; jede Straße führt nach [GetProvince('(int32)3571').GetName], denn es gibt keinen anderen Grund, die Heimat zu verlassen, als diese Stadt der Träume zu sehen."
  flavor_gaul.41.a:0 "Unsere Augen tränen beim Anblick von Mediolanum, der Heimat unseres Volkes"
  flavor_gaul.42.t:0 "Gäste aus den Gaesati"
  flavor_gaul.42.desc:0 "Auch wenn der geforderte Preis hoch ist – manche mögen sagen, er ist unverschämt – wer kann Wert auf Erfahrung legen? Wer die besten Dinge im Leben haben will, muss oft Prämien zahlen, und das ist bei den Gaesati nicht anders als bei allen anderen. \n\nMit diesen Sprichwörtern im Hinterkopf hat [ROOT.GetCountry.GetRuler.GetName] zugestimmt, die vierhundert Münzen zu zahlen, die erforderlich sind, um einen Berater von den Gaesati, den wilden gallischen Söldnern aus den Bergen, einzustellen. Obwohl der Preis hoch ist, haben wir hohe Erwartungen an unseren neuen Gast und glauben, dass die Weisheit, die unseren Truppen vermittelt wird, den Preis wert sein wird."
  flavor_gaul.42.a:0 "Wir brauchen alle Hilfe, die wir bekommen können ... Geld kommt und Geld geht"
  flavor_gaul.43.t:0 "Die damit verbundenen Kosten"
  flavor_gaul.43.desc:0 "Wie Sie wissen, [ROOT.GetCountry.GetRuler.GetName], kann Ihr letzter Befehl, nach Siedlern zu rufen, nicht kostenlos ausgeführt werden, und es wird teuer, Reisende durch das Land zu schicken. Wir müssen Pferde für unsere Abgesandten kaufen, und Männer und Pferde müssen angemessen ausgerüstet werden ... leider müssen wir mit einer großen Anzahl an damit verbundenen Kosten rechnen."
  flavor_gaul.43.a:0 "Hier ist alles, was wir uns gerade leisten können"
  flavor_gaul.43.b:0 "Wir haben mehr, was wir geben könnten"
  flavor_gaul.44.t:0 "Lepontische Siedler"
  flavor_gaul.44.desc:0 "Vor ein paar Wochen traf [ROOT.GetCountry.GetRuler.GetName] die Entscheidung, Siedler dazu aufzurufen, in unsere weniger bewohnten Gebiete zu kommen und sie zu bewohnen, und verbreitete in unserem Land die Nachricht, dass diejenigen, die mutig genug sind, ihr Leben an einem neuen Ort zu beginnen, die Unterstützung des Staates erhalten würden. Unsere Leute sind ehrgeizig und herzlich, haben keine Angst vor Herausforderungen, und wir hatten bald alle freien Männer, die wir brauchten – wir haben ein grenzenloses Glück, so gesegnet zu sein, wie wir sind. Diese Siedler versammeln sich in der Nähe der Ausläufer des [GetProvince('(int32)3617').GetArea.GetName] und warten auf die Nachricht, wohin sie geschickt werden sollen."
  flavor_gaul.44.a:0 "Sagen Sie unseren Leuten, sie sollen weit und breit reisen und sich dort niederlassen, wo es ihr Herz begehrt"
  flavor_gaul.45.t:0 "Lepontischer Papyrus"
  flavor_gaul.45.desc:0 "Wir haben spannende Neuigkeiten aus der Königlichen Bibliothek zu vermelden, o [ROOT.GetCountry.GetRuler.GetName]. Als wir erkannten, dass unser Bedarf weitaus größer war als das, was vor Ort verfügbar war, begannen wir, Papyrus zu importieren, in der Hoffnung, unser eigenes Schreibmaterial mit diesem ägyptischen Wunder zu erweitern. Der stetige Strom von Papyrus hat es unseren Schreibern ermöglicht, Kopien der verschiedenen Texte anzufertigen, die wir in Besitz genommen haben, und unser Wissen ist dadurch exponentiell gewachsen - wir werden die Ergebnisse fast sofort sehen, [ROOT.GetCountry.GetRuler.GetFirstName]."
  flavor_gaul.45.a:0 "Das ist das Beste, was ich den ganzen Tag gehört habe"
  flavor_gaul.46.t:0 "Ehrung unserer Vorfahren"
  flavor_gaul.46.desc:0 "Fest davon überzeugt, dass der weise Führer ihre Schulden anerkennt, hat [ROOT.GetCountry.GetRuler.GetName] bekannt gegeben, dass [ROOT.GetCountry.GetRuler.GetSheHe] unsere Vorfahren mit den richtigen religiösen Zeremonien ehren wird, einschließlich einer unserer heiligsten und ältesten Praktiken - der Wagenbestattung - wenn die Zeit gekommen ist. Obwohl es für einen kleinen Stamm schwierig ist, ein stetiges Einkommen zu erzielen, hat [ROOT.GetCountry.GetRuler.GetFirstName] erklärt, dass keine Kürzungen vorgenommen werden und alle Ausgaben ohne Frage bezahlt werden. \n\nWährend einige die riesigen Summen beklagen, die in solchen Angelegenheiten involviert sind, lobt die Mehrheit unserer Leute die Frömmigkeit von [ROOT.GetCountry.GetRuler.GetFirstName] als Beispiel für unsere jüngeren Generationen."
  flavor_gaul.46.a:0 "Wir sind nicht hier, um mit den Göttern zu feilschen, sondern um sie zu ehren"
  flavor.gaul.46.tt: "$mission_completed_tooltip_1$ „#Y Ehrung der Vorfahren#!'“ $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.47.t:0 "Vorbereitungen für die Beerdigung"
  flavor_gaul.47.desc:0 "Als die Trauerzeit für unseren früheren Anführer beginnt, wurde [ROOT.GetCountry.GetRuler.GetName] privat von den Weisen und den Ältesten angesprochen, die darauf bestehen, dass wir unsere alten Gewohnheiten ehren, indem wir dem Verstorbenen eine angemessene [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName] Wagenbeerdigung geben. Dies ist eine große Ehre, die nur der Elite unserer Gesellschaft vorbehalten ist, aber ob wir fortfahren oder nicht, liegt ganz bei [ROOT.GetCountry.GetRuler.GetFirstName]. \n\nObwohl es unangenehm ist, finanzielle Angelegenheiten zu besprechen, wenn unser ganzes Land trauert, sind mit Wagenbestattungen erhebliche Kosten verbunden, und [ROOT.GetCountry.GetRuler.GetFirstName] muss die Käufe abzeichnen."
  flavor_gaul.47.a:0 "Ja, alles soll nach Tradition zubereitet werden"
  flavor_gaul.47.b:0 "Das können wir uns im Moment einfach nicht leisten – es wird keinen Waggon geben"
  flavor_gaul.48.t:0 "Begraben des Wagens"
  flavor_gaul.48.desc:0 "Ein paar Stunden außerhalb von [ROOT.GetCountry.GetCapital.GetName] findet eine düstere Prozession statt, während die letzten Vorbereitungen für eine unserer ältesten Traditionen getroffen werden; die Wagenbestattung einer kulturellen Elite. \n\nAlle Arten von Grabbeigaben werden in den Boden versenkt – prächtige Speisegeschirr aus Silber, goldene Torques und zeremonielle Pelzumhänge, Trinkhörner und edelsteinbesetzte Banketttabletts – während die erforderlichen Tiere und Sklaven in der Nähe geopfert werden. Alles wurde nach strengen Maßstäben ausgeführt, und die Omen zeigen, dass die Götter sehr zufrieden sind mit unserer Aufmerksamkeit für die feineren Details. \n\nEs herrscht respektvolles Schweigen, als die letzte Erde über den Wagen fällt, und alle wenden sich einer nach dem anderen [ROOT.GetCountry.GetRuler.GetName] zu, der ein paar Worte spricht."
  flavor_gaul.48.a:0 "Wenn wir uns an unsere Verpflichtungen gegenüber den Toten erinnern, mögen sie uns ihren Segen geben"
  flavor_gaul.49.t:0 "Besteche den Rat"
  flavor_gaul.49.desc:0 "[ROOT.GetCountry.GetRuler.GetName] hat den Ruf, nichts zuzulassen, was der Fertigstellung von [ROOT.GetCountry.GetRuler.GetHerHis]-Plänen im Wege steht; Jede militärische Angelegenheit, der [ROOT.GetCountry.GetRuler.GetFirstName] zum Beispiel begegnet ist, wurde umgehend und rücksichtslos behandelt, mit einer Effizienz, die mit Gefühllosigkeit verwechselt werden könnte. \n\nEs sollte diejenigen, die darauf achten, nicht überraschen, dass [ROOT.GetCountry.GetRuler.GetFirstName] auf politische Bestechung zurückgreifen würde, um die staatlichen Mechanismen in Gang zu bringen. Jeder übergebene Beutel mit Silber, jeder goldene Torque wurde mit einer unausgesprochenen Drohung geliefert, den Deal zu besiegeln."
  flavor_gaul.49.a:0 "Wenn meine Feinde meine Münzen nicht annehmen, sollen sie meine Dolche erhalten ..."
  flavor.gaul.49.tt: "$mission_completed_tooltip_1$ „#Y Bestechung des Rates#!'“ $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.50.t:0 "Monarchischer Ehrgeiz"
  flavor_gaul.50.desc:0 "Obwohl heute nicht alle glücklich sind – es gibt diejenigen, die sich lächerlicherweise für bessere Anwärter auf den Thron halten – steht uns ein bedeutender Anlass bevor; unter dem wachsamen Auge unserer Ältesten und des Weisen wird [ROOT.GetCountry.GetRuler.GetName] einer rituellen Reinigung für die Krönungszeremonie später heute in [ROOT.GetCountry.GetCapital.GetName] unterzogen. Wenn die Sonne in ein paar Stunden untergeht und die Opfer vollbracht sind, werden wir eine neue Regierungsform haben. \n\nObwohl unser Volk noch nie zuvor von einem wahren Souverän regiert wurde, wurde anerkannt, dass die Zeit endlich gekommen ist. Mögen die Götter weiterhin [ROOT.GetCountry.GetRuler.GetFirstName] die Weisheit und Intelligenz gewähren, um unsere Nation voranzubringen."
  flavor_gaul.50.a:0 "Ich werde dich nicht im Stich lassen, sondern immer alles für Treveria tun!"
  flavor.gaul.50.tt: "$mission_completed_tooltip_1$ „#Y Monarchischer Ehrgeiz#!'“ $mission_completed_tooltip_2$!" #NT!
  flavor_gaul.51.t:0 "Triumph in Treveria"
  flavor_gaul.51.desc:0 "Letzten Endes gibt es vieles, worauf unsere Mitarbeiter stolz sein können. Wir haben nicht nur die minderwertigen Stämme, die uns umgaben, zerstört und ihre Stärke und Macht in unsere eigene aufgenommen, sondern wir haben begonnen, eine Zivilisation zu schaffen, die es wirklich wert ist, respektiert zu werden. Wir haben auch eine Reihe von Königen aufgestellt, die über uns herrschen, und unsere Ingenieure haben die wilden Wälder gezähmt, Städte und prächtige Gebäude gebaut, die mit ihrer Klugheit das Auge blenden. \n\nWährend die Menschen selbst viel getan haben, um diese Ehrungen zu verdienen, geben viele zu, dass wir ohne [ROOT.GetCountry.GetRuler.GetName] nicht so weit wären, wie wir es sind - selbst die Kritiker von [ROOT.GetCountry.GetRuler.GetFirstName] geben zu, dass wir mit [ROOT.GetCountry.GetRuler.GetHerHis] Führung gesegnet wurden."
  flavor_gaul.51.a:0 "Heil Treveria!"
  flavor.gaul.51.tt: "$mission_completed_tooltip_1$ „#Y Triumph in Treveria#!'“ $mission_completed_tooltip_2$!" #NT!

  flavor_gaul.52.t:0 "Treveria"
  flavor_gaul.52.desc:0 "Während [ROOT.GetCountry.GetCapital.GetName] unseren Leuten in letzter Zeit sicherlich gute Dienste geleistet hat, gibt es einen wachsenden Chor, der fordert, dass wir unsere Hauptstadt nach [GetProvince('(int32)3690').GetName] verlagern. Die Stadt Treveria hat nicht nur einen Flusszugang, der für ihren wirtschaftlichen Erfolg von entscheidender Bedeutung ist, sondern sie liegt auch in der Ebene, was unseren Menschen Raum gibt, sich in Zukunft zu entwickeln. Die Wälder bei Caranusca erweisen sich als Entwicklungshemmnis, da alles mehr kostet. \n\n[ROOT.GetCountry.GetRuler.GetName] hat eine Entscheidung zu treffen."
  flavor_gaul.52.a:0 "Lasst uns unsere Hauptstadt verlagern – es gibt für uns keinen Grund, an einem minderwertigen Standort zu bleiben"
  flavor_gaul.52.b:0 "Wir verlassen die Heimat unserer Vorfahren nicht"
  flavor.gaul.52.tt:0 "$mission_completed_tooltip_1$ '#Y Treveria#!' $mission_completed_tooltip_2$!"

  flavor_gaul.53.t:0 "Treverisches Belgien"
  flavor_gaul.53.desc:0 "Jetzt, da wir die Stämme, die [GetProvince('(int32)3029').GetArea.GetRegion.GetName] bewohnen, unterworfen haben, hat [ROOT.GetCountry.GetRuler.GetName] darum gebeten, die Provinz zu besuchen, um eine Bestandsaufnahme der Region zu machen. Nachdem wir solche Schwierigkeiten bei der Sicherung des Territoriums durchgemacht haben, können alle die Notwendigkeit verstehen, unsere Errungenschaften persönlich zu überprüfen. \n\nDie Belgae-Stammesangehörigen scheinen ausnahmsweise einmal demütig zu sein – es werden unseren Leuten keine herausfordernden Blicke zugeworfen, während sich die königliche Prozession durch die Straßen bewegt. Ihr Widerstandsgeist scheint gebrochen zu sein; Neuigkeiten, die unsere Militärberater gerne hören werden. \n\nAls [ROOT.GetCountry.GetRuler.GetFirstName]s Streitwagen die nach Hause führende Straße hinunterbiegt, huscht ein Fuchs über den Highway und verschwindet im Wald."
  flavor_gaul.53.a:0 "Wir nehmen dies als gutes Omen - kehren wir zu [ROOT.GetCountry.GetCapital.GetName] zurück"
  flavor.gaul.53.tt:0 "$mission_completed_tooltip_1$ '#Y Treverisches Belgien#!' $mission_completed_tooltip_2$!" 

  flavor_gaul.54.t:0 "Westliche Expansion"
  flavor_gaul.54.desc:0 "Endlich! Unsere Generäle berichten, dass der langersehnte Durchbruch da ist; nach verheerenden Kriegen haben wir endlich die Regionen [GetProvince('(int32)2418').GetArea.GetName], [GetProvince('(int32)2499').GetArea.GetName] und [GetProvince('(int32)2489').GetArea.GetName] in unsere Herrschaft gebracht. \n\nHeute Abend wird in [ROOT.GetCountry.GetCapital.GetName] ausgelassen gefeiert, da die versammelten Häuptlinge darum wetteifern, wer am schnellsten [ROOT.GetCountry.GetRuler.GetName] betrunken werden kann."
  flavor_gaul.54.a:0 "Jeder, der an meinen Fähigkeiten zweifelt, ist ein Narr ... Hicks"
  flavor_gaul.54.b: "Na ja, ein oder zwei können vielleicht nicht schaden."
  flavor.gaul.54.tt:0 "$mission_completed_tooltip_1$ '#Y Westliche Expansion#!' $mission_completed_tooltip_2$!"


   flavor_gaul.55.t: "Schmelztiegel der Kulturen" #NT!
 flavor_gaul.55.desc: "Während einige Stammeshäuptlinge dafür bekannt sind, ihr Volk von den Stämmen, die um sie herum leben, zu isolieren, hat [ROOT.GetCountry.GetRuler.GetName] immer geglaubt, dass sich nur Narren von der Welt zurückziehen würden – es gibt viel von fremden Kulturen zu lernen, was sich als nützlich erweisen könnte.\n\nMit diesem Glauben im Hinterkopf hat [ROOT.GetCountry.GetRuler.GetFirstName] beschlossen, dass [ROOT.GetCountry.GetName] unsere Cousins einladen würde, die Wärme und Sicherheit unserer Herde und des Landes, das von den [ROOT.GetCountry.GetRuler.GetFamily.GetName] Stämmen regiert wird, zu teilen sind dafür bekannt, Fremde willkommen zu heißen – unsere Großzügigkeit wird wirklich von allen gelobt." #NT!
 flavor_gaul.55.a: "Jeder kann innerhalb von [ROOT.GetCountry.GetName] ein Zuhause finden" #NT!
 flavor.gaul.55.tt: "$mission_completed_tooltip_1$ „#Y Schmelztiegel der Kulturen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.56.t: "Eisenminen" #NT!
 flavor_gaul.56.desc: "Es war eine willkommene Überraschung, als in [ROOT.GetCountry.GetCapital.GetName] Berichte eintrafen, die darauf hindeuteten, dass große Eisenadern @iron! wurde in einigen unserer Gebiete entdeckt – ein Segen, der nur vom Gott [GetDeityDefinition('omen_gobannus').GetName] selbst kommen konnte. Unsere Leute beherrschen langsam die Prozesse, die mit der Eisenschmiedekunst verbunden sind, und wir produzieren bereits eine ansehnliche Menge Erz, aber es scheint, dass Gobannus sieht, was wir tun, und möchte, dass wir unsere Anstrengungen verstärken." #NT!
 flavor_gaul.56.a: "Wir brauchen so viel Eisen, wie wir kriegen können" #NT!
 flavor.gaul.56.tt: "$mission_completed_tooltip_1$ „#Y Eisenminen#!'“ $mission_completed_tooltip_2$!" #NT!
 flavor.gaul.56.tt2: "Zwei zufällige Siedlungen, die #Y Basismetalle#! @base_metals produzieren! und #Y Stein#! @stein! wird #Y Eisen#! @iron produzieren! stattdessen." #NT!
  
 flavor_gaul.57.t: "Hill Fort-Initiative" #NT!
 flavor_gaul.57.desc: "Dank der Lehren, die unsere Architekten beim Bau von [GetProvince('(int32)3687').GetArea.GetName] und den vielen #E Bergfestungen#!, die die Landschaft schützen, gezogen haben, beherrschen unsere Arbeiter ihr Handwerk praktisch und können mit minimalem Aufwand schnell Befestigungen errichten oder ein Oppidum entwerfen. Mit solch qualifizierten Ingenieuren können wir neue Städte viel effizienter bauen als je zuvor." #NT!
 flavor_gaul.57.a: "Dann lasst uns im gesamten [ROOT.GetCountry.GetName] bauen, wo immer wir können" #NT!
 flavor.gaul.57.tt: "$mission_completed_tooltip_1$ „#Y Hill Fort Initiative#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.58.t: "Belgische Nebenflüsse" #NT!
 flavor_gaul.58.desc: "Obwohl in [ROOT.GetCountry.GetName] viele Menschen leben, die Angst vor den #E Belgae#! und ihrem furchteinflößenden Ruf haben, hat der siegreiche [ROOT.GetCountry.GetRuler.GetName] ein für alle Mal bewiesen, dass man mit diesen Wilden genauso leicht umgehen kann wie mit jedem anderen Stamm.\n\nDie [ROOT.GetCountry.GetRulerTitle] wiederholen gerne oft ein altes Axiom, das ihnen in den Sinn kommt; Diejenigen, die sich nicht der [ROOT.GetCountry.GetAdjective]-Diplomatie unterwerfen, werden letztendlich mit [ROOT.GetCountry.GetAdjective]-Waffen bestraft. Und jetzt, da unsere Grenzen Länder umfassen, die einst von den wilden Belgiern regiert wurden, muss [ROOT.GetCountry.GetRuler.GetFirstName] entscheiden, wie ihr Status aussehen soll; Sollen wir sie als unsere Brüder oder als unsere Knechte behandeln?" #NT!
 flavor_gaul.58.a: "Mögen alle unsere Leute in Harmonie zusammenleben" #NT!
 flavor.gaul.58.tt: "$mission_completed_tooltip_1$ „#Y belgische Nebenflüsse#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.59.t: "Eine Wagenbestattung" #NT!
 flavor_gaul.59.desc: "Seit dem jüngsten #E Wagon Burial#!, ist der Geist von [ROOT.GetCountry.GetRuler.GetName] mit Fragen von Leben und Tod beschäftigt und hat viele lange Stunden in tiefer Kontemplation vor dem Feuer zu Hause in [ROOT.GetCountry.GetCapital.GetName] verbracht.\n\nSchon unser Name – #E '[ROOT.GetCountry.GetAdjective]'#! – erinnert an die Überquerung von Flüssen, und der [ROOT.GetCountry.GetRulerTitle] fragt sich oft, ob die Tage von Unser Leben wird auf ähnliche Weise gemessen wie das Fließen von Wasser. Zu welchem ​​Zweck haben uns die Götter eine so kurze Lebensspanne gegeben, in der wir so viel erreichen sollen? Und was ist die Natur der Götter selbst? Bleiben sie vom Zahn der Zeit verschont, oder erliegen auch sie schließlich, wie alles sicherlich passieren muss? Und wenn sie vom Lauf der Jahre beeinflusst werden, sind sie dann wirklich Götter?\n\nUnnötig zu erwähnen, dass [ROOT.GetCountry.GetRuler.GetFirstName] nicht gut geschlafen hat, denn [ROOT.GetCountry.GetRuler.GetSheHe] kann nicht aufhören, über solche Dinge nachzudenken." #NT!
 flavor_gaul.59.a: "Ich muss auf den Willen der Götter vertrauen" #NT!
 flavor_gaul.59.b: "Nichts davon ergibt einen Sinn ... Warum tun wir die Dinge, die wir tun?" #NT!
 flavor_gaul.59.c: "Es gibt keinen Grund, warum ich mir die Mühe machen sollte" #NT!
 flavor.gaul.59.tt: "$mission_completed_tooltip_1$ „#Y Eine Wagenbestattung#!'“ $mission_completed_tooltip_2$!" #NT!
 treverian_ruler_contemplates_gods_tt: "Unser Herrscher wird über ernste Fragen von Leben und Tod nachdenken ..." #NT!
  
 flavor_gaul.60.t: "Handelsbeziehungen" #NT!
 flavor_gaul.60.desc: "In der Geschichte unseres Volkes gibt es nur wenige, die mit [ROOT.GetCountry.GetRuler.GetName] mithalten können, die nicht nur viele hart erkämpfte Siege auf dem Schlachtfeld für [ROOT.GetCountry.GetName] errungen hat, sondern auch das tägliche Leben der Stämme durch den Import luxuriöser Waren auf ihre Marktplätze verbessert hat.\n\nWährend einige #E Älteste#! den Fluss exotischer Handelsgüter als vermännifizierend und erniedrigend für unsere traditionellen Handelsgewohnheiten angeprangert haben Leben, [ROOT.GetCountry.GetRuler.GetFirstName] hat im Gegenzug öffentlich [ROOT.GetCountry.GetRuler.GetHerHis]-Gegner kritisiert und argumentiert, dass sie uns davon abhalten würden, mächtiger zu werden." #NT!
 flavor_gaul.60.a: "Es bringt viele Vorteile mit sich, den Handel florieren zu lassen" #NT!
 flavor_gaul.60.b: "Der kluge Mann investiert sein Geld, um größere Gewinne zu erzielen" #NT!
 flavor.gaul.60.tt: "$mission_completed_tooltip_1$ „#Y Handelsbeziehungen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.61.t: "Treveran Oppida" #NT!
 flavor_gaul.61.desc: "Unsere Architekten und Ingenieure beherrschen die hohe Kunst des Bauens und haben ihr Handwerk in vielen schwierigen Jahren harter Arbeit verfeinert. [ROOT.GetCountry.GetRuler.GetName] hat ihre Arbeit schnell gelobt, ihre Bemühungen als Beispiel für [ROOT.GetCountry.GetAdjective] Brillanz vom Feinsten gewürdigt und immer wieder erklärt, dass wir solche Männer brauchen.\n\nÜberall in [ROOT.GetCountry.GetName] wurden Boten geschickt, die Arbeitskräfte nach [ROOT.GetCountry.GetCapital.GetName] riefen, wo es immer Arbeit zu finden gab, und es dauerte nicht lange, bis viele Freigelassene in der Hauptstadt ankamen." #NT!
 flavor_gaul.61.a: "Unsere wachsende Zivilisation erfordert mehr Städte – machen wir uns an die Arbeit" #NT!
 flavor.gaul.61.tt: "$mission_completed_tooltip_1$ „#Y Treveran Oppida#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.62.t: "Der Rhenus" #NT!
 flavor_gaul.62.desc: "Seit vielen Stunden findet in [ROOT.GetCountry.GetCapital.GetName] ein [ROOT.GetCountry.GetAdjective] #E Kriegsrat#! statt, und die erfahrensten Krieger aus [ROOT.GetCountry.GetName] – [ROOT.GetCountry.GetRuler.GetName], [SCOPE.sCharacter('clan_chief_one').GetName] und [SCOPE.sCharacter('clan_chief_two').GetName] – haben sich versammelt, um Strategie und Taktik zu besprechen. Unglücklicherweise für alle Anwesenden gibt es Meinungsverschiedenheiten darüber, wie wir vorgehen sollen.\n\n[SCOPE.sCharacter('clan_chief_one').GetFirstName] glaubt, dass die dichten Wälder von [GetProvince('(int32)2428').GetArea.GetName] die beste Provinz für eine Invasion wären, aber #E0 schwört, dass das Unsinn ist und dass die felsigen Hügel von #E1 die erste Wahl für unsere Armeen sein müssen. #E2 ist frustriert über die beiden und ihr störrisches Verhalten und freut sich nicht darauf, die endgültige Entscheidung zu treffen, da er weiß, dass einer der besten Kämpfer von #E3 zutiefst verärgert sein wird." #NT!
 flavor_gaul.62.a: "Ich stimme [SCOPE.sCharacter('clan_chief_one').GetFirstName] zu und werde keine anderen Argumente hören" #NT!
 flavor_gaul.62.b: "[SCOPE.sCharacter('clan_chief_two').GetName] hat wahrheitsgemäß gesprochen" #NT!
 flavor_gaul.62.c: "Ihr zwei Idioten streitet euch wie verwöhnte Kinder – schweigt!" #NT!
 flavor.gaul.62.tt: "$mission_completed_tooltip_1$ „#Y The Rhenus#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.63.t: "Unterwerfung der Eburonen" #NT!
 flavor_gaul.63.desc: "Nachdem die #E Eburonen#! von den beeindruckenden [ROOT.GetCountry.GetRuler.GetName], dem berühmten [ROOT.GetCountry.GetRulerTitle], der die Stämme von [ROOT.GetCountry.GetName] von einem Sieg zum nächsten geführt hat, besiegt wurden, hat [ROOT.GetCountry.GetRuler.GetSheHe] [ROOT.GetCountry.GetRuler.GetHerHis] Kriegern versprochen, dass noch mehr Ruhm auf sie wartet." #NT!
 flavor_gaul.63.a: "Unsere Truppen werden bald in neue Länder einmarschieren, die ich hiermit beanspruche!" #NT!
 flavor_gaul.63.b: "Ich werde Eburonia wirklich unterwerfen ... die Belger versklaven!" #NT!
 flavor.gaul.63.tt: "$mission_completed_tooltip_1$ „#Y Unterwerfung der Eburonen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.64.t: "Stärken Sie den Rhenus" #NT!
 flavor_gaul.64.desc: "Seit [ROOT.GetCountry.GetRuler.GetHerHis] als [ROOT.GetCountry.GetRulerTitle] hatte [ROOT.GetCountry.GetRuler.GetName] immer eine Invasion von der anderen Seite des #E Flusses Rhenus#! befürchtet, konnte aber nicht viel dagegen tun – die Probleme, mit denen [ROOT.GetCountry.GetName] konfrontiert war, waren dringend und schwerwiegend, und imaginäre #E germanische#! Plünderer würden für einen weiteren Tag ein Problem darstellen.\n\nAber dieser Tag kam schließlich und [ROOT.GetCountry.GetRuler.GetFirstName] war bereit Im Augenblick seien die Götter gepriesen. Nachdem wir unsere Befestigungen und Verteidigungsanlagen erkundet hatten, wurde beschlossen, dass #E rheinische Wächter#! an entscheidenden Knotenpunkten entlang des Flusses stationiert werden und als Gardisten dienen würden. Diese Soldaten würden unsere erste Verteidigungslinie bilden, die Passagen über den Rhenus halten und hoffentlich dem Rest unserer Truppen genügend Zeit geben, ihnen zu Hilfe zu kommen." #NT!
 flavor_gaul.64.a: "Tapfere Wächter von Treveria, mögen die Götter an eurer Seite kämpfen!" #NT!
 flavor.gaul.64.tt: "$mission_completed_tooltip_1$ „#Y Fortify The Rhenus#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.65.t: "Jura-Gebirge" #NT!
 flavor_gaul.65.desc: "Da nun die Truppen von [ROOT.GetCountry.GetName] die Ausläufer und Passagen des #E Jura-Gebirges#!, kontrollieren, hat der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] unserem Volk verkündet, dass unsere Expansion nicht beendet ist, sondern so lange andauern wird, wie die Götter uns den Sieg gewähren." #NT!
 flavor_gaul.65.a: "Es wird eine Zeit des Friedens geben, aber dieser Tag ist noch nicht gekommen" #NT!
 flavor.gaul.65.tt: "$mission_completed_tooltip_1$ „#Y Juragebirge#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.66.t: "Sichern Sie unsere Küste" #NT!
 flavor_gaul.66.desc: "Viele Jahre lang waren unsere Stämme auf die Ebenen und Wälder von #E Gallien#!, beschränkt, aber die Dinge ändern sich, und in unserem Fall haben sich die Dinge schnell geändert; Wir bleiben nicht länger an Land, aber unsere tapferen Söhne haben Schiffe gebaut, mit denen sie auf fernen Gewässern segeln können.\n\nObwohl wir immer noch auf dem Meer Fuß fassen, haben unsere Leute die Aufgabe mit Begeisterung angepackt und sich in die Arbeit gesteckt, starke Schiffe für unsere Seeleute zu bauen." #NT!
 flavor_gaul.66.a: "Wir müssen unsere Interessen auf See und an Land schützen" #NT!
 flavor.gaul.66.tt: "$mission_completed_tooltip_1$ „#Y Unsere Küste sichern#!'“ $mission_completed_tooltip_2$!" #NT!
  
  # NEW BOIHAEMIA 
 flavor_gaul.67.t: "Kolonisieren Sie das Land jenseits der Sudeten" #NT!
 flavor_gaul.67.desc: "Die Sudeten sind ein Land, das unserem eigenen nicht so unähnlich ist, allerdings mit viel mehr Ebenen als Wäldern. Wir tun gut daran, ein solches Land für uns zu beanspruchen – [ROOT.GetCountry.GetRuler.GetName] ist klar geworden, dass wir in den fruchtbaren Ländern jenseits unserer Heimat wahren Wohlstand und Reichtum finden werden." #NT!
 flavor_gaul.67.a: "Unser zweites Zuhause." #NT!
 flavor.gaul.67.tt: "$mission_completed_tooltip_1$ „#Y Kolonisiere das Land jenseits der Sudeten#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.68.t: "Entwickeln Sie unser transsudetisches Land" #NT!
 flavor_gaul.68.desc: "In den Jahren seit unserer Expansion in die Transsudetischen Länder hat es sich in eine recht geschäftige Provinz voller kleiner Dörfer und Bauernhöfe verwandelt. Es ähnelt inzwischen den böhmischen Heimatländern, worauf [ROOT.GetCountry.GetRuler.GetName] sehr stolz ist.\n\nWer kann sagen, wohin uns unsere Eroberungen als nächstes führen werden, nachdem wir einen Ort, der einst dünn besiedelt war, nun in ein lebendiges und zivilisiertes Land verwandelt haben?" #NT!
 flavor_gaul.68.a: "Zuerst sollten wir uns um unser eigenes Land kümmern ..." #NT!
 flavor.gaul.68.tt: "$mission_completed_tooltip_1$ „#Y Entwickelt unser transsudetisches Land#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.69.t: "Taurisker Allianz" #NT!
 flavor_gaul.69.desc: "[ROOT.GetCountry.GetRuler.GetName] machte sich mit seinen vertrauenswürdigen Clanchefs auf den Weg, um den Pakt abzuschließen, der zwischen [GetCountry('BOA').GetName] und [GetCountry('TSC').GetName] besprochen wurde. Bei seiner Ankunft in der tauriskischen Hauptstadt [GetProvince('(int32)4029').GetName] wurde [ROOT.GetCountry.GetRuler.GetName] mit Musik, einem Festmahl und Tänzern begrüßt.\n\nAlles hätte nicht perfekter laufen können, und jetzt hat [GetCountry('BOA').GetName] einen vertrauenswürdigen Verbündeten und kann mit der Expansion in die Länder östlich von uns beginnen." #NT!
 flavor_gaul.69.a: "Ich habe überall Freunde." #NT!
 flavor.gaul.69.tt: "$mission_completed_tooltip_1$ „#Y Tauriscian Alliance#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.70.t: "Taurisischer Handel" #NT!
 flavor_gaul.70.desc: "Unsere Allianz mit [GetCountry('TSC').GetName] war so vorteilhaft, dass es nur vernünftig war, ihnen unsere Handelsbeziehungen zu öffnen. Jetzt fließen nicht nur Waren durch unser Land, sondern sie haben auch versprochen, einige ihrer besten Soldaten als persönliche Wache nach [ROOT.GetCountry.GetRuler.GetName] zu schicken!" #NT!
 flavor_gaul.70.a: "Das war wirklich eine kluge Entscheidung." #NT!
 flavor.gaul.70.tt: "$mission_completed_tooltip_1$ „#Y Taurisker Handel#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.71.t: "Nach Oberpannonien" #NT!
 flavor_gaul.71.desc: "Die Gebiete von #E Oberpannonien#! sind dünn besiedelt, aber dennoch von strategischem Interesse für uns. Unsere Eroberung und Unterwerfung von Gebieten, die einst von den in den Bergen lebenden Cotinianern und den listigen Eraviscianern kontrolliert wurden, hat zu einem Gebiet geführt, von dem aus wir weitere Invasionen durchführen können. Es scheint, dass die Kelten im Süden nach unseren Eroberungen begonnen haben, sich zu rühren, und die Daker im Osten scheinen nicht vertrauenswürdig zu sein ..." #NT!
 flavor_gaul.71.a: "Wir müssen vor allen Bedrohungen wachsam sein." #NT!
 flavor.gaul.71.tt: "$mission_completed_tooltip_1$ „#Y In Pannonien#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.72.t: "Pannonische Dominanz" #NT!
 flavor_gaul.72.desc: "Nach vielen hart erkämpften Siegen können wir endlich sagen, dass #E Pannonien#! nun böhmisches Territorium ist! Dieses fruchtbare Land wird ein entscheidender Teil unserer neuen Föderation werden. Schließlich kann eine Armee nur mit vollem Magen kämpfen." #NT!
 flavor_gaul.72.a: "Unsere Erträge werden reichlich sein." #NT!
 flavor.gaul.72.tt: "$mission_completed_tooltip_1$ „#Y Pannonische Dominanz#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.73.t: "Bernsteinküste" #NT!
 flavor_gaul.73.desc: "Unser wiederholter Umgang mit den Germanen hat uns zu der Erkenntnis geführt, welch enormen Reichtum sie besitzen. Nicht aus Gold oder Silber, sondern aus dieser seltsamen, steinähnlichen Substanz namens Bernstein. Obwohl wir nicht ganz sicher sind, was wir davon halten sollen, können die reichen Völker des Südens nicht genug davon bekommen. Aus diesem Grund organisierte [ROOT.GetCountry.GetRuler.GetName] eine Eroberung dieser Region. Da wir diese kostbare Ressource nun allein unter unserer Kontrolle haben, werden wir über unsere kühnsten Träume hinaus reich werden." #NT!
 flavor_gaul.73.a: "Es scheint, dass Bernstein mehr wert ist als Gold." #NT!
 flavor.gaul.73.tt: "$mission_completed_tooltip_1$ „#Y Bernsteinküste#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.74.t: "Salz von Laciacum" #NT!
 flavor_gaul.74.desc: "Nach unserer Eroberung der alaunischen Länder wurde ihr kostbares Salz @salt! Seen sind inzwischen unter unsere Kontrolle geraten. Die Alauner haben dieses Salzproduktionsgebiet offenbar nicht in vollem Umfang genutzt, aber jetzt sind wir dazu in der Lage. Obwohl wir Salz nicht in großen Mengen benötigen, gibt es anderswo Märkte, an die wir es mit großem Gewinn verkaufen können, beispielsweise an die Germanen im Norden." #NT!
 flavor_gaul.74.a: "Ein solch wertvolles Gut ist immer sehr gefragt." #NT!
 flavor.gaul.74.tt: "$mission_completed_tooltip_1$ „#Y Salz von Laciacum#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.75.t: "Ferrum Noricum" #NT!
 flavor_gaul.75.desc: "Eisen @iron! ist nicht das einzig Interessante an [GetProvince('(int32)3672').GetName].\n\nDiese Gebirgspässe sind selbst mit einer kleinen Streitmacht leicht zu verteidigen, und das reichlich vorhandene Eisen in der Gegend ist etwas, das wir zum Schmieden neuer Waffen, Werkzeuge und Rüstungen nutzen können. Obwohl wir von Natur aus kein Bergvolk sind, werden wir diesen strategischen Würgegriff nutzen können. Es soll unsere südliche Bastion sein, von der aus wir jeden Feind abwehren können, der versucht, in unsere reichen nördlichen Länder einzudringen." #NT!
 flavor_gaul.75.a: "Unsere Klingen werden so scharf sein wie unser Verstand." #NT!
 flavor.gaul.75.tt: "$mission_completed_tooltip_1$ „#Y Ferrum Noricum#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.76.t: "Segel setzen" #NT!
 flavor_gaul.76.desc: "Weit in unserem Süden, in den warmen Gewässern des #E Mittelmeers#!,, gibt es bekanntermaßen Tausende von Schiffen, die von Hafen zu Hafen, von Stadt zu Stadt fahren und wertvolle Ladungen von Luxusgütern oder ganze Staffeln von Elite-Militäreinheiten transportieren – Bestrebungen, die [ROOT.GetCountry.GetRuler.GetName] eines Tages für [ROOT.GetCountry.GetName] hegt.\n\nUnsere Flotte ist bescheiden im Vergleich zu den riesigen Armadas dieser mächtigen Reiche, aber jeder muss irgendwo anfangen, und [ROOT.GetCountry.GetRuler.GetFirstName] ist stolz auf das, was wir bisher erreicht haben." #NT!
 flavor_gaul.76.a: "Sie werden sehen, unsere Marine ist für Großes bestimmt" #NT!
 flavor.gaul.76.tt: "$mission_completed_tooltip_1$ „#Y Segel setzen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.77.t: "Nordseehandel" #NT!
 flavor_gaul.77.desc: "Dank der Zunahme des Handels, der in [ROOT.GetCountry.GetCapital.GetName] fließt, erzielen unsere Händler und Handwerker mehr Gewinne, als sie es für möglich gehalten hätten. Aus Dankbarkeit haben sie [ROOT.GetCountry.GetRuler.GetName] eine große Geldsumme geschickt, um ihre Wertschätzung für [ROOT.GetCountry.GetRulerTitle] zum Ausdruck zu bringen.\n\nDer Anblick eines Handelsschiffs, das den unruhigen Gewässern des #E Mare Germanicum#! trotzt, um unsere Häfen zu erreichen, wird immer häufiger, und viele unserer Jugendlichen träumen davon, eines Tages Seeleute zu werden." #NT!
 flavor_gaul.77.a: "Ich schätze die Geste – ich werde das Gold sinnvoll einsetzen" #NT!
 flavor.gaul.77.tt: "$mission_completed_tooltip_1$ „#Y Nordseehandel#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.78.t: "Mooropfer" #NT!
 flavor_gaul.78.desc: "Eines unserer ältesten religiösen Rituale besteht darin, ein Opfer zu opfern, indem man es in einem Moor ertränkt und seinen Körper im trüben Wasser zurücklässt, zusammen mit Geschenken von Nahrung und Kleidung. Diese uralte Praxis hat [ROOT.GetCountry.GetAdjective] den Sieg im Kampf sowie reiche Ernten jedes Jahr gesichert, und daher stand [ROOT.GetCountry.GetRuler.GetName] unter Druck, [ROOT.GetCountry.GetRuler.GetHerHis] heilige Pflichten zu erfüllen.\n\nDa wir nun in [ROOT.GetCountry.GetCapital.GetName] Gefangene angekettet haben, haben die #E Stammesältesten#! den [ROOT.GetCountry.GetRulerTitle] ein geeignetes Opfer gebracht und verlangt, dass die Götter gebeten werden." #NT!
 flavor_gaul.78.a: "Möge [ROOT.GetCountry.GetRuler.GetFirstName] die Macht der Götter geschenkt werden" #NT!
 flavor_gaul.78.b: "Bitten Sie die Götter, [ROOT.GetCountry.GetName] mit dem Sieg über unsere Feinde zu segnen" #NT!
 flavor_gaul.78.c: "Ich werde dem Opfer Gnade erweisen – nicht alle Friesen sind Monster" #NT!
 flavor.gaul.78.tt: "$mission_completed_tooltip_1$ „#Y Sumpfopfer#!'“ $mission_completed_tooltip_2$!" #NT!
 frisians_decide_bog_offering_tt: "Unser [ROOT.GetCountry.GetRulerTitle|Y] wird über das Schicksal unseres Gefangenen entscheiden ..." #NT!
 frisian_victim_moves_to_bar_tt: "Der Gefangene wird #T freigelassen#! in die friesische Wildnis entlassen..." #NT!
  
 flavor_gaul.79.t: "Nordseeküste" #NT!
 flavor_gaul.79.desc: "In den letzten Monaten ist der Anblick von [ROOT.GetCountry.GetAdjective] Raubzügen, die die Nordküste entlangfahren, zu einem schrecklichen Omen für die am Meer lebenden Einheimischen geworden, denn sie wissen, dass unsere Boote Plünderer und Sklavenhändler befördern und dass unsere Krieger keine Gnade mit den Bewohnern ihres Stammes zeigen werden.\n\n[ROOT.GetCountry.GetRuler.GetName] hat viele dieser Raubzüge oft persönlich überwacht und sich einen furchteinflößenden Ruf als Plünderer und Menschenmörder erworben." #NT!
 flavor_gaul.79.a: "Dies ist nur der Anfang Ihres Elends" #NT!
 flavor.gaul.79.tt: "$mission_completed_tooltip_1$ „#Y Nordseeküste#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.80.t: "Sächsische Seeleute" #NT!
 flavor_gaul.80.desc: "Unsere Seeleute sind geschickt darin, feindliche Schiffe im Kampf anzugreifen und zu kapern, und bringen so unsere friesische Beherrschung des Diebstahls und die Liebe zur Plünderung auf die offenen Meere. [ROOT.GetCountry.GetRuler.GetName] hat die Bemühungen unserer Männer gelobt und sie ermutigt, so viele ausländische Boote wie möglich zu übernehmen – unsere Marinen sind in den letzten Jahren zwar größer geworden, aber es gibt immer Raum für Wachstum." #NT!
 flavor_gaul.80.a: "Herrlich wird unsere Marine sein!" #NT!
 flavor.gaul.80.tt: "$mission_completed_tooltip_1$ „#Y Saxon Sailors#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.81.t: "Stärken Sie unser Kapital" #NT!
 flavor_gaul.81.desc: "Obwohl unsere Befestigungen möglicherweise nicht mit den mächtigen Steinmauern zu vergleichen sind, die die antiken Städte weit im Süden umgeben, hat [ROOT.GetCountry.GetRuler.GetName] die beste Arbeit geleistet, die [ROOT.GetCountry.GetRuler.GetSheHe] leisten konnte, um sicherzustellen, dass die Verteidigungsanlagen von [ROOT.GetCountry.GetCapital.GetName] angemessen sind. Unsere Garnisonen sind gut mit Vorräten ausgestattet und unsere Verteidiger haben geschworen, bis zum letzten Mann zu kämpfen." #NT!
 flavor_gaul.81.a: "Da unser Kapital geschützt ist, fürchten wir niemanden, weder Belgier noch andere" #NT!
 flavor.gaul.81.tt: "$mission_completed_tooltip_1$ „#Y Unsere Hauptstadt stärken#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.82.t: "Opfer für [GetDeityDefinition('omen_yngvi').GetName]" #NT!
 flavor_gaul.82.desc: "[ROOT.GetCountry.GetRuler.GetName] hat [GetDeityDefinition('omen_yngvi').GetName] um Hilfe und Beistand gerufen und den mächtigen Sohn von [GetDeityDefinition('omen_mannus').GetName] gebeten, unsere Feinde in Vergessenheit zu treiben. Als Ingwaz unsere flehenden Gebete hörte, wandte er sein Gesicht [ROOT.GetCountry.GetName] zu und segnete uns mit göttlicher Kraft und Kraft!" #NT!
 flavor_gaul.82.a: "Wir werden die Wut von [GetDeityDefinition('omen_yngvi').GetName] auf unsere Feinde loslassen!" #NT!
 flavor.gaul.82.tt: "$mission_completed_tooltip_1$ „#Y Opfer für [GetDeityDefinition('omen_yngvi').GetName]#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.83.t: "Überfallen Sie Pritannia" #NT!
 flavor_gaul.83.desc: "Jetzt, da wir uns mitten in einem Krieg mit den #E Pritanniern#!, befinden, hat [ROOT.GetCountry.GetRuler.GetName] unseren Truppen befohlen, den Inselbewohnern während dieser ersten Schlachten keine Freundlichkeit zu zeigen. „Die Zeit wird kommen, Sklaven zu nehmen, aber der Moment ist nicht da – wir müssen diejenigen vernichten, die in der Lage sind, gegen uns zu kämpfen, und dann werden wir uns nehmen, was wir wollen.“" #NT!
 flavor_gaul.83.a: "Machen Sie keine Gefangenen! Jeder muss sterben!" #NT!
 flavor.gaul.83.tt: "$mission_completed_tooltip_1$ „#Y Raid Pritannia#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.85.t: "Den Reichtum teilen" #NT!
 flavor_gaul.85.desc: "Weil die Kriegsgötter gegenüber den Abgaben von [ROOT.GetCountry.GetName] großzügig waren und uns mit unzähligen Siegen und unermesslichem Reichtum gesegnet haben, hat [ROOT.GetCountry.GetRuler.GetName] beschlossen, den Reichtum mit den führenden Männern zu teilen, die in [ROOT.GetCountry.GetCapital.GetName] leben.\n\nNachdem er Goldgeschenke an [ROOT.GetCountry.GetRuler.GetHerHis] #E Stammesrat#!, verteilt hatte, ermutigte [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetHerHis] Männer, den Erlös aus dieser unerwarteten Aktion zu verwenden Glücksfall, sich mit Waffen aus Eisen @iron zu bewaffnen! - Eine Bitte, der sie gerne nachkamen." #NT!
 flavor_gaul.85.a: "So gerüstet sind wir auf alles vorbereitet, was auf uns zukommt!" #NT!
 flavor.gaul.85.tt: "$mission_completed_tooltip_1$ „#Y Den Reichtum teilen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.86.t: "Die Fuchsjagd" #NT!
 flavor_gaul.86.desc: "Erstaunliche Neuigkeiten von der Grenze! Bei unserem jüngsten Überfall auf [GetCountry('EBS').GetName] gelang es unseren Kriegern, eine Gruppe von Kriegern unter der Führung des berüchtigten Banditen [SCOPE.sChar('rups_belgae').GetName], einem Mann, der wegen seiner brutalen Angriffe auf friesisches Territorium gesucht wurde, auf dem Heimweg nach [ROOT.GetCountry.GetCapital.GetName] zu ergreifen.\n\nDieser eburonische Schurke, der wegen der Leichtigkeit, mit der er unentdeckt über unsere Grenze schlüpfte, als #E „Der Fuchs“#! bekannt ist, hat unsere geplündert Seit Jahren ist er das wohlhabendste Land, daher grenzt seine Gefangennahme an ein Wunder." #NT!
 flavor_gaul.86.a: "Das ist die Gerechtigkeit des friesischen Volkes!" #NT!
 flavor.gaul.86.tt: "$mission_completed_tooltip_1$ „#Y Die Fuchsjagd#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.87.t: "Die Sachsen" #NT!
 flavor_gaul.87.desc: "Es ist eine merkwürdige Wendung der Ereignisse, dass die #E Pritannier#! Einheimischen dazu übergegangen sind, uns die #E „Sachsen“#! zu nennen, weil sie die Messer fürchten, die wir auf unseren grausamen Missionen in ihren Territorien mit sich führen. Die Gefahr, die von uns „Sachsen“ ausgeht, hat sich schnell auf der Insel herumgesprochen, und viele Stammeshäuptlinge hoffen, eine Art Verteidigungsliga gegen uns zu bilden.\n\nÜber ihre erbärmlichen Bemühungen, uns aufzuhalten, hat [ROOT.GetCountry.GetRuler.GetName] geschworen, persönlich die Schiffe und Siedlungen aller niederzubrennen, die sich uns entgegenstellen." #NT!
 flavor_gaul.87.a: "Wenn die Menschen uns Sächsisch nennen, dann nehmen wir den Namen an" #NT!
 flavor.gaul.87.tt: "$mission_completed_tooltip_1$ „#Y Die Sachsen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.88.t: "Pritannischer Stützpunkt" #NT!
 flavor_gaul.88.desc: "Nachdem unsere siegreichen Armeen unseren Verwandten einen Stützpunkt auf der Insel #E Pritannia#!, gesichert haben, richten sie nun ihre hungrigen Augen auf den Horizont, wo das Land der Einheimischen nach Eroberung schreit. [ROOT.GetCountry.GetRuler.GetName], der mit dem Frieden nie zufrieden war, hat den Truppen von [ROOT.GetCountry.GetName] befohlen, sich zum Kampf aufzustellen." #NT!
 flavor_gaul.88.a: "Wir werden nicht ruhen, bis wir unsere Feinde vernichtet haben!" #NT!
 flavor.gaul.88.tt: "$mission_completed_tooltip_1$ „#Y Pritannian Foothold#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.89.t: "Die Nordküste" #NT!
 flavor_gaul.89.desc: "Die Krieger von [ROOT.GetCountry.GetName] sind wirklich bemerkenswert; Sie schrecken nie vor dem Ruf der Schlacht zurück, sondern stürmen ohne Furcht in den Augen ihrem Tod entgegen. Sie marschieren durch die sumpfigen Sümpfe von #E Pritannia#!, ohne sich zu beschweren, und weder der unaufhörliche Regen, der die Insel plagt, noch der beißende Wind aus ihren wilden Einöden lösen bei unseren Männern irgendein Murren aus.\n\nWenn unsere Soldaten einen Feldzug gewinnen, rufen sie nicht nach Ruhe oder dem Recht, zu ihren Familien nach Hause zurückzukehren, sondern drängen [ROOT.GetCountry.GetRuler.GetName], sie in die glorreiche Schlacht zu führen." #NT!
 flavor_gaul.89.a: "Wie können die [ROOT.GetCountry.GetAdjective]-Stämme jemals verlieren, wenn solche Kämpfer an meiner Seite stehen?" #NT!
 flavor.gaul.89.tt: "$mission_completed_tooltip_1$ „#Y Die Nordküste#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.90.t: "Die Südküste" #NT!
 flavor_gaul.90.desc: "Unsere Armeen zerschlagen weiterhin diejenigen, die gegen sie geschickt wurden, und nehmen neue Länder und Territorien für [ROOT.GetCountry.GetName] ein, die uns weiteren Zugang zu #E Pritannia#! ermöglichen – eine Situation, die [ROOT.GetCountry.GetRuler.GetName] bereit ist, auszunutzen." #NT!
 flavor_gaul.90.a: "Unsere Armeen marschieren für #E Durotrigia#! – senden Sie eine Nachricht an ihre Anführer" #NT!
 flavor.gaul.90.tt: "$mission_completed_tooltip_1$ „#Y Die Südküste#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.91.t: "Die Ostküste" #NT!
 flavor_gaul.91.desc: "Während drei schreckliche Monate lang Ansprüche auf das Land ihrer Nachbarn vorbereitet wurden, plünderten und verwüsteten die Truppen von [ROOT.GetCountry.GetName] die Stadt [GetProvince('(int32)2032').GetName] nach Herzenslust. Der Stadt wurde alles Wertvolle entzogen, und die Straßen waren übersät mit den Leichen willkürlich Getöteter. Nie zuvor in der Geschichte der #E Icener#! war eine solche Tragödie über sie hereingebrochen, und ihr Volk würde die Verbrechen der Soldaten von [ROOT.GetCountry.GetRuler.GetName] nie vergessen." #NT!
 flavor_gaul.91.a: "Sei dankbar, dass du noch eine Stadt hast" #NT!
 flavor_gaul.91.b: "Möchten Sie sehen, wozu ich wirklich fähig bin?" #NT!
 flavor.gaul.91.tt: "$mission_completed_tooltip_1$ „#Y Die Ostküste#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.92.t: "Westlicher Hafen" #NT!
 flavor_gaul.92.desc: "Nach allem übertrifft der in [GetProvince('(int32)2047').GetName] errichtete Hafen weiterhin die hohen Erwartungen von [ROOT.GetCountry.GetRuler.GetName], dem Hafen, der sich am meisten für Investitionen in der Region eingesetzt hatte. In den Gewässern des #E Mare Hibernicum#! wimmelt es nur so von Leben, und die Fischer, die mit ihren Booten unterwegs sind, fangen ständig Rekordbestände; Ein Segen, der den Einheimischen Ernährungssicherheit gebracht hat." #NT!
 flavor_gaul.92.a: "Ich wette, ein wohlgenährter Stammesangehöriger ist glücklich" #NT!
 flavor.gaul.92.tt: "$mission_completed_tooltip_1$ „#Y Westhafen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.93.t: "Northumbrien" #NT!
 flavor_gaul.93.desc: "[ROOT.GetCountry.GetRuler.GetName] hat die Aufmerksamkeit von [ROOT.GetCountry.GetRuler.GetHerHis] vorübergehend von der Planung von Kriegen auf die Gestaltung von Städten gelenkt und die Schatzkammer von [ROOT.GetCountry.GetName] für die massiven Bauinitiativen geöffnet – eine Anstrengung, die ein durchschlagender Erfolg war.\n\nDer weise [ROOT.GetCountry.GetRulerTitle] hat richtig argumentiert, dass der beste Weg, [ROOT.GetCountry.GetAdjective] in den von uns eroberten Ländern zu verbreiten, darin besteht, die lokale Infrastruktur aufzubauen, was unseren Leuten gefallen und sie erleichtert hat kriegsmüde Herzen." #NT!
 flavor_gaul.93.a: "Meine nordumbrischen Städte zeigen allen, dass wir bleiben wollen" #NT!
 flavor.gaul.93.tt: "$mission_completed_tooltip_1$ '#Y Northumbria#!' $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.94.t: "Wessex" #NT!
 flavor_gaul.94.desc: "Unsere ununterbrochene Erfolgsserie geht unvermindert weiter und [ROOT.GetCountry.GetRuler.GetName] erhält nur gute Nachrichten; Der Sieg auf dem Schlachtfeld liegt bei uns, unsere Krieger werden von Tag zu Tag stärker und viele Stammesangehörige wandern aus ihren vom Krieg zerrissenen Gebieten ab und lassen sich in unserem Land nieder, was unsere Steuereinnahmen sowie die Anzahl der für unsere Aushebungen verfügbaren Soldaten erhöht." #NT!
 flavor_gaul.94.a: "Mögen die Götter uns weiterhin so segnen!" #NT!
 flavor.gaul.94.tt: "$mission_completed_tooltip_1$ „#Y Wessex#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.95.t: "Sussex und Essex" #NT!
 flavor_gaul.95.desc: "Nachdem er einige vielversprechende Standorte persönlich inspiziert hatte, gab [ROOT.GetCountry.GetRuler.GetName] den Auftrag für den Bau neuer Städte in den südöstlichen Regionen von #E Pritannia#!.. Diese neuen Städte sollen als Zuhause für unsere Verwandten auf der anderen Seite des Wassers dienen, von denen viele ihre traditionellen Siedlungen verlassen haben, in der Hoffnung, sich auf unserer Insel ein neues Leben aufzubauen.\n\nWährend sich in unseren kontinentalen Besitztümern die Nachricht verbreitet, dass sich in [GetProvince('(int32)2028').GetName] und [GetProvince('(int32)2020').GetName], Schiffe mit sächsischen Siedlern überqueren täglich das #E Mare Britannicum#!." #NT!
 flavor_gaul.95.a: "Das ist eine hervorragende Entwicklung" #NT!
 flavor.gaul.95.tt: "$mission_completed_tooltip_1$ „#Y Sussex und Essex#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.96.t: "Das Herz von Pritannia" #NT!
 flavor_gaul.96.desc: "Mit der Provinz [GetProvince('(int32)2045').GetArea.GetName] fest im Griff, haben die Truppen von [ROOT.GetCountry.GetName] die Kontrolle über das Herz der Insel übernommen. Unsere Plünderer und Krieger können zu Raubzügen in jede beliebige Richtung aufbrechen, und niemand wird sich vor dem Zorn von [ROOT.GetCountry.GetRuler.GetName] verstecken können." #NT!
 flavor_gaul.96.a: "Das sind gute Nachrichten für die [ROOT.GetCountry.GetAdjective]-Stämme" #NT!
 flavor.gaul.96.tt: "$mission_completed_tooltip_1$ „#Y Das Herz von Pritannia#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.97.t: "Ostanglien" #NT!
 flavor_gaul.97.desc: "Die Situation in [GetProvince('(int32)2035').GetArea.GetName] verbessert sich weiterhin für unsere Bevölkerung, deren Zahl so groß geworden ist, dass sie als Hauptbewohner der Region gelten kann. Die Verehrung unserer Götter hat die lokalen Rituale der Einheimischen ersetzt, von denen viele unseren Glauben angenommen haben, in der Hoffnung, unserer Größe nachzueifern. Alles in allem ist [ROOT.GetCountry.GetRuler.GetName] sehr zufrieden mit allem, was [ROOT.GetCountry.GetRuler.GetSheHe] von [ROOT.GetCountry.GetRuler.GetHerHis] Beratern hört." #NT!
 flavor_gaul.97.a: "Wir haben wirklich Glück – vergessen wir das nie" #NT!
 flavor.gaul.97.tt: "$mission_completed_tooltip_1$ „#Y East Anglia#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.98.t: "Das Hibernische Meer" #NT!
 flavor_gaul.98.desc: "Unsere Seemacht ist in den letzten Jahren beträchtlich gewachsen, sodass wir unsere Macht weit über unsere eigenen Küsten hinaus verbreiten können – eine Notwendigkeit für die [ROOT.GetCountry.GetAdjective]-Stämme, die über ein weitläufiges Reich herrschen. Die Gewässer, die #E Pritannia#! umgeben, stehen unter unserer Kontrolle, und keiner unserer Nachbarn hat die Hoffnung, unsere Vorherrschaft auf See herauszufordern. Es wird angenommen, dass wir sogar den Armadas der mächtigen #E Mittelmeermächte#! schweren Schaden zufügen könnten, obwohl [ROOT.GetCountry.GetRuler.GetName] erklärt hat, dass [ROOT.GetCountry.GetRuler.GetSheHe] keine Eile hat, herauszufinden, ob diese Theorie wahr ist." #NT!
 flavor_gaul.98.a: "Lassen Sie unsere Marinen vorerst im Hibernian-Meer bleiben" #NT!
 flavor.gaul.98.tt: "$mission_completed_tooltip_1$ „#Y Das Hibernische Meer#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.99.t: "Londinium" #NT!
 flavor_gaul.99.desc: "Als unsere Invasionsschiffe vor vielen Jahren zum ersten Mal die Gewässer des #E Mare Germanicum#! überquerten, in der Hoffnung, die Küstensiedlungen von #E Pritannia#! zu plündern, wie konnten unsere Seeleute vorhersehen, dass unsere [ROOT.GetCountry.GetRuler.GetName] eines Tages für [ROOT.GetCountry.GetRuler.GetHerHim] eine Hauptstadt am Ufer des #E-Flusses bauen würden? Tamesis#!?\n\nUnsere Verwandten haben ihre traditionellen Heimatländer für immer verlassen, denn [ROOT.GetCountry.GetRuler.GetFirstName] hat erklärt, dass [GetProvince('(int32)2022').GetName] die neue Hauptstadt von #!0 ist – ein unwiderruflicher Bruch mit unserer Vergangenheit und ein klares Zeichen dafür, dass für das Volk von #!1 eine Zeit des Wandels gekommen ist." #NT!
 flavor_gaul.99.a: "Unsere Zukunft liegt hier, auf der Insel Albion ..." #NT!
 flavor.gaul.99.tt: "$mission_completed_tooltip_1$ „#Y Londinium#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.100.t: "Die Minen von Belerion" #NT!
 flavor_gaul.100.desc: "Alles läuft nach Plan, [ROOT.GetCountry.GetRuler.GetName] – die Minen, die unsere Leute in den felsigen Ausläufern von [GetProvince('(int32)2006').GetArea.GetName] gebaut haben, erweisen sich bereits als kluge Investitionen und zahlen uns Dividenden, mit denen nicht einmal die Optimisten unter uns gerechnet hätten." #NT!
 flavor_gaul.100.a: "Das sind hervorragende Neuigkeiten – vielen Dank, dass Sie mich darüber informiert haben" #NT!
 flavor.gaul.100.tt: "$mission_completed_tooltip_1$ „#Y Die Minen von Belerion#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.101.t: "Kent" #NT!
 flavor_gaul.101.desc: "Viele Nächte lang hatte [ROOT.GetCountry.GetRuler.GetName] immer wieder denselben Traum – ein Wesen aus Licht würde in den Schlafgemächern von [ROOT.GetCountry.GetRulerTitle] erscheinen und Belohnungen versprechen, wenn eine #E heilige Stätte#! in der Nähe der Siedlung von [GetProvince('(int32)2021').GetName] errichtet würde. Dieses leuchtende Geschöpf weigerte sich, seinen Namen preiszugeben, versprach aber, dass die Anwesenheit der Götter für die Menschen spürbar sein würde, wenn in einem heiligen Hain nahe der Küste eine heilige Stätte errichtet würde. Obwohl sich einige damals in [ROOT.GetCountry.GetCapital.GetName] vor den Kosten für den Bau eines religiösen Schreins scheuten, ordnete [ROOT.GetCountry.GetRuler.GetFirstName] den sofortigen Bau an, da sie in [ROOT.GetCountry.GetRuler.GetHerHis] tief davon überzeugt waren, dass die Vorteile sofort offensichtlich sein würden ... und das waren sie auch." #NT!
 flavor_gaul.101.a: "Ich wusste, dass dies passieren würde ... wir müssen Opfer der Dankbarkeit bringen" #NT!
 flavor.gaul.101.tt: "$mission_completed_tooltip_1$ '#Y Kent#!' $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.102.t: "Befestige Mercia" #NT!
 flavor_gaul.102.desc: "Als die in [GetProvince('(int32)2054').GetArea.GetName] lebenden Einheimischen [ROOT.GetCountry.GetRuler.GetName] um Hilfe baten, zögerten die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] nicht, sondern kamen ihnen sofort zu Hilfe. Die dort lebenden Stämme hatten es satt, von den weiter nördlich lebenden wilden #E Kelten#! überfallen zu werden, und waren bereit, alles Nötige zu tun, um ihre Sicherheit zu gewährleisten, konnten sich aber nicht schützen.\n\nUm der Stammesbedrohung ein Ende zu setzen, schickte [ROOT.GetCountry.GetRuler.GetFirstName] einige unserer besten Krieger in die Region und befahl ihnen, in den Wäldern zu patrouillieren und jeden Fremden anzugreifen, den sie sahen. Die in Dobunnia errichtete Festung sollte zum Stützpunkt dieser Soldaten werden, die bereit waren, den [ROOT.GetCountry.GetAdjective] Frieden mit ihrem Leben durchzusetzen." #NT!
 flavor_gaul.102.a: "Eines Tages werde ich das Land dieser Stämme vollständig erobern" #NT!
 flavor.gaul.102.tt: "$mission_completed_tooltip_1$ „#Y Mercia befestigen#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.103.t: "Angelsächsisches Königreich" #NT!
 flavor_gaul.103.desc: "Die unübertroffene Beliebtheit von [ROOT.GetCountry.GetRuler.GetName] hat es [ROOT.GetCountry.GetRuler.GetHerHim] ermöglicht, in den von den [ROOT.GetCountry.GetAdjective] regierten Ländern zu tun, was [ROOT.GetCountry.GetRuler.GetSheHe] will, denn ohne die dynamische und brillante Führung des #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Clans#!, wären viele der glorreichen Errungenschaften der [ROOT.GetCountry.GetRuler.GetHerHim] Verwandten nie zustande gekommen.\n\nUnd so verkündete der mächtige Eroberer die Gründung eines neuen Königreichs proklamiert werden würde, eine Stadt, die von einer neuen Hauptstadt aus regierte und ihre Herrschaft über ganz #E Albion#!, ausdehnen würde. Die Stämme von [ROOT.GetCountry.GetRuler.GetHerHim]0 waren mehr als glücklich, die Änderung anzunehmen." #NT!
 flavor_gaul.103.a: "Alle begrüßen das #E Angelsächsische Königreich#! und seinen Monarchen!" #NT!
 flavor.gaul.103.tt: "$mission_completed_tooltip_1$ „#Y Angelsächsisches Königreich#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.104.t: "Jüto-Sächsisches Königreich" #NT!
 flavor_gaul.104.desc: "Die unübertroffene Beliebtheit von [ROOT.GetCountry.GetRuler.GetName] hat es [ROOT.GetCountry.GetRuler.GetHerHim] ermöglicht, in den von den [ROOT.GetCountry.GetAdjective] regierten Ländern zu tun, was [ROOT.GetCountry.GetRuler.GetSheHe] will, denn ohne die dynamische und brillante Führung des #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Clans#!, wären viele der glorreichen Errungenschaften der [ROOT.GetCountry.GetRuler.GetHerHim] Verwandten nie zustande gekommen.\n\nUnd so verkündete der mächtige Eroberer die Gründung eines neuen Königreichs proklamiert werden würde, eine Stadt, die von einer neuen Hauptstadt aus regierte und ihre Herrschaft über ganz #E Albion#!, ausdehnen würde. Die Stämme von [ROOT.GetCountry.GetRuler.GetHerHim]0 waren mehr als glücklich, die Änderung anzunehmen." #NT!
 flavor_gaul.104.a: "Alle begrüßen das #E Juto-Sächsische Königreich#! und seinen Monarchen!" #NT!
 flavor.gaul.104.tt: "$mission_completed_tooltip_1$ „#Y Juto-Sächsisches Königreich#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.105.t: "Sächsisches Königreich" #NT!
 flavor_gaul.105.desc: "Die unübertroffene Beliebtheit von [ROOT.GetCountry.GetRuler.GetName] hat es [ROOT.GetCountry.GetRuler.GetHerHim] ermöglicht, in den von den [ROOT.GetCountry.GetAdjective] regierten Ländern zu tun, was [ROOT.GetCountry.GetRuler.GetSheHe] will, denn ohne die dynamische und brillante Führung des #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Clans#!, wären viele der glorreichen Errungenschaften der [ROOT.GetCountry.GetRuler.GetHerHim] Verwandten nie zustande gekommen.\n\nUnd so verkündete der mächtige Eroberer die Gründung eines neuen Königreichs proklamiert werden würde, eine Stadt, die von einer neuen Hauptstadt aus regierte und ihre Herrschaft über ganz #E Albion#!, ausdehnen würde. Die Stämme von [ROOT.GetCountry.GetRuler.GetHerHim]0 waren mehr als glücklich, die Änderung anzunehmen." #NT!
 flavor_gaul.105.a: "Alle begrüßen das #E Sächsische Königreich#! und seinen Monarchen!" #NT!
 flavor.gaul.105.tt: "$mission_completed_tooltip_1$ „#Y Sächsisches Königreich#!'“ $mission_completed_tooltip_2$!" #NT!
  
  #Aremorica Mission Events 
  
 flavor_gaul.106.t: "Die Geschenke von Toutatis!" #NT!
 flavor_gaul.106.desc: "In seiner göttlichen Großzügigkeit hat Toutatis ein heiliges Objekt offenbart, durch das er seinen Segen erbitten kann!\n\nGeschmiedet von den Händen unserer größten Metallarbeiter und beaufsichtigt durch göttliches Eingreifen, haben die Bemühungen der geschicktesten und rechtschaffensten der [SCOPE.GetRootScope.GetCountry.GetAdjective]er einen kunstvollen und extraveganten schwarzen Kessel hervorgebracht, der vor gesegneter Macht strotzt. Damit sollen wir unserem heiligen Gott Opfer, Tränke und Zaubersprüche von größter Bedeutung darbringen!\n\nHeute haben die Götter das Volk von [SCOPE.GetRootScope.GetCountry.GetName] weiter geadelt, indem sie uns bei der Beschaffung dieses Kessels geholfen haben. Und durch den Einsatz unseres neuen Geräts wird sich unser Vermögen verzehnfachen!" #NT!
 flavor_gaul.106.a: "Bei Toutatis, welche Macht!" #NT!
 flavor_gaul.106.tt: "Die #Y $barbaricum_aremorica_mission_task_20$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.107.t: "Aremorikanisches Handelszentrum" #NT!
 flavor_gaul.107.desc: "Von den Küsten aus, an denen wir einst in der Ferne karthagische Schiffe auf ihrem Weg in die Länder Britanniens vorbeifahren sahen, begrüßen wir jetzt die punischen Schiffsleute, die in unseren eigenen Häfen anlegen und angemessene Mautgebühren für den Aufenthalt zahlen, in dem sie das Beste aus der boomenden Handelsaktivität in der Region machen wollen.\n\nWährend unsere Lage am Meer uns schon immer für den Handel und Reisen ins Ausland begünstigt hat, wurden unsere eigenen Ländereien als Zentren für solche Aktivitäten lange vernachlässigt, was unsere Kaufleute zu Reisen zwang nach Dumnonia und weiter ins Ausland, um dort ihren Lebensunterhalt zu verdienen. Mit den großartigen Investitionen von [SCOPE.GetRootScope.GetCountry.GetRulerTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetPraenomen] in der Region haben wir unser Land endlich in einen Umschlagplatz verwandelt, der unsere Händler hier zu Hause bereichern wird!" #NT!
 flavor_gaul.107.a: "Wir haben bei den gallischen Völkern große Bedeutung erlangt." #NT!
 flavor_gaul.107.tt: "Die #Y $barbaricum_aremorica_mission_task_1$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.108.t: "Flotte der [SCOPE.GetRootScope.GetCountry.GetAdjective]er" #NT!
 flavor_gaul.108.desc: "Für [SCOPE.GetRootScope.GetCountry.GetName] war es ein Grundbedürfnis, über eine respektable Seestreitmacht zu verfügen, um ihren Handel mit den Pritanniern zu schützen, aber eine Mischung aus verstärktem Handel entlang unserer Küsten und einer Divergenz unserer Handelsschutzschiffe zum Zwecke der Unterstützung der Erweiterung unserer Grenzen hatte unsere Seekapazität kaum überstrapaziert.\n\nJetzt ist es uns jedoch endlich gelungen, unsere Flotte so aufzubauen, dass sie unseren erweiterten Bedürfnissen gerecht wird. Wieder einmal sind wir gut gerüstet, um unseren Handel vor Piraterie zu schützen und unseren Willen auf eine Art und Weise zu verbreiten, die wir uns bisher kaum vorstellen konnten." #NT!
 flavor_gaul.108.a: "Unsere große Flotte wird die Meere beherrschen!" #NT!
 flavor_gaul.108.tt: "Die #Y $barbaricum_aremorica_mission_task_3$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.109.t: "Verteidigung der aremorikanischen Küste" #NT!
 flavor_gaul.109.desc: "Trotz unserer Marinetraditionen waren unsere Siedlungen an der Küste schon lange den Launen von Plünderern ausgesetzt. Da wir ein Volk sind, das so eng mit dem Meer verbunden ist, sind unsere Häuser, so zahlreich sie auch sind, viel zu verstreut, als dass sie denen, die uns Schaden zufügen wollen, schutzlos zur Verfügung stehen könnten.\n\nEs ist daher mit großer Weisheit, dass [SCOPE.GetRootScope.GetCountry.GetRulerTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetPraenomen] es sich zur Aufgabe gemacht hat, mit der Befestigung aller unserer wichtigsten Städte und Dörfer an der Küste von Aermorica zu beginnen. Nachdem dieses Projekt nun abgeschlossen ist, können unsere Mitarbeiter nachts endlich ruhig schlafen." #NT!
 flavor_gaul.109.a: "Die [SCOPE.GetRootScope.GetCountry.GetAdjective]s werden keine Beute mehr machen" #NT!
 flavor_gaul.109.tt: "Die #Y $barbaricum_aremorica_mission_task_2$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.110.t: "Eine vereinte Aremorica" #NT!
 flavor_gaul.110.desc: "Die Gallier unserer Halbinsel sind viel zu lange gespalten geblieben! Während wir allein nur begrenzt in der Lage waren, unsere Hände auszustrecken, können die Menschen von Aremorica gemeinsam wirklich nach Macht streben. Von den kalten Meeren im Norden bis jenseits der Alpenberge: Lassen Sie alle Kelten wissen, dass in Aremorica ein unbezwingbares Volk lebt, das größere Ambitionen als je zuvor anstrebt!" #NT!
 flavor_gaul.110.a: "Kein Mann kann die unnachgiebigen Aremorikaner besiegen!" #NT!
 flavor_gaul.110.tt: "Die #Y $barbaricum_aremorica_mission_task_5$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.111.t: "Besetzung der belgischen Küste" #NT!
 flavor_gaul.111.desc: "Die wilden Belgier beugen sich schließlich unserem [SCOPE.GetRootScope.GetCountry.GetRulerTitle] und unsere angeschlagenen Armeen gehen als Sieger hervor.\n\nDie Belger sind berühmt für ihre Tapferkeit und Kampfbereitschaft, daher wussten wir von Anfang an, worauf wir uns einließen. Trotz des Feindes vor uns konnten wir jedoch unsere eigene Einmischung beweisen und haben gezeigt, dass die Aremorikaner die Oberhand haben.\n\nJetzt werden wir in unserem Nordseehandel ungehindert sein." #NT!
 flavor_gaul.111.a: "Sieg für [SCOPE.GetRootScope.GetCountry.GetName]!" #NT!
 flavor_gaul.111.tt: "Die #Y $barbaricum_aremorica_mission_task_9$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.112.t: "Großer Aremorica" #NT!
 flavor_gaul.112.desc: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetPraenomen] kann [ROOT.GetCountry.GetRuler.GetHerHis] kaum Luft holen. Erschöpft sammelt [ROOT.GetCountry.GetRuler.GetSheHe] alle [ROOT.GetCountry.GetRuler.GetHerHis] Kraft, um unten [ROOT.GetCountry.GetRuler.GetHerHis] Blick auf das Schlachtfeld zu richten. Leichen liegen verstreut herum, aber die meisten sind offensichtlich vom Feind.\n\nEs war ein großer Preis und nach endlosen Märschen und Kämpfen, aber das Land dieser Stämme, so weit von unserer Halbinsel entfernt, steht endlich unter der unbestrittenen Herrschaft unserer [SCOPE.GetRootScope.GetCountry.GetRulerTitle]. Mit dem letzten Widerstand in dem eroberten Gebiet haben wir die Herrschaft von [SCOPE.GetRootScope.GetCountry.GetAdjective] in ein Ausmaß gebracht, das zu Zeiten unserer Vorfahren unvorstellbar gewesen wäre.\n\nObwohl noch größere Prüfungen auf unser Land zukommen, können wir heute sicher sein, dass [SCOPE.GetRootScope.GetCountry.GetName] die Oberhand hat!" #NT!
 flavor_gaul.112.a: "Ehre sei [SCOPE.GetRootScope.GetCountry.GetRulerTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetPraenomen]!" #NT!
 flavor_gaul.112.tt: "Die #Y $barbaricum_aremorica_mission_task_12$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.113.t: "Dumnonischer Tribut" #NT!
 flavor_gaul.113.desc: "Die Dumnoni, eines der bedeutendsten Königreiche der Pritannier, teilen die meisten unserer Bräuche mit den Völkern der nördlichen Inseln. Daher ist es angemessen, dass unser erster Streifzug durch den Norden uns die Kontrolle über ein so vertrautes Volk verschafft. Obwohl ihre Gefühle vorerst vielleicht Verrat sind, werden sie den Wert des Friedens und des Schutzes erkennen, den wir im Austausch für ihr Zinn und ihren Tribut bringen." #NT!
 flavor_gaul.113.a: "Dumnonia gehört jetzt uns!" #NT!
 flavor_gaul.113.tt: "Die #Y $barbaricum_aremorica_mission_task_6$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.114.t: "Quer durch Pritannia" #NT!
 flavor_gaul.114.desc: "Wir sind tief in die Länder der Pritannic-Königreiche vorgedrungen und haben uns nicht nur über die lebenswichtigen Westküsten von Cambria hinaus erstreckt, sondern auch über das Meer hinweg bis nach Hibernia Fuß gefasst.\n\nWährend wir schon lange in diese Länder gekommen sind, um unseren Lebensunterhalt zu verdienen, weiten wir unsere Vertrautheit mit diesem Land nun auf eine regelrechte Besitznahme aus. Da wir die Küsten Pritanniens beherrschen, ist unser umgebendes Meer nur unser Spielfeld." #NT!
 flavor_gaul.114.a: "Kein anderer außer [SCOPE.GetRootScope.GetCountry.GetName] wird die Herrschaft über diese Meere haben!" #NT!
 flavor_gaul.114.tt: "Die #Y $barbaricum_aremorica_mission_task_10$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.115.t: "Ein Volk des Meeres" #NT!
 flavor_gaul.115.desc: "Wir sind ein Volk, das am Meer geboren wurde, um auch daran zu sterben. Wir ernähren uns von seinen Früchten, bereisen es, um im Ausland kommerzielle Gewinne zu erzielen, und reiten damit auf unserem Weg in Kriege mit gegnerischen Reichen.\n\nDiese seit langem bestehende Abhängigkeit der [SCOPE.GetRootScope.GetCountry.GetAdjective]er Jahre von unseren umliegenden Meeren hat sich erst in letzter Zeit verstärkt, und überall in [SCOPE.GetRootScope.GetCountry.GetName] tauchen neue Dörfer und Siedlungen am Meer auf. Wir feiern dieses Erbe in unseren Geschichten, Gedichten und Handarbeiten!" #NT!
 flavor_gaul.115.a: "Ah, die Wellen locken uns über den Horizont hinaus ..." #NT!
 flavor_gaul.115.tt: "Die #Y $barbaricum_aremorica_mission_task_4$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.116.t: "Handel mit den Inseln" #NT!
 flavor_gaul.116.desc: "Die Völker von Pritannia haben durch die häufigen Kontakte, die unsere Reiche knüpfen, viele Bräuche mit uns geteilt. Das Interesse von [SCOPE.GetRootScope.GetCountry.GetName] liegt jedoch nicht nur in der Vertrautheit, die wir mit den Pritanniern haben, sondern auch in den wertvollen Produkten, die nur von jenseits der Nordküste stammen.\n\nMit den intensivierten Handelsbeziehungen, die unsere Händler aufgebaut haben, kommen all diese wertvollen Güter in größeren Mengen als je zuvor in unser Land." #NT!
 flavor_gaul.116.a: "Wir sollten danach streben, unsere Beziehungen zu den Pritanni noch weiter zu vertiefen!" #NT!
 flavor_gaul.116.tt: "Die #Y $barbaricum_aremorica_mission_task_7$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.117.t: "Eine neue Bernsteinroute" #NT!
 flavor_gaul.117.desc: "Der kostbare orangefarbene Stein, den die Griechen Lyngurion nannten und der einst nur in winzigen Mengen aus dem östlichen Handel floss, ist durch die Bemühungen unserer ehrgeizigsten Kaufleute immer zahlreicher geworden. \n\nUm das Beste aus den potenziellen Gewinnen zu machen, die der Handel mit diesem Gut bringen kann, sind unsere Händler in die nordwestlichen Länder gereist, wo der Stein zu finden ist, und haben Geschäfte mit den verschiedenen Stämmen gemacht, die an der Küste des Suebischen Meeres leben. \n\nObwohl Halsketten und andere kunstvolle Gegenstände, die Bernstein enthalten, immer noch ein teures Gut sind, sind sie unter denen der [SCOPE.GetRootScope.GetCountry.GetAdjective]er, die sich solche Dinge leisten können, immer allgegenwärtiger geworden, da unsere neuen direkten Handelswege es ermöglichen, dass eine größere Menge des Stoffes in unser Land gelangt." #NT!
 flavor_gaul.117.a: "Und die Gewinne bringen größere Einnahmen in unsere Hände ..." #NT!
 flavor_gaul.117.tt: "Die #Y $barbaricum_aremorica_mission_task_17$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.118.t: "Erweiterter Nordwesthandel" #NT!
 flavor_gaul.118.desc: "Während die Ländereien der Nördlichen Inseln schon seit einiger Zeit unter der Kontrolle von [SCOPE.GetRootScope.GetCountry.GetAdjective] stehen, war klar geworden, dass die Menge an Gütern, die wir aus diesen Ländern gewinnen konnten, begrenzt ist. Aus Metallen, Töpferwaren, Fleisch, Wolle und Ähnlichem würden die bestehenden Häfen mit Waren gefüllt, nur damit unsere Lebensmittel verfaulen und wertvolle Gegenstände an Banditen verloren gehen, wobei nur ein Rinnsal tatsächlich nach Aremorica geschickt wird.\n\nUnser [SCOPE.GetRootScope.GetCountry.GetRulerTitle] begann jedoch mit dem Bau von Siedlungen und Häfen entlang der Küste von Pritannien, um dieses Problem zu beheben. Jetzt kann eine weitaus größere Menge an Waren von diesen nordwestlichen Inseln in unsere Metropole gelangen." #NT!
 flavor_gaul.118.a: "Die Bedeutung unseres Besitzes von Pritannia wächst enorm!" #NT!
 flavor_gaul.118.tt: "Die #Y $barbaricum_aremorica_mission_task_23$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
 flavor_gaul.119.t: "Größer als Karthago" #NT!
 flavor_gaul.119.desc: "Die Reichweite unserer Handelsflotten ist riesig geworden und unsere Marine ist immer größer geworden. Während wir die Händler Karthagos einst lediglich als freundschaftliche Ausländer betrachteten, zwang der Aufstieg der Macht unseres Landes sie zu Feindseligkeiten gegen uns. Und so versuchten die Karthager, unsere Routen abzuschneiden, unsere Beziehungen zu anderen Ländern zu sabotieren und alles Mögliche zu tun, um einen potenziellen Rivalen zu schwächen. All dies ist jedoch zunichte gemacht.\n\nEs ist jetzt klar, dass unsere Handels- und Seemacht die des Reiches der Karthager bei weitem überholt hat, und wir sind zu einem solchen aufgestiegen, dass wir jetzt perfekt gerüstet sind, um unseren Willen und Einfluss auf das südliche Meer zu bringen, das Karthago seine Heimatgewässer nennt." #NT!
 flavor_gaul.119.a: "Unser Einfluss wird über die Küsten von Baetica hinaus spürbar sein!" #NT!
 flavor_gaul.119.tt: "Die #Y $barbaricum_aremorica_mission_task_19$#! Missionsaufgabe ist nun #G abgeschlossen!#!" #NT!
  
  # 
  
 flavor_gaul.120.t: "Ein Krieger erhebt sich aus der Dunkelheit" #NT!
 flavor_gaul.120.desc: "[ROOT.GetCountry.GetRuler.GetName] hat bekannt gegeben, dass [ROOT.GetCountry.GetRuler.GetSheHe] Gebiete für [ROOT.GetCountry.GetName] erobern möchte – wahrlich, es lebt niemand in Hörweite des Zuhauses von [ROOT.GetCountry.GetRulerTitle] in [ROOT.GetCountry.GetCapital.GetName], der nicht die Schreie der Krieger belauscht hat, die tagein, tagaus für den Kampf trainieren – aber [ROOT.GetCountry.GetRuler.GetSheHe] glaubt schon lange, dass wir noch nicht ganz bereit für einen umfassenden Krieg gegen unsere Nachbarn sind.\n\nAber eines Tages, während [ROOT.GetCountry.GetRuler.GetFirstName] bereitete sich darauf vor, zur Jagd aufzubrechen, als ein schwer bewaffneter junger Mann in der Tür von [ROOT.GetCountry.GetRuler.GetHerHis] erschien und um eine Audienz bei [ROOT.GetCountry.GetRuler.GetHerHim] bat.\n\n'Wer bist du, Junge, und warum suchst du nach [ROOT.GetCountry.GetRulerTitle]?'\n\nDer Soldat legte seine Hand auf sein Herz, verneigte sich und sprach mit vor Emotionen erstickter Stimme. „Ich bin als [ROOT.GetCountry.GetRuler.GetSheHe]0 bekannt und mir wurde gesagt, ich solle hierher kommen.“\n\nEine Augenbraue hochziehend, grunzte [ROOT.GetCountry.GetRuler.GetFirstName] als Antwort. 'Komm her? Wer hat dich geschickt?'\n\n'Es fällt dir vielleicht schwer, das zu glauben, aber ich schwöre vor allen Göttern, dass das, was ich sage, wahr ist – [ROOT.GetCountry.GetRuler.GetSheHe]2 erschien mir in einem Traum und sagte mir, dass ich dazu bestimmt sei, im Gefolge von [ROOT.GetCountry.GetRuler.GetFirstName] zu kämpfen.'" #NT!
 flavor_gaul.120.a: "Ist das so, junger [SCOPE.sChar('chattia_character_appears_scope').GetFirstName]? Das werden wir sehen..." #NT!
 flavor.gaul.120.tt: "$mission_completed_tooltip_1$ „#Y Ein Krieger erhebt sich aus der Dunkelheit#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.121.t: "Deutsch-keltischer Handel" #NT!
 flavor_gaul.121.desc: "Der Handelsfluss zwischen den #E Deutschen#! und den #E Galliern#! nimmt zu, und viele Handelskarawanen ziehen durch die von [ROOT.GetCountry.GetName] kontrollierten Gebiete. [ROOT.GetCountry.GetRuler.GetName], immer auf der Suche nach Möglichkeiten, den Reichtum und das Ansehen der [ROOT.GetCountry.GetAdjective]-Stämme zu steigern, hat eine kleine Steuer auf Frachten erhoben, die durch unser Reich transportiert werden; Eine Gebühr, die die meisten gerne zahlen, da sie wissen, dass eine sichere Durchfahrt durch unser Land mehr wert ist als Gold." #NT!
 flavor_gaul.121.a: "Jeder profitiert von einem guten Handel... das freut mich" #NT!
 flavor.gaul.121.tt: "$mission_completed_tooltip_1$ „#Y Deutsch-keltischer Handel#!'“ $mission_completed_tooltip_2$!" #NT!
 chattia_germano_celt_trade_mod: "Deutsch-keltischer Handel" #NT!
 desc_chattia_germano_celt_trade_mod: "Dank unserer glücklichen Lage zwischen den Ländern der Deutschen und der Gallier profitieren wir von den Handelswegen." #NT!
  
 flavor_gaul.122.t: "Arbeiten Sie an den Öfen" #NT!
 flavor_gaul.122.desc: "Die hungrigen Öfen der [ROOT.GetCountry.GetAdjective]-Schmiede sind nie gesättigt, denn ihre Armeen brauchen immer Eisen @iron! denn ihre Waffen und ihre Krieger benötigen Edelmetalle @precious_metals! für Torques aus Gold und Silber. [ROOT.GetCountry.GetRuler.GetName] hat mit Bedacht in den Bau von Minen in allen Gebieten investiert, in denen sie überleben können, und die Berichte, die von unseren fleißigen Arbeitern auf [ROOT.GetCountry.GetCapital.GetName] zurückfließen, sind ermutigend." #NT!
 flavor_gaul.122.a: "Sag den Sklaven, sie sollen härter arbeiten! Wir müssen Quoten einhalten" #NT!
 flavor.gaul.122.tt: "$mission_completed_tooltip_1$ „#Y Work The Furnaces#!'“ $mission_completed_tooltip_2$!" #NT!
 barbaricum_form_francia_mission_task_8_tt: "Wir müssen mindestens #T 1 Mine#! in der Provinz #G Sicambria#! besitzen." #NT!
  
 flavor_gaul.123.t: "Die vielen Söhne von Istijo"
 flavor_gaul.123.desc: "Die [ROOT.GetCountry.GetAdjective]-Stämme haben ihren Zorn gegen ihre Nachbarn entfesselt, sind aus den Wäldern in der Nähe von [ROOT.GetCountry.GetCapital.GetName] explodiert und haben in kurzer Zeit weite Gebiete erobert. Sogar [ROOT.GetCountry.GetRuler.GetName] ist vom Erfolgsniveau der [ROOT.GetCountry.GetRuler.GetHerHis]-Armeen überrascht – hatten die [ROOT.GetCountry.GetRulerTitle] die Stärke der [ROOT.GetCountry.GetRuler.GetHerHis]-Aufgebote unterschätzt?\n\nDie vielen Schlachten gegen die #E Gallier#! haben die Fähigkeiten von [ROOT.GetCountry.GetRuler.GetFirstName] auf den neuesten Stand gebracht, und jetzt, da die Armeen den Sieg gekostet haben, schreien sie danach die Möglichkeit, noch mehr Land zu plündern – ein Wunsch, der bald in Erfüllung geht." #NT!
 flavor_gaul.123.a: "Die triumphalen Söhne von [GetDeityDefinition('omen_istaevo').GetName] werden heute Abend feiern!" #NT!
 flavor.gaul.123.tt: "$mission_completed_tooltip_1$ „#Y Die vielen Söhne von Istijo#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.124.t: "Eine würdige Hauptstadt" 
 flavor_gaul.124.desc: "Während sich in [ROOT.GetCountry.GetName] die vielen Verbesserungen der Hauptstadt herumsprechen, haben sich Stammesangehörige aus dem ganzen Reich auf den Weg nach [ROOT.GetCountry.GetCapital.GetName] gemacht, in der Hoffnung, persönlich in den Armeen von [ROOT.GetCountry.GetRuler.GetName] zu dienen. Der [ROOT.GetCountry.GetRulerTitle] ist dafür bekannt, ein Anführer der Menschen zu sein, einer, der sich um diejenigen kümmert, die unter dem Kommando von [ROOT.GetCountry.GetRuler.GetHerHis] stehen, und unsere Brüder, in der Hoffnung, sich zu bereichern und sich einen Namen zu machen, strömen zum [ROOT.GetCountry.GetRuler.GetHerHis]-Banner." #NT!
 flavor_gaul.124.a: "Hier bei [ROOT.GetCountry.GetCapital.GetName] ist Platz für alle" #NT!
 flavor.gaul.124.tt: "$mission_completed_tooltip_1$ „#Y Eine würdige Hauptstadt#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.125.t: "Eine Handelsfestung" 
 flavor_gaul.125.desc: "Da die Bedeutung des Handels innerhalb von [ROOT.GetCountry.GetName] zunimmt, hat [ROOT.GetCountry.GetRuler.GetName] den beispiellosen Schritt unternommen, starke Befestigungen zu errichten, um den Hauptmarkt von [ROOT.GetCountry.GetAdjective] zu schützen, der sich in der Hauptstadt befindet. Händler, die durch [ROOT.GetCountry.GetCapital.GetArea.GetName] reisen, hoffen, vor Einbruch der Dunkelheit unsere Mauern zu betreten, da sie wissen, dass der sicherste Ort für sich und ihre Waren innerhalb der Stadt liegt. Um ihrer wachsenden Zahl gerecht zu werden, werden innerhalb von [ROOT.GetCountry.GetCapital.GetName] neue Stadtteile gebaut – alles in allem ein Zeichen der prosperierenden Zeit." #NT!
 flavor_gaul.125.a: "Kommen Sie vorbei, verkaufen Sie Ihre Waren hier und genießen Sie die Zeit, die Sie bei uns verbringen" #NT!
 flavor.gaul.125.tt: "$mission_completed_tooltip_1$ „#Y Eine Handelsfestung#!'“ $mission_completed_tooltip_2$!" 
 chattia_trade_fort_mod: "Handelsfestung" #NT!
 desc_chattia_trade_fort_mod: "Um ihre wertvollen Handelseinnahmen zu schützen, wurde in der wichtigsten Marktstadt der Istvaonen eine Festung errichtet." #NT!
  
 flavor_gaul.126.t: "Gallisches Blut vergießen" 
 flavor_gaul.126.desc: "Für viele der in #E Gallien#!, lebenden Stämme war der Aufstieg von [ROOT.GetCountry.GetRuler.GetName] ein wahrer Albtraum; Der kühne [ROOT.GetCountry.GetRulerTitle] hat viele wilde Krieger versammelt und sie in vom Krieg unberührten Ländern entfesselt, und die Grenzen von [ROOT.GetCountry.GetName] haben sich in einem Tempo ausgeweitet, das in den besiedelten Dörfern im Landesinneren Alarm ausgelöst hat. Viele Stammesälteste haben in aller Eile Versammlungen einberufen und einander mit ängstlicher Stimme gefragt, ob sie vor der Bedrohung durch [ROOT.GetCountry.GetAdjective] sicher seien.\n\nFür einige gallische Stämme war die Antwort nein." #NT!
 flavor_gaul.126.a: "Vorwärts zur ewigen Herrlichkeit!" #NT!
 flavor.gaul.126.tt: "$mission_completed_tooltip_1$ „#Y Gallisches Blut vergießen#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.127.t: "Staat zentralisieren"
 flavor_gaul.127.desc: "Die Erfolge von [ROOT.GetCountry.GetName] sind nicht nur auf die vielen Siege zurückzuführen, die ihre Armeen auf dem Schlachtfeld errungen haben, auch wenn diese sicherlich ihren Teil dazu beigetragen haben, sondern die politische Stärke ihrer Regierung hat dafür gesorgt, dass die [ROOT.GetCountry.GetAdjective] in der Lage sind, die von ihnen eroberten Ländereien zu verwalten. [ROOT.GetCountry.GetRuler.GetName] hat viele Stunden damit verbracht, Angelegenheiten mit dem #E Stammesrat#!, zu besprechen, um sicherzustellen, dass alle Stimmen innerhalb von [ROOT.GetCountry.GetCapital.GetName] gehört und respektiert werden, und diese sorgfältige Aufmerksamkeit für interne Angelegenheiten hat sich ausgezahlt, während sich der Stamm weiter zentralisiert." #NT!
 flavor_gaul.127.a: "Unsere zukünftigen Erfolge sind durch das, was wir heute erreicht haben, garantiert" #NT!
 flavor.gaul.127.tt: "$mission_completed_tooltip_1$ „#Y Staat zentralisieren#!'“ $mission_completed_tooltip_2$!" 
 chattia_political_influence_modifier: "Zentralisierte Chattia" #NT!
 desc_chattia_political_influence_modifier: "Dank unserer internen Reformbemühungen ist unser politischer Einfluss gewachsen." #NT!
  
 flavor_gaul.128.t: "Eisenstangenstandard" #NT!
 flavor_gaul.128.desc: "Dank unserer wachsenden Wirtschaft besteht die Notwendigkeit, die Eisenarten @iron! Die Verwendung durch unsere Händler und Schmiede ist zu einer Notwendigkeit geworden, und [ROOT.GetCountry.GetRuler.GetName] hat sich dieser Aufgabe mit Bravour gemeistert. Obwohl es ein kostspieliges Unterfangen war, erkannte [ROOT.GetCountry.GetRuler.GetFirstName] die Notwendigkeit und wusste, dass es getan werden musste, und keine Kosten werden [ROOT.GetCountry.GetRulerTitle] davon abhalten, [ROOT.GetCountry.GetRuler.GetHerHis]-Aufgaben zu erfüllen.\n\nGlücklicherweise hatte diese Initiative enormen Erfolg und die Produktion im gesamten Reich ist gestiegen. Unsere überarbeiteten Sklaven sind über diese Veränderungen unzufrieden, aber alle anderen genießen die Vorteile." #NT!
 flavor_gaul.128.a: "Jeder, der in [ROOT.GetCountry.GetName] lebt, muss seinen Teil beitragen" #NT!
 flavor.gaul.128.tt: "$mission_completed_tooltip_1$ „#Y Iron Bar Standarte#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.129.t: "Das fränkische Königreich"
 flavor_gaul.129.desc: "Als Vertreter des #E Stammesrates#! mit einer goldenen Krone auf [ROOT.GetCountry.GetRuler.GetName] zutraten, war [ROOT.GetCountry.GetRulerTitle] fassungslos. Natürlich hegte [ROOT.GetCountry.GetRuler.GetSheHe] geheime Ambitionen, eines Tages ein Monarch zu werden, aber [ROOT.GetCountry.GetName] stand vor dringenden Problemen und der Zeitpunkt schien nie reif zu sein.\n\nEs war dann eine ziemliche Überraschung, als sich die Stammeshäuptlinge in [ROOT.GetCountry.GetCapital.GetName] versammelten, um sich friedlich zu unterwerfen. Noch nie zuvor in der Geschichte der [ROOT.GetCountry.GetAdjective]-Stämme hatte ein Anführer so viel erreicht wie [ROOT.GetCountry.GetRuler.GetFirstName], und die Ehre, die [ROOT.GetCountry.GetRuler.GetHerHim] zuteil wurde, schien zu diesem Zeitpunkt überfällig. \n\nDu bist unser natürlicher König...#!0 verleiht dir diesen Titel, nicht uns.\n\nJetzt ist es deine erste Amtshandlung als Souverän, dass du entscheidest, welches Banner und welche Nationalfarbe dieses neue Königreich repräsentieren soll. Es gibt zwei Lager, die fest in ihrer Meinung verwurzelt sind: Diejenigen, die ein frisches #!1 Blau#! stark und stolz im Wind stehen sehen möchten, und diejenigen, die ein klassisches #!3 Rot#! über der Hauptstadt bevorzugen würden, ähnlich dem strahlenden Licht der Sonne. Welche Farbe sollen Sie wählen?" #NT!
 #flavor_gaul.129.a: "Du bist unser natürlicher König...[GetDeityDefinition('omen_istaevo').GetName] verleiht dir diesen Titel, nicht uns" #NT!
 flavor_gaul.129.a: "Eine blaue Flagge und eine blaue Nationalfarbe, die Farben unseres Flusses." #NT!
 flavor_gaul.129.b: "Eine rote Flagge und eine rote Nationalfarbe, die Farben einer goldenen Flamme." #NT!
 flavor_gaul.129.c: "Eine rote Flagge mit blauer Nationalfarbe, das Beste aus beiden Welten." #NT!
 flavor_gaul.129.d: "Fauliges Grün, meine Lieblingsfarbe!" #NT!
 flavor.gaul.129.tt: "$mission_completed_tooltip_1$ „#Y Das fränkische Königreich#!'“ $mission_completed_tooltip_2$!"
 flavor.gaul.129.red_tt: "Wir werden eine #COLOR:{0.80,0.20,0.20} rote#! Flagge und eine #COLOR:{0.80,0.20,0.20} rote#! Kartenfarbe übernehmen." #NT!
 flavor.gaul.129.blue_tt: "Wir werden eine #COLOR:{0.30,0.55,0.93} Blau#! Flagge und eine #COLOR:{0.30,0.55,0.93} Blau#! Kartenfarbe übernehmen." #NT!
 flavor.gaul.129.red_blue_tt: "Wir werden eine #COLOR:{0.80,0.20,0.20} rote#! Flagge und eine #COLOR:{0.30,0.55,0.93} blaue#! Kartenfarbe übernehmen." #NT!
 flavor.gaul.129.green_tt: "Wir werden eine... #COLOR:{0.5,0.66,0.21} fauliges Grün#! Flagge und Kartenfarbe übernehmen." #NT!
  
 flavor_gaul.130.t: "Salland"
 flavor_gaul.130.desc: "Die Bergfestung bei [SCOPE.sProvince('batavian_city_scope').GetName] ist endlich fertiggestellt, und einige unserer Leute, die jetzt die #COLOR:{0.207,0.301,1} Salischen Franken#!, genannt werden, haben damit begonnen, sie zu besiedeln, und die Sümpfe rund um das Delta des #E Rinaz#!,, die die „Insel“ von #E Batavia#!.\n\nIt bilden, waren ein so sumpfiger Ort, voller Krankheiten und schwer zugänglich, dass so mancher guter Sklave darin umkam Bauarbeiten und die Lebensbedingungen in [SCOPE.sProvince('batavian_city_scope').GetName] sind nicht die besten, es gibt schwer zu beschaffende Vorräte und andere Probleme dieser Art. Viele, die dieses neue Land besiedelt haben, fangen an, von einer erneuten Umsiedlung an einen lebenswerteren Ort zu sprechen ..." #NT!
 flavor_gaul.130.a: "Wir werden sehen, wohin sie das führt." #NT!
 flavor.gaul.130.tt: "$mission_completed_tooltip_1$ „#Y Salland#!'“ $mission_completed_tooltip_2$!"
  
 flavor_gaul.131.t: "Ripuaria"
 flavor_gaul.131.desc: "Während sich unsere Cousins im Norden in leeren Gebieten niederließen, sind die Gräser in [GetProvince('(int32)3726').GetArea.GetName] ziemlich hart umkämpft; Jeden Frühling und Sommer kommt es auf diesem Weg zu zahlreichen Überfällen, und die Gewalt zwischen den keltischen Stämmen wird nur dadurch verschärft, dass wir hin und wieder vorbeikommen.\n\nJetzt besiedeln die #COLOR:{0.361,0.807,0.525} Ripuarier#! das Gebiet. Lange bevor sie den #E Rinaz#! in ihr neues Zuhause überquerten, hatten sie geplant, hierher zu kommen, in das Land des einfachen Lebens und des blauen Himmels. Dennoch drohen diesen Menschen viele Bedrohungen, da die Stämme flussaufwärts sich darauf vorbereiten, an den Unfertigen zu nagen ..." #NT!
 flavor_gaul.131.a: "Es gibt immer etwas zu tun, einen Feind zu zerquetschen!" #NT!
 flavor.gaul.131.tt: "$mission_completed_tooltip_1$ „#Y Ripuaria#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.132.t: "Toxandria besiedeln" 
 flavor_gaul.132.desc: "Die hohen, dunklen Bäume von Toxandria verbargen ihre Geheimnisse bis zu dem Punkt, an dem unsere Armeen den #E Rinaz#!; überquerten. Was sich als fruchtbares und üppiges Land präsentierte, ist erneut nass, feucht und schlammig. Einige Älteste, die mitgingen, strafen ihre Anführer, wie zum Beispiel [SCOPE.sChar('salian_chieftain_scope').GetName] für die beiden erzwungenen und letztendlich enttäuschenden Migrationen aus dem Land, in dem unsere Vorfahren regierten.\n\nDas ist nun jedoch Vergangenheit, und die #COLOR:{0.207,0.301,1} salischen Franken#! müssen jetzt sehr hart arbeiten, um sich in diesen ehemals keltischen Ländern einen Lebensunterhalt aufzubauen; Sie haben beschlossen, ihre Räte an einem Ort abzuhalten, den sie jetzt #E Tohsandrjo Bairgaz#! nennen." #NT!
 flavor_gaul.132.a: "Lassen Sie sich die Schultern zucken und machen Sie sich dann an die Arbeit!" #NT!
 flavor.gaul.132.tt: "$mission_completed_tooltip_1$ „#Y Toxandria besiedeln#!'“ $mission_completed_tooltip_2$!"
  
 flavor_gaul.133.t: "Das Moginos-Tal" 
 flavor_gaul.133.desc: "Die idyllische Ebene der Moginos ist weitläufig und recht lebensfreundlich; Unsere Männer haben herausgefunden, dass die meisten Industrien hier aus den Wäldern und den Tieren stammen. Es ist ein glücklicher Ort zum Leben, ein Ort, an dem wir die geschwächten Kelten erneut ohne große Probleme vertrieben haben.\n\nUnter [GetDeityDefinition('omen_istaevo').GetName] haben wir #COLOR:{0.361,0.807,0.525} Ripuarier#! Siege in Ländern erlebt, von denen wir nie geträumt hatten, so groß ist die Macht seines Segens." #NT!
 flavor_gaul.133.a: "Ein weiterer sicherer Hafen für die Familien." #NT!
 flavor.gaul.133.tt: "$mission_completed_tooltip_1$ „#Y Das Moginos-Tal#!'“ $mission_completed_tooltip_2$!"
  
 flavor_gaul.134.t: "Entlang des Rinaz" 
 flavor_gaul.134.desc: "Die #COLOR:{0.361,0.807,0.525} Ripuarian Franks#! haben ihre Schwerter den Lauf des Flusses herausfordern lassen, flussaufwärts in unbekannte Länder, mit ihren Schilden die Angriffe der bösartigen [GetCulture('ubian').GetName]#E Kelten#! abgewehrt und mit ihren Füßen Hügel, Wälder und Palisaden hinaufgerannt, um der Ermüdung zu trotzen, der geringere Männer ausgesetzt sind, auf einem Marsch in Länder, die ihnen bisher unbekannt waren. Sie kontrollieren jetzt den Großteil des Flusses des großen Rinaz, keine leichte Aufgabe." #NT!
 flavor_gaul.134.a: "Tapferkeit und Eisen." #NT!
 flavor.gaul.134.tt: "$mission_completed_tooltip_1$ „#Y Entlang des Rinaz#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.135.t: "Toxandria die einst Unfruchtbare" #NT!
 flavor_gaul.135.desc: "Es wurden viele Anstrengungen unternommen, um diese Region lebenswerter zu machen. Einige kleinere Kanäle wurden zwischen Ackerland gegraben, einige Wälder wurden für Felder abgeholzt, und was einst eine lebensfeindliche Umgebung war, ist jetzt ein vernünftiger Ort zum Leben.\n\nViele Dörfer wurden seitdem von neuen Menschen gebaut, die sich von jenseits des Flusses niederließen, da es dort nicht genug Nahrung für alle gab, und die alten keltischen Bräuche wurden durch [GetReligion('germanic_religion').GetName] Schreine und Feste verdrängt; hier werden jetzt wahre Götter verehrt. Die wilde Jagd hat den #E Rinaz#!! überschritten" #NT!
 flavor_gaul.135.a: "Eine gewaltige Leistung!" #NT!
 flavor.gaul.135.tt: "$mission_completed_tooltip_1$ „#Y Toxandria the Once-Barren#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.136.t: "Nach Westen drängen"
 flavor_gaul.136.desc: "„Wir waren noch nie an ein solches Klima gewöhnt, warme Sommer, schneearme Winter und Felder, die so grün sind wie die seltensten Edelsteine.“ „Wir, die #COLOR:{0.207,0.301,1} salischen Franken#!,, haben unser Schicksal erkannt, ein Zuhause zu finden, in dem das Leben keine Härte, sondern ein Vergnügen ist.“ Wir wandten uns an die Krieger, die sich links vom Hügel versammelt hatten, [SCOPE.sChar('salian_chieftain_scope2').GetName] lachte und sagte:\n\n„Und im letzten Monat habe ich die Krieger meiner Kriegerschar seltsam oft unbekleidet auf den Feldern gesehen (ich gebe zu, dass die Hitze hier unerträglich ist), und wir alle.“ scheinen in diesen anstrengenden Monaten des Feldzugs einen seltsamen Appetit auf Schnecken und kleine Vögel entwickelt zu haben, aber jetzt sind wir hier und haben uns in einem göttlichen Land niedergelassen. Ein Hoch auf uns und die Kriegerschar von [SCOPE.sChar('salian_warband_leader_scope').GetName]!" #NT!
 flavor_gaul.136.a: "Hurra!" #NT!
 flavor.gaul.136.tt: "$mission_completed_tooltip_1$ „#Y Nach Westen drängen#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.137.t: "Germanische Bekehrung" 
 flavor_gaul.137.desc: "Die Streitwagen, die den Rinaz hinauf fuhren und deren Räder das Wasser überstreiften und überall Spritzer ausstießen, haben nun ihre donnernden Räder zur Ruhe gebracht und den Hammer unserer Götter in diesen jungfräulichen Boden geschlagen.\n\nDie #COLOR:{0.356,0.141,0} Fraujaz#! halten in diesen Ländern neue Zeremonien ab, die unsere traditionellen Götter respektieren." #NT!
 flavor_gaul.137.a: "Wir, die Träger unserer Götter in dieser Welt, sollen loben." #NT!
 flavor.gaul.137.tt: "$mission_completed_tooltip_1$ „#Y Germanische Bekehrung#!'“ $mission_completed_tooltip_2$!" 
  
 flavor_gaul.138.t: "Turnacum und Camaracum" #NT!
 flavor_gaul.138.desc: "Es ist ein glückliches Schicksal, dass zwei so einladende Orte tatsächlich unabhängig voneinander von zwei Gruppen von #COLOR:{0.207,0.301,1} salischen Franken#!. besiedelt wurden. Diese beiden neuen Städte dienen dem westlichen Teil des [ROOT.GetCountry.GetAdjective] Landes als Verwaltungszentren und hatten daher keine großen Schwierigkeiten, über ihre ursprünglichen Mauern hinaus zu expandieren. Wir mussten unsere Burgbaufähigkeiten verbessern und viele der ursprünglichen Häuser abreißen, da der Elend in einigen Vierteln fast unerträglich wurde." #NT!
 flavor_gaul.138.a: "Glücksfälle des Lebens." #NT!
 flavor.gaul.138.tt: "$mission_completed_tooltip_1$ „#Y Turnacum und Camaracum#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.139.t: "Unsere westlichen Grenzen verstärken"
 flavor_gaul.139.desc: "Einige sagten, dass die Zivilisation und ihre müßigen Wege die [GetCulture('istvaeonic').GetName]#E s#! weich machen würden und wir die Härte vergessen würden, aus der wir geboren wurden. Mit dem Aufkommen des Konflikts in Gallien wurde dies jedoch widerlegt, da entlang der [GetProvince('(int32)9168').GetName] viele neue Wallburgen errichtet wurden, die schon seit geraumer Zeit nicht mehr gebaut wurden und jetzt für die neue Art der Kriegsführung modernisiert wurden.\n\nNiemand zweifelt daran, dass dieser Fluss heute eine Verteidigungslinie mit einer Organisation ist, wie sie nur wenige im Norden jemals gesehen haben." #NT!
 flavor_gaul.139.a: "Keine Gnade für diejenigen, die es wagen, die Grenze zu überqueren." #NT!
 flavor.gaul.139.tt: "$mission_completed_tooltip_1$ „#Y Unsere westlichen Grenzen verstärken#!'“ $mission_completed_tooltip_2$!"
  
 flavor_gaul.140.t: "Salianer triumphieren" #NT!
 flavor_gaul.140.desc: "Der Wohlstand, der in den #COLOR:{0.207,0.301,1} salischen#! Ländern möglich war, ließ diese Franken schnell an Einfluss in der Regierung gewinnen, was nun darin gipfelte, dass der gesamte Hof und alle Häuptlinge nach [GetProvince('(int32)3045').GetName] zogen, einem Land, das sich so sehr von unserem unterscheidet und doch so schön ist, direkt am Meer liegt und von Natur aus verteidigbar ist und in einer einzigen Handvoll Erde eine Million Möglichkeiten birgt.\n\nNicht nur das, sondern in seinen Feldern liegt die Vorbote eines Neuen Ära für die [GetCulture('istvaeonic').GetName]#E s#!, weit entfernt von unserem ursprünglichen Land, aber immer noch mit der inneren Stärke, die es uns ermöglichte, hierher zu gelangen. Keine kriegstreibenden Sueben mehr, keine tödlichen Winter und keine unbebaubaren Felder mehr. Jetzt sind wir nicht mehr aufzuhalten." #NT!
 flavor_gaul.140.a: "Nach Westen!" 
 flavor.gaul.140.tt: "$mission_completed_tooltip_1$ „#Y Salians Triumphant#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.141.t: "Die Ripuarier triumphieren" #NT!
 flavor_gaul.141.desc: "Das mögliche Leben in den Flüssen, die durch die #COLOR:{0.207,0.301,1} salischen#! Länder fließen, machte sie zum Hauptziel für die Migration der anderen, und einige träumen bereits von großen [GetCulture('istvaeonic').GetName] Städten an diesen Orten, ein ferner Traum, aber kein völlig unmöglicher.\n\nEine große Prozession des Häuptlings, gefolgt von seinem überaus loyalen Stamm, von [GetProvince('(int32)3831').GetName] bis [GetProvince('(int32)3690').GetName], und direkt neben den Prozessionsfahrten, unsichtbar, die Ankündigung eines Neue Ära für die [GetCulture('istvaeonic').GetName]#E s#!, weit entfernt von unserem ursprünglichen Land, aber immer noch mit der inneren Stärke, die es uns ermöglicht hat, hierher zu gelangen. Keine kriegstreibenden Sueben mehr, keine tödlichen Winter und keine unbebaubaren Felder mehr. Jetzt sind wir nicht mehr aufzuhalten." #NT!
 flavor_gaul.141.a: "An die Flussufer!" #NT!
 flavor.gaul.141.tt: "$mission_completed_tooltip_1$ „#Y Ripuarians Triumphant#!'“ $mission_completed_tooltip_2$!" #NT!
  
 flavor_gaul.142.t: "Der Suebi-Aufstand" 
 flavor_gaul.142.desc: "Da so viele unserer Leute nach Westen abwandern, haben die [GetCulture('irminonic').GetName] Völker im Osten unseres Königreichs, mit immer weniger unserer Stammesangehörigen in der Gegend, beschlossen, ihre Untertanenschaft aufzugeben und ihren einstigen Oberherren, uns, ins Gesicht zu spucken.\n\nDie vielen verschiedenen Suebi-Stämme versammeln sich jetzt um den ehrgeizigen alten Häuptling [SCOPE.sCountry('cheruscia_revolt_scope').GetRuler.GetName] des Stammes #E Cheruscii#!, der Boten mit Opfergaben geschickt hat Wir haben entweder Frieden (der mit Opfergaben der Dankbarkeit einhergehen wird) oder einen Krieg voller Blut, Feuer und Tod.\n\nViele in den Kriegstrupps haben begonnen, ihre Brüder für die bevorstehende Vernichtung dieser Kriegstreiber aufzuhetzen. Die Wahrheit ist, dass der Ansturm nach Westen unsere alten Gebiete tatsächlich ziemlich leer zurückgelassen hat und wir unsere Armeen stark aufstocken müssten, um überhaupt kämpfen zu können, und die meisten im Westen haben nicht die Absicht, für die alten Gebiete zu kämpfen, die sie verlassen haben." #NT!
 flavor_gaul.142.a: "Diese schlammigen Hütten sind uns egal, lasst sie in Ruhe." #NT!
 flavor_gaul.142.b: "Wir haben keine Wahl, wir müssen für unsere Ehre marschieren!" #NT!
 flavor.gaul.142.tt: "$mission_completed_tooltip_1$ '#Y Der Suebi-Aufstand#!' $mission_completed_tooltip_2$!" 
 francia_overstretched_armies: "Francia überdehnt" 
