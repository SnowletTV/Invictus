l_german:
  flavor_germanics.1.t:0 "Die große Flut"
  flavor_germanics.1.desc:0 "Regentage und Gewitter ließen unsere Leute in [SCOPE.germanics_1_target.GetName] befürchten, dass das Ende der Tage bevorsteht. Diese läuteten jedoch nicht das Ende ein, sondern eine große Flut, die Häuser, Tiere und Menschen gleichermaßen verschlang – alle dazu bestimmt, nie wieder das Licht der Welt zu erblicken. \n\nNachdem es vorbei war, lobten die Überlebenden die Götter, stehen nun aber vor der großen Herausforderung, das, was einst war, wieder aufzubauen. Das Land wird immer noch zweimal am Tag überflutet, wodurch Tausende kleiner Inseln entstehen, die vollständig von Wasser umgeben sind, aber das Wasser geht langsam zurück ... \n\nUnsere Leute erwarten von uns, dass wir einen Teil unserer Gelder beiseite legen, um zu versuchen, den Bedürftigen zu helfen und das Beste aus der Situation zu machen."
  flavor_germanics.1.a:0 "Geld ausgeben."
  flavor_germanics.1.b:0 "Verwenden Sie das Militär als Arbeitskraft."
  flavor_germanics.1.c:0 "Sie sind auf sich allein gestellt."
  flavor_germanics.1.tt:0 "Bis zu #Y 20%#! der Bevölkerung von #Y [THIS.GetProvince.GetName]#! wird von der Flut getötet."
  flavor_germanics.2.t:0 "Terp-Siedlung"
  flavor_germanics.2.desc:0 "Der jüngste Bevölkerungsanstieg hat zu einer höheren Nachfrage nach bewohnbarem Land geführt. Einige unserer Männer haben vorgeschlagen, die friesischen Warftensiedlungen nachzuahmen, die sie vor mehreren Jahrhunderten errichtet haben. Die Küste von Amsivaria scheint ein guter Ort zu sein, um Schlamm aufzuschütten, um Warften zu schaffen und darauf Häuser zu bauen, um sie vor Überschwemmungen zu schützen. Wir müssten jedoch einige unserer Männer schicken, um ihnen dabei zu helfen."
  flavor_germanics.2.a:0 "Bauen Sie eine solche Siedlung."
  flavor_germanics.2.b:0 "Es gibt wichtigere Dinge."
  flavor_germanics.4.t:0 "Tod eines geliebten Menschen"
  flavor_germanics.4.desc:0 "Nach dem Tod von [SCOPE.sChar('rip_dead_dog').GetName] haben die Leute versucht, mich zu trösten, aber ich hatte nie das Gefühl, dass sie mich wirklich verstanden haben. Jetzt neige ich dazu, sie und ihr müßiges Geschwätz zu meiden. Es gibt jedoch eine Seele, deren Gesellschaft ich nicht verabscheut habe: ein brauner Hund, der am Nelkenritual von [SCOPE.sChar('rip_dead_dog').GetName]s Körper teilgenommen hat und ein ähnliches Verhalten zeigt. Vielleicht hat mich der Priester richtig beraten und unsere Lieben leben nach einer entsprechenden Zeremonie wirklich in den Hunden weiter."
  flavor_germanics.4.a:0 "Mein hübscher Hund, du verstehst mich besser als jeder andere."
  flavor_germanics.5.t:0 "Tod eures Hundes"
  flavor_germanics.5.desc:0 "Ihr treuer und vertrauter Hund hat schließlich seinen letzten Atemzug getan. Lange hat er dir gedient, seit du deinen verstorbenen geliebten Menschen zum ersten Mal an seinem Verhalten erkannt hast, aber jetzt ist es an der Zeit, deinen alten Freund zu beerdigen."
  flavor_germanics.5.a:0 "Ich werde ihn still und leise begraben."
  flavor_germanics.6.t:0 "Der heilige Hain von Mannus"
  flavor_germanics.6.desc:0 "Es ist wieder einmal soweit, das Opfer für Mannus findet heute Nacht statt. Wie immer sind wir gefesselt und zeigen unsere Unterwerfung unter unseren großen Gott. Zum Glück ist diesmal niemand gestürzt - ein gutes Omen. Letztes Jahr musste sich der Sohn des Schamanen auf dem Boden wälzen, nachdem er hingefallen war. Das vergangene Jahr brachte uns viele Stürme und die Ernte war schlecht. Das lag sicher an der tollpatschigen Jugend! \n\nDas diesjährige Opfer steht stolz in der Mitte des heiligen Bodens, an die alte Eiche hinter ihm gebunden. Seine Gesichtszüge sind kaum wiederzuerkennen, denn die letzten Sonnenstrahlen des Tages blenden mich, Mannus' Wille verbirgt ihn vor meinen Augen. Schon nähert sich der Schamane dem Opfer, drückt ihm die Schneide des Messers auf die Brust und bewirkt so, dass die ersten Blutstropfen auf den Eichenschössling unter ihm tropfen. Sein Lebenselixier wird die Wälder und die Erde erneuern.  Um unsere Gemeinschaften zu schützen und unsere Ernten zu verbessern, wird er Mannus geopfert. Jetzt durchbohrt die Klinge sein Herz, sein letzter Atemzug verflucht uns und entzündet dennoch das Feuer des Lebens. \n\nDie Vögel haben bereits begonnen zu singen und zu jubeln und füllen die Lücke, die der Opfertod hinterlassen hat."
  flavor_germanics.6.a:0 "Mannus, gib uns Kraft!"
  flavor_germanics.6.b:0 "Widersetze dich dem Ritual."
  flavor_germanics.7.t:0 "Nerthuz' Wagen in die Tiefe"
  flavor_germanics.7.desc:0 "Es ist an der Zeit, dass unser Priester wieder auf Nerthuz' Wagen fährt, die Zeit des Krieges ist vorbei. Das Schwert wird durch den Pflug ersetzt, die fruchtbare Erde, die mit Körnern besät ist. Wenn Nerthuz unsere Häuser besucht, wird es mehr Kinder geben, die Fruchtbarkeit der Frauen ist größer als zuvor. Sie alle werden durch Ihre Reise über das Land gesegnet, bis sie es satt hat. Ihr erster Diener wird seiner Herrin zu ihrer Domäne im Ozean folgen. Dort wird der Priester den Wagen wieder einhüllen, nachdem die Sklaven den Wagen gewaschen und mit Blumen und Gold geschmückt haben. Danach werden die Sklaven vom Ozean verschlungen, das letzte Opfer für Nerthuz, bis sie wieder aufwacht und die Länder mit ihrer Anwesenheit segnet."
  flavor_germanics.7.a:0 "Nerthuz, segne uns!"
  flavor_germanics.7.b:0 "Stoppen Sie den Priester!"
  
  flavor_germanics.8.t:0 "Ariovistus"
  flavor_germanics.8.desc:0 "In den letzten Jahren hat sich ein Mann in unseren Reihen langsam aber sicher einen Namen und einen Ruf aufgebaut – [SCOPE.sCharacter('ariovistus_character').GetName]. Ein Veteran vieler Kriege [ROOT.GetCountry.GetRuler.GetName]s der auch viele Jahre in # Gallien#!, gekämpft hat, wo er den Ehrentitel #E 'Ariovistus'#! erhielt - ein Name, der nur großen Militärführern zuteilwird. \n\n[SCOPE.sCharacter('ariovistus_character').GetFirstName] ist ein wahrer suebischer Krieger, der viele Schlachten geschlagen und gewonnen hat. Während dieser Feldzüge hat er die #E Galische#! Sprache gelernt – eine Fähigkeit, die uns zusammen mit seinen Kontakten zu den #E Vangiones#!, #E Nemetes#! und #E Tribocci#!, dabei helfen könnte, ein Bündnis mit diesen Stämmen zu schließen\n\nUnter unseren Stämmen werden immer mehr Stimmen laut, die seine Führung fordern, da [ROOT.GetCountry.GetRuler.GetFirstName]s Erfolge  im Vergleich zu denen von Ariovistus verblassen."
  flavor_germanics.8.a:0 "Macht Ariovistus zu unserem neuen Herrscher"
  flavor_germanics.8.b:0 "Er ist nur ein Parvenu!"

  NICKNAME_ARIOVISTUS:0 "'Ariovistus'"
  FAMILY_ARIOVISTID:0 "Ariovistiden"
  ariovistid:0 "Blut des Ariovistes"
  ariovistid_desc: "Ariovistus ist ein gallischer Ehrentitel für einen großen Heerführer. Es wurde einem suebischen Krieger verliehen, der viele Schlachten gekämpft und gewonnen hat, manchmal an der Seite seiner Stammesgenossen, manchmal an der Seite der Gallier. Während dieser Feldzüge hat er die gallische Sprache gelernt und Bündnisse mit mehreren Galliern geschmiedet. Obwohl sein ursprünglicher Name in Vergessenheit geriet, sind seine Heldentaten bis heute in Erinnerung geblieben. \n\n#G Diese Eigenschaft wird an die Nachkommen von [CHARACTER.GetPraenomen] vererbt.#!"
  flavor_germanics.9.t:0 "Verbündete des Ariovistus"
  flavor_germanics.9.desc:0 "Ariovistus' Kontakte zu den südlich von uns lebenden Galliern haben uns ‚Allianzen‘ mit ihnen gesichert, da sie uns, den Sueben, offensichtlich in Form von Tributzahlungen untertan sind."
  flavor_germanics.9.a:0 "Sie werden beeindruckende ,Verbündete‘ abgeben."

  flavor_germanics.10.t:0 "Die norische Heirat"
  flavor_germanics.10.desc:0 "Nachdem [ROOT.GetCountry.GetRuler.GetName] beschlossen hatte, dass [ROOT.GetCountry.GetRuler.GetSheHe] eine Braut aus dem südlich von uns lebenden E Norischen#! Stämmen  suchen sollte, brachen innerhalb einer Woche Boten aus [ROOT.GetCountry.GetCapital.GetName] auf. Diese Stammesdiplomaten hatten die Aufgabe, eine geeignete Partnerin zu finden, die politisch von Vorteil sein würde, obwohl [ROOT.GetCountry.GetRuler.GetFirstName] auch deutlich machte, dass er besonders an einer schönen Frau interessiert war.\n\nInnerhalb eines Monats kehrten unsere Diplomaten zurück und  [ROOT.GetCountry.GetRuler.GetFirstName] wurde [SCOPE.sChar('noric_princess').GetName] vorgestellt, der Tochter eines mächtigen norischen Häuptlings."
  flavor_germanics.10.a:0 "[SCOPE.sChar('noric_princess').GetFirstName], es ist eine Freude dir zu begegnen"
  flavor_germanics.10.b:0 "Wenn ich es mir recht überlege, möchte ich doch keine Norikerin heiraten."
 
  flavor_germanics.11.t:0 "Der Lugische Bund"
  flavor_germanics.11.desc:0 "Die #E Vandalen#! sind bekanntermaßen in mehrere verschiedene Stämme gespalten und äußerst streitlustig – sie geben ihre Stammeszugehörigkeit nur ungern auf und halten ihre Gelübde ein. Wenn die Vandalen gedeihen sollen, müssen wir sie zu einem Bündnis unter der Ägide von  [GetDeityDefinition('omen_lugus').GetName], dem #E keltischen#! Gott der Schmiede, vereinen, da die keltischen Götter unseren alten Glaubensvorstellungen offenkundig überlegen sind. \n\nWenn es uns gelänge, unsere verstreuten Verbündeten und die kleineren, unabhängigen Fraktionen zu organisieren, wäre unsere Hegemonie unbestreitbar."
  flavor_germanics.11.a:0 "Entsendet  die Einladungen."

  flavor_germanics.12.t:0 "Der Lugische Bund"
  flavor_germanics.12.desc:0 "Botschafter von [SCOPE.sC('mission_country_lugia').GetName] sind mit einem Angebot zu uns gekommen. Die Vandalenstämme sind schwach, wenn sie alleine stehen, und Mitteleuropa war zu lange das Schlachtfeld der Kelten. Sie behaupten, wenn die Vandalen gedeihen sollen, müssen wir uns zu einer Konföderation unter der Ägide von Lugus, dem keltischen Gott der Schmiede, vereinen, da die keltischen Götter unserem alten Glauben anscheinend überlegen sind. \n\nDer Vorschlag ist ungeheuerlich, aber wir haben möglicherweise keine Wahl, da ein starker Bund unter dem Schutz eines starken Anführers unsere einzige Überlebenschance sein könnte."
  flavor_germanics.12.a:0 "Dem Bund beitreten."
  flavor_germanics.12.b:0 "Unsere Souveränität verteidigen!"
  flavor_germanics.13.t:0 "Nehalennias Schiff"
  flavor_germanics.13.desc:0 "Nehalennia, wir danken dir für ein Jahr fruchtbaren Bodens, Frauen und Ernte. Viele Kinder wurden geboren, gesegnet mit gesunden Gliedern und gesundem Geist. Die Ernte wuchs reichlich, dafür danken wir deinem Priester, der dich vor vielen Jahreszeiten zu uns gebracht hat. Wir danken dir für den Schutz der Lebenden vor bösen Geistern und den Schutz der Toten bis zu ihrer Ankunft im Jenseits. Diesen gefährlichen Weg ins Reich der Toten beschützt Ihr. Ihr Schiff trägt sie alle und bringt die Neugeborenen in die Gebärmutter der Mütter. Wir danken dir, Nehelennia, dass du unsere Bitten erhört hast, und wir danken dir, dass du sie erfüllst."
  flavor_germanics.13.a:0 "Nehelennia sei gepriesen!"
  
  flavor_germanics.14.t:0 "Die Helvetische Wüste"
  flavor_germanics.14.desc: "Auch wenn unsere #E Suebi#!-Krieger dafür bekannt sind, eine Spur der Verwüstung hinter sich zu lassen, würde die brutale Invasion und Eroberung der #E Helvetier#!-Siedlungen aufgrund ihrer schockierenden Gewalt und Grausamkeit noch Jahrhunderte lang in Erinnerung bleiben. Unsere Armeen brannten Dutzende helvetischer Siedlungen nieder, töteten Hunderte, versklavten Tausende und verwüsteten dabei die Landschaft. \n\nIn den folgenden Jahren bezeichneten die verstreuten Überreste der helvetischen Stämme dieses Land als Wüste, als einen von den Göttern verfluchten Ort, und erinnerten sich mit Schaudern an die schrecklichen Armeen von [ROOT.GetCountry.GetRuler.GetName]."
  flavor_germanics.14.a:0 "Die Welt soll auf meinen Befehl hin brennen!"

  flavor_germanics.15.t:0 "Der Fall der Aedui"
  flavor_germanics.15.desc:0 "Die Soldaten von [ROOT.GetCountry.GetRuler.GetName] haben erneut gesiegt und alle vernichtet, die töricht genug waren, sich ihnen entgegenzustellen. Das #E Aeduische#! Oppidum  liegt in Trümmern, die Aedui sind zerstreut, und unsere Krieger haben alles geplündert, was sie finden konnten.\n\nInmitten dieser Unruhen sandten die Aedui #E Druiden#! als Gesandte durch ganz #E Gallien#!, um um Hilfe zu bitten, doch ihre Mission war erfolglos, denn niemand will den arroganten Aedui gegen unsere Macht beistehen."
  flavor_germanics.15.a:0 "Ein ähnliches Schicksal erwartet diejenigen, die sich mir widersetzen!"

  flavor_germanics.16.t:0 "Der Untergang der Ubii"
  flavor_germanics.16.desc:0 "Endlich ist das #E Ubische#! Oppidum gefallen. Der Kampf war ziemlich erbittert, da unsere Krieger bergauf kämpfen und drei kreisförmige Wälle durchbrechen musstenund obwohl auf beiden Seiten unzählige Krieger fielen, stand der Ausgang der Schlacht nie in Frage. Als es unseren Kriegern schließlich gelang, die Verteidigungsanlagen zu durchbrechen, plünderten sie alles, was sie finden konnten – alles, was von Wert war, wurde aus den schwelenden Ruinen der Stadt fortgeschafft \n\n.Nach dieser vernichtenden Niederlage werden die Ubier den #E Galliern#! westlich des Rhenus keine Hilfe mehr leisten können."
  flavor_germanics.16.a:0 "In Zukunft wird sich niemand mehr an die Ubii erinnern."

  flavor_germanics.17.t:0 "Rex Germanorum"
  flavor_germanics.17.desc:0 "Nur noch sechs Schritte. Dann würde [ROOT.GetCountry.GetRuler.GetName] das endgültige Ziel seiner ehrgeizigen Pläne erreichen: auf dem Thron sitzen als gesalbter #E Rex Germanorum#!, der Titel, den die #E Römer#! [ROOT.GetCountry.GetRuler.GetHerHim] schon vor diesem Tag verliehen hatten. \n\n [ROOT.GetCountry.GetRuler.GetFirstName] hätte die letzten sechs Stufen am liebsten mit einem wilden [ROOT.GetCountry.GetAdjective]en Schlachtruf auf [ROOT.GetCountry.GetRuler.GetHerHis]en Lippen erklommen, aber aus Respekt vor der Erhabenheit des Augenblicks schritt [ROOT.GetCountry.GetRuler.GetSheHe] würdevoll Stufe für Stufe hinauf. Als [ROOT.GetCountry.GetRuler.GetSheHe] vor dem schlichten Thron stand, hielt [ROOT.GetCountry.GetRuler.GetFirstName] kurz inne, den Rücken zum Publikum gewandt. [ROOT.GetCountry.GetRuler.GetSheHe] holte tief Luft, wandte sich um und hielt erneut inne, während er triumphierend und streng auf die auf dem Boden kniende Versammlung blickte. \n\nIn diesem Moment durchströmte [ROOT.GetCountry.GetRuler.GetHerHim] ein berauschendes Gefühl ... eine seltsame Mischung aus Allmacht, Unfehlbarkeit und Stolz. Endlich war [ROOT.GetCountry.GetRuler.GetFirstName] nun der Erste, der den Titel trug, den [ROOT.GetCountry.GetRuler.GetSheHe] sein ganzes Leben lang begehrt hatte: Rex Germanorum."
  flavor_germanics.17.a:0 "Lang lebe [ROOT.GetCountry.GetRuler.GetName]!"

 flavor_germanics.18.t:0 "Über den Albis"
 flavor_germanics.18.desc:0 Nachdem unser #E Stammesrat#! beschlossen hat, dass wir die Sicherheit von [ROOT.GetCountry.GetCapital.GetName] verlassen werden, um die reißenden Fluten des #E Flusses Albis# zu durchqueren, ist unter den #E Stammeshäuptlingen#! ein Streit darüber entstanden, wer als Erster das andere Ufer erreichen wird.\n\n[SCOPE.sCharacter('clan_chief_one').GetName],  ein furchtloser Krieger, der dafür bekannt ist, dass er normalerweise seinen Willen durchsetzt, behauptet, dass ihm seine Erfahrung auf dem Schlachtfeld dieses Recht einbringt, während sein Bruder, der mutige Häuptling [SCOPE.sCharacter('clan_chief_two').GetName], die Meinung vertritt, dass die Truppen von [SCOPE.sCharacter('clan_chief_two').GetFamily.GetName] die Chance verdienen, sich als ebenbürtig mit den #E [SCOPE.sCharacter('clan_chief_one').GetFamily.GetName]en#! zu beweisen.\n\n[ROOT.GetCountry.GetRuler.GetName], der sichtlich verärgert ist, dass die Stammesführer bereits mit ihren internen Machtkämpfen begonnen haben, muss eine Entscheidung treffen."
 flavor_germanics.18.a:0 "Ich setze mein Vertrauen in  [SCOPE.sCharacter('clan_chief_one').GetFirstName] - einen bewährten Krieger"
 flavor_germanics.18.b:0 "Wir folgen dir, [SCOPE.sCharacter('clan_chief_two').GetFirstName], salso enttäusche uns nicht"
 flavor_germanics.18.c:0 "Die Ehre, unsere Krieger über den Fluss zu führen, gebührt mir!"
 flavor_germanics.18.tooltip:0 "$mission_completed_tooltip_1$ '#Y Über den Albis#!' $mission_completed_tooltip_2$"

 flavor_germanics.19.t: "Nördliche Verbündete" 
 flavor_germanics.19.desc: "Nachdem wir nun die Frage der kriegerischen Nordländer geklärt haben, die unsere Grenzen bedroht haben, ist [ROOT.GetCountry.GetRuler.GetName] erfreut zu erfahren, dass viele der #E skandischen#! Krieger dem #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]-Clan#! Treueeide geschworen haben. Anstatt sich gegen uns zu verschwören, versuchen sie, sich mit uns zu verbünden, in der Hoffnung, unsere gemeinsamen Feinde zu vernichten, denn die Skandier haben die Beute und die Schätze gesehen, die wir erworben haben, und möchten sich selbst bereichern.\n\nDas Einzige, was der [ROOT.GetCountry.GetRulerTitle] entscheiden muss, ist, wie diese skandischen Krieger kämpfen sollen; Sollten sie sich darauf konzentrieren, unsere Feinde zu vernichten, oder sollte [ROOT.GetCountry.GetRuler.GetFirstName] ihnen die Erlaubnis geben, nach Herzenslust zu plündern?" 
 flavor_germanics.19.a: "Lasst uns unsere Feinde vernichten und ihnen dann im Nachhinein ihr Land rauben" 
 flavor_germanics.19.b: "Eine Goldmünze für den Soldaten, der die meisten Sklaven gefangen nimmt!" 
 flavor_germanics.19.tooltip: "$mission_completed_tooltip_1$ „#Y Nördliche Alliierte#!'“ $mission_completed_tooltip_2$"
 suebians_choose_military_bonus_tt: "Wir können einen #R Militärbonus#! für unsere Armeen auswählen." 
  
 flavor_germanics.20.t: "Die Usipetes und Tencteri vertreiben" 
 flavor_germanics.20.desc: "Unsere siegreichen Krieger haben die schwachen Armeen der #E Usipetes#! und der #E Tencteri#! vernichtet. Gefangene wurden als Sklaven in Ketten gelegt und nach [ROOT.GetCountry.GetCapital.GetName] verschleppt, und alle, die töricht genug waren, sich unseren Armeen zu widersetzen, wurden geköpft – der wilde [ROOT.GetCountry.GetRuler.GetName] duldet keine Herausforderung [ROOT.GetCountry.GetRuler.GetHerHis]er Herrschaft." 
 flavor_germanics.20.a: "All Ehre und Lob gebührt [GetDeityDefinition('omen_mannus').GetName]!" 
 flavor_germanics.20.tooltip: "$mission_completed_tooltip_1$ „#Y Die Usipetes und Tencteri vertreiben#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.21.t: "Nach Teuriochemia" 
 flavor_germanics.21.desc: "In den letzten Jahren sind unsere Stammesangehörigen  immer weiter in die Provinz [GetProvince('(int32)3951').GetArea.GetName] gezogen, insbesondere nachdem unsere Krieger alle vertrieben haben, die sich unserer Wanderung in die Wälder widersetzen könnten.\n\nWährend sich unter den Stämmen die Nachricht von den guten Jagdgründen im Süden verbreitet, begeben sich immer mehr unserer Leute auf die beschwerliche Reise, in der Hoffnung, sich ein besseres Leben aufzubauen." 
 flavor_germanics.21.a: "Möge dieses Land ein Segen für [ROOT.GetCountry.GetName] sein" 
 flavor_germanics.21.tooltip: "$mission_completed_tooltip_1$ „#Y Nach Teuriochemia#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.22.t: "Gallische Verbündete" 
 flavor_germanics.22.desc: "Als sich die Nachricht von [ROOT.GetCountry.GetRuler.GetName]s verheerender Kampfkraft in [ROOT.GetCountry.GetName] und darüber hinaus verbreitete, war es eine Überraschung, als eines Morgens in [ROOT.GetCountry.GetCapital.GetName] eine #E gallische Delegation#! mit einer dringenden Bitte eintraf.\n\nUnsere Spione berichten, dass die Gallier untereinander darum kämpfen, wer die vorherrschende Macht werden wird, und in dem Bestreben, ihre Rivalen ein für alle Mal zu überwältigen, wurde [ROOT.GetCountry.GetRuler.GetFirstName] ein Angebot unterbreitet, das [ROOT.GetCountry.GetRuler.GetSheHe] nicht ablehnen konnte.  „Wir bitten dich, dringe in die Länder unserer Feinde ein und plündere sie. Was immer Ihr wollt, wird Euch gehören.“" 
 flavor_germanics.22.a: "Diese Gallier werden den Tag bereuen, an dem sie uns hierher eingeladen haben ..." 
 flavor_germanics.22.tooltip: "$mission_completed_tooltip_1$ „#Y Gallische Verbündete#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.23.t: "Die sieben Verbündeten"
 flavor_germanics.23.desc: "Nie zuvor in unserer Geschichte waren die Armeen von [ROOT.GetCountry.GetName] so erfolgreich wie heute. Unter der inspirierenden Führung von [ROOT.GetCountry.GetRuler.GetName] haben unsere Krieger alle Gegner vernichtet, die töricht genug waren, sich uns auf dem Schlachtfeld zu stellen, und die Botschaften aus [ROOT.GetCountry.GetCapital.GetName] kehren in der Regel mit guten Nachrichten in die [ROOT.GetCountry.GetAdjective]e Hauptstadt zurück. \n\nDa unsere Truppen um ausländische Kämpfer wachsen, die nach Ruhm und Reichtum streben, muss unser [ROOT.GetCountry.GetRulerTitle] entscheiden, wie diese Soldaten ausgebildet werden sollen – ein erfreuliches Problem, das [ROOT.GetCountry.GetRuler.GetSheHe] gerne hat." 
 flavor_germanics.23.a: "Die leichte Infanterie von [ROOT.GetCountry.GetName] ist der wichtigste Teil unserer Armee" 
 flavor_germanics.23.b: "Unsere Bogenschützen müssen auf alles vorbereitet sein, was auf sie zukommt" 
 flavor_germanics.23.c: "Alle unsere Krieger sollten in den Wäldern unserer Heimat trainieren"
 flavor_germanics.23.tooltip: "$mission_completed_tooltip_1$ „#Y Die sieben Verbündeten#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.24.t: "Über den Rhenus" 
 flavor_germanics.24.desc: "Nach allen Berichten sind die Länder jenseits des Flusses #E Rhenus#! fruchtbar und einladend, mit sanften Hügeln und endlosen Getreidefeldern – ein gutes Gebiet für die Viehzucht und den Anbau von Getreide. Ermutigt durch diese Berichte ist [ROOT.GetCountry.GetRuler.GetName] bereit, unsere [ROOT.GetCountry.GetAdjective]en Truppen über den Rhenus zu schicken." 
 flavor_germanics.24.a: "Die Söhne meiner Söhne werden dieses Land bewirtschaften ..." 
 flavor_germanics.24.tooltip: "$mission_completed_tooltip_1$ „#Y Über den Rhenus#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.25.t: "Den römischen Wolf zähmen" 
 flavor_germanics.25.desc: "Die unbesiegbaren Kräfte von [ROOT.GetCountry.GetRuler.GetName] haben die #E Römischen Legionen#!, gedemütigt und sie mit zwischen die Beine geklemmten Schwänzen auf ihre verfluchte Halbinsel zurückgeschickt. In ihrer Hybris gingen die Römer davon aus, dass sie mit uns wie mit jedem anderen sogenannten „Barbarenstamm“ umgehen könnten, und unsere Späher berichten, dass sich der Feind nicht die Mühe machte, die umliegende Landschaft zu erkunden.\n\nIhre Faulheit hat sich als ihr Verderben erwiesen, denn unsere [ROOT.GetCountry.GetAdjective]en Verwandten stürzten sich immer wieder auf die ahnungslosen Römer und lösten in den römischen Lagern ein Gefühl der Panik und Verzweiflung aus. Es wurde sogar berichtet, dass ihre #E Konsuln#! vom #E römischen Senat#! öffentlich bestraft wurden, weil sie solch schändliche Niederlagen zugelassen hatten – eine Nachricht, die Musik in den Ohren von [ROOT.GetCountry.GetRuler.GetFirstName] ist." 
 flavor_germanics.25.a: "Eines Tages werde ich [GetProvince('(int32)1').GetName] dem Erdboden gleichmachen!" 
 flavor_germanics.25.tooltip: "$mission_completed_tooltip_1$ „#Y Den römischen Wolf zähmen#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.26.t: "Verbündete integrieren" 
 flavor_germanics.26.desc: "Obwohl [ROOT.GetCountry.GetRuler.GetName] auf die Vorschläge derer gehört hat, die wir erobert haben, hat der grimmige [ROOT.GetCountry.GetRulerTitle] ihre Vorschläge zur Koexistenz abgelehnt und die Entscheidung getroffen, dass alle, die in unserer Hegemonie leben, direkt integriert werden sollten." 
 flavor_germanics.26.a: "Ein geeintes Volk ist der einzige Weg vorwärts für [ROOT.GetCountry.GetName]!" 
 flavor_germanics.26.tooltip: "$mission_completed_tooltip_1$ „#Y Verbündete integrieren#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.27.t: "Verbündete assimilieren" 
 flavor_germanics.27.desc: "Anstatt diejenigen, die [ROOT.GetCountry.GetName] die Treue geschworen haben, gewaltsam zu integrieren, hat [ROOT.GetCountry.GetRuler.GetName] beschlossen, dass eine Anstrengung zur Assimilation unserer Landsleute ausreichen wird. Wie [ROOT.GetCountry.GetRulerTitle] gegenüber [ROOT.GetCountry.GetRuler.GetHerHis]en Beratern bemerkt hat: „Wie kann jemand unseren überlegenen [ROOT.GetCountry.GetAdjective]en Wegen widerstehen? Innerhalb einer Generation wird man keinen von uns mehr unterscheiden können.“" 
 flavor_germanics.27.a: "Ich hoffe, dass ich eine kluge Wahl getroffen habe" 
 flavor_germanics.27.tooltip: "$mission_completed_tooltip_1$ „#Y Verbündete assimilieren#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.28.t: "Königlicher Erbe" 
 flavor_germanics.28.desc: "Noch nie zuvor in [ROOT.GetCountry.GetCapital.GetName] gab es eine solche Feier wie die von [ROOT.GetCountry.GetRuler.GetName] anlässlich der Geburt von [ROOT.GetCountry.GetRuler.GetHerHis]em Nachkommen, einem gesunden und kräftigen Baby namens [SCOPE.sChar('but_thats_my_baby_scope').GetName]. Der Wein fließt in der Hauptstadt wie der #E Fluss Rhenus#! selbst, und das Tanzen und Feiern geht nun schon seit über einer Woche weiter, ohne Anzeichen eines Endes.\n\nDie Mutter des Kindes, die errötende [ROOT.GetCountry.GetConsort.GetName], ist Ehrengast der Veranstaltung, und der sichtlich betrunkene [ROOT.GetCountry.GetRuler.GetFirstName] hat praktisch jede Stunde auf ihre Gesundheit angestoßen und die Götter dafür gepriesen, dass sie den Menschen von Semnonia einen neuen Erben geschenkt haben. Während er das Kind in die Luft hielt, damit alle Anwesenden [SCOPE.sChar('but_thats_my_baby_scope').GetHerHim] bewundern konnten, konnte der stolze [ROOT.GetCountry.GetRulerTitle] nicht aufhören zu lächeln – wahrlich, [ROOT.GetCountry.GetRuler.GetFirstName] war der glücklichste, den [ROOT.GetCountry.GetRuler.GetName]1 jemals in [ROOT.GetCountry.GetRuler.GetHerHis]em Leben erlebt hatte." 
 flavor_germanics.28.a: "Mögen meine Nachkommen zehntausend Jahre lang über [ROOT.GetCountry.GetName] herrschen!" 
 flavor_germanics.28.b: "Gibt es wirklich irgendwo auf der Welt eine schönere Frau?" 
 flavor_germanics.28.tooltip: "$mission_completed_tooltip_1$ „#Y Königlicher Erbe#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.29.t: "Das Boiohaemische Becken" 
 flavor_germanics.29.desc: "Die Länder in unserem Süden sind seit langem von keinem Stamm beansprucht worden und beherbergen nur Einsiedler und diejenigen, die von ihrem Volk verlassen wurden – man kann tagelang durch die dunklen Wälder reisen, ohne einer anderen lebenden Seele zu begegnen.\n\nUnsere Stammesangehörigen beginnen jedoch, diese Gebiete zu erkunden, und haben sich auf der Suche nach guten Jagdmöglichkeiten immer weiter von [ROOT.GetCountry.GetCapital.GetName] entfernt. Auf einer solchen Reise entdeckten unsere Späher das #E Boiohaemische Becken#!, eine riesige und unberührte Region, die viel verspricht.\n\nAls [ROOT.GetCountry.GetRuler.GetName] von diesen unberührten Ländern erfuhr, die keinen Herrn kannten, wurde sofort beschlossen, dass unsere Armeen in die Fußstapfen unserer Jäger treten und nach Süden ziehen würden." 
 flavor_germanics.29.a: "Ich frage mich, was wir sonst noch im Boiohaemische Becken finden werden ..." 
 flavor_germanics.29.tooltip: "$mission_completed_tooltip_1$ „#Y Das Boiohaemische Becken#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.30.t: "Moenus-Handel" 
 flavor_germanics.30.desc: "Die Eroberung neuer Länder bringt viele Möglichkeiten mit sich; manche gut und manche schlecht. Zum Glück für die Stämme von [ROOT.GetCountry.GetName] ist unser Volk erst seit der Überquerung des #E Flusses Moenus#! auf Reichtum gestoßen. Unsere Kontakte mit den Einheimischen haben nicht nur den Handelsfluss nach [ROOT.GetCountry.GetCapital.GetName] erhöht, sondern die von unseren Händlern eingenommenen Steuern haben die Staatskasse mit Reichtum überschwemmt, den es bei den [ROOT.GetCountry.GetAdjective]en noch nie gegeben hat." 
 flavor_germanics.30.a: "Ich bete, dass wir dieses Geld sinnvoll einsetzen" 
 flavor_germanics.30.tooltip: "$mission_completed_tooltip_1$ „#Y Moenus Trade#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.31.t: "Invasion Boiohemias" 
 flavor_germanics.31.desc: "Zum Glück unserer Krieger sind wir auf keinen nennenswerten Widerstand gestoßen, da unsere Truppen massenhaft nach #E Boiohemia#! eingezogen sind – alle, die dumm genug waren, mit uns die Schwerter zu kreuzen, verrotten auf dem Schlachtfeld, und ein stetiger Strom von Sklaven geht nach Norden nach [ROOT.GetCountry.GetCapital.GetName].\n\nErmutigt durch diese herausragenden Ergebnisse hat [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis]en Soldaten befohlen, ihre Plünderungen und Raubzüge fortzusetzen." 
 flavor_germanics.31.a: "Die Götter des Krieges sind mit uns! Wir müssen den Angriff suchen!" 
 flavor_germanics.31.tooltip: "$mission_completed_tooltip_1$ „#Y Invasion Boiohemias#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.32.t: "Maroboduus'-Palast" 
 flavor_germanics.32.desc: "Während [ROOT.GetCountry.GetRuler.GetName] in erster Linie für [ROOT.GetCountry.GetRuler.GetHerHis] Fachwissen bei der Führung von Kriegern in die Schlacht bekannt ist, möchte der [ROOT.GetCountry.GetAdjective]e [ROOT.GetCountry.GetRulerTitle] auch als Baumeister anerkannt werden und äußert gegenüber [ROOT.GetCountry.GetRuler.GetHerHis]en Beratern häufig folgende Gedanken: „Jeder Mann kann einen anderen töten, aber wenn ich ein bleibendes Vermächtnis hinterlassen möchte, müssen die Kinder meiner Enkelkinder auf die Werke schauen, die ich hinterlassen habe. Diese knorrigen Hände, die so geschickt einen Speer oder ein Schwert halten, müssen auch Stein auf Stein heben ...“\n\nGeleitet von solchen Visionen begann bald der Bau eines prächtigen Palastes auf dem Land, und als er fertiggestellt war, machten sich Stammesangehörige aus ganz [ROOT.GetCountry.GetName] die beschwerliche Reise durch das schwierige Gelände, um das Bauwerk selbst zu bestaunen. Beeindruckt von seiner Größe und Erhabenheit beschlossen viele zu bleiben, und so wurde [ROOT.GetCountry.GetRuler.GetFirstName] als Meisterarchitekt bekannt." 
 flavor_germanics.32.a: "Möge dieses großartige Gebäude noch Jahrhunderte lang bestehen bleiben!" 
 flavor_germanics.32.tooltip: "$mission_completed_tooltip_1$ „#Y Maroboduus'-Palast#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.33.t: "Der sichere Hafen für Verräter" 
 flavor_germanics.33.desc: "In den letzten Jahren wurde das Land [GetCountry('GTH').GetName] als ein Ort bekannt, an dem [ROOT.GetCountry.GetAdjective]e Rebellen und Unzufriedene Zuflucht vor dem langen Arm der unnachgiebigen Gerechtigkeit von [ROOT.GetCountry.GetRuler.GetName] finden konnten, aber der rachsüchtige [ROOT.GetCountry.GetRulerTitle] hat dieser eklatanten Verletzung unserer Gesetze endlich ein Ende gesetzt, indem er die Guthonianer völlig unterworfen hat.\n\nJetzt können diejenigen, die den Zorn unseres Volkes auf sich ziehen, nur hoffen Erlösung im Tod zu finden, denn [ROOT.GetCountry.GetRuler.GetFirstName] hat deutlich gemacht, dass unter [ROOT.GetCountry.GetRuler.GetHerHis]er Augen  keinen sicheren Hafen für Verräter gibt." 
 flavor_germanics.33.a: "Hast du wirklich geglaubt, dass ich dich damit durchkommen lassen würde?" 
 flavor_germanics.33.b: "Mein Wort ist die letzte Autorität innerhalb von [ROOT.GetCountry.GetName]..."
 flavor_germanics.33.tooltip: "$mission_completed_tooltip_1$ „#Y Der sichere Hafen für Verräter#!'“ $mission_completed_tooltip_2$"
  
  
 flavor_germanics.34.t: "Den Fluss Marus überqueren" 
 flavor_germanics.34.desc: "Die Götter haben unsere Bemühungen, das Land des #E Boiohaemische Beckens#!, zu besiedeln, wirklich gesegnet, denn wir haben auf den Gewässern des #E Flusses Marus#!. nichts als Erfolg gefunden. Schon jetzt zähmen unsere Verwandten das wilde Land, pflanzen Getreide an und lassen ihre Herden unter dem wachsamen Auge ihrer Hirten frei über die sanften Hügel ziehen.\n\nUnsere Stämme sind sehr zufrieden mit [ROOT.GetCountry.GetRuler.GetName], der mehr als jeder andere getan hat, um solche Dinge möglich zu machen, und der Name des [ROOT.GetCountry.GetRulerTitle]s wird vom einfachen Volk gelobt." 
 flavor_germanics.34.a: "Dieses Land wird für immer unser sein ... Ich werde dafür sorgen" 
 flavor_germanics.34.tooltip: "$mission_completed_tooltip_1$ „#Y Den Fluss Marus überqueren#!'“ $mission_completed_tooltip_2$" 
  
  
 flavor_germanics.35.t: "Das Becken verteidigen" 
 flavor_germanics.35.desc: "Kürzlich hat [ROOT.GetCountry.GetRuler.GetName] viel Zeit damit verbracht, persönlich die Soldaten auszubilden, die als Wächter an den Engpässen fungieren sollen, die in das #E Boiohaemische Becken#! führen, und nach wochenlanger anstrengender Übung draußen in den Wäldern ist [ROOT.GetCountry.GetRulerTitle] endlich mit den Bemühungen unserer [ROOT.GetCountry.GetAdjective]en Verwandten zufrieden und ist nach [ROOT.GetCountry.GetCapital.GetName] zurückgekehrt.\n\nDiese tapferen Krieger werden als erste Verteidigungslinie fungieren, wenn es um den Schutz unserer neuen Gebiete geht, sie sind mehr als bereit für die ihnen anvertraute Aufgabe und patrouillieren mit grimmiger Entschlossenheit entlang der von unserem Volk errichteten Befestigungsanlagen." 
 flavor_germanics.35.a: "Mögen deine Pfeile gerade fliegen und deine Schwerter treffen!" 
 flavor_germanics.35.tooltip: "$mission_completed_tooltip_1$ „#Y Das Becken verteidigen#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.36.t: "Die Botschaft Twistos verbreiten" 
 flavor_germanics.36.desc: "Auf die Frage, wer am meisten dafür verantwortlich ist, unserem Volk den Sieg zu bringen, wird [ROOT.GetCountry.GetRuler.GetName] als erster [GetDeityDefinition('omen_tuisto').GetName] loben, denn der Fromme [ROOT.GetCountry.GetRulerTitle] hat immer die Vormachtstellung der Götter in den Angelegenheiten der Menschen anerkannt.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] gibt sich nicht damit zufrieden, unserem mächtigen Gott nur ein Lippenbekenntnis abzugeben, sondern hat einen Schrein für [ROOT.GetCountry.GetRuler.GetHerHis]e Schutzgottheit  errichtet, in der Hoffnung, unseren Glauben in den Ländern, die wir besiedelt haben, zu verbreiten." 
 flavor_germanics.36.a: "Es überrascht mich nicht, dass Twisto neue Anhänger gewonnen hat" 
 flavor_germanics.36.tooltip: "$mission_completed_tooltip_1$ „#Y Die Botschaft Twistos verbreiten#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.37.t: "Markomannenkriege" 
 flavor_germanics.37.desc: "Aus bescheidenen Anfängen haben die Bemühungen von [ROOT.GetCountry.GetRuler.GetName] die Stämme von [ROOT.GetCountry.GetName] an die Spitze der Macht gebracht; das Wort und der Wille des mächtigen [ROOT.GetCountry.GetRulerTitle] werden durch die überwältigend schlagkräftigen Truppen durchgesetzt, die [ROOT.GetCountry.GetRuler.GetSheHe] befehligt. Nie zuvor in unserer Geschichte wurde eine so große Streitmacht von unseren Häuptlingen befehligt – ein Zeichen dafür, dass unser Ruhm im Aufstieg begriffen ist und dass uns niemand im Weg stehen kann. \n\nAllein die Erwähnung unseres Namens versetzt unsere Feinde in Schrecken, und täglich beten unsere Gegner in der Hoffnung, dass der [ROOT.GetCountry.GetAdjective]e Zorn sie nicht vernichtet." 
 flavor_germanics.37.a: "Mit solchen Kräften, die mir zur Verfügung stehen, könnte ich die Welt erobern!" 
 flavor_germanics.37.tooltip: "$mission_completed_tooltip_1$ „#Y Markomannenkriege#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.38.t: "Cotinische Sklaven" 
 flavor_germanics.38.desc: "Die #E [GetCountry('OTN').GetName]en#! lebten früher in ihren Gebirgspässen, mieden den Kontakt mit Ausländern, wann immer es möglich war, und hofften, dass sie ihre Tage alleine verbringen könnten – ein Traum, der vom allmächtigen [ROOT.GetCountry.GetRuler.GetName] zerplatzt wurde, der [ROOT.GetCountry.GetRuler.GetHerHis]e Armeen in die Felsspalten und Hügel geschickt hat, um sie zu versklaven und zu plündern.\n\nNachdem die schwachen Cotiner nun vernichtet worden sind, fragt sich der [ROOT.GetCountry.GetRulerTitle], was die Zukunft für sie bereithalten wird." 
 flavor_germanics.38.a: "Lasst die Einheimischen in ihrem Heimatland arbeiten" 
 flavor_germanics.38.b: "Legt den Cotini Ketten an und schickt sie auf die Felder und in die Minen" 
 flavor_germanics.38.tooltip: "$mission_completed_tooltip_1$ „#Y Cotinische Sklaven#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.39.t: "Eine neue germanische Heimat" 
 flavor_germanics.39.desc: "Für unser Volk hat sich in den letzten Jahren viel verändert, wir haben uns aus der Dunkelheit erhoben und sind zu einer Macht geworden, mit der man rechnen muss. Nach allem, was man hört, war unsere Wanderung nach Süden in das #E Boiohaemische Becken#! ein überwältigender Erfolg, der sich ausgezahlt hat und Vorteile gebracht hat, die selbst der mächtige [ROOT.GetCountry.GetRuler.GetName] nicht wirklich hätte vorhersehen können. Vor langer Zeit war vieles für uns ungewiss, doch nun liegt die Zukunft in unseren Händen..." 
 flavor_germanics.39.a: "Möge dieses neue Zuhause unseren Stämmen in den kommenden Tagen als Zufluchtsort dienen"
 flavor_germanics.39.tooltip: "$mission_completed_tooltip_1$ „#Y Eine neue germanische Heimat#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.40.t: "Der Heilige Hain der Alhiz" 
 flavor_germanics.40.desc: "Obwohl der heilige Boden von [GetProvince('(int32)4005').GetName] weit von [ROOT.GetCountry.GetCapital.GetName] entfernt liegt, hat [ROOT.GetCountry.GetRuler.GetName] keine Zeit verschwendet, um dieses wichtige Territorium für die Stämme von [ROOT.GetCountry.GetName] zu sichern. Unser [ROOT.GetCountry.GetRulerTitle] gab sich nicht damit zufrieden, nur ein Verwalter des Heiligen zu sein, sondern gab eine riesige Summe aus, um eine #E Heilige Stätte#! in Stragona in der Nähe eines Hains zu errichten, von dem die Einheimischen behaupten, er sei von [GetDeityDefinition('omen_alcis').GetName] gesegnet, einer Gottheit, von der [ROOT.GetCountry.GetRuler.GetSheHe] glaubt, dass sie persönlich über [ROOT.GetCountry.GetRuler.GetHerHim] wacht.\n\nNachdem der Schrein gebaut wurde und der Ruf von [ROOT.GetCountry.GetRuler.GetFirstName] wächst, hat der stolze Krieger bekannt gegeben, dass unsere Armeen bald neue Gebiete erobern werden." 
 flavor_germanics.40.a: "Die Provinz Elysien gehört uns, und wir werden sie beanspruchen! [GetDeityDefinition('omen_alcis').GetName] will es" 
 flavor_germanics.40.tooltip: "$mission_completed_tooltip_1$ „#Y Der heilige Hain der Alhiz#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.41.t: "Gesichtsurne" 
 flavor_germanics.41.desc: "Eine der wichtigsten Ehrungen, die einem [ROOT.GetCountry.GetAdjective]en [ROOT.GetCountry.GetRulerTitle] jemals zuteil wurde, ist die Beerdigung in einer #E Vandalischen Gesichtsurne#!, in der die sterblichen Überreste in einem so prachtvoll verzierten Zustand begraben sind, dass der Name und der Ruf der Gefallenen so gut wie sicher für immer weiterleben würden.\n\nUnd obwohl [ROOT.GetCountry.GetRuler.GetFirstName] dieses Reich noch nicht ins Jenseits verlassen hat, wurde bereits [ROOT.GetCountry.GetRuler.GetHerHim]e Gesichtsurne vorbereitet als Zeichen des Respekts und der Bewunderung für den beeindruckenden Krieger. Unsere #E Stammesältesten#! wollen sicherstellen, dass wir nie all die gewaltigen Dinge vergessen, die der mächtige [ROOT.GetCountry.GetRuler.GetFirstName] für uns alle getan hat." 
 flavor_germanics.41.a: "Mögen meine Taten dieses Geschenks, das ich erhalten habe, würdig sein!" 
 flavor_germanics.41.tooltip: "$mission_completed_tooltip_1$ „#Y Gesichtsurne#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.42.t: "Die Bernsteinstraße" 
 flavor_germanics.42.desc: "Obwohl wir vollkommen damit zufrieden sind, uns um unsere Angelegenheiten zu kümmern und den Kontakt mit unseren Nachbarstämmen einzuschränken, hat [ROOT.GetCountry.GetRuler.GetName] uns ermutigt, unsere Verbindungen mit der übrigen Welt auszubauen – insbesondere, wenn es darum geht, Bernstein @amber! zu verkaufen, ein Luxusgut, das wir in Hülle und Fülle haben und das bei ausländischen Händlern sehr begehrt ist.\n\nIm Laufe der Jahre sind die Handelsnetzwerke immer stärker geworden und unsere Verbindungen zu unseren #E Keltischen#! Nachbarn sind viel größer als zuvor. Zum Glück scheint diese Situation allen Beteiligten zu helfen." 
 flavor_germanics.42.a: "Ich verspreche, die Gewinne, die wir machen, sinnvoll einzusetzen" 
 flavor_germanics.42.tooltip: "$mission_completed_tooltip_1$ „#Y Die Bernsteinstraße#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.43.t: "Unser eigener Bernstein" 
 flavor_germanics.43.desc: "In letzter Zeit scheint eine Begeisterung für Bernstein @amber! unser Volk erfasst zu haben, denn jeder möchte ein Stück ‚Glesum‘ für sich haben. Unsere Handwerker formen den wertvollen Saft zu Tierfiguren wie Bären oder Hirschen, und ein [ROOT.GetCountry.GetAdjective]er Schrein gilt nicht als heilig, wenn er nicht irgendwo ein Stück heiligen Bernsteins enthält. Es gibt einige Stammesangehörige unter uns, die durch den Handel mit Bernstein an Ausländer ein kleines Vermögen angehäuft haben, und als [ROOT.GetCountry.GetRuler.GetName] erfuhr, wie viel Geld dabei den Besitzer wechselte, beschloss der [ROOT.GetCountry.GetRulerTitle], die Bernsteinproduktion zu einer Priorität für [ROOT.GetCountry.GetName] zu machen." 
 flavor_germanics.43.a: "Wir müssen so viel Bernstein wie möglich sammeln!" 
 flavor_germanics.43.tooltip: "$mission_completed_tooltip_1$ „#Y Unser eigener Bernstein#!'“ $mission_completed_tooltip_2$" 
 barbaricum_vandalia_lugia_mission_task_4_tt: "Eine zufällige Siedlung erhält anstelle ihres #THandelsguts#! #T Bernstein#! @amber!, und eine zufällige Siedlung, die #T Bernstein#! produziert, erhält einen #GSpezialbonus#!." 
  
 flavor_germanics.44.t: "Kontakt mit Kelten"
 flavor_germanics.44.desc: "[ROOT.GetCountry.GetRuler.GetName] pflegt seit langem Handelsbeziehungen mit den #E Kelten#!, die in unserer Nähe leben, und im Laufe der Zeit sind die Beziehungen zwischen uns und vielen anderen Stämmen recht freundschaftlich geworden. Man muss sagen, dass unsere Leute ziemlich gut miteinander auskommen, wir lieben viele ähnliche Dinge, wie zum Beispiel die Freuden der Jagd, und unter uns leben viele, die unsere keltischen Verwandten geheiratet haben.\n\nAnstatt solche Dinge zu verhindern, hat [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetHerHis]en seinen Segen gegeben, denn auch [ROOT.GetCountry.GetRuler.GetSheHe] hat Freunde unter den Kelten und unterhält sich oft mit ihren Weisen und #E Stammesältesten#! in der Hoffnung, Weisheit zu erlangen." 
 flavor_germanics.44.a: "Bei den Göttern, ich glaube, es zahlt sich tatsächlich aus." 
 flavor_germanics.44.tooltip: "$mission_completed_tooltip_1$ „#Y Kontakt mit Kelten#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.45.t: "Ein keltisches Ritual" 
 flavor_germanics.45.desc: "Obwohl viele der #E Stammesältesten#! die Handlungen von [ROOT.GetCountry.GetRuler.GetName] mit offenem Misstrauen betrachteten, konnte niemand den [ROOT.GetCountry.GetRulerTitle] davon abhalten, im Herzen von [ROOT.GetCountry.GetCapital.GetName] ein #E keltisches#! religiöses Ritual durchzuführen. Einige argumentierten, dass die Riten zu teuer seien, während andere bei der bewährten Behauptung blieben, dass solche Ereignisse blasphemisch seien und den Zorn unserer traditionellen Gottheiten hervorrufen könnten, und dennoch zeigte sich keiner unserer Götter erzürnt.\n\nIm Gegenteil, die Vorzeichen waren günstiger als je zuvor, unsere Bienenstöcke liefen über vor Honig, Fische sprangen praktisch aus den Flüssen in unsere Netze und Herden dicker, langsamer Hirsche zogen durch unsere Wälder." 
 flavor_germanics.45.a: "Im keltischen Pantheon steckt Macht!"
 flavor_germanics.45.tooltip: "$mission_completed_tooltip_1$ „#Y Ein keltisches Ritual#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.46.t: "Die Lugische Konföderation" 
 flavor_germanics.46.desc: "Die keltische Gottheit [GetDeityDefinition('omen_lugus').GetName] hat unser Volk mit unzähligen Siegen gesegnet und uns über alle anderen gestellt, obwohl sein Name unseren Vorfahren unbekannt war, und es ist keine Überraschung zu hören, dass [ROOT.GetCountry.GetRuler.GetName] beschlossen hat, eine Konföderation zu gründen, die den großen Gott ehrt.\n\n'Von diesem Tag an werden wir als #E Lugia#!; bekannt sein, ein Zuhause für  #E Germanische#! und #E keltische#! Krieger. Wie zwei große Flüsse, die ihre Gewässer miteinander verbunden haben, so wird auch die Stärke unserer Völker eine neue Kultur schmieden. Feiern wir diesen heiligen Moment mit Opfern und Lobpreisungen für Lugus, der all dies möglich gemacht hat.“" 
 flavor_germanics.46.a: "Es lebe #E Lugia#! und es lebe [ROOT.GetCountry.GetRuler.GetFirstName]!" 
 flavor_germanics.46.tooltip: "$mission_completed_tooltip_1$ „#Y Die Lugische Konföderation#!'“ $mission_completed_tooltip_2$" 
 lugus_added_to_lugia_pantheon_tt: "Die Gottheit #T Lugus#! wird unserem #T Pantheon#! hinzugefügt." 
  
 flavor_germanics.47.t: "Unsere suebische Minderheit"
 flavor_germanics.47.desc: "Es gibt viele Bewohner von [ROOT.GetCountry.GetName], die den #E Irminonen#!, die neben uns leben, mit tiefem Misstrauen gegenüberstehen, aber [ROOT.GetCountry.GetRuler.GetName] hat unseren Verwandten gesagt, dass sie die Minderheit in unserer Mitte akzeptieren müssen ... sonst...\n\n'Gebt den Irminonen Zeit, sich uns gegenüber zu beweisen, und ihr werdet sehen, dass sie der Auszeichnungen würdig sind, die ich ihnen verliehen habe. Unsere Truppen wachsen um mutige Kämpfer, unsere Handelseinnahmen wachsen und unsere Feinde fürchten uns ... hier gibt es keine Nachteile.'\n\nOb sich diese Worte als wahr erweisen werden, bleibt abzuwarten, aber vorerst ist jeder bereit, auf die Worte des [ROOT.GetCountry.GetRulerTitle]s zu vertrauen."
 flavor_germanics.47.a: "Alles, was ich tue, habe ich für [ROOT.GetCountry.GetName] getan" 
 flavor_germanics.47.tooltip: "$mission_completed_tooltip_1$ „#Y Unsere suebische Minderheit#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.48.t: "Weitere Stammesmigranten einladen" 
 flavor_germanics.48.desc: "Als sich herumspricht, dass die Stämme von [ROOT.GetCountry.GetName] Migranten ermutigen, sich innerhalb ihrer Grenzen niederzulassen, wurde [ROOT.GetCountry.GetRuler.GetName] von einem reichen #E Irminonischen#!-Händler angesprochen, einem Mann edlen Stands namens [SCOPE.sCharacter('irminonic_nobleman_scope').GetName], einer, der wohlhabend und ehrgeizig ist und in [ROOT.GetCountry.GetCapital.GetName] leben möchte.\n\nAuf die Frage, warum er neben den [ROOT.GetCountry.GetAdjective]en leben möchte, behauptet [SCOPE.sCharacter('irminonic_nobleman_scope').GetFirstName], dass es in unserem Heimatland gute Geschäftsmöglichkeiten gibt und dass und er daran interessiert ist, den Bernsteinhandel @amber! zu fördern.\n\nDer irminonische Adlige ist bereit, für das Privileg, hier zu bleiben, zu zahlen, verlangt aber, dass seine Rechte gesetzlich verankert werden, ein Schachzug, der sich als unpopulär erweisen wird, wenn [ROOT.GetCountry.GetRuler.GetFirstName] sich dazu entschließt." 
 flavor_germanics.48.a: "Wir heißen jeden willkommen, der mit uns leben möchte" 
 flavor_germanics.48.b: "Tu, was [SCOPE.sCharacter('irminonic_nobleman_scope').GetFirstName] verlangt, ohne Rücksicht auf die Konsequenzen." 
 flavor_germanics.48.tooltip: "$mission_completed_tooltip_1$ „#Y Weitere Stammesmigranten einladen#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.49.t: "Mit Speer und Schwert" 
 flavor_germanics.49.desc: "In ganz [ROOT.GetCountry.GetName] und darüber hinaus erlangt [ROOT.GetCountry.GetRuler.GetName] den Ruf, ein wilder Krieger zu sein, der von keinem derzeit Lebenden erreicht wird. Viele glauben sogar, dass [ROOT.GetCountry.GetRuler.GetFirstName] der größte Kämpfer ist, der jemals auf Erden gelebt hat.\n\nJeder Feind, der den Zorn s[ROOT.GetCountry.GetRulerTitle]s erregt hat, wurde zu den Göttern der Unterwelt, an die sie glauben, geschickt,  und eine der am meisten gefeierten Errungenschaften von [ROOT.GetCountry.GetName] [ROOT.GetCountry.GetRuler.GetFirstName] ist die Unterwerfung aller anderen #E Vandalischen#!-Stämme.\n\nDer Geruch brennender Dörfer und Körper ist wie ein Weihrauch geworden, der den Kriegsgöttern geopfert wird, und die Welt zittert vor Angst und fragt sich, wo die Armeen des tödlichen Häuptlings als nächstes zuschlagen werden." 
 flavor_germanics.49.a: "Was auch immer ich mir wünsche, ich werde es mir nehmen!" 
 flavor_germanics.49.tooltip: "$mission_completed_tooltip_1$ „#Y Mit Speer und Schwert#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.50.t: "Die Einigung der Vandalen" 
 flavor_germanics.50.desc: "„Von diesem Tag an nehmen wir einen neuen Namen an,wir werden nicht länger als #E Harisch#!, bekannt sein, sondern wir werden #E Vandalen#! genannt. Wir haben alle unsere Verwandten unter einem Banner vereint und sind aus bescheidenen Anfängen schnell zur dominierenden Macht in #E Germania#! geworden. Mögen die Götter uns segnen, während wir weiterhin gegen unsere Feinde vorgehen!'\n\nBei diesen Worten bricht lauter Jubel durch das MilitärlLager, in dem [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis]e Truppen anspricht. Ständig unterwegs, hatte [ROOT.GetCountry.GetRuler.GetFirstName] kaum Zeit, sich von der letzten Schlacht zu erholen, bevor [ROOT.GetCountry.GetRuler.GetSheHe] beschloss, den tapferen Kriegern, die diesen Tag möglich gemacht hatten, die aufregende Nachricht zu verkünden." 
 flavor_germanics.50.a: "Dies ist keine Zeit zum Ausruhen, denn es bleibt noch viel zu tun" 
 flavor_germanics.50.tooltip: "$mission_completed_tooltip_1$ „#Y Die Einigung der Vandalen#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.51.t: "Kolonisierung des Ostens" 
 flavor_germanics.51.desc: "Vor langer Zeit gab es in unserem Osten viele Gebiete, die größtenteils unbewohnt waren, aber unsere unerschrockenen Verwandten sind langsam in die Wälder und Ebenen abgewandert und haben Siedlungen gegründet. Die Kolonisierung des Ostens scheint äußerst gut zu verlaufen, unser Volk gedeiht, die Steuereinnahmen sind höher als je zuvor und unsere Stämme haben genug Raum, um zu wachsen, ohne sich gegenseitig in die Quere zu kommen." 
 flavor_germanics.51.a: "Das freut mich sehr... Ich habe eine kluge Entscheidung getroffen." 
 flavor_germanics.51.tooltip: "$mission_completed_tooltip_1$ „#Y Kolonisierung des Ostens#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.52.t: "Die Pannonische Tiefebene" 
 flavor_germanics.52.desc: "Die weitläufigen Gebiete der #E Pannonischen Tiefebene#! liegen vor uns, und niemand steht uns im Weg, sie vollständig für uns zu beanspruchen. Während einige Einwohner von [ROOT.GetCountry.GetCapital.GetName] das Ausmaß der Ambitionen von [ROOT.GetCountry.GetRuler.GetName] in Frage stellen, gibt es nur wenige, die sich gegen den [ROOT.GetCountry.GetRulerTitle] aussprechen wollen. Alles, was [ROOT.GetCountry.GetName] widerfahren ist, ist auf die Dinge zurückzuführen, die [ROOT.GetCountry.GetRuler.GetSheHe] getan hat." 
 flavor_germanics.52.a: "Die Ebenen Pannoniens sind ein Sprungbrett zu größerem Ruhm ..." 
 flavor_germanics.52.tooltip: "$mission_completed_tooltip_1$ „#Y Die Pannonische Tiefbene#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.53.t: "Keltische Manufakturen" 
 flavor_germanics.53.desc: "Obwohl unser Volk in erster Linie als Krieger und Eroberer bekannt ist, hat [ROOT.GetCountry.GetRuler.GetName] dafür gesorgt, dass wir unsere Infrastruktur nicht vernachlässigt haben, ganz im Gegenteil. Riesige Summen wurden für den Bau von Minen in unseren Provinzen bereitgestellt, und die Schmiede von [ROOT.GetCountry.GetName] brauchen dringend Eisen @iron!, ein wertvolles Metall, von dem wir scheinbar nie genug haben.\n\nWährend es noch viel Raum für die Erweiterung unserer Produktionskapazitäten gibt, zahlen sich die Bemühungen von [ROOT.GetCountry.GetRuler.GetFirstName] bereits aus, was ein weiterer Erfolg des berühmten [ROOT.GetCountry.GetRulerTitle]s ist." 
 flavor_germanics.53.a: "Unsere Wirtschaft braucht ein starkes Fundament, wenn wir uns von allen anderen abheben wollen" 
 flavor_germanics.53.tooltip: "$mission_completed_tooltip_1$ „#Y Keltische Manufakturen#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.54.t: "Glesum" 
 flavor_germanics.54.desc: "Obwohl [ROOT.GetCountry.GetRuler.GetName] sich verwundert über die Beliebtheit von Bernstein @amber! bei reisenden Händlern gezeigt hat, wird der [ROOT.GetCountry.GetRulerTitle] einem geschenkten Gaul nicht ins Maul schauen, wie man so schön sagt. \n\nDie ausländischen Händler sind bereit, für das seltene Material hohe Summen zu zahlen, warum sollten die Stämme von [ROOT.GetCountry.GetName] also auf dieses Geld verzichten? Wenn überhaupt, sollten die [ROOT.GetCountry.GetAdjective]en Menschen alles in ihrer Macht Stehende tun, um so viel Bernstein wie möglich zu sammeln." 
 flavor_germanics.54.a: "Du willst mehr Glesum, sagst du? Ich habe zufällig welche zum Verkauf" 
 flavor_germanics.54.tooltip: "$mission_completed_tooltip_1$ „#Y Glesum#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.55.t: "Die Küste beanspruchen" 
 flavor_germanics.55.desc: "Obwohl unser Land durch nahe gelegene Flüsse gut mit Wasser versorgt wird, haben wir derzeit keinen uneingeschränkten Zugang zu den Küsten – etwas, das [ROOT.GetCountry.GetRuler.GetName] bereit ist, zu ändern, auch wenn das einen Krieg mit unseren Nachbarn bedeutet." 
 flavor_germanics.55.a: "Hiermit beanspruche ich die Küsten für [ROOT.GetCountry.GetName]!"
 flavor_germanics.55.tooltip: "$mission_completed_tooltip_1$ „#Y Die Küste beanspruchen“#!' $mission_completed_tooltip_2$" 
  
 flavor_germanics.56.t: "Suebenknoten" 
 flavor_germanics.56.desc: "Eine der einfachsten Möglichkeiten, einen #E Sueben#! zu identifizieren, ist die Frisur: Ihre Krieger sind dafür bekannt, dass sie ihre Haare an den Seiten des Kopfes zu einem Knoten zusammenbinden – dem sogenannten #E 'Suebenknoten'#! Obwohl unser Volk diesen Knoten traditionell nicht selbst getragen hat, haben die freundschaftlichen Beziehungen zwischen uns und den benachbarten Sueben den Kontakt zwischen unseren Stämmen verstärkt, und immer mehr unserer Stammesangehörigen beginnen, diesen fremdartigen Haarstil zu übernehmen. \n\nObwohl [ROOT.GetCountry.GetRuler.GetName] für sich selbst einen andere Haarschnitt bevorzugt, mit kurzen Haaren vorn und langen, wilden Haaren hinten, muss selbst der [ROOT.GetCountry.GetRulerTitle] zugeben, dass der Suebenknoten beeindruckend ist." 
 flavor_germanics.56.a: "Ich freue mich zu sehen, dass unsere Krieger diesen Stil übernehmen" 
 flavor_germanics.56.tooltip: "$mission_completed_tooltip_1$ „#Y Suebenknoten#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.57.t: "Baltische Häfen" 
 flavor_germanics.57.desc: "Jetzt, da wir Gebiete kontrollieren, die an die Gewässer des #E Oceanus Sarmaticus#! grenzen, ist der Bedarf an einer mächtigen Flotte, die unsere wirtschaftlichen und militärischen Interessen schützen kann, zu einer dringenden Notwendigkeit geworden – ein Weckruf zum Handeln, den [ROOT.GetCountry.GetRuler.GetName] laut und deutlich vernommen hat. \n\nMit einer zuverlässigen Versorgung mit Holz @wood!, das in [ROOT.GetCountry.GetCapital.GetName] gelagert wird, und einer kleinen Armee von Arbeitern, die in unseren neu errichteten Häfen arbeiten, haben sich unsere Landsleute mit ganzer Kraft in den Bau einer Flotte gestürzt." 
 flavor_germanics.57.a: "Wir können nicht ruhen, bis wir eine ordentliche Flotte haben" 
 flavor_germanics.57.tooltip: "$mission_completed_tooltip_1$ „#Y Ostseehäfen#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.58.t: "Ein kostbares Artefakt" 
 flavor_germanics.58.desc: "Obwohl die Menge an Gold, die für den Kauf des #E Suesischen Knoten-Kessels#! erforderlich war, nicht zu verachten war, wusste [ROOT.GetCountry.GetRuler.GetName], nachdem er ihn gesehen und seine feine Handwerkskunst mit [ROOT.GetCountry.GetRuler.GetHerHis]en eigenen Augen bewundert hatte, , dass [ROOT.GetCountry.GetRuler.GetSheHe] bereit sein würde, jeden geforderten Preis zu zahlen, denn noch nie zuvor hatte [ROOT.GetCountry.GetRuler.GetSheHe] ein so großartiges Kunstwerk persönlich bewundert. \n\n[ROOT.GetCountry.GetRuler.GetFirstName] wusste, dass [ROOT.GetCountry.GetRuler.GetHerHis]e [ROOT.GetCountry.GetAdjective]en Landsleute ähnlich empfinden würden, und traf die notwendigen Vorbereitungen, um den Kessel zu erwerben. Die Vermutung des [ROOT.GetCountry.GetRulerTitle]s erwies sich als richtig, denn die Stämme waren von seiner Pracht beeindruckt." 
 flavor_germanics.58.a: "Die Menschen werden weit und breit reisen, um Zeuge dieses Wunders zu werden!" 
 flavor_germanics.58.tooltip: "$mission_completed_tooltip_1$ „#Y Ein kostbares Artefakt#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.59.t: "Eisenabgaben" 
 flavor_germanics.59.desc: "Eine der umstrittensten Entscheidungen, die [ROOT.GetCountry.GetRuler.GetName] jemals getroffen hat, war [ROOT.GetCountry.GetRuler.GetHerHis] Plan , das gesamte Eisen @iron!  [ROOT.GetCountry.GetRuler.GetHerHis]es Volkes zu beschlagnahmen. Trotz lauter Beschwerden und Widerständen aus einigen Teilen der [ROOT.GetCountry.GetAdjective]en-Gesellschaft bestand [ROOT.GetCountry.GetRuler.GetSheHe] darauf, dass es kein Beliebtheitswettbewerb sei, der [ROOT.GetCountry.GetRulerTitle] zu sein. Alles, was für den anhaltenden Erfolg von [ROOT.GetCountry.GetName] notwendig war, würde passieren, auch wenn jeder [ROOT.GetCountry.GetRuler.GetHerHim] dafür hasste. Ja, unsere Stämme förderten Eisen, aber wir brauchten mehr davon, und es musste irgendwoher kommen.\n\nObwohl die Auswirkungen dieser Entscheidung jahrelang für Spannungen sorgen würden, wusste [ROOT.GetCountry.GetRuler.GetFirstName] in [ROOT.GetCountry.GetRuler.GetHerHis]em tiefen Herzen, dass die Abgaben für mindestens eine Generation verstärkt werden würden, und das war gut genug für [ROOT.GetCountry.GetRuler.GetHerHim]." 
 flavor_germanics.59.a: "Begrab deine Verwandten mit Bernsteinwaren und hebe das Eisen für unsere Armee auf" 
 flavor_germanics.59.tooltip: "$mission_completed_tooltip_1$ „#Y Eisenabgaben#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.60.t: "Bernsteinstraße" 
 flavor_germanics.60.desc: "Einmal fragte [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis]en #E Stammesrat#!, was mit dem Bernstein @amber! passiert ist, der an die #E keltischen Händler#! verkauft wurde, die auf den Märkten in [ROOT.GetCountry.GetCapital.GetName] waren, und [ROOT.GetCountry.GetRuler.GetSheHe] konnte die Antwort nicht glauben.\n\nEs wurde berichtet, dass die Kelten weit in den Süden reisen würden und Länder besuchten, die noch nie jemand in [ROOT.GetCountry.GetName] gesehen oder sich vorgestellt hatte, wo sie Händler trafen, die unverständliche Sprachen sprachen. Unser kostbarer Bernstein würde dann gegen Gewürze @spices! eingetauscht werden oder seltene Güter wie Elfenbein @elephants!, oder vielleicht sogar gegen Edelsteine @gems! eingetauscht, obwohl bekannt war, dass Gold und Silber @precious_metals! sehr begehrt waren.\n\nnDas allein war schon schwer zu glauben, aber der nächste Teil verblüffte [ROOT.GetCountry.GetRuler.GetFirstName] noch mehr: Unser Bernstein wurde auf Schiffe verladen und über das Wasser transportiert, wo die reichen Ladungen in Tausenden von Kilometern entfernten Hafenstädten entladen wurden." 
 flavor_germanics.60.a: "Die Welt ist wirklich ein mysteriöser Ort ..." 
 flavor_germanics.60.tooltip: "$mission_completed_tooltip_1$ „#Y Bernsteinstraße#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.61.t: "Roggenanbau" 
 flavor_germanics.61.desc: "Unsere Brüder sind Jäger und Krieger, die ihresgleichen suchen, wenn es darum geht, Hirsche @wild_game! in den Wäldern zu jagen, und unsere Verwandten wissen, wo sie Beeren @dates! und Früchte @fruits! in den wilden Wäldern sammeln können – unsere Ernährung ist reichhaltig und abwechslungsreich und kann unsere hungrige Bevölkerung ernähren. \n\nUnd obwohl [ROOT.GetCountry.GetRuler.GetName] gebratenes Fleisch allem anderen vorzieht, freut sich der [ROOT.GetCountry.GetRulerTitle], dass die Stämme immer mehr Roggen @grain! auf den von uns gerodeten Feldern anbauen. Brot ist eines unserer Grundnahrungsmittel, und unsere geschickten Bauern wissen sogar, wie man das Getreide fermentiert und berauschende Getränke herstellt, die bei den Menschen in [ROOT.GetCountry.GetCapital.GetName] sehr beliebt sind.)" 
 flavor_germanics.61.a: "Brot, Bier und Fleisch... was will man mehr?" 
 flavor_germanics.61.tooltip: "$mission_completed_tooltip_1$ „#Y Roggenanbau#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.62.t: "Kimbrische Beziehungen"
 flavor_germanics.62.desc: "Anstatt Krieg gegen jeden Stamm zu führen, der um uns herum lebt, hat [ROOT.GetCountry.GetRuler.GetName] beschlossen, freundschaftliche Beziehungen zu einigen unserer Nachbarn zu pflegen, in der Hoffnung, neue Möglichkeiten für die Menschen in [ROOT.GetCountry.GetName] zu erschließen – ein Experiment, das sich bisher als voller Erfolg erwiesen hat. \n\nUnsere Kontakte zu den #E Scandiern#! haben dazu geführt, dass einige der Nordländer nach [ROOT.GetCountry.GetCapital.GetName] ausgewandert sind, in der Hoffnung, mit unseren Landsleuten zusammenleben zu können. Unser Ruf als aufstrebende Macht hat viele angezogen, die ihr Schicksal mit unserem verbinden möchten – eine Neuerung, die [ROOT.GetCountry.GetRuler.GetFirstName] begrüßt hat." 
 flavor_germanics.62.a: "Alle, die unsere Wege übernehmen möchten, sind herzlich willkommen, hier zu leben" 
 flavor_germanics.62.tooltip: "$mission_completed_tooltip_1$ „#Y Kimbrische Beziehungen#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.63.t: "Ostseeküste"
 flavor_germanics.63.desc: "Da die Seemacht der [ROOT.GetCountry.GetAdjective]en Stämme von Jahr zu Jahr wächst, hat der ehrgeizige [ROOT.GetCountry.GetRuler.GetName] bekannt gegeben, dass die Schiffe von [ROOT.GetCountry.GetName] nicht zögern würden, unsere Truppen an ferne Küsten zu befördern – überall, wo wir hinkommen können, ist für unsere Plünderer ein lohnendes Ziel. Schon jetzt hat sich in [GetProvince('(int32)4752').GetName] eine neu aufgebaute Flotte versammelt, um sich auf Abenteuer in Übersee vorzubereiten." 
 flavor_germanics.63.a: "Wir werden zu Lande und zu Wasser angreifen!" 
 flavor_germanics.63.tooltip: "$mission_completed_tooltip_1$ „#Y Ostseeküste#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.64.t: "Das Land der Götter" 
 flavor_germanics.64.desc: "In den letzten Monaten hat unsere Flotte eine Kampfpause eingelegt und sich auf Erkundungsmission begeben, um unsere Stammesangehörigen in fremde Länder zu bringen, aber nicht auf der Suche nach ruhmreichen Schlachten. Als eine seltene Unterbrechung der Feindseligkeiten unseren Stämmen eine kurze Gelegenheit bot, nach Norden zu segeln, in der Hoffnung, das gerüchteumwobene #E Land der Götter#! zu finden, wusste [ROOT.GetCountry.GetRuler.GetName], dass [ROOT.GetCountry.GetRuler.GetSheHe] es bereuen würde, diese Gelegenheit zu verpassen, und gab den Befehl, mit der Erkundung zu beginnen. \n\nUnsere Expedition enttäuschte uns nicht; unsere unerschrockenen Entdecker behaupten, dass sie ein Land entdeckt haben, in dem die Sonne den ganzen Tag über tief am Himmel steht und kaum unter dem Horizont untergeht, bevor sie wieder aufgeht. In diesem Reich des unsterblichen Lichts, in dem seltsame Ruinen die Landschaft übersäten, war die Gegenwart der Götter zu spüren, und unsere Männer schwören, dass eine Aura des Glücks sie umgab und sie während ihrer Erkundungen beschützte." 
 flavor_germanics.64.a: "Es fühlt sich an, als hätten Sie diese kraftvolle Energie mit nach Hause gebracht – gut gemacht"
 flavor_germanics.64.tooltip: "$mission_completed_tooltip_1$ „#Y Das Land der Götter#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.65.t: "Steinkreise" 
 flavor_germanics.65.desc: "Die Anwesenheit von Fremden, die unter den Stämmen von [ROOT.GetCountry.GetName] leben, ist heutzutage ein Anblick, der kaum der Erwähnung wert ist, denn viele Fremde haben ihre strohgedeckten Hütten und Siedlungen innerhalb unserer Grenzen gebaut – etwas, das [ROOT.GetCountry.GetRuler.GetName] gefördert hat. Diese Neuankömmlinge haben ihre Traditionen und kulturellen Praktiken mitgebracht, und es ist nicht ungewöhnlich, von ihnen errichtete Denkmäler wie ihre #E Steinkreise#!, auf dem Land zu sehen.\n\nWährend dies vor ein paar Generationen noch undenkbar gewesen wäre, zuckt heute niemand mehr mit der Wimper." 
 flavor_germanics.65.a: "Mit dem Fortschreiten der Zeit kommen auch Veränderungen"
 flavor_germanics.65.tooltip: "$mission_completed_tooltip_1$ „#Y Steinkreise#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.66.t: "Gothiscandia" 
 flavor_germanics.66.desc: "Von den bescheidensten Anfängen an ist unser Volk schnell zu schwindelerregenden Höhen der Macht aufgestiegen; unsere siegreichen Truppen haben Länder erobert, die nur unsere Vorfahren kannten, und wir haben die Zungen derjenigen zum Schweigen gebracht, die sich unseren Plänen widersetzen. Schon jetzt umfassen unsere Grenzen weit entfernte Gebiete, die weit von unserer traditionellen Heimat entfernt sind; ein Beweis für die dynamische Führung von [ROOT.GetCountry.GetRuler.GetName], der uns von Sieg zu Sieg getragen hat.\n\nAls der ehrgeizige [ROOT.GetCountry.GetRulerTitle] beschloss, dass unsere Stämme mit einem neuen Namen gefeiert werden sollten, der unseren neu gewonnenen Status in der Welt widerspiegelte, stieß diese Erklärung bei den Stämmen auf nahezu einhellige Zustimmung." 
 flavor_germanics.66.a: "Alle grüßen #E Gothiscandia#! und den [ROOT.GetCountry.GetRuler.GetFamily.GetName]-Clan!"
 flavor_germanics.66.tooltip: "$mission_completed_tooltip_1$ „#Y Gothiscandia#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.67.t: "Migration nach Osten" 
 flavor_germanics.67.desc: "Obwohl die Grenzen von [ROOT.GetCountry.GetName] derzeit größer sind als je zuvor, hat der intrigante [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis]en Blick nach Osten gelenkt, wo die nicht beanspruchten Gebiete nach [ROOT.GetCountry.GetAdjective]en Siedlern schreien.\n\nUm die Zukunft unserer Stämme zu sichern, hat der [ROOT.GetCountry.GetRulerTitle] bekannt gegeben, dass wir unser Volk nach Osten schicken werden."
 flavor_germanics.67.a: "Mögen die Götter mit dir in deine neue Heimat gehen" 
 flavor_germanics.67.tooltip: "$mission_completed_tooltip_1$ „#Y Migration nach Osten#!'“ $mission_completed_tooltip_2$" 
  
 flavor_germanics.68.t: "Zu den Alpen" 
 flavor_germanics.68.desc: "Zwar gibt es einige Einwohner von [ROOT.GetCountry.GetName], die sich wünschten, dass unsere Stämme nach Osten ziehen, doch die endgültigen Entscheidungen werden von [ROOT.GetCountry.GetRuler.GetName] getroffen, und es wurde bekannt gegeben, dass wir stattdessen nach Süden ziehen würden. \n\nDie Bergkette, die die Einheimischen #E „Alpen“#! nennen, hat das Interesse von [ROOT.GetCountry.GetRulerTitle] geweckt. Die Pässe, die in das felsige Hochland hinein- und aus ihm herausführen, sind leicht zu verteidigen, und es gibt viele reiche Länder in #E Italia#!, die sich hervorragend für Raubzüge eignen würden." 
 flavor_germanics.68.a: "Ich habe die richtige Entscheidung getroffen... in die Alpen und darüber hinaus!" 
 flavor_germanics.68.tooltip: "$mission_completed_tooltip_1$ „#Y Zu den Alpen#!'“ $mission_completed_tooltip_2$"
  
 flavor_germanics.69.t: "Zum Schwarzen Meer" 
 flavor_germanics.69.desc: "Bestärkt durch unseren Erfolg im #E Oceanus Sarmaticus#!, hat der mächtige [ROOT.GetCountry.GetRuler.GetName] unsere #E Stammesältesten#! darüber informiert, dass unser Volk nach Osten ziehen wird, in der Hoffnung, Gebiete an der Küste des #E Pontus Euxinus#! zu erobern. Unsere Verwandten sind geschickte Seeleute geworden, und [ROOT.GetCountry.GetRuler.GetFirstName] hat aus erster Hand gesehen, welche Sklaven und Plünderungen unsere Krieger aus dem Ausland mitgebracht haben.  Es gibt viele reiche #E griechische#! Kolonien im Pontus Euxinus, und der [ROOT.GetCountry.GetAdjective]e [ROOT.GetCountry.GetRulerTitle] kann es kaum erwarten, unsere Plünderer auf die ahnenlosen Stadtbewohner loszulassen." 
 flavor_germanics.69.a: "Eines Tages werde ich den gesamten Pontus Euxinus kontrollieren!" 
 flavor_germanics.69.tooltip: "$mission_completed_tooltip_1$ „#Y Zum Schwarzen Meer#!'“ $mission_completed_tooltip_2$" 

 flavor_germanics.900.t: "Rückgewinnung des Heimatlandes" 
 flavor_germanics.900.desc: "Vor Generationen gelang unserem Volk das Undenkbare: Es reiste um die halbe Welt, durch Schneedecken, Walddickichte, ein weites Meer von Ebenen, raue Wüsten und die höchsten Berge, die die Welt zu bieten hatte, und vollbrachte so eine legendäre Wanderung, die ihresgleichen sucht. Doch nachdem sie sich an das angenehmste Klima des Subkontinents gewöhnt hatten, in seinen fruchtbaren Ländern Wohlstand erreichten und unvorstellbare Reichtümer erlangten, sehnten sich viele unserer Leute immer noch nach der Heimat und den Zurückgebliebenen, ein klaffendes Loch in ihren Herzen, das durch Reichtum und Abenteuer nicht geschlossen wurde.\n\nDeshalb beschlossen wir, die ebenso unvorstellbare Rückreise anzutreten, und obwohl sie unglaublich lang, kostspielig und schwierig war, ist es uns gelungen, das zurückzugewinnen, was einst uns gehörte, und uns mit unseren verlorenen Verwandten wieder zu vereinen. Der aus den Narben der Trennung zwischen Ost und West entstandene Weg zur Versöhnung wird eine Herausforderung sein, aber wir stehen jetzt als geeintes Germania zusammen und sind bereit, uns allen Herausforderungen direkt und ohne Zögern zu stellen. \n\nWährend unserer Abwesenheit haben wir eine Vielzahl orientalischer Techniken erlernt und uns an unsere exotischen Tierbegleiter gewöhnt, die wir mitgebracht haben. Sollten wir versuchen, diese großartigen Lasttiere hier zu züchten und sie auf diesem Kontinent einzuführen, oder kehren wir zu den traditionellen Methoden zurück?" 
 flavor_germanics.900.a: "Es wird Elefanten in Europa geben!"
 flavor_germanics.900.b: "Wir müssen zu unseren Traditionen zurückkehren."
  
 flavor_germanics.901.t: "Eine Rückreise?" 
 flavor_germanics.901.desc: "Vor Generationen vollbrachten Stämme aus Germanien das Undenkbare, indem sie durch Schneedecken, Walddickichte, ein weites Meer von Ebenen, raue Wüsten und die höchsten Berge, die die Welt zu bieten hatte, um die halbe Welt reisten und so eine legendäre Wanderung vollbrachten, die ihresgleichen sucht. Doch nachdem sie sich an das angenehmste Klima des Subkontinents gewöhnt hatten, in seinen fruchtbaren Ländern Wohlstand erreichten und unvorstellbare Reichtümer erlangten, sehnten sich viele von ihnen immer noch nach der Heimat und den Zurückgebliebenen, ein klaffendes Loch in ihren Herzen, das durch Reichtum und Abenteuer nicht geschlossen wurde.\n\nDeshalb beschloss eine Gruppe Indogermanen trotz aller Widrigkeiten, die ebenso unvorstellbare Rückreise nach Hause anzutreten, und obwohl es unglaublich langwierig, kostspielig und schwierig war, ist es ihnen offenbar gelungen, das zurückzugewinnen, was einst ihnen gehörte, und sich mit ihren verlorenen Verwandten wieder zu vereinen. Geboren aus den Narben der Trennung zwischen Ost und West, wird der vor uns liegende Weg zur Versöhnung eine Herausforderung sein, aber jetzt stehen sie als geeintes Germania zusammen und sind bereit, sich allen Herausforderungen direkt zu stellen. Nur die Zeit wird zeigen, was aus dieser eigenartigen Entwicklung wird."
 flavor_germanics.901.a: "Das hätte ich nie gedacht..." 
 flavor_germanics.901.b: "Ein perfekter Verbündeter!" 
 flavor_germanics.901.c: "Gut für unsere Cousins!" 
 flavor_germanics.901.d: "Zeit, nach Ägypten zu fliehen!" 
 has_indo_germanic_culture_tooltip: "Diese Option ist aufgrund der #Y indogermanischen#! Primärkultur unseres Landes verfügbar." 
 igk_gee_has_belgae_culture_tooltip: "Diese Option ist verfügbar, da die Primärkultur unseres Landes zur #Y Belgischen#! Kulturgruppe gehört." 
