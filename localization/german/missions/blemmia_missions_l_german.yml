l_german:
  
 blemmia_missions: "Aufstieg der Roten Länder" #NT!
 blemmia_missions_DESCRIPTION: "Die Blemmyan-Stämme, umhüllt von Mythen, Mysterien und Missverständnissen, waren immer nur eine lose versammelte Räuberbande. Doch hinter jedem Überfall steckte ein Zweck. Jenseits der Ufer des Nils, weit in die Hügel und Klippen der Wüste hinein, konsolidierte sich ein aufstrebender Staat von Blemmyan-Beja-Stämmen unter einer königlichen Linie aus Großkönigen, die über gewöhnliche Könige und unter ihnen Stammeshäuptlinge herrschten. Da die Blemmyae die Insel Philae und die kulturellen/religiösen Zentren Oberägyptens im Visier haben, werden sie zu großen Herausforderern der Großmächte am Nil." #NT!
 blemmia_missions_CRITERIA_DESCRIPTION: "Diese Mission wird abgeschlossen sein, wenn die Blemmyan-Stämme die libyschen Wüsten und den mittleren Nilabschnitt kontrollieren." #NT!
 blemmia_missions_BUTTON_TOOLTIP: "Erhebe dich vom roten Boden!" #NT!
 blemmia_missions_BUTTON_DETAILS: ""
  
   #Missions 
  
 blemmia_missions_task_1: "Adabulische Verpflichtungen" #NT!
 blemmia_missions_task_1_DESC: "Die Adabulianer werden gemeinhin als Unterstamm der größeren Blemmyan-Gruppe betrachtet und müssen bezüglich ihrer Integration in unser föderiertes System halbnomadischer Völker angesprochen werden." #NT!
 blemmia_missions_task_1_tt: "Alle Charaktere, die ein #E Amt#! innehaben, müssen #E Loyalität#! größer als #Y 65#! haben." #NT!
  
 blemmia_missions_task_2: "Politische Schichtung" #NT!
 blemmia_missions_task_2_DESC: "Um ein solch riesiges Reich bestmöglich zu regieren, haben sich die älteren und wohlhabenderen Blemmyan-Familien für die Einführung eines dreigliedrigen Systems entschieden, das die Regierungshierarchie in Stammeshäuptlinge, Clanherren und den großen Häuptling aufteilt." #NT!
  
 blemmia_missions_task_3: "Mons Smaragdus" #NT!
 blemmia_missions_task_3_DESC: "None" #NT!
 blemmia_missions_task_3_tt: "#Y Blemmia#! hat die #Y Kulturentscheidung#! namens #Y geschützte Landrechte#! für die Kultur #Y Blemmyan#! erlassen." #NT!
  
 blemmia_missions_task_4: "Blemmyan Gold" #NT!
 blemmia_missions_task_4_DESC: "Um die wachsende Blemmyan-Föderation voranzutreiben und ihre Souveränität gegenüber Leuten wie den Ptolemäern und den Königen von Kusch zu sichern, muss Wirtschaftswachstum durch Goldabbau erreicht werden." #NT!
  
 blemmia_missions_task_5: "Erinnern Sie sich an den Medjay" #NT!
 blemmia_missions_task_5_DESC: "Viele ägyptische Adlige und Städte nutzen Blemmyans als Polizisten und erinnern damit an die alten Zeiten, als viele unserer Art als Medjay bekannt waren. Diese Krieger sollten unsere Dörfer und unser Volk beschützen!" #NT!
 blemmia_missions_task_5_tt1: "#Y Blemmia#! hat die #Y Kulturentscheidung#! namens #Y Ease Restrictions on Citizenship#! für die Kultur #Y Blemmyan#! erlassen." #NT!
 blemmia_missions_task_5_tt2: "#E Blemmyan#! Medjay-Krieger, die in den hervorgehobenen #E Territorien#! von #Y Dodekaschoinos#! und #Y Ägypten#! leben, werden #G migrieren#! nach #Y Blemmias#! #E Hauptstadt#!." #NT!
  
 blemmia_missions_task_6: "Verbindungen zu den Megabaroi" #NT!
 blemmia_missions_task_6_DESC: "Die Megabaroi werden oft als Verwandte der Blemmyaner angesehen und haben gelernt, an den nubischen Ufern des Nils zu kultivieren und zu gedeihen. Sie müssen an ihre Bindungen zu unseren Stämmen erinnert werden." #NT!
  
 blemmia_missions_task_7: "Segmentierte Regel" #NT!
 blemmia_missions_task_7_DESC: "Die Blemmyaner sind ein mobiles Volk, und um große Landmengen kontrollieren zu können, müssen die Herrscher über viele politisch stabile Kontrollpunkte verfügen, zwischen denen sie hin- und herpendeln können, genau wie Hirten, die auswandern, um den Regenmustern zu folgen." #NT!
  
 blemmia_missions_task_8: "Die Allgoldene Stadt" #NT!
 blemmia_missions_task_8_DESC: "Berenike Panchrysos ist ein Zeugnis des blemmianischen Volkes, seiner Macht und seiner politischen Stabilität. Nutzen Sie seine Goldreserven, um seinem Namensgeber gerecht zu werden und einen Zufluchtsort in der Wüste zu errichten." #NT!
  
 blemmia_missions_task_9: "Der Smaragdhandel" #NT!
 blemmia_missions_task_9_DESC: "Da die Olivinminen in Betrieb sind, müssen die Blemmyaner diesen Segen bestmöglich nutzen, um reiche Handelsrouten zu errichten und unser karges Land zu bereichern." #NT!
 blemmia_missions_task_9_tt: "#Y Blemmia#! wird #E die Provinz #Y Ichthyophagia#! kolonisieren#! und ihre Handelslandroute mit dem Hafen von #Y Adouli#! verbinden." #NT!
  
 blemmia_missions_task_10: "Rote Landnetzwerke" #NT!
 blemmia_missions_task_10_DESC: "Östlich des Nils können nur wenige Völker getrost durch die Dünen, die kargen Meerengen und die leeren Felder des Roten Landes, das zwischen Fluss und Meer liegt, reisen. Mithilfe von Kamelen, wohlerzogenen Pferden und den Tricks der Nomaden werden die Blemmyaner diese leeren Wüsten in Handelsstraßen und kulturelle Einflussstraßen verwandeln." #NT!
  
 blemmia_missions_task_11: "Tabot-Workshops" #NT!
 blemmia_missions_task_11_DESC: "Auf dem Land der Adabuli liegt der Standort Tabot ungenutzt und ist mit den vielen Edelsteinminen in den nahegelegenen Hügeln ein perfekter Ort für die Herstellung großer Luxusgüter für den Export. Die Menschen sollten in das Land vordringen und diesen verlassenen Ort in ein Handelszentrum verwandeln." #NT!
  
 blemmia_missions_task_12: "Kopflose Männer" #NT!
 blemmia_missions_task_12_DESC: "Diejenigen aus fernen Ländern wissen nichts über das wahre Volk der Blemmyan und verwechseln die Wüstenbewohner mit monströsen, kopflosen Männern, die Gesichter auf der Brust tragen. Lassen Sie die Stämme dieses Missverständnis ausnutzen, um unseren Feinden Angst zu machen und die wahre Schönheit des Landes zu verschleiern." #NT!
 blemmia_missions_task_12_tt1: "#Y Blemmia#! wird ein Wiederaufleben von Mythen, Gerüchten und Berichten über die kopflosen #Y Blemmyes#! erleben, die #G Glück#! oder #R Untergang#! für die Stämme bedeuten könnten." #NT!
 blemmia_missions_task_12_tt2: "Mit #R Horden#! kopflosen #Y Blemmyes#!, die jetzt im Sand umherstreifen, um von den #Y Blemmyans#! provoziert zu werden, sind die #T Wüsten#! von Libyen #R gefährlicher#! geworden." #NT!
  
 blemmia_missions_task_13: "Die Trogodyten" #NT!
 blemmia_missions_task_13_DESC: "Die Trogodyten, ein Stamm der Blemmyaner, sind ein weiteres verwirrtes Volk. Aufgrund der Komplexität ihrer Sprache und ihres isolierten Verhaltens wurden sie in den Augen von Ausländern zu einfachen Höhlenbewohnern degradiert. Lassen Sie ihr wahres Potenzial und ihre Kampftechniken nutzen, um bei den Ägyptern und Kuschiten Ehrfurcht zu wecken." #NT!
 blemmia_missions_task_13_tt: "#Y Blemmia#! hat eine #E Kriegsgottheit#! in seinem #T Pantheon#!, besitzt die #T heilige Stätte#! dieser Gottheit und hat #E das #T Omen#! dieser Gottheit aktiviert#!." #NT!
  
 blemmia_missions_task_14: "Überfall auf Dodekaschoinos" #NT!
 blemmia_missions_task_14_DESC: "Die zwanzig Städte entlang des mittleren Nilabschnitts, der zur Insel Philae führt, zeichneten sich schon immer als wohlhabend und reich an Vieh, Getreide, Sklaven und Reichtümern aus. Blemmyan-Spione haben berichtet, dass die Eroberung der sogenannten Final Island selbst wegen des Reichtums ihres Tempelkomplexes von Nutzen war." #NT!
  
 blemmia_missions_task_15: "Das Blemmyan-Königreich" #NT!
 blemmia_missions_task_15_DESC: "Das Blemmyan-Reich ist kein einfaches Hirtenvolk mehr, sondern hat eine königliche Familie ausgewählt, um das Volk als großer König aller Stämme voranzubringen." #NT!
  
 blemmia_missions_task_16: "Berenike kontrollieren" #NT!
 blemmia_missions_task_16_DESC: "Berenike auf dem Meer erhellt das Land wie ein Leuchtfeuer des Wohlstands, den Hauptknotenpunkt der Kommunikation und des Handels zwischen der Wüste und der riesigen Welt außerhalb der Reichweite der Blemmyaner. Es muss investiert werden, damit die Menschen den Luxus und die Vorteile der Schöpfung der Welt genießen können." #NT!
 blemmia_missions_task_16_tt: "#Y Blemmia#! hat eine #E Armee#! mit einem #E Kommandanten#! und mindestens #Y 10 Einheiten#!." #NT!
  
 blemmia_missions_task_17: "Der Kamelhandel" #NT!
 blemmia_missions_task_17_DESC: "Auf und ab des Nils sind die Kamele aus den Wüsten jenseits des Meeres zum Synonym für Handel und Reisen geworden, da sie schneller sind und länger überleben als das typische Pferd. Für die Händler, die immer noch nach diesen Lasttieren verlangen, sollten die Blemmyan-Stämme eine stetige Versorgung gewährleisten." #NT!
  
 blemmia_missions_task_18: "Blemmyan-Sklavenhandel" #NT!
 blemmia_missions_task_18_DESC: "Aufgrund der vielen Überfälle, die die Stammesbanden durchgeführt haben, haben wir viele überschüssige Sklaven, die wir an Händler von der anderen Seite des Meeres abgeben können. Die Märkte der Nabatäer sollten sich als profitabel erweisen." #NT!
 blemmia_missions_task_18_tt1: "Ein #T Araber#! oder #T Jemenit#! kultivierter #E Land#! muss eine #E Meinung#! von #Y Blemmia#! höher als #T 50#! haben. #Y Blemmias Herrscher#! muss #!4 Freunde#! mit ihrem #E Herrscher#! sein." #NT!
 blemmia_missions_task_18_tt2: "#Y Herrscher#! hat einen #T Besitz#! mit mindestens #Y 10 Sklaven#! und entweder ein #T Sklavenanwesen#! Gebäude oder ein #T Mühlen#! Gebäude." #NT!
 blemmia_missions_task_18_tt3: "#Y Blemmia#! hat mindestens #Y 1#! Kultur mit #T Sklavenrechten#!." #NT!
  
 blemmia_missions_task_19: "Überfall auf Theben" #NT!
 blemmia_missions_task_19_DESC: "Als Tyrann des Nordens haben die Ägypter schon immer die Blemmyan-Gebiete bedroht und überfallen. Um unseren Wohlstand zu sichern und einen Teil des reichen Nils zu beanspruchen, sollten die Krieger der Blemmyaner den Kampf in ihr Kernland führen." #NT!
  
 blemmia_missions_task_20: "Anbetung von Mandulis" #NT!
 blemmia_missions_task_20_DESC: "Mandulis, der Gott der Sonne, steht dem weiten Pantheon vor, das die Blemmyaner verehren. Für seine Tempel entlang des Nils ist es unsere Pflicht, sie unter unserer eigenen Herrschaft zu pflegen und zu erhalten." #NT!
 blemmia_missions_task_20_tt: "#Y Mandulis'#! #T heilige Stätte#! befindet sich in #T Talmes#!." #NT!
  
 blemmia_missions_task_21: "Die letzte Insel" #NT!
 blemmia_missions_task_21_DESC: "Philae, die heilige Insel der Isis und der Götter des Nils, muss zur kulturellen Hauptstadt der Blemmyaner werden, um eine dauerhafte Geschichte und Glaubenserziehung unter den Stämmen zu etablieren." #NT!
 blemmia_missions_task_21_tt: "#Y Blemmia#! hat #E integrierte#! eine #E Kultur#! aus den Kulturgruppen #T Aksumite#!, #T Nubier#! und #T Ägypter#!." #NT!
  
 blemmia_missions_task_22: "Den Mittleren Nil beherrschen" #NT!
 blemmia_missions_task_22_DESC: "Bis über die Wüste hinaus müssen die Blemmyaner den fruchtbaren Boden des Nils pflügen und unser Königreich wachsen lassen, bevor es langsam in Vergessenheit gerät." #NT!
  
 blemmia_missions_task_23: "Die Goldene Regel" #NT!
 blemmia_missions_task_23_DESC: "Omboi ist als „Land des Goldes“ bekannt und entspricht dem Reichtum von Luxor und den anderen großen Städten des pharaonischen Oberägyptens. Die Blemmyaner haben das Potenzial, den Reichtum der Region wiederherzustellen und sie in eine große Metropole des Wohlstands zu verwandeln, die das Wachstum in der Wüste ankurbelt." #NT!
  
 blemmia_missions_task_24: "Ein Blemmyan-Imperium" #NT!
 blemmia_missions_task_24_DESC: "Um sowohl das schwarze als auch das rote Land Libyen zu beherrschen, müssen die Blemmyaner alle Großmächte des Landes unterwerfen und einen großen Volksstaat bilden." #NT!
  
  
  
   #Tooltips 
  
  
  
   #Modifiers 
  
 blemmyan_red_cities: "Rote Städte" #NT!
 desc_blemmyan_red_cities: "In den roten Ländern östlich des Nils braut sich ein Sturm zusammen, und aus dem Sand erheben sich große Städte, die von den Blemmyan-Stämmen gegründet wurden." #NT!
  
 blemmyan_negotiations: "Blemmyan-Verhandlungen" #NT!
 desc_blemmyan_negotiations: "Durch die Integration der verwandten Blemmyan-Stämme haben die Häuptlinge gelernt, wie sie Konflikte am besten lösen und Freundschaften schließen können." #NT!
  
 blemmyan_gold_mining: "Blemmyan Goldbergbau" #NT!
 desc_blemmyan_gold_mining: "Die goldenen Hügel und Klippen der Wüste östlich des Nils enthalten scheinbar unbegrenzte Goldadern." #NT!
  
 segmented_blemmyan_capitals: "Segmentierte Hauptstädte" #NT!
 desc_segmented_blemmyan_capitals: "Durch die Aufteilung der Verwaltung des Blemmyan-Staates auf mehrere saisonale Hauptstädte wird die Bürokratie flexibler und die Blemmyan-Bauherren erfahrener." #NT!
  
 blemmyan_all_golden_city: "Die Allgoldene Stadt" #NT!
 desc_blemmyan_all_golden_city: "Berenike Panchrysos strahlt wie ein Juwel in der Wüste und sticht unter allen Städten hervor, indem es den Status und den Respekt seiner Bevölkerung und seines Herrschers erhöht." #NT!
  
 blemmyan_mine_construction: "Bau der Blemmyan-Mine" #NT!
 desc_blemmyan_mine_construction: "Die robusten Blemmyan-Arbeiter haben sich regelmäßig daran gewöhnt, neue Minenschächte und Ausrüstung herzustellen." #NT!
  
 medjay_training: "Medjay-Training" #NT!
 desc_medjay_training: "Die aus ägyptischen Ländern zurückgekehrten Medjay-Polizisten haben den Blemmyan-Kriegern fremde und anspruchsvolle Kampfbräuche beigebracht und so ihre Wirkung im Kampf verstärkt." #NT!
  
 blemmyan_emerald_mining: "Blemmyan Smaragdminen" #NT!
 desc_blemmyan_emerald_mining: "Die Olivin-Edelsteine ​​von Mons Smaragdus sind heute eine tragende Säule der Wirtschaft des Bundesstaates Blemmayan." #NT!
  
 red_lands_trade: "Roter Landhandel" #NT!
 desc_red_lands_trade: "Robuste Handelsrouten in den Wüsten östlich des Nils haben einen reichen Zufluchtsort für Händler geschaffen." #NT!
  
 tabot_workshops: "Die Tabot-Workshops" #NT!
 desc_tabot_workshops: "Die Handwerker von Tabot produzieren Luxusartikel in einem Tempo, das auf dem libyschen Kontinent beispiellos ist." #NT!
  
 headless_men_rumors: "Kopflose Männer" #NT!
 desc_headless_men_rumors: "Andere Völker haben Angst vor dem Land der Blemmyes, kopflosen Monstrositäten." #NT!
  
 trogodyte_speed: "Trogodytengeschwindigkeit" #NT!
 desc_trogodyte_speed: "Dank der Ausbildung der Trogodyten bewegen sich die Armeen der Blemmyaner blitzschnell." #NT!
  
 subjugating_berenike: "Berenike unterwerfen" #NT!
 desc_subjugating_berenike: "Die leichte Belagerung und politische Dominanz der Küstenhafenstadt Berenike hat den Blemmyan-Streitkräften und -Anführern viel über aggressive Verhandlungen beigebracht." #NT!
  
 blemmyan_caravans: "Blemmyan Caravans" #NT!
 desc_blemmyan_caravans: "Der Ausbau der Kamelnetzwerke hat die Roten Länder vernetzter und wohlhabender gemacht und die Wirtschaft und Infrastruktur von Blemmyan gestärkt." #NT!
  
 blemmyan_dromedary_cavalry: "Blemmyan-Dromedar-Kavallerie" #NT!
 desc_blemmyan_dromedary_cavalry: "Die Zusammenarbeit mit Kamelzüchtern und die Verbreitung von Kamelen selbst haben zu einer Massenkompetenz im Einsatz von Kamelen für die Kriegsführung geführt." #NT!
  
 blemmyan_slave_trade: "Blemmyan-Sklavenhandel" #NT!
 desc_blemmyan_slave_trade: "Der Sklavenhandel über das Meer mit den arabischen Völkern ist für die Blemmyaner zu einem Segen geworden." #NT!
  
 blemmyan_golden_rule: "Goldene Blemmyan-Regel" #NT!
 desc_blemmyan_golden_rule: "Die Bürger von Omboi haben in den Goldhandel investiert und profitieren davon." #NT!
  
 mandulis_worship: "Anbetung von Mandulis" #NT!
 desc_mandulis_worship: "Die Verehrung des allsehenden Sonnengottes Mandulis hat den Menschen Wohlstand und Klarheit gebracht." #NT!
  
 mandulis_effect: "Der Mandulis-Effekt" #NT!
 desc_mandulis_effect: "Die zentrale Verehrung von Mandulis hat zu einer Zentralisierung des Volkes und einer großen Unterstützung des Königshauses, das den Gott verehrt, geführt." #NT!
  
 philae_expansion: "Philae-Erweiterung" #NT!
 desc_philae_expansion: "Investitionen in die Insel Philae und ihren Tempelkomplex haben zu einem wohlhabenden Ort am Nil geführt." #NT!
  
 blemmyan_aswan: "Blemmyan Assuan" #NT!
 desc_blemmyan_aswan: "Die Rolle der Blemmyan im Raum Assuan am Nil hat zu einem Wachstum in den vielen Städten am großen Fluss geführt." #NT!
  
 troglodytica_uprising: "Troglodytica-Aufstand" #NT!
 desc_troglodytica_uprising: "Die Blemmyaner haben in einer der an das Rote Meer angrenzenden Regionen einen Aufstand erzwungen." #NT!
  
 blemmyan_sub_capital: "Blemmyan-Unterhauptstadt" #NT!
 desc_blemmyan_sub_capital: "Die Blemmyaner regieren über eine Reihe kleinerer Hauptstädte im gesamten Reich." #NT!
  
 emerald_port: "Smaragdhafen" #NT!
 desc_emerald_port: "Ptolemais Theron hat sich zu einer wichtigen Exportstation für die Blemmyan-Smaragdversorgung entwickelt, einem grünen Leuchtfeuer des Reichtums an der Küste der Roten Länder." #NT!
  
 red_roads: "Rote Straßen" #NT!
 desc_red_roads: "Die Verbreitung einfacher, von Pferden ausgetretener Straßen in den roten Ländern hat den Bauherren mehr Erfahrung beim Aufbau weiterer Handelsnetzwerke verschafft." #NT!
  
 gems_for_tabot: "Edelsteine ​​für Tabot" #NT!
 desc_gems_for_tabot: "Die Minen von Sinkat versorgen die Produktionszentren innerhalb der Mauern von Tabot mit Energie." #NT!
  
  
  
   #Events 
 me_blemmia_1_title: "Hinzufügen der Adulier" #NT!
 me_blemmia_1_desc: "Nach einem Treffen mit dem Adulian-Rat konnten die Blemmyaner ein gemeinsames Erbe beweisen und sich für die Integration der Adulianer in die größere Blemmyan-Gesellschaft einsetzen. Allerdings haben viele adulische Älteste Angst davor, ihre Autonomie aufzugeben und Teil eines größeren Ganzen zu werden. Wie sollen die Blemmyans dieses Dilemma lösen?" #NT!
 me_blemmia_1.a: "Stellen Sie Mittel zur Verfügung, um ihre Bedenken auszuräumen." #NT!
 me_blemmia_1.b: "Senden Sie Krieger, um den Übergang zu unterstützen." #NT!
 me_blemmia_1.c: "Sie wissen, dass wir den größten Einfluss haben." #NT!
  
 me_blemmia_2_title: "Könige, Häuptlinge und Lords" #NT!
 me_blemmia_2_desc: "Um ein expandierendes und mobiles Blemmya zu regieren, wurde die älteste und weiseste der Blemmyan-Familien als „Großer Häuptling“ bezeichnet, während die Rollen derjenigen unter ihm regional festgelegt wurden: die Clanherren und die Stammeshäuptlinge. Jetzt kann der Große Häuptling seinen herrschenden Untergebenen Bedingungen und Richtlinien diktieren." #NT!
 me_blemmia_2.a: "Lassen Sie die Struktur ein stärkeres Blemmya schaffen!" #NT!
 me_blemmia_2_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_2$#!' $mission_completed_tooltip_2$" #NT!
  
 me_blemmia_3_title: "Der Smaragdaufstand" #NT!
 me_blemmia_3_desc: "Rund um die Troglodytica-Region folgten Blemmyan-Lager dem Ruf des Großen Häuptlings und eroberten ihre Souveränität von den Ägyptern zurück, indem sie das Joch des Nils zurückwiesen. Jetzt sind die Beamten in Alexandria und Memphis wütend und verfluchen ihr Glück, in der Zeit der Blemmyans gelebt zu haben. Ägyptische Werke wurden aus den Minen von Mons Smaragdus vertrieben." #NT!
 me_blemmia_3.a: "Nun zu den Minen!" #NT!
  
 me_blemmia_4_title: "Suche nach Rotgold" #NT!
 me_blemmia_4_desc: "Ein Goldrausch hat die roten Länder von Blemmyan erfasst. Angesichts all der neuen Minen, die in Bergen, an Klippen und in Höhlen gebaut werden, möchten die ehrgeizigeren Stammeshäuptlinge nach einer weiteren Goldader schürfen. Sollte das Blemmyan-Volk wirklich solch eine gierige Aussicht verfolgen?" #NT!
 me_blemmia_4.a: "Suche nach neuen mineralischen Weiden." #NT!
 me_blemmia_4.b: "Wir haben genug Gold." #NT!
  
 me_blemmia_5_title: "Medjay-Erlebnis" #NT!
 me_blemmia_5_desc: "Unter den vielen Medjay-Kriegern, die in die Blemmyan-Länder zurückkehren, behauptet ein Mann, ein Anführer der ägyptischen Polizeiwache zu sein. Er sagt weiter, dass seine Erfahrung von unschätzbarem Wert wäre, um entweder Blemmyan-Krieger in ägyptischer Form auszubilden oder die Anführer mit militärischem Verstand in ägyptischen Taktiken auszubilden – beides würde den Blemmyans einen großen Vorteil gegenüber ihren Gegnern verschaffen." #NT!
 me_blemmia_5.a: "Stellen Sie sie auf Herz und Nieren." #NT!
 me_blemmia_5.b: "Lassen Sie ihn die Strategen unterrichten." #NT!
  
 me_blemmia_6_title: "Zusammenführung der Megabarii" #NT!
 me_blemmia_6_desc: "Da die Verbindungen zwischen den führenden Megabarii-Clans und den Blemmyans durch mündliche Überlieferungen nachgewiesen wurden, haben freundschaftliche Annäherungsversuche zwischen den beiden Fortschritte gemacht. Dennoch bleiben einige zurückhaltende und Traditionalisten in der Megabarian-Clan-Hierarchie bestehen – sie sind der Meinung, dass die Zugehörigkeit zum Blemmyan-Reich die magabarianische Identität schwächen würde." #NT!
 me_blemmia_6.a: "Bestechen Sie die unerschütterlichen Beamten." #NT!
 me_blemmia_6.b: "Zeigen Sie mit unseren Kriegern Ihre Macht." #NT!
 me_blemmia_6.c: "Üben Sie Druck auf ihre Stammespflichten aus." #NT!
  
 me_blemmia_7_title: "Eine Reihe von Großbuchstaben" #NT!
 me_blemmia_7_desc: "Der Bau der von den Blemmyanern regelmäßig überwachten und instandgehaltenen Routen zwischen den verschiedenen kleineren Hauptstädten ist abgeschlossen und kann nun dem Ausbau und der Ausbreitung ihres lokalen Einflusses überlassen werden." #NT!
 me_blemmia_7.a: "Lass diese Städte gedeihen!" #NT!
  
 me_blemmia_8_title: "$blemmia_missions_task_8$" #NT!
 me_blemmia_8_desc: "Die Entwicklung und Erweiterung der Blemmyan-Hauptstadt hat zu einem Wirtschaftsboom und einem Migrationsinteresse im Kernland der Blemmyan-Bevölkerung geführt." #NT!
 me_blemmia_8.a: "Lass das Gold fließen!" #NT!
 me_blemmia_8_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_8$#!' $mission_completed_tooltip_2$" #NT!
  
 me_blemmia_9_title: "Eröffnung weiterer Smaragdminen" #NT!
 me_blemmia_9_desc: "Während sich die Eröffnung von Olivin-Edelsteinminen zu einem Segen für die Handelsrouten der Blemmyaner und die Verhandlungen mit ausländischen Mächten entwickelt hat, glauben einige gierige Mitglieder der Blemmyaner Bürokratie, dass Mons Smaragdus noch profitabler werden kann. Auf der gegenüberliegenden Seite des geografischen Wahrzeichens gibt es Gerüchte, dass auch die Rückseite des Berges reich an grünen Adern ist. Die einzige Gefahr besteht darin, dass mögliche Ausgrabungen in diesem neuen Teil des Berges einen Teil der ursprünglichen Mine zum Einsturz bringen und alle unsere Betriebe auf einmal ruinieren könnten – das heißt, wenn wir überhaupt Smaragde auf der Rückseite des Berges finden. Was ist zu tun?" #NT!
 me_blemmia_9.a: "Tauchen Sie ein in den Berg!" #NT!
 me_blemmia_9.b: "Lasst uns unsere erste Beute genießen." #NT!
  
 me_blemmia_10_title: "Olivine Ptolemais Theron" #NT!
 me_blemmia_10_desc: "Der Handel entlang der salzigen Küste des Roten Landes hat sich zu einem Fluss voller Olivin-Edelsteine ​​aus den Minen von Mons Smaragdus entwickelt. Doch so schnell wir diese Edelsteine ​​abbauen können, verfügen wir nicht über die Infrastruktur, um sie mit höchster Geschwindigkeit zu exportieren. Der Blemmyan-Magistrat hat auf das Potenzial von Ptolemais Theron als Schlüsselhafen für den Versand aller überschüssigen Smaragde hingewiesen und damit das Problem behoben. Soll die Angelegenheit jetzt geklärt werden?" #NT!
 me_blemmia_10.a: "Ja, investieren Sie in die Zukunft der Stadt." #NT!
 me_blemmia_10.b: "Berenike im Norden scheint stattdessen ein zukünftiges Investitionsziel zu sein." #NT!
  
 me_blemmia_11_title: "Rote Straßen" #NT!
 me_blemmia_11_desc: "Die Straßennetze der Roten Länder haben einen großen Nutzen für die Regelmäßigkeit und Vielfalt des Handels zwischen den Blemmyanern und Ausländern geerntet. Der Zustrom neuer Händler hat den Blemmyanern neues Wissen und Bewusstsein vermittelt. Der Magistrat des Großen Häuptlings glaubt, dass die neuen Wirtschaftsmänner des Handels genutzt werden können, um das Land und die Politik der Blemmyaner weiterzuentwickeln. Soll es gemacht werden?" #NT!
 me_blemmia_11.a: "Die Straßen haben es uns ermöglicht, neue Waren in unser Land zu bringen." #NT!
 me_blemmia_11.b: "Wir müssen die Qualität der Straßen weiter verbessern." #NT!
 me_blemmia_11.c: "Lassen Sie den Richter von den Händlern lernen." #NT!
 me_blemmia_11.d: "Lassen Sie uns die Vorteile unserer neuen Straßen nutzen." #NT!
  
 me_blemmia_12_title: "Tabots Edelsteine" #NT!
 me_blemmia_12_desc: "Da Tabots Werkstätten nur zur Hälfte ausgelastet sind, haben die Handwerker und Juweliere den Magistrat von Blemmyan gebeten, die Rohstoffproduktion durch den Aufbau der Stadt rund um Sinkat zu steigern. Sollen die Blemmyans an diesem Ort investieren?" #NT!
 me_blemmia_12.a: "Machen Sie Sinkat zu einem nationalen Unternehmen." #NT!
 me_blemmia_12.b: "Lass die Minen in Ruhe." #NT!
  
 me_blemmia_13_title: "Etwas in den Desert Hills" #NT!
 me_blemmia_13_desc: "Es kursieren Gerüchte, dass in den Wüsten, im Schatten von Klippen und in den Tiefen staubiger Höhlen etwas passiert. Händler werden nervös. Adlige haben Angst vor ihren privaten Ferienhäusern an der Küste. Immer mehr Menschen suchen in den Städten von Blemmyan Zuflucht." #NT!
 me_blemmia_13.a: "Behalten Sie den Horizont im Auge." #NT!
  
 me_blemmia_14_title: "Die Kopflosen erscheinen" #NT!
 me_blemmia_14_desc: "Boten sind eilig zum Großen Häuptling der Blemmyaner gekommen, um ihm mitzuteilen, dass die Dörfer von Duweb überfallen wurden – einige wurden sogar von ihren Bewohnern vertrieben, es wurden keine Leichen gefunden. In der Bevölkerung herrscht Panik: „Blemmyes“ ist das einzige Wort, das herumgereicht wird. Die verfluchten Menschen scheinen erneut aufgetaucht zu sein, von denen man annahm, dass sie nur innerhalb der Mythen und Legenden der alten Zeit existierten." #NT!
 me_blemmia_14.a: "Verdoppeln Sie die Patrouillen in Städten und entlang der Straßen!" #NT!
  
 me_blemmia_15_title: "Es spricht!" #NT!
 me_blemmia_15_desc: "Das Abendessen des Blemmyan-Großhäuptlings wurde durch Schreie und krachende Geräusche draußen auf den Straßen der Hauptstadt unsanft unterbrochen. Alles ergab einen Sinn, als ein abscheuliches Wesen, klein, stämmig, stämmig und humpelnd, die große Halle betrat. Alle Blicke richteten sich auf seine breiten Füße, seinen groben Speer, vor allem aber auf das entsetzlich unmenschliche Gesicht, das er auf der Brust trug, und einen zahnigen Mund, der sich auf seinen Oberkörper konzentrierte. Dann kamen die Worte: eine Reihe von Klickgeräuschen und gurgelnden Geräuschen, sicherlich fremdartig im Stil. Am ehesten könnte man es mit der ausgeprägten Zunge der Höhlenbewohner vergleichen, die in ihren Höhlenwohnungen klickende Geräusche von sich geben. Während die Sicherheit des Großen Häuptlings gewährleistet war, versammelte sich eine Armee von Übersetzern. Der Große Häuptling reichte die Botschaften eine nach der anderen weiter und hörte sich die Forderungen der Blemmye an: „Essen.“ Wasser. Reichtümer. Gib für Speere.' Das waren seine verständlichen Wünsche, die Details seiner Bedeutung, die in der endlosen Übersetzung verloren gingen. Soll sich der Blemmyan-Herrscher mit dieser Kreatur befassen?" #NT!
 me_blemmia_15.a: "Schenken Sie Gastfreundschaft und laden Sie den Chef ein." #NT!
 me_blemmia_15.b: "Wirf das Monster raus – sie sind hier nicht willkommen." #NT!
 me_blemmia_15_tooltip1: "Während die #Y Blemmyes#! zunächst abgewiesen werden, vergessen sie möglicherweise Ihr Volk und belästigen stattdessen andere." #NT!
 me_blemmia_15_tooltip2: "Die #Y Blemmyes#! nehmen Ihre Entlassung möglicherweise nicht gut auf und reagieren #R heftig#!." #NT!
  
 me_blemmia_16_title: "Angriff der Blemmyes" #NT!
 me_blemmia_16_desc: "Reiter aus dem Süden haben die Nachricht überbracht, dass Horden von Blemmye-Räubern den Nil überquert haben und die nahe gelegenen Blemmyan-Länder plündern und alle Plünderer nach Belieben töten. Der Albtraum der Blemmyes ist allzu real geworden." #NT!
 me_blemmia_16.a: "Marschall der Blemmyan-Krieger" #NT!
 me_blemmia_16_tooltip: "Die #Y Blemmyes von Baruda#! werden einen Teil des Territoriums von #Y Blemmia#! übernehmen und #R Krieg#! gegen #Y Blemmia#! und #Y Kush#! führen!" #NT!
  
 me_blemmia_17_title: "Blemmyes-Plage in Libyen" #NT!
 me_blemmia_17_desc: "Nachrichten aus dem Ausland bringen die Nachricht, dass Blemmye-Clans in die Wüsten Libyens eingedrungen sind und überall dort aufgetaucht sind, wo sie Raubzüge und Kriege geführt haben, wo immer sie wollten, und Chaos verursacht haben. Wir müssen uns in dieser schwierigen Umgebung zurechtfinden, wenn wir den Einfall dieser angeblich legendären Kreaturen überleben wollen." #NT!
 me_blemmia_17.a: "Ergreifen Sie Abwehrmaßnahmen." #NT!
 me_blemmia_17_tooltip: "#Y Blemmye#! Clans werden entlang des Nils auftauchen und #R bedrohen#! benachbarte Mächte." #NT!
  
 me_blemmia_18_title: "Der Blemmye-Häuptling" #NT!
 me_blemmia_18_desc: "Nach einer langen Zeitspanne erschien der Häuptling der Blemmyer in der Halle des Großen Häuptlings der Blemmyer. Wieder versammelte sich die Horde Übersetzer, um sein Gurgeln verständlich zu machen. Seine Botschaft wurde klar: Die Blemmyes könnten gekauft werden oder sie könnten zum Problem werden – es gab wenig Raum für passive Beziehungen. Sollen die Blemmyaner die Monster anheuern?" #NT!
 me_blemmia_18.a: "Bieten Sie ihnen so viel wie nötig." #NT!
 me_blemmia_18.b: "Machen Sie ihnen ein anständiges Angebot." #NT!
 me_blemmia_18.c: "Wir bieten nichts an." #NT!
 me_blemmia_18_tooltip1: "Die #Y Blemmyes#! werden zu #T Untertanen#! der #Y Blemmyans#!." #NT!
 me_blemmia_18_tooltip2: "#Y Blemmye#! Clans werden entlang des Nils auftauchen und #R bedrohen#! benachbarte Mächte." #NT!
 me_blemmia_18_tooltip3: "#Y Blemmye#! Clans werden direkt #R angreifen#! #Y Blemmyan#! Länder." #NT!
  
 me_blemmia_19_title: "Blemmysche Untertanen" 
 me_blemmia_19_desc: "Es wurden Briefe des Blemmye-Clans verschickt, wenn auch grob, um ihre Unterwürfigkeit gegenüber dem Blemmyan-Großhäuptling anzuerkennen. Sie werden zu großartigen Kriegern werden und den Feinden der Blemmyaner Chaos bereiten, anstatt ein Ärgernis für die Roten Länder zu sein." #NT!
 me_blemmia_19.a: "Lassen Sie sie unseren Einflussbereich erweitern." #NT!
 me_blemmia_19_tooltip: "Die #Y Blemmyaner#! #G gewinnen#! #Y 3#! #T Blemmye-Clan#! #Y Untertanen#! entlang des Nils." #NT!
  
 me_blemmia_20_title: "Troglodyten-Krieger" 
 me_blemmia_20_desc: "Viele führende Männer unter den Troglodyten haben an Ansehen gewonnen und innerhalb des blemmyschen Militärs an Einfluss gewonnen. Der Leibwächter und die Militärstrategen des Großhäuptlings haben vorgeschlagen, diese Männer in die Militärhierarchie aufzunehmen oder sie in den Ausbildungsprozess einzubeziehen, obwohl sie vielen Blemmyer seltsam und fremdartig erscheinen – ihre auf Klicklauten basierende Sprache ist schwer zu verstehen und sie haben seltsame Gewohnheiten. Wie sollen diese Männer eingebunden werden?"
 me_blemmia_20.a: "Lasst die Troglodyten die nächste Generation von Kriegern ausbilden." 
 me_blemmia_20.b: "Lasst die Troglodyten unsere Truppen anführen."
 me_blemmia_20.c: "Holt keine barbarischen Höhlenbewohner herbei" 
  
 me_blemmia_21_title: "Streifzug nach Dodekaschoinos" 
 me_blemmia_21_desc: "AAls unsere Krieger den Nil und das Gebiet der 20 Städte erreichten, verbreiteten sich einige Gerüchte, dass die Magistrate jeder Stadt in der Gemeinschaft lieber ihre Stadt verkaufen würden als eine Belagerung zu akzeptieren - vielleicht kann man sie zur Vernunft bringen? Mit einem frühzeitigen Raubzug und einigen kleinen Brandschatzungen können sie zumindest erschreckt werden." 
 me_blemmia_21.a: "Entsedet Späher , um die ersten Dörfer auf ihrem Weg niederzubrennen." 
 me_blemmia_21.b: "Versucht, die Stadtbeamten zu bestechen, damit sie ihre Städte übergeben." 
 me_blemmia_21.c: "LDer Krieg soll so weitergehen wie bisher." 
 me_blemmia_21_tooltip: "#Y Blemmysche#! Späher werden einige Siedlungen in #T Dodekaschoinos#! plündern und ausrauben." 
  
 me_blemmia_22_title: "Der Blemmyische Großkönig" 
 me_blemmia_22_desc: "Der Großhäuptling der Blemmyer ist zum Großen König des Reiches geworden.Ihm untergeordnet sind die Könige der ehemaligen Clans und unter ihnen die großen Häuptlinge der vielen Stämme. Ein solches Gebilde wird die Macht und den Einfluss der blemmyanischen Traditionen verbreiten." 
 me_blemmia_22.a: "Es lebe der König!"
  
 me_blemmia_23_title: "Berenike drangsalieren" 
 me_blemmia_23_desc: "Umgeben von unseren Streitkräften haben die Beamten von Berenike Troglodytike Boten geschickt, um Verhandlungen mit den blemmyschen Anführern aufzunehmen und eine friedliche Lösung zu finden. Aus der Sicht der blemmyschen Anführer könnte Berenike kapitulieren oder eine Marionette des Blemmyschen Reichs werden. Was sollen wir tun?"
 me_blemmia_23.a: "Berenike sollte sich dem Volk der Blemmyer anschließen."
 me_blemmia_23.b: "Berenike wird nur mit unseren Händlern zusammenarbeiten müssen." 
 me_blemmia_23.c: "Berenike wird an unsere Krieger fallen." 
 me_blemmia_23_tooltip: "#Y Berenike Troglodytike#! wird eine #T League City#! #G Subjekt#! von #Y Blemmia#!." #NT!
  
 me_blemmia_24_title: "Blemmysche Kamele"
 me_blemmia_24_desc: "Die neuen Karawansereien (nach dem Vorbild der Nabatäer) auf den Märkten der blemmyschen Städte haben ein neues Maß an Wohlstand und geschäftiger Natur auf die Straßen gebracht." 
 me_blemmia_24.a: "Lasst den Handel auf Rücken der Kamele die Wirtschaft vorantreiben"
  
 me_blemmia_25_title: "Blemmysche Sklaven" 
 me_blemmia_25_desc: "Vom Hafen von Ptolemais Theron aus verschifft, wurden Sklaven, die aus Kriegen stammten, zu einem regelmäßigen Exportgut des Volkes der Blemmyer, da die Araber diese Gruppen von Arbeitskräften schätzten." 
 me_blemmia_25.a: "Der Sklavenhandel wird zusätzliche Finanzmittel bereitstellen..." 
  
 me_blemmia_26_title: "Thebanischer Einfall" 
 me_blemmia_26_desc: "Das Land von Luxor und Theben ist reich und verwundbar, die Städte selbst rebellieren oft offen gegen die Regierung in Alexandria. Allerdings sind sie keine Freunde der Blemmyer, da sie ihre eigene Art für überlegen und fortschrittlicher halten. Deshalb müssen wir ihnen mit militärischer Gewalt die Macht der blemmyschen Stämme vor Augen führen." 
 me_blemmia_26.a: "Entsendet eine Vorhut." 
 me_blemmia_26.b: "Wie gewohnt einmarschieren." 
 me_blemmia_26_tooltip: "#Y Blemmysche#! Späher werden einige Siedlungen in der Nähe von #T Latopolis#! plündern und ausrauben." 
  
 me_blemmia_27_title: "Der Kalabsha-Tempel"
 me_blemmia_27_desc: "Im Land Talmes liegt das verlassene Gelände einer ehemaligen alten, bescheidenen Kultstätte für den Sonnengott Mandulis, den alle Blemmyer mit Inbrunst verehren. Viele gläubige Mitglieder der blemmyischen Gesellschaft drängen auf den Wiederaufbau eines prächtigen Tempels in diesem Land, das den gläubigen Blemmyern als Kalabsha bekannt ist. Soll dieses großartige Werk in Angriff genommen werden?" 
 me_blemmia_27.a: "Mandulis soll der größte aller Tempel zugestanden werden." 
 me_blemmia_27.b: "Ein solches Bauprojekt wird nicht begonnen werden." 
  
 me_blemmia_28_title: "Philae" 
 me_blemmia_28_desc: "Als kulturelles Zentrum für alle, deren Leben mit dem Nil und seinem Umland verbunden ist, ist Philae ein Leuchtturm der Einheit, der kulturellen Vielfalt und der heiligen Verehrung für alle Völker der großen libyschen Weite. Für viele Blemmyer ist dieser Ort heiliger als alle derzeitigen Hauptstädte oder heiligen Stätten in der Wüste. Vielleicht ist es an der Zeit, den Sitz der Macht an diesen großartigen Ort zu verlegen und von einem zentralen Knotenpunkt am größten Fluss der Welt aus zu regieren."
 me_blemmia_28.a: "Die Insel Philae wird zum Zentrum des Reiches der Blemmyer."
 me_blemmia_28.b: "Die Roten Länder sind der Ort, den wir immer preisen werden." 
  
 me_blemmia_29_title: "$blemmia_missions_task_22$" 
 me_blemmia_29_desc: "Da die schwierigsten Passagen des Nils unter der Kontrolle der Blemmyer stehen, können die oberen und unteren Grenzen nach Belieben erobert werden. Die Macht Ägyptens und Kuschs, die durch unseren Einfall in zwei Teile gespalten wurde, wird durch die Macht der Stämme des Roten Landes in Schach gehalten." 
 me_blemmia_29.a: "Die Könige des Nils werden Blemmyer sein." 
 me_blemmia_29_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_22$#!' $mission_completed_tooltip_2$" 
  
 me_blemmia_30_title: "$blemmia_missions_task_23$"
 me_blemmia_30_desc: "Die Straßen von Omboi glänzen im Licht des Goldstaubs und der leuchtenden Bausteine aus Edelmetallen, die die Wände und Hallen der Tempel schmücken. Als wohlhabender Ort ist Omboi sowohl im wörtlichen als auch im übertragenen Sinne ein Leuchtfeuer für den Reichtum, den die Blemmyer in alle Länder entlang des Nils bringen werden." 
 me_blemmia_30.a: "Die goldenen Hallen heißen die Beamten aus Blemmyen willkommen." 
 me_blemmia_30_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_23$#!' $mission_completed_tooltip_2$"
  
 me_blemmia_31_title: "Der blemmyanische Kaiser" 
 me_blemmia_31_desc: "Mandulis strahlt an seinem glorreichen Krönungstag auf [ROOT.GetCountry.GetRuler.GetName] herab. Mit diesem letzten Schritt werden die Blemmyer zu Herren über den Nil, über den Thron Libyens, und beweisen ihre Macht, alles in Sichtweite zu erobern. Eine neue Ära hat begonnen." 
 me_blemmia_31.a: "Verneigt euch vor dem blemmyanischen Kaiser."
 me_blemmia_31_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_31$#!' $mission_completed_tooltip_2$"
  
