l_german:
  
 blemmia_missions: "Aufstieg der Roten Länder" #8.2.26 - 1.11 - Germanicus
 blemmia_missions_DESCRIPTION: "Die blemmyischen Stämme, umhüllt von Mythen, Mysterien und Missverständnissen, waren immer nur eine lose organisierte Räuberbande. Doch hinter jedem Überfall steckte ein Zweck. Jenseits der Ufer des Nils, weit in die Hügel und Klippen der Wüste hinein, konsolidierte sich ein aufstrebender Staat von Blemmyscher-Beja-Stämmen unter einer königlichen Linie aus Großkönigen, die über gewöhnliche Könige und unter ihnen Stammeshäuptlinge herrschten. Mit Blick auf die Insel Philae und die kulturellen/religiösen Zentren Oberägyptens werden die Blemmyae zu großen Herausforderern der Großmächte am Nil." 
 blemmia_missions_CRITERIA_DESCRIPTION: "Diese Mission wird abgeschlossen sein, wenn die blemmyischen Stämme die libyschen Wüsten und den mittleren Nilabschnitt kontrollieren."
 blemmia_missions_BUTTON_TOOLTIP: "Erhebt euch vom roten Boden!" 
 blemmia_missions_BUTTON_DETAILS: ""
  
   #Missions 
  
 blemmia_missions_task_1: "Adabulische Verpflichtungen" 
 blemmia_missions_task_1_DESC: "Die Adabulianer, die gemeinhin als Unterstamm der größeren Blemmyaner-Gruppe betrachtet werden, müssen hinsichtlich ihrer Integration in unser föderiertes System halbnomadischer Völker angesprochen werden." 
 blemmia_missions_task_1_tt: "Alle Charaktere, die ein #E Amt#! innehaben, müssen mehr als #Y 65#! #E Loyalität#! haben." 
  
 blemmia_missions_task_2: "Politische Schichtung" 
 blemmia_missions_task_2_DESC: "Um ein solch riesiges Reich bestmöglich zu regieren, haben sich die älteren und wohlhabenderen blemmyschen Familien für die Einführung eines dreigliedrigen Systems entschieden, das die Regierungshierarchie in Stammeshäuptlinge, Clanherren und den Großhäuptling unterteilt."
  
 blemmia_missions_task_3: "Mons Smaragdus" 
 blemmia_missions_task_3_DESC: "Die Olivin-Smaragdminen von Mons Smaragdus, die seit den Zeiten der ältesten Pharaonen berühmt sind, müssen von den Wüstenvölkern wieder ausgebeutet werden - es handelt sich um eine blemmyanische Naturressource." 
 blemmia_missions_task_3_tt: "#Y Blemmya#! hat die #Y Kulturentscheidung#! #Y geschützte Landrechte#! für die Kultur #Y Blemmysch#! erlassen." 
  
 blemmia_missions_task_4: "Blemmysches Gold"
 blemmia_missions_task_4_DESC: "Um die wachsende blemmysche Föderation voranzutreiben und ihre Souveränität gegenüber den Ptolemäern und den Königen von Kusch zu sichern, muss Wirtschaftswachstum durch Goldabbau erreicht werden."
  
 blemmia_missions_task_5: "Rückruf der Medjay" 
 blemmia_missions_task_5_DESC: "Viele ägyptische Adlige und Städte setzen Blemmyaner als Ordnungshüter ein, eine Anspielung auf die alten Zeiten, als viele unserer Artgenossen als Medjay bekannt waren. Diese Krieger sollten unsere Dörfer und unser Volk beschützen!" 
 blemmia_missions_task_5_tt1: "#Y Blemmia#! hat die #Y Kulturentscheidung#!  #Y Lockerung der Beschränkungen für die Bürgerschaft#! für die Kultur #Y Blemmysch#! erlassen."
 blemmia_missions_task_5_tt2: "#E Blemmyische#! Medjay-Krieger, die in den hervorgehobenen #E Territorien#! von #Y Dodekaschoinos#! und #Y Ägypten#! leben, werden zu #Y Blemmias#! #E Hauptstadt#! #G migrieren#!." 
  
 blemmia_missions_task_6: "Verbindungen zu den Megabaroi" 
 blemmia_missions_task_6_DESC: "Die Megabaroi werden oft als Verwandte der Blemmyer angesehen und haben gelernt, an den nubischen Ufern des Nils zu kultivieren und zu gedeihen. Sie müssen an ihre Bindungen zu unseren Stämmen erinnert werden." 
  
 blemmia_missions_task_7: "Segmentierte Herrschaft" 
 blemmia_missions_task_7_DESC: "Die Blemmyer sind ein wanderndes Volk, und um ein riesiges Land zu kontrollieren, müssen die Herrscher über viele politisch stabile Kontrollpunkte verfügen, zwischen denen sie hin- und herwandern können, so wie Viehzüchter, die dem Regen folgen."
  
 blemmia_missions_task_8: "Die Allgoldene Stadt" 
 blemmia_missions_task_8_DESC: "Berenike Panchrysos ist ein Zeugnis des blemmischen Volkes, seiner Macht und seiner politischen Stabilität. Nutzt seine Goldreserven, um seinem Namensgeber gerecht zu werden und einen Zufluchtsort in der Wüste zu errichten." 
  
 blemmia_missions_task_9: "Der Smaragdhandel" 
 blemmia_missions_task_9_DESC: "Da die Olivinminen in Betrieb sind, müssen die Blemmyer diesen Segen bestmöglich nutzen, um reiche Handelsrouten zu errichten und unser karges Land zu bereichern." 
 blemmia_missions_task_9_tt: "#Y Blemmia#! wird die Provinz #Y Ichthyophagia#! #E kolonisieren#! und ihre Handelslandroute mit dem Hafen von #Y Adouli#! verbinden." 
  
 blemmia_missions_task_10: "Rote Landnetzwerke" 
 blemmia_missions_task_10_DESC: "Östlich des Nils können nur wenige Völker die Dünen, die unfruchtbaren Meerengen und die leeren Felder des Roten Landes, das zwischen Fluss und Meer liegt, sicher bereisen. Mit Hilfe von Kamelen, wohlgezüchteten Pferden und den Künsten der Nomaden werden die Blemmyer diese leeren Einöden in Fernstraßen des Handels und des kulturellen Einflusses verwandeln." 
  
 blemmia_missions_task_11: "Tabot-Werkstätten" 
 blemmia_missions_task_11_DESC: "Auf den Ländereien der Adabuli liegt der Ort Tabot brach, ein perfekter Ort für die Herstellung großer Luxusgüter, die mit den vielen Edelsteinminen in den nahe gelegenen Hügeln exportiert werden können. Die Menschen sollten die Landschaft erobern und diesen trostlosen Ort in ein Handelszentrum verwandeln." 
  
 blemmia_missions_task_12: "Kopflose Männer" 
 blemmia_missions_task_12_DESC: "Diejenigen aus fernen Ländern wissen nichts über das wahre Volk der Blemmyer und verwechseln die Wüstenbewohner mit monströsen, kopflosen Männern, die Gesichter auf der Brust tragen. Die Stämme sollen diesen Irrtum ausnutzen, um unsere Feinde in Angst und Schrecken zu versetzen und die wahre Schönheit des Landes zu verschleiern." 
 blemmia_missions_task_12_tt1: "#Y Blemmia#! wird ein Wiederaufleben von Mythen, Gerüchten und Berichten über die kopflosen #Y Blemmyer#! erleben, die #G Glück#! oder #R Verderben#! für die Stämme bedeuten könnten."
 blemmia_missions_task_12_tt2: "Mit #RMit den #R Horden#! der kopflosen #Y Blemmyer#!, die jetzt auf Geheiß der #Y Blemmyer#! durch den Sand ziehen, sind die #T Wüsten#! von Libyen noch #R gefährlicher#! geworden." 
  
 blemmia_missions_task_13: "Die Trogodyten" 
 blemmia_missions_task_13_DESC: "Die Trogodyten, ein Stamm unter den Blemmyern, sind ein weiteres verwirrtes Volk. Aufgrund der Komplexität ihrer Sprache und ihres isolierten Verhaltens wurden sie in den Augen von Fremden zu einfachen Höhlenbewohnern degradiert. Ihr wahres Potenzial und ihre Kampfkünste sollen den Ägyptern und Kuschiten Ehrfurcht einflößen." 
 blemmia_missions_task_13_tt: "#Y Blemmia#! hat eine #E Kriegsgottheit#! in seinem #T Pantheon#!, besitzt die #T heilige Stätte#! dieser Gottheit und hat das #T Omen#! dieser Gottheit #E aktiviert#!." 
  
 blemmia_missions_task_14: "Plünderung Dodekaschoinos'" 
 blemmia_missions_task_14_DESC: "Die zwanzig Städte entlang des mittleren Nilabschnitts, der zur Insel Philae führt, haben sich immer als wohlhabend und wertvoll für Vieh, Getreide, Sklaven und Reichtümer erwiesen. Blemmysche Spione haben berichtet, dass die Belagerung der so genannten Letzten Insel selbst wegen des Reichtums ihrer Tempelkomplexes von Wert war." 
  
 blemmia_missions_task_15: "Das Blemmysche Königreich" 
 blemmia_missions_task_15_DESC: "Das Blemmysche Reich ist kein Land eines einfaches Hirtenvolks mehr, sondern hat eine königliche Familie ausgewählt, um das Volk als Großkönig aller Stämme voranzubringen." 
  
 blemmia_missions_task_16: "Berenike kontrollieren" 
 blemmia_missions_task_16_DESC: "Berenike auf dem Meer erhellt das Land wie ein Leuchtfeuer des Wohlstands, den Hauptknotenpunkt der Kommunikation und des Handels zwischen der Wüste und der riesigen Welt außerhalb der Reichweite der Blemmyer. Es muss investiert werden, damit die Menschen den Luxus und die Vorteile der Schöpfung der Welt genießen können."
 blemmia_missions_task_16_tt: "#Y Blemmia#! hat eine #E Armee#! mit einem #E Kommandanten#! und mindestens #Y 10 Einheiten#!." 
  
 blemmia_missions_task_17: "Der Kamelhandel" 
 blemmia_missions_task_17_DESC: "Nilaufwärts und nilabwärts sind die Kamele aus den Wüsten jenseits des Meeres zu einem Synonym für Handel und Reisen geworden, denn sie sind schneller und ausdauernder als das typische Pferd. Für die Händler, die immer noch nach diesen Lasttieren verlangen, sollten die blemmyschen Stämme eine ständige Versorgung sicherstellen." 
  
 blemmia_missions_task_18: "Blemmyscher Sklavenhandel" 
 blemmia_missions_task_18_DESC: "Aufgrund der vielen Überfälle, die die Stammesbanden durchgeführt haben, haben wir viele überschüssige Sklaven, die wir an Händler von der anderen Seite des Meeres abgeben können. Die Märkte der Nabatäer sollten sich als profitabel erweisen." 
 blemmia_missions_task_18_tt1: "Ein #E Land#! #T Arabischer#! oder #T Jemenitischer#! Kultur muss eine #E Meinung#! höher als #T 50#! von #Y Blemmia#!  haben. #Y Blemmias Herrscher#! muss ein #G Freund#! von ihrem #E Herrscher#! sein."
 blemmia_missions_task_18_tt2: "#Y Herrscher#! hat einen #T Besitz#! mit mindestens #Y 10 Sklaven#! und entweder ein #T Sklavenanwesen#! Gebäude oder ein #T Mühlen#! Gebäude." 
 blemmia_missions_task_18_tt3: "#Y Blemmia#! hat mindestens #Y 1#! Kultur mit #T Sklavenrechten#!." 
  
 blemmia_missions_task_19: "Überfall auf Theben" 
 blemmia_missions_task_19_DESC: "Als Tyrann des Nordens haben die Ägypter schon immer die blemmyschen Gebiete bedroht und überfallen. Um unseren Wohlstand zu sichern und einen Teil des reichen Nils zu beanspruchen, sollten die Krieger der Blemmyer den Kampf in ihr Kernland führen." 
  
 blemmia_missions_task_20: "Anbetung von Mandulis" 
 blemmia_missions_task_20_DESC: "Mandulis, der Sonnengott, steht dem weiten Pantheon vor, das die Blemmyer verehren. Für seine Tempel entlang des Nils ist es unsere Pflicht, sie unter unserer eigenen Herrschaft zu pflegen und zu erhalten." 
 blemmia_missions_task_20_tt: "#Y Mandulis'#! #T heilige Stätte#! befindet sich in #T Talmes#!." 
  
 blemmia_missions_task_21: "Die letzte Insel" 
 blemmia_missions_task_21_DESC: "Philae, die heilige Insel der Isis und der Götter des Nils, muss zur kulturellen Hauptstadt der Blemmyer werden, um eine dauerhafte Geschichte und Glaubenserziehung unter den Stämmen zu etablieren." 
 blemmia_missions_task_21_tt: "#Y Blemmia#! hat eine #E Kultur#! aus den Kulturgruppen #T Aksumitisch#!, #T Nubisch#! und #T Ägyptisch#! #E integriert#!." 
  
 blemmia_missions_task_22: "Den Mittleren Nil beherrschen" 
 blemmia_missions_task_22_DESC: "Bis über die Wüste hinaus müssen die Blemmyer den fruchtbaren Boden des Nils pflügen und unser Königreich wachsen lassen, bevor es langsam in Vergessenheit gerät." 
  
 blemmia_missions_task_23: "Die Goldene Regel" 
 blemmia_missions_task_23_DESC: "Omboi ist als „Land des Goldes“ bekannt und entspricht dem Reichtum von Luxor und den anderen großen Städten des pharaonischen Oberägyptens. Die Blemmyer haben das Potenzial, den Reichtum der Region wiederherzustellen und sie in eine große Metropole des Wohlstands zu verwandeln, die das Wachstum in der Wüste ankurbelt." 
  
 blemmia_missions_task_24: "Ein blemmysches Imperium" 
 blemmia_missions_task_24_DESC: "Um sowohl das schwarze als auch das rote Land Libyen zu beherrschen, müssen die Blemmyer alle Großmächte des Landes unterwerfen und einen Staatsverband ihrer Völker bilden." 
  
  
  
   #Tooltips 
  
  
  
   #Modifiers 
  
 blemmyan_red_cities: "Rote Städte" 
 desc_blemmyan_red_cities: "In den roten Ländern östlich des Nils braut sich ein Sturm zusammen, und aus dem Sand erheben sich große Städte, die von den blemmyschen Stämmen gegründet wurden." 
  
 blemmyan_negotiations: "Blemmysche Verhandlungen" 
 desc_blemmyan_negotiations: "Durch die Integration der verwandten blemmyschen Stämme haben die Häuptlinge gelernt, wie sie Konflikte am besten lösen und Freundschaften schließen können."
  
 blemmyan_gold_mining: "Blemmyscher Goldbergbau" 
 desc_blemmyan_gold_mining: "Die goldenen Hügel und Klippen der Wüste östlich des Nils enthalten scheinbar unbegrenzte Goldadern." 
  
 segmented_blemmyan_capitals: "Segmentierte Hauptstädte" 
 desc_segmented_blemmyan_capitals: "Durch die Aufteilung der Verwaltung des blemmyschen Staates auf mehrere saisonale Hauptstädte wird die Bürokratie flexibler und die blemmyschen Bauherren erfahrener." 
  
 blemmyan_all_golden_city: "Die Allgoldene Stadt" 
 desc_blemmyan_all_golden_city: "Berenike Panchrysos strahlt wie ein Juwel in der Wüste und sticht unter allen Städten hervor, indem es den Status und den Respekt seiner Bevölkerung und seines Herrschers mehrt." 
  
 blemmyan_mine_construction: "Bau der blemmyschen Mine" 
 desc_blemmyan_mine_construction: "Die hartgesottenen blemmyschen Arbeiter haben sich daran gewöhnt, regelmäßig neue Minenschächte und Ausrüstungen zu konstruieren." 
  
 medjay_training: "Medjay-Ausbildung" 
 desc_medjay_training: "Die aus ägyptischen Ländern zurückgekehrten Medjay-Ordnungskräfte haben den blemmyschen Kriegern fremde und anspruchsvolle Kampfbräuche beigebracht und so ihre Wirkung im Kampf verstärkt."
  
 blemmyan_emerald_mining: "Blemmysche Smaragdminen" 
 desc_blemmyan_emerald_mining: "Die Olivin-Edelsteine von Mons Smaragdus sind heute eine tragende Säule der Wirtschaft des blemmyschen Staates." 
  
 red_lands_trade: "Roter Landhandel" 
 desc_red_lands_trade: "Robuste Handelsrouten, die durch die Wüsten östlich des Nils verlaufen, haben einen reichen Hafen für Kaufleute geschaffen."
  
 tabot_workshops: "Die Tabot-Werkstätten" 
 desc_tabot_workshops: "Die Handwerker von Tabot produzieren Luxusartikel in einem Tempo, das auf dem libyschen Kontinent beispiellos ist." 
  
 headless_men_rumors: "Kopflose Männer"
 desc_headless_men_rumors: "Andere Völker haben Angst vor dem Land der Blemmyer, kopflosen Monstrositäten." 
  
 trogodyte_speed: "Trogodytengeschwindigkeit" 
 desc_trogodyte_speed: "Dank der Ausbildung der Trogodyten bewegen sich die Armeen der Blemmyaner blitzschnell." 
  
 subjugating_berenike: "Berenike unterwerfen"
 desc_subjugating_berenike: "Die leichte Belagerung und politische Dominanz der Küstenhafenstadt Berenike hat den blemmyschen Streitkräften und -Anführern viel über aggressive Verhandlungen beigebracht." 
  
 blemmyan_caravans: "Blemmysche Karavanen" 
 desc_blemmyan_caravans: "Der Ausbau der Kamelnetzwerke hat die Roten Länder vernetzter und wohlhabender gemacht und die blemmysche Wirtschaft und Infrastruktur gestärkt."
  
 blemmyan_dromedary_cavalry: "Blemmysche Dromedar-Kavallerie" 
 desc_blemmyan_dromedary_cavalry: "DDie Zusammenarbeit mit Kamelzüchtern und die weite Verbreitung der Kamele selbst haben dazu geführt, dass der Einsatz von Kamelen in der Kriegsführung zu einer weitverbreiteten Praxis geworden ist."
  
 blemmyan_slave_trade: "Blemmyscher Sklavenhandel" 
 desc_blemmyan_slave_trade: "Der Sklavenhandel über das Meer mit den arabischen Völkern ist für die Blemmyer zu einem Segen geworden."
  
 blemmyan_golden_rule: "Blemmsche goldene Herrschaft" 
 desc_blemmyan_golden_rule: "Die Bürger von Omboi haben in den Goldhandel investiert und profitieren davon." 
  
 mandulis_worship: "Anbetung von Mandulis" 
 desc_mandulis_worship: "Die Verehrung des allsehenden Sonnengottes Mandulis hat den Menschen Wohlstand und Klarheit gebracht." 
  
 mandulis_effect: "Der Mandulis-Effekt" 
 desc_mandulis_effect: "Die allgemeine  Verehrung von Mandulis hat zu einer Zentralisierung des Volkes und einer großen Unterstützung des Königshauses, das den Gott verehrt, geführt." 
  
 philae_expansion: "Philae-Ausbau" 
 desc_philae_expansion: "Investitionen in die Insel Philae und ihren Tempelkomplex haben zu einem wohlhabenden Ort am Nil geführt." 
  
 blemmyan_aswan: "Blemmysches Aswan" 
 desc_blemmyan_aswan: "Die Rolle der Blemmyer im Raum Aswan am Nil hat zu einem Wachstum in den vielen Städten am großen Fluss geführt." 
  
 troglodytica_uprising: "Troglodytischer Aufstand" 
 desc_troglodytica_uprising: "Die Blemmyer haben in einer der an das Rote Meer angrenzenden Regionen einen Aufstand erzwungen." 
  
 blemmyan_sub_capital: "Blemmysche Unterhauptstadt" 
 desc_blemmyan_sub_capital: "Die Blemmyer regieren über eine Reihe kleinerer Hauptstädte im gesamten Reich." 
  
 emerald_port: "Smaragdhafen" 
 desc_emerald_port: "Ptolemais Theron hat sich zu einer wichtigen Exportstation für die blemmysche Smaragdversorgung entwickelt, einem grünen Leuchtfeuer des Reichtums an der Küste der Roten Länder."
  
 red_roads: "Rote Straßen" 
 desc_red_roads: "Die Verbreitung einfacher, von Pferden ausgetretener Straßen in den roten Ländern hat den Bauherren mehr Erfahrung beim Aufbau weiterer Handelsnetzwerke verschafft." 
  
 gems_for_tabot: "Edelsteine für Tabot" 
 desc_gems_for_tabot: "Die Minen von Sinkat versorgen die Produktionszentren innerhalb der Mauern von Tabot" 
  
  
  
   #Events 
 me_blemmia_1_title: "Aufnahme der Adulier" 
 me_blemmia_1_desc: "Nach einem Treffen mit dem adulischen Rat konnten die Blemmyer ein gemeinsames Erbe beweisen und sich für die Integration der Adulier in die größere blemmysche Gesellschaft einsetzen. Allerdings haben viele adulische Älteste Angst davor, ihre Autonomie aufzugeben und Teil eines größeren Ganzen zu werden. Wie sollen die Blemmyer dieses Dilemma lösen?" 
 me_blemmia_1.a: "Stellt Mittel bereit, um ihre Bedenken auszuräumen."
 me_blemmia_1.b: "Entsendet Krieger, um den Übergang zu unterstützen." 
 me_blemmia_1.c: "Sie wissen, dass wir den größten Einfluss haben." 
  
 me_blemmia_2_title: "Könige, Häuptlinge und Lords" 
 me_blemmia_2_desc: "Um ein expandierendes und ortsunabhängiges Blemmya zu regieren, wurde der Älteste und Weiseste unter den blemmyschen Familien zum „Großhäuptling“ ernannt, während die Rollen der Untergebenen regionalisiert wurden: die Clan-Lords und die Stammeshäuptlinge. Jetzt kann der Großhäuptling seinen Untergebenen Bestimmungen und Maßnahmen diktieren."
 me_blemmia_2.a: "Lasst die Struktur ein stärkeres Blemmya schaffen!" 
 me_blemmia_2_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_2$#!' $mission_completed_tooltip_2$" 
  
 me_blemmia_3_title: "Der Smaragdaufstand" 
 me_blemmia_3_desc: "Rund um die Region Troglodytica folgten die Blemmyer dem Ruf des Großhäuptlings und holten sich ihre Souveränität von den Ägyptern zurück, indem sie sich dem Joch des Nils widersetzten. Jetzt sind die Offiziellen in Alexandria und Memphis erzürnt und verfluchen ihr Glück, in einer Zeit zu leben, in der die Blemmyer herrschen. Die ägyptischen Arbeiter wurden aus den Minen von Mons Smaragdus vertrieben."
 me_blemmia_3.a: "Und nun zu den Minen!" 
  
 me_blemmia_4_title: "Suche nach Rot-Gold" 
 me_blemmia_4_desc: "Ein Goldrausch hat die roten Länder der Blemmyer erfasst. Angesichts all der neuen Minen, die in Bergen, an Klippen und in Höhlen gebaut werden, möchten die ehrgeizigeren Stammeshäuptlinge nach einer weiteren Goldader schürfen. Sollte das blemmysche Volk wirklich solch eine gierige Aussicht verfolgen?" 
 me_blemmia_4.a: "Suche nach neuen Mineraliengebieten" 
 me_blemmia_4.b: "Wir haben genug Gold." 
  
 me_blemmia_5_title: "Medjay-Erfahrung" 
 me_blemmia_5_desc: "Unter den vielen Medjay-Kriegern, die in die blemmyschen-Länder zurückkehren, behauptet ein Mann, ein Anführer der ägyptischen Ordnungshüter zu sein. Er sagt weiter, dass seine Erfahrung von unschätzbarem Wert wäre, um entweder blemmysche Krieger in ägyptischer Kriegkunst auszubilden oder die Anführer mit militärischem Verstand in ägyptischen Taktiken auszubilden – beides würde den Blemmyern einen großen Vorteil gegenüber ihren Gegnern verschaffen." 
 me_blemmia_5.a: "Prüft sie auf Herz und Nieren."
 me_blemmia_5.b: "Lasst ihn die Strategen unterrichten." 
  
 me_blemmia_6_title: "Zusammenführung der Megabarii"
 me_blemmia_6_desc: "Da die Verbindungen zwischen den führenden Megabarii-Clans und den Blemmyern durch mündliche Überlieferungen nachgewiesen wurden, wurden freundschaftliche Annäherungsversuche zwischen den beiden unternommen. Dennoch gibt es nach wie vor einige widerstrebende und traditionalistische Mitglieder der megabarischen Clanhierarchie, die der Meinung sind, dass eine Eingliederung in das blemmyanische Reich die magabarische Identität schwächen würde." 
 me_blemmia_6.a: "Bestechung der unentschlossenen Beamten"
 me_blemmia_6.b: "Zeigt mit unseren Kriegern Stärke." 
 me_blemmia_6.c: "ÜDruck auf ihre Stammesverpflichtungen ausüben." 
  
 me_blemmia_7_title: "Eine Kette von Hauptstädten" 
 me_blemmia_7_desc: "Regelmäßig patrouillierte und instandgehaltene Verbindungswege zwischen den verschiedenen kleineren Hauptstädten, die von den Blemmyern errichtet wurden, sind fertiggestellt und können nun ausgebaut werden, um ihren lokalen Einfluss zu verbreiten." 
 me_blemmia_7.a: "Lasst diese Städte gedeihen!"
  
 me_blemmia_8_title: "$blemmia_missions_task_8$" 
 me_blemmia_8_desc: "Die Entwicklung und der Ausbau der blemmyschen Hauptstadt haben zu einem wirtschaftlichen Aufschwung und zu einem Anstieg der Zuwanderung in das Kernland der Blemmyer geführt." 
 me_blemmia_8.a: "Lass das Gold fließen!" 
 me_blemmia_8_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_8$#!' $mission_completed_tooltip_2$" 
  
 me_blemmia_9_title: "Eröffnung weiterer Smaragdminen" 
 me_blemmia_9_desc: "Während sich die Eröffnung von Olivin-Edelsteinminen zu einem Segen für die Handelsrouten der Blemmyer und die Verhandlungen mit ausländischen Mächten entwickelt hat, glauben einige gierige Mitglieder der blemmyschen Bürokratie, dass Mons Smaragdus noch profitabler werden kann. Auf der gegenüberliegenden Seite des geografischen Wahrzeichens gibt es Gerüchte, dass auch die Rückseite des Berges reich an grünen Adern ist. Die einzige Gefahr besteht darin, dass mögliche Grabungen in diesem neuen Teil des Berges einen Teil der ursprünglichen Mine zum Einsturz bringen und alle unsere Betriebe auf einmal ruinieren könnten – das heißt, wenn wir überhaupt Smaragde auf der Rückseite des Berges finden. Was ist zu tun?" 
 me_blemmia_9.a: "Taucht in den Berg ein!" 
 me_blemmia_9.b: "Genießen wir unsere anfängliche Ausbeute." 
  
 me_blemmia_10_title: "Olivine Ptolemais Theron"
 me_blemmia_10_desc: "Der Handel entlang der salzigen Küste des Roten Landes hat sich zu einem Fluss voller Olivin-Edelsteinen aus den Minen von Mons Smaragdus entwickelt. Doch so schnell wir diese Edelsteine abbauen können, verfügen wir nicht über die Infrastruktur, um sie mit höchster Geschwindigkeit zu exportieren. Der blemmysche Magistrat hat auf das Potenzial von Ptolemais Theron als Schlüsselhafen für den Transport aller überschüssigen Smaragde hingewiesen und damit das Problem behoben. Soll die Angelegenheit jetzt geklärt werden?" 
 me_blemmia_10.a: "Ja, investiert in die Zukunft der Stadt."
 me_blemmia_10.b: "Berenike im Norden scheint stattdessen ein zukünftiges Investitionsziel zu sein." 
  
 me_blemmia_11_title: "Rote Straßen" 
 me_blemmia_11_desc: "Das Straßennetz der Roten Lande hat die Kontinuität und die Vielfalt des Handels zwischen den Blemmyern und den Fremden sehr gefördert. Der Zustrom neuer Kaufleute hat den Blemmyern neues Wissen und Erkenntnisse gebracht. Der Magistrat des Großhäuptlings ist der Ansicht, dass die neuen Wirtschaftsmänner des Handels genutzt werden können, um die blemmyschen Ländereien und die Politik weiterzuentwickeln. Soll das geschehen?" 
 me_blemmia_11.a: "Die Straßen haben es uns ermöglicht, neue Waren in unser Land zu bringen." 
 me_blemmia_11.b: "Wir müssen die Qualität der Straßen weiter verbessern."
 me_blemmia_11.c: "Lasst den Magistraten von den Händlern lernen." 
 me_blemmia_11.d: "Lasst uns die Vorteile unserer neuen Straßen nutzen." 
  
 me_blemmia_12_title: "Tabots Edelsteine" 
 me_blemmia_12_desc: "Da Tabots Werkstätten nur zur Hälfte ausgelastet sind, haben die Handwerker und Juweliere den blemmyschen Magistrat gebeten, die Rohstoffproduktion durch den Aufbau der Stadt rund um Sinkat zu steigern. Sollen die Blemmyer an diesem Ort investieren?" 
 me_blemmia_12.a: "Macht Sinkat zu einem nationalen Unternehmen." 
 me_blemmia_12.b: "Lasst die Minen in Ruhe." 
  
 me_blemmia_13_title: "Etwas in den Wüstenhügeln" 
 me_blemmia_13_desc: "Es kursieren Gerüchte, dass bei uns in den Wüsten, im Schatten der Klippen und in den Tiefen der staubigen Höhlen etwas vor sich geht. Die Kaufleute werden nervös. Adlige sind vorsichtig, was ihre privaten Urlaubsresidenzen draußen an der Küste angeht. Immer mehr Menschen suchen Schutz in den blemmyschen Städten."
 me_blemmia_13.a: "Behaltet den Horizont im Auge." 
  
 me_blemmia_14_title: "Die Kopflosen erscheinen" 
 me_blemmia_14_desc: "Boten sind zum Großhäuptling der Blemmyaner geeilt, um mitzuteilen, dass die Dörfer von Duweb überfallen wurden - einige wurden sogar komplett ausgeplündert, ohne dass Leichen gefunden wurden. In der Bevölkerung ist Panik ausgebrochen: ,Blemmyes' ist das Wort, das in aller Munde ist. Das verfluchte Volk scheint wieder aufgetaucht zu sein, von dem man dachte, es existiere nur in den Mythen und Legenden der alten Zeiten." 
 me_blemmia_14.a: "Verdoppelt die Patrouillen in Städten und entlang der Straßen!" 
  
 me_blemmia_15_title: "Es spricht!" 
 me_blemmia_15_desc: "Das Abendessen des blemmyschen Großhäuptlings wurde durch Schreie und krachende Geräusche draußen auf den Straßen der Hauptstadt unsanft unterbrochen. Alles ergab einen Sinn, als eine hässliche Kreatur, klein, gedrungen, stämmig und humpelnd, den großen Saal betrat. Alle Augen richteten sich auf seine breiten Füße, seinen groben Speer, aber vor allem auf das entsetzlich unmenschliche Gesicht, das es auf der Brust trug, ein zahnähnliches Maul in der Mitte seines Rumpfes. Dann kamen die Worte: eine Reihe von Klicks und gurgelnden Geräuschen, die sicherlich außerirdisch klangen. Am ehesten konnte man sie mit der ausgeprägten Zunge der Troglodyten vergleichen, die in ihren Höhlen klickende Geräusche von sich geben. Während der Großhäuptling in Sicherheit war, versammelte sich eine Armee von Übersetzern. Sie reichten die Botschaften weiter, eine nach der anderen, und der Großhäuptling hörte sich die Forderungen der Blemmyer an: 'Nahrung. Wasser. Reichtum. Gebt für Speere.' So lauteten die verständlichen Wünsche der Blemmyer, wobei die Einzelheiten ihrer Bedeutung in der endlosen Übersetzung verloren gingen. Soll der blemmysche Herrscher mit dieser Kreatur verhandeln?" 
 me_blemmia_15.a: "Ein Geschenk der Gastfreundschaft anbieten und seinen Häuptling einladen." 
 me_blemmia_15.b: "Werft das Monster raus – sie sind hier nicht willkommen." 
 me_blemmia_15_tooltip1: "Während die #Y Blemmyes#! zunächst abgewiesen werden, vergessen sie möglicherweise Ihr Volk und belästigen stattdessen andere." 
 me_blemmia_15_tooltip2: "Die #Y Blemmyes#! nehmen Ihre Entlassung möglicherweise nicht gut auf und reagieren #R gewalttätig#!." 
  
 me_blemmia_16_title: "Angriff der Blemmyes" 
 me_blemmia_16_desc: "Reiter aus dem Süden haben die Nachricht überbracht, dass Horden von Blemmye-Räubern den Nil überquert haben und die nahe gelegenen blemmyschen Länder plündern und alle Plünderer nach Belieben töten. Der Albtraum der Blemmyes ist allzu real geworden." 
 me_blemmia_16.a: "Marschall der blemmyschen Krieger" 
 me_blemmia_16_tooltip: "Die #Y Blemmyes von Baruda#! werden einen Teil des Territoriums von #Y Blemmia#! übernehmen und #R Krieg#! gegen #Y Blemmia#! und #Y Kush#! führen!" 
  
 me_blemmia_17_title: "Blemmyes-Plage in Libyen" 
 me_blemmia_17_desc: "Nachrichten aus dem Ausland besagen, dass Blemmye-Klans in die Wüsten Libyens eingedrungen sind und überall Krieg führen, wo sie wollen, und Chaos verursachen. Wir müssen uns in dieser schwierigen Umgebung zurechtfinden, wenn wir die Invasion dieser angeblich legendären Kreaturen überleben wollen." 
 me_blemmia_17.a: "Abwehrmaßnahmen ergreifen." 
 me_blemmia_17_tooltip: "#Y Blemmye#! Clans werden entlang des Nils auftauchen und benachbarte Mächte #R bedrohen#!." 
  
 me_blemmia_18_title: "Der Blemmye-Häuptling" 
 me_blemmia_18_desc: "Wieder versammelte sich die Schar der Übersetzer, um sein Glucksen verständlich zu machen. Seine Botschaft wurde deutlich: Die Blemmyes konnten gekauft werden oder sie konnten zu einem Problem werden - für passive Beziehungen gab es wenig Raum. Sollen die Blemmyer die Ungeheuer anheuern?"
 me_blemmia_18.a: "Bietet ihnen so viel wie nötig." 
 me_blemmia_18.b: "Macht ihnen ein anständiges Angebot." 
 me_blemmia_18.c: "Wir bieten nichts an." 
 me_blemmia_18_tooltip1: "Die #Y Blemmyes#! werden zu #T Untertanen#! der #Y Blemmyer#!." 
 me_blemmia_18_tooltip2: "#Y Blemmye#! Clans werden entlang des Nils auftauchen und benachbarte Mächte #R bedrohen#!." 
 me_blemmia_18_tooltip3: "#Y Blemmye#! Clans werden #Y Blemmysche#! Länder direkt #R angreifen#!." 
  
 me_blemmia_19_title: "Blemmysche Untertanen" 
 me_blemmia_19_desc: "Es wurden Briefe des Blemmye-Clans verschickt, wenn auch grob, um ihre Unterwürfigkeit gegenüber dem Blemmyschen Großhäuptling anzuerkennen. Sie werden zu großartigen Kriegern werden und den Feinden der Blemmyer Chaos bereiten, anstatt ein Ärgernis für die Roten Länder zu sein."
 me_blemmia_19.a: "Lasst sie unseren Einflussbereich erweitern." 
 me_blemmia_19_tooltip: "Die #Y Blemmyaner#! #G gewinnen#! #Y 3#! #T Blemmye-Clan#! #Y Untertanen#! entlang des Nils." 
  
 me_blemmia_20_title: "Troglodyten-Krieger" 
 me_blemmia_20_desc: "Viele führende Männer unter den Troglodyten haben an Ansehen gewonnen und innerhalb des blemmyschen Militärs an Einfluss gewonnen. Der Leibwächter und die Militärstrategen des Großhäuptlings haben vorgeschlagen, diese Männer in die Militärhierarchie aufzunehmen oder sie in den Ausbildungsprozess einzubeziehen, obwohl sie vielen Blemmyer seltsam und fremdartig erscheinen – ihre auf Klicklauten basierende Sprache ist schwer zu verstehen und sie haben seltsame Gewohnheiten. Wie sollen diese Männer eingebunden werden?"
 me_blemmia_20.a: "Lasst die Troglodyten die nächste Generation von Kriegern ausbilden." 
 me_blemmia_20.b: "Lasst die Troglodyten unsere Truppen anführen."
 me_blemmia_20.c: "Holt keine barbarischen Höhlenbewohner herbei" 
  
 me_blemmia_21_title: "Streifzug nach Dodekaschoinos" 
 me_blemmia_21_desc: "AAls unsere Krieger den Nil und das Gebiet der 20 Städte erreichten, verbreiteten sich einige Gerüchte, dass die Magistrate jeder Stadt in der Gemeinschaft lieber ihre Stadt verkaufen würden als eine Belagerung zu akzeptieren - vielleicht kann man sie zur Vernunft bringen? Mit einem frühzeitigen Raubzug und einigen kleinen Brandschatzungen können sie zumindest erschreckt werden." 
 me_blemmia_21.a: "Entsedet Späher , um die ersten Dörfer auf ihrem Weg niederzubrennen." 
 me_blemmia_21.b: "Versucht, die Stadtbeamten zu bestechen, damit sie ihre Städte übergeben." 
 me_blemmia_21.c: "LDer Krieg soll so weitergehen wie bisher." 
 me_blemmia_21_tooltip: "#Y Blemmysche#! Späher werden einige Siedlungen in #T Dodekaschoinos#! plündern und ausrauben." 
  
 me_blemmia_22_title: "Der Blemmyische Großkönig" 
 me_blemmia_22_desc: "Der Großhäuptling der Blemmyer ist zum Großen König des Reiches geworden.Ihm untergeordnet sind die Könige der ehemaligen Clans und unter ihnen die großen Häuptlinge der vielen Stämme. Ein solches Gebilde wird die Macht und den Einfluss der blemmyanischen Traditionen verbreiten." 
 me_blemmia_22.a: "Es lebe der König!"
  
 me_blemmia_23_title: "Berenike drangsalieren" 
 me_blemmia_23_desc: "Umgeben von unseren Streitkräften haben die Beamten von Berenike Troglodytike Boten geschickt, um Verhandlungen mit den blemmyschen Anführern aufzunehmen und eine friedliche Lösung zu finden. Aus der Sicht der blemmyschen Anführer könnte Berenike kapitulieren oder eine Marionette des Blemmyschen Reichs werden. Was sollen wir tun?"
 me_blemmia_23.a: "Berenike sollte sich dem Volk der Blemmyer anschließen."
 me_blemmia_23.b: "Berenike wird nur mit unseren Händlern zusammenarbeiten müssen." 
 me_blemmia_23.c: "Berenike wird an unsere Krieger fallen." 
 me_blemmia_23_tooltip: "#Y Berenike Troglodytike#! wird eine #T League City#! #G Subjekt#! von #Y Blemmia#!." #NT!
  
 me_blemmia_24_title: "Blemmysche Kamele"
 me_blemmia_24_desc: "Die neuen Karawansereien (nach dem Vorbild der Nabatäer) auf den Märkten der blemmyschen Städte haben ein neues Maß an Wohlstand und geschäftiger Natur auf die Straßen gebracht." 
 me_blemmia_24.a: "Lasst den Handel auf Rücken der Kamele die Wirtschaft vorantreiben"
  
 me_blemmia_25_title: "Blemmysche Sklaven" 
 me_blemmia_25_desc: "Vom Hafen von Ptolemais Theron aus verschifft, wurden Sklaven, die aus Kriegen stammten, zu einem regelmäßigen Exportgut des Volkes der Blemmyer, da die Araber diese Gruppen von Arbeitskräften schätzten." 
 me_blemmia_25.a: "Der Sklavenhandel wird zusätzliche Finanzmittel bereitstellen..." 
  
 me_blemmia_26_title: "Thebanischer Einfall" 
 me_blemmia_26_desc: "Das Land von Luxor und Theben ist reich und verwundbar, die Städte selbst rebellieren oft offen gegen die Regierung in Alexandria. Allerdings sind sie keine Freunde der Blemmyer, da sie ihre eigene Art für überlegen und fortschrittlicher halten. Deshalb müssen wir ihnen mit militärischer Gewalt die Macht der blemmyschen Stämme vor Augen führen." 
 me_blemmia_26.a: "Entsendet eine Vorhut." 
 me_blemmia_26.b: "Wie gewohnt einmarschieren." 
 me_blemmia_26_tooltip: "#Y Blemmysche#! Späher werden einige Siedlungen in der Nähe von #T Latopolis#! plündern und ausrauben." 
  
 me_blemmia_27_title: "Der Kalabsha-Tempel"
 me_blemmia_27_desc: "Im Land Talmes liegt das verlassene Gelände einer ehemaligen alten, bescheidenen Kultstätte für den Sonnengott Mandulis, den alle Blemmyer mit Inbrunst verehren. Viele gläubige Mitglieder der blemmyischen Gesellschaft drängen auf den Wiederaufbau eines prächtigen Tempels in diesem Land, das den gläubigen Blemmyern als Kalabsha bekannt ist. Soll dieses großartige Werk in Angriff genommen werden?" 
 me_blemmia_27.a: "Mandulis soll der größte aller Tempel zugestanden werden." 
 me_blemmia_27.b: "Ein solches Bauprojekt wird nicht begonnen werden." 
  
 me_blemmia_28_title: "Philae" 
 me_blemmia_28_desc: "Als kulturelles Zentrum für alle, deren Leben mit dem Nil und seinem Umland verbunden ist, ist Philae ein Leuchtturm der Einheit, der kulturellen Vielfalt und der heiligen Verehrung für alle Völker der großen libyschen Weite. Für viele Blemmyer ist dieser Ort heiliger als alle derzeitigen Hauptstädte oder heiligen Stätten in der Wüste. Vielleicht ist es an der Zeit, den Sitz der Macht an diesen großartigen Ort zu verlegen und von einem zentralen Knotenpunkt am größten Fluss der Welt aus zu regieren."
 me_blemmia_28.a: "Die Insel Philae wird zum Zentrum des Reiches der Blemmyer."
 me_blemmia_28.b: "Die Roten Länder sind der Ort, den wir immer preisen werden." 
  
 me_blemmia_29_title: "$blemmia_missions_task_22$" 
 me_blemmia_29_desc: "Da die schwierigsten Passagen des Nils unter der Kontrolle der Blemmyer stehen, können die oberen und unteren Grenzen nach Belieben erobert werden. Die Macht Ägyptens und Kuschs, die durch unseren Einfall in zwei Teile gespalten wurde, wird durch die Macht der Stämme des Roten Landes in Schach gehalten." 
 me_blemmia_29.a: "Die Könige des Nils werden Blemmyer sein." 
 me_blemmia_29_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_22$#!' $mission_completed_tooltip_2$" 
  
 me_blemmia_30_title: "$blemmia_missions_task_23$"
 me_blemmia_30_desc: "Die Straßen von Omboi glänzen im Licht des Goldstaubs und der leuchtenden Bausteine aus Edelmetallen, die die Wände und Hallen der Tempel schmücken. Als wohlhabender Ort ist Omboi sowohl im wörtlichen als auch im übertragenen Sinne ein Leuchtfeuer für den Reichtum, den die Blemmyer in alle Länder entlang des Nils bringen werden." 
 me_blemmia_30.a: "Die goldenen Hallen heißen die Beamten aus Blemmyen willkommen." 
 me_blemmia_30_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_23$#!' $mission_completed_tooltip_2$"
  
 me_blemmia_31_title: "Der blemmyanische Kaiser" 
 me_blemmia_31_desc: "Mandulis strahlt an seinem glorreichen Krönungstag auf [ROOT.GetCountry.GetRuler.GetName] herab. Mit diesem letzten Schritt werden die Blemmyer zu Herren über den Nil, über den Thron Libyens, und beweisen ihre Macht, alles in Sichtweite zu erobern. Eine neue Ära hat begonnen." 
 me_blemmia_31.a: "Verneigt euch vor dem blemmyanischen Kaiser."
 me_blemmia_31_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_31$#!' $mission_completed_tooltip_2$"
  
