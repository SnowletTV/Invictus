l_german:
  
 01_bosporan_kingdom: "Die Söhne von Spartokos"  #Done 27.02.2026 - V1.11.0.2 - Tayuan
 01_bosporan_kingdom_DESCRIPTION: "Die Nachkommen der griechischen Kolonisten, die ursprünglich aus [GetProvince('(int32)1973').GetName] stammten, sind in den letzten Jahrhunderten in den Hügeln und Wäldern von #E Taurica#! niedergelassen. Eine Familie, die als #E Archaeanactiden#! bekannt ist, herrschte etwa fünfzig Jahre lang über die Bosporaner,bevor unser Vorfahr, der Söldner #E Spartokos I#!, sie stürzte und seine eigene Dynastie begründete.\n\n Zwei starke Basileis, #E Leukon#! und #E Paerisades#!, regierten uns sieben Jahrzehnte lang in Wohlstand, aber die letzten fünf Jahre haben dem Reich nichts als Verwüstung und einen verheerenden Bürgerkrieg gebracht, da die drei Söhne des Paerisades seinen letzten Willen ignorierten und sich entschlossen, untereinander um den Thron zu kämpfen. Der Kampf zwischen den Brüdern war jedoch nur von kurzer Dauer, und der mittlere Sohn #E Eumelus#! besiegte innerhalb eines Jahres sowohl #E Satyrus#!, den designierten Erben, als auch den törichten #E Prytanis#!\n\nEumelus hatte die #E Schlacht am Fluss Thatis#! verloren, eine große Schlacht, in der Zehntausende Männer auf beiden Seiten ums Leben kamen, aber er überwand diesen Rückschlag und ging schließlich als Sieger hervor, ohne seinen Brüdern oder deren Freunden Gnade zu zeigen. Eumelus regierte nur fünf Jahre lang, bevor er bei einem tragischen Unfall mit seiner Pferdekutsche ums Leben kam – womit sich die Prophezeiung einer Hexe über die Gefahren „beweglicher Häuser” erfüllte. Sein Nachfolger, der junge [ROOT.GetCountry.GetRuler.GetName], ist erst seit wenigen Monaten an der Macht. \n\nUmgeben von wilden #E Skythen#! und anderen Barbaren, haben die Bosporaner im Laufe ihrer Geschichte zu verschiedenen Zeiten sowohl mit als auch gegen ihre Nachbarn gekämpft – Eumelus hätte seinen Krieg ohne die Hilfe der Verbündeten #E Sarmaten#! niemals gewinnen können – und ihre bedrohliche Präsenz, genau wie die weite und endlose Steppe, die jenseits der Wälder von Taurica liegt, bleibt eine Tatsache, mit der die isolierten Bosporaner zu kämpfen haben. Die Überfälle der nördlichen Stämme nehmen in alarmierender Häufigkeit zu, und die #E Diadochenkriege#!, die den Süden erfasst haben, haben die Gewässer des #E Pontus Euxinus#! zu einem gefährlichen Ort gemacht."
 01_bosporan_kingdom_CRITERIA_DESCRIPTION: "Diese Mission wird abgeschlossen sein, wenn der [ROOT.GetCountry.GetName] seine Feinde im In- und Ausland besiegt und den Frieden auf dem #E Pontus Euxinus#! gesichert hat." 
 01_bosporan_kingdom_BUTTON_TOOLTIP: "Möge ich in die Fußstapfen von Spartokos treten ..."
 01_bosporan_kingdom_BUTTON_DETAILS: ""
  
 #Missions 
  
 01_bosporan_kingdom_task_1: "Die Eroberung von Taurica" 
 01_bosporan_kingdom_task_1_DESC: "Im Westen liegen zwei unerbittliche Feinde: die Söhne von [GetCountry('CHS').GetName|Y], unsere eigensinnigen Verwandten, und die bedrohlichen #G Skythen#!, die eine ernstzunehmende Gefahr darstellen.\n\nWie dem auch sei, wir können nicht zulassen, dass irgendein Rivale Gebiete innerhalb der Provinz #T Taurica#! hält, und so steht uns eine Zeit des Krieges bevor.\n\n\n\n\n\n\n\n\n\n@greek_mil12!" 
  
 01_bosporan_kingdom_task_2: "Tyras und Olbia" 
 01_bosporan_kingdom_task_2_DESC: "Nun, da die bosporanischen Städte [GetProvince('(int32)4544').GetName|Y] und [GetProvince('(int32)4536').GetName|Y] vom #G [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]en Geschlecht#! regiert werden, ist es an der Zeit, auf diesen Erfolgen aufzubauen und die verbleibenden Gebiete im Westen, in denen eine große bosporanische Bevölkerung lebt, zu erobern.\n\n\n\n\n\n\n\n\n\n\n\n@event_pic9!" 
  
 01_bosporan_kingdom_task_3: "Die Schlacht um den Borysthenes" 
 01_bosporan_kingdom_task_3_DESC: "Obwohl die Krieger der #G Skythen#! und #G Iazygen#! uns heftigen Widerstand leisten werden, dürfen wir uns nicht von der überwältigenden Zahl der barbarischen Stämme abhalten lassen, unser Reich zu sichern. [ROOT.GetCountry.GetRuler.GetName] wird bekannt geben, dass wir unsere natürlichen Grenzen bis zum #T Fluss Borysthenes#! verlaufend betrachten.\n\n\n\n\n\n\n\n\n\n@celt_mil11!" 
  
 01_bosporan_kingdom_task_4: "Unterwerfung der Häuptlinge" 
 01_bosporan_kingdom_task_4_DESC: "Mit den Skythen auf dem Rückzug und unserer Westflanke gesichert, können wir nun unsere Aufmerksamkeit auf die #E Kaukasischen#! Stämme im Osten und ihre Stammeshäuptlinge richten, die als Kleinkönige herrschen. \n\nUnser großer Herrscher #Y Leukon I#! hat die stolzen #E Sindianer#! bereits einmal besiegt, und wenn die Kaukasier keinen Krieg mit seinen Nachfolgern wollen, müssen sie sich uns friedlich unterwerfen.\n\n\n\n\n\n\n\n\n\n@persia_mil9!" 
  
 01_bosporan_kingdom_task_5: "Den Warmwasserhafen ausbauen" 
 01_bosporan_kingdom_task_5_DESC: "Die Hafenstadt von [GetProvince('(int32)4544').GetName|Y], glorreich erobert von unserem Herrscher #E Leukon I#! vor einigen Generationen, ist einer unserer wertvollsten Besitzungen, da ihre Gewässer während der harten Winter im Norden nicht zufrieren. Durch den Ausbau der Infrastruktur von Theodosia werden wir sicherstellen, dass Handelsschiffe aus aller Welt unsere Städte das ganze Jahr über weiterhin anlaufen.\n\n\n\n\n\n\n\n\n\n@greek_mil4!"
  
 01_bosporan_kingdom_task_6: "Die Schlacht von Gorgippia" 
 01_bosporan_kingdom_task_6_DESC: "Bedauerlicherweise werden die Gewässer des #G Pontus Euxinus#! von Piraten heimgesucht – diese dreisten Schurken operieren sogar ungehindert von einem unserer Gebiete aus, [GetProvince('(int32)4565').GetName|Y], und es wird erzählt, dass sich hinter den Mauern der Stadt zahlreiche Beutegegenstände befinden.\n\n[ROOT.GetCountry.GetRuler.GetName]  hat entschieden, dass dieser Zustand lange genug angedauert hat. Wir müssen unsere wirtschaftlichen Interessen vor diesen heimtückischen Räubern schützen, die unsere Gesetze missachten. Der [ROOT.GetCountry.GetRulerTitle]  hat den Bau einer großen Flotte angeordnet, denn [ROOT.GetCountry.GetRuler.GetSheHe] plant einen kühnen Angriff auf die Piraten von Gorgippia, in der Hoffnung, ihre Reichtümer zu erbeuten.\n\n#Y Dies wird eine Ereigniskette in Gang setzen, in der unser [ROOT.GetCountry.GetRulerTitle] einen persönlichen Angriff gegen die Piraten anführen wird.#!\n\n\n\n\n\n\n\n\n\n@greek_mil6!" 
  
 01_bosporan_kingdom_task_7: "Athenische Exporte" 
 01_bosporan_kingdom_task_7_DESC: "Vor langer Zeit gewährte unser Anführer #E Leukon I#! den Bürgern von [GetProvince('(int32)416').GetName|Y] bestimmte Handels Privilegien, denn die Bewohner von Attika sind nicht wie wir einem Überschuss an Getreide @grain! gesegnet, und ihre Kaufleute sind stets auf der Suche nach einer zuverlässigen Versorgung mit Lebensmitteln\n\nNun, da wir in [GetProvince('(int32)4544').GetName|Y] über die notwendige Infrastruktur verfügen, um das gesamte Jahr über zu exportieren, möchte  [ROOT.GetCountry.GetRuler.GetName] die Übereinkunft, die wir einst mit den Athenern hatten, erneuern.\n\n\n\n\n\n\n\n\n\n@celt_mil2!" 
  
 01_bosporan_kingdom_task_8: "Die Piraten von Pityous" 
 01_bosporan_kingdom_task_8_DESC: "In seinem Bestreben, die Banditen und Räuber aus dem #G Pontus Euxinus# zu vertreiben, hat der [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName|F] geschworen, den Piratenhafen in [GetProvince('(int32)1743').GetName|Y] zu beseitigen. Die Piraten von Pityous bedrohen seit langem die Küsten bis hin zu [GetProvince('(int32)4563').GetName|Y], aber ihre Stunde ist gekommen.\n\n\n\n\n\n\n\n\n\n@greek_mil11!"
  
 01_bosporan_kingdom_task_9: "Cimmerischer Bosporus" 
 01_bosporan_kingdom_task_9_DESC: "Mit beiden Seiten des #Y Cimmerischen Bosporus#! fest in der Hand, hat [ROOT.GetCountry.GetRuler.GetName] nun seine Aufmerksamkeit auf den Aufbau der Städte zu beiden Seiten dieses wichtigen Gewässers gerichtet.\n\n\n\n\n\n\n\n\n\n@italic_mil2!" 
  
 01_bosporan_kingdom_task_10: "Das Eisen von [GetProvince('(int32)4549').GetName]" 
 01_bosporan_kingdom_task_10_DESC: "Die Stadt [GetProvince('(int32)4549').GetName|Y] produziert Eisen @iron! von ausgezeichneter Qualität, und es wäre sinnvoll, unsere Produktion nach Kräften zu erhöhen. Unsere Armeen verdienen es, nur mit dem Besten ausgerüstet zu werden, und die Schmiede von [ROOT.GetCountry.GetName|F] stehen bereit, um die Waffen zu schmieden, die uns den Sieg bringen werden!\n\n\n\n\n\n\n\n\n\n@celt_mil1!" 
  
 01_bosporan_kingdom_task_11: "Die silberne Kette" 
 01_bosporan_kingdom_task_11_DESC: "Es wurde von unseren Militäringenieuren vorgeschlagen, eine massive Kette über den #G Cimmerischen Bosporus#! zu bauen, die den Verkehrsfluss in und aus dem #Y Palus Maeotica#! kontrollieren soll.\n\n\n\n\n\n\n\n\n\n@greek_mil19!" 
  
 01_bosporan_kingdom_task_12: "Tanais zähmen" 
 01_bosporan_kingdom_task_12_DESC: "Die in den trüben Gewässern der #G Maeotischen Sümpfe#! nördlich von uns gelegene Stadt [GetProvince('(int32)4557').GetName|Y] ist trotz ihres ungesunden Klimas seit langem ein Leuchtfeuer der Zivilisation in der Region. Aber wir können nicht zulassen, dass der Schlamm und Morast unsere Ingenieure fernhält; wir müssen auf seinen stabilen Fundamenten aufbauen und die wichtigste Stadt in der Provinz #G Bosproranum#! schaffen – einen Ort, der den bosporanischen Siedlern würdig ist.\n\n\n\n\n\n\n\n\n\n@greek_mil1!" 
  
 01_bosporan_kingdom_task_13: "Das friedliche Meer" 
 01_bosporan_kingdom_task_13_DESC: "Lasst uns das von #E Leukon I#! begonnene gute Werk vollenden und der Plage der Piraterie im #G Pontus Euxinus#! ein für alle Mal ein Ende setzen. Wo auch immer sie sich befinden mögen, wir werden die Piratenhäfen entlang der Küsten vernichten und  den Handelsrouten Frieden und Wohlstand bringen.\n\n\n\n\n\n\n\n\n\n@greek_mil15!" 
  
 01_bosporan_kingdom_task_14: "Skythische Reiterbogenschützen" 
 01_bosporan_kingdom_task_14_DESC: "In jüngster Vergangenheit gab es viele Fälle, in denen wir auf die Manstärke der #Y Skythen#! und #Y Sarmaten#! angewiesen waren, um unsere Streitigkeiten beizulegen – wer von uns erinnert sich nicht an die Bürgerkriege von #E Eumelus#! und das Blutbad, das seine berittenen Bogenschützen angerichtet haben? Die Hilfe dieser barbarischen Krieger erwies sich in unserer Notlage als unverzichtbar.\n\n Nun, da [GetProvince('(int32)4557').GetName|Y] zu einer echten bosporanischen Stadt geworden ist, wurden auf Befehl von [ROOT.GetCountry.GetRuler.GetName] Boten in die Steppen im Norden geschickt. Unser [ROOT.GetCountry.GetRulerTitle] benötigt berittene Bogenschützen und ist bereit, eine stattliche Summe zu zahlen, um sich die Dienste solcher Reiter zu sichern.\n\n\n\n\n\n\n\n\n\n@persia_mil11!"
  
 01_bosporan_kingdom_task_15: "Der Zorn des Tyrannen" 
 01_bosporan_kingdom_task_15_DESC: "#R Dieses Event wird einen #E Bürgerkrieg#! beginnen#!\n\nEin Mann, der behauptet, der Sohn von #Y Prytanis Spartokides#! zu sein, dem rebellischen Bruder, der vor einigen Jahren von #Y Eumelus Spartokides#! in der #G Schlacht am Maeotis-See#! besiegt wurde, hat heimlich Unterstützung gesammelt und versucht, [ROOT.GetCountry.GetRuler.GetName|Y]! zu stürzen.\n\nPrytanis ist aus dem Exil zurückgekehrt und steht an der Spitze einer #T Siracianischen#! Armee. Er verspricht seinen Männern, dass sie [ROOT.GetCountry.GetCapital.GetName|Y] plündern können, wenn sie ihm helfen, [ROOT.GetCountry.GetRuler.GetFirstName|Y] zu besiegen.\n\n\n\n\n\n\n\n\n\n@italic_mil17!" 
  
 01_bosporan_kingdom_task_16: "Thrakischer Bosporus" 
 01_bosporan_kingdom_task_16_DESC: "Obwohl die [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]en Herrscher in ihren Bemühungen erfolgreich waren, die Piraten aus dem #G Pontus Euxinus#!, zu treiben, gibt es immer noch einige Schurken, die in unseren Gewässern Unheil verursachen, und es ist bekannt, dass sie ihre Plünderungen von [GetProvince('(int32)248').GetName|Y] aus führen. \n\nObwohl die Städte an den Küsten der #G Propontis#! über unsere Anwesenheit in ihren Gewässern verärgert sind, hat sich [ROOT.GetCountry.GetRuler.GetName] von ihren Drohungen nicht einschüchtern lassen und versprochen, die Piratenhöhle in Myrleia in Brand zu stecken.\n\n\n\n\n\n\n\n\n\n@italic_mil22!" 
  
 01_bosporan_kingdom_task_17: "Das Bosporanische Reich" 
 01_bosporan_kingdom_task_17_DESC: "Wer kann leugnen, dass die #Y [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]en Herrscher#! die unbestrittenen Meister des #G Pontus Euxinus#! sind? Von ihrer majestätischen Hauptstadt [ROOT.GetCountry.GetCapital.GetName|T] aus regierend, haben sie eine Ära des Friedens und des Wohlstands über das #T Gastfreundliche Meer#! gebracht." 
  
 01_bosporan_kingdom_task_18: "Brotkorb des Bosporus" 
 01_bosporan_kingdom_task_18_DESC: "Es gibt viele griechische Schiffe, die in unser Reich reisen, um Lebensmittel für ihre hungrigen Bürger zu erhalten, denn die Bewohner von [ROOT.GetCountry.GetName|F] sind mit einer Fülle von Getreide und Fisch gesegnet. Wir müssen nicht nur unser eigenes Volk mit Korn und Fleisch versorgen, sondern auch dafür sorgen, dass ein Überschuss für den Export ins Ausland vorhanden ist.\n\n\n\n\n\n\n\n\n\n@celt_mil14!" 
  
 01_bosporan_kingdom_task_19: "Bürger der Steppen" 
 01_bosporan_kingdom_task_19_DESC: "Obwohl wir in unserer Geschichte schon oft mit den #Y Skythen#! und #Y Sarmaten#! die Klingen gekreuzt haben, lässt sich nicht leugnen, dass viele von ihnen in  [ROOT.GetCountry.GetName|F] leben - sie sind unsere Nachbarn und Partner,manchmal aber auch Feinde.\n\n Die Frage für [ROOT.GetCountry.GetRuler.GetName] ist, ob diese Barbaroi es verdienen, in unsere Gesellschaft integriert zu werden. Viele, die innerhalb von [ROOT.GetCountry.GetCapital.GetName|Y] leben, sehen die Koexistenz als unvermeidlich an, während andere [ROOT.GetCountry.GetRuler.GetFirstName] dazu drängen, diesem Druck zu widerstehen und die traditionellen bosporanischen Tugenden zu bewahren.\n\n#Y Unser [ROOT.GetCountry.GetRulerTitle] wird entscheiden, ob den Skythen und Sarmaten#! #T Bürgerrechte gewährt werden.#!\n\n\n\n\n\n\n\n\n\n@greek_mil13!" 
  
 01_bosporan_kingdom_task_20: "Alles wieder nach Hause bringen"
 01_bosporan_kingdom_task_20_DESC: "Es ist bekannt, dass unsere Vorfahren aus der Stadt [GetProvince('(int32)1973').GetName|Y] an den Ufern des #G Mare Icarium#! kamen, denn die Milesier waren einst sehr aktiv bei der Gründung von Kolonien im gesamten #G Pontus Euxinus#! .\n\nPolitische Unruhen und wirtschaftliche Chancen trieben unsere Großväter vor langer Zeit in den Norden, aber nun ist die Zeit gekommen, unsere alte Heimat zurückzuerobern.\n\n\n\n\n\n\n\n\n\n@italic_mil19!"
  
 01_bosporan_kingdom_task_21: "Sicherung der Kuhpassage" 
 01_bosporan_kingdom_task_21_DESC: "Zeus' Geliebte Io, die die Linie des Herakles begründete, überquerte hier in Gestalt einer Kuh den #E Bosporus#! und gab ihm damit seinen Namen. Diese Meerenge kontrolliert einen Großteil des Handels in der Region, und ihre Sicherung wäre ein großer Gewinn für die Bevölkerung von [ROOT.GetCountry.GetName].\n\n\n\n\n\n\n\n\n\n@egypt_mil19!" 
  
 01_bosporan_kingdom_task_22: "Hegemon des gastfreundlichen Meeres" 
 01_bosporan_kingdom_task_22_DESC: "Wirtschaftlich und politisch könnte [ROOT.GetCountry.GetName] ] zu einer uneinnehmbaren Macht werden, wenn es den gesamten #G Pontus Euxinus#! kontrollieren würde und damit alleinige Entscheidungsgewalt über Schifffahrt, Personenverkehr und militärische Angelegenheiten hätte.  Würde das Meer zu [ROOT.GetCountry.GetRuler.GetName|Y]s persönlichem Meer werden, würden der Thron und das Vermächtnis von #G Eumelus#! von dem mächtigen [ROOT.GetCountry.GetRulerTitle] übertroffen werden.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!" 
  
 01_bosporan_kingdom_task_23: "Häfen des Pontus Euxinus" 
 01_bosporan_kingdom_task_23_DESC: "Nun, da die Piraten aus dem #E Pontus Euxinus#! vertrieben wurden, wie die Hunde, die sie sind, ist es an der Zeit, dass wir Häfen und Anlegestellen in unseren Städten und Siedlungen errichten. Wir sind nun die unangefochtenen Herren der Meere und sollten über die Infrastruktur verfügen, um solch kühne Ansprüche durchzusetzen.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil6!" 
  
 01_bosporan_kingdom_task_24: "Theodosianischer Handel" 
 01_bosporan_kingdom_task_24_DESC: "Unsere Stadt in [GetProvince('(int32)4544').GetName|Y] ist die größte Handelsstadt im gesamten #G Pontus Euxinus#!, und ausländische Kaufleute segeln aus so weit entfernten Orten wie [GetProvince('(int32)516').GetName|T] und [GetProvince('(int32)3256').GetName|T] herbei, um in unseren Häfen Geschäfte zu machen. Dies ist die direkte Folge der Bemühungen von [ROOT.GetCountry.GetRuler.GetName|Y], die maritime Infrastruktur des berühmten Hafens von Theodosia auszubauen. In den letzten Jahrenfanden umfangreiche Bauarbeiten statt, um das rasante Wachstum des Handels zu unterstützen.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil6!"
  
 01_bosporan_kingdom_task_25: "Der Bosporanische Bund" 
 01_bosporan_kingdom_task_25_DESC: "In den Tagen, bevor unser Vorfahr #Y Spartokos#! die Macht von den schwachen und korrupten #R Archaeanactiden#! ergriff, schlossen sich die freien Stadtstaaten von #G Taurica#! zu Verteidigungsbündnissen zusammen, um sich gegenseitig zu verteidigen. [ROOT.GetCountry.GetRuler.GetName|Y] erwägt, einen weiteren #T 'Bosporanischen Bund'#! zu proklamieren, um andere für unsere Sache zu gewinnen. \n\n Täuscht euch nicht, der Bosporanische [ROOT.GetCountry.GetRulerTitle] hat keineswegs vor, Macht abzugeben, aber die Nutzung des Namens des alten Bündnisses wird uns Ansehen und Ehre einbringen.\n\n #Y Unsere#! #G Flagge#! #Y und#! #G unser nationales Erbe#! #Y werden sich ändern.#!\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!" 
  
 01_bosporan_kingdom_task_26: "Sklaven aus den Steppen" 
 01_bosporan_kingdom_task_26_DESC: "An der Mündung des #E Palus Maeotica#! liegt die Stadt  [GetProvince('(int32)4557').GetName|Y]  inmitten kalter und regnerischer Sumpfgebiete und ist der letzte Außenposten der Zivilisation, bevor man auf die endlose Steppe trifft. Daher ist sie ein natürlicher Ort für die #E Griechen#! und #E Skythen#!, um Geschäfte zu tätigen, und hat sich als Handelszentrum einen Namen gemacht, in dem man Sklaven erwerben kann.\n\n\n\n\n\n\n\n\n\n\n@italic_mil23!" 
  
  
 #Tooltips 
  
 bosporan_needs_civic_investments_tt: "Wir benötigen die Provinzinvestition #T Handelsinvestitionen anlocken#! in der Provinz #Y Taurica#!."
 bosporan_needs_military_investments_tt: "Wir benötigen die Provinzinvestition #T Provinz befestigen#! in der Provinz #Y Bosproranum#!." 
 bosporan_kingdom_task_4_tt: "#G Maeotia#! #Y und #! #G Sindica#! #Y müssen mindestens#! #T 75 Meinung#! #Y von uns haben.#!" 
 bosporan_missions_task_6_tt: "Habt einen einzige Flotte mit mindestens #Y 30#! Schiffen, die sich auf dem hervorgehobenen #Y Pontus Euxinus#! Seefeld  befindet."
 bosporan_missions_task_15_tt: "Habt eine einzelne Flotte mit mindestens #Y 50#! Schiffen, die sich auf dem hervorgehobenen #Y Propontis#! Seegebiet befinden." 
 bosporan_missions_task_18_tt: "Wir müssen mindestens #T 5 Bauernsiedlungen#! in unserem Territorium bauen." 
 randomized_rewards_for_sacking_pirate_havens_tt: "Jedes Mal, wenn eine Einheit die Fähigkeit #Y Piraterie ausmerzen#! verwendet, erhalten wir eine zufällige Menge #T Gold#! und 1 #G Sklave @slaves!#! in unserer Hauptstadt." 
 leader_receives_good_military_trait_tt2: "Unser Herrscher erhält #G 2#! und #G 6#! Kriegskunst." 
 me_bosporan_6_tooltip2: "#R Unser Herrscher wird einen gewagten Angriff auf das Piratenlager durchführen!#!" 
 bosporan_claims_on_pirates_worldwide_tt: "Wir erhalten Ansprüche auf jedes Gebiet, das einen #! #Y Piratenhafen#! hat." 
  
  
 #Modifiers 
 BPK2_FLAG: "Das glorreiche lila Banner des Bosporanischen Reiches" 
 theodosia_warm_water_port_mod: "Hafen von Theodosia" 
 desc_theodosia_warm_water_port_mod: "Der Warmwasserhafen von Theodosia stellt sicher, dass Schiffslieferungen unser Land das ganze Jahr über erreichen können, selbst wenn die Kälte des Winters das Land im Griff hat." 
 bosporan_antipiracy_mod: "Das Erbe von Eumelus"
 desc_bosporan_antipiracy_mod: "Eumelus, einer der größten Bosporanischen Basileis, duldete keine Piraterie im Pontus Euxinus und führte Krieg gegen Räuber und Banditen. Die Bosporaner haben sich dieses Ethos zu eigen gemacht und lassen sich von seinen Prinzipien leiten." 
 BOSPORAN_EMPIRE_NAME: "Bosporanisches Reich" 
 BARBARIAN_NICKNAME: "'Der Barbar'" 
 bosporan_iron_of_pantikapaion_mod: "Eisen aus Pantikapaion" 
 desc_bosporan_iron_of_pantikapaion_mod: "Das in der Stadt Pantikapaion hergestellte Eisen ist von ausgezeichneter Qualität,  sodass viele Reisende aus der zivilisierten Welt und den unzivilisierten Steppen zu den Gießereien der bosporanischen Schmiede kommen, in der Hoffnung, das veredelte Metall für sich selbst erwerben zu können." 
 silver_chain_cimmerian_bosporus_mod: "Die Silberkette des Cimmerischen Bosporus" 
 desc_silver_chain_cimmerian_bosporus_mod: "Die Bosporaner haben eine robuste Kette gebaut, die die Gebiete Pantikapaion und Phanagoria im gesamten Cimmerischen Bosporus verbindet." 
 bosporan_big_farms_mod: "Großer Getreidespeicher" 
 desc_bosporan_big_farms_mod: "Die Bemühungen der Bosporaner, ihre landwirtschaftliche Produktion zu steigern, konzentrierten sich auf die Hafenstädte von Taurica, wo große Getreidespeicher errichtet wurden." 
 bosporan_statue_in_athens_mod: "Statue eines bosporanischen Basileus" 
 desc_bosporan_statue_in_athens_mod: "Um die Bosporaner zu ehren, die ihre Stadt mit Getreide versorgen, haben die Bürger von Athenai eine Statue ihres Herrschers auf der Hauptagora errichtet." 
 bosporan_revolter_name: "Republik des cimmerischen Bosporus" 
 bosporan_big_iron_mod: "Gießereien von Pantikapaion" 
 desc_bosporan_big_iron_mod: "Die Bosporaner haben große Anstrengungen unternommen, um die Eisenproduktion in ihrer Stadt Pantikapaion aufzubauen, und das Metall, das hier in den Gießereien hergestellt wird, ist das beste in der Region." 
 cimmerian_bosporus_mod: "Cimmerischer Bosporus" 
 bosporan_scythian_citizens_mod: "Skythische Reiterbogenschützen" 
 desc_bosporan_scythian_citizens_mod: "Die Bosporaner kämpfen mit berittenen Bogenschützen an der Seite ihrer traditionellen Truppen und kombinieren hellenische Taktiken mit der Beweglichkeit der Steppenreiter, was verheerende Auswirkungen hat." 
 bosporan_sarmatian_citizens_mod: "Sarmatische schwere Kavallerie" 
 desc_bosporan_sarmatian_citizens_mod: "Die Sarmaten sind die Herren der Steppe und beherrschen riesige Gebiete, die weit über unsere Karten und unser Wissen hinausreichen. Ihre Geschicklichkeit im Umgang mit Pferden ist unübertroffen." 
 bosporan_scythian_and_sarmatian_citizens_mod: "Barbarische Reiter"
 desc_bosporan_scythian_and_sarmatian_citizens_mod: "Die Bosporaner haben die militärischen Traditionen der Nomaden mit vernichtender Wirkung übernommen und sowohl skythische Reiterbogenschützen als auch sarmatische schwere Kavallerie in ihren Armeen eingesetzt." 
 bosporan_civil_war_good_modifier: "Geist der Spartokiden" 
 desc_bosporan_civil_war_good_modifier: "Das Volk der Bosporaner hat sich angesichts von Katastrophen und Kriegen zur Verteidigung des Landes zusammengeschlossen." 
 tanais_jewish_district_mod: "Jüdischer Bezirk" 
 desc_tanais_jewish_district_mod: "Die Stadt Tanais hat einen berühmten jüdisches Bezirk, das ein Leuchtfeuer ihrer Kultur im hohen Norden ist."
 create_merc_state_price_cost_modifier: "Erstelle Söldnerstaat-Preiskostenmodifikator" 
 black_sea_bosporan_hegemon: "Hegemon des Gastfreundlichen Meeres" 
 desc_black_sea_bosporan_hegemon: "Die unvergleichlichen Bosporaner beherrschen den riesigen Pontus Euxinus als ihr Eigentum und sind unbestreitbar die Hegemonialmacht des Gastfreundlichen Meeres." 
  
 #Treasures 
 treasure_pirate_barbarian_skull: "Piraten-Barbarenschädel-Rhyton"
 treasure_pirate_barbarian_skull_desc: "Der Schädel eines barbarischen Piraten, der gegen den bosporanischen Herrscher kämpfte, wurde zu einem Rhyton gemacht und wird in Zeremonien verwendet, in denen die kriegerischen Leistungen der Spartokiden-Dynastie geehrt wurden." 
  
 #Events 
 me_bosporan_1_title: "$01_bosporan_kingdom_task_1$" 
 me_bosporan_1_desc: "Mein [ROOT.GetCountry.GetRulerTitle], wir haben die Provinz [ROOT.GetCountry.GetCapital.GetArea.GetRegion.GetName] offiziell für uns beansprucht - aIhr müsst nur noch den Befehl geben, und unsere Soldaten werden unsere Feinde vom Schlachtfeld vertreiben. Eines Tages werden wir über die gesamte Region Taurica herrschen, aber zuerst müssen wir die Provinz unter unsere Kontrolle bringen." 
 me_bosporan_1.a: "Die Eroberung von Taurica ist nur der Beginn dessen, was wir tun müssen" 
 me_bosporan_1_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_1$#!' $mission_completed_tooltip_2$!"
  
 me_bosporan_2_title: "$01_bosporan_kingdom_task_2$" 
 me_bosporan_2_desc: "Die reichen Städte von [GetProvince('(int32)4536').GetName] und [GetProvince('(int32)4538').GetName] sind in unsere Hände gefallen und haben [ROOT.GetCountry.GetRuler.GetName] dringend benötigte militärische Erfahrung und den Respekt unserer Truppen gebracht. Waffen und Nahrungsmittel, die angeblich aus [GetProvince('(int32)207').GetName] stammen, , der alten Gründerstadt der Kolonie, aus der [GetProvince('(int32)4538').GetName]hervorging, wurden an verschiedenen Stellen in die Stadt geschmuggelt, wodurch sich die Belagerung um Wochen verlängerte und gute bosporanische Männer bei dem Versuch, die Mauern zu stürmen, ums Leben kamen.\n\n Nachdem wir nun die Westküste von [ROOT.GetCountry.GetCapital.GetArea.GetRegion.GetName] erobert haben,  haben einige unserer militärischen Berater den [ROOT.GetCountry.GetRulerTitle] dazu gedrängt, eine Invasion der hellenischen Städte im Nordwesten zu starten. [GetProvince('(int32)4529').GetName], [GetProvince('(int32)4525').GetName] und [GetProvince('(int32)4526').GetName] sind die Namen, die in den Kriegsräten am meisten erwähnt wurden, aber [ROOT.GetCountry.GetRuler.GetFirstName] hat andere Pläne im Sinn." 
 me_bosporan_2.a: "Bereitet unsere Aufgebote und Schiffe für die westliche Invasion vor" 
 me_bosporan_2.b: "Wir müssen die Mutterstadt von [GetProvince('(int32)4538').GetName] bestrafen - wir segeln nach Süden" 
 me_bosporan_2_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_2$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_3_title: "$01_bosporan_kingdom_task_3$"
 me_bosporan_3_desc: "In den letzten Jahren sind die #E Skythen#! zu einer echten Bedrohung für die Menschen von [ROOT.GetCountry.GetName] geworden und zu  Erzfeinden von [ROOT.GetCountry.GetRuler.GetName] geworden, die sich geschworen haben, ihre Armeen weit nach Norden zu schieben, und weg von unseren Städten.\n\nNachdem [ROOT.GetCountry.GetRuler.GetSheHe] unseren Soldaten bewiesen hat, dass wir die Skythen leicht aus den Wäldern von #E Taurica#! vertreiben können, will der [ROOT.GetCountry.GetRulerTitle] weiter angreifen – [ROOT.GetCountry.GetRuler.GetFirstName] wird nicht zufrieden sein, bis die Bosporaner Gebiete bis zum #E Fluss Borysthenes#! und vielleicht sogar darüber hinaus erobert haben – eine gewaltige Aufgabe, die das Ausmaß von [ROOT.GetCountry.GetRuler.GetHerHis]en Ambitionen widerspiegelt." 
 me_bosporan_3.a: "Das Gewässer des Borysthenes wird eine gute natürliche Grenze bilden" 
 me_bosporan_3_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_3$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_4_title: "$01_bosporan_kingdom_task_4$"
 me_bosporan_4_desc: "Als sich in [ROOT.GetCountry.GetCapital.GetArea.GetRegion.GetName] die Nachricht vom Sieg der Armeen von [ROOT.GetCountry.GetRuler.GetName] verbreitete,  nahmen die #E kaukasischen#! Stämme im Osten davon Kenntnis und bemühten sich um freundschaftliche Beziehungen zu [ROOT.GetCountry.GetName]. Es wurden gegenseitig Geschenke und Höflichkeiten ausgetauscht, und als eines Tages Boten aus [ROOT.GetCountry.GetCapital.GetName] zu ihren Lagern ritten und sie zu einem Treffen mit dem [ROOT.GetCountry.GetRulerTitle] einluden, erklärten sich die Stammeshäuptlinge von [GetCountry('MAE').GetName] und [GetCountry('SND').GetName]  bereit, ihre Heimat zu verlassen und die Stadt zu besuchen.\n\nDie Barbaren waren beeindruckt, als sie die Stadt der Spartokiden betraten, und es heißt, dass sie mit offenem Mund durch die Straßen gingen und voller Staunen die prächtigen Marmorgebäude und weitläufigen Alleen der Hauptstadt bestaunten. Überwältigt von der Macht und Stärke des bosporanischen Volkes, zeigten sie sich demütig, als sie später am Abend [ROOT.GetCountry.GetRuler.GetFirstName] trafen, und waren empfänglich für die Worte des [ROOT.GetCountry.GetRulerTitle]s [ROOT.GetCountry.GetRuler.GetFirstName].\n\n  In der Vergangenheit sind unsere Soldaten schon oft durch die Länder im Osten marschiert, und wir haben ihre Siedlungen in den Wäldern und Sümpfen von #E Maeotia# unzählige Male angegriffen – wir fürchten sie nicht, und das wissen wir alle. Als daher die Vasallenschaft als Mittel zur Sicherung eines dauerhaften Friedens zwischen unseren Völkern vorgeschlagen wurde, zögerten die Häuptlinge nicht, sondern verneigten sich sofort vor [ROOT.GetCountry.GetRuler.GetFirstName]. Der bosporanische [ROOT.GetCountry.GetRulerTitle] krönte sie von diesem Moment an zu #E Klientelkönigen#! und versprach ihnen eine glorreiche Zukunft als Untertanen von [ROOT.GetCountry.GetName]." 
 me_bosporan_4.a: "Es soll geschehen, wie Ihr sagt, mein Herr." 
 me_bosporan_4_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_4$#!' $mission_completed_tooltip_2$!"
  
 me_bosporan_5_title: "$01_bosporan_kingdom_task_5$" 
 me_bosporan_5_desc: "Obwohl die starken Winde aus dem Norden im Winter Schnee und Eis in viele Städte von [ROOT.GetCountry.GetName] bringen, frieren die Häfen von [GetProvince('(int32)4544').GetName] nie zu, und dieses göttliche Geschenk der Götter des Meeres  ermöglicht es Handelsschiffen, das ganze Jahr über in unseren Häfen anzulegen. \n\nNicht nur hat unser Volk Zugang zu den feinsten Handelsgütern von den berühmten Märkten und Handelszentren der mächtigen Reiche in unserem Süden, sondern unsere Kassen sind gefüllt mit Gold- und Silbermünzen, die uns von Händlern gebracht werden, die unsere eigenen Waren kaufen wollen. Die hungrigen Städte der Griechen kaufen unser Getreide und unseren Fisch, den wir im Überfluss haben, und sie zahlen auch extravagante Summen für unsere Pelze. Auch der Großteil des Handels mit den Steppenbarbaren geht irgendwann durch unsere Finger, und so wurde die Idee, den Hafen von Theodosia auszubauen, von allen begrüßt und von niemandem abgelehnt."
 me_bosporan_5.a: "Ein ausgebauter Hafen bringt uns Möglichkeiten, die wir noch nie zuvor hatten" 
 me_bosporan_5_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_5$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_6_title: "$01_bosporan_kingdom_task_6$"
 me_bosporan_6_desc: "Nun, da [ROOT.GetCountry.GetRuler.GetName] beschlossen hat, die heiligen Eide von #E Eumelus#! zu erfüllen und die Piraten zu vernichten, die den Handel innerhalb des #E Pontus Euxinus#! stören, hat [ROOT.GetCountry. GetRulerTitle] hat eine Flotte versammelt, um ein Piratenlager an der Küste in der Nähe von [GetProvince('(int32)4565').GetName] anzugreifen. \n\nNur wenige Stunden nach dem Verlassen des Hafens entdeckte die bosporanische Flotte den #E Piratenhafen#! - die Schurken hatten sich in der Nähe der Grenze von [GetProvince('(int32)4566').GetName] eingerichtet.  niedergelassen. [ROOT.GetCountry.GetRuler.GetFirstName] rief sofort nach [ROOT.GetCountry.GetRuler.GetHerHis]en Waffen und Rüstung und befahl den Männern, sich vorzubereiten." 
 me_bosporan_6.a: "Wir werden sie jetzt angreifen! Weiter zum Sieg, mutige Krieger!"
 me_bosporan_6_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_6$#!' $mission_completed_tooltip_2$"
  
 me_bosporan_7_title: "$01_bosporan_kingdom_task_7$"
 me_bosporan_7_desc: "Viele Jahre lang herrschte [GetCountry('PRY').GetName] über die Menschen von [GetProvince('(int32)416').GetName] mit einer eisernen Faust, und bestimmte sogar, welche Arten von Handel und Gewerbe in den Kaufhäusern dieser berühmten Stadt erlaubt waren. [GetCharacter('(int32)38').GetName], Sohn von [GetCharacter('(int32)37').GetName], war persönlich für den Kornimport verantwortlich und verwaltete ihn viele Jahre lang willkürlich, wobei er es keinem anderen erlaubte, seine Nahrungsmittel an die Bürger zu verkaufen - aber jetzt ist er tot.\n\n Vor langer Zeit war [ROOT.GetCountry.GetRuler.GetName]s Vorfahre #E Leukon#! als Freund der Athener bekannt, der große Mengen an Getreide in die Stadt schickte und die ewige Bewunderung des Volkes erntete, aber diese Beziehung wurde von den Antigoniden zerstört. Aber ohne Demetrios ist die Frage, woher Athenai das Mehl zum Backen ihres Brotes beziehen wird, die unsere, und Boten von [ROOT.GetCountry.GetRuler.GetFirstName] konnten nach Verhandlungen mit den Magistraten der Stadt unser Getreide erfolgreich auf ihren Markt zurückbringen. \n\nAthenische Schiffe verlassen unsere Häfen alle paar Monate, ihre Laderäume sind zum Bersten gefüllt mit Amphoren, die lebenserhaltenden Weizen und Honig enthalten, und es wird berichtet, dass eine Statue von [ROOT.GetCountry.GetRuler.GetFirstName] in der Agora in Athenai errichtet wurde, um unseren [ROOT.GetCountry.GetRulerTitle] zu ehren."
 me_bosporan_7.a: "Ich fühle mich geehrt dies zu hören und bin dankbar für die Freundschaft der Athener." 
 me_bosporan_7_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_7$#!' $mission_completed_tooltip_2$!"
  
 me_bosporan_8_title: "$01_bosporan_kingdom_task_8$" 
 me_bosporan_8_desc: "Nach wichtigen Lehren aus der #E Schlacht von Gorgippia#! machte [ROOT.GetCountry.GetRuler.GetName] kurzen Prozess mit den Piraten, die in einer verlassenen Festung an der Küste von  [GetProvince('(int32)1743').GetName] hausten. Es gab keinen nennenswerten Widerstand; die kampferprobten Krieger unter dem Kommando von [ROOT.GetCountry.GetRulerTitle] zeigten keine Gnade mit den Seeräubern, sondern töteten jeden einzelnen von ihnen und setzten ihre baufälligen Hütten in Brand.\n\n In seinen wenigen Jahren auf dem Thron hatte #E Eumelus#! versucht, den #E Pontus Euxinus#! von der Seeräuberplage zu befreien, die sich in dessen Gewässern herumtreibt, aber [ROOT.GetCountry.GetRuler.GetFirstName] hat die Bemühungen von [ROOT.GetCountry.GetRuler.GetHerHis]em unglücklichem Vorgänger bereits übertroffen. Trotz [ROOT.GetCountry.GetRuler.GetHerHis]es wachsenden Ruhmes lobt der bosporanische Herrscher immer wieder andere für ihre Bemühungen, die Geißel der Piraterie auszurotten, und behauptet, dass die Soldaten der Aufgebote diejenigen sind, die wirklich Dank verdient haben." 
 me_bosporan_8.a: "Möge das Erbe von Eumelus uns dazu bringen, großartige Dinge zu erreichen" 
 me_bosporan_8_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_8$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_9_title: "$01_bosporan_kingdom_task_9$" 
 me_bosporan_9_desc: "[GetProvince('(int32)4549').GetName] und [GetProvince('(int32)4563').GetName]  liegen auf beiden Seiten des #E Bosporus Cimmerius#!, dem Gewässer, das die Provinzen #E Taurica#! und #E Maeotia#! voneinander trennt, und diese beiden Städte haben lange von ihrer günstigen Lage am sogenannten #E Cimmerian Bosporus#! profitiert.\n\nMit Häfen, die leicht Zugang zum #E Pontus Euxinus#! und zum #E Palus Maeotica#! bieten, fließt der Handel auf natürliche Weise in die Häfen der Bosporaner, die mit dem An- und Verkauf an Griechen und Skythen gleichermaßen ihr Vermögen machen. Dank der Bemühungen der [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]en Herrscher, die Infrastruktur auf beiden Seiten der Kreuzung auszubauen, haben beide Städte an Reichtum und Prestige gewonnen, was es [ROOT.GetCountry.GetRuler.GetName] ermöglicht hat, weitere Investitionen zum Wohlstand des Landes zu tätigen."
 me_bosporan_9.a: "Es ist meine Pflicht als [ROOT.GetCountry.GetRulerTitle] große bosporanische Städte zu errichten"
 me_bosporan_9_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_9$#!' $mission_completed_tooltip_2$"
  
 me_bosporan_10_title: "$01_bosporan_kingdom_task_10$" 
 me_bosporan_10_desc: "Gutes Eisen @iron!  ist schwer zu finden, wenn man am Rande der zivilisierten Welt lebt, was das in der Stadt [GetProvince('(int32)4549').GetName] produzierte Metall umso seltener und wertvoller für diejenigen macht, die in  [ROOT.GetCountry.GetName] leben. \n\nDie Herstellung von hochwertigem Eisen für die Armeen war schon immer wichtig für [ROOT.GetCountry.GetRuler.GetName], der dafür sorgte, dass Mittel für den Bau von Mühlen und Gießereien innerhalb der Stadtmauern bereitgestellt wurden. Die bosporanischen Schmiede arbeiten jeden Tag viele Stunden, und die tödlichen Waffen, die sie herstellen, werden entweder an die Soldaten weitergegeben oder auf Schiffe verladen und auf dem Markt für einen hohen Gewinn verkauft."
 me_bosporan_10.a: "Ich muss sicherstellen, dass unsere Soldaten für den Kampf gerüstet sind"
 me_bosporan_10_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_10$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_11_title: "$01_bosporan_kingdom_task_11$"
 me_bosporan_11_desc: "Erstmalige Besucher, die in die Gewässer des #E Bosporus Cimmerius#! segeln, werden oft von einem Anblick begrüßt, der sie zunächst verwirrt: ein mächtiges Netz von Befestigungen, die zu beiden Seiten der Meerenge in die Mauern gebaut sind, mit einer massiven #E Silberkette#! zwischen ihnen. Diese so genannte ‚Silberkette‘, die hell in der Sonne glänzt, besteht in Wirklichkeit aus Eisen aus den Werken und Gießereien von  [GetProvince('(int32)4549').GetName] und alle Schiffe, die in die Häfen der Bosporaner einlaufen wollen, müssen die Erlaubnis erhalten, in die von dieser Kette blockierten Häfen einzulaufen.\n\nNatürlich ist der Schmuggel von Waren in und aus der Region so gut wie unmöglich, auch wenn einige Narren es regelmäßig versuchen und kläglich scheitern. Die meisten Händler sind jedoch ehrbare Männer und bereit, für den Zugang zu den Märkten des cimmerischen Bosporus zusätzliche Steuern zu entrichten." 
 me_bosporan_11.a: "Ich werde Piraterie und dem Schmuggel in [ROOT.GetCountry.GetName] ein Ende setzen" 
 me_bosporan_11_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_11$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_12_title: "$01_bosporan_kingdom_task_12$"
 me_bosporan_12_desc: "Die Bemühungen der Bosporaner, die Stadt [GetProvince('(int32)4557').GetName] auszubauen, waren ein überwältigender Erfolg. Sie dient als natürliches Tor zwischen unserer Welt und der der Steppe - - es ist ein alltäglicher Anblick, #E Skythen#! und #E Sarmaten#! auf unseren Märkten und öffentlichen Plätzen zu sehen, und obwohl die Stadt am Rande der zivilisierten Welt liegt, hat sie eine kosmopolitische Atmosphäre, die alle willkommen heißt, unabhängig von ihrer Religion, ihrer Sprache oder ihrer Herkunft.\n\nKürzlich wurde von einigen der führenden jüdischen Familien, die in [GetProvince('(int32)4565').GetName] leben, eine Bittschrift verfasst, in der sie darum baten, einen Bezirk in Tanais errichten zu dürfen.  [ROOT.GetCountry.GetName] hat den in ihren Städten lebenden Hebräern stets Wohlwollen entgegengebracht, und im Laufe der Jahre sind die jüdischen Gemeinden in unseren Küstenstädten gewachsen." 
 me_bosporan_12.a: "Es werden keine Privilegien gewährt"
 me_bosporan_12.b: "Ich werde dem Wunsch meiner jüdischen Brüder nachkommen – ihr habt meinen Segen." 
 me_bosporan_12_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_12$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_13_title: "$01_bosporan_kingdom_task_13$" 
 me_bosporan_13_desc: "Geleitet vom #E Vermächtnis des Eumelus#! und seinem Wunsch, den #E Pontus Euxinus#! von Piraten zu befreien, kann der siegreiche [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName] endlich behaupten, dass diese Aufgabe nun erfüllt ist. Die berüchtigtsten Piratenverstecke in der Region wurden ausgelöscht, ihre Flotten zu Asche verbrannt, und jeder Räuber, der von den Soldaten von [ROOT.GetCountry.GetRuler. GetFirstName] gefangen genommen wurde, wurde gekreuzigt - die Bosporaner haben mehr als deutlich gemacht, dass sie Piraterie in ihren Gewässern nicht dulden.\n\nDer Ruhm von [ROOT.GetCountry.GetRuler.GetFirstName] wächst weiter, da sich die Nachricht von [ROOT.GetCountry.GetRuler.GetHerHis]en waghalsigen Angriffen auf Piratenlager in Übersee weithin herumspricht. Der [ROOT.GetCountry.GetRulerTitle] erwirbt sich den Ruf eines meisterhaften Seefahrers, der für Gerechtigkeit und Stabilität kämpft."
 me_bosporan_13.a: "Alles, was Sie von mir gehört haben, ist wahr" 
 me_bosporan_13_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_13$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_14_title: "$01_bosporan_kingdom_task_14$" 
 me_bosporan_14_desc: "Von unserem Aussichtspunkt in der Stadt [GetProvince('(int32)4557').GetName] aus, die als Bastion der bosporanischen Kultur in einer ansonsten barbarischen Region dient, hat [ROOT.GetCountry.GetRuler.GetName] unsere Kontakte zu den im Norden lebenden #E Sarmaten#! mehr als je zuvor in unserer Geschichte ausgebaut.\n\nAls der Ruf in die Steppe hinausging, dass die Armeen von [ROOT.GetCountry.GetName] gutes Gold für berittene Bogenschützen zahlen würden, die bereit wären, an der Seite unserer Truppen zu kämpfen, kam ein Mann namens [SCOPE.sCharacter('conan_the_barbarian').GetName], ein cimmerischer Nomade mit dem Schwert in der Hand, dunkelhaarig und mit mürrischem Gesichtsausdruck, ein Wiedergänger und Schlächter, an der Spitze einer Armee in Tanais an.\n\n Dieser Cimmerier offenbarte, dass ihm seine Gottheit, ein grimmiger Gott der Berge, der den Kampf liebt und Schwäche verachtet, im Traum erschienen sei und ihm gesagt habe, er solle seine Armee nach Tanais bringen, denn das Schicksal von [SCOPE.sCharacter('conan_the_barbarian').GetFirstName] läge in  [ROOT.GetCountry.GetName]."
 me_bosporan_14.a: "Endlich ein Mann, der das Rätsel des Stahls versteht..." 
 me_bosporan_14_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_14$#!' $mission_completed_tooltip_2$!"
  
 me_bosporan_15_title: "$01_bosporan_kingdom_task_15$" 
 me_bosporan_15_desc: "Schreckliche Nachrichten erreichten [ROOT.GetCountry.GetCapital.GetName] es gibt einen Usurpator, der behauptet, der uneheliche Sohn von #E Prytanis#! zu sein, einem der Söhne von #E Paerisades#! der gegen #E Eumelus#! um den bosporanischen Thron gekämpft hat.und er hat einen Bürgerkrieg in [ROOT.GetCountry.GetName] begonnen! \n\nEs gibt viele, die [ROOT.GetCountry.GetRuler.GetName] um [ROOT.GetCountry.GetRuler.GetHerHise]e Erfolge beneiden, und so fand ein Tyrann, der an der Spitze einer gewaltigen sarmatischen Armee aus der Wildnis auftauchte und nach Gerechtigkeit für seinen getöteten Vater verlangte, ein offenes Ohr.\n\n Niemand weiß mit Sicherheit, ob dieser rebellische Prytanis tatsächlich ein #E Spartokide#! ist oder nicht, aber viele halten es für wahr, so dass sich die Frage erübrigt - viele unserer Landsleute haben sich hinter diesen Krieger gestellt und sich für die #E Republik des Cimmerischen Bosporus#! ausgesprochen." 
 me_bosporan_15.a: "Dann werde ich sie alle töten! Keine Gnade für Verräter!"
 me_bosporan_15_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_15$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_16_title: "$01_bosporan_kingdom_task_16$" 
 me_bosporan_16_desc: "Zu ihrer Verteidigung sei gesagt, dass die Piraten von [GetProvince('(int32)248').GetName] nicht versuchten zu fliehen, als die bosporanischen Flotten in die #E Propontis#! segelten, sondern sich mutig unseren Schiffen entgegenstellten und ehrenvoll starben.\n\nUnsere Seeleute zerstörten ihre Heimstätte, aber die Berichte, die sie nach [ROOT.GetCountry.GetRuler.GetName] brachten, waren beunruhigend. Es scheint, dass diese Briganten von den in den Städten [GetProvince('(int32)1453').GetName] und [GetProvince('(int32)240').GetName] lebenden Beamten mit hohen Summen bezahlt worden waren, um unsere Schifffahrt zu stören - diese Piraten segelten mit den Segen der #E Propontischen Griechen#!, die sich auf unsere Kosten bereichern wollten." 
 me_bosporan_16.a: "Wenn wir den Bosporus nehmen müssen, um ihnen eine Lektion zu erteilen, werden wir es tun!" 
 me_bosporan_16_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_16$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_17_title: "$01_bosporan_kingdom_task_17$"
 me_bosporan_17_desc: "Aus bescheidenen Anfängen ist das Volk des #E Bosporanischen Königreichs#! unter der Führung der Spartokiden-Dynastie zu ungeahnten Höhen aufgestiegen. Diese hat nicht nur die Geißel der Piraterie aus den Gewässern des #E Pontus Euxinus#! vertrieben, sondern auch ein mächtiges Reich im Norden errichtet, das sowohl die Griechen als auch die Skythen umfasst. Als unangefochtener [ROOT.GetCountry.GetRulerTitle] eines Reiches, das sich zwischen der zivilisierten und der barbarischen Welt befindet, haben die Bosporaner ihren eigenen Weg gefunden und sind einen Mittelweg gegangen, der ihren eigenen Traditionen und Idealen treu geblieben ist.\n\nDie große Metropole [ROOT.GetCountry. GetCapital.GetName] zieht Menschen aus allen Teilen der Welt an, die über Land und Meer anreisen, um die Märkte und Handelsplätze von [ROOT.GetCountry.GetName] zu besuchen, und alle wundern sich, dass diese großartigen Leistungen von den Nachkommen eines söldnerischen Usurpators vollbracht wurden. Die [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]en Herrscher sind eine der berühmtesten und mächtigsten Familien der Welt, und ihr Reich ist unübertroffen in Stärke und Ruhm."
 me_bosporan_17.a: "Wenn nur Spartokos sehen könnten, was seine Söhne erreichen konnten!" 
 me_bosporan_17_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_17$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_18_title: "$01_bosporan_kingdom_task_18$"
 me_bosporan_18_desc: "Die Götter haben unserem Volk viele Geschenke gewährt, und wir sind gesegnet, Gewässer mit Fischen, Feldern mit reifen Getreide und Nutztieren zu haben - Luxusgüter, die nicht jedem zuteil werden. [ROOT.GetCountry.GetRuler.GetName] erkannte, wie wichtig es ist, gute Verwalter des Landes zu sein, und baute viele Bauernhöfe in gesamten Bereich von [ROOT.GetCountry.GetName] sowie einen großer Getreidespeicher in der wichtigen Stadt [GetProvince('(int32)4544').GetName], und jetzt sind unsere Ernten die besten, die sie je waren.\n\nNicht nur, dass wir mehr als genug Nahrung für unsere eigenen Landsleute haben, sondern wir könnten sogar unsere Überschüsse auf Märkten im Ausland verkaufen - wir haben wirklich Glück."
 me_bosporan_18.a: "Wir werden diese Getreidespeicher gut zu nutzen wissen"
 me_bosporan_18_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_18$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_19_title: "$01_bosporan_kingdom_task_19$"
 me_bosporan_19_desc: "Die um uns herum lebenden Stämme sind seit langem ein Teil des Bosporanischen Lebens, unsere Völker haben untereinander geheiratet, haben gemeinsame Mahlzeiten geteilt, und einige verehren sogar die gleichen Götter - trotz unserer Unterschiede gibt es viel, was wir gemeinsam haben und die #E Skythen #! sind im Guten wie im Schlechten ein Teil unserer Gesellschaft..\n\n Angesichts dieser Tatsache wurde von einigen Beratern [ROOT.GetCountry.GetRuler.GetName]s vorgeschlagen, die Bürgerrechte auf einige der verschiedenen Kulturen auszuweiten, die neben uns leben. Es gibt einige unserer Angehörigen, die in ihrem Herzen Hass auf die Stammesbewohner hegen und dies ablehnen. Sie behaupten, dass die Nordländer unser Volk getötet und unser Land geplündert haben, aber in aller Ehrlichkeit haben wir ihnen das Gleiche angetan - dies könnte eine Gelegenheit für einen Neuanfang zwischen uns und den Menschen sein, die wir unterjocht haben."
 me_bosporan_19.a: "Ich werde den Skythen die Bürgerrecht gewähren" 
 me_bosporan_19.b: "Die Sarmaten verdienen Privilegien innerhalb von [ROOT.GetCountry.GetName]"
 me_bosporan_19.c: "Die Skythen und Sarmaten sind beide dieser Ehre würdig" 
 me_bosporan_19.d: "Dieses Land wird immer nur zu den Bosporanern und einzig den Bosporanern gehören!"
 me_bosporan_19_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_19$#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_20_title: "$01_bosporan_kingdom_task_20$" 
 me_bosporan_20_desc: "Sobald bekannt wurde, dass [ROOT.GetCountry.GetRuler.GetName] plante, [GetProvince('(int32)1973').GetName] für [ROOT.GetCountry.GetName] zu erobern, strömten Tausende von Männern in den nächsten Monaten nach [ROOT.GetCountry.GetCapital.GetName] - Freiwillige aus den Provinzen, die sich an unseren Kriegen anschließen und ihr persönliches Glück zu verbessern suchten.Diese Soldaten waren motiviert durch ihre Lust auf Profit, Beute und den Wunsch, Städte zu plündern, unabhängig davon, wer dort lebte, ob Grieche oder Skythe - der Reichtum und die Geschichte von Miletos ist allen bekannt, und es gibt viele, die ihr Leben für die Chance riskieren würden, dessen reiche Häuser und Tempel zu plündern." 
 me_bosporan_20.a: "Wenn sie sich nicht friedlich unterwerfen, werde ich [GetProvince('(int32)1973').GetName] mit Gewalt einnehmen!"
 me_bosporan_20_tooltip: "$mission_completed_tooltip_1$ '#Y $01_bosporan_kingdom_task_20$#!' $mission_completed_tooltip_2$" 
  
 me_bosporan_21_title: "Die Piraten angreifen" 
 me_bosporan_21_desc: "Die bosporanischen Soldaten konnten unbehelligt an Land gehen, da die Piratenflotte auf einem Beutezug war und die Anlandung nicht verhindern konnte. Als sich die Soldaten um [ROOT.GetCountry.GetRuler.GetName] versammelten, ergriff [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetHerHis] Schwert und hob es weit über [ROOT.GetCountry.GetRuler.GetHerHis]en Kopf." 
 me_bosporan_21.a: "Ich bete, dass die Götter uns den Sieg gewähren." !
 me_bosporan_21.b: "Ich werde alle vernichten, die sich mir widersetzen!" 
 me_bosporan_21_tooltip: "#Y Die Ereigniskette wird fortgesetzt. #!" 
  
 me_bosporan_22_title: "Hinterhalt!" 
 me_bosporan_22_desc: "Als die bosporanischen Soldaten den #E Piratenhafen#! betraten, war dieser erstaunlicherweise leer - waren alle Räuber auf einem Raubzug? Warum hätten sie ihr Lager unverteidigt lassen sollen?\n\n Das Surren eines Pfeils, der an [ROOT.GetCountry.GetRuler.GetName]s Kopf vorbeizischte, beantwortete diese Frage, und das Geräusch der Carnyx spaltete die Luft, als eine weitere Geschosssalve der ersten folgte.\n\n'Es ist ein Hinterhalt!', rief [ROOT.GetCountry.GetRulerTitle], zog seine Waffe und ging hinter einer Mauer in Deckung. Verzweifelt spähte [ROOT.GetCountry.GetRuler.GetFirstName] in Richtung des Horizonts, um zu sehen, von wo aus die Angreifer angriffen, und fluchte - sie befanden sich auf einem nahe gelegenen Hügel." 
 me_bosporan_22.a: "Befiehlt den Männern, anzugreifen! Wir kämpfen für Eumelus!"
 me_bosporan_22.b: "Ich lasse mich auf dem Schlachtfeld nicht ausmanövrieren!" 
 me_bosporan_22_tooltip: "Die Option ist aufgrund des hohen Kriegskunstwertes unseres Herrschers verfügbar." 
  
 me_bosporan_23_title: "Das Duell"
 me_bosporan_23_desc: "Obwohl die bosporanischen Soldaten zunächst überrascht und verwirrt waren, konnten sie die Situation schnell unter Kontrolle bringen und starteten einen mutigen Angriff, der die feigen Piraten in alle Winde zerstreute. Die Luft war erfüllt von den Schreien sterbender Männer, und das Schwert von [ROOT.GetCountry.GetRuler.GetName] war nass vom Blut der Plünderer und Schurken.\n\n [ROOT.GetCountry.GetRuler.GetFirstName] war gerade durch die Tür eines großen Gebäudes getreten, als ein großer Barbar mit einer gewaltigen Kriegsaxt erschien. Es kam zum Schlagabtausch, und beide Krieger landeten auf dem Boden, die Arme in einem verzweifelten Kampf verschränkt, während jeder versuchte, den anderen zu überwältigen.\n\n Zum ersten Mal seit langer Zeit erinnerte sich [ROOT.GetCountry.GetRuler.GetFirstName] daran, wie sich Angst anfühlt." 
 me_bosporan_23.a: "Ich bin fast unterlegen - möge die Götter mir helfen!" 
 me_bosporan_23.b: "Genug gespielt - ich werde aus dem Schädel dieses Barbaren trinken" 
 me_bosporan_23_tooltip: "Die Option ist aufgrund des hohen Finesses unseres Herrschers verfügbar." 
  
 me_bosporan_24_title: "Zerstörung des Piratenhafens" 
 me_bosporan_24_desc: "Am Ende war der Kampf gegen die Piraten von [GetProvince('(int32)4565').GetName] ein totaler Sieg für die tapferen Krieger von [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetRuler.GetName] konnte [ROOT.GetCountry.GetRuler.GetHerHis]en Herausforderer eigenhändig niederstrecken, nachdem er [ROOT.GetCountry.GetRuler.GetHerHis] Schwert vom Boden aufgenommen hatte, und der [ROOT.GetCountry.GetRulerTitle] tenthauptete den Barbaren mit einem einzigen Schlag, der die Soldaten in der Nähe in Ehrfurcht vor dem kriegerischen Geschick ihres Herrschers versetzte. \n\nDer Piratenhafen wurde von den eifrigen Soldaten völlig zerstört, und es wurde viel Beute an Bord der bosporanischen Flotte gebracht. Jeder Plünderer, der nicht in der Schlacht getötet oder anschließend gekreuzigt wurde, wurde in Ketten nach [ROOT.GetCountry.GetCapital.GetName] geschickt, und [ROOT.GetCountry.GetRuler.GetFirstName] verfügte, dass die Strafe für Piraterie immer Sklaverei sein würde." 
 me_bosporan_24.a: "Wir ehren die Erinnerung an Eumelus, indem wir Piraten im #E Pontus Euxinus#! zerstören!"
 me_bosporan_24.b: "Schickt den Schädel ihres Anführers nach [ROOT.GetCountry.GetCapital.GetName] und macht ihn zu meinem Trinkbecher" 
 me_bosporan_24_tooltip: "$mission_completed_tooltip_1$ '#Y Die Schlacht von Gorgippia#!' $mission_completed_tooltip_2$!"
  
 me_bosporan_25_title: "Häfen des Pontus Euxinus" 
 me_bosporan_25_desc: "[ROOT.GetCountry.GetName] ist die größte Flottenmacht, die den #E Pontus Euxinus#! besegelt, besonders nachdem [ROOT.GetCountry.GetRuler.GetName] es zu einer persönlichen Aufgabe gemacht hat, die zahlreichen #E Piratenhäfen#! zu zerstören, die seine Gewässer verschmutzten.\n\nOhne die Gefahr einer Seeinvasion, die den Bürgern der vielen Hafenstädte der Bosporaner droht, haben die örtlichen Schiffsbauer nun die Freiheit, mit verschiedenen Konstruktionstechniken zu experimentieren, die sich bereits als effizienter erweisen als unsere bisherige Vorgehensweise - ein Segen für die Kriegsschiffe des erobernden [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetFirstName]"!
 me_bosporan_25.a: "Unsere Schiffe werden die Meere dominieren!" 
 me_bosporan_25_tooltip: "$mission_completed_tooltip_1$ '#Y Häfen des Pontus Euxinus#!' $mission_completed_tooltip_2$!" 
  
 me_bosporan_26_title: "Theodosianischer Handel"
 me_bosporan_26_desc: "Die Nähe von [GetProvince('(int32)4544').GetName] zu [GetProvince('(int32)4549').GetName] schreckt Besucher beider Städte nicht ab, die nach wie vor die #Zwillingsjuwelen der bosporanischen Kultur#! sind. Eine Reise nach [ROOT.GetCountry.GetName] ist erst dann vollkommen, wenn man Zeit in beiden Städten verbracht hat, so bedeutend sind sie. Viele der epochalen Ereignisse des letzten Jahrhunderts fanden in der Nähe des #E Cimmerischen Bosporus#! statt, und das [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]e Haus hat sich auf beiden Seiten der Meerenge festgesetzt, Festungen und Häfen errichtet und die Landschaft nachhaltig gezeichnet." 
 me_bosporan_26.a: "#E Theodosia#! ist eine der wichtigsten Städte in  [ROOT.GetCountry.GetName]" 
 me_bosporan_26_tooltip: "$mission_completed_tooltip_1$ '#Y Theodosianischer Handel#!' $mission_completed_tooltip_2$!" 

 me_bosporan_27_title:0 "Sklaven aus der Steppe"
 me_bosporan_27_desc:0 "An der Mündung des #E Palus Maeotica#! liegt die Stadt [GetProvince('(int32)4557').GetName|Y] in den kalten und regnerischen Sümpfen und ist der letzte Vorposten der Zivilisation, bevor man auf die endlose Steppe trifft. Als solche ist sie für #E Griechen#! und #E Skythen#! ein naheliegender Ort, um Geschäfte zu machen, und ist als Handelszentrum bekannt geworden, wo Sklaven beschafft werden können."
 me_bosporan_27.a:0 "Diese Skythen verkaufen Sklaven zum Spottpreis!"
 me_bosporan_27_tooltip:0 "$mission_completed_tooltip_1$ '#Y Sklaven aus der Steppe#!' $mission_completed_tooltip_2$"
