 caria_missions_task_11: "Unter den Flügeln des Adlers"  
 caria_missions_task_11_DESC: "The world grows darker by the year. The Diadochi clash without end, pirates infest the seas, and the ambitions of rough generals swell with each passing season. In such times, prudence must come before pride.\n\nOur recent alliance with the Ptolemies has brought wealth and recognition, but we must now ask whether a deeper bond is needed. By formally becoming a Ptolemaic Satrapes, we may trade a measure of sovereignty for lasting security. The Egyptian eagle will cast its shadow over our lands, but beneath its wings, we shall endure."  #<Die Welt wird von Jahr zu Jahr dunkler. Die Diadochen kämpfen ohne Ende, Piraten heimsuchen die Meere und die Ambitionen rauer Generäle nehmen mit jeder Jahreszeit zu. In solchen Zeiten muss Besonnenheit vor Stolz stehen.\n\nUnser jüngstes Bündnis mit den Ptolemäern hat Reichtum und Anerkennung gebracht, aber wir müssen uns jetzt fragen, ob eine tiefere Bindung erforderlich ist. Indem wir offiziell ein ptolemäischer Satrapes werden, können wir ein gewisses Maß an Souveränität gegen dauerhafte Sicherheit eintauschen. Der ägyptische Adler wird seinen Schatten über unser Land werfen, aber unter seinen Flügeln werden wir bestehen.#>  #NT!
 caria_missions_task_11_tt: "[THIS.GetCountry.GetName] hat die Möglichkeit, eine #E @[GetCountry('EGY').GetFlag] zu werden!  [GetCountry('EGY').GetAdjective]e#! #Y Satrapie#! zu werden. Folgendes wird passieren, wenn wir #G#! akzeptieren:\n\n"  
  
 caria_missions_task_12: "Im Schatten des Löwen"  
 caria_missions_task_12_DESC: "The world grows darker by the year. The Diadochi clash without end, pirates infest the seas, and the ambitions of rough generals swell with each passing season. In such times, prudence must come before pride.\n\nOur recent alliance with Lysimachos has brought strength and status, but the lion is not easily satisfied. His hunger for territory and dominance is well known, and already he casts a wary eye toward the Aegean. By formally becoming a Lysimachid Satrapes, we may trade a measure of sovereignty for lasting security. The Thessalian Lion  will cast its shadow over our lands, but beneath its mane, we shall endure."  #<Die Welt wird von Jahr zu Jahr dunkler. Die Diadochen kämpfen ohne Ende, Piraten heimsuchen die Meere und die Ambitionen rauer Generäle nehmen mit jeder Jahreszeit zu. In solchen Zeiten muss Besonnenheit vor Stolz stehen.\n\nUnser jüngstes Bündnis mit Lysimachos hat Stärke und Status gebracht, aber der Löwe lässt sich nicht so leicht zufriedenstellen. Sein Hunger nach Territorium und Vorherrschaft ist wohlbekannt, und schon jetzt richtet er einen wachsamen Blick auf die Ägäis. Indem wir offiziell zu den Satrapen der Lysimachiden werden, können wir ein gewisses Maß an Souveränität gegen dauerhafte Sicherheit eintauschen. Der thessalische Löwe wird seinen Schatten über unser Land werfen, aber unter seiner Mähne werden wir bestehen.#>  #NT!
 caria_missions_task_12_tt: "[THIS.GetCountry.GetName] will have the option to become a  #E @[GetCountry('TRE').GetFlag]!  [GetCountry('TRE').GetAdjective]#! #Y Satrapy#!. The following will occur should we #G accept#!:\n\n"  #<[THIS.GetCountry.GetName] hat die Möglichkeit, ein #E @[GetCountry('TRE').GetFlag] zu werden!  [GetCountry('TRE').GetAdjective]#! #Y Satrapie#!. Folgendes wird passieren, wenn wir #G#! akzeptieren:\n\n#>  #NT!
  
 caria_missions_task_13: "Beside the Elephant"  #<Neben dem Elefanten#>  #NT!
 caria_missions_task_13_DESC: "The world grows darker by the year. The Diadochi clash without end, pirates infest the seas, and the ambitions of rough generals swell with each passing season. In such times, prudence must come before pride.\n\nOur recent alliance with the Seleucids has brought wealth and powerful friends, but the #E Master of Elephants#! is not easily satisfied. His hunger for territory and dominance is well known, and already he casts a wary eye toward the Aegean. By formally becoming a Seleucid Satrapes, we may trade a measure of sovereignty for lasting security. Better to walk beside the beast than to be crushed beneath it."  #<Die Welt wird von Jahr zu Jahr dunkler. Die Diadochen kämpfen ohne Ende, Piraten heimsuchen die Meere und die Ambitionen rauer Generäle nehmen mit jeder Jahreszeit zu. In solchen Zeiten muss Besonnenheit vor Stolz stehen.\n\nUnser jüngstes Bündnis mit den Seleukiden hat Reichtum und mächtige Freunde gebracht, aber der #E Meister der Elefanten#! ist nicht leicht zufriedenzustellen. Sein Hunger nach Territorium und Vorherrschaft ist wohlbekannt, und schon jetzt richtet er einen wachsamen Blick auf die Ägäis. Indem wir offiziell seleukidische Satrapen werden, können wir ein gewisses Maß an Souveränität gegen dauerhafte Sicherheit eintauschen. Es ist besser, neben dem Tier zu gehen, als von ihm zerquetscht zu werden.#>  #NT!
 caria_missions_task_13_tt: "[THIS.GetCountry.GetName] will have the option to become a  #E @[GetCountry('SEL').GetFlag]!  [GetCountry('SEL').GetAdjective]#! #Y Satrapy#!. The following will occur should we #G accept#!:\n\n"  #<[THIS.GetCountry.GetName] hat die Möglichkeit, ein #E @[GetCountry('SEL').GetFlag] zu werden!  [GetCountry('SEL').GetAdjective]#! #Y Satrapie#!. Folgendes wird passieren, wenn wir #G#! akzeptieren:\n\n#>  #NT!
  
 caria_missions_task_14: "Walls of Halikarnassos"  #<Mauern von Halikarnassos#>  #NT!
 caria_missions_task_14_DESC: "Halikarnassos, once defied the greatest conqueror of the age. When Alexander laid siege to the city in 334 BCE, it held firm for months under the command of Memnon of Rhodes, and though it fell in the end, its defenses earned the respect of all Hellas. Since then, Halikarnassos has changed hands more than once, as the Diadochi fought like wolves over the spoils of empire.\n\nBut no longer. Let the kings and satraps scheme as they will, Halikarnassos shall not be their prize. We will rebuild her walls, reinforce her harbors, and restore her towers. The city will stand as an impregnable bastion of Carian power, and those who seek to take her must pay a terrible price."  #<Halikarnassos trotzte einst dem größten Eroberer seiner Zeit. Als Alexander die Stadt 334 v. Chr. belagerte, hielt sie unter dem Kommando von Memnon von Rhodos monatelang stand, und obwohl sie am Ende fiel, verdienten ihre Verteidigungsanlagen den Respekt von ganz Hellas. Seitdem hat Halikarnassos mehr als einmal den Besitzer gewechselt, da die Diadochen wie Wölfe um die Beute des Imperiums kämpften.\n\nAber nicht mehr. Mögen die Könige und Satrapen planen, was sie wollen, Halikarnassos soll nicht ihre Beute sein. Wir werden ihre Mauern wieder aufbauen, ihre Häfen verstärken und ihre Türme restaurieren. Die Stadt wird eine uneinnehmbare Bastion karischer Macht sein, und diejenigen, die sie einnehmen wollen, müssen einen schrecklichen Preis zahlen.#>  #NT!
  
 caria_missions_task_15: "Erben von Hekatomnos" 
 caria_missions_task_15_DESC: "The line of Hekatomnos brought Caria to greatness. From their ancestral seat in Mylasa, the Hekatomnids rose to power as satraps of Caria and masters of its highlands and coasts alike. Under Mausolos and Artemisia, Halikarnassos rose to fame, its monuments rivaling those of ancient dynasties, its fleets commanding the seas, its court hosting poets, scholars, and soldiers. Even in its twilight, the dynasty endured with honor: Queen Ada, last of the Hekatomnids, adopted Alexander the Great as her son. Now, with Halikarnassos once more secured, it is only fitting that we entrust its rule to a cadet branch of that noble house."  #<Die Linie von Hekatomnos brachte Caria zu großer Größe. Von ihrem Stammsitz in Mylasa aus stiegen die Hekatomniden als Satrapen Kariens und Herren des Hochlandes und der Küsten an die Macht. Unter Mausolos und Artemisia erlangte Halikarnassos Ruhm, seine Denkmäler konkurrierten mit denen antiker Dynastien, seine Flotten beherrschten die Meere, sein Hof beherbergte Dichter, Gelehrte und Soldaten. Auch in ihrem Untergang bestand die Dynastie ehrenhaft weiter: Königin Ada, die letzte der Hekatomniden, adoptierte Alexander den Großen als ihren Sohn. Nachdem Halikarnassos nun wieder gesichert ist, ist es nur passend, dass wir die Herrschaft einem Kadettenzweig dieses Adelshauses anvertrauen.#>  #NT!
 caria_missions_task_15_tt: "A #E Hekatomnid#! becomes the ruler of  #E @[GetCountry('HKS').GetFlag]!  [GetCountry('HKS').GetName]#!"  #<Ein #E Hekatomnid#! wird zum Herrscher von #E @[GetCountry('HKS').GetFlag]!  [GetCountry('HKS').GetName]#!#>  #NT!
  
 caria_missions_task_16: "Hekatomnid Restoration"  #<Hekatomniden-Restaurierung#>  #NT!
 caria_missions_task_16_DESC: "For too long, Caria has bent the knee to Persians, to Macedonians, to self-styled kings with no roots in our soil. No more, Caria remembers. In the mountain sanctuaries of Mylasa, in the harbor-taverns, of Halikarnassos, in the hearts of the people, the old loyalties endure. They whisper of a rising, of vengeance, of restoration.\n\nIt is time. Caria shall be ruled by Carians once more. The heirs of Hekatomnos will reclaim what is rightfully theirs, not as satraps, but as sovereigns. Let the usurper tremble. Revolution is at hand! Already, word reaches us of a plot against [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName]. In the halls of [ROOT.GetCountry.GetRuler.GetHerHis] palace, daggers are drawn in shadow, and poison waits in golden cups."  #<Zu lange hat Karien vor den Persern, den Mazedoniern und den selbsternannten Königen, die keine Wurzeln in unserem Boden hatten, die Knie gebeugt. Nicht mehr, erinnert sich Caria. In den Bergheiligtümern von Mylasa, in den Hafentavernen von Halikarnassos, in den Herzen der Menschen bestehen die alten Loyalitäten fort. Sie flüstern von einem Aufstand, von Rache, von Wiederherstellung.\n\nEs ist Zeit. Karien soll erneut von Kariern regiert werden. Die Erben von Hekatomnos werden zurückfordern, was ihnen rechtmäßig gehört, nicht als Satrapen, sondern als Herrscher. Lass den Usurpator zittern. Die Revolution steht vor der Tür! Es erreicht uns bereits die Nachricht von einer Verschwörung gegen [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName]. In den Hallen des [ROOT.GetCountry.GetRuler.GetHerHis]-Palastes liegen Dolche im Schatten und Gift wartet in goldenen Bechern.#>  #NT!
 caria_missions_task_16_tt: "We may choose to intervene and save [THIS.GetCountry.GetRuler.GetName], or permit the assassination to proceed.\n\nIf the plot #G succeeds#!, the following will occur:\nA #Y Hekatomnid#! becomes the ruler of [THIS.GetCountry.GetName]"  #<Wir können uns dafür entscheiden, einzugreifen und [THIS.GetCountry.GetRuler.GetName] zu retten, oder die Fortsetzung des Attentats zuzulassen.\n\nWenn die Verschwörung #G#!, erfolgreich ist, wird Folgendes passieren:\nEin #Y Hekatomnid#! wird der Herrscher von [THIS.GetCountry.GetName]#>  #NT!
  
 caria_missions_task_17: "Kaunische Münzen"  
 caria_missions_task_17_DESC: "While the material remains of Kaunos date its foundation or early site-use to at most the 9th century BCE, the traditional history of the city dates back to its namesake, Kaunos, the son of the Carian King Miletus and the naiad Kyane. It is said that Kaunos and his sister, Byblis, fell in love and that, in order to avoid incest, Kaunos fled her company all the way to Lycia in Anatolia. Here, Byblis followed him but fell into sorrow and madness and died, turning into a spring, crying her incessant tears over the land and creating with her watery eyes the river the Calbys river. In Asia, Kaunos married the nymph Pronoe and had a son, Aegialus, who went on to found a city nearby, named for his father. The city itself was an excellent trade harbor, having two functioning ports, and Herodotus notes that the people of the city resiliently fought against the Persian general Harpagus - they did, after a while, lose. The historian also notes that while he personally disagrees with their claim of their own foreign origin, because they speak a language similar to that of his own home, he cannot deny that they act in a peculiar manner, different from all the other Carians and Lycians. All the men, women, and even the children drink wine together.\n\nIf we harbor ambitions to stand among the heirs of Alexander, we must do as they do. We shall establish a royal mint at Kaunos, striking coinage in our name."  #<Während die materiellen Überreste von Kaunos die Gründung oder frühe Nutzung des Ortes höchstens auf das 9. Jahrhundert v. Chr. datieren, geht die traditionelle Geschichte der Stadt auf ihren Namensgeber Kaunos zurück, den Sohn des karischen Königs Milet und des Najaden Kyane. Es wird gesagt, dass Kaunos und seine Schwester Byblis sich verliebten und dass Kaunos, um Inzest zu vermeiden, aus ihrer Gesellschaft bis nach Lykien in Anatolien floh. Hier folgte Byblis ihm, verfiel jedoch in Trauer und Wahnsinn und starb, verwandelte sich in eine Quelle, weinte ihre unaufhörlichen Tränen über das Land und erschuf mit ihren wässrigen Augen den Fluss Calbys. In Asien heiratete Kaunos die Nymphe Pronoe und bekam einen Sohn, Aegialus, der in der Nähe eine Stadt gründete, die nach seinem Vater benannt wurde. Die Stadt selbst war ein ausgezeichneter Handelshafen und verfügte über zwei funktionierende Häfen, und Herodot weist darauf hin, dass die Einwohner der Stadt hart gegen den persischen Feldherrn Harpagus kämpften – sie verloren jedoch nach einer Weile. Der Historiker stellt außerdem fest, dass er zwar persönlich mit ihrer Behauptung, sie seien ausländischer Herkunft, nicht einverstanden sei, weil sie eine Sprache sprechen, die der seiner Heimat ähnelt, er aber nicht leugnen kann, dass sie sich auf eine besondere Art und Weise verhalten, die sich von allen anderen Karern und Lykiern unterscheidet. Alle Männer, Frauen und sogar die Kinder trinken gemeinsam Wein.\n\nWenn wir den Ehrgeiz hegen, zu den Erben Alexanders zu gehören, müssen wir es ihnen gleichtun. Wir werden in Kaunos eine königliche Münzstätte errichten und in unserem Namen Münzen prägen.#>  #NT!
 caria_missions_task_17_tt: "#E Kaunos#! can be released as an  #E @[THIS.GetCountry.GetFlag]!  [THIS.GetCountry.GetAdjective]#! #Y Feudatory#!"  #<#E Kaunos#! kann als #E @[THIS.GetCountry.GetFlag] veröffentlicht werden!  [THIS.GetCountry.GetAdjective]#! #Y Feudatorisch#!#>  #NT!
  
 caria_missions_task_18: "Lord of Lycia"  #<Herr von Lykien#>  #NT!
 caria_missions_task_18_DESC: "Mausolos, the great architect of Carian power, knew that empire is not built by one hand alone. To secure his southern frontier, he entrusted the rule of Lycia to his brother, Pixodaros. We would do well to follow his example. The Lycian cities, from Xanthos to Patara, are proud and fractious, but are strategically vital."  #<Mausolos, der große Architekt der karischen Macht, wusste, dass ein Imperium nicht von einer Hand allein aufgebaut werden kann. Um seine Südgrenze zu sichern, vertraute er die Herrschaft über Lykien seinem Bruder Pixodaros an. Wir täten gut daran, seinem Beispiel zu folgen. Die lykischen Städte, von Xanthos bis Patara, sind stolz und widerspenstig, aber strategisch wichtig.#>  #NT!
 caria_missions_task_18_tt: "[THIS.GetCountry.GetName] will gain Claims on the Areas of #Y Lycia#!, #Y Milyas#!, #Y Pisidia#!, and #Y Pamphylia#!"  #<[THIS.GetCountry.GetName] erhält Ansprüche auf die Gebiete #Y Lykien#!,, #Y Milyas#!,, #Y Pisidien#!, und #Y Pamphylien#!#>  #NT!
  
 caria_missions_task_19: "The Hair Tax"  #<Die Haarsteuer#>  #NT!
 caria_missions_task_19_DESC: "The hyparch Condalos, dispatched to govern Lycia, once remarked that the locals wore their hair long, unlike the clean-shaven Carians. Sensing an opportunity, Condalos proclaimed to the people that the Great King Artaxerxes required hair for horse wigs, and that every Lycian must shave their heads and send the clippings to the royal court. Those who refused could instead pay in silver. No hair ever left the province, but Condalos's scheme greatly increased revenues.\n\nWe shall revive this tradition, with suitable adjustments for our time. Call it tribute, call it custom,  either way, the subject peoples in our realm will be expected to pay their share, in silver or in strands."  #<Der Hyparch Condalos, der zur Regierung Lykiens entsandt wurde, bemerkte einmal, dass die Einheimischen ihr Haar im Gegensatz zu den glattrasierten Kariern lang trugen. Condalos witterte eine Gelegenheit und verkündete dem Volk, dass der Großkönig Artaxerxes Haare für Pferdeperücken benötige und dass jeder Lykier sich den Kopf rasieren und die Ausschnitte an den königlichen Hof schicken müsse. Wer sich weigerte, konnte stattdessen in Silber bezahlen. Kein Haar hat die Provinz jemals verlassen, aber Condalos' Plan steigerte die Einnahmen erheblich.\n\nWir werden diese Tradition mit angemessenen Anpassungen für unsere Zeit wiederbeleben. Nennen Sie es Tribut, nennen Sie es Brauch, so oder so wird von den unterworfenen Völkern in unserem Reich erwartet, dass sie ihren Anteil zahlen, in Silber oder in Barren.#>  #NT!
 caria_missions_task_19_tt: "Every #R non-integrated#! culture gains the following modifier:"  #<Jede #R nicht integrierte#! Kultur erhält den folgenden Modifikator:#>  #NT!
  
 caria_missions_task_20: "Asian Expedition"  #<Asiatische Expedition#>  #NT!
 caria_missions_task_20_DESC: "The western coast of Asia Minor is a patchwork of city-states, leagues, and fading satrapies. Many of these cities once paid tribute to Mausolos or fought beside Artemisia. Some have drifted under the sway of Macedonian generals or cling to hollow freedoms behind crumbling walls. The Asian coast is our inheritance.\n\nThe time has come to prepare an expedition to secure our rule over Asia for generations to come."  #<Die Westküste Kleinasiens ist ein Flickenteppich aus Stadtstaaten, Ligen und verblassenden Satrapien. Viele dieser Städte zahlten einst Mausolos Tribut oder kämpften an der Seite von Artemisia. Einige sind unter dem Einfluss mazedonischer Generäle geraten oder klammern sich hinter bröckelnden Mauern an hohle Freiheiten. Die asiatische Küste ist unser Erbe.\n\nEs ist an der Zeit, eine Expedition vorzubereiten, um unsere Herrschaft über Asien für kommende Generationen zu sichern.#>  #NT!
  
 caria_missions_task_21: "Dynast von Derbe"  
 caria_missions_task_21_DESC: "The highlands of Lycaonia remain fractured and unclaimed, a wild land of fortified towns, tribal chieftains, and mountain strongholds. Among these is the city of Derbe, seated near the passes between Isauria and the Cilician plain. A member of our house shall be outfitted and funded for an expedition to Derbe. With enough gold, arms, and [ROOT.GetCountry.GetAdjective] backing, he may carve out a place for himself as its dynast and bind the region to our line."  #<Das Hochland von Lykaonien ist nach wie vor zerklüftet und unbeansprucht, ein wildes Land mit befestigten Städten, Stammeshäuptlingen und Bergfestungen. Zu diesen gehört die Stadt Derbe, die in der Nähe der Pässe zwischen Isauria und der Kilikischen Ebene liegt. Ein Mitglied unseres Hauses soll für eine Expedition nach Derbe ausgerüstet und finanziert werden. Mit genügend Gold, Waffen und [ROOT.GetCountry.GetAdjective]-Unterstützung könnte er sich einen Platz als Dynastie erkämpfen und die Region an unsere Linie binden.#>  #NT!
 caria_missions_task_21_tt: "#E Derbe#! wird ein #E @[THIS.GetCountry.GetFlag]!  [THIS.GetCountry.GetAdjective]er#! #Y Bundesgenosse#!"  
  
 caria_missions_task_22: "Cultivating the Hinterlands"  #<Das Hinterland kultivieren#>  #NT!
 caria_missions_task_22_DESC: "Though our coastal cities gleam with marble, the true body of [ROOT.GetCountry.GetName] lies inland in the valleys, hills, and scattered villages that feed our cities and man our armies. We must turn our gaze to the shepherds, farmers, and settlers who sustain our strength. With modest grants and steady oversight, we can transform the interior into the beating heart of [ROOT.GetCountry.GetAdjective] might. Let roads be built through the hills of Mylasa and pastures carved into the stony ground."  #<Obwohl unsere Küstenstädte vor Marmor glänzen, liegt der wahre Körper von [ROOT.GetCountry.GetName] im Landesinneren in den Tälern, Hügeln und verstreuten Dörfern, die unsere Städte ernähren und unsere Armeen bemannen. Wir müssen unseren Blick auf die Hirten, Bauern und Siedler richten, die unsere Stärke erhalten. Mit bescheidenen Zuschüssen und ständiger Aufsicht können wir den Innenraum in das schlagende Herz von [ROOT.GetCountry.GetAdjective] Macht verwandeln. Lasst Straßen durch die Hügel von Mylasa bauen und Weiden in den steinigen Boden hauen.#>  #NT!
 caria_settlement_svalue_tt: "Have at least #Y 15#! buildings in #Y settlements#!. ([SCOPE.ScriptValue('caria_settlement_svalue')|R0]/#Y 10#!)"  #<Besitze mindestens #Y 15#! Gebäude in #Y Siedlungen#!. ([SCOPE.ScriptValue('caria_settlement_svalue')|R0]/#Y 10#!)#>  #NT!
 caria_missions_task_22_tt: "Every #Y Settlement#! rank territory within [GetProvince('(int32)1992').GetArea.GetRegion.GetName] or [GetProvince('(int32)1977').GetArea.GetRegion.GetName] will #G get #E 2#!#! @freemen! #Y Freemen#! pops and #G #E 1#!#! @citizen! #Y Citizen#! pop"  #<Jede #Y Siedlung#! Ranggebiet innerhalb von [GetProvince('(int32)1992').GetArea.GetRegion.GetName] oder [GetProvince('(int32)1977').GetArea.GetRegion.GetName] erhält #G #E 2#!#! @freemen! #Y Freemen#! Pops und #G #E 1#!#! @citizen! #Y Bürger#! Einwohner#>  #NT!
  
 caria_missions_task_23: "The Throne of Macedon"  #<Der Thron von Makedonien#>  #NT!
 caria_missions_task_23_DESC: "The Barons of Macedon have always favored the strong and able over the weak and feeble. If we play our hand right, our line may yet prove to be the strongest of them all. However, if Alexander's Legacy is ever to be reclaimed, then we must first seize what remains of his kingdom, removing it from the grasp of those leading it to ruin and create in its place a new, more robust state for the Macedonians spread across the shattered remnants of the Argead Empire to serve under."  #<Die Barone von Makedonien haben immer die Starken und Fähigen den Schwachen und Gebrechlichen vorgezogen. Wenn wir unsere Hand richtig spielen, könnte sich unsere Linie noch als die stärkste von allen erweisen. Wenn Alexanders Vermächtnis jedoch jemals zurückerobert werden soll, müssen wir zunächst die Überreste seines Königreichs an uns reißen, es aus der Gewalt derer befreien, die es in den Ruin getrieben haben, und an seiner Stelle einen neuen, robusteren Staat schaffen, unter dem die Mazedonier, die über die zerschmetterten Überreste des Argead-Reichs verteilt sind, dienen können.#>  #NT!
 caria_missions_task_23_tt: "#G Unlocks#! #T Macedonian Missions#!\nCompleting #T Hellenic Mastery#! #G Unlocks#! #T Hellenistic Empire#!"  #<#G Freischaltungen#! #T Mazedonische Missionen#!\nAbschluss von #T Hellenische Meisterschaft#! #G Freischaltungen#! #T Hellenistisches Reich#!#>  #NT!
  
 caria_missions_task_24: "Repositories of Knowledge"  #<Wissensspeicher#>  #NT!
 caria_missions_task_24_DESC: "The Hellenistic world is rife with the teachings of philosophy, art, history, and learning, from the works of Plato to the Histories of Herodotus; by granting public funding for libraries across our major cities, we can establish [ROOT.GetCountry.GetName] as a bastion for Greek knowledge and scientific advancement."  #<Die hellenistische Welt ist reich an Lehren der Philosophie, Kunst, Geschichte und Gelehrsamkeit, von den Werken Platons bis zu den Geschichten des Herodot; Durch die Gewährung öffentlicher Mittel für Bibliotheken in unseren Großstädten können wir [ROOT.GetCountry.GetName] als Bastion für griechisches Wissen und wissenschaftlichen Fortschritt etablieren.#>  #NT!
 caria_missions_task_24_tt: "A skilled scholar will travel to our country."  #<Ein erfahrener Wissenschaftler wird in unser Land reisen.#>  #NT!
  
 caria_missions_task_25: "Demand March Status"  #<Fordern Sie den Status „März“ an#>  #NT!
 caria_missions_task_25_DESC: "The wealth, power and prestige of [ROOT.GetCountry.GetName|G] sets us above other #T Satraps#!, and although neither side would be comfortable admitting it, the [ROOT.GetCountry.GetAdjective] levies would be able to hold their own against those of their #T Overlord#!.\n\nBecause we are strong, [ROOT.GetCountry.GetRuler.GetName|Y] feels that we are deserving of special status and will demand that we be recognized as such; a bold provocation."  #<Der Reichtum, die Macht und das Prestige von [ROOT.GetCountry.GetName|G] heben uns von anderen #T Satrapen#!, ab, und obwohl keine Seite es gerne zugeben würde, könnten die [ROOT.GetCountry.GetAdjective] Rekruten sich gegen die ihres #T Oberherrn#!.\n\nBecause behaupten. Wir sind stark, [ROOT.GetCountry.GetRuler.GetName|Y] ist der Meinung, dass wir einen besonderen Status verdienen, und wird verlangen, dass wir als solche anerkannt werden; eine kühne Provokation.#>  #NT!
 caria_missions_task_25_tt: "We will be able to negotiate a deal with our #T Overlord#! #Y [THIS.GetCountry.GetOverlord.GetName]#! to become a #T #E Marche#!#!. [THIS.GetCountry.GetRuler.GetPraenomen] will ask for special privileges to be granted to us, and we will receive different rewards, depending on how the negotiations go."  #<Wir werden in der Lage sein, einen Deal mit unserem #T Overlord#! #Y [THIS.GetCountry.GetOverlord.GetName]#! auszuhandeln, um ein #T #E Marche#!#! zu werden. [THIS.GetCountry.GetRuler.GetPraenomen] wird darum bitten, dass uns besondere Privilegien gewährt werden, und wir werden je nach Verlauf der Verhandlungen unterschiedliche Belohnungen erhalten.#>  #NT!
  
