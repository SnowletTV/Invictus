 me_caria_13_desc: "The world is a turbulent place. Alexander is gone, and in his absence, the Diadochi tear the world apart in their quest for dominion. Fleets burn, cities fall, and no land escapes the reach of war. In such an age, to stand alone is to stand on the edge of a sword. Many now call for us to pass formally under the aegis of our good and faithful friends, the Seleucids."  #<Die Welt ist ein turbulenter Ort. Alexander ist verschwunden, und in seiner Abwesenheit zerreißen die Diadochen auf ihrem Streben nach Herrschaft die Welt. Flotten brennen, Städte fallen und kein Land entgeht der Reichweite des Krieges. In einem solchen Zeitalter allein zu stehen bedeutet, auf der Schneide eines Schwertes zu stehen. Viele fordern jetzt, dass wir uns offiziell der Schirmherrschaft unserer guten und treuen Freunde, der Seleukiden, unterstellen.#>  #NT!
 me_caria_13.a: "Hail [GetCountry('SEL').GetRuler.GetTitle] [GetCountry('SEL').GetRuler.GetName]"  #<Hagel [GetCountry('SEL').GetRuler.GetTitle] [GetCountry('SEL').GetRuler.GetName]#>  #NT!
