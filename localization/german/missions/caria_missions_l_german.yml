l_german:
  
 caria_missions: "Erben von Hekatomnos" #Autotranslate V1.11.0.2 - Tayuan (4.03.2026) WIP
 caria_missions_DESCRIPTION: "Die Dynastie der Hekatomniden führte Caria einst zu Größe. Von ihrem Stammsitz in Mylasa aus stiegen die Hekatomniden zu Satrapen von Caria auf, Herrscher über das Hochland und die Küsten gleichermaßen. Unter Mausolos und Artemisia wurde Halikarnassos berühmt für sein gewaltiges Mausoleum, seine Flotten beherrschten die Ägäis, und an seinem Hof versammelten sich Dichter, Gelehrte und Soldaten aus der gesamten hellenischen Welt. Sogar in ihrer Dämmerung lebte die Dynastie noch in Ehren: Königin Ada, die letzte der Hekatomniden, adoptierte Alexander den Großen als ihren Sohn.\n\nNun steht Caria an einem Scheideweg. Stellen Sie die alten Traditionen unter einer wiederauflebenden Hekatomniden-Dynastie wieder her oder schmieden Sie ein Nachfolgekönigreich unter Pleistarchus und erheben Sie Anspruch auf Alexanders Reich!"  
 caria_missions_CRITERIA_DESCRIPTION: "Diese Mission gilt als erfüllt, wenn wir in Caria ein mächtiges Königreich errichtet und unsere Herrschaft über die Ägäis ausgeweitet haben." 
 caria_missions_BUTTON_TOOLTIP: ""
 caria_missions_BUTTON_DETAILS: ""
  
  #Missions 
  
 caria_missions_task_1: "Stärke im Dienst" 
 caria_missions_task_1_DESC: "Die Zukunft von Caria ist eindeutig mit der unserer mächtigen Oberherren, den #E [ROOT.GetCountry.GetOverlord.GetAdjective]en#!, verbunden. Auch wenn es verlockend sein mag, mehr Unabhängigkeit zu fordern, ist jetzt nicht der richtige Zeitpunkt für solche Maßnahmen. Das würde nur zu Konflikten und Misstrauen führen.  Stattdessen gebietet es die Vernunft, einen anderen Kurs einzuschlagen – einen Kurs, der unsere Position stärkt und unsere Bedeutung innerhalb ihres Bereichs sichert."  
  
 caria_missions_task_2: "Unseren Wert beweisen"  
 caria_missions_task_2_DESC: "Karien hat seinen Wert für die Großmächte der Ägäis und des Nahen Ostens schon lange unter Beweis gestellt. Unter persischer Herrschaft spielten unsere erfahrenen Seeleute und Söldner eine wichtige Rolle in ihren Feldzügen, während die Hekatomniden Karien zu beispiellosem Reichtum und Einfluss verhalfen. Alexander der Große vertraute Königin Ada die Regierung Kariens als treue Verbündete und nicht als bloße Untertanin an. Jetzt müssen wir den #E [ROOT.GetCountry.GetOverlord.GetAdjective]en#! noch einmal beweisen, dass [ROOT.GetCountry.GetName] für sie wertvoller wäre, nicht nur als zu regierendes Subjekt, sondern als unverzichtbarer Verbündeter." 
  
 caria_missions_task_3: "Flottenakademie"  
 caria_missions_task_3_DESC: "Die Karer haben eine lange und traditionsreiche Seefahrertradition und dienten als Kommandanten, Schiffsbauer und Krieger in den Flotten mächtiger Reiche. Schon in der Bronzezeit bereisten unsere Vorfahren als Söldner und Händler die Meere. Unter Lygdamis, Artemisia, Mausolus und Ada stellte Karien beeindruckende Flotten zusammen und sicherte sich die Vorherrschaft über einen Großteil der Ägäis. Doch viel zu lange haben wir unsere Seemacht im Dienste anderer eingesetzt. \n\nWir werden in [ROOT.GetCountry.GetCapital.GetName] eine Marineakademie errichten, um unsere nächste Generation von Seeleuten und Marinekommandanten auszubilden."  
  
 caria_missions_task_4: "Kriegsflotte"  
 caria_missions_task_4_DESC: "Die Karer haben eine lange und traditionsreiche Seefahrertradition und dienten als Kommandanten, Schiffsbauer und Krieger in den Flotten mächtiger Reiche. Schon in der Bronzezeit bereisten unsere Vorfahren als Söldner und Händler die Meere. Unter Lygdamis, Artemisia, Mausolus und Ada stellte Karien beeindruckende Flotten zusammen und sicherte sich die Vorherrschaft über einen Großteil der Ägäis. Doch viel zu lange haben wir unsere Seemacht im Dienste anderer eingesetzt.\n\nNun ist die Zeit gekommen, eine [ROOT.GetCountry.GetAdjective]e Kriegsflotte aufzubauen – nicht für die Ambitionen unserer Herren, sondern um unser eigenes Schicksal auf den Wellen zu sichern!"  
  
 caria_missions_task_5: "Die Artemisia"  
 caria_missions_task_5_DESC: "Schiffe mit zehn oder mehr Ruderern pro Seite wurden zuerst von Alexander dem Großen eingesetzt, wurden aber noch üblicher, nachdem die antigonidische Flotte sie bei der Belagerung von Tyrus und darüber hinaus einsetzte. Ein solches Schiff wird in einer offenen Seeschlacht immer eine äußerst eingeschränkte Manövrierfähigkeit haben. Für Belagerungskriege sind diese „Mega Polyremen“ jedoch ideal, da sie in der Lage sind, seeseitige Mauern aufzubrechen und dann als Plattformen für Artillerie zu fungieren und gleichzeitig die Landung einer großen Anzahl von Truppen zu ermöglichen. Es ist nur richtig, dass wir solche Schiffe für uns selbst bauen, denn welche königliche Marine wäre vollständig ohne ein mächtiges Flaggschiff?"  
 caria_missions_task_5_tt: "Wir erhalten einen #E Mega Polyreme#! im #Y Mare Icarium#! mit einem äußerst kompetenten #E Admiral#! als Befehlshaber" 
  
 caria_missions_task_6: "Anlegen des Diadems"  
 caria_missions_task_6_DESC: "Die größten Diadochen bezeichnen sich jetzt als Könige, „Basileis“, nicht mehr als Satrapen. Caria hat Königinnen und Dynasten, Kriegsherren und Visionäre gekannt. Wir regieren jetzt nicht mehr als bloße Diener entfernter Mächte, sondern als eigenständige Herrscher.\n\nUnd dennoch nennen manche unsere Herrscher „Satrapen“, einen untergeordneten Titel. So geht das nicht. Das Diadem erwartet uns und mit ihm die Anerkennung unseres rechtmäßigen Platzes unter den Nachfolgern Alexanders."  
  
 caria_missions_task_7: "Das Pleistarchidische Königreich"  
 caria_missions_task_7_DESC: "Pleistarchos' Vater, Antipatros, regierte Makedonien als Regent der Könige,  und sein Bruder Kassandros legte die alten Titel der Unterordnung ab, um sich selbst zum Basileus zu erklären und eine eigene Dynastie zu gründen. Sollen wir weniger mutig sein als Kassandros?\n\nAuch wenn uns die Verbündeten [ROOT.GetCountry.GetName] vermacht haben, sind wir nicht länger an seine engen Grenzen gebunden. Unsere Ambitionen reichen weit darüber hinaus. Lasst uns unseren Platz unter den Nachfolgern Alexanders einnehmen und [ROOT.GetCountry.GetName] zum 'Königreich der Pleistarchiden' umgestalten!"  
 caria_missions_task_7_tt: "Wir können nun das Kriegsziel  #G Das Erbe Alexanders#! gegen andere Diadochen verwenden.\n#G Wir werden Ansprüche auf [GetCharacter('(int32)39').GetPraenomen]s ehemaliges Imperium geltend machen#!:\n[GetProvince('(int32)418').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)350').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)379').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)790').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)290').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)1883').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)1936').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)830').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)918').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)4799').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)687').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)516').GetArea.GetRegion.GetName|Y], and [GetProvince('(int32)569').GetArea.GetRegion.GetName|Y].\n#R Diese Ansprüche und das Kriegsziel erlöschen mit dem Tod oder der Abdankung von [THIS.GetCountry.GetRuler.GetName].#!"  
  
 caria_missions_task_8: "Besserung von Chios'"  
 caria_missions_task_8_DESC: "Thukydides nannte die Chier einst „die reichsten Griechen“, und das nicht ohne Grund. Mit fast 900 Quadratkilometern fruchtbarem Land, hohen Gipfeln und Zugang zu den östlichen Meeren ist die Insel eine Welt für sich und viel zu wertvoll, um sie den Launen der Demokratie zu überlassen.\n\nIn den Tagen von Mausolos vertrieben die chianischen Oligarchen klugerweise die Demokraten, verbündeten sich mit Karien und bildeten eine Allianz mit Rhodos, Kos und Byzantion. Aber wie bei allen instabilen Dingen kehrte mit Alexanders Eroberungen die Demokratie zurück. Aber wie alle instabilen Dinge kehrte auch die Demokratie mit Alexanders Eroberungen zurück. Nun ist es an der Zeit, diesen Fehler zu korrigieren. Wir werden den natürlichen Anführern der Insel dabei helfen, ihren Platz zurückzuerobern und Chios damit wieder unter die Ägide Karien zu bringen. Wir werden ihre Landstreitigkeiten mit den Erythräern durch Verträge oder mit dem Speer beilegen ..." 
 caria_missions_task_8_allow_tt: "Habt eine Flotte von mindestens #G 30#! Schiffen vor der Küste von #E Chios#!#"  
 caria_missions_task_8_tt: "#E Chios#! wird ein #E @[THIS.GetCountry.GetFlag]!  [THIS.GetCountry.GetAdjective]er#! #Y Bundegenosse#!"  
  
 caria_missions_task_9: "Herrscher von Priene"  
 caria_missions_task_9_DESC: "Hieron, einer der bedeutendsten Adligen von Priene, macht keinen Hehl aus seinem Wunsch nach erblicher Macht. Obwohl die Stadt an den Äußerlichkeiten der Demokratie festhält, sind ihre Bewohner der Fraktionskämpfe und ausländischen Verstrickungen überdrüssig. Wenn wir auch nur einen Teil unserer Streitkräfte zur Unterstützung anbieten, könnte Hieron die Macht ergreifen und als Herrscher regieren, wodurch unter unserer Ägide eine neue Ordnung Einzug halten würde.\n\nAls Heimat des verehrten Heiligtums der Athena Polias und Versammlungsort des Ionischen Bundes besitzt Priene einen immensen symbolischen und strategischen Wert. Die Eroberung von Priene würde dem von den Antigoniden dominierten Ionischen Bund einen vernichtenden Schlag versetzen und den Weg für die Vorherrschaft Carias in ganz Ionien ebnen."  
 caria_missions_task_9_tt: "#E Priene#! wird ein #E @[THIS.GetCountry.GetFlag]!  [THIS.GetCountry.GetAdjective]er#! #Y Bundesgenosse#!"  
  
