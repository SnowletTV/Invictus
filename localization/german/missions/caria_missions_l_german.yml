 caria_missions_task_10: "Der Preis des Friedens"  
 caria_missions_task_10_DESC: "The age of kings is upon us. The heirs of Alexander, no longer content to call themselves satraps, now style themselves as Basileis, and each builds their empire in the image of their founder. The world is no longer ruled by men alone, but by ferocious beasts.\n\nTo the south, the Ptolemies soar like eagles: aloof, imperial, and swift to strike. To the east, the Seleucids advance on elephantine feet: immense, deliberate, and unstoppable. To the north, the Lysimachid roar like lions, ever hungering for territory and glory.\n\nEach watches Caria, and each harbors quiet designs on our coasts. But perhaps we need not face them in battle. Of course, peace comes at a price. A royal marriage, accompanied by the dowry of Halikarnassus, may yet turn predator into partner."  #<Das Zeitalter der Könige steht vor der Tür. Die Erben Alexanders geben sich nicht länger damit zufrieden, sich Satrapen zu nennen, sondern bezeichnen sich nun als Basileis, und jeder baut sein Reich nach dem Vorbild seines Gründers auf. Die Welt wird nicht mehr allein von Menschen regiert, sondern von wilden Tieren.\n\nIm Süden schweben die Ptolemäer wie Adler: distanziert, kaiserlich und schnell zuschlagend. Im Osten rücken die Seleukiden auf Elefantenfüßen vor: gewaltig, bedächtig und unaufhaltsam. Im Norden brüllen die Lysimachiden wie Löwen, immer auf der Suche nach Territorium und Ruhm.\n\nJeder wacht über Karien und jeder hegt stille Pläne an unseren Küsten. Aber vielleicht müssen wir uns ihnen nicht im Kampf stellen. Natürlich hat Frieden seinen Preis. Eine königliche Hochzeit, begleitet von der Mitgift von Halikarnassos, könnte das Raubtier dennoch zum Partner machen.#>  #NT!
 caria_missions_task_10_tt: "Ein Heiratsantrag wird an einen der #E Nachfolgekönige#! gesendet\nFalls er #G annimmt#!, wird Folgendes geschehen:\n#E @[GetCountry('CIA').GetFlag]!  [GetCountry('CIA').GetName]#! verbündet sich mit dem #E #T Nachfolgerkönig#!#!\n@[GetCountry('CIA').GetFlag]!  [GetCountry('CIA').GetName] erhält #G 250#! @gold! als Mitgift\nEin Spross der Linie des #E #T Nachfolgekönigs#!#! wird ein Mitglied unseres Hauses heiraten\n#E Halikarnsos#! wird ein #Y Bundesgenosse#! des #E #T Nachfolgekönigreiches#!#! "  

  
