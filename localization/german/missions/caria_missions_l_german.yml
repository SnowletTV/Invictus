 me_caria_14_title: "$caria_missions_task_14$"  #<$caria_missions_task_14$#>  #NT!
 me_caria_14_desc: "Halikarnassos, once defied the greatest conqueror of the age. When Alexander laid siege to the city in 334 BCE, it held firm for months under the command of Memnon of Rhodes, and though it fell in the end, its defenses earned the respect of all Hellas. Since then, Halikarnassos has changed hands more than once, as the Diadochi fought like wolves over the spoils of empire.\n\nBut no longer. Let the kings and satraps scheme as they will, Halikarnassos shall not be their prize. We have rebuilt her walls, reinforced her harbors, and restorde her towers. The city now stands as an impregnable bastion of Carian power, and those who seek to take her must pay a terrible price."  #<Halikarnassos trotzte einst dem größten Eroberer seiner Zeit. Als Alexander die Stadt 334 v. Chr. belagerte, hielt sie unter dem Kommando von Memnon von Rhodos monatelang stand, und obwohl sie am Ende fiel, verdienten ihre Verteidigungsanlagen den Respekt von ganz Hellas. Seitdem hat Halikarnassos mehr als einmal den Besitzer gewechselt, da die Diadochen wie Wölfe um die Beute des Imperiums kämpften.\n\nAber nicht mehr. Mögen die Könige und Satrapen planen, was sie wollen, Halikarnassos soll nicht ihre Beute sein. Wir haben ihre Mauern wieder aufgebaut, ihre Häfen verstärkt und ihre Türme restauriert. Die Stadt ist nun eine uneinnehmbare Bastion karischer Macht, und diejenigen, die sie einnehmen wollen, müssen einen schrecklichen Preis zahlen.#>  #NT!
 me_caria_14.a: "The shield of Caria, unbreakable and eternal, is complete!"  #<Der Schild von Caria, unzerbrechlich und ewig, ist vollständig!#>  #NT!
 me_caria_14_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_14$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_14$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_15_title: "$caria_missions_task_15$"  #<$caria_missions_task_15$#>  #NT!
 me_caria_15_desc: "The line of Hekatomnos brought Caria to greatness. From their ancestral seat in Mylasa, the Hekatomnids rose to power as satraps of Caria and masters of its highlands and coasts alike. Under Mausolos and Artemisia, Halikarnassos rose to fame, its monuments rivaling those of ancient dynasties, its fleets commanding the seas, its court hosting poets, scholars, and soldiers. Even in its twilight, the dynasty endured with honor: Queen Ada, last of the Hekatomnids, adopted Alexander the Great as her son. Now, with Halikarnassos once more secured, it is only fitting that we entrust its rule to [hecatomnid_heir.GetName], a scion of a lesser branch of the Housue of Hekatomnos from Mylassa."  #<Die Linie von Hekatomnos brachte Caria zu großer Größe. Von ihrem Stammsitz in Mylasa aus stiegen die Hekatomniden als Satrapen Kariens und Herren des Hochlandes und der Küsten an die Macht. Unter Mausolos und Artemisia erlangte Halikarnassos Ruhm, seine Denkmäler konkurrierten mit denen antiker Dynastien, seine Flotten beherrschten die Meere, sein Hof beherbergte Dichter, Gelehrte und Soldaten. Auch in ihrem Untergang bestand die Dynastie ehrenhaft weiter: Königin Ada, die letzte der Hekatomniden, adoptierte Alexander den Großen als ihren Sohn. Nachdem Halikarnassos nun wieder gesichert ist, ist es nur passend, dass wir seine Herrschaft [hecatomnid_heir.GetName] anvertrauen, einem Spross eines geringeren Zweigs des Hauses Hekatomnos aus Mylassa.#>  #NT!
 me_caria_15.a: "Hail Basileos [hecatomnid_heir.GetPraenomen]!"  #<Heil Basileos [hecatomnid_heir.GetPraenomen]!#>  #NT!
 me_caria_15.b: "[hecatomnid_heir.GetPraenomen] will be the  first man in Halikarnassos."  #<[hecatomnid_heir.GetPraenomen] wird der erste Mann in Halikarnassos sein.#>  #NT!
 me_caria_15_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_15$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_15$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_16_title: "$caria_missions_task_16$"  #<$caria_missions_task_16$#>  #NT!
 me_caria_16_desc: "For too long, Caria has bent the knee to Persians, to Macedonians, to self-styled kings with no roots in our soil. No more, Caria remembers. In the mountain sanctuaries of Mylasa, in the harbor-taverns, of Halikarnassos, in the hearts of the people, the old loyalties endure. They whisper of a rising, of vengeance, of restoration.\n\nOne such whisper has taken form in the person of a [hekatomnid_assasain.GetName], a man of charisma and ambition from the line of Hekatomnos, who earned the trust of [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName] with feigned loyalty and flattery. [hekatomnid_assasain.GetPraenomen] believes it is time for the heirs of Hekatomnos to reclaim what is rightfully theirs, not as satraps, but as sovereigns.\n\nBut tonight, in the darkened halls of the palace, [hekatomnid_assasain.GetHerHis] treachery is laid bare. [ROOT.GetCountry.GetRuler.GetPraenomen]'s guards have caught [hekatomnid_assasain.GetHerHim] in the act of poisoning [ROOT.GetCountry.GetRuler.GetPraenomen]'s wine. One word from the captain of the guard can bind [hekatomnid_assasain.GetPraenomen] in chains and save [ROOT.GetCountry.GetRuler.GetPraenomen]. However, another path lies open, silence..."  #<Zu lange hat Karien vor den Persern, den Mazedoniern und den selbsternannten Königen, die keine Wurzeln in unserem Boden hatten, die Knie gebeugt. Nicht mehr, erinnert sich Caria. In den Bergheiligtümern von Mylasa, in den Hafentavernen von Halikarnassos, in den Herzen der Menschen bestehen die alten Loyalitäten fort. Sie flüstern von einem Aufstand, von Rache, von Wiederherstellung.\n\nEin solches Flüstern hat in der Person eines [hekatomnid_assasain.GetName] Gestalt angenommen, eines Mannes mit Charisma und Ehrgeiz aus der Linie von Hekatomnos, der sich mit vorgetäuschter Loyalität und Schmeichelei das Vertrauen von [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName] verdient hat. [hekatomnid_assasain.GetPraenomen] glaubt, dass es an der Zeit ist, dass die Erben von Hekatomnos das zurückfordern, was ihnen rechtmäßig gehört, nicht als Satrapen, sondern als Herrscher.\n\nAber heute Nacht wird in den dunklen Hallen des Palastes [hekatomnid_assasain.GetHerHis] der Verrat offengelegt. Die Wachen von [ROOT.GetCountry.GetRuler.GetPraenomen] haben [hekatomnid_assasain.GetHerHim] dabei erwischt, wie er den Wein von [ROOT.GetCountry.GetRuler.GetPraenomen] vergiftet hat. Ein Wort des Hauptmanns der Wache kann [hekatomnid_assasain.GetPraenomen] in Ketten binden und [ROOT.GetCountry.GetRuler.GetPraenomen] retten. Doch ein anderer Weg liegt offen, Stille ...#>  #NT!
 me_caria_16.a: "Let the usurper tremble!"  #<Lass den Usurpator erzittern!#>  #NT!
 me_caria_16.at: "We will adopt the flag of #T Halikarnassos#!"  #<Wir werden die Flagge von #T Halikarnassos#! übernehmen#>  #NT!
 me_caria_16.b: "Caria for the Carians."  #<Caria für die Karier.#>  #NT!
 me_caria_16.c: "Imprison [hekatomnid_assasain.GetPraenomen]!"  #<[hekatomnid_assasain.GetPraenomen] einsperren!#>  #NT!
 me_caria_16_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_16$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_16$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_17_title: "$caria_missions_task_17$"  #<$caria_missions_task_17$#>  #NT!
 me_caria_17_desc: "While the material remains of Kaunos date its foundation or early site-use to at most the 9th century BCE, the traditional history of the city dates back to its namesake, Kaunos, the son of the Carian King Miletus and the naiad Kyane. It is said that Kaunos and his sister, Byblis, fell in love and that, in order to avoid incest, Kaunos fled her company all the way to Lycia in Anatolia. Here, Byblis followed him but fell into sorrow and madness and died, turning into a spring, crying her incessant tears over the land and creating with her watery eyes the river the Calbys river. In Asia, Kaunos married the nymph Pronoe and had a son, Aegialus, who went on to found a city nearby, named for his father. The city itself was an excellent trade harbor, having two functioning ports, and Herodotus notes that the people of the city resiliently fought against the Persian general Harpagus - they did, after a while, lose. The historian also notes that while he personally disagrees with their claim of their own foreign origin, because they speak a language similar to that of his own home, he cannot deny that they act in a peculiar manner, different from all the other Carians and Lycians. All the men, women, and even the children drink wine together.\n\nIf we harbor ambitions to stand among the heirs of Alexander, we must do as they do. We shall establish a royal mint at Kaunos, striking coinage in our name."  #<Während die materiellen Überreste von Kaunos die Gründung oder frühe Nutzung des Ortes höchstens auf das 9. Jahrhundert v. Chr. datieren, geht die traditionelle Geschichte der Stadt auf ihren Namensgeber Kaunos zurück, den Sohn des karischen Königs Milet und des Najaden Kyane. Es wird gesagt, dass Kaunos und seine Schwester Byblis sich verliebten und dass Kaunos, um Inzest zu vermeiden, aus ihrer Gesellschaft bis nach Lykien in Anatolien floh. Hier folgte Byblis ihm, verfiel jedoch in Trauer und Wahnsinn und starb, verwandelte sich in eine Quelle, weinte ihre unaufhörlichen Tränen über das Land und erschuf mit ihren wässrigen Augen den Fluss Calbys. In Asien heiratete Kaunos die Nymphe Pronoe und bekam einen Sohn, Aegialus, der in der Nähe eine Stadt gründete, die nach seinem Vater benannt wurde. Die Stadt selbst war ein ausgezeichneter Handelshafen und verfügte über zwei funktionierende Häfen, und Herodot weist darauf hin, dass die Einwohner der Stadt hart gegen den persischen Feldherrn Harpagus kämpften – sie verloren jedoch nach einer Weile. Der Historiker stellt außerdem fest, dass er zwar persönlich mit ihrer Behauptung, sie seien ausländischer Herkunft, nicht einverstanden sei, weil sie eine Sprache sprechen, die der seiner Heimat ähnelt, er aber nicht leugnen kann, dass sie sich auf eine besondere Art und Weise verhalten, die sich von allen anderen Karern und Lykiern unterscheidet. Alle Männer, Frauen und sogar die Kinder trinken gemeinsam Wein.\n\nWenn wir den Ehrgeiz hegen, zu den Erben Alexanders zu gehören, müssen wir es ihnen gleichtun. Wir werden in Kaunos eine königliche Münzstätte errichten und in unserem Namen Münzen prägen.#>  #NT!
 me_caria_17.a: "Ein autonomes Kaunos entspricht unseren Interessen."  
 me_caria_17.at: "#E Kaunos#! wird ein #E @[THIS.GetCountry.GetFlag]!  [THIS.GetCountry.GetAdjective]er#! #Y Bundesgenosse#!" 
 me_caria_17.b: "All the world will know the face of [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName]!"  #<Die ganze Welt wird das Gesicht von [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName] kennen!#>  #NT!
 me_caria_17_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_17$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_17$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_18_title: "$caria_missions_task_18$"  #<$caria_missions_task_18$#>  #NT!
 me_caria_18_desc: "Mausolos, the great architect of Carian power, knew that empire is not built by one hand alone. To secure his southern frontier, he entrusted the rule of Lycia to his brother, Pixodaros. We would do well to follow his example. The Lycian cities, from Xanthos to Patara, are proud and fractious, but are strategically vital."  #<Mausolos, der große Architekt der karischen Macht, wusste, dass ein Imperium nicht von einer Hand allein aufgebaut werden kann. Um seine Südgrenze zu sichern, vertraute er die Herrschaft über Lykien seinem Bruder Pixodaros an. Wir täten gut daran, seinem Beispiel zu folgen. Die lykischen Städte, von Xanthos bis Patara, sind stolz und widerspenstig, aber strategisch wichtig.#>  #NT!
 me_caria_18.a: "Lycia will henceforth be governed by a satrap!"  #<Lykien wird fortan von einem Satrapen regiert!#>  #NT!
 me_caria_18.b: "The boundaries of Lycia shall stretch far and wide."  #<Die Grenzen Lykiens werden sich weit und breit erstrecken.#>  #NT!
 me_caria_18_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_18$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_18$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_19_title: "$caria_missions_task_19$"  #<$caria_missions_task_19$#>  #NT!
 me_caria_19_desc: "The hyparch Condalos, dispatched to govern Lycia, once remarked that the locals wore their hair long, unlike the clean-shaven Carians. Sensing an opportunity, Condalos proclaimed to the people that the Great King Artaxerxes required hair for horse wigs, and that every Lycian must shave their heads and send the clippings to the royal court. Those who refused could instead pay in silver. No hair ever left the province, but Condalos's scheme greatly increased revenues."  #<Der Hyparch Condalos, der zur Regierung Lykiens entsandt wurde, bemerkte einmal, dass die Einheimischen ihr Haar im Gegensatz zu den glattrasierten Kariern lang trugen. Condalos witterte eine Gelegenheit und verkündete dem Volk, dass der Großkönig Artaxerxes Haare für Pferdeperücken benötige und dass jeder Lykier sich den Kopf rasieren und die Ausschnitte an den königlichen Hof schicken müsse. Wer sich weigerte, konnte stattdessen in Silber bezahlen. Kein Haar verließ jemals die Provinz, aber Condalos' Plan steigerte die Einnahmen erheblich.#>  #NT!
 me_caria_19.a: "Mausolos sure knew how to pick them..."  #<Mausolos wusste sicher, wie man sie auswählt ...#>  #NT!
 me_caria_19_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_19$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_19$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_20_title: "$caria_missions_task_20$"  #<$caria_missions_task_20$#>  #NT!
 me_caria_20_desc: "The western coast of Asia Minor is a patchwork of city-states, leagues, and fading satrapies. Many of these cities once paid tribute to Mausolos or fought beside Artemisia. Some have drifted under the sway of Macedonian generals or cling to hollow freedoms behind crumbling walls. The Asian coast is our inheritance. The time has come to launch an expedition to secure our rule over Asia for generations to come."  #<Die Westküste Kleinasiens ist ein Flickenteppich aus Stadtstaaten, Ligen und verblassenden Satrapien. Viele dieser Städte zahlten einst Mausolos Tribut oder kämpften an der Seite von Artemisia. Einige sind unter dem Einfluss mazedonischer Generäle geraten oder klammern sich hinter bröckelnden Mauern an hohle Freiheiten. Die asiatische Küste ist unser Erbe. Es ist an der Zeit, eine Expedition zu starten, um unsere Herrschaft über Asien für kommende Generationen zu sichern.#>  #NT!
 me_caria_20.a: "Soon Asia will be ours!"  #<Bald gehört Asien uns!#>  #NT!
 me_caria_20_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_20$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_20$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_21_title: "$caria_missions_task_21$"  #<$caria_missions_task_21$#>  #NT!
 me_caria_21_desc: "Not too long ago, the highlands of Lycaonia were fractured and unclaimed, a wild land of fortified towns, tribal chieftains, and mountain strongholds. Our expedition to Derbe has borne fruit. [derbe_ruler.GetPraenomen] now rules these lands as dynast, having secured the allegiance of its hill-forts and towns with the aid of [ROOT.GetCountry.GetAdjective] gold. At [derbe_ruler.GetHerHis] side stands [derbe_heir.GetPraenomen], the heir to this new Derbean line."  #<Vor nicht allzu langer Zeit war das Hochland von Lykaonien zerklüftet und unbeansprucht, ein wildes Land mit befestigten Städten, Stammeshäuptlingen und Bergfestungen. Unsere Expedition nach Derbe hat Früchte getragen. [derbe_ruler.GetPraenomen] regiert diese Länder nun als Dynastie, nachdem er sich mit Hilfe von [ROOT.GetCountry.GetAdjective] Gold die Treue seiner Burgen und Städte gesichert hat. Auf der Seite [derbe_ruler.GetHerHis] steht [derbe_heir.GetPraenomen], der Erbe dieser neuen Derbean-Linie.#>  #NT!
 me_caria_21.a: "At last, Derbe has a dynast."  #<Endlich hat Derbe einen Dynasten.#>  #NT!
 me_caria_21_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_21$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_21$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_22_title: "$caria_missions_task_22$"  #<$caria_missions_task_22$#>  #NT!
 me_caria_22_desc: "Though our coastal cities gleam with marble, the true body of [ROOT.GetCountry.GetName] lies inland in the valleys, hills, and scattered villages that feed our cities and man our armies. We must turn our gaze to the shepherds, farmers, and settlers who sustain our strength. With modest grants and steady oversight, we have transformed the interior into the beating heart of [ROOT.GetCountry.GetAdjective] might. Roads have been built through the hills of Mylasa and pastures carved into the stony ground."  #<Obwohl unsere Küstenstädte vor Marmor glänzen, liegt der wahre Körper von [ROOT.GetCountry.GetName] im Landesinneren in den Tälern, Hügeln und verstreuten Dörfern, die unsere Städte ernähren und unsere Armeen bemannen. Wir müssen unseren Blick auf die Hirten, Bauern und Siedler richten, die unsere Stärke erhalten. Mit bescheidenen Zuschüssen und ständiger Aufsicht haben wir den Innenraum in das schlagende Herz von [ROOT.GetCountry.GetAdjective] Macht verwandelt. Durch die Hügel von Mylasa wurden Straßen gebaut und Weiden in den steinigen Boden gehauen.#>  #NT!
 me_caria_22.a: "We take care of our own."  #<Wir kümmern uns um uns selbst.#>  #NT!
 me_caria_22.at: "Every #Y Settlement#! rank territory will #G get #E 2#!#! @freemen! #Y Freemen#! pops and #G #E 1#!#! @citizen! #Y Citizen#! pop"  #<Every #Y Settlement#! rank territory will #G get #E 2#!#! @freemen! #Y Freemen#! pops and #G #E 1#!#! @citizen! #Y Bürger#! Einwohner#>  #NT!
 me_caria_22_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_22$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_22$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_23_title: "$caria_missions_task_23$"  #<$caria_missions_task_23$#>  #NT!
 me_caria_23_desc: "The Barons of Macedon have always favored the strong and able over the weak and feeble. If we play our hand right, our line may yet prove to be the strongest of them all. [ROOT.GetCountry.GetRuler.GetName]  has seized what remains of Alexander's Kingdom, removing it from the grasp of those leading it to ruin and create in its place a new, more robust state for the Macedonians spread across the shattered remnants of the Argead Empire to serve under."  #<Die Barone von Makedonien haben immer die Starken und Fähigen den Schwachen und Gebrechlichen vorgezogen. Wenn wir unsere Hand richtig spielen, könnte sich unsere Linie noch als die stärkste von allen erweisen. [ROOT.GetCountry.GetRuler.GetName] hat die Überreste von Alexanders Königreich an sich gerissen und es aus der Gewalt derer gerissen, die es in den Ruin getrieben haben, und an seiner Stelle einen neuen, robusteren Staat geschaffen, unter dem die über die zerschmetterten Überreste des Argead-Reiches verteilten Mazedonier dienen können.#>  #NT!
 me_caria_23.a: "[ROOT.GetCountry.GetRuler.GetPraenomen] is the [ROOT.GetCountry.GetRulerTitle] of Macedon"  #<[ROOT.GetCountry.GetRuler.GetPraenomen] ist das [ROOT.GetCountry.GetRulerTitle] von Mazedonien#>  #NT!
 me_caria_23.at: "We will adopt the flag and colors of Macedon."  #<Wir werden die Flagge und Farben Mazedoniens übernehmen.#>  #NT!
 me_caria_23.b: "We rule Macedon, but it is not the Macedon of old."  #<Wir regieren Makedonien, aber es ist nicht mehr das alte Makedonien.#>  #NT!
 me_caria_23.bt: "#R Nothing happens.#!"  #<#R Nichts passiert.#!#>  #NT!
 me_caria_23.c: "This is a new chapter in the history of the Macedonians."  #<Dies ist ein neues Kapitel in der Geschichte der Mazedonier.#>  #NT!
 me_caria_23.ct: "We will adopt the symbols of Macedon but retain our colors."  #<Wir werden die Symbole Mazedoniens übernehmen, aber unsere Farben beibehalten.#>  #NT!
 me_caria_23_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_23$#!' $mission_completed_tooltip_2$\n#G Unlocks#! #T Macedonian Missions#!\nCompleting #T Hellenic Mastery#! #G Unlocks#! #T Hellenistic Empire#!"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_23$#!' $mission_completed_tooltip_2$\n#G Freischaltungen#! #T Mazedonische Missionen#!\nAbschluss von #T Hellenische Meisterschaft#! #G Freischaltungen#! #T Hellenistisches Reich#!#>  #NT!
  
 me_caria_24_title: "$caria_missions_task_24$"  #<$caria_missions_task_24$#>  #NT!
 me_caria_24_desc: "The Hellenistic world is rife with the teachings of philosophy, art, history, and learning, from the works of Plato to the Histories of Herodotus.\n\nWith the construction of public libraries throughout the nation, [ROOT.GetCountry.GetName] has become a beacon of Hellenism in the east, with the sound of great debates echoing throughout the streets, enticing many scholars to travel from mainland Greece. One scholar in particular, [hellenic_scholar.GetName] has displayed an exceptionally sharp mind, and would make for a perfect researcher should we allow him to serve."  #<Die hellenistische Welt ist reich an Lehren der Philosophie, Kunst, Geschichte und Bildung, von den Werken Platons bis zu den Geschichten des Herodot.\n\nMit dem Bau öffentlicher Bibliotheken im ganzen Land ist [ROOT.GetCountry.GetName] zu einem Leuchtturm des Hellenismus im Osten geworden, mit dem Klang großer Debatten, der durch die Straßen hallt und viele Gelehrte dazu verleitet, vom griechischen Festland zu reisen. Insbesondere ein Gelehrter, [hellenic_scholar.GetName], hat einen außergewöhnlich scharfen Verstand bewiesen und wäre ein perfekter Forscher, wenn wir ihm erlauben würden, zu dienen.#>  #NT!
 me_caria_24.a: "Excellent."  #<Exzellent.#>  #NT!
 me_caria_24_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_24$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_24$#!' $mission_completed_tooltip_2$#>  #NT!
  
