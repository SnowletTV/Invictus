 me_caria_1_title: "$caria_missions_task_1$"  #<$caria_missions_task_1$#>  #NT!
 me_caria_1_desc: "The future of Caria is clearly entwined with that of our mighty overlords, the #E [ROOT.GetCountry.GetOverlord.GetAdjective]s#!. While it may be tempting to assert greater independence, now is not the time for such actions. It would only invite conflict and suspicion.  Instead, wisdom dictates a different course, one that strengthens our standing and secures our prominence within their domain."  #<Die Zukunft von Caria ist eindeutig mit der unserer mächtigen Oberherren, den #E [ROOT.GetCountry.GetOverlord.GetAdjective]s#!., verbunden. Auch wenn es verlockend sein mag, größere Unabhängigkeit zu behaupten, ist jetzt nicht die Zeit für solche Maßnahmen. Es würde nur zu Konflikten und Misstrauen führen.  Stattdessen diktiert die Weisheit einen anderen Kurs, der unser Ansehen stärkt und unsere herausragende Stellung in ihrem Bereich sichert.#>  #NT!
 me_caria_1.a: "Rather friends than enemies."  #<Eher Freunde als Feinde.#>  #NT!
 me_caria_1_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_1$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_1$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_2_title: "$caria_missions_task_2$"  #<$caria_missions_task_2$#>  #NT!
 me_caria_2_desc: "Caria has long demonstrated its value to the great powers of the Aegean and Near East. Under Persian rule, our skilled sailors and mercenaries played vital roles in their campaigns, while the Hekatomnids elevated Caria to unprecedented heights of wealth and influence. Alexander the Great entrusted Queen Ada with Caria's governance as a loyal ally rather than a mere subject.\n\nNow, the satrap of Caria, citing the historical precedent of Carian autonomy under under Persia and the trust granted by Alexander the Great, asks that we formalize Caria's status as an ally. Granting this request would ensure their loyalty and strengthen their contributions, but it would also set a precedent for greater autonomy among our subjects. Should we recognize them as a partner rather than a mere province?"  #<Karien hat seinen Wert für die Großmächte der Ägäis und des Nahen Ostens schon lange unter Beweis gestellt. Unter persischer Herrschaft spielten unsere erfahrenen Seeleute und Söldner eine wichtige Rolle in ihren Feldzügen, während die Hekatomniden Karien zu beispiellosem Reichtum und Einfluss verhalfen. Alexander der Große vertraute Königin Ada die Regierung Kariens als loyaler Verbündeter und nicht als bloßer Untertan an.\n\nNun bittet der Satrap von Karien unter Berufung auf den historischen Präzedenzfall der karischen Autonomie unter Persien und das von Alexander dem Großen gewährte Vertrauen, dass wir Kariens Status als Verbündeter formalisieren. Die Gewährung dieses Antrags würde ihre Loyalität sicherstellen und ihre Beiträge stärken, aber es würde auch einen Präzedenzfall für eine größere Autonomie unserer Untertanen schaffen. Sollten wir sie als Partner und nicht als bloße Provinz anerkennen?#>  #NT!
 me_caria_2.a: "Let us formalize an alliance with [caria_ally_country.GetName]."  #<Lassen Sie uns eine Allianz mit [caria_ally_country.GetName] formalisieren.#>  #NT!
 me_caria_2.b: "Caria will remain a province under our rule."  #<Caria wird eine Provinz unter unserer Herrschaft bleiben.#>  #NT!
  
 me_caria_201_title: "Proving Our Worth"  #<Wir beweisen unseren Wert#>  #NT!
 me_caria_201_desc: "Word has arrived from the court of the #E [caria_old_overlord.GetAdjective]s#! regarding our request. After careful deliberation, they have agreed to  recognize us as a partner rather than a mere province., granting us the autonomy to better serve both their interests and our own."  #<Vom Gericht des #E [caria_old_overlord.GetAdjective]s#! ist eine Nachricht bezüglich unseres Antrags eingetroffen. Nach sorgfältiger Überlegung haben sie zugestimmt, uns als Partner und nicht nur als bloße Provinz anzuerkennen und uns die Autonomie zu gewähren, um sowohl ihren als auch unseren eigenen Interessen besser dienen zu können.#>  #NT!
 me_caria_201.a: "We are honored to be trusted as partners."  #<Wir fühlen uns geehrt, als Partner vertrauenswürdig zu sein.#>  #NT!
 me_caria_2_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_2$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_2$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_202_title: "Proving Our Worth"  #<Wir beweisen unseren Wert#>  #NT!
 me_caria_202_desc: "The court of the #E [caria_old_overlord.GetAdjective]s#! have refused our request for recognition as a partner. Regrettably, we must tread carefully, continuing to demonstrate our value, until the day we can secure the status we deserve."  #<Das Gericht der #E [caria_old_overlord.GetAdjective]s#! hat unseren Antrag auf Anerkennung als Partner abgelehnt. Bedauerlicherweise müssen wir vorsichtig vorgehen und weiterhin unseren Wert unter Beweis stellen, bis wir uns den Status sichern können, den wir verdienen.#>  #NT!
 me_caria_202.a: "Most unfortunate."  #<Äußerst bedauerlich.#>  #NT!
  
 me_caria_3_title: "$caria_missions_task_3$"  #<$caria_missions_task_3$#>  #NT!
 me_caria_3_desc: "The Carians have a long and storied naval tradition, serving as commanders, shipbuilders, and warriors in the fleets of mighty empires. Even in the days of the Bronze Age, our forebears roamed the seas as mercenaries and traders. Under Lygdamis, Artemisia, Mausolus, and Ada, Caria assembled formidable fleets, securing dominance over much of the Aegean. Yet for too long, our seafaring strength has been wielded in the service of others.\n\nTruly, we have established one of the finest naval academies in the world! The coasts of #E Caria#! are graced by the sailors of #E [ROOT.GetCountry.GetCapital.GetName]#!, soon to be the greatest in all Asia."  #<Die Karier haben eine lange und geschichtsträchtige Marinetradition und dienen als Kommandeure, Schiffbauer und Krieger in den Flotten mächtiger Reiche. Schon in der Bronzezeit durchstreiften unsere Vorfahren als Söldner und Händler die Meere. Unter Lygdamis, Artemisia, Mausolus und Ada stellte Karien beeindruckende Flotten zusammen und sicherte sich die Vorherrschaft über weite Teile der Ägäis. Doch allzu lange haben wir unsere Seefahrerstärke in den Dienst anderer gestellt.\n\nWir haben tatsächlich eine der besten Marineakademien der Welt gegründet! Die Küsten von #E Karien#! werden von den Seeleuten von #E [ROOT.GetCountry.GetCapital.GetName]#! geschmückt, die bald die größten in ganz Asien sein werden.#>  #NT!
 me_caria_3.a: "We will be glorious."  #<Wir werden herrlich sein.#>  #NT!
 me_caria_3_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_3$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_3$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_4_title: "$caria_missions_task_4$"  #<$caria_missions_task_4$#>  #NT!
 me_caria_4_desc: "The Carians have a long and storied naval tradition, serving as commanders, shipbuilders, and warriors in the fleets of mighty empires. Even in the days of the Bronze Age, our forebears roamed the seas as mercenaries and traders. Under Lygdamis, Artemisia, Mausolus, and Ada, Caria assembled formidable fleets, securing dominance over much of the Aegean. Yet for too long, our seafaring strength has been wielded in the service of others.\n\nNow, with the completion of the [ROOT.GetCountry.GetAdjective] war fleet-not, our destiny will be secured on the waves!"  #<Die Karier haben eine lange und geschichtsträchtige Marinetradition und dienen als Kommandeure, Schiffbauer und Krieger in den Flotten mächtiger Reiche. Schon in der Bronzezeit durchstreiften unsere Vorfahren als Söldner und Händler die Meere. Unter Lygdamis, Artemisia, Mausolus und Ada stellte Karien beeindruckende Flotten zusammen und sicherte sich die Vorherrschaft über weite Teile der Ägäis. Doch allzu lange haben wir unsere Seefahrerstärke in den Dienst anderer gestellt.\n\nJetzt, mit der Fertigstellung der [ROOT.GetCountry.GetAdjective]-Kriegsflotte, ist unser Schicksal auf den Wellen gesichert!#>  #NT!
 me_caria_4.a: "Asia will tremble before our might!"  #<Asien wird vor unserer Macht erzittern!#>  #NT!
 me_caria_4_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_4$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_4$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_5_title: "$caria_missions_task_5$"  #<$caria_missions_task_5$#>  #NT!
 me_caria_5_desc: "Ships with ten rowers or more per side were first employed by Alexander the Great but became even more commonplace after the Antigonid navies used them in the siege of Tyre and beyond. Such a ship will always have an extremely limited maneuverability in a pitched naval battle. For siege warfare however these 'Mega Polyremes' are ideal as they are able to break open seaside walls and then act as platforms for artillery while also allowing great number of troops to land. It is only right that we construct such vessels for ourselves and the first of these, the 'Artemisia' captained by [sailor_man.GetName] will serve as the flagship of the Carian navy."  #<Schiffe mit zehn oder mehr Ruderern pro Seite wurden zuerst von Alexander dem Großen eingesetzt, wurden aber noch üblicher, nachdem die Antigoniden-Marine sie bei der Belagerung von Tyrus und darüber hinaus einsetzte. Ein solches Schiff wird in einer offenen Seeschlacht immer eine äußerst eingeschränkte Manövrierfähigkeit haben. Für Belagerungskriege sind diese „Mega Polyremes“ jedoch ideal, da sie in der Lage sind, Küstenmauern aufzubrechen und dann als Plattformen für Artillerie zu fungieren und gleichzeitig die Landung einer großen Anzahl von Truppen zu ermöglichen. Es ist nur richtig, dass wir solche Schiffe für uns selbst bauen und das erste davon, die „Artemisia“ unter dem Kapitän von [sailor_man.GetName], wird als Flaggschiff der karischen Marine dienen.#>  #NT!
 me_caria_5.a: "The 'Artemisia' is but the first of many..."  #<Die „Artemisia“ ist nur die erste von vielen ...#>  #NT!
 me_caria_5_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_5$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_5$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_6_title: "$caria_missions_task_6$"  #<$caria_missions_task_6$#>  #NT!
 me_caria_6_desc: "The greatest of the Diadochi, now style themselves as kings, 'Basileis,' not satraps. Caria has known queens and dynasts, warlords and visionaries. We now rule not as mere servants of distant powers but as sovereigns in our own right.\n\nAnd still, some call our ruler 'Satrapes,' a title of subordination. That will not do. The diadem awaits, and with it the recognition of our rightful place among the successors of Alexander."  #<Die größten Diadochen bezeichnen sich jetzt als Könige, „Basileis“, nicht mehr als Satrapen. Caria hat Königinnen und Dynasten, Kriegsherren und Visionäre gekannt. Wir regieren jetzt nicht mehr als bloße Diener entfernter Mächte, sondern als eigenständige Herrscher.\n\nUnd dennoch nennen manche unsere Herrscher „Satrapen“, ein Titel der Unterordnung. So geht das nicht. Das Diadem erwartet uns und mit ihm die Anerkennung unseres rechtmäßigen Platzes unter den Nachfolgern Alexanders.#>  #NT!
 me_caria_6.a: "Hail [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName] of [ROOT.GetCountry.GetName]!"  #<Heil [ROOT.GetCountry.GetRuler.GetTitle] [ROOT.GetCountry.GetRuler.GetName] von [ROOT.GetCountry.GetName]!#>  #NT!
 me_caria_6.b: "[ROOT.GetCountry.GetRuler.GetPraenomen] will enrich the military and scorn all others."  #<[ROOT.GetCountry.GetRuler.GetPraenomen] wird das Militär bereichern und alle anderen verachten.#>  #NT!
 me_caria_6_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_6$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_6$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_7_title: "$caria_missions_task_7$"  #<$caria_missions_task_7$#>  #NT!
 me_caria_7_desc: "Pleistarchos's father, Antipater, ruled Macedon as Regent of the Kings, and his brother Kassandros cast aside the old titles of subordination to declare himself Basileus, founding a dynasty of his own. Are we to be less bold than Kassandros?\n\nThough the confederates bequeathed us [ROOT.GetCountry.GetName], we are no longer bound to its narrow borders. Our ambitions stretch far beyond. Let us take our place amongst the Succesors of Alexander and reorganize [ROOT.GetCountry.GetName] into 'The Pleistarchid Kingdom!'"  #<Pleistarchos‘ Vater, Antipater, regierte Mazedonien als Regent der Könige, und sein Bruder Kassandros legte die alten Unterwürfigkeitstitel ab, erklärte sich selbst zum Basileus und gründete eine eigene Dynastie. Sollen wir weniger mutig sein als Kassandros?\n\nObwohl die Konföderierten uns [ROOT.GetCountry.GetName] vermacht haben, sind wir nicht länger an seine engen Grenzen gebunden. Unsere Ambitionen reichen weit darüber hinaus. Nehmen wir unseren Platz unter den Nachfolgern Alexanders ein und reorganisieren wir [ROOT.GetCountry.GetName] in „Das Königreich der Pleistarchiden“!#>  #NT!
 me_caria_7.a: "Henceforth [ROOT.GetCountry.GetName] shall be know as The Pleistarchid Kingdom!"  #<Von nun an wird [ROOT.GetCountry.GetName] als das Königreich der Pleistarchiden bekannt sein!#>  #NT!
 me_caria_7.b: "The status quo will do."  #<Der Status quo reicht aus.#>  #NT!
 me_caria_7_tooltip: "We can now use the #G Legacy of Alexander#! War Goal on other Diadochi.\n#G We gain claims on [GetCharacter('(int32)39').GetPraenomen]'s former Empire#!:\n[GetProvince('(int32)418').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)350').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)379').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)790').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)290').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)1883').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)1936').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)830').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)918').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)4799').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)687').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)516').GetArea.GetRegion.GetName|Y], and [GetProvince('(int32)569').GetArea.GetRegion.GetName|Y].\n#R These claims, and the War Goal, will disappear upon the death or abdication of [THIS.GetCountry.GetRuler.GetName].#!\nThe mission task '#Y $caria_missions_task_7$#!' has now been #G Completed#!"  #<Wir können jetzt das Kriegsziel #G Legacy of Alexander#! auf andere Diadochen anwenden.\n#G Wir erhalten Ansprüche auf [GetCharacter('(int32)39').GetPraenomen]s ehemaliges Imperium#!:\n[GetProvince('(int32)418').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)350').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)379').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)790').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)290').GetArea.GetRegion.GetName|Y], [GetProvince('(int32)1883').GetArea.GetRegion.GetName|Y], #!0, #!1, #!2, #!3, #!4, #!5 und #!6.\n#!7 Diese Ansprüche und das Kriegsziel verschwinden mit dem Tod oder der Abdankung von #!8.#!\nDie Missionsaufgabe '#G0 #G1#!' wurde jetzt #G abgeschlossen#!#>  #NT!
  
 me_caria_8_title: "$caria_missions_task_8$"  #<$caria_missions_task_8$#>  #NT!
 me_caria_8_desc: "Thucydides once called the Chians 'the wealthiest Greeks,' and not without reason. With nearly 900 square kilometers of fertile land, soaring peaks, and access to the eastern seas, the island is a world unto itself, and far too valuable to be left to the whims of democracy.\n\nIn the days of Mausolos, the Chian oligarchs wisely cast out the democrats and aligned themselves with Caria, forming a league with Rhodes, Kos, and Byzantion. But as with all unstable things, democracy returned with Alexander's conquests.\n\nThis error has been corrected. With the aid of our fleet, the island's natural leaders has reclaimed their place and brought Chios once more under the Carian aegis. Their leader, [chios_country.GetRuler.GetName] asks that we settle a contentious land dispute with the Erythraians by force of arms."  #<Thukydides nannte die Chier einst „die reichsten Griechen“, und das nicht ohne Grund. Mit fast 900 Quadratkilometern fruchtbarem Land, hohen Gipfeln und Zugang zu den östlichen Meeren ist die Insel eine Welt für sich und viel zu wertvoll, um sie den Launen der Demokratie zu überlassen.\n\nIn den Tagen von Mausolos vertrieben die chianischen Oligarchen klugerweise die Demokraten, verbündeten sich mit Karien und bildeten eine Allianz mit Rhodos, Kos und Byzanz. Aber wie bei allen instabilen Dingen kehrte mit Alexanders Eroberungen die Demokratie zurück.\n\nDieser Fehler wurde korrigiert. Mit Hilfe unserer Flotte haben die natürlichen Anführer der Insel ihren Platz zurückerobert und Chios erneut unter die Schirmherrschaft der Karier gebracht. Ihr Anführer [chios_country.GetRuler.GetName] bittet uns, einen umstrittenen Landstreit mit den Erythräern mit Waffengewalt beizulegen.#>  #NT!
 me_caria_8.a: "Anything for our loyal friends."  #<Alles für unsere treuen Freunde.#>  #NT!
 me_caria_8.b: "We ought not overexert ourselves."  #<Wir sollten uns nicht überanstrengen.#>  #NT!
 me_caria_8_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_8$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_8$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_8001_title: "Oligarchs Seize Chios"  #<Oligarchen erobern Chios#>  #NT!
 me_caria_8001_desc: "Word spreads across the Aegean: the democratic regime of Chios has fallen. Backed by [chios_new_master.GetAdjective] gold and ships, the island's oligarchic faction has overthrown the assembly and reestablished control under a council of 'natural leaders.'\n\nThe move echoes the days of Mausolos, when Chios cast out the demos and joined a Carian-led league along with Rhodes, Kos, and Byzantion. Now, once more, the wealthy island bends toward oligarchy and to [chios_new_master.GetName]."  #<Überall in der Ägäis verbreitet sich die Nachricht: Das demokratische Regime von Chios ist gestürzt. Unterstützt durch [chios_new_master.GetAdjective] Gold und Schiffe hat die oligarchische Fraktion der Insel die Versammlung gestürzt und die Kontrolle unter einem Rat von „natürlichen Anführern“ wiederhergestellt.\n\nDer Schritt erinnert an die Tage von Mausolos, als Chios die Demos vertrieb und sich zusammen mit Rhodos, Kos und Byzantion einer von Kariern geführten Liga anschloss. Jetzt neigt sich die wohlhabende Insel erneut der Oligarchie und [chios_new_master.GetName] zu.#>  #NT!
 me_caria_8001.a: "Interesting..."  #<Interessant...#>  #NT!
 me_caria_8001.b: "This affront shall not stand!"  #<Dieser Affront darf keinen Bestand haben!#>  #NT!
 me_caria_8001.c: "This affront shall not stand!"  #<Dieser Affront darf keinen Bestand haben!#>  #NT!
  
 me_caria_9_title: "$caria_missions_task_9$"  #<$caria_missions_task_9$#>  #NT!
 me_caria_9_desc: "The Ionian city of [priene_country.GetName], long known for its dignified temples and proud democratic traditions, has fallen silent... save for the stamping of [ROOT.GetCountry.GetAdjective] boots. With the discreet support of [ROOT.GetCountry.GetAdjective] arms, [hieron_scope.GetName] has declared himself 'Prince of Priene,' dissolving the city assembly and assuming the diadem. The Sanctuary of Athena Polias remains undisturbed, but its stewards now answer to a prince rather than a people.\n\nAlready, the Ionian League stirs uneasily. Just weeks ago, Priene was the League's meeting place; now, it is a [ROOT.GetCountry.GetAdjective] vassal in all but name."  #<Die ionische Stadt [priene_country.GetName], die seit langem für ihre würdevollen Tempel und stolzen demokratischen Traditionen bekannt ist, ist verstummt ... bis auf das Stempeln von [ROOT.GetCountry.GetAdjective]-Stiefeln. Mit der diskreten Unterstützung von [ROOT.GetCountry.GetAdjective] Waffen hat [hieron_scope.GetName] sich selbst zum „Prinzen von Priene“ erklärt, die Stadtversammlung aufgelöst und das Diadem übernommen. Das Heiligtum der Athena Polias bleibt ungestört, aber seine Verwalter unterstehen nun einem Prinzen und nicht einem Volk.\n\nDer Ionische Bund regt sich bereits unruhig. Noch vor wenigen Wochen war Priene der Treffpunkt der Liga; Jetzt ist es ein [ROOT.GetCountry.GetAdjective] Vasall, bis auf den Namen.#>  #NT!
 me_caria_9.a: "The path to Ionia lies open!"  #<Der Weg nach Ionien liegt offen!#>  #NT!
 me_caria_9_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_9$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_9$#!' $mission_completed_tooltip_2$#>  #NT!
  
 me_caria_9001_title: "Prince of Priene"  #<Prinz von Priene#>  #NT!
 me_caria_9001_desc: "The Ionian city of [priene_country.GetName], long known for its dignified temples and proud democratic traditions, has fallen silent... save for the stamping of Carian boots. With the discreet support of Carian arms, [hieron_scope.GetName], one of Priene's preeminent nobles, has declared himself 'Prince of Priene,' dissolving the city assembly and assuming the diadem. The Sanctuary of Athena Polias remains undisturbed, but its stewards now answer to a prince rather than a people.\n\nAll Ionia stirs uneasily. Just weeks ago, Priene was the meeting place of the Ionian League; now, it is a Carian vassal in all but name."  #<Die ionische Stadt [priene_country.GetName], die seit langem für ihre würdevollen Tempel und stolzen demokratischen Traditionen bekannt ist, ist verstummt ... bis auf das Stampfen karischer Stiefel. Mit der diskreten Unterstützung karischer Waffen hat sich [hieron_scope.GetName], einer der bedeutendsten Adligen von Priene, zum „Prinzen von Priene“ erklärt, die Stadtversammlung aufgelöst und das Diadem übernommen. Das Heiligtum der Athena Polias bleibt ungestört, aber seine Verwalter unterstehen jetzt eher einem Prinzen als einem Volk.\n\nIn ganz Ionien herrscht Unruhe. Noch vor wenigen Wochen war Priene der Treffpunkt der Ionischen Liga; Jetzt ist es bis auf den Namen ein karischer Vasall.#>  #NT!
 me_caria_9001.a: "Interesting..."  #<Interessant...#>  #NT!
 me_caria_9001.b: "This affront shall not stand!"  #<Dieser Affront darf keinen Bestand haben!#>  #NT!
  
 me_caria_10_title: "$caria_missions_task_10$"  #<$caria_missions_task_10$#>  #NT!
 me_caria_10_desc: "The age of kings is upon us. The heirs of Alexander, no longer content to call themselves satraps, now style themselves as Basileis, and each builds their empire in the image of their founder. The world is no longer ruled by men alone, but by ferocious beasts.\n\nTo the south, the Ptolemies soar like eagles: aloof, imperial, and swift to strike. To the east, the Seleucids advance on elephantine feet: immense, deliberate, and unstoppable. To the north, the Lysimachid roar like lions, ever hungering for territory and glory.\n\nEach watches Caria, and each harbors quiet designs on our coasts. But perhaps we need not face them in battle. Of course, peace comes at a price. A royal marriage, accompanied by the dowry of Halikarnassus, may yet turn predator into partner."  #<Das Zeitalter der Könige steht vor der Tür. Die Erben Alexanders geben sich nicht länger damit zufrieden, sich Satrapen zu nennen, sondern bezeichnen sich nun als Basileis, und jeder baut sein Reich nach dem Vorbild seines Gründers auf. Die Welt wird nicht mehr allein von Menschen regiert, sondern von wilden Tieren.\n\nIm Süden schweben die Ptolemäer wie Adler: distanziert, kaiserlich und schnell zuschlagend. Im Osten rücken die Seleukiden auf Elefantenfüßen vor: gewaltig, bedächtig und unaufhaltsam. Im Norden brüllen die Lysimachiden wie Löwen, immer auf der Suche nach Territorium und Ruhm.\n\nJeder wacht über Karien und jeder hegt stille Pläne an unseren Küsten. Aber vielleicht müssen wir uns ihnen nicht im Kampf stellen. Natürlich hat Frieden seinen Preis. Eine königliche Hochzeit, begleitet von der Mitgift von Halikarnassos, könnte das Raubtier dennoch zum Partner machen.#>  #NT!
 me_caria_10.a: "A daughter of [GetCountry('EGY').GetRuler.GetPraenomen] will do."  #<Eine Tochter von [GetCountry('EGY').GetRuler.GetPraenomen] reicht aus.#>  #NT!
 me_caria_10.at: "A marriage proposal will be sent to [GetCountry('EGY').GetCapital.GetName]#!\nIf [GetCountry('EGY').GetRuler.GetPraenomen] #G accepts#!, then the following will occur:\n\nA scion of #E #T [GetCountry('EGY').GetRuler.GetPraenomen]#!#!'s line will wed a member of our house"  #<Ein Heiratsantrag wird gesendet an [GetCountry('EGY').GetCapital.GetName]#!\nIf [GetCountry('EGY').GetRuler.GetPraenomen] #G akzeptiert#!,, dann geschieht Folgendes:\n\nEin Spross der Linie #E #T [GetCountry('EGY').GetRuler.GetPraenomen]#!#!'s wird ein Mitglied unseres Hauses heiraten#>  #NT!
 me_caria_10.b: "[GetCountry('TRE').GetRuler.GetPraenomen] shall be our kin."  #<[GetCountry('TRE').GetRuler.GetPraenomen] soll unser Verwandter sein.#>  #NT!
 me_caria_10.bt: "A marriage proposal will be sent to [GetCountry('TRE').GetCapital.GetName]#!\nIf [GetCountry('TRE').GetRuler.GetPraenomen] #G accepts#!, then the following will occur:\n\nA scion of #E #T [GetCountry('TRE').GetRuler.GetPraenomen]#!#!'s line will wed a member of our house"  #<Ein Heiratsantrag wird gesendet an [GetCountry('TRE').GetCapital.GetName]#!\nIf [GetCountry('TRE').GetRuler.GetPraenomen] #G akzeptiert#!,, dann geschieht Folgendes:\n\nEin Spross der Linie #E #T [GetCountry('TRE').GetRuler.GetPraenomen]#!#!'s wird ein Mitglied unseres Hauses heiraten#>  #NT!
 me_caria_10.c: "[GetCountry('SEL').GetRuler.GetPraenomen] is a reasonable man."  #<[GetCountry('SEL').GetRuler.GetPraenomen] ist ein vernünftiger Mann.#>  #NT!
 me_caria_10.ct: "A marriage proposal will be sent to [GetCountry('SEL').GetCapital.GetName]#!\nIf [GetCountry('SEL').GetRuler.GetPraenomen] #G accepts#!, then the following will occur:\n\nA scion of #E #T [GetCountry('SEL').GetRuler.GetPraenomen]#!#!'s line will wed a member of our house"  #<Ein Heiratsantrag wird gesendet an [GetCountry('SEL').GetCapital.GetName]#!\nIf [GetCountry('SEL').GetRuler.GetPraenomen] #G akzeptiert#!,, dann geschieht Folgendes:\n\nEin Spross der Linie #E #T [GetCountry('SEL').GetRuler.GetPraenomen]#!#!'s wird ein Mitglied unseres Hauses heiraten#>  #NT!
 me_caria_10.d: "We shall not debase ourselves with gifts and flattery."  #<Wir werden uns nicht durch Geschenke und Schmeicheleien erniedrigen.#>  #NT!
 me_caria_10_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_10$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_10$#!' $mission_completed_tooltip_2$#>  #NT!
  
  
  
 me_caria_1001_title: "The Carian Marriage Proposal"  #<Der karische Heiratsantrag#>  #NT!
 me_caria_1001_desc: "Now, envoys come from Caria bearing flattery, silver, and something more dangerous, an offer. They propose a union between our two houses, sealed with a dowry of Halikarnassos. They hope to buy peace with ports and kinship.\n\nA clever ploy. Caria does not seek to resist us; it seeks to survive us. We may grant their petition and bind them by blood... or refuse, and let the jackals fall upon their walls."  #<Jetzt kommen Gesandte aus Karien mit Schmeicheleien, Silber und etwas noch Gefährlicherem, einem Angebot. Sie schlagen eine Verbindung zwischen unseren beiden Häusern vor, besiegelt mit einer Mitgift von Halikarnassos. Sie hoffen, mit Häfen und Verwandtschaft Frieden zu erkaufen.\n\nEin cleverer Trick. Caria versucht nicht, uns zu widerstehen; es versucht, uns zu überleben. Wir können ihrer Bitte stattgeben und sie durch Blut binden ... oder ablehnen und die Schakale auf ihre Mauern fallen lassen.#>  #NT!
 me_caria_1001.a: "A most welcome offer."  #<Ein höchst willkommenes Angebot.#>  #NT!
 me_caria_1001.b: "What a ridiculous request."  #<Was für eine lächerliche Bitte.#>  #NT!
  
 me_caria_1002_title: "$caria_missions_task_10$: Success"  #<$caria_missions_task_10$: Erfolg#>  #NT!
 me_caria_1002_desc: "Word has returned from the court of [sucessor_kingdom.GetCapital.GetName]. A royal union has been agreed upon. One of our own shall be wed into their line, and in return we are granted protection, alliance, and recognition. Of course, peace is never without cost, Halikarnassos will now pass into [sucessor_kingdom.GetAdjective] hands as a dowry."  #<Vom Gericht ist die Nachricht von [sucessor_kingdom.GetCapital.GetName] zurückgekehrt. Es wurde eine königliche Union vereinbart. Einer von uns soll in ihre Linie eingeheiratet werden, und im Gegenzug erhalten wir Schutz, Bündnis und Anerkennung. Natürlich ist der Frieden nie umsonst, Halikarnassos wird nun als Mitgift in [sucessor_kingdom.GetAdjective] Hände übergehen.#>  #NT!
 me_caria_1002.a: "Let the wedding festivities begin."  #<Lasst die Hochzeitsfeierlichkeiten beginnen.#>  #NT!
  
 me_caria_1003_title: "$caria_missions_task_10$: Failure"  #<$caria_missions_task_10$: Fehler#>  #NT!
 me_caria_1003_desc: "The [sucessor_kingdom.GetAdjective] answer has come and it is a cold one. Our embassy was dismissed, our gifts declined, our proposal rejected outright. There will be no marriage, no alliance, no peace bought with dowries."  #<Die [sucessor_kingdom.GetAdjective]-Antwort ist gekommen und sie ist kalt. Unsere Botschaft wurde entlassen, unsere Geschenke wurden abgelehnt, unser Vorschlag wurde komplett abgelehnt. Es wird keine Ehe, kein Bündnis, keinen mit Mitgift erkauften Frieden geben.#>  #NT!
 me_caria_1003.a: "Then we stand alone."  #<Dann stehen wir alleine da.#>  #NT!
  
 me_caria_11_title: "$caria_missions_task_11$"  #<$caria_missions_task_11$#>  #NT!
 me_caria_11_desc: "The world is a turbulent place. Alexander is gone, and in his absence, the Diadochi tear the world apart in their quest for dominion. Fleets burn, cities fall, and no land escapes the reach of war. In such an age, to stand alone is to stand on the edge of a sword. Many now call for us to pass formally under the aegis of our good and faithful friends, the Ptolemies."  #<Die Welt ist ein turbulenter Ort. Alexander ist verschwunden, und in seiner Abwesenheit zerreißen die Diadochen auf ihrem Streben nach Herrschaft die Welt. Flotten brennen, Städte fallen und kein Land entgeht der Reichweite des Krieges. In einem solchen Zeitalter allein zu stehen bedeutet, auf der Schneide eines Schwertes zu stehen. Viele fordern jetzt, dass wir uns offiziell der Schirmherrschaft unserer guten und treuen Freunde, der Ptolemäer, unterstellen.#>  #NT!
 me_caria_11.a: "Hail [GetCountry('EGY').GetRuler.GetTitle] [GetCountry('EGY').GetRuler.GetName]"  #<Hagel [GetCountry('EGY').GetRuler.GetTitle] [GetCountry('EGY').GetRuler.GetName]#>  #NT!
 me_caria_11.b: "We will remain a free people."  #<Wir werden ein freies Volk bleiben.#>  #NT!
 me_caria_11_tooltip: "$mission_completed_tooltip_1$ '#Y $caria_missions_task_11$#!' $mission_completed_tooltip_2$."  #<$mission_completed_tooltip_1$ '#Y $caria_missions_task_11$#!' $mission_completed_tooltip_2$.#>  #NT!
  
