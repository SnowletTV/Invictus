l_german:
  
 # Events 
  
 me_dahae.1.t: "Meeting of the Clans - Beginning"  #<Treffen der Clans – Beginn>  #NT!!
 me_dahae.1.desc: "With the clan leaders now present, we must ask a fundamental question - how should we approach question of expansion? There is much that [ROOT.GetCountry.GetRuler.GetName] must contemplate, for one false move or misstep could certainly backfire and earn the [ROOT.GetCountry.GetRulerTitle] a lifelong enemy.\n\nOur choices here will lead to different bonuses that will benefit our preferred approach. "  #<Da die Clan-Anführer jetzt anwesend sind, müssen wir eine grundlegende Frage stellen: Wie sollten wir die Frage der Erweiterung angehen? Es gibt vieles, worüber [ROOT.GetCountry.GetRuler.GetName] nachdenken muss, denn eine falsche Bewegung oder ein Fehltritt könnte sicherlich nach hinten losgehen und [ROOT.GetCountry.GetRulerTitle] zu einem lebenslangen Feind machen.\n\nUnsere Entscheidungen hier werden zu verschiedenen Boni führen, die unserem bevorzugten Ansatz zugute kommen.>  #NT!!
 me_dahae.1.a: "Favor diplomatic approach."  #<Bevorzugen Sie einen diplomatischen Ansatz.>  #NT!!
 me_dahae.1.b: "Favor forceful approach."  #<Bevorzugen Sie ein energisches Vorgehen.>  #NT!!
  
 me_dahae.2.t: "Meeting of the Clans - Progress"  #<Treffen der Clans – Fortschritt>  #NT!!
 me_dahae.2.desc: "As the meeting continues, [ROOT.GetCountry.GetRuler.GetName] is pleased by the direction that the talks are taking. After listening carefully to the latest proposals from the other clans, [ROOT.GetCountry.GetRuler.GetSheHe] meets with [ROOT.GetCountry.GetRuler.GetHerHis] closest advisors and shares instructions for the next step."  #<Im weiteren Verlauf des Treffens ist [ROOT.GetCountry.GetRuler.GetName] erfreut über die Richtung, in die sich die Gespräche entwickeln. Nachdem er sich die neuesten Vorschläge der anderen Clans aufmerksam angehört hat, trifft sich [ROOT.GetCountry.GetRuler.GetSheHe] mit [ROOT.GetCountry.GetRuler.GetHerHis] engsten Beratern und gibt Anweisungen für den nächsten Schritt.>  #NT!!
 me_dahae.2.a: "We must strive for a good image."  #<Wir müssen nach einem guten Image streben.>  #NT!!
 me_dahae.2.b: "Let everyone know we're coming!"  #<Lassen Sie alle wissen, dass wir kommen!>  #NT!!
  
 me_dahae.3.t: "Meeting of the Clans - Outcome"  #<Treffen der Clans – Ergebnis>  #NT!!
 me_dahae.3.desc: "With the meeting of the clans thus concluded, our [ROOT.GetCountry.GetAdjective] diplomats have met with [ROOT.GetCountry.GetRuler.GetName] back in [ROOT.GetCountry.GetCapital.GetName] to share the results."  #<Nachdem das Treffen der Clans damit abgeschlossen war, haben sich unsere [ROOT.GetCountry.GetAdjective]-Diplomaten bereits im Jahr [ROOT.GetCountry.GetCapital.GetName] mit [ROOT.GetCountry.GetRuler.GetName] getroffen, um die Ergebnisse auszutauschen.>  #NT!!
 me_dahae.3.a: "Seems like the tribes want war."  #<Scheint, als ob die Stämme Krieg wollen.>  #NT!!
 me_dahae.3.b: "Seems like the tribes want cordial unification."  #<Scheint, als ob die Stämme eine herzliche Vereinigung wollen.>  #NT!!
 me_dahae.3.tt: "We will get #R claims on all the other Dahae tribes.#!"  #<Wir werden #R Ansprüche auf alle anderen Dahae-Stämme erhalten.#!>  #NT!!
  
 me_dahae.4.t: "Stock Steppe Horses"  #<Stock Steppenpferde>  #NT!!
 me_dahae.4.desc: "Steppe horses @steppe_horses! are famed for their size and tameness, and traders from all across the world travel to our markets in hopes of procuring these mighty beasts for their own purposes. It is known far and wide that [ROOT.GetCountry.GetName] has the best steppe horses available anywehere, and we are fortunate to say that we have entire herds of these precious animals at our disposal.\n\nAs such, with this many horses prepared, it is only fitting to train and utilize them in a manner we see fit. Our horse masters have asked [ROOT.GetCountry.GetRuler.GetName] to decide how our animals are to be trained; should they focus on attacking our foes or defending our battle formations?"  #<Steppenpferde @steppe_horses! sind berühmt für ihre Größe und Zahmheit, und Händler aus der ganzen Welt reisen zu unseren Märkten in der Hoffnung, diese mächtigen Tiere für ihre eigenen Zwecke zu beschaffen. Es ist weithin bekannt, dass [ROOT.GetCountry.GetName] die besten Steppenpferde hat, die es gibt, und wir können glücklicherweise sagen, dass uns ganze Herden dieser kostbaren Tiere zur Verfügung stehen.\n\nDa so viele Pferde vorbereitet sind, ist es nur angemessen, sie auf eine Weise zu trainieren und zu nutzen, die wir für richtig halten. Unsere Pferdemeister haben [ROOT.GetCountry.GetRuler.GetName] gebeten, zu entscheiden, wie unsere Tiere trainiert werden sollen; Sollten sie sich darauf konzentrieren, unsere Feinde anzugreifen oder unsere Kampfformationen zu verteidigen?>  #NT!!
 me_dahae.4.a: "We must focus on offense - the only way is forward!"  #<Wir müssen uns auf die Offensive konzentrieren – der einzige Weg ist vorwärts!>  #NT!!
 me_dahae.4.b: "It would be prudent to focus on defensive tactics"  #<Es wäre ratsam, sich auf defensive Taktiken zu konzentrieren>  #NT!!
  
 me_dahae.6.t: "Defend Dahae Lands"  #<Verteidigt die Dahae-Länder>  #NT!!
 me_dahae.6.desc: "Grim news arrived at [ROOT.GetCountry.GetCapital.GetName] early this morning, carried by messengers that rode all through the night in order to reach our capital. It seems [friendly_neighbor_target.GetName] was attacked by [dahae_aggressor_target.GetName], and the threat of a regional war is greater than it has been in recent memory.\n\n[ROOT.GetCountry.GetRuler.GetName] has a decision to make; should we ride to assist our friendly neighbors, or should we leave this situation in the hand of the gods?"  #<Heute früh um [ROOT.GetCountry.GetCapital.GetName] trafen düstere Nachrichten ein, überbracht von Boten, die die ganze Nacht unterwegs waren, um unsere Hauptstadt zu erreichen. Es scheint, dass [friendly_neighbor_target.GetName] von [dahae_aggressor_target.GetName] angegriffen wurde und die Gefahr eines regionalen Krieges größer ist als je zuvor.\n\n[ROOT.GetCountry.GetRuler.GetName] muss eine Entscheidung treffen; Sollen wir reiten, um unseren freundlichen Nachbarn zu helfen, oder sollten wir diese Situation den Göttern überlassen?>  #NT!!
 me_dahae.6.a: "This moment requires our hooves on the ground"  #<Dieser Moment erfordert unsere Hufe auf dem Boden>  #NT!!
 me_dahae.6.b: "Good...let them fight"  #<Gut ... lasst sie kämpfen>  #NT!!
  
 me_dahae.7.t: "Steppe Falconry - Beginning"  #<Steppenfalkenjagd – Anfänge>  #NT!!
 me_dahae.7.desc: "Hunting with falcons is one of the greatest pleasures enjoyed by a [ROOT.GetCountry.GetAdjective] warrior, aside from proving their worth in combat. [ROOT.GetCountry.GetRuler.GetName] has decided to host such a challenge in order to raise our diplomatic standing with the other Tribal Chieftains. And if [ROOT.GetCountry.GetRuler.GetFirstName] manages to win this event, then the fame of our Chieftain will spread far and wide - a boon to the tribesmen of [ROOT.GetCountry.GetName]."  #<Die Jagd mit Falken gehört neben der Beweisführung im Kampf zu den größten Freuden eines [ROOT.GetCountry.GetAdjective]-Kriegers. [ROOT.GetCountry.GetRuler.GetName] hat beschlossen, eine solche Herausforderung auszurichten, um unser diplomatisches Ansehen gegenüber den anderen Stammeshäuptlingen zu verbessern. Und wenn es [ROOT.GetCountry.GetRuler.GetFirstName] gelingt, dieses Event zu gewinnen, wird sich der Ruhm unseres Häuptlings weit verbreiten – ein Segen für die Stammesangehörigen von [ROOT.GetCountry.GetName].>  #NT!!
 me_dahae.7.a: "Let us organize the greatest falconry challenge!"  #<Lassen Sie uns die größte Falknerei-Herausforderung organisieren!>  #NT!!
  
 me_dahae.8.t: "Steppe Falconry - Invitations"  #<Steppenfalkenjagd - Einladungen>  #NT!!
 me_dahae.8.desc: "Before we embark on the falcon hunt, we obviously need to send out invitations. How much effort should we put into it? It is widely known that offering a small gift alongside our request will make it harder to decline, but it all depends on if [ROOT.GetCountry.GetRuler.GetName] feels like dipping into the treasury."  #<Bevor wir uns auf die Falkenjagd begeben, müssen wir natürlich Einladungen verschicken. Wie viel Aufwand sollten wir investieren? Es ist allgemein bekannt, dass das Anbieten eines kleinen Geschenks zusammen mit unserer Anfrage die Ablehnung erschwert, aber es hängt alles davon ab, ob [ROOT.GetCountry.GetRuler.GetName] Lust hat, in die Schatzkammer zu greifen.>  #NT!!
 me_dahae.8.a: "Send regular invitations"  #<Versenden Sie regelmäßig Einladungen>  #NT!!
 me_dahae.8.b: "Send invitations with gifts"  #<Versenden Sie Einladungen mit Geschenken>  #NT!!
 me_dahae.8.b.tt: "Other tribal leaders will be much more likely to accept."  #<Andere Stammesführer werden eher zustimmen.>  #NT!!
  
 me_dahae.8000.t: "[dahae_host.GetEmployer.GetName] Falconry Acitivity"  #<[dahae_host.GetEmployer.GetName] Falknerei-Aktivität>  #NT!!
 me_dahae.8000.desc: "[ROOT.GetCountry.GetRuler.GetName], we have received a message from [dahae_host.GetName] - it seems that the [dahae_host.GetAdjective] [dahae_host.GetRulerTitle] is planning a #E falcon hunt#! and wants you to join in the festivities. Should we accept the invitation from [dahae_host.GetFirstName]?"  #<[ROOT.GetCountry.GetRuler.GetName], wir haben eine Nachricht von [dahae_host.GetName] erhalten – es scheint, dass [dahae_host.GetAdjective] [dahae_host.GetRulerTitle] eine #E Falkenjagd#! plant und möchte, dass du an den Feierlichkeiten teilnimmst. Sollen wir die Einladung von [dahae_host.GetFirstName] annehmen?>  #NT!!
 me_dahae.8000.a: "Let us prepare then!"  #<Dann bereiten wir uns vor!>  #NT!!
 me_dahae.8000.a.tt: "We will accept the invitation."  #<Wir werden die Einladung annehmen.>  #NT!!
 me_dahae.8000.b: "Tell them to have fun."  #<Sag ihnen, sie sollen Spaß haben.>  #NT!!
 me_dahae.8000.b.tt: "We will decline the invitation."  #<Wir werden die Einladung ablehnen.>  #NT!!
  
 me_dahae.9.t: "Steppe Falconry - Responses"  #<Steppenfalkenjagd – Antworten>  #NT!!
 me_dahae.9.desc: "The envoys sent out by [ROOT.GetCountry.GetRuler.GetName] have started to return back to [ROOT.GetCountry.GetCapital.GetName], and now we will see who is willing to join our [ROOT.GetCountry.GetRulerTitle] on the falcon hunt."  #<Die von [ROOT.GetCountry.GetRuler.GetName] ausgesandten Gesandten haben begonnen, nach [ROOT.GetCountry.GetCapital.GetName] zurückzukehren, und jetzt werden wir sehen, wer bereit ist, sich unserem [ROOT.GetCountry.GetRulerTitle] auf der Falkenjagd anzuschließen.>  #NT!!
 me_dahae.9.a: "Let's see who accepted..."  #<Mal sehen, wer akzeptiert hat...>  #NT!!
 me_dahae.9.a.1t: "[attendee_1.GetName] of [attendee_1.GetCountry.GetName] @[attendee_1.GetCountry.GetFlag]! accepted invitation."  #<[attendee_1.GetName] von [attendee_1.GetCountry.GetName] @[attendee_1.GetCountry.GetFlag]! nahm die Einladung an.>  #NT!!
 me_dahae.9.a.2t: "[attendee_2.GetName] of [attendee_2.GetCountry.GetName] @[attendee_2.GetCountry.GetFlag]! accepted invitation."  #<[attendee_2.GetName] von [attendee_2.GetCountry.GetName] @[attendee_2.GetCountry.GetFlag]! nahm die Einladung an.>  #NT!!
 me_dahae.9.a.3t: "[attendee_3.GetName] of [attendee_3.GetCountry.GetName] @[attendee_3.GetCountry.GetFlag]! accepted invitation."  #<[attendee_3.GetName] von [attendee_3.GetCountry.GetName] @[attendee_3.GetCountry.GetFlag]! nahm die Einladung an.>  #NT!!
 me_dahae.9.a.4t: "[attendee_4.GetName] of [attendee_4.GetCountry.GetName] @[attendee_4.GetCountry.GetFlag]! accepted invitation."  #<[attendee_4.GetName] von [attendee_4.GetCountry.GetName] @[attendee_4.GetCountry.GetFlag]! nahm die Einladung an.>  #NT!!
 me_dahae.9001.t: "Steppe Falconry - Failure"  #<Steppenfalkenjagd – Misserfolg>  #NT!!
 me_dahae.9001.desc: "Well, it seems that nobody was interested in showing up for the falcon hunt. The excuses offered to [ROOT.GetCountry.GetRuler.GetName] were pathetic and our kinsmen are laughing at our [ROOT.GetCountry.GetRulerTitle] behind [ROOT.GetCountry.GetRuler.GetHerHis] back. We might want to rethink if diplomacy is an option here then."  #<Nun, anscheinend hatte niemand Interesse daran, zur Falkenjagd zu erscheinen. Die Ausreden, die [ROOT.GetCountry.GetRuler.GetName] angeboten wurden, waren erbärmlich und unsere Verwandten lachen über unseren [ROOT.GetCountry.GetRulerTitle] hinter [ROOT.GetCountry.GetRuler.GetHerHis] Rücken. Dann sollten wir vielleicht noch einmal darüber nachdenken, ob Diplomatie hier eine Option ist.>  #NT!!
 me_dahae.9001.a: "This is embarassing..."  #<Das ist peinlich...>  #NT!!
 me_dahae.9001.a.tt: "The #Y Falcon Hunt#! will be #R Cancelled#!."  #<Die #Y Falkenjagd#! wird #R abgesagt#!.>  #NT!!
 me_dahae.9002.t: "Steppe Falconry - Guests Arrive"  #<Steppenfalkenhof – Gäste kommen>  #NT!!
 me_dahae.9002.desc: "Oh, what a delight to see everyone gathered and united in love of kumis and hunting. All that is left is to entertain the crowd, which should pay dividends down the line."  #<Oh, was für eine Freude zu sehen, wie sich alle in der Liebe zu Kumis und der Jagd versammelt und vereint haben. Jetzt bleibt nur noch die Unterhaltung des Publikums, was sich auf lange Sicht auszahlen sollte.>  #NT!!
 me_dahae.9002.a: "Let us celebrate this momentous occasion!"  #<Feiern wir diesen bedeutsamen Anlass!>  #NT!!
 me_dahae.9002.a.tt: "The #Y Falcon Hunt#! will start in couple weeks."  #<Die #Y Falkenjagd#! beginnt in ein paar Wochen.>  #NT!!
  
 me_dahae.1001.t: "Steppe Falconry - Friend at the camp"  #<Steppenfalkenjagd – Freund im Lager>  #NT!!
 me_dahae.1001.desc: "Over the last couple of days, [attendee_1.GetCountry.GetRuler.GetName] became good buddies with [ROOT.GetCountry.GetRuler.GetName], participating in diplomacy at its best. The two are often seen walking together, swapping war stories and laughing at each other's jokes, and both leaders have been toasting each other's health with fermented mare's milk whenever the occasion arises."  #<In den letzten Tagen ist [attendee_1.GetCountry.GetRuler.GetName] ein guter Freund von [ROOT.GetCountry.GetRuler.GetName] geworden und nimmt an Diplomatie vom Feinsten teil. Man sieht die beiden oft zusammen spazieren gehen, Kriegsgeschichten austauschen und über die Witze des anderen lachen, und beide Anführer stoßen bei jedem sich bietenden Anlass mit fermentierter Stutenmilch auf ihre Gesundheit an.>  #NT!!
 me_dahae.1001.a: "Let's raise our cups of delicious Kumis!"  #<Lasst uns unsere Tassen köstlicher Kumis erheben!>  #NT!!
 me_dahae.1002.t: "Steppe Falconry - Unfortunate Joke"  #<Steppenfalkerei – Unglücklicher Witz>  #NT!!
 me_dahae.1002.desc: "There was an incident this morning that [ROOT.GetCountry.GetRuler.GetName] would like to forget as soon as possible; when everyone was listening to the [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetSheHe] made a joke that didn't quite land with the audience. Other leaders have enough tact to not be too offended, but this does not improve our standing among them regardless."  #<Heute Morgen gab es einen Vorfall, den [ROOT.GetCountry.GetRuler.GetName] so schnell wie möglich vergessen möchte; Als alle [ROOT.GetCountry.GetRulerTitle] hörten, machte [ROOT.GetCountry.GetRuler.GetSheHe] einen Witz, der beim Publikum nicht ganz ankam. Andere Führungskräfte haben genug Fingerspitzengefühl, um nicht allzu beleidigt zu sein, aber das verbessert unser Ansehen unter ihnen trotzdem nicht.>  #NT!!
 me_dahae.1002.a: "Well, this is embarassing..."  #<Nun, das ist peinlich...>  #NT!!
  
 me_dahae.11.t: "Steppe Falconry - Moving Forward"  #<Steppenfalkerei – Vorwärtsschreiten>  #NT!!
 me_dahae.11.desc: "The time has now arrived to leave the comfort of the camp and start the thing everyone's been waiting for; the #E Falcon Hunt#!. [ROOT.GetCountry.GetRuler.GetName] has gathered [ROOT.GetCountry.GetRuler.GetHerHis] retinue and is preparing to lead the warriors out into the vast steppe.\n Our current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Jetzt ist es an der Zeit, den Komfort des Lagers zu verlassen und das zu beginnen, worauf alle gewartet haben; Die #E Falcon Hunt#!. [ROOT.GetCountry.GetRuler.GetName] hat [ROOT.GetCountry.GetRuler.GetHerHis] Gefolge versammelt und bereitet sich darauf vor, die Krieger in die weite Steppe zu führen.\n Unsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.11.a: "Let us move forth!"  #<Lasst uns weitermachen!>  #NT!!
 me_dahae.11.a.t: "#T Falconry activity will start.#!"  #<#T Die Falknereiaktivität beginnt.#!>  #NT!!
  
 me_dahae.12.t: "Steppe Falconry - Building Camp"  #<Steppenfalkerei - Aufbaulager>  #NT!!
 me_dahae.12.desc: "After hours of riding across the endless expanse of the steppe, [ROOT.GetCountry.GetRuler.GetName] has decided that we have found a good place from which we can locate prey, and the [ROOT.GetCountry.GetRulerTitle] gave the orders to construct a camp here.\n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Nach stundenlangem Ritt durch die endlosen Weiten der Steppe hat [ROOT.GetCountry.GetRuler.GetName] entschieden, dass wir einen guten Ort gefunden haben, von dem aus wir Beute finden können, und der [ROOT.GetCountry.GetRulerTitle] hat den Befehl gegeben, hier ein Lager zu errichten.\n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.12.a: "Let's rest for a little while and look around."  #<Lasst uns ein wenig ausruhen und uns umschauen.>  #NT!!
  
 me_dahae.1301.t: "Steppe Falconry - Hunting Accident"  #<Steppenfalkenjagd - Jagdunfall>  #NT!!
 me_dahae.1301.desc: "[ROOT.GetCountry.GetRuler.GetName]'s child's body has been draped in a white cloth that is now stained red with their lifeblood. They say [heir_scope.GetName] was found by their horse, in a small clearing with a few scattered trees - [ROOT.GetCountry.GetRuler.GetFirstName] knows the place that they speak of. In death, [heir_scope.GetFirstName]'s face is calm, almost serene, and the devastated [ROOT.GetCountry.GetRulerTitle] reached out a trembling hand to caress [heir_scope.GetHerHis] pale brow.\n\nAll at once, the terrible reality of the situation dawned on [ROOT.GetCountry.GetRuler.GetFirstName], and [ROOT.GetCountry.GetRuler.GetSheHe] began to weep silently.\n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Der Körper von [ROOT.GetCountry.GetRuler.GetName]s Kind wurde in ein weißes Tuch gehüllt, das jetzt rot von ihrem Lebenselixier gefärbt ist. Sie sagen, [heir_scope.GetName] wurde von ihrem Pferd auf einer kleinen Lichtung mit ein paar verstreuten Bäumen gefunden – [ROOT.GetCountry.GetRuler.GetFirstName] kennt den Ort, von dem sie sprechen. Im Tod ist das Gesicht von [heir_scope.GetFirstName] ruhig, fast gelassen, und der am Boden zerstörte [ROOT.GetCountry.GetRulerTitle] streckte eine zitternde Hand aus, um [heir_scope.GetHerHis] die blasse Stirn zu streicheln.\n\nPlötzlich dämmerte [ROOT.GetCountry.GetRuler.GetFirstName] die schreckliche Realität der Situation und [ROOT.GetCountry.GetRuler.GetSheHe] begann lautlos zu weinen.\n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%[heir_scope.GetName]0>  #NT!!
 me_dahae.1301.a: "Sorrow overtakes you."  #<Trauer überkommt dich.>  #NT!!
 me_dahae.1301.b: "Oh well..."  #<Nun ja...>  #NT!!
  
 me_dahae.1302.t: "Steppe Falconry - Shaman's Tent"  #<Steppenfalkerei – Zelt des Schamanen>  #NT!!
 me_dahae.1302.desc: "While out on our hunt, [ROOT.GetCountry.GetRuler.GetName] found a tent of a hermit, [hermit_scope.GetName], a deeply-religious man known to locals for his devotion to the gods. How should we approach him? Perhaps we can convince the hermit to bestow a blessing upon us.\n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Während unserer Jagd fand [ROOT.GetCountry.GetRuler.GetName] das Zelt eines Einsiedlers, [hermit_scope.GetName], eines zutiefst religiösen Mannes, der bei den Einheimischen für seine Hingabe an die Götter bekannt ist. Wie sollen wir ihn ansprechen? Vielleicht können wir den Einsiedler davon überzeugen, uns einen Segen zu erteilen.\n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1302.a: "Let's go inside and ask for divine favor."  #<Lasst uns hineingehen und um göttliche Gunst bitten.>  #NT!!
 me_dahae.1302.b: "Invite him to join our court."  #<Laden Sie ihn ein, sich unserem Gericht anzuschließen.>  #NT!!
 me_dahae.1302.b.tt: "[hermit_scope.GetName] will join your court."  #<[hermit_scope.GetName] wird Ihrem Gericht beitreten.>  #NT!!
  
 me_dahae.1303.t: "Steppe Falconry - Poachers"  #<Steppenfalkenjagd - Wilderer>  #NT!!
 me_dahae.1303.desc: "A bit of bad news breaks the morning's silence; while creeping through the tall grass, [ROOT.GetCountry.GetRuler.GetName] found some poachers; vile criminals that go against the laws of the steppe. These hunting grounds are known to be a sacred place, set aside for the use of the Tribal Chieftains, and our kinsmen know better than to scour these territories in hopes of finding prey. A punishment must be doled out at once.\n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Eine schlechte Nachricht durchbricht die Stille des Morgens; Beim Kriechen durch das hohe Gras fand [ROOT.GetCountry.GetRuler.GetName] einige Wilderer; abscheuliche Kriminelle, die gegen die Gesetze der Steppe verstoßen. Es ist bekannt, dass diese Jagdgründe ein heiliger Ort sind, der den Stammeshäuptlingen vorbehalten ist, und unsere Verwandten wissen es besser, als diese Gebiete in der Hoffnung, Beute zu finden, zu durchkämmen. Eine Strafe muss sofort verhängt werden.\n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1303.a: "Hang them."  #<Hängen Sie sie auf.>  #NT!!
 me_dahae.1303.b: "Ask what they know about birds around here."  #<Fragen Sie, was sie hier über Vögel wissen.>  #NT!!
  
 me_dahae.1304.t: "Steppe Falconry - Bird's Sidequest"  #<Steppenfalkerei – Nebenquest des Vogels>  #NT!!
 me_dahae.1304.desc: "While [ROOT.GetCountry.GetRuler.GetName]'s falcon was out flying, it seems that [ROOT.GetCountry.GetRuler.GetHerHis]'s bird found some valuable prey. This is a good sign - we must be getting closer to our goal. \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Während der Falke von [ROOT.GetCountry.GetRuler.GetName] unterwegs war, scheint es, dass der Vogel von [ROOT.GetCountry.GetRuler.GetHerHis] wertvolle Beute gefunden hat. Das ist ein gutes Zeichen – wir müssen unserem Ziel näher kommen. \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1304.a: "Great!"  #<Großartig!>  #NT!!
  
 me_dahae.1305.t: "Steppe Falconry - Send Your Bird Out"  #<Steppenfalkerei – Schicken Sie Ihren Vogel raus>  #NT!!
 me_dahae.1305.desc: "To increase [ROOT.GetCountry.GetRuler.GetHerHis] chances of finding worthy prey, [ROOT.GetCountry.GetRuler.GetName] can send [ROOT.GetCountry.GetRuler.GetHerHis] bird out to scout. \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Um die Chancen von [ROOT.GetCountry.GetRuler.GetHerHis] zu erhöhen, würdige Beute zu finden, kann [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis] Vögel zum Erkunden schicken. \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1305.a: "Send the falcon out with prayers for success!"  #<Senden Sie den Falken mit Gebeten für den Erfolg aus!>  #NT!!
 me_dahae.1305.tt: "The outcome depends on sum of martial@military_icon! and finesse@civic_icon! skills of your Ruler."  #<Das Ergebnis hängt von der Summe von martial@military_icon ab! und finesse@civic_icon! Fähigkeiten deines Herrschers.>  #NT!!
 me_dahae.1305.b: "We should focus on tracking instead of pursuing vainglory"  #<Wir sollten uns auf die Verfolgung konzentrieren, statt auf Ruhmsucht zu spekulieren>  #NT!!
  
 me_dahae.1306.t: "Steppe Falconry - [attendee_1.GetName] Trapped"  #<Steppenfalkerei – [attendee_1.GetName] gefangen>  #NT!!
 me_dahae.1306.desc: "It seems [attendee_1.GetName] got trapped underneath of a horse and we need to help him immediately! But how? \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Es scheint, dass [attendee_1.GetName] unter einem Pferd eingeklemmt ist und wir müssen ihm sofort helfen! Aber wie? \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1306.a: "No time to stop - [attendee_1.GetFirstName] is on [attendee_1.GetHerHis] own"  #<Keine Zeit aufzuhören – [attendee_1.GetFirstName] ist auf [attendee_1.GetHerHis] allein>  #NT!!
 me_dahae.1306.b: "Call your apothecary!"  #<Rufen Sie Ihre Apotheke an!>  #NT!!
 me_dahae.1306.tt: "Outcome depends on finesse@civic_icon! skill of your #T Apothecary#!."  #<Das Ergebnis hängt von finesse@civic_icon ab! Fertigkeit deines #T Apothekers#!.>  #NT!!
  
 me_dahae.1307.t: "Steppe Falconry - Peacocking"  #<Steppenfalkenjagd - Pfauenjagd>  #NT!!
 me_dahae.1307.desc: "As the hunting party fords a small river, other participants on the hunt want to show off their skills and have called for a momentary diversion; typical grandstanding from the [ROOT.GetCountry.GetAdjective] warriors, who are constantly trying to outdo each other in feats of glory. [ROOT.GetCountry.GetRuler.GetName] can't afford to lose; [ROOT.GetCountry.GetRuler.GetSheHe] must win this test or be humiliated before everyone. The goal is to have a falcon snatch a fish from the rushing waters. \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Während die Jagdgruppe einen kleinen Fluss durchquert, wollen andere Jagdteilnehmer ihr Können unter Beweis stellen und haben zu einer vorübergehenden Abwechslung aufgerufen; typische Großartigkeit der [ROOT.GetCountry.GetAdjective]-Krieger, die ständig versuchen, sich gegenseitig in ruhmreichen Taten zu übertrumpfen. [ROOT.GetCountry.GetRuler.GetName] kann es sich nicht leisten zu verlieren; [ROOT.GetCountry.GetRuler.GetSheHe] muss diesen Test gewinnen oder vor allen anderen gedemütigt werden. Das Ziel besteht darin, dass ein Falke einen Fisch aus dem rauschenden Wasser schnappt. \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1307.a: "Send my bird out to hunt it"  #<Schicken Sie meinen Vogel los, um ihn zu jagen>  #NT!!
 me_dahae.1307.tt: "Outcome depends on sum of charisma@oratory_icon! and zeal@religious_icon! skills of your ruler."  #<Das Ergebnis hängt von der Summe von charisma@oratory_icon ab! und zeal@religious_icon! Fähigkeiten deines Herrschers.>  #NT!!
 me_dahae.1307.b: "Try to grab the fish yourself"  #<Versuchen Sie, den Fisch selbst zu ergattern>  #NT!!
  
 me_dahae.1308.t: "Steppe Falconry - Bird Wants To Fly"  #<Steppenfalkenjagd - Vogel will fliegen>  #NT!!
 me_dahae.1308.desc: "The skies are overcast and a quick-moving storm is threatening to unleash its fury upon the hunting party. It is kind of an unfit moment for letting your bird out, but it seems to be restless and is constantly cawing. If the falcon doesn't find anything, it could be damaging to [ROOT.GetCountry.GetRuler.GetName]'s' reputation. Should [ROOT.GetCountry.GetRuler.GetSheHe] release it? \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Der Himmel ist bedeckt und ein schnell ziehender Sturm droht, seine Wut auf die Jagdgesellschaft loszulassen. Es ist ein unpassender Moment, Ihren Vogel herauszulassen, aber er scheint unruhig zu sein und krächzt ständig. Wenn der Falke nichts findet, könnte das dem Ruf von [ROOT.GetCountry.GetRuler.GetName] schaden. Sollte [ROOT.GetCountry.GetRuler.GetSheHe] es veröffentlichen? \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!>  #NT!!
 me_dahae.1308.a: "Let it take to the skies"  #<Lass es in die Lüfte steigen>  #NT!!
 me_dahae.1308.b: "Focus on tracking"  #<Konzentrieren Sie sich auf die Nachverfolgung>  #NT!!
  
 me_dahae.1309.t: "Steppe Falconry - Is Your Bird Stupid?"  #<Steppenfalkerei – Ist Ihr Vogel dumm?>  #NT!!
 me_dahae.1309.desc: "[ROOT.GetCountry.GetRuler.GetName]'s falcon has found a tall tree and is settling itself down in its highest branches, and nothing is convincing the bird to return to [ROOT.GetCountry.GetRuler.GetFirstName]'s arm; not even gifts of dried meat can convince the foolish animal. Everyone is laughing at the [ROOT.GetCountry.GetRulerTitle] and [ROOT.GetCountry.GetRuler.GetHerHis] misbehaving pet, causing [ROOT.GetCountry.GetRuler.GetFirstName]'s cheeks to turn bright red.\n\nIf [ROOT.GetCountry.GetRuler.GetName] tries to grab the falcon from its perch and fails, [ROOT.GetCountry.GetRuler.GetSheHe] will look like a fool, but leaving the bird alone will damage the [ROOT.GetCountry.GetRulerTitle]'s reputation. \n\nOur current success chance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%#!"  #<Der Falke von [ROOT.GetCountry.GetRuler.GetName] hat einen hohen Baum gefunden und lässt sich in seinen höchsten Ästen nieder, und nichts kann den Vogel überzeugen, zu [ROOT.GetCountry.GetRuler.GetFirstName]s Arm zurückzukehren; Nicht einmal Trockenfleischgeschenke können das törichte Tier überzeugen. Alle lachen über das sich schlecht benehmende Haustier [ROOT.GetCountry.GetRulerTitle] und [ROOT.GetCountry.GetRuler.GetHerHis], was dazu führt, dass [ROOT.GetCountry.GetRuler.GetFirstName]s Wangen leuchtend rot werden.\n\nWenn [ROOT.GetCountry.GetRuler.GetName] versucht, den Falken von seinem Sitz zu packen und scheitert, wird [ROOT.GetCountry.GetRuler.GetSheHe] wie ein Idiot aussehen, aber wenn man den Vogel in Ruhe lässt, schadet das dem Ruf von [ROOT.GetCountry.GetRulerTitle]. \n\nUnsere aktuelle Erfolgschance: #Y [ROOT.GetCountry.MakeScope.GetVariable('dahae_hunt_success_chance').GetValue|0]%[ROOT.GetCountry.GetRuler.GetFirstName]0>  #NT!!
 me_dahae.1309.a: "I will climb up and try to grab the damned thing myself"  #<Ich werde hochklettern und versuchen, mir das verdammte Ding selbst zu schnappen>  #NT!!
 me_dahae.1309.b: "Maybe it'll come back on its own."  #<Vielleicht kommt es von alleine wieder.>  #NT!!
  
 me_dahae.1601.t: "Steppe Falconry - Results"  #<Steppenfalkenjagd - Ergebnisse>  #NT!!
 me_dahae.1601.desc: "The #E Falcon Hunt#! has drawn to its conclusion, and [ROOT.GetCountry.GetRuler.GetName]'s bird managed to capture a great hawk, an animal is sacred to our people! The feisty falcon of the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] somehow killed a bird twice its size and brought its carcass to [ROOT.GetCountry.GetRuler.GetFirstName], sendling ripples of appreciation throughout the gathered host. This hunt will surely be remembered by all."  #<Die #E Falkenjagd#! ist zu Ende gegangen und [ROOT.GetCountry.GetRuler.GetName]s Vogel hat es geschafft, einen großen Falken zu fangen, ein Tier, das unserem Volk heilig ist! Der lebhafte Falke der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] tötete irgendwie einen doppelt so großen Vogel und brachte seinen Kadaver zu [ROOT.GetCountry.GetRuler.GetFirstName], was Wellen der Anerkennung in der versammelten Schar aussandte. Diese Jagd wird sicherlich allen in Erinnerung bleiben.>  #NT!!
 me_dahae.1601.a: "Great Success!"  #<Großer Erfolg!>  #NT!!
 me_dahae.1601.a.t: "The #Y Falcon Hunt#! ends."  #<None>  #NT!!
  
 me_dahae.1602.t: "Steppe Falconry - Results"  #<Steppenfalkenjagd - Ergebnisse>  #NT!!
 me_dahae.1602.desc: "Despite riding through the steppe for hours and sending the falcon out a half-dozen times, [ROOT.GetCountry.GetRuler.GetName] failed in catching any prey. Some of the warband claimed that this lack of success was an evil omen, but the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] dismissed this as idle talk and told everyone that it was time to return to [ROOT.GetCountry.GetCapital.GetName]."  #<Obwohl [ROOT.GetCountry.GetRuler.GetName] stundenlang durch die Steppe ritt und den Falken ein halbes Dutzend Mal ausschickte, gelang es ihm nicht, Beute zu fangen. Einige Mitglieder der Kriegerschar behaupteten, dieser mangelnde Erfolg sei ein böses Omen, aber die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] taten dies als leeres Gerede ab und sagten allen, dass es Zeit sei, zu [ROOT.GetCountry.GetCapital.GetName] zurückzukehren.>  #NT!!
 me_dahae.1602.a: "Oh well... winning was not the priority here."  #<Na ja... Gewinnen war hier nicht die Priorität.>  #NT!!
 me_dahae.1602.a.t: "The #Y Falcon Hunt#! ends."  #<Die #Y Falkenjagd#! endet.>  #NT!!
  
 me_dahae.18.t: "The Steppe Summit - Beginning"  #<Der Steppengipfel – Beginn>  #NT!!
 me_dahae.18.desc: "Now, with hunting complete and diplomatic relations firmly established between [ROOT.GetCountry.GetName] and our neighbors, the time has come to focus on the most important task - convincing everyone that the #E Dahae#! must be a #E Tribal Confederacy#!."  #<Jetzt, da die Jagd abgeschlossen ist und die diplomatischen Beziehungen zwischen [ROOT.GetCountry.GetName] und unseren Nachbarn fest etabliert sind, ist es an der Zeit, sich auf die wichtigste Aufgabe zu konzentrieren – alle davon zu überzeugen, dass die #E Dahae#! eine #E Stammeskonföderation#! sein müssen.>  #NT!!
 me_dahae.18.a: "Send out invitations"  #<Versenden Sie Einladungen>  #NT!!
  
 me_dahae.1800.t: "[dahae_host.GetEmployer.GetName] Diplomatic Summit"  #<[dahae_host.GetEmployer.GetName] Diplomatischer Gipfel>  #NT!!
 me_dahae.1800.desc: "[ROOT.GetCountry.GetRuler.GetName], we received another invitation from our neighbors, who are calling for a diplomatic summit in their capital."  #<[ROOT.GetCountry.GetRuler.GetName], wir haben eine weitere Einladung von unseren Nachbarn erhalten, die zu einem diplomatischen Gipfel in ihrer Hauptstadt aufrufen.>  #NT!!
 me_dahae.1800.a: "Accept"  #<Akzeptieren>  #NT!!
 me_dahae.1800.b: "Decline"  #<Abfall>  #NT!!
  
 me_dahae.19.t: "The Steppe Summit - Responses"  #<Der Steppengipfel – Antworten>  #NT!!
 me_dahae.19.desc: "The emissaries we sent to other tribes have returned to [ROOT.GetCountry.GetCapital.GetName] with important news, and [ROOT.GetCountry.GetRuler.GetName] is eager to see who is willing to meet with our diplomats in order to discuss our shared future."  #<Die Abgesandten, die wir zu anderen Stämmen geschickt haben, sind mit wichtigen Neuigkeiten nach [ROOT.GetCountry.GetCapital.GetName] zurückgekehrt, und [ROOT.GetCountry.GetRuler.GetName] ist gespannt, wer bereit ist, sich mit unseren Diplomaten zu treffen, um unsere gemeinsame Zukunft zu besprechen.>  #NT!!
 me_dahae.19.a: "Let's see who wants in."  #<Mal sehen, wer rein will.>  #NT!!
  
 me_dahae.1901.t: "The Steppe Summit - Failure"  #<Der Steppengipfel – Scheitern>  #NT!!
 me_dahae.1901.desc: "Well, it seems diplomacy failed and no one outside of [ROOT.GetCountry.GetName] wants a united and strong #E Dahae Confederacy#!...so now it is up to [ROOT.GetCountry.GetRuler.GetName] to make sure that this intiative comes to pass."  #<Nun, es scheint, dass die Diplomatie gescheitert ist und niemand außerhalb von [ROOT.GetCountry.GetName] eine geeinte und starke #E Dahae-Konföderation#!...so will. Jetzt liegt es an [ROOT.GetCountry.GetRuler.GetName], dafür zu sorgen, dass diese Initiative zustande kommt.>  #NT!!
 me_dahae.1901.a: "Oh well..."  #<Nun ja...>  #NT!!
 me_dahae.1901.a.tt: "It seems we have to unify # Dahae#! by force."  #<Es scheint, dass wir # Dahae#! mit Gewalt vereinen müssen.>  #NT!!
  
 me_dahae.1902.t: "The Steppe Summit - Discuss Common Training"  #<Der Steppengipfel – Gemeinsames Training besprechen>  #NT!!
 me_dahae.1902.desc: "Now that the gathered hosts have assembled in [ROOT.GetCountry.GetCapital.GetName] to discuss our future together, the first discussion is centered on the issue of whether or not our levies should train together. This will also increase feeling of brotherhood between the tribes, but there are those that believe this is a ploy by [ROOT.GetCountry.GetRuler.GetName] to seize control of the levies for [ROOT.GetCountry.GetRuler.GetHerHim]self."  #<Nachdem sich nun die versammelten Gastgeber in [ROOT.GetCountry.GetCapital.GetName] versammelt haben, um gemeinsam über unsere Zukunft zu diskutieren, dreht sich die erste Diskussion um die Frage, ob unsere Mannschaften gemeinsam trainieren sollten oder nicht. Dies wird auch das Gefühl der Brüderlichkeit zwischen den Stämmen stärken, aber es gibt diejenigen, die glauben, dass dies ein Trick von [ROOT.GetCountry.GetRuler.GetName] ist, um die Kontrolle über die Abgaben für [ROOT.GetCountry.GetRuler.GetHerHim] selbst zu übernehmen.>  #NT!!
 me_dahae.1902.a: "Ask for their acceptance."  #<Bitten Sie um ihre Akzeptanz.>  #NT!!
 me_dahae.1902.att: "We will gently try to persuade everyone."  #<Wir werden behutsam versuchen, jeden zu überzeugen.>  #NT!!
 me_dahae.1902.b: "Expend some effort on this."  #<Geben Sie sich hierfür etwas Mühe.>  #NT!!
 me_dahae.1902.btt: "We will put pressure on them, which will increase chances of acceptance."  #<Wir werden Druck auf sie ausüben, was die Chancen auf Akzeptanz erhöht.>  #NT!!
  
 me_dahae.2000.t: "Discuss Common Training"  #<Besprechen Sie gemeinsames Training>  #NT!!
 me_dahae.2000.desc: "The first order of business is a simple one, but our decision will have important ramifications for the future. Should we agree to common training with the other #E Dahae#! tribes?"  #<Die erste Aufgabe ist einfach, aber unsere Entscheidung wird wichtige Auswirkungen für die Zukunft haben. Sollten wir einer gemeinsamen Ausbildung mit den anderen #E Dahae#! Stämmen zustimmen?>  #NT!!
 me_dahae.2000.a: "I see nothing wrong with this...yes"  #<Daran sehe ich nichts Falsches ... ja>  #NT!!
 me_dahae.2000.b: "We will never agree to such terms!"  #<Wir werden solchen Bedingungen niemals zustimmen!>  #NT!!
  
 me_dahae.20.t: "The Steppe Summit - Training Responses"  #<Der Steppengipfel – Trainingsantworten>  #NT!!
 me_dahae.20.desc: "The gathered assemblies have discussed in private the proposals set forth by [ROOT.GetCountry.GetRuler.GetName], and the time has come to see if our diplomatic efforts will yield any fruits. Depending on how many countries agreed to unified training, [ROOT.GetCountry.GetName] will receive a progressive bonus."  #<Die versammelten Versammlungen haben die von [ROOT.GetCountry.GetRuler.GetName] dargelegten Vorschläge privat diskutiert, und es ist an der Zeit zu sehen, ob unsere diplomatischen Bemühungen Früchte tragen werden. Abhängig davon, wie viele Länder einer einheitlichen Ausbildung zugestimmt haben, erhält [ROOT.GetCountry.GetName] einen progressiven Bonus.>  #NT!!
 me_dahae.20.a: "Let's see how many of our neighbors are wise"  #<Mal sehen, wie viele unserer Nachbarn weise sind>  #NT!!
 me_dahae.20.a.tt1: "[attendee_1.GetName] of [attendee_1.GetCountry.GetName] @[attendee_1.GetCountry.GetFlag]! accepted."  #<[attendee_1.GetName] von [attendee_1.GetCountry.GetName] @[attendee_1.GetCountry.GetFlag]! akzeptiert.>  #NT!!
 me_dahae.20.a.tt2: "[attendee_2.GetName] of [attendee_2.GetCountry.GetName] @[attendee_2.GetCountry.GetFlag]! accepted."  #<[attendee_2.GetName] von [attendee_2.GetCountry.GetName] @[attendee_2.GetCountry.GetFlag]! akzeptiert.>  #NT!!
 me_dahae.20.a.tt3: "[attendee_3.GetName] of [attendee_3.GetCountry.GetName] @[attendee_3.GetCountry.GetFlag]! accepted."  #<[attendee_3.GetName] von [attendee_3.GetCountry.GetName] @[attendee_3.GetCountry.GetFlag]! akzeptiert.>  #NT!!
 me_dahae.20.a.tt4: "[attendee_4.GetName] of [attendee_4.GetCountry.GetName] @[attendee_4.GetCountry.GetFlag]! accepted."  #<[attendee_4.GetName] von [attendee_4.GetCountry.GetName] @[attendee_4.GetCountry.GetFlag]! akzeptiert.>  #NT!!
 me_dahae.20.b: "This was an abject failure, for no one accepted"  #<Dies war ein kläglicher Misserfolg, denn niemand akzeptierte es>  #NT!!
  
 me_dahae.21.t: "The Steppe Summit - Discuss Common Culture"  #<Der Steppengipfel – Gemeinsame Kultur diskutieren>  #NT!!
 me_dahae.21.desc: "Next we need to discuss how much is common between our tribes with hopes of convincing everyone that we're all Dahae first and foremost."  #<Als nächstes müssen wir besprechen, wie viele Gemeinsamkeiten unsere Stämme haben, in der Hoffnung, alle davon zu überzeugen, dass wir in erster Linie alle Dahae sind.>  #NT!!
 me_dahae.21.a: "Ask for their acceptance."  #<Bitten Sie um ihre Akzeptanz.>  #NT!!
 me_dahae.21.att: "We will gently try to persuade everyone."  #<Wir werden behutsam versuchen, jeden zu überzeugen.>  #NT!!
 me_dahae.21.b: "Expend some effort on this."  #<Geben Sie sich hierfür etwas Mühe.>  #NT!!
 me_dahae.21.btt: "We will put pressure, which will increase chances of acceptance."  #<Wir werden Druck ausüben, was die Akzeptanzchancen erhöht.>  #NT!!
  
 me_dahae.2100.t: "Discuss Common Culture"  #<Besprechen Sie die gemeinsame Kultur>  #NT!!
 me_dahae.2100.desc: "The next item on the agenda involves our cultural ties; should we agree that a common #E Dahae#! identity exists?"  #<Der nächste Punkt auf der Tagesordnung betrifft unsere kulturellen Bindungen; Sollten wir uns darauf einigen, dass eine gemeinsame #E Dahae#! Identität existiert?>  #NT!!
 me_dahae.2100.a: "Of course it does!"  #<Natürlich tut es das!>  #NT!!
 me_dahae.2100.b: "We are not the same people; we have differences"  #<Wir sind nicht die gleichen Leute; Wir haben Unterschiede>  #NT!!
  
 me_dahae.22.t: "The Steppe Summit - Common Culture Responses"  #<Der Steppengipfel – Gemeinsame Kulturantworten>  #NT!!
 me_dahae.22.desc: "One by one, the answers from the gathered Chieftains are being reported to [ROOT.GetCountry.GetRuler.GetName]."  #<Die Antworten der versammelten Häuptlinge werden nacheinander an [ROOT.GetCountry.GetRuler.GetName] gemeldet.>  #NT!!
 me_dahae.22.a: "Let's see who wants in on that."  #<Mal sehen, wer da mitmachen will.>  #NT!!
  
 me_dahae.23.t: "The Steppe Summit - Discuss Confederacy"  #<Der Steppengipfel – Konföderation diskutieren>  #NT!!
 me_dahae.23.desc: "After days of careful deliberation and near-endless feasting, the gathered Chieftains stand in front of the final issue, the real reason that they have been summoned to [ROOT.GetCountry.GetCapital.GetName] - should the #E Dahae Confederacy#! be allowed to exist? "  #<Nach Tagen sorgfältiger Überlegungen und nahezu endloser Festlichkeiten stehen die versammelten Häuptlinge vor der letzten Frage, dem wahren Grund, warum sie nach [ROOT.GetCountry.GetCapital.GetName] gerufen wurden – sollte die #E Dahae-Konföderation#! existieren dürfen?>  #NT!!
 me_dahae.23.a: "Ask for their acceptance"  #<Bitten Sie um ihre Akzeptanz>  #NT!!
 me_dahae.23.a.tt: "We will gently try to persuade everyone to follow our lead."  #<Wir werden behutsam versuchen, alle davon zu überzeugen, unserem Beispiel zu folgen.>  #NT!!
 me_dahae.23.b: "Expend some effort on this! It's very important"  #<Geben Sie sich dafür etwas Mühe! Es ist sehr wichtig>  #NT!!
 me_dahae.23.b.tt: "We will put pressure on the Chieftains, which will increase chances of acceptance."  #<Wir werden Druck auf die Häuptlinge ausüben, was die Akzeptanzchancen erhöhen wird.>  #NT!!
  
 me_dahae.2300.t: "Discuss Unification"  #<Besprechen Sie die Vereinigung>  #NT!!
 me_dahae.2300.desc: "We have received an impetuous request from the #E Tribal Council#!, one that will shape the destiny of [ROOT.GetCountry.GetName] for generations to come. Should we agree to become part of #E Dahae Confederacy#! or should we decline the invitation to join forces with our neighbors?"  #<Wir haben vom #E Stammesrat#!, eine ungestüme Anfrage erhalten, die das Schicksal von [ROOT.GetCountry.GetName] für kommende Generationen prägen wird. Sollten wir zustimmen, Teil der #E Dahae-Konföderation#! zu werden, oder sollten wir die Einladung, uns mit unseren Nachbarn zusammenzuschließen, ablehnen?>  #NT!!
 me_dahae.2300.a: "Who are we to stand in the way of history? Yes"  #<Wer sind wir, der Geschichte im Weg zu stehen? Ja>  #NT!!
 me_dahae.2300.a.tt: "#R The game will end for us.#!"  #<#R Das Spiel endet für uns.#!>  #NT!!
 me_dahae.2300.b: "Absolutely not!"  #<Absolut nicht!>  #NT!!
 me_dahae.2300.b.tt: "#R [dahae_host.GetEmployer.GetName] will gain claims on us!#!"  #<#R [dahae_host.GetEmployer.GetName] wird Ansprüche an uns erlangen!#!>  #NT!!
  
 me_dahae.24.t: "The Steppe Summit - Unification Responses"  #<Der Steppengipfel – Antworten zur Vereinigung>  #NT!!
 me_dahae.24.desc: "And with the last issue resolved, the meeting of the #E Dahae Tribes#! is coming to an end. The Elders living in [ROOT.GetCountry.GetCapital.GetName] cannot recall ever witnessing a #E Conference#! like the one that just concluded, and many believe that [ROOT.GetCountry.GetRuler.GetName] has just made [ROOT.GetCountry.GetAdjective] history."  #<Und nachdem das letzte Problem gelöst ist, geht das Treffen der #E Dahae-Stämme#! zu Ende. Die in [ROOT.GetCountry.GetCapital.GetName] lebenden Ältesten können sich nicht erinnern, jemals eine #E-Konferenz#! wie die gerade zu Ende gegangene erlebt zu haben, und viele glauben, dass [ROOT.GetCountry.GetRuler.GetName] gerade [ROOT.GetCountry.GetAdjective]-Geschichte geschrieben hat.>  #NT!!
 me_dahae.24.a: "I am destined to do even greater things..."  #<Ich bin dazu bestimmt, noch Größeres zu tun ...>  #NT!!
 me_dahae.24.a.tt: "Tribes which have accepted will become our #T Tribal Vassals#!.\nWe will gain #R Claims#! on tribes which refused us or didn't partake in the #Y Conference.#!"  #<Stämme, die akzeptiert haben, werden unsere #T Stammesvasallen#!.\nWe und erhalten #R Ansprüche#! auf Stämme, die uns abgelehnt haben oder nicht an der #Y Konferenz teilgenommen haben.#!>  #NT!!
 me_dahae.24.b: "This is a setback, but only a temporary one."  #<Das ist ein Rückschlag, aber nur ein vorübergehender.>  #NT!!
 me_dahae.24.b.tt: "The Conference #R Failed#!; no one agreed. Alas, it seems that we need to convince everyone of our cause via bow and hoof..."  #<Die Konferenz #R ist fehlgeschlagen#!; niemand hat zugestimmt. Leider scheint es so, als müssten wir jeden mit Bogen und Huf von unserer Sache überzeugen ...>  #NT!!
  
 me_dahae.25.t: "Rise of Arsaces"  #<Aufstieg von Arsaces>  #NT!!
 me_dahae.25.desc: "With the unification of the #E Dahae#! tribes being completed, great social changes are also upon us, and [ROOT.GetCountry.GetRuler.GetName] is fully prepared to take advantage of these chaotic times. Our [ROOT.GetCountry.GetRulerTitle], along with [ROOT.GetCountry.GetRuler.GetHerHis] entire family, will take new names, so that they can be etched into annals of history for everyone to remember.\n\nAs the tribesmen of [ROOT.GetCountry.GetName] are acclimating to the many changes thrust upon them, we can also utilize this opportunity to either greatly improve our capital to become a proper camp from which we will rule from, or we can move closer to the settled provinces with hopes of advancing our agenda."  #<Mit der Vollendung der Vereinigung der #E Dahae#!-Stämme stehen auch große soziale Veränderungen vor uns, und [ROOT.GetCountry.GetRuler.GetName] ist bestens darauf vorbereitet, diese chaotischen Zeiten zu nutzen. Unsere [ROOT.GetCountry.GetRulerTitle] und die gesamte Familie [ROOT.GetCountry.GetRuler.GetHerHis] werden neue Namen annehmen, damit sie in die Annalen der Geschichte eingehen können, damit sich jeder daran erinnern kann.\n\nDa sich die Stammesangehörigen von [ROOT.GetCountry.GetName] an die vielen Veränderungen gewöhnen, die ihnen bevorstehen, können wir diese Gelegenheit auch nutzen, um entweder unsere Hauptstadt erheblich zu verbessern, um ein richtiges Lager zu werden, von dem aus wir regieren werden, oder wir können näher an die besiedelten Provinzen heranrücken, in der Hoffnung, unsere Pläne voranzutreiben.>  #NT!!
 me_dahae.25.a: "Let's move the capital closer to our next prey"  #<Bringen wir die Hauptstadt näher an unsere nächste Beute heran>  #NT!!
 me_dahae.25.a.tt: "Parthaunisa will gain #T 3 Citizens#!."  #<Parthaunisa erhält #T 3 Bürger#!.>  #NT!!
 me_dahae.25.b: "Our capital will become a hub to control all."  #<Unsere Hauptstadt wird zu einem Zentrum zur Kontrolle aller werden.>  #NT!!
 me_dahae.25.b.tt: "Our capital will get a #G modifier negating terrain penalty#! for population capacity and granting additional an #G 10% Bonus#! to #Y Population Capacity#!."  #<Unsere Hauptstadt erhält einen Modifikator von #G, der den Geländeabzug#! für die Bevölkerungskapazität aufhebt und zusätzlich einen #G 10 %-Bonus#! bis #Y Bevölkerungskapazität#! gewährt.>  #NT!!
 me_dahae.25.b.tt2: "Our capital will gain #T 3 Citizens#!."  #<Unsere Hauptstadt wird #T 3 Bürger#!. gewinnen>  #NT!!
 me_dahae.27.t: "Investing in Allies"  #<In Verbündete investieren>  #NT!!
 me_dahae.27.desc: "[ROOT.GetCountry.GetRuler.GetName] has proposed the possibility of our engineers building a #E Slave Estate#! jointly with our ally; we will cover only half the cost and share our technical expertise and know-how with our friends, and this act of entrepreneurship and commitment will surely boost our standing among #E Dahae#! tribes."  #<[ROOT.GetCountry.GetRuler.GetName] hat die Möglichkeit vorgeschlagen, dass unsere Ingenieure gemeinsam mit unserem Verbündeten ein #E Sklavenanwesen#! errichten; Wir übernehmen nur die Hälfte der Kosten und teilen unser technisches Fachwissen und Know-how mit unseren Freunden. Dieser Akt des Unternehmertums und Engagements wird unser Ansehen unter den #E Dahae#!-Stämmen sicherlich stärken.>  #NT!!
 me_dahae.27.a: "[dahae_jv1.GetName] will surely be pleased!"  #<[dahae_jv1.GetName] wird sich bestimmt freuen!>  #NT!!
 me_dahae.27.a.tt: "[dahae_jv1.GetName] will get a #T Slave Estate#! in a random province."  #<[dahae_jv1.GetName] erhält ein #T Sklavenanwesen#! in einer zufälligen Provinz.>  #NT!!
  
 me_dahae.100.t: "$dahae_missions_1$"  #<$dahae_missions_1$>  #NT!!
 me_dahae.100.desc: "While our lifestyle may be rough, we are no monsters; while our ambition may be great, it is not uncontrollable.\n\nWhile [ROOT.GetCountry.GetRuler.GetName] may want to unite our neighboring tribes to achieve greater things for all of us, [ROOT.GetCountry.GetRuler.GetSheHe] must first seriously think if the way forward involves shedding the blood of our kinsmen. For all [ROOT.GetCountry.GetRuler.GetFirstName] knows, our neighbors look up at the same stars at night and dream the same dreams that we do; we are not the only ones who wish for a life beyond the saddle and steppe.\n\nStill, the opposite may also be true, and our cousins may not be trustworthy - a thorn in our back where we'd hope to find a helping hand. If this is the case, then [ROOT.GetCountry.GetRuler.GetFirstName] better crush them like lowly mice under [ROOT.GetCountry.GetRuler.GetHerHis] hooves. We must figure out their true intentions before it's much too late."  #<Auch wenn unser Lebensstil hart sein mag, sind wir keine Monster; Obwohl unser Ehrgeiz groß sein mag, ist er nicht unkontrollierbar.\n\nWährend [ROOT.GetCountry.GetRuler.GetName] unsere Nachbarstämme vereinen möchte, um größere Dinge für uns alle zu erreichen, muss [ROOT.GetCountry.GetRuler.GetSheHe] zunächst ernsthaft darüber nachdenken, ob der Weg nach vorne darin besteht, das Blut unserer Verwandten zu vergießen. Soweit [ROOT.GetCountry.GetRuler.GetFirstName] weiß, schauen unsere Nachbarn nachts zu denselben Sternen auf und träumen dieselben Träume wie wir; Wir sind nicht die Einzigen, die sich ein Leben jenseits von Sattel und Steppe wünschen.\n\nDennoch kann auch das Gegenteil der Fall sein, und unsere Cousins ​​sind möglicherweise nicht vertrauenswürdig – ein Dorn im Auge, bei dem wir hoffen würden, eine helfende Hand zu finden. Wenn dies der Fall ist, dann [ROOT.GetCountry.GetRuler.GetFirstName] zerquetsche sie besser wie niedere Mäuse unter [ROOT.GetCountry.GetRuler.GetHerHis] Hufen. Wir müssen ihre wahren Absichten herausfinden, bevor es viel zu spät ist.>  #NT!!
 me_dahae.100.a: "A real dilemma..."  #<Ein echtes Dilemma...>  #NT!!
  
 me_dahae.101.t: "Conquer [c1_scope.GetName]"  #<Erobere [c1_scope.GetName]>  #NT!!
 me_dahae.101.desc: "The aftermath of the battles between our [ROOT.GetCountry.GetAdjective] riders and the pathetic [c1_scope.GetAdjective] pony-men will be remembered in song for generations to come. Although they rallied bravely in hopes of holding on to their freedom, the armies of [ROOT.GetCountry.GetRuler.GetName] smashed into the forces of [c1_scope.GetName|E] and scattered them like ashes in the wind.\n\nSo great was the slaughter that many of the enemy fell dead from the back of their mounts, and it is said that these riderless horses, their eyes wide with terror and their coats flecked with foam, could be seen galloping across the expansive grasslands of the steppe, dragging their saddlebags behind them."  #<Die Nachwirkungen der Kämpfe zwischen unseren [ROOT.GetCountry.GetAdjective]-Reitern und den erbärmlichen [c1_scope.GetAdjective]-Ponymännern werden künftigen Generationen in Liedern in Erinnerung bleiben. Obwohl sie sich tapfer versammelten, in der Hoffnung, ihre Freiheit zu bewahren, schlugen die Armeen von [ROOT.GetCountry.GetRuler.GetName] auf die Streitkräfte von [c1_scope.GetName|E] ein und zerstreuten sie wie Asche im Wind.\n\nDas Gemetzel war so groß, dass viele der Feinde tot vom Rücken ihrer Pferde fielen, und es heißt, dass man diese reiterlosen Pferde mit vor Schrecken weit aufgerissenen Augen und schaumgesprenkeltem Fell über die Weite galoppieren sah Grasland der Steppe, ihre Satteltaschen hinter sich herziehend.>  #NT!!
 me_dahae.101.a: "Those that stand against me will suffer a fate worse than death!"  #<Diejenigen, die sich mir widersetzen, werden ein Schicksal erleiden, das schlimmer ist als der Tod!>  #NT!!
  
 me_dahae.102.t: "Own all [c2_scope.GetAdjective] Lands"  #<Besitze alle [c2_scope.GetAdjective] Länder>  #NT!!
 me_dahae.102.desc: "[c2_scope.GetName] falls to our armies, and a procession of the conquered presents itself before [ROOT.GetCountry.GetRuler.GetName]. The air is filled with the sound of wailing prisoners, and the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] watches them deliver their pleas for mercy with cold disinterest, unimpressed by the pitiful display.\n\nMoments later, there is a loud commotion from the back of the line, and our angry soldiers break up the gathering crowd and drag a prisoner before [ROOT.GetCountry.GetRuler.GetFirstName]. This troublemaker, a man named [SCOPE.sChar('dahae_warrior_scope').GetFirstName], a former soldier in the [c2_scope.GetAdjective] armies, is offering a large sum of gold in exchange for protection for his family.\n\nTruth be told, [ROOT.GetCountry.GetRuler.GetFirstName] could care less about the fate of another group of vanquished people, but the money offered has raised [ROOT.GetCountry.GetRuler.GetHerHis] eyebrow."  #<[c2_scope.GetName] fällt in unsere Armeen, und vor [ROOT.GetCountry.GetRuler.GetName] stellt sich eine Prozession der Besiegten ein. Die Luft ist erfüllt vom Lärm jammernder Gefangener, und die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] sehen zu, wie sie mit kaltem Desinteresse ihre Bitten um Gnade vorbringen, unbeeindruckt von der erbärmlichen Zurschaustellung.\n\nWenige Augenblicke später ertönt ein lauter Tumult am Ende der Reihe, und unsere wütenden Soldaten lösen die sich versammelnde Menge auf und zerren einen Gefangenen vor [ROOT.GetCountry.GetRuler.GetFirstName]. Dieser Unruhestifter, ein Mann namens [SCOPE.sChar('dahae_warrior_scope').GetFirstName], ein ehemaliger Soldat der [c2_scope.GetAdjective]-Armeen, bietet eine große Summe Gold als Gegenleistung für den Schutz seiner Familie an.\n\nUm ehrlich zu sein, [ROOT.GetCountry.GetRuler.GetFirstName] könnte sich das Schicksal einer anderen Gruppe besiegter Menschen weniger interessieren, aber das angebotene Geld hat [ROOT.GetCountry.GetRuler.GetHerHis] Stirnrunzeln hervorgerufen.>  #NT!!
 me_dahae.102.a: "Today is your lucky day, [SCOPE.sChar('dahae_warrior_scope').GetFirstName]..."  #<Heute ist dein Glückstag, [SCOPE.sChar('dahae_warrior_scope').GetFirstName]...>  #NT!!
 me_dahae.102.b: "Show no mercy to the Dahaean dog"  #<Zeige dem Dahaean-Hund keine Gnade>  #NT!!
 me_dahae.102.tt: "The task has been completed!"  #<Die Aufgabe ist erledigt!>  #NT!!
  
 me_dahae.103.t: "$dahae_missions_4$"  #<$dahae_missions_4$>  #NT!!
 me_dahae.103.desc: "As our armies moved through the lands formerly held by the #E [c3_scope.GetName]ns#!, our horses were well-fed and our men were welcomed with a spirit of generosity and open arms - anything that their hearts desired was given to them, with no expectation of reward.\n\nIt seems that not all among the #E Dahae#! tribes are blind to our vision, and the tribesmen of [c3_scope.GetName] seem to acknowledge that only the mighty [ROOT.GetCountry.GetAdjective]s have the necessary means to take them from drinking mare's milk to being fed by the most beautiful servants; perhaps, after our future conquests, we shall reward [c3_scope.GetAdjective]s the most among the other tribes..."  #<Als unsere Armeen durch das Land zogen, das früher den #E [c3_scope.GetName]ns#!, gehörte, waren unsere Pferde wohlgenährt und unsere Männer wurden mit einem Geist der Großzügigkeit und offenen Armen empfangen – alles, was ihr Herz begehrte, wurde ihnen gegeben, ohne eine Belohnung zu erwarten.\n\nEs scheint, dass nicht alle unter den #E Dahae#!-Stämmen blind für unsere Vision sind, und die Stammesangehörigen von [c3_scope.GetName] scheint anzuerkennen, dass nur die mächtigen [ROOT.GetCountry.GetAdjective] über die nötigen Mittel verfügen, um vom Trinken von Stutenmilch zum Füttern durch die schönsten Diener zu gelangen; Vielleicht werden wir nach unseren zukünftigen Eroberungen [c3_scope.GetAdjective]s von den anderen Stämmen am meisten belohnen ...>  #NT!!
 me_dahae.103.a: "We love to see this"  #<Wir lieben es, das zu sehen>  #NT!!
  
 me_dahae.104.t: "$dahae_missions_5$"  #<$dahae_missions_5$>  #NT!!
 me_dahae.104.desc: "The [ROOT.GetCountry.GetAdjective] army trounces its enemies once again. We are faster, more agile, and more organized than our neighbors, despite our larger numbers, and the other [GetCulture('derbiccan').GetName] tribes are no match for us. [ROOT.GetCountry.GetRuler.GetName] is quickly proving [ROOT.GetCountry.GetRuler.GetHerHim]self as the real leader of our confederation, and the ambitions of lesser Chieftains lie in the dirt among the blood and limbs of their most loyal supporters.\n\nOur victories are so impressive that the foreigners of these lands immediately defer to us and adopt our ways, and there are large number of settlers who follow in the footsteps of our armies, confident that our victories will bring them opportunities in the lands that we subdue."  #<Die [ROOT.GetCountry.GetAdjective]-Armee schlägt ihre Feinde erneut nieder. Wir sind trotz unserer größeren Anzahl schneller, agiler und organisierter als unsere Nachbarn, und die anderen [GetCulture('derbiccan').GetName]-Stämme sind uns nicht gewachsen. [ROOT.GetCountry.GetRuler.GetName] erweist sich schnell [ROOT.GetCountry.GetRuler.GetHerHim] als der wahre Anführer unserer Konföderation, und die Ambitionen kleinerer Häuptlinge liegen im Dreck zwischen dem Blut und den Gliedmaßen ihrer treuesten Unterstützer.\n\nUnsere Siege sind so beeindruckend, dass die Ausländer dieser Länder uns sofort nachgeben und unsere Wege übernehmen, und es gibt eine große Anzahl von Siedlern, die in die Fußstapfen unserer Armeen treten, zuversichtlich, dass unsere Siege ihnen Chancen in der Welt bringen werden Länder, die wir unterwerfen.>  #NT!!
 me_dahae.104.a: "Onto the next conquest..."  #<Auf zur nächsten Eroberung...>  #NT!!
  
 me_dahae.105.t: "$dahae_missions_7$"  #<$dahae_missions_7$>  #NT!!
 me_dahae.105.desc: "[ROOT.GetCountry.GetCapital.GetName] these days feels like a trading hub; so many faces shipped off and so many arriving. But we are no trading people, and those leaving are being shipped off and banished, while those arriving are loyalists of the Confederacy which now rules over all [GetCulture('derbiccan').GetName] lands. [SCOPE.sChar('dahae_arbitrator').GetName], the #E Arbitrator#! entrusted with ensuring that our plans were implemented smoothly, seems quite proud of [SCOPE.sChar('dahae_arbitrator').GetHerHis] work.\n\nPolitically, getting our Tribal Council to govern effectively is no easy task, as we have expanded our lands more than thricefold, and the people we rule don't expect to graze on the same pasture too long. Despite the inherent difficulties that come along with managing migratory hordes, we have made great strides in uniting the tribes, and [ROOT.GetCountry.GetRuler.GetFirstName] is pleased with [SCOPE.sChar('dahae_arbitrator').GetFirstName]."  #<[ROOT.GetCountry.GetCapital.GetName] fühlt sich heutzutage wie ein Handelszentrum an; So viele Gesichter wurden verschickt und so viele kamen an. Aber wir sind keine Handelsleute, und diejenigen, die wegziehen, werden verschifft und verbannt, während diejenigen, die ankommen, Loyalisten der Konföderation sind, die jetzt über alle [GetCulture('derbiccan').GetName]-Länder herrscht. [SCOPE.sChar('dahae_arbitrator').GetName], der #E Schiedsrichter#!, der dafür verantwortlich ist, sicherzustellen, dass unsere Pläne reibungslos umgesetzt wurden, scheint ziemlich stolz auf die Arbeit von [SCOPE.sChar('dahae_arbitrator').GetHerHis] zu sein.\n\nPolitisch ist es keine leichte Aufgabe, unseren Stammesrat dazu zu bringen, effektiv zu regieren, da wir unser Land um mehr als das Dreifache erweitert haben und die Menschen, die wir regieren, nicht damit rechnen, allzu lange auf derselben Weide zu grasen. Trotz der inhärenten Schwierigkeiten, die mit der Bewältigung wandernder Horden einhergehen, haben wir große Fortschritte bei der Vereinigung der Stämme gemacht, und [ROOT.GetCountry.GetRuler.GetFirstName] ist mit [SCOPE.sChar('dahae_arbitrator').GetFirstName] zufrieden.>  #NT!!
 me_dahae.105.a: "You have truly outdone yourself this time"  #<Diesmal hast du dich wirklich selbst übertroffen>  #NT!!
  
 me_dahae.106.t: "$dahae_missions_8$"  #<$dahae_missions_8$>  #NT!!
 me_dahae.106.desc: "While the cook is well pleased by the amount of work he has had lately, the astronomical bill for all of [ROOT.GetCountry.GetRuler.GetName]'s feasts would make anyone cry. The egregious amount of dead animals that have had to be hunted for these little feasts has left some places entirely depopulated of life - a remarkable accomplishment.\n\nStill, besides these little details, it seems that [ROOT.GetCountry.GetRuler.GetFirstName] is satisfied, and [ROOT.GetCountry.GetRuler.GetHerHis] peers leave the feast tents not only stumbling, but laughing loudly and singing battle songs. These warriors will spend the rest of the night before a fire, drinking more wine and praising the name of the generous [ROOT.GetCountry.GetRuler.GetFirstName]. Shows of opulence such as this ingrain in our fellow tribesmen's minds that [ROOT.GetCountry.GetName] will able to treat them properly and lead them far."  #<Während der Koch mit der Menge an Arbeit, die er in letzter Zeit hatte, sehr zufrieden ist, würde die astronomische Rechnung für alle Feste von [ROOT.GetCountry.GetRuler.GetName] jeden zum Weinen bringen. Die enorme Menge an toten Tieren, die für diese kleinen Feste gejagt werden mussten, hat dazu geführt, dass einige Orte völlig entvölkert sind – eine bemerkenswerte Leistung.\n\nDennoch, abgesehen von diesen kleinen Details, scheint es, dass [ROOT.GetCountry.GetRuler.GetFirstName] zufrieden ist und [ROOT.GetCountry.GetRuler.GetHerHis] Gleichaltrige die Festzelte nicht nur stolpernd, sondern auch laut lachend und Kampflieder singend verlassen. Diese Krieger werden den Rest der Nacht vor einem Feuer verbringen, noch mehr Wein trinken und den Namen des großzügigen [ROOT.GetCountry.GetRuler.GetFirstName] preisen. Demonstrationen von Opulenz wie diese sind in den Köpfen unserer Stammesgenossen verankert, dass [ROOT.GetCountry.GetName] in der Lage sein wird, sie angemessen zu behandeln und sie weit zu führen.>  #NT!!
 me_dahae.106.a: "We are stepping up"  #<Wir verstärken uns>  #NT!!
  
 me_dahae.107.t: "$dahae_missions_9$"  #<$dahae_missions_9$>  #NT!!
 me_dahae.107.desc: "While it is easy enough to present our kinsmen with alcohol and beautiful dancing girls in order to buy their loyalty, getting the other tribes to trust us completely is a much more delicate process. Convincing our neighbors to change their minds about us is not an easy task, especially when each tribe has plenty of clans, and our chief Arbitrator [SCOPE.sChar('dahae_arbitrator2').GetName] has been working long days and is exhausted by [SCOPE.sChar('dahae_arbitrator2').GetHerHis] efforts, preferring to lie around the tent when not discussing the particulars of the treaties that we are making.\n\nBetween visits from our envoys, the receiving and giving of gifts, and overseeing sacrifices to [GetDeityDefinition('omen_patampasa').GetName], the diplomats of [ROOT.GetCountry.GetName] have been going above and beyond to ensure that a lasting peace settles over the steppes."  #<Während es einfach genug ist, unseren Verwandten Alkohol und schöne Tänzerinnen zu schenken, um ihre Loyalität zu erkaufen, ist es ein viel heiklerer Prozess, die anderen Stämme dazu zu bringen, uns vollkommen zu vertrauen. Unsere Nachbarn davon zu überzeugen, ihre Meinung über uns zu ändern, ist keine leichte Aufgabe, insbesondere wenn jeder Stamm viele Clans hat und unser Hauptschiedsrichter [SCOPE.sChar('dahae_arbitrator2').GetName] lange Tage gearbeitet hat und von [SCOPE.sChar('dahae_arbitrator2').GetHerHis] Anstrengungen erschöpft ist. Er liegt lieber im Zelt herum, wenn er nicht die Einzelheiten der Verträge bespricht, die wir schließen.\n\nZwischen Besuchen unserer Gesandten, dem Empfangen und Überreichen von Geschenken und der Überwachung der Opfergaben [GetDeityDefinition('omen_patampasa').GetName], die Diplomaten von [ROOT.GetCountry.GetName] haben ihr Bestes gegeben, um sicherzustellen, dass in den Steppen ein dauerhafter Frieden herrscht.>  #NT!!
 me_dahae.107.a: "Any price that we have to pay is worth its weight in gold!"  #<Jeder Preis, den wir zahlen müssen, ist Gold wert!>  #NT!!
  
 me_dahae.108.t: "$dahae_missions_14$"  #<$dahae_missions_14$>  #NT!!
 me_dahae.108.desc: "[ROOT.GetCountry.GetRuler.GetName] is now the undisputed master of a vast realm, with many broken tribes submitting to rule from [ROOT.GetCountry.GetCapital.GetName]. Our erstwhile foes now are slaves to our greater projects, all because they refused to accept [ROOT.GetCountry.GetRuler.GetFirstName]'s clemency and now lie prostrated at [ROOT.GetCountry.GetRuler.GetHerHis] feet, begging for mercy. [ROOT.GetCountry.GetRuler.GetFirstName]'s whims are their command, and the tribesmen of the unruly [GetCulture('derbiccan').GetName] clans have, in their rowdiness and ignorance, forfeited their freedom by trying to oppose [ROOT.GetCountry.GetName].\n\n[SCOPE.sChar('dahae_warman').GetName], our incomparable #E Warchief#!, was the one most responsible for restraining the conquered tribes and integrating them into our larger army; a difficult task, and the way it had to be done earned [SCOPE.sChar('dahae_warman').GetHerHim] a rather nasty nickname. Even though the efforts of [SCOPE.sChar('dahae_warman').GetFirstName] have not won [SCOPE.sChar('dahae_warman').GetHerHim] many friends, we must make sure that the anger of these riders is directed at the enemy they're facing, and not at us."  #<[ROOT.GetCountry.GetRuler.GetName] ist jetzt der unbestrittene Herr eines riesigen Reiches, in dem sich viele zerbrochene Stämme der Herrschaft von [ROOT.GetCountry.GetCapital.GetName] unterwerfen. Unsere einstigen Feinde sind jetzt Sklaven unserer größeren Projekte, und das alles nur, weil sie sich geweigert haben, die Gnade von [ROOT.GetCountry.GetRuler.GetFirstName] anzunehmen, und jetzt auf dem Boden von [ROOT.GetCountry.GetRuler.GetHerHis] Fuß liegen und um Gnade betteln. Die Launen von [ROOT.GetCountry.GetRuler.GetFirstName] sind ihr Befehl, und die Stammesangehörigen der widerspenstigen [GetCulture('derbiccan').GetName]-Clans haben in ihrer Rauferei und Unwissenheit ihre Freiheit eingebüßt, indem sie versucht haben, sich [ROOT.GetCountry.GetName] zu widersetzen.\n\n[SCOPE.sChar('dahae_warman').GetName], unser unvergleichlicher #E Kriegshäuptling#!,, war derjenige, der am meisten dafür verantwortlich war, die eroberten Stämme zurückzuhalten und sie in unsere größere Armee zu integrieren; Eine schwierige Aufgabe, und die Art und Weise, wie sie erledigt werden musste, brachte [ROOT.GetCountry.GetCapital.GetName]0 einen ziemlich bösen Spitznamen ein. Auch wenn die Bemühungen von [ROOT.GetCountry.GetCapital.GetName]1 nicht [ROOT.GetCountry.GetCapital.GetName]0 viele Freunde gewonnen haben, müssen wir sicherstellen, dass sich die Wut dieser Fahrer auf den Feind richtet, dem sie gegenüberstehen, und nicht auf uns.>  #NT!!
 me_dahae.108.a: "Embrace the title, [SCOPE.sChar('dahae_warman').GetFirstName] - your name will be remembered for ages to come"  #<Umarmen Sie den Titel, [SCOPE.sChar('dahae_warman').GetFirstName] – Ihr Name wird noch lange in Erinnerung bleiben>  #NT!!
  
 me_dahae.109.t: "$dahae_missions_15$"  #<$dahae_missions_15$>  #NT!!
 me_dahae.109.desc: "Goodwill is not something we are fond of; we are raiders, the scourge of civilization, and we do not want a reputation for showing kindness. Since we have decided to not go around killing our own kinsmen, we have found ourselves having to butter them up - [ROOT.GetCountry.GetRuler.GetName] is reminded of the awkward way an inexperienced lover tries to enchant his new sweetheart.\n\nStill, we managed to find a way to combine what we are good at with what we need to do, and by sponsoring the building of a #E Slave Estate#! in [dahae_jv1.GetName], we have gifted our ally a place where the plundered souls of their conquests will reside. What a happy combination! We ought to try to combine our interests and our objectives more often."  #<Wohlwollen liegt uns nicht am Herzen; Wir sind Räuber, die Geißel der Zivilisation, und wir wollen nicht den Ruf haben, freundlich zu sein. Da wir beschlossen haben, unsere eigenen Verwandten nicht zu töten, mussten wir sie mit Butter bestreichen – [ROOT.GetCountry.GetRuler.GetName] erinnert an die unangenehme Art und Weise, wie ein unerfahrener Liebhaber versucht, seine neue Geliebte zu verzaubern.\n\nDennoch ist es uns gelungen, das, was wir können, mit dem zu verbinden, was wir tun müssen, und indem wir den Bau eines #E Sklavenanwesens#! in [dahae_jv1.GetName] gesponsert haben, haben wir beschenkt Unser Verbündeter ist ein Ort, an dem die geplünderten Seelen ihrer Eroberungen wohnen werden. Was für eine glückliche Kombination! Wir sollten versuchen, unsere Interessen und Ziele öfter zu verbinden.>  #NT!!
 me_dahae.109.a: "I am happy to work together with you, [dahae_jv1.GetRuler.GetName]"  #<Ich freue mich, mit Ihnen zusammenzuarbeiten, [dahae_jv1.GetRuler.GetName]>  #NT!!
  
 me_dahae.110.t: "$dahae_missions_16$"  #<$dahae_missions_16$>  #NT!!
 me_dahae.110.desc: "Like former rivals enjoying a meal together, the [GetCulture('derbiccan').GetName]#E s#! have managed to set aside their petty differences and grievances, and now their horses stand side by side, ready to trample the greatest of empires.\n\nIt is a heartwarming sight to see the bonds of kinship growing between our people; a strong connection forged from adversity that the idlers of civilization could never attain in their comfort."  #<Wie frühere Rivalen, die gemeinsam eine Mahlzeit genossen, haben es die [GetCulture('derbiccan').GetName]#E s#! geschafft, ihre kleinen Differenzen und Beschwerden beiseite zu legen, und jetzt stehen ihre Pferde Seite an Seite, bereit, das größte aller Imperien zu zertrampeln.\n\nEs ist ein herzerwärmender Anblick zu sehen, wie die Bande der Verwandtschaft zwischen unserem Volk wachsen; eine starke Verbindung, die aus Widrigkeiten entstanden ist und die die Müßiggänger der Zivilisation niemals bequem erreichen könnten.>  #NT!!
 me_dahae.110.a: "Onwards we ride!"  #<Weiter geht's!>  #NT!!
  
 # Tasks 
  
 dahae_missions: "Dahae Confederacy"  #<Dahae-Konföderation>  #NT!!
 dahae_missions_DESCRIPTION: "To the east of the [GetProvince('(int32)4571').GetName], there lies a vast yet desolate [GetTerrainType('steppes').GetName] inhabited by people speaking #E East Iranian#! languages. Our realm is difficult to traverse; water is tougher to find than a friendly face, and the endless steppes provide no shelter from the burning heat of the sun. It is thus fitting that the harshness of this environment has produced the proud, resilient #E [ROOT.GetCountry.GetAdjective]#! tribes.\n\nIn the texts of the civilized peoples, it is written that we are born onto the backs of our horses with a bow in hand, and our training stops only when our breaths do - a notion that [ROOT.GetCountry.GetRuler.GetName] has no desire to dispel.\n\nMany living in [ROOT.GetCountry.GetCapital.GetName] believe that, if the steppe tribes could somehow be brought together, they could change the world that was left in the wake of #E Alexander the Great's#! death, and the bold [ROOT.GetCountry.GetRuler.GetFirstName] has sworn that [ROOT.GetCountry.GetRuler.GetSheHe] will see this come to pass."  #<Östlich des [GetProvince('(int32)4571').GetName] liegt ein riesiges, aber trostloses [GetTerrainType('steppes').GetName], das von Menschen bewohnt wird, die #E ostiranische Sprachen#! sprechen. Unser Reich ist schwer zu durchqueren; Wasser ist schwieriger zu finden als ein freundliches Gesicht, und die endlosen Steppen bieten keinen Schutz vor der brennenden Hitze der Sonne. Daher ist es passend, dass die Härte dieser Umgebung die stolzen, widerstandsfähigen Stämme #E [ROOT.GetCountry.GetAdjective]#! hervorgebracht hat.\n\nIn den Texten der zivilisierten Völker steht geschrieben, dass wir mit einem Bogen in der Hand auf dem Rücken unserer Pferde geboren werden und dass unser Training erst aufhört, wenn unser Atem endet – eine Vorstellung, die [ROOT.GetCountry.GetRuler.GetName] nicht zerstreuen möchte.\n\nViele, die in [ROOT.GetCountry.GetCapital.GetName] leben, glauben, dass, Wenn die Steppenstämme irgendwie zusammengebracht werden könnten, könnten sie die Welt verändern, die nach dem Tod von #E Alexander dem Großen#! übrig blieb, und der mutige [GetTerrainType('steppes').GetName]1 hat geschworen, dass [GetTerrainType('steppes').GetName]2 dafür sorgen wird, dass dies geschieht.>  #NT!!
 dahae_missions_CRITERIA_DESCRIPTION: "This mission will be complete when we unify the [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|E] tribes - either by force or diplomacy."  #<Diese Mission wird abgeschlossen sein, wenn wir die [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|E]-Stämme vereinen – entweder durch Gewalt oder Diplomatie.>  #NT!!
 dahae_missions_BUTTON_TOOLTIP: "I will unite the Dahae clans under my banner!"  #<Ich werde die Dahae-Clans unter meinem Banner vereinen!>  #NT!!
 dahae_missions_BUTTON_DETAILS: ""
  
 dahae_missions_1: "Meeting Of The Clans"  #<Treffen der Clans>  #NT!!
 dahae_missions_1_DESC: "Our tribe is made up of many clans who have different ideas on how to approach the goal of #E unification#!. We must meet with them in order to determine our next course of action. \n\n\n\n\n\n\n\n\n\n@persia_mil17!"  #<Unser Stamm besteht aus vielen Clans, die unterschiedliche Vorstellungen davon haben, wie wir das Ziel der #E Vereinigung#!. erreichen können. Wir müssen uns mit ihnen treffen, um unser nächstes Vorgehen festzulegen. \n\n\n\n\n\n\n\n\n\n@persia_mil17!>  #NT!!
 dahae_missions_1.tt: "Be given a choice to determine our approach of #Y Unification#!: #R Force#! or #G Diplomacy#!."  #<Sie haben die Wahl, unseren Ansatz von #Y Vereinigung#!: #R Macht#! oder #G Diplomatie#! zu bestimmen.>  #NT!!
  
 dahae_missions_2: "Conquer [c1_scope.GetName]"  #<Erobere [c1_scope.GetName]>  #NT!!
 dahae_missions_2_DESC: "[c1_scope.GetName|G] must fall in order for us to take our first step towards #Y unification#!. Gather our brave warriors together and let them know that the hour of battle draws nigh!\n\n\n\n\n\n\n\n\n\n@persia_mil18!"  #<[c1_scope.GetName|G] muss fallen, damit wir unseren ersten Schritt in Richtung #Y Vereinigung#!. machen können. Versammle unsere tapferen Krieger und lass sie wissen, dass die Stunde der Schlacht naht!\n\n\n\n\n\n\n\n\n\n@persia_mil18!>  #NT!!
 dahae_missions_2.tt: "Own all [c1_scope.GetAdjective|G] Lands."  #<Besitze alle [c1_scope.GetAdjective|G] Länder.>  #NT!!
  
 dahae_missions_3: "Own All #E [c2_scope.GetAdjective]#! Lands"  #<Besitze alle #E [c2_scope.GetAdjective]#! Länder>  #NT!!
 dahae_missions_3_DESC: "We must to continue our quest of #Y unification#! and subjugate anyone who stands in our path, for this is the will of the gods. The time has come to destroy the haughty warriors of [c2_scope.GetName|G]. \n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<Wir müssen unser Streben nach #Y Vereinigung#! fortsetzen und jeden unterwerfen, der uns im Weg steht, denn das ist der Wille der Götter. Es ist an der Zeit, die hochmütigen Krieger von [c2_scope.GetName|G] zu vernichten. \n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!!
 dahae_missions_3.tt: "Own all [c2_scope.GetAdjective|G] lands."  #<Besitze alle [c2_scope.GetAdjective|G] Länder.>  #NT!!
  
 dahae_missions_4: "Conquer [c3_scope.GetName]"  #<Erobere [c3_scope.GetName]>  #NT!!
 dahae_missions_4_DESC: "As we near the completion of our goal, we still need to show the #E #G [c3_scope.GetName]ns#!#! their place. \n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Da wir uns der Vollendung unseres Ziels nähern, müssen wir den #E #G [c3_scope.GetName]ns#!#! noch ihren Platz zeigen. \n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!!
 dahae_missions_4.tt: "Own all [c3_scope.GetAdjective|G] lands."  #<Besitze alle [c3_scope.GetAdjective|G] Länder.>  #NT!!
  
 dahae_missions_5: "End [c4_scope.GetName]"  #<Ende [c4_scope.GetName]>  #NT!!
 dahae_missions_5_DESC: "The [c4_scope.GetAdjective] tribesmen remain in our way, and they shall not be the ones to stop our unification - the time has come to end them. \n\n\n\n\n\n\n\n\n\n@persia_mil20!"  #<Die [c4_scope.GetAdjective]-Stammesangehörigen stehen uns weiterhin im Weg, und sie werden nicht diejenigen sein, die unsere Vereinigung stoppen – die Zeit ist gekommen, ihnen ein Ende zu setzen. \n\n\n\n\n\n\n\n\n\n@persia_mil20!>  #NT!!
 dahae_missions_5.tt: "Own all [c4_scope.GetAdjective|G] lands."  #<Besitze alle [c4_scope.GetAdjective|G] Länder.>  #NT!!
  
 dahae_missions_6: "Stock Steppe Horses"  #<Stock Steppenpferde>  #NT!!
 dahae_missions_6_DESC: "In order to succeed in our plans, we must ensure we have proper stock of our greatest weapon; #Y Steppe Horses#! @steppe_horses! . \n\n\n\n\n\n\n\n\n\n@persia_mil13!"  #<Um unsere Pläne erfolgreich umzusetzen, müssen wir sicherstellen, dass wir über ausreichende Vorräte unserer größten Waffe verfügen. #Y Steppenpferde#! @steppe_horses! . \n\n\n\n\n\n\n\n\n\n@persia_mil13!>  #NT!!
 dahae_missions_6.att: "Produce at least 2 #Y Steppe Horses @steppe_horses!#! in any owned province."  #<Produziere mindestens 2 #Y Steppenpferde @steppe_horses!#! in einer beliebigen Provinz.>  #NT!!
 dahae_missions_6.btt: "Decide between an #R Offensive#! or #G Defensive#! bonus to your horse units for #Y 10#! years."  #<Entscheiden Sie sich für #Y 10#! Jahre zwischen einem #R Offensiv-#! oder einem #G Defensiv-Bonus#! Bonus auf Ihre Pferdeeinheiten.>  #NT!!
  
 dahae_missions_7: "Stabilize The Tribes"  #<Stabilisieren Sie die Stämme>  #NT!!
 dahae_missions_7_DESC: "With our mission now complete, we need to ensure stability so that our still young #Y Confederacy#! might last. \n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Nachdem unsere Mission nun abgeschlossen ist, müssen wir für Stabilität sorgen, damit unsere noch junge #Y-Konföderation#! bestehen bleibt. \n\n\n\n\n\n\n\n\n\n@persia_mil2!>  #NT!!
  
 dahae_missions_8: "Forge Connections"  #<Knüpfen Sie Verbindungen>  #NT!!
 dahae_missions_8_DESC: "To begin our grand designs on the #E unification#! of the [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|E] people, we must forge connections with our peers. The first impression is important, after all! \n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Um unsere großen Pläne für die #E Vereinigung#! der [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|E] Menschen in Angriff zu nehmen, müssen wir Verbindungen zu unseren Kollegen knüpfen. Der erste Eindruck ist schließlich wichtig! \n\n\n\n\n\n\n\n\n\n@persia_mil11!>  #NT!!
  
 dahae_missions_9: "Befriend Your Peer Tribes"  #<Freunde dich mit deinen Peer-Stämmen an>  #NT!!
 dahae_missions_9_DESC: "Relations between the [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|G] tribes must be as cordial as possible if we wish to achieve our goal of unification. \n\n\n\n\n\n\n\n\n\n@persia_mil19!"  #<Die Beziehungen zwischen den [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|G]-Stämmen müssen so herzlich wie möglich sein, wenn wir unser Ziel der Vereinigung erreichen wollen. \n\n\n\n\n\n\n\n\n\n@persia_mil19!>  #NT!!
  
 dahae_missions_10: "Defend Dahae Lands"  #<Verteidigt die Dahae-Länder>  #NT!!
 dahae_missions_10_DESC: "In order to become the leader of the proud #E Dahae#!, we must prove our strength and commitment by defending other tribes. \n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Um der Anführer der stolzen #E Dahae#!, zu werden, müssen wir unsere Stärke und unser Engagement durch die Verteidigung anderer Stämme unter Beweis stellen. \n\n\n\n\n\n\n\n\n\n@persia_mil12!>  #NT!!
 dahae_missions_10.tt: "#R We will bait one tribe in the region to attack one of our innocent brotherly Dahae tribes#! - and we may defend them."  #<#R Wir werden einen Stamm in der Region dazu anlocken, einen unserer unschuldigen brüderlichen Dahae-Stämme anzugreifen#! – und wir können sie verteidigen.>  #NT!!
  
 dahae_missions_11: "Steppe Falconry"  #<Steppenfalkerei>  #NT!!
 dahae_missions_11_DESC: "Networking can go a long way towards getting everyone to share our point of view - so, why not organise #Y Falconry Hunt#!.\n\n\n\n\n\n\n\n\n\n@celt_mil1!"  #<Networking kann einen großen Beitrag dazu leisten, alle dazu zu bringen, unseren Standpunkt zu teilen – warum also nicht die #Y Falconry Hunt#!.\n\n\n\n\n\n\n\n\n\n@celt_mil1! organisieren?>  #NT!!
 dahae_missions_11.tt: "We will start a #Y Falconry Hunt#!, to which we will invite other [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|G] tribal leaders.\nThis will boost our relations and standing with other tribal leaders and if we win the hunt, we may get additional rewards."  #<Wir werden eine #Y Falknereijagd#!, starten, zu der wir andere [SCOPE.GetRootScope.GetCountry.GetRuler.GetCulture.GetName|G] Stammesführer einladen.\nDies wird unsere Beziehungen und unser Ansehen mit anderen Stammesführern stärken und wenn wir die Jagd gewinnen, erhalten wir möglicherweise zusätzliche Belohnungen.>  #NT!!
  
 dahae_missions_12: "The Steppe Summit"  #<Der Steppengipfel>  #NT!!
 dahae_missions_12_DESC: "With diplomacy set on all fronts, the only thing left to do is gather other leaders to hear our proposition for the future.\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Da die Diplomatie an allen Fronten eingesetzt wird, bleibt uns nur noch, andere Staats- und Regierungschefs zu versammeln, um unseren Vorschlag für die Zukunft anzuhören.\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!!
 dahae_missions_12.tt1: "We need to have at least 5 #G Dahae Hegemony #!(Currently: #Y [root_scope.MakeScope.GetVariable('dahae_hegemony').GetValue|0]#!)"  #<Wir müssen mindestens 5 #G Dahae-Hegemonie #!(Currently: #Y [root_scope.MakeScope.GetVariable('dahae_hegemony').GetValue|0]#!) haben>  #NT!!
 dahae_missions_12.tt2: "We will start a meeting, in which we will try to convince other tribes to agree to form the #G Dahae Confederation#!.\n\nTheir acceptance chance is based on their opinion of us and whether rulers are friends.\n#E All tribes must agree#!, otherwise the Conference will fail and we will have to #R conquer#! them."  #<Wir werden ein Treffen beginnen, bei dem wir versuchen werden, andere Stämme davon zu überzeugen, der Bildung der #G Dahae-Konföderation#!.\n\nTheir zuzustimmen. Die Chance auf eine Aufnahme hängt von ihrer Meinung über uns ab und davon, ob die Herrscher Freunde sind.\n#E Alle Stämme müssen zustimmen#!, andernfalls wird die Konferenz scheitern und wir müssen sie #R erobern#!.>  #NT!!
  
 dahae_missions_13: "Dahae Confederacy"  #<Dahae-Konföderation>  #NT!!
 dahae_missions_13_DESC: "At long last, the armies of [ROOT.GetCountry.GetName|G] have done the once-thought-impossible task of unifying the mighty #G Dahae#! tribes. All hail [ROOT.GetCountry.GetRuler.GetName|Y], the powerful [ROOT.GetCountry.GetRulerTitle] that has crushed all that stand opposed to the [ROOT.GetCountry.GetAdjective|G]!\n\n\n\n\n\n\n\n\n\n@persia_mil21!"  #<Endlich haben die Armeen von [ROOT.GetCountry.GetName|G] die einst für unmöglich gehaltene Aufgabe erfüllt, die mächtigen #G Dahae#!-Stämme zu vereinen. Alle begrüßen [ROOT.GetCountry.GetRuler.GetName|Y], den mächtigen [ROOT.GetCountry.GetRulerTitle], der alle vernichtet hat, die sich den [ROOT.GetCountry.GetAdjective|G] widersetzen!\n\n\n\n\n\n\n\n\n\n@persia_mil21!>  #NT!!
 dahae_missions_13.tt: "We have formed the #G Dahae Confederacy.#!"  #<Wir haben die #G Dahae-Konföderation gegründet.#!>  #NT!!
 dahae_missions_13.tt1: "We need to have at least 10 #G Dahae Hegemony #!(Currently: #Y [root_scope.MakeScope.GetVariable('dahae_hegemony').GetValue|0]#!)"  #<Wir müssen mindestens 10 #G Dahae-Hegemonie #!(Currently: #Y [root_scope.MakeScope.GetVariable('dahae_hegemony').GetValue|0]#!) haben>  #NT!!
 dahae_missions_13.tt2: "Our Chief's family, the #G [root_scope.GetRuler.GetFamily.GetName] Clan#!, will henceforth be known as the #BOLD;COLOR:{0.6,0.13,0.98} Arsakid Dynasty#!.\nWe will gain a permament modifier to our capital and be given the choice to relocate it."  #<Die Familie unseres Häuptlings, der #G [root_scope.GetRuler.GetFamily.GetName] Clan#!,, wird von nun an als #BOLD;COLOR:{0.6,0.13,0.98} Arsakid Dynasty#!.\nWe bekannt sein, wird einen permanenten Modifikator für unsere Hauptstadt erhalten und die Möglichkeit haben, sie zu verlegen.>  #NT!!
  
 dahae_missions_14: "Exploit The Conquered"  #<Nutze die Eroberten aus>  #NT!!
 dahae_missions_14_DESC: "Woe to the conquered! They shall supply manpower for our future endeavours. \n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Wehe den Besiegten! Sie werden Arbeitskräfte für unsere zukünftigen Unternehmungen bereitstellen. \n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!!
 dahae_missions_14.tt: "All territories held formerly by other #G Dahae#! tribes will get a modifier [GetModifier('dahae_squeezed_ter').GetName|Y], which will give those territories [GetModifier('dahae_squeezed_ter').GetDesc] for #Y 10 Years#!."  #<Alle Gebiete, die zuvor von anderen #G Dahae#!-Stämmen gehalten wurden, erhalten einen Modifikator [GetModifier('dahae_squeezed_ter').GetName|Y], der diesen Gebieten [GetModifier('dahae_squeezed_ter').GetDesc] für #Y 10 Jahre#! verleiht.>  #NT!!
  
 dahae_missions_15: "Common Investments"  #<Gemeinsame Investitionen>  #NT!!
 dahae_missions_15_DESC: "It may be worthwile to sponsor a [GetBuilding('latifundia_building').GetName|Y] in an allied tribe as a show of friendship, in which we will cover half the cost. \n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Es kann sich lohnen, als Zeichen der Freundschaft eine [GetBuilding('latifundia_building').GetName|Y] in einem verbündeten Stamm zu sponsern, wobei wir die Hälfte der Kosten übernehmen. \n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!!
 dahae_missions_15.tt: "We took the decision to make a joint venture with one other Dahae tribe."  #<Wir beschlossen, ein Joint Venture mit einem anderen Dahae-Stamm zu gründen.>  #NT!!
  
 dahae_missions_16: "Dahae Equality"  #<Dahae-Gleichheit>  #NT!!
 dahae_missions_16_DESC: "All #E Dahae#! are united through means of #G diplomacy#! - a fact that will certainly please all under our new borders! \n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Alle #E Dahae#! sind durch #G Diplomatie#! vereint – eine Tatsache, die sicherlich allen unter unseren neuen Grenzen gefallen wird! \n\n\n\n\n\n\n\n\n\n@persia_mil1!>  #NT!!
  
  
  
 # Treasures, Decisions Etc. 
  
