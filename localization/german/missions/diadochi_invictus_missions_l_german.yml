  satrapy_of_thrace_release:0 "Thrakien wird als Satrapie unter der Herrschaft von [candidate.GetName] entlassen."
  administrating_empire_tt:0 "Wir werden wählen, wie wir unser Imperium verwalten."
  restoring_persepolis_tt:0 "Wir werden mit dem Bau eines Wunders in #Y [GetProvince('(int32)4799').GetOwner.GetName]#! beginnen"
  own_all_alexandrias_tt:0 "Besitzt alle Städte, die von #Y [GetCharacter('(int32)39').GetName]#! gegründet wurden. (#R [SCOPE.ScriptValue('owned_alexandrias_svalue')|0]#!/#Y 27#!)"
  silver_shelds_t: "Wir erhalten eine Legion von #Y 40 Schwerer Elite-Infanterie @heavy_infantry!#!, #TF die Silberschilde#!, mit Gepäckzug, wenn wir ein Gesetz erlassen haben, das die Aufstellung von Legionen ermöglicht." 
  silver_shields_tt: "#R 40 Einheiten schwerer Elite-Infanterie #!@heavy_infantry!#! mit Gepäckzug stehen uns in der Region unserer Hauptstadt zur Verfügung." 
 alx_ic_war: "Wenn unser Herrscher entweder über die Eigenschaft #Y $argeads$#! oder #Y $lunatic$#! oder #R Kriegkunst 10 @military_icon!#! verfügt und wir "Imperiale Herausforderungs"-Kriege erklären können, erhalten wir die Option, stattdessen #BOLD;COLOR:{0.86,0.21,0.8} imperiale Herausforderungskriege gegen alle mit ihrer Hauptstadt im hervorgehobenen Bereich zu erklären#!, für zusätzliche politische Einflusskosten" 
  
  # Modifiers 
  thrace_satrapy:0 "Thrakische Satrapie"
  thrace_satrapy_desc:0 "Wir vertrauen darauf, dass die Thraker sich an ihre Gelübde erinnern und uns unterstützen, wenn die unvermeidliche Zeit kommt."
  thrace_satrapy_neg:0 "Thrakische Satrapie"
  thrace_satrapy_neg_desc:0 "Wir haben beschlossen, die Thraker in unserer Nähe zu halten."
