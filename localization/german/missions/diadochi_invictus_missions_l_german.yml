  local_nobility_administration:0 "Lokaler Adel"
  local_nobility_administration_desc:0 "Der lokale Adel, der immer daran interessiert ist, seine eigenen Privilegien zu wahren, regiert effektiv in unserem Namen."
  metics_administration:0 "Metökische Administratoren"
  metics_administration_desc:0 "Wir haben uns entschieden, uns bei der Verwaltung unserer Bürokratie auf Metöken zu verlassen."
  emporos_focused_administration:0 "Emporos Steuereintreiber"
  emporos_focused_administration_desc:0 "Wir haben Steuereintreiber beauftragt, in unserem Namen zu verwalten."
