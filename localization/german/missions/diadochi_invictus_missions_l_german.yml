  diadochi_invictus_1:0 "Thrakien im Imperium"
  diadochi_invictus_1_DESC:0 "Wir müssen Entscheidungen bezüglich #E Thrace# treffen!; Wir müssen entscheiden, was wir mit den ehemaligen Herrschaftsgebieten von Lysimachos tun. Diese wichtige Region, die lebenswichtige Verbindung zwischen Europa und Asien, verdient unsere größte Aufmerksamkeit."
  diadochi_invictus_2:0 "Verwaltung eines Imperiums"
  diadochi_invictus_2_DESC:0 "Die enorme Größe unseres Reiches erfordert, dass wir Vertreter ermächtigen, in unserem Namen zu handeln, aber die Frage bleibt; Wer ist am besten geeignet, ein Instrument der [ROOT.GetCountry.GetAdjective] Autorität zu sein?"
  diadochi_invictus_3:0 "Wiederherstellung von Persepolis"
  diadochi_invictus_3_DESC:0 "Das Verbrennen von #E Persepolis#! nach einer betrunkenen Bestellung von Alexandros ist ein Makel für unseren Ruf, aber vielleicht können wir endlich etwas dagegen tun."
  diadochi_invictus_4:0 "Auf den Spuren von Alexandros"
  diadochi_invictus_4_DESC:0 "Es stimmt zwar, dass wir die von Alexandros errichteten Grenzen wieder zusammengesetzt haben, aber es gibt immer noch unerledigte Geschäfte, um die wir uns kümmern müssen; Besitz jedes #Y Alexandria#! vom Eroberer gebaut."
  diadochi_invictus_5:0 "Alexandros in Anatolien"
  diadochi_invictus_5_DESC:0 "Es ist wahr, dass Alexandros eine Vision für #E Alexandreia Issos#! hatte, aber er lebte nicht lange genug, um zu sehen, wie sie verwirklicht wurde. Lasst uns in die Fußstapfen der Makedonier treten und die Siedlung zu ihrem wahren Potenzial aufbauen."
  diadochi_invictus_6:0 "Alexandros in Ägypten"
  diadochi_invictus_6_DESC:0 "Es ist an der Zeit, die größte Stadt der Mittelmeerwelt zu erweitern - [GetProvince('(int32)516').GetName]. Wir werden sogar Alexandros mit dem übertreffen, was wir uns vorstellen ..."
  diadochi_invictus_7:0 "Alexandros in Persien"
  diadochi_invictus_7_DESC:0 "Alexandros gründete viele Städte in den ehemaligen Ländern der Achämeniden, und jetzt sind wir an der Reihe, das zu verbessern, was er begonnen hat."
  diadochi_invictus_8:0 "Alexandros in Arachosia"
  diadochi_invictus_8_DESC:0 "Wir können es uns nicht leisten, die trockene, staubige Region Arachosia zu vernachlässigen, sondern müssen die Orte aufbauen, die Alexandros für würdig erachtete."
  diadochi_invictus_9:0 "Alexandros in Baktrien"
  diadochi_invictus_9_DESC:0 "Die Städte der Baktrier, so wohlhabend und stark sie auch sind, könnten verbessert werden – ein Beweis für unsere Fähigkeiten."
  diadochi_invictus_10:0 "Alexandros in Indien"
  diadochi_invictus_10_DESC:0 "Wir folgen den Spuren von Alexandros bis nach #E India#! - Lasst uns sein und unser Vermächtnis in diesen Ländern sichern."
  diadochi_invictus_11:0 "Alexandros in Babylon"
  diadochi_invictus_11_DESC:0 "Wir müssen unsere Aufmerksamkeit auf das am Fluss Tigris gegründete Alexandreia richten und unsere Position im Land Mesopotamien sichern."
  diadochi_invictus_12:0 "Die königliche Schatzkammer von [GetProvince('(int32)946').GetName]"
  diadochi_invictus_12_DESC:0 "Die Schätze der antiken Stadt, die einst als #E Susa# bekannt war! hat Alexandros in seiner Stunde der Not gute Dienste geleistet, aber für uns ist die Zeit gekommen, die Schulden der Vergangenheit zurückzuzahlen."
  diadochi_invictus_13:0 "Alexanders Schatzkammer-Festung in [GetProvince('(int32)7968').GetName]"
  diadochi_invictus_13_DESC:0 "Die Festung von [GetProvince('(int32)7968').GetName] war eine der größten Schatzkammern Alexanders mit vielen Diadochen, die sich an ihren unermesslichen Reichtümern bedienten. Wir sollten die Zitadelle befestigen, um weiteren Diebstahl zu verhindern."
   diadochi_invictus_14: "Alexanders Reich"   #NT!
 diadochi_invictus_14_DESC: "Now with internal opposition settled, we can turn our attention outwards and collect all lands that are rightfully ours, as we continue Basileus Alexander's work."  ##<Nachdem der interne Widerstand nun beigelegt ist, können wir unsere Aufmerksamkeit nach außen richten und alle Ländereien einsammeln, die rechtmäßig uns gehören, während wir die Arbeit von Basileus Alexander fortsetzen.#>  #NT!
 diadochi_invictus_14.t: "We own all lands of Alexander's former Empire."  ##<Wir besitzen alle Ländereien von Alexanders ehemaligem Reich.#>  #NT!
 diadochi_invictus_15: "Synoecism"  ##<Synözismus#>  #NT!
 diadochi_invictus_15_DESC: "One of Alexander's goals - as tradition says - was to achieve Synoecism - merging of smaller settlements. As such, it's only fitting that with the Empire reunited we will focus on urbanization and accomodation of our people, with hope that one day all will be one."  #<Eines von Alexanders Zielen war – wie die Überlieferung sagt – die Verwirklichung des Synözismus – der Zusammenlegung kleinerer Siedlungen. Daher ist es nur passend, dass wir uns nach der Wiedervereinigung des Imperiums auf die Urbanisierung und Unterbringung unseres Volkes konzentrieren, in der Hoffnung, dass eines Tages alle eins sein werden.#>  #NT!
 diadochi_invictus_15.t1: "All our owned cities in Alexander's Empire have at least 20 population and a Great Temple and a Grand Theater."  #<Alle unsere Städte im Alexanderreich haben mindestens 20 Einwohner und einen Großen Tempel und ein Großes Theater.#>  #NT!
 diadochi_invictus_15.t2: "Every city will get #Y $alx_melting_pot$#! for 20 years: Assimilation speed #Y +1#!, Assimilation speed modifier #Y +20%#!, Local migration attraction #Y +5#!."  #<Jede Stadt erhält 20 Jahre lang #Y $alx_melting_pot$#!: Assimilationsgeschwindigkeit #Y +1#!, Assimilationsgeschwindigkeitsmodifikator #Y +20 %#!, lokale Migrationsanziehung #Y +5#!.#>  #NT!
 diadochi_invictus_16: "Indian supply lines"  #<Indische Versorgungsleitungen#>  #NT!
 diadochi_invictus_16_DESC: "Before we move any deeper to India, we must acknowledge difficulty in logistics for this enterprise stemming from Hindu Kush mountains. As such, we need to placate and civilize inhabitants of Indus river valley."  #<Bevor wir tiefer nach Indien vordringen, müssen wir die logistischen Schwierigkeiten für dieses Unternehmen aus dem Hindukusch-Gebirge anerkennen. Daher müssen wir die Bewohner des Industals besänftigen und zivilisieren.#>  #NT!
 diadochi_invictus_16.t1: "We fully own Indus river valley and have there at least 5 cities with at least 40 population and a: Great Temple, Grand Theater and 3 Training Camps."  #<Wir besitzen das gesamte Indus-Flusstal und haben dort mindestens 5 Städte mit mindestens 40 Einwohnern sowie einen Großen Tempel, ein Großes Theater und 3 Trainingslager.#>  #NT!
 diadochi_invictus_16.t2: "All our territories in Indus river valley will get #Y 10% #!civilization value, #G -1 unrest #!and #G 15% food production #! for 10 years."  #<Alle unsere Gebiete im Industal erhalten #Y 10 % #!civilization Wert, #G -1 Unruhe #!and #G 15 % Nahrungsmittelproduktion #! für 10 Jahre.#>  #NT!
 diadochi_invictus_17: "Return to India"  #<Rückkehr nach Indien#>  #NT!
 diadochi_invictus_17_DESC: "Now with our armies ready, we have nothing to do but to march further into the unknown and exotic land of India and fulfill what Alexander so longed for, but was stopped only by weakness of his men."  #<Jetzt, da unsere Armeen bereit sind, bleibt uns nichts anderes übrig, als weiter in das unbekannte und exotische Land Indien zu marschieren und das zu erfüllen, was Alexander sich so sehr gewünscht hat, was aber nur durch die Schwäche seiner Männer aufgehalten wurde.#>  #NT!
 diadochi_invictus_17.t1: "We have stationed at least 3 armies of at least 40 units in Indus river valley."  #<Wir haben mindestens 3 Armeen mit mindestens 40 Einheiten im Indus-Flusstal stationiert.#>  #NT!
 diadochi_invictus_17.t2: "We'll get claims on all areas bordering us in India."  #<Wir erhalten Ansprüche auf alle an uns angrenzenden Gebiete in Indien.#>  #NT!
 diadochi_invictus_18: "Northern push"  #<Nördlicher Vorstoß#>  #NT!
 diadochi_invictus_18_DESC: "Caucasus region was an integral part of Achaemenid Empire, but was not subjugated by Alexander since he had set out for more lucrative priorities on the Great Campaign. Now, with his inheritance secured in our hands, it only follows that we will complete his will of absorbing all former Persian lands."  #<Die Kaukasusregion war ein integraler Bestandteil des Achämenidenreichs, wurde jedoch nicht von Alexander unterworfen, da er sich im Großen Feldzug lukrativere Prioritäten gesetzt hatte. Jetzt, da sein Erbe in unseren Händen liegt, können wir nur daraus schließen, dass wir seinen Willen, alle ehemaligen persischen Länder zu übernehmen, erfüllen werden.#>  #NT!
 diadochi_invictus_18.tt: "We'll get claims on #Y Cappadocia Pontica, Armenia, Colchis, Albania and Assyria#! regions that right by conquest dictates should be ours."  #<Wir erhalten Ansprüche auf #Y Kappadokien, Pontika, Armenien, Kolchis, Albanien und Assyrien#! Gebiete, die uns aufgrund der Eroberungsdiktate zustehen sollten.#>  #NT!
 diadochi_invictus_19: "Euxine Greeks"  #<Euxine-Griechen#>  #NT!
 diadochi_invictus_19_DESC: "Since we're now in position to pursue our Pan-Hellenic project, we cannot leave our brethren in the far north behind."  #<Da wir nun in der Lage sind, unser panhellenisches Projekt fortzusetzen, können wir unsere Brüder im hohen Norden nicht zurücklassen.#>  #NT!
 diadochi_invictus_19.tt: "We'll get claims on all areas on Pontus Euxinus's coastline."  #<Wir werden Ansprüche auf alle Gebiete an der Küste von Pontus Euxinus erheben.#>  #NT!
 diadochi_invictus_20: "Mediterranean preparations"  #<Mediterrane Zubereitungen#>  #NT!
 diadochi_invictus_20_DESC: "Greeks were everpresent on the shores of the Great Sea. We must thus make preparations to absorb them, fulfill Alexander's wishes of conquest of Mediterranean and surpass even the great Persians, who had to abstain from expansion in this direction many years ago."  #<Griechen waren an den Ufern des Großen Meeres allgegenwärtig. Wir müssen daher Vorbereitungen treffen, um sie zu absorbieren, Alexanders Wunsch nach Eroberung des Mittelmeerraums zu erfüllen und sogar die großen Perser zu übertreffen, die vor vielen Jahren auf eine Expansion in diese Richtung verzichten mussten.#>  #NT!
 diadochi_invictus_21: "African campaign"  #<Afrikanische Kampagne#>  #NT!
 diadochi_invictus_21_DESC: "Let us sail forth and continue the work of Achaemenids and Alexander in the Mediterranean."  #<Lasst uns weitersegeln und die Arbeit der Achämeniden und Alexanders im Mittelmeer fortsetzen.#>  #NT!
 diadochi_invictus_21.t1: "We need to station at least 3 armies of 40 units in preparation for going west in the regions of Cyrenaica or Greece."  #<Wir müssen mindestens drei Armeen mit je 40 Einheiten stationieren, um uns auf den Vormarsch nach Westen in den Regionen Cyrenaica oder Griechenland vorzubereiten.#>  #NT!
 diadochi_invictus_21.t2: "We'll get claims on Carthage and both sides of the Gibraltar strait."  #<Wir werden Ansprüche auf Karthago und beide Seiten der Meerenge von Gibraltar erheben.#>  #NT!
 diadochi_invictus_22: "European campaign"  #<Europäische Kampagne#>  #NT!
 diadochi_invictus_22_DESC: "Sicily is a rich tradehub. It only follows it should be ours, and going from there it is only fitting to go further to curb some Italian upstarts."  #<Sizilien ist ein reiches Handelszentrum. Daraus folgt nur, dass es uns gehören sollte, und von da an ist es nur angebracht, noch weiter zu gehen, um einige italienische Emporkömmlinge einzudämmen.#>  #NT!
 diadochi_invictus_22.t1: "We need to station at least 3 armies of 40 units in preparation for going west in the regions of Macedonia or Greece."  #<Wir müssen mindestens drei Armeen mit je 40 Einheiten stationieren, um uns auf den Vormarsch nach Westen in den Regionen Mazedonien oder Griechenland vorzubereiten.#>  #NT!
 diadochi_invictus_22.t2: "We'll get claims on Sicily, Rome and every territory in Europe which has Greek dominant culture."  #<Wir erhalten Ansprüche auf Sizilien, Rom und jedes Gebiet in Europa, in dem die griechische Kultur vorherrscht.#>  #NT!
 diadochi_invictus_23: "Arabian campaign"  #<Arabischer Feldzug#>  #NT!
 diadochi_invictus_23_DESC: "Alexander sadly died before he could achieve all his plans. It said that he left for Olympus just before invasion of Arabia could be launched, so in honor of his memory we will conclude this businness."  #<Alexander starb leider, bevor er alle seine Pläne verwirklichen konnte. Es hieß, er sei kurz vor der Invasion Arabiens zum Olymp aufgebrochen, daher werden wir zu Ehren seines Andenkens diese Angelegenheit abschließen.#>  #NT!
 diadochi_invictus_23.t1: "We need to station at least 20 ships in Hormuz and have prepared at least 20 land units in both Hormuz and Alexandreia Sousias."  #<Wir müssen mindestens 20 Schiffe in Hormuz stationieren und haben mindestens 20 Landeinheiten sowohl in Hormuz als auch in Alexandreia Sousias vorbereitet.#>  #NT!
 diadochi_invictus_23.t2: "We'll get claims on Arabian peninsula's coast facing the Persian Gulf."  #<Wir werden Ansprüche auf die Küste der Arabischen Halbinsel gegenüber dem Persischen Golf erheben.#>  #NT!

  # Events 
  me_diadochi_empire_events.300.t:0 "Satrapie von Thrakien"
  me_diadochi_empire_events.300.desc:0 "Nun, da wir endlich Frieden in die unruhige Region #E Thrace# gebracht haben! - eine Leistung, die Lysimachos für immer beschämen sollte, der es nicht schaffte, die odrysischen Stämme zu züchtigen, die ständig damit drohten, ihn zu stürzen -, müssen wir Entscheidungen für die langfristige Zukunft dieser wichtigen Provinz treffen. \n \nEs wurde uns vorgeschlagen, einen Kandidaten, [SCOPE.sCharacter('candidate').GetName], als unseren Satrapen einzusetzen. Es gibt viele Leumundszeugen, die persönlich für die moralische Stellung von [SCOPE.sCharacter('candidate').GetFirstName] bürgen können, aber die letzte Wahl bleibt bei [ROOT.GetCountry.GetRuler.GetName]."
  me_diadochi_empire_events.300.a:0 "Eine #E Satrapie von Thrakien#! wird unsere Interessen hier am besten wahren"
  me_diadochi_empire_events.300.b:0 "Es ist besser für uns, alle direkt zu regieren"
  me_diadochi_empire_events.301.t:0 "Verwaltung eines Imperiums"
  me_diadochi_empire_events.301.desc:0 ""
  me_diadochi_empire_events.301.a:0 "Nur ernannte Beamte sorgen dafür, dass alles funktioniert."
  me_diadochi_empire_events.301.b:0 "Nur die Fähigen werden ins Amt gelassen."
  me_diadochi_empire_events.301.c:0 "Der Lebensstand wird durch die Geburt bestimmt."
  me_diadochi_empire_events.302.t:0 "Verwaltung eines Imperiums"
  me_diadochi_empire_events.302.desc:0 ""
  me_diadochi_empire_events.302.a:0 "Eine zentralisierte Bürokratie ist das, was wir brauchen."
  me_diadochi_empire_events.302.att: "[SCOPE.GetRootScope.GetCountry.GetName|Y] will gain #Y $appointed_bureaucracy$#!, #Y $meritocratic_bureaucracy$ #!, or #Y $noble_bureaucracy$ #!."  #<[SCOPE.GetRootScope.GetCountry.GetName|Y] erhält #Y $appointed_bureaucracy$#!, #Y $meritocratic_bureaucracy$ #!, oder #Y $noble_bureaucracy$ #!.#>  #NT!
 me_diadochi_empire_events.302.att1: "#Y $appointed_bureaucracy$#! grants #G 10% monthly political influence#! and #G 15% reduction of governors' wages#! at the cost of #R reduced provincial loyalty (by -0.05 monthly)#!."  #<#Y $appointed_bureaucracy$#! Zuschüsse #G 10 % monatlicher politischer Einfluss#! und #G 15 % Reduzierung der Gouverneursgehälter#! auf Kosten von #R verringerter Provinztreue (um -0,05 monatlich)#!.#>  #NT!
 me_diadochi_empire_events.302.att2: "#Y $meritocratic_bureaucracy$ #!grants #G 0.06 monthly state loyalty#! and #G 5% pop happiness#! at the cost of #R -10% monthly tax income#!. "  #<#Y $meritocratic_bureaucracy$ #!grants #G 0,06 monatliche Staatstreue#! und #G 5 % Pop-Glück#! zum Preis von #R -10 % monatlichem Steuereinkommen#!.#>  #NT!
 me_diadochi_empire_events.302.att3: "#Y $noble_bureaucracy$#! grants #G 0.03 monthly stability#! and #G 8% Noble pop happiness#! at the cost of #R increasing governors' wages by 20%#!."  #<#Y $noble_bureaucracy$#! gewährt #G 0,03 monatliche Stabilität#! und #G 8 % Noble-Pop-Glück#! auf Kosten von #R einer Erhöhung der Gehälter der Gouverneure um 20 %#!.#>  #NT!
  me_diadochi_empire_events.302.b:0 "Die lokale Verwaltung ist am stabilsten."
  me_diadochi_empire_events.302.btt: "[SCOPE.GetRootScope.GetCountry.GetName|Y] will gain #Y $local_nobility_administration$#!, #Y $metics_administration$ #!, or #Y $emporos_focused_administration$ #!."  #<[SCOPE.GetRootScope.GetCountry.GetName|Y] erhält #Y $local_nobility_administration$#!, #Y $metics_administration$ #!, oder #Y $emporos_focused_administration$ #!.#>  #NT!
 me_diadochi_empire_events.302.btt1: "#Y $local_nobility_administration$ #!grants #G 8% unintegrated culture group happiness#! and #G 12% national manpower#! at the cost of #R -20% Noble pop output#!."  #<#Y $local_nobility_administration$ #!grants #G 8 % Zufriedenheit nicht integrierter Kulturgruppen#! und #G 12 % nationale Arbeitskräfte#! auf Kosten von #R -20 % Noble-Pop-Produktion#!.#>  #NT!
 me_diadochi_empire_events.302.btt2: "#Y $metics_administration$ #!grants #G 10% Citizen pop output#! and #G 10% Freeman pop output#! at the cost of #R 0.05 monthly corruption#!."  #<#Y $metics_administration$ #!grants #G 10 % Citizen-Pop-Produktion#! und #G 10 % Freeman-Pop-Produktion#! zum Preis von #R 0,05 monatlicher Korruption#!.#>  #NT!
 me_diadochi_empire_events.302.btt3: "#Y $emporos_focused_administration$ #!grants #G 15% commerce income#! and #G additional 1 trade route for every province#! at the cost of #R 25% increase in characters' wages#!."  #<#Y $emporos_focused_administration$ #!grants #G 15 % Handelseinkommen#! und #G zusätzlich 1 Handelsroute für jede Provinz#! zum Preis von #R 25 % höhere Löhne der Charaktere#!.#>  #NT!

  me_diadochi_empire_events.303.t:0 "Verwaltung eines Imperiums"
  me_diadochi_empire_events.303.desc:0 "Obwohl [ROOT.GetCountry.GetRuler.GetName] die endgültige Entscheidung schon seit einiger Zeit aufschiebt, weiß jeder, dass das [ROOT.GetCountry.GetRulerTitle] eine Wahl treffen muss, denn der Status quo ist unhaltbar und unsere Verwaltung der Provinzen beginnt bereits zu leiden. \n \nWir haben einige Optionen, von denen jede Vor- und Nachteile hat, und obwohl es eine nicht beneidenswerte Position ist, in der sich [ROOT.GetCountry.GetRuler.GetFirstName] befindet, müssen wir entscheiden, wer die täglichen Angelegenheiten auf lokaler Ebene im [ROOT.GetCountry.GetName] verwaltet."
  me_diadochi_empire_events.303.a:0 "Der örtliche Adel hat es im Griff."
  me_diadochi_empire_events.303.b:0 "Die Metics sind nützliche Administratoren."
  me_diadochi_empire_events.303.c:0 "Die Emporen sind unsere Zukunft."
  me_diadochi_empire_events.304.t:0 "Die Wiederherstellung von Persepolis"
  me_diadochi_empire_events.304.desc:0 "[ROOT.GetCountry.GetRuler.GetName] mag es nicht, an die beschämende Episode erinnert zu werden, in der #E Persepolis#! angezündet, denn das [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] war bei dem Symposium anwesend, das schreckliche Folgen für die antike Stadt haben würde. \n \nAnstatt über die Fehler der Vergangenheit nachzudenken, hat [ROOT.GetCountry.GetRuler.GetFirstName] geschworen, die Stadt in einen makellosen Zustand zu versetzen, und befohlen, ein Monument zu errichten, das alles übertreffen wird, was jemals zuvor in der Region gesehen wurde."
  me_diadochi_empire_events.304.a:0 "Ich werde verschönern, was Alexandros zu zerstören versuchte ..."
  me_diadochi_empire_events.305.t:0 "Persepolis restauriert"
  me_diadochi_empire_events.305.desc:0 "Endlich gibt es Neuigkeiten zu [ROOT.GetCountry.GetRuler.GetName] diesem #E Persepolis#! wurde endlich wieder aufgebaut. Unsere [ROOT.GetCountry.GetAdjective] Architekten haben sich wirklich selbst übertroffen, denn noch nie wurde weltweit ein solches Denkmal errichtet. \n \nObwohl die Geschäfte in [ROOT.GetCountry.GetCapital.GetName] [ROOT.GetCountry.GetRuler.GetFirstName] daran hindern, persönlich an den Zeremonien und Festen teilzunehmen, die die Wiederherstellung begleiten werden, ist [ROOT.GetCountry.GetRuler.GetSheHe] zufrieden zu wissen, dass die Sünden der Vergangenheit gesühnt wurden."
  me_diadochi_empire_events.305.a:0 "Möge dieses Denkmal die Schande dessen, was hier einst geschah, auslöschen"
  me_diadochi_empire_events.306.t:0 "Die vielen Alexandrien"
  me_diadochi_empire_events.306.desc:0 "Ein Eitelkeitsprojekt von [ROOT.GetCountry.GetRuler.GetName] ist endlich abgeschlossen, berichten unsere Militärberater. \n \nObwohl wir die klaren Erben des Imperiums von #E Alexandros#! sind, war der Mazedonier dafür bekannt, praktisch überall Städte zu bauen, die nach ihm benannt wurden, um Kultur und Zivilisation zu verbreiten. Unsere triumphalen [ROOT.GetCountry.GetAdjective] Kräfte haben endlich jedes #Y Alexandria# beansprucht! gegründet von unserem ehemaligen Meister, und jetzt sind sie ein Teil des [ROOT.GetCountry.GetName]."
  me_diadochi_empire_events.306.a:0 "Das ist keine Kleinigkeit, die ich, [ROOT.GetCountry.GetRuler.GetFirstName], erreicht habe"
  me_diadochi_empire_events.307.t:0 "Alexandros' Weg durch Anatolien"
  me_diadochi_empire_events.307.desc:0 "[GetProvince('(int32)795').GetName] ist eine inspirierte Wahl für eine [ROOT.GetCountry.GetAdjective] Stadt, und [ROOT.GetCountry.GetRuler.GetName] kann die Beweggründe hinter Alexandros' Entscheidung, ein #E Alexandria# zu gründen, klar erkennen! Hier. \n \nDie strategische Lage des Standorts dient mehreren Zwecken; Sein natürlicher Hafen ist nicht nur ein wichtiger Knotenpunkt in unserem Flottennetzwerk, sondern verschafft uns auch die Kontrolle über die nahe gelegenen #E Syrian Gates#! und ermöglicht uns den Zugang zu den Ebenen im Osten. Wir haben gute Arbeit geleistet, indem wir unsere Präsenz in der Region ausgebaut haben."
  me_diadochi_empire_events.307.a:0 "Ich werde immer im besten Interesse des Staates handeln"
  me_diadochi_empire_events.308.t:0 "Alexandros Reise in Ägypten"
  me_diadochi_empire_events.308.desc:0 "Die vielleicht größte Errungenschaft, die Alexandros jemals als Stadtgründer vollbracht hat, ist das unvergleichliche [GetProvince('(int32)516').GetName], die größte Stadt des Mittelmeers, aber der große General wurde von [ROOT.GetCountry.GetRuler.GetName] besiegt, der die Stadt zu bisher ungeahnten Höhen erhoben hat. \n \nIn einem Zeichen großer Demut, als sich die lokalen Adligen mit dem Angebot an [ROOT.GetCountry.GetRuler.GetFirstName] wandten, die Metropole in #E [ROOT.GetCountry.GetRuler.GetFirstName]opolis# umzubenennen! als zeichen dessen, was erreicht worden war, lachte das [ROOT.GetCountry.GetRulerTitle] über diesen vorschlag und dankte den [ROOT.GetCountry.GetRuler.GetHerHis] bürgern für ihre freundlichkeit, während sie die ehre ablehnten."
  me_diadochi_empire_events.308.a:0 "Lassen wir erstmal alles beim Alten, aber danke"
  me_diadochi_empire_events.309.t:0 "Alexandros' Aufenthalt in Babylon"
  me_diadochi_empire_events.309.desc:0 "Die Erinnerungen an die plündernden mazedonischen Armeen, die die #E Achämeniden# zerstörten! Autorität in#E Mesopotamien#! ist nicht so weit entfernt, dass die Einheimischen die von den Eindringlingen begangenen Verbrechen vergessen haben, aber heute hat [ROOT.GetCountry.GetRuler.GetName] alles getan, was [ROOT.GetCountry.GetRuler.GetSheHe] in der Region tun kann, um zu versuchen, das Verlorene wiederherzustellen. \n \nDurch den Aufbau von Land im Norden sowie an der Mündung des #E-Flusses Tigris#! hofft das [ROOT.GetCountry.GetRulerTitle], dass die neuen wirtschaftlichen Möglichkeiten dazu beitragen werden, die Last der gelittenen Menschen zu verringern."
  me_diadochi_empire_events.309.a:0 "Ich kann deine Vergangenheit nicht ändern, aber lass mich deiner Zukunft helfen"
  me_diadochi_empire_events.310.t:0 "Die königliche Schatzkammer von [GetProvince('(int32)946').GetName]"
  me_diadochi_empire_events.310.desc:0 "[ROOT.GetCountry.GetRuler.GetName] verpasst keine Gelegenheit, [ROOT.GetCountry.GetRuler.GetHerHim]sich auf Kosten von [ROOT.GetCountry.GetRuler.GetHerHis] Rivalen zu loben, insbesondere der anderen #E Diadochi#!, daher gab es viel Aufhebens um die Restaurierung der königlichen Schatzkammer bei [GetProvince('(int32)946').GetName], die ebenfalls von den Launen von [ROOT.GetCountry.GetAdjective] heimgesucht wurde viele Eindringlinge, unter ihnen Alexandros und in jüngerer Zeit Antigonos. \n \nJetzt, wo die Schatzkammer wieder aufgebaut wurde, mit einer prächtigen neuen Marmorfassade, die [ROOT.GetCountry.GetRuler.GetFirstName] Autorität projiziert, kann jeder sehen, warum prahlt - das Gebäude ist spektakulär."
  me_diadochi_empire_events.310.a:0 "Andere bringen Elend, aber ich stelle wieder her und heile"
  me_diadochi_empire_events.311.t:0 "Alexandros' Reisen durch Persien"
  me_diadochi_empire_events.311.desc:0 "Während Alexandros viele Städte in den Ländern von #E Persia#! gründete, gebührt der Verdienst, sie zu dem gemacht zu haben, was sie heute sind, ausschließlich [ROOT.GetCountry.GetRuler.GetName]. Wenn nicht für die persönliche Aufmerksamkeit des [ROOT.GetCountry.GetRulerTitle], dann die ehemaligen Herrschaftsgebiete der #E Achämeniden#! wäre am Weinstock verdorrt, aber jetzt haben wir fünf weitere Städte, die erweitert wurden und ihre Mission als Leuchttürme der [ROOT.GetCountry.GetAdjective]-Kultur erfüllen."
  me_diadochi_empire_events.311.a:0 "Es ist meine Pflicht, diese Arbeit fertigzustellen"
  me_diadochi_empire_events.312.t:0 "In Alexandros' Schritten durch Arachosia"
  me_diadochi_empire_events.312.desc:0 "Es gibt viele Gründe, warum Alexandros Städte und Festungen in den Ländern errichtete, die er bereiste; sicherlich, um die mazedonische Zivilisation in barbarische Regionen zu bringen, aber auch, um seine Kontrolle über umkämpfte Gebiete auszudehnen, die rebellieren könnten, sobald die mazedonischen Armeen am Horizont waren. \n \nIn der Erkenntnis, dass ein schwieriges Land zu schwierigen Problemen führen kann, wenn es nicht mit Sorgfalt behandelt wird, hat [ROOT.GetCountry.GetRuler.GetName] die Entscheidung getroffen, in die Provinzen von #E Arachosia#! zu investieren und zu versuchen, ein raues Land mit staubigen Hügeln und grausamer Wüste zu zähmen."
  me_diadochi_empire_events.312.a:0 "Und auf jeden Fall ist es mir gelungen"
  me_diadochi_empire_events.313.t:0 "An den Rand der Welt"
  me_diadochi_empire_events.313.desc:0 "Obwohl [ROOT.GetCountry.GetRuler.GetName] darüber informiert wurde, dass die Bauinitiativen, die in ganz #E Baktrien#! sind endlich fertig, das [ROOT.GetCountry.GetRulerTitle] scheint über die Neuigkeiten nicht erfreut zu sein. Auf die Frage von engen Vertrauten, warum [ROOT.GetCountry.GetRuler.GetSheHe] beunruhigt wirkt, ist die Antwort verblüffend in ihrer Offenheit. \n \n„Warst du jemals in Baktrien? Ich habe ... es ist ein wunderschönes Land, eines, das mit den Gaben der Natur gesegnet ist, aber dies ist eine Kraftquelle, die von den Bösewichten ausgenutzt werden könnte. Die Leute dort sind herzliche, rebellische Typen, und wenn sie erst einmal Fuß gefasst haben, versuchen sie vielleicht, sich selbst zu regieren; Es ist, als ob ein Stück des umstrittenen #E Hellas#! mit all seinen ehrgeizigen Männern, die nach Ruhm streben, an den Rand der bekannten Welt gestellt worden wäre.'"
  me_diadochi_empire_events.313.a:0 "Wir sollten Baktrien im Auge behalten, damit sie nicht zu mächtig wird"
  me_diadochi_empire_events.314.t:0 "Jenseits der Hydaspes"
  me_diadochi_empire_events.314.desc:0 "Es gibt nicht viele Einwohner von [ROOT.GetCountry.GetCapital.GetName], die es jemals in die Städte schaffen, die sich wie eine Liste imaginärer Orte lesen, so groß ist die Entfernung von der [ROOT.GetCountry.GetAdjective]-Hauptstadt. Obwohl nicht viele Leute von Orten wie #E Sodal# gehört haben! oder #E Manikyal#!, sie wissen sicher, dass [ROOT.GetCountry.GetRuler.GetName] das Leben von [ROOT.GetCountry.GetRuler.GetHerHis] Landsleuten verbessert, sowohl denen, die in der Nähe der Machtzentren leben, als auch denen, die in den fernen Städten jenseits der Hydaspes leben."
  me_diadochi_empire_events.314.a:0 "Es ist wahr, dass unser Imperium riesig ist ..."

   me_diadochi_empire_events.316.t: "Indian Campaign"  #<Indische Kampagne#>  #NT!
 me_diadochi_empire_events.316.desc: "It is time to complete Alexander's task in India, fulfillment of which was sadly taken away from him by his weak-willed troops and soon thereafter his death. We can either classically conquer and destroy our enemies, or do without nuance and greet everyone there with our armies."  #<Es ist an der Zeit, Alexanders Aufgabe in Indien zu erfüllen, deren Erfüllung ihm leider durch seine willensschwachen Truppen und kurz darauf durch seinen Tod verwehrt wurde. Wir können entweder klassisch unsere Feinde erobern und vernichten, oder auf Nuancen verzichten und alle dort mit unseren Armeen begrüßen.#>  #NT!
 me_diadochi_empire_events.316.a: "Let's conquer everyone methodically."  #<Lasst uns jeden methodisch erobern.#>  #NT!
 me_diadochi_empire_events.316.b: "No need for half-measures."  #<Keine Notwendigkeit für halbe Sachen.#>  #NT!
 me_diadochi_empire_events.316.bt: "#COLOR:{0.86,0.21,0.8} We'll declare Imperial Challenge war on everyone in the Indian subcontinent.#!"  #<#COLOR:{0.86,0.21,0.8} Wir werden allen auf dem indischen Subkontinent den Imperial Challenge-Krieg erklären.#!>  #NT!
  
 me_diadochi_empire_events.318.t: "African Campaign"  #<Afrikanische Kampagne#>  #NT!
 me_diadochi_empire_events.318.desc: "We need to decide how to handle the task of conquering African coast - whether we will one by one conquer our enemies, or conquer everyone as we march forward."  #<Wir müssen entscheiden, wie wir mit der Aufgabe, die afrikanische Küste zu erobern, umgehen wollen – ob wir einen nach dem anderen unsere Feinde besiegen oder jeden auf unserem Vormarsch besiegen.#>  #NT!
 me_diadochi_empire_events.318.a: "Steady wins the race"  #<Steady gewinnt das Rennen#>  #NT!
 me_diadochi_empire_events.318.b: "Let us greet everyone with spears"  #<Begrüßen wir alle mit Speeren#>  #NT!
 me_diadochi_empire_events.318.tt: "#COLOR:{0.86,0.21,0.8} We'll declare Imperial Challenge war on everyone in Africa.#!"  #<#COLOR:{0.86,0.21,0.8} Wir werden allen in Afrika den Imperial Challenge-Krieg erklären.#!#>  #NT!
  
 me_diadochi_empire_events.319.t: "European Campaign"  #<Europäische Kampagne#>  #NT!
 me_diadochi_empire_events.319.desc: "We need to decide between methodical conquest of European coast, or we can just march in."  #<Wir müssen uns zwischen einer methodischen Eroberung der europäischen Küste oder einem einfachen Einmarsch entscheiden.#>  #NT!
 me_diadochi_empire_events.319.a: "Steady wins the race"  #<Steady gewinnt das Rennen#>  #NT!
 me_diadochi_empire_events.319.at: "We'll get claims on Sicily, Rome and every territory in Europe which has Greek culture majority."  #<Wir erhalten Ansprüche auf Sizilien, Rom und jedes Gebiet in Europa, in dem die griechische Kultur mehrheitlich vertreten ist.#>  #NT!
 me_diadochi_empire_events.319.b: "Let us greet everyone with spears"  #<Begrüßen wir alle mit Speeren#>  #NT!
 me_diadochi_empire_events.319.bt: "#COLOR:{0.86,0.21,0.8} We'll declare Imperial Challenge war on everyone on European Mediterranean coast.#!"  #<#COLOR:{0.86,0.21,0.8} Wir werden allen an der europäischen Mittelmeerküste den Krieg mit der Imperial Challenge erklären.#!#>  #NT!
  
 me_diadochi_empire_events.320.t: "Arabian Campaign"  #<Arabische Kampagne#>  #NT!
 me_diadochi_empire_events.320.desc: "Let us fulfill perhaps the closest task on Alexander's list, be it only by securing Persian Gulf coastline or total pacification of Arabia."  #<Lassen Sie uns vielleicht die nächste Aufgabe auf Alexanders Liste erfüllen, sei es nur durch die Sicherung der Küste des Persischen Golfs oder durch die vollständige Befriedung Arabiens.#>  #NT!
 me_diadochi_empire_events.320.a: "Coastline is sufficient."  #<Küstenlinie ist ausreichend.#>  #NT!
 me_diadochi_empire_events.320.at: "We'll get claims on all areas facing towards the Persian Gulf."  #<Wir erhalten Ansprüche auf alle Gebiete, die zum Persischen Golf hin liegen.#>  #NT!
 me_diadochi_empire_events.320.b: "We'll never be truly safe until all of Arabia is Greek."  #<Wir werden nie wirklich sicher sein, bis ganz Arabien griechisch ist.#>  #NT!
 me_diadochi_empire_events.320.bt: "#COLOR:{0.86,0.21,0.8} We'll declare Imperial Challenge war on everyone in Arabia.#!"  #<#COLOR:{0.86,0.21,0.8} Wir werden allen in Arabien den Imperial Challenge-Krieg erklären.#!#>  #NT!
  
 diadochi_flavor.200.t: "One true heir of Alexander"  #<Ein wahrer Erbe Alexanders#>  #NT!
 diadochi_flavor.200.desc: "Now with the Empire reunited under our leadership, we can stay known under our contemporary name. Or we can proclaim a new name, to invoke a closer association to Alexander's dream of one Hellenistic monarchy, ruling over all."  #<Da das Imperium nun unter unserer Führung wieder vereint ist, können wir unter unserem heutigen Namen bekannt bleiben. Oder wir können einen neuen Namen proklamieren, um eine engere Verbindung zu Alexanders Traum von einer hellenistischen Monarchie herzustellen, die über alles herrscht.#>  #NT!
 diadochi_flavor.200.a: "Yes please!"  #<Ja, bitte!#>  #NT!
 diadochi_flavor.200.b: "We cannot abandon our roots."  #<Wir können unsere Wurzeln nicht aufgeben.#>  #NT!
 hel_empire_tooltip: "We'll get claims on all lands of Alexander's erstwhile empire."  #<Wir erhalten Ansprüche auf alle Ländereien von Alexanders ehemaligem Reich.#>  #NT!
  
  # unused atm 
  me_diadochi_empire_events.315.t:0 "Die königliche Schatzkammer von [GetProvince('(int32)7968').GetName]"
  me_diadochi_empire_events.315.desc:0 "In [GetProvince('(int32)7968').GetName] wurde ein großer Teil der Beute von Alexanders Feldzug gelagert, und viele Diadochen bedienten sich dort, um ihre Verfolgungen zu finanzieren, wie Eumenes, der 500 Talente nahm - weit entfernt von dem antigoniden Überläufer, der 10 000 stahl! Jetzt haben wir diese wichtige Festung gesichert und niemand wird in der Lage sein, sich das zu nehmen, was uns zusteht."
  me_diadochi_empire_events.315.a:0 "Jetzt ist es sicher vor allen Bedrohungen."
