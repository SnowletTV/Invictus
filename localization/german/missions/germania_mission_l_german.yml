l_german:
  
 germania_mission: "The Rise Of Germania"  #<Der Aufstieg Germaniens>  #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 germania_mission_DESCRIPTION: "Emerging like a hungry wolf from the dark and wild woodlands of the wind-blasted north, our [ROOT.GetCountry.GetAdjective] ancestors devoured their neighbors and forced their leaders to submit to us on their knees. Our victorious warriors dragged the defeated from the burning ashes of their settlements before sending them to the slave pens of [ROOT.GetCountry.GetCapital.GetName], and after years of many successful conquests, we earned a fearsome reputation as destroyers of men.\n\nIn a world filled with possibilities, the ambitious [ROOT.GetCountry.GetRuler.GetName], [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName], has vowed to surpass the legendary deeds of our predecessors."  #<Wie ein hungriger Wolf tauchten unsere [ROOT.GetCountry.GetAdjective]-Vorfahren aus den dunklen und wilden Wäldern des windgepeitschten Nordens auf, verschlangen ihre Nachbarn und zwangen ihre Anführer, sich uns auf den Knien zu unterwerfen. Unsere siegreichen Krieger zogen die Besiegten aus der brennenden Asche ihrer Siedlungen, bevor sie sie in die Sklavenpferche von [ROOT.GetCountry.GetCapital.GetName] schickten, und nach Jahren vieler erfolgreicher Eroberungen erlangten wir einen furchterregenden Ruf als Zerstörer der Menschen.\n\nIn einer Welt voller Möglichkeiten haben die ehrgeizigen [ROOT.GetCountry.GetRuler.GetName], [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName] geschworen, die legendären Taten unserer Vorgänger zu übertreffen.>  #NT!
 germania_mission_CRITERIA_DESCRIPTION: "This mission will be complete when [ROOT.GetCountry.GetName] has formed #E Germania#!."  #<Diese Mission ist abgeschlossen, wenn [ROOT.GetCountry.GetName] #E Germania#!. gegründet hat>  #NT!
 germania_mission_BUTTON_TOOLTIP: "May the same spirit that brought our people to this moment lead them to even greater victories!"  #<Möge derselbe Geist, der unser Volk zu diesem Moment geführt hat, es zu noch größeren Siegen führen!>  #NT!
 germania_mission_BUTTON_DETAILS: ""
  
 #Mission Tasks 
  
 germania_conquest_mission_start: "Raiding Our Enemies"  #<Unsere Feinde überfallen>  #NT!
 germania_conquest_mission_start_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] has led many raiding parties into the lands of our enemies over the course of [ROOT.GetCountry.GetRuler.GetHerHis] lifetime and has vowed to do so until [ROOT.GetCountry.GetRuler.GetSheHe] can no longer hold a spear in [ROOT.GetCountry.GetRuler.GetHerHis] hands.\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] hat im Laufe von [ROOT.GetCountry.GetRuler.GetHerHis] Leben viele Raubzüge in die Länder unserer Feinde geführt und hat geschworen, dies zu tun, bis [ROOT.GetCountry.GetRuler.GetSheHe] keinen Speer mehr in [ROOT.GetCountry.GetRuler.GetHerHis] Händen halten kann.\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!>  #NT!
 germania_conquest_mission_start_tt: "Our Ruler must use the #T Go Raiding#! Character Interaction."  #<Unser Herrscher muss die Charakterinteraktion #T Go Raiding#! verwenden.>  #NT!
  
 germania_conquest_mission_1_1: "Enslave Them All!"  #<Versklaven Sie sie alle!>  #NT!
 germania_conquest_mission_1_1_DESC: "There is no reason that we should show mercy to our enemies! We will burn their villages, slaughter their menfolk and cast their women and children into slave pens!\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!"  #<Es gibt keinen Grund, warum wir unseren Feinden Gnade erweisen sollten! Wir werden ihre Dörfer niederbrennen, ihre Männer abschlachten und ihre Frauen und Kinder in Sklavenpferche werfen!\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!>  #NT!
  
 germania_conquest_mission_1_2: "Conquering The Coastlines"  #<Die Küsten erobern>  #NT!
 germania_conquest_mission_1_2_DESC: "Our armies bring us success at land and sea, and our borders grow to encompass many new settlements and territories. In order to strengthen the [ROOT.GetCountry.GetAdjective] navy and encourage foreign ships to visit our markets, [ROOT.GetCountry.GetRuler.GetName|Y] has called for the construction of ports along our coasts.\n\n\n\n\n\n\n\n\n\n\n@greek_mil6!"  #<Unsere Armeen bescheren uns Erfolge zu Lande und zu Wasser, und unsere Grenzen wachsen und umfassen viele neue Siedlungen und Gebiete. Um die [ROOT.GetCountry.GetAdjective]-Marine zu stärken und ausländische Schiffe zu ermutigen, unsere Märkte zu besuchen, hat [ROOT.GetCountry.GetRuler.GetName|Y] den Bau von Häfen entlang unserer Küsten gefordert.\n\n\n\n\n\n\n\n\n\n\n@greek_mil6!>  #NT!
 germanic_ports_tt: "We need to own at least #Y 10#! #T Ports#!. (#R [SCOPE.ScriptValue('germanic_ports_current')|0]#!/#Y 10#!)"  #<Wir müssen mindestens #Y 10#! #T Ports#! besitzen. (#R [SCOPE.ScriptValue('germanic_ports_current')|0]#!/#Y 10#!)>  #NT!
  
 germania_conquest_mission_2_1: "A Question Of Honor"  #<Eine Frage der Ehre>  #NT!
 germania_conquest_mission_2_1_DESC: "Some of our kinsmen are insinuating that [ROOT.GetCountry.GetRuler.GetName|Y] has lived a pampered life over the last few years, spending [ROOT.GetCountry.GetRuler.GetHerHis] time issuing orders and decrees from [ROOT.GetCountry.GetCapital.GetName|G] instead of fighting alongside our soldiers like a real [ROOT.GetCountry.GetAdjective] warrior.\n\nIn order to silence these naysayers and prove that [ROOT.GetCountry.GetRuler.GetSheHe] has not grown soft, [ROOT.GetCountry.GetRuler.GetFirstName|Y] has vowed to duel a rival in personal combat.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!"  #<Einige unserer Verwandten unterstellen, dass [ROOT.GetCountry.GetRuler.GetName|Y] in den letzten Jahren ein verwöhntes Leben geführt hat und [ROOT.GetCountry.GetRuler.GetHerHis] Zeit damit verbracht hat, Befehle und Dekrete von [ROOT.GetCountry.GetCapital.GetName|G] zu erteilen, anstatt wie ein echter [ROOT.GetCountry.GetAdjective]-Krieger an der Seite unserer Soldaten zu kämpfen.\n\nUm diese Neinsager zum Schweigen zu bringen und zu beweisen, dass [ROOT.GetCountry.GetRuler.GetSheHe] nicht weich geworden ist, hat [ROOT.GetCountry.GetRuler.GetFirstName|Y] geschworen, sich mit einem Rivalen zu duellieren persönlicher Kampf.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!>  #NT!
  
 germania_conquest_mission_2_2: "Borrowing The Belgae"  #<Die Belgae ausleihen>  #NT!
 germania_conquest_mission_2_2_DESC: "Our navies are plundering the coasts of the #T Belgae#! tribes far to the west, and many slaves have been seized by the victorious raiders of [ROOT.GetCountry.GetRuler.GetName|Y], who has sworn an oath to the gods that [ROOT.GetCountry.GetRuler.GetSheHe] shall humiliate these savages.\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!"  #<Unsere Flotten plündern die Küsten der #T Belgae#!-Stämme weit im Westen, und viele Sklaven wurden von den siegreichen Räubern von [ROOT.GetCountry.GetRuler.GetName|Y] gefangen genommen, der den Göttern einen Eid geschworen hat, dass [ROOT.GetCountry.GetRuler.GetSheHe] diese Wilden demütigen wird.\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!>  #NT!
  
 germania_conquest_mission_3_1: "Professional Pirates"  #<Professionelle Piraten>  #NT!
 germania_conquest_mission_3_1_DESC: "Arguing that there is no reason that our raiders should be limited to plundering on the land, the fierce warrior [ROOT.GetCountry.GetRuler.GetName|Y] has given our armies permission to construct #R Pirate Havens#! wherever we please.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!"  #<Der wilde Krieger [ROOT.GetCountry.GetRuler.GetName|Y] argumentiert, dass es keinen Grund dafür gibt, dass unsere Angreifer sich auf die Plünderung des Landes beschränken sollten, und hat unseren Armeen die Erlaubnis gegeben, #R Pirate Havens#! zu errichten, wo immer wir wollen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!>  #NT!
  
 germania_conquest_mission_4_1: "Germanic Submission"  #<Germanische Unterwerfung>  #NT!
 germania_conquest_mission_4_1_DESC: "Although their cities and settlements are far away from [ROOT.GetCountry.GetCapital.GetName|T], the indomitable [ROOT.GetCountry.GetAdjective] levies have once again conquered a foreign host. Realizing that they cannot hope to stand against us, the battered tribes of #G Germania Superior#! have lowered their spears and taken oaths of submission.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!"  #<Obwohl ihre Städte und Siedlungen weit von [ROOT.GetCountry.GetCapital.GetName|T] entfernt sind, haben die unbezwingbaren [ROOT.GetCountry.GetAdjective]-Aufgebote erneut ein fremdes Heer erobert. Die angeschlagenen Stämme von #G Germania Superior#! haben erkannt, dass sie nicht hoffen können, uns entgegenzutreten, und haben ihre Speere gesenkt und Unterwerfungseide abgelegt.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!>  #NT!
  
 germania_conquest_mission_4_2: "Capital Infrastructure"  #<Kapitalinfrastruktur>  #NT!
 germania_conquest_mission_4_2_DESC: "The hardworking [ROOT.GetCountry.GetAdjective|G] people have been politely asking [ROOT.GetCountry.GetRuler.GetName|Y] to spend some state funds in order to build up the infrastructure of our capital. [ROOT.GetCountry.GetCapital.GetName|T] is growing and remains a place to be proud of, yet there remains even more that could be done to improve its natural abundance.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<Die fleißigen [ROOT.GetCountry.GetAdjective|G]-Leute haben [ROOT.GetCountry.GetRuler.GetName|Y] höflich darum gebeten, staatliche Mittel für den Aufbau der Infrastruktur unserer Hauptstadt auszugeben. [ROOT.GetCountry.GetCapital.GetName|T] wächst und bleibt ein Ort, auf den man stolz sein kann, doch es gibt noch mehr, was getan werden könnte, um seinen natürlichen Reichtum zu verbessern.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!>  #NT!
  
 germania_conquest_mission_5_1: "Exploring The Basin"  #<Das Becken erkunden>  #NT!
 germania_conquest_mission_5_1_DESC: "Far to our south lies the #G Bohaemian Basin#!; the treacherous foothills at the foot of the mountains give way to a sweeping plain. This is a good land, one that we should claim as our own!\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Weit im Süden liegt das #G Böhmische Becken#!;. Die tückischen Ausläufer am Fuße der Berge gehen in eine weitläufige Ebene über. Dies ist ein gutes Land, eines, das wir als unser Eigentum beanspruchen sollten!\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
 germania_conquest_mission_5_1_tt: "We will have the choice to send # Settlers#! down into the #G Boihaemian Basin#!."  #<Wir werden die Wahl haben, # Siedler#! in das #G Boihäische Becken#! zu schicken.>  #NT!
  
 germania_conquest_mission_6_1: "Western Boihaemia"  #<Westböhmen>  #NT!
 germania_conquest_mission_6_1_DESC: "As word spreads amongst the tribes of the wealth that can be found within the #G Boihaemian Basin#!, more and more of our people are uprooting their lives and settling in the south.\n\n\n\n\n\n\n\n\n\n\n@celt_mil13!"  #<Während sich unter den Stämmen der Reichtum verbreitet, der im #G Boihäischen Becken#!, zu finden ist, entwurzeln immer mehr unserer Leute ihr Leben und lassen sich im Süden nieder.\n\n\n\n\n\n\n\n\n\n\n@celt_mil13!>  #NT!
 germania_conquest_mission_6_1_tt: "We can colonize any unclaimed territories in the western #G Boihaemian Basin#!."  #<Wir können alle nicht beanspruchten Gebiete im westlichen #G Boihäischen Becken#!. kolonisieren>  #NT!
  
 germania_conquest_mission_6_2: "Eastern Boihaemia"  #<Ostböhmen>  #NT!
 germania_conquest_mission_6_2_DESC: "As word spreads amongst the tribes of the wealth that can be found within the #G Boihaemian Basin#!, more and more of our people are uprooting their lives and settling in the south.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Während sich unter den Stämmen der Reichtum verbreitet, der im #G Boihäischen Becken#!, zu finden ist, entwurzeln immer mehr unserer Leute ihr Leben und lassen sich im Süden nieder.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
 germania_conquest_mission_6_2_tt: "We can colonize any unclaimed territories in the eastern #G Boihaemian Basin#!."  #<Wir können alle nicht beanspruchten Gebiete im östlichen #G Boihäischen Becken#!. kolonisieren>  #NT!
  
 germania_conquest_mission_7_1: "Gallic Friends?"  #<Gallische Freunde?>  #NT!
 germania_conquest_mission_7_1_DESC: "By now, our [ROOT.GetCountry.GetAdjective] kinsmen feel that the #G Boihaemian Basin#! belongs to us in its entirety, and there are many native #G Boians#! that also agree with this, and rather than challenge our rule, these tribesmen are clamoring for more rights within our society.\n\nThere have been promises made to the [ROOT.GetCountry.GetRulerTitle], offering claims on the region in exchange for the gift of citizenship.\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!"  #<Mittlerweile haben unsere [ROOT.GetCountry.GetAdjective]-Verwandten das Gefühl, dass das #G Boihäische Becken#! in seiner Gesamtheit uns gehört, und es gibt viele einheimische #G Boianer#!, die ebenfalls damit einverstanden sind, und anstatt unsere Herrschaft in Frage zu stellen, fordern diese Stammesangehörigen lautstark mehr Rechte innerhalb unserer Gesellschaft.\n\nDen [ROOT.GetCountry.GetRulerTitle] wurden Versprechen gemacht, die im Gegenzug Ansprüche auf die Region anboten Geschenk der Staatsbürgerschaft.\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!>  #NT!
 germania_conquest_mission_7_1_tt: "#Y We will choose the#! #G Civic Rights#! #Y for the#! #T Boians#!."  #<#Y Wir werden die#! #G Bürgerrechte#! #Y für die#! #T Boianer#! wählen.>  #NT!
  
 germania_side_mission_start: "Favor Of The Gods"  #<Gunst der Götter>  #NT!
 germania_side_mission_start_DESC: "Now that [ROOT.GetCountry.GetName|Y] is enjoying a rare moment of peace, our #G High Priest#! has suggested that [ROOT.GetCountry.GetRuler.GetName|Y] holds a special sacrifice in honor of [ROOT.GetCountry.Custom('get_harvest_goddess')|G] in order to obtain divine favors; a suggestion that is popular with the people.\n\n#Y In one month, a ritual will be conducted in#! [ROOT.GetCountry.GetCapital.GetName|T] #Y and our [ROOT.GetCountry.GetRulerTitle] will be able to choose a reward.#!\n\n\n\n\n\n\n\n\n\n\n@event_pic13!"  #<Jetzt, wo [ROOT.GetCountry.GetName|Y] einen seltenen Moment des Friedens genießt, hat unser #G Hohepriester#! vorgeschlagen, dass [ROOT.GetCountry.GetRuler.GetName|Y] ein besonderes Opfer zu Ehren von [ROOT.GetCountry.Custom('get_harvest_goddess')|G] abhält, um göttliche Gunst zu erlangen; ein Vorschlag, der bei den Menschen beliebt ist.\n\n#Y In einem Monat wird in#! [ROOT.GetCountry.GetCapital.GetName|T] #Y ein Ritual durchgeführt und unser [ROOT.GetCountry.GetRulerTitle] wird in der Lage sein, eine Belohnung auszuwählen.#!\n\n\n\n\n\n\n\n\n\n\n@event_pic13!>  #NT!
 germania_side_mission_start_tt: "The #T High Priest#! officeholder needs at least 10 @religious_icon! #Y Zeal#!."  #<Der Amtsträger #T Hohepriester#! benötigt mindestens 10 @religious_icon! #Y Eifer#!.>  #NT!
  
 germania_side_mission_1: "The Well Of #E Wodenaz#!"  #<Der Brunnen von #E Wodenaz#!>  #NT!
 germania_side_mission_1_DESC: "The #G High Priest#! has returned to [ROOT.GetCountry.GetCapital.GetName|T] with more strange visions to divulge; the voice of the god [GetDeityDefinition('omen_wodenaz').GetName|G] calls from the wind-blasted north, urging none other than [ROOT.GetCountry.GetRuler.GetName|Y] [ROOT.GetCountry.GetRuler.GetHerHim]self to venture into the wildlands in search of a sacred shrine.\n\n#Y This will start an event chain#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Der #G Hohepriester#! ist nach [ROOT.GetCountry.GetCapital.GetName|T] zurückgekehrt und hat weitere seltsame Visionen zu enthüllen; Die Stimme des Gottes [GetDeityDefinition('omen_wodenaz').GetName|G] ruft aus dem windgepeitschten Norden und drängt niemanden außer [ROOT.GetCountry.GetRuler.GetName|Y] [ROOT.GetCountry.GetRuler.GetHerHim]self dazu, sich auf der Suche nach einem heiligen Schrein in die Wildnis zu wagen.\n\n#Y Dadurch wird eine Ereigniskette gestartet#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
  
 germania_side_mission_2: "Suppressing The Elites"  #<Unterdrückung der Eliten>  #NT!
 germania_side_mission_2_DESC: "Emboldened by all that [ROOT.GetCountry.GetRuler.GetSheHe] has seen and accomplished, [ROOT.GetCountry.GetRuler.GetName|Y] has made it known that [ROOT.GetCountry.GetRuler.GetSheHe] holds supreme power and authority over all of the other elites ruling within [ROOT.GetCountry.GetName|T], and all living within our borders must submit to the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle]. \n\n\n\n\n\n\n\n\n\n\n@celt_mil1!"  #<Ermutigt durch alles, was [ROOT.GetCountry.GetRuler.GetSheHe] gesehen und erreicht hat, hat [ROOT.GetCountry.GetRuler.GetName|Y] bekannt gegeben, dass [ROOT.GetCountry.GetRuler.GetSheHe] die höchste Macht und Autorität über alle anderen in [ROOT.GetCountry.GetName|T] herrschenden Eliten besitzt und dass sich alle, die innerhalb unserer Grenzen leben, dem [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] unterwerfen müssen. \n\n\n\n\n\n\n\n\n\n\n@celt_mil1!>  #NT!
  
 germania_side_mission_3_1: "Rex Germanorum"  #<Rex Germanorum>  #NT!
 germania_side_mission_3_1_DESC: "A new day calls for a new way of doing things, and [ROOT.GetCountry.GetRuler.GetName|Y] is not one to let a good opportunity fall by the wayside. [ROOT.GetCountry.GetName|T] is not the same small tribe that our great-grandfathers knew, so why should we conduct our political affairs in the same manner? Our people deserve a monarch, and they shall receive one!\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"  #<Ein neuer Tag erfordert eine neue Art, Dinge zu erledigen, und [ROOT.GetCountry.GetRuler.GetName|Y] ist keiner, der eine gute Gelegenheit ungenutzt verstreichen lässt. [ROOT.GetCountry.GetName|T] ist nicht derselbe kleine Stamm, den unsere Urgroßväter kannten. Warum sollten wir also unsere politischen Angelegenheiten auf die gleiche Weise erledigen? Unser Volk verdient einen Monarchen, und sie werden einen erhalten!\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!>  #NT!
  
 germania_side_mission_3_2: "Respect For The Elders"  #<Respekt vor den Älteren>  #NT!
 germania_side_mission_3_2_DESC: "Not one to break from tradition lightly, [ROOT.GetCountry.GetRuler.GetName|Y] has decreed that the ways of our forefathers will be honored within [ROOT.GetCountry.GetName|T] - let all power be given to the #G Elders#!, who have never led our people astray.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] ist nicht jemand, der leichtfertig mit der Tradition bricht, sondern hat beschlossen, dass die Wege unserer Vorfahren in [ROOT.GetCountry.GetName|T] geehrt werden – alle Macht soll den #G Ältesten#!, gegeben werden, die unser Volk nie in die Irre geführt haben.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!>  #NT!
  
 germania_side_mission_4_1: "Royal Regalia"  #<Königliche Insignien>  #NT!
 germania_side_mission_4_1_DESC: "#Y Our [ROOT.GetCountry.GetRulerTitle|T] will get to choose one of three legendary artifacts to serve as the #G [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Royal Regalia#!#!.\n\nFrom the citadel at [ROOT.GetCountry.GetCapital.GetName|T], the defeaning sounds of the carnyx fill the air as a throne of marble is placed within the palace - all hail [ROOT.GetCountry.GetRuler.GetName|Y], the founder of an immortal dynasty!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<#Y Unser [ROOT.GetCountry.GetRulerTitle|T] darf eines von drei legendären Artefakten auswählen, das als #G [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] königliches Regalia#!#!.\n\nFrom in der Zitadelle in [ROOT.GetCountry.GetCapital.GetName|T] dient. Die ohrenbetäubenden Geräusche des Carnyx erfüllen die Luft, während ein Marmorthron im Palast aufgestellt wird – alle begrüßen [ROOT.GetCountry.GetRuler.GetName|Y], den Gründer eines Unsterblichen Dynastie!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
  
 germania_side_mission_4_2: "Great Germanic Republic"  #<Große Germanische Republik>  #NT!
 germania_side_mission_4_2_DESC: "Send forth ships bearing messages to the corners of the Earth! From this day forward, let it be known that a #T Great Republic#!, one that honors the rule of law and upholds the principles of justice, has been established within the so-called 'barbaric' lands inhabited by the Germanic tribes!\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Sende Schiffe aus, die Botschaften in alle Ecken der Erde überbringen! Von diesem Tag an soll bekannt sein, dass in den sogenannten „barbarischen“ Ländern, in denen die germanischen Stämme leben, eine #T Große Republik#!, errichtet wurde, die die Rechtsstaatlichkeit achtet und die Grundsätze der Gerechtigkeit wahrt!\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
  
 germania_main_mission_start: "War Council"  #<Kriegsrat>  #NT!
 germania_main_mission_start_DESC: "[ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName|Y] has called for a #T War Council#! to be held at [ROOT.GetCountry.GetCapital.GetName|T], for the hour of war against our enemies draws every closer.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"  #<[ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName|Y] hat zu einem #T Kriegsrat#! für [ROOT.GetCountry.GetCapital.GetName|T] aufgerufen, denn die Stunde des Krieges gegen unsere Feinde rückt immer näher.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!>  #NT!
  
 germania_main_mission_1_1: "Conquest Of The West"  #<Eroberung des Westens>  #NT!
 germania_main_mission_1_1_DESC: "There are many menacing tribes that live on the eastern banks of the #Y River Rhenus#!, but they, too, shall submit to [ROOT.GetCountry.GetRuler.GetName|Y] one way or another. The sound of the carnyx calls our levies to prepare for the invasion of [GetProvince('(int32)3830').GetArea.GetRegion.GetName|G]!\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!"  #<Es gibt viele bedrohliche Stämme, die an den östlichen Ufern des #Y Flusses Rhenus#!, leben, aber auch sie werden sich auf die eine oder andere Weise [ROOT.GetCountry.GetRuler.GetName|Y] unterwerfen. Der Klang des Carnyx ruft unsere Truppen dazu auf, sich auf die Invasion von [GetProvince('(int32)3830').GetArea.GetRegion.GetName|G] vorzubereiten!\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!>  #NT!
 germania_main_mission_1_tt: "At least #E #Y 50%#!#! of the [GetProvince('(int32)3830').GetArea.GetRegion.GetName|G] region is owned by #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!."  #<Mindestens #E #Y 50 %#!#! der Region [GetProvince('(int32)3830').GetArea.GetRegion.GetName|G] gehören #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!.>  #NT!
 germania_main_mission_1_tt2: "We will receive claims on all of #G Germania Magna#!."  #<Wir erhalten Ansprüche auf ganz #G Germania Magna#!.>  #NT!
  
 germania_main_mission_1_2: "Conquest Of The North"  #<Eroberung des Nordens>  #NT!
 germania_main_mission_1_2_DESC: "The time has come to push far north, into the difficult terrain inhabited by the savage #G Scandians#!. [ROOT.GetCountry.GetRuler.GetName|Y] has made up [ROOT.GetCountry.GetRuler.GetHerHis] mind; we must cross the waters of the #Y Oceanus Sarmaticus#! and destroy the threat posed to our northern flank by the #G Scandian#! and #G Cimbrian#! tribes. \n\n\n\n\n\n\n\n\n\n\n@italic_mil12!"  #<Es ist an der Zeit, weit nach Norden vorzudringen, in das schwierige Gelände der wilden #G Skandinavier#!. [ROOT.GetCountry.GetRuler.GetName|Y] hat sich [ROOT.GetCountry.GetRuler.GetHerHis] entschieden; Wir müssen die Gewässer des #Y Oceanus Sarmaticus#! überqueren und die Bedrohung zerstören, die unsere Nordflanke durch die Stämme #G Scandian#! und #G Kimbrian#! darstellt. \n\n\n\n\n\n\n\n\n\n\n@italic_mil12!>  #NT!
 germania_main_mission_1_2_tt: "At least #E #Y 50%#!#! of the [GetProvince('(int32)3857').GetArea.GetRegion.GetName|G] region is owned by #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!."  #<Mindestens #E #Y 50 %#!#! der Region [GetProvince('(int32)3857').GetArea.GetRegion.GetName|G] gehören #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!.>  #NT!
 germania_main_mission_1_2_tt2: "We will receive claims on all of #G Scandia#!."  #<Wir erhalten Ansprüche für ganz #G Scandia#!.>  #NT!
  
 germania_main_mission_1_3: "Conquest Of The East"  #<Eroberung des Ostens>  #NT!
 germania_main_mission_1_3_DESC: "The woodlands to our east are dark and vast, and tribes hostile to our intentions lurk in the gloomy shadows of the primeval forests. The time has come to gather our forces and beat these Aestian savages into submission.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!"  #<Die Wälder im Osten sind dunkel und weitläufig, und in den düsteren Schatten der Urwälder lauern Stämme, die unseren Absichten feindlich gegenüberstehen. Es ist an der Zeit, unsere Kräfte zu sammeln und diese astischen Wilden zur Unterwerfung zu zwingen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!>  #NT!
 germania_main_mission_1_3_tt: "At least #E #Y 50%#!#! of the [GetProvince('(int32)4768').GetArea.GetRegion.GetName|G] region is owned by #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!."  #<Mindestens #E #Y 50 %#!#! der Region [GetProvince('(int32)4768').GetArea.GetRegion.GetName|G] gehören #E [SCOPE.GetRootScope.GetCountry.GetName|T]#!.>  #NT!
 germania_main_mission_1_3_tt2: "We will receive claims on all of #G Venedia#!."  #<Wir erhalten Ansprüche auf ganz #G Venetien#!.>  #NT!
  
 germania_main_mission_2_1: "Grand Germanic Harbor"  #<Großer germanischer Hafen>  #NT!
 germania_main_mission_2_1_DESC: "Although our kinsmen vastly prefer the stability of dry land to the unpredictable moods of the ocean, if we have hopes of becoming a mighty civilization, then we must turn our attention northward and master the waters. [ROOT.GetCountry.GetRuler.GetName|Y] is currently scouting the coastline in hopes of finding the ideal building location for our grand Germanic harbor.\n\n\n\n\n\n\n\n\n\n\n@greek_mil4!"  #<Obwohl unsere Verwandten die Stabilität des trockenen Landes den unvorhersehbaren Launen des Ozeans bei weitem vorziehen, müssen wir unsere Aufmerksamkeit nach Norden richten und die Gewässer beherrschen, wenn wir die Hoffnung haben, eine mächtige Zivilisation zu werden. [ROOT.GetCountry.GetRuler.GetName|Y] erkundet derzeit die Küste in der Hoffnung, den idealen Baustandort für unseren großen germanischen Hafen zu finden.\n\n\n\n\n\n\n\n\n\n\n@greek_mil4!>  #NT!
  
 germania_main_mission_2_2: "Raise The Ramparts"  #<Errichtet die Stadtmauer>  #NT!
 germania_main_mission_2_2_DESC: "Our fair capital [ROOT.GetCountry.GetCapital.GetName|T] is truly the greatest city in all of [ROOT.GetCountry.GetName|G], and yet the cautious [ROOT.GetCountry.GetRuler.GetName|Y] fears that an ill-timed invasion by our enemies could ruin all of the hard work that our people have put into building our civilization.\n\nIn order to protect our burgeoning society, the [ROOT.GetCountry.GetRulerTitle] has decreed that the capital be fortified to the best of our ability. Instead of spending their summer on campaign, our warriors will be asked to help with a construction project.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Unsere schöne Hauptstadt [ROOT.GetCountry.GetCapital.GetName|T] ist wirklich die großartigste Stadt in ganz [ROOT.GetCountry.GetName|G], und doch befürchten die vorsichtigen [ROOT.GetCountry.GetRuler.GetName|Y], dass eine unzeitige Invasion unserer Feinde all die harte Arbeit zunichte machen könnte, die unser Volk in den Aufbau unserer Zivilisation gesteckt hat.\n\nUm unsere aufstrebende Gesellschaft zu schützen, hat die [ROOT.GetCountry.GetRulerTitle] verfügt, dass die Hauptstadt nach besten Kräften befestigt wird. Anstatt ihren Sommer im Feldzug zu verbringen, werden unsere Krieger gebeten, bei einem Bauprojekt zu helfen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
  
 germania_main_mission_2_3: "The Amber Coast"  #<Die Bernsteinküste>  #NT!
 germania_main_mission_2_3_DESC: "Most of the foreign merchants that arrive in our ports make inquiries about one trade good primarily; amber @amber!. The gods have given us an abundance of this rarity, and we should take advantage of this blessing and produce as much as we possibly can.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!"  #<Die meisten ausländischen Händler, die in unseren Häfen ankommen, erkundigen sich hauptsächlich nach einem Handelsgut; Amber @amber!. Die Götter haben uns eine Fülle dieser Seltenheit gegeben, und wir sollten diesen Segen nutzen und so viel wie möglich produzieren.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!>  #NT!
 germania_amber_total_svalue_tt: "We must produce at least #Y 10#! #T Amber#! @amber! in our nation. (#R [SCOPE.ScriptValue('androphagian_amber_total_svalue')|0]#!/#Y 10#!)"  #<Wir müssen mindestens #Y 10#! #T Amber#! @amber produzieren! in unserer Nation. (#R [SCOPE.ScriptValue('androphagian_amber_total_svalue')|0]#!/#Y 10#!)>  #NT!
  
 germania_main_mission_3: "Putting Down Roots"  #<Wurzeln schlagen>  #NT!
 germania_main_mission_3_DESC: "Over the last few years, our tribe has certainly come a long way; buildings of brick and stone have replaced the ramshackle huts meant to last no longer than a season or two, and instead of migrating annually in search of good grazing land, our people are choosing to stay in the settlements that they have cleared. Slowly but surely, [ROOT.GetCountry.GetAdjective] society is transforming into something new....\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!"  #<In den letzten Jahren hat unser Stamm sicherlich einen langen Weg zurückgelegt; Gebäude aus Ziegeln und Steinen haben die baufälligen Hütten ersetzt, die nicht länger als ein oder zwei Saisons halten sollten, und anstatt jedes Jahr auf der Suche nach gutem Weideland abzuwandern, entscheiden sich unsere Leute dafür, in den Siedlungen zu bleiben, die sie gerodet haben. Langsam aber sicher verwandelt sich die [ROOT.GetCountry.GetAdjective]-Gesellschaft in etwas Neues....\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!>  #NT!
  
 germania_main_mission_4: "Call Of The Wild"  #<Ruf der Wildnis>  #NT!
 germania_main_mission_4_DESC: "Let us set forth from our settlements and migrate to lands that are currently wild and unruly; the pristine forests and gentle plains that surround our heartlands call out for a master.\n\n\n\n\n\n\n\n\n\n\n@italic_mil24!"  #<Lasst uns unsere Siedlungen verlassen und in Gebiete auswandern, die derzeit wild und widerspenstig sind; Die unberührten Wälder und sanften Ebenen, die unser Kernland umgeben, rufen nach einem Meister.\n\n\n\n\n\n\n\n\n\n\n@italic_mil24!>  #NT!
  
 germania_main_mission_5_1: "War Upon The Waters"  #<Krieg gegen die Gewässer>  #NT!
 germania_main_mission_5_1_DESC: "Never one to sit upon [ROOT.GetCountry.GetRuler.GetHerHis] hands, the intrepid [ROOT.GetCountry.GetRuler.GetName|Y] has raised a large navy in hopes of raiding the coastlines of our enemies.\n\n\n\n\n\n\n\n\n\n\n@italic_mil4!"  #<Der unerschrockene [ROOT.GetCountry.GetRuler.GetName|Y], der nie auf [ROOT.GetCountry.GetRuler.GetHerHis] Händen sitzt, hat eine große Flotte aufgestellt, in der Hoffnung, die Küsten unserer Feinde zu überfallen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil4!>  #NT!
  
 germania_main_mission_5_2: "Blood Of The Germanic Kings"  #<Blut der germanischen Könige>  #NT!
 germania_main_mission_5_2_DESC: "Under the guidance of [ROOT.GetCountry.GetRuler.GetName|Y] and the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clan, the [ROOT.GetCountry.GetAdjective] people have risen to heights unimagined by their forefathers. Destined to remain one of the most prestigious families in the histories of [ROOT.GetCountry.GetName|Y], it is considered the greatest of honors to be a blood relative of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]s, who are counted among the first and greatest #T Germanic Kings#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil1!"  #<Unter der Führung von [ROOT.GetCountry.GetRuler.GetName|Y] und dem [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]-Clan haben die [ROOT.GetCountry.GetAdjective]-Leute Höhen erreicht, die ihre Vorfahren nicht für möglich gehalten hätten. Es ist dazu bestimmt, eine der prestigeträchtigsten Familien in der Geschichte von [ROOT.GetCountry.GetName|Y] zu bleiben, und es gilt als die größte Ehre, ein Blutsverwandter der [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] zu sein, die zu den ersten und größten #T germanischen Königen#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil1! gezählt werden>  #NT!
  
 germania_main_mission_6_1: "Professional Raiders"  #<Professionelle Raider>  #NT!
 germania_main_mission_6_1_DESC: "As the tradition of raiding has become a part of life within [ROOT.GetCountry.GetName|Y], it has been suggested that we implement professional tactics for our plundering forces. Just as we cannot rely on untrained levies to protect our borders, we should not send green recruits into the lands of our enemies.\n\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil19!"  #<Da die Tradition des Raubzugs zu einem Teil des Lebens in [ROOT.GetCountry.GetName|Y] geworden ist, wurde vorgeschlagen, dass wir professionelle Taktiken für unsere Plünderungskräfte anwenden. So wie wir uns nicht auf ungeschulte Truppen verlassen können, um unsere Grenzen zu schützen, sollten wir auch keine grünen Rekruten in die Länder unserer Feinde schicken.\n\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil19!>  #NT!
  
 germania_main_mission_6_2: "Germanic Armies"  #<Germanische Armeen>  #NT!
 germania_main_mission_6_2_DESC: "The same [ROOT.GetCountry.GetAdjective|G] soldiers that conquered the forested mountains and frozen swamplands of our homelands will be the same ones to tread upon the marbled streets of Kings and Consuls one day - our exceptional military traditions will triumph against all!\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!"  #<Dieselben [ROOT.GetCountry.GetAdjective|G] Soldaten, die die bewaldeten Berge und gefrorenen Sumpfgebiete unserer Heimatländer erobert haben, werden eines Tages dieselben sein, die die marmorierten Straßen der Könige und Konsuln betreten werden – unsere außergewöhnlichen militärischen Traditionen werden über alle triumphieren!\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!>  #NT!
  
 germania_main_mission_6_3: "Growing Population"  #<Wachsende Bevölkerung>  #NT!
 germania_main_mission_6_3_DESC: "Our capital of [ROOT.GetCountry.GetCapital.GetName|T] has been overflowing with citizens and freemen, as men from all across [ROOT.GetCountry.GetName|T] travel to the beating heart of our empire in order to seek their fortunes in the greatest city of them all. While this is a boon for the country, measures must be taken if we hope to accomodate all of the people living there.\n\n\n\n\n\n\n\n\n\n\n@italic_mil24!"  #<Unsere Hauptstadt [ROOT.GetCountry.GetCapital.GetName|T] wimmelt von Bürgern und Freien, während Männer aus aller Welt [ROOT.GetCountry.GetName|T] in das pulsierende Herz unseres Imperiums reisen, um in der größten Stadt von allen ihr Glück zu suchen. Obwohl dies ein Segen für das Land ist, müssen Maßnahmen ergriffen werden, wenn wir hoffen, alle dort lebenden Menschen unterzubringen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil24!>  #NT!
  
 germania_main_mission_6_4: "A Civil Society"  #<Eine Zivilgesellschaft>  #NT!
 germania_main_mission_6_4_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] would love nothing more than turning [ROOT.GetCountry.GetRuler.GetHerHis] attention to construction initiatives throughout [ROOT.GetCountry.GetName|T], but before the [ROOT.GetCountry.GetRulerTitle] can focus on development, our #T Civic Technology#! needs to be better than it currently is - no easy task.\n\nIn order to help facilitate our technological growth, [ROOT.GetCountry.GetRuler.GetFirstName] has set aside a princely sum in order to procure the services of the wisest living within our land in the hopes that they will share their knowledge with us.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] würde [ROOT.GetCountry.GetRuler.GetHerHis] am liebsten die Aufmerksamkeit von [ROOT.GetCountry.GetRuler.GetHerHis] auf Bauinitiativen im Laufe von [ROOT.GetCountry.GetName|T] lenken, aber bevor sich [ROOT.GetCountry.GetRulerTitle] auf die Entwicklung konzentrieren kann, muss unsere #T Bürgertechnologie#! besser sein als sie derzeit ist – keine leichte Aufgabe.\n\nUm unser technologisches Wachstum zu erleichtern, hat [ROOT.GetCountry.GetRuler.GetFirstName] eine stattliche Summe beiseite gelegt, um die Dienste der klügsten Menschen in unserem Land zu sichern die Hoffnung, dass sie ihr Wissen mit uns teilen.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
  
 germania_main_mission_6_5: "Colonial Ambition"  #<Kolonialer Ehrgeiz>  #NT!
 germania_main_mission_6_5_DESC: "The promise of eternal glory and treasure beckons our sailors to push their ships and their souls to the limit, following the battle cry of adventure to wherever the gods of war might lead them.\n\nThe frozen islands of the far north are inhabitable places that no [ROOT.GetCountry.GetAdjective] warrior has ever visited, and yet these desperate lands call out for the bravest of souls to visit her shores.\n\n\n\n\n\n\n\n\n\n\n@event_pic12!"  #<Das Versprechen ewiger Herrlichkeit und Schätze lockt unsere Seeleute dazu, ihre Schiffe und ihre Seelen bis an die Grenzen zu fordern und dem Schlachtruf des Abenteuers zu folgen, wohin auch immer die Kriegsgötter sie führen mögen.\n\nDie gefrorenen Inseln im hohen Norden sind bewohnbare Orte, die noch kein [ROOT.GetCountry.GetAdjective]-Krieger jemals besucht hat, und doch rufen diese verzweifelten Länder nach einem Besuch der mutigsten aller Seelen Shores.\n\n\n\n\n\n\n\n\n\n\n@event_pic12!>  #NT!
  
 germania_main_mission_7_1: "Reform The Country"  #<Reformieren Sie das Land>  #NT!
 germania_main_mission_7_1_DESC: "After a long period of contemplation, in which the future of [ROOT.GetCountry.GetName] weighed heavily upon [ROOT.GetCountry.GetRuler.GetName]'s mind, the [ROOT.GetCountry.GetRulerTitle] has come to an important conclusion, one that shall have ramifications throughout the ages to come; we must make an irrevocable break with the past in order to forge our new identities.\n\n\n\n\n\n\n\n\n\n\n@greek_mil9!"  #<Nach einer langen Zeit des Nachdenkens, in der die Zukunft von [ROOT.GetCountry.GetName] schwer auf [ROOT.GetCountry.GetRuler.GetName]s Gedanken lastete, ist [ROOT.GetCountry.GetRulerTitle] zu einem wichtigen Schluss gekommen, der Auswirkungen auf die kommenden Zeitalter haben wird; Wir müssen einen unwiderruflichen Bruch mit der Vergangenheit vollziehen, um unsere neue Identität zu schmieden.\n\n\n\n\n\n\n\n\n\n\n@greek_mil9!>  #NT!
  
 germania_main_mission_7_2: "Invest In Our Tradition"  #<Investieren Sie in unsere Tradition>  #NT!
 germania_main_mission_7_2_DESC: "Why would [ROOT.GetCountry.GetRuler.GetName] abandon the very culture that brought us to the pinnacle of power? Dismissing these suggestions as the peak of foolishness, the wise [ROOT.GetCountry.GetRulerTitle] has embraced our roots and vows to teach our traditions to the disparate peoples living under our banner.\n\n\n\n\n\n\n\n\n\n\n@celt_mil4!"  #<Warum sollte [ROOT.GetCountry.GetRuler.GetName] genau die Kultur aufgeben, die uns an die Spitze der Macht gebracht hat? Der weise [ROOT.GetCountry.GetRulerTitle] hat diese Vorschläge als Gipfel der Dummheit abgetan und sich unsere Wurzeln zu eigen gemacht und gelobt, unsere Traditionen den unterschiedlichen Völkern, die unter unserem Banner leben, beizubringen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil4!>  #NT!
  
 germania_main_mission_7_3: ""
 germania_main_mission_7_3_DESC: ""
  
 germania_main_mission_7_4: ""
 germania_main_mission_7_4_DESC: ""
  
 germania_main_mission_7_5: "Stone Surplus"  #<Steinüberschuss>  #NT!
 germania_main_mission_7_5_DESC: "As much as it pains [ROOT.GetCountry.GetRuler.GetName|Y] to admit it, our [ROOT.GetCountry.GetAdjective] kinsmen need to start erecting permanent structures of stone @stone! within [ROOT.GetCountry.GetName|T]. A foundation made of sticks and thatch will not be strong enough to sustain our ambitions in the years to come!\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!"  #<So sehr es [ROOT.GetCountry.GetRuler.GetName|Y] auch schmerzt, es zuzugeben, unsere [ROOT.GetCountry.GetAdjective] Verwandten müssen mit der Errichtung dauerhafter Strukturen aus Stein @stone beginnen! innerhalb von [ROOT.GetCountry.GetName|T]. Ein Fundament aus Stöcken und Stroh wird nicht stark genug sein, um unsere Ambitionen in den kommenden Jahren aufrechtzuerhalten!\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!>  #NT!
 germania_main_mission_7_5tt: "We need to own #T 3 Settlements#! within the #T Germania Magna#! region that produce at least #Y 3 Stone#! @stone! and has a #T Mine#!."  #<Wir müssen #T 3 Siedlungen#! in der Region #T Germania Magna#! besitzen, die mindestens #Y 3 Steine#! @Steine ​​produzieren! und hat eine #T Mine#!.>  #NT!
  
 germania_main_mission_7_6: "Feed The People"  #<Füttere die Menschen>  #NT!
 germania_main_mission_7_6_DESC: "The hearty tribesmen of [ROOT.GetCountry.GetName|T] have suffered through periods of famine and devastation during the wars of yesteryear, but the time has come to repay their faithfulness by ensuring that their stomachs remain full. Let us construct farms throughout our holdings in order to ensure that our harvests are bountiful.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Die tapferen Stammesangehörigen von [ROOT.GetCountry.GetName|T] haben während der Kriege vergangener Zeiten Zeiten der Hungersnot und Verwüstung durchlitten, aber es ist an der Zeit, ihre Treue zu belohnen, indem sie dafür sorgen, dass ihr Magen voll bleibt. Lassen Sie uns überall in unseren Betrieben Bauernhöfe errichten, um sicherzustellen, dass unsere Ernten reichlich sind.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!
  
 germania_main_mission_7_7: "Settling Soodak"  #<Soodak besiedeln>  #NT!
 germania_main_mission_7_7_DESC: "We have heard that there is a large island named [GetProvince('(int32)9371').GetName|T] in the #Y Oceanus Sarmaticus#! that is close to our colony and is rich with amber @amber!; the local inhabitants are friendly and are grateful for the opportunity to forge connections with a powerful people such as ours. If we can continue to assist our colonies with food and manpower, then we will be able to take this amber-rich island for ourselves.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Wir haben gehört, dass es im #Y Oceanus Sarmaticus#! eine große Insel namens [GetProvince('(int32)9371').GetName|T] gibt, die in der Nähe unserer Kolonie liegt und reich an Bernstein ist @amber!; Die Einheimischen sind freundlich und dankbar für die Gelegenheit, Kontakte zu einem mächtigen Volk wie unserem zu knüpfen. Wenn wir unsere Kolonien weiterhin mit Nahrungsmitteln und Arbeitskräften unterstützen können, können wir diese bernsteinreiche Insel für uns erobern.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
  
 germania_main_mission_7_8: "Five Cities"  #<Fünf Städte>  #NT!
 germania_main_mission_7_8_DESC: "Compared to others, we have an embarrasing dearth of cities; our people have been more inclined to pillage and sack villages instead of building our own, but this must change.\n\nHaving realized that this puts us at a disadvantage, especially when matters of trade and research are considered, [ROOT.GetCountry.GetRuler.GetName|Y] has announced that the [ROOT.GetCountry.GetAdjective]s shall make up for this by constructing no less than five cities within our heartland.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!"  #<Im Vergleich zu anderen haben wir einen peinlichen Mangel an Städten; Unser Volk neigt eher dazu, Dörfer zu plündern und zu plündern, anstatt eigene zu bauen, aber das muss sich ändern.\n\nDa wir erkannt haben, dass wir dadurch im Nachteil sind, insbesondere wenn es um Handel und Forschung geht, hat [ROOT.GetCountry.GetRuler.GetName|Y] angekündigt, dass die [ROOT.GetCountry.GetAdjective]s dies durch den Bau von nicht weniger als fünf Städten in unserem Kernland ausgleichen werden.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!>  #NT!
  
 germania_main_mission_8_1: "A Modern Army"  #<Eine moderne Armee>  #NT!
 germania_main_mission_8_1_DESC: "We cannot afford to rely on untrained levies of farmers and their sons as our main forces - we must invest in a modern army, one that can go toe-to-toe with the professional forces of the Mediterranean empires.\n\n\n\n\n\n\n\n\n\n\n@greek_mil8!"  #<Wir können es uns nicht leisten, uns auf ungeschulte Truppen aus Bauern und ihren Söhnen als unsere Hauptstreitkräfte zu verlassen – wir müssen in eine moderne Armee investieren, eine, die mit den Berufskräften der Mittelmeerreiche mithalten kann.\n\n\n\n\n\n\n\n\n\n\n@greek_mil8!>  #NT!
  
 germania_main_mission_8_2: "New Infrastructures"  #<Neue Infrastrukturen>  #NT!
 germania_main_mission_8_2_DESC: "Although [ROOT.GetCountry.GetRuler.GetName] will always have a soft spot for [ROOT.GetCountry.GetAdjective] architecture and design, if #T germania#! is to become one people unified in culture and tradition, then adopting new building styles is a clever way to ensure that this happens.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Obwohl [ROOT.GetCountry.GetRuler.GetName] immer ein Faible für [ROOT.GetCountry.GetAdjective] Architektur und Design haben wird, ist die Einführung neuer Baustile eine clevere Möglichkeit, dies zu gewährleisten, wenn #T Germanien#! ein in Kultur und Tradition vereintes Volk werden soll.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
  
 germania_main_mission_8_3: "A New Alphabet"  #<Ein neues Alphabet>  #NT!
 germania_main_mission_8_3_DESC: "The runes and etchings of our forefathers seem clumsy and primitive when compared to the flowing scripts and bodies of literature that some of our peers have - an embarrassment that has troubled [ROOT.GetCountry.GetRuler.GetName], who feels that our backwardness reflects poorly on [ROOT.GetCountry.GetRuler.GetHerHis] leadership.\n\nWith an eye on reformation, the [ROOT.GetCountry.GetRulerTitle] has called for scribes to assist in the creation of a new alphabet for our people.\n\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Die Runen und Radierungen unserer Vorfahren wirken ungeschickt und primitiv im Vergleich zu den fließenden Schriften und Literatursammlungen, die einige unserer Kollegen haben – eine Verlegenheit, die [ROOT.GetCountry.GetRuler.GetName] beunruhigt hat, der das Gefühl hat, dass sich unsere Rückständigkeit schlecht auf die Führung von [ROOT.GetCountry.GetRuler.GetHerHis] auswirkt.\n\nMit Blick auf die Reformation hat die [ROOT.GetCountry.GetRulerTitle] Schriftgelehrte gerufen, die bei der Erstellung eines neuen Alphabets für uns helfen sollen Leute.\n\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
  
 germania_main_mission_8_4: "No Place Is Safe"  #<Kein Ort ist sicher>  #NT!
 germania_main_mission_8_4_DESC: "Our warriors cry out for the chance to raid distant territories by sea, and [ROOT.GetCountry.GetRuler.GetName|Y] is ready to grant their request.\n\n\n\n\n\n\n\n\n\n\n@italic_mil11!"  #<Unsere Krieger schreien nach der Chance, ferne Gebiete auf dem Seeweg zu überfallen, und [ROOT.GetCountry.GetRuler.GetName|Y] ist bereit, ihrer Bitte nachzukommen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil11!>  #NT!
  
 germania_main_mission_8_5: "Keep Our Roots"  #<Behalten Sie unsere Wurzeln>  #NT!
 germania_main_mission_8_5_DESC: "Some living within [ROOT.GetCountry.GetCapital.GetName|G] have allowed the pleasures of city-life to pollute their minds, for some have suggested we abandon our traditional ways in order to embrace cosmoplitan influences. [ROOT.GetCountry.GetRuler.GetName|Y] will have none of this foolishness, however, and has declared that we shall never abandoned our roots.\n\n\n\n\n\n\n\n\n\n\n@celt_mil15!"  #<Einige, die innerhalb von [ROOT.GetCountry.GetCapital.GetName|G] leben, haben zugelassen, dass die Freuden des Stadtlebens ihren Geist verunreinigen, denn einige haben vorgeschlagen, dass wir unsere traditionellen Gewohnheiten aufgeben und uns kosmopolitischen Einflüssen zuwenden sollten. [ROOT.GetCountry.GetRuler.GetName|Y] wird jedoch nichts von dieser Dummheit haben und hat erklärt, dass wir unsere Wurzeln niemals aufgeben werden.\n\n\n\n\n\n\n\n\n\n\n@celt_mil15!>  #NT!
  
 germania_main_mission_8_6: "Oral Traditions"  #<Mündliche Überlieferungen>  #NT!
 germania_main_mission_8_6_DESC: "For as long as the sun has seen fit to rise in the skies, our people have transmitted myth via mouth - we do not write our stories down, but train bards and story-singers to recount the bold deeds of our ancestors.\n\n\n\n\n\n\n\n\n\n\n@event_pic12!"  #<Solange die Sonne am Himmel aufgegangen ist, hat unser Volk Mythen über den Mund weitergegeben – wir schreiben unsere Geschichten nicht auf, sondern bilden Barden und Geschichtensänger aus, um die kühnen Taten unserer Vorfahren zu erzählen.\n\n\n\n\n\n\n\n\n\n\n@event_pic12!>  #NT!
  
 germania_main_mission_8_7: "Assimilation In Germania"  #<Assimilation in Germanien>  #NT!
 germania_main_mission_8_7_DESC: "Our superior culture has drawn many admirers - it is said that our manly deeds and accomplishments are hailed in cities as far away as [GetProvince('(int32)516').GetName|T], although [ROOT.GetCountry.GetRuler.GetName|Y] believes this to be flattery. It comes as no surprise, then, to hear that many living within our borders are assimilating to [ROOT.GetCountry.GetAdjective|G].\n\n\n\n\n\n\n\n\n\n\n@egypt_mil12!"  #<Unsere überlegene Kultur hat viele Bewunderer angezogen – es heißt, dass unsere männlichen Taten und Errungenschaften in Städten bis zu [GetProvince('(int32)516').GetName|T] gefeiert werden, obwohl [ROOT.GetCountry.GetRuler.GetName|Y] dies für Schmeichelei hält. Es ist daher keine Überraschung zu hören, dass sich viele, die innerhalb unserer Grenzen leben, an [ROOT.GetCountry.GetAdjective|G] anpassen.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil12!>  #NT!
  
 germania_main_mission_8_9: "Grand Markets Of Germania"  #<Große Märkte von Germania>  #NT!
 germania_main_mission_8_9_DESC: "Business is booming within [ROOT.GetCountry.GetCapital.GetName|T], and anything that one desires can be found in the many marketplaces that are found alongside the plazas and squares surrounding the main thoroughfares.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!"  #<Das Geschäft in [ROOT.GetCountry.GetCapital.GetName|T] boomt, und auf den vielen Marktplätzen entlang der Plätze rund um die Hauptverkehrsstraßen findet man alles, was das Herz begehrt.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!>  #NT!
  
 germania_main_mission_8_10: "A Pile Of Wood"  #<Ein Haufen Holz>  #NT!
 germania_main_mission_8_10_DESC: "Ceaseless in their chopping, the axes of the [ROOT.GetCountry.GetAdjective] woodsmen are never granted a moment's rest, but spend countless hours felling trees in the forested wildlands of the countryside.\n\n[ROOT.GetCountry.GetName|T] is blessed with more lumber @wood! than it knows what to do with, and her people are skilled when it comes to building wooden implements.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Unaufhörlich hacken die Äxte der [ROOT.GetCountry.GetAdjective] Holzfäller und genießen nie einen Moment Ruhe, sondern verbringen unzählige Stunden damit, Bäume in den bewaldeten Wildnisgebieten des Landes zu fällen.\n\n[ROOT.GetCountry.GetName|T] ist mit mehr Holz gesegnet @wood! als es weiß, was es damit anfangen soll, und ihre Leute sind geschickt, wenn es um den Bau von Holzgeräten geht.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
 germania_main_mission_8_10tt: "We need to own at least #T 6 Settlements#! that produce at least #Y 2 Wood#! @wood!."  #<Wir müssen mindestens #T 6 Siedlungen#! besitzen, die mindestens #Y 2 Holz#! @Holz! produzieren.>  #NT!
  
 germania_main_mission_8_11: "Wild Stallions"  #<Wilde Hengste>  #NT!
 germania_main_mission_8_11_DESC: "When it comes to the raising of horses, our tribesmen can hold their own - we possess many lands that are blessed with strong herds of wild horses @horses!, and we have trained these magnificent beasts to carry our warriors into battle!\n\n\n\n\n\n\n\n\n\n\n@celt_mil11!"  #<Wenn es um die Aufzucht von Pferden geht, können sich unsere Stammesangehörigen behaupten – wir besitzen viele Länder, die mit starken Herden wilder Pferde @horses! gesegnet sind, und wir haben diese großartigen Tiere trainiert, um unsere Krieger in die Schlacht zu tragen!\n\n\n\n\n\n\n\n\n\n\n@celt_mil11!>  #NT!
 germania_horses_total_svalue_tt: "We must produce at least #Y 10#! @horses! #T Horses#! in our country. (#R [SCOPE.ScriptValue('germania_horses_total_svalue')|0]#!/#Y 10#!)"  #<Wir müssen mindestens #Y 10#! @horses produzieren! #T Pferde#! in unserem Land. (#R [SCOPE.ScriptValue('germania_horses_total_svalue')|0]#!/#Y 10#!)>  #NT!
  
 germania_main_mission_8_12: "Hunting Parties"  #<Jagdpartys>  #NT!
 germania_main_mission_8_12_DESC: "The lands that we live in are wild and savage, but there is a surprising lack of wild game @wild_game! in our woodlands and plains - one has to travel far to the east before encountering the largest herds. Nevertheless, our people have a taste for the hunt and will not be satisfied unless they can take to the forests in order to stalk deer, and [ROOT.GetCountry.GetRuler.GetName|Y] has promised to make this dream into reality.\n\n\n\n\n\n\n\n\n\n\n@italic_mil7!"  #<Die Länder, in denen wir leben, sind wild und wild, aber es gibt einen überraschenden Mangel an Wild @wild_game! In unseren Wäldern und Ebenen muss man weit nach Osten reisen, bevor man auf die größten Herden trifft. Dennoch haben unsere Leute eine Vorliebe für die Jagd und werden nicht zufrieden sein, wenn sie nicht in die Wälder gehen können, um Hirsche zu jagen, und [ROOT.GetCountry.GetRuler.GetName|Y] hat versprochen, diesen Traum Wirklichkeit werden zu lassen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil7!>  #NT!
 germania_main_mission_8_12_tt: "We need to own #T 3 Settlements#! that produce #Y Wild Game#! @wild_game! and have a #T Tribal Settlement#! building."  #<Wir müssen #T 3 Siedlungen#! besitzen, die #Y Wildwild#! @wild_game produzieren! und ein #T Stammessiedlung#! Gebäude haben.>  #NT!
  
 germania_main_mission_8_13: "Salt Conservation"  #<Salzkonservierung>  #NT!
 germania_main_mission_8_13_DESC: "Having access to a steady supply of salt @salt! is important for multiple reasons, especially because we use it as a preservative. Unless we want all of the food that we have worked so hard to grow to spoil, we better secure a lot of salt, and quickly.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!"  #<Zugriff auf eine stetige Versorgung mit Salz @salt! ist aus mehreren Gründen wichtig, insbesondere weil wir es als Konservierungsmittel verwenden. Wenn wir nicht wollen, dass all die Lebensmittel, an deren Anbau wir so hart gearbeitet haben, verderben, besorgen wir uns besser schnell viel Salz.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!>  #NT!
 germania_main_mission_8_13_tt1: "We need to own at least #T 3 Settlements#! that produce #Y Salt#! @salt! and have a #T Slave Estate#! building."  #<Wir müssen mindestens #T 3 Siedlungen#! besitzen, die #Y Salz#! @Salz produzieren! und ein #T Sklavenanwesen#! Gebäude haben.>  #NT!
 germania_main_mission_8_13_tt2: "Our #T Capital Scope#! has a #G Surplus#! of at least #T 2#! #Y Salt#! @salt!."  #<Unser #T Kapitalumfang#! hat einen #G Überschuss#! von mindestens #T 2#! #Y Salz#! @Salz!.>  #NT!
  
 germania_main_mission_8_15: "Successful Fennic Colony"  #<Erfolgreiche Fennic-Kolonie>  #NT!
 germania_main_mission_8_15_DESC: "Our holdings in [GetProvince('(int32)9371').GetName|T] have brought much renown to the people of [ROOT.GetCountry.GetName|T], who are hailed far and wide for the quality of the amber @amber! that is produced within our workshops.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!"  #<Unsere Bestände in [GetProvince('(int32)9371').GetName|T] haben den Menschen von [ROOT.GetCountry.GetName|T] großen Ruhm eingebracht, die weit und breit für die Qualität des Bernsteins @amber gepriesen werden! das in unseren Werkstätten hergestellt wird.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!>  #NT!
 germania_amber_total_svalue_tt2: "We must produce at least #Y 15#! @amber! #T Amber#! in our nation. (#R [SCOPE.ScriptValue('androphagian_amber_total_svalue')|0]#!/#Y 15#!)"  #<Wir müssen mindestens #Y 15#! @amber produzieren! #T Amber#! in unserem Land. (#R [SCOPE.ScriptValue('androphagian_amber_total_svalue')|0]#!/#Y 15#!)>  #NT!
  
 germania_main_mission_9_1: "Dawn Of A New Era"  #<Beginn einer neuen Ära>  #NT!
 germania_main_mission_9_1_DESC: "At long last, a new culture has been forged for our people, thanks to the reforming efforts of [ROOT.GetCountry.GetRuler.GetName] to eradicate the lingering traces of our previous ways from our society. Today marks the dawn of a new era - all hail the new germania!\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Dank der Reformbemühungen von [ROOT.GetCountry.GetRuler.GetName] zur Auslöschung der verbleibenden Spuren unserer früheren Verhaltensweisen in unserer Gesellschaft wurde endlich eine neue Kultur für unser Volk geschaffen. Heute bricht eine neue Ära an – alle grüßen das neue Germania!\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
  
 germania_main_mission_9_2: "Rewarding The People"  #<Die Menschen belohnen>  #NT!
 germania_main_mission_9_2_DESC: "After undertaking efforts to ensure that our traditional ways retain their central place within our culture, [ROOT.GetCountry.GetRuler.GetName|Y] is finally satisfied that [ROOT.GetCountry.GetAdjective] morals will not be abandoned by the generations to come and desires to splurge on the masses in a gesture of goodwill.\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!"  #<Nachdem [ROOT.GetCountry.GetRuler.GetName|Y] Anstrengungen unternommen hat, um sicherzustellen, dass unsere traditionellen Bräuche ihren zentralen Platz in unserer Kultur behalten, ist er schließlich davon überzeugt, dass die Moral von [ROOT.GetCountry.GetAdjective] von den kommenden Generationen nicht aufgegeben wird, und möchte in einer Geste des guten Willens an den Massen Geld ausgeben.\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!>  #NT!
  
 germania_main_mission_9_3: "New Nobility"  #<Neuer Adel>  #NT!
 germania_main_mission_9_3_DESC: "Over the years, many of the elites living within throughout the entirety of [ROOT.GetCountry.GetName|T] have left their traditional holdings and made their way to [ROOT.GetCountry.GetCapital.GetName|T], for the capital city of the [ROOT.GetCountry.GetAdjective] people has quickly become the most important city in all of the Germanic lands.\n\nThere is simply no other place that compares in wealth and power to [ROOT.GetCountry.GetCapital.GetName|T], and the noble classes have realized this and embrace the city as their own. \n\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Im Laufe der Jahre haben viele der im gesamten [ROOT.GetCountry.GetName|T] lebenden Eliten ihre traditionellen Besitztümer verlassen und sind nach [ROOT.GetCountry.GetCapital.GetName|T] gegangen, denn die Hauptstadt des Volkes [ROOT.GetCountry.GetAdjective] hat sich schnell zur wichtigsten Stadt in allen germanischen Ländern entwickelt.\n\nEs gibt einfach keinen anderen Ort, der an Reichtum und Macht mit [ROOT.GetCountry.GetCapital.GetName|T] vergleichbar ist, und die Adelsklassen haben dies erkannt und nehmen die Stadt als ihre eigene an. \n\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
  
 germania_main_mission_9_5: "Germanic Trade Hub"  #<Germanisches Handelszentrum>  #NT!
 germania_main_mission_9_5_DESC: "Our home province of [ROOT.GetCountry.GetCapital.GetArea.GetName|T] is known far and wide as a center of commerce, where goods of exquisite craftsmanship and rarity can be found in [ROOT.GetCountry.GetCapital.GetName|T]. [ROOT.GetCountry.GetRuler.GetName|Y] has vowed to do what is necessary in order to make our capital a trade hub.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Unsere Heimatprovinz [ROOT.GetCountry.GetCapital.GetArea.GetName|T] ist weithin als Handelszentrum bekannt, in dem in [ROOT.GetCountry.GetCapital.GetName|T] Waren von exquisiter Handwerkskunst und Seltenheit zu finden sind. [ROOT.GetCountry.GetRuler.GetName|Y] hat geschworen, das Notwendige zu tun, um unsere Hauptstadt zu einem Handelszentrum zu machen.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
  
 germania_main_mission_9_6: "Cities In The Forests"  #<Städte in den Wäldern>  #NT!
 germania_main_mission_9_6_DESC: "It is said that, far to the south, there are cities built along the breeze-kissed coastlines of the #Y Mediterranean#!, where the sun bakes the beaches all day long and the fish jump out of the water and into the nets of the fishermen - is it any surprise that 'civilized' people are as soft as they are?\n\nWe live in a dangerous realm, where the hungry wolf howls in the woodlands and the gods blanket the ground with frost and blood; if we are going to build cities, then many of them will be in these forests that we call home.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!"  #<Man sagt, dass weit im Süden Städte an den windgepeitschten Küsten des #Y Mittelmeers#!, gebaut wurden, wo die Sonne den ganzen Tag über die Strände brennt und die Fische aus dem Wasser in die Netze der Fischer springen – ist es da eine Überraschung, dass „zivilisierte“ Menschen so weich sind wie sie?\n\nWir leben in einem gefährlichen Reich, in dem der hungrige Wolf in den Wäldern heult und die Götter den Boden damit bedecken Frost und Blut; Wenn wir Städte bauen, dann werden viele davon in diesen Wäldern liegen, die wir unser Zuhause nennen.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!>  #NT!
  
 germania_main_mission_9_7: "A Thirst For Wine"  #<Ein Durst nach Wein>  #NT!
 germania_main_mission_9_7_DESC: "Although our ancestors brewed mead and were content with what they could make themselves, their spoiled descendants have acquired a taste for wine @wine! - we simply cannot get enough of the stuff.\n\n[ROOT.GetCountry.GetRuler.GetName|Y] must now slake the thirst of [ROOT.GetCountry.GetRuler.GetHerHis] people by ensuring that a steady stream of fruit of the vine reaches [ROOT.GetCountry.GetCapital.GetName|T]. But who living in our society is worthy to receive the finest wine?\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Obwohl unsere Vorfahren Met brauten und mit dem zufrieden waren, was sie selbst herstellen konnten, haben ihre verwöhnten Nachkommen eine Vorliebe für Wein @wine entwickelt! - Wir können einfach nicht genug davon bekommen.\n\n[ROOT.GetCountry.GetRuler.GetName|Y] muss nun den Durst von [ROOT.GetCountry.GetRuler.GetHerHis] Menschen stillen, indem er dafür sorgt, dass ein stetiger Strom von Früchten des Weinstocks [ROOT.GetCountry.GetCapital.GetName|T] erreicht. Aber wer in unserer Gesellschaft ist es wert, den besten Wein zu erhalten?\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
 germania_main_mission_9_7_tt: "#Y We will decide what to do with the best wine that we are importing.#!"  #<#Y Wir entscheiden, was wir mit dem besten Wein machen, den wir importieren.#!>  #NT!
  
 germania_main_mission_10_1: "Golden Age"  #<Goldenes Zeitalter>  #NT!
 germania_main_mission_10_1_DESC: "Never before have the people of [ROOT.GetCountry.GetName] enjoyed such periods of peace and prosperity. The people embrace [ROOT.GetCountry.GetRuler.GetName] and praise the gods for the leadership of the [ROOT.GetCountry.GetRulerTitle], and with our shores protected by the mightiest navy in our part of the world, [ROOT.GetCountry.GetRuler.GetFirstName] has proclaimed the beginning of a #T Golden Age#!, one that the histories shall remember for thousands of years to come.\n\n\n\n\n\n\n\n\n\n\n@event_pic9!"  #<Noch nie zuvor erlebten die Menschen in [ROOT.GetCountry.GetName] solche Zeiten des Friedens und des Wohlstands. Die Menschen umarmen [ROOT.GetCountry.GetRuler.GetName] und preisen die Götter für die Führung der [ROOT.GetCountry.GetRulerTitle], und da unsere Küsten von der mächtigsten Marine in unserem Teil der Welt geschützt werden, hat [ROOT.GetCountry.GetRuler.GetFirstName] den Beginn eines #T Goldenen Zeitalters#!, verkündet, an das sich die Geschichte noch Tausende von Jahren erinnern wird.\n\n\n\n\n\n\n\n\n\n\n@event_pic9!>  #NT!
  
 germania_main_mission_10_2: "The City"  #<Die Stadt>  #NT!
 germania_main_mission_10_2_DESC: "There are many cities of renown and splendor that are found within [ROOT.GetCountry.GetName|T], and yet [ROOT.GetCountry.GetCapital.GetName|T] stands heads and shoulders above the others as the greatest; a diamond amongst rubies. So great is the [ROOT.GetCountry.GetAdjective|G] capital that many just refer to it as '#Y The City#!', for it needs no other name.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<In [ROOT.GetCountry.GetName|T] gibt es viele Städte voller Ruhm und Pracht, und doch ragt [ROOT.GetCountry.GetCapital.GetName|T] als die Größte um Längen über die anderen; ein Diamant unter Rubinen. Die [ROOT.GetCountry.GetAdjective|G]-Hauptstadt ist so großartig, dass viele sie einfach als „#Y Die Stadt#!',“ bezeichnen, denn sie braucht keinen anderen Namen.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
  
 germania_main_mission_11_1: "The Celtic Games"  #<Die keltischen Spiele>  #NT!
 germania_main_mission_11_1_DESC: "In an attempt to emulate the storied games celebrated by the ancient societies in the south, [ROOT.GetCountry.GetRuler.GetName] has proclaimed the establishment of the so-called #E Celtic Games#!.\n\nWarriors and athletes from all across [ROOT.GetCountry.GetName] will travel to [ROOT.GetCountry.GetCapital.GetName] in order to partake in the event, and a spirit of excitement has gripped the people living within the city as they anxiously await for the games to begin!\n\n\n\n\n\n\n\n\n\n\n@celt_mil1!"  #<In einem Versuch, die sagenumwobenen Spiele der alten Gesellschaften im Süden nachzuahmen, hat [ROOT.GetCountry.GetRuler.GetName] die Gründung der sogenannten #E Celtic Games#!.\n\nWarriors ausgerufen und Sportler aus ganz [ROOT.GetCountry.GetName] werden nach [ROOT.GetCountry.GetCapital.GetName] reisen, um an der Veranstaltung teilzunehmen, und eine Stimmung der Aufregung hat die Menschen in der Stadt erfasst, während sie sehnsüchtig auf die Spiele warten beginnen!\n\n\n\n\n\n\n\n\n\n\n@celt_mil1!>  #NT!
  
 germania_main_mission_11_2: "The Road Forward"  #<Der Weg nach vorn>  #NT!
 germania_main_mission_11_2_DESC: "As of late, [ROOT.GetCountry.GetRuler.GetName|Y] has been in a pensive mood as [ROOT.GetCountry.GetRuler.GetSheHe] considers weighty questions of the past and the future. Much has changed for the people of [ROOT.GetCountry.GetName|T] over the last years, more than has ever happened to our country before - is it fair to say that we are the same as we once were, or have we changed into something else? Perhaps this moment is a new beginning for what our people will eventually become.\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!"  #<In letzter Zeit war [ROOT.GetCountry.GetRuler.GetName|Y] in einer nachdenklichen Stimmung, während [ROOT.GetCountry.GetRuler.GetSheHe] über gewichtige Fragen der Vergangenheit und der Zukunft nachdenkt. Für die Menschen in [ROOT.GetCountry.GetName|T] hat sich in den letzten Jahren viel verändert, mehr als jemals zuvor in unserem Land – kann man mit Fug und Recht sagen, dass wir die gleichen sind wie früher, oder haben wir uns in etwas anderes verändert? Vielleicht ist dieser Moment ein Neuanfang für das, was aus unserem Volk letztendlich werden wird.\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!>  #NT!
 you_need_to_form_germania_tt: "We need to take the decision to #Y Form Germania#!."  #<Wir müssen die Entscheidung treffen, #Y Germania zu bilden#!.>  #NT!
  
 germania_main_mission_11_3: ""
 germania_main_mission_11_3_DESC: ""
  
 #Events 
  
 me_germania_1_title: "Royal Regalia"  #<Königliche Insignien>  #NT!
 me_germania_1_desc: "On a day that few believed would ever come to pass, [ROOT.GetCountry.GetRuler.GetName], [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName], was blessed by #E Druids#! from [GetProvince('(int32)2012').GetName] that had traveled all the way to [ROOT.GetCountry.GetCapital.GetName] with gifts for the new monarch.\n\nIn a sign of their respect and affection for the famous ruler of the [ROOT.GetCountry.GetAdjective] people, [ROOT.GetCountry.GetRuler.GetFirstName] and [ROOT.GetCountry.GetRuler.GetHerHis] progeny have been hailed by the Druids as the founders of a new dynasty; the #E House of [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]#!. The gods have blessed the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] family beyond measure and have set them as the divinely-appointed rulers of the Germanic tribes, and in order to cement their authority amongst their kinsmen throughout the ages to come, three artifacts of legendary power have been brought by the Druids and presented as gifts - [ROOT.GetCountry.GetRuler.GetFirstName] must now choose what will serve as [ROOT.GetCountry.GetRuler.GetHerHis] imperial regalia."  #<An einem Tag, von dem nur wenige glaubten, dass er jemals eintreten würde, wurde [ROOT.GetCountry.GetRuler.GetName], [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName] von #E Druiden#! von [GetProvince('(int32)2012').GetName] gesegnet, die den ganzen Weg nach [ROOT.GetCountry.GetCapital.GetName] gereist waren, mit Geschenken für den neuen Monarchen.\n\nAls Zeichen ihres Respekts und ihrer Zuneigung für den berühmten Herrscher des Volkes [ROOT.GetCountry.GetAdjective], [ROOT.GetCountry.GetRuler.GetFirstName] und [ROOT.GetCountry.GetRuler.GetHerHis] Nachkommen wurden von den Druiden als Gründer einer neuen Dynastie gefeiert; das #E Haus von [ROOT.GetCountry.GetRulerTitle]1#!. Die Götter haben die Familie [ROOT.GetCountry.GetRulerTitle]1 über alle Maßen gesegnet und sie zu den göttlich eingesetzten Herrschern der germanischen Stämme ernannt. Um ihre Autorität unter ihren Verwandten für die kommenden Zeitalter zu festigen, wurden drei Artefakte von legendärer Macht von den Druiden mitgebracht und als Geschenke präsentiert – [ROOT.GetCountry.GetRuler.GetFirstName] muss nun auswählen, was als [ROOT.GetCountry.GetRuler.GetHerHis] kaiserliche Insignien dienen soll.>  #NT!
 me_germania.1.a: "The ring shall be the symbol of my royal authority"  #<Der Ring soll das Symbol meiner königlichen Autorität sein>  #NT!
 me_germania.1.b: "Travelers will come from afar to pay obeisance before my throne"  #<Reisende werden von weit her kommen, um vor meinem Thron ihre Ehrerbietung zu erweisen>  #NT!
 me_germania.1.c: "I will craft a spear used by true [ROOT.GetCountry.GetAdjective] warriors"  #<Ich werde einen Speer herstellen, der von wahren [ROOT.GetCountry.GetAdjective]-Kriegern verwendet wird>  #NT!
 me_germania_1_tooltip: "The mission task '#Y Royal Regalia#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Royal Regalia#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_2_title: "The Well Of Wodenaz"  #<Der Brunnen von Wodenaz>  #NT!
 me_germania_2_desc: "The arrival of [SCOPE.sCharacter('priest').GetName] to the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] household always puts [ROOT.GetCountry.GetRuler.GetName] at edge, for the #E High Priest#! never deigns to visit unless there is some grave matter at hand, and today's unexpected meeting unfortunately proved this adage to be true once again.\n\nThis time, [ROOT.GetCountry.Custom('get_harvest_goddess')] did not disturb [SCOPE.sCharacter('priest').GetFirstName]'s slumbers, but instead, the god [GetDeityDefinition('omen_wodenaz').GetName] was appearing in [SCOPE.sCharacter('priest').GetHerHis] dreams with an urgent command.\n\nThe gods of [ROOT.GetCountry.GetName] had peered into the heart and soul of [ROOT.GetCountry.GetRuler.GetFirstName] and had discovered the true depths of [ROOT.GetCountry.GetRuler.GetHerHis] ambitions, and if the [ROOT.GetCountry.GetRulerTitle] wished to see all that [ROOT.GetCountry.GetRuler.GetSheHe] desired come to pass, then [ROOT.GetCountry.GetRuler.GetSheHe] must leave [ROOT.GetCountry.GetCapital.GetName] and head to the far north on a holy pilgrimage. If [ROOT.GetCountry.GetRuler.GetFirstName] was found to be worthy, then a great gift would be revealed to [ROOT.GetCountry.GetName], but the [ROOT.GetCountry.GetRulerTitle] would have to make a great sacrifice."  #<Die Ankunft von [SCOPE.sCharacter('priest').GetName] im Haushalt von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] bringt [ROOT.GetCountry.GetRuler.GetName] immer in Aufruhr, denn der Hohepriester von #E#! lässt sich nie zu einem Besuch herab, es sei denn, es liegt eine ernste Angelegenheit vor, und das heutige unerwartete Treffen hat leider wieder einmal bewiesen, dass dieses Sprichwort wahr ist.\n\nDieses Mal störte [ROOT.GetCountry.Custom('get_harvest_goddess')] nicht den Schlaf von [SCOPE.sCharacter('priest').GetFirstName], sondern stattdessen der Gott [GetDeityDefinition('omen_wodenaz').GetName] erschien in [SCOPE.sCharacter('priest').GetHerHis] Träumen mit einem dringenden Befehl.\n\nDie Götter von [ROOT.GetCountry.GetName] hatten in das Herz und die Seele von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]0 geblickt und die wahren Tiefen der Ambitionen von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]1 entdeckt, und wenn die [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]2 alles sehen wollten, was [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]3 sich wünschte, dann musste [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]3 [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]5 verlassen und gehen in den hohen Norden auf einer heiligen Pilgerreise. Wenn [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]0 als würdig befunden würde, würde [ROOT.GetCountry.GetName] ein großes Geschenk erhalten, aber [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]2 müsste ein großes Opfer bringen.>  #NT!
 me_germania.2.a: "Interesting...I will embark upon this adventure"  #<Interessant ... Ich werde mich auf dieses Abenteuer einlassen>  #NT!
 me_germania.2.b: "[ROOT.GetCountry.GetName] needs my steady hand to guide it - I cannot leave"  #<[ROOT.GetCountry.GetName] braucht meine ruhige Hand, um es zu führen – ich kann nicht gehen>  #NT!
 me_germania_2_tooltip: "The mission task '#Y The Well Of Wodenaz#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Der Brunnen von Wodenaz#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_3_title: "Suppressing the Elites"  #<Unterdrückung der Eliten>  #NT!
 me_germania_3_desc: "It has become widely known throughout [ROOT.GetCountry.GetName] that the gods commune with [ROOT.GetCountry.GetRuler.GetName] and have given their divine blessings to the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] household; after everything that [ROOT.GetCountry.GetRuler.GetFirstName] has accomplished, who can deny what is so plainly obvious to see? To oppose [ROOT.GetCountry.GetRuler.GetFirstName] is to stand against the very gods themselves.\n\nConfident in [ROOT.GetCountry.GetRuler.GetHerHis] ability to enforce [ROOT.GetCountry.GetRuler.GetHerHis] will, [ROOT.GetCountry.GetRuler.GetFirstName] has declared that [ROOT.GetCountry.GetRuler.GetSheHe] desires to establish a royal dynasty in [ROOT.GetCountry.GetCapital.GetName] that will rule over our people until the end of days.  "  #<Es ist im Laufe von [ROOT.GetCountry.GetName] weithin bekannt geworden, dass die Götter mit [ROOT.GetCountry.GetRuler.GetName] kommunizieren und dem Haushalt von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] ihren göttlichen Segen gegeben haben; Wer kann nach allem, was [ROOT.GetCountry.GetRuler.GetFirstName] erreicht hat, leugnen, was so offensichtlich zu sehen ist? Sich [ROOT.GetCountry.GetRuler.GetFirstName] zu widersetzen bedeutet, sich gegen die Götter selbst zu stellen.\n\nIm Vertrauen auf die Fähigkeit von [ROOT.GetCountry.GetRuler.GetHerHis], den Willen von [ROOT.GetCountry.GetRuler.GetHerHis] durchzusetzen, hat [ROOT.GetCountry.GetRuler.GetFirstName] erklärt, dass [ROOT.GetCountry.GetRuler.GetSheHe] in [ROOT.GetCountry.GetCapital.GetName] eine königliche Dynastie gründen möchte, die bis zum Ende aller Tage über unser Volk herrschen wird.>  #NT!
 me_germania.3.a: "Very soon, I will make an important decision regarding our future"  #<Sehr bald werde ich eine wichtige Entscheidung bezüglich unserer Zukunft treffen>  #NT!
 me_germania_3_tooltip: "The mission task '#Y Suppressing the Elites#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Unterdrückung der Eliten#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_4_title: "Respect For The Elders"  #<Respekt vor den Älteren>  #NT!
 me_germania_4_desc: "[ROOT.GetCountry.GetRuler.GetName] has pleased many with [ROOT.GetCountry.GetRuler.GetHerHis] decision to defer to the Tribal Elders in matters both great and small moving forward.\n\nIt would have been a very easy for thing for [ROOT.GetCountry.GetRuler.GetFirstName] to simply have taken all political power for [ROOT.GetCountry.GetRuler.GetHerHim]self, but the decision of the brand-new [ROOT.GetCountry.GetRulerTitle|E], a powerful leader in the #E [ROOT.GetCountry.GetAdjective] Senate#!, shows a maturity and wisdom that reveals not only [ROOT.GetCountry.GetRuler.GetHerHis] love of tradition, but an understanding of how the game is meant to be played."  #<[ROOT.GetCountry.GetRuler.GetName] hat viele mit der Entscheidung von [ROOT.GetCountry.GetRuler.GetHerHis] zufrieden gestellt, sich künftig in großen und kleinen Angelegenheiten den Stammesältesten zu unterwerfen.\n\nEs wäre für [ROOT.GetCountry.GetRuler.GetFirstName] sehr einfach gewesen, einfach alle politische Macht für sich selbst zu übernehmen, aber die Entscheidung des brandneuen [ROOT.GetCountry.GetRulerTitle|E], eines mächtigen Anführers im #E [ROOT.GetCountry.GetAdjective] Senat#!,, zeigt eine Reife und Weisheit, die offenbart nicht nur [ROOT.GetCountry.GetRuler.GetHerHis] Liebe zur Tradition, sondern auch ein Verständnis dafür, wie das Spiel gespielt werden soll.>  #NT!
 me_germania.4.a: "The wise rulings of the Elders have never led us astray"  #<Die weisen Entscheidungen der Ältesten haben uns nie in die Irre geführt>  #NT!
 me_germania_4_tooltip: "The mission task '#Y Respect For The Elders#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Respekt vor den Ältesten#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_5_title: "Rex Germanorum"  #<Rex Germanorum>  #NT!
 me_germania_5_desc: "In retrospect, it should have been obvious to the #E Tribal Chieftains#! serving under the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clan and their kinsmen, but by the time that those with power within [ROOT.GetCountry.GetName] realized what was happening, it was far too late to do anything about it.\n\n [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName], the power-hungry head of the most powerful family living within [ROOT.GetCountry.GetCapital.GetName], had consolidated enough personal authority and had bought off enough cronies to seize the crown for [ROOT.GetCountry.GetRuler.GetHerHim]self, and [ROOT.GetCountry.GetRuler.GetFirstName] would become known to history as the founder of the first dynasty of #E Germanic Kings#!.\n\nFrom this day forth, no longer would Councils of Elders gather under the watchful eyes of the #E Druids#! to interpret the omens and the will of the gods, for all authority had been be placed into the arms of [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Kings and Queens ruling from their ancestral home at [ROOT.GetCountry.GetCapital.GetName]."  #<Im Nachhinein hätte es den #E Stammeshäuptlingen#!, die unter dem Clan [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] dienten, und ihren Verwandten klar sein müssen, aber als die Machthaber in [ROOT.GetCountry.GetName] erkannten, was geschah, war es viel zu spät, etwas dagegen zu unternehmen.\n\n [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName], das machthungrige Oberhaupt der mächtigsten Familie, die in [ROOT.GetCountry.GetCapital.GetName] lebte, hatte genug persönliche Autorität gefestigt und hatte genügend Kumpane abgekauft, um die Krone für sich selbst zu erobern, und [ROOT.GetCountry.GetRuler.GetFirstName] sollte in die Geschichte als Gründer der ersten Dynastie der #E germanischen Könige#! eingehen.\n\nVon diesem Tag an versammelten sich keine Ältestenräte mehr unter den wachsamen Augen der #E Druiden#!, um die Vorzeichen und den Willen der Götter für alle zu interpretieren Die Autorität wurde in die Arme von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Königen und Königinnen gelegt, die am [ROOT.GetCountry.GetCapital.GetName] von ihrem Stammsitz aus regierten.>  #NT!
 me_germania.5.a: "All hail [ROOT.GetCountry.GetName] and the royal family!"  #<Alle grüßen [ROOT.GetCountry.GetName] und die königliche Familie!>  #NT!
 me_germania_5_tooltip: "The mission task '#Y Rex Germanorum#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Rex Germanorum#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_6_title: "Favor Of The Gods"  #<Gunst der Götter>  #NT!
 me_germania_6_desc: "The carnyx has ceased in its bloodthirsty lamentations and our war-weary levies remain at home with their tribes, grateful for a rare season of peace to attend to their families and their affairs. It will not be long before [ROOT.GetCountry.GetRuler.GetName] calls them to battle, but for now, they can sleep by their own hearths and not on the hard ground of a [ROOT.GetCountry.GetAdjective] warcamp. A religious festival was proclaimed in the capital in honor of the spoils of war that victory has secured for us; we have many things to be thankful for.\n\nIt was during this moment of respite at [ROOT.GetCountry.GetCapital.GetName] that [SCOPE.sCharacter('priest').GetName] revealed to [ROOT.GetCountry.GetRuler.GetFirstName] the secret of the strange visions that were plaguing the High Priest's dreams; the god of the harvest, [ROOT.GetCountry.Custom('get_harvest_goddess')], walked through the forests of [ROOT.GetCountry.GetCapital.GetArea.GetRegion.GetName] sprinkling handfuls of seeds onto the ground. As every piece of grain touched the damp earth of the [ROOT.GetCountry.GetAdjective] hinterlands, a building of stone emerged from the earth like a budding flower, and in the footsteps of the Protector of the Harvests, cities sprouted in the dark woodlands like mushrooms after the rain. \n\nAThe message of [ROOT.GetCountry.Custom('get_harvest_goddess')] was clear; we must plant and build cities throughout [ROOT.GetCountry.GetName]."  #<Der Carnyx hat in seinen blutrünstigen Wehklagen aufgehört und unsere kriegsmüden Truppen bleiben zu Hause bei ihren Stämmen, dankbar für eine seltene Zeit des Friedens, in der sie sich um ihre Familien und ihre Angelegenheiten kümmern können. Es wird nicht lange dauern, bis [ROOT.GetCountry.GetRuler.GetName] sie zum Kampf ruft, aber vorerst können sie an ihrem eigenen Herd schlafen und nicht auf dem harten Boden eines [ROOT.GetCountry.GetAdjective]-Kriegslagers. Zu Ehren der Kriegsbeute, die uns der Sieg beschert hat, wurde in der Hauptstadt ein religiöses Fest ausgerufen; Wir haben viele Dinge, für die wir dankbar sein können.\n\nIn diesem Moment der Ruhe bei [ROOT.GetCountry.GetCapital.GetName] enthüllte [SCOPE.sCharacter('priest').GetName] [ROOT.GetCountry.GetRuler.GetFirstName] das Geheimnis der seltsamen Visionen, die die Träume des Hohepriesters plagten; Der Gott der Ernte, [ROOT.GetCountry.Custom('get_harvest_goddess')], ging durch die Wälder von [ROOT.GetCountry.GetCapital.GetArea.GetRegion.GetName] und streute Handvoll Samen auf den Boden. Als jedes Stück Korn die feuchte Erde des Hinterlandes von [ROOT.GetCountry.GetAdjective] berührte, erhob sich ein Gebäude aus Stein wie eine aufkeimende Blume aus der Erde, und in den Fußstapfen des Beschützers der Ernten sprossen in den dunklen Wäldern Städte wie Pilze nach dem Regen. \n\nADie Botschaft von [ROOT.GetCountry.Custom('get_harvest_goddess')] war klar; Wir müssen im gesamten [ROOT.GetCountry.GetName] Städte gründen und bauen.>  #NT!
 me_germania.6.a: "If [ROOT.GetCountry.Custom('get_harvest_goddess')] desires that we build cities, then it must be done"  #<Wenn [ROOT.GetCountry.Custom('get_harvest_goddess')] möchte, dass wir Städte bauen, dann muss es getan werden>  #NT!
 me_germania.6.b: "I shall personally decide how [ROOT.GetCountry.GetName] makes her investments..."  #<Ich werde persönlich entscheiden, wie [ROOT.GetCountry.GetName] ihre Investitionen tätigt ...>  #NT!
 me_germania_6_tooltip: "The mission task '#Y A Centralized Power#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eine zentralisierte Macht#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_7_title: "Blood Of The Germanic Kings"  #<Blut der germanischen Könige>  #NT!
 me_germania_7_desc: "In the decades and centuries to come, the name of the #E [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clan#! would remain an important one in the histories of the [ROOT.GetCountry.GetAdjective] people and their #E Germanic#! descendants, for the accomplishments of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]s had laid the foundation for the future glories.\n\nBy unifying the many smaller tribes into one and investing heavily in the infrastructure of the realm, the [ROOT.GetCountry.GetAdjective]s had slowly created something akin to a national identity in the process, and the songs and poems of the common people would immortalize the deeds of [ROOT.GetCountry.GetRuler.GetName], who would become known as a folk hero.\n\nTo be related to the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] family was one of the highest honors in Germanic society, and carrying the prestigious bloodline was considered to be the mark of true nobility."  #<In den kommenden Jahrzehnten und Jahrhunderten würde der Name des #E [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clans#! ein wichtiger Name in der Geschichte des [ROOT.GetCountry.GetAdjective]-Volkes und seiner #E germanischen#!-Nachkommen bleiben, denn die Errungenschaften der [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] hatten den Grundstein für den zukünftigen Ruhm gelegt.\n\nDurch die Vereinigung der vielen kleineren Stämme zu einem und umfangreiche Investitionen in die Infrastruktur des In diesem Reich hatten die [ROOT.GetCountry.GetAdjective] langsam so etwas wie eine nationale Identität geschaffen, und die Lieder und Gedichte des einfachen Volkes sollten die Taten von [ROOT.GetCountry.GetRuler.GetName] verewigen, der als Volksheld bekannt werden sollte.\n\nMit der Familie [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] verwandt zu sein war eine der höchsten Auszeichnungen in der germanischen Gesellschaft, und das Tragen der prestigeträchtigen Blutlinie galt als Zeichen wahren Adels.>  #NT!
 me_germania.7.a: "Far and wide, the name of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] family is revered"  #<Der Name der Familie [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] wird weithin verehrt>  #NT!
 me_germania_7_tooltip: "The mission task '#Y Blood Of The Germanic Kings#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Blut der germanischen Könige#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_8_title: "The Sea Belongs To Us"  #<Das Meer gehört uns>  #NT!
 me_germania_8_desc: "Now that we have built a proper fleet that is worthy of [ROOT.GetCountry.GetName], our intrepid sailors have boldly announced that they shall sail farther than anyone has ever before - we claim the open seas at their own, and all for the glory of the [ROOT.GetCountry.GetAdjective] people!\n\nBecause we are relatively inexperienced when it comes to constructing fleets, [ROOT.GetCountry.GetRuler.GetName] has commanded our naval forces to train hard to make up for this deficit."  #<Nachdem wir nun eine richtige Flotte aufgebaut haben, die [ROOT.GetCountry.GetName] würdig ist, haben unsere unerschrockenen Seeleute mutig angekündigt, dass sie weiter segeln werden als jemals zuvor – wir beanspruchen die offenen Meere für uns, und das alles zum Ruhm des [ROOT.GetCountry.GetAdjective]-Volkes!\n\nDa wir relativ unerfahren sind, wenn es um den Aufbau von Flotten geht, hat [ROOT.GetCountry.GetRuler.GetName] unseren Seestreitkräften befohlen, hart zu trainieren, um dieses Defizit auszugleichen.>  #NT!
 me_germania.8.a: "The task before you is difficult, but would you have it any other way?"  #<Die Aufgabe, die vor Ihnen liegt, ist schwierig, aber würden Sie es auch anders angehen?>  #NT!
 me_germania_8_tooltip: "The mission task '#Y The Sea Belongs To Us#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Das Meer gehört uns#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_9_title: "Professional Raiders"  #<Professionelle Raider>  #NT!
 me_germania_9_desc: "The love that [ROOT.GetCountry.GetRuler.GetName] has for raiding the undefended lands of our enemies cannot be overstated; the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] would spend all of [ROOT.GetCountry.GetRuler.GetHerHis] time burning villages and slaughtering the weak if [ROOT.GetCountry.GetRuler.GetSheHe] could.\n\nWhen some of [ROOT.GetCountry.GetRuler.GetHerHis] closest advisors suggested that we take steps to increase the deadly effectiveness of our raiders, [ROOT.GetCountry.GetRuler.GetFirstName] wholeheartedly agreed, promising to turn the full resources of [ROOT.GetCountry.GetName] towards solving the problem at hand."  #<Die Liebe, die [ROOT.GetCountry.GetRuler.GetName] für die Plünderung der unverteidigten Länder unserer Feinde hegt, kann nicht hoch genug eingeschätzt werden. Die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] würden ihre gesamte [ROOT.GetCountry.GetRuler.GetHerHis] Zeit damit verbringen, Dörfer niederzubrennen und die Schwachen abzuschlachten, wenn [ROOT.GetCountry.GetRuler.GetSheHe] könnte.\n\nAls einige der [ROOT.GetCountry.GetRuler.GetHerHis] engsten Berater vorschlugen, dass wir Maßnahmen ergreifen sollten, um die tödliche Effektivität unserer Räuber zu erhöhen, stimmte [ROOT.GetCountry.GetRuler.GetFirstName] voll und ganz zu und versprach, die gesamten Ressourcen von [ROOT.GetCountry.GetName] für die Lösung des vorliegenden Problems einzusetzen.>  #NT!
 me_germania.9.a: "We must take every measure available to protect our men"  #<Wir müssen alle verfügbaren Maßnahmen ergreifen, um unsere Männer zu schützen>  #NT!
 me_germania.9.b: "Focus on Tribal Chieftains and tell them to do as they please"  #<Konzentrieren Sie sich auf die Stammeshäuptlinge und sagen Sie ihnen, sie sollen tun, was sie wollen>  #NT!
 me_germania_9_tooltip: "The mission task '#Y Professional Raiders#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Professional Raiders#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_11_title: "Call Of The Wild"  #<Ruf der Wildnis>  #NT!
 me_germania_11_desc: "Although [ROOT.GetCountry.GetRuler.GetName] is the one that is primarily responsible for the changes in our society, [ROOT.GetCountry.GetRuler.GetSheHe] acknowledges that not all living within [ROOT.GetCountry.GetName] are thrilled seeing permanent structures built in the forests and fields that nurtured our ancestors. How can a man sleep at night without seeing the canopy of the stars above him? Are we truly meant to spend our days toiling in the fields, breaking up clods of dirt with our hands and implements of iron?\n\nMany say no. The whispering of the wind and the murmuring of the brook has filled their heads with promises of a simpler life, like the one that their fathers enjoyed, and many tribes have sent their Elders to [ROOT.GetCountry.GetCapital.GetName] in order to ask for permission to migrate into unclaimed territories. Once [ROOT.GetCountry.GetRuler.GetFirstName] realized that some of our countrymen were willing to abandon all that they knew in order to heed the call of the wild, every effort was made to support them, even though the costs involved were substantial."  #<Obwohl [ROOT.GetCountry.GetRuler.GetName] in erster Linie für die Veränderungen in unserer Gesellschaft verantwortlich ist, erkennt [ROOT.GetCountry.GetRuler.GetSheHe] an, dass nicht alle Bewohner von [ROOT.GetCountry.GetName] begeistert sind, wenn dauerhafte Strukturen in den Wäldern und Feldern errichtet werden, in denen unsere Vorfahren lebten. Wie kann ein Mann nachts schlafen, ohne das Sternendach über sich zu sehen? Sind wir wirklich dazu bestimmt, unsere Tage damit zu verbringen, auf den Feldern zu schuften und mit unseren Händen und eisernen Werkzeugen Erdklumpen aufzubrechen?\n\nViele sagen nein. Das Flüstern des Windes und das Rauschen des Baches haben ihre Köpfe mit Versprechungen eines einfacheren Lebens erfüllt, wie das, das ihre Väter genossen, und viele Stämme haben ihre Ältesten nach [ROOT.GetCountry.GetCapital.GetName] geschickt, um um Erlaubnis zu bitten, in nicht beanspruchte Gebiete auszuwandern. Als [ROOT.GetCountry.GetRuler.GetFirstName] erkannte, dass einige unserer Landsleute bereit waren, alles, was sie kannten, aufzugeben, um dem Ruf der Wildnis zu folgen, wurden alle Anstrengungen unternommen, um sie zu unterstützen, auch wenn die damit verbundenen Kosten erheblich waren.>  #NT!
 me_germania.11.a: "There is no price for happiness - go with my blessing"  #<Es gibt keinen Preis für Glück – geh mit meinem Segen>  #NT!
 me_germania_11_tooltip: "The mission task '#Y Call Of The Wild#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Call Of The Wild#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_12_title: "Great Germanic Republic"  #<Große Germanische Republik>  #NT!
 me_germania_12_desc: "Far and wide are our deeds hailed, and it is all thanks to the selfless leadership of [ROOT.GetCountry.GetRuler.GetName] that our reputation has become known throughout the civilized world. The list of glories is endless; our borders have expanded and grown, our warriors have brought us countless victories, and our trade goods are highly desired in markets far from the workshops that produce them. The sons and grandsons of humble tribesmen have built something that they should truly be proud of."  #<Weit und breit werden unsere Taten gefeiert, und es ist der selbstlosen Führung von [ROOT.GetCountry.GetRuler.GetName] zu verdanken, dass unser Ruf in der gesamten zivilisierten Welt bekannt geworden ist. Die Liste der Herrlichkeiten ist endlos; Unsere Grenzen haben sich ausgedehnt und sind gewachsen, unsere Krieger haben uns unzählige Siege beschert und unsere Handelswaren sind auf Märkten weit entfernt von den Werkstätten, in denen sie hergestellt werden, sehr begehrt. Die Söhne und Enkel bescheidener Stammesangehöriger haben etwas gebaut, auf das sie wirklich stolz sein sollten.>  #NT!
 me_germania.12.a: "I can feel my ancestors smiling upon me..."  #<Ich spüre, wie meine Vorfahren mich anlächeln ...>  #NT!
 me_germania_12_tooltip: "The mission task '#Y Great Germanic Republic#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Große Germanische Republik#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_13_title: "Putting Down Roots"  #<Wurzeln schlagen>  #NT!
 me_germania_13_desc: "[ROOT.GetCountry.GetRuler.GetName] cannot help but be impressed by the tenacity of [ROOT.GetCountry.GetRuler.GetHerHis] people, for any task that the [ROOT.GetCountry.GetRulerTitle] places before them is accomplished with an ease that puts neighboring tribes to shame.\n\nNot only have we driven our enemies from the battlefield time and time again, but our kinsmen have excelled when it comes to building our infrastructure, especially in [ROOT.GetCountry.GetCapital.GetName]. We are building permanent structures of stone in our capital, planting crops in the hinterland and clearing the fields of brush and weeds. Like a tree budding in springtime, our civilization is slowly beginning to sprout."  #<[ROOT.GetCountry.GetRuler.GetName] kann nicht umhin, von der Hartnäckigkeit der [ROOT.GetCountry.GetRuler.GetHerHis] Menschen beeindruckt zu sein, denn jede Aufgabe, die die [ROOT.GetCountry.GetRulerTitle] ihnen stellen, wird mit einer Leichtigkeit erledigt, die benachbarte Stämme in den Schatten stellt.\n\nWir haben nicht nur unsere Feinde immer wieder vom Schlachtfeld vertrieben, auch unsere Verwandten haben sich beim Aufbau unserer Infrastruktur hervorgetan, insbesondere in [ROOT.GetCountry.GetCapital.GetName]. Wir bauen in unserer Hauptstadt dauerhafte Steinbauten, pflanzen im Hinterland Feldfrüchte an und befreien die Felder von Gestrüpp und Unkraut. Wie ein Baum, der im Frühling sprießt, beginnt unsere Zivilisation langsam zu sprießen.>  #NT!
 me_germania.13.a: "A tree is only as strong as its roots - let us grow"  #<Ein Baum ist nur so stark wie seine Wurzeln – lasst uns wachsen>  #NT!
 me_germania_13_tooltip: "The mission task '#Y Putting Down Roots#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Wurzeln schlagen#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_14_title: "Grand Germanic Harbor"  #<Großer germanischer Hafen>  #NT!
 me_germania_14_desc: "When news arrived in the capital that the so-called #E 'Grand Germanic Harbor'#! had recently finished its construction, [ROOT.GetCountry.GetRuler.GetName] personally made the trip to the shore to witness the maiden voyage of the first [ROOT.GetCountry.GetAdjective] navy built within its drydock.\n\nAlthough there were some technical difficulties at first - the captain of the ship had a tricky time dealing with the blustering northern wind and was unable to get out of port - our newly-christened sailors were able to sail out into the #E Oceanus Sarmaticus#!, causing the gathered crowd to cheer as one. Our ships made a few maneuvers out in the sea, running battle formations with a skill that belied their realative inexperience, and [ROOT.GetCountry.GetRuler.GetFirstName] was impressed by how quickly the [ROOT.GetCountry.GetAdjective] sailors were taking to the waters."  #<Als in der Hauptstadt die Nachricht eintraf, dass der sogenannte #E „Großgermanische Hafen“#! kürzlich seinen Bau abgeschlossen hatte, machte sich [ROOT.GetCountry.GetRuler.GetName] persönlich auf den Weg an die Küste, um der Jungfernfahrt der ersten [ROOT.GetCountry.GetAdjective] Marine beizuwohnen, die in seinem Trockendock gebaut wurde.\n\nObwohl es zunächst einige technische Schwierigkeiten gab, hatte der Kapitän des Schiffes Schwierigkeiten, mit dem stürmischen Nordwind umzugehen, und konnte den Hafen – unseren – nicht verlassen Frisch getaufte Seeleute konnten auf den #E Oceanus Sarmaticus#! hinaussegeln, was die versammelte Menge zum Jubeln brachte. Unsere Schiffe machten ein paar Manöver draußen auf dem Meer und führten Kampfformationen mit einem Geschick, das über ihre tatsächliche Unerfahrenheit hinwegtäuschte, und [ROOT.GetCountry.GetRuler.GetFirstName] war beeindruckt, wie schnell die [ROOT.GetCountry.GetAdjective] Seeleute ins Wasser gingen.>  #NT!
 me_germania.14.a: "This bodes well for our future success at sea!"  #<Das verheißt Gutes für unseren zukünftigen Erfolg auf See!>  #NT!
 me_germania_14_tooltip: "The mission task '#Y Grand Germanic Harbor#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Großer Germanischer Hafen#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_15_title: "Raise The Ramparts"  #<Errichtet die Stadtmauer>  #NT!
 me_germania_15_desc: "Although it took many months of backbreaking labor, our weary tribal warriors were able to set aside their spears for a fighting season and buttress the fortifications protecting [ROOT.GetCountry.GetCapital.GetName]. [ROOT.GetCountry.GetRuler.GetName] was worried that our soldiers would balk at being asked to serve [ROOT.GetCountry.GetName] in this manner, but surprisingly, there were no complaints; our armies gave up the opportunity to raid our enemies during the hottest months and instead spent many miserable weeks digging moats around the capital and raising the earth around our city's walls.\n\nWhen the exchausting work was finally finished, [ROOT.GetCountry.GetRuler.GetFirstName] was overwhelmed with emotion and gave a public speech thanking our kinsmen for what they had accomplished."  #<Obwohl es viele Monate harter Arbeit erforderte, konnten unsere müden Stammeskrieger ihre Speere für eine Kampfsaison beiseite legen und die Befestigungen zum Schutz von [ROOT.GetCountry.GetCapital.GetName] verstärken. [ROOT.GetCountry.GetRuler.GetName] befürchtete, dass unsere Soldaten davor zurückschrecken würden, [ROOT.GetCountry.GetName] auf diese Weise zum Dienst aufgefordert zu werden, aber überraschenderweise gab es keine Beschwerden; Unsere Armeen verzichteten in den heißesten Monaten auf die Gelegenheit, unsere Feinde zu überfallen, und verbrachten stattdessen viele elende Wochen damit, Gräben rund um die Hauptstadt auszuheben und die Erde um die Mauern unserer Stadt herum aufzuschütten.\n\nAls die anstrengende Arbeit endlich beendet war, war [ROOT.GetCountry.GetRuler.GetFirstName] von Emotionen überwältigt und hielt eine öffentliche Rede, in der er unseren Verwandten für das, was sie erreicht hatten, dankte.>  #NT!
 me_germania.15.a: "The sacrifices made here will protect your grandchildren's children..."  #<Die hier erbrachten Opfer werden die Kinder Ihrer Enkel schützen ...>  #NT!
 me_germania_15_tooltip: "The mission task '#Y Raise The Ramparts#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Raise The Walls#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_16_title: "The Amber Coast"  #<Die Bernsteinküste>  #NT!
 me_germania_16_desc: "Thanks to the combined efforts of our tribesmen harvesting amber @amber! from the forests and our craftsmen and merchants selling it to foreigners, the treasuries of [ROOT.GetCountry.GetName] are swelling; we trade our golden sap for golden coins, which is an arrangement that suits our people rather nicely.\n\nFaced with a healthy surplus, [ROOT.GetCountry.GetRuler.GetName] has a decision to make; how should these funds be used?"  #<Dank der gemeinsamen Anstrengungen unserer Stammesangehörigen bei der Bernsteinernte @amber! Durch die Wälder und unsere Handwerker und Händler, die es an Ausländer verkaufen, schwellen die Schätze von [ROOT.GetCountry.GetName] an; Wir tauschen unseren goldenen Saft gegen goldene Münzen, was unserem Volk recht gut passt.\n\nAngesichts eines gesunden Überschusses muss [ROOT.GetCountry.GetRuler.GetName] eine Entscheidung treffen; Wie sollen diese Mittel verwendet werden?>  #NT!
 me_germania.16.a: "Let us save this money for a rainy day..."  #<Lassen Sie uns dieses Geld für einen regnerischen Tag sparen ...>  #NT!
 me_germania.16.b: "We should reinvest our money back into the amber trade"  #<Wir sollten unser Geld wieder in den Bernsteinhandel investieren>  #NT!
 me_germania_16_tooltip: "The mission task '#Y The Amber Coast#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Die Bernsteinküste#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_17_title: "A New Capital"  #<Eine neue Hauptstadt>  #NT!
 me_germania_17_desc: "Now that we are a mighty empire and no longer a kingdom or confederacy of tribal chieftains, some have proposed that we move the seat of government from [ROOT.GetCountry.GetCapital.GetName] to a new place. A brand new capital could represent a new future for the people of [ROOT.GetCountry.GetName] as we come together to establish a new home - a thought which appeals to [ROOT.GetCountry.GetRuler.GetName] - but [ROOT.GetCountry.GetRuler.GetSheHe] will have the final decision with what is ultimately done."  #<Da wir nun ein mächtiges Imperium und kein Königreich oder Bündnis von Stammeshäuptlingen mehr sind, haben einige vorgeschlagen, den Regierungssitz von [ROOT.GetCountry.GetCapital.GetName] an einen neuen Ort zu verlegen. Eine brandneue Hauptstadt könnte eine neue Zukunft für die Menschen von [ROOT.GetCountry.GetName] bedeuten, wenn wir zusammenkommen, um ein neues Zuhause zu errichten – ein Gedanke, der [ROOT.GetCountry.GetRuler.GetName] anspricht – aber [ROOT.GetCountry.GetRuler.GetSheHe] wird die endgültige Entscheidung darüber treffen, was letztendlich getan wird.>  #NT!
 me_germania.17.a: "Our pearl shall become the capital"  #<Unsere Perle soll zur Hauptstadt werden>  #NT!
 me_germania.17.b: "The city with the most fortifications is my choice"  #<Die Stadt mit den meisten Befestigungsanlagen ist meine Wahl>  #NT!
 me_germania.17.c: "Hibernia is our home and always will be"  #<Hibernia ist unser Zuhause und wird es immer bleiben>  #NT!
 me_germania.17.d: "We shall place our capital on an island and make it paradise"  #<Wir werden unsere Hauptstadt auf eine Insel legen und sie zum Paradies machen>  #NT!
 me_germania.17.e: "Invest these energies into our traditional home"  #<Investieren Sie diese Energien in unser traditionelles Zuhause>  #NT!
 me_germania_17_tooltip: "The mission task '#Y A New Capital#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eine neue Hauptstadt#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_18_title: "Source of Inspiration"  #<Quelle der Inspiration>  #NT!
 me_germania_18_desc: "Our travel organized by [ROOT.GetCountry.GetRuler.GetName] was a great sucess and many places were discovered. Our time has come to #Y Choose#! a way to modernize our country to become a new #G Great Power#!!  "  #<Unsere von [ROOT.GetCountry.GetRuler.GetName] organisierte Reise war ein großer Erfolg und viele Orte wurden entdeckt. Unsere Zeit ist gekommen, #Y einen Weg zu wählen#!, unser Land zu modernisieren, um eine neue #G Großmacht#! zu werden!>  #NT!
 me_germania.18.a: "Alexander could have been Celtic"  #<Alexander hätte keltisch sein können>  #NT!
 me_germania.18.b: "Roman tactics versus Roman tactics"  #<Römische Taktik versus römische Taktik>  #NT!
 me_germania.18.c: "We have heard of a certain Hannibal"  #<Wir haben von einem gewissen Hannibal gehört>  #NT!
 me_germania_18_tooltip: "The mission task '#Y Source of Inspiration#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Inspirationsquelle#!'“ wurde nun #G abgeschlossen#!!>  #NT!
 hellenic_ways_tt: "Die nächste Aufgabe und Belohnung wird sich auf die Gründung einer #T Hellenischen Gesellschaft#! konzentrieren."
 italic_ways_tt: "Die nächste Aufgabe und Belohnungen konzentrieren sich auf die Schaffung einer #T Römischen Gesellschaft#!"
 punic_ways_tt: "Die nächste Aufgabe und Belohnung wird sich auf die Gründung einer #T Punischen Gesellschaft#! konzentrieren."
  
 me_germania_19_title: "War Council"  #<Kriegsrat>  #NT!
 me_germania_19_desc: "For many months now, serious conversations have been taking place within [ROOT.GetCountry.GetCapital.GetName] about the future of the [ROOT.GetCountry.GetAdjective] tribes. It is no secret that the people of [ROOT.GetCountry.GetName] have grown strong over the last few years, and a time rapidly approaches where no tribal confederacy or defensive league will be able to frustrate our efforts to unify the entire north. Because no one can hope to stand against us, [ROOT.GetCountry.GetRuler.GetName] has argued that this gives us the right to subjugate our neighbors - let those that oppose us do so military, for our minds will not be changed.\n\nThe name of the infamous [ROOT.GetCountry.GetRuler.GetFirstName] is known a thousand miles in every direction, and there are many men that fear the levies of [ROOT.GetCountry.GetName] because of our savage reputation on the battlefield. Some of these Chieftains, hoping to maintain their own power in the face of our dominance, have sent emissaries to [ROOT.GetCountry.GetCapital.GetName] in hopes of earning our friendship, but [ROOT.GetCountry.GetRuler.GetFirstName] tells them all the same thing, time and time again."  #<Seit vielen Monaten finden innerhalb von [ROOT.GetCountry.GetCapital.GetName] ernsthafte Gespräche über die Zukunft der [ROOT.GetCountry.GetAdjective]-Stämme statt. Es ist kein Geheimnis, dass die Menschen in [ROOT.GetCountry.GetName] in den letzten Jahren stark geworden sind und eine Zeit naht, in der kein Stammesbund oder keine Verteidigungsliga in der Lage sein wird, unsere Bemühungen, den gesamten Norden zu vereinen, zu vereiteln. Da niemand darauf hoffen kann, sich uns entgegenzustellen, hat [ROOT.GetCountry.GetRuler.GetName] argumentiert, dass dies uns das Recht gibt, unsere Nachbarn zu unterwerfen – diejenigen, die sich uns widersetzen, sollen dies militärisch tun, denn unsere Meinung wird sich nicht ändern.\n\nDer Name des berüchtigten [ROOT.GetCountry.GetRuler.GetFirstName] ist tausend Meilen in alle Richtungen bekannt, und es gibt viele Männer, die die Aushebungen von [ROOT.GetCountry.GetName] fürchten, weil wir auf dem Schlachtfeld einen Ruf als Wildheit haben. Einige dieser Häuptlinge haben in der Hoffnung, ihre eigene Macht angesichts unserer Vorherrschaft aufrechtzuerhalten, Abgesandte nach [ROOT.GetCountry.GetCapital.GetName] geschickt, in der Hoffnung, unsere Freundschaft zu gewinnen, aber [ROOT.GetCountry.GetRuler.GetFirstName] sagt ihnen immer wieder das Gleiche.>  #NT!
 me_germania.19.a: "It is the destiny of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clan to unite #E Germania#!..."  #<Es ist das Schicksal des [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clans, #E Germania#!... zu vereinen>  #NT!
 me_germania_19_tooltip: "The mission task '#Y War Council#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Kriegsrat#!'“ wurde nun #G abgeschlossen#!!>  #NT!
 GEE_unification_opinion: "All Germanic countries who are not our subject will be #R Angered#! by our warlike stance."  #<Alle germanischen Länder, die nicht unser Untertan sind, werden über unsere kriegerische Haltung #R verärgert#! sein.>  #NT!
  
 me_germania_20_title: "Stone Surplus"  #<Steinüberschuss>  #NT!
 me_germania_20_desc: "Thanks to the efforts of our hard-working tribesmen, we have gathered much stone @stone! from the mines and mountains of [ROOT.GetCountry.GetName] over the last few months. Although the grumbling from our kin has been fierce, they have resigned themselves to the difficult task.\n\nOnce the valuable ore has been hewn from the quarries, cartload after cartload is filled to the brim by our groaning workers, who then make the long overland journey to [ROOT.GetCountry.GetCapital.GetName] to deliver the raw materials to whatver work site needs it the most. Our architects believe that the surpluses we are accumulating will make their work move quicker than they originally thought - music to [ROOT.GetCountry.GetRuler.GetName]'s ears."  #<Dank der Bemühungen unserer fleißigen Stammesangehörigen haben wir viel Stein @stone gesammelt! aus den Minen und Bergen von [ROOT.GetCountry.GetName] in den letzten Monaten. Obwohl das Murren unserer Verwandten heftig war, haben sie sich mit der schwierigen Aufgabe abgefunden.\n\nSobald das wertvolle Erz aus den Steinbrüchen abgebaut wurde, wird eine Wagenladung nach der anderen von unseren stöhnenden Arbeitern bis zum Rand gefüllt, die dann die lange Überlandreise nach [ROOT.GetCountry.GetCapital.GetName] antreten, um die Rohstoffe dorthin zu liefern, wo sie am meisten benötigt werden. Unsere Architekten glauben, dass die Überschüsse, die wir anhäufen, dazu führen werden, dass ihre Arbeit schneller voranschreitet, als sie ursprünglich dachten – Musik in den Ohren von [ROOT.GetCountry.GetRuler.GetName].>  #NT!
 me_germania.20.a: "May our newly-constructed buildings stand the test of time!"  #<Mögen unsere neu errichteten Gebäude den Test der Zeit bestehen!>  #NT!
 me_germania_20_tooltip: "The mission task '#Y Stone Surplus#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Steinüberschuss#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_21_title: "Assimilation In Germania"  #<Assimilation in Germanien>  #NT!
 me_germania_21_desc: "Thanks to the efforts made by [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] initiatives to make [ROOT.GetCountry.GetName] a rising power, our capital [ROOT.GetCountry.GetCapital.GetName] has started to attract a lot of people from all around the tribal world, and we even sometimes receive visitors from the distant cities of the #E Mediterranean#! and beyond.\n\nWhile the influx of newcomers in our society has brought opportunity, it has also caused some tension between our people and these strangers who are largly ignorant of our ways. The nobility has petitioned [ROOT.GetCountry.GetRuler.GetFirstName] to issue an edict regarding the status of the foreigners living within our borders."  #<Dank der Bemühungen der Initiativen [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis], [ROOT.GetCountry.GetName] zu einer aufstrebenden Macht zu machen, hat unsere Hauptstadt [ROOT.GetCountry.GetCapital.GetName] begonnen, viele Menschen aus der ganzen Stammeswelt anzuziehen, und wir empfangen manchmal sogar Besucher aus den entfernten Städten des #E Mittelmeeres#! und darüber hinaus.\n\nWährend der Zustrom von Neuankömmlingen in unserer Gesellschaft Chancen mit sich gebracht hat, hat er auch einige Spannungen zwischen unserem Volk und diesem Volk verursacht Fremde, die unsere Sitten weitgehend nicht kennen. Der Adel hat [ROOT.GetCountry.GetRuler.GetFirstName] beantragt, ein Edikt über den Status der in unseren Grenzen lebenden Ausländer zu erlassen.>  #NT!
 me_germania.21.a: "All are welcome here - come as you are, but bring gold"  #<Alle sind hier willkommen – kommen Sie wie Sie sind, aber bringen Sie Gold mit>  #NT!
 me_germania.21.b: "You can stay if you adopt our ways and live as we do"  #<Sie können bleiben, wenn Sie unsere Gewohnheiten übernehmen und so leben wie wir>  #NT!
 me_germania_21_tooltip: "The mission task '#Y #!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y #!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_22_title: "A History Of Justice"  #<Eine Geschichte der Gerechtigkeit>  #NT!
 me_germania_22_desc: "From the time we were a single tribe, Druids were known as the teachers, priests and the judges of our society. Now, we have a growing capital with people asking for more modern infrastructure and administration, and the citizens inside [ROOT.GetCountry.GetCapital.GetName] want their voices to be heard in the courts and have demanded fair trials. The Druids have pressed [ROOT.GetCountry.GetRuler.GetName] to confirm that justice must stay in the hands of those that have the most knowledge; in other words, the Druids themselves.\n\nThis is creating a terrible headache for the [ROOT.GetCountry.GetRulerTitle], who realizes that [ROOT.GetCountry.GetRuler.GetHerHis] decision will impact the future of many [ROOT.GetCountry.GetAdjective] people for generations to come."  #<Seit wir ein einziger Stamm waren, waren Druiden als Lehrer, Priester und Richter unserer Gesellschaft bekannt. Jetzt haben wir eine wachsende Hauptstadt mit Menschen, die eine modernere Infrastruktur und Verwaltung fordern, und die Bürger innerhalb [ROOT.GetCountry.GetCapital.GetName] wollen, dass ihre Stimme vor Gericht gehört wird, und fordern faire Verfahren. Die Druiden haben auf [ROOT.GetCountry.GetRuler.GetName] gedrängt, um zu bestätigen, dass die Gerechtigkeit in den Händen derjenigen bleiben muss, die über das meiste Wissen verfügen; mit anderen Worten, die Druiden selbst.\n\nDies bereitet den [ROOT.GetCountry.GetRulerTitle] schreckliche Kopfschmerzen, die erkennen, dass die Entscheidung von [ROOT.GetCountry.GetRuler.GetHerHis] Auswirkungen auf die Zukunft vieler [ROOT.GetCountry.GetAdjective] Menschen für kommende Generationen haben wird.>  #NT!
 me_germania.22.a: "The Druids need to stay in charge"  #<Die Druiden müssen die Kontrolle behalten>  #NT!
 me_germania.22.b: "The gods will watch over us under the monitoring of judges"  #<Die Götter werden unter der Aufsicht von Richtern über uns wachen>  #NT!
 me_germania_22_tooltip: "The mission task '#Y A History Of Justice#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eine Geschichte der Gerechtigkeit#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_23_title: "Colonial Ambition"  #<Kolonialer Ehrgeiz>  #NT!
 me_germania_23_desc: "Our people have long known the frozen waters of the #E Oceanus Sarmaticus#! eventually meet the wind-swept shores of a vast forested land, an inhospitable place that is home to the hostile walrus and bear, and there are good reasons that no [ROOT.GetCountry.GetAdjective] tribes have ever settled upon its shores...and yet even this has changed under the leadership of [ROOT.GetCountry.GetRuler.GetName].\n\nConfident in the abilities of [ROOT.GetCountry.GetName] to sustain a colony across the waters, the [ROOT.GetCountry.GetRulerTitle] has ordered our navy to prepare the way for our colonists."  #<Unser Volk weiß seit langem, dass die gefrorenen Gewässer des #E Oceanus Sarmaticus#! schließlich auf die windgepeitschten Ufer eines riesigen Waldlandes treffen, eines unwirtlichen Ortes, der die Heimat des feindlichen Walrosses und Bären ist, und es gibt gute Gründe dafür, dass sich noch nie ein [ROOT.GetCountry.GetAdjective]-Stämme an seinen Ufern niedergelassen hat ... und doch hat sich selbst dies unter der Führung von [ROOT.GetCountry.GetRuler.GetName] geändert.\n\nZuversichtlich in die Fähigkeiten von [ROOT.GetCountry.GetName] Um eine Kolonie auf der anderen Seite des Gewässers zu unterhalten, hat die [ROOT.GetCountry.GetRulerTitle] unserer Marine befohlen, den Weg für unsere Kolonisten zu ebnen.>  #NT!
 me_germania.23.a: "Time to make history..."  #<Zeit, Geschichte zu schreiben...>  #NT!
 me_germania_23_tooltip: "The mission task '#Y Colonial Ambition#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Kolonialer Ehrgeiz#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_24_title: "Too Late..."  #<Zu spät...>  #NT!
 me_germania_24_desc: "What could be a lost and inhospitable place is now a fully-occupied region that is held by another power. If we want our part of the cake, we will have to have it slice it off woth the sword!"  #<Was ein verlorener und unwirtlicher Ort sein könnte, ist jetzt eine vollständig besetzte Region, die von einer anderen Macht gehalten wird. Wenn wir unseren Teil des Kuchens wollen, müssen wir ihn mit dem Schwert abschneiden!>  #NT!
 me_germania.24.a: "It shall be mine!"  #<Es soll mir gehören!>  #NT!
 me_germania_24_tooltip: "The mission task '#Y Too Late...#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Zu spät...#!'“ wurde nun #G Abgeschlossen#!!>  #NT!
  
 me_germania_25_title: "Successful Fennic Colony"  #<Erfolgreiche Fennic-Kolonie>  #NT!
 me_germania_25_desc: "[ROOT.GetCountry.GetRuler.GetName], we have received good news from the city of [GetProvince('(int32)9371').GetName] that our brave colonists have established in the cursed lands of #E Hyperborea#!, a place abandoned by the sun god.\n\nThings are going well - a testament to the heartiness and strength of our [ROOT.GetCountry.GetAdjective] kinsmen, who can thrive everywhere that they are sent. But the local governor has asked for guidance concerning the local #E Fennic#! tribesmen, who are appearing with greater frequency in our markets. Their strange customs have caught the fancy of many of our kinsmen, and it is even said that some of our brethren are turning to the #E Ilmaric#! gods - truly, a strange thing!"  #<[ROOT.GetCountry.GetRuler.GetName], wir haben gute Nachrichten aus der Stadt [GetProvince('(int32)9371').GetName] erhalten, dass unsere tapferen Kolonisten sich in den verfluchten Ländern von #E Hyperborea#!, niedergelassen haben, einem vom Sonnengott verlassenen Ort.\n\nDie Dinge laufen gut – ein Beweis für die Herzlichkeit und Stärke unserer [ROOT.GetCountry.GetAdjective] Verwandten, die überall dort gedeihen können, wohin sie geschickt werden. Aber der örtliche Gouverneur hat um Rat bezüglich der örtlichen #E Fennic#! Stammesangehörigen gebeten, die immer häufiger auf unseren Märkten auftauchen. Ihre seltsamen Bräuche haben die Aufmerksamkeit vieler unserer Verwandten erregt, und es wird sogar gesagt, dass einige unserer Brüder sich den #E Ilmaric#! Göttern zuwenden – wirklich eine seltsame Sache!>  #NT!
 me_germania.25.a: "It is best for all that we live together in harmony"  #<Es ist das Beste für alle, dass wir in Harmonie zusammenleben>  #NT!
 me_germania.25.b: "Extort the locals and take everything we can from them"  #<Erpressen Sie die Einheimischen und nehmen Sie ihnen alles weg, was wir können>  #NT!
 me_germania.25.d: "Perhaps it is best to leave them to their own devices"  #<Vielleicht ist es am besten, sie sich selbst zu überlassen>  #NT!
 me_germania.25.c: "What a life they must lead...a city at the edge of civilization!"  #<Was für ein Leben müssen sie führen ... eine Stadt am Rande der Zivilisation!>  #NT!
 soodak_ai_subject_tt: "We will release the #T City of Soodak#! as a special #G Colonial Vassal#!."  #<Wir werden die #T Stadt Soodak#! als besonderen #G Kolonialvasall#! veröffentlichen.>  #NT!
 soodak_tagswitch_tt: "We will tag switch and play as the #G Fennic-influenced#! #T City of Soodak#!."  #<Wir werden Switch taggen und als #G Fennic-beeinflusste#! #T Stadt Soodak#! spielen.>  #NT!
 me_germania_25_tooltip: "The mission task '#Y Successful Fennic Colony#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Erfolgreiche Fennic-Kolonie#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_26_title: "Raiding Our Enemies"  #<Unsere Feinde überfallen>  #NT!
 me_germania_26_desc: "When our greedy #E Tribal Chieftains#! heard of the raiding parties led by the brave [ROOT.GetCountry.GetRuler.GetName], they petitioned [ROOT.GetCountry.GetCapital.GetName] for the right to do the same; a privilege that [ROOT.GetCountry.GetRuler.GetFirstName] was happy to bestow, with the understanding that a lion's share of the wealth be brought to the [ROOT.GetCountry.GetAdjective] capital as tribute.\n\nOne month later, the great Chieftains appeared in person to deliver the gold and slaves taken from the lands of our enemies, and [ROOT.GetCountry.GetRuler.GetFirstName] spent many long hours listening to the tales of their exploits."  #<Als unsere gierigen #E Stammeshäuptlinge#! von den Überfalltrupps hörten, die von den Tapferen [ROOT.GetCountry.GetRuler.GetName] angeführt wurden, beantragten sie bei [ROOT.GetCountry.GetCapital.GetName] das Recht, dasselbe zu tun; Ein Privileg, das [ROOT.GetCountry.GetRuler.GetFirstName] gerne gewährte, mit der Maßgabe, dass ein Löwenanteil des Reichtums als Tribut in die Hauptstadt [ROOT.GetCountry.GetAdjective] gebracht werden sollte.\n\nEinen Monat später erschienen die großen Häuptlinge persönlich, um das Gold und die Sklaven aus dem Land unserer Feinde zu liefern, und [ROOT.GetCountry.GetRuler.GetFirstName] verbrachte viele Stunden damit, den Geschichten ihrer Heldentaten zu lauschen.>  #NT!
 me_germania.26.a: "There is much plunder to be taken from the lands of the weak..."  #<Aus den Ländern der Schwachen gibt es viel zu plündern ...>  #NT!
 me_germania_26_tooltip: "The mission task '#Y Raiding Our Enemies#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Raiding Our Enemies#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_27_title: "Truth and Reconciliation"  #<Wahrheit und Versöhnung>  #NT!
 me_germania_27_desc: "Eat or be eaten; that is what most of our [ROOT.GetCountry.GetAdjective] soldiers believe, but even our battle-hardened soldiers can admit when they have made a mistake, and many living within [ROOT.GetCountry.GetName} have reassessed our relationship with the Romans.\n\nOur people used to view the Romans as murderous barbarians, but thanks to the efforts of our diplomats, we have become friendly with the Italians - they now claim to view us as partners, and have eagerly expressed their desire to collaborate in the future.\n\nWhile the elites living within [ROOT.GetCountry.GetCapital.GetName] publicly hope for the best, there are those that cynically believe that the concord between our peoples is temporary, and that one day soon, the embers of discord will burn anew in the hearts of man and plunge our realm into war...but that is tomorrow's problem, for today, we have joined hands and walk down the road together."  #<Essen oder gefressen werden; Das glauben die meisten unserer [ROOT.GetCountry.GetAdjective] Soldaten, aber selbst unsere kampferprobten Soldaten können zugeben, wenn sie einen Fehler gemacht haben, und viele in [ROOT.GetCountry.GetName} have reassessed our relationship with the Romans.\n\nOur people used to view the Romans as murderous barbarians, but thanks to the efforts of our diplomats, we have become friendly with the Italians - they now claim to view us as partners, and have eagerly expressed their desire to collaborate in the future.\n\nWhile the elites living within [ROOT.GetCountry.GetCapital.GetName] hoffen öffentlich auf das Beste. Es gibt diejenigen, die zynisch glauben, dass die Eintracht zwischen unseren Völkern nur vorübergehend ist und dass eines Tages die Glut der Zwietracht erneut in den Herzen der Menschen brennen und unser Reich in einen Krieg stürzen wird ... aber das ist das Problem von morgen, denn heute haben wir uns an den Händen geschlossen und gehen weiter gemeinsam die Straße entlang.>  #NT!
 me_germania.27.a: "May this friendship last."  #<Möge diese Freundschaft dauern.>  #NT!
 me_germania_27_tooltip: "The mission task '#Y Truth and Reconciliation#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Wahrheit und Versöhnung#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_28_title: "Deal With The Romans"  #<Deal mit den Römern>  #NT!
 me_germania_28_desc: "While many claim that the armies of #E Rome#! are to be feared, [ROOT.GetCountry.GetRuler.GetName] has led our soldiers against theirs and finds their reputation to be exaggerated. The [ROOT.GetCountry.GetRulerTitle] has lost count of the times that our men have plundered their cities and temples, carting away their vessels of silver and gold as we set their homes to the torch. Why is everyone so afraid of the barking wolf?"  #<Während viele behaupten, dass die Armeen von #E Rom#! zu fürchten seien, hat [ROOT.GetCountry.GetRuler.GetName] unsere Soldaten gegen die ihren geführt und findet ihren Ruf übertrieben. Die [ROOT.GetCountry.GetRulerTitle] haben aufgehört zu zählen, wie oft unsere Männer ihre Städte und Tempel geplündert und ihre Gefäße aus Silber und Gold weggeschafft haben, während wir ihre Häuser in Brand steckten. Warum haben alle solche Angst vor dem bellenden Wolf?>  #NT!
 me_germania.28.a: "The Romans are not long for this world, I believe..."  #<Ich glaube, die Römer werden nicht mehr lange von dieser Welt leben ...>  #NT!
 me_germania_28_tooltip: "The mission task '#Y Deal With The Romans#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Deal With The Romans#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_29_title: "Two Kingdoms, One Empire"  #<Zwei Königreiche, ein Imperium>  #NT!
 me_germania_29_desc: "[ROOT.GetCountry.GetRuler.GetName] is feared in the capitals of our enemies as a ferocious warrior and general of renown; all accolades that [ROOT.GetCountry.GetRuler.GetSheHe] deserves, for the [ROOT.GetCountry.GetRulerTitle] has conquered many nations, breaking the crowns and scepters of countless monarchs that dared opposed the will of the [ROOT.GetCountry.GetAdjective] people.\n\nAnd while the extensive holdings of [ROOT.GetCountry.GetName] encompass dominions on the islands and on the mainland, separated by thousands of miles of forest and ocean, they are an unbreakable union, united in purpose and destiny - the cohesive empire forged by [ROOT.GetCountry.GetRuler.GetFirstName] is one to be admired, indeed."  #<[ROOT.GetCountry.GetRuler.GetName] wird in den Hauptstädten unserer Feinde als wilder Krieger und berühmter General gefürchtet; Alles Auszeichnungen, die [ROOT.GetCountry.GetRuler.GetSheHe] verdient, denn [ROOT.GetCountry.GetRulerTitle] hat viele Nationen erobert und die Kronen und Zepter unzähliger Monarchen gebrochen, die es wagten, sich dem Willen des [ROOT.GetCountry.GetAdjective]-Volkes zu widersetzen.\n\nUnd während die umfangreichen Besitztümer von [ROOT.GetCountry.GetName] Herrschaftsgebiete auf den Inseln und auf dem Festland umfassen, die durch Tausende Meilen von Wäldern und Ozeanen getrennt sind, sind sie eine unzerbrechliche Union, vereint in Zweck und Schicksal – Das durch [ROOT.GetCountry.GetRuler.GetFirstName] geschaffene zusammenhängende Imperium ist in der Tat bewundernswert.>  #NT!
 me_germania.29.a: "The people of [ROOT.GetCountry.GetName] are unstoppable!"  #<Die Menschen von [ROOT.GetCountry.GetName] sind nicht aufzuhalten!>  #NT!
 me_germania_29_tooltip: "The mission task '#Y Two Kingdoms, One Empire#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Zwei Königreiche, ein Imperium#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_30_title: "A Gaulish Capital"  #<Eine gallische Hauptstadt>  #NT!
 me_germania_30_desc: "So vast are the borders of [ROOT.GetCountry.GetName] that a second imperial capital has been established within #E Gaul#!, which will serve as a regional seat of power and trade hub for the [ROOT.GetCountry.GetAdjective] merchants.\n\nTo commemorate the occasion, a procession of priests left [ROOT.GetCountry.GetCapital.GetName] and sailed across to the mainland, where they continued onward. Everywhere they went, they blessed the people and asked that the gods watch over the new capital, offering it protection from our enemies."  #<Die Grenzen von [ROOT.GetCountry.GetName] sind so groß, dass in #E Gallien#!, eine zweite kaiserliche Hauptstadt errichtet wurde, die als regionaler Machtsitz und Handelszentrum für die [ROOT.GetCountry.GetAdjective] Kaufleute dienen wird.\n\nZur Feier dieses Anlasses verließ eine Prozession von Priestern [ROOT.GetCountry.GetCapital.GetName] und segelte zum Festland, wo sie weitergingen. Überall, wo sie hinkamen, segneten sie die Menschen und baten die Götter, über die neue Hauptstadt zu wachen und ihr Schutz vor unseren Feinden zu bieten.>  #NT!
 me_germania.30.a: "The legitimacy of my dynasty cannot be questioned!"  #<Die Legitimität meiner Dynastie kann nicht in Frage gestellt werden!>  #NT!
 me_germania_30_tooltip: "The mission task '#Y A Gaulish Capital#!' has now been #G Completed#!!"  #<None>  #NT!
  
 me_germania_31_title: "Germania Magna"  #<Germania Magna>  #NT!
 me_germania_31_desc: "The #E Ingvaeonic#! and #E Istvaeonic#! tribes fought bravely to hold on to their territories, but in the end, it was all for naught, for their fate was decided the moment that [ROOT.GetCountry.GetAdjective] levies entered into their borders. And now that we have taken a great deal of their land for ourselves, we must press on our advantage and drive out all resistance to our rule within [GetProvince('(int32)3830').GetArea.GetRegion.GetName].\n\n[ROOT.GetCountry.GetRuler.GetName], the impressive architect of these victories, knows better than to let these recent successes get to [ROOT.GetCountry.GetRuler.GetHerHis] head, but has given all of the glory for our successes to the brave warriors of [ROOT.GetCountry.GetName]."  #<Die #E Ingvaeonic#! und #E Istvaeonic#! Stämme kämpften tapfer darum, ihre Gebiete zu behalten, aber am Ende war alles umsonst, denn ihr Schicksal wurde in dem Moment entschieden, als [ROOT.GetCountry.GetAdjective] Truppen in ihre Grenzen einzogen. Und da wir nun einen großen Teil ihres Landes für uns übernommen haben, müssen wir unseren Vorteil ausnutzen und jeglichen Widerstand gegen unsere Herrschaft innerhalb von [GetProvince('(int32)3830').GetArea.GetRegion.GetName] vertreiben.\n\n[ROOT.GetCountry.GetRuler.GetName], der beeindruckende Architekt dieser Siege, weiß es besser, als [ROOT.GetCountry.GetRuler.GetHerHis] diese jüngsten Erfolge zunichte zu machen, sondern hat den tapferen Kriegern von [ROOT.GetCountry.GetName] den ganzen Ruhm für unsere Erfolge gegeben.>  #NT!
 me_germania.31.a: "Victory has many fathers, but defeat is an orphan..."  #<Der Sieg hat viele Väter, aber die Niederlage ist eine Waise ...>  #NT!
 me_germania_31_tooltip: "The mission task '#Y Germania Magna#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y Germania Magna#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_32_title: "Conquest Of The North"  #<Eroberung des Nordens>  #NT!
 me_germania_32_desc: "Despite their reputation as bloodthirsty killers, [ROOT.GetCountry.GetRuler.GetName] has scattered the levies of the #E Cimbrians#! and #E Scandians#! before our armies. Our men, eager to cement their own stature as mighty conquerors, have shown no mercy to the northerners, but have broken their spirit of resistance, one torched settlement at a time.\n\nRealizing that opposing us means death, there are even some Cimbrian warlords who have decided that their future lies with [ROOT.GetCountry.GetName], and one of their strongest Chieftains, [SCOPE.sCharacter('mighty_cimbrian_warlord_scope').GetName], has come to submit to [ROOT.GetCountry.GetRuler.GetFirstName] in person. 'My sword is yours if you will have it, [ROOT.GetCountry.GetRulerTitle]...just please stop slaughtering my kin.'\n\nShould [ROOT.GetCountry.GetRuler.GetName] accept their main culture as blood brothers? There are many living with [ROOT.GetCountry.GetCapital.GetName] who would have it this way, but there are others that view this course of action as weakness personified."  #<Trotz ihres Rufs als blutrünstige Killer hat [ROOT.GetCountry.GetRuler.GetName] die Truppen der #E Kimbrer#! und #E Skandinavien#! vor unseren Armeen zerstreut. Unsere Männer, die bestrebt waren, ihre eigene Stellung als mächtige Eroberer zu festigen, haben den Nordländern keine Gnade gezeigt, sondern ihren Widerstandsgeist gebrochen, eine Siedlung nach der anderen.\n\nIm Bewusstsein, dass es den Tod bedeutet, sich uns zu widersetzen, gibt es sogar einige zimbrische Kriegsherren, die entschieden haben, dass ihre Zukunft bei [ROOT.GetCountry.GetName] liegt, und einer ihrer stärksten Häuptlinge, [SCOPE.sCharacter('mighty_cimbrian_warlord_scope').GetName], ist gekommen, um sich [ROOT.GetCountry.GetRuler.GetFirstName] persönlich zu unterwerfen. „Mein Schwert gehört dir, wenn du es haben willst, [ROOT.GetCountry.GetRulerTitle] ... bitte hör einfach auf, meine Verwandten abzuschlachten.“\n\nSollten [ROOT.GetCountry.GetRuler.GetName] ihre Hauptkultur als Blutsbrüder akzeptieren? Es gibt viele Menschen, die mit #E0 leben und die es so sehen würden, aber es gibt andere, die diese Vorgehensweise als personifizierte Schwäche betrachten.>  #NT!
 me_germania.32.a: "The Cimbrians would be a worthy addition to our society..."  #<Die Kimbrer wären eine würdige Ergänzung unserer Gesellschaft ...>  #NT!
 me_germania.32.b: "Foreigners have no place in [ROOT.GetCountry.GetName]"  #<Ausländer haben in [ROOT.GetCountry.GetName] keinen Platz>  #NT!
 me_germania.32.c: "Take the spoils of war but change no laws"  #<Nimm die Kriegsbeute, aber ändere keine Gesetze>  #NT!
 me_germania_32_tooltip: "The mission task '#Y Conquest Of The North#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eroberung des Nordens#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_33_title: "Conquest Of The East"  #<Eroberung des Ostens>  #NT!
 me_germania_33_desc: "As our armies returned from the wars in the east, [ROOT.GetCountry.GetRuler.GetName] commanded that each one of our soldiers bring back trophies from the battlefield so that our kinsmen living back home might see for themselves the fruits of their labors; a task that our warriors happily embraced.\n\nAs our men returned to [ROOT.GetCountry.GetCapital.GetName], their arms and necks laden with golden torcs and their bags filled with plunder, they began to leave the shields of the slain #E Gothonic#! and #E Vandalic#! warriors in a large pile in the center of town - a grim monument that showed everyone living in the [ROOT.GetCountry.GetAdjective] capital the true cost of war."  #<Als unsere Armeen aus den Kriegen im Osten zurückkehrten, befahl [ROOT.GetCountry.GetRuler.GetName], dass jeder unserer Soldaten Trophäen vom Schlachtfeld mitbringen solle, damit unsere in der Heimat lebenden Verwandten die Früchte ihrer Arbeit mit eigenen Augen sehen könnten; eine Aufgabe, die unsere Krieger gerne annahmen.\n\nAls unsere Männer nach [ROOT.GetCountry.GetCapital.GetName] zurückkehrten, ihre Arme und Hälse mit goldenen Torcs beladen und ihre Taschen voller Beute, begannen sie, die Schilde der getöteten #E Gothic#! und #E Vandalic#! Krieger auf einem großen Stapel im Zentrum der Stadt zurückzulassen – ein düsteres Denkmal, das alle Bewohner der [ROOT.GetCountry.GetAdjective] Hauptstadt zeigte die wahren Kosten des Krieges.>  #NT!
 me_germania.33.a: "I am the slayer of thousands, of tens of thousands..."  #<Ich bin der Vernichter von Tausenden, von Zehntausenden ...>  #NT!
 me_germania_33_tooltip: "The mission task '#Y Conquest Of The East#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eroberung des Ostens#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_34_title: "Wealth of Pritannia"  #<Reichtum von Pritannia>  #NT!
 me_germania_34_desc: "Historically, Pritannia was the trade center of the Germanic Island. Many cities start to grow and people were connected to the main land of Gaul.\nBut now our soldiers with the command of [ROOT.GetCountry.GetRuler.GetName] are ready to take everything for them.\n\nTo keep a long and stable rule we should integrate some of them to our court but it would be a waste of money to not plunder everything now."  #<Historisch gesehen war Pritannia das Handelszentrum der germanischen Insel. Viele Städte beginnen zu wachsen und die Menschen wurden mit dem Hauptland Gallien verbunden.\nAber jetzt sind unsere Soldaten mit dem Kommando [ROOT.GetCountry.GetRuler.GetName] bereit, alles für sie zu nehmen.\n\nUm eine lange und stabile Herrschaft aufrechtzuerhalten, sollten wir einige von ihnen an unseren Hof integrieren, aber es wäre Geldverschwendung, jetzt nicht alles zu plündern.>  #NT!
 me_germania.34.a: "Don't touch them. They are our brothers"  #<Fass sie nicht an. Sie sind unsere Brüder>  #NT!
 me_germania.34.b: "Men, you are free of everything"  #<Männer, ihr seid frei von allem>  #NT!
 me_germania.34.c: "Burn me everything!"  #<Verbrenne mir alles!>  #NT!
 prittania_domination: "Alle #Y Pritannischen#! Kulturen erhalten:"
 prittania_slavery: "Alle #Y Pritannischen#! Kulturen erhalten:"
 me_germania_34_tooltip: "The mission task '#Y #!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y #!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_35_title: "Professional Pirates"  #<Professionelle Piraten>  #NT!
 me_germania_35_desc: "The threat of [ROOT.GetCountry.GetAdjective] pirate ships harrassing the trade lanes has become a matter of daily life for the merchant ships traversing through the northern seas, and many foreign entrenpreneurs willingly pay for the privilege of safe passage to the lucrative amber and fur markets under our protection.\n\nIn the past, other Chieftains had quietly allowed piracy to exist within [ROOT.GetCountry.GetName], but none have embraced it like [ROOT.GetCountry.GetRuler.GetName] has; it is fair to say that, under [ROOT.GetCountry.GetRuler.GetHerHis] rule, that the [ROOT.GetCountry.GetAdjective]s are the largest sponsors of piracy outside of the #E Mediterranean#!."  #<Die Bedrohung durch [ROOT.GetCountry.GetAdjective]-Piratenschiffe, die die Handelswege belästigen, ist für die Handelsschiffe, die durch die nördlichen Meere fahren, zu einer alltäglichen Angelegenheit geworden, und viele ausländische Unternehmer zahlen bereitwillig für das Privileg einer sicheren Durchfahrt zu den lukrativen Bernstein- und Pelzmärkten unter unserem Schutz.\n\nIn der Vergangenheit hatten andere Häuptlinge stillschweigend die Piraterie innerhalb von [ROOT.GetCountry.GetName] zugelassen, aber keiner hat sie so angenommen wie [ROOT.GetCountry.GetRuler.GetName] hat; Man kann mit Recht sagen, dass die [ROOT.GetCountry.GetAdjective] nach der [ROOT.GetCountry.GetRuler.GetHerHis]-Regel die größten Sponsoren der Piraterie außerhalb des #E Mittelmeers#!. sind>  #NT!
 me_germania.35.a: "And what of it?"  #<Und was ist damit?>  #NT!
 me_germania_35_tooltip: "The mission task '#Y Professional Pirates#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Professionelle Piraten#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_36_title: "Cities In The Forest"  #<Städte im Wald>  #NT!
 me_germania_36_desc: "Once, the undisturbed expanse of our woodlands were an impediment to the encroachment of civilization, but this has changed in recent years as our understanding of architecture has grown. [ROOT.GetCountry.GetName] has oftentimes found itself at a crossroads, torn between a yearning to uphold our ancient traditions while acknowledging that we need to change in certain ways.\n\nThankfully, we have discovered that we can have the best of both worlds by building cities in the forests; we can retain our connection with nature and wild things while building the centers of civilization that will strengthen our people..."  #<Einst war die ungestörte Weite unserer Wälder ein Hindernis für das Vordringen der Zivilisation, doch das hat sich in den letzten Jahren geändert, da unser Verständnis von Architektur gewachsen ist. [ROOT.GetCountry.GetName] befand sich oft an einem Scheideweg, hin- und hergerissen zwischen der Sehnsucht, unsere alten Traditionen aufrechtzuerhalten, und der Erkenntnis, dass wir uns auf bestimmte Weise ändern müssen.\n\nZum Glück haben wir herausgefunden, dass wir das Beste aus beiden Welten haben können, indem wir Städte in den Wäldern bauen; Wir können unsere Verbindung zur Natur und den wilden Dingen aufrechterhalten und gleichzeitig Zivilisationszentren aufbauen, die unser Volk stärken ...>  #NT!
 me_germania.36.a: "This changes everything..."  #<Das verändert alles...>  #NT!
 me_germania_36_tooltip: "The mission task '#Y Cities In The Forest#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Städte im Wald#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_37_title: "A Thirst For Wine"  #<Ein Durst nach Wein>  #NT!
 me_germania_37_desc: "For better or for worse, our countrymen are fond of drinking, and they have grown incredibly fond of the wines imported from foreign countries. No longer content with just small beer and mead, the average [ROOT.GetCountry.GetAdjective] desires wine for every occasion, and the finest vintages sell for eye-watering prices in [ROOT.GetCountry.GetCapital.GetName], with only the truly wealthy being able to afford the best.\n\n[ROOT.GetCountry.GetRuler.GetName] has made a couple of friends in the importing business over the years, and the [ROOT.GetCountry.GetRulerTitle] has heard of an opportunity that [ROOT.GetCountry.GetRuler.GetSheHe] cannot pass up; the chance to buy an exquisite batch of wine at a cut-rate price. Some of [ROOT.GetCountry.GetRuler.GetFirstName]'s advisors have suggested that this gift could be shared with the common people."  #<Unsere Landsleute trinken im Guten wie im Schlechten gern und haben eine unglaubliche Vorliebe für die aus dem Ausland importierten Weine entwickelt. Der durchschnittliche [ROOT.GetCountry.GetAdjective] gibt sich nicht mehr nur mit kleinem Bier und Met zufrieden, sondern wünscht sich Wein für jeden Anlass, und die besten Jahrgänge werden in [ROOT.GetCountry.GetCapital.GetName] zu atemberaubenden Preisen verkauft, wobei sich nur die wirklich Reichen das Beste leisten können.\n\n[ROOT.GetCountry.GetRuler.GetName] hat im Laufe der Jahre ein paar Freunde im Importgeschäft gefunden, und der [ROOT.GetCountry.GetRulerTitle] hat von einer Gelegenheit gehört, die [ROOT.GetCountry.GetRuler.GetSheHe] sich nicht entgehen lassen darf; die Chance, eine erlesene Ladung Wein zu einem günstigen Preis zu kaufen. Einige Berater von [ROOT.GetCountry.GetRuler.GetFirstName] haben vorgeschlagen, dieses Geschenk mit dem einfachen Volk zu teilen.>  #NT!
 me_germania.37.a: "Our freemen certainly enjoy a good drink, don't they?"  #<Unsere Freien genießen bestimmt ein gutes Getränk, nicht wahr?>  #NT!
 me_germania.37.b: "We are nothing without our tribesmen - they deserve the best"  #<Ohne unsere Stammesangehörigen sind wir nichts – sie verdienen das Beste>  #NT!
 me_germania.37.c: "Ha! Take the best wine and set it aside for my personal use"  #<Ha! Nehmen Sie den besten Wein und legen Sie ihn für meinen persönlichen Gebrauch beiseite>  #NT!
 me_germania.37.d: "I don't care who drinks it as long as we collect our taxes"  #<Es ist mir egal, wer es trinkt, solange wir unsere Steuern einziehen>  #NT!
 me_germania.37.e: "I will build the infrastructure to produce our own local wines!"  #<Ich werde die Infrastruktur aufbauen, um unsere eigenen lokalen Weine zu produzieren!>  #NT!
 me_germania.37.f: "Hmm...I don't want anything to do with this, actually"  #<Hmm... eigentlich will ich damit nichts zu tun haben>  #NT!
  
 me_germania_38_title: "The Celtic Games"  #<Die keltischen Spiele>  #NT!
 me_germania_38_desc: "It is known throughout [ROOT.GetCountry.GetName] that there are many festivals celebrated in the lands far to the south, with the #E Olympic Games#! being the most famous. When [ROOT.GetCountry.GetRuler.GetName] heard that some of the nobles living within [ROOT.GetCountry.GetCapital.GetName] were traveling to the distant Mediterranean in order to attend these events, [ROOT.GetCountry.GetRuler.GetSheHe] decided that the Celtic people must have their own games. Now, the [ROOT.GetCountry.GetRulerTitle] must decide what sort of main contests we will have for the first edition."  #<Es ist im gesamten [ROOT.GetCountry.GetName] bekannt, dass in den Ländern weit im Süden viele Feste gefeiert werden, wobei die #E Olympischen Spiele#! das berühmteste sind. Als [ROOT.GetCountry.GetRuler.GetName] hörte, dass einige der in [ROOT.GetCountry.GetCapital.GetName] lebenden Adligen ins ferne Mittelmeer reisten, um an diesen Veranstaltungen teilzunehmen, entschied [ROOT.GetCountry.GetRuler.GetSheHe], dass das keltische Volk seine eigenen Spiele haben musste. Jetzt müssen die [ROOT.GetCountry.GetRulerTitle] entscheiden, welche Art von Hauptwettbewerben wir für die erste Ausgabe durchführen werden.>  #NT!
 me_germania.38.a: "I propose that we race upon the waters in a spectacle for the ages"  #<Ich schlage vor, dass wir in einem Spektakel für die Ewigkeit über das Wasser rasen>  #NT!
 me_germania.38.b: "We must see a show of force and strength on land"  #<Wir müssen eine Demonstration von Kraft und Stärke an Land sehen>  #NT!
 me_germania.38.c: "Let us have a test of matters pertaining to faith"  #<Lassen Sie uns die Fragen des Glaubens prüfen>  #NT!
 me_germania.38.d: "Our Games shall focus on intellect and wisdom"  #<Unsere Spiele sollen sich auf Intellekt und Weisheit konzentrieren>  #NT!
 me_germania_38_tooltip: "The mission task '#Y The Celtic Games#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y The Celtic Games#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_39_title: "A Warrior Emerges"  #<Ein Krieger entsteht>  #NT!
 me_germania_39_desc: "This year for the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!, the competitors were neck to neck to each other, with everyone performing at their best. The crowds watching the Olympics were greatly amused by the events of the day thus far, but little did they know that the best was yet to come.\n\nThe last series of Olympic events were respectively the javelin throw, the duel and the foot races.\nA riot almost occurred when [warrior_champion.GetName] threw the javelin the entire length of the stadium, nearly impaling a nobleman watching in the stands. At the duel event, [warrior_champion.GetFirstName] once again went into the finals and won the fight as thousands of voices cheered as one.\nAfter all of this hype our, aspiring champion finished the job and completed a marathon in under two and a half hours, achieving a historic record that few believed could be beated.\n\nAll the crowd started to chant the name of the new victor - [warrior_champion.GetFirstName], [warrior_champion.GetFirstName], who was crowned directly by our [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetName]. It was a moment that would be remembered for ages."  #<Dieses Jahr lieferten sich die Teilnehmer bei den #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spielen#!, ein Kopf-an-Kopf-Rennen, bei dem jeder sein Bestes gab. Die Zuschauer der Olympischen Spiele waren von den bisherigen Ereignissen des Tages sehr amüsiert, ahnten jedoch nicht, dass das Beste noch kommen würde.\n\nDie letzte Serie olympischer Wettkämpfe bestand jeweils aus dem Speerwurf, dem Duell und den Wettläufen.\nBeinahe wäre es zu einem Aufruhr gekommen, als [warrior_champion.GetName] den Speer über die gesamte Länge des Stadions warf und dabei beinahe einen Adligen aufspießte, der auf der Tribüne zusah. Beim Duell-Event erreichte [warrior_champion.GetFirstName] erneut das Finale und gewann den Kampf, während Tausende von Stimmen wie einer jubelten.\nNach all diesem Hype beendete unser aufstrebender Champion seine Aufgabe und absolvierte einen Marathon in weniger als zweieinhalb Stunden und stellte damit einen historischen Rekord auf, von dem nur wenige glaubten, dass er geschlagen werden könnte.\n\nDie ganze Menge begann, den Namen des neuen Siegers zu skandieren – [warrior_champion.GetFirstName], [warrior_champion.GetFirstName], der direkt gekrönt wurde durch unsere [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetName]. Es war ein Moment, der noch lange in Erinnerung bleiben würde.>  #NT!
 me_germania.39.a: "[warrior_champion.GetFirstName] should become my new sword..."  #<[warrior_champion.GetFirstName] sollte mein neues Schwert werden...>  #NT!
 celt_martial_olympics_champion: "[warrior_champion.GetName] mit einem #G Hohen Kriegskunstwert#! @military_icon! #Y ist deinem Hof beigetreten#!."
  
 me_germania_40_title: "Speech Of the Genius"  #<Rede des Genies>  #NT!
 me_germania_40_desc: "This year, for the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!, the competitors were neck to neck of each other, with everyone performing at their best. The crowds watching the Olympics were greatly amused by the events of the day thus far, but little did they know that the best was yet to come.\n\nThe last Olympic event of the day was the #Y Philosophy test#!. This discipline, imported from the original Olympics, is a very mysterious one.\nThe goal? Convice a jury composed of five persons about the point of view of a competitor on a philosophical subject. Each participant will have to convince that his argument and reason is the best.\n\nThis year, the subject for debate was 'can love be transferred from a god to a human?' Each contestent had two hours of preparation and started one by one giving their arguments under ten minutes.\n\nBut when it was the turn of [scientific_champion.GetName], the atmosphere in the room began to change. [scientific_champion.GetFirstName] started his speech by explaning [scientific_champion.GetHerHis] point of view in extremely simple words.\n\N[scientific_champion.GetName] managed to make a member of the jury cry and the public started to applaud as a sign that [scientific_champion.GetSheHe] will be the new champion.\n\n[scientific_champion.GetFirstName] may not be the greatest warrior or navigator, but [scientific_champion.GetSheHe] still won the love of the corwd. And it is for this reason that [scientific_champion.GetFirstName] was crowned by [ROOT.GetCountry.GetRuler.GetName] himself to be the winner of the #T [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!."  #<In diesem Jahr lieferten sich die Teilnehmer bei den #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spielen#!, ein Kopf-an-Kopf-Rennen, bei dem jeder sein Bestes gab. Die Zuschauer der Olympischen Spiele waren von den bisherigen Ereignissen des Tages sehr amüsiert, ahnten jedoch nicht, dass das Beste noch vor ihnen lag.\n\nDas letzte olympische Ereignis des Tages war der #Y Philosophietest#!.. Diese aus den ursprünglichen Olympischen Spielen importierte Disziplin ist sehr mysteriös.\nDas Ziel? Überzeugen Sie eine fünfköpfige Jury vom Standpunkt eines Teilnehmers zu einem philosophischen Thema. Jeder Teilnehmer muss davon überzeugen, dass sein Argument und seine Vernunft die besten sind.\n\nIn diesem Jahr lautete das Thema der Debatte: „Kann Liebe von einem Gott auf einen Menschen übertragen werden?“ Jeder Teilnehmer hatte zwei Stunden Vorbereitungszeit und begann einer nach dem anderen, seine Argumente in weniger als zehn Minuten vorzutragen.\n\nAber als [scientific_champion.GetName] an der Reihe war, begann sich die Atmosphäre im Raum zu ändern. [scientific_champion.GetFirstName] begann seine Rede, indem er den Standpunkt von [scientific_champion.GetHerHis] in extrem einfachen Worten darlegte.\n\N[scientific_champion.GetName] schaffte es, ein Mitglied der Jury zum Weinen zu bringen und die Öffentlichkeit begann zu applaudieren, als Zeichen dafür, dass [scientific_champion.GetSheHe] der neue Champion sein wird.\n\n[scientific_champion.GetFirstName] ist vielleicht nicht der größte Krieger oder Navigator, aber [scientific_champion.GetSheHe] hat trotzdem die Liebe des Korwds gewonnen. Und aus diesem Grund wurde [scientific_champion.GetFirstName] von [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]3 selbst zum Gewinner der [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]4 [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spiele#!. gekrönt>  #NT!
 me_germania.40.a: "The feather is mightier than the sword!"  #<Die Feder ist mächtiger als das Schwert!>  #NT!
 celt_charisma_olympics_champion: "[scientific_champion.GetName] mit einem #G hohen Charismawert#! @oratory_icon! #Y ist deinem Hof beigetreten#!."
  
 me_germania_41_title: "The Naval Race"  #<Das Seerennen>  #NT!
 me_germania_41_desc: "This year, the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#! opened the competition with a #Y boat race#!.\nThe goal was to reach a series of naval points before your opponents could, something easy enough that everyone could understand. Killing opponents or sinking other player's boats were not allowed, however, and the penalties for anyone violating these rules were made clear.\n\n[naval_champion.GetName] was already known among your sailors as an audacious warrior, ready at any moment to jump into a fight no matter the odds. When the race started, [naval_champion.GetFirstName] quickly took the lead and was able taunt [naval_champion.GetHerHis] opponents trying desperately to catch up without success.\n\nThe crowds waiting on the shore were shouting for [naval_champion.GetFirstName], hoping that the gods would bring [naval_champion.GetHerHim] victory. In the end, [naval_champion.GetName] won the race with a huge margin - more than two hours!\n\NAfter this opening race was completed, [naval_champion.GetFirstName] continued on many successes, winning many other events to become the victor of the [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!.\n\nOur [ROOT.GetCountry.GetRulerTitle] gave an olive branch, and the greedy crowds cried out for more races and more entertainment."  #<Dieses Jahr eröffneten die #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spiele#! den Wettbewerb mit einem #Y Bootsrennen#!.\nDas Ziel bestand darin, eine Reihe von Marinepunkten zu erreichen, bevor Ihre Gegner es konnten, etwas, das leicht genug war, dass jeder es verstehen konnte. Das Töten von Gegnern oder das Versenken der Boote anderer Spieler war jedoch nicht erlaubt, und die Strafen für jeden, der gegen diese Regeln verstößt, wurden klargestellt.\n\n[naval_champion.GetName] war unter Ihren Seeleuten bereits als kühner Krieger bekannt, der jederzeit bereit war, sich in einen Kampf zu stürzen, egal wie die Chancen stehen. Als das Rennen begann, übernahm [naval_champion.GetFirstName] schnell die Führung und konnte [naval_champion.GetHerHis]-Gegner verspotten, die verzweifelt versuchten, erfolglos aufzuholen.\n\nDie am Ufer wartenden Menschenmengen schrien nach [naval_champion.GetFirstName] und hofften, dass die Götter [naval_champion.GetHerHim] den Sieg bescheren würden. Am Ende gewann [naval_champion.GetName] das Rennen mit großem Vorsprung – mehr als zwei Stunden!\n\NNachdem dieses Eröffnungsrennen beendet war, setzte [naval_champion.GetFirstName] seine Erfolge fort und gewann viele andere Wettbewerbe, um der Sieger der [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#! zu werden.\n\nUnser [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]4 gab einen Olivenzweig und die gierigen Massen schrien nach mehr Rennen und mehr Unterhaltung.>  #NT!
 me_germania.41.a: "You will be my personnal navigator!"  #<Du wirst mein persönlicher Navigator sein!>  #NT!
 celt_finesse_olympics_champion: "[naval_champion.GetName] mit einem #G hohen Finessewert#! @civic_icon! #Y ist deinem Hof beigetreten#!."
  
 me_germania_42_title: "The Mouth Of The Gods"  #<Der Mund der Götter>  #NT!
 me_germania_42_desc: "This year, for the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!, the event finished with a religious divination ritual.\nThis task asked the participants to try to achieve a 'vision' of the gods, asking them to enter a meditative state in order to receive a divine revelation. This test is very mysterious, and many fail to achieve their intended goals, for the gods are capricious and do not always care for the plight of men.\nBut this year, [religious_champion.GetName] was not willing to let this event go unfinished with no results. After two hours of meditation, [religious_champion.GetFirstName] woke up with eyes that were blank, as though he [religious_champion.GetSheHe]was possessed. As [religious_champion.GetSheHe] started to move and dance slowly and strangely, the silent crowd watched very carefully, trying to understand what would happen next. Then [religious_champion.GetFirstName] start to talk in a loud, otherworldly voice that was heard by everyone present.\n\n'Brigantia speaks through me and makes her demands known. She is asking for one hundred warriors living in [ROOT.GetCountry.GetCapital.GetName] to dance in a circle. When it will be done, she will appear and speak an omen'. After hearing this strange voice coming out of [religious_champion.GetFirstName]'s mouth, the crowd was amazed and asked that one warriors be gathered immedately, even if crowd participation in the event was strictly forbidden. To prevent a riot [ROOT.GetCountry.GetRuler.GetName] accepted the crowd request and brought the soldiers to the center of the event, where they started to dance in a circle as asked by Brigantia. The sky was clear, but everyone present heard a loud peal of thunder that caused many to scream in fright and jump in their seats.\n\n'It is the sign of Brigantia - our cavalry will be faster than thunder!' say one man in the crowd. After such an amazing demonstration of faith, it was clear that [religious_champion.GetFirstName] would be the champion of the year. Still, some our [ROOT.GetCountry.GetRulerTitle] believes that some shenanigans were in action to manipulate everyone, but the fact is that the crowd is with [religious_champion.GetName], who is for now untouchable. Will [religious_champion.GetFirstName] become a High Druid or someone to banish as a troublemaker? Only time will tell."  #<In diesem Jahr endete die Veranstaltung für die #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spiele#!, mit einem religiösen Wahrsagungsritual.\nBei dieser Aufgabe sollten die Teilnehmer versuchen, eine „Vision“ der Götter zu erlangen, indem sie sie aufforderten, in einen meditativen Zustand zu versetzen, um eine göttliche Offenbarung zu erhalten. Dieser Test ist sehr mysteriös und viele scheitern daran, ihre beabsichtigten Ziele zu erreichen, denn die Götter sind launisch und kümmern sich nicht immer um die Notlage der Menschen.\nAber dieses Jahr war [religious_champion.GetName] nicht bereit, dieses Ereignis ohne Ergebnisse unvollendet bleiben zu lassen. Nach zwei Stunden Meditation wachte [religious_champion.GetFirstName] mit leeren Augen auf, als wäre er [religious_champion.GetSheHe] besessen. Als [religious_champion.GetSheHe] begann, sich langsam und seltsam zu bewegen und zu tanzen, beobachtete die schweigende Menge sehr aufmerksam und versuchte zu verstehen, was als nächstes passieren würde. Dann [religious_champion.GetFirstName] beginnen Sie mit einer lauten, jenseitigen Stimme zu sprechen, die von allen Anwesenden gehört wurde.\n\n'Brigantia spricht durch mich und macht ihre Forderungen kund. Sie bittet einhundert in [ROOT.GetCountry.GetCapital.GetName] lebende Krieger, im Kreis zu tanzen. Wenn es fertig ist, wird sie erscheinen und ein Omen sprechen. Als die Menge diese seltsame Stimme aus [religious_champion.GetFirstName]s Mund hörte, war sie erstaunt und forderte, dass sofort ein Krieger versammelt werde, auch wenn die Teilnahme der Menge an der Veranstaltung strengstens verboten sei. Um einen Aufstand zu verhindern, akzeptierte [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]0 die Bitte der Menschenmenge und brachte die Soldaten in die Mitte der Veranstaltung, wo sie auf Aufforderung von Brigantia begannen, im Kreis zu tanzen. Der Himmel war klar, aber alle Anwesenden hörten einen lauten Donnerschlag, der viele vor Angst aufschreien und von ihren Sitzen springen ließ.\n\n'Es ist das Zeichen von Brigantia – unsere Kavallerie wird schneller sein als der Donner!' Sagte ein Mann in der Menge. Nach solch einem erstaunlichen Glaubensbeweis war klar, dass [religious_champion.GetFirstName] der Champion des Jahres sein würde. Dennoch glauben einige unserer [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]2, dass einige Spielereien im Einsatz waren, um alle zu manipulieren, aber Tatsache ist, dass die Menge auf der Seite von [religious_champion.GetName] ist, der vorerst unantastbar ist. Wird [religious_champion.GetFirstName] ein Hochdruide oder jemand, den man als Unruhestifter verbannen kann? Nur die Zeit wird es zeigen.>  #NT!
 me_germania.42.a: "Congratulations, [religious_champion.GetFirstName]..."  #<Herzlichen Glückwunsch, [religious_champion.GetFirstName]...>  #NT!
 celt_religious_olympics_champion: "[religious_champion.GetName] mit einem #G hohen Eiferwert#! @religious_icon! #Y ist deinem Hof beigetreten#!."
  
 me_germania_43_title: "Classical Games"  #<Klassische Spiele>  #NT!
 me_germania_43_desc: "This year, for the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#!, the events were fairly disputed but no one stood out from the crowd - all of the athletes were unimpressive and uninspiring.\nWhile the games were enjoyed by the crowd in [ROOT.GetCountry.GetCapital.GetName], at the end of the day, the lack of one man or woman above the other makes this #T [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]#! iteration of the Olympics nothing worth remembering.\n\n[ROOT.GetCountry.GetRuler.GetName] crowned a participant that refused to join your court after that, asking to return home instead. Retirement is sometimes the best option."  #<In diesem Jahr waren die Ereignisse bei den #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spielen#!, ziemlich umstritten, aber niemand stach aus der Masse hervor – alle Athleten waren unscheinbar und wenig inspirierend.\nWährend die Spiele in [ROOT.GetCountry.GetCapital.GetName] dem Publikum Spaß machten, macht das Fehlen eines Mannes oder einer Frau über dem anderen diese #T [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y]#! Wiederholung der Olympischen Spiele letztendlich wertlos Ich erinnere mich.\n\n[ROOT.GetCountry.GetRuler.GetName] krönte einen Teilnehmer, der sich danach weigerte, Ihrem Gericht beizutreten, und stattdessen darum bat, nach Hause zurückzukehren. Der Ruhestand ist manchmal die beste Option.>  #NT!
 me_germania.43.a: "At least a victor was crowned"  #<Zumindest wurde ein Sieger gekrönt>  #NT!
  
 me_germania_44_title: "Dangerous Game"  #<Gefährliches Spiel>  #NT!
 me_germania_44_desc: "This year, the #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics#! were said to be the worst in a generation, and the people returned home disappointed in the festivities.\nThere were many events that did not take place this year due to a lack of funds, and rumors of [ROOT.GetCountry.GetRuler.GetName]'s corruption were blamed as the likely reason for the shabby showing.\n\nOne victor was crowned but was jeered by the crowd, and soldiers had to disperse the unruly crowds that refused to leave.\nIt may be better to not hold games if we don't have the funds to finance them."  #<In diesem Jahr galten die #Y [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spiele#! als die schlimmsten seit einer Generation, und die Menschen kehrten von den Feierlichkeiten enttäuscht nach Hause zurück.\nViele Veranstaltungen fanden dieses Jahr aus Geldmangel nicht statt, und Gerüchte über die Korruption von [ROOT.GetCountry.GetRuler.GetName] wurden als wahrscheinlicher Grund für das schlechte Abschneiden angeführt.\n\nEin Sieger wurde gekrönt, aber von der Menge verhöhnt, und die Soldaten mussten es tun Zerstreuen Sie die widerspenstigen Menschenmassen, die sich weigerten zu gehen.\nEs könnte besser sein, keine Spiele abzuhalten, wenn wir nicht über die Mittel verfügen, sie zu finanzieren.>  #NT!
 me_germania.44.a: "What I have done? I created a monster..."  #<Was habe ich getan? Ich habe ein Monster erschaffen...>  #NT!
  
 me_germania_45_title: "The [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympics"  #<Die [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('num_celt_olympics_game').GetValue|0Y] Olympischen Spiele>  #NT!
 me_germania_45_desc: "Today is the date to organize a new #Y Olympics#! in [ROOT.GetCountry.GetName], four years after the last opportunity.\n[ROOT.GetCountry.GetRuler.GetName] will now decide if we will organize them and, if so, who will pay the cost."  #<Heute ist der Termin für die Organisation einer neuen #Y Olympiade#! in [ROOT.GetCountry.GetName], vier Jahre nach der letzten Gelegenheit.\n[ROOT.GetCountry.GetRuler.GetName] wird nun entscheiden, ob wir sie organisieren und wenn ja, wer die Kosten trägt.>  #NT!
 me_germania.45.a: "[ROOT.GetCountry.GetName] will take everything in charge and make them free."  #<[ROOT.GetCountry.GetName] übernimmt alles und macht es frei.>  #NT!
 me_germania.45.b: "We will split the cost between us and our people."  #<Wir werden die Kosten zwischen uns und unseren Leuten teilen.>  #NT!
 me_germania.45.c: "It is a game for the [ROOT.GetCountry.GetAdjective] so they will pay them entirely!"  #<Es ist ein Spiel für die [ROOT.GetCountry.GetAdjective], also werden sie sie vollständig bezahlen!>  #NT!
 me_germania.45.d: "We cannot organize them, sadly"  #<Wir können sie leider nicht organisieren>  #NT!
  
 #me_germania_46_title: ""
 #me_germania_46_desc: ""
 #me_germania.46.a: ""
  
 me_germania_47_title: "Developement Focus"  #<Entwicklungsfokus>  #NT!
 me_germania_47_desc: "The lack of infrastructure inside [ROOT.GetCountry.GetName] has become a problem that must be addressed in order to respond to the expectations of the people of [ROOT.GetCountry.GetAdjective]. To deal with this predicament, [ROOT.GetCountry.GetRuler.GetName] just launched a development plan that will last many years and keep our hands busy.\n\nWhen all is said and done, we will have a country that we will proud to show to the world - a land of cities and roads and temples and academies!"  #<Der Mangel an Infrastruktur innerhalb von [ROOT.GetCountry.GetName] ist zu einem Problem geworden, das angegangen werden muss, um den Erwartungen der Menschen von [ROOT.GetCountry.GetAdjective] gerecht zu werden. Um mit dieser misslichen Lage umzugehen, hat [ROOT.GetCountry.GetRuler.GetName] gerade einen Entwicklungsplan ins Leben gerufen, der viele Jahre dauern und unsere Hände beschäftigen wird.\n\nAm Ende werden wir ein Land haben, das wir der Welt voller Stolz zeigen werden – ein Land der Städte, Straßen, Tempel und Akademien!>  #NT!
 me_germania.47.a: "Every man and woman at his duty - a new era will start soon"  #<Jeder Mann und jede Frau im Einsatz – bald beginnt eine neue Ära>  #NT!
  
 #me_germania_48_title: ""
 #me_germania_48_desc: ""
 #me_germania.48.a: ""
  
 me_germania_49_title: "A Pushback Against Progress"  #<Ein Widerstand gegen den Fortschritt>  #NT!
 me_germania_49_desc: "The modernization that is going on inside [ROOT.GetCountry.GetName] that has been implemented by our ruler [ROOT.GetCountry.GetRuler.GetName] is not to the taste of everyone. [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] and his family have objected angrily to the costs involved with the project, and are consistently loud voices of opposition.\nRecently [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] gave us an ultimatum; if we do not slow down some of the reforms, we risk a #R Civil War#!."  #<Die von unserem Herrscher [ROOT.GetCountry.GetRuler.GetName] durchgeführte Modernisierung im Inneren von [ROOT.GetCountry.GetName] ist nicht jedermanns Sache. [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] und seine Familie haben verärgert Einwände gegen die mit dem Projekt verbundenen Kosten erhoben und sind stets lautstarke Gegner.\nKürzlich hat [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] uns ein Ultimatum gestellt; Wenn wir einige der Reformen nicht verlangsamen, riskieren wir einen #R Bürgerkrieg#!.>  #NT!
 me_germania.49.a: "We will watch this [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] carefully"  #<Wir werden dies [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] aufmerksam beobachten>  #NT!
 me_germania.49.b: "We cannot risk the fate of [ROOT.GetCountry.GetName] now"  #<Wir können das Schicksal von [ROOT.GetCountry.GetName] jetzt nicht riskieren>  #NT!
 GEE_Traditionnalist_civil_war_incomming: "[SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] will start a #R Civil war#! at the completion of the mission."  #<[SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] wird nach Abschluss der Mission einen #R Bürgerkrieg#! beginnen.>  #NT!
 GEE_Traditionnalist_lose_loyalty: "[SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetFamily.GetName|0Y] Family will lose #R 45#! Loyalty "  #<[SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetFamily.GetName|0Y] Familie wird #R 45#! Loyalität verlieren>  #NT!
 GEE_civil_war_prevent: "The #R Civil War#! will be #G avoided#!."  #<Der #R Bürgerkrieg#! wird #G vermieden#!.>  #NT!
  
 me_germania_50_title: "Dawn Of A New Era"  #<Beginn einer neuen Ära>  #NT!
 me_germania_50_desc: "So consumed was [ROOT.GetCountry.GetRuler.GetName] with doing the good work of ruling over the people of [ROOT.GetCountry.GetName] that [ROOT.GetCountry.GetRuler.GetSheHe] was blindsided by the proclamation of civil war by a disgruntled noble. As the stormclouds of war threatened [ROOT.GetCountry.GetCapital.GetName], it was then that [ROOT.GetCountry.GetRuler.GetFirstName] realized a new era would only begin when all opposition had been completely destroyed; this moment was preordained by the gods, and victory was all but assured from this moment."  #<[ROOT.GetCountry.GetRuler.GetName] war so sehr damit beschäftigt, die gute Arbeit zu leisten, über das Volk von [ROOT.GetCountry.GetName] zu herrschen, dass [ROOT.GetCountry.GetRuler.GetSheHe] von der Ausrufung des Bürgerkriegs durch einen verärgerten Adligen überrascht wurde. Als [ROOT.GetCountry.GetCapital.GetName] die Sturmwolken des Krieges drohten, wurde [ROOT.GetCountry.GetRuler.GetFirstName] klar, dass eine neue Ära erst beginnen würde, wenn alle Opposition vollständig zerstört worden wäre; Dieser Moment war von den Göttern vorherbestimmt und der Sieg war von diesem Moment an so gut wie sicher.>  #NT!
 me_germania.50.a: "I shall destroy all that oppose me!"  #<Ich werde alle zerstören, die sich mir widersetzen!>  #NT!
 me_germania.50.b: "My rival is dead and his legacy is sure to folllow!"  #<Mein Rivale ist tot und sein Vermächtnis wird mit Sicherheit folgen!>  #NT!
 me_germania_50_tooltip: "The mission task '#Y Dawn Of A New Era#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Dawn Of A New Era#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_51_title: "Observing A Rival"  #<Einen Rivalen beobachten>  #NT!
 me_germania_51_desc: "Not willing to stop agitating politically, [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] continues to try to gather support in order to overthrow [ROOT.GetCountry.GetRuler.GetName], and is said to consort with many members of the [family_leader.GetFamily.GetName] family in order to gain access to the resources and friendship of [family_leader.GetName].\n\nThanks to the vigilance of [ROOT.GetCountry.GetRuler.GetFirstName]'s spies in reporting these movements, [ROOT.GetCountry.GetRuler.GetSheHe] can negate these attempts at gaining friends by spreading gold to buy influence.\n\nBut is it the right choice?"  #<Da [SCOPE.GetRootScope.GetCountry.MakeScope.GetVariable('traditionnalist_leader').GetCharacter.GetName|0Y] nicht bereit ist, mit der politischen Agitation aufzuhören, versucht er weiterhin, Unterstützung zu sammeln, um [ROOT.GetCountry.GetRuler.GetName] zu stürzen, und soll mit vielen Mitgliedern der [family_leader.GetFamily.GetName]-Familie zusammenarbeiten, um Zugang zu den Ressourcen und der Freundschaft von [family_leader.GetName] zu erhalten.\n\nDank der Wachsamkeit von [ROOT.GetCountry.GetRuler.GetFirstName]s Spionen bei der Meldung dieser Bewegungen kann [ROOT.GetCountry.GetRuler.GetSheHe] diese Versuche, Freunde zu gewinnen, zunichtemachen Gold verbreiten, um Einfluss zu erkaufen.\n\nAber ist es die richtige Wahl?>  #NT!
 me_germania.51.a: "I will buy the [family_leader.GetFamily.GetName] family first! "  #<Ich werde zuerst die [family_leader.GetFamily.GetName]-Familie kaufen!>  #NT!
 me_germania.51.b: "I don't care"  #<Es ist mir egal>  #NT!
 GEE_family_bought_tt: "The [family_leader.GetFamily.GetName] family will gain #G 20#! Loyalty. "  #<Die [family_leader.GetFamily.GetName]-Familie erhält #G 20#! Loyalität.>  #NT!
 GEE_family_conviced_tt: "The [family_leader.GetFamily.GetName] family will lose #R 25#! Loyalty. "  #<Die [family_leader.GetFamily.GetName]-Familie wird #R 25#! Loyalität verlieren.>  #NT!
  
 me_germania_52_title: "Peace And Modernization"  #<Frieden und Modernisierung>  #NT!
 me_germania_52_desc: "The opposition of [ROOT.GetCountry.GetRuler.GetName] is done, and no voices will stop us from adding the final touch to create the perfect society.\n\nWe can collect now the fruits of our effort."  #<Der Widerstand von [ROOT.GetCountry.GetRuler.GetName] ist erledigt und keine Stimme wird uns davon abhalten, den letzten Schliff zu geben, um die perfekte Gesellschaft zu schaffen.\n\nWir können jetzt die Früchte unserer Bemühungen ernten.>  #NT!
 me_germania.52.a: "Rome await us"  #<Rom erwartet uns>  #NT!
 me_germania.52.b: "Our Punic knowledge is the best"  #<Unsere punischen Kenntnisse sind die besten>  #NT!
 me_germania.52.c: "Celts will have cities state like the Greek one."  #<Kelten würden Städte wie den griechischen haben.>  #NT!
 GEE_unlock_roman_tradition: "We will unlock the #Y Roman tradition#!."  #<Wir werden die #Y römische Tradition#!. freischalten>  #NT!
 GEE_unlock_punic_tradition: "We will unlock the #Y Punic tradition#!."  #<Wir werden die #Y punische Tradition#!. freischalten>  #NT!
 GEE_unlock_greek_city_tradition: "We will unlock the #Y Greek city state tradition#!."  #<Wir werden die #Y griechische Stadtstaattradition#!. freischalten>  #NT!
  
 me_germania_53_title: "Golden Age"  #<Goldenes Zeitalter>  #NT!
 me_germania_53_desc: "As peace, strength and prosperity have permanently come to stay within the lands of the [ROOT.GetCountry.GetAdjective] people, [ROOT.GetCountry.GetRuler.GetName] has made a proclamation from [ROOT.GetCountry.GetCapital.GetName] - [ROOT.GetCountry.GetName] has entered a #E Golden Era#! and we are living through days that we might never see again.\n\nTo celebrate this accomplishment, it has been proposed that we celebrate somehow, but it has been impossible to settle upon exactly how this should be done. [ROOT.GetCountry.GetRuler.GetFirstName] will have an important decision to make."  #<Da Frieden, Stärke und Wohlstand dauerhaft in den Ländern der [ROOT.GetCountry.GetAdjective] Menschen verankert sind, hat [ROOT.GetCountry.GetRuler.GetName] eine Proklamation von [ROOT.GetCountry.GetCapital.GetName] gemacht – [ROOT.GetCountry.GetName] ist in eine #E Goldene Ära#! eingetreten und wir durchleben Tage, die wir vielleicht nie wieder erleben werden.\n\nUm diese Errungenschaft zu feiern, wurde vorgeschlagen, dass wir irgendwie feiern, aber es war unmöglich, uns genau darauf festzulegen, wie das sein sollte erledigt. [ROOT.GetCountry.GetRuler.GetFirstName] muss eine wichtige Entscheidung treffen.>  #NT!
 me_germania.53.a: "Political capital is always important to have"  #<Politisches Kapital ist immer wichtig>  #NT!
 me_germania.53.b: "None of this would have been possible without me!"  #<Ohne mich wäre das alles nicht möglich gewesen!>  #NT!
 me_germania.53.c: "Everyone must unite and celebrate together"  #<Alle müssen sich zusammenschließen und gemeinsam feiern>  #NT!
 me_germania.53.d: "Stability within our realm is what I desire"  #<Stabilität in unserem Reich ist das, was ich mir wünsche>  #NT!
 me_germania.53.e: "What is more golden that coins?"  #<Was ist goldener als Münzen?>  #NT!
 GEE_loyalty_of_everyone: "All characters will gain #G 5#! Loyalty. "  #<Alle Charaktere erhalten #G 5#! Loyalität.>  #NT!
 me_germania_53_tooltip: "The mission task '#Y Golden Age#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Goldenes Zeitalter#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_54_title: "The Road Forward"  #<Der Weg nach vorn>  #NT!
 me_germania_54_desc: "[ROOT.GetCountry.GetRuler.GetName] has spent many sleepless nights over the last few weeks pondering the future of [ROOT.GetCountry.GetName] - only a fool could not see how much things have changed within our country over the last few years. Many foreigners live amongst our people, and it is very common for our kinsmen to know a few words in a couple of languages; we are not an isolated society anymore, but a major power, a center of gravity in our corner of the world.\n\nThe thoughts that have kept [ROOT.GetCountry.GetRuler.GetFirstName] awake involve the future of the [ROOT.GetCountry.GetAdjective] people; what will their legacy be? Will they remain as they always have been, or will the forces of change be too great and inescapable? And if this is the case, is this necessarily even a bad thing? Change is growth, after all, and our people will need to adapt to an ever-changing world if they hope to survive.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] believes that [ROOT.GetCountry.GetRuler.GetSheHe] knows the answer to these questions."  #<[ROOT.GetCountry.GetRuler.GetName] hat in den letzten Wochen viele schlaflose Nächte damit verbracht, über die Zukunft von [ROOT.GetCountry.GetName] nachzudenken – nur ein Narr könnte nicht erkennen, wie sehr sich die Dinge in unserem Land in den letzten Jahren verändert haben. Unter unserem Volk leben viele Ausländer, und es kommt häufig vor, dass unsere Verwandten ein paar Wörter in mehreren Sprachen beherrschen; Wir sind keine isolierte Gesellschaft mehr, sondern eine Großmacht, ein Schwerpunkt in unserem Teil der Welt.\n\nDie Gedanken, die [ROOT.GetCountry.GetRuler.GetFirstName] wach gehalten haben, betreffen die Zukunft der [ROOT.GetCountry.GetAdjective] Menschen; Was wird ihr Vermächtnis sein? Werden sie so bleiben, wie sie immer waren, oder werden die Kräfte der Veränderung zu groß und unausweichlich sein? Und wenn dies der Fall ist, ist das dann zwangsläufig überhaupt eine schlechte Sache? Veränderung ist schließlich Wachstum, und unsere Leute müssen sich an eine sich ständig verändernde Welt anpassen, wenn sie überleben wollen.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] glaubt, dass [ROOT.GetCountry.GetRuler.GetSheHe] die Antwort auf diese Fragen kennt.>  #NT!
 me_germania.54.a: "Our [ROOT.GetCountry.GetAdjective] heritage has brought us to the heights of glory!"  #<Unser [ROOT.GetCountry.GetAdjective]-Erbe hat uns zu den Höhen des Ruhms geführt!>  #NT!
 me_germania.54.b: "The power of our faith is the reason that we have triumphed"  #<Die Kraft unseres Glaubens ist der Grund dafür, dass wir gesiegt haben>  #NT!
 me_germania.54.c: "[ROOT.GetCountry.GetName] is strong thanks to our cities and armies"  #<[ROOT.GetCountry.GetName] ist dank unserer Städte und Armeen stark>  #NT!
 me_germania.54.d: "Our wealth should be used to hire armies to subdue the world!"  #<Unser Reichtum sollte dazu verwendet werden, Armeen anzuheuern, um die Welt zu unterwerfen!>  #NT!
 me_germania.54.e: "I foresee a future where our realm is a leader in research..."  #<Ich sehe eine Zukunft voraus, in der unser Reich führend in der Forschung sein wird ...>  #NT!
 me_germania_54_tooltip: "The mission task '#Y The Road Forward#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y The Road Forward#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_55_title: "Invest In Our Tradition"  #<Investieren Sie in unsere Tradition>  #NT!
 me_germania_55_desc: "[ROOT.GetCountry.GetRuler.GetName] has proclaimed a period of celebration, one wherein festivals that honor our gods shall be held, accompanied by feasts and games. The [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName] has sworn to uphold the traditional practices of our [ROOT.GetCountry.GetAdjective] ancestors, especially now that our influence has brought many strangers to our shores. We cannot afford to neglect the source of strength that brought us to this moment, [ROOT.GetCountry.GetRuler.GetFirstName] believes, and no expense is too great when it comes to honoring our forefathers."  #<[ROOT.GetCountry.GetRuler.GetName] hat eine Zeit der Feierlichkeiten ausgerufen, in der Feste zu Ehren unserer Götter abgehalten werden sollen, begleitet von Festen und Spielen. Der [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName] hat geschworen, die traditionellen Praktiken unserer [ROOT.GetCountry.GetAdjective] Vorfahren aufrechtzuerhalten, insbesondere jetzt, da unser Einfluss viele Fremde an unsere Küsten gebracht hat. Wir können es uns nicht leisten, die Quelle der Kraft zu vernachlässigen, die uns zu diesem Moment geführt hat, glaubt [ROOT.GetCountry.GetRuler.GetFirstName], und kein Aufwand ist zu hoch, wenn es darum geht, unsere Vorfahren zu ehren.>  #NT!
 me_germania.55.a: "Our Celtic traditions must never be abandoned"  #<Unsere keltischen Traditionen dürfen niemals aufgegeben werden>  #NT!
 me_germania_55_tooltip: "The mission task '#Y Invest In Our Tradition#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Investieren Sie in unsere Tradition#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_56_title: "Germanic Armies"  #<Germanische Armeen>  #NT!
 me_germania_56_desc: "[ROOT.GetCountry.GetRuler.GetName] must now make a decision regarding our military forces - a task that the [ROOT.GetCountry.GetRulerTitle] is very invested in, for [ROOT.GetCountry.GetRuler.GetSheHe] has long taken interest in commanding the [ROOT.GetCountry.GetAdjective] levies.\n\nThanks to our military and economic strength, we can finally invest in our army, and now we must decide who should receive training and new equipment; our horsemen or our archers? Both choices have their merits, and it is a difficult question that [ROOT.GetCountry.GetRuler.GetFirstName] must answer."  #<[ROOT.GetCountry.GetRuler.GetName] muss nun eine Entscheidung über unsere Streitkräfte treffen – eine Aufgabe, die dem [ROOT.GetCountry.GetRulerTitle] sehr am Herzen liegt, denn [ROOT.GetCountry.GetRuler.GetSheHe] hat schon lange Interesse daran, die [ROOT.GetCountry.GetAdjective]-Aufgebote zu befehligen.\n\nDank unserer militärischen und wirtschaftlichen Stärke können wir endlich in unsere Armee investieren, und jetzt müssen wir entscheiden, wer Ausbildung und neue Ausrüstung erhalten soll; unsere Reiter oder unsere Bogenschützen? Beide Entscheidungen haben ihre Berechtigung und es ist eine schwierige Frage, die [ROOT.GetCountry.GetRuler.GetFirstName] beantworten muss.>  #NT!
 me_germania.56.a: "Our bold cavalry, crashing into the foe, must become more powerful"  #<Unsere kühne Kavallerie muss stärker werden, wenn sie auf den Feind stößt>  #NT!
 me_germania.56.b: "Let us strengthen our archers, who strike from a distance"  #<Stärken wir unsere Bogenschützen, die aus der Distanz zuschlagen>  #NT!
 me_germania_56_tooltip: "The mission task '#Y Germanic Armies#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Germanische Armeen#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_57_title: "Oral Traditions"  #<Mündliche Überlieferungen>  #NT!
 me_germania_57_desc: "For as long as our people have known, our Tribal Elders have maintained an oral tradition of transmitting our histories and records, singing songs and reciting long poems that praise our ancestors and legendary warriors. Merchants and traders have brought Greek scrolls and texts to our markets, and we are familiar with the alphabets and manners of writing of many nations, but have decided to continue to rely on the traditional way of doing things.\n\nAnd yet contact with the conquered peoples of our nation have shown us that there are benefits to writing things down - if [ROOT.GetCountry.GetRuler.GetName] so desired, we could adopt this method for certain things that are important."  #<Solange unser Volk es weiß, pflegen unsere Stammesältesten eine mündliche Tradition der Übermittlung unserer Geschichten und Aufzeichnungen, des Singens von Liedern und des Rezitierens langer Gedichte, in denen unsere Vorfahren und legendären Krieger gepriesen werden. Kaufleute und Händler haben griechische Schriftrollen und Texte auf unsere Märkte gebracht, und wir sind mit den Alphabeten und Schreibweisen vieler Nationen vertraut, haben uns jedoch entschieden, weiterhin auf die traditionelle Vorgehensweise zu vertrauen.\n\nUnd doch hat uns der Kontakt mit den eroberten Völkern unserer Nation gezeigt, dass es Vorteile hat, Dinge aufzuschreiben – wenn [ROOT.GetCountry.GetRuler.GetName] es gewünscht wäre, könnten wir diese Methode für bestimmte Dinge übernehmen, die wichtig sind.>  #NT!
 me_germania.57.a: "What was good for my fathers is good enough for me"  #<Was für meine Väter gut war, ist für mich gut genug>  #NT!
 me_germania.57.b: "Let us integrate some of the new ways; what's the harm?"  #<Lassen Sie uns einige der neuen Wege integrieren. Was ist der Schaden?>  #NT!
 me_germania.57.c: "We will modernize everything and create our own Alphabet instead."  #<Wir werden alles modernisieren und stattdessen unser eigenes Alphabet schaffen.>  #NT!
 me_germania_57_tooltip: "The mission task '#Y Oral Traditions#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Oral Traditions#!'“ wurde nun #G abgeschlossen#!!>  #NT!
 GEE_oratory_tech: "This option is availaible because we have #Y Oratory tech 8#! or more."  #<Diese Option ist verfügbar, da wir über #Y Redetechnik 8#! oder mehr verfügen.>  #NT!
  
 me_germania_58_title: "A New Alphabet"  #<Ein neues Alphabet>  #NT!
 me_germania_58_desc: "After a few very busy months, a group of the most learned scribes living in [ROOT.GetCountry.GetCapital.GetName] approached [ROOT.GetCountry.GetRuler.GetName] with the results of their stenuous labor; a brand new alphabet for the [ROOT.GetCountry.GetAdjective] people to use. In order to celebrate this admirable achievement, the [ROOT.GetCountry.GetRulerTitle] has called for proclamations to be sent throughout [ROOT.GetCountry.GetName].\nBut what was their inspirations?"  #<Nach einigen sehr arbeitsreichen Monaten trat eine Gruppe der gelehrtesten Schreiber aus [ROOT.GetCountry.GetCapital.GetName] mit den Ergebnissen ihrer anstrengenden Arbeit an [ROOT.GetCountry.GetRuler.GetName] heran; ein brandneues Alphabet für die [ROOT.GetCountry.GetAdjective]-Leute. Um diese bewundernswerte Leistung zu feiern, hat die [ROOT.GetCountry.GetRulerTitle] dazu aufgerufen, im gesamten [ROOT.GetCountry.GetName] Proklamationen zu verschicken.\nAber was waren ihre Inspirationen?>  #NT!
 me_germania.58.a: "From this day forward, all must use this new #Y Celtic#! script"  #<Von diesem Tag an müssen alle dieses neue #Y Celtic#!-Skript verwenden>  #NT!
 me_germania.58.b: "From this day forward, all must use this new #Y Latin#! script"  #<Von diesem Tag an müssen alle diese neue #Y Latein#!-Schrift verwenden>  #NT!
 me_germania.58.c: "From this day forward, all must use this new #Y Punic#! script"  #<Von diesem Tag an müssen alle dieses neue #Y Punic#!-Skript verwenden>  #NT!
 me_germania.58.d: "From this day forward, all must use this new #Y Greek#! script"  #<Von diesem Tag an müssen alle dieses neue #Y Greek#!-Skript verwenden>  #NT!
 me_germania_58_tooltip: "The mission task '#Y A New Alphabet#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Ein neues Alphabet#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_60_title: "Elephants in [ROOT.GetCountry.GetName]"  #<Elefanten in [ROOT.GetCountry.GetName]>  #NT!
 me_germania_60_desc: "Long time ago, wonderful animals such as elephants @elephants! were unknown inside the Celtic world.\nBut after the trip organized by [ROOT.GetCountry.GetRuler.GetName], our vision of the world, with its many wonders, changed completely, and we can no longer live as we once did. With elephants at hand, we can now adopt the strategy of mighty Carthage - her people utilize the gentle giants in ways that would be very beneficial for our armies.\n\nShould we learn how to use the elephants in battle? Or perhaps we should improve our tactics by training our land and army forces together, with all units from the elephant to the liburnian fighting as one?"  #<Vor langer Zeit gab es wundervolle Tiere wie Elefanten @elephants! waren in der keltischen Welt unbekannt.\nAber nach der von [ROOT.GetCountry.GetRuler.GetName] organisierten Reise veränderte sich unsere Sicht auf die Welt mit ihren vielen Wundern völlig und wir können nicht mehr so ​​leben wie früher. Mit Elefanten können wir jetzt die Strategie des mächtigen Karthago übernehmen – sein Volk nutzt die sanften Riesen auf eine Weise, die für unsere Armeen von großem Nutzen wäre.\n\nSollten wir lernen, die Elefanten im Kampf einzusetzen? Oder sollten wir vielleicht unsere Taktik verbessern, indem wir unsere Land- und Armeekräfte gemeinsam ausbilden und alle Einheiten vom Elefanten bis zum Liburnier als Einheit kämpfen?>  #NT!
 me_germania.60.a: "Elephants are coming!"  #<Elefanten kommen!>  #NT!
 me_germania.60.b: "We will combine everything and our forces will be invicible!"  #<Wir werden alles vereinen und unsere Kräfte werden unbesiegbar sein!>  #NT!
  
 me_germania_61_title: "Invictus Germanicus"  #<Invictus Germanicus>  #NT!
 me_germania_61_desc: "Our recent fascination for Rome and their armies have lead us to create our own Roman force, one that will be the equal of any raised near the City of Seven Hills by the Tiber. [ROOT.GetCountry.GetRuler.GetName] has done wonders to achieve this but there is still one question to answer.\n\nThe Romans are famous for their legions but also for their military engineering, which many claim is the best in the world. What will [ROOT.GetCountry.GetRuler.GetName] decide to prioritize for our own ways? "  #<Unsere jüngste Faszination für Rom und seine Armeen hat uns dazu veranlasst, eine eigene römische Streitmacht zu schaffen, die allen in der Nähe der Stadt der Sieben Hügel am Tiber aufgestellten Streitkräften ebenbürtig sein wird. [ROOT.GetCountry.GetRuler.GetName] hat Wunder vollbracht, um dies zu erreichen, aber es gibt noch eine Frage, die beantwortet werden muss.\n\nDie Römer sind berühmt für ihre Legionen, aber auch für ihre Militärtechnik, von der viele behaupten, sie sei die beste der Welt. Was wird [ROOT.GetCountry.GetRuler.GetName] für unsere eigenen Wege priorisieren?>  #NT!
 me_germania.61.a: "Our armies will be hailed as true legions!"  #<Unsere Armeen werden als wahre Legionen gefeiert!>  #NT!
 me_germania.61.b: "Bring us their mathematicians and soldiers"  #<Bringen Sie uns ihre Mathematiker und Soldaten>  #NT!
  
 me_germania_62_title: "A Modern Army"  #<Eine moderne Armee>  #NT!
 me_germania_62_desc: "Alexander was the best commander of the world, conquering Persia, Egypt and a part of India in a blaze of glory, and his name is known even in [ROOT.GetCountry.GetCapital.GetName]. As legendary as Alexander's accomplishments were, he wouldn't have achieved his feats without the exceptional training and technique of his men - something that even the proud warrior knew in his heart.\n\n[ROOT.GetCountry.GetRuler.GetName], having learned of the deeds of Alexander and desiring to surpass the Macedonian in glory, has decided to create a force that will be known far and wide as the best in the world. But what should be the main priority of the [ROOT.GetCountry.GetAdjective] soldiers? Mastering the spear or creating a new Bucephalus for the army?"  #<Alexander war der beste Feldherr der Welt und eroberte Persien, Ägypten und einen Teil Indiens in glanzvoller Pracht. Sein Name ist sogar im Jahr [ROOT.GetCountry.GetCapital.GetName] bekannt. So legendär Alexanders Leistungen auch waren, er hätte seine Heldentaten ohne die außergewöhnliche Ausbildung und Technik seiner Männer nicht vollbracht – etwas, das selbst der stolze Krieger in seinem Herzen wusste.\n\n[ROOT.GetCountry.GetRuler.GetName], der von den Taten Alexanders erfahren hatte und den Makedonier an Ruhm übertreffen wollte, hat beschlossen, eine Streitmacht zu schaffen, die weit und breit als die beste der Welt bekannt sein wird. Aber was sollte die Hauptpriorität der [ROOT.GetCountry.GetAdjective] Soldaten sein? Den Speer beherrschen oder einen neuen Bucephalus für die Armee erschaffen?>  #NT!
 me_germania.62.a: "Our men will be true masters of the spear"  #<Unsere Männer werden wahre Meister des Speeres sein>  #NT!
 me_germania.62.b: "Alexander loved his horse more than anything"  #<Alexander liebte sein Pferd über alles>  #NT!
 me_germania_62_tooltip: "The mission task '#Y A Modern Army#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Eine moderne Armee#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_63_title: "Keeping Our Roots"  #<Unsere Wurzeln bewahren>  #NT!
 me_germania_63_desc: "A busy period of investment and growth has swept through [ROOT.GetCountry.GetName], and one can hardly travel to a city within the [ROOT.GetCountry.GetAdjective] homeland without seeing the obvious signs of construction; large cranes towering over the streets, stacks of bricks guarded by soldiers, and a steady stream of pack animals carrying supplies and groaning under their loads are a daily sight.\n\nEven though change is clearly in the air, the people have vowed to remember their traditional ways, promising themselves that the effects of civilization would not change the core of who they are. And for every palace or exquisite garden that was built, so, too, was a temple or a shrine; the gods must retain their place in [ROOT.GetCountry.GetAdjective] society."  #<[ROOT.GetCountry.GetName] hat eine geschäftige Zeit der Investitionen und des Wachstums erlebt, und man kann kaum in eine Stadt im Heimatland [ROOT.GetCountry.GetAdjective] reisen, ohne die offensichtlichen Zeichen des Baus zu sehen; Große Kräne, die die Straßen überragen, Ziegelstapel, die von Soldaten bewacht werden, und ein stetiger Strom von Lasttieren, die Vorräte tragen und unter ihrer Last ächzen, sind ein täglicher Anblick.\n\nAuch wenn offensichtlich Veränderung in der Luft liegt, haben sich die Menschen geschworen, sich an ihre traditionellen Gewohnheiten zu erinnern, und sich geschworen, dass die Auswirkungen der Zivilisation den Kern ihrer Persönlichkeit nicht verändern würden. Und für jeden Palast oder herrlichen Garten, der gebaut wurde, gab es auch einen Tempel oder einen Schrein; Die Götter müssen ihren Platz in der [ROOT.GetCountry.GetAdjective] Gesellschaft behalten.>  #NT!
 me_germania.63.a: "We cannot abandon the virtues of our ancestors!"  #<Wir können die Tugenden unserer Vorfahren nicht aufgeben!>  #NT!
 me_germania_63_tooltip: "The mission task '#Y Keeping Our Roots#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Unsere Wurzeln bewahren#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_64_title: "Rewarding The People"  #<Die Menschen belohnen>  #NT!
 me_germania_64_desc: "In order to ensure that our traditions will be safeguarded in the years to come, [ROOT.GetCountry.GetRuler.GetName] has decided to invest a kingly sum into making this happen. Naturally, [ROOT.GetCountry.GetRuler.GetHerHis] advisors have been of two minds; some would like the [ROOT.GetCountry.GetRulerTitle] to focus on rewarding the military, whereas others believe that the common people of [ROOT.GetCountry.GetName] themselves should be rewarded with a glorious festival."  #<Um sicherzustellen, dass unsere Traditionen auch in den kommenden Jahren erhalten bleiben, hat [ROOT.GetCountry.GetRuler.GetName] beschlossen, eine stattliche Summe in die Verwirklichung dieses Ziels zu investieren. Natürlich waren die Berater von [ROOT.GetCountry.GetRuler.GetHerHis] geteilter Meinung; Einige möchten, dass sich die [ROOT.GetCountry.GetRulerTitle] auf die Belohnung des Militärs konzentrieren, während andere glauben, dass die einfachen Leute von [ROOT.GetCountry.GetName] selbst mit einem glorreichen Fest belohnt werden sollten.>  #NT!
 me_germania.64.a: "We should reward our troops, for they have made all of this possible"  #<Wir sollten unsere Truppen belohnen, denn sie haben all dies ermöglicht>  #NT!
 me_germania.64.b: "The people themselves are responsible for maintaining tradition"  #<Für die Aufrechterhaltung der Tradition sind die Menschen selbst verantwortlich>  #NT!
 me_germania_64_tooltip: "The mission task '#Y Rewarding The People#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Belohnung des Volkes#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_66_title: "New Nobility"  #<Neuer Adel>  #NT!
 me_germania_66_desc: "[ROOT.GetCountry.GetName] is a land conquered and subdued at the point of the spear, and the ruling classes of the countries annexed by the [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName] have been pressured to live in the [ROOT.GetCountry.GetAdjective] capital.\n\nIt is no secret that [ROOT.GetCountry.GetRuler.GetFirstName] desires to keep the interests of the elites aligned with [ROOT.GetCountry.GetRuler.GetHerHis] own desires, and no effort has been spared to secure their backing over the years. Luckily for the [ROOT.GetCountry.GetRulerTitle], the nobility have thrown their support behind [ROOT.GetCountry.GetRuler.GetHerHim] and now seek to repay the favor."  #<[ROOT.GetCountry.GetName] ist ein Land, das mit der Speerspitze erobert und unterworfen wurde, und die herrschenden Klassen der von [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName] annektierten Länder wurden unter Druck gesetzt, in der [ROOT.GetCountry.GetAdjective]-Hauptstadt zu leben.\n\nEs ist kein Geheimnis, dass [ROOT.GetCountry.GetRuler.GetFirstName] die Interessen der Eliten mit [ROOT.GetCountry.GetRuler.GetHerHis] eigenen Wünschen in Einklang bringen möchte, und im Laufe der Jahre wurden keine Mühen gescheut, um sich ihre Unterstützung zu sichern. Zum Glück für [ROOT.GetCountry.GetRulerTitle] hat der Adel [ROOT.GetCountry.GetRuler.GetHerHim] unterstützt und versucht nun, sich für den Gefallen zu revanchieren.>  #NT!
 me_germania.66.a: "Money is always preferred, as they say"  #<Geld wird immer bevorzugt, wie man sagt>  #NT!
 me_germania.66.b: "I would rather gain expertise than coins - what can we learn?"  #<Ich möchte lieber Fachwissen als Münzen erwerben – was können wir lernen?>  #NT!
 me_germania.66.c: "This should go to me."  #<Das sollte an mich gehen.>  #NT!
 me_germania_66_tooltip: "The mission task '#Y New Nobility#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Neuer Adel#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_67_title: "Germanic Trade Hub"  #<Germanisches Handelszentrum>  #NT!
 me_germania_67_desc: "Like a bubbling brook, streams of income are flowing into the coffers of the tax collectors living in the province of [ROOT.GetCountry.GetCapital.GetArea.GetName] - never before have we taken in so much money. It has been suggested to [ROOT.GetCountry.GetRuler.GetName] that we should take these record sums and do something of importance with them.\n\n[ROOT.GetCountry.GetRuler.GetFirstName]'s advisors are calling for investments to be made within the capital, but no one would fault the [ROOT.GetCountry.GetRulerTitle] for using the funds for something different."  #<Wie ein sprudelnder Bach fließen Einkommensströme in die Kassen der in der Provinz [ROOT.GetCountry.GetCapital.GetArea.GetName] lebenden Steuereintreiber – noch nie haben wir so viel Geld eingenommen. [ROOT.GetCountry.GetRuler.GetName] wurde vorgeschlagen, dass wir diese Rekordsummen nehmen und etwas Bedeutendes damit machen sollten.\n\nDie Berater von [ROOT.GetCountry.GetRuler.GetFirstName] fordern Investitionen innerhalb der Hauptstadt, aber niemand würde [ROOT.GetCountry.GetRulerTitle] vorwerfen, dass sie die Mittel für etwas anderes verwenden.>  #NT!
 me_germania.67.a: "I want to save the money for a rainy day"  #<Ich möchte das Geld für einen regnerischen Tag sparen>  #NT!
 me_germania.67.b: "Let us make a long term investment with this windfall"  #<Lassen Sie uns diesen Glücksfall langfristig investieren>  #NT!
 me_germania_67_tooltip: "The mission task '#Y Germanic Trade Hub#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Germanisches Handelszentrum#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_68_title: "No Place Is Safe"  #<Kein Ort ist sicher>  #NT!
 me_germania_68_desc: "After countless years of war and peace and many seasons of feasting and famine, many lessons were learned by our kinsmen, who made the best of every situation that faced them and persevered when all others would have failed.\n\nAnd when our weakness had grown into strength, our warriors were not afraid to travel vast distances to pillage the lands of our enemies, for their love of gold and glory would send them to lands unknown to our ancestors."  #<Nach unzähligen Jahren des Krieges und des Friedens und vielen Jahreszeiten voller Feste und Hungersnöte haben unsere Verwandten viele Lektionen gelernt, die das Beste aus jeder Situation gemacht haben, mit der sie konfrontiert waren, und durchgehalten haben, als alle anderen versagt hätten.\n\nUnd als unsere Schwäche zu Stärke geworden war, hatten unsere Krieger keine Angst davor, weite Strecken zurückzulegen, um das Land unserer Feinde zu plündern, denn ihre Liebe zu Gold und Ruhm würde sie in Länder schicken, die unseren Vorfahren unbekannt waren.>  #NT!
 me_germania.68.a: "Set an open course for the virgin sea!"  #<Nehmen Sie Kurs auf das jungfräuliche Meer!>  #NT!
 me_germania_68_tooltip: "The mission task '#Y No Place Is Safe#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y No Place Is Safe#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_69_title: "The City"  #<Die Stadt>  #NT!
 me_germania_69_desc: "[ROOT.GetCountry.GetCapital.GetName] is by far now the most developed city north of the #E Mediterranean#!, and it is said that the splendors of #E Alexandria#!, #E Roma#! or #E Carthage#! cannot compete with the place that we call home.\n\nThe architectural achievements of [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] family will be remembered for centuries, and their names will never be forgotten as long as the [ROOT.GetCountry.GetAdjective] people live. All of the inhabitants of [ROOT.GetCountry.GetCapital.GetName], wishing to thank the [ROOT.GetCountry.GetRulerTitle] for [ROOT.GetCountry.GetRuler.GetHerHis] careful stewardship over their city, have prepared a special ceremony in the capital that honors the #E [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] Clan.#!"  #<[ROOT.GetCountry.GetCapital.GetName] ist mittlerweile mit Abstand die am weitesten entwickelte Stadt nördlich des #E Mittelmeers#!, und es wird gesagt, dass die Pracht von #E Alexandria#!,, #E Roma#! oder #E Karthago#! nicht mit dem Ort mithalten kann, den wir unser Zuhause nennen.\n\nDie architektonischen Errungenschaften von [ROOT.GetCountry.GetRuler.GetName] und der Familie #E0 werden es sein seit Jahrhunderten in Erinnerung, und ihre Namen werden nie vergessen, solange die #E1 Menschen leben. Alle Einwohner von [ROOT.GetCountry.GetCapital.GetName] möchten den #E3 für die sorgfältige Verwaltung ihrer Stadt durch #E0 danken und haben in der Hauptstadt eine besondere Zeremonie zu Ehren des #E #E6 Clans vorbereitet.#!>  #NT!
 me_germania.69.a: "May the gods save and protect [ROOT.GetCountry.GetRuler.GetFirstName]!"  #<Mögen die Götter [ROOT.GetCountry.GetRuler.GetFirstName] retten und beschützen!>  #NT!
 me_germania_69_tooltip: "The mission task '#Y The City#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Die Stadt#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_70_title: "Borrowing The Belgae"  #<Die Belgae ausleihen>  #NT!
 me_germania_70_desc: "The growing reach of the [ROOT.GetCountry.GetAdjective] navies has carried our slavers to distant shores far from the reach of our land-based armies, and luckily for us, there are many defenseless #E Belgae#! villagers with strong backs living along the coasts of these new lands that we have discovered.\n\n [ROOT.GetCountry.GetRuler.GetName] has encouraged our raiding parties to bring as many slaves as possible back home; a task they have undertaken with grim abandon."  #<Die wachsende Reichweite der [ROOT.GetCountry.GetAdjective]-Marine hat unsere Sklavenhändler an ferne Küsten weit außerhalb der Reichweite unserer landgestützten Armeen geführt, und zu unserem Glück gibt es viele wehrlose #E Belgae#!-Dorfbewohner mit starkem Rücken, die an den Küsten dieser neuen Länder leben, die wir entdeckt haben.\n\n [ROOT.GetCountry.GetRuler.GetName] hat unsere Raubzüge ermutigt, so viele Sklaven wie möglich nach Hause zu bringen; eine Aufgabe, die sie mit grimmiger Hingabe angegangen sind.>  #NT!
 me_germania.70.a: "Down into the mines with you!"  #<Runter mit dir in die Minen!>  #NT!
 me_germania_70_tooltip: "The mission task '#Y Borrowing The Belgae#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Borrowing The Belgae#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_71_title: "Armorican Trade"  #<Armoricanischer Handel>  #NT!
 me_germania_71_desc: "Not long ago, Armorica was a foothold for trading with the mainland, even if the local tribes charged us a pretty penny for acting as middlemen. This situation was not ideal but it was tolerable, for the trading connections of the mainland were worth the costs for multiple reasons.\n\nUnfortunately for us, a deadly combination of political instability and long winters have ground trade to a halt, and many old trade routes were abandoned for good. But this will change, for [ROOT.GetCountry.GetRuler.GetName] has promised to restore them for the good of [ROOT.GetCountry.GetName] and its inhabitants."  #<Vor nicht allzu langer Zeit war Armorica ein Stützpunkt für den Handel mit dem Festland, auch wenn die örtlichen Stämme von uns als Mittelsmänner einen hübschen Cent verlangten. Diese Situation war nicht ideal, aber erträglich, denn die Handelsverbindungen des Festlandes waren aus mehreren Gründen die Kosten wert.\n\nLeider kam für uns eine tödliche Kombination aus politischer Instabilität und langen Wintern zum Erliegen des Bodenhandels und viele alte Handelsrouten wurden endgültig aufgegeben. Aber das wird sich ändern, denn [ROOT.GetCountry.GetRuler.GetName] hat versprochen, sie zum Wohle von [ROOT.GetCountry.GetName] und seinen Bewohnern wiederherzustellen.>  #NT!
 me_germania.71.a: "Merchants and taxes will flow once again"  #<Händler und Steuern werden wieder fließen>  #NT!
  
 me_germania_72_title: "Germanic Submission"  #<Germanische Unterwerfung>  #NT!
 me_germania_72_desc: "After our recent conquests in #E Germania Superior#!, our triumphant warriors had set many #E Germanic#! villages and settlements to the torch, killing thousands and enslaving anyone that they could catch. Our soldiers enjoyed themselves a little too much in the aftermath of our campaign, perhaps, and the stories of [ROOT.GetCountry.GetAdjective] cruelty towards the natives quickly spread throughout the countryside.\n\nAs our levies returned home laden with the spoils of war, [ROOT.GetCountry.GetRuler.GetName] received a request for a meeting from an Istvaonic warlord, a man named [SCOPE.sCharacter('defeated_celtic_chief').GetName] that had once been a chieftain of some renown but now lived as a brigand in the mountains.\n\n'You have taken everything from us, [ROOT.GetCountry.GetRuler.GetName], as is your right - I have not come to contest what was won on the battlefield, but to beg for mercy. The wars are over, and yet your men continue to destroy my homeland - what must we do to put an end to the bloodshed?'"  #<Nach unseren jüngsten Eroberungen in #E Germania Superior#!, hatten unsere triumphalen Krieger viele #E germanische#! Dörfer und Siedlungen in Brand gesteckt, Tausende getötet und jeden versklavt, den sie fassen konnten. Unsere Soldaten hatten nach unserem Feldzug vielleicht etwas zu viel Spaß, und die Geschichten über die Grausamkeit von [ROOT.GetCountry.GetAdjective] gegenüber den Eingeborenen verbreiteten sich schnell im ganzen Land.\n\nAls unsere Truppen beladen mit der Kriegsbeute nach Hause zurückkehrten, erhielt [ROOT.GetCountry.GetRuler.GetName] eine Bitte um ein Treffen von einem istvaonischen Kriegsherrn, einem Mann namens [SCOPE.sCharacter('defeated_celtic_chief').GetName], der einst ein berühmter Häuptling gewesen war, jetzt aber als Räuber in der Region lebte Berge.\n\n'Du hast uns alles genommen, [ROOT.GetCountry.GetRuler.GetName], wie es dein Recht ist – ich bin nicht gekommen, um anzufechten, was auf dem Schlachtfeld gewonnen wurde, sondern um um Gnade zu betteln. Die Kriege sind vorbei, und doch zerstören Ihre Männer weiterhin mein Heimatland – was müssen wir tun, um dem Blutvergießen ein Ende zu setzen?‘>  #NT!
 me_germania.72.a: "We will leave you alone, but you must swear oaths of service"  #<Wir lassen Sie in Ruhe, aber Sie müssen Diensteide schwören>  #NT!
 me_germania.72.b: "Your men must end your thieving ways and serve in my armies"  #<Deine Männer müssen deinen diebischen Machenschaften ein Ende setzen und in meinen Armeen dienen>  #NT!
 me_germania.72.c: "How dare you approach me, you dog...I will show you true wrath!"  #<Wie kannst du es wagen, dich mir zu nähern, du Hund ... Ich werde dir wahren Zorn zeigen!>  #NT!
 more_german_raids_oh_no: "#R Our warriors will plunder the settlements of the local Germanics.#!"  #<#R Unsere Krieger werden die Siedlungen der örtlichen Germanen plündern.#!>  #NT!
  
 me_germania_73_title: "Last Steps Of Conquest"  #<Letzte Schritte der Eroberung>  #NT!
 me_germania_73_desc: "Marching inside Central Gaul was an easy task, but achieving the total submission of the remaining local tribes, numerous but weak, is far more difficult.\n\nAnd now, the choice. We can plunder the meager holdings of these tribes as sign of victory of our army, but we could also spare the locals and see if their best warriors want to fight alongside us.\n\nMoney is beloved by all, and there is nothing that cannot be achieved with its lustre."  #<Der Marsch in Zentralgallien war eine leichte Aufgabe, aber die völlige Unterwerfung der verbleibenden lokalen Stämme, die zwar zahlreich, aber schwach sind, ist weitaus schwieriger.\n\nUnd jetzt die Wahl. Wir können die dürftigen Besitztümer dieser Stämme als Zeichen des Sieges unserer Armee plündern, aber wir könnten auch die Einheimischen verschonen und sehen, ob ihre besten Krieger an unserer Seite kämpfen wollen.\n\nGeld wird von allen geliebt und es gibt nichts, was man mit seinem Glanz nicht erreichen könnte.>  #NT!
 me_germania.73.a: "Victory rhymes oft with plunder - let the men have fun"  #<Sieg reimt sich oft auf Plünderung – lasst die Männer Spaß haben>  #NT!
 me_germania.73.b: "Local talent and horses? Why not."  #<Lokale Talente und Pferde? Warum nicht.>  #NT!
 me_germania.73.c: "Money, money, money!"  #<Geld, Geld, Geld!>  #NT!
  
 #me_germania_74_title: ""
 #me_germania_74_desc: ""
 #me_germania.74.a: ""
  
 me_germania_75_title: "Exploring The Basin"  #<Das Becken erkunden>  #NT!
 me_germania_75_desc: "After many months of impatient waiting and prayers of supplication, the explorers sent by [ROOT.GetCountry.GetRuler.GetName] into the wild and wooded #E Boihaemian Basin#! have finally returned to [ROOT.GetCountry.GetCapital.GetName], and by all accounts, their trip was a successful one. Our warriors speak of a good and pleasant realm, one that is sparsely populated by the local #E Boian#! tribes that do not appreciate the gifts of nature that are found throughout their lands. When asked if the basin is a suitable place for [ROOT.GetCountry.GetAdjective] colonists to settle, the men are unanimous in agreement.\n\nIf [ROOT.GetCountry.GetRuler.GetFirstName] is willing to spare the gold and manpower, then there will be no problems settling the northern reaches of the forest with our tribesmen."  #<Nach vielen Monaten des ungeduldigen Wartens und des Flehens sind die von [ROOT.GetCountry.GetRuler.GetName] in die Wildnis und in die Wälder des #E Boihaemian Basin#! geschickten Entdecker endlich nach [ROOT.GetCountry.GetCapital.GetName] zurückgekehrt, und allen Berichten zufolge war ihre Reise ein Erfolg. Unsere Krieger sprechen von einem guten und angenehmen Reich, das von den örtlichen #E Boian#! Stämmen dünn besiedelt ist, die die Gaben der Natur, die in ihrem Land zu finden sind, nicht zu schätzen wissen. Auf die Frage, ob das Becken ein geeigneter Ort für die Ansiedlung von [ROOT.GetCountry.GetAdjective] Kolonisten ist, sind sich die Männer einig.\n\nWenn [ROOT.GetCountry.GetRuler.GetFirstName] bereit ist, das Gold und die Arbeitskräfte zu schonen, wird es keine Probleme geben, die nördlichen Bereiche des Waldes mit unseren Stammesangehörigen zu besiedeln.>  #NT!
 me_germania.75.a: "Send colonists to any unclaimed territories"  #<Schicken Sie Kolonisten in alle nicht beanspruchten Gebiete>  #NT!
 me_germania.75.b: "We cannot afford to do this at the moment"  #<Das können wir uns im Moment nicht leisten>  #NT!
  
 me_germania_76_title: "Wild Stallions"  #<Wilde Hengste>  #NT!
 me_germania_76_desc: "When offered the choice of mounts, most warriors living within [ROOT.GetCountry.GetName] will request a horse @horses! from the region of [GetProvince('(int32)3950').GetArea.GetRegion.GetName], for the fearsome reputation of the chargers from the Germanic wildlands has captured the imagination of our people while striking abject terror into the hearts of our enemies.\n\nThe horses from our farms stand at least three hands taller than any other draft horses brought to markets, and our hearty animals are trained in the art of warfare from their earliest days and are not afraid of the din of battle - all important qualities that are required for the [ROOT.GetCountry.GetAdjective] cavalry."  #<Wenn die Wahl zwischen Reittieren angeboten wird, werden die meisten Krieger, die in [ROOT.GetCountry.GetName] leben, ein Pferd anfordern @horses! aus der Region von [GetProvince('(int32)3950').GetArea.GetRegion.GetName], denn der furchteinflößende Ruf der Rosse aus der germanischen Wildnis hat die Fantasie unseres Volkes beflügelt und gleichzeitig schrecklichen Schrecken in die Herzen unserer Feinde gebracht.\n\nDie Pferde von unseren Farmen sind mindestens drei Hände größer als alle anderen Zugpferde, die auf den Märkten gebracht werden, und unsere herzhaften Tiere werden von klein auf in der Kunst der Kriegsführung geschult und haben keine Angst vor dem Lärm der Schlacht – alles wichtige Eigenschaften, die für die [ROOT.GetCountry.GetAdjective] erforderlich sind Kavallerie.>  #NT!
 me_germania.76.a: "My personal horse was taken from a small farm near [ROOT.GetCountry.GetCapital.GetName]"  #<Mein persönliches Pferd wurde von einem kleinen Bauernhof in der Nähe von [ROOT.GetCountry.GetCapital.GetName] übernommen>  #NT!
 me_germania_76_tooltip: "The mission task '#Y Wild Stallions#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Wilde Hengste#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_77_title: "Hunting Parties"  #<Jagdpartys>  #NT!
 me_germania_77_desc: "Although the farmlands and fisheries of [ROOT.GetCountry.GetName] provide more than enough variety for our [ROOT.GetCountry.GetAdjective] tribesmen to have a substantive and nutritious diet, our warriors are fond of taking their dogs out into the woods and searching for deer when they have some free time to themselves.\n\nThere are few pleasures greater in life than felling a massive stag with your brothers and roasting the animal out in the field, and even though our warriors must travel vast distances to reach the primeval forests where the best hunting is found, [ROOT.GetCountry.GetRuler.GetName] often finds [ROOT.GetCountry.GetRuler.GetHerHim]self reaching for [ROOT.GetCountry.GetRuler.GetHerHis] bow whenever the opportunity arises in hopes of stalking a massive buck out in the deep country."  #<Obwohl das Ackerland und die Fischerei von [ROOT.GetCountry.GetName] mehr als genug Abwechslung für unsere [ROOT.GetCountry.GetAdjective]-Stammesangehörigen bieten, um sich ausgiebig und nahrhaft zu ernähren, gehen unsere Krieger gern mit ihren Hunden in den Wald und suchen nach Hirschen, wenn sie etwas Freizeit haben.\n\nEs gibt kaum ein größeres Vergnügen im Leben, als mit seinen Brüdern einen riesigen Hirsch zu fällen und das Tier draußen auf dem Feld zu braten, und auch wenn unsere Krieger weite Strecken zurücklegen müssen [ROOT.GetCountry.GetRuler.GetName] erreicht die Urwälder, in denen man am besten jagen kann, und greift [ROOT.GetCountry.GetRuler.GetHerHim]selbst oft nach dem Bogen [ROOT.GetCountry.GetRuler.GetHerHis], wann immer sich die Gelegenheit bietet, in der Hoffnung, im tiefen Land einen riesigen Bock zu jagen.>  #NT!
 me_germania.77.a: "No matter what I am doing, I'd almost rather be hunting..."  #<Egal was ich mache, ich wäre fast lieber auf der Jagd...>  #NT!
 me_germania_77_tooltip: "The mission task '#Y Hunting Parties#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Jagdgesellschaften#!'“ wurde nun #G abgeschlossen#!!>  #NT!
  
 me_germania_78_title: "Agriculture Booming"  #<Die Landwirtschaft boomt>  #NT!
 me_germania_78_desc: "The Germanic forests are poor places when it comes to implementing large scale agriculture, for our woodlands are dense and it makes working the earth exceptionally difficult. On top of this, our climate is unforgiving and brutal, for the winters we live through are harsh, leaving many people dying from hunger and the cold each year.\n\nBut our people are stronger than the land that birthed us, especially with the strong leadership of our [ROOT.GetCountry.GetRulerTitle] leading us forward. [ROOT.GetCountry.GetRuler.GetName] has decided that these tragedies are avoidable, and after a period of investment, our farmlands have been expanded in order to sustain the [ROOT.GetCountry.GetAdjective] population throughout all seasons. Nobody will perish from an empty stomach under the rule [ROOT.GetCountry.GetRuler.GetFirstName]!"  #<Die germanischen Wälder sind schlechte Orte für die großflächige Landwirtschaft, da unsere Wälder dicht sind und die Bearbeitung der Erde außerordentlich schwierig ist. Darüber hinaus ist unser Klima gnadenlos und brutal, denn die Winter, die wir durchleben, sind hart und lassen jedes Jahr viele Menschen an Hunger und Kälte sterben.\n\nAber unser Volk ist stärker als das Land, das uns geboren hat, insbesondere mit der starken Führung unserer [ROOT.GetCountry.GetRulerTitle], die uns voranbringt. [ROOT.GetCountry.GetRuler.GetName] hat entschieden, dass diese Tragödien vermeidbar sind, und nach einer gewissen Investitionsphase wurden unsere Ackerflächen erweitert, um die Bevölkerung von [ROOT.GetCountry.GetAdjective] zu jeder Jahreszeit zu ernähren. Unter der Regel [ROOT.GetCountry.GetRuler.GetFirstName] wird niemand aus leerem Magen sterben!>  #NT!
 me_germania.78.a: "Bread for everyone, or else!"  #<Brot für alle, sonst!>  #NT!
  
 me_germania_80_title: "The Elephant"  #<Der Elefant>  #NT!
 me_germania_80_desc: "From the moment our captain saw the baby elephant, a new story of love and dreams could have been written, and no price would have been too much to pay.\n\nThe trader who sold us the elephant promised to bring more to us, and we will build camps for them where they can be trained for circuses or battlefields! Our Council has suggested various provinces that would be promising places for elephant farms, allowing [ROOT.GetCountry.GetRuler.GetName] the honor of choosing where the gentle giants will live."  #<Von dem Moment an, als unser Kapitän das Elefantenbaby sah, hätte eine neue Geschichte über Liebe und Träume geschrieben werden können, und kein Preis wäre zu hoch gewesen.\n\nDer Händler, der uns den Elefanten verkauft hat, versprach, uns mehr zu bringen, und wir werden Lager für sie bauen, in denen sie für Zirkusse oder Schlachtfelder trainiert werden können! Unser Rat hat verschiedene Provinzen vorgeschlagen, die vielversprechende Orte für Elefantenfarmen wären, und [ROOT.GetCountry.GetRuler.GetName] die Ehre gegeben, zu entscheiden, wo die sanften Riesen leben werden.>  #NT!
 me_germania.80.a: "It will be our capital [ROOT.GetCountry.GetCapital.GetName] that will welcome them"  #<Es wird unsere Hauptstadt [ROOT.GetCountry.GetCapital.GetName] sein, die sie willkommen heißt>  #NT!
 me_germania.80.b: "He will be feed by the best grain from [prov_1.GetName]."  #<Er wird mit dem besten Getreide von [prov_1.GetName] gefüttert.>  #NT!
 me_germania.80.c: "The fertile plains of [prov_2.GetName] will be enough."  #<Die fruchtbaren Ebenen von [prov_2.GetName] werden ausreichen.>  #NT!
 me_germania.80.d: "[prov_3.GetName] looks interesting."  #<[prov_3.GetName] sieht interessant aus.>  #NT!
 me_germania.80.e: "Elephants are living inside of forests and jungle - we will need [prov_4.GetName]."  #<Elefanten leben in Wäldern und Dschungeln – wir brauchen [prov_4.GetName].>  #NT!
  
 me_germania_81_title: "The Elephants"  #<Die Elefanten>  #NT!
 me_germania_81_desc: "The Carthaginian trader asked [ROOT.GetCountry.GetRuler.GetName] to follow him to his capital ship, for there were many stalls and cages filled with exotic animals aboard. 'Here is a complete family of elephants @elephants!, and for a modest price they are yours.'\n\nThe question now is, if we buy this family, where will be the best place for them to stay? It could be a good opportunity for the local economy in the long term, for many of our countrymen will want to see these creatures for themselves."  #<Der karthagische Händler bat [ROOT.GetCountry.GetRuler.GetName], ihm zu seinem Großkampfschiff zu folgen, denn an Bord befanden sich viele Ställe und Käfige voller exotischer Tiere. „Hier ist eine komplette Elefantenfamilie @elephants!, und für einen bescheidenen Preis gehören sie Ihnen.“\n\nDie Frage ist nun: Wenn wir diese Familie kaufen, wo wird sie am besten bleiben? Langfristig könnte es eine gute Gelegenheit für die lokale Wirtschaft sein, denn viele unserer Landsleute werden diese Kreaturen selbst sehen wollen.>  #NT!
 me_germania.81.a: "It will be our capital [ROOT.GetCountry.GetCapital.GetName] that will welcome them."  #<Es wird unsere Hauptstadt [ROOT.GetCountry.GetCapital.GetName] sein, die sie willkommen heißt.>  #NT!
 me_germania.81.b: "They will be fed by the best grain from [prov_1.GetName]."  #<Sie werden mit dem besten Getreide aus [prov_1.GetName] gefüttert.>  #NT!
 me_germania.81.c: "The fertile plains of [prov_2.GetName] will be enough"  #<Die fruchtbaren Ebenen von [prov_2.GetName] werden ausreichen>  #NT!
 me_germania.81.d: "[prov_3.GetName] looks interesting."  #<[prov_3.GetName] sieht interessant aus.>  #NT!
 me_germania.81.e: "Elephants are living inside forest and jungles; we will need [prov_4.GetName]."  #<Elefanten leben in Wäldern und Dschungeln; wir brauchen [prov_4.GetName].>  #NT!
 me_germania.81.f: "For now I prefer not to commit; show me something else."  #<Im Moment ziehe ich es vor, mich nicht festzulegen; zeig mir etwas anderes.>  #NT!
  
 me_germania_82_title: "The Dyes"  #<Die Farbstoffe>  #NT!
 me_germania_82_desc: "For centuries, dyes @dye! have been used to create more complex patterns and colors for clothes, and is mainly utilized within our realm to recognize the different classes composing society.\n\nThe trader stuck his hand into a heavy sack and pulled out a handful of delicate grains that he let fall through his fingers. 'These are seeds. The plants that make the best dyes grow mostly in hot areas with a lot of water. I personally have selected a variety that could grow on your cold, rainy island, however, and will make you an incredible deal.'\n\nConsidering what the trader has said, your Council offers four positions that seem to be good places to make dyes."  #<Seit Jahrhunderten färbt @dye! wurden verwendet, um komplexere Muster und Farben für Kleidung zu schaffen, und werden in unserem Reich hauptsächlich verwendet, um die verschiedenen Klassen zu erkennen, aus denen sich die Gesellschaft zusammensetzt.\n\nDer Händler steckte seine Hand in einen schweren Sack und zog eine Handvoll zarter Körner heraus, die er durch seine Finger fallen ließ. „Das sind Samen.“ Die Pflanzen, die die besten Farbstoffe herstellen, wachsen meist in heißen Gegenden mit viel Wasser. Ich persönlich habe jedoch eine Sorte ausgewählt, die auf Ihrer kalten, regnerischen Insel wachsen könnte und Ihnen ein unglaubliches Geschäft machen wird.'\n\nWenn man bedenkt, was der Händler gesagt hat, bietet Ihr Rat vier Positionen an, die gute Orte für die Herstellung von Farbstoffen zu sein scheinen.>  #NT!
 me_germania.82.a: "The sun exposure is the best in our farmland in [prov_1.GetName]."  #<Die Sonneneinstrahlung ist in unserem Ackerland im Jahr [prov_1.GetName] am besten.>  #NT!
 me_germania.82.b: "The fertile plains of [prov_2.GetName] will be enough"  #<Die fruchtbaren Ebenen von [prov_2.GetName] werden ausreichen>  #NT!
 me_germania.82.c: "[prov_3.GetName] has access to a good amount of water"  #<[prov_3.GetName] hat Zugang zu ausreichend Wasser>  #NT!
 me_germania.82.d: "[prov_4.GetName] has just enough space for what we need"  #<[prov_4.GetName] hat gerade genug Platz für das, was wir brauchen>  #NT!
 me_germania.82.e: "I prefer to not buy dye seeds"  #<Ich bevorzuge es, keine Farbstoffsamen zu kaufen>  #NT!
  
 me_germania_83_title: "Honey Pot"  #<Honigtopf>  #NT!
 me_germania_83_desc: "Honey is not unknown inside [ROOT.GetCountry.GetName], but it was not exploited by our people and is difficult to get without the help of many hands. Aware of this, the trader brought with him some bees, with stone hives and the necessary materials to exploit them.\n\nThe trader gestured to a slave, who cracked open a large honeycomb with his hands, sending a stream of molten gold towards the floor. Catching a bit of this honey with a pottery sherd, the trader gave it to [ROOT.GetCountry.GetRuler.GetName] with a smile and asked him to give it a taste.\n\nThe trader laughed as [ROOT.GetCountry.GetRuler.GetFirstName]'s eyes widened a few seconds later.'Imagine what you could cook with that. Rumors say eating honey every day is a way to achieve eternal youth, and after trying it for myself, I believe them.'\n\nHaving tasted this honey, [ROOT.GetCountry.GetRuler.GetFirstName] is completely sold on the idea, and four advisors have proposed four different provinces for us."  #<Honig ist in [ROOT.GetCountry.GetName] nicht unbekannt, aber er wurde von unserem Volk nicht ausgebeutet und ist ohne die Hilfe vieler Hände schwer zu bekommen. Der Händler war sich dessen bewusst und brachte einige Bienen mit Steinstöcken und den nötigen Materialien zu ihrer Ausbeutung mit.\n\nDer Händler deutete auf einen Sklaven, der mit seinen Händen eine große Bienenwabe aufschlug und einen Strahl geschmolzenen Goldes auf den Boden schoss. Der Händler fing etwas von diesem Honig mit einer Tonscherbe auf, reichte ihn lächelnd [ROOT.GetCountry.GetRuler.GetName] und bat ihn, ihn zu probieren.\n\nDer Händler lachte, als [ROOT.GetCountry.GetRuler.GetFirstName] ein paar Sekunden später die Augen weitete. „Stellen Sie sich vor, was Sie damit kochen könnten.“ Gerüchte besagen, dass das tägliche Essen von Honig ein Weg zur ewigen Jugend ist, und nachdem ich es selbst ausprobiert habe, glaube ich ihnen.‘\n\nNachdem ich diesen Honig probiert habe, ist [ROOT.GetCountry.GetRuler.GetFirstName] von der Idee völlig überzeugt und vier Berater haben uns vier verschiedene Provinzen vorgeschlagen.>  #NT!
 me_germania.83.a: "Bees will produce under land of the sun of [prov_1.GetName]."  #<Bienen werden unter der Sonne von [prov_1.GetName] produzieren.>  #NT!
 me_germania.83.b: "The fertile plains of [prov_2.GetName] will be enough"  #<Die fruchtbaren Ebenen von [prov_2.GetName] werden ausreichen>  #NT!
 me_germania.83.c: "Bees will love [prov_3.GetName]."  #<Bienen werden [prov_3.GetName] lieben.>  #NT!
 me_germania.83.d: "We should try the area of [prov_4.GetName] as a candidate."  #<Wir sollten den Bereich von [prov_4.GetName] als Kandidaten ausprobieren.>  #NT!
 me_germania.83.e: "Bees will have to wait."  #<Bienen müssen warten.>  #NT!
  
 me_germania_84_title: "The Carthagian Trader"  #<Der karthagische Händler>  #NT!
 me_germania_84_desc: "After three long months at sea, the Carthaginian trader finally reached the shores of [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetRuler.GetName] went down to the harbor, accompanied by courtesans and ministers, in order to welcome the esteemed traveler, who wasted no time on pleasantries but launched immediately into a sales pitch.\n\n'I can offer many exotic goods that could be settled into your island. You can buy my elephants @elephants! and build encampents for them, training them in the art of war. Or maybe you prefer to build workshops for the production of dye @dye! ? But one cannot eat elephants and dyes, and I have with me bees that make the best honey in the world. I have also many types of goods that you could buy for your nobles; the latest fashions from the courts of the Emperors and Empresses, as well as rare jewelry and artwork to dazzle the eye and delight the mind.'\n\nInterested by everything, you cannot buy all at once due to its expensive price. Also, it would not be wise to transform all your lands into a zoo filled with elephant and bees!\n\nThat is why, for the success of installation of these new goods, we will limit the production of each to #G 2 territories#! on our island; the people would not like if we disturb their traditional land too much.\n\nFaced with dazzling temptations, [ROOT.GetCountry.GetRuler.GetFirstName] will have to decide what to buy before the departure of the trader."  #<Nach drei langen Monaten auf See erreichte der karthagische Händler endlich die Küste von [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetRuler.GetName] ging in Begleitung von Kurtisanen und Ministern zum Hafen hinunter, um den geschätzten Reisenden zu begrüßen, der keine Zeit mit Höflichkeiten verschwendete, sondern sofort ein Verkaufsgespräch begann.\n\n'Ich kann viele exotische Waren anbieten, die auf Ihrer Insel angesiedelt werden könnten. Du kannst meine Elefanten @elephants kaufen! und baute Lager für sie und schulte sie in der Kriegskunst. Oder vielleicht möchten Sie lieber Werkstätten für die Herstellung von Farbstoff @dye bauen! ? Aber Elefanten und Farbstoffe kann man nicht essen, und ich habe Bienen bei mir, die den besten Honig der Welt produzieren. Ich habe auch viele Arten von Waren, die Sie für Ihre Adligen kaufen könnten; die neueste Mode von den Höfen der Kaiser und Kaiserinnen sowie seltener Schmuck und Kunstwerke, die das Auge blenden und den Geist erfreuen.'\n\nDa man sich für alles interessiert, kann man aufgrund des hohen Preises nicht alles auf einmal kaufen. Außerdem wäre es nicht klug, alle Ihre Ländereien in einen Zoo voller Elefanten und Bienen zu verwandeln!\n\nAus diesem Grund werden wir für den Erfolg der Installation dieser neuen Güter die Produktion jedes einzelnen auf #G 2 Gebiete#! auf unserer Insel beschränken; Den Menschen würde es nicht gefallen, wenn wir ihr traditionelles Land zu sehr stören.\n\nAngesichts der schillernden Versuchungen muss [ROOT.GetCountry.GetRuler.GetFirstName] vor der Abreise des Händlers entscheiden, was er kauft.>  #NT!
 me_germania.84.a: "We should see the elephants."  #<Wir sollten die Elefanten sehen.>  #NT!
 me_germania.84.b: "Dye will be very important for a modern society."  #<Farbstoffe werden für eine moderne Gesellschaft von großer Bedeutung sein.>  #NT!
 me_germania.84.c: "Bees, eh? We could create a story with that."  #<Bienen, was? Daraus könnten wir eine Geschichte erfinden.>  #NT!
 me_germania.84.d: "Classical goods will be enough for the high society"  #<Für die High Society werden klassische Waren ausreichen>  #NT!
 me_germania.84.e: "Sorry for the disturbance. I am not ready to buy something."  #<Entschuldigung für die Störung. Ich bin nicht bereit, etwas zu kaufen.>  #NT!
 GEE_reset_import_cooldown: "You will have to wait #Y 5 Years#! for the return of the merchant."  #<Sie müssen #Y 5 Jahre#! auf die Rückkehr des Händlers warten.>  #NT!
  
 me_germania_85_title: "Gallic Friends?"  #<Gallische Freunde?>  #NT!
 me_germania_85_desc: "Now that our permanent presence in the #E Boihaemian Basin#! is an induspitable fact, there are many local tribesmen that have been petitioning [ROOT.GetCountry.GetRuler.GetName] for more rights within [ROOT.GetCountry.GetAdjective] society.\n\nOver the last few months, the [ROOT.GetCountry.GetRulerTitle] has been considering their request but has delayed making a decision, but the time has come to settle the matter once and for all.\n\nWhile many living within [ROOT.GetCountry.GetName] dislike the idea of granting the Boians civic rights, [ROOT.GetCountry.GetRuler.GetFirstName] has argued that accepting them among our people makes sense strategically; not only will this ease tensions in the region, but we will also gain claims over the rest of the region."  #<Da unsere ständige Präsenz im #E Boihäischen Becken#! eine unumstößliche Tatsache ist, gibt es viele lokale Stammesangehörige, die [ROOT.GetCountry.GetRuler.GetName] für mehr Rechte innerhalb der [ROOT.GetCountry.GetAdjective]-Gesellschaft plädieren.\n\nIn den letzten paar Monaten haben die [ROOT.GetCountry.GetRulerTitle] über ihren Antrag nachgedacht, aber eine Entscheidung verzögert, aber es ist an der Zeit, die Angelegenheit ein für alle Mal zu regeln.\n\nWährend viele innerhalb leben [ROOT.GetCountry.GetName] mag die Idee, den Boianern Bürgerrechte zu gewähren, nicht, [ROOT.GetCountry.GetRuler.GetFirstName] hat argumentiert, dass es strategisch sinnvoll sei, sie in unserem Volk zu akzeptieren; Dies wird nicht nur die Spannungen in der Region lindern, sondern wir werden auch Ansprüche gegenüber dem Rest der Region erlangen.>  #NT!
 me_germania.85.a: "It makes sense to treat them as our brothers"  #<Es macht Sinn, sie wie unsere Brüder zu behandeln>  #NT!
 me_germania.85.b: "The #E Boians#! are only fit to be our slaves!"  #<Die #E Boianer#! sind nur dazu geeignet, unsere Sklaven zu sein!>  #NT!
 me_germania.85.c: "The status quo is acceptable at the moment"  #<Der Status Quo ist derzeit akzeptabel>  #NT!
 me_germania_85_tooltip: "The mission task '#Y Gallic Friends?#!' has now been #G Completed#!!"  #<Die Missionsaufgabe „#Y Gallische Freunde?#!'“ wurde nun #G abgeschlossen#!!>  #NT!
 me_germania_85_tooltip_2: "We will receive claims on the #T Boiohaemum#! Region."  #<Wir erhalten Ansprüche auf die Region #T Boiohaemum#!.>  #NT!
  
 me_germania_86_title: "The Forests At The Edge Of The World"  #<Die Wälder am Rande der Welt>  #NT!
 me_germania_86_desc: "After a month of sailing north through the bitter seas of the #E Oceanus Sarmaticus#!, [ROOT.GetCountry.GetRuler.GetName] and [SCOPE.sCharacter('priest').GetName] journeyed far past [GetProvince('(int32)6032').GetName], arriving in a land where the snows never left the ground and the sun remained in the sky throughout the entire year.\n\nOnce assured that they had reached the lands of the gods, the very place that [SCOPE.sCharacter('priest').GetSheHe] had seen in [SCOPE.sCharacter('priest').GetHerHis] dreams, [SCOPE.sCharacter('priest').GetFirstName] revealed the reason for this trip; the [ROOT.GetCountry.GetRulerTitle] must search the wildlands for a well that is sacred to [GetDeityDefinition('omen_wodenaz').GetName]. [ROOT.GetCountry.GetRuler.GetFirstName] was mindful that a prolonged absence from [ROOT.GetCountry.GetCapital.GetName] could destabilize the realm, but the [SCOPE.sCharacter('priest').GetOffice.GetName] urged [ROOT.GetCountry.GetRuler.GetHerHim] to ignore [ROOT.GetCountry.GetRuler.GetHerHis] duties.\n\n'Even if it takes a year of wandering through the countryside, it will be worth it!' [SCOPE.sCharacter('priest').GetFirstName] hissed from between clenched teeth, drawing [SCOPE.sCharacter('priest').GetHerHis] cloak around [SCOPE.sCharacter('priest').GetHerHis] shoulders as it began to rain. 'Every night my dreams tell me that we are getting close...'"  #<Nachdem sie einen Monat lang durch die bitterkalten Meere des #E Oceanus Sarmaticus#!, [ROOT.GetCountry.GetRuler.GetName] und [SCOPE.sCharacter('priest').GetName] nach Norden gesegelt waren, reisten sie weit über [GetProvince('(int32)6032').GetName] hinaus und kamen in einem Land an, in dem der Schnee nie den Boden verließ und die Sonne das ganze Jahr über am Himmel blieb.\n\nAls sie sicher waren, dass sie das Land der Götter erreicht hatten, genau den Ort, den [SCOPE.sCharacter('priest').GetSheHe] in [SCOPE.sCharacter('priest').GetHerHis] Träumen gesehen hatte, [SCOPE.sCharacter('priest').GetFirstName] verriet den Grund für diese Reise; Die [ROOT.GetCountry.GetRulerTitle] müssen die Wildnis nach einem Brunnen absuchen, der [GetDeityDefinition('omen_wodenaz').GetName] heilig ist. #!,0 war sich darüber im Klaren, dass eine längere Abwesenheit von #!,1 das Reich destabilisieren könnte, aber die #!,2 drängten #!,3, die Pflichten von #!,4 zu ignorieren.\n\n'Selbst wenn es ein Jahr dauert, durch die Landschaft zu wandern, wird es sich lohnen!' [SCOPE.sCharacter('priest').GetFirstName] zischte zwischen zusammengebissenen Zähnen hervor und zog [SCOPE.sCharacter('priest').GetHerHis] den Umhang um [SCOPE.sCharacter('priest').GetHerHis] Schultern, als es zu regnen begann. „Jede Nacht sagen mir meine Träume, dass wir uns nähern …“>  #NT!
 me_germania.86.a: "I will do as you say, but I have a bad feeling about this"  #<Ich werde tun, was Sie sagen, aber ich habe ein schlechtes Gefühl dabei>  #NT!
 me_germania.86.b: "This sounds like madness...we must return home"  #<Das klingt nach Wahnsinn ... wir müssen nach Hause zurückkehren>  #NT!
 me_germania_86_tooltip: "#Y This will end the event chain#!."  #<#Y Dies beendet die Ereigniskette#!.>  #NT!
  
 me_germania_87_title: "Mimir's Well"  #<Mimirs Brunnen>  #NT!
 me_germania_87_desc: "The days and weeks passed by uncounted by the two explorers, for the sun refused to fully set and tracking the passage of time became impossible. The supplies that had been brought from [ROOT.GetCountry.GetCapital.GetName] had long ago been used, and the [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName] was reduced to eating boiled roots and acorns in an attempt to survive. The winds were as merciless and cruel as the lands they traversed through, cutting through the bone and leaving [ROOT.GetCountry.GetRuler.GetName]'s lips blue with cold. Inexorably, starvation and dehydration caused a strange delirium to settle over the two travelers, and what happened next felt like a hallucination.\n\nAs they crawled hands and knees up a steep hill, [SCOPE.sCharacter('priest').GetName] gave out a hoarse cry that caused the hair to stand on the back of [ROOT.GetCountry.GetRuler.GetFirstName]'s neck. 'There! There is the spring that [GetDeityDefinition('omen_wodenaz').GetName] shows to me in my sleep.'\n\nGesturing with a trembling hand, [SCOPE.sCharacter('priest').GetFirstName] pointed towards a stone well at the base of a large ash tree. 'You must drink the water, [ROOT.GetCountry.GetRuler.GetFirstName], but that is not all - if you truly wish to see what the gods want revealed, then you must give them one of your eyes.'"  #<Die Tage und Wochen vergingen für die beiden Entdecker unzählbar, denn die Sonne weigerte sich, vollständig unterzugehen, und es wurde unmöglich, den Lauf der Zeit zu verfolgen. Die Vorräte, die von [ROOT.GetCountry.GetCapital.GetName] mitgebracht worden waren, waren schon vor langer Zeit aufgebraucht, und die [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName] mussten sich in ihrem Überlebensversuch auf den Verzehr gekochter Wurzeln und Eicheln beschränken. Die Winde waren so gnadenlos und grausam wie die Länder, die sie durchquerten, schnitten durch die Knochen und hinterließen [ROOT.GetCountry.GetRuler.GetName]s Lippen blau vor Kälte. Unaufhaltsam führten Hunger und Dehydrierung dazu, dass sich ein seltsames Delirium über die beiden Reisenden ausbreitete, und was als nächstes geschah, fühlte sich wie eine Halluzination an.\n\nAls sie auf Händen und Knien einen steilen Hügel hinaufkrochen, stieß [SCOPE.sCharacter('priest').GetName] einen heiseren Schrei aus, der dazu führte, dass sich [ROOT.GetCountry.GetRuler.GetFirstName] die Haare im Nacken sträubten. 'Dort! Da ist die Quelle, die mir [GetDeityDefinition('omen_wodenaz').GetName] im Schlaf zeigt.‘\n\nMit zitternder Hand deutete [SCOPE.sCharacter('priest').GetFirstName] auf einen Steinbrunnen am Fuß einer großen Esche. „Du musst das Wasser trinken, [ROOT.GetCountry.GetRuler.GetFirstName], aber das ist noch nicht alles – wenn du wirklich sehen willst, was die Götter offenbaren wollen, dann musst du ihnen eines deiner Augen geben.“>  #NT!
 me_germania.87.a: "I...I guess that I will obey the command of [GetDeityDefinition('omen_wodenaz').GetName]..."  #<Ich...ich denke, dass ich dem Befehl von [GetDeityDefinition('omen_wodenaz').GetName] gehorchen werde...>  #NT!
 me_germania.87.b: "What? I'm not doing that - we must return home"  #<Was? Das mache ich nicht – wir müssen nach Hause zurückkehren>  #NT!
 priest_kills_self_in_shame_tt: "Ashamed by the decision to leave the well without drinking from its waters, the Priest ran off into the wilderness, never to be seen again."  #<Beschämt über die Entscheidung, den Brunnen zu verlassen, ohne von seinem Wasser zu trinken, rannte der Priester in die Wildnis, um nie wieder gesehen zu werden.>  #NT!
  
 me_germania_88_title: "The Sacred Tree"  #<Der heilige Baum>  #NT!
 me_germania_88_desc: "The return of [ROOT.GetCountry.GetRuler.GetName] and [SCOPE.sCharacter('priest').GetName] to [ROOT.GetCountry.GetCapital.GetName] sent shockwaves through the [ROOT.GetCountry.GetAdjective] elites, as many had presumed that the two had perished on their journey. Their haggard appearances did not do much to inspire confidence, either, as both had lost a substantial amount of weight, but over time, normal life resumed in the capital. A month after their return, it was as if they had never left.\n\nIt was late in the afternoon and [ROOT.GetCountry.GetRuler.GetFirstName] was busy dictating correspondence to a scribe when [ROOT.GetCountry.GetRuler.GetSheHe] was interrupted by the unexpected arrival of [SCOPE.sCharacter('priest').GetFirstName] - as always, a mixed omen.\n\n'I will not keep you long, o [ROOT.GetCountry.GetRuler.GetFirstName], but I come to tell you that I have dreamt one last time. Your sacrifice to [GetDeityDefinition('omen_wodenaz').GetName] was a worthy one, and the great god will soon reveal a great wonder within our midst - just continue to be patient, my [ROOT.GetCountry.GetRulerTitle].'"  #<Die Rückkehr von [ROOT.GetCountry.GetRuler.GetName] und [SCOPE.sCharacter('priest').GetName] zu [ROOT.GetCountry.GetCapital.GetName] erschütterte die [ROOT.GetCountry.GetAdjective]-Eliten, da viele angenommen hatten, dass die beiden auf ihrer Reise umgekommen waren. Auch ihr hageres Aussehen erweckte nicht viel Vertrauen, da beide deutlich an Gewicht verloren hatten, doch mit der Zeit kehrte in der Hauptstadt wieder ein normales Leben ein. Einen Monat nach ihrer Rückkehr war es, als wären sie nie gegangen.\n\nEs war später Nachmittag und [ROOT.GetCountry.GetRuler.GetFirstName] war damit beschäftigt, einem Schreiber die Korrespondenz zu diktieren, als [ROOT.GetCountry.GetRuler.GetSheHe] durch die unerwartete Ankunft von [SCOPE.sCharacter('priest').GetFirstName] unterbrochen wurde – wie immer ein gemischtes Omen.\n\n'Ich werde dich nicht lange aufhalten, o [ROOT.GetCountry.GetRuler.GetFirstName], aber ich komme, um dir zu sagen, dass ich ein letztes Mal geträumt habe. Dein Opfer für [GetDeityDefinition('omen_wodenaz').GetName] war würdig, und der große Gott wird bald ein großes Wunder in unserer Mitte offenbaren – sei einfach weiterhin geduldig, mein [ROOT.GetCountry.GetRulerTitle].'>  #NT!
 me_germania.88.a: "I eagerly await for the gods to uphold their end of this bargain"  #<Ich warte sehnsüchtig darauf, dass die Götter ihren Teil dieser Abmachung einhalten>  #NT!
  
 me_germania_89_title: "Irminsul"  #<Irminsul>  #NT!
 me_germania_89_desc: "At first, [ROOT.GetCountry.GetRuler.GetName] did not believe the messages sent to [ROOT.GetCountry.GetCapital.GetName], but every day, new reports were arriving in the [ROOT.GetCountry.GetAdjective] capital. The stories told by [ROOT.GetCountry.GetRuler.GetFirstName]'s spies were shared by the traveling merchants weeks later, and before long, everyone could not stop talking about the same thing; the discovery of a giant tree, one that defied description, in the forested hills of [GetProvince('(int32)3792').GetName].\n\nVisitors to this strange place claimed that they could feel the presence of the gods when standing next to the massive tree that stood in the forest like a great pillar, and it has quickly become a place of pilgrimage for the tribesmen living in the region."  #<Zunächst glaubte [ROOT.GetCountry.GetRuler.GetName] den an [ROOT.GetCountry.GetCapital.GetName] gesendeten Nachrichten nicht, doch jeden Tag trafen neue Berichte in der Hauptstadt von [ROOT.GetCountry.GetAdjective] ein. Die Geschichten, die die Spione von [ROOT.GetCountry.GetRuler.GetFirstName] erzählten, wurden Wochen später von den reisenden Händlern geteilt, und schon bald konnten alle nicht mehr aufhören, über dasselbe zu reden; die Entdeckung eines riesigen Baumes, der sich jeder Beschreibung entzog, in den bewaldeten Hügeln von [GetProvince('(int32)3792').GetName].\n\nBesucher dieses seltsamen Ortes behaupteten, sie könnten die Anwesenheit der Götter spüren, wenn sie neben dem massiven Baum standen, der wie eine große Säule im Wald stand, und er wurde schnell zu einem Wallfahrtsort für die in der Region lebenden Stammesangehörigen.>  #NT!
 me_germania.89.a: "Could this be...it must! The gift promised by [GetDeityDefinition('omen_wodenaz').GetName]"  #<Könnte das sein...es muss! Das von [GetDeityDefinition('omen_wodenaz').GetName] versprochene Geschenk>  #NT!
 me_germania_89_tooltip: "The #Y Great Wonder#! #G Irminsul#! has been discovered in the settlement of #T Sicambria#!."  #<Das #Y Große Wunder#! #G Irminsul#! wurde in der Siedlung #T Sicambria#! entdeckt.>  #NT!
  
 #modifiers 
  
 germania_mod_2: "Politically Motivated"  #<Politisch motiviert>  #NT!
 desc_germania_mod_2: "We are dedicated to the civic life of our country, even at the expense of religion."  #<Wir engagieren uns für das bürgerliche Leben unseres Landes, auch auf Kosten der Religion.>  #NT!
 germania_mod_3: "A Return To Older Ways"  #<Eine Rückkehr zu älteren Wegen>  #NT!
 desc_germania_mod_3: "We have chosen to return to the ways of our forefathers in a firm rebuke to the corrupting influence of civilization."  #<Wir haben uns entschieden, zu den Wegen unserer Vorfahren zurückzukehren, um dem verderblichen Einfluss der Zivilisation entschieden zu widersprechen.>  #NT!
 germania_mod_4: "Legal Reformation Efforts"  #<Bestrebungen zur Rechtsreform>  #NT!
 desc_germania_mod_4: "We are focusing our internal efforts at reforming our legal system."  #<Wir konzentrieren unsere internen Bemühungen auf die Reform unseres Rechtssystems.>  #NT!
 germania_mod_5: "Great Republic of Germania"  #<Große Republik Germanien>  #NT!
 desc_germania_mod_5: "Our prosperous Republic, a land of law and honor, is respected far and wide as a place of virtuous living."  #<Unsere wohlhabende Republik, ein Land des Rechts und der Ehre, wird weit und breit als Ort tugendhaften Lebens respektiert.>  #NT!
 germania_mod_6: "Prosperous Land"  #<Wohlhabendes Land>  #NT!
 desc_germania_mod_6: "Our people and countryside are thriving, for the gods have blessed us."  #<Unser Volk und unsere Landschaft gedeihen, denn die Götter haben uns gesegnet.>  #NT!
 germania_mod_7: "Swords of the Elites"  #<Schwerter der Eliten>  #NT!
 desc_germania_mod_7: "The noble classes living within our realm have been forced to support the royal household."  #<Die in unserem Reich lebenden Adelsklassen wurden gezwungen, den königlichen Haushalt zu unterstützen.>  #NT!
 germania_mod_8: "Cities in the Wilderness"  #<Städte in der Wildnis>  #NT!
 desc_germania_mod_8: "The harvest gods have bestowed their blessings upon us and have encouraged our people to build cities within the wilderness."  #<Die Erntegötter haben uns ihren Segen erwiesen und unser Volk ermutigt, Städte in der Wildnis zu bauen.>  #NT!
 germania_mod_9: "Boom Times"  #<Boomzeiten>  #NT!
 desc_germania_mod_9: "Our country is enjoying a very prosperous era, all thanks to our trade and economic policies."  #<Dank unserer Handels- und Wirtschaftspolitik erlebt unser Land eine sehr wohlhabende Ära.>  #NT!
 germania_mod_10: "Armored Raiders"  #<Gepanzerte Räuber>  #NT!
 desc_germania_mod_10: "We have taken efforts to improve the quality of armor that our warriors wear into battle."  #<Wir haben uns bemüht, die Qualität der Rüstungen zu verbessern, die unsere Krieger im Kampf tragen.>  #NT!
 germania_mod_11: "Elite Raiders"  #<Elite-Raider>  #NT!
 desc_germania_mod_11: "The men chosen from our ranks to go on punitive raids are exceptional warriors, unequaled in battle."  #<Die Männer, die aus unseren Reihen für Strafangriffe ausgewählt wurden, sind außergewöhnliche Krieger, die im Kampf ihresgleichen suchen.>  #NT!
 germania_mod_12: "Wood Wall"  #<Holzwand>  #NT!
 desc_germania_mod_12: "Our doctrine to defend our home don't come on land but on the sea. We need to draft more sailors at the expense of our army."  #<Unsere Doktrin zur Verteidigung unserer Heimat kommt nicht an Land, sondern auf dem Meer. Wir müssen auf Kosten unserer Armee mehr Matrosen rekrutieren.>  #NT!
 germania_mod_13: "Grand Germanic Harbor"  #<Großer germanischer Hafen>  #NT!
 desc_germania_mod_13: "This city is not only the provincial seat of power, but is also an important military harbor. Many of the best shipwrights living within our country have their homes here."  #<Diese Stadt ist nicht nur Sitz der Provinzmacht, sondern auch ein wichtiger Militärhafen. Viele der besten Schiffbauer unseres Landes haben hier ihre Heimat.>  #NT!
 germania_mod_14: "Fortified Capital"  #<Befestigte Hauptstadt>  #NT!
 desc_germania_mod_14: "This city has been heavily fortified by the locals, with massive earthworks raised along its perimeter in order to discourage attack."  #<Diese Stadt wurde von den Einheimischen stark befestigt und entlang ihres Umfangs wurden massive Erdwälle errichtet, um Angriffe abzuschrecken.>  #NT!
 germania_mod_16: "Expanded Capital"  #<Erweitertes Kapital>  #NT!
 desc_germania_mod_16: "We have done wonders to expand the infrastructure of our capital."  #<Wir haben Wunder vollbracht, um die Infrastruktur unserer Hauptstadt zu erweitern.>  #NT!
 germania_mod_17: "City of Nobles"  #<Stadt der Adligen>  #NT!
 desc_germania_mod_17: "This city is filled with the villas and estates of the elites, who have flocked en masse to the city."  #<Diese Stadt ist voller Villen und Anwesen der Eliten, die in Scharen in die Stadt strömten.>  #NT!
 germania_mod_18: "Cities of Germania"  #<Städte Germaniens>  #NT!
 desc_germania_mod_18: "Our engineers are working harder and more quickly than ever before as they race to construct new towns across our territories."  #<Unsere Ingenieure arbeiten härter und schneller als je zuvor, um neue Städte in unseren Gebieten zu errichten.>  #NT!
 germania_mod_19: "No Place Is Safe"  #<Kein Ort ist sicher>  #NT!
 desc_germania_mod_19: "Our bold raiders will sail to the ends of the Earth, if need be, in order to pillage the undefended lands of our enemies."  #<Unsere mutigen Angreifer werden bei Bedarf bis ans Ende der Welt segeln, um die unverteidigten Länder unserer Feinde zu plündern.>  #NT!
 germania_mod_20: "Scorned Admiral"  #<Verachteter Admiral>  #NT!
 desc_germania_mod_20: "Our will to end the Wood wall doctrine wasn't apreciated in our marine."  #<Unser Wille, die Wood-Wall-Doktrin zu beenden, wurde von unserer Marine nicht gewürdigt.>  #NT!
 germania_mod_21: "Support from admirals"  #<Unterstützung durch Admirale>  #NT!
 desc_germania_mod_21: "Our Wood wall is a proof of our support to them and as in return they support our goals."  #<Unsere Holzwand ist ein Beweis unserer Unterstützung für sie und im Gegenzug unterstützen sie unsere Ziele.>  #NT!
 germania_mod_22: "Germanic Raiders"  #<Germanische Räuber>  #NT!
 desc_germania_mod_22: "Our bloodthirsty raiders have pillaged the lands of our neighbors, causing them to fear and hate us."  #<Unsere blutrünstigen Plünderer haben das Land unserer Nachbarn geplündert und sie dazu gebracht, uns zu fürchten und zu hassen.>  #NT!
 germania_mod_23: "Improved Infrastructure"  #<Verbesserte Infrastruktur>  #NT!
 desc_germania_mod_23: "The infrastructure of our cities and roads have been greatly increased from what they once were."  #<Die Infrastruktur unserer Städte und Straßen wurde im Vergleich zu früher erheblich erweitert.>  #NT!
 germania_mod_24: "Stone of Germania"  #<Stein von Germania>  #NT!
 desc_germania_mod_24: "Thanks to the near-endless supplies of stone that we have accrued, our levies and legions will be equipped with the finest military equipment that can be made."  #<Dank der nahezu endlosen Vorräte an Steinen, die wir angesammelt haben, werden unsere Truppen und Legionen mit der besten militärischen Ausrüstung ausgestattet, die hergestellt werden kann.>  #NT!
 germania_mod_25: "Farmlands of Germania"  #<Ackerland von Germania>  #NT!
 desc_germania_mod_25: "The fields and farms of our heartland territories are productive enough to feed the thousands of tribesmen living within our borders."  #<Die Felder und Bauernhöfe unserer Kerngebiete sind produktiv genug, um die Tausenden von Stammesangehörigen, die innerhalb unserer Grenzen leben, zu ernähren.>  #NT!
 germania_mod_26: "Foreigners Welcomed"  #<Ausländer willkommen>  #NT!
 desc_germania_mod_26: "Our capital is ready to welcome migrants from all around the world."  #<Unsere Hauptstadt ist bereit, Migranten aus der ganzen Welt willkommen zu heißen.>  #NT!
 germania_mod_27: "Migration Restriction"  #<Migrationsbeschränkung>  #NT!
 desc_germania_mod_27: "To preserve our culture and traditions, we have placed restrictions on foreigners."  #<Um unsere Kultur und Traditionen zu bewahren, haben wir Beschränkungen für Ausländer eingeführt.>  #NT!
 germania_mod_28: "Seat of Druids"  #<Sitz der Druiden>  #NT!
 desc_germania_mod_28: "Our capital is managed by our Druids at the detriment of our elite citizens"  #<Unsere Hauptstadt wird von unseren Druiden zum Nachteil unserer Elitebürger verwaltet>  #NT!
 germania_mod_29: "Citizen justice"  #<Bürgergerechtigkeit>  #NT!
 desc_germania_mod_29: "Our justice system has professional judges, pleasing the local aristocracy but angering the local Druids."  #<Unser Justizsystem verfügt über professionelle Richter, die der örtlichen Aristokratie gefallen, die örtlichen Druiden jedoch verärgern.>  #NT!
 germania_mod_30: "Grand Market"  #<Großer Markt>  #NT!
 desc_germania_mod_30: "The market that is found within this city is famous for its luxury."  #<Der Markt in dieser Stadt ist berühmt für seinen Luxus.>  #NT!
 germania_mod_31: "Claiming The Open Sea"  #<Das offene Meer beanspruchen>  #NT!
 desc_germania_mod_31: "Our bold sailors have claimed the seas for our people."  #<Unsere mutigen Seeleute haben die Meere für unser Volk beansprucht.>  #NT!
 germania_mod_32: "Thriving Capital"  #<Blühendes Kapital>  #NT!
 desc_germania_mod_32: "Our capital is prospering and growing, able to stand on its own two legs."  #<Unsere Hauptstadt gedeiht und wächst und kann auf eigenen Beinen stehen.>  #NT!
 germania_mod_33: "Thriving Colony"  #<Blühende Kolonie>  #NT!
 desc_germania_mod_33: "This colony is thriving in a harsh country, all thanks to the efforts of those back home."  #<Diese Kolonie gedeiht in einem rauen Land, alles dank der Bemühungen der Menschen zu Hause.>  #NT!
 germania_mod_34: "Roman Wisdom"  #<Römische Weisheit>  #NT!
 desc_germania_mod_34: "We have studied the things that Romans excel at, and their military and civic knowledge has become our own."  #<Wir haben die Dinge studiert, in denen sich die Römer auszeichnen, und ihr militärisches und staatsbürgerliches Wissen ist zu unserem Eigentum geworden.>  #NT!
 germania_mod_35: "Roman Plunder"  #<Römische Plünderung>  #NT!
 desc_germania_mod_35: "We have proven to the proud Romans that we are superior warriors, and they have begrudgingly admitted that our armies are of excellent quality - a true opponent, and one that they fear."  #<Wir haben den stolzen Römern bewiesen, dass wir überlegene Krieger sind, und sie haben widerwillig zugegeben, dass unsere Armeen von ausgezeichneter Qualität sind – ein echter Gegner, vor dem sie Angst haben.>  #NT!
 germania_mod_36: "Two Kingdoms, One Empire"  #<Zwei Königreiche, ein Imperium>  #NT!
 desc_germania_mod_36: "Our mighty empire encompasses not only the Germanic isles, but extensive holdings within Gaul and the mainland of Europe."  #<Unser mächtiges Reich umfasst nicht nur die germanischen Inseln, sondern auch umfangreiche Besitztümer in Gallien und auf dem europäischen Festland.>  #NT!
 germania_mod_37: "A Connected Capital"  #<Ein vernetztes Kapital>  #NT!
 desc_germania_mod_37: "This city has extensive connections to trade in foreign lands, and many merchants and markets can be found within its walls."  #<Diese Stadt verfügt über umfangreiche Verbindungen zum Handel in fremden Ländern und viele Kaufleute und Märkte sind innerhalb ihrer Mauern zu finden.>  #NT!
 germania_mod_38: "Thriving Germanic City"  #<Blühende germanische Stadt>  #NT!
 desc_germania_mod_38: "The attention given to this city by the ruling class has brought economic growth."  #<Die Aufmerksamkeit, die die herrschende Klasse dieser Stadt schenkt, hat zu Wirtschaftswachstum geführt.>  #NT!
 germania_mod_39: "Well-Stocked Lumber Yards"  #<Gut sortierte Holzplätze>  #NT!
 desc_germania_mod_39: "We have plenty of lumber supplies on hand, which is a boon to our shipyards and boatwrights."  #<Wir verfügen über reichlich Holzvorräte, was für unsere Werften und Bootsbauer ein Segen ist.>  #NT!
 germania_mod_40: "Loggers of Germania"  #<Holzfäller von Germania>  #NT!
 desc_germania_mod_40: "Our people are experts when it comes to the felling of trees and harvesting of lumber."  #<Unsere Mitarbeiter sind Experten, wenn es um das Fällen von Bäumen und die Ernte von Schnittholz geht.>  #NT!
 germania_mod_41: "Germanic Horses"  #<Germanische Pferde>  #NT!
 desc_germania_mod_41: "The warhorses that are reared in Germania are some of the fiercest animals within all of Europe - these savage beasts crave war and battle just as much as our levies do."  #<Die Schlachtrösser, die in Germanien gezüchtet werden, gehören zu den wildesten Tieren in ganz Europa – diese wilden Bestien sehnen sich genauso nach Krieg und Schlacht wie unsere Truppen.>  #NT!
 germania_mod_42: "Stud Farms of Bremenium"  #<Gestüte von Bremenium>  #NT!
 desc_germania_mod_42: "Our authorities have focused their efforts on building stud farms throughout the settlement of Bremenium in an attempt to raise as many of the aggressive mounts as possible."  #<Unsere Behörden haben ihre Bemühungen auf den Bau von Gestüten in der gesamten Siedlung Bremenium konzentriert, um so viele der aggressiven Reittiere wie möglich aufzuziehen.>  #NT!
 germania_mod_43: "Woodsmen of Germania"  #<Waldarbeiter von Germania>  #NT!
 desc_germania_mod_43: "Our hunters supplement their diets by hunting stags and other animals in the forests of Pritania."  #<Unsere Jäger ergänzen ihre Ernährung durch die Jagd auf Hirsche und andere Tiere in den Wäldern von Pritania.>  #NT!
 germania_mod_44: "Native Trading"  #<Nativer Handel>  #NT!
 desc_germania_mod_44: "We enjoy peaceful relations with the Fennic tribes of Hyperborea, which has brought our name renown."  #<Wir pflegen friedliche Beziehungen zu den Fennic-Stämmen von Hyperborea, was unserem Namen zu Ruhm verholfen hat.>  #NT!
 germania_mod_44a: "Fennic Slavers"  #<Fennische Sklavenhändler>  #NT!
 desc_germania_mod_44: "The Fennic tribes are just another inferior group destined to be subjugated by our people; no more, no less."  #<Die Fennic-Stämme sind nur eine weitere minderwertige Gruppe, die von unserem Volk unterworfen werden soll; nicht mehr und nicht weniger.>  #NT!
 germania_mod_45: "Supplied With Salt"  #<Wird mit Salz geliefert>  #NT!
 desc_germania_mod_45: "We have ample supplies of one of the most valuable trade goods that we have access to, salt."  #<Wir verfügen über reichliche Vorräte an einem der wertvollsten Handelsgüter, zu dem wir Zugang haben: Salz.>  #NT!
 germania_mod_46: "A Hunger for Conquest"  #<Ein Hunger nach Eroberung>  #NT!
 desc_germania_mod_46: "Our people desire nothing more than expanding our borders and conquering new lands and nations."  #<Unser Volk wünscht sich nichts sehnlicher, als seine Grenzen zu erweitern und neue Länder und Nationen zu erobern.>  #NT!
 germania_mod_47: "Accepted Celts"  #<Akzeptierte Kelten>  #NT!
 desc_germania_mod_47: "They are recognize as our brothers, worth of participating in our society."  #<Sie werden als unsere Brüder anerkannt und sind es wert, an unserer Gesellschaft teilzunehmen.>  #NT!
 germania_mod_48: "Hibernian Friends"  #<Hibernische Freunde>  #NT!
 desc_germania_mod_48: "Hibernians are on our side and will share their heritage with us."  #<Die Hibernianer sind auf unserer Seite und werden ihr Erbe mit uns teilen.>  #NT!
 germania_mod_49: "Caledonian Tribal Influx"  #<Kaledonischer Stammeszustrom>  #NT!
 desc_germania_mod_49: "The fierce Caledonian are now moving inside our realm, sharing knowledge and watching against raids."  #<Die wilden Kaledonier bewegen sich jetzt in unserem Reich, teilen ihr Wissen und wehren sich gegen Überfälle.>  #NT!
 germania_mod_50: "Pritannian Gold"  #<Pritanisches Gold>  #NT!
 desc_germania_mod_50: "Pritannians are ready to improve the wealth of our kingdom with their gold."  #<Die Pritannier sind bereit, mit ihrem Gold den Reichtum unseres Königreichs zu steigern.>  #NT!
 germania_mod_51: "Domination"  #<Herrschaft>  #NT!
 desc_germania_mod_51: "Our leader decided this culture should not be our equal and should be dominated and assimilated."  #<Unser Anführer entschied, dass diese Kultur nicht mit uns gleich sein sollte und dominiert und assimiliert werden sollte.>  #NT!
 germania_mod_52: "Extreme Domination"  #<Extreme Dominanz>  #NT!
 desc_germania_mod_52: "This culture is fit for cleaning stables and working in mines - the lowest of slaves."  #<Diese Kultur eignet sich für die Reinigung von Ställen und die Arbeit in Minen – den niedrigsten Sklaven.>  #NT!
 germania_mod_53: "To Slavery"  #<Zur Sklaverei>  #NT!
 desc_germania_mod_53: "With recent conquest and decision, our country is ready to enslave the renegade Celts."  #<Mit der jüngsten Eroberung und Entscheidung ist unser Land bereit, die abtrünnigen Kelten zu versklaven.>  #NT!
 germania_mod_54: "Mediterranean Ports"  #<Mittelmeerhäfen>  #NT!
 desc_germania_mod_54: "Our Mediterranean ports have quickly become important parts of our military and economic presence within the region of Gaul."  #<Unsere Mittelmeerhäfen haben sich schnell zu wichtigen Bestandteilen unserer militärischen und wirtschaftlichen Präsenz in der Region Gallien entwickelt.>  #NT!
 germania_mod_55: "Secured Channel"  #<Gesicherter Kanal>  #NT!
 desc_germania_mod_55: "Thanks to our control of the seas, trade moves easily between our island and the mainland."  #<Dank unserer Kontrolle über die Meere kann der Handel problemlos zwischen unserer Insel und dem Festland stattfinden.>  #NT!
 germania_mod_56: "Cities in the Forest"  #<Städte im Wald>  #NT!
 desc_germania_mod_56: "Our indomitable people have mastered the art of building expansive cities in heavily-forested regions."  #<Unser unbezwingbares Volk beherrscht die Kunst, weitläufige Städte in waldreichen Regionen zu bauen.>  #NT!
 germania_mod_57: "Freemen Importing Foreign Wine"  #<Freie importieren ausländischen Wein>  #NT!
 desc_germania_mod_57: "Our freemen spend an obnoxious amount of money importing fine wines from foreign countries."  #<Unsere Freien geben eine Unmenge Geld aus, um erlesene Weine aus dem Ausland zu importieren.>  #NT!
 germania_mod_57a: "Tribes Importing Foreign Wine"  #<Stämme, die ausländischen Wein importieren>  #NT!
 desc_germania_mod_57a: "Our tribesmen spend an obnoxious amount of money importing fine wines from foreign countries."  #<Unsere Stammesangehörigen geben unerträglich viel Geld aus, um erlesene Weine aus dem Ausland zu importieren.>  #NT!
 germania_mod_58: "Terraforming"  #<Terraforming>  #NT!
 desc_germania_mod_58: "This province is undergoing renovations and adaptation to produce a new good inside this territory."  #<Diese Provinz wird derzeit renoviert und angepasst, um in diesem Gebiet ein neues Gut hervorzubringen.>  #NT!
 germania_mod_59: "Wonderful Games"  #<Wunderbare Spiele>  #NT!
 desc_germania_mod_59: "The memory of our last grandiose games are still present in the mind of our countrymen."  #<Die Erinnerung an unsere letzten grandiosen Spiele ist bei unseren Landsleuten noch immer lebendig.>  #NT!
 germania_mod_60: "Good Games"  #<Gute Spiele>  #NT!
 desc_germania_mod_60: "While not the best games in the world, it is still something that the people did appreciate."  #<Obwohl es nicht das beste Spiel der Welt ist, ist es dennoch etwas, das die Leute sehr zu schätzen wussten.>  #NT!
 germania_mod_61: "Corrupted Games"  #<Korrupte Spiele>  #NT!
 desc_germania_mod_61: "These games were extremely bad, with many saying they were cursed."  #<Diese Spiele waren extrem schlecht und viele sagten, sie seien verflucht.>  #NT!
 germania_mod_62: "No Games Held"  #<Es finden keine Spiele statt>  #NT!
 desc_germania_mod_62: "While not a long time tradition in our country, refusing to hold the games was not received well by the people."  #<Auch wenn es in unserem Land keine lange Tradition ist, wurde die Weigerung, die Spiele abzuhalten, von der Bevölkerung nicht gut aufgenommen.>  #NT!
 germania_mod_63: "Spectator Efforts"  #<Zuschauerbemühungen>  #NT!
 desc_germania_mod_63: "Our countrymen funded the games entirely."  #<Unsere Landsleute haben die Spiele vollständig finanziert.>  #NT!
 germania_mod_64: "Free Olympics"  #<Kostenlose Olympische Spiele>  #NT!
 desc_germania_mod_64: "Financed by our great leader, who vowed that every man, women and child living in our country should watch the games."  #<Finanziert von unserem großen Führer, der geschworen hat, dass jeder Mann, jede Frau und jedes Kind in unserem Land die Spiele sehen sollte.>  #NT!
 germania_mod_65: "Happiness in Tradition"  #<Glück in der Tradition>  #NT!
 desc_germania_mod_65: "Our people are happy to embrace and uphold our ancient cultural practices, even in a world of change."  #<Unsere Mitarbeiter sind glücklich, unsere alten kulturellen Praktiken anzunehmen und aufrechtzuerhalten, auch in einer Welt des Wandels.>  #NT!
 germania_mod_66: "Civil War in Preparation"  #<Bürgerkrieg in Vorbereitung>  #NT!
 desc_germania_mod_66: "Our country will be ravaged by the hands of our own people - get ready!"  #<Unser Land wird von den Händen unseres eigenen Volkes verwüstet – machen Sie sich bereit!>  #NT!
 germania_mod_67: "A Hunger For Knowledge"  #<Ein Hunger nach Wissen>  #NT!
 desc_germania_mod_67: "Our people, ever eager to increase their knowledge, have devoted themselves to academic studies in hopes of growing our technologies."  #<Unsere Leute sind stets bestrebt, ihr Wissen zu erweitern, und haben sich in der Hoffnung, unsere Technologien weiterzuentwickeln, akademischen Studien gewidmet.>  #NT!
 germania_mod_68: "New Era"  #<Neue Ära>  #NT!
 desc_germania_mod_68: "Our people will start to benefit from the modernization."  #<Unsere Mitarbeiter werden von der Modernisierung profitieren.>  #NT!
 germania_mod_69: "Roman Influence"  #<Römischer Einfluss>  #NT!
 desc_germania_mod_69: "With our modernization completed by Roman wisdom, we are now influenced by them forever."  #<Nachdem unsere Modernisierung durch römische Weisheit abgeschlossen wurde, werden wir nun für immer von ihnen beeinflusst.>  #NT!
 germania_mod_70: "Mercenary Influence"  #<Söldnereinfluss>  #NT!
 desc_germania_mod_70: "The wealth that we make oftentimes finds its home in the pockets of a sellsword."  #<Der Reichtum, den wir erwirtschaften, findet oft sein Zuhause in den Taschen eines Söldners.>  #NT!
 germania_mod_71: "Urban Influence"  #<Städtischer Einfluss>  #NT!
 desc_germania_mod_71: "With our modernization strengthened by the knowledge of city building, our armies can conquer the world."  #<Mit unserer Modernisierung, gestärkt durch das Wissen über den Städtebau, können unsere Armeen die Welt erobern.>  #NT!
 germania_mod_72: "The Supreme Heritage"  #<Das höchste Erbe>  #NT!
 desc_germania_mod_72: "Our people have embraced their traditions and heritage, refusing to allow a world of chaos to change who we are."  #<Unser Volk hat seine Traditionen und sein Erbe angenommen und sich geweigert, zuzulassen, dass eine Welt des Chaos uns verändert.>  #NT!
 germania_mod_73: "Increasing Changes"  #<Zunehmende Veränderungen>  #NT!
 desc_germania_mod_73: "Our modernization of tradition is not to the taste of everyone."  #<Unsere Modernisierung der Tradition ist nicht jedermanns Sache.>  #NT!
 germania_mod_74: "Wild Riders"  #<Wilde Reiter>  #NT!
 desc_germania_mod_74: "Our light cavalry is exceptionally powerful, striking terror into the hearts of those facing them."  #<Unsere leichte Kavallerie ist außergewöhnlich mächtig und versetzt die Herzen derjenigen, die ihr gegenüberstehen, in Angst und Schrecken.>  #NT!
 germania_mod_75: "Archers of Germania"  #<Bogenschützen Germaniens>  #NT!
 desc_germania_mod_75: "Our archers are masters of fighting from the forests, taking advantage of nature in order to shield them from the enemy."  #<Unsere Bogenschützen sind Meister im Kampf aus den Wäldern und nutzen die Natur, um sich vor dem Feind zu schützen.>  #NT!
 germania_mod_76: "A New Way of Doing Things"  #<Eine neue Art, Dinge zu erledigen>  #NT!
 desc_germania_mod_76: "Our people are not afraid to incorporate new ways of doing things, especially when it will benefit the nation."  #<Unser Volk hat keine Angst davor, neue Vorgehensweisen einzuführen, insbesondere wenn es der Nation zugute kommt.>  #NT!
 germania_mod_77: "Oral Records"  #<Mündliche Aufzeichnungen>  #NT!
 desc_germania_mod_77: "Our people continue to rely on our Tribal Elders to recount our histories and stories."  #<Unser Volk verlässt sich weiterhin darauf, dass unsere Stammesältesten unsere Geschichten und Geschichten erzählen.>  #NT!
 germania_mod_78: "Alphabet of Germania"  #<Alphabet von Germania>  #NT!
 desc_germania_mod_78: "Our scribes have developed a written language for our people to use."  #<Unsere Schriftgelehrten haben eine Schriftsprache entwickelt, die unser Volk verwenden kann.>  #NT!
 germania_mod_79: "Latin Alphabet"  #<Lateinisches Alphabet>  #NT!
 desc_germania_mod_79: "We imported and adapted the alphabet from Rome."  #<Wir haben das Alphabet aus Rom importiert und angepasst.>  #NT!
 germania_mod_80: "Punic Alphabet"  #<Punisches Alphabet>  #NT!
 desc_germania_mod_80: "We imported and adapted the alphabet from Carthage."  #<Wir haben das Alphabet aus Karthago importiert und angepasst.>  #NT!
 germania_mod_81: "Greek Alphabet"  #<Griechisches Alphabet>  #NT!
 desc_germania_mod_81: "We imported and adapted the alphabet from Greece."  #<Wir haben das Alphabet aus Griechenland importiert und angepasst.>  #NT!
 germania_mod_82: "Roman Infrastructure"  #<Römische Infrastruktur>  #NT!
 desc_germania_mod_82: "Our city will shine from Roman architecture."  #<Unsere Stadt wird durch römische Architektur erstrahlen.>  #NT!
 germania_mod_83: "Greek Infrastructure"  #<Griechische Infrastruktur>  #NT!
 desc_germania_mod_83: "Our city will shine from Hellenic architecture."  #<Unsere Stadt wird durch die hellenische Architektur erstrahlen.>  #NT!
 germania_mod_84: "Punic Infrastructure"  #<Punische Infrastruktur>  #NT!
 desc_germania_mod_84: "Our city will shine from Punic architecture."  #<Unsere Stadt wird durch die punische Architektur erstrahlen.>  #NT!
 germania_mod_85: "Punic Elephants tactics"  #<Taktik der punischen Elefanten>  #NT!
 desc_germania_mod_85: "Our fascination for Carthage and its wonders have encouraged us to have our own army of elephants."  #<Unsere Faszination für Karthago und seine Wunder hat uns dazu ermutigt, eine eigene Elefantenarmee zu haben.>  #NT!
 germania_mod_86: "Punic combined tactics"  #<Punische kombinierte Taktik>  #NT!
 desc_germania_mod_86: "Strong and well-disciplined on land and sea, the Punic strategy will lead us to victory."  #<Stark und diszipliniert zu Lande und zu Wasser wird uns die punische Strategie zum Sieg führen.>  #NT!
 germania_mod_87: "Italic Tactics"  #<Kursive Taktik>  #NT!
 desc_germania_mod_87: "The might of Rome is ours now!"  #<Die Macht Roms gehört jetzt uns!>  #NT!
 germania_mod_88: "Italic Engineer"  #<Kursiver Ingenieur>  #NT!
 desc_germania_mod_88: "The logistics of Rome are ours now!"  #<Die Logistik Roms gehört jetzt uns!>  #NT!
 germania_mod_89: "Spear Mastery"  #<Speerbeherrschung>  #NT!
 desc_germania_mod_89: "We can assume our army is as strong, if not stronger, than Alexander's famed Silver Shields."  #<Wir können davon ausgehen, dass unsere Armee genauso stark, wenn nicht sogar stärker ist als Alexanders berühmte Silberschilde.>  #NT!
 germania_mod_90: "Masters of the Horse"  #<Meister des Pferdes>  #NT!
 desc_germania_mod_90: "Our cavalry is amongst the deadliest in the world."  #<Unsere Kavallerie gehört zu den tödlichsten der Welt.>  #NT!
 germania_mod_91: "Keeping Our Roots"  #<Unsere Wurzeln bewahren>  #NT!
 desc_germania_mod_91: "Even as our cities expand, our people do not forget where they come from."  #<Auch wenn unsere Städte wachsen, vergessen unsere Menschen nicht, woher sie kommen.>  #NT!
 germania_mod_93: "Religious Festival"  #<Religiöses Fest>  #NT!
 desc_germania_mod_93: "To show our cultural independence, we created a festival that future generations will remember."  #<Um unsere kulturelle Unabhängigkeit zu zeigen, haben wir ein Festival ins Leben gerufen, das künftigen Generationen in Erinnerung bleiben wird.>  #NT!
 germania_mod_94: "Teaching Administration"  #<Lehrverwaltung>  #NT!
 desc_germania_mod_94: "We are proud of our citizens, for they are excellent teachers to their children, taking their education very seriously."  #<Wir sind stolz auf unsere Bürger, denn sie sind hervorragende Lehrer für ihre Kinder und nehmen ihre Bildung sehr ernst.>  #NT!
 germania_mod_95: "Investing in the Market"  #<In den Markt investieren>  #NT!
 desc_germania_mod_95: "Profits taken from the marketplaces have been reinvested in the infrastructure of our commercial areas."  #<Gewinne aus den Marktplätzen wurden in die Infrastruktur unserer Gewerbegebiete reinvestiert.>  #NT!
 germania_mod_96: "Great Imperial City"  #<Große Kaiserstadt>  #NT!
 desc_germania_mod_96: "Our capital is finnaly ready to be the heaven on earth."  #<Unsere Hauptstadt ist endlich bereit, der Himmel auf Erden zu sein.>  #NT!
 germania_mod_97: "Old Trade Center"  #<Altes Handelszentrum>  #NT!
 desc_germania_mod_97: "Recovering Armorica allowed us to reconstruct old trade routes in Gaul that had been abandoned for centuries."  #<Die Wiederherstellung von Armorica ermöglichte uns die Rekonstruktion alter Handelsrouten in Gallien, die jahrhundertelang verlassen waren.>  #NT!
 germania_mod_98: "Belgae Workers"  #<Belgische Arbeiter>  #NT!
 desc_germania_mod_98: "Belgae are nothing more than slaves for our fields and mines."  #<Belgae sind nichts weiter als Sklaven für unsere Felder und Minen.>  #NT!
 germania_mod_99: "Gaulish Horse Traditions"  #<Gallische Pferdetraditionen>  #NT!
 desc_germania_mod_99: "With the knowledge of Gaul, our cavalry are stronger now."  #<Mit dem Wissen über Gallien ist unsere Kavallerie jetzt stärker.>  #NT!
 germania_mod_100: "National Invest"  #<National Invest>  #NT!
 desc_germania_mod_100: "Instead of funding hazardous expedition, our country and citizen benefits from a national plan of developement."  #<Anstatt gefährliche Expeditionen zu finanzieren, profitieren unser Land und unsere Bürger von einem nationalen Entwicklungsplan.>  #NT!
 germania_mod_124: "High Society Goods"  #<High-Society-Güter>  #NT!
 desc_germania_mod_124: "Carthaginian traders visit our lands and sell goods to the richest living within our cities, and while this is good for them, the low-born are not easily accepting the inequality."  #<Karthagische Händler besuchen unser Land und verkaufen Waren an die reichsten Bewohner unserer Städte, und obwohl dies gut für sie ist, akzeptieren die Niedriggeborenen die Ungleichheit nicht so leicht.>  #NT!
 germania_mod_125: "Germanic Spirit"  #<Germanischer Geist>  #NT!
 desc_germania_mod_125: "All of our fellow countryman are united in joy, upholding our traditions in their families and clan."  #<Alle unsere Landsleute sind in Freude vereint und halten unsere Traditionen in ihren Familien und in ihrem Clan hoch.>  #NT!
 germania_mod_126: "Enslave Them All!"  #<Versklaven Sie sie alle!>  #NT!
 desc_germania_mod_126: "Our warriors have been encouraged to take as many slaves as they possibly can."  #<Unsere Krieger wurden ermutigt, so viele Sklaven wie möglich zu nehmen.>  #NT!
 germania_finland_colony_mod: "Fennic Colony"  #<Fennische Kolonie>  #NT!
 desc_germania_finland_colony_mod: "Our people have established a colony in the distant Fennic regions."  #<Unser Volk hat in den fernen Fennic-Regionen eine Kolonie gegründet.>  #NT!
 germania_mod_127: "Supporting Foreign Colony"  #<Unterstützung einer ausländischen Kolonie>  #NT!
 desc_germania_mod_127: "This province is supporting a colony abroad, putting a considerable strain on its resources."  #<Diese Provinz unterstützt eine Kolonie im Ausland und stellt eine erhebliche Belastung für deren Ressourcen dar.>  #NT!
 germania_mod_128: "Beloved by the Gods"  #<Von den Göttern geliebt>  #NT!
 desc_germania_mod_127: "Our all-powerful deities have blessed our people beyond measure."  #<Unsere allmächtigen Gottheiten haben unser Volk über alle Maßen gesegnet.>  #NT!
 germania_ring: "Helm of the Germanic Kings"  #<Helm der germanischen Könige>  #NT!
 germania_ring_desc: "This imposing helmet was forged and gifted to the first monarch of the Germanic Throne and is a symbol of royal authority over all."  #<Dieser imposante Helm wurde geschmiedet und dem ersten Monarchen des germanischen Throns geschenkt und ist ein Symbol der königlichen Autorität über alles.>  #NT!
 germania_ring_power: "$germania_ring$"  #<$germania_ring$>  #NT!
 germania_ring_power_desc: "$germania_ring_desc$"  #<$germania_ring_desc$>  #NT!
 germania_throne: "Throne of Germanic Kings"  #<Thron der germanischen Könige>  #NT!
 germania_throne_desc: "This magnificent throne, carved from the finest marble, was given to the first Kings to rule over the Germanic tribes."  #<Dieser prächtige Thron aus feinstem Marmor wurde den ersten Königen geschenkt, die über die germanischen Stämme herrschten.>  #NT!
 germania_sword: "Golden Gaizaz"  #<Goldener Gaizaz>  #NT!
 germania_sword_desc: "This golden throwing spear was crafted by the first Germanic Kings as a symbol of military strength."  #<Dieser goldene Wurfspeer wurde von den ersten germanischen Königen als Symbol militärischer Stärke gefertigt.>  #NT!
 alexander_foot_armor: "Alexanders Fußrüstung"
