l_german:
  
 # Events 
 me_indoparthia.1.t: "$indoparthia_missions_1$ - Start"  #<$indoparthia_missions_1$ – Start#>  #NT! #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 me_indoparthia.1.desc: "First thing we'll need to do is pick our future ruler - let's see who's available."  #<Als Erstes müssen wir unseren zukünftigen Herrscher auswählen – mal sehen, wer verfügbar ist.#>  #NT!
 me_indoparthia.1.a: "Let's wait."  #<Warten wir.#>  #NT!
 me_indoparthia.1.tt1: "We'll get a choice who'll be appointed as our #E ruler#! from #E Parthian Great Houses#!."  #<Wir haben die Wahl, wer aus #E Parthischen Großen Häusern#! zu unserem #E Herrscher#! ernannt wird.#>  #NT!
 me_indoparthia.1.tt2: "This modifier shall be active as long as we are either subject or allied to #E Parthia#!."  #<Dieser Modifikator bleibt aktiv, solange wir entweder Untertan oder Verbündeter von #E Parthia#!. sind#>  #NT!
 me_indoparthia.2.t: "$indoparthia_missions_1$ - Choice"  #<$indoparthia_missions_1$ – Wahl#>  #NT!
 me_indoparthia.2.desc: "It looks like contenders have been selected - let us look through the options."  #<Es sieht so aus, als ob Kandidaten ausgewählt wurden – schauen wir uns die Optionen an.#>  #NT!
 me_indoparthia.2.a: "It must be [choose_10.GetName]."  #<Es muss [choose_10.GetName] sein.#>  #NT!
 me_indoparthia.2.b: "We'd rather see there [choose_11.GetName]."  #<Da sehen wir lieber [choose_11.GetName].#>  #NT!
 me_indoparthia.2.c: "[choose_12.GetName] can see to our interests."  #<[choose_12.GetName] kann sich um unsere Interessen kümmern.#>  #NT!
 me_indoparthia.3.t: "$indoparthia_missions_2$"  #<$indoparthia_missions_2$#>  #NT!
 me_indoparthia.3.desc: "For moving forth with our designs of conquests in the east, we'll need an army for that. Making sure we can conscript as many people as possible looks like a very obvious solution."  #<Um unsere Eroberungspläne im Osten voranzutreiben, brauchen wir eine Armee. Sicherzustellen, dass wir so viele Menschen wie möglich einziehen können, scheint eine sehr naheliegende Lösung zu sein.#>  #NT!
 me_indoparthia.3.a: "We must grow stronger."  #<Wir müssen stärker werden.#>  #NT!
 me_indoparthia.4.t: "$indoparthia_missions_3$"  #<$indoparthia_missions_3$#>  #NT!
 me_indoparthia.4.desc: "Gedrosia, land which claimed many lives sand nearly broke Alexander's army, is not known to be most hospitable. That being said, we have succesfully subjugated it - for now."  #<Gedrosia, ein Land, das viele Menschenleben forderte und Alexanders Armee beinahe zerschlagen hätte, gilt nicht als besonders gastfreundlich. Davon abgesehen haben wir es erfolgreich unterworfen – vorerst.#>  #NT!
 me_indoparthia.4.a: "At least this land is ours."  #<Zumindest gehört dieses Land uns.#>  #NT!
 me_indoparthia.5.t: "$indoparthia_missions_4$"  #<$indoparthia_missions_4$#>  #NT!
 me_indoparthia.5.desc: "Arachosia might be the most developed area in the vicinity, and as such will be crucial for our designs to the east."  #<Arachosia ist möglicherweise das am weitesten entwickelte Gebiet in der Umgebung und wird daher für unsere Pläne im Osten von entscheidender Bedeutung sein.#>  #NT!
 me_indoparthia.5.a: "We're moving along with our plans."  #<Wir machen weiter mit unseren Plänen.#>  #NT!
 me_indoparthia.6.t: "$indoparthia_missions_5$"  #<$indoparthia_missions_5$#>  #NT!
 me_indoparthia.6.desc: "Hindu Kush mountains shelter many different peoples and religions - they're also the best entryway to India. Controlling passes through them is crucial."  #<Die Hindukusch-Berge beherbergen viele verschiedene Völker und Religionen – sie sind auch der beste Zugang nach Indien. Die Kontrolle der Durchgänge durch sie ist von entscheidender Bedeutung.#>  #NT!
 me_indoparthia.6.a: "Second angle for invasion has been opened."  #<Der zweite Angriffspunkt für eine Invasion wurde eröffnet.#>  #NT!
 me_indoparthia.6.b: "Actually, regional capital looks like a better placement for our capital than a desert."  #<Tatsächlich scheint die Regionalhauptstadt ein besserer Standort für unsere Hauptstadt zu sein als eine Wüste.#>  #NT!
 me_indoparthia.7.t: "$indoparthia_missions_6$"  #<$indoparthia_missions_6$#>  #NT!
 me_indoparthia.7.desc: "It looks like we are being succesfull with our invasion of Gandhara. However, we shouldn't rest on laurels - there's still a lot of work to be done, but we're undoubtedly became part of local political landscape."  #<Es sieht so aus, als ob wir mit unserer Invasion in Gandhara erfolgreich sind. Allerdings sollten wir uns nicht auf den Lorbeeren ausruhen – es gibt noch viel zu tun, aber wir sind zweifellos Teil der lokalen politischen Landschaft geworden.#>  #NT!
 me_indoparthia.7.a: "Great!"  #<Großartig!#>  #NT!
 me_indoparthia.71.t: "$indoparthia_missions_6a$"  #<$indoparthia_missions_6a$#>  #NT!
 me_indoparthia.71.desc: "The University of [GetProvince('(int32)7314').GetName] has been dramatically enlarged and embellished, which has led to the growth of the city as well. It will become the greatest center of learning in Asia."  #<Die Universität [GetProvince('(int32)7314').GetName] wurde dramatisch vergrößert und verschönert, was auch zum Wachstum der Stadt geführt hat. Es wird zum größten Bildungszentrum Asiens werden.#>  #NT!
 me_indoparthia.71.a: "This will do wonders for our technological progress."  #<Das wird Wunder für unseren technischen Fortschritt bewirken.#>  #NT!
 me_indoparthia.8.t: "$indoparthia_missions_7$"  #<$indoparthia_missions_7$#>  #NT!
 me_indoparthia.8.desc: "Hind region is rich and well-developed. It'll surely be a valuable addition to our collection of lands."  #<Die Hinterregion ist reichhaltig und gut entwickelt. Es wird sicherlich eine wertvolle Ergänzung unserer Ländereiensammlung sein.#>  #NT!
 me_indoparthia.8.a: "Amazing."  #<Toll.#>  #NT!
 me_indoparthia.9.t: "$indoparthia_missions_8$"  #<$indoparthia_missions_8$#>  #NT!
 me_indoparthia.9.desc: "Our hold over the region has been strenghtened with the introduction of fortified strongholds, now we can move on with conquering rest of the region."  #<Unser Einfluss auf die Region wurde durch die Einführung befestigter Festungen gestärkt, jetzt können wir mit der Eroberung des Rests der Region fortfahren.#>  #NT!
 me_indoparthia.9.a: "May all north India be ours."  #<Möge ganz Nordindien unser sein.#>  #NT!
 me_indoparthia.10.t: "$indoparthia_missions_9$"  #<$indoparthia_missions_9$#>  #NT!
 me_indoparthia.10.desc: "Our rule here is more secured, and navy shall guard our coasts. We can procede with greater ambitions."  #<Unsere Herrschaft hier ist sicherer und die Marine wird unsere Küsten bewachen. Wir können mit größeren Ambitionen vorgehen.#>  #NT!
 me_indoparthia.10.a: "Every bit of defense helps."  #<Jede noch so kleine Verteidigung hilft.#>  #NT!
 me_indoparthia.11.t: "$indoparthia_missions_10$"  #<$indoparthia_missions_10$#>  #NT!
 me_indoparthia.11.desc: "Since we established ourselves as free, undisputed regional power - as the #E Indo-Parthia#! - we can now freely choose our destiny and do things that will make our name etched into the annals of history."  #<Da wir uns als freie, unangefochtene Regionalmacht etabliert haben – als #E Indoparthien#! – können wir nun unser Schicksal frei wählen und Dinge tun, die unseren Namen in die Annalen der Geschichte eingehen lassen.#>  #NT!
 me_indoparthia.11.a: "Excellent."  #<Exzellent.#>  #NT!
 me_indoparthia.12.t: "Our Stance to the Indo-Parthians"  #<Unsere Haltung gegenüber den Indoparthern#>  #NT!
 me_indoparthia.12.desc: "The #E Indo-Parthians#! has arose and broke free from our rule! Question remains - how should we approach managing this situation?"  #<Die #E Indoparther#! sind aufgestanden und haben sich von unserer Herrschaft befreit! Es bleibt die Frage: Wie sollten wir mit dieser Situation umgehen?#>  #NT!
 me_indoparthia.12.a: "Let them be."  #<Lass sie in Ruhe.#>  #NT!
 me_indoparthia.12.tt1: "[root_scope.GetName] becomes independent!"  #<[root_scope.GetName] wird unabhängig!#>  #NT!
 me_indoparthia.12.b: "We can come to an understanding to avoid brother's war."  #<Wir können uns einigen, um einen Bruderkrieg zu vermeiden.#>  #NT!
 me_indoparthia.12.tt2: "[root_scope.GetName] becomes independent!\n We'll let them be, for ceding their land in #E Iran#!."  #<[root_scope.GetName] wird unabhängig!\n Wir lassen sie in Ruhe, weil sie ihr Land im #E Iran#!. abtreten#>  #NT!
 me_indoparthia.12.c: "This cannot stand!"  #<Das kann nicht ertragen werden!#>  #NT!
 me_indoparthia.12.tt3: "We'll declare war on #E Indo-Parthia#!!"  #<Wir werden #E Indoparthien#!! den Krieg erklären#>  #NT!
 me_indoparthia.1201.t: "Response from Parthia"  #<Antwort von Parthia#>  #NT!
 me_indoparthia.1201.desc: "It seems the Parthians don't really care about our designs, or maybe they're afraid of confrontation. Either way, we're free to do as we please, without oversight from [parthia_scope.GetCapital.GetName]."  #<Anscheinend interessieren sich die Parther nicht wirklich für unsere Pläne, oder vielleicht haben sie Angst vor Konfrontationen. Wie dem auch sei, es steht uns frei, zu tun, was wir wollen, ohne Aufsicht von [parthia_scope.GetCapital.GetName].#>  #NT!
 me_indoparthia.1201.a: "Great!"  #<Großartig!#>  #NT!
 me_indoparthia.1202.t: "Response from Parthia"  #<Antwort von Parthia#>  #NT!
 me_indoparthia.1202.desc: "It seems the Parthians kicked the ball to our court - it's up to us whether we will have a war, or not. Peace will however cost us all our holdings west of Hindu Kush mountains."  #<Es scheint, dass die Parther uns den Ball zugespielt haben – es liegt an uns, ob wir einen Krieg haben oder nicht. Der Frieden wird uns jedoch alle unsere Besitztümer westlich des Hindukusch-Gebirges kosten.#>  #NT!
 me_indoparthia.1202.a: "Okay, let's bite the bullet."  #<Okay, lasst uns in den sauren Apfel beißen.#>  #NT!
 me_indoparthia.1202.tt: "All land west of #E Bactria#! and #E Aria#! regions will be ceded to #E Parthia#!."  #<Das gesamte Land westlich der Regionen #E Bactria#! und #E Aria#! wird an #E Parthia#! abgetreten.#>  #NT!
 me_indoparthia.1202.b: "We won't cede an inch - to arms!"  #<Wir werden keinen Zentimeter nachgeben – den Waffen!#>  #NT!
 me_indoparthia.1203.t: "Response from Parthia"  #<Antwort von Parthia#>  #NT!
 me_indoparthia.1203.desc: "It seems [parthia_scope.GetName] will not let us go easily and war is brewing."  #<Es scheint, dass [parthia_scope.GetName] uns nicht so einfach gehen lässt und Krieg braut sich zusammen.#>  #NT!
 me_indoparthia.1203.a: "To arms!"  #<Zu den Waffen!#>  #NT!
 me_indoparthia.13.t: "$indoparthia_missions_11$"  #<$indoparthia_missions_11$#>  #NT!
 me_indoparthia.13.desc: "It's not productive to Parthians to kill each other, while we may prosper together. The other Parthians see that too, so only natural outcome is to recognize each other as equals, along with our respective spheres of influence."  #<Für die Parther ist es nicht zielführend, sich gegenseitig zu töten, während es uns gemeinsam gut gehen kann. Das sehen auch die anderen Parther, daher ist es nur natürlich, dass wir einander und unsere jeweiligen Einflussbereiche als gleichwertig anerkennen.#>  #NT!
 me_indoparthia.13.a: "Now there are two Kings of Kings."  #<Jetzt gibt es zwei Könige der Könige.#>  #NT!
 me_indoparthia.14.t: "$indoparthia_missions_12$"  #<$indoparthia_missions_12$#>  #NT!
 me_indoparthia.14.desc: "Buddhism is spreading rapidly in the province of Gandara, replacing Vedicism and Zoroastrianism as the predominant faith in many cities. It is a peaceful, tranquil religion that has attracted many followers in our court as well. If we are to truly call ourselves Indian Kings, perhaps it would be wise to convert."  #<Der Buddhismus breitet sich in der Provinz Gandara rasch aus und löst in vielen Städten den Vedizismus und den Zoroastrismus als vorherrschende Religion ab. Es ist eine friedliche, ruhige Religion, die auch an unserem Hof ​​viele Anhänger gefunden hat. Wenn wir uns wirklich indische Könige nennen wollen, wäre es vielleicht klug, zu konvertieren.#>  #NT!
 me_indoparthia.14.a: "Yes, we must embrace Buddhism!"  #<Ja, wir müssen den Buddhismus annehmen!#>  #NT!
 me_indoparthia.14.b: "We will never abandon our gods."  #<Wir werden unsere Götter niemals im Stich lassen.#>  #NT!
 me_indoparthia.15.t: "$indoparthia_missions_13$"  #<$indoparthia_missions_13$#>  #NT!
 me_indoparthia.15.desc: "With so many native people integrated into our state's apparatus, we can introduce elephantry practices - perhaps even improve on them."  #<Da so viele Ureinwohner in den Staatsapparat integriert sind, können wir Elefantenpraktiken einführen – vielleicht sogar verbessern.#>  #NT!
 me_indoparthia.15.a: "Our enemies shall be crushed under feet of the elephants."  #<Unsere Feinde werden unter den Füßen der Elefanten zermalmt.#>  #NT!
 me_indoparthia.15.tt1: "[GetCulture('parthian').GetName] changes its template to #E Indo-Parthian#! template."  #<[GetCulture('parthian').GetName] ändert seine Vorlage in die Vorlage #E Indoparthisch#!.#>  #NT!
 me_indoparthia.15.tt2: "[GetCulture('sindhi').GetName] changes its template to #E Indo-Parthian#! template."  #<[GetCulture('sindhi').GetName] ändert seine Vorlage in die Vorlage #E Indoparthisch#!.#>  #NT!
 me_indoparthia.15.tt3: "[GetCulture('purus').GetName] changes its template to #E Indo-Parthian#! template."  #<[GetCulture('purus').GetName] ändert seine Vorlage in die Vorlage #E Indoparthisch#!.#>  #NT!
 me_indoparthia.15.tt4: "[GetCulture('sivi').GetName] changes its template to #E Indo-Parthian#! template."  #<[GetCulture('sivi').GetName] ändert seine Vorlage in die Vorlage #E Indoparthisch#!.#>  #NT!
 me_indoparthia.15.tt5: "[GetCulture('gandhari').GetName] changes its template to #E Indo-Parthian#! template."  #<[GetCulture('gandhari').GetName] ändert seine Vorlage in die Vorlage #E Indoparthisch#!.#>  #NT!
 me_indoparthia.15.b: "We're fine with current solutions."  #<Wir sind mit den aktuellen Lösungen einverstanden.#>  #NT!
  
 me_indoparthia.9901.t: "Play as [GetProvince('(int32)6552').GetOwner.GetName]?"  #<Als [GetProvince('(int32)6552').GetOwner.GetName] spielen?#>  #NT!
 me_indoparthia.9901.desc: "With the establishment of our March in Ariana region, the [GetProvince('(int32)6552').GetOwner.GetName], it may be worth considering to align our futures with them - in doing so, we'll leave [ROOT.GetCountry.GetName] to its own devices, and we'll play as the [GetProvince('(int32)6552').GetOwner.GetName].\nOr we could not do that."  #<Mit der Gründung unseres Marsches in der Ariana-Region, dem [GetProvince('(int32)6552').GetOwner.GetName], könnte es eine Überlegung wert sein, unsere Zukunft an ihnen auszurichten – dabei überlassen wir [ROOT.GetCountry.GetName] sich selbst und spielen als [GetProvince('(int32)6552').GetOwner.GetName].\nOder wir könnten das nicht tun.#>  #NT!
 me_indoparthia.9901.a: "We'll stay on our current course."  #<Wir bleiben bei unserem aktuellen Kurs.#>  #NT!
 me_indoparthia.9901.tt1: "We'll still play as #E Parthia#! @[SCOPE.GetRootScope.GetCountry.GetFlag]!."  #<Wir werden weiterhin als #E Parthia#! @[SCOPE.GetRootScope.GetCountry.GetFlag]! spielen.#>  #NT!
 me_indoparthia.9901.b: "Actually, yeah, this sounds fun."  #<Eigentlich ja, das hört sich lustig an.#>  #NT!
 me_indoparthia.9901.tt2: "We'll switch to playing as #E [GetProvince('(int32)6552').GetOwner.GetName]#! @[GetProvince('(int32)6552').GetOwner.GetFlag]!.\nWe'll get a #E new Mission Tree#!, centered around forming #E Indo-Parthian#! kingdom."  #<Wir wechseln zum Spielen als #E [GetProvince('(int32)6552').GetOwner.GetName]#! @[GetProvince('(int32)6552').GetOwner.GetFlag]!.\nWir erhalten einen #E neuen Missionsbaum#!, in dessen Mittelpunkt die Bildung eines #E indoparthischen#! Königreichs steht.#>  #NT!
 me_indoparthia.9901.c: "Let's keep our options open."  #<Halten wir uns unsere Optionen offen.#>  #NT!
 me_indoparthia.9901.tt3: "We'll be able to switch later into our #E Ariana March#! for this through our Mission Tree."  #<Wir werden dafür später über unseren Missionsbaum in unseren #E Ariana March#! wechseln können.#>  #NT!
 me_indoparthia.9902.t: "t"  #<T#>  #NT!
 me_indoparthia.9902.desc: "t"  #<T#>  #NT!
 me_indoparthia.9902.c: "On second thought, maybe let's stay on current course."  #<Wenn wir es genauer überdenken, bleiben wir vielleicht beim aktuellen Kurs.#>  #NT!
  
  # Tasks 
 indoparthia_missions: "Indo-Parthian Missions"  #<Indoparthische Missionen#>  #NT!
 indoparthia_missions_DESCRIPTION: "To our east, just on the opposite side of #E Hindu Kush#! mountain range, lies a vast and rich subcontinent of #E India#!. With proper skill and cunning, we can take our smaller state to greatness by carving out a realm there.\n\nForming #E Indo-Parthia#! will allow us to synergize our nomadic roots with Indian religions and military practices, potentially making our state the strongest under the sky."  #<In unserem Osten, genau auf der gegenüberliegenden Seite des #E Hindukusch#!-Gebirges, liegt ein riesiger und reicher Subkontinent von #E Indien#!. Mit der richtigen Geschicklichkeit und List können wir unseren kleineren Staat zu Größe führen, indem wir dort ein Reich errichten.\n\nDie Bildung von #E Indo-Parthia#! wird es uns ermöglichen, unsere nomadischen Wurzeln mit indischen Religionen und militärischen Praktiken zu verbinden und unseren Staat möglicherweise zum stärksten unter dem Himmel zu machen.#>  #NT!
 indoparthia_missions_CRITERIA_DESCRIPTION: "We have formed the #E Indo-Parthian Kingdom#! and expanded deep into India."  #<Wir haben das #E Indoparthische Königreich#! gegründet und sind tief nach Indien vorgedrungen.#>  #NT!
 indoparthia_missions_BUTTON_TOOLTIP: ""
 indoparthia_missions_BUTTON_DETAILS: ""
 indoparthia_missions_1: "Request a Governor"  #<Fordern Sie einen Gouverneur an#>  #NT!
 indoparthia_missions_1_DESC: "To move ahead with our plans, it's best to request a governor from one of the great families of Parthia as they'll surely bring wealth and know-how with them.\n\n\n\n\n\n\n\n\n\n@greek_mil22!"  #<Um unsere Pläne voranzutreiben, ist es am besten, einen Gouverneur aus einer der großen Familien Parthiens anzufordern, da diese sicherlich Reichtum und Know-how mitbringen.\n\n\n\n\n\n\n\n\n\n@greek_mil22!#>  #NT!
 indoparthia_missions_1.tt1: "We'll request a ruler from one of the #E Parthian Great Houses#!!"  #<Wir werden einen Herrscher von einem der #E großen parthischen Häuser#!! anfordern#>  #NT!
 indoparthia_missions_2: "Prepare an Army"  #<Bereiten Sie eine Armee vor#>  #NT!
 indoparthia_missions_2_DESC: "As the next step, we need to organize our troops for struggles to come.\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Als nächsten Schritt müssen wir unsere Truppen für die kommenden Kämpfe organisieren.\n\n\n\n\n\n\n\n\n\n@persia_mil6!#>  #NT!
 indoparthia_missions_2.tt: "All low-strata pops of integrated cultures will become #E Freemen#! - so #E eligible for conscription#!."  #<Alle unteren Schichten integrierter Kulturen werden zu #E Freien Männern#! – also #E zur Wehrpflicht berechtigt#!.#>  #NT!
 indoparthia_missions_3: "Gedrosian Deserts"  #<Gedrosische Wüsten#>  #NT!
 indoparthia_missions_3_DESC: "We need to secure our southern frontier. \n\n\n\n\n\n\n\n\n\n@egypt_mil5!"  #<Wir müssen unsere Südgrenze sichern. \n\n\n\n\n\n\n\n\n\n@egypt_mil5!#>  #NT!
 indoparthia_missions_4: "Arachosian Expansion"  #<Arachosianische Erweiterung#>  #NT!
 indoparthia_missions_4_DESC: "If we want to move into India, then Arachosia clearly stands in our way. \n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Wenn wir nach Indien ziehen wollen, steht uns Arachosia eindeutig im Weg. \n\n\n\n\n\n\n\n\n\n@persia_mil12!#>  #NT!
 indoparthia_missions_5: "Northward Push"  #<Vorstoß nach Norden#>  #NT!
 indoparthia_missions_5_DESC: "Paropamisadae and Sattagydia, while mountainous, at least aren't a desolate deserts and secure northern passages to India.\n\n\n\n\n\n\n\n\n\n@celt_mil17!"  #<Paropamisadae und Sattagydia sind zwar gebirgig, aber zumindest keine trostlosen Wüsten und sichern nördliche Passagen nach Indien.\n\n\n\n\n\n\n\n\n\n@celt_mil17!#>  #NT!
 indoparthia_missions_6: "Gandharan Conquests"  #<Gandharan-Eroberungen#>  #NT!
 indoparthia_missions_6_DESC: "Lush plains of Gandhara will prove to be a central tenet of our strength, if we can correctly settle there.\n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Die üppigen Ebenen von Gandhara werden sich als zentraler Grundsatz unserer Stärke erweisen, wenn wir uns dort richtig niederlassen können.\n\n\n\n\n\n\n\n\n\n@persia_mil2!#>  #NT!
 indoparthia_missions_6a: "University of Taxila"  #<Universität Taxila#>  #NT!
 indoparthia_missions_6a_DESC: "The University of [GetProvince('(int32)7314').GetName] is an ancient and important center of learning, attracting scholars from across India and beyond. We should expand the campuses at the university and transform it into a center of learning that will rival those in Greece and Egypt.\n\n\n\n\n\n\n\n\n\n@persia_mil5!"  #<Die University of [GetProvince('(int32)7314').GetName] ist ein altes und wichtiges Bildungszentrum, das Wissenschaftler aus ganz Indien und darüber hinaus anzieht. Wir sollten den Campus der Universität erweitern und ihn in ein Lernzentrum verwandeln, das mit denen in Griechenland und Ägypten konkurrieren kann.\n\n\n\n\n\n\n\n\n\n@persia_mil5!#>  #NT!
 indoparthia_missions_7: "Hind Conquests"  #<Hind-Eroberungen#>  #NT!
 indoparthia_missions_7_DESC: "Areas in Hind are rich and culturally homogenous, making it immediately a worthwile addition to our state.\n\n\n\n\n\n\n\n\n\n@celt_mil18!"  #<Die Gebiete in Hind sind reich und kulturell homogen, was es sofort zu einer lohnenswerten Bereicherung für unseren Staat macht.\n\n\n\n\n\n\n\n\n\n@celt_mil18!#>  #NT!
 indoparthia_missions_8: "Subjugate Gandhara"  #<Unterwerfe Gandhara#>  #NT!
 indoparthia_missions_8_DESC: "With our presence in Gandhara established, we can now solidify our grip of the region and complete its subjugation.\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Nachdem wir unsere Präsenz in Gandhara etabliert haben, können wir nun unseren Einfluss auf die Region festigen und ihre Unterwerfung abschließen.\n\n\n\n\n\n\n\n\n\n@persia_mil1!#>  #NT!
 indoparthia_missions_8.tt: "5 territories in [GetProvince('(int32)4349').GetArea.GetRegion.GetName] have a [GetBuilding('fortress_building').GetName]."  #<5 Gebiete in [GetProvince('(int32)4349').GetArea.GetRegion.GetName] haben ein [GetBuilding('fortress_building').GetName].#>  #NT!
 indoparthia_missions_9: "Beyond Hind"  #<Jenseits von Hind#>  #NT!
 indoparthia_missions_9_DESC: "With Hind itself in our grip, we can complete the conquest of the Maru region.\n\n\n\n\n\n\n\n\n\n@persia_mil9!"  #<Mit Hind selbst im Griff können wir die Eroberung der Maru-Region abschließen.\n\n\n\n\n\n\n\n\n\n@persia_mil9!#>  #NT!
 indoparthia_missions_9.tt1: "3 territories in #E Sindh#! (areas bordering Indus in Maru region) have a [GetBuilding('fortress_building').GetName]."  #<3 Gebiete in #E Sindh#! (Grenzgebiete an Indus in der Maru-Region) haben ein [GetBuilding('fortress_building').GetName].#>  #NT!
 indoparthia_missions_9.tt2: "We have a navy of at least 30 ships in [GetProvince('(int32)6821').GetName]."  #<Wir haben in [GetProvince('(int32)6821').GetName] eine Marine von mindestens 30 Schiffen.#>  #NT!
 indoparthia_missions_10: "Indo-Parthia"  #<Indoparthien#>  #NT!
 indoparthia_missions_10_DESC: "We have done something great - forge a great new Kingdom in India. Now, only one question remains - what will we do now?\n\n\n\n\n\n\n\n\n\n@persia_mil8!"  #<Wir haben etwas Großartiges getan – ein großartiges neues Königreich in Indien geschmiedet. Jetzt bleibt nur noch eine Frage: Was machen wir jetzt?\n\n\n\n\n\n\n\n\n\n@persia_mil8!#>  #NT!
 indoparthia_missions_10.tt1: "We have formed #E Indo-Parthia#!!"  #<Wir haben #E Indoparthien#!! gegründet#>  #NT!
 indoparthia_missions_10.tt2: "We can change our #E Capital#! to anywhere, once, for free!\nThat new capital will get #E 6 Nobles#!.\nWe'll gain access to #R #E Horde Conquest#!#! Casus Belli for #E 25 years#!, allowing us to conquer territories on occupation."  #<Wir können unsere #E Hauptstadt#! einmalig und kostenlos in einen beliebigen Ort ändern!\nDiese neue Hauptstadt erhält #E 6 Adlige#!.\nWir erhalten Zugriff auf #R #E Eroberung der Horde#!#! Casus Belli für #E 25 Jahre#!, wodurch wir Gebiete bei Besetzung erobern können.#>  #NT!
 indoparthia_missions_11: "Parthian Relations"  #<Parthische Beziehungen#>  #NT!
 indoparthia_missions_11_DESC: "With us being free and setting our own course, conflict with our brethren needs not to pass - we can agree on our respectives spheres of influence, recognize each other as equals and mutually profit from it.\n\n\n\n\n\n\n\n\n\n@persia_mil4!"  #<Wenn wir frei sind und unseren eigenen Kurs bestimmen, muss der Konflikt mit unseren Brüdern nicht vorübergehen – wir können uns auf unsere jeweiligen Einflussbereiche einigen, einander als gleichwertig anerkennen und gegenseitig davon profitieren.\n\n\n\n\n\n\n\n\n\n@persia_mil4!#>  #NT!
 indoparthia_missions_11.tt: "We and #E Parthia#! will get and keep this modifier as long as relations between stay above 50."  #<Wir und #E Parthia#! erhalten und behalten diesen Modifikator, solange die Beziehungen zwischen ihnen über 50 bleiben.#>  #NT!
 indoparthia_missions_12: "Embracing Buddhism"  #<Den Buddhismus umarmen#>  #NT!
 indoparthia_missions_12_DESC: "A new religion is thriving in India, founded by a man named Gautama Buddha only a few hundred years ago. We have conquered many important Buddhist holy sites, and some members of our royal court have converted, having been attracted to its teachings of peace. If we are to rule India, perhaps it will be necessary to abandon [SCOPE.GetRootScope.GetCountry.GetReligion.GetName] religion...\n\n\n\n\n\n\n\n\n\n@india_mil4!"  #<In Indien blüht eine neue Religion auf, die erst vor wenigen hundert Jahren von einem Mann namens Gautama Buddha gegründet wurde. Wir haben viele wichtige buddhistische heilige Stätten erobert und einige Mitglieder unseres königlichen Hofes sind konvertiert, weil sie sich von seinen Friedenslehren angezogen fühlten. Wenn wir Indien regieren wollen, müssen wir vielleicht die [SCOPE.GetRootScope.GetCountry.GetReligion.GetName]-Religion aufgeben...\n\n\n\n\n\n\n\n\n\n@india_mil4!#>  #NT!
 indoparthia_missions_12.tt: "Up to 20 pops in each one of our cities will convertt to #E Buddhism#!."  #<Bis zu 20 Einwohner in jeder unserer Städte werden zum #E Buddhismus#!. konvertieren#>  #NT!
 indoparthia_missions_13: "Elephant Warfare"  #<Elefantenkrieg#>  #NT!
 indoparthia_missions_13_DESC: "Arguably the biggest benefit of mixing into Indian landscape and cultures is that we can more easily utilize the greatest war machines known to man - #E War Elephants#!.\n\n\n\n\n\n\n\n\n\n@india_mil16!"  #<Der wohl größte Vorteil der Einbindung in die indische Landschaft und Kultur besteht darin, dass wir die größten Kriegsmaschinen, die die Menschheit kennt, leichter nutzen können – #E Kriegselefanten#!.\n\n\n\n\n\n\n\n\n\n@india_mil16!#>  #NT!
 indoparthia_missions_13.tt1: "We have integrated [GetCulture('sindhi').GetName], [GetCulture('purus').GetName], [GetCulture('sivi').GetName] or [GetCulture('gandhari').GetName] culture."  #<Wir haben die Kultur [GetCulture('sindhi').GetName], [GetCulture('purus').GetName], [GetCulture('sivi').GetName] oder [GetCulture('gandhari').GetName] integriert.#>  #NT!
 indoparthia_missions_13.tt2: "We produce at least #E 3 Elephants#! surplus trade goods.\nOnly second or later Elephant trade good produced in a territory will count (Currently: #Y [SCOPE.ScriptValue('inp_elephant_production')|0]#!)."  #<Wir produzieren mindestens #E 3 Elefanten#! überschüssige Handelswaren.\nNur die zweite oder spätere Elefanten-Handelsware, die in einem Gebiet produziert wird, zählt (Derzeit: #Y [SCOPE.ScriptValue('inp_elephant_production')|0]#!).#>  #NT!
 indoparthia_missions_13.tt3: "Parthian culture and eligible integrated cultures can change levy template to #E Indo-Parthian#! which is:\n@warelephant! #E War Elephants#! 30%\n@light_infantry! #E Light Infantry#! 10%\n@light_cavalry! #E Light Cavalry#! 30%\n@horse_archers! #E Horse Archers#! 30%"  #<Die parthische Kultur und berechtigte integrierte Kulturen können die Abgabenvorlage in #E Indoparthisch#! ändern, was lautet:\n@warelephant! #E Kriegselefanten#! 30 %\n@light_infantry! #E Leichte Infanterie#! 10 %\n@light_cavalry! #E Leichte Kavallerie#! 30 %\n@horse_archers! #E Berittene Bogenschützen#! 30 %#>  #NT!
  
