 # parthia_missions_22.tt: "#E #R For Horde Conquest wargoal branch:#!#! We will be able to coerce Armenia into accepting a March status, and we will get a country modifier based on their Heritage if they accept."  #<#E #R Für den Wargoal-Zweig Horde Conquest:#!#! Wir werden Armenien dazu zwingen können, einen März-Status anzunehmen, und wir werden einen Ländermodifikator basierend auf seinem Erbe erhalten, wenn sie akzeptieren.>  #NT!
  
 parthia_missions_12a: "Autonomous Kings"  #<Autonome Könige>  #NT!
 parthia_missions_12a_DESC: "Although [ROOT.GetCountry.GetRuler.GetName|Y] has no problem directly administering #E Parthian#! territories, the [ROOT.GetCountry.GetRulerTitle] acknowledges the benefits of having #T Client Kings#! rule in [ROOT.GetCountry.GetRuler.GetHerHis] name. As long as tributes flow towards [ROOT.GetCountry.GetCapital.GetName|T] and everyone heeds the call to battle, then the status quo will work rather nicely.\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Obwohl [ROOT.GetCountry.GetRuler.GetName|Y] kein Problem damit hat, #E parthische#! Gebiete direkt zu verwalten, erkennt [ROOT.GetCountry.GetRulerTitle] die Vorteile an, dass #T Klientenkönige#! im Namen [ROOT.GetCountry.GetRuler.GetHerHis] regieren. Solange Tribute in Richtung [ROOT.GetCountry.GetCapital.GetName|T] fließen und alle dem Ruf zum Kampf folgen, wird der Status Quo recht gut funktionieren.\n\n\n\n\n\n\n\n\n\n@persia_mil1!>  #NT!
 parthia_missions_12a.tt1: "We have at least 6 #G March#! subjects."  #<Wir haben mindestens 6 #G März#! Fächer.>  #NT!
 parthia_missions_12a.tt2: "We will unlock a #T Character Interaction#!, on the respective rulers, to put member of our Dynasty on the Marches's throne."  #<Wir werden eine #T Charakterinteraktion#!, für die jeweiligen Herrscher freischalten, um ein Mitglied unserer Dynastie auf den Thron der Marken zu setzen.>  #NT!
  
 parthia_missions_13a: "Dynastic Dominance"  #<Dynastische Dominanz>  #NT!
 parthia_missions_13a_DESC: "The Ruling #Y House of [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName]#! must not be contented with receiving favors and honors from the conquered, but must rule directly over all of the subjects that have sworn oaths of submission - this is the Parthian way.\n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Das regierende #Y-Haus von [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName]#! darf sich nicht damit zufrieden geben, Gunst und Ehre von den Besiegten zu erhalten, sondern muss direkt über alle Untertanen herrschen, die Unterwerfungseide geschworen haben – das ist die parthische Art.\n\n\n\n\n\n\n\n\n\n@persia_mil11!>  #NT!
 parthia_missions_13a.tt: "All #G March Subjects#! have a member of the [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName|Y] family as a #T Ruler#!.\nRequired missing have their capitals highlighted."  #<Alle #G März-Untertanen#! haben ein Mitglied der [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName|Y]-Familie als #T-Herrscher#!.\nBei fehlenden Erforderlichkeiten sind die Großbuchstaben hervorgehoben.>  #NT!
  
 parthia_missions_14a: "Religious Unity"  #<Religiöse Einheit>  #NT!
 parthia_missions_14a_DESC: "It is plain to see that [ROOT.GetCountry.GetName|G] has been blessed by the gods, and because they have granted [ROOT.GetCountry.GetRuler.GetName|Y] dominion over the world, the all-powerful [ROOT.GetCountry.GetRulerTitle] has decided that we must turn our face towards the divine. We can not longer tolerate any religious dissension in our midst, but must worship with the same voice as one.\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Es ist deutlich zu sehen, dass [ROOT.GetCountry.GetName|G] von den Göttern gesegnet wurde, und weil sie [ROOT.GetCountry.GetRuler.GetName|Y] die Herrschaft über die Welt verliehen haben, hat der allmächtige [ROOT.GetCountry.GetRulerTitle] beschlossen, dass wir unser Gesicht dem Göttlichen zuwenden müssen. Wir können keine religiöse Meinungsverschiedenheit in unserer Mitte länger dulden, sondern müssen mit der gleichen Stimme anbeten.\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
 parthia_missions_14a.tt1: "All #G March#! subjects have a [GetBuilding('temple_building').GetName|G] in any city, if it can be built for them.\nRequired missing have their capitals highlighted."  #<Alle #G März#!-Untertanen haben eine [GetBuilding('temple_building').GetName|G] in einer beliebigen Stadt, sofern diese für sie gebaut werden kann.\nErforderliche fehlende Hauptstädte müssen hervorgehoben sein.>  #NT!
 parthia_missions_14a.tt2: "All #G Marches#! shall convert to our religion. We will gain #Y 1 Free Province Investment#! for each one."  #<Alle #G Märsche#! sollen zu unserer Religion konvertieren. Wir erhalten #Y 1 kostenlose Provinzinvestition#! für jeden.>  #NT!
  
 parthia_missions_15a: "Cultural Unity"  #<Kulturelle Einheit>  #NT!
 parthia_missions_15a_DESC: "Our subjects have no other choice - they must embrace our superior #G Parthian#! culture and adopt our ways. [ROOT.GetCountry.GetRuler.GetName|Y] has called for cultural unity to be enforced throughout the lands that [ROOT.GetCountry.GetRuler.GetSheHe] rules over, and the #G Marches#! of [ROOT.GetCountry.GetName|G] have no choice but to comply.\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Unsere Untertanen haben keine andere Wahl – sie müssen unsere überlegene #G parthische#! Kultur annehmen und unsere Wege übernehmen. [ROOT.GetCountry.GetRuler.GetName|Y] hat die Durchsetzung der kulturellen Einheit in allen Ländern gefordert, über die [ROOT.GetCountry.GetRuler.GetSheHe] herrscht, und die #G-Märsche#! von [ROOT.GetCountry.GetName|G] haben keine andere Wahl, als sich daran zu halten.\n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!
 parthia_missions_15a.tt1: "All #G March#! subjects have a [GetBuilding('theathre_building').GetName|G] in any city, if it can be built for them.\nRequired missing have their capitals highlighted."  #<Alle #G März#!-Untertanen haben eine [GetBuilding('theathre_building').GetName|G] in einer beliebigen Stadt, sofern diese für sie gebaut werden kann.\nErforderliche fehlende Hauptstädte müssen hervorgehoben sein.>  #NT!
 parthia_missions_15a.tt2: "All #G Marches#! shall change their culture to [Player.MakeScope.GetCountry.GetPrimaryCulture.GetName|G]."  #<Alle #G Märsche#! sollen ihre Kultur auf [Player.MakeScope.GetCountry.GetPrimaryCulture.GetName|G] ändern.>  #NT!
  
 parthia_missions_16a: "Centralize The Realm"  #<Zentralisieren Sie das Reich>  #NT!
 parthia_missions_16a_DESC: "Although the #Y Dastgerd#! system has served us well in previous years, there are problems with this concept that need to be addressed. Our #G Marches#! have grown too powerful in their own right and their powers must be curtailed.\n\n\n\n\n\n\n\n\n\n@persia_mil7!"  #<Obwohl uns das #Y Dastgerd#!-System in den vergangenen Jahren gute Dienste geleistet hat, gibt es Probleme mit diesem Konzept, die angegangen werden müssen. Unsere #G Märsche#! sind selbst zu mächtig geworden und ihre Kräfte müssen beschnitten werden.\n\n\n\n\n\n\n\n\n\n@persia_mil7!>  #NT!
 parthia_missions_16a.tt1: "We have #Y 100#! Centralization Progress (Currently: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y])."  #<Wir haben #Y 100#! Zentralisierungsfortschritt (aktuell: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y]).>  #NT!
 parthia_missions_16a.tt2: "We will #G Reform#! out of the #Y Dastgerd#! system, allowing us to function like any other centralized country, directly holding all of our land. We can either fight a #R Civil War#! to reform or #Y Negotiate#! with our #T Estates#!."  #<Wir werden das #Y Dastgerd#!-System #G reformieren#!, sodass wir wie jedes andere zentralisierte Land funktionieren und unser gesamtes Land direkt besitzen können. Wir können entweder einen #R Bürgerkrieg#! zur Reform führen oder #Y Verhandlungen#! mit unseren #T Ständen#!.>  #NT!
  
 parthia_missions_17a: "Expand The Kingdom"  #<Erweitern Sie das Königreich>  #NT!
 parthia_missions_17a_DESC: "Our [ROOT.GetCountry.GetRulerTitle] has sent messages reassuring our #G Marches#! of our commitments to them; their joys are our joys, their sorrows are our sorrows, and their claims are our claims...\n\n\n\n\n\n\n\n\n\n@persia_mil4!"  #<Unser [ROOT.GetCountry.GetRulerTitle] hat Nachrichten gesendet, in denen er unseren #G Märschen#! unsere Verpflichtungen ihnen gegenüber bestätigt; Ihre Freuden sind unsere Freuden, ihre Sorgen sind unsere Sorgen und ihre Ansprüche sind unsere Ansprüche ...\n\n\n\n\n\n\n\n\n\n@persia_mil4!>  #NT!
 parthia_missions_17a.tt1: "No #G March#! has #T Loyalty#! below #R 90#!."  #<Nein #G März#! hat #T Loyalität#! unter #R 90#!.>  #NT!
 parthia_missions_17a.tt2: "We have at least #Y 25#! Centralization Progress (Currently: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y])."  #<Wir haben mindestens #Y 25#! Zentralisierungsfortschritte (aktuell: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y]).>  #NT!
 parthia_missions_17a.tt3: "We will unlock a #T Decision#! which will allow us to #R Claim Areas#! bordering our #G Marches#!!"  #<Wir werden eine #T Entscheidung#! freischalten, die es uns ermöglicht, #R Gebiete#! zu beanspruchen, die an unsere #G Marken#! grenzen!>  #NT!
  
 parthia_missions_18a: "Matter Of Media Atropatene"  #<Materie der Medien Atropatene>  #NT!
 parthia_missions_18a_DESC: "Our mere reputation might be enough to persuade [GetCountry('MAP').GetName|G] to accept status as our #G March#! - the choice is up to them. If they want to see the #G Parthian#! army in action, then they can reject the overtures of [ROOT.GetCountry.GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil18!"  #<Unser bloßer Ruf könnte ausreichen, um [GetCountry('MAP').GetName|G] davon zu überzeugen, den Status als unser #G März#! anzunehmen – die Wahl liegt bei ihnen. Wenn sie die Armee der #G Parther#! in Aktion sehen wollen, dann können sie die Angebote von [ROOT.GetCountry.GetRuler.GetName|Y] ablehnen.\n\n\n\n\n\n\n\n\n\n@persia_mil18!>  #NT!
 parthia_missions_18a.tt: "If they accept, they will become our #G March#! and we will additionally get [GetModifier('parthian_atropatene').GetName|Y], which will grant [GetModifier('parthian_atropatene').GetDesc] for #T 20 Years#!."  #<Wenn sie annehmen, werden sie unser #G März#! und wir erhalten zusätzlich [GetModifier('parthian_atropatene').GetName|Y], was [GetModifier('parthian_atropatene').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
 parthia_missions_send_ultimatum_tt: "We will send an ultimatium, demanding their submission.\nChance of acceptance depends on their opinion of us.\n\n"  #<Wir werden ihnen ein Ultimatum stellen und sie zur Einreichung auffordern.\nDie Chance auf Annahme hängt von ihrer Meinung über uns ab.\n\n>  #NT!
  
 parthia_missions_19a: "Demand Adiabene's Loyalty"  #<Fordern Sie Adiabenes Loyalität>  #NT!
 parthia_missions_19a_DESC: "The time has come to extend the same courtesy to [GetCountry('ADI').GetName|G] that many other Kings and Generals have received; the opportunity to live securely and freely as a #G March#! of [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Es ist an der Zeit, [GetCountry('ADI').GetName|G] die gleiche Höflichkeit zu erweisen, die viele andere Könige und Generäle erhalten haben; die Möglichkeit, als #G. März#! vom [ROOT.GetCountry.GetName|G] sicher und frei zu leben.\n\n\n\n\n\n\n\n\n\n@persia_mil2!>  #NT!
 parthia_missions_19a.tt: "If they accept, they'll become our #G March#! and we will gain [GetModifier('parthian_adiabene').GetName|Y], which will grant [GetModifier('parthian_adiabene').GetDesc] for #T 20 Years#!."  #<Wenn sie annehmen, werden sie unser #G März#! und wir erhalten [GetModifier('parthian_adiabene').GetName|Y], was [GetModifier('parthian_adiabene').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
  
 parthia_missions_20a: "Caucasian Valleys"  #<Kaukasische Täler>  #NT!
 parthia_missions_20a_DESC: "As our armies continue to move into the mountainous #T Caucasus#! region, [ROOT.GetCountry.GetRuler.GetName|Y] has sent a letter to [GetCountry('IBR').GetRuler.GetName|Y], offering the Iberians the chance to lay down their weapons peacefully and submit to the hegemony of [ROOT.GetCountry.GetName|G]. If they decline this generous offer, then they can look to the lands of their conquered neighbors and witness what lies in store for them.\n\n\n\n\n\n\n\n\n\n@persia_mil14!"  #<Während unsere Armeen weiter in die gebirgige Region #T Kaukasus#! vordringen, hat [ROOT.GetCountry.GetRuler.GetName|Y] einen Brief an [GetCountry('IBR').GetRuler.GetName|Y] geschickt, in dem er den Iberern die Möglichkeit bietet, ihre Waffen friedlich niederzulegen und sich der Hegemonie von [ROOT.GetCountry.GetName|G] zu unterwerfen. Wenn sie dieses großzügige Angebot ablehnen, können sie auf die Ländereien ihrer eroberten Nachbarn blicken und erleben, was auf sie zukommt.\n\n\n\n\n\n\n\n\n\n@persia_mil14!>  #NT!
 parthia_missions_20a.tt1: "If they accept, they'll become our #G March#! and we will gain [GetModifier('parthian_iberia').GetName|Y], which will grant [GetModifier('parthian_iberia').GetDesc] for #T 20 Years#!."  #<Wenn sie annehmen, werden sie unser #G März#! und wir erhalten [GetModifier('parthian_iberia').GetName|Y], was [GetModifier('parthian_iberia').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
 parthia_missions_20a.tt2: "#E We will get claims on the rest of the #T Caucasus#! region.#!"  #<#E Wir werden Ansprüche auf den Rest der Region #T Kaukasus#! erhalten.#!>  #NT!
  
 parthia_missions_21a: "Undermine Armenia"  #<Armenien untergraben>  #NT!
 parthia_missions_21a.tt: "We will unlock decisions to influence #G Sophene#! and #G Corduene#! into our sphere of influence, welcoming them as our #G Marches#!."  #<Wir werden Entscheidungen zur Beeinflussung von #G Sophene#! und #G Corduene#! in unserem Einflussbereich freischalten und sie als unsere #G Marches#! willkommen heißen.>  #NT!
 parthia_missions_21a_DESC: "The boastful [GetCountry('ARM').GetRuler.GetName|Y] fancies [GetCountry('ARM').GetRuler.GetHerHim]self a true [GetCountry('ARM').GetRulerTitle], exerting influence over [GetCountry('ARM').GetRuler.GetHerHim] subjects and parading around [GetCountry('ARM').GetCapital.GetName|T] like a fool. [ROOT.GetCountry.GetRuler.GetName|Y] is ready to demonstrate to this pretender what real authority looks like...\n\n\n\n\n\n\n\n\n\n@persia_mil9!"  #<Der prahlerische [GetCountry('ARM').GetRuler.GetName|Y] stellt sich vor, [GetCountry('ARM').GetRuler.GetHerHim] sei ein echter [GetCountry('ARM').GetRulerTitle], der Einfluss auf [GetCountry('ARM').GetRuler.GetHerHim] Untertanen ausübt und wie ein Idiot um [GetCountry('ARM').GetCapital.GetName|T] herumstolziert. [ROOT.GetCountry.GetRuler.GetName|Y] ist bereit, diesem Prätendenten zu zeigen, wie echte Autorität aussieht...\n\n\n\n\n\n\n\n\n\n@persia_mil9!>  #NT!
  
 parthia_missions_22a: "Subjugate Armenia"  #<Unterwerfe Armenien>  #NT!
 parthia_missions_22a_DESC: "After enduring years of an uneasy coexistence, [ROOT.GetCountry.GetRuler.GetName|Y] has decided that the time is ripe to subjugate [GetCountry('ARM').GetName|G] once and for all. As a courtesy to a fellow Ruler, [ROOT.GetCountry.GetRuler.GetFirstName] will ask [GetCountry('ARM').GetRuler.GetName|Y] to lay down [GetCountry('ARM').GetRuler.GetHerHis] arms peacefully.\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Nach Jahren unruhigen Zusammenlebens hat [ROOT.GetCountry.GetRuler.GetName|Y] entschieden, dass die Zeit reif ist, [GetCountry('ARM').GetName|G] ein für alle Mal zu unterwerfen. Aus Höflichkeit gegenüber einem anderen Herrscher wird [ROOT.GetCountry.GetRuler.GetFirstName] [GetCountry('ARM').GetRuler.GetName|Y] bitten, [GetCountry('ARM').GetRuler.GetHerHis] friedlich die Waffen niederzulegen.\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
 parthia_missions_22a.tt: "If they accept, they'll become our #G March#! and we will gain [GetModifier('parthian_armenia').GetName|Y] which will grant [GetModifier('parthian_armenia').GetDesc] for #T 20 Years#!."  #<Wenn sie annehmen, werden sie unser #G März#! und wir erhalten [GetModifier('parthian_armenia').GetName|Y], was [GetModifier('parthian_armenia').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
  
 parthia_missions_23: "Conquer Media"  #<Medien erobern>  #NT!
 parthia_missions_23_DESC: "The reputation of the famous #G Medes#! is known to all, but an ancient pedigree will not be enough to spare their cities from the armies of [ROOT.GetCountry.GetRuler.GetName|Y] and the ascendant power of [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@persia_mil21!"  #<Der Ruf der berühmten #G Meder#! ist allen bekannt, aber ein alter Stammbaum wird nicht ausreichen, um ihre Städte vor den Armeen von [ROOT.GetCountry.GetRuler.GetName|Y] und der aufsteigenden Macht von [ROOT.GetCountry.GetName|G] zu verschonen.\n\n\n\n\n\n\n\n\n\n@persia_mil21!>  #NT!
 parthia_owns_50_percent_media_tt: "We must own at least #Y 50%#! of the region of #T Media#!."  #<Wir müssen mindestens #Y 50 %#! der Region von #T Medien#! besitzen.>  #NT!
  
 parthia_missions_24: "Conquer Persia"  #<Erobere Persien>  #NT!
 parthia_missions_24_DESC: "The cities and fortresses of the #G Persians#! will fall to our armies, just like all others that stood against us have. [ROOT.GetCountry.GetRuler.GetName|Y] has vowed to show no mercy to #G Persis#!, but will defeat them and annex their provinces into [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Die Städte und Festungen der #G Perser#! werden an unsere Armeen fallen, genau wie alle anderen, die sich uns widersetzten. [ROOT.GetCountry.GetRuler.GetName|Y] hat geschworen, #G Persis#! keine Gnade zu zeigen, wird sie aber besiegen und ihre Provinzen in [ROOT.GetCountry.GetName|G] eingliedern.\n\n\n\n\n\n\n\n\n\n@persia_mil12!>  #NT!
 parthia_owns_50_percent_persia_tt: "We must own at least #T 50%#! of the region of #G Persis#!, either directly or via having the #E #Y Xsayathiya#!#! of #E #G Persis#!#! as our subject."  #<Wir müssen mindestens #T 50 %#! der Region von #G Persis#! besitzen, entweder direkt oder indem wir die #E #Y Xsayathiya#!#! von #E #G Persis#!#! als unser Subjekt haben.>  #NT!
  
 parthia_missions_25: "Conquer Ariana"  #<Erobere Ariana>  #NT!
 parthia_missions_25_DESC: "The desolate piece of land, nearly all covered in deserts; the Ariana region. Despite being very poor, some sources of wealth can be found. For example on its southern border, by the sea, dwell people famous for catching pearls. As such, despite being a tomb of much of the the great Alexander's army, it may still prove worthwile addition to our realm. Nevermind the fact, that India with all its riches is just beyond it.\n\n\n\n\n\n\n\n\n\n@egypt_mil4!"  #<Das verlassene Stück Land, fast vollständig mit Wüsten bedeckt; der Ariana-Region. Obwohl es sehr arm ist, gibt es einige Quellen des Reichtums. An seiner südlichen Grenze, am Meer, leben beispielsweise Menschen, die für den Perlenfang bekannt sind. Obwohl es sich um ein Grab eines Großteils der Armee des großen Alexander handelt, könnte es sich dennoch als lohnende Bereicherung für unser Reich erweisen. Vergessen Sie die Tatsache, dass Indien mit all seinen Reichtümern knapp dahinter liegt.\n\n\n\n\n\n\n\n\n\n@egypt_mil4!>  #NT!
 parthia_owns_50_percent_ariana_tt: "We must own at least #Y 50%#! of the region of #T Ariana#!, either directly or via subjects."  #<Wir müssen mindestens #Y 50 %#! der Region #T Ariana#! besitzen, entweder direkt oder über Subjekte.>  #NT!
  
 parthia_missions_26: "Gates Of India"  #<Tore von Indien>  #NT!
 parthia_missions_26_DESC: "We have conquered the overland passages into #COLOR:{0.83,0.53,0.3} India#!, all but assuring that we can invade the eastern territories with impunity.\n\n\n\n\n\n\n\n\n\n@india_mil4!"  #<Wir haben die Überlandpassagen nach #COLOR:{0.83,0.53,0.3} Indien#!, so gut wie gesichert, dass wir ungestraft in die östlichen Gebiete eindringen können.\n\n\n\n\n\n\n\n\n\n@india_mil4!>  #NT!
  
 parthia_missions_27: "Descendants Of Sargon"  #<Nachkommen von Sargon>  #NT!
 parthia_missions_27_DESC: "Euphrates and Tigris rivers provide incredible wealth the lands of Mesopotamia. As such, this was a home to the strongest states in the world since time immemorial. Pehaps first king of all time, #E Sargon the Great#!, was born here and carved first realm of note to be spoken of to this day. It's only proper we continue with those ambitions, and we too, hopefully, will be spoken as long as mankind lives.\n\n\n\n\n\n\n\n\n\n@persia_mil5!"  #<Die Flüsse Euphrat und Tigris verleihen den Ländern Mesopotamiens unglaublichen Reichtum. Damit war es seit jeher die Heimat der stärksten Staaten der Welt. Vielleicht der erste König aller Zeiten, #E Sargon der Große#!,, wurde hier geboren und schuf das erste bedeutende Reich, von dem bis heute gesprochen wird. Es ist nur richtig, dass wir mit diesen Ambitionen fortfahren, und hoffentlich werden auch wir gesprochen, solange die Menschheit lebt.\n\n\n\n\n\n\n\n\n\n@persia_mil5!>  #NT!
 parthia_owns_70_percent_mesopotamia_tt: "We must own at least #Y 70%#! of the region of #T Mesopotamia#!, either directly or via subjects."  #<Wir müssen mindestens #Y 70 %#! der Region #T Mesopotamien#! besitzen, entweder direkt oder über Untertanen.>  #NT!
  
 parthia_missions_28: "Median Authority"  #<Mittlere Autorität>  #NT!
 parthia_missions_28_DESC: "$parthia_missions_23_DESC$"  #<$parthia_missions_23_DESC$>  #NT!
  
 parthia_missions_29: "Bowing Of Armenia"  #<Verbeugung Armeniens>  #NT!
 parthia_missions_29_DESC: "$parthia_missions_22a_DESC$"  #<$parthia_missions_22a_DESC$>  #NT!
  
 parthia_missions_30: "Assyrian Ruins"  #<Assyrische Ruinen>  #NT!
 parthia_missions_30_DESC: "While the glory of the #G Assyrians#! has long departed from the minds of men, their former realm stretches before [ROOT.GetCountry.GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Während der Ruhm der #G Assyrer#! schon lange aus dem Bewusstsein der Menschen verschwunden ist, erstreckt sich ihr früheres Reich noch vor [ROOT.GetCountry.GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
 parthia_missions_30.tt: "We will get claims on the rest of #E [GetProvince('(int32)880').GetArea.GetRegion.GetName|G] Region#!."  #<Wir werden Ansprüche auf den Rest von #E [GetProvince('(int32)880').GetArea.GetRegion.GetName|G] Region#!. erhalten>  #NT!
  
 parthia_missions_31: "Break Up The Greek Remnants"  #<Zerschlagen Sie die griechischen Überreste>  #NT!
 parthia_missions_31_DESC: "We have made great strides in secureing the #T Iranian Plateau#! for [ROOT.GetCountry.GetName|G], but there are still pockets of resistance that do not yet acknowledge the rule of [ROOT.GetCountry.GetRuler.GetName|Y]]. The time has come to push out these interlopers and put an end to the #G Hellenic#! presence in our lands!\n\n\n\n\n\n\n\n\n\n@greek_mil8!"  #<Wir haben große Fortschritte bei der Sicherung des #T Iranischen Plateaus#! für [ROOT.GetCountry.GetName|G] gemacht, aber es gibt immer noch Widerstandsnester, die die Herrschaft von [ROOT.GetCountry.GetRuler.GetName|Y] noch nicht anerkennen]. Es ist an der Zeit, diese Eindringlinge zu vertreiben und der #G hellenischen#! Präsenz in unserem Land ein Ende zu setzen!\n\n\n\n\n\n\n\n\n\n@greek_mil8!>  #NT!
 parthia_missions_31.tt1: "We must #R Inspire Disloyalty#! of the #G Seleukid#! governor of either [GetProvince('(int32)1595').GetArea.GetRegion.GetName|T], [GetProvince('(int32)4799').GetArea.GetRegion.GetName|T] or [GetProvince('(int32)6552').GetArea.GetRegion.GetName|T]."  #<Wir müssen #R Untreue#! der #G Seleukiden#! Gouverneure von [GetProvince('(int32)1595').GetArea.GetRegion.GetName|T], [GetProvince('(int32)4799').GetArea.GetRegion.GetName|T] oder [GetProvince('(int32)6552').GetArea.GetRegion.GetName|T] hervorrufen.>  #NT!
 parthia_missions_31.tt2: "What remains of the #G Seleukid#! control of the #T Iranian Plateau#! will be greatly weakened, allowing us to perhaps entice their governors from across the #Y Zagros#!."  #<Was von der Kontrolle der #G Seleukiden#! über das #T Iranische Plateau#! übrig bleibt, wird stark geschwächt sein, was es uns vielleicht ermöglicht, ihre Gouverneure aus dem gesamten #Y Zagros#! anzulocken.>  #NT!
  
 parthia_missions_32: "Settlement With The Greeks"  #<Siedlung mit den Griechen>  #NT!
 parthia_missions_32_DESC: "Instead of waging needless wars against the [GetCountry('SEL').GetName|G], [ROOT.GetCountry.GetRuler.GetName|Y] believes that the wiser course of action involves making peace with the Hellenics...for now.\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Anstatt unnötige Kriege gegen die [GetCountry('SEL').GetName|G] zu führen, glaubt [ROOT.GetCountry.GetRuler.GetName|Y], dass die klügere Vorgehensweise darin besteht, Frieden mit den Hellenen zu schließen ... vorerst.\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 parthia_missions_32.tt: "The #G Seleukids#! will cede to us everything east of the #Y Euphrates#! and give our Ruler a Seleukid bride."  #<Die #G Seleukiden#! werden uns alles östlich des #Y Euphrat#! überlassen und unserem Herrscher eine seleukidische Braut schenken.>  #NT!
  
 parthia_missions_33: "Parthian Empire"  #<Partherreich>  #NT!
 parthia_missions_33_DESC: "We have cast down those that were foolish enough to stand in our way, and the gods of war have blessed the armies of [ROOT.GetCountry.GetRuler.GetName|Y] with countless victories. With no real rivals to threaten our power, the living god [ROOT.GetCountry.GetRuler.GetFirstName] has declared that we will be known hereafter as the #E #R Parthian Empire#!#!.\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Wir haben diejenigen besiegt, die dumm genug waren, sich uns in den Weg zu stellen, und die Kriegsgötter haben die Armeen von [ROOT.GetCountry.GetRuler.GetName|Y] mit unzähligen Siegen gesegnet. Da es keine wirklichen Rivalen gibt, die unsere Macht bedrohen könnten, hat der lebende Gott [ROOT.GetCountry.GetRuler.GetFirstName] erklärt, dass wir künftig als #E #R Partherreich#!#!.\n\n\n\n\n\n\n\n\n\n@greek_mil10! bekannt sein werden>  #NT!
 parthia_missions_33.tt1: "We have #T 100 Centralization#! Progress (Currently: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2])."  #<Wir haben #T 100 Zentralisierung#! Fortschritt (Derzeit: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2]).>  #NT!
 parthia_missions_33.tt2: "We do not have any #G Satrapy#! subjects."  #<Wir haben keine #G Satrapie#! Themen.>  #NT!
 # parthia_missions_33.tt3: ""
 parthia_missions_33.tt4: "If we have a modifier [GetModifier('decentralized_administration').GetName|Y], then we will lose it and for 20 years we'll gain a country modifier [GetModifier('pth_centralization_effort').GetName|Y] granting: [GetModifier('pth_centralization_effort').GetDesc]."  #<Wenn wir einen Modifikator [GetModifier('decentralized_administration').GetName|Y] haben, verlieren wir ihn und erhalten 20 Jahre lang einen Ländermodifikator [GetModifier('pth_centralization_effort').GetName|Y], der Folgendes gewährt: [GetModifier('pth_centralization_effort').GetDesc].>  #NT!
  
 parthia_missions_34: "Empty task, TODO?"  #<Leere Aufgabe, TODO?>  #NT!
 parthia_missions_34_DESC: ""
  
 parthia_missions_35: "Headway Into Anatolia"  #<Auf dem Weg nach Anatolien>  #NT!
 parthia_missions_35_DESC: "Our armies move westward, scattering our pathetic foes like flies as they press on into #G Anatolia#!. Emboldened by the lack of real resistance to our invasion, [ROOT.GetCountry.GetRuler.GetName|Y] has made it known that the levies of [ROOT.GetCountry.GetName|G] will one day conquer the entire peninsula.\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Unsere Armeen ziehen nach Westen und zerstreuen unsere erbärmlichen Feinde wie Fliegen, während sie nach #G Anatolien#!. vordringen. Ermutigt durch den Mangel an echtem Widerstand gegen unsere Invasion hat [ROOT.GetCountry.GetRuler.GetName|Y] bekannt gegeben, dass die Truppen von [ROOT.GetCountry.GetName|G] eines Tages die gesamte Halbinsel erobern werden.\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
 parthia_missions_35.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_35.tt2: "We will get claims on the interior of #G Anatolia#!."  #<Wir werden Ansprüche auf das Innere von #G Anatolien#!. erhalten>  #NT!
  
 parthia_missions_36: "Cracking The Interior"  #<Den Innenraum knacken>  #NT!
 parthia_missions_36_DESC: "Total victory is almost ours, but we cannot slow down or relent - we must continue to put pressure on our enemies. The interior of #G Anatolia#! is almost ours, and the waters of the #Y Mare Aegaeum#! call out to us like the famed sirens in the folktales of the #G Hellenes#!.\n\n\n\n\n\n\n\n\n\n@celt_mil19!"  #<Der völlige Sieg liegt fast bei uns, aber wir können nicht langsamer werden oder nachgeben – wir müssen weiterhin Druck auf unsere Feinde ausüben. Das Innere von #G Anatolien#! gehört fast uns, und die Gewässer des #Y Mare Aegaeum#! rufen uns zu wie die berühmten Sirenen in den Volksmärchen der #G Hellenen#!.\n\n\n\n\n\n\n\n\n\n@celt_mil19!>  #NT!
 parthia_missions_36.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_36.tt2: "We will get claims on the western coasts of #G Anatolia#!."  #<Wir werden Ansprüche an den Westküsten von #G Anatolien#!. bekommen>  #NT!
  
 parthia_missions_37: "Reaching The Sea"  #<Das Meer erreichen>  #NT!
 parthia_missions_37_DESC: "At long last, the #G Asian#! coast is ours - we have dominated #G Anatolia#! and have turned it into more provinces of the unequalled [ROOT.GetCountry.GetName|G]. With the many port cities of Asia firmly in grasp, [ROOT.GetCountry.GetRuler.GetName|Y] has called for the construction of a #Y Mediterranean Armada#!, one that will protect our interests in the western waters.\n\n\n\n\n\n\n\n\n\n@greek_mil21!"  #<Endlich gehört die #G asiatische#! Küste uns – wir haben #G Anatolien#! dominiert und daraus weitere Provinzen der unvergleichlichen [ROOT.GetCountry.GetName|G] gemacht. Da die vielen Hafenstädte Asiens fest im Griff sind, hat [ROOT.GetCountry.GetRuler.GetName|Y] den Bau einer #Y Mittelmeer-Armada#! gefordert, die unsere Interessen in den westlichen Gewässern schützen wird.\n\n\n\n\n\n\n\n\n\n@greek_mil21!>  #NT!
 parthia_missions_37.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_37.tt2: "We will get claims on the western #G Aegean#! coastline#!.\nEvery coastal province in [GetProvince('(int32)278').GetArea.GetRegion.GetName] will get [GetModifier('pth_asia_ships_pmod').GetName|Y] which will grant [GetModifier('pth_asia_ships_pmod').GetDesc] for #T 10 Years#!."  #<Wir erhalten Ansprüche auf die westliche #G Ägäis#! Küstenlinie#!.\nJede Küstenprovinz in [GetProvince('(int32)278').GetArea.GetRegion.GetName] erhält [GetModifier('pth_asia_ships_pmod').GetName|Y], was [GetModifier('pth_asia_ships_pmod').GetDesc] für #T 10 Jahre#! gewährt.>  #NT!
  
 parthia_missions_38: "Pivot South"  #<Nach Süden schwenken>  #NT!
 parthia_missions_38_DESC: "There are many rich cities in [GetProvince('(int32)790').GetArea.GetRegion.GetName|T] that have been fought over by many great powers, and now it is our turn to take these territories for [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@greek_mil18!"  #<Es gibt viele reiche Städte in [GetProvince('(int32)790').GetArea.GetRegion.GetName|T], um die viele Großmächte gekämpft haben, und jetzt sind wir an der Reihe, diese Gebiete für [ROOT.GetCountry.GetName|G] einzunehmen.\n\n\n\n\n\n\n\n\n\n@greek_mil18!>  #NT!
 parthia_missions_38.tt: "We will get claims on the #E [GetProvince('(int32)790').GetArea.GetRegion.GetName|T] Region#!."  #<Wir erhalten Ansprüche auf die Region #E [GetProvince('(int32)790').GetArea.GetRegion.GetName|T]#!.>  #NT!
  
 parthia_missions_39: "Expand Into Syria"  #<Expandieren Sie nach Syrien>  #NT!
 parthia_missions_39_DESC: "In their eternal wisdom, it appears that the gods have deemed [ROOT.GetCountry.GetRuler.GetName|Y] worthy of ruling over the entire Earth - our [ROOT.GetCountry.GetRulerTitle] has urged our armies to march south into [GetProvince('(int32)687').GetArea.GetRegion.GetName|T], a fertile land where milk @cattle! and honey @honey! can be found in abundance.\n\n\n\n\n\n\n\n\n\n@greek_mil19!"  #<In ihrer ewigen Weisheit scheinen die Götter [ROOT.GetCountry.GetRuler.GetName|Y] für würdig erachtet zu haben, über die gesamte Erde zu herrschen – unser [ROOT.GetCountry.GetRulerTitle] hat unsere Armeen dazu gedrängt, nach Süden in [GetProvince('(int32)687').GetArea.GetRegion.GetName|T] zu marschieren, ein fruchtbares Land, in dem @Vieh gemolken wird! und Schatz @honey! gibt es in Hülle und Fülle.\n\n\n\n\n\n\n\n\n\n@greek_mil19!>  #NT!
 parthia_missions_39.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_39.tt2: "We will get on the #E [GetProvince('(int32)687').GetArea.GetRegion.GetName|T] Region#!."  #<Wir werden in die #E [GetProvince('(int32)687').GetArea.GetRegion.GetName|T] Region#!. gelangen>  #NT!
  
 parthia_missions_40: "Conquer Canaan"  #<Erobere Kanaan>  #NT!
 parthia_missions_40_DESC: "The mysterious #T 'Land of the Pyramids'#! lies just beyond our borders, and [ROOT.GetCountry.GetRuler.GetName|Y], sensing a moment of destiny, has ordered the [ROOT.GetCountry.GetAdjective] levies to prepare for glorious battle.\n\n\n\n\n\n\n\n\n\n@egypt_mil1!"  #<Das mysteriöse #T „Land der Pyramiden“#! liegt direkt hinter unseren Grenzen, und [ROOT.GetCountry.GetRuler.GetName|Y], der einen Moment des Schicksals spürt, hat den [ROOT.GetCountry.GetAdjective] Truppen befohlen, sich auf eine glorreiche Schlacht vorzubereiten.\n\n\n\n\n\n\n\n\n\n@egypt_mil1!>  #NT!
 parthia_missions_40.tt1: "We have stationed at least #Y 2 Armies#! of least #T 40 Units#! in the #T [GetProvince('(int32)687').GetArea.GetRegion.GetName] Region#!."  #<Wir haben mindestens #Y 2 Armeen#! von mindestens #T 40 Einheiten#! in der #T [GetProvince('(int32)687').GetArea.GetRegion.GetName] Region#! stationiert.>  #NT!
 parthia_missions_40.tt2: "We will get claims on the #G Nile Delta#!."  #<Wir werden Ansprüche auf das #G Nildelta#!. bekommen>  #NT!
  
 parthia_missions_41: "Indian Preparation"  #<Indische Zubereitung>  #NT!
 parthia_missions_41_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] has told our generals to prepare the troops for an invasion of the #COLOR:{0.83,0.53,0.3} Indian#! subcontinent, and our warriors are desperate for the chance to plunder and raid their rich cities.\n\n\n\n\n\n\n\n\n\n@india_mil19!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] hat unseren Generälen befohlen, die Truppen auf eine Invasion des Subkontinents #COLOR:{0.83,0.53,0.3} Indianer#! vorzubereiten, und unsere Krieger sehnen sich verzweifelt nach der Chance, ihre reichen Städte zu plündern und zu überfallen.\n\n\n\n\n\n\n\n\n\n@india_mil19!>  #NT!
 parthia_missions_41.tt1: "We have stationed at least #Y 3 Armies#! of least #T 40 Units in provinces#! adjacent to the highlighted provinces."  #<Wir haben mindestens #Y 3 Armeen#! von mindestens #T 40 Einheiten in Provinzen#! neben den markierten Provinzen stationiert.>  #NT!
 parthia_missions_41.tt2: "We will get claims on the highlighted region."  #<Wir erhalten Ansprüche auf die hervorgehobene Region.>  #NT!
  
 parthia_missions_42: "Conquest Of The Indus"  #<Eroberung des Indus>  #NT!
 parthia_missions_42_DESC: "Our triumphant forces have followed the winding #Y Indus River#! south, pushing out the enemy garrisons from the fortresses that futilely attempt to block our progress.\n\n\n\n\n\n\n\n\n\n@india_mil21!"  #<Unsere siegreichen Streitkräfte sind dem gewundenen #Y Indus#! nach Süden gefolgt und haben die feindlichen Garnisonen aus den Festungen vertrieben, die vergeblich versuchen, unseren Fortschritt zu blockieren.\n\n\n\n\n\n\n\n\n\n@india_mil21!>  #NT!
 parthia_missions_42.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_42.tt2: "We will get claims on the #E [GetProvince('(int32)4429').GetArea.GetRegion.GetName|T] Region#!."  #<Wir erhalten Ansprüche auf die Region #E [GetProvince('(int32)4429').GetArea.GetRegion.GetName|T]#!.>  #NT!
  
 parthia_missions_43: "To The Other Sea"  #<Zum anderen Meer>  #NT!
 parthia_missions_43_DESC: "[ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName|Y] rules over an #T Empire#! that spans continents, but the ambitious warrior has set [ROOT.GetCountry.GetRuler.GetHerHis] eyes on the #Y Sinus Gangeticus#!.\n\n\n\n\n\n\n\n\n\n@india_mil23!"  #<[ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName|Y] herrscht über ein #T Imperium#!, das sich über Kontinente erstreckt, aber der ehrgeizige Krieger hat [ROOT.GetCountry.GetRuler.GetHerHis] Augen auf den #Y Sinus Gangeticus#! gerichtet.\n\n\n\n\n\n\n\n\n\n@india_mil23!>  #NT!
 parthia_missions_43.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_43.tt2: "We will get claims on the #E [GetProvince('(int32)4440').GetArea.GetRegion.GetName|T] Region#!."  #<Wir erhalten Ansprüche auf die Region #E [GetProvince('(int32)4440').GetArea.GetRegion.GetName|T]#!.>  #NT!
  
 parthia_missions_44: "Move Into Bactria"  #<Umzug nach Baktrien>  #NT!
 parthia_missions_44_DESC: "It is known that the territories once administered by [GetCountry('BAC').GetName] are considered the doorways to the steppe, and by controlling this vital passageway, our forces will have easier access to the traditional lands of our ancestors.\n\n\n\n\n\n\n\n\n\n@persia_mil20!"  #<Es ist bekannt, dass die Gebiete, die einst von [GetCountry('BAC').GetName] verwaltet wurden, als Tore zur Steppe gelten, und durch die Kontrolle dieses wichtigen Durchgangs werden unsere Streitkräfte leichteren Zugang zu den traditionellen Ländern unserer Vorfahren haben.\n\n\n\n\n\n\n\n\n\n@persia_mil20!>  #NT!
 parthia_missions_44.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_44.tt2: "We will get further claims in the #T Steppe#!."  #<Wir werden weitere Ansprüche in der #T Steppe#!. bekommen>  #NT!
  
 parthia_missions_45: "Conquer The Steppe"  #<Erobere die Steppe>  #NT!
 parthia_missions_45_DESC: "Now that we have conquered the civilized powers that threatened our hegemony, [ROOT.GetCountry.GetRuler.GetName|Y] has decided that it is time to invade the #T Steppe#! and subdue it for the [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Nachdem wir nun die zivilisierten Mächte besiegt haben, die unsere Hegemonie bedrohten, hat [ROOT.GetCountry.GetRuler.GetName|Y] beschlossen, dass es an der Zeit ist, in die #T Steppe#! einzudringen und sie für die [ROOT.GetCountry.GetName|G] zu unterwerfen.\n\n\n\n\n\n\n\n\n\n@persia_mil12!>  #NT!
 parthia_missions_45.tt1: "We own at least #T 75%#! of the highlighted region."  #<Wir besitzen mindestens #T 75 %#! der hervorgehobenen Region.>  #NT!
 parthia_missions_45.tt2: "We will get claims for the #T Tarim Basin#! region."  #<Wir erhalten Ansprüche für die Region #T Tarim-Becken#!.>  #NT!
  
 parthia_missions_46: "Tarim Basin"  #<Tarim-Becken>  #NT!
 parthia_missions_46_DESC: "The oases and cities scattered throughout the #T Tarim Basin#! are important nodes for controlling trade with the far East, and the [ROOT.GetCountry.GetName|G] would do well for itself by ruling over this important territory directly.\n\n\n\n\n\n\n\n\n\n@egypt_mil26!"  #<Die über das #T Tarim-Becken#! verstreuten Oasen und Städte sind wichtige Knotenpunkte für die Kontrolle des Handels mit dem Fernen Osten, und die [ROOT.GetCountry.GetName|G] würden davon profitieren, wenn sie direkt über dieses wichtige Gebiet herrschen würden.\n\n\n\n\n\n\n\n\n\n@egypt_mil26!>  #NT!
 parthia_missions_46.tt1: "We completely own the #T Tarim Basin#! region."  #<Die Region #T Tarim-Becken#! gehört uns vollständig.>  #NT!
 parthia_missions_46.tt2: "We will get a choice to release #G Tocharia#! as a #G March#!, with an accompanying country modifier for securing our trade links to #T China#!."  #<Wir werden die Möglichkeit haben, #G Tocharia#! als #G March#! zu veröffentlichen, mit einem begleitenden Ländermodifikator zur Sicherung unserer Handelsverbindungen zu #T China#!.>  #NT!
  
 parthia_missions_47: "Empty task, TODO?"  #<Leere Aufgabe, TODO?>  #NT!
 parthia_missions_47_DESC: ""
  
 parthia_missions_48: "Great Houses"  #<Tolle Häuser>  #NT!
 parthia_missions_48_DESC: "Some of our leading noble families come from foreign tribes and clans, and while their forefathers might be buried in distant lands unknown to our Elders, these strangers have united alongside our kinsmen in hopes of a better future for themselves. [ROOT.GetCountry.GetRuler.GetName|Y] has proclaimed that we are one people now, the #G Parthians#! - we must set aside our petty differences and unite for the greater good.\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Einige unserer führenden Adelsfamilien stammen aus fremden Stämmen und Clans, und während ihre Vorfahren möglicherweise in fernen Ländern begraben sind, die unseren Ältesten unbekannt sind, haben sich diese Fremden mit unseren Verwandten zusammengeschlossen, in der Hoffnung auf eine bessere Zukunft für sich. [ROOT.GetCountry.GetRuler.GetName|Y] hat verkündet, dass wir jetzt ein Volk sind, die #G Parther#! – wir müssen unsere kleinen Differenzen beiseite legen und uns für das größere Wohl vereinen.\n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!
 parthia_missions_48.tt: "Members of our #T Great Families#! shall change culture to [GetCulture('parthian').GetName|G], and the families will change their names to better reflect this."  #<Mitglieder unserer #T Great Families#! werden ihre Kultur in [GetCulture('parthian').GetName|G] ändern, und die Familien werden ihre Namen ändern, um dies besser widerzuspiegeln.>  #NT!
  
 parthia_missions_49: "Administrative Language"  #<Verwaltungssprache>  #NT!
 parthia_missions_49_DESC: "Our homelands lie at the crossroads of cultures, where half a dozen tongues are spoken by traders and merchants from the four corners of the Earth. In order to streamline the administration of our realm, [ROOT.GetCountry.GetRuler.GetName|Y] has instructed [ROOT.GetCountry.GetRuler.GetHerHis] [GetOffice('office_steward').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T] to overhaul our administrative system and choose an official language.\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Unsere Heimatländer liegen am Schnittpunkt der Kulturen, wo ein halbes Dutzend Sprachen von Händlern und Kaufleuten aus allen Teilen der Erde gesprochen werden. Um die Verwaltung unseres Reiches zu rationalisieren, hat [ROOT.GetCountry.GetRuler.GetName|Y] [ROOT.GetCountry.GetRuler.GetHerHis] [GetOffice('office_steward').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T] angewiesen, unser Verwaltungssystem zu überarbeiten und eine offizielle Sprache zu wählen.\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
 parthia_missions_49.tt1: "Our #E [GetOffice('office_steward').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T]#! has a statesmanship-adjusted @civic_icon! #G Finesse skill of #E 8#!#! or more (Currently: #Y [SCOPE.ScriptValue('parthia_steward_effective_skill')|0]#!)."  #<Unser #E [GetOffice('office_steward').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T]#! hat ein staatsmännisch angepasstes @civic_icon! #G Finesse-Fertigkeit von #E 8#!#! oder mehr (Derzeit: #Y [SCOPE.ScriptValue('parthia_steward_effective_skill')|0]#!).>  #NT!
 parthia_missions_49.tt2: "We will get to choose administrative language of our realm - with accompanying country modifier."  #<Wir können die Verwaltungssprache unseres Reiches auswählen – mit zugehörigem Ländermodifikator.>  #NT!
  
 parthia_missions_50: "Convene Magastan"  #<Magastan einberufen>  #NT!
 parthia_missions_50_DESC: "Now that a rare period of peace has settled over [ROOT.GetCountry.GetName|G], [ROOT.GetCountry.GetRuler.GetName|Y] has agreed to finally do something that [ROOT.GetCountry.GetRuler.GetSheHe] has been postponing for quite some time; convening the #T Magastan#! and listening to petitions from some of the leading citizens of [ROOT.GetCountry.GetCapital.GetName|T].\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Nachdem nun über [ROOT.GetCountry.GetName|G] eine seltene Zeit des Friedens eingekehrt ist, hat [ROOT.GetCountry.GetRuler.GetName|Y] zugestimmt, endlich etwas zu tun, was [ROOT.GetCountry.GetRuler.GetSheHe] schon seit geraumer Zeit aufgeschoben hat; Einberufung des #T Magastan#! und Anhörung der Petitionen einiger der führenden Bürger von [ROOT.GetCountry.GetCapital.GetName|T].\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
 parthia_missions_50.tt: "We will get events to deal with our court and listen to their grievances."  #<Wir werden die Parteien dazu bringen, sich mit unserem Gericht auseinanderzusetzen und uns ihre Beschwerden anzuhören.>  #NT!
  
 parthia_missions_51: "Office Of Spahbed"  #<Büro von Spahbed>  #NT!
 parthia_missions_51_DESC: "There are many prestigious roles within the [ROOT.GetCountry.GetAdjective] bureaucracy, but few carry the prestige that the [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y] has. To receive this title as a hereditary favor is the ultimate sign of the [ROOT.GetCountry.GetRulerTitle]'s pleasure, and many of the #T Great Families#! living in [ROOT.GetCountry.GetCapital.GetName|T] are vying for this honor.\n\n\n\n\n\n\n\n\n\n@celt_mil18!"  #<Es gibt viele prestigeträchtige Rollen innerhalb der [ROOT.GetCountry.GetAdjective]-Bürokratie, aber nur wenige genießen das Prestige, das die [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y] hat. Diesen Titel als erbliche Gunst zu erhalten, ist das ultimative Zeichen der Freude der [ROOT.GetCountry.GetRulerTitle], und viele der #T Großen Familien#!, die in [ROOT.GetCountry.GetCapital.GetName|T] leben, wetteifern um diese Ehre.\n\n\n\n\n\n\n\n\n\n@celt_mil18!>  #NT!
 parthia_missions_51.tt1: "Our #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y]#! has a statesmanship-adjusted @military_icon! #R Martial skill of #E 8#!#! or more (Currently: #Y [SCOPE.ScriptValue('parthia_spahbed_effective_skill')|0]#!)"  #<Unser #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y]#! hat ein staatsmännisch angepasstes @military_icon! #R Kampffähigkeit von #E 8#!#! oder mehr (Derzeit: #Y [SCOPE.ScriptValue('parthia_spahbed_effective_skill')|0]#!)>  #NT!
 parthia_missions_51.tt2: "We will get a choice to assign office of #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y]#! as hereditary to one #T Great Family#!.\nThis will make their family members gain 5 @military_icon! #R Martial skill#! when holding this office, but make everyone else lose 5 Martial skill in this post.\nAppointing anyone else to this position will also greatly damage the loyalty of other members of this family."  #<Wir haben die Möglichkeit, das Amt von #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)|Y]#! erblich einer #T Großen Familie#! zuzuweisen.\nDadurch erhalten ihre Familienmitglieder 5 @military_icon! #R Kampffähigkeit#!, wenn Sie dieses Amt innehaben, aber dafür sorgen, dass alle anderen in diesem Amt 5 Kampffähigkeiten verlieren.\nDie Ernennung einer anderen Person zu dieser Position wird auch die Loyalität anderer Mitglieder dieser Familie stark schädigen.>  #NT!
  
 parthia_missions_52: "Camels For Supply Trains"  #<Kamele für Versorgungszüge>  #NT!
 parthia_missions_52_DESC: "Known as the sturdy 'ship of the desert', the camel @camels! has quickly become an integral part of the overland caravans that snake their way through the mountainous regions leading in and out of [ROOT.GetCountry.GetCapital.GetName|T]. Because we have come to rely on these beasts for our trade, there are calls for [ROOT.GetCountry.GetRuler.GetName|Y] to do what [ROOT.GetCountry.GetRuler.GetSheHe] can to raise more animals.\n\n\n\n\n\n\n\n\n\n@egypt_mil8!"  #<Bekannt als das robuste „Schiff der Wüste“, das Kamel @camels! ist schnell zu einem festen Bestandteil der Überlandkarawanen geworden, die sich durch die Bergregionen schlängeln, die in [ROOT.GetCountry.GetCapital.GetName|T] hinein und wieder heraus führen. Da wir uns bei unserem Handel auf diese Tiere verlassen, gibt es Aufrufe an [ROOT.GetCountry.GetRuler.GetName|Y], alles zu tun, was [ROOT.GetCountry.GetRuler.GetSheHe] kann, um mehr Tiere zu züchten.\n\n\n\n\n\n\n\n\n\n@egypt_mil8!>  #NT!
 parthia_missions_52.tt: "We produce at least #T 15 Camels#! @camels! in our or our #G Marches#! territories. Only the second or later #T Camel#! trade good produced in a territory will count (Currently: [SCOPE.ScriptValue('parthia_camel_production')|0|Y])."  #<Wir produzieren mindestens #T 15 Kamele#! @Kamele! in unseren oder unseren #G Marken#! Gebieten. Nur das zweite oder spätere #T Kamel#! Handelsgut, das in einem Gebiet produziert wird, zählt (derzeit: [SCOPE.ScriptValue('parthia_camel_production')|0|Y]).>  #NT!
  
 parthia_missions_53: "Nisean Horses"  #<Nisäische Pferde>  #NT!
 parthia_missions_53_DESC: "Many of our victories in war can be chalked up to our superior cavalry - the mere sight of #G Parthian#! #Y Horse Archers#!@horse_archers! arriving on the battlefield has been known to scatter opposing forces before combat even starts, for many of our enemies struggle to defend against our steppe tactics. In order to secure our supremacy for ages to come, [ROOT.GetCountry.GetRuler.GetName|Y] has called for our farmers to raise as many stallions @horses! as possible.\n\n\n\n\n\n\n\n\n\n@india_mil18!"  #<Viele unserer Siege im Krieg können unserer überlegenen Kavallerie zugeschrieben werden – der bloße Anblick von #G Parthern#! #Y berittenen Bogenschützen#!@horse_archers! Es ist bekannt, dass die Ankunft auf dem Schlachtfeld die gegnerischen Streitkräfte zerstreut, bevor der Kampf überhaupt beginnt, da viele unserer Feinde Schwierigkeiten haben, sich gegen unsere Steppentaktiken zu verteidigen. Um unsere Vormachtstellung für die Zukunft zu sichern, hat [ROOT.GetCountry.GetRuler.GetName|Y] unsere Landwirte dazu aufgerufen, möglichst viele Hengste @horses aufzuziehen! wie möglich.\n\n\n\n\n\n\n\n\n\n@india_mil18!>  #NT!
 parthia_missions_53.tt1: "We produce at least #T 15#! Horses @horses! in our or our #G Marches#! territories. Only the second or later #T Horse#! trade good produced in a territory will count (Currently: #Y [SCOPE.ScriptValue('parthia_horse_production')|0]#!)."  #<Wir produzieren mindestens #T 15#! Pferde @horses! in unseren oder unseren #G Marken#! Gebieten. Nur das zweite oder spätere #T Pferd#! Handelsgut, das in einem Gebiet produziert wird, zählt (derzeit: #Y [SCOPE.ScriptValue('parthia_horse_production')|0]#!).>  #NT!
 parthia_missions_53.tt2: "Any Head of Family, aside from our Ruler, has at least #T 6#! Horse-producing territories as #T Holdings#!."  #<Jedes Familienoberhaupt außer unserem Herrscher verfügt über mindestens #T 6#! Pferde produzierende Gebiete als #T Besitztümer#!.>  #NT!
 parthia_missions_53.tt3: "We will be able to choose between @horse_archers! #Y Horse Archers#!, @heavy_cavalry! #Y Heavy Cavalry#! or a @light_cavalry! #Y Light Cavalry#! unit combat modifier."  #<Wir können zwischen @horse_archers wählen! #Y Berittene Bogenschützen#!, @heavy_cavalry! #Y schwere Kavallerie#! oder eine @leichte Kavallerie! #Y Leichte Kavallerie#! Kampfmodifikator für Einheiten.>  #NT!
  
 parthia_missions_54: "Conduct Census"  #<Führen Sie eine Volkszählung durch>  #NT!
 parthia_missions_54_DESC: "The wars of [ROOT.GetCountry.GetRuler.GetName|Y] have brought many people into our realm, and the triumphant [ROOT.GetCountry.GetRulerTitle] has called for a #T Census#! to be conducted throughout [ROOT.GetCountry.GetName|G] in hopes of tallying an accurate number.\n\n\n\n\n\n\n\n\n\n@event_pic13!"  #<Die Kriege von [ROOT.GetCountry.GetRuler.GetName|Y] haben viele Menschen in unser Reich gebracht, und der siegreiche [ROOT.GetCountry.GetRulerTitle] hat eine #T Volkszählung#! gefordert, die im Laufe von [ROOT.GetCountry.GetName|G] durchgeführt werden soll, in der Hoffnung, eine genaue Zahl zu ermitteln.\n\n\n\n\n\n\n\n\n\n@event_pic13!>  #NT!
 parthia_missions_54.tt: "We will find #T 80 Slave#! @slaves! pops across our land of local cultures and customs."  #<Wir werden #T 80 Slave#! @slaves finden! taucht in unserem Land voller lokaler Kulturen und Bräuche auf.>  #NT!
  
 parthia_missions_55: "Documentation System"  #<Dokumentationssystem>  #NT!
 parthia_missions_55_DESC: "In an effort to increase the erudition of the cities of [ROOT.GetCountry.GetName|G], [ROOT.GetCountry.GetRuler.GetName|Y] has instituted a new #T Documentation System#! that promises to overhaul our current methods of research.\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Um die Gelehrsamkeit der Städte von [ROOT.GetCountry.GetName|G] zu erhöhen, hat [ROOT.GetCountry.GetRuler.GetName|Y] ein neues #T Dokumentationssystem#! eingeführt, das verspricht, unsere aktuellen Forschungsmethoden zu überarbeiten.\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
 # parthia_missions_55.tt: ""
  
 parthia_missions_56: "Qanats"  #<Qanats>  #NT!
 parthia_missions_56_DESC: "The clever #G Iranian#! architects living in the desert have learned how to construct impressive aqueducts known as #T 'Qanats'#!, and [ROOT.GetCountry.GetRuler.GetName|Y] has ordered that this technology be utilized throughout the arid regions of [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n\n@event_pic7!"  #<Die cleveren #G iranischen#! Architekten, die in der Wüste leben, haben gelernt, wie man beeindruckende Aquädukte baut, die als #T „Qanats“#! bekannt sind, und [ROOT.GetCountry.GetRuler.GetName|Y] hat angeordnet, dass diese Technologie in den trockenen Regionen von [ROOT.GetCountry.GetName|G] eingesetzt wird.\n\n\n\n\n\n\n\n\n\n\n@event_pic7!>  #NT!
 parthia_missions_56.tt: "Our current and future cities in #T Desert Terrain#! will receive a modifier that almost completely negates the desert terrain's penalty to #T Population Capacity#!."  #<Unsere aktuellen und zukünftigen Städte in #T Wüstengelände#! erhalten einen Modifikator, der den Nachteil des Wüstengeländes auf #T Bevölkerungskapazität#! fast vollständig aufhebt.>  #NT!
  
 parthia_missions_57: "High Literacy"  #<Hohe Alphabetisierung>  #NT!
 parthia_missions_57_DESC: "The mark of a civilized society is a high literacy rate, and [ROOT.GetCountry.GetRuler.GetName|Y] has encouraged the noble classes to master the important skills of reading and writing.\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Das Kennzeichen einer zivilisierten Gesellschaft ist eine hohe Alphabetisierungsrate, und [ROOT.GetCountry.GetRuler.GetName|Y] hat die Adelsschicht dazu ermutigt, die wichtigen Fähigkeiten des Lesens und Schreibens zu erlernen.\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
  
 parthia_missions_58: "Water Ariana"  #<Wasser Ariana>  #NT!
 parthia_missions_58_DESC: "While some people perceive the arid region of [GetProvince('(int32)6561').GetArea.GetRegion.GetName|T] as being unsuitable for human habitation, [ROOT.GetCountry.GetRuler.GetName|Y] is prepared to pour the resources of [ROOT.GetCountry.GetName|G] into transforming the dusty foothills into a productive province.\n\n\n\n\n\n\n\n\n\n@egypt_mil4!"  #<Während einige Menschen die trockene Region von [GetProvince('(int32)6561').GetArea.GetRegion.GetName|T] als ungeeignet für menschliche Besiedlung betrachten, ist [ROOT.GetCountry.GetRuler.GetName|Y] bereit, die Ressourcen von [ROOT.GetCountry.GetName|G] in die Umwandlung der staubigen Ausläufer in eine produktive Provinz zu stecken.\n\n\n\n\n\n\n\n\n\n@egypt_mil4!>  #NT!
 parthia_missions_58.tt1: "All territories in [GetProvince('(int32)6561').GetArea.GetName|T], [GetProvince('(int32)6605').GetArea.GetName|T] and [GetProvince('(int32)6560').GetArea.GetName|T] areas have a [GetBuilding('basic_settlement_infratructure_building').GetName|G]."  #<Alle Gebiete in den Gebieten [GetProvince('(int32)6561').GetArea.GetName|T], [GetProvince('(int32)6605').GetArea.GetName|T] und [GetProvince('(int32)6560').GetArea.GetName|T] haben ein [GetBuilding('basic_settlement_infratructure_building').GetName|G].>  #NT!
 parthia_missions_58.tt2: "Any province in the above areas is a #T City#! with at least #T 3#! #E #G [GetBuilding('aqueduct_building').GetName]s#!#!."  #<Jede Provinz in den oben genannten Gebieten ist eine #T Stadt#! mit mindestens #T 3#! #E #G [GetBuilding('aqueduct_building').GetName]s#!#!.>  #NT!
 parthia_missions_58.tt3: "All our territories in [GetProvince('(int32)6561').GetArea.GetName|T], [GetProvince('(int32)6605').GetArea.GetName|T] and [GetProvince('(int32)6560').GetArea.GetName|T] areas will get the modifier [GetModifier('pth_fertile_sakastan_pmod').GetName|Y], which will grant [GetModifier('pth_fertile_sakastan_pmod').GetDesc]."  #<Alle unsere Gebiete in den Gebieten [GetProvince('(int32)6561').GetArea.GetName|T], [GetProvince('(int32)6605').GetArea.GetName|T] und [GetProvince('(int32)6560').GetArea.GetName|T] erhalten den Modifikator [GetModifier('pth_fertile_sakastan_pmod').GetName|Y], der [GetModifier('pth_fertile_sakastan_pmod').GetDesc] gewährt.>  #NT!
  
 parthia_missions_59: "Royal Capitals"  #<Königliche Hauptstädte>  #NT!
 parthia_missions_59_DESC: "A realm that is as powerful and prestigious as ours needs multiple capital cities to service the needs of our growing bureaucracy. We require a seat of power for the #Y House of [ROOT.GetCountry.GetRuler.GetFamily.GetName]#! to reign from, a capital that will service our religious @religious_icon! and ceremonial needs, and one that will be responsible for holding the #T Royal Treasury#!.\n\n\n\n\n\n\n\n\n\n@persia_mil7!"  #<Ein so mächtiges und prestigeträchtiges Reich wie unseres braucht mehrere Hauptstädte, um den Bedürfnissen unserer wachsenden Bürokratie gerecht zu werden. Wir brauchen einen Machtsitz, von dem aus das Haus #Y von [ROOT.GetCountry.GetRuler.GetFamily.GetName]#! regieren kann, eine Hauptstadt, die unserer religiösen @religious_icon dient! und zeremoniellen Bedürfnissen, und einer, der für die Verwaltung der #T Königlichen Schatzkammer#! verantwortlich sein wird.\n\n\n\n\n\n\n\n\n\n@persia_mil7!>  #NT!
 parthia_missions_59.tt1: "3 owned territories in 3 different regions have 3 [GetBuilding('academy_building').GetName|T] buildings, above #T 8 Nobles#! @nobles! and above #T 50 Population#!."  #<3 eigene Territorien in 3 verschiedenen Regionen haben 3 [GetBuilding('academy_building').GetName|T] Gebäude, darüber #T 8 Adlige#! @nobles! und mehr #T 50 Bevölkerung#!.>  #NT!
 parthia_missions_59.tt2: "We will get to choose a place for our capital, our ceremonial capital and our treasury capital, each with accompanying territory modifiers."  #<None>  #NT!
  
 parthia_missions_60: "Symbol Of Power"  #<Symbol der Macht>  #NT!
 parthia_missions_60_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] currently enjoys most of the trappings of royal power - unquestioned command over a powerful army, absolute control over the [ROOT.GetCountry.GetAdjective] treasuries, and the respect and love of the common people - but the [ROOT.GetCountry.GetRulerTitle] desires to have a tangible sign of [ROOT.GetCountry.GetRuler.GetHerHis] authority, and has called for our artisans to craft a masterwork for the #Y House of [ROOT.GetCountry.GetRuler.GetFamily.GetName]#!.\n\n\n\n\n\n\n\n\n\n@egypt_mil16!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] genießt derzeit die meisten Insignien königlicher Macht – unbestrittenes Kommando über eine mächtige Armee, absolute Kontrolle über die [ROOT.GetCountry.GetAdjective]-Schatzkammern und den Respekt und die Liebe des einfachen Volkes – aber [ROOT.GetCountry.GetRulerTitle] möchte ein greifbares Zeichen der [ROOT.GetCountry.GetRuler.GetHerHis]-Autorität haben und hat unsere Handwerker dazu aufgerufen, ein Meisterwerk für das #Y-Haus von [ROOT.GetCountry.GetRuler.GetFamily.GetName]#!.\n\n\n\n\n\n\n\n\n\n@egypt_mil16! anzufertigen>  #NT!
 parthia_missions_60.tt: "We will craft a powerful #T Treasure#!, choosing between different insignias for our Ruler."  #<Wir werden einen mächtigen #T-Schatz#!, herstellen, indem wir zwischen verschiedenen Insignien für unseren Herrscher wählen.>  #NT!
  
 parthia_missions_61: "Imperial Headquarters"  #<Kaiserliches Hauptquartier>  #NT!
 parthia_missions_61_DESC: "As the power and prestige of [ROOT.GetCountry.GetName|G] grows precipitously under the dynamic leadership of the #E #Y [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#!#!, there are calls to establish [ROOT.GetCountry.GetCapital.GetName|T], the jewel of our domain, as the official #T Imperial Headquarters#!.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<Während die Macht und das Prestige von [ROOT.GetCountry.GetName|G] unter der dynamischen Führung der #E #Y [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#!#!, steil wachsen, gibt es Rufe, [ROOT.GetCountry.GetCapital.GetName|T], das Juwel unserer Domäne, als offizielles #T kaiserliches Hauptquartier#!.\n\n\n\n\n\n\n\n\n\n\n@event_pic11! zu etablieren>  #NT!
  
 parthia_missions_62: "Full Coffers"  #<Volle Kassen>  #NT!
 parthia_missions_62_DESC: "Thanks to the full treasuries, [ROOT.GetCountry.GetRuler.GetName|Y] is able to fund large-scale infrastructure projects throughout [ROOT.GetCountry.GetName|G] without worrying about running out of money.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Dank der vollen Kassen ist [ROOT.GetCountry.GetRuler.GetName|Y] in der Lage, große Infrastrukturprojekte im gesamten Jahr [ROOT.GetCountry.GetName|G] zu finanzieren, ohne befürchten zu müssen, dass ihnen das Geld ausgeht.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
  
 parthia_missions_63: "Connect Roads"  #<Straßen verbinden>  #NT!
 parthia_missions_63_DESC: "The #T Royal Road#! of the #G Achaemenids#! that extends from the #Y Mediterranean#! reaches its end in territories that we control, and the ambitious [ROOT.GetCountry.GetRuler.GetName|Y], ever desirous of leaving a permanent legacy behind for the people of [ROOT.GetCountry.GetName|G], has yearned to build a highway that connects this ancient road system to those found in #COLOR:{0.83,0.53,0.3} India#!.\n\n\n\n\n\n\n\n\n\n@italic_mil27!"  #<Die #T Königsstraße#! der #G Achämeniden#!, die sich vom #Y Mittelmeer#! erstreckt, endet in den von uns kontrollierten Gebieten, und die ehrgeizigen [ROOT.GetCountry.GetRuler.GetName|Y], stets bestrebt, den Menschen von [ROOT.GetCountry.GetName|G] ein dauerhaftes Erbe zu hinterlassen, haben sich danach gesehnt, eine Autobahn zu bauen, die dieses alte Straßensystem mit denen in #COLOR:{0.83,0.53,0.3} verbindet Indien#!.\n\n\n\n\n\n\n\n\n\n@italic_mil27!>  #NT!
 parthia_missions_63.tt: "We will build a road in highlighted territories, connecting the #T Mediterranean#! highways to the road networks in #COLOR:{0.83,0.53,0.3} India#!."  #<Wir werden in hervorgehobenen Gebieten eine Straße bauen, die die Autobahnen #T Mittelmeer#! mit den Straßennetzen in #COLOR:{0.83,0.53,0.3} Indien#! verbindet.>  #NT!
  
 parthia_missions_64: "Merchant Freedoms"  #<Handelsfreiheiten>  #NT!
 parthia_missions_64_DESC: "While some rulers simply tolerate the presence of traveling merchants within their borders, [ROOT.GetCountry.GetRuler.GetName|Y] has embraced them, giving them certain freedoms within #G Parthian#! society.\n\n\n\n\n\n\n\n\n\n@italic_mil9!"  #<Während einige Herrscher die Anwesenheit reisender Kaufleute innerhalb ihrer Grenzen einfach tolerieren, hat [ROOT.GetCountry.GetRuler.GetName|Y] sie angenommen und ihnen bestimmte Freiheiten innerhalb der #G parthischen#! Gesellschaft gewährt.\n\n\n\n\n\n\n\n\n\n@italic_mil9!>  #NT!
 parthia_missions_64.tt1: "Any city, aside from our capital, needs to have #T 3#! [GetBuilding('commerce_building').GetName|G] buildings."  #<Jede Stadt außer unserer Hauptstadt benötigt #T 3#! [GetBuilding('commerce_building').GetName|G] Gebäude.>  #NT!
 parthia_missions_64.tt2: "We will be able to found a #T League City#! subject without the required invention."  #<Wir werden in der Lage sein, ein #T League City#! Subjekt ohne die erforderliche Erfindung zu gründen.>  #NT!
  
 parthia_missions_65: "Parthian Bazaars"  #<Parthische Basare>  #NT!
 parthia_missions_65_DESC: "Our markets are famous sources of cloth @cloth! and other fine textiles, with merchants coming from far and wide to our bazaars in order to procure our luxurious fabrics.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!"  #<Unsere Märkte sind berühmte Stofflieferanten @cloth! und andere feine Textilien, wobei Händler von nah und fern zu unseren Basaren kommen, um unsere luxuriösen Stoffe zu beschaffen.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!>  #NT!
 parthia_missions_65.tt: "At least #T 4 Cities#! have #T 3#! [GetBuilding('commerce_building').GetName|G] buildings (Currently: [SCOPE.ScriptValue('parthia_mission_65_buildings')|0|Y])."  #<Mindestens #T 4 Städte#! haben #T 3#! [GetBuilding('commerce_building').GetName|G] Gebäude (Aktuell: [SCOPE.ScriptValue('parthia_mission_65_buildings')|0|Y]).>  #NT!
  
 parthia_missions_66: "Develop Countryside"  #<Landschaft entwickeln>  #NT!
 parthia_missions_66_DESC: "Although [ROOT.GetCountry.GetRuler.GetName|Y] has spent lavishly in the cities and temples of [ROOT.GetCountry.GetName|G], [ROOT.GetCountry.GetRuler.GetSheHe] has not neglected the countryside, but has wisely invested in the its farmlands.\n\n\n\n\n\n\n\n\n\n\n@event_pic7!"  #<Obwohl [ROOT.GetCountry.GetRuler.GetName|Y] viel Geld in den Städten und Tempeln von [ROOT.GetCountry.GetName|G] ausgegeben hat, hat [ROOT.GetCountry.GetRuler.GetSheHe] das Land nicht vernachlässigt, sondern klugerweise in dessen Ackerland investiert.\n\n\n\n\n\n\n\n\n\n\n@event_pic7!>  #NT!
 parthia_missions_66.tt: "We (including our #G Marches#!) have #T 25#! [GetBuilding('basic_settlement_infratructure_building').GetName|G] buildings (Currently: [SCOPE.ScriptValue('parthia_mission_66_buildings')|0|Y])."  #<Wir (einschließlich unserer #G Märsche#!) haben #T 25#! [GetBuilding('basic_settlement_infratructure_building').GetName|G] Gebäude (Derzeit: [SCOPE.ScriptValue('parthia_mission_66_buildings')|0|Y]).>  #NT!
  
 parthia_missions_67: "Colorful Fabrics"  #<Bunte Stoffe>  #NT!
 parthia_missions_67_DESC: "The dyes @dye! that we produce within [ROOT.GetCountry.GetName|G] is a valuable source of income for our people, and yet there is even more that we can do to increase its production. We must put our slaves to work!\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Die Farbstoffe @dye! Das, was wir innerhalb von [ROOT.GetCountry.GetName|G] produzieren, ist eine wertvolle Einnahmequelle für unsere Leute, und dennoch können wir noch mehr tun, um die Produktion zu steigern. Wir müssen unsere Sklaven arbeiten lassen!\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
 parthia_missions_67.tt1: "We produce at least #T 8 Dyes#!@dye! (Currently: [SCOPE.ScriptValue('parthia_dye_production')|0|Y])."  #<Wir produzieren mindestens #T 8 Farbstoffe#!@dye! (Derzeit: [SCOPE.ScriptValue('parthia_dye_production')|0|Y]).>  #NT!
 parthia_missions_67.tt2: "Every #T Dye#! producing city will get a modifier [GetModifier('pth_rug_producer').GetName|Y] which will grant [GetModifier('pth_rug_producer').GetDesc] for #T 20 Years#!."  #<Jede #T Farbstoff#! produzierende Stadt erhält einen Modifikator [GetModifier('pth_rug_producer').GetName|Y], der [GetModifier('pth_rug_producer').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
  
 parthia_missions_68: "Expand Rug Production"  #<Erweitern Sie die Teppichproduktion>  #NT!
 parthia_missions_68_DESC: "One of the most valuable items that we export abroad is the #T Carpet#! @leather!, and the entrepreneurial [ROOT.GetCountry.GetRuler.GetName|Y] is interested in expanding our production of this highly-desired tradegood.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Einer der wertvollsten Artikel, die wir ins Ausland exportieren, ist der #T Teppich#! @leder!, und der Unternehmer [ROOT.GetCountry.GetRuler.GetName|Y] ist daran interessiert, unsere Produktion dieses begehrten Handelsguts zu erweitern.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
 parthia_missions_68.tt1: "We (including our #G Marches#!) have at least #T 10 Cities#! #R not producing#! @dye! #Y Dye#!, @cloth! #Y Cloth#! or @silk! #Y Silk#!, with at least #T 1#! [GetBuilding('commerce_building').GetName|G] building (Currently: [SCOPE.ScriptValue('parthia_cities_68')|0|Y])."  #<Wir (einschließlich unserer #G Märsche#!) haben mindestens #T 10 Städte#! #R produzieren nicht#! @dye! #Y Dye#!, @cloth! #Y Cloth#! oder @silk! #Y Silk#!, mit mindestens #T 1#! #!)4 Gebäude (Aktuell: #!)5).>  #NT!
 parthia_missions_68.tt2: "Any eligible city will have #T 50%#! chance of changing its produced trade good to @cloth! #Y Cloth#!, #T 25%#! to @dye! #Y Dye#! and a #T 25%#! chance to retain its current good."  #<Jede teilnahmeberechtigte Stadt hat eine Chance von #T 50 %#!, ihre produzierte Handelsware in @Stoff umzuwandeln! #Y Stoff#!, #T 25 %#! zu @färben! #Y Farbstoff#! und eine Chance von #T 25 %#!, seinen aktuellen Wert beizubehalten.>  #NT!
  
 parthia_missions_69: "Go Along The Silk Road"  #<Gehen Sie die Seidenstraße entlang>  #NT!
 parthia_missions_69_DESC: "Merchants arriving in [ROOT.GetCountry.GetCapital.GetName|T] have told [ROOT.GetCountry.GetRuler.GetName|Y] about a powerful kingdom that lies far to the east, at the very edge of the known world, and the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] desires to see this exotic realm for [ROOT.GetCountry.GetRuler.GetHerHim]self.\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<In [ROOT.GetCountry.GetCapital.GetName|T] ankommende Händler haben [ROOT.GetCountry.GetRuler.GetName|Y] von einem mächtigen Königreich erzählt, das weit im Osten liegt, am äußersten Rand der bekannten Welt, und die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] möchten dieses exotische Reich selbst sehen.\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
 parthia_missions_69.tt: "#Y This will start an event chain#!."  #<#Y Dies startet eine Ereigniskette#!.>  #NT!
  
 parthia_missions_70: ""
 parthia_missions_70_DESC: ""
  
 parthia_missions_71: "Iranian Silks"  #<Iranische Seide>  #NT!
 parthia_missions_71_DESC: "Perhaps the rarest of all textiles is silk @silk!, and a garment made from this gossamer fabric can fetch an eye-watering price in the markets and bazaars of the [ROOT.GetCountry.GetName|G]. Although the best silk is made far to our east, [ROOT.GetCountry.GetRuler.GetName|Y] has taken steps to increase the production of silk within our borders.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!"  #<Das vielleicht seltenste aller Textilien ist Seide @silk!, und ein Kleidungsstück aus diesem hauchdünnen Stoff kann auf den Märkten und Basaren der [ROOT.GetCountry.GetName|G] einen atemberaubenden Preis erzielen. Obwohl die beste Seide weit im Osten hergestellt wird, hat [ROOT.GetCountry.GetRuler.GetName|Y] Schritte unternommen, um die Seidenproduktion innerhalb unserer Grenzen zu steigern.\n\n\n\n\n\n\n\n\n\n\n@event_pic1!>  #NT!
 parthia_missions_71.tt1: "We produce at least #T 7#! @silk! #E Silk#! (Currently: [SCOPE.ScriptValue('parthia_silk_production')|0|Y])."  #<Wir produzieren mindestens #T 7#! @silk! #E Seide#! (Aktuell: [SCOPE.ScriptValue('parthia_silk_production')|0|Y]).>  #NT!
 parthia_missions_71.tt2: "Every #T Silk#! @silk! producing city will get a modifier [GetModifier('pth_rug_producer').GetName|Y] which will grant [GetModifier('pth_rug_producer').GetDesc] for #T 20 Years#!."  #<Alle #T Silk#! @silk! Die produzierende Stadt erhält einen Modifikator [GetModifier('pth_rug_producer').GetName|Y], der [GetModifier('pth_rug_producer').GetDesc] für #T 20 Jahre#! gewährt.>  #NT!
  
 parthia_missions_72: "Persian Rugs And Clothes"  #<Persische Teppiche und Kleidung>  #NT!
 parthia_missions_72_DESC: "While there are many tradegoods produced within [ROOT.GetCountry.GetName|G] that are world-renowned, there is an absolute mania for the #G Persian#! clothing that we make - we can hardly keep up with the demand.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Während innerhalb von [ROOT.GetCountry.GetName|G] viele Handelswaren hergestellt werden, die weltberühmt sind, herrscht eine absolute Begeisterung für die von uns hergestellte #G persische#! Kleidung – wir können mit der Nachfrage kaum Schritt halten.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
 parthia_missions_72.tt1: "We (including our #G Marches#!) produce at least #T 30#! @dye! #Y Dye#!, @cloth! #Y Cloth#! or @silk! #Y Silk#! surplus trade goods (Currently: [SCOPE.ScriptValue('parthia_rug_production')|0|Y])"  #<Wir (einschließlich unserer #G Märsche#!) produzieren mindestens #T 30#! @dye! #Y Dye#!, @cloth! #Y Cloth#! oder @silk! #Y Silk#! überschüssige Handelswaren (Aktuell: #!)0)>  #NT!
 parthia_missions_72.tt2: "All cities which produce #Y Dye#!, @cloth! #Y Cloth#! or @silk! #Y Silk#! will get a modifier [GetModifier('pth_rug_overflow').GetName|Y] which will grant:\n[GetModifier('pth_rug_overflow').GetDesc] for #T 40 Years#!."  #<Alle Städte, die #Y Farbstoff#!, @Stoff produzieren! #Y Stoff#! oder @Seide! #Y Seide#! erhält einen Modifikator [GetModifier('pth_rug_overflow').GetName|Y], der Folgendes gewährt:\n[GetModifier('pth_rug_overflow').GetDesc] für #T 40 Jahre#!.>  #NT!
  
 parthia_missions_73: "Sponsor Minstrels"  #<Sponsern Sie Minnesänger>  #NT!
 parthia_missions_73_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] has decreed that the royal treasuries will now sponsor artists, singers and dancers in [ROOT.GetCountry.GetName|G] in an effort to spread #G Parthian#! culture and virtues throughout the realm.\n\n\n\n\n\n\n\n\n\n@italic_mil18!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] hat verfügt, dass die königlichen Schatzkammern nun Künstler, Sänger und Tänzer in [ROOT.GetCountry.GetName|G] fördern werden, um die #G parthische#! Kultur und Tugenden im gesamten Reich zu verbreiten.\n\n\n\n\n\n\n\n\n\n@italic_mil18!>  #NT!
 parthia_missions_73.tt: "Using #G Patronize the Arts#! government ability will now cost only #Y 50#! Political Influence#! @political_influence!."  #<Die Verwendung der Regierungsfähigkeit #G Fördere die Künste#! kostet jetzt nur noch #Y 50#! Politischer Einfluss#! @political_influence!.>  #NT!
  
 parthia_missions_74: "Breadbasket"  #<Brotkorb>  #NT!
 parthia_missions_74_DESC: "The fertile farmlands of [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] have sustained and nurtured many notable civilizations for centuries, and now, it is time for them to do the same for [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Das fruchtbare Ackerland von [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] hat über Jahrhunderte viele bemerkenswerte Zivilisationen erhalten und gefördert, und jetzt ist es an der Zeit, dass sie dasselbe für [ROOT.GetCountry.GetName|G] tun.\n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!
 parthia_missions_74.tt1: "We (including our #G Marches#!) produce at least #T 15#! surplus @grain! #T Grain#! in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] (Currently: [SCOPE.ScriptValue('parthia_wheat_production')|0|Y])."  #<Wir (einschließlich unserer #G Märsche#!) produzieren mindestens #T 15#! überschüssiges @Getreide! #T Getreide#! in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] (Aktuell: [SCOPE.ScriptValue('parthia_wheat_production')|0|Y]).>  #NT!
 parthia_missions_74.tt2: "All eligible grain-producing territories in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] will get a territory modifier [GetModifier('pth_grain_production').GetName|Y] which will grant [GetModifier('pth_grain_production').GetDesc] for #Y 30 Years#!."  #<Alle berechtigten Getreideanbaugebiete in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] erhalten einen Gebietsmodifikator [GetModifier('pth_grain_production').GetName|Y], der [GetModifier('pth_grain_production').GetDesc] für #Y 30 Jahre#!. gewährt>  #NT!
  
 parthia_missions_75: "Mesopotamian Dates"  #<Mesopotamische Datteln>  #NT!
 parthia_missions_75_DESC: "Is there a more perfect food than the date @dates! ? Whether enjoyed fresh or dried, the sweet, succulent date has nourished the inhabitants of #T Mesopotamia#! for countless generations. It is now time for the fruit of the date palm to sustain the Parthian levies.\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Gibt es ein perfekteres Essen als das Date @dates! ? Ob frisch oder getrocknet genossen, die süße, saftige Dattel ernährt die Bewohner von #T Mesopotamien#! seit unzähligen Generationen. Es ist jetzt an der Zeit, dass die Frucht der Dattelpalme die parthischen Abgaben ernährt.\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
 parthia_missions_75.tt1: "All @dates! #T Date-producing#! territories in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] territories have a [GetBuilding('basic_settlement_infratructure_building').GetName|Y] building."  #<Alle @dates! #T datumsproduzierende#! Gebiete in [GetProvince('(int32)912').GetArea.GetRegion.GetName|T] Gebieten haben ein [GetBuilding('basic_settlement_infratructure_building').GetName|Y] Gebäude.>  #NT!
 # parthia_missions_75.tt2: ""
  
 parthia_missions_76: "Salt Of Chehrabad"  #<Salz von Chehrabad>  #NT!
 parthia_missions_76_DESC: "The salt @salt! mines near [GetProvince('(int32)3384').GetName|T] are proving to be some of the most productive within all of [ROOT.GetCountry.GetName|T], and [ROOT.GetCountry.GetRuler.GetName|Y] is calling for even more investments to be made in the region.\n\n\n\n\n\n\n\n\n\n\n@event_pic7!"  #<Das Salz @salt! Minen in der Nähe von [GetProvince('(int32)3384').GetName|T] erweisen sich als einige der produktivsten in ganz [ROOT.GetCountry.GetName|T], und [ROOT.GetCountry.GetRuler.GetName|Y] fordert noch mehr Investitionen in der Region.\n\n\n\n\n\n\n\n\n\n\n@event_pic7!>  #NT!
  
 parthia_missions_77: "Persian Wine"  #<Persischer Wein>  #NT!
 parthia_missions_77_DESC: "There are many people that erroneously believe that the best wines @wine! in the world are found farther west, but this is because they have not tried the wine made by the #G Persians#!.\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Es gibt viele Menschen, die fälschlicherweise glauben, dass die besten Weine @wine! in der Welt gibt es weiter westlich, aber das liegt daran, dass sie den Wein der #G Perser#!.\n\n\n\n\n\n\n\n\n\n@celt_mil2! nicht probiert haben>  #NT!
 parthia_missions_77.tt1: "All @wine! #Y Wine-producing#! territories in [GetProvince('(int32)4799').GetArea.GetRegion.GetName|T] territories produce at least 2 trade goods."  #<Alles @wine! #Y Wein produzierende#! Gebiete in [GetProvince('(int32)4799').GetArea.GetRegion.GetName|T] Gebieten produzieren mindestens 2 Handelsgüter.>  #NT!
 # parthia_missions_77.tt2: ""
  
 parthia_missions_78: "Median Olives"  #<Mittlere Oliven>  #NT!
 parthia_missions_78_DESC: "The olive @olive! has long been a staple in many of the lands that we have conquered, and there are calls to plant more olive trees in territories that are suited for their cultivation.\n\n\n\n\n\n\n\n\n\n\n@event_pic8!"  #<Die Olive @olive! ist in vielen der Länder, die wir erobert haben, seit langem ein Grundnahrungsmittel, und es gibt Aufrufe, mehr Olivenbäume in Gebieten zu pflanzen, die für ihren Anbau geeignet sind.\n\n\n\n\n\n\n\n\n\n\n@event_pic8!>  #NT!
 parthia_missions_78.tt: "We will have the option to change the trade goods in settlements in [GetProvince('(int32)4985').GetArea.GetRegion.GetName|T] to @olive! #Y Olives#!."  #<Wir werden die Möglichkeit haben, die Handelsgüter in Siedlungen in [GetProvince('(int32)4985').GetArea.GetRegion.GetName|T] in @olive zu ändern! #Y Oliven#!.>  #NT!
  
 parthia_missions_79: "Prospecting In Zagros"  #<Prospektion in Zagros>  #NT!
 parthia_missions_79_DESC: "It is widely believed that there are valuable minerals @iron! and metals @precious_metals! located in the #T Zagros Mountains#!, but a proper survey of the area has never before been conducted, due to the difficulties of traversing the terrain. In an effort to discover whether or not this is true, [ROOT.GetCountry.GetRuler.GetName|Y] has sent our engineers into the mountain ranges in hopes of striking literal gold.\n\n\n\n\n\n\n\n\n\n@italic_mil32!"  #<Es wird allgemein angenommen, dass es wertvolle Mineralien in Eisen gibt! und Metalle @precious_metals! liegt im #T Zagros-Gebirge#!,, aber aufgrund der Schwierigkeiten beim Durchqueren des Geländes wurde noch nie eine ordnungsgemäße Untersuchung des Gebiets durchgeführt. Um herauszufinden, ob dies wahr ist oder nicht, hat [ROOT.GetCountry.GetRuler.GetName|Y] unsere Ingenieure in die Bergketten geschickt, in der Hoffnung, buchstäblich Gold zu finden.\n\n\n\n\n\n\n\n\n\n@italic_mil32!>  #NT!
 parthia_missions_79.tt: "We will have the option to change the trade goods in territories around the #T Zagros Mountains#! to #Y minable trade goods#!."  #<Wir werden die Möglichkeit haben, die Handelsgüter in Gebieten rund um das #T Zagros-Gebirge#! in #Y abbaubare Handelsgüter#! zu ändern.>  #NT!
  
 parthia_missions_inp_task: "Pivot to India?"  #<Schwenk nach Indien?>  #NT!
 parthia_missions_inp_task_desc: "CUT TASK DON'T LOC"  #<SCHNEIDAUFGABE NICHT LOC>  #NT!
 parthia_missions_inp_task.tt2: "We have a #E March#! with capital having 3 [GetBuilding('aqueduct_building').GetName] in [GetProvince('(int32)6552').GetArea.GetRegion.GetName]."  #<Wir haben einen #E März#! mit einem Kapital von 3 [GetBuilding('aqueduct_building').GetName] in [GetProvince('(int32)6552').GetArea.GetRegion.GetName].>  #NT!
 parthia_missions_inp_task.tt2: "We can switch to play as our #E Ariana#! March, with the goal of forming #E Indo-Parthian Kingdom#! and expansion into India."  #<Wir können als unsere #E Ariana#! March wechseln, mit dem Ziel, das #E Indo-Parthische Königreich#! zu gründen und nach Indien zu expandieren.>  #NT!
  
  ## Religous Sections ## 
 parthia_missions_80a: "Different Points Of View"  #<Verschiedene Standpunkte>  #NT!
 parthia_missions_80a_DESC: "We #G Parthians#! have long worshipped the natural world through what the #G Greeks#! call the #T 'Heptadic'#! faith. Yet we have always been a malleable people, bending in the wind like the long grasses of the steppe; we do not reject foreign ideas based on prejudices and preconceived notions, but carefully consider what the benefits might be if we adopt strange customs. Let us welcome people of noteworthy talent and skill - if we wish to rule over sedentary peoples, we must be pragmatic and flexible.\n\n\n\n\n\n\n\n\n\n@persia_mil8!"  #<Wir #G Parther#! verehren seit langem die natürliche Welt durch das, was die #G Griechen#! den #T „heptadischen“#! Glauben nennen. Dennoch waren wir immer ein formbares Volk, das sich im Wind beugte wie die hohen Gräser der Steppe; Wir lehnen fremde Ideen nicht aufgrund von Vorurteilen und vorgefassten Meinungen ab, sondern überlegen sorgfältig, welche Vorteile es haben könnte, wenn wir fremde Bräuche übernehmen. Lasst uns Menschen mit bemerkenswertem Talent und Können willkommen heißen – wenn wir über sesshafte Völker herrschen wollen, müssen wir pragmatisch und flexibel sein.\n\n\n\n\n\n\n\n\n\n@persia_mil8!>  #NT!
 #parthia_missions_80a.tt: "#BOLD;COLOR:{0.98,0.53,0.98} Mithraic#!, #BOLD;COLOR:{0.07,0.87,0.98} Zoroastrian#! and #BOLD;COLOR:{0.45,0.5,0.98} Hellenic#! scholars of very high skill will join our court!"  #<#BOLD;COLOR:{0.98,0.53,0.98} mithraische#!, #BOLD;COLOR:{0.07,0.87,0.98} zoroastrische#! und #BOLD;COLOR:{0.45,0.5,0.98} hellenische#! Gelehrte mit sehr hohem Können werden unserem Hof ​​beitreten!>  #NT!
 parthia_missions_80a.tt: "#BOLD;COLOR:{0.98,0.53,0.98} Mithraic#!, #BOLD;COLOR:{0.07,0.87,0.98} Zoroastrian#!, #BOLD;COLOR:{0.45,0.5,0.98} Hellenic#! and #BOLD;COLOR:{0.98,0.93,0.51} Buddhist#! Scholars, of very high skill, will join our court!"  #<#BOLD;COLOR:{0.98,0.53,0.98} mithraisch#!, #BOLD;COLOR:{0.07,0.87,0.98} zoroastrisch#!, #BOLD;COLOR:{0.45,0.5,0.98} hellenisch#! und #BOLD;COLOR:{0.98,0.93,0.51} buddhistisch#! Gelehrte mit sehr hohem Können werden unserem Hof ​​beitreten!>  #NT!
  
 parthia_missions_80: "A Parthian Pantheon"  #<Ein parthisches Pantheon>  #NT!
 parthia_missions_80_DESC: "As we now have come to acquire famous cities such as [ROOT.GetCountry.GetCapital.GetName|T], let us reevaluate what we know as religion; what do our former enemies, and now subjects, have to offer us in the way of the divine?\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Da wir nun berühmte Städte wie [ROOT.GetCountry.GetCapital.GetName|T] erworben haben, sollten wir das, was wir als Religion kennen, neu bewerten. Was haben unsere ehemaligen Feinde und heutigen Untertanen uns im Weg des Göttlichen zu bieten?\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
 #parthia_missions_80.tt: "Our [GetOffice('office_high_priest_monarchy').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T] is either #BOLD;COLOR:{0.98,0.53,0.98} Mithraic#!, #BOLD;COLOR:{0.07,0.87,0.98} Zoroastrian#! or #BOLD;COLOR:{0.45,0.5,0.98} Hellenic#!."  #<Unser [GetOffice('office_high_priest_monarchy').GetCulturalName(SCOPE.GetRootScope.GetCountry)|T] ist entweder #BOLD;COLOR:{0.98,0.53,0.98} Mithraisch#!, #BOLD;COLOR:{0.07,0.87,0.98} Zoroastrisch#! oder #BOLD;COLOR:{0.45,0.5,0.98} Hellenisch#!.>  #NT!
 parthia_missions_80.tt: "Our [GetOffice('office_high_priest_monarchy').GetCulturalName(SCOPE.GetRootScope.GetCountry)] is either #BOLD;COLOR:{0.98,0.53,0.98} Mithraic#!, #BOLD;COLOR:{0.07,0.87,0.98} Zoroastrian#!, #BOLD;COLOR:{0.45,0.5,0.98} Hellenic#! or #BOLD;COLOR:{0.98,0.93,0.51} Buddhist#!."  #<Unser [GetOffice('office_high_priest_monarchy').GetCulturalName(SCOPE.GetRootScope.GetCountry)] ist entweder #BOLD;COLOR:{0.98,0.53,0.98} mithraisch#!, #BOLD;COLOR:{0.07,0.87,0.98} zoroastrisch#!, #BOLD;COLOR:{0.45,0.5,0.98} hellenisch#! oder #BOLD;COLOR:{0.98,0.93,0.51} buddhistisch#!.>  #NT!
  #Mithraic 
  
 parthia_missions_81: "Median Mentors"  #<Mittlere Mentoren>  #NT!
 parthia_missions_81_DESC: "The #E Medes#! are certainly an educated bunch, serving as the backbone to the #E Persian#! head. While many of the #E Medes#! have come to worship the lord #E Ahura Mazda#!, many yet still cling on to the worship of the great lord of light, #E Mithra#!. Accepting their mentorship over the faith of the #E Medes#! will allow us to efficiently call upon the wealth of knowledge recorded by the people of #E Deioces#!.\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Die #E Meder#! sind sicherlich eine gebildete Gruppe, die als Rückgrat des #E Perser#!-Kopfes dient. Während viele der #E Meder#! gekommen sind, um den Herrn #E Ahura Mazda#! zu verehren, halten viele immer noch an der Verehrung des großen Herrn des Lichts, #E Mithra#!, fest. Wenn wir ihre Mentorschaft über den Glauben der #E Meder#! annehmen, können wir effizient auf den Wissensschatz zurückgreifen, der von den Menschen in #E Deioces#! aufgezeichnet wurde.\n\n\n\n\n\n\n\n\n\n@persia_mil1!>  #NT!
 parthia_missions_82: "Mazdayan Mandates"  #<Mazdayan-Mandate>  #NT!
 parthia_missions_82_DESC: "While we continue the path of #E Mithra#!, it would be utterly foolish for us to forget the #E Persians#! and their preferred faith of #E Zoroastrianism#! (Mazdayasna). The Avesta, and their calendar, oh, and those glorious temples of fire! Yes, let us indeed invest not only in adoption of these innovations, but in perfection of the concepts.\n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Während wir den Weg von #E Mithra#!, fortsetzen, wäre es völlig dumm für uns, die #E Perser#! und ihren bevorzugten Glauben des #E Zoroastrismus#! (Mazdayasna) zu vergessen. Die Avesta und ihr Kalender, oh, und diese herrlichen Feuertempel! Ja, lasst uns in der Tat nicht nur in die Übernahme dieser Innovationen investieren, sondern auch in die Perfektionierung der Konzepte.\n\n\n\n\n\n\n\n\n\n@persia_mil2!>  #NT!
 parthia_missions_82.tt: "[GetProvince('(int32)4799').GetOwner.GetName] has above 190 opinion of us."  #<[GetProvince('(int32)4799').GetOwner.GetName] hat über 190 Meinungen über uns.>  #NT!
 parthia_missions_83: "Codification Of The Avesta"  #<Kodifizierung des Avesta>  #NT!
 parthia_missions_83_DESC: "The Codification of the Avesta refers to the process of collecting and writing down the sacred texts of Zoroastrianism, which were originally transmitted orally. This crucial undertaking, primarily attributed to the Sasanian Empire, aimed to preserve the religious knowledge and traditions in a standardized written form.\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Die Kodifizierung des Avesta bezieht sich auf den Prozess der Sammlung und Niederschrift der heiligen Texte des Zoroastrismus, die ursprünglich mündlich überliefert wurden. Dieses entscheidende Unterfangen, das in erster Linie dem Sasanidenreich zugeschrieben wird, zielte darauf ab, das religiöse Wissen und die Traditionen in einer standardisierten schriftlichen Form zu bewahren.\n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!
 parthia_missions_84: "Calendar Of Ahuramazda"  #<Kalender von Ahuramazda>  #NT!
 parthia_missions_84_DESC: "The Zoroastrian calendar is a religious calendar used by followers of Zoroastrianism. It is a solar calendar, typically consisting of 12 months of 30 days each, plus five additional "Gatha" days at the end of the year, making a total of 365 days.\n\n\n\n\n\n\n\n\n\n@event_pic1!"  #<Der zoroastrische Kalender ist ein religiöser Kalender, der von Anhängern des Zoroastrismus verwendet wird. Es handelt sich um einen Sonnenkalender, der typischerweise aus 12 Monaten mit jeweils 30 Tagen sowie fünf zusätzlichen „Gatha“-Tagen am Ende des Jahres besteht, was insgesamt 365 Tage ergibt.\n\n\n\n\n\n\n\n\n\n@event_pic1!>  #NT!
 parthia_missions_85: "The Great Fire Temple"  #<Der Große Feuertempel>  #NT!
 parthia_missions_85_DESC: "The Great Fire Temple in #T Hagmatana (Ecbatana)#! in Media was a prominent religious center for #G Zoroastrians#! within the ancient Median capital. Its existence underscores the deep historical roots and significant presence of #G Zoroastrianism#! in this region of ancient Iran.\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Der Große Feuertempel in #T Hagmatana (Ecbatana)#! in Medien war ein bedeutendes religiöses Zentrum für #G Zoroastrier#! in der alten medischen Hauptstadt. Seine Existenz unterstreicht die tiefen historischen Wurzeln und die bedeutende Präsenz des #G Zoroastrismus#! in dieser Region des alten Iran.\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
 parthia_missions_86: "Mystical Magi Masters"  #<Meister der mystischen Magier>  #NT!
 parthia_missions_86_DESC: "Perhaps the greatest religious entity in the whole of Iran, the Magi are the priestly class tied to Median nobility. The Greeks in particular speak much on these people, saying they are imbued with the power of #E Magikos#!, convincing words, and knowledge from ages long gone. Patronizing this class will not only win over many people, but allow us to employ these Magi for matters of stabilization and harmonization.\n\n\n\n\n\n\n\n\n\n@persia_mil4!"  #<Die vielleicht größte religiöse Einheit im gesamten Iran, die Heiligen Drei Könige, sind die Priesterklasse, die an den medianen Adel gebunden ist. Insbesondere die Griechen sprechen viel über diese Menschen und sagen, sie seien von der Kraft überzeugender Worte und dem Wissen längst vergangener Zeiten durchdrungen. Die Schirmherrschaft für diesen Kurs wird nicht nur viele Menschen überzeugen, sondern es uns auch ermöglichen, diese Magier für Fragen der Stabilisierung und Harmonisierung einzusetzen.\n\n\n\n\n\n\n\n\n\n@persia_mil4!>  #NT!
 parthia_missions_87: "Exalted Is Mithra"  #<Erhaben ist Mithra>  #NT!
 parthia_missions_87_DESC: "The cornerstone of our pantheon, Mithra has become the preiminent deity of us #E Parthians#!. We must make sure to codify this in our official pantheon, lest we upset the lord of light.\n\n\n\n\n\n\n\n\n\n@persia_mil5!"  #<Der Eckstein unseres Pantheons, Mithra, ist zur herausragenden Gottheit von uns geworden #E Parther#!. Wir müssen sicherstellen, dass dies in unserem offiziellen Pantheon kodifiziert wird, damit wir den Herrn des Lichts nicht verärgern.\n\n\n\n\n\n\n\n\n\n@persia_mil5!>  #NT!
 parthia_missions_88: "Door Of Mithra"  #<Tür von Mithra>  #NT!
 parthia_missions_88_DESC: "A Dar-e Mehr literally means Door of Mithra, Gate of Mithra, or Court of Mithra. It represents a fire temple dedicated to the lord of oaths. We must establish plenty Dar-e Mehr in order to honor the first light.\n\n\n\n\n\n\n\n\n\n@persia_mil8!"  #<Ein Dar-e Mehr bedeutet wörtlich Tür von Mithra, Tor von Mithra oder Hof von Mithra. Es stellt einen Feuertempel dar, der dem Herrn der Eide gewidmet ist. Wir müssen genügend Dar-e Mehr errichten, um das erste Licht zu ehren.\n\n\n\n\n\n\n\n\n\n@persia_mil8!>  #NT!
 parthia_missions_89: "The Giver Of Rule"  #<Der Geber der Herrschaft>  #NT!
 parthia_missions_89_DESC: "One of Mithra's epithets, 'the Giver of Rule,' is quite important to us. It represents his divine right to give blessings unto rulers. We must prove to those who we rule that we are indeed worthy of the Giver of Rule's honor.\n\n\n\n\n\n\n\n\n\n@persia_mil9!"  #<Einer von Mithras Beinamen, „der Herrscher“, ist für uns sehr wichtig. Es stellt sein göttliches Recht dar, den Herrschern Segen zu geben. Wir müssen denen, die wir regieren, beweisen, dass wir der Ehre des Herrschers tatsächlich würdig sind.\n\n\n\n\n\n\n\n\n\n@persia_mil9!>  #NT!
 parthia_missions_90: "The Shining And Pure"  #<Das Strahlende und Reine>  #NT!
 parthia_missions_90_DESC: "The god Apollo, worshipped by many Yauna (Greeks), is notably similar to Mithra. They share iconography and themes of the light, the sun, and the law. Perhaps they are indeed one and the same, different only by the name we call the Shining one.\n\n\n\n\n\n\n\n\n\n@egypt_mil14!"  #<Der von vielen Yauna (Griechen) verehrte Gott Apollo ist Mithra besonders ähnlich. Sie teilen die Ikonographie und die Themen Licht, Sonne und Gesetz. Vielleicht sind sie tatsächlich ein und dasselbe und unterscheiden sich nur durch den Namen, den wir den Leuchtenden nennen.\n\n\n\n\n\n\n\n\n\n@egypt_mil14!>  #NT!
 parthia_missions_91: "Fire Of The King Of Kings"  #<Feuer des Königs der Könige>  #NT!
 parthia_missions_91_DESC: "Located in the titular #E Arshak#! is located the Great Fire of the Arsacids.\n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Im Titel #E Arshak#! befindet sich das Große Feuer der Arsakiden.\n\n\n\n\n\n\n\n\n\n@persia_mil2!>  #NT!
 parthia_missions_92: "Imbued With Kharenah"  #<Durchdrungen von Kharenah>  #NT!
 parthia_missions_92_DESC: "To be imbued with Kharenah, or Khvarenah is to be imbued with divine glory and spleandor. The only being in the whole of the Universe who may imbue Kharenah is that of the great Mithra. And by his holy light's grace, our leader, great #E King of Kings [ROOT.GetCountry.GetRuler.GetName]#!, has been imbued with this power.\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<Von Kharenah oder Khvarenah durchdrungen zu sein bedeutet, von göttlicher Herrlichkeit und Pracht durchdrungen zu sein. Das einzige Wesen im gesamten Universum, das Kharenah durchdringen kann, ist das des großen Mithra. Und durch die Gnade seines heiligen Lichts wurde unser Anführer, der große #E König der Könige [ROOT.GetCountry.GetRuler.GetName]#!,, mit dieser Macht erfüllt.\n\n\n\n\n\n\n\n\n\n@greek_mil2!>  #NT!
 parthia_missions_93: "Arsaces, The Divine"  #<Arsaces, das Göttliche>  #NT!
 parthia_missions_93_DESC: "The founder of this great empire we have built, lord #E Arsaces#!, imbued with #E Kharenah#!, molded by #E Fire#!, and shines like a reflection of #E Mithra#! has achieved divinity in his achievements.\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Der Gründer dieses großen Reiches, das wir aufgebaut haben, Herr #E Arsaces#!,, durchdrungen von #E Kharenah#!,, geformt von #E Feuer#!, und strahlt wie ein Spiegelbild von #E Mithra#!, hat in seinen Errungenschaften Göttlichkeit erlangt.\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
 parthia_missions_94: "The Great Temple Of Mehri"  #<Der Große Tempel von Mehri>  #NT!
 parthia_missions_94_DESC: "During the times of #E Atropates#! rule, Phraata was home to a great fire temple. We should expand this to show that the light of Mithra shall never fade from where it touches.\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Zur Zeit der Herrschaft von #E Atropates#! befand sich in Phraata ein großer Feuertempel. Wir sollten dies erweitern, um zu zeigen, dass das Licht von Mithra niemals dort verblassen wird, wo es es berührt.\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
  
