 pth_silk2_change_desc: "$pth_silk1_change_desc$"  #<$pth_silk1_change_desc$>  #NT!
 pth_silk3_change: "Establish Silk Production"  #<Etablieren Sie die Seidenproduktion>  #NT!
 pth_silk3_change_desc: "We can choose a city that will have silk plantations."  #<Wir können eine Stadt wählen, in der es Seidenplantagen geben wird.>  #NT!
 pth_silk3_change.tt1: "Ability is not on 5-year cooldown."  #<Die Fähigkeit hat keine 5-Jahres-Abklingzeit.>  #NT!
 pth_silk3_change.tt2: "We will get to choose in which city, with #E 3 [GetBuilding('workshop_building').GetName] Buldings#!, we will establish @silk! production infrastructure, thus changing city's trade good."  #<Wir können wählen, in welcher Stadt wir @silk mit #E 3 [GetBuilding('workshop_building').GetName] Gebäuden#!, gründen werden! Produktionsinfrastruktur und verändert so das Handelsgut der Stadt.>  #NT!
 pth_ability_claim: "Claim Bordering Areas"  #<Beanspruchen Sie angrenzende Gebiete>  #NT!
 pth_ability_claim_desc: "As our internal centralization and stabilization efforts proceed, we must consider outwards expansion. Our Marches surely can prove useful for getting claims adjecent to furthest reaches of our Realm."  #<Während unsere internen Zentralisierungs- und Stabilisierungsbemühungen voranschreiten, müssen wir eine Expansion nach außen in Betracht ziehen. Unsere Marken können sich sicherlich als nützlich erweisen, um Ansprüche bis in die entlegensten Gebiete unseres Reiches zu erheben.>  #NT!
 pth_ability_claim.tt1: "Ability is not on a cooldown (2 years)."  #<Die Fähigkeit hat keine Abklingzeit (2 Jahre).>  #NT!
 pth_ability_claim.tt2: "No territory bordering our Marches is already claimed."  #<Kein an unsere Marken angrenzendes Gebiet ist bereits beansprucht.>  #NT!
 pth_ability_claim.tt3: "We will gain claims on not currently claimed areas bordering our March subjects."  #<Wir werden Ansprüche auf derzeit nicht beanspruchte Gebiete an der Grenze unserer März-Untertanen erlangen.>  #NT!
 add_allowed_region_effect.tt: "Region can be directly held instead of being owned by our March."  #<Die Region kann direkt gehalten werden, anstatt im Besitz unseres Marsches zu sein.>  #NT!
 subtract_allowed_region_effect.tt: "#Y This region will become one of three directly held by us.#!"  #<#Y Diese Region wird eine von drei direkt von uns gehaltenen Regionen.#!>  #NT!
 aaa_pth_gov_ability: "#E Centralization Progress#!"  #<#E Zentralisierungsfortschritt#!>  #NT!
 aaa_pth_gov_ability_desc: "Current Centralization Progress: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y]\nNext month you'll gain: #Y [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('parthia_centr_gain')|2] points#!\n  [GuiScope.SetRoot( Player.MakeScope ).GetRootScope.GetCountry.Custom('pth_gov_ability_slider_loc')]\n\nFactors changing Centralization Progress monthly:\n #R -0.02#! for each normal March;\n #R -0.01#! for each Dynastic March;\n #R -0.05#! for law: #E Military Service#!;\n #Y +0.01#! for each point of Stability above 50;\n #Y +0.01#! for each statesmanship-adjusted finesse point of Artabid;\n #Y +0.05#! for laws: #E Divinity Statute#!, #E Might of Majesty#!, #E King of Kings#!.\n\nThis results in a @enact_law_cost_modifier! #E #G Enact Law Cost Reduction#!#! of #E #Y [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('pth_centralization_progress_svalue')|2]%#!#!.\n(0% at 100% Centralization, 50% at 0% Centralization)"  #<Aktueller Zentralisierungsfortschritt: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2|Y]\nNächsten Monat erhalten Sie: #Y [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('parthia_centr_gain')|2] Punkte#!\n [GuiScope.SetRoot( Player.MakeScope ).GetRootScope.GetCountry.Custom('pth_gov_ability_slider_loc')]\n\nFaktoren, die den Zentralisierungsfortschritt monatlich ändern:\n #R -0,02#! für jeden normalen März;\n #R -0,01#! für jeden Dynastischen März;\n #R -0,05#! für Recht: #Y1 Militärdienst#!;\n #Y +0,01#! für jeden Stabilitätspunkt über 50;\n #Y +0,01#! für jeden staatsmännisch angepassten Finessepunkt von Artabid;\n #Y +0,05#! für Gesetze: #Y1 Göttlichkeitsstatut#!, #Y1 Macht der Majestät#!, #Y1 König der Könige#!.\n\nDies führt zu einem @enact_law_cost_modifier! #Y1 [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('parthia_centr_gain')|2]6 Gesetzliche Kostenreduzierung in Kraft setzen#!#! von #Y1 #Y #!\n0 %#!#!.\n(0 % bei 100 % Zentralisierung, 50 % bei 0 % Zentralisierung)>  #NT!
  
 # Tooltips 
 pth_centralize_gui_tt: "Currently you have: #Y [Player.MakeScope.Var('pth_centralization_progress').GetValue|2] Centralization Progress.#!\nNext month you'll gain: #Y [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('parthia_centr_gain')|2] points.#!\nFactors changing Centralization Progress monthly:\n #R -0.02#! for each normal March;\n #R -0.01#! for each Protected March (e.g. Elymais);\n #R -0.01#! for each Dynastic March;\n #R -0.05#! for law: #E Military Service#!;\n #Y +0.01#! for each point of Stability above 50;\n #Y +0.01#! for each statesmanship-adjusted finesse point of Artabid;\n #Y +0.05#! for laws: #E Divinity Statute#!, #E Might of Majesty#!, #E King of Kings#!.\n#G This results in a @enact_law_cost_modifier! Enact Law Cost reduction of [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('pth_centralization_progress_svalue')|2]%.#!\n(0% at 100% Centralization, 50% at 0% Centralization)"  #<Derzeit haben Sie: #Y [Player.MakeScope.Var('pth_centralization_progress').GetValue|2] Zentralisierungsfortschritt.#!\nNext Monate erhalten Sie: #Y [GuiScope.SetRoot( Player.MakeScope ).ScriptValue('parthia_centr_gain')|2] Punkte.#!\nFactors monatlich wechselnder Zentralisierungsfortschritt:\n #R -0,02#! für jeden normalen Marsch;\n #R -0,01#! für jeden geschützten Marsch (z. B. Elymais);\n #R -0,01#! für jeden Dynastischen Marsch;\n #R -0,05#! für Recht: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2]4 Militärdienst#!;\n #Y +0,01#! für jeden Stabilitätspunkt über 50;\n #Y +0,01#! für jeden staatsmännisch angepassten Finessepunkt von Artabid;\n #Y +0,05#! für Gesetze: [Player.MakeScope.Var('pth_centralization_progress').GetValue|2]4 Divinity Statute#!, [Player.MakeScope.Var('pth_centralization_progress').GetValue|2]4 Might of Majesty#!, [Player.MakeScope.Var('pth_centralization_progress').GetValue|2]4 King of Kings#!.\n#G Dies führt zu einem @enact_law_cost_modifier! Reduzierung der Gesetzeskosten um #!\nNext8 %.#!\n(0 % bei 100 % Zentralisierung, 50 % bei 0 % Zentralisierung)>  #NT!
