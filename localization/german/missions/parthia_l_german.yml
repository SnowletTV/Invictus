 me_parthia.344.t: "$parthia_missions_141$"  #<$parthia_missions_141$>  #NT!
 me_parthia.344.desc: "$me_parthia.305.desc$"  #<$me_parthia.305.desc$>  #NT!
 me_parthia.344.a: "$me_parthia.305.a$"  #<$me_parthia.305.a$>  #NT!
 me_parthia.345.t: "$parthia_missions_142$"  #<$parthia_missions_142$>  #NT!
 me_parthia.345.desc: "Under the vast, star-dusted sky, two Zoroastrian followers, Kian and Mitra, spoke softly of their faith. "Truly, Ahura Mazda is the Wise Lord," Kian mused, "His order is evident in the turning of the seasons and the unwavering stars." Mitra nodded, adding, "And His wisdom guides us through every choice, illuminating the path of righteousness against the shadows of deceit.""  #<Unter dem weiten, sternenübersäten Himmel sprachen zwei zoroastrische Anhänger, Kian und Mitra, leise über ihren Glauben. „Wahrlich, Ahura Mazda ist der weise Herr“, sinnierte Kian. „Seine Ordnung zeigt sich im Wechsel der Jahreszeiten und in den unerschütterlichen Sternen.“ Mitra nickte und fügte hinzu: „Und seine Weisheit führt uns durch jede Wahl und erhellt den Weg der Gerechtigkeit gegen die Schatten der Täuschung.“>  #NT!
 me_parthia.345.a: "Truly his teachings are a source of wisdom to all"  #<Seine Lehren sind wahrlich eine Quelle der Weisheit für alle>  #NT!
 me_parthia.346.t: "$parthia_missions_143$"  #<$parthia_missions_143$>  #NT!
 me_parthia.346.desc: "In the bustling marketplace, a merchant swore an oath upon #E Mithra, the Yazata of Oaths#!, his voice clear and resonant. Later, in the court, a judge sought the guidance of #E Rashnu, the Yazata of Justice#!, to discern the truth amidst conflicting testimonies. Both understood that these divine beings upheld the cosmic order, ensuring that promises were kept and fairness prevailed in the world."  #<Auf dem geschäftigen Marktplatz schwor ein Händler einen Eid auf #E Mithra, den Yazata der Eide#!,. Seine Stimme war klar und klangvoll. Später ersuchte ein Richter vor Gericht den Rat von #E Rashnu, dem Yazata der Gerechtigkeit#!,, um inmitten widersprüchlicher Zeugenaussagen die Wahrheit herauszufinden. Beide verstanden, dass diese göttlichen Wesen die kosmische Ordnung aufrechterhielten und dafür sorgten, dass Versprechen eingehalten wurden und Gerechtigkeit in der Welt herrschte.>  #NT!
 me_parthia.346.a: "Truthfulness is a virtue to be appreciated"  #<Wahrhaftigkeit ist eine zu schätzende Tugend>  #NT!
 # me_parthia.347.t: ""
 # me_parthia.347.desc: "CUT TASK, DON'T DO THIS"  #<SCHNEIDEN SIE DIE AUFGABE, TUN SIE DAS NICHT>  #NT!
 # me_parthia.347.a: ""
 me_parthia.348.t: "$parthia_missions_145$"  #<$parthia_missions_145$>  #NT!
 me_parthia.348.desc: "$me_parthia.307.desc$"  #<$me_parthia.307.desc$>  #NT!
 me_parthia.348.a: "$me_parthia.307.a$"  #<$me_parthia.307.a$>  #NT!
 me_parthia.349.t: "$parthia_missions_146$"  #<$parthia_missions_146$>  #NT!
 me_parthia.349.desc: "Among the #E Yauna#!, the line between Zeus and the Wise Lord has blurred, giving rise to a divine fusion that resonates with both #E Greek#! and #E Iranian#! traditions. Temples speak his name in both tongues, and our subjects find unity in shared reverence. Truly, the gods are many in name but one in wisdom."  #<Unter den #E Yauna#!, ist die Grenze zwischen Zeus und dem weisen Herrn verwischt, was zu einer göttlichen Verschmelzung geführt hat, die sowohl mit #E griechischen#! als auch mit #E iranischen#! Traditionen in Einklang steht. Tempel sprechen seinen Namen in beiden Sprachen, und unsere Untertanen finden Einheit in gemeinsamer Ehrfurcht. Wahrlich, die Götter haben viele Namen, aber einen an Weisheit.>  #NT!
 me_parthia.349.a: "This brings our Greek subjects closer"  #<Dies bringt unsere griechischen Untertanen näher>  #NT!
 me_parthia.350.t: "$parthia_missions_147$"  #<$parthia_missions_147$>  #NT!
 me_parthia.350.desc: "The #E Shahanshah#!, seen as the divinely chosen ruler, held a profound connection to #E Ahura Mazda#!, often invoking the Wise Lord's numerous epithets interchangeably to underscore his legitimate authority. His reign was believed to be a direct gift from #E Ahura Mazda#!, a trust that obligated him to emulate the deity's 101 attributes—such as wisdom, justice, and benevolence—in his governance. By embodying these divine qualities, the Shahanshah aimed to maintain cosmic order and ensure prosperity for his realm, reflecting #E Ahura Mazda's#! will on Earth."  #<Der #E Shahanshah#!,, der als göttlich auserwählter Herrscher angesehen wurde, hatte eine tiefe Verbindung zu #E Ahura Mazda#!, und berief sich oft abwechselnd auf die zahlreichen Beinamen des Weisen Herrn, um seine legitime Autorität zu unterstreichen. Es wurde angenommen, dass seine Herrschaft ein direktes Geschenk von #E Ahura Mazda#!, war, einem Trust, der ihn verpflichtete, die 101 Eigenschaften der Gottheit – wie Weisheit, Gerechtigkeit und Wohlwollen – in seiner Regierungsführung nachzuahmen. Durch die Verkörperung dieser göttlichen Eigenschaften zielte der Shahanshah darauf ab, die kosmische Ordnung aufrechtzuerhalten und den Wohlstand seines Reiches sicherzustellen, was den Willen von #E Ahura Mazda#! auf der Erde widerspiegelte.>  #NT!
 me_parthia.350.a: "Ahuramazda may have many names; but King of Kings has many titles"  #<Ahuramazda mag viele Namen haben; aber King of Kings hat viele Titel>  #NT!
 # me_parthia.351.t: ""
 # me_parthia.351.desc: "CUT TASK, DON'T DO THIS"  #<SCHNEIDEN SIE DIE AUFGABE, TUN SIE DAS NICHT>  #NT!
 # me_parthia.351.a: ""
 me_parthia.352.t: "$parthia_missions_149$"  #<$parthia_missions_149$>  #NT!
 me_parthia.352.desc: "$me_parthia.310.desc$"  #<$me_parthia.310.desc$>  #NT!
 me_parthia.352.a: "$me_parthia.310.a$"  #<$me_parthia.310.a$>  #NT!
 me_parthia.353.t: "$parthia_missions_150$"  #<$parthia_missions_150$>  #NT!
 me_parthia.353.desc: "$me_parthia.311.desc$"  #<$me_parthia.311.desc$>  #NT!
 me_parthia.353.a: "$me_parthia.311.a$"  #<$me_parthia.311.a$>  #NT!
  
 me_parthia.9900.t: "Choose Dastgerd - Directly-held Regions"  #<Wählen Sie „Dastgerd – Direkt gehaltene Regionen“.>  #NT!
 me_parthia.9900.desc: "Our success against the Hellenic invaders took even [ROOT.GetCountry.GetRuler.GetName] by surprise - truth be told, the [ROOT.GetCountry.GetRulerTitle] expected more from the enemy and was disappointed to learn how weak they were.\n\nHowever, as a nation that was recently a steppe tribe, we neither have the administrative capacity nor the legitimacy in the eyes of the locals to be seen as a proper empire. As such, we are forced to choose between three regions to own directly - known in our language as #E Dastgerds#! - and the rest will be released as #E March#! subjects."  #<Unser Erfolg gegen die hellenischen Invasoren überraschte sogar [ROOT.GetCountry.GetRuler.GetName] – um ehrlich zu sein, erwarteten die [ROOT.GetCountry.GetRulerTitle] mehr vom Feind und waren enttäuscht, als sie erfuhren, wie schwach sie waren.\n\nAls Nation, die vor Kurzem ein Steppenstamm war, verfügen wir jedoch weder über die Verwaltungskapazität noch über die Legitimität in den Augen der Einheimischen, um als richtiges Imperium angesehen zu werden. Daher sind wir gezwungen, zwischen drei Regionen zu wählen, die wir direkt besitzen möchten – in unserer Sprache als #E Dastgerds#! bekannt – und der Rest wird als #E März#! Themen veröffentlicht.>  #NT!
 me_parthia.9900.a: "Pick [parthia_region_1.GetName]."  #<Wählen Sie [parthia_region_1.GetName].>  #NT!
 me_parthia.9900.a.tt: "#E [GetProvince('(int32)3435').GetArea.GetRegion.GetName] Region#! also will include #Y neighboring areas#! in Ariana."  #<#E [GetProvince('(int32)3435').GetArea.GetRegion.GetName] Region#! umfasst auch #Y benachbarte Gebiete#! in Ariana.>  #NT!
 me_parthia.9900.b: "Pick [parthia_region_2.GetName]."  #<Wählen Sie [parthia_region_2.GetName].>  #NT!
 me_parthia.9900.b.tt: "We will annex non-protected Marches in this region."  #<Wir werden nicht geschützte Marken in dieser Region annektieren.>  #NT!
 me_parthia.9900.c: "Pick [parthia_region_3.GetName]."  #<Wählen Sie [parthia_region_3.GetName].>  #NT!
