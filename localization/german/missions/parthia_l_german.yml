 me_parthia.9903.t: "Change Dastgerd"  #<Dastgerd ändern>  #NT!
 me_parthia.9903.desc: "Times change, and with them our needs and opportunities presented to us. As such, we must remain flexible, and focus of our administration on what we control directly must be pinpointed onto the most useful and relevant lands for our purposes. In light of this, what is now something we can do without, and what is something we must possess immediately?"  #<Die Zeiten ändern sich und mit ihnen unsere Bedürfnisse und Möglichkeiten, die sich uns bieten. Daher müssen wir flexibel bleiben und den Schwerpunkt unserer Verwaltung auf das, was wir direkt kontrollieren, auf die für unsere Zwecke nützlichsten und relevantesten Gebiete legen. Worauf können wir vor diesem Hintergrund jetzt verzichten und was müssen wir sofort besitzen?>  #NT!
 me_parthia.9903.a: "Leave [parthia_region_1.GetName] for [march_scope.GetCapital.GetArea.GetRegion.GetName]."  #<Lassen Sie [parthia_region_1.GetName] für [march_scope.GetCapital.GetArea.GetRegion.GetName].>  #NT!
 me_parthia.9903.a.tt: "We will annex [march_scope.GetName]."  #<Wir werden [march_scope.GetName] anhängen.>  #NT!
 me_parthia.9903.aa.tt: "Evacuating #E Parthia Region#! will also leave additional areas we gained for direct control in the interior of Iran."  #<Durch die Evakuierung der #E Parthia-Region#! werden auch zusätzliche Gebiete, die wir gewonnen haben, für die direkte Kontrolle im Landesinneren des Iran zurückbleiben.>  #NT!
 me_parthia.9903.b: "Leave [parthia_region_2.GetName] for [march_scope.GetCapital.GetArea.GetRegion.GetName]."  #<Lassen Sie [parthia_region_2.GetName] für [march_scope.GetCapital.GetArea.GetRegion.GetName].>  #NT!
 # me_parthia.9903.b.tt: ""
 me_parthia.9903.c: "Leave [parthia_region_3.GetName] for [march_scope.GetCapital.GetArea.GetRegion.GetName]."  #<Lassen Sie [parthia_region_3.GetName] für [march_scope.GetCapital.GetArea.GetRegion.GetName].>  #NT!
 # me_parthia.9903.c.tt: ""
 me_parthia.9903.e: "On second thought, maybe abandon those plans."  #<Wenn ich es mir genauer überlege, gib diese Pläne vielleicht auf.>  #NT!
  
 me_parthia.9920.t: "Appoint Marzban"  #<Ernennen Sie Marzban>  #NT!
 me_parthia.9920.desc: "One of the best ways to influence our Marches is to appoint someone loyal to rule over them. And who else better do that, than our own kin. As such it only follows that we get one of the representatives of the [ROOT.GetCountry.GetRuler.GetFamily.GetName] dynasty to a position of power there, to see to our interests."  #<Eine der besten Möglichkeiten, unsere Märsche zu beeinflussen, besteht darin, jemanden zu ernennen, der loyal über sie herrscht. Und wer könnte das besser, als unsere eigenen Verwandten? Daraus folgt nur, dass wir einen der Vertreter der [ROOT.GetCountry.GetRuler.GetFamily.GetName]-Dynastie dort in eine Machtposition bringen, um unsere Interessen wahrzunehmen.>  #NT!
 me_parthia.9920.a: "It must be [choose_10.GetName]."  #<Es muss [choose_10.GetName] sein.>  #NT!
 me_parthia.9920.b: "We'd rather see there [choose_11.GetName]."  #<Da sehen wir lieber [choose_11.GetName].>  #NT!
 me_parthia.9920.c: "[choose_12.GetName] can see to our interests."  #<[choose_12.GetName] kann sich um unsere Interessen kümmern.>  #NT!
 me_parthia.9920.d: "[choose_13.GetName] will work."  #<[choose_13.GetName] wird funktionieren.>  #NT!
 me_parthia.9920.e: "Maybe we're premature with this step."  #<Vielleicht sind wir mit diesem Schritt verfrüht.>  #NT!
  
 # Tasks 
  
 parthia_missions: "Ascent Of The Arsacids"  #<Aufstieg der Arsakiden>  #NT!
 parthia_missions_DESCRIPTION: "The long grasses of the steppe are watered with the blood of slain men and horses, and the earth trembles and shakes from the sound of our cavalry charging into battle. The [ROOT.GetCountry.GetAdjective] tribes have been united by [ROOT.GetCountry.GetRuler.GetName], the daring Chief of the [ROOT.GetCountry.GetName], and the wild horselords, the unchallenged masters of the steppe, have turned their eyes and attention towards the rich lands of the south. Political instability amongst the satraps of the [GetCountry('SEL').GetName]has opened a tiny crack in the empire's defenses; one that [ROOT.GetCountry.GetRuler.GetFirstName] hopes to exploit."  #<Die hohen Gräser der Steppe werden mit dem Blut getöteter Männer und Pferde getränkt, und die Erde bebt und bebt vom Lärm unserer in die Schlacht stürmenden Kavallerie. Die [ROOT.GetCountry.GetAdjective]-Stämme wurden von [ROOT.GetCountry.GetRuler.GetName], dem mutigen Häuptling der [ROOT.GetCountry.GetName], vereint, und die wilden Pferdefürsten, die unangefochtenen Herren der Steppe, haben ihre Augen und Aufmerksamkeit auf die reichen Länder des Südens gerichtet. Die politische Instabilität unter den Satrapen des [GetCountry('SEL').GetName] hat einen kleinen Riss in der Verteidigung des Imperiums hinterlassen; eine, die [ROOT.GetCountry.GetRuler.GetFirstName] auszunutzen hofft.>  #NT!
 parthia_missions_CRITERIA_DESCRIPTION: "This mission will be considered complete when we have established a mighty #E Parthian Empire#!, one that has destroyed all challengers to its power in both the east and west, and have built the world's greatest civilization in the heart of #E Asia#!."  #<Diese Mission gilt als abgeschlossen, wenn wir ein mächtiges #E Partherreich#!, errichtet haben, das alle Herausforderer seiner Macht im Osten und Westen vernichtet und die größte Zivilisation der Welt im Herzen #E Asiens#!. aufgebaut hat>  #NT!
 parthia_missions_BUTTON_TOOLTIP: "May the gods ride alongside us into battle - our destiny is ours to make!"  #<Mögen die Götter an unserer Seite in die Schlacht reiten – unser Schicksal liegt in unseren Händen!>  #NT!
 parthia_missions_BUTTON_DETAILS: ""
  
 parthia_missions_1: "Found Nisa"  #<Nisa gefunden>  #NT!
 parthia_missions_1_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y] has been toying with the idea of founding a new city that will serve as a capital for the [ROOT.GetCountry.GetAdjective|G] tribes, and [GetProvince('(int32)6657').GetName|T] is a promising location.\n\nThe settlement is close to the gates of [GetProvince('(int32)5437').GetName|T], which will allow our armies easy access to the south, but is not that far removed from the steppe.\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<[ROOT.GetCountry.GetRuler.GetName|Y] hat mit dem Gedanken gespielt, eine neue Stadt zu gründen, die als Hauptstadt für die [ROOT.GetCountry.GetAdjective|G]-Stämme dienen soll, und [GetProvince('(int32)6657').GetName|T] ist ein vielversprechender Standort.\n\nDie Siedlung liegt in der Nähe der Tore von [GetProvince('(int32)5437').GetName|T], was unseren Armeen einen einfachen Zugang nach Süden ermöglicht, ist aber nicht weit davon entfernt Steppe.\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
  
 parthia_missions_2: "Parthian Connections"  #<Parthische Verbindungen>  #NT!
 parthia_missions_2_DESC: "The satrap of [GetCountry('PAR').GetName|G] lies between our realm and that of the [GetCountry('SEL').GetName|R] and has long served as a buffer state between us - a situation that has been fine for many years, but [ROOT.GetCountry.GetRuler.GetName|Y] desires to change this.\n\nClandestine overtures have been made and secret messages have been sent to [GetCountry('PAR').GetRuler.GetName|Y] in hopes that [GetCountry('PAR').GetRuler.GetSheHe] would be willing to betray [GetCountry('SEL').GetRuler.GetName|Y]...\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Der Satrap von [GetCountry('PAR').GetName|G] liegt zwischen unserem Reich und dem von [GetCountry('SEL').GetName|R] und hat lange als Pufferstaat zwischen uns gedient – eine Situation, die seit vielen Jahren in Ordnung ist, aber [ROOT.GetCountry.GetRuler.GetName|Y] möchte dies ändern.\n\nEs wurden geheime Annäherungsversuche gemacht und geheime Nachrichten an [GetCountry('PAR').GetRuler.GetName|Y] gesendet, in der Hoffnung, dass [GetCountry('PAR').GetRuler.GetSheHe] zum Verrat bereit wäre [GetCountry('SEL').GetRuler.GetName|Y]...\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 parthia_missions_2.tt: "We will get opportunities to #R break off#! Parthia from [GetCountry('PAR').GetOverlord.GetAdjective] yoke!"  #<Wir werden Gelegenheiten bekommen, #R#! Parthia vom [GetCountry('PAR').GetOverlord.GetAdjective] Joch abzubrechen!>  #NT!
  
 parthia_missions_3: "Scythian Allies"  #<Skythische Verbündete>  #NT!
 parthia_missions_3_DESC: "There are #G Scythian#! tribes surrounding us that would serve as good allies in the days to come. It behooves us to enter into treaties with our neighbors, and [ROOT.GetCountry.GetRuler.GetName|Y] has decided to embrace a policy of coexistence with our migratory cousins.\n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Es gibt #G skythische #! Stämme um uns herum, die in den kommenden Tagen als gute Verbündete dienen würden. Es liegt an uns, Verträge mit unseren Nachbarn abzuschließen, und [ROOT.GetCountry.GetRuler.GetName|Y] hat beschlossen, eine Politik des Zusammenlebens mit unseren migrierenden Cousins ​​zu verfolgen.\n\n\n\n\n\n\n\n\n\n@persia_mil11!>  #NT!
 parthia_missions_3.tt1: "We have an alliance with a country of [GetCultureGroup('scythia').GetName|G] culture."  #<Wir haben eine Allianz mit einem Land der [GetCultureGroup('scythia').GetName|G]-Kultur.>  #NT!
 parthia_missions_3.tt2: "On doing the task #T Take Over Parthia#!, our non-Dahae land will be ceded to our ally."  #<Bei Erledigung der Aufgabe #T Parthia übernehmen#!, wird unser Nicht-Dahae-Land an unseren Verbündeten abgetreten.>  #NT!
 #parthia_missions_3.tt: "All owned areas in [GetProvince('(int32)5454').GetArea.GetRegion.GetName] will become owned by our Scythian ally when we form Parthia."  #<Alle besessenen Gebiete in [GetProvince('(int32)5454').GetArea.GetRegion.GetName] werden Eigentum unseres skythischen Verbündeten, wenn wir Parthia gründen.>  #NT!
  
 parthia_missions_4: "Bactrian Skirmish"  #<Baktrisches Scharmützel>  #NT!
 parthia_missions_4_DESC: "The lands of the #E #G [GetCountry('BAC').GetName]ns#!#! are wealthy and well-defended, which is just the kind of challenge that [ROOT.GetCountry.GetRuler.GetName|Y] lives for. The brash [ROOT.GetCountry.GetRulerTitle] is preparing to lead a small warband on a raid against our neighbors in hopes of driving them from [GetProvince('(int32)6668').GetName|T].\n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Das Land der #E #G [GetCountry('BAC').GetName]ns#!#! ist reich und gut verteidigt, was genau die Art von Herausforderung ist, für die [ROOT.GetCountry.GetRuler.GetName|Y] lebt. Der dreiste [ROOT.GetCountry.GetRulerTitle] bereitet sich darauf vor, eine kleine Kriegerschar auf einen Überfall auf unsere Nachbarn zu führen, in der Hoffnung, sie aus [GetProvince('(int32)6668').GetName|T] zu vertreiben.\n\n\n\n\n\n\n\n\n\n@persia_mil12!>  #NT!
 parthia_missions_4.tt1: "We have insulted [GetCountry('BAC').GetName|G]."  #<Wir haben [GetCountry('BAC').GetName|G] beleidigt.>  #NT!
 parthia_missions_4.tt2: "We will start a #R One Year War#! against only the #E #G [GetCountry('BAC').GetName]ns#!#!.\n\nIf we control [GetProvince('(int32)6668').GetName|T] by the end of the conflict we will take #E [GetProvince('(int32)6668').GetArea.GetName|T] Area#!, and [GetCountry('BAC').GetName|G] will declare independence when we strike their overlord."  #<Wir werden einen #R Einjährigen Krieg#! nur gegen die #E #G [GetCountry('BAC').GetName]ns#!#! beginnen.\n\nWenn wir [GetProvince('(int32)6668').GetName|T] bis zum Ende des Konflikts kontrollieren, werden wir #E [GetProvince('(int32)6668').GetArea.GetName|T] Gebiet#! einnehmen und #!0 wird seine Unabhängigkeit erklären, wenn wir ihren Oberherrn schlagen.>  #NT!
 # parthia_missions_4.tt3: ""
  
 parthia_missions_5: "Bactrian Matter"  #<Baktrische Materie>  #NT!
 parthia_missions_5_DESC: "It is well known to [ROOT.GetCountry.GetRuler.GetName|Y] that the #E #G [GetCountry('BAC').GetName]ns#!#! are proud and headstrong, easily convinced of their own might and bristling under the yoke of their #T Overlord#!, the [GetCountry('SEL').GetName|R].\n\nPerhaps our neighbors would be willing to hear what [ROOT.GetCountry.GetRuler.GetFirstName] is proposing...\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Es ist [ROOT.GetCountry.GetRuler.GetName|Y] wohlbekannt, dass die #E #G [GetCountry('BAC').GetName]ns#!#! stolz und eigensinnig sind, sich leicht von ihrer eigenen Macht überzeugen lassen und sich unter dem Joch ihres #T Oberherrn#!,, des [GetCountry('SEL').GetName|R], sträuben.\n\nVielleicht wären unsere Nachbarn bereit zu hören, was [ROOT.GetCountry.GetRuler.GetFirstName] ist Ich schlage vor...\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
 parthia_missions_5.tt1: "We have not tried to raid [GetCountry('BAC').GetName|G] for [GetProvince('(int32)6668').GetArea.GetName|T] in the last 5 years."  #<Wir haben in den letzten 5 Jahren nicht versucht, [GetCountry('BAC').GetName|G] für [GetProvince('(int32)6668').GetArea.GetName|T] zu plündern.>  #NT!
 parthia_missions_5.tt2: "[GetCountry('BAC').GetName|G] will declare independence from [GetCountry('BAC').GetOverlord.GetName|R] when we strike."  #<[GetCountry('BAC').GetName|G] wird seine Unabhängigkeit von [GetCountry('BAC').GetOverlord.GetName|R] erklären, wenn wir zuschlagen.>  #NT!
  
 parthia_missions_6: "Take Over Parthia"  #<Übernimm Parthien>  #NT!
 parthia_missions_6_DESC: "Now that we have successfully driven the #E Greeks#! from their mountainous cities in #E Parthia#!, [ROOT.GetCountry.GetRuler.GetName|Y] has proposed a grand reshuffling of our population.\n\nOur kinsmen and brethren will be forced to move south, taking over the territories that we have conquered from the Parthians, and we will abandon the northern steppe regions to our feudatories and allies.\n\n\n\n\n\n\n\n\n\n@persia_mil17!"  #<Nachdem wir nun die #E Griechen#! erfolgreich aus ihren Bergstädten in #E Parthien#! vertrieben haben, hat [ROOT.GetCountry.GetRuler.GetName|Y] eine große Neuordnung unserer Bevölkerung vorgeschlagen.\n\nUnsere Verwandten und Brüder werden gezwungen sein, nach Süden zu ziehen und die Gebiete zu übernehmen, die wir von den Parthern erobert haben, und wir werden die nördlichen Steppenregionen unseren Lehnsherren überlassen Verbündete.\n\n\n\n\n\n\n\n\n\n@persia_mil17!>  #NT!
 parthia_missions_6.tt1: "We own starting Parthian land."  #<Wir besitzen anfängliches parthisches Land.>  #NT!
 parthia_missions_6.tt2: "We have formed #COLOR:{0.6,0.13,0.98} Parthia#!."  #<Wir haben #COLOR:{0.6,0.13,0.98} Parthia#!. gegründet>  #NT!
 parthia_missions_6.tt3: "Most of our [GetCulture('derbiccan').GetName|G] pops will move south.\nLand around the [GetProvince('(int32)5456').GetArea.GetName|T] area will be given to a #G Dahae#! tribal vassal.\nLand further north will be shattered into area-based states."  #<Die meisten unserer [GetCulture('derbiccan').GetName|G] Einwohner werden nach Süden ziehen.\nLand rund um das [GetProvince('(int32)5456').GetArea.GetName|T]-Gebiet wird einem #G Dahae#! Stammesvasallen gegeben.\nLand weiter nördlich wird in gebietsbezogene Staaten aufgeteilt.>  #NT!
  
 parthia_missions_7: "One Parthia"  #<Eine Parthie>  #NT!
 parthia_missions_7_DESC: "[GetProvince('(int32)3434').GetArea.GetName|T], [GetProvince('(int32)6602').GetArea.GetName|T] and [GetProvince('(int32)7223').GetArea.GetName|T] are all governed by [GetProvince('(int32)3463').GetState.GetGovernorOrRuler.GetName|Y], a man that is more loyal to money than he is the [GetCountry('SEL').GetName|R]. [ROOT.GetCountry.GetRuler.GetName|Y] thinks that we have a good chance of persuading the governor to switch allegiances.\n\n\n\n\n\n\n\n\n\n@italic_mil19!"  #<[GetProvince('(int32)3434').GetArea.GetName|T], [GetProvince('(int32)6602').GetArea.GetName|T] und [GetProvince('(int32)7223').GetArea.GetName|T] werden alle von [GetProvince('(int32)3463').GetState.GetGovernorOrRuler.GetName|Y] regiert, einem Mann, der dem Geld gegenüber loyaler ist als [GetCountry('SEL').GetName|R]. [ROOT.GetCountry.GetRuler.GetName|Y] glaubt, dass wir gute Chancen haben, den Gouverneur davon zu überzeugen, die Loyalität zu wechseln.\n\n\n\n\n\n\n\n\n\n@italic_mil19!>  #NT!
 parthia_missions_7.tt1: "We have #T Inspired Disloyalty#! of the #G Seleucid#! governor of #T Parthia#!."  #<Wir haben #T Inspirierte Illoyalität#! des #G Seleukiden#! Gouverneurs von #T Parthien#!.>  #NT!
 parthia_missions_7.tt2: "#R Seleukid#! control of the #T Parthia#! region will be greatly weakened, allowing us to perhaps #T Entice#! the governor of the region."  #<Die Kontrolle der #R Seleukiden#! über die Region #T Parthien#! wird stark geschwächt, sodass wir vielleicht den Gouverneur der Region #T locken#! können.>  #NT!
  
 parthia_missions_8: "Conquering On Horseback Is Easy..."  #<Auf dem Pferderücken zu erobern ist einfach ...>  #NT!
 parthia_missions_8_DESC: "Now it is time to move deeper into the #T Iranian Plateau#! with our horses, but [ROOT.GetCountry.GetRuler.GetName|Y] has an important decision to make; should the armies of [ROOT.GetCountry.GetName|G] invade using the #E #R Horde Conquest#!#! special wargoal, or should we rather cut our foes piece by piece with the #E #R Conquest#!#! wargoal?\n\n#E Depending on our choice, we will receive different #G Conquest Branching Missions#!#!.\n\n\n\n\n\n\n\n\n\n@persia_mil20!"  #<Jetzt ist es an der Zeit, mit unseren Pferden tiefer in das #T iranische Plateau#! vorzudringen, aber [ROOT.GetCountry.GetRuler.GetName|Y] muss eine wichtige Entscheidung treffen; Sollten die Armeen von [ROOT.GetCountry.GetName|G] mit dem speziellen Kriegsziel #E #R Horde Eroberung#!#! einmarschieren, oder sollten wir unsere Feinde lieber Stück für Stück mit dem Kriegsziel #E #R Eroberung#!#! vernichten?\n\n#E Abhängig von unserer Wahl erhalten wir verschiedene #!1 Eroberung Verzweigungsmissionen#!#!.\n\n\n\n\n\n\n\n\n\n@persia_mil20!>  #NT!
 parthia_missions_8.tt1: "We own starting #G Parthian#! land."  #<Wir besitzen #G parthisches#! Startland.>  #NT!
 parthia_missions_8.tt2: "We have stationed atleast #Y 40 Units#! in a single province at the border with the [GetCountry('SEL').GetName|R]."  #<Wir haben mindestens #Y 40 Einheiten#! in einer einzelnen Provinz an der Grenze zu [GetCountry('SEL').GetName|R] stationiert.>  #NT!
 parthia_missions_8.tt3: "We will #E #R Declare War#!#! against the [GetCountry('SEL').GetName|Y]!"  #<Wir werden #E #R den [GetCountry('SEL').GetName|Y] den Krieg erklären#!#!!>  #NT!
  
 parthia_missions_9: "Found Arshak"  #<Arshak gefunden>  #NT!
 parthia_missions_9_DESC: "Although there are many prosperous cities within the borders of [ROOT.GetCountry.GetName|G], the proud [ROOT.GetCountry.GetRuler.GetName|Y] wants to construct a new city that will become associated with the #Y [ROOT.GetCountry.GetRuler.GetFamily.GetName] Dynasty#!.\n\n\n\n\n\n\n\n\n\n@persia_mil5!"  #<Obwohl es innerhalb der Grenzen von [ROOT.GetCountry.GetName|G] viele wohlhabende Städte gibt, möchte der stolze [ROOT.GetCountry.GetRuler.GetName|Y] eine neue Stadt errichten, die mit der #Y [ROOT.GetCountry.GetRuler.GetFamily.GetName] Dynastie#!.\n\n\n\n\n\n\n\n\n\n@persia_mil5! in Verbindung gebracht wird>  #NT!
 parthia_missions_9.tt: "We will be able to move our capital to [GetProvince('(int32)6656').GetName|T]!"  #<Wir können unser Kapital auf [GetProvince('(int32)6656').GetName|T] verschieben!>  #NT!
  
 parthia_missions_10: "...It's Dismounting That's Hard"  #<...Absteigen ist schwer>  #NT!
 parthia_missions_10_DESC: "It's one thing to conquer a vast realm - many men have done so - but ruling over the subjugated and holding on to rebellious territory is an entirely different matter. [ROOT.GetCountry.GetRuler.GetName|Y] has vowed to leave [ROOT.GetCountry.GetRuler.GetHerHis] mark on history, and this includes being known as a wise steward of the land.\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Es ist eine Sache, ein riesiges Reich zu erobern – das haben schon viele Menschen geschafft –, aber über die Unterworfenen zu herrschen und rebellisches Territorium zu behalten, ist eine ganz andere Sache. [ROOT.GetCountry.GetRuler.GetName|Y] hat geschworen, [ROOT.GetCountry.GetRuler.GetHerHis] Spuren in der Geschichte zu hinterlassen, und dazu gehört auch, als weiser Verwalter des Landes bekannt zu sein.\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
 parthia_missions_10.tt1: "We possess control over #Y 200 Territories#!. Our #G Marches'#! lands count towards this number (Currently: [SCOPE.ScriptValue('parthia_10_provinces')|0|Y])."  #<Wir besitzen die Kontrolle über #Y 200 Gebiete#!.. Unsere #G Marken#! Länder zählen zu dieser Zahl (derzeit: [SCOPE.ScriptValue('parthia_10_provinces')|0|Y]).>  #NT!
 parthia_missions_10.tt2: "We chose what #G Branching Missions#! we will have by starting the war from previous task."  #<Wir haben ausgewählt, welche #G Verzweigungsmissionen#! wir haben werden, indem wir den Krieg mit der vorherigen Aufgabe begonnen haben.>  #NT!
  
 parthia_missions_11: "Settling The Tribes"  #<Die Stämme besiedeln>  #NT!
 parthia_missions_11_DESC: "As we transition from our tribal past into this new settled existence, [ROOT.GetCountry.GetRuler.GetName|Y] has decided that our hungry cities have need of more citizens, and so the order has been sent to the [GetCulture('derbiccan').GetName|G] tribes that they will have to move south.\n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<Während wir von unserer Stammesvergangenheit in diese neue sesshafte Existenz übergehen, hat [ROOT.GetCountry.GetRuler.GetName|Y] entschieden, dass unsere hungrigen Städte mehr Bürger brauchen, und so wurde den [GetCulture('derbiccan').GetName|G]-Stämmen der Befehl geschickt, dass sie nach Süden ziehen müssen.\n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!
 parthia_pop_happy_culture_convert_tt: "Half of our [GetCulture('derbiccan').GetName|G] kinsmen will resettle into #G Iranian#! cities and become [GetCulture('parthian').GetName|Y]."  #<Die Hälfte unserer [GetCulture('derbiccan').GetName|G] Verwandten wird in #G iranische#! Städte umsiedeln und [GetCulture('parthian').GetName|Y] werden.>  #NT!
  
 parthia_missions_12: "#E Branching Mission#!"  #<#E Verzweigungsmission#!>  #NT!
 parthia_missions_12_DESC: "Depending on your choice with either #R #E Horde Conquest#!#! or #T #E Normal Conquest#!#! war against [GetProvince('(int32)1595').GetOwner.GetName], you will get different branching missions!"  #<Abhängig von Ihrer Wahl mit entweder #R #E Horde Conquest#!#! oder #T #E Normal Conquest#!#! Krieg gegen [GetProvince('(int32)1595').GetOwner.GetName] erhalten Sie verschiedene verzweigte Missionen!>  #NT!
 parthia_missions_12.tt: "Depending on our choice of the #E Wargoal#! in the #Y Conquering on Horseback is easy...#! against [GetProvince('(int32)1595').GetOwner.GetName], we will get different missions."  #<Abhängig von unserer Wahl des #E Kriegsziels#! im #Y Erobern zu Pferd ist einfach...#! gegen [GetProvince('(int32)1595').GetOwner.GetName], wir erhalten unterschiedliche Missionen.>  #NT!
 # parthia_missions_12.tt: "#E #R For Horde Conquest wargoal branch:#!#! For having more than 5 Marches, we will unlock interactions to deal with our Marches.\n#E #T For Conquest wargoal branch:#!#! We will get a reward in our conquered Median territory."  #<#E #R Für den Wargoal-Zweig „Horde Conquest“:#!#! Für mehr als 5 Märsche werden wir Interaktionen freischalten, um mit unseren Marches umzugehen.\n#E #T Für den Wargoal-Zweig „Conquest“:#!#! Wir erhalten eine Belohnung in unserem eroberten Median-Territorium.>  #NT!
  
