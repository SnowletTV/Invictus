 # parthia_missions_20.tt: "#E #R For Horde Conquest wargoal branch:#!#! We will be able to coerce Iberia into accepting a March status, and we will get a country modifier based on their Heritage if they accept.\n#E #T For Conquest wargoal branch:#!#! By influencing leftover Seleukid governors in Iranian Plateau, we can clear the borders in the region."  #<#E #R Für den Wargoal-Zweig „Horde Conquest“:#!#! Wir können Iberia dazu zwingen, einen März-Status anzunehmen, und wenn sie akzeptieren, erhalten wir einen Ländermodifikator basierend auf ihrem Erbe.\n#E #T Für den Wargoal-Zweig „Conquest“:#!#! Durch Einflussnahme auf übrig gebliebene seleukidische Gouverneure im iranischen Plateau können wir die Grenzen in der Region säubern.>  #NT!
  
 parthia_missions_21: "#E Branching Mission#!"  #<#E Verzweigungsmission#!>  #NT!
 parthia_missions_21_DESC: "$parthia_missions_12_DESC$"  #<$parthia_missions_12_DESC$>  #NT!
 parthia_missions_21.tt: "$parthia_missions_12.tt$"  #<$parthia_missions_12.tt$>  #NT!
 # parthia_missions_21.tt: "#E #R For Horde Conquest wargoal branch:#!#! We will gain access to decisions for turning Gordyene and Sophene our way.\n#E #T For Conquest wargoal branch:#!#! We will be able to coerce Armenia into accepting a March status, and we will get a country modifier based on their Heritage if they accept."  #<#E #R Für den Wargoal-Zweig „Horde Conquest“:#!#! Wir erhalten Zugang zu Entscheidungen, um Gordyene und Sophene in unsere Richtung zu lenken.\n#E #T Für den Wargoal-Zweig „Conquest“:#!#! Wir werden in der Lage sein, Armenien dazu zu zwingen, einen März-Status anzunehmen, und wir werden einen Ländermodifikator basierend auf seinem Erbe erhalten, wenn sie akzeptieren.>  #NT!
  
