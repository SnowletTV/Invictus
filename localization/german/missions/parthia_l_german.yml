 gathas_codified: "Record of Gathas"  #<Aufzeichnung von Gathas>  #NT!
 gathas_codified_desc: "The Gathas are the oldest hymns of the Yasna (the core liturgy of Mazdayan worship). They are said to be from Zoroaster himself. During the Parthian Era, it is likely that the Gathas were writted down to serve as memory aids to help priests recite the hymns in important rituals."  #<Die Gathas sind die ältesten Hymnen der Yasna (der Kernliturgie des Mazdayan-Gottesdienstes). Sie sollen von Zoroaster selbst stammen. Es ist wahrscheinlich, dass die Gathas während der Partherzeit niedergeschrieben wurden, um als Erinnerungshilfe zu dienen und den Priestern dabei zu helfen, die Hymnen bei wichtigen Ritualen zu rezitieren.>  #NT!
 visperad_codified: "Record of the Visperad"  #<Aufzeichnung des Visperad>  #NT!
 visperad_codified_desc: "The Visperad, or the 'Law Against the Daevas,' are supplimentary to the Yasna (the core liturgy of Mazdayan worship). They include additional invocations, and were passed orally until either the late Parthian or early Sassanian period, where they were written down."  #<Das Visperad oder „Gesetz gegen die Daevas“ ergänzt die Yasna (die Kernliturgie der Mazdayan-Verehrung). Sie enthalten zusätzliche Anrufungen und wurden bis zur späten parthischen oder frühen sassanidischen Zeit mündlich weitergegeben, wo sie niedergeschrieben wurden.>  #NT!
 gathas_translated: "Translation of Gathas"  #<Übersetzung von Gathas>  #NT!
 gathas_translated_desc: "The Gathas are the oldest hymns of the Yasna (the core liturgy of Mazdayan worship). They are said to be from Zoroaster himself. During the Parthian Era, it is likely that the Gathas were writted down to serve as memory aids to help priests recite the hymns in important rituals."  #<Die Gathas sind die ältesten Hymnen der Yasna (der Kernliturgie des Mazdayan-Gottesdienstes). Sie sollen von Zoroaster selbst stammen. Es ist wahrscheinlich, dass die Gathas während der Partherzeit niedergeschrieben wurden, um als Erinnerungshilfe zu dienen und den Priestern dabei zu helfen, die Hymnen bei wichtigen Ritualen zu rezitieren.>  #NT!
 visperad_translated: "Translation of the Visperad"  #<Übersetzung des Visperad>  #NT!
 visperad_translated_desc: "The Visperad, or the 'Law Against the Daevas,' are supplimentary to the Yasna (the core liturgy of Mazdayan worship). They include additional invocations, and were passed orally until either the late Parthian or early Sassanian period, where they were written down."  #<Das Visperad oder „Gesetz gegen die Daevas“ ergänzt die Yasna (die Kernliturgie der Mazdayan-Verehrung). Sie enthalten zusätzliche Anrufungen und wurden bis zur späten parthischen oder frühen sassanidischen Zeit mündlich weitergegeben, wo sie niedergeschrieben wurden.>  #NT!
