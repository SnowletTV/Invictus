 me_parthia.9901.desc: "Our success against the Hellenic invaders took even [ROOT.GetCountry.GetRuler.GetName] by surprise - truth be told, the [ROOT.GetCountry.GetRulerTitle] expected more from the enemy and was disappointed to learn how weak they were.\n\nHowever, as a nation that was recently a steppe tribe, we neither have the administrative capacity nor the legitimacy in the eyes of the locals to be seen as a proper empire. As such, we are forced to choose between three regions to own directly - known in our language as #E Dastgerds#! - and the rest will be released as #E March#! subjects."  #<Unser Erfolg gegen die hellenischen Invasoren überraschte sogar [ROOT.GetCountry.GetRuler.GetName] – um ehrlich zu sein, erwarteten die [ROOT.GetCountry.GetRulerTitle] mehr vom Feind und waren enttäuscht, als sie erfuhren, wie schwach sie waren.\n\nAls Nation, die vor Kurzem ein Steppenstamm war, verfügen wir jedoch weder über die Verwaltungskapazität noch über die Legitimität in den Augen der Einheimischen, um als richtiges Imperium angesehen zu werden. Daher sind wir gezwungen, zwischen drei Regionen zu wählen, die wir direkt besitzen möchten – in unserer Sprache als #E Dastgerds#! bekannt – und der Rest wird als #E März#! Themen veröffentlicht.>  #NT!
