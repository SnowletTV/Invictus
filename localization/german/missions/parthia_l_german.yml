 # parthia_missions_16.tt: "#E #R For Horde Conquest wargoal branch:#!#! For having our unique Centralization mechanic at a 100%, we will centralize our state and proceed without Marches.\n#E #T For Conquest wargoal branch:#!#! We could achieve settlement with the Seleukids, with chance for their bloodline in exchange for allowing them to rule across the Euphrates."  #<#E #R Für den Wargoal-Zweig „Horde Conquest“:#!#! Da unsere einzigartige Zentralisierungsmechanik zu 100 % aktiviert ist, werden wir unseren Staat zentralisieren und ohne Märsche weitermachen.\n#E #T Für den Wargoal-Zweig „Conquest“:#!#! Wir könnten eine Einigung mit den Seleukiden erzielen, mit einer Chance auf deren Blutlinie im Austausch dafür, dass sie über den Euphrat herrschen dürfen.>  #NT!
  
