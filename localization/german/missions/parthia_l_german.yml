 vinaya_pitaka_par: "Vinayagan Kadag"  #<Vinayagan Kadag>  #NT!
 vinaya_pitaka_par_desc: "A translation of the Vinaya Pitaka, the 'Basket of Discipline,' which describes the rules and regulations for monastic life, covering behavior, training, meditation, and devotion."  #<Eine Übersetzung des Vinaya Pitaka, des „Korbs der Disziplin“, der die Regeln und Vorschriften für das klösterliche Leben beschreibt und Verhalten, Training, Meditation und Hingabe umfasst.>  #NT!
 sutta_pitaka_par: "Sutragan Kadag"  #<Sutragan Kadag>  #NT!
 sutta_pitaka_par_desc: "A translation of the Sutta Pitaka, the 'Basket of Discourses,' which describes numerous sermons and discourses, attributed to the Buddha and his disciples, exploring various doctrinal and ethical topics."  #<Eine Übersetzung des Sutta Pitaka, dem „Korb der Lehrreden“, der zahlreiche Predigten und Lehrreden beschreibt, die Buddha und seinen Schülern zugeschrieben werden und sich mit verschiedenen doktrinären und ethischen Themen befassen.>  #NT!
 abhidhamma_pitaka_par: "Abidarmagan Kadag"  #<Abidarmagan Kadag>  #NT!
 abhidhamma_pitaka_par_desc: "A translation of the Sutta Pitaka, the 'Basket of Higher Teachings,' which describes more analytical and philosophical explorations of the Buddhist teachings, often re-examining and reorganizing concepts presented in the Sutta Pitaka."  #<Eine Übersetzung des Sutta Pitaka, des „Korbes der höheren Lehren“, die eher analytische und philosophische Untersuchungen der buddhistischen Lehren beschreibt und dabei häufig die im Sutta Pitaka vorgestellten Konzepte erneut untersucht und neu organisiert.>  #NT!
 interpretatio_parthica_compendium: "Compendium of Helleno-Iranian Gods"  #<Kompendium der hellenisch-iranischen Götter>  #NT!
 interpretatio_parthica_compendium_desc: "A compilation of studies comparing Iranic gods to Hellenic gods, which fosters better understandings of the unique Parthian religion which derives many influences from both."  #<Eine Zusammenstellung von Studien zum Vergleich iranischer Götter mit hellenischen Göttern, die ein besseres Verständnis der einzigartigen parthischen Religion fördert, die viele Einflüsse von beiden ableitet.>  #NT!
 PTH_neglected: "Neglected during Magastan"  #<Während Magastan vernachlässigt>  #NT!
 PTH_satisfied: "Demands satisfied at Magastan"  #<Ansprüche werden bei Magastan erfüllt>  #NT!
 PTH_favoured: "Settled a matter in favour of them"  #<Eine Angelegenheit zu ihren Gunsten geklärt>  #NT!
 PTH_disfavoured: "Settled a matter against their interests"  #<Eine Angelegenheit gegen ihre Interessen geklärt>  #NT!
 PTH_mild_disfavoured: "Mildly disfavoured during Magastan"  #<Während Magastan leicht ungünstig>  #NT!
 PTH_happy: "Heeded their demands at Magastan"  #<Hat ihre Forderungen in Magastan beachtet>  #NT!
 PTH_disregarded_tradition: "Spahbed not of chosen hereditary Spahbed family"  #<Spahbed stammt nicht aus der erblichen Spahbed-Familie>  #NT!
  
