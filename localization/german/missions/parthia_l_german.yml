  #Hellenic 
 parthia_missions_109: "Hellenic Priestly Class"  #<Hellenische Priesterklasse>  #NT!
 parthia_missions_109_DESC: "As the [GetReligion('indo_iranian_religion').GetName] no longer quite serves our purposes, we have to do away with a priesthood of shamans and weird rituals and to establish one of serious priests with proper rites.\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Da die [GetReligion('indo_iranian_religion').GetName] unseren Zwecken nicht mehr ganz dient, müssen wir eine Priesterschaft aus Schamanen und seltsamen Ritualen abschaffen und eine Priesterschaft aus ernsthaften Priestern mit richtigen Riten etablieren.\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
 parthia_missions_110: "The Cult Of Zeus-Oromasdes"  #<Der Kult des Zeus-Oromasdes>  #NT!
 parthia_missions_110_DESC: "The Cult of #Y Zeus-Oromasdes#! hails from the west, in a syncretic region known as Commagene. Although mostly associated with the #E Medians#!, and by extention, #E Mithraic#!, #Y Zeus-Oromasdes#! has become popular throughout our #E Zoroastrian#! provinces. Adopting him will ultimately help our conversion rather than hinder it.\n\n\n\n\n\n\n\n\n\n@persia_mil4!"  #<Der Kult von #Y Zeus-Oromasdes#! stammt aus dem Westen, in einer synkretistischen Region namens Commagene. Obwohl es hauptsächlich mit den #E Medianen#! und im weiteren Sinne mit #E Mithras#! in Verbindung gebracht wird, ist #Y Zeus-Oromasdes#! in unseren #E zoroastrischen#! Provinzen populär geworden. Ihn zu adoptieren wird letztendlich unserer Konvertierung eher helfen als sie behindern.\n\n\n\n\n\n\n\n\n\n@persia_mil4!>  #NT!
 parthia_missions_110.tt1: "#E This modifier shall be active for as long as #Y Zeus-Oromasdes#! is in our Pantheon!#!"  #<#E Dieser Modifikator soll so lange aktiv sein, wie #Y Zeus-Oromasdes#! in unserem Pantheon ist!#!>  #NT!
 parthia_missions_110.tt2: "Every city that has #Y Zoroastrian#! dominant religion will get 12-25% of its pops converted to #E Hellenism#!."  #<In jeder Stadt, in der #Y Zoroastrier#! die vorherrschende Religion hat, werden 12-25 % ihrer Bevölkerung zum #E Hellenismus#! konvertiert.>  #NT!
 parthia_missions_111: "Translation of the Avesta"  #<Übersetzung des Avesta>  #NT!
 parthia_missions_111_DESC: "Until the late Parthian period, the #E Avestas#! remained uncodified. To translate them into #Y Greek#! for our priests and codify them officially, it is bound to bode well for us and our subjects.\n\n\n\n\n\n\n\n\n\n@persia_mil7!"  #<Bis zur späten parthischen Zeit blieben die #E Avestas#! unkodifiziert. Sie für unsere Priester ins #Y Griechische#! zu übersetzen und offiziell zu kodifizieren, wird für uns und unsere Untertanen bestimmt ein gutes Zeichen sein.\n\n\n\n\n\n\n\n\n\n@persia_mil7!>  #NT!
 parthia_missions_112: "Calendar Of Zoroaster"  #<Kalender von Zoroaster>  #NT!
 parthia_missions_112_DESC: "The #T Zoroastrian Calendar#! is one of the oldest in use, and is set up in 12 ''mahs'' (months) of 30 days, with an extra month about every 3 years. Most of our population still uses it, so it will do us good to do so.\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Der #T Zoroastrische Kalender#! ist einer der ältesten in Gebrauch und ist in 12 „Mahs“ (Monaten) von 30 Tagen aufgebaut, mit einem zusätzlichen Monat etwa alle 3 Jahre. Der Großteil unserer Bevölkerung nutzt es immer noch, daher wird es uns guttun, dies zu tun.\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
 parthia_missions_113: "A New Greek Floor"  #<Ein neuer griechischer Boden>  #NT!
 parthia_missions_113_DESC: "The #E Great Fire Temple#! in #T Hagmatana#! was built by the #G Medians#!, and expanded on by the #G Persians#!. It is time for us #G Parthians#! to leave our mark by expanding it to a third floor, incorporating #G Greek#! columns and architecture to make a truly unique spectacle for worshippers.\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Der #E Große Feuertempel#! in #T Hagmatana#! wurde von den #G Medianern#! erbaut und von den #G Persern#! erweitert. Es ist Zeit für uns #G Parther#!, unsere Spuren zu hinterlassen, indem wir es auf eine dritte Etage erweitern und ☻__4 griechische#! Säulen und Architektur integrieren, um ein wirklich einzigartiges Spektakel für Gläubige zu schaffen.\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
 parthia_missions_114: "Negotiate With The Magi"  #<Verhandeln Sie mit den Magiern>  #NT!
 parthia_missions_114_DESC: "With the introduction of a new priestly class, there is much unrest in the existing class of #T Magi#!. Their powerful use of #T Magikos#! may topple the whole state we have just built, and it is imperative that we negotiate with them, lest we feel the wrath of their gods.\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Mit der Einführung einer neuen Priesterklasse gibt es große Unruhe in der bestehenden Klasse der #T Magi#!.. Ihr kraftvoller Einsatz von #T Magikos#! könnte den gesamten Staat, den wir gerade aufgebaut haben, zum Einsturz bringen, und wir müssen unbedingt mit ihnen verhandeln, damit wir nicht den Zorn ihrer Götter spüren.\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 parthia_missions_115: "Exalted Is Apollo-Mithras"  #<Erhaben ist Apollo-Mithras>  #NT!
 parthia_missions_115_DESC: "#G Apollo-Mithras#!, the exalted one, has become one of the most powerful, popular, and influential gods in our land. The power and prestige of our great kingdom is thanks to the doing of the #T First Light#!.\n\n\n\n\n\n\n\n\n\n@greek_mil12!"  #<#G Apollo-Mithras#!, der Erhabene, ist zu einem der mächtigsten, beliebtesten und einflussreichsten Götter in unserem Land geworden. Die Macht und das Ansehen unseres großen Königreichs sind dem Wirken des #T Ersten Lichts#!.\n\n\n\n\n\n\n\n\n\n@greek_mil12! zu verdanken>  #NT!
 we_have_hellenic_ct: "We worship 2 #Y Hellenic#! Deities in our Pantheon."  #<Wir verehren 2 #Y hellenische#! Gottheiten in unserem Pantheon.>  #NT!
 parthia_missions_116: "Interpretatio Parthica"  #<Interpretatio Parthica>  #NT!
 parthia_missions_116_DESC: "As Zoroastrian and Greek gods converge into a more unified Helleno-Parthian religious customs, it's becoming more and more evident that there's not that much separating the Hellenes and the natives of the Iranian lands. This is to be celebrated and encouraged further still.\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Da zoroastrische und griechische Götter zu einheitlicheren helleno-parthischen religiösen Bräuchen zusammenwachsen, wird es immer offensichtlicher, dass es zwischen den Hellenen und den Ureinwohnern der iranischen Länder keinen allzu großen Unterschied gibt. Dies gilt es noch weiter zu feiern und zu fördern.\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
 parthia_missions_117: "Bow Of Apollo-Mithras"  #<Bogen von Apollo-Mithras>  #NT!
 parthia_missions_117_DESC: "One aspect unique to that of the #G Hellenic#! worship of #G Apollo#! is the great god's bow. We should work to integrate this imagery into the worship of #G Apollo-Mithras#! to inspire the future generations of warriors who will continue to fight in the lord of light's name.\n\n\n\n\n\n\n\n\n\n@greek_mil6!"  #<Ein einzigartiger Aspekt der #G hellenischen#! Verehrung von #G Apollo#! ist der Bogen des großen Gottes. Wir sollten daran arbeiten, diese Bilder in die Verehrung von #G Apollo-Mithras#! zu integrieren, um die zukünftigen Generationen von Kriegern zu inspirieren, die weiterhin im Namen des Herrn des Lichts kämpfen werden.\n\n\n\n\n\n\n\n\n\n@greek_mil6!>  #NT!
 parthia_missions_118: "Sword Of Artagnes-Herakles-Ares"  #<Schwert des Artagnes-Herakles-Ares>  #NT!
 parthia_missions_118_DESC: "The god #G Artagnes-Herakles-Ares#! is one that will truly help us send our enemies retreating in cowardice. His divine power over war, strength, and righteous conquest will make short work of all who oppose the mighty #G Parthian#! foot soldier.\n\n\n\n\n\n\n\n\n\n@greek_mil8!"  #<Der Gott #G Artagnes-Herakles-Ares#! ist einer, der uns wirklich dabei helfen wird, unsere Feinde feige zum Rückzug zu schicken. Seine göttliche Macht über Krieg, Stärke und gerechte Eroberung wird kurzen Prozess mit allen machen, die sich dem mächtigen #G parthischen#! Fußsoldaten widersetzen.\n\n\n\n\n\n\n\n\n\n@greek_mil8!>  #NT!
 parthia_missions_119: "Love Of Aphrodite-Anaitis"  #<Liebe zu Aphrodite-Anaitis>  #NT!
 parthia_missions_119_DESC: "Goddess of love and fertility, the holy #G Aphrodite-Anaitis#! will surely help our mighty leader secure a future for this kingdom. Let her loving embrace fuel us all.\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Die heilige Göttin der Liebe und Fruchtbarkeit #G Aphrodite-Anaitis#! wird unserem mächtigen Anführer sicherlich dabei helfen, die Zukunft dieses Königreichs zu sichern. Möge ihre liebevolle Umarmung uns alle antreiben.\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
 parthia_missions_120: "Apollo-Mithras-Helios-Hermes"  #<Apollo-Mithras-Helios-Hermes>  #NT!
 parthia_missions_120_DESC: "CUT TASK"  #<SCHNITTAUFGABE>  #NT!
 parthia_missions_121: "Royal Cult Of Arsaces"  #<Königlicher Kult von Arsaces>  #NT!
 parthia_missions_121_DESC: "Few possessed the vision of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective], who guided [ROOT.GetCountry.GetName|T] into the radiant future we now embrace. As we casted off the old traditions and welcomed new ways, it was this royal line that became the living vessel of our people's divine purpose.\n\n\n\n\n\n\n\n\n\n@greek_mil5!"  #<Nur wenige besaßen die Vision des [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective], der [ROOT.GetCountry.GetName|T] in die strahlende Zukunft führte, die wir jetzt umarmen. Als wir die alten Traditionen ablehnten und neue Wege begrüßten, war es diese königliche Linie, die zum lebendigen Gefäß der göttlichen Absicht unseres Volkes wurde.\n\n\n\n\n\n\n\n\n\n@greek_mil5!>  #NT!
 parthia_missions_121.tt: "#E This modifier shall be active for as long as #Y [deification_scope.GetName]#! is in our Pantheon!#!"  #<#E Dieser Modifikator soll so lange aktiv sein, wie #Y [deification_scope.GetName]#! in unserem Pantheon ist!#!>  #NT!
 parthia_missions_122: "Fire Of Oromazdes"  #<Feuer von Oromazdes>  #NT!
 parthia_missions_122_DESC: "CUT TASK"  #<SCHNITTAUFGABE>  #NT!
  #Buddhism 
 parthia_missions_123: "The Conversion Of [ROOT.GetCountry.GetRuler.GetName]"  #<Die Konvertierung von [ROOT.GetCountry.GetRuler.GetName]>  #NT!
 parthia_missions_123_DESC: "The conversion of [ROOT.GetCountry.GetRuler.GetName] will be a legendary #E Buddhist#! tale for all time...\n\n\n\n\n\n\n\n\n\n@india_mil12!"  #<Die Bekehrung von [ROOT.GetCountry.GetRuler.GetName] wird eine legendäre #E buddhistische#! Geschichte für alle Zeiten sein...\n\n\n\n\n\n\n\n\n\n@india_mil12!>  #NT!
 parthia_missions_124: "Emergence Of Buddha-Mazda"  #<Entstehung von Buddha-Mazda>  #NT!
 parthia_missions_124_DESC: "With the religion of our royalty becoming #E Buddhism#!, other nobles have begun to convert as well. The interaction of #E Buddhism#! with the mainly #E Iranic#! and #E Zoroastrian#! peoples of our state has resulted in the emergence of the #E Buddha-Mazda#!, the great lord and teacher.\n\n\n\n\n\n\n\n\n\n@india_mil13!"  #<Als die Religion unseres Königshauses zum #E Buddhismus#!, wurde, begannen auch andere Adlige zu konvertieren. Die Interaktion des #E Buddhismus#! mit den hauptsächlich #E iranischen#! und #E zoroastrischen#! Völkern unseres Staates hat zur Entstehung des #E Buddha-Mazda#!,, des großen Herrn und Lehrers, geführt.\n\n\n\n\n\n\n\n\n\n@india_mil13!>  #NT!
 parthia_missions_125: "Persification Of The Pali Canon"  #<Persifizierung des Pali-Kanons>  #NT!
 parthia_missions_125_DESC: "The #E Pali Canon#! is the authoritative collection of scriptures for #E Theravada Buddhism#!. It is also known as the #E Tipitaka#!, meaning the Three Baskets. We should translate these to #E Persian#! and #E Perisify#! concepts so that it can be better understood by our people.\n\n\n\n\n\n\n\n\n\n@persia_mil4!"  #<Der #E Pali Canon#! ist die maßgebliche Sammlung von Schriften für den #E Theravada-Buddhismus#!. Es ist auch als #E Tipitaka#! bekannt, was „Drei Körbe“ bedeutet. Wir sollten diese in die Konzepte #E Persisch#! und #E Perisifizieren#! übersetzen, damit es von unserem Volk besser verstanden werden kann.\n\n\n\n\n\n\n\n\n\n@persia_mil4!>  #NT!
 parthia_missions_126: "The Buddhist Calendar"  #<Der buddhistische Kalender>  #NT!
 parthia_missions_126_DESC: "Introducing the #Y Buddhist Calendar#! will be difficult. The people of #E Iran#! use many calendars, most prominent of which is the #Y Zoroastrian Calendar#!, and also prominent, the #Y Macedonian Calendar#!. However, in order to better reflect our state's values, we should adopt the #Y Buddhist Calendar#! instead.\n\n\n\n\n\n\n\n\n\n@india_mil6!"  #<Die Einführung des #Y buddhistischen Kalenders#! wird schwierig sein. Die Menschen im #E Iran#! verwenden viele Kalender, der bekannteste davon ist der #Y zoroastrische Kalender#! und auch der #Y mazedonische Kalender#!. Um jedoch die Werte unseres Staates besser widerzuspiegeln, sollten wir stattdessen den #Y buddhistischen Kalender#! übernehmen.\n\n\n\n\n\n\n\n\n\n@india_mil6!>  #NT!
 parthia_missions_127: "The Great Fire Stupa"  #<Der Große Feuer-Stupa>  #NT!
 parthia_missions_127_DESC: "The city of #Y Hagmatana#! is home to a wonderous #R Fire Temple#!, one that stretches back to the time of the #Y Medians#!, and built upon by the #E Achaemenids#!. We should utalize the temple and transform it for use as a #Y Stupa#!.\n\n\n\n\n\n\n\n\n\n@india_mil2!"  #<Die Stadt #Y Hagmatana#! beherbergt einen wunderbaren #R Feuertempel#!, der bis in die Zeit der #Y Medianer#! zurückreicht und auf dem die #E Achämeniden#! bauten. Wir sollten den Tempel nutzen und ihn für die Nutzung als #Y Stupa#! umbauen.\n\n\n\n\n\n\n\n\n\n@india_mil2!>  #NT!
 parthia_missions_128: "Debate The Magi"  #<Debatte über die Magier>  #NT!
 parthia_missions_128_DESC: "The powerful #E Magi#! class is a force to be not to be reckoned with... however reckon we must. They stand as the ultimate barrier towards the conversion to a #E Buddhist#! priestly class, and in traditional #E Shramanic#! tradition, the best way to deal with them is ideological debates.\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Die mächtige Klasse #E Magi#! ist eine Macht, mit der man nicht rechnen muss ... wie auch immer wir rechnen müssen. Sie stellen das ultimative Hindernis für den Übergang zu einer #E buddhistischen#! Priesterklasse dar, und in der traditionellen #E schramanischen#! Tradition ist der beste Weg, mit ihnen umzugehen, ideologische Debatten.\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
 parthia_missions_129: "The Mahayana Mithra"  #<Die Mahayana-Mithra>  #NT!
 parthia_missions_129_DESC: "While we have generally adopted the ways of #E Theravada#!, we notice many of our subjects have adopted ideologies closer to #E Mahayana#!. We believe this is due to the reverence of #Y Mithra#! still prominent throughout the noble families of our great state. The god of light especially seems to resonate with the idea of #E Bodhisattva#!, the ideal that #E Mahayana#! says is achievable by all. #Y Mithra#! is considered, by this new cult, to have #E delayed his own Nirvana#! in order to help others.\n\n\n\n\n\n\n\n\n\n@india_mil11!"  #<Während wir im Allgemeinen die Wege des #E Theravada#!, übernommen haben, stellen wir fest, dass viele unserer Untertanen Ideologien übernommen haben, die näher am #E Mahayana#!. liegen. Wir glauben, dass dies auf die Verehrung von #Y Mithra#! zurückzuführen ist, die in den Adelsfamilien unseres großen Staates noch immer vorherrschend ist. Der Gott des Lichts scheint besonders mit der Idee des #E Bodhisattva#!, im Einklang zu stehen, dem Ideal, das laut #E Mahayana#! für alle erreichbar ist. #Y Mithra#! wird von diesem neuen Kult als jemand angesehen, der #E sein eigenes Nirvana#! verzögert hat, um anderen zu helfen.\n\n\n\n\n\n\n\n\n\n@india_mil11!>  #NT!
 parthia_missions_130: "Imbued With Khvarenah"  #<Durchdrungen von Khvarenah>  #NT!
 parthia_missions_130_DESC: "$parthia_missions_92_DESC$"  #<$parthia_missions_92_DESC$>  #NT!
 parthia_missions_131: "Molded To Be Cakravartin"  #<Zu Cakravartin geformt>  #NT!
 parthia_missions_131_DESC: "To be Cakravartin is to be the Maharajadhiaraja, the Shahenshah, the ruler of the whole of the Universal Egg. To do this without having mastered basic concepts is impossible. Yet the steps have been made, and the ambition of Cakravartin is within reach.\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Cakravartin zu sein bedeutet, der Maharajadhiaraja, der Shahenshah, der Herrscher des gesamten Universellen Eies zu sein. Ohne die Beherrschung grundlegender Konzepte ist dies unmöglich. Doch die Schritte wurden getan und der Ehrgeiz von Cakravartin ist in greifbarer Nähe.\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
 parthia_missions_132: "Protectors Of The Buddha"  #<Beschützer des Buddha>  #NT!
 parthia_missions_132_DESC: "As [ROOT.GetCountry.GetRuler.GetName|E] works to master #Y Dhyana#!, the #G Greeks#! of the east have begun to arrive at the now legendary king's court. They give us their interpretations of #G Buddhism#!, including their belief in the so-called procetors of the #E Buddha#!.\n\n\n\n\n\n\n\n\n\n@greek_mil9!"  #<Während [ROOT.GetCountry.GetRuler.GetName|E] daran arbeitet, #Y Dhyana#!, zu meistern, haben die #G Griechen#! des Ostens begonnen, den mittlerweile legendären Königshof zu erreichen. Sie geben uns ihre Interpretationen des #G Buddhismus#!,, einschließlich ihres Glaubens an die sogenannten Beschützer des #E Buddha#!.\n\n\n\n\n\n\n\n\n\n@greek_mil9!>  #NT!
 parthia_missions_133: "Conversion Of Parthia"  #<Bekehrung Parthiens>  #NT!
 parthia_missions_133_DESC: "The time has finally come to officially proclaim #BOLD;COLOR:{0.98,0.93,0.51} Buddhism#! the faith of our kingdom. The legends of [ROOT.GetCountry.GetRuler.GetName|E]'s conversion echo throughout the lands, and many nobles and peasants alike have adopted the teachings of the #E Buddha#!.\n\n\n\n\n\n\n\n\n\n@india_mil19!"  #<Es ist endlich an der Zeit, den #BOLD;COLOR:{0.98,0.93,0.51} Buddhismus#! offiziell zum Glauben unseres Königreichs zu verkünden. Die Legenden über die Bekehrung von [ROOT.GetCountry.GetRuler.GetName|E] hallen im ganzen Land wider, und viele Adlige und Bauern haben die Lehren des #E Buddha#! übernommen.\n\n\n\n\n\n\n\n\n\n@india_mil19!>  #NT!
 parthia_missions_134: "Buddhism Beyond"  #<Buddhismus jenseits>  #NT!
 parthia_missions_134_DESC: "TODO; THIS IS CUT FOR NOW"  #<TODO; Dies ist vorerst gekürzt>  #NT!
 parthia_missions_135: "Enlightenment"  #<Aufklärung>  #NT!
 parthia_missions_135_DESC: "#G Samadhi#! is a deep state of meditative concentration where the mind becomes perfectly unified, calm, and focused, free from distraction. As [ROOT.GetCountry.GetRuler.GetName|E] masters it, many believe he may achieve a special form of #T Nirvana#! known as #T Sopadhishesa Nirvana#!.\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<#G Samadhi#! ist ein tiefer Zustand meditativer Konzentration, in dem der Geist vollkommen geeint, ruhig und konzentriert wird, frei von Ablenkung. Da [ROOT.GetCountry.GetRuler.GetName|E] es ​​meistert, glauben viele, dass er eine besondere Form von #T Nirvana#! erreichen könnte, bekannt als #T Sopadhishesa Nirvana#!.\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
 awakened_nick: "the Awakened"  #<der Erwachte>  #NT!
