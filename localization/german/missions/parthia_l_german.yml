 pth_sword: "Parthian Bow"  #<Parthischer Bogen>  #NT!
 pth_sword_desc: "A large, ceremonial bow that was constructed using traditional Parthian tribal techniques, this weapon is said to inspire a martial spirit in those that observe it."  #<Diese Waffe ist ein großer, zeremonieller Bogen, der nach traditionellen parthischen Stammestechniken hergestellt wurde. Sie soll bei denen, die sie beobachten, einen kriegerischen Geist wecken.>  #NT!
 pth_crown: "Parthian Crown"  #<Parthische Krone>  #NT!
 pth_crown_desc: "Made of solid gold and inlaid with precious gemstones, the Parthian Crown is a visible symbol of the reigning Xsayathiya."  #<Die aus massivem Gold gefertigte und mit Edelsteinen eingelegte Partherkrone ist ein sichtbares Symbol der regierenden Xsayathiya.>  #NT!
 pth_throne: "Parthian Throne"  #<Partherthron>  #NT!
 pth_throne_desc: "A throne hewn from a solid block of marble with fanciful designs of heavy cavalry carved into it, the Parthian Throne inspires awe in all that witness it."  #<Der Partherthron ist ein aus einem massiven Marmorblock gehauener Thron, in den fantasievolle Motive schwerer Kavallerie eingraviert sind. Er erweckt bei allen, die ihn sehen, Ehrfurcht.>  #NT!
 tarim_relict: "The Years and Days"  #<Die Jahre und Tage>  #NT!
 tarim_relict_desc: "This philosophical treatise, written by Parado of Kuche, is a brilliant but rambling scientific text that discusses a theorem on the nature of time, as well as an imagined history of the Asian coast."  #<Diese philosophische Abhandlung von Parado von Kuche ist ein brillanter, aber weitschweifiger wissenschaftlicher Text, der einen Satz über die Natur der Zeit sowie eine imaginäre Geschichte der asiatischen Küste erörtert.>  #NT!
 chang_relict: "Terracotta Warrior Statue"  #<Terrakotta-Kriegerstatue>  #NT!
 chang_relict_desc: "This painted terracotta statue of a warrior was stolen from Chang'an by a Parthian trade expedition."  #<Diese bemalte Terrakottastatue eines Kriegers wurde von einer parthischen Handelsexpedition aus Chang'an gestohlen.>  #NT!
