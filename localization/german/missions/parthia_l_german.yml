 # Decisions 
 parthia_door_maker: "Construct Der-e Mehr"  #<Konstruieren Sie Der-e Mehr>  #NT!
 parthia_door_maker_desc: "Builds a Der-e Mehr, a Door of Mithra, the Parthian term for a Fire Temple. This will give the city that recieves the temple many benefits, including the blessings of Ahuramazda and Mithra."  #<Baut ein Der-e Mehr, eine Tür von Mithra, der parthischen Bezeichnung für einen Feuertempel. Dies wird der Stadt, die den Tempel erhält, viele Vorteile bringen, einschließlich der Segnungen von Ahuramazda und Mithra.>  #NT!
 parthia_pillar_maker: "Construct Pillar of Light"  #<Konstruiere eine Säule des Lichts>  #NT!
 parthia_pillar_maker_desc: "Builds a Pillar of Light, a Hellenized version of a Fire Temple. This will give the city that recieves the temple many benefits, including the blessing of Apollo-Mithras."  #<Baut eine Lichtsäule, eine hellenisierte Version eines Feuertempels. Dies wird der Stadt, die den Tempel erhält, viele Vorteile bringen, einschließlich des Segens von Apollo-Mithras.>  #NT!
  
