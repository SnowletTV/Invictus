 me_parthia.4.a.tt: "(Currently: #Y [SCOPE.ScriptValue('parthia_battles_won_svalue')]#!)"  #<(Derzeit: #Y [SCOPE.ScriptValue('parthia_battles_won_svalue')]#!)>  #NT!
 # me_parthia.4.a.tt: "(Currently: #Y [SCOPE.ScriptValue('parthia_centr_gov_dude')]#!)"  #<(Derzeit: #Y [SCOPE.ScriptValue('parthia_centr_gov_dude')]#!)>  #NT!
  # [SCOPE.ScriptValue('parthia_12_marches')|0Y] 
  
 me_parthia.1.t: "Parthian Connections - Gifts"  #<Parthische Verbindungen – Geschenke>  #NT!
 me_parthia.1.desc: "Our efforts to sway [GetCountry('PAR').GetRuler.GetName], the [GetCountry('PAR').GetRulerTitle] of [GetCountry('PAR').GetName], are being discussed between [ROOT.GetCountry.GetRuler.GetName] and two of [ROOT.GetCountry.GetRuler.GetHerHis] most senior advisors, [SCOPE.sCharacter('peaceful_politician_dahae').GetName] and [SCOPE.sCharacter('warlike_politician_dahae').GetName], but the three warriors have been unable to reach a consensus on the best way to accomplish our goal.\n\n[SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] has suggested that we send a healthy donation to the Parthians in hopes of buying their allegiance, whereas [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] has dismissed this approach as cowardly, demanding that we fight the [GetCountry('SEL').GetName] for what it is that we desire.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] has a decision to make, well aware that no matter what [ROOT.GetCountry.GetRuler.GetSheHe] decides, there will be angry feelings to contend with."  #<Unsere Bemühungen, [GetCountry('PAR').GetRuler.GetName], den [GetCountry('PAR').GetRulerTitle] von [GetCountry('PAR').GetName], zu beeinflussen, werden zwischen [ROOT.GetCountry.GetRuler.GetName] und zwei der ranghöchsten Berater von [ROOT.GetCountry.GetRuler.GetHerHis], [SCOPE.sCharacter('peaceful_politician_dahae').GetName] und [SCOPE.sCharacter('warlike_politician_dahae').GetName], diskutiert, aber die drei Krieger konnten sich nicht darauf einigen, wie wir unser Ziel am besten erreichen können.\n\n[SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] hat vorgeschlagen, dass wir den Parthern eine beträchtliche Spende schicken, in der Hoffnung, sie zu kaufen Loyalität, wohingegen [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] diesen Ansatz als feige abgetan hat und verlangt, dass wir gegen die [GetCountry('SEL').GetName] für das kämpfen, was wir uns wünschen.\n\n[GetCountry('PAR').GetRulerTitle]0 muss eine Entscheidung treffen, wohl wissend, dass es, egal was [GetCountry('PAR').GetRulerTitle]1 entscheidet, mit wütenden Gefühlen zu kämpfen haben wird.>  #NT!
 me_parthia.1.a: "We will pursue the belligerent policies of [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName]"  #<Wir werden die kriegerische Politik von [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] verfolgen>  #NT!
 me_parthia.1.b: "[SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] is wise - send a bribe to [GetCountry('PAR').GetCapital.GetName] "  #<[SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] ist klug – schicke ein Bestechungsgeld an [GetCountry('PAR').GetCapital.GetName]>  #NT!
  
 me_parthia.2.t: "Parthian Connections - Political Support"  #<Parthische Verbindungen – Politische Unterstützung>  #NT!
 me_parthia.2.desc: "The debate involving [GetCountry('PAR').GetName] continues, and a fresh argument has threatened the peace once again.\n\n[SCOPE.sCharacter('peaceful_politician_dahae').GetName] believes that we should offer the Parthians political support, claiming that this will place them in our debt, but this has evoked an angry response from [SCOPE.sCharacter('warlike_politician_dahae').GetName]. [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] argues that we can ill afford to waste our precious resources, and that if [GetCountry('PAR').GetRuler.GetName] is foolish enough to reject the golden opportunity that we have presented, then we should have nothing to do with [GetCountry('PAR').GetRuler.GetHerHim]."  #<Die Debatte um [GetCountry('PAR').GetName] geht weiter und ein neuer Streit hat den Frieden erneut bedroht.\n\n[SCOPE.sCharacter('peaceful_politician_dahae').GetName] glaubt, dass wir den Parthern politische Unterstützung anbieten sollten, und behauptet, dass sie dadurch in unsere Schuld geraten würden, aber das hat eine wütende Reaktion von [SCOPE.sCharacter('warlike_politician_dahae').GetName] hervorgerufen. [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] argumentiert, dass wir es uns kaum leisten können, unsere kostbaren Ressourcen zu verschwenden, und dass, wenn [GetCountry('PAR').GetRuler.GetName] dumm genug ist, die von uns präsentierte goldene Gelegenheit abzulehnen, wir nichts mit [GetCountry('PAR').GetRuler.GetHerHim] zu tun haben sollten.>  #NT!
 me_parthia.2.a: "[SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] is right; we cannot afford this right now"  #<[SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] ist richtig; Das können wir uns im Moment nicht leisten>  #NT!
 me_parthia.2.b: "Listen to [SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] and do what [SCOPE.sCharacter('peaceful_politician_dahae').GetSheHe] suggests"  #<Hören Sie sich [SCOPE.sCharacter('peaceful_politician_dahae').GetFirstName] an und tun Sie, was [SCOPE.sCharacter('peaceful_politician_dahae').GetSheHe] vorschlägt>  #NT!
  
 me_parthia.3.t: "Parthian Connections - Military Support"  #<Parthische Verbindungen – Militärische Unterstützung>  #NT!
 me_parthia.3.desc: "Yesterday evening, [ROOT.GetCountry.GetRuler.GetName] received a letter from [GetCountry('PAR').GetRuler.GetName], the [GetCountry('PAR').GetRulerTitle] of [GetCountry('PAR').GetName] - it sounds as though the Parthians are intrigued by our offer and are considering it, but they are dealing with problems of their own and were wondering if we could help.\n\nIt seems that the [GetCountry('SEL').GetName] has garrisoned the Parthian capital of [GetCountry('PAR').GetCapital.GetName] with a cadre of loyal soldiers that answer to no one except the [GetCountry('SEL').GetRulerTitle] [GetCountry('SEL').GetRuler.GetName], and manpower will be needed to overpower these warriors before they can raise the alarm. If [ROOT.GetCountry.GetName] has the bodies to spare, then [GetCountry('PAR').GetRuler.GetFirstName] believes that we will succeed in our efforts.\n\nAs usual, there is no consensus among the Council. [SCOPE.sCharacter('peaceful_politician_dahae').GetName] has urged to do whatever [GetCountry('PAR').GetRuler.GetFirstName] asks, whereas the suspicious [SCOPE.sCharacter('warlike_politician_dahae').GetName] believes this is a Seleukid ploy to weaken our own reserves."  #<Gestern Abend erhielt [ROOT.GetCountry.GetRuler.GetName] einen Brief von [GetCountry('PAR').GetRuler.GetName], dem [GetCountry('PAR').GetRulerTitle] von [GetCountry('PAR').GetName] – es klingt, als wären die Parther von unserem Angebot fasziniert und würden darüber nachdenken, aber sie beschäftigen sich mit ihren eigenen Problemen und fragen sich, ob wir helfen könnten.\n\nEs scheint, dass die [GetCountry('SEL').GetName] die parthische Hauptstadt von [GetCountry('PAR').GetCapital.GetName] mit einem Kader loyaler Soldaten besetzt haben, die ihnen antworten Niemand außer den [GetCountry('SEL').GetRulerTitle] [GetCountry('SEL').GetRuler.GetName], und es werden Arbeitskräfte benötigt, um diese Krieger zu überwältigen, bevor sie Alarm schlagen können. Wenn [ROOT.GetCountry.GetName] über genügend Körper verfügt, dann glaubt [GetCountry('PAR').GetRuler.GetFirstName], dass wir mit unseren Bemühungen Erfolg haben werden.\n\nWie üblich gibt es im Rat keinen Konsens. [GetCountry('PAR').GetRuler.GetName]0 hat dazu gedrängt, alles zu tun, was [GetCountry('PAR').GetRuler.GetFirstName] verlangt, während der misstrauische [GetCountry('PAR').GetRuler.GetName]2 glaubt, dass dies ein Trick der Seleukiden ist, um unsere eigenen Reserven zu schwächen.>  #NT!
 me_parthia.3.a: "I agree with [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] - this sounds too dangerous"  #<Ich stimme [SCOPE.sCharacter('warlike_politician_dahae').GetFirstName] zu – das klingt zu gefährlich>  #NT!
 me_parthia.3.b: "'In for a penny, in for a pound'...we have to send soldiers"  #<„Für einen Penny, für ein Pfund“ ... wir müssen Soldaten schicken>  #NT!
  
 me_parthia.4.t: "Parthian Connections - Coming to a Conclusion"  #<Parthische Verbindungen – Zu einem Abschluss kommen>  #NT!
 me_parthia.4.desc: "[ROOT.GetCountry.GetRuler.GetName] has done everything that [ROOT.GetCountry.GetRuler.GetSheHe] was willing to do, and now everything is in the hands of [GetCountry('PAR').GetRuler.GetName]. It remains to be seen if the Parthians are cowards or not..."  #<[ROOT.GetCountry.GetRuler.GetName] hat alles getan, wozu [ROOT.GetCountry.GetRuler.GetSheHe] bereit war, und jetzt liegt alles in den Händen von [GetCountry('PAR').GetRuler.GetName]. Es bleibt abzuwarten, ob die Parther Feiglinge sind oder nicht ...>  #NT!
 me_parthia.4.a: "[GetCountry('PAR').GetRuler.GetFirstName], I hope you do the right thing!"  #<[GetCountry('PAR').GetRuler.GetFirstName], ich hoffe du machst das Richtige!>  #NT!
 me_parthia.4.b: "DEBUG"  #<DEBUGGEN>  #NT!
 me_parthia.4.c: "DEBUG"  #<DEBUGGEN>  #NT!
 # me_parthia.4.tt1: ""
  
 me_parthia.4000.t: "Loyalty Question"  #<Treuefrage>  #NT!
 me_parthia.4000.desc: "My [ROOT.GetCountry.GetRulerTitle], we have received an embassy from the north; it appears that the steppe hordes are willing to support our independence against the [GetCountry('SEL').GetName] if we chose to break free.\n\nWe might not ever receive another opportunity like this one, but there are certainly dangers that we must be consider - what should we tell the horselords?"  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben eine Botschaft aus dem Norden erhalten; Es scheint, dass die Steppenhorden bereit sind, unsere Unabhängigkeit gegen die [GetCountry('SEL').GetName] zu unterstützen, wenn wir uns befreien würden.\n\nWir werden vielleicht nie wieder eine Gelegenheit wie diese erhalten, aber es gibt sicherlich Gefahren, die wir berücksichtigen müssen – was sollten wir den Pferdeherren sagen?>  #NT!
 me_parthia.4000.a: "The time has come for [ROOT.GetCountry.GetName] to be free!"  #<Es ist an der Zeit, dass [ROOT.GetCountry.GetName] kostenlos ist!>  #NT!
 me_parthia.4000.b: "We will remain loyal to [ROOT.GetCountry.GetOverlord.GetName]"  #<Wir bleiben [ROOT.GetCountry.GetOverlord.GetName] treu>  #NT!
 me_parthia.4000.tt1: "This can leave us vulnerable to our northern neighbors and retaliation from former overlord!"  #<Dies kann uns anfällig für unsere nördlichen Nachbarn und Vergeltungsmaßnahmen des ehemaligen Oberherrn machen!>  #NT!
 # me_parthia.4000.tt2: ""
  
 me_parthia.4001.t: "Parthian Connections - Result"  #<Parthische Verbindungen - Ergebnis>  #NT!
 me_parthia.4001.desc: "Exciting news has reached [ROOT.GetCountry.GetCapital.GetName] - [GetCountry('PAR').GetRuler.GetName], the [GetCountry('PAR').GetRulerTitle] of [GetCountry('PAR').GetName], has expelled the #E Seleukid#! garrison from [GetCountry('PAR').GetCapital.GetName] and has declared independence! Our efforts to persuade the Parthians has paid off!"  #<Aufregende Neuigkeiten haben [ROOT.GetCountry.GetCapital.GetName] - [GetCountry('PAR').GetRuler.GetName] erreicht, der [GetCountry('PAR').GetRulerTitle] von [GetCountry('PAR').GetName] hat die Garnison #E Seleukid#! aus [GetCountry('PAR').GetCapital.GetName] vertrieben und die Unabhängigkeit erklärt! Unsere Bemühungen, die Parther zu überzeugen, haben sich gelohnt!>  #NT!
 me_parthia.4001.a: "This is incredible news!"  #<Das sind unglaubliche Neuigkeiten!>  #NT!
 me_parthia.4001.a.tt: "#Y Our designs on Parthia can continue...#!"  #<#Y Unsere Designs auf Parthia können weitergehen...#!>  #NT!
 parthia_satrapy_declares_independence_tt: "[GetCountry('PAR').GetName|Y] has declared independence from the [GetCountry('SEL').GetName|R]."  #<[GetCountry('PAR').GetName|Y] hat die Unabhängigkeit von [GetCountry('SEL').GetName|R] erklärt.>  #NT!
  
 me_parthia.4002.t: "Betrayal in the North!"  #<Verrat im Norden!>  #NT!
 me_parthia.4002.desc: "[ROOT.GetCountry.GetRuler.GetName], we bring terrible news from the north. Our satrap, [GetCountry('PAR').GetRuler.GetName], the [GetCountry('PAR').GetRulerTitle] of [GetCountry('PAR').GetName], has declared [GetCountry('PAR').GetRuler.GetHerHis] independence from the [ROOT.GetCountry.GetName].\n\nThe traitor [GetCountry('PAR').GetRuler.GetFirstName] was encouraged in this foolish endeavor by [GetProvince('(int32)6657').GetOwner.GetRuler.GetName], a barbarian dog that has united the steppe tribes into a formidable horde. We must keep an eye on our northern border, for a combined force of #E Parthians#! and #E Dahae#! represent a real threat."  #<[ROOT.GetCountry.GetRuler.GetName], wir bringen schreckliche Nachrichten aus dem Norden. Unser Satrap, [GetCountry('PAR').GetRuler.GetName], der [GetCountry('PAR').GetRulerTitle] von [GetCountry('PAR').GetName], hat [GetCountry('PAR').GetRuler.GetHerHis] für seine Unabhängigkeit von [ROOT.GetCountry.GetName] erklärt.\n\nDer Verräter [GetCountry('PAR').GetRuler.GetFirstName] wurde in diesem törichten Unterfangen von [GetProvince('(int32)6657').GetOwner.GetRuler.GetName] ermutigt, einem Barbarenhund, der die Steppenstämme zu einer gewaltigen Horde vereint hat. Wir müssen unsere Nordgrenze im Auge behalten, denn eine vereinte Streitmacht aus #E Parthern#! und #E Dahae#! stellt eine echte Bedrohung dar.>  #NT!
 me_parthia.4002.a: "I must do something about this!"  #<Ich muss etwas dagegen tun!>  #NT!
 me_parthia.4002.a.tt: "We will get claims on all [GetCountry('PAR').GetAdjective] land."  #<Wir werden Ansprüche auf alle [GetCountry('PAR').GetAdjective] Grundstücke erhalten.>  #NT!
  
 me_parthia.4003.t: "Parthian Connections - Result"  #<Parthische Verbindungen - Ergebnis>  #NT!
 me_parthia.4003.desc: "Despite our best efforts to persuade them to our cause, the #E Parthians#! have rejected our proposal in a brutal and terrible way. The agents of [ROOT.GetCountry.GetRuler.GetName] that traveled between [ROOT.GetCountry.GetCapital.GetName] and [GetCountry('PAR').GetCapital.GetName] were all arrested by #E Seleukid#! soldiers, who summarily executed our diplomats on the spot for being spies.\n\nWhile there is reason to suspect that [GetCountry('PAR').GetRuler.GetName] is the one who betrayed us, there is no way to prove anything."  #<Trotz unserer besten Bemühungen, sie von unserer Sache zu überzeugen, haben die #E Parther#! unseren Vorschlag auf brutale und schreckliche Weise abgelehnt. Die Agenten von [ROOT.GetCountry.GetRuler.GetName], die zwischen [ROOT.GetCountry.GetCapital.GetName] und [GetCountry('PAR').GetCapital.GetName] reisten, wurden alle von #E seleukidischen#!-Soldaten festgenommen, die unsere Diplomaten sofort hinrichten ließen, weil sie Spione waren.\n\nObwohl es Grund zu der Annahme gibt, dass [GetCountry('PAR').GetRuler.GetName] derjenige ist, der uns verraten hat, gibt es keine Möglichkeit, etwas zu beweisen.>  #NT!
 me_parthia.4003.a: "What a tragedy! I will do something about this!"  #<Was für eine Tragödie! Ich werde etwas dagegen tun!>  #NT!
 me_parthia.4003.a.tt: "We will get claims on all [GetCountry('PAR').GetAdjective] land."  #<Wir werden Ansprüche auf alle [GetCountry('PAR').GetAdjective] Grundstücke erhalten.>  #NT!
  
 me_parthia.5.t: "Bactrian Skirmish - Start"  #<Baktrisches Scharmützel – Beginn>  #NT!
 me_parthia.5.desc: "If [ROOT.GetCountry.GetRuler.GetName] was hoping that a well-placed insult would be enough to raise the ire of the finicky [GetCountry('BAC').GetRuler.GetName], then [ROOT.GetCountry.GetRuler.GetSheHe] was successful beyond [ROOT.GetCountry.GetRuler.GetHerHis] wildest dreams. [GetCountry('BAC').GetRuler.GetFirstName], an old goat that is known for being dour and humorless, decided that our diplomatic offense merited a full-scale war and called for the Bactrian levies to march for the walls of [ROOT.GetCountry.GetCapital.GetName].\n\n[ROOT.GetCountry.GetRuler.GetFirstName] has other plans, however, and has sworn to seize lands from the Bactrians."  #<Wenn [ROOT.GetCountry.GetRuler.GetName] gehofft hatte, dass eine gut platzierte Beleidigung ausreichen würde, um den Zorn des pingeligen [GetCountry('BAC').GetRuler.GetName] zu wecken, dann war [ROOT.GetCountry.GetRuler.GetSheHe] erfolgreicher als [ROOT.GetCountry.GetRuler.GetHerHis] in den wildesten Träumen. [GetCountry('BAC').GetRuler.GetFirstName], ein alter Ziegenbock, der dafür bekannt ist, mürrisch und humorlos zu sein, entschied, dass unsere diplomatische Offensive einen umfassenden Krieg verdiente, und forderte die baktrischen Truppen auf, gegen die Mauern von [ROOT.GetCountry.GetCapital.GetName] zu marschieren.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] hat jedoch andere Pläne und hat geschworen, den Baktriern Land zu entreißen.>  #NT!
 me_parthia.5.a: "We ride for [GetProvince('(int32)6668').GetName]!"  #<Wir fahren für [GetProvince('(int32)6668').GetName]!>  #NT!
 me_parthia.5.a.tt: "If at the end of the duration of this task we hold [GetProvince('(int32)6668').GetName|T], the surrounding area shall become ours."  #<Wenn wir am Ende der Dauer dieser Aufgabe [GetProvince('(int32)6668').GetName|T] halten, wird die Umgebung zu unserem Eigentum.>  #NT!
  
 me_parthia.6.t: "Bactrian Skirmish - Result"  #<Baktrisches Scharmützel – Ergebnis>  #NT!
 me_parthia.6.desc: "The conflict between [ROOT.GetCountry.GetName] and [GetCountry('BAC').GetName] ended just as quickly as it began, for disturbances in the east distracted [GetCountry('BAC').GetRuler.GetName] and the [GetCountry('BAC').GetRulerTitle] was eager to call for peace. After careful consultations with [ROOT.GetCountry.GetRuler.GetHerHis] leading generals, [ROOT.GetCountry.GetRuler.GetName] agreed to the terms that were offered and ordered the levies to return home."  #<Der Konflikt zwischen [ROOT.GetCountry.GetName] und [GetCountry('BAC').GetName] endete genauso schnell, wie er begonnen hatte, denn Unruhen im Osten lenkten [GetCountry('BAC').GetRuler.GetName] ab und [GetCountry('BAC').GetRulerTitle] war bestrebt, zum Frieden aufzurufen. Nach sorgfältigen Beratungen mit [ROOT.GetCountry.GetRuler.GetHerHis] führenden Generälen stimmte [ROOT.GetCountry.GetRuler.GetName] den angebotenen Bedingungen zu und ordnete die Rückkehr der Truppen nach Hause an.>  #NT!
 me_parthia.6.a: "The gods ride alongside [ROOT.GetCountry.GetRuler.GetName] into battle!"  #<Die Götter reiten an der Seite von [ROOT.GetCountry.GetRuler.GetName] in die Schlacht!>  #NT!
 me_parthia.6.a.tt: "We will retain hold of the border territories."  #<Wir werden die Grenzgebiete behalten.>  #NT!
 me_parthia.6.b: "It seems we were not successful..."  #<Es scheint, dass uns das nicht gelungen ist...>  #NT!
 me_parthia.6.b.tt: "We have failed to exert control over [GetProvince('(int32)6668').GetArea.GetName|T]."  #<Es ist uns nicht gelungen, die Kontrolle über [GetProvince('(int32)6668').GetArea.GetName|T] auszuüben.>  #NT!
  
 me_parthia.7.t: "Take Over Parthia"  #<Übernimm Parthien>  #NT!
 me_parthia.7.desc: "It was a bittersweet moment for many of our kinsmen when they were forced to abandon their traditional homelands for the newly-conquered lands once ruled by the #E [GetCountry('PAR').GetName]ns#!, but they had no choice; the conqueror [ROOT.GetCountry.GetRuler.GetName] had decreed that it must be done, and there was no one that could oppose [ROOT.GetCountry.GetRuler.GetHerHis] will.\n\nFor weeks, careful plans were drawn up and considered within the royal chambers at [ROOT.GetCountry.GetCapital.GetName], and after long hours filled with endless deliberation, the vision of the [ROOT.GetCountry.GetRulerTitle] began to take shape.\n\nThe northern steppe territories would be abandoned - let our allies fight amongst themselves for scraps on the endless plains, for the [ROOT.GetCountry.GetAdjective]s were moving south. Our tribal cousins would hold the hinterlands for us, ensuring that everything stays calm for us."  #<Es war ein bittersüßer Moment für viele unserer Verwandten, als sie gezwungen wurden, ihre traditionellen Heimatländer aufzugeben und in die neu eroberten Länder zu ziehen, die einst von den #E [GetCountry('PAR').GetName]ns#!, regiert wurden, aber sie hatten keine andere Wahl; Der Eroberer [ROOT.GetCountry.GetRuler.GetName] hatte beschlossen, dass es geschehen musste, und es gab niemanden, der sich dem Willen von [ROOT.GetCountry.GetRuler.GetHerHis] widersetzen konnte.\n\nWochenlang wurden in den königlichen Gemächern von [ROOT.GetCountry.GetCapital.GetName] sorgfältige Pläne ausgearbeitet und erörtert, und nach langen Stunden voller endloser Überlegungen begann die Vision von [ROOT.GetCountry.GetRulerTitle] Gestalt anzunehmen.\n\nDie nördlichen Steppengebiete würden aufgegeben – lasst unsere Verbündeten untereinander um Fetzen auf dem Endlosen kämpfen Ebenen, denn die [ROOT.GetCountry.GetAdjective] bewegten sich nach Süden. Unsere Stammesverwandten würden das Hinterland für uns behalten und dafür sorgen, dass für uns alles ruhig bleibt.>  #NT!
 me_parthia.7.a: "New opportunities await those bold enough to seize them!"  #<Neue Chancen warten auf diejenigen, die mutig genug sind, sie zu ergreifen!>  #NT!
 me_parthia.7.a.tt: "We will settle in #G Parthia#! alongside most of our brethren.\nA #G Dahae#! tribal vassal will secure our northern flank.\nAreas further north shall be lost..."  #<Wir werden uns zusammen mit den meisten unserer Brüder in #G Parthia#! niederlassen.\nEin #G Dahae#! Stammesvasall wird unsere Nordflanke sichern.\nGebiete weiter nördlich werden verloren gehen ...>  #NT!
  
 me_parthia.8.t: "Found Arshak"  #<Arshak gefunden>  #NT!
 me_parthia.8.desc: "Few honours can befall a city as big as being founded by royal initiative. As such, when [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName] granted [GetProvince('(int32)6656').GetName] his approval and the namesake of our dynasty, people from all over were quick to come, and what were some empty rolling hills now feature a proper city, with palaced, pavemented streets, an eternal fire, and all the luxuries we could possibly furnish our city with."  #<Nur wenige Ehrungen können einer so großen Stadt widerfahren wie die Gründung durch königliche Initiative. Als [ROOT.GetCountry.GetRulerTitle] [ROOT.GetCountry.GetRuler.GetName] [GetProvince('(int32)6656').GetName] seine Zustimmung und den Namensgeber unserer Dynastie gewährte, kamen schnell Menschen von überall her, und auf den ehemals leeren sanften Hügeln entstand nun eine richtige Stadt mit palästinensischen, gepflasterten Straßen, einem ewigen Feuer und all dem Luxus, mit dem wir unsere Stadt nur ausstatten könnten.>  #NT!
 me_parthia.8.a: "Moving our court there is the only logical choice."  #<Die Verlegung unseres Gerichts dorthin ist die einzig logische Wahl.>  #NT!
 me_parthia.8.b: "Our current capital shall suffice."  #<Unser derzeitiges Kapital wird ausreichen.>  #NT!
 me_parthia.8.b.tt: "We have completed the task!"  #<Wir haben die Aufgabe erledigt!>  #NT!
  
 me_parthia.9.t: "A Chance To Strike!"  #<Eine Chance zum Zuschlagen!>  #NT!
 me_parthia.9.desc: "The chance, bare before us. The prize, naked in its weakness. The moment seems to have already been chosen, the only agency we have is to decide how we wish to destroy - a meager option in such a glorious crime.\n\nA war of this magnitude resting on the whims of the few men in the main tent of the camp near [ROOT.GetCountry.GetCapital.GetName] would make them all mad. This is the work of spirits, inspiring the mortal man onwards, the expression of the infinities of the skies on the few planes of existence we comprehend.\n\n'So, we ride south', said some man, and all the hooves thundered on there. The eye sees some already dying, rotting away, and others laden with riches and plunder. This will be a war for the ages."  #<Die Chance, nackt vor uns. Der Preis, nackt in seiner Schwäche. Der Zeitpunkt scheint bereits gewählt, die einzige Entscheidungsfreiheit, die wir haben, besteht darin, zu entscheiden, wie wir zerstören wollen – eine dürftige Option bei solch einem glorreichen Verbrechen.\n\nEin Krieg dieser Größenordnung, der auf den Launen der wenigen Männer im Hauptzelt des Lagers in der Nähe von [ROOT.GetCountry.GetCapital.GetName] beruht, würde sie alle verrückt machen. Dies ist das Werk von Geistern, die den sterblichen Menschen weiter inspirieren, der Ausdruck der Unendlichkeit des Himmels auf den wenigen Ebenen der Existenz, die wir verstehen.\n\n„Also reiten wir nach Süden“, sagte ein Mann, und alle Hufe donnerten dort. Das Auge sieht einige, die bereits sterben und verfaulen, und andere, die mit Reichtümern und Plünderungen beladen sind. Das wird ein Krieg für die Ewigkeit sein.>  #NT!
 me_parthia.9.a: "Move in for the kill!"  #<Gehen Sie zum Töten vor!>  #NT!
 me_parthia.9.a.tt: "Declare war with #R Horde Conquest Casus Belli#! against [origin.GetName|R], which allows for directly taking territory on occupation.\nFully occupied [origin.GetAdjective] subjects can request to become our #G Marches#!.\n#E #Y Upon the war's conclusion#!#!, we will only be able to hold #E #R 3 Chosen Regions Directly#!#!; territory outside will always be released as #G March subjects#!.\n#G Our goal in subsequent missions will be to reign in Marches and centralize the Realm.#!"  #<Erklären Sie den Krieg mit #R Horde Conquest Casus Belli#! gegen [origin.GetName|R], was die direkte Einnahme von Territorium bei Besetzung ermöglicht.\nVoll besetzte [origin.GetAdjective] Untertanen können beantragen, unsere #G Märsche#! zu werden.\n#E #Y Nach Kriegsende#!#! können wir nur noch #E halten #R 3 direkt ausgewählte Regionen#!#!; Gebiete außerhalb werden immer als #G März-Untertanen#! freigegeben.\n#G Unser Ziel in nachfolgenden Missionen wird es sein, in den Marken zu herrschen und das Reich zu zentralisieren.#!>  #NT!
 me_parthia.9.b: "Let us conquer methodically."  #<Lasst uns methodisch siegen.>  #NT!
 me_parthia.9.b.tt: "#G Branching tasks will be changed to flavor tasks, concerning subsequent conquests of Iranian Plateau and Mesopotamia.#!"  #<#G Verzweigungsaufgaben werden in Flavour-Aufgaben geändert, die sich auf spätere Eroberungen des iranischen Plateaus und Mesopotamiens beziehen.#!>  #NT!
  
 me_parthia.10.t: "Parthia Attacks!"  #<Parthia-Angriffe!>  #NT!
 me_parthia.10.desc: "The #E Dahae#! tribes, now united in one and irreverent in nature, have set their drooling mouths and brutish intellects on our cities; riders come forth from the borderlands of [GetProvince('(int32)3435').GetArea.GetRegion.GetName], dusted and dying of thirst, heralding the horde of hooves, trampling the life out of every inch of soil they cover in their demonic race to reach our homes, all the while many in our lands throughout whisper of our weakness and pry on each of our mistakes.\n\nMany called them barbarians, but they have quickly shown that they have might of their own, and some of our generals meekly whisper, as to not be called treasonous, that it may be a life and death struggle for us. May the body butchered by the sword be theirs."  #<Die #E Dahae#!-Stämme, jetzt in einem vereint und von respektloser Natur, haben ihre sabbernden Münder und brutalen Intellekte auf unsere Städte gerichtet; Reiter kommen aus den Grenzgebieten von [GetProvince('(int32)3435').GetArea.GetRegion.GetName], staubbedeckt und verdurstend, kündigen die Horde von Hufen an und zertrampeln in ihrem dämonischen Rennen das Leben aus jedem Zentimeter des Bodens, den sie bedecken, um unsere Häuser zu erreichen, während viele in unseren Ländern überall von unserer Schwäche flüstern und jeden unserer Fehler ausspionieren.\n\nViele nannten sie Barbaren, aber sie haben schnell gezeigt, dass sie über eigene Macht und einige von uns verfügen Generäle flüstern sanftmütig, um nicht als Verrat bezeichnet zu werden, dass es für uns ein Kampf auf Leben und Tod sein könnte. Möge der vom Schwert abgeschlachtete Körper ihnen gehören.>  #NT!
 me_parthia.10.a: "Crush them!"  #<Zerschmettere sie!>  #NT!
  
 # me_parthia.10.a.tt: ""
 me_parthia.11.t: "A Consideration For Our Future"  #<Eine Überlegung für unsere Zukunft>  #NT!
 me_parthia.11.desc: "Yet again, the imperial machine in [GetCountry('SEL').GetCapital.GetName] finds itself in a new war, a new mindless slaughter with no clear motive for us, and while we don't care about it all we are forced to support their freakish will with our own blood. The truth is that if even before they could not control these vast lands directly, giving them to us (and we are thankful for this treasure), now we are stronger, and we still prostrate at their whim. Is it time for a change?"  #<Wieder einmal befindet sich die imperiale Maschine in [GetCountry('SEL').GetCapital.GetName] in einem neuen Krieg, einem neuen sinnlosen Gemetzel ohne klares Motiv für uns, und obwohl uns das alles egal ist, sind wir gezwungen, ihren verrückten Willen mit unserem eigenen Blut zu unterstützen. Die Wahrheit ist: Auch wenn sie diese riesigen Ländereien schon vorher nicht direkt kontrollieren und uns überlassen konnten (und wir sind dankbar für diesen Schatz), sind wir jetzt stärker und unterwerfen uns immer noch ihrer Laune. Ist es Zeit für eine Veränderung?>  #NT!
 me_parthia.11.a: "Out with the [GetCountry('SEL').GetName]!"  #<Raus mit der [GetCountry('SEL').GetName]!>  #NT!
 me_parthia.11.a.tt: "We will become independent and leave our Overlord's wars."  #<Wir werden unabhängig und verlassen die Kriege unseres Oberherrn.>  #NT!
 me_parthia.11.b: "Now's not the time."  #<Jetzt ist nicht der richtige Zeitpunkt.>  #NT!
 me_parthia.11.b.tt: "We will stay loyal to the [GetCountry('SEL').GetAdjective]s."  #<Wir werden den [GetCountry('SEL').GetAdjective]ern treu bleiben.>  #NT!
  
 me_parthia.12.t: "Bactrian Betrayal"  #<Baktrischer Verrat>  #NT!
 me_parthia.12.desc: "The lands with thousands of cities above are ruled by complete fools. For generations their peoples have submitted to Persian authority, of whom we are the natural continuation, and still [GetCountry('BAC').GetRuler.GetName] and his court of #COLOR:{0.51,0.31,0.75} Eromenoi#! have chosen to betray us for independence.\n\nIf we are to take back control of [GetCountry('BAC').GetName], we must quickly march on them, or they will have time to fortify."  #<Die Länder mit Tausenden von Städten darüber werden von völligen Narren regiert. Seit Generationen haben sich ihre Völker der persischen Autorität unterworfen, deren natürliche Fortsetzung wir sind, und dennoch haben [GetCountry('BAC').GetRuler.GetName] und sein Hof von #COLOR:{0.51,0.31,0.75} Eromenoi#! beschlossen, uns für die Unabhängigkeit zu verraten.\n\nWenn wir die Kontrolle über [GetCountry('BAC').GetName] zurückerobern wollen, müssen wir schnell gegen sie vorgehen, sonst haben sie Zeit, sich zu befestigen.>  #NT!
  
 me_parthia.13.t: "Parthian Hordes"  #<Parthische Horden>  #NT!
 me_parthia.13.desc: "Sensing a moment of weakness, the hordes of the [GetCountry('PTH').GetName] wastes have descended upon the [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] lands as a pack of wolves would savage a lamb.\n\nIn many northern cities of the [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] domain, such as [GetProvince('(int32)4997').GetName] and [GetProvince('(int32)4991').GetName], entire families are leaving in a hurry for the south, trying to hopefully get to safety, and tales of the savage horsemen who burn all and use skulls to feed their sadic armies are traveling fast. The [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] army is gathering in a desperate hurry to hopefully stop them."  #<Da sie einen Moment der Schwäche spüren, sind die Horden der [GetCountry('PTH').GetName]-Wüsten über die [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]-Länder hergefallen, wie ein Rudel Wölfe ein Lamm vernichten würde.\n\nIn vielen nördlichen Städten der [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]-Domäne, wie [GetProvince('(int32)4997').GetName] und [GetProvince('(int32)4991').GetName], brechen ganze Familien eilig in den Süden auf und versuchen, sich hoffentlich in Sicherheit zu bringen, und es gibt Geschichten über die wilden Reiter, die alles verbrennen und nutzen Schädel, um ihre sadistischen Armeen zu ernähren. Sie reisen schnell. Die [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]-Armee versammelt sich in verzweifelter Eile, um sie hoffentlich aufzuhalten.>  #NT!
 me_parthia.13.a: "Woe!"  #<Weh!>  #NT!
 me_parthia.13.a.tt: "Tough times are ahead for the [GetCountry('SEL').GetName]."  #<Dem [GetCountry('SEL').GetName] stehen schwere Zeiten bevor.>  #NT!
  
 me_parthia.14.t: "Away With The Macedonians"  #<Weg mit den Mazedoniern>  #NT!
 me_parthia.14.desc: "An excited bustle has electrified the air in [GetCountry('PRM').GetCapital.GetName], as many living there have heard the rumors that [GetCountry('PRM').GetRuler.GetName] is seriously considering doing away with the yoke of the [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#!.\n\nJust as the last petitioner is heard, [ROOT.GetCountry.GetRuler.GetName] looked to the left, to [ROOT.GetCountry.GetRuler.GetHerHis] children, and onwards to the doors exiting the room.\n\nThen, he got up and said,"  #<Ein aufgeregtes Treiben hat die Luft in [GetCountry('PRM').GetCapital.GetName] elektrisiert, da viele dort lebende Gerüchte gehört haben, dass [GetCountry('PRM').GetRuler.GetName] ernsthaft darüber nachdenkt, das Joch der [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#!.\n\nJust abzuschaffen, als der letzte Bittsteller gehört wurde, [ROOT.GetCountry.GetRuler.GetName] schaute nach links, zu [ROOT.GetCountry.GetRuler.GetHerHis] Kindern und weiter zu den Türen, die den Raum verlassen.\n\nDann stand er auf und sagte:>  #NT!
 me_parthia.14.a: "There will be no better chance to free our homes!"  #<Es wird keine bessere Chance geben, unsere Häuser zu befreien!>  #NT!
 me_parthia.14.a.tt: "We will become independent and leave our Overlord's wars."  #<Wir werden unabhängig und verlassen die Kriege unseres Oberherrn.>  #NT!
 me_parthia.14.b: "Now's not the time."  #<Jetzt ist nicht der richtige Zeitpunkt.>  #NT!
 me_parthia.14.b.tt: "We will stay loyal to the [GetCountry('SEL').GetAdjective]."  #<Wir werden dem [GetCountry('SEL').GetAdjective] treu bleiben.>  #NT!
  
 me_parthia.15.t: "Paropamisadae Betrayal"  #<Paropamisadae-Verrat>  #NT!
 me_parthia.15.desc: "The realm of the old crone who Alexandros so blindly trusted, the seed who sired the witch who surely had no small part in killing him, has proven today before all its true making. The satrapy of [GetCountry('PRM').GetName] has refused one of our envoys, declaring that they owe us nothing and we owe them nothing; as if we were two birds flying in respective directions.\n\nThey are no free birds; they are street dogs pissing on broken pottery, and we must decide what to do with them."  #<Das Reich der alten Frau, der Alexandros so blind vertraute, des Samens, der die Hexe gezeugt hat, die sicherlich keinen geringen Anteil daran hatte, ihn zu töten, hat heute vor allem seine wahre Entstehung bewiesen. Die Satrapie von [GetCountry('PRM').GetName] hat einen unserer Gesandten abgelehnt und erklärt, dass sie uns nichts schulden und wir ihnen nichts schulden; als ob wir zwei Vögel wären, die in die jeweilige Richtung fliegen.\n\nSie sind keine freien Vögel; Es sind Straßenhunde, die auf zerbrochene Töpferwaren pinkeln, und wir müssen entscheiden, was wir mit ihnen machen.>  #NT!
  
 me_parthia.16.t: "Osroene Breaks Away"  #<Osroene bricht aus>  #NT!
 me_parthia.16.desc: "In [GetProvince('(int32)820').GetArea.GetName], a certain #E Osroes of Orhai#! and his tribe from Arabia have taken [GetProvince('(int32)818').GetName] hostage and established a kingdom there, reneging [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] authority and controlling the area around it.\n\nThis is a meager blow to our eastern flank, but it might not be the first and many may be waiting to see how we deal with them in order to get their plans in action. For all it's worth, they are stil settling in their new lands, and were recently a tribe, so their army mustn't be anything of note."  #<In [GetProvince('(int32)820').GetArea.GetName] haben ein gewisser #E Osroes von Orhai#! und sein Stamm aus Arabien [GetProvince('(int32)818').GetName] als Geisel genommen und dort ein Königreich errichtet, [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] die Autorität aufgegeben und das Gebiet um sie herum kontrolliert.\n\nDies ist ein magerer Schlag für unsere Ostflanke, aber es könnte nicht der erste sein und viele warten möglicherweise darauf, wie wir mit ihnen umgehen, um ihre Pläne in die Tat umzusetzen. Sie lassen sich immer noch in ihren neuen Ländern nieder und waren erst vor kurzem ein Stamm, daher dürfte ihre Armee nichts Besonderes sein.>  #NT!
  
 me_parthia.17.t: "Elymais Breaks Away"  #<Elymais bricht aus>  #NT!
 me_parthia.17.desc: "The rabid [GetCulture('elamite').GetName] peoples at the far end of #E Mesopotamia#! have decided to cause trouble for the millionth time, killing our administrators and their families, and any person loyal to our cause, in [GetProvince('(int32)945').GetArea.GetName] and establish what they now call their 'kingdom' there.\n\nEvery single campaign against them is bound to be a nightmare, with their perfidious ways and skilled warriors, but we must crush them for once, or else."  #<Die tollwütigen [GetCulture('elamite').GetName] Völker am anderen Ende von #E Mesopotamien#! haben beschlossen, zum millionsten Mal Unruhe zu stiften, indem sie unsere Verwalter und ihre Familien sowie jeden, der unserer Sache treu bleibt, in [GetProvince('(int32)945').GetArea.GetName] töten und dort das errichten, was sie jetzt ihr „Königreich“ nennen.\n\nJeder einzelne Feldzug gegen sie wird mit ihren perfiden Methoden und geschickten Kriegern zwangsläufig ein Albtraum sein, aber wir müssen sie vernichten einmal, sonst.>  #NT!
  
 me_parthia.18.t: "Characene Breaks Away"  #<Characene bricht aus>  #NT!
 me_parthia.18.desc: "#E Hyspaosines#!, the [GetCulture('bactrian').GetName] to whom we carefully entrusted [GetProvince('(int32)940').GetArea.GetName], has apparently thrown his loyalty out the window because our current situation is 'unsustainable', as he has put it, and has made his governorship, which is comprised essentially of peoples entirely foreign to him, some #E Marches#! and the city of [GetProvince('(int32)940').GetName], independent.\n\nWhile he does say that he stayed loyal to us as long as he possibly could, those are mere attempts to justify a power grab and high treason. We must decide if we are to move against him."  #<#E Hyspaosines#!,, der [GetCulture('bactrian').GetName], dem wir [GetProvince('(int32)940').GetArea.GetName] sorgfältig anvertraut haben, hat offenbar seine Loyalität über Bord geworfen, weil unsere derzeitige Situation, wie er es ausdrückte, „unhaltbar“ ist, und hat sein Gouverneursamt, das im Wesentlichen aus ihm völlig fremden Völkern besteht, einigen #E Marches#! und der Stadt [GetProvince('(int32)940').GetName], unabhängig gemacht.\n\nWährend Er sagt zwar, dass er uns so lange treu geblieben ist, wie er konnte, das sind bloße Versuche, eine Machtübernahme und Hochverrat zu rechtfertigen. Wir müssen entscheiden, ob wir gegen ihn vorgehen wollen.>  #NT!
  
 me_parthia.1801.t: "Arethousa Breaks Away"  #<Arethousa bricht aus>  #NT!
 me_parthia.1801.desc: "The power grab by the emboldened governors continues to assume the proportions of what is, by now, almost a comedy wrapped inside our tragedy.\n\nThere were barely any people living in [GetProvince('(int32)944').GetName] to start with, but thankfully we have found that the cows and camels have finally taken up arms against our supposed tyranny, and are now in open revolt in those wastes. It is up to us to decide if we are to bother with marching our men into that desert."  #<Die Machtergreifung der ermutigten Gouverneure nimmt weiterhin die Ausmaße dessen an, was inzwischen fast eine Komödie in unserer Tragödie ist.\n\nAnfangs lebten in [GetProvince('(int32)944').GetName] kaum Menschen, aber zum Glück haben wir festgestellt, dass die Kühe und Kamele endlich zu den Waffen gegen unsere vermeintliche Tyrannei gegriffen haben und sich nun in dieser Ödnis in offener Revolte befinden. Es liegt an uns zu entscheiden, ob wir uns die Mühe machen, unsere Männer in diese Wüste zu marschieren.>  #NT!
  
 me_parthia.19.t: "Strides for Peace"  #<Schritte für den Frieden>  #NT!
 me_parthia.19.desc: "We have made great gains in [GetProvince('(int32)6961').GetArea.GetRegion.GetName] and [GetProvince('(int32)3406').GetArea.GetRegion.GetName], riding over our enemies and subjugating lands worthy of great conquerors.\n\nStill, some tire of this war, saying it is not holy to lose oneself in ceaseless ambition; [SCOPE.sCharacter('pth_wiseman').GetOffice.GetName] [SCOPE.sChar('pth_wiseman').GetName], for one, argues that while the Hellenic beast is shot dead gasping for air, we should be mindful of our own situation, and not overextend what is at the moment a huge empire for comparatively few tribesmen.\n\nThe treaty he and some other prominent names at court have devised is to offer the [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#! to keep everything east of the [GetProvince('(int32)7719').GetName], that is, [GetProvince('(int32)754').GetArea.GetRegion.GetName], and having us keep the lands to the west and having [ROOT.GetCountry.GetRuler.GetName] marry a bride of their family."  #<Wir haben in [GetProvince('(int32)6961').GetArea.GetRegion.GetName] und [GetProvince('(int32)3406').GetArea.GetRegion.GetName] große Erfolge erzielt, sind über unsere Feinde geritten und haben Länder unterworfen, die großer Eroberer würdig waren.\n\nTrotzdem sagen einige, die diesen Krieg satt haben, dass es nicht heilig sei, sich in unaufhörlichem Ehrgeiz zu verlieren; [SCOPE.sCharacter('pth_wiseman').GetOffice.GetName] [SCOPE.sChar('pth_wiseman').GetName] argumentiert zum einen, dass wir uns unserer eigenen Situation bewusst sein sollten, während das hellenische Tier erschossen wird und nach Luft schnappt, und das, was im Moment ein riesiges Reich für vergleichsweise wenige Stammesangehörige ist, nicht überdehnen sollten.\n\nDer Vertrag, den er und einige andere prominente Namen am Hof ausgearbeitet haben, besteht darin, den [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#! anzubieten, um alles östlich davon zu behalten [GetProvince('(int32)7719').GetName], das heißt [GetProvince('(int32)754').GetArea.GetRegion.GetName], und dass wir die Ländereien im Westen behalten und dass [ROOT.GetCountry.GetRuler.GetName] eine Braut ihrer Familie heiraten soll.>  #NT!
 me_parthia.19.a: "We must look to consolidate our gains"  #<Wir müssen versuchen, unsere Gewinne zu konsolidieren>  #NT!
 me_parthia.19.a.tt: "If [GetCountry('SEL').GetName] accepts, we will gain #E everything of theirs east of the Euphrates#!.\nWe will get country modifier:\n[GetModifier('parthian_appeasing_stance').GetName|Y] which will grant [GetModifier('parthian_appeasing_stance').GetDesc] for #Y 10 Years#!.\n#Y Our Ruler will also marry a Seleukid bride.#!"  #<Wenn [GetCountry('SEL').GetName] annimmt, erhalten wir #E alles, was ihnen östlich des Euphrat gehört.#!.\nWe erhalten den Ländermodifikator:\n[GetModifier('parthian_appeasing_stance').GetName|Y], der [GetModifier('parthian_appeasing_stance').GetDesc] für #Y 10 Jahre#! gewährt.\n#Y Unser Herrscher wird auch eine seleukidische Braut heiraten.#!>  #NT!
 me_parthia.19.b: "Only total conquest shall suffice"  #<Nur die totale Eroberung wird ausreichen>  #NT!
 me_parthia.19.b.tt: "We shall continue the war as usual"  #<Wir werden den Krieg wie gewohnt fortsetzen>  #NT!
  
 me_parthia.1900.t: "Strides for Peace"  #<Schritte für den Frieden>  #NT!
 me_parthia.1900.desc: "'My [ROOT.GetCountry.GetRulerTitle]! News from the East!'\nAs [ROOT.GetCountry.GetRuler.GetName] was tending to [ROOT.GetCountry.GetRuler.GetHerHis] horses in the coutryard of the palace, [ROOT.GetCountry.GetRuler.GetSheHe] looked to the courier who came riding in from the Persian lands. Leaving the horse [ROOT.GetCountry.GetRuler.GetSheHe] was tending to with a caress, [ROOT.GetCountry.GetRuler.GetFirstName] was devastated to hear of [ROOT.GetCountry.GetRuler.GetHerHis] army's most recent defeat in the sands of [GetProvince('(int32)6961').GetArea.GetRegion.GetName].\n\n'The Parthian horde have proposed a peace to end our war!' Now this [ROOT.GetCountry.GetRuler.GetFirstName] wasn't expecting. Washing the surprise from [ROOT.GetCountry.GetRuler.GetHerHis] face, [ROOT.GetCountry.GetRuler.GetSheHe] commanded the courier to speak.\n\n'In exchange for keeping all lands to the east of the [GetProvince('(int32)7719').GetName] and having the warlord [SCOPE.sCountry('parthia_scope').GetRuler.GetName] marry one of our princesses, they propose an end to the war.'\n\n'Well, of course it would have to hurt worse than if the #COLOR:{0.51,0.31,0.75} Algea#! wanted me dead', [ROOT.GetCountry.GetRuler.GetFirstName] thought, 'but it might just be that we might not have any other choice.'"  #<„Mein [ROOT.GetCountry.GetRulerTitle]! Neuigkeiten aus dem Osten!'\nWährend [ROOT.GetCountry.GetRuler.GetName] sich im Hof ​​des Palastes um [ROOT.GetCountry.GetRuler.GetHerHis] Pferde kümmerte, blickte [ROOT.GetCountry.GetRuler.GetSheHe] auf den Kurier, der aus den persischen Ländern angeritten kam. [ROOT.GetCountry.GetRuler.GetSheHe] verließ das Pferd mit einer Liebkosung, [ROOT.GetCountry.GetRuler.GetFirstName] war am Boden zerstört, als er von der jüngsten Niederlage der [ROOT.GetCountry.GetRuler.GetHerHis]-Armee im Sand von [GetProvince('(int32)6961').GetArea.GetRegion.GetName] hörte.\n\n'Die parthische Horde hat einen Frieden vorgeschlagen, um unseren Krieg zu beenden!' Das hat [ROOT.GetCountry.GetRuler.GetFirstName] nicht erwartet. [ROOT.GetCountry.GetRuler.GetHerHis] wischte die Überraschung aus dem Gesicht und befahl dem Kurier zu sprechen.\n\n'Als Gegenleistung dafür, dass er alle Länder östlich von [ROOT.GetCountry.GetRuler.GetName]1 behält und dass der Kriegsherr [ROOT.GetCountry.GetRuler.GetName]2 eine unserer Prinzessinnen heiratet, schlagen sie ein Ende des Krieges vor.'\n\n'Natürlich müsste es schlimmer weh tun, als wenn die [ROOT.GetCountry.GetRuler.GetName]3 Algea[ROOT.GetCountry.GetRuler.GetName]4 mich wollte tot“, dachte [ROOT.GetCountry.GetRuler.GetFirstName], „aber es könnte sein, dass wir keine andere Wahl haben.“>  #NT!
 me_parthia.1900.a: "We must be pragmatic to live."  #<Wir müssen pragmatisch sein, um zu leben.>  #NT!
 me_parthia.1900.a.tt: "#E #R We will cede everything east of the Euphrates river.#!#!"  #<#E #R Wir werden alles östlich des Euphrat abtreten.#!#!>  #NT!
 me_parthia.1900.b: "#E [sel_steiner_scope.GetName]'s#! counterattack shall come any second now."  #<#E [sel_steiner_scope.GetName]'s#! Gegenangriff wird jede Sekunde kommen.>  #NT!
 me_parthia.1900.b.tt: "We will fight to the death, either #E ours#! or #E [parthia_scope.GetName]'s#!."  #<Wir werden bis zum Tod kämpfen, entweder #E unserer#! oder #E [parthia_scope.GetName]#!.>  #NT!
 # me_parthia.19.b: ""
 me_parthia.1901.t: "[root_scope.GetName] - Under New Management?"  #<[root_scope.GetName] – Unter neuer Leitung?>  #NT!
 me_parthia.1901.desc: "The lords of [SCOPE.sCountry('defecting_subject').GetAdjective] lands, now fully occupied by our armies and having realized the dire situation of their camp, have sent a covert emissary behind [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] backs to renege their servitude to them and become our #E March#!.\n\nSince this is war, anything goes, and the #E Greeks#!, while left rabid, won't be able to do anything about it - but we might just benefit more from outright conquest."  #<Die Herren von [SCOPE.sCountry('defecting_subject').GetAdjective] Ländern, die jetzt vollständig von unseren Armeen besetzt sind und die schreckliche Situation ihres Lagers erkannt haben, haben einen verdeckten Abgesandten hinter [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective] Rücken geschickt, um ihre Knechtschaft ihnen gegenüber zu brechen und unser #E. März#!.\n\nSince zu werden. Das ist Krieg, alles ist möglich, und die #E Griechen#!, werden, obwohl sie wütend sind, nichts dagegen tun können – aber wir könnten es tun Profitieren Sie einfach mehr von einer völligen Eroberung.>  #NT!
 me_parthia.1901.a: "We will gladly protect them."  #<Wir werden sie gerne beschützen.>  #NT!
 me_parthia.1901.b: "We have no such wishes."  #<Solche Wünsche haben wir nicht.>  #NT!
  
 me_parthia.1902.t: "[root_scope.GetName] Defects!"  #<None>  #NT!
 me_parthia.1902.desc: "As the last of their representatives leaves [ROOT.GetCountry.GetCapital.GetName] in the greatest of hurries, to our confusion, we get the dreaded news that one of our subjects, [SCOPE.sCountry('defecting_subject').GetName], has crudely abandoned our cause and killed off all who belonged to our administration of their lands in order to bow before the thundering #E Parthian#! horse lords. We managed to kill off some of the men who left our capital to escape our wrath, but it is still little consolation."  #<Als der letzte ihrer Vertreter [ROOT.GetCountry.GetCapital.GetName] in größter Eile verlässt, erhalten wir zu unserer Verwirrung die gefürchtete Nachricht, dass einer unserer Untertanen, [SCOPE.sCountry('defecting_subject').GetName], unsere Sache grob aufgegeben und alle getötet hat, die zu unserer Verwaltung ihres Landes gehörten, um sich vor den donnernden #E Parther#! Pferdefürsten zu beugen. Es ist uns gelungen, einige der Männer zu töten, die unsere Hauptstadt verlassen haben, um unserem Zorn zu entkommen, aber das ist immer noch kein Trost.>  #NT!
 me_parthia.1902.a: "Woe upon them!"  #<Wehe ihnen!>  #NT!
 me_parthia.1902.a.tt: "We have managed to capture and kill some of their representatives, so they will lose #T 1 Pop#! in their capital."  #<Es ist uns gelungen, einige ihrer Vertreter zu fangen und zu töten, sodass sie #T 1 Einwohner#! in ihrer Hauptstadt verlieren werden.>  #NT!
  
 me_parthia.1903.t: "The Eagles Fly On"  #<Die Eagles fliegen weiter>  #NT!
 me_parthia.1903.desc: "As our victories mount, our influence extends well beyond where our men march. Fearing the trampling under our hooves an existential threat, [SCOPE.sCountry('defecting_subject').GetRuler.GetName] has ordered his men to send tribute in the form of gold and treasure in the hopes that we allow them to become our subjects. Such is the influence of our empire that foreign kings, with whom we have no quarrel, bow willingly before us in fear."  #<Während unsere Siege zunehmen, reicht unser Einfluss weit über den Marschort unserer Männer hinaus. Aus Angst, dass das Trampeln unter unseren Hufen eine existenzielle Bedrohung darstellt, hat [SCOPE.sCountry('defecting_subject').GetRuler.GetName] seinen Männern befohlen, Tribut in Form von Gold und Schätzen zu schicken, in der Hoffnung, dass wir ihnen erlauben, unsere Untertanen zu werden. Der Einfluss unseres Reiches ist so groß, dass ausländische Könige, mit denen wir keinen Streit haben, sich aus Angst bereitwillig vor uns verbeugen.>  #NT!
 me_parthia.1903.a: "We should heed their wish."  #<Wir sollten ihren Wunsch beherzigen.>  #NT!
 me_parthia.1903.b: "They'll accept our suzerainty. In different form, in due time."  #<Sie werden unsere Oberhoheit akzeptieren. In anderer Form, zu gegebener Zeit.>  #NT!
  
 me_parthia.20.t: "Settling The Tribes"  #<Die Stämme besiedeln>  #NT!
 me_parthia.20.desc: "As victory in the battlefield has come, the greatest prize, life, follows behind it in all its virtue and honesty.\n\nThe rich cities of the #E Iranian#! plateau, now without a master and ready to prosper under the guidance of [ROOT.GetCountry.GetRuler.GetName], have welcomed our tribes from the hinterlands. Our brethren, having left the northern wastes in a giant mass, leave behind not only their homes, but their traditional [GetCulture('derbiccan')GetName] identity as well. There are exciting times ahead for us and these people, with great promise and greater prosperity."  #<Mit dem Sieg auf dem Schlachtfeld folgt der größte Preis, das Leben, in all seiner Tugend und Ehrlichkeit.\n\nDie reichen Städte des #E iranischen#! Plateaus, jetzt ohne Herrscher und bereit, unter der Führung von [ROOT.GetCountry.GetRuler.GetName] zu gedeihen, haben unsere Stämme aus dem Hinterland willkommen geheißen. Nachdem unsere Brüder die nördlichen Ödlande in großer Zahl verlassen haben, hinterlassen sie nicht nur ihre Häuser, sondern auch ihre traditionelle [GetCulture('derbiccan')GetName] Identität. Vor uns und diesen Menschen stehen aufregende Zeiten voller Hoffnung und größerem Wohlstand.>  #NT!
 me_parthia.20.a: "That's one way of controlling the wild tribes..."  #<Das ist eine Möglichkeit, die wilden Stämme zu kontrollieren ...>  #NT!
 # me_parthia.20.tt: ""
  
 me_parthia.21.t: "Parthian Ultimatum"  #<Parthisches Ultimatum>  #NT!
 me_parthia.21.desc: "My [ROOT.GetCountry.GetRulerTitle], we have dire news to share with you this morning; a group of diplomats have arrived from the east, carrying the banner of the #E Parthians#!. Thankfully, these men were not a scouting party heralding an invasion, although they might as well be...the Parthians are asking us to submit peacefully to them as their #E March#!.\n\nAfter delivering their message, the embassy refused to stay the night in [ROOT.GetCountry.GetCapital.GetName], but asked to know our answer immediately."  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben heute Morgen schreckliche Neuigkeiten für Sie; Aus dem Osten ist eine Gruppe von Diplomaten eingetroffen, die das Banner der #E Parther#!. tragen. Glücklicherweise handelte es sich bei diesen Männern nicht um einen Spähtrupp, der eine Invasion ankündigte, obwohl sie es genauso gut sein könnten ... die Parther bitten uns, uns ihnen friedlich zu unterwerfen, als ihr #E März#!.\n\nNach der Übermittlung ihrer Nachricht weigerte sich die Botschaft, in [ROOT.GetCountry.GetCapital.GetName] über Nacht zu bleiben, fragte aber nach unserer Antwort sofort.>  #NT!
 me_parthia.21.a: "I fear the hour is already too late...we must submit or die"  #<Ich fürchte, die Stunde ist bereits zu spät ... wir müssen uns unterwerfen oder sterben>  #NT!
 me_parthia.21.b: "We cannot live on our knees!"  #<Wir können nicht auf den Knien leben!>  #NT!
  
 me_parthia.2101.t: "Matter of Media Atropatene - Reponse"  #<Materie der Medien Atropatene – Antwort>  #NT!
 me_parthia.2101.desc: "Wonderful news to report, o [ROOT.GetCountry.GetRuler.GetName] - [GetCountry('MAP').GetRuler.GetName], the [GetCountry('MAP').GetRulerTitle] of [GetCountry('MAP').GetName], has wisely agreed to submit to [ROOT.GetCountry.GetName].\n\n[GetCountry('MAP').GetRuler.GetFirstName] has written [ROOT.GetCountry.GetRuler.GetFirstName] personally to thank [ROOT.GetCountry.GetRuler.GetHerHim] for graciously extending this opportunity to the [GetCountry('MAP').GetAdjective]s, and promises to uphold [GetCountry('MAP').GetRuler.GetHerHis] obligations without fail."  #<Es gibt wundervolle Neuigkeiten zu berichten, o [ROOT.GetCountry.GetRuler.GetName] - [GetCountry('MAP').GetRuler.GetName], der [GetCountry('MAP').GetRulerTitle] von [GetCountry('MAP').GetName], hat klugerweise zugestimmt, sich [ROOT.GetCountry.GetName] zu unterwerfen.\n\n[GetCountry('MAP').GetRuler.GetFirstName] hat [ROOT.GetCountry.GetRuler.GetFirstName] persönlich geschrieben, um [ROOT.GetCountry.GetRuler.GetHerHim] dafür zu danken, dass er diese Gelegenheit großzügig auf die [GetCountry('MAP').GetAdjective] ausgeweitet hat, und verspricht, die Verpflichtungen von [GetCountry('MAP').GetRuler.GetHerHis] unbedingt einzuhalten.>  #NT!
 me_parthia.2101.a: "I toast your health and our partnership, [GetCountry('MAP').GetRuler.GetFirstName]..."  #<Ich stoße auf Ihre Gesundheit und unsere Partnerschaft an, [GetCountry('MAP').GetRuler.GetFirstName]...>  #NT!
  
 me_parthia.2102.t: "Matter of Media Atropatene - Response"  #<Materie der Medien Atropatene – Antwort>  #NT!
 me_parthia.2102.desc: "[GetCountry('MAP').GetRuler.GetName] has submitted an answer to our diplomats; instead of spending [GetCountry('MAP').GetRuler.GetHerHis] final days in the lap of luxury, drinking wine and listening to slaves recite tales of glory, [GetCountry('MAP').GetRuler.GetSheHe] wants to witness the death of everyone that [GetCountry('MAP').GetRuler.GetSheHe] loves as the walls of [GetCountry('MAP').GetCapital.GetName] are toppled to the ground.\n\nNeedless to say, [ROOT.GetCountry.GetRuler.GetName] did not take the rejection well..."  #<[GetCountry('MAP').GetRuler.GetName] hat eine Antwort an unsere Diplomaten übermittelt; Anstatt die letzten Tage von [GetCountry('MAP').GetRuler.GetHerHis] im Luxus zu verbringen, Wein zu trinken und Sklaven zuzuhören, die Geschichten über Ruhm aufsagen, möchte [GetCountry('MAP').GetRuler.GetSheHe] den Tod aller miterleben, die [GetCountry('MAP').GetRuler.GetSheHe] liebt, während die Mauern von [GetCountry('MAP').GetCapital.GetName] einstürzen.\n\nUnnötig zu erwähnen, dass [ROOT.GetCountry.GetRuler.GetName] die Ablehnung nicht gut aufgenommen hat ...>  #NT!
 me_parthia.2102.a: "You just signed your own death warrant, [GetCountry('MAP').GetRuler.GetFirstName]!"  #<Du hast gerade dein eigenes Todesurteil unterzeichnet, [GetCountry('MAP').GetRuler.GetFirstName]!>  #NT!
 me_parthia.2102.a.tt: "We will get claims on all [GetCountry('MAP').GetAdjective|G] lands."  #<Wir werden Ansprüche auf alle [GetCountry('MAP').GetAdjective|G] Länder erhalten.>  #NT!
  
 me_parthia.22.t: "Parthian Ultimatum"  #<Parthisches Ultimatum>  #NT!
 me_parthia.22.desc: "My [ROOT.GetCountry.GetRulerTitle], we have dire news to share with you this morning; a group of diplomats have arrived from the east, carrying the banner of the #E Parthians#!. Thankfully, these men were not a scouting party heralding an invasion, although they might as well be...the Parthians are asking us to submit peacefully to them as their #E March#!.\n\nAfter delivering their message, the embassy refused to stay the night in [ROOT.GetCountry.GetCapital.GetName], but asked to know our answer immediately."  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben heute Morgen schreckliche Neuigkeiten für Sie; Aus dem Osten ist eine Gruppe von Diplomaten eingetroffen, die das Banner der #E Parther#!. tragen. Glücklicherweise handelte es sich bei diesen Männern nicht um einen Spähtrupp, der eine Invasion ankündigte, obwohl sie es genauso gut sein könnten ... die Parther bitten uns, uns ihnen friedlich zu unterwerfen, als ihr #E März#!.\n\nNach der Übermittlung ihrer Nachricht weigerte sich die Botschaft, in [ROOT.GetCountry.GetCapital.GetName] über Nacht zu bleiben, fragte aber nach unserer Antwort sofort.>  #NT!
 me_parthia.22.a: "I fear the hour is already too late...we must submit or die"  #<Ich fürchte, die Stunde ist bereits zu spät ... wir müssen uns unterwerfen oder sterben>  #NT!
 me_parthia.22.b: "We cannot live on our knees!"  #<Wir können nicht auf den Knien leben!>  #NT!
  
 me_parthia.2201.t: "Demand Adiabene's Loyalty - Reponse"  #<Fordern Sie Adiabenes Loyalität – Antwort>  #NT!
 me_parthia.2201.desc: "[GetCountry('ADI').GetRuler.GetName] has told our diplomats that [GetCountry('ADI').GetRuler.GetSheHe] will peacefully submit to [ROOT.GetCountry.GetName], bitterly admitting that they have no hopes of defeating us in battle. The only personal request that [GetCountry('ADI').GetRuler.GetFirstName] made was asking that our kinsmen do not harrass or bother the [GetCountry('ADI').GetAdjective] locals - a term that was acceptable to [ROOT.GetCountry.GetRuler.GetName]."  #<[GetCountry('ADI').GetRuler.GetName] hat unseren Diplomaten gesagt, dass [GetCountry('ADI').GetRuler.GetSheHe] sich friedlich [ROOT.GetCountry.GetName] unterwerfen wird, und hat bitter zugegeben, dass sie keine Hoffnung haben, uns im Kampf zu besiegen. Die einzige persönliche Bitte, die [GetCountry('ADI').GetRuler.GetFirstName] stellte, bestand darin, dass unsere Verwandten die Einheimischen von [GetCountry('ADI').GetAdjective] nicht belästigen oder belästigen sollten – eine Bezeichnung, die für [ROOT.GetCountry.GetRuler.GetName] akzeptabel war.>  #NT!
 me_parthia.2201.a: "Very well then"  #<Dann sehr gut>  #NT!
 me_parthia.2201.a.tt: "If Osroene is our #G March#! and [GetProvince('(int32)880').GetArea.GetRegion.GetName|T] is not our #G Dastgerd#!, we will divide #T [GetProvince('(int32)880').GetArea.GetRegion.GetName] Region#! between #G Adiabane#! and #G Osroene#!."  #<Wenn Osroene unser #G March#! und [GetProvince('(int32)880').GetArea.GetRegion.GetName|T] nicht unser #G Dastgerd#! ist, werden wir #T [GetProvince('(int32)880').GetArea.GetRegion.GetName] Region#! zwischen #G Adiabane#! und #G Osroene#! aufteilen.>  #NT!
 me_parthia.2201.b.tt: "If [GetProvince('(int32)880').GetArea.GetRegion.GetName|T] is not our #G Dastgerd#!, #G Adiabene#! shall become the #G March#! for this region."  #<Wenn [GetProvince('(int32)880').GetArea.GetRegion.GetName|T] nicht unser #G Dastgerd#!, ist, wird #G Adiabene#! zum #G March#! für diese Region.>  #NT!
  
 me_parthia.2202.t: "Demand Adiabene's Loyalty - Reponse"  #<Fordern Sie Adiabenes Loyalität – Antwort>  #NT!
 me_parthia.2202.desc: "The old crones of the #E [GetCountry('ADI').GetAdjective]#! palace are arrogant, delusional, naive and shameful. We have destroyed the Seleukid domain, and this vassal state that lives in nothing more than some redoubts lost in the hills think they are our match. How insane! Our horde will take great pleasure in riding through their streets and burning their houses and stores."  #<Die alten Weiber des #E [GetCountry('ADI').GetAdjective]#! Palastes sind arrogant, wahnhaft, naiv und beschämend. Wir haben das Herrschaftsgebiet der Seleukiden zerstört, und dieser Vasallenstaat, der nur in ein paar Schanzen in den Hügeln lebt, denkt, er sei unser Gegner. Wie verrückt! Unsere Horde wird große Freude daran haben, durch ihre Straßen zu reiten und ihre Häuser und Geschäfte niederzubrennen.>  #NT!
 me_parthia.2202.a: "Too bad. For them."  #<Schade. Für sie.>  #NT!
 me_parthia.2202.a.tt: "We will get claims on all of [GetCountry('ADI').GetAdjective|G] lands."  #<Wir werden Ansprüche auf alle [GetCountry('ADI').GetAdjective|G] Länder erhalten.>  #NT!
  
 me_parthia.23.t: "Friendship Between Rulers"  #<Freundschaft zwischen Herrschern>  #NT!
 me_parthia.23.desc: "Between banquets, [ROOT.GetCountry.GetRuler.GetName] called for a private meeting with [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetRulerTitle] [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetRuler.GetFirstName] and [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetRulerTitle] [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetRuler.GetFirstName], the two guests of honour.\n\nEntering the separate palace room, he found the two men seating, looking up at him. ''So you see, my good friends, I, King of Kings, have shared with you my good companionship and wealth. The ease with which you lived these last few days can extend to your people, and yourselves. Take my divine gratitude to heart, it does not befall just anyone.'' His dark eyes looked upon the two sitting men. They seemed quite happy to acquiesce."  #<Zwischen den Banketten berief [ROOT.GetCountry.GetRuler.GetName] ein privates Treffen mit [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetRulerTitle] [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetRuler.GetFirstName] und [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetRulerTitle] [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetRuler.GetFirstName], den beiden Ehrengästen, ein.\n\nAls er den separaten Palastraum betrat, fand er die beiden Männer sitzend vor, die zu ihm aufblickten. „Sie sehen also, meine guten Freunde, ich, König der Könige, habe meine gute Kameradschaft und meinen Reichtum mit Ihnen geteilt.“ Die Leichtigkeit, mit der Sie in den letzten Tagen gelebt haben, kann sich auf Ihr Volk und auf Sie selbst auswirken. Nimm dir meine göttliche Dankbarkeit zu Herzen, sie trifft nicht jeden.'' Seine dunklen Augen blickten auf die beiden sitzenden Männer. Sie schienen sehr froh darüber zu sein, zuzustimmen.>  #NT!
 me_parthia.23.a: "Excellent! Now back to the festivities."  #<Exzellent! Nun zurück zu den Feierlichkeiten.>  #NT!
  
 me_parthia.24.t: "Diplomatic Insult"  #<Diplomatische Beleidigung>  #NT!
 me_parthia.24.desc: "One Parthian tribesman was accused in [GetProvince('(int32)1544').GetName] - and probably quite rightly - of practicing blasphemy to [GetDeityDefinition('omen_tsovinar').GetName], a quite holy god of that foreign land. Still, it was a complete accident related to the frankly weird rules of worship to that lesser god.\n\nWe have made quite a scandal of this, as the man had a family and couldn't possibly have known that he was offending anyone, yet still he was put to death. We have insulted the [GetCulture('armenian').GetName]#E s#! for their hostile hospitality, which has generated some goodwill upon the Armenian subjects that we seek to possess."  #<Ein parthischer Stammesangehöriger wurde im Jahr [GetProvince('(int32)1544').GetName] – wahrscheinlich völlig zu Recht – beschuldigt, Gotteslästerung gegenüber [GetDeityDefinition('omen_tsovinar').GetName], einem recht heiligen Gott dieses fremden Landes, begangen zu haben. Dennoch war es ein völliger Unfall im Zusammenhang mit den ehrlich gesagt seltsamen Regeln der Verehrung dieses geringeren Gottes.\n\nWir haben daraus einen ziemlichen Skandal gemacht, da der Mann eine Familie hatte und unmöglich hätte wissen können, dass er jemanden beleidigte, und trotzdem wurde er getötet. Wir haben die [GetCulture('armenian').GetName]#E s#! wegen ihrer feindseligen Gastfreundschaft beleidigt, die bei den armenischen Untertanen, die wir besitzen wollen, zu einem gewissen Wohlwollen geführt hat.>  #NT!
 me_parthia.24.a: "All according to plan"  #<Alles nach Plan>  #NT!
 me_parthia.24.b: "Double down on the insult!"  #<Verdoppeln Sie die Beleidigung!>  #NT!
  
 me_parthia.25.t: "Gifts for the [GetCountry('ARM').GetAdjective] Subjects"  #<Geschenke für die [GetCountry('ARM').GetAdjective] Themen>  #NT!
 me_parthia.25.desc: "As promised by our [ROOT.GetCountry.GetRulerTitle], a magnificent entourage has departed for [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetName], and the people of [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetCapital.GetName] were deeply impressed by the beauty and pomp we are so easily able to spare for their humble nation. This might be the right time to double down on our generosity and make an even bigger donation; elephants, entertainers, gold and riches, scholars, and all else will surely make their affection for us intensify."  #<Wie von unserem [ROOT.GetCountry.GetRulerTitle] versprochen, ist ein prächtiges Gefolge nach [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetName] aufgebrochen, und die Menschen von [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetCapital.GetName] waren tief beeindruckt von der Schönheit und dem Prunk, die wir so leicht für ihre bescheidene Nation aufbringen können. Dies könnte der richtige Zeitpunkt sein, unsere Großzügigkeit zu verdoppeln und eine noch größere Spende zu leisten; Elefanten, Entertainer, Gold und Reichtümer, Gelehrte und alles andere werden ihre Zuneigung zu uns sicherlich verstärken.>  #NT!
 me_parthia.25.a: "The previous gift was sufficient…"  #<Das vorherige Geschenk war ausreichend…>  #NT!
 me_parthia.25.b: "Let's shower them in gold."  #<Überschütten wir sie mit Gold.>  #NT!
 me_parthia.25.c: "Commission a grand temple in one of their cities!"  #<Bauen Sie einen großen Tempel in einer ihrer Städte in Auftrag!>  #NT!
  
 me_parthia.26.t: "Show Of Strength"  #<Demonstration der Stärke>  #NT!
 me_parthia.26.desc: "At camp, [SCOPE.sChar('parthianwaar').GetName] joked that these manure-eating [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetAdjective] bandits probably would drop dead in their shoes as soon as they saw the might of our army. Thanks to the instability caused by these low-lifes, which [GetCountry('ARM').GetRuler.GetName] had the kindness to ignore, we now march and station our armies through the hills of [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetName] and [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetName], on the pretext of keeping their populations safe from these ''terrifying bandits'', some of which might have a little something to do with us, but oh well that matters little. They now look to us for safety."  #<Im Lager scherzte [SCOPE.sChar('parthianwaar').GetName], dass diese mistfressenden [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetAdjective]-Banditen wahrscheinlich tot umfallen würden, sobald sie die Macht unserer Armee sahen. Dank der durch diese Unterwelt verursachten Instabilität, die [GetCountry('ARM').GetRuler.GetName] so freundlich war zu ignorieren, marschieren wir jetzt und stationieren unsere Armeen durch die Hügel von [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetName] und [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetName], unter dem Vorwand, ihre Bevölkerung vor diesen „schrecklichen Banditen“ zu schützen, von denen einige vielleicht etwas mit uns zu tun haben, aber na ja, das spielt keine Rolle. Sie suchen jetzt bei uns Sicherheit.>  #NT!
 me_parthia.26.a: "They now see we mean business"  #<Sie sehen jetzt, dass wir es ernst meinen>  #NT!
  
 me_parthia.27.t: "Sponsoring Public Games"  #<Sponsoring öffentlicher Spiele>  #NT!
 me_parthia.27.desc: "By sponsoring games in the [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetAdjective] and [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetAdjective] capitals, we will introduce a whole new aspect to their civilian lives, ones they won't forget too easily. Competition, sweat, sand and rope; all elements to drive the crowd to ecstacy. Just as they jump in their seats, in rides a chariot covered with our royal symbols - a public reminder to all present that the [ROOT.GetCountry.GetRuler.GetFamily.GetName] family has sponsored this event. What an absolute spectacle for the ages this will prove to be! The locals will be talking of nothing else for years to come."  #<Indem wir Spiele in den Hauptstädten [SCOPE.sCountry('pth_wooing_ARM_target1_scope').GetAdjective] und [SCOPE.sCountry('pth_wooing_ARM_target2_scope').GetAdjective] sponsern, werden wir einen ganz neuen Aspekt in ihr ziviles Leben einführen, den sie nicht so schnell vergessen werden. Wettkampf, Schweiß, Sand und Seil; Alles Elemente, um die Menge in Ekstase zu versetzen. Gerade als sie auf ihre Sitze springen, fährt ein mit unseren königlichen Symbolen bedeckter Streitwagen vorbei – eine öffentliche Erinnerung an alle Anwesenden, dass die Familie [ROOT.GetCountry.GetRuler.GetFamily.GetName] diese Veranstaltung gesponsert hat. Was für ein absolutes Spektakel für die Ewigkeit! Die Einheimischen werden in den nächsten Jahren von nichts anderem reden.>  #NT!
 me_parthia.27.a: "Hold the games in a field outside town"  #<Halten Sie die Spiele auf einem Feld außerhalb der Stadt ab>  #NT!
 me_parthia.27.b: "Build arenas for the show!"  #<Bauen Sie Arenen für die Show!>  #NT!
  
 me_parthia.28.t: "Wooing the [GetCountry('ARM').GetAdjective] Subjects - Moment of Truth"  #<Die [GetCountry('ARM').GetAdjective]-Subjekte umwerben – Moment der Wahrheit>  #NT!
 me_parthia.28.desc: "[ROOT.GetCountry.GetAdjective] diplomats have been working tirelessly, shuttling between [GetCountry('SPH').GetCapital.GetName] and [GetCountry('CRD').GetCapital.GetName] to coordinate the two countries' integration into our sphere. [SCOPE.sChar('parthiandddiplo').GetName], for one, hasn't slept for days, and only seen his family once, with the amount of differing reports and influence trading necessary. Much still hangs in the balance though, as the Armenians are closer to them culturally, and no doubt still a force of their own, and there are still many loyalties to them.\n\nIt is time to ditch the formalities and demand out of them what we truly want - vassalage."  #<[ROOT.GetCountry.GetAdjective] Diplomaten haben unermüdlich daran gearbeitet, zwischen [GetCountry('SPH').GetCapital.GetName] und [GetCountry('CRD').GetCapital.GetName] zu pendeln, um die Integration der beiden Länder in unsere Sphäre zu koordinieren. [SCOPE.sChar('parthiandddiplo').GetName] zum einen hat tagelang nicht geschlafen und seine Familie nur einmal gesehen, mit der Menge an unterschiedlichen Berichten und dem nötigen Einflusshandel. Es steht jedoch noch viel auf dem Spiel, da die Armenier ihnen kulturell näher stehen und zweifellos immer noch eine eigene Macht sind und ihnen immer noch viele Loyalitäten entgegengebracht werden.\n\nEs ist an der Zeit, die Formalitäten hinter sich zu lassen und von ihnen zu verlangen, was wir wirklich wollen – Vasallentum.>  #NT!
 me_parthia.28.a: "Make them an offer too good to be refused."  #<Machen Sie ihnen ein Angebot, das zu gut ist, um abgelehnt zu werden.>  #NT!
 me_parthia.28.a.tt: "If we have impressed them enough, they may choose to become our subject."  #<Wenn wir sie genug beeindruckt haben, können sie sich dafür entscheiden, unser Thema zu werden.>  #NT!
 me_parthia.28.b: "Make them an offer too good to be refused."  #<Machen Sie ihnen ein Angebot, das zu gut ist, um abgelehnt zu werden.>  #NT!
 # me_parthia.28.b.tt: ""
 me_parthia.28.c: "Make them an offer too good to be refused."  #<Machen Sie ihnen ein Angebot, das zu gut ist, um abgelehnt zu werden.>  #NT!
 # me_parthia.28.c.tt: ""
 me_parthia.29.t: "Wooing the [GetCountry('ARM').GetAdjective] Subjects - Protection Accepted"  #<Umwerben der [GetCountry('ARM').GetAdjective]-Subjekte – Schutz akzeptiert>  #NT!
 me_parthia.29.desc: "After some tense moments where the iron will of our diplomats was tested, and their skill in statecraft was of great use, we have finally formalized our overlordship over [GetCountry('SPH').GetCapital.GetName] and [GetCountry('CRD').GetCapital.GetName]. This proves we are a force to be reckoned with not only on the field of battle but also political affairs. We are slowly establishing our place as a respected power in the world."  #<Nach einigen angespannten Momenten, in denen der eiserne Wille unserer Diplomaten auf die Probe gestellt wurde und ihre Fähigkeiten in der Staatsführung von großem Nutzen waren, haben wir endlich unsere Oberherrschaft über [GetCountry('SPH').GetCapital.GetName] und [GetCountry('CRD').GetCapital.GetName] formalisiert. Dies beweist, dass wir nicht nur auf dem Schlachtfeld, sondern auch in politischen Angelegenheiten eine ernst zu nehmende Kraft sind. Wir etablieren uns langsam als angesehene Macht in der Welt.>  #NT!
 me_parthia.29.a: "A wise choice."  #<Eine kluge Wahl.>  #NT!
 me_parthia.30.t: "Parthia Offers Protection"  #<Parthia bietet Schutz>  #NT!
 me_parthia.30.desc: "It came as no surprise to [ROOT.GetCountry.GetRuler.GetSpouse.GetName], or to many at all in the [ROOT.GetCountry.GetAdjective] royal household, that the wooing of the Parthians was of pure intentions. In the halls of power, goodwill is cut clean off quite quickly. As such, we merely played the part of the courted, to see how much we could get as suppliants before the messenger arrived.\n\nAnd as such, [SCOPE.sChar('prnmessenger').GetName] entered the throne room, and demanded sternly that we submit to the overlordship of the Parthians."  #<Es war keine Überraschung für [ROOT.GetCountry.GetRuler.GetSpouse.GetName] oder für viele überhaupt im königlichen Haushalt [ROOT.GetCountry.GetAdjective], dass die Werbung für die Parther reine Absicht war. In den Hallen der Macht wird der gute Wille ziemlich schnell abgeschnitten. Als solche spielten wir lediglich die Rolle der Umworbenen, um zu sehen, wie viel wir als Bittsteller bekommen konnten, bevor der Bote eintraf.\n\nUnd als solche betrat [SCOPE.sChar('prnmessenger').GetName] den Thronsaal und forderte streng, dass wir uns der Oberherrschaft der Parther unterwerfen.>  #NT!
 me_parthia.30.a: "Parthian protection sounds wonderful."  #<Parthischer Schutz klingt wunderbar.>  #NT!
 me_parthia.30.a.tt: "#R We will become a feudatory of #E Parthia#!. #!"  #<#R Wir werden ein Lehnsherr von #E Parthia#!. #!>  #NT!
 me_parthia.30.b: "We will never again submit to foreign tyrants!"  #<Wir werden uns nie wieder ausländischen Tyrannen unterwerfen!>  #NT!
 me_parthia.31.t: "Wooing the [GetCountry('ARM').GetAdjective] Subjects - Protection Rejected"  #<Umwerben der [GetCountry('ARM').GetAdjective]-Subjekte – Schutz abgelehnt>  #NT!
 me_parthia.31.desc: "We sought to establish ourselves as not only a military force but a political one, to gain legitimacy and respect among our peers. Still, we were not entirely safe from the arrogant scorn of minor men. [GetCountry('SPH').GetCapital.GetName] and [GetCountry('CRD').GetCapital.GetName] have jointly refused to become our subjects.\n\nIt seems we must get on the march again, so we will not shake the image of warmongering conquerors anytime soon."  #<Wir wollten uns nicht nur als militärische, sondern auch als politische Kraft etablieren, um unter unseren Mitstreitern Legitimität und Respekt zu erlangen. Dennoch waren wir vor der arroganten Verachtung minderjähriger Männer nicht ganz sicher. [GetCountry('SPH').GetCapital.GetName] und [GetCountry('CRD').GetCapital.GetName] haben sich gemeinsam geweigert, unsere Untertanen zu werden.\n\nEs scheint, dass wir wieder auf den Vormarsch gehen müssen, damit wir das Image der kriegstreibenden Eroberer so schnell nicht abschütteln können.>  #NT!
 me_parthia.31.a: "Fools!"  #<Narren!>  #NT!
  
 me_parthia.32.t: "Parthian Ultimatum"  #<Parthisches Ultimatum>  #NT!
 me_parthia.32.desc: "My [ROOT.GetCountry.GetRulerTitle], we have dire news to share with you this morning; a group of diplomats have arrived from the east, carrying the banner of the #E Parthians#!. Thankfully, these men were not a scouting party heralding an invasion, although they might as well be...the Parthians are asking us to submit peacefully to them as their #E March#!.\n\nAfter delivering their message, the embassy refused to stay the night in [ROOT.GetCountry.GetCapital.GetName], but asked to know our answer immediately."  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben heute Morgen schreckliche Neuigkeiten für Sie; Aus dem Osten ist eine Gruppe von Diplomaten eingetroffen, die das Banner der #E Parther#!. tragen. Glücklicherweise handelte es sich bei diesen Männern nicht um einen Spähtrupp, der eine Invasion ankündigte, obwohl sie es genauso gut sein könnten ... die Parther bitten uns, uns ihnen friedlich zu unterwerfen, als ihr #E März#!.\n\nNach der Übermittlung ihrer Nachricht weigerte sich die Botschaft, in [ROOT.GetCountry.GetCapital.GetName] über Nacht zu bleiben, fragte aber nach unserer Antwort sofort.>  #NT!
 me_parthia.32.a: "This request is a prelude to war...we accept"  #<Diese Bitte ist ein Auftakt zum Krieg ... wir nehmen sie an>  #NT!
 me_parthia.32.b: "We cannot live on our knees!"  #<Wir können nicht auf den Knien leben!>  #NT!
  
 me_parthia.3201.t: "Subjugate Armenia - Response"  #<Unterwerfe Armenien – Antwort>  #NT!
 me_parthia.3201.desc: "It seems that the diplomatic efforts of [ROOT.GetCountry.GetRuler.GetName] were enough to break down the will of the Armenian [GetCountry('ARM').GetRulerTitle], for [GetCountry('ARM').GetRuler.GetName] submitted at once, asking only for kindness to be shown to the mountain dwellers. Although [GetCountry('ARM').GetRuler.GetFirstName] admitted that the Parthians had every right to pillage and plunder their lands, [GetCountry('ARM').GetRuler.GetSheHe] begged for clemency; a wish that was granted."  #<Es scheint, dass die diplomatischen Bemühungen von [ROOT.GetCountry.GetRuler.GetName] ausreichten, um den Willen des Armeniers [GetCountry('ARM').GetRulerTitle] zu brechen, denn [GetCountry('ARM').GetRuler.GetName] unterwarf sich sofort und bat nur um Freundlichkeit gegenüber den Bergbewohnern. Obwohl [GetCountry('ARM').GetRuler.GetFirstName] zugab, dass die Parther jedes Recht hatten, ihr Land zu plündern und zu plündern, flehte [GetCountry('ARM').GetRuler.GetSheHe] um Gnade; ein Wunsch, der erfüllt wurde.>  #NT!
 me_parthia.3201.a: "Fantastic news!"  #<Fantastische Neuigkeiten!>  #NT!
  
 me_parthia.3202.t: "Subjugate Armenia - Response"  #<Unterwerfe Armenien – Antwort>  #NT!
 me_parthia.3202.desc: "The answer of the Armenian [GetCountry('ARM').GetRulerTitle] was so rude and filled with insults that the scribes of [ROOT.GetCountry.GetRuler.GetName] did not read the contents of the letter to the [ROOT.GetCountry.GetRulerTitle], claiming only that [GetCountry('ARM').GetRuler.GetName] had respectfully declined. If [ROOT.GetCountry.GetRuler.GetFirstName] knew what was really said, then the armies of [ROOT.GetCountry.GetName] would have marched from [ROOT.GetCountry.GetCapital.GetName] that same evening."  #<Die Antwort des Armeniers [GetCountry('ARM').GetRulerTitle] war so unhöflich und voller Beleidigungen, dass die Schreiber von [ROOT.GetCountry.GetRuler.GetName] den Inhalt des Briefes an [ROOT.GetCountry.GetRulerTitle] nicht lasen und lediglich behaupteten, [GetCountry('ARM').GetRuler.GetName] habe respektvoll abgelehnt. Wenn [ROOT.GetCountry.GetRuler.GetFirstName] wüsste, was wirklich gesagt wurde, dann wären die Armeen von [ROOT.GetCountry.GetName] noch am selben Abend von [ROOT.GetCountry.GetCapital.GetName] aus marschiert.>  #NT!
 me_parthia.3202.a: "This kingdom shall be ours soon anyway..."  #<Dieses Königreich wird sowieso bald unser sein ...>  #NT!
 me_parthia.3202.a.tt: "We will get claims on all of [GetCountry('ARM').GetAdjective|G] lands."  #<Wir werden Ansprüche auf alle [GetCountry('ARM').GetAdjective|G] Länder erhalten.>  #NT!
  
 me_parthia.33.t: "Parthian Ultimatum"  #<Parthisches Ultimatum>  #NT!
 me_parthia.33.desc: "My [ROOT.GetCountry.GetRulerTitle], we have dire news to share with you this morning; a group of diplomats have arrived from the east, carrying the banner of the #E Parthians#!. Thankfully, these men were not a scouting party heralding an invasion, although they might as well be...the Parthians are asking us to submit peacefully to them as their #E March#!.\n\nAfter delivering their message, the embassy refused to stay the night in [ROOT.GetCountry.GetCapital.GetName], but asked to know our answer immediately."  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben heute Morgen schreckliche Neuigkeiten für Sie; Aus dem Osten ist eine Gruppe von Diplomaten eingetroffen, die das Banner der #E Parther#!. tragen. Glücklicherweise handelte es sich bei diesen Männern nicht um einen Spähtrupp, der eine Invasion ankündigte, obwohl sie es genauso gut sein könnten ... die Parther bitten uns, uns ihnen friedlich zu unterwerfen, als ihr #E März#!.\n\nNach der Übermittlung ihrer Nachricht weigerte sich die Botschaft, in [ROOT.GetCountry.GetCapital.GetName] über Nacht zu bleiben, fragte aber nach unserer Antwort sofort.>  #NT!
 me_parthia.33.a: "We will submit...for now"  #<Wir werden vorerst einreichen>  #NT!
 me_parthia.33.b: "Come find your death in the mountains, Parthian dog!"  #<Komm und finde deinen Tod in den Bergen, Partherhund!>  #NT!
  
 me_parthia.3301.t: "Caucasian Valleys - Iberia Responds"  #<Kaukasische Täler – Iberia reagiert>  #NT!
 me_parthia.3301.desc: "You will be pleased to hear, [ROOT.GetCountry.GetRuler.GetName], that [GetCountry('IBR').GetRuler.GetName] has sent [GetCountry('IBR').GetRuler.GetHerHis] royal regalia to [ROOT.GetCountry.GetCapital.GetName] in a sign of their submission...another bloodless victory for the armies of [ROOT.GetCountry.GetName]!"  #<Sie werden erfreut sein zu hören, [ROOT.GetCountry.GetRuler.GetName], dass [GetCountry('IBR').GetRuler.GetName] [GetCountry('IBR').GetRuler.GetHerHis] königliche Insignien an [ROOT.GetCountry.GetCapital.GetName] als Zeichen ihrer Unterwerfung geschickt hat ... ein weiterer unblutiger Sieg für die Armeen von [ROOT.GetCountry.GetName]!>  #NT!
 me_parthia.3301.a: "This was the only natural outcome"  #<Dies war das einzig natürliche Ergebnis>  #NT!
  
 me_parthia.3302.t: "Caucasian Valleys - Iberia Responds"  #<Kaukasische Täler – Iberia reagiert>  #NT!
 me_parthia.3302.desc: "[GetCountry('IBR').GetRuler.GetName] has responded to our demand with a taunt, claiming that the #E Caucasus Mountains#! will be the burial place for [ROOT.GetCountry.GetRuler.GetName].\n\n'No man will know where your body is buried, Parthian wretch, and the snows of our homeland will blanket your meager tomb and erase it from history.'"  #<[GetCountry('IBR').GetRuler.GetName] hat auf unsere Forderung mit einer Verspottung geantwortet und behauptet, dass das #E Kaukasusgebirge#! die Grabstätte für [ROOT.GetCountry.GetRuler.GetName] sein wird.\n\n'Kein Mensch wird wissen, wo dein Leichnam begraben liegt, parthischer Schurke, und der Schnee unserer Heimat wird dein dürftiges Grab bedecken und es aus der Geschichte löschen.'>  #NT!
 me_parthia.3302.a: "I will personally kill [GetCountry('IBR').GetRuler.GetFirstName]"  #<Ich werde persönlich [GetCountry('IBR').GetRuler.GetFirstName] töten>  #NT!
 me_parthia.3302.a.tt: "We will get claims on all of [GetCountry('IBR').GetAdjective] lands."  #<Wir werden Ansprüche auf alle [GetCountry('IBR').GetAdjective] Länder erhalten.>  #NT!
  
 me_parthia.36.t: "Centralize The Realm"  #<Zentralisieren Sie das Reich>  #NT!
 me_parthia.36.desc: "There seemed to be just no other way to proceed for [ROOT.GetCountry.GetRuler.GetName]. Having thought to [ROOT.GetCountry.GetRuler.GetHerHim]self and discussed with the Council times enough, now came the time for decisiveness.\n\nAnd yet, there was still hesitation and [ROOT.GetCountry.GetRuler.GetHerHis] heart was pounding; the consequences of [ROOT.GetCountry.GetRuler.GetHerHis] actions would echo throughout time and cause the deaths of countless thousands, but something had to be done about [ROOT.GetCountry.GetName]'s subjects.\n\nThe loose network of #E Marches#! that once allowed our might to be projected everywhere now threatened to tear that same power apart. Many advising [ROOT.GetCountry.GetRuler.GetFirstName] called for the many 'Strategoi' and Satraps that made their fortunes off of us to be relieved from their posts, but this offront would surely lead to civil war... and yet leaving these regional exarchs to rule on their own could well have permanent consequences, with our power waning in those regions bit by bit, day by day.\n\nOn one man's head lay the future of the Parthian Empire."  #<Es schien einfach keine andere Möglichkeit zu geben, für [ROOT.GetCountry.GetRuler.GetName] vorzugehen. Nachdem wir oft genug darüber nachgedacht und mit dem Rat gesprochen hatten, kam jetzt die Zeit der Entschlossenheit.\n\nUnd doch gab es immer noch Zögern und [ROOT.GetCountry.GetRuler.GetHerHis] das Herz klopfte; Die Konsequenzen von [ROOT.GetCountry.GetRuler.GetHerHis] Aktionen würden sich über die Zeit widerspiegeln und den Tod unzähliger Tausender verursachen, aber es musste etwas gegen die Untertanen von [ROOT.GetCountry.GetName] unternommen werden.\n\nDas lockere Netzwerk von #E Märschen#!, das es einst ermöglichte, unsere Macht überall hin zu projizieren, drohte nun, dieselbe Macht zu zerreißen. Viele, die [ROOT.GetCountry.GetRuler.GetFirstName] berieten, forderten die Entlassung der vielen „Strategen“ und Satrapen, die mit uns ihr Vermögen verdienten, von ihren Posten, aber diese Offensive würde sicherlich zu einem Bürgerkrieg führen ... und dennoch könnte es durchaus dauerhafte Folgen haben, diese regionalen Exarchen allein regieren zu lassen, da unsere Macht in diesen Regionen Stück für Stück, Tag für Tag, schwindet.\n\nAuf dem Kopf eines Mannes lag die Zukunft des Partherreiches.>  #NT!
 me_parthia.36.a: "No dissent will be heard!"  #<Es wird kein Widerspruch zu hören sein!>  #NT!
 me_parthia.36.b: "If bloodshed can be avoided, let's wait."  #<Wenn Blutvergießen vermieden werden kann, warten wir.>  #NT!
 pth_civil_war_averted_tt: "All our Marches shall change to Satrapies and can be integrated after 10 years!\NWe will be locked from doing the next mission, as long as we have any Satrapies."  #<Alle unsere Märsche werden in Satrapien umgewandelt und können nach 10 Jahren integriert werden!\NWir werden von der Durchführung der nächsten Mission ausgeschlossen, solange wir Satrapien haben.>  #NT!
  
 me_parthia.37.t: "Civil War!"  #<Bürgerkrieg!>  #NT!
 me_parthia.37.desc: "Woe! The [resistance_leader.GetName] has decided to declare war on our central administration and has established a new court in [SCOPE.sProvince('center_of_resistance').GetName]!\n\nClaiming to be sons of the saddle and worshipping the open plain and sky, the Parthian Horde has assembled for one last time, in a desperate ride for freedom; there are whispers out in the country that we have become the idle imperial monster we once trampled on, and now we will be trampled in turn. Our policy of centralizing the tribes is now being put to it's greatest test."  #<Weh! Die [resistance_leader.GetName] hat beschlossen, unserer Zentralverwaltung den Krieg zu erklären und hat in [SCOPE.sProvince('center_of_resistance').GetName] ein neues Gericht errichtet!\n\nMit dem Anspruch, Söhne des Sattels zu sein und die weite Ebene und den Himmel zu verehren, hat sich die Partherhorde ein letztes Mal versammelt, in einem verzweifelten Ritt nach Freiheit; Im Land wird geflüstert, dass wir zu dem müßigen imperialen Monster geworden sind, auf dem wir einst herumgetrampelt wurden, und dass nun auch wir mit Füßen getreten werden. Unsere Politik der Zentralisierung der Stämme wird jetzt auf die größte Probe gestellt.>  #NT!
 me_parthia.37.a: "To victory!"  #<Zum Sieg!>  #NT!
  
 me_parthia.38.t: "Conquer Persia"  #<Erobere Persien>  #NT!
 me_parthia.38.desc: "War and turmoil have turned Persia from the greatest threat to Greek sovereignty to a border region where local power mongers dwell.\n\nAs this piece cultural heartland of Iran, Persian people and their institutions need to become integral parts of our sphere of influence. We could entrust the administration of these lands to the Persian nobles that ruled the land under the Achaemenids and who to some extent have retained their power to this day.\nOn the other hand, there are those who would much prefer direct rule and access to resources of our realm."  #<Krieg und Unruhen haben Persien von der größten Bedrohung für die griechische Souveränität in eine Grenzregion verwandelt, in der lokale Machthaber leben.\n\nDa es sich um das kulturelle Herzland Irans handelt, müssen das persische Volk und seine Institutionen zu integralen Bestandteilen unseres Einflussbereichs werden. Wir könnten die Verwaltung dieser Länder den persischen Adligen anvertrauen, die das Land unter den Achämeniden beherrschten und die bis zu einem gewissen Grad ihre Macht bis heute behalten haben.\nAndererseits gibt es diejenigen, die die direkte Herrschaft und den Zugang zu den Ressourcen unseres Reiches viel vorziehen würden.>  #NT!
 me_parthia.38.a: "Allow self-rule."  #<Selbstverwaltung zulassen.>  #NT!
 me_parthia.38.b: "Allow self-rule."  #<Selbstverwaltung zulassen.>  #NT!
 me_parthia.38.c: "We're rulers of all Iran."  #<Wir sind die Herrscher über den gesamten Iran.>  #NT!
  
 me_parthia.39.t: "Conquer Ariana"  #<Erobere Ariana>  #NT!
 me_parthia.39.desc: "As our armies conquer the desolate Arian region and expel Hellenistic influence over the local deserts, they have once again been reminded of what an alien land Ariana is. Despite being very poor, for example on its southern border, by the sea, dwell people famous for catching pearls - so there are economic opportunities, just have to look for them and maybe invest some money and effort.\n\nThis is also where large chunk the army of Alexander himself perished, leaving their souls in those deserts forever."  #<Während unsere Armeen die verlassene arianische Region erobern und den hellenistischen Einfluss über die lokalen Wüsten vertreiben, werden sie erneut daran erinnert, was für ein fremdes Land Ariana ist. Obwohl es sehr arm ist, zum Beispiel an der Südgrenze, am Meer, leben Menschen, die für den Perlenfang berühmt sind – es gibt also wirtschaftliche Möglichkeiten, man muss nur danach suchen und vielleicht etwas Geld und Mühe investieren.\n\nHier starb auch ein großer Teil der Armee Alexanders selbst und ließ ihre Seelen für immer in diesen Wüsten zurück.>  #NT!
 me_parthia.39.a: "Allow self-rule."  #<Selbstverwaltung zulassen.>  #NT!
 me_parthia.39.b: "Subject on eastern border doesn't suit us."  #<Das Motiv an der Ostgrenze passt nicht zu uns.>  #NT!
  
 me_parthia.3901.t: "Great Houses"  #<Tolle Häuser>  #NT!
 me_parthia.3901.desc: "[the_important_guy1.GetName], [the_important_guy2.GetName] and [the_important_guy3.GetName] have integrated into #E Parthian#! cultures, and their families followed suit. This is the natural outcome of us blending more and more seamlessly with our sedentary subjects, and in due time we will hopefully be seen by them as their unquestionable rightful masters."  #<[the_important_guy1.GetName], [the_important_guy2.GetName] und [the_important_guy3.GetName] haben sich in #E parthische#! Kulturen integriert, und ihre Familien folgten diesem Beispiel. Dies ist die natürliche Folge davon, dass wir uns immer nahtloser mit unseren sesshaften Untertanen vermischen und wir hoffentlich zu gegebener Zeit von ihnen als ihre unbestreitbaren rechtmäßigen Herren angesehen werden.>  #NT!
 me_parthia.3901.a: "Our Great Families are sure to leave a mark on the history books"  #<Unsere großen Familien werden mit Sicherheit Spuren in den Geschichtsbüchern hinterlassen>  #NT!
  
 me_parthia.41.t: "Administrative Language"  #<Verwaltungssprache>  #NT!
 me_parthia.41.desc: "With the wise #E Artabid#! [SCOPE.sCharacter('parthian_steward_scope').GetName] at [ROOT.GetCountry.GetRuler.GetHerHis] side, [ROOT.GetCountry.GetRuler.GetName] felt confident moving forward with the momentous decision to choose an official language for the [ROOT.GetCountry.GetAdjective] scribes. By selecting one over the others, the [ROOT.GetCountry.GetRulerTitle] would be shaping the literary traditions of [ROOT.GetCountry.GetName] for generations to come; such decisions were not made lightly, and [ROOT.GetCountry.GetRuler.GetFirstName] felt the weight of history upon [ROOT.GetCountry.GetRuler.GetHerHis] shoulders."  #<Mit dem weisen #E Artabid#! [SCOPE.sCharacter('parthian_steward_scope').GetName] an [ROOT.GetCountry.GetRuler.GetHerHis] Seite war [ROOT.GetCountry.GetRuler.GetName] zuversichtlich, die bedeutsame Entscheidung voranzutreiben, eine offizielle Sprache für die [ROOT.GetCountry.GetAdjective] Schriftgelehrten zu wählen. Indem die [ROOT.GetCountry.GetRulerTitle] eine der anderen vorziehen, würden sie die literarischen Traditionen von [ROOT.GetCountry.GetName] für kommende Generationen prägen; Solche Entscheidungen wurden nicht leichtfertig getroffen, und [ROOT.GetCountry.GetRuler.GetFirstName] spürte die Last der Geschichte auf [ROOT.GetCountry.GetRuler.GetHerHis] Schultern.>  #NT!
 me_parthia.41.a: "The language of the #E Achaemenid#! bureaucracy is an obvious choice"  #<Die Sprache der #E achämenidischen#! Bürokratie ist eine offensichtliche Wahl>  #NT!
 me_parthia.41.b: "#E Greek#! is the new language that everyone must know"  #<#E Griechisch#! ist die neue Sprache, die jeder kennen muss>  #NT!
 me_parthia.41.c: "All will learn #E Parthian#! sooner or later!"  #<Alle werden früher oder später #E Parther#! lernen!>  #NT!
  
 me_parthia.42.t: "Convene Magastan - Start"  #<Magastan einberufen - Start>  #NT!
 me_parthia.42.desc: "[ROOT.GetCountry.GetRuler.GetName] has led the armies of [ROOT.GetCountry.GetName] into battle countless times, facing down motivated enemies that outnumbered us two to one, yet [ROOT.GetCountry.GetRuler.GetSheHe] was still able to achieve victory against impossible odds. And the mighty [ROOT.GetCountry.GetRulerTitle] has left [ROOT.GetCountry.GetRuler.GetHerHis] imprint on the land itself, constructing cities and buildings throughout the realm that has increased the standard of living for our kinsmen - clearly, there are few things that [ROOT.GetCountry.GetRuler.GetFirstName] does not excel at.\n\nBut there is one thing that [ROOT.GetCountry.GetRuler.GetSheHe] loathes, and despite [ROOT.GetCountry.GetRuler.GetHerHis] repeated efforts to delay the inevitable, the time has come to assemble a local council, known in our language as a #E 'Magastan'#!, where [ROOT.GetCountry.GetRuler.GetFirstName] will have to sit and listen to petty arguments for hours..."  #<[ROOT.GetCountry.GetRuler.GetName] hat die Armeen von [ROOT.GetCountry.GetName] unzählige Male in die Schlacht geführt und sich motivierten Feinden gestellt, die uns zwei zu eins überlegen waren, und doch konnte [ROOT.GetCountry.GetRuler.GetSheHe] trotz aller Widrigkeiten den Sieg erringen. Und der mächtige [ROOT.GetCountry.GetRulerTitle] hat [ROOT.GetCountry.GetRuler.GetHerHis] Spuren im Land selbst hinterlassen und im gesamten Reich Städte und Gebäude errichtet, die den Lebensstandard unserer Verwandten erhöht haben – offensichtlich gibt es nur wenige Dinge, in denen [ROOT.GetCountry.GetRuler.GetFirstName] sich nicht auszeichnet.\n\nAber es gibt eine Sache, die [ROOT.GetCountry.GetRuler.GetSheHe] verabscheut, und trotz [ROOT.GetCountry.GetRuler.GetHerHis] wiederholter Bemühungen, das Unvermeidliche hinauszuzögern, ist es an der Zeit, einen Gemeinderat zusammenzustellen, der in unserem Land bekannt ist Sprache als #E 'Magastan'#!,, in dem [ROOT.GetCountry.GetRuler.GetFirstName] stundenlang sitzen und sich kleinliche Argumente anhören muss ...>  #NT!
 me_parthia.42.a: "Ugh...may the gods make the hours pass quickly!"  #<Ugh...mögen die Götter dafür sorgen, dass die Stunden schnell vergehen!>  #NT!
 me_parthia.42.tt: "We will be presented with petitions from our court."  #<Uns werden Petitionen von unserem Gericht vorgelegt.>  #NT!
  
 me_parthia.4201.t: "Convene Magastan - Holdings Requested"  #<Einberufung von Magastan – Beteiligungen beantragt>  #NT!
 me_parthia.4201.desc: "Despite the Great Families being the most influential and rich people in our realm, apparently there's not such a thing as a limit to human greed. Latest in line is [target.GetName], who has convinced the masses that [target.GetSheHe] has the right to some of our public land. Another corrupt ploy from the nobility, but question still remains how we need to approach this. After all, angering a Great Family might not be too prudent when we have enough land or money to go around, and satisfy their demands."  #<Obwohl die Großen Familien die einflussreichsten und reichsten Menschen in unserem Reich sind, gibt es offenbar keine Grenzen für die menschliche Gier. Der Neueste in der Reihe ist [target.GetName], der die Massen davon überzeugt hat, dass [target.GetSheHe] das Recht auf einen Teil unseres öffentlichen Landes hat. Ein weiterer korrupter Trick des Adels, aber es bleibt immer noch die Frage, wie wir damit umgehen müssen. Schließlich ist es möglicherweise nicht allzu klug, eine große Familie zu verärgern, wenn wir genug Land oder Geld haben, um herumzukommen und ihre Ansprüche zu befriedigen.>  #NT!
 me_parthia.4201.a: "Tell him to go away"  #<Sag ihm, er soll gehen>  #NT!
 me_parthia.4201.b: "No problem, enough land to go around"  #<Kein Problem, genug Land, um herumzukommen>  #NT!
 me_parthia.4201.c: "I'd rather just pay him off..."  #<Ich würde ihn lieber einfach auszahlen...>  #NT!
  
 me_parthia.4202.t: "Convene Magastan - Settle Quarrel"  #<Magastan einberufen – Streit beilegen>  #NT!
 me_parthia.4202.desc: "The [target1.GetName] and [target2.GetName] have never really gotten along, as could be expected of two Great Houses with competing interests in a single state. As such, whatever the trivialities of their differences are to us, we can get some easy favors with either family by voicing support for them. Of course, this will anger the other family, but this is a song and dance that [ROOT.GetCountry.GetRuler.GetName] is all-too-familiar with. The obvious third choice is to tell them all to shoo and not bother us with their idiotic squabbling."  #<Die [target1.GetName] und [target2.GetName] haben sich nie wirklich verstanden, wie man es von zwei Großen Häusern mit konkurrierenden Interessen in einem einzigen Staat erwarten kann. Unabhängig davon, wie trivial ihre Differenzen für uns auch sein mögen, können wir bei beiden Familien leicht einen Gefallen finden, indem wir ihre Unterstützung zum Ausdruck bringen. Natürlich wird das die andere Familie verärgern, aber das ist ein Lied und ein Tanz, mit dem [ROOT.GetCountry.GetRuler.GetName] nur allzu vertraut ist. Die offensichtliche dritte Möglichkeit besteht darin, ihnen allen zu sagen, sie sollen uns verscheuchen und uns nicht mit ihrem idiotischen Streit belästigen.>  #NT!
 me_parthia.4202.a: "Let's side with [target1.GetName]"  #<Bleiben wir auf der Seite von [target1.GetName]>  #NT!
 me_parthia.4202.b: "It's in our interest to side with [target2.GetName]"  #<Es liegt in unserem Interesse, auf der Seite von [target2.GetName] zu stehen>  #NT!
 me_parthia.4202.c: "Honestly, who has time to listen to this?"  #<Mal ehrlich, wer hat schon Zeit, sich das anzuhören?>  #NT!
  
 me_parthia.4203.t: "Convene Magastan - Plight Of [culture_target_scope.GetName]"  #<Convene Magastan - Notlage von [culture_target_scope.GetName]>  #NT!
 me_parthia.4203.desc: "The [culture_target_scope.GetName] peoples are destitute, due to their last harvest being unusually small. Their situation got the sympathy of some of their local nobles, and as a charitable effort, [ROOT.GetCountry.GetRuler.GetName] is looking at a petition to use state resources to help the poor souls.[GetOffice('office_foreign_minister').GetCulturalName(SCOPE.GetRootScope.GetCountry)] and [GetOffice('office_royal_tutor').GetCulturalName(SCOPE.GetRootScope.GetCountry)] have become the champions of the [culture_target_scope.GetName] people in our nation. They have pragmatically argued that we stand to benefit in making sure to nip any potential uprising in the bud, and our efforts will certainly gain us some gratitude."  #<Die [culture_target_scope.GetName]-Völker sind mittellos, da ihre letzte Ernte ungewöhnlich gering war. Ihre Situation erregte das Mitgefühl einiger ihrer örtlichen Adligen, und als wohltätige Aktion prüft [ROOT.GetCountry.GetRuler.GetName] eine Petition, um staatliche Mittel zu nutzen, um den armen Seelen zu helfen.[GetOffice('office_foreign_minister').GetCulturalName(SCOPE.GetRootScope.GetCountry)] und [GetOffice('office_royal_tutor').GetCulturalName(SCOPE.GetRootScope.GetCountry)] sind die Vorkämpfer der [culture_target_scope.GetName] Menschen in unserer Nation geworden. Sie haben pragmatisch argumentiert, dass es für uns von Vorteil sein wird, jeden potenziellen Aufstand im Keim zu ersticken, und unsere Bemühungen werden uns sicherlich eine gewisse Dankbarkeit einbringen.>  #NT!
 me_parthia.4203.a: "Their problems are inconsequential"  #<Ihre Probleme sind belanglos>  #NT!
 me_parthia.4203.b: "Bail them out"  #<Befreien Sie sie>  #NT!
  
 me_parthia.4204.t: "Convene Magastan - Ostracism"  #<Convene Magastan - Ausgrenzung>  #NT!
 me_parthia.4204.desc: "Elements of the nobility have spent a lot of time and resources criticizing [target.GetName] as of late, and entirely revoking [target.GetHerHis] office has been proposed. The majority of the stakeholders in the debate will eagerly agree to send [target.GetPraenomen] packing back to [ROOT.GetCountry.GetCapital.GetName], but there are those who say that ostractism is a step too far."  #<Elemente des Adels haben in letzter Zeit viel Zeit und Ressourcen darauf verwendet, [target.GetName] zu kritisieren, und es wurde vorgeschlagen, [target.GetHerHis] das Amt vollständig zu entziehen. Die Mehrheit der an der Debatte Beteiligten wird bereitwillig zustimmen, [target.GetPraenomen] nach [ROOT.GetCountry.GetCapital.GetName] zurückzuschicken, aber es gibt diejenigen, die sagen, dass Ausgrenzung ein Schritt zu weit ist.>  #NT!
 me_parthia.4204.a: "Yes, no point in opposing our court on this."  #<Ja, es hat keinen Sinn, sich diesbezüglich unserem Gericht zu widersetzen.>  #NT!
 me_parthia.4204.b: "No - are we being taught on human resourcing?"  #<Nein – werden wir über Personalressourcen unterrichtet?>  #NT!
  
 me_parthia.4205.t: "Convene Magastan - Declare War"  #<Magastan einberufen – Krieg erklären>  #NT!
 me_parthia.4205.desc: "Lately, [war_target.GetName] has become a hated name on the streets of [ROOT.GetCountry.GetCapital.GetName], with rumors and stories of the horrible [war_target.GetPrimaryCulture.GetName] people spreading like wildfire. It seems our nobility has actively tried to push the slander and lies this time, and it is only confirmed when [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] takes center stage and calls for war.\n\nA large majority has been swayed by the propaganda, and demands war from our [ROOT.GetCountry.GetRulerTitle]."  #<In letzter Zeit ist [war_target.GetName] zu einem verhassten Namen auf den Straßen von [ROOT.GetCountry.GetCapital.GetName] geworden, und Gerüchte und Geschichten über die schrecklichen [war_target.GetPrimaryCulture.GetName]-Menschen verbreiten sich wie ein Lauffeuer. Es scheint, dass unser Adel dieses Mal aktiv versucht hat, die Verleumdungen und Lügen voranzutreiben, und dies wird erst bestätigt, als [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] im Mittelpunkt steht und zum Krieg ruft.\n\nEine große Mehrheit hat sich von der Propaganda beeinflussen lassen und fordert von unserem [ROOT.GetCountry.GetRulerTitle] Krieg.>  #NT!
 me_parthia.4205.a: "There was always something arrogant about [war_target.GetName]!"  #<[war_target.GetName] hatte immer etwas Arrogantes!>  #NT!
 me_parthia.4205.b: "Peace must be preserved"  #<Der Frieden muss gewahrt bleiben>  #NT!
  
 me_parthia.43.t: "Convene Magastan - End"  #<Einberufung Magastan - Ende>  #NT!
 me_parthia.43.desc: "With all complaining taken care of, [ROOT.GetCountry.GetRuler.GetName] can now see to more important matters. We can only hope that - at least for now - our nobles can be satisfied with the results of the Council and our realm is more stable, united and stronger to face the challenges to come."  #<Nachdem alle Beschwerden erledigt sind, kann sich [ROOT.GetCountry.GetRuler.GetName] nun um wichtigere Dinge kümmern. Wir können nur hoffen, dass unsere Adligen – zumindest vorerst – mit den Ergebnissen des Rates zufrieden sein können und unser Reich stabiler, vereinter und stärker ist, um den kommenden Herausforderungen zu begegnen.>  #NT!
 me_parthia.43.a: "Good thing we don't have elections..."  #<Gut, dass wir keine Wahlen haben...>  #NT!
 me_parthia.43.tt: "#E Magastan#! has concluded!"  #<#E Magastan#! ist abgeschlossen!>  #NT!
  
 me_parthia.44.t: "Office of Spahbed"  #<Büro von Spahbed>  #NT!
 me_parthia.44.desc: "The military office of the #E Spahbed#! carries with it great authority and prestige and is highly coveted by the leading families living in [ROOT.GetCountry.GetCapital.GetName], many of whom are bitter rivals with each other. The Spahbed is one of the highest ranked military officers in all of [ROOT.GetCountry.GetName] and is entrusted with the sacred duty of leading our armies into battle. Operating as an extension of [ROOT.GetCountry.GetRuler.GetName]'s will, the Spahbed retains the title for life, and the office will remain in his family for generations to come.\n\nThe time has come to appoint a Spahbed, and while we are lucky to have a handful of strong contenders for the role, there will undoubtedly be hurt feelings by those not selected - [ROOT.GetCountry.GetRuler.GetFirstName] has to choose wisely."  #<Das Militäramt des #E Spahbed#! bringt große Autorität und Prestige mit sich und ist bei den führenden Familien in [ROOT.GetCountry.GetCapital.GetName], von denen viele erbitterte Rivalen untereinander sind, sehr begehrt. Der Spahbed ist einer der ranghöchsten Militäroffiziere in ganz [ROOT.GetCountry.GetName] und ihm ist die heilige Pflicht anvertraut, unsere Armeen in die Schlacht zu führen. Als Erweiterung von [ROOT.GetCountry.GetRuler.GetName]s Testament behält der Spahbed den Titel auf Lebenszeit, und das Amt bleibt über Generationen hinweg im Besitz seiner Familie.\n\nDie Zeit ist gekommen, einen Spahbed zu ernennen, und obwohl wir das Glück haben, eine Handvoll starker Kandidaten für die Rolle zu haben, werden diejenigen, die nicht ausgewählt werden, zweifellos verletzte Gefühle hervorrufen – [ROOT.GetCountry.GetRuler.GetFirstName] muss mit Bedacht wählen.>  #NT!
 me_parthia.44.a: "I choose [important_guy10.GetFamily.GetName]"  #<Ich wähle [important_guy10.GetFamily.GetName]>  #NT!
 me_parthia.44.tt.a: "[important_guy10.GetFamily.GetName] family members will get #R #E @military_icon! 5 Martial Ability#!#! on assuming the office of #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone else will lose #R 5 Martial#! points should they be appointed as a Spahbed.\n[important_guy10.GetFamily.GetName] family members will be heavily enraged, if a Spahbed from outside this family would be appointed."  #<[important_guy10.GetFamily.GetName] Familienmitglieder erhalten #R #E @military_icon! 5 Kampffähigkeit#!#! bei Übernahme des Amtes von #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone, sonst verlieren sie #R 5 Kampffähigkeit#! Punkte, wenn sie zum Spahbed ernannt werden.\n[important_guy10.GetFamily.GetName] Familienmitglieder werden sehr wütend sein, wenn ein Spahbed von außerhalb dieser Familie ernannt würde.>  #NT!
 me_parthia.44.b: "[important_guy20.GetFamily.GetName] deserve the honor"  #<[important_guy20.GetFamily.GetName] verdienen die Ehre>  #NT!
 me_parthia.44.tt.b: "[important_guy20.GetFamily.GetName] family members will get #R #E @military_icon! 5 Martial Ability#!#! on assuming the office of #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone else will lose #R 5 Martial#! points should they be appointed as a Spahbed.\n[important_guy20.GetFamily.GetName] family members will be heavily enraged, if a Spahbed from outside this family would be appointed."  #<[important_guy20.GetFamily.GetName] Familienmitglieder erhalten #R #E @military_icon! 5 Kampffähigkeit#!#! bei Übernahme des Amtes von #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone, sonst verlieren sie #R 5 Kampffähigkeit#! Punkte, wenn sie zum Spahbed ernannt werden.\n[important_guy20.GetFamily.GetName] Familienmitglieder werden sehr wütend sein, wenn ein Spahbed von außerhalb dieser Familie ernannt würde.>  #NT!
 me_parthia.44.c: "I'd rather pick [important_guy30.GetFamily.GetName]"  #<Ich würde lieber [important_guy30.GetFamily.GetName] wählen>  #NT!
 me_parthia.44.tt.c: "[important_guy30.GetFamily.GetName] family members will get #R #E @military_icon! 5 Martial Ability#!#! on assuming the office of #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone else will lose #R 5 Martial#! points should they be appointed as a Spahbed.\n[important_guy30.GetFamily.GetName] family members will be heavily enraged, if a Spahbed from outside this family would be appointed."  #<[important_guy30.GetFamily.GetName] Familienmitglieder erhalten #R #E @military_icon! 5 Kampffähigkeit#!#! bei Übernahme des Amtes von #E [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]#!.\nEveryone, sonst verlieren sie #R 5 Kampffähigkeit#! Punkte, wenn sie zum Spahbed ernannt werden.\n[important_guy30.GetFamily.GetName] Familienmitglieder werden sehr wütend sein, wenn ein Spahbed von außerhalb dieser Familie ernannt würde.>  #NT!
 me_parthia.44.e: "On second thought, no need to make it hereditary"  #<Wenn ich es mir genauer überlege, ist es nicht nötig, es erblich zu machen>  #NT!
  
 me_parthia.45.t: "Nisean Horses"  #<Nisäische Pferde>  #NT!
 me_parthia.45.desc: "One of [ROOT.GetCountry.GetRuler.GetName]'s favorite things to do is to ride across the open steppe, wind blowing through [ROOT.GetCountry.GetRuler.GetHerHis] hair and a good [ROOT.GetCountry.GetAdjective] bow in [ROOT.GetCountry.GetRuler.GetHerHis] hands. The powerful [ROOT.GetCountry.GetRulerTitle] has access to anything that [ROOT.GetCountry.GetRuler.GetSheHe] wants in this life, but there are few things that are more exhilarating than the pleasures of galloping across the endless expanse of our homeland.\n\nHorses @horses! have long served our people in times of war and peace, and there is a good argument to be made that [ROOT.GetCountry.GetName] would not be what it is without our strong cavalry. Mindful of how much we rely on these beasts of war, [ROOT.GetCountry.GetRuler.GetFirstName] has done more than most when it comes to encourage the breeding of fine stallions, particularly the #E Nisean#! variety that hails from the #E Iranian Plateau#!. With a surplus of these fine animals on hand, [ROOT.GetCountry.GetRuler.GetFirstName] must now decide how these mounts should be trained."  #<Eine der Lieblingsbeschäftigungen von [ROOT.GetCountry.GetRuler.GetName] ist es, durch die offene Steppe zu reiten, der Wind weht durch [ROOT.GetCountry.GetRuler.GetHerHis] Haare und ein guter [ROOT.GetCountry.GetAdjective] Bogen in [ROOT.GetCountry.GetRuler.GetHerHis] Händen. Der mächtige [ROOT.GetCountry.GetRulerTitle] hat Zugang zu allem, was [ROOT.GetCountry.GetRuler.GetSheHe] in diesem Leben will, aber es gibt nur wenige Dinge, die berauschender sind als die Freuden, durch die endlosen Weiten unseres Heimatlandes zu galoppieren.\n\nPferde @Pferde! haben unserem Volk in Kriegs- und Friedenszeiten lange gedient, und es gibt gute Argumente dafür, dass [ROOT.GetCountry.GetName] ohne unsere starke Kavallerie nicht das wäre, was es ist. In Anbetracht dessen, wie sehr wir uns auf diese Kriegstiere verlassen, hat [ROOT.GetCountry.GetRuler.GetFirstName] mehr als die meisten anderen getan, wenn es darum geht, die Zucht hervorragender Hengste zu fördern, insbesondere der Sorte #E Nisean#!, die aus dem #E Iranischen Plateau#! stammt. Da es einen Überschuss dieser schönen Tiere gibt, muss [ROOT.GetCountry.GetRuler.GetFirstName] nun entscheiden, wie diese Reittiere trainiert werden sollen.>  #NT!
 me_parthia.45.a: "@horse_archers! #E Horse Archers#! are the backbone of our army!"  #<@horse_archers! #E Berittene Bogenschützen#! sind das Rückgrat unserer Armee!>  #NT!
 me_parthia.45.b: "It is wise for us to specialize in @heavy_cavalry! #E Heavy Cavalry#!"  #<Es ist klug für uns, uns auf @heavy_cavalry zu spezialisieren! #E Schwere Kavallerie#!>  #NT!
 me_parthia.45.c: "@light_cavalry! #E Light Cavalry#! offers us the best flexibility"  #<@light_cavalry! #E Leichte Kavallerie#! bietet uns die beste Flexibilität>  #NT!
  
 me_parthia.46.t: "Documentation System"  #<Dokumentationssystem>  #NT!
 me_parthia.46.desc: "Originally, [ROOT.GetCountry.GetRuler.GetName] was only concerned with increasing our research, but the implementation of the new #E Documentation System#! throughout the academies of [ROOT.GetCountry.GetName] had an interesting side effect.\n\nAs word spread of the Parthian efforts to enshrine places of learning throughout the realm, a wise man by the name of [SCOPE.sCharacter('isidoros').GetName] traveled to [ROOT.GetCountry.GetCapital.GetName] and immediately presented himself at court, asking that [ROOT.GetCountry.GetRuler.GetFirstName] offer him employment. In return for providing the Macedonian with living quarters, [isidoros.GetFirstName] promised to assist our researchers and vowed that we would soon surpass all those opposed to us."  #<Ursprünglich ging es [ROOT.GetCountry.GetRuler.GetName] nur darum, unsere Forschung zu erweitern, aber die Implementierung des neuen #E Dokumentationssystems#! in den Akademien von [ROOT.GetCountry.GetName] hatte einen interessanten Nebeneffekt.\n\nAls sich die parthischen Bemühungen, Lernorte im gesamten Reich zu verankern, herumsprachen, reiste ein weiser Mann namens [SCOPE.sCharacter('isidoros').GetName] nach [ROOT.GetCountry.GetCapital.GetName] und stellte sich sofort vor Gericht und fragte danach [ROOT.GetCountry.GetRuler.GetFirstName] ihm eine Anstellung anbieten. Als Gegenleistung für die Bereitstellung von Wohnraum für die Mazedonier versprach [isidoros.GetFirstName], unsere Forscher zu unterstützen und schwor, dass wir bald alle Gegner übertreffen würden.>  #NT!
 me_parthia.46.a: "You will be a great asset to us in the days to come, Isidoros"  #<Du wirst uns in den kommenden Tagen eine große Bereicherung sein, Isidoros>  #NT!
 me_parthia.46.tt: "[isidoros.GetName|Y] can be employed."  #<[isidoros.GetName|Y] kann eingesetzt werden.>  #NT!
  
 me_parthia.47.t: "Symbol Of Power"  #<Symbol der Macht>  #NT!
 me_parthia.47.desc: "After many months of careful construction, the artisans and master craftsmen living in [ROOT.GetCountry.GetCapital.GetName] have finally finished working on the treasure commissioned by [ROOT.GetCountry.GetRuler.GetName] and are ready to present their handiwork to the noble [ROOT.GetCountry.GetRulerTitle]. [ROOT.GetCountry.GetRuler.GetFirstName] had many options to choose from, but when the time came to select which treasure would be made, there was no hesitation."  #<Nach vielen Monaten sorgfältiger Bauarbeiten haben die in [ROOT.GetCountry.GetCapital.GetName] lebenden Handwerker und Handwerksmeister endlich die Arbeit an dem von [ROOT.GetCountry.GetRuler.GetName] in Auftrag gegebenen Schatz abgeschlossen und sind bereit, ihre Handarbeit dem Adligen [ROOT.GetCountry.GetRulerTitle] zu präsentieren. [ROOT.GetCountry.GetRuler.GetFirstName] hatte viele Optionen zur Auswahl, aber als es an der Zeit war, auszuwählen, welcher Schatz hergestellt werden sollte, gab es kein Zögern.>  #NT!
 me_parthia.47.a: "The #E Bow#!, weapon of choice for our ancestors, is most fitting"  #<Die #E-Bogen#!,-Waffe unserer Vorfahren ist am passendsten>  #NT!
 # me_parthia.47.tt1: ""
 me_parthia.47.b: "The most obvious royal regalia is a #E Crown#!"  #<Das offensichtlichste königliche Insignien ist eine #E Krone#!>  #NT!
 # me_parthia.47.tt2: ""
 me_parthia.47.c: "The [ROOT.GetCountry.GetRuler.GetFamily.GetName]s require a proper #E Throne#!"  #<Die [ROOT.GetCountry.GetRuler.GetFamily.GetName] erfordern einen richtigen #E Thron#!>  #NT!
 # me_parthia.47.tt3: ""
  
 me_parthia.48.t: "Royal Capitals - Court Capital"  #<Royal Capitals – Hofhauptstadt>  #NT!
 me_parthia.48.desc: "First things first, we need to decide on the placement of our court. Our current capital, while being perfectly serviceable for current purposes, in the future may prove to be inadequate for our needs. As such, maybe we should explore other possibilities? Using this opportunity, we can move our realm's capital to either [city_scope_1.GetName], [city_scope_2.GetName], [city_scope_3.GetName] or content ourselves in current station."  #<Als Erstes müssen wir uns für die Platzierung unseres Gerichts entscheiden. Unser derzeitiges Kapital ist zwar für aktuelle Zwecke vollkommen brauchbar, könnte sich jedoch in Zukunft als unzureichend für unsere Bedürfnisse erweisen. Vielleicht sollten wir daher andere Möglichkeiten erkunden? Bei dieser Gelegenheit können wir die Hauptstadt unseres Reiches entweder nach [city_scope_1.GetName], [city_scope_2.GetName], [city_scope_3.GetName] verschieben oder uns mit der aktuellen Station begnügen.>  #NT!
 me_parthia.48.a: "Choose [city_scope_1.GetName]"  #<Wählen Sie [city_scope_1.GetName]>  #NT!
 me_parthia.48.b: "Pick [city_scope_2.GetName]"  #<Wählen Sie [city_scope_2.GetName]>  #NT!
 me_parthia.48.c: "The obvious choice is [city_scope_3.GetName]"  #<Die offensichtliche Wahl ist [city_scope_3.GetName]>  #NT!
 me_parthia.48.d: "Our current capital is good"  #<Unser aktuelles Kapital ist gut>  #NT!
  
 me_parthia.49.t: "Royal Capitals - Ceremonial Capital"  #<Royal Capitals – Zeremonielle Hauptstadt>  #NT!
 me_parthia.49.desc: "Although have we abandoned the steppe for the city, our nomadic roots are not to be forgotten and it might be wise to set a ceremonial capital city, where rulers are crowned on ascendance into power - somewhere close to the Parthia region might be a wise choice? That would surely link that powerbase of ours with our interests closer. Thankfully, we have so many more options, and no subject of ours would be disappointed with being closer to the King of Kings."  #<Obwohl wir die Steppe für die Stadt aufgegeben haben, dürfen wir unsere nomadischen Wurzeln nicht vergessen und es könnte klug sein, eine zeremonielle Hauptstadt zu errichten, in der Herrscher gekrönt werden, wenn sie an die Macht kommen – irgendwo in der Nähe der Parthienregion könnte eine kluge Wahl sein? Das würde unsere Machtbasis sicherlich enger mit unseren Interessen verbinden. Zum Glück haben wir so viel mehr Möglichkeiten, und kein Proband von uns wäre enttäuscht, wenn er näher am König der Könige wäre.>  #NT!
 me_parthia.49.a: "Obvious choice is [city_scope_10.GetName]"  #<Offensichtliche Wahl ist [city_scope_10.GetName]>  #NT!
 me_parthia.49.b: "Choose [city_scope_20.GetName]"  #<Wählen Sie [city_scope_20.GetName]>  #NT!
 me_parthia.49.c: "Pick [city_scope_30.GetName]"  #<Wählen Sie [city_scope_30.GetName]>  #NT!
  
 me_parthia.50.t: "Royal Capitals - Treasury Capital"  #<Royal Capitals – Treasury Capital>  #NT!
 me_parthia.50.desc: "One last thing remains to conceive in this matter, and that is where our treasury should be located. It obviously would be best somewhere safe, but on the other hand, some say that the best place to hide something is in the plain sight. Nevetheless, accounting for our wealth would require a legion of bureaucrats on its own, and as such, a good city should be chosen for this."  #<Eine letzte Sache bleibt in dieser Angelegenheit noch zu bedenken, und zwar der Ort, an dem sich unsere Schatzkammer befinden sollte. Am besten wäre es natürlich an einem sicheren Ort, aber andererseits sagen manche, dass man etwas am besten verstecken kann, wenn man es einfach sieht. Dennoch würde die Berechnung unseres Reichtums allein eine Legion von Bürokraten erfordern, und daher sollte hierfür eine gute Stadt ausgewählt werden.>  #NT!
 me_parthia.50.a: "Pick [city_scope_100.GetName]"  #<Wählen Sie [city_scope_100.GetName]>  #NT!
 me_parthia.50.b: "Obvious choice is [city_scope_200.GetName]"  #<Offensichtliche Wahl ist [city_scope_200.GetName]>  #NT!
 me_parthia.50.c: "Choose [city_scope_300.GetName]"  #<Wählen Sie [city_scope_300.GetName]>  #NT!
  
 me_parthia.51.t: "Expand Rug Production"  #<Erweitern Sie die Teppichproduktion>  #NT!
 me_parthia.51.desc: "In order to facilitate the production of fine carpets @leather! throughout [ROOT.GetCountry.GetName], the economic advisors of [ROOT.GetCountry.GetRuler.GetName] inspected many of our cities in search of markets that they could exploit. Due to the great need for dyes @dye! and cloth @cloth!, many cities were forced to produce these tradegoods, abandoning their local industry at the orders of the [ROOT.GetCountry.GetRulerTitle]. Foreign merchants paid small fortunes for the rugs and carpets that were found in our bazaars, and [ROOT.GetCountry.GetRuler.GetFirstName] would do anything [ROOT.GetCountry.GetRuler.GetSheHe] could to take the gold and silver coins from the traders."  #<Um die Herstellung feiner Teppiche zu erleichtern @leather! Im Laufe von [ROOT.GetCountry.GetName] inspizierten die Wirtschaftsberater von [ROOT.GetCountry.GetRuler.GetName] viele unserer Städte auf der Suche nach Märkten, die sie nutzen könnten. Aufgrund des großen Bedarfs an Farbstoffen @dye! und Tuch @cloth! waren viele Städte gezwungen, diese Handelswaren herzustellen und gaben auf Befehl des [ROOT.GetCountry.GetRulerTitle] ihre lokale Industrie auf. Ausländische Händler zahlten ein kleines Vermögen für die Teppiche, die auf unseren Basaren gefunden wurden, und [ROOT.GetCountry.GetRuler.GetFirstName] würde alles tun, was [ROOT.GetCountry.GetRuler.GetSheHe] konnte, um den Händlern die Gold- und Silbermünzen abzunehmen.>  #NT!
 me_parthia.51.a: "From rugs to riches!"  #<Vom Teppich zum Reichtum!>  #NT!
  
 me_parthia.52.t: "Persian Rugs And Clothes"  #<Persische Teppiche und Kleidung>  #NT!
 me_parthia.52.desc: "Never in a million years did [ROOT.GetCountry.GetRuler.GetName] think that [ROOT.GetCountry.GetRuler.GetHerHis] name would become synonymous with high fashion, but that is exactly what has happened. The demand for our garments have grown at an expotential rate and it has become impossible to find cheap prices anywhere that you look. Thanks to the unprecedented peace and prosperity brought about by the Parthians, her tradesmen and craftsmen have been able to grow their industries in ways never before imagined, and yet we are still unable to keep up with the demand. Our textiles have become desired the world over, and our fine #E Persian clothing#! and rugs are exported to cities in both the east and the west."  #<Niemals in einer Million Jahren hätte [ROOT.GetCountry.GetRuler.GetName] gedacht, dass [ROOT.GetCountry.GetRuler.GetHerHis] Name zum Synonym für Haute Couture werden würde, aber genau das ist passiert. Die Nachfrage nach unseren Kleidungsstücken ist exponentiell gestiegen und es ist unmöglich geworden, überall, wo man hinschaut, günstige Preise zu finden. Dank des beispiellosen Friedens und Wohlstands, den die Parther herbeigeführt haben, konnten ihre Händler und Handwerker ihre Industrien auf nie zuvor geahnte Weise ausbauen, und dennoch sind wir immer noch nicht in der Lage, mit der Nachfrage Schritt zu halten. Unsere Textilien sind auf der ganzen Welt begehrt und unsere feinen #E persischen Kleidungsstücke#! und Teppiche werden in Städte im Osten und Westen exportiert.>  #NT!
 me_parthia.52.a: "Whatever shall we do with all that money..."  #<Was sollen wir mit all dem Geld machen...>  #NT!
  
 me_parthia.53.t: "Breadbasket"  #<Brotkorb>  #NT!
 me_parthia.53.desc: "[ROOT.GetCountry.GetRuler.GetName], you will be pleased to hear that the farmlands of [GetProvince('(int32)912').GetArea.GetRegion.GetName] are overflowing with grain @grain!. Our workers are in the fields before the sun is above them, and they often have to finish their labors by torchlight; this region promises to be a breadbasket that will sustain the growing appetites of [ROOT.GetCountry.GetName]."  #<[ROOT.GetCountry.GetRuler.GetName], Sie werden erfreut sein zu hören, dass das Ackerland von [GetProvince('(int32)912').GetArea.GetRegion.GetName] mit Getreide überfüllt ist @grain!. Unsere Arbeiter sind auf den Feldern, bevor die Sonne über ihnen steht, und oft müssen sie ihre Arbeit im Fackelschein beenden; Diese Region verspricht, eine Kornkammer zu sein, die den wachsenden Appetit von [ROOT.GetCountry.GetName] stillen wird.>  #NT!
 me_parthia.53.a: "The gods have blessed us beyond measure"  #<Die Götter haben uns über alle Maßen gesegnet>  #NT!
  
 me_parthia.54.t: "Mesopotamian Dates"  #<Mesopotamische Datteln>  #NT!
 me_parthia.54.desc: "While the old adage of 'armies marching on their stomachs' remains perpetually true, the diet of the Parthian soldier stands in stark contrast to that of our neighboring states.\n\nThanks to the building initiatives put into place by [ROOT.GetCountry.GetRuler.GetName], our warriors now get to enjoy a variety of foods while in the field, and the staples of bread @grain!, salt @salt!, olive oil @olive! and wine @wine! have now been supplemented by dates @dates!. The fruits provide much-needed nutrients and variety to our hardworking soldiers, and while life in the army is never easy, at least mealtime is slightly tastier than it once was."  #<Während das alte Sprichwort „Armeen, die auf dem Bauch marschieren“ immer noch wahr ist, steht die Ernährung der parthischen Soldaten in krassem Gegensatz zu der unserer Nachbarstaaten.\n\nDank der von [ROOT.GetCountry.GetRuler.GetName] ins Leben gerufenen Bauinitiativen können unsere Krieger jetzt auf dem Feld eine Vielzahl von Lebensmitteln genießen, und die Grundnahrungsmittel Brot @Getreide!, Salz @Salz!, Olivenöl @Olive! und Wein @wine! wurden nun um date @dates! ergänzt. Die Früchte versorgen unsere fleißigen Soldaten mit dringend benötigten Nährstoffen und Abwechslung, und obwohl das Leben in der Armee nie einfach ist, sind die Mahlzeiten zumindest etwas schmackhafter als früher.>  #NT!
 me_parthia.54.a: "A luxurious good made more available, all thanks to me..."  #<Ein luxuriöses Gut, das dank mir verfügbarer geworden ist ...>  #NT!
  
 me_parthia.55.t: "Salt Of Chehrabad"  #<Salz von Chehrabad>  #NT!
 me_parthia.55.desc: "While working in the mines and quarries of [ROOT.GetCountry.GetName] remains a death sentence for the poor souls clapped in chains and sent deep underground, there is no other choice; without their sacrifices, countless others living within our realm would perish. Our soldiers need iron @iron! for their weapons, our markets need gold @precious_metals! for coinage and trade, and we need salt @salt! to preserve and flavor our foods."  #<Auch wenn die Arbeit in den Minen und Steinbrüchen von [ROOT.GetCountry.GetName] ein Todesurteil für die armen Seelen ist, die in Ketten gelegt und tief unter die Erde geschickt werden, gibt es keine andere Wahl; Ohne ihre Opfer würden unzählige andere Menschen, die in unserem Reich leben, sterben. Unsere Soldaten brauchen Eisen @iron! Für ihre Waffen brauchen unsere Märkte Gold @precious_metals! für Münzen und Handel, und wir brauchen Salz @salt! um unsere Lebensmittel zu konservieren und zu würzen.>  #NT!
 me_parthia.55.a: "[ROOT.GetCountry.GetName] lacks in salt; now it lacks less."  #<[ROOT.GetCountry.GetName] fehlt es an Salz; jetzt fehlt es weniger.>  #NT!
  
 me_parthia.56.t: "Persian Wine"  #<Persischer Wein>  #NT!
 me_parthia.56.desc: "There is so much wine @wine! produced in [ROOT.GetCountry.GetName] that the beverage has become ubiquitous and has become a drink consumed to excess at every meal. [ROOT.GetCountry.GetRuler.GetName], famously a lover of [ROOT.GetCountry.GetRuler.GetHerHis] cups, often has to pace [ROOT.GetCountry.GetRuler.GetHerHim]self throughout the day while conducting official business lest [ROOT.GetCountry.GetRuler.GetSheHe] makes a rash decision.\n\nThis thirst for fine Persian wine is shared by the common people, many of whom raise a rhyton every night to toast the good health of our beloved [ROOT.GetCountry.GetRulerTitle]."  #<Es gibt so viel Wein @wine! In [ROOT.GetCountry.GetName] wurde festgestellt, dass das Getränk allgegenwärtig geworden ist und zu jeder Mahlzeit im Übermaß konsumiert wird. [ROOT.GetCountry.GetRuler.GetName], bekanntermaßen ein Liebhaber von [ROOT.GetCountry.GetRuler.GetHerHis] Tassen, muss [ROOT.GetCountry.GetRuler.GetHerHim] oft den ganzen Tag über auf und ab gehen, während er offizielle Geschäfte erledigt, damit [ROOT.GetCountry.GetRuler.GetSheHe] keine voreilige Entscheidung trifft.\n\nDieser Durst nach gutem persischem Wein wird vom einfachen Volk geteilt, von dem viele jeden Abend ein Rhyton erheben, um auf die gute Gesundheit unserer Geliebten anzustoßen [ROOT.GetCountry.GetRulerTitle].>  #NT!
 me_parthia.56.a: "Now, to not get too drunk on this...hic!"  #<Nun, damit wir uns davon nicht zu sehr betrinken ... Schluckauf!>  #NT!
  
 me_parthia.57.t: "Median Olives - Change Trade Good?"  #<Median-Oliven – Handelsgut ändern?>  #NT!
 me_parthia.57.desc: "My [ROOT.GetCountry.GetRulerTitle], another settlement that would be ideal for cultivating olives @olive! has been suggested to us - what do you think?"  #<Mein [ROOT.GetCountry.GetRulerTitle], eine weitere Siedlung, die sich ideal für den Olivenanbau @olive eignet! wurde uns vorgeschlagen - was denken Sie?>  #NT!
 me_parthia.57.a: "Let's have them!"  #<Lasst uns sie haben!>  #NT!
 me_parthia.57.b: "Olives are good, but not there."  #<Oliven sind gut, aber nicht da.>  #NT!
  
 me_parthia.58.t: "Prospecting In Zagros - Change Trade Good?"  #<Prospektion in Zagros – Handelsgut ändern?>  #NT!
 me_parthia.58.desc: "My [ROOT.GetCountry.GetRulerTitle], our explorers surveying the #E Zagros Mountains#! have uncovered a location for building a new mine - what do you think? The initial reports from our overseers state that there are valuable minerals in the region that we could potentially exploit."  #<Mein [ROOT.GetCountry.GetRulerTitle], unsere Entdecker, die das #E Zagros-Gebirge#! vermessen, haben einen Standort für den Bau einer neuen Mine entdeckt – was denken Sie? Die ersten Berichte unserer Aufseher besagen, dass es in der Region wertvolle Mineralien gibt, die wir möglicherweise abbauen könnten.>  #NT!
 me_parthia.58.a: "Sure, let's have it."  #<Klar, lass es uns haben.>  #NT!
 me_parthia.58.b: "On second thought, maybe not."  #<Auf den zweiten Blick vielleicht auch nicht.>  #NT!
  
 me_parthia.5800.t: "Prospecting In Zagros - Results"  #<Prospektion in Zagros – Ergebnisse>  #NT!
 me_parthia.5800.desc: "[ROOT.GetCountry.GetRuler.GetName], our efforts to locate new sources of minable wealth in the #E Zagros Mountains#! is complete, and our men are happy to report that their expedition has not been in vain."  #<[ROOT.GetCountry.GetRuler.GetName], unsere Bemühungen, im #E Zagros-Gebirge#! neue Quellen abbaubaren Reichtums zu finden, sind abgeschlossen und unsere Männer freuen sich, berichten zu können, dass ihre Expedition nicht umsonst war.>  #NT!
 me_parthia.5800.a: "[prospecting_scope.GetName] will now produce #E Base Metals#!."  #<[prospecting_scope.GetName] produziert jetzt #E Basismetalle#!.>  #NT!
 me_parthia.5800.b: "[prospecting_scope.GetName] will now produce #E Iron#!."  #<[prospecting_scope.GetName] produziert jetzt #E Eisen#!.>  #NT!
 me_parthia.5800.c: "[prospecting_scope.GetName] will now produce #E Precious Metals#!."  #<[prospecting_scope.GetName] produziert jetzt #E Edelmetalle#!.>  #NT!
 me_parthia.5800.d: "[prospecting_scope.GetName] will now produce #E Gemstones#!."  #<[prospecting_scope.GetName] produziert jetzt #E Edelsteine#!.>  #NT!
 me_parthia.5800.e: "[prospecting_scope.GetName] will now produce #E Marble#!."  #<[prospecting_scope.GetName] wird jetzt #E Marmor#!. produzieren>  #NT!
 me_parthia.5800.f: "[prospecting_scope.GetName] will now produce #E Amber#!."  #<[prospecting_scope.GetName] produziert jetzt #E Bernstein#!.>  #NT!
 me_parthia.5800.g: "[prospecting_scope.GetName] will now produce #E Cinnabar#!."  #<[prospecting_scope.GetName] produziert jetzt #E Zinnober#!.>  #NT!
 me_parthia.5800.h: "[prospecting_scope.GetName] will now produce #E Lapis Lazuli#!."  #<[prospecting_scope.GetName] produziert jetzt #E Lapislazuli#!.>  #NT!
  
 #me_parthia.5800.tt: ""
 me_parthia.59.t: "Prospecting In Zagros - Locals Oppose!"  #<Prospektion in Zagros – Einheimische sind dagegen!>  #NT!
 me_parthia.59.desc: "Terrible news from the #E Zagros Mountains#!, o [ROOT.GetCountry.GetRuler.GetName] - our worst fears have come true. The locals living in the region have accused us of blasphemy, for the mountains are sacred to them, and they claim that we have disturbed the bones of their ancestors with our poking and prodding of the countryside. A group of rebels have attacked our expedition, killing some good [ROOT.GetCountry.GetAdjective] men, and it seems that we have a revolt on our hands!"  #<Schreckliche Nachrichten aus dem #E Zagros-Gebirge#!, o [ROOT.GetCountry.GetRuler.GetName] – unsere schlimmsten Befürchtungen haben sich bewahrheitet. Die in der Region lebenden Einheimischen bezichtigen uns der Gotteslästerung, denn die Berge seien ihnen heilig, und sie behaupten, wir hätten durch unser Stupsen und Stupsen in der Landschaft die Knochen ihrer Vorfahren zerstört. Eine Gruppe Rebellen hat unsere Expedition angegriffen und einige gute [ROOT.GetCountry.GetAdjective] Männer getötet, und es scheint, dass wir einen Aufstand vor uns haben!>  #NT!
 me_parthia.59.a: "We will show the traitorous scum no mercy!"  #<Wir werden dem verräterischen Abschaum keine Gnade zeigen!>  #NT!
 me_parthia.59.tt: "We must crush the rebels!"  #<Wir müssen die Rebellen vernichten!>  #NT!
  
 me_parthia.60.t: "Headway Into Anatolia"  #<Auf dem Weg nach Anatolien>  #NT!
 me_parthia.60.desc: "Now, with our conquest of #E Iran#! and setting our direct influence over it established, we can look to cross the mighty Euphrates river and lay claim to the lands west of it. The addition of #E Cilicia#! will be a good springboard for further conquests, andd chewing through the mountainous border of #E Anatolia#! further inland will provide us access to the plains in the center of the peninsula."  #<Nachdem wir nun #E Iran#! erobert und unseren direkten Einfluss darauf etabliert haben, können wir versuchen, den mächtigen Fluss Euphrat zu überqueren und Anspruch auf die Gebiete westlich davon zu erheben. Die Hinzufügung von #E Kilikien#! wird ein gutes Sprungbrett für weitere Eroberungen sein, und wenn wir uns durch die gebirgige Grenze von #E Anatolien#! weiter landeinwärts bewegen, erhalten wir Zugang zu den Ebenen in der Mitte der Halbinsel.>  #NT!
 me_parthia.60.a: "That peninsula shall be ours!"  #<Diese Halbinsel soll uns gehören!>  #NT!
 # me_parthia.60.tt: ""
  
 me_parthia.61.t: "Cracking The Interior"  #<Den Innenraum knacken>  #NT!
 me_parthia.61.desc: "The Central Anatolian plains are an almost pitch-perfect replica of the steppe climate we not too long ago called our home. As such, we are very likely to fit very well here also and will certainly use this land as a base of operations to propel our plans further still."  #<Die zentralanatolischen Ebenen sind eine nahezu perfekte Nachbildung des Steppenklimas, das wir vor nicht allzu langer Zeit unsere Heimat nannten. Daher werden wir höchstwahrscheinlich auch hier sehr gut hineinpassen und dieses Land sicherlich als Operationsbasis nutzen, um unsere Pläne noch weiter voranzutreiben.>  #NT!
 me_parthia.61.a: "Good work"  #<Gute Arbeit>  #NT!
 # me_parthia.61.tt: ""
  
 me_parthia.62.t: "Reaching The Sea"  #<Das Meer erreichen>  #NT!
 me_parthia.62.desc: "Now, with our horses grazing by the #E Aegean#! coasts, we have reached the limits of Asia and concluded our ambitions, at least for the time being. People living here are the masters of the sea and experts in shipbuilding, and their knowledge can be used should we wish to try to do what the great #E Achaemenids#! failed to achieve - conquering the pesky #E Hellenes#!. That would certainly immortalize us in the annals of history, all but securing our place as the empire that succeeded the first great Iranian dynasty."  #<Jetzt, da unsere Pferde an den Küsten der #E Ägäis#! grasen, haben wir die Grenzen Asiens erreicht und unsere Ambitionen zumindest vorerst abgeschlossen. Die hier lebenden Menschen sind Meister des Meeres und Experten im Schiffbau, und ihr Wissen kann genutzt werden, wenn wir versuchen wollen, das zu erreichen, was den großen #E Achämeniden#! nicht gelungen ist – die lästigen #E Hellenen#! zu besiegen. Das würde uns sicherlich in den Annalen der Geschichte verewigen und unseren Platz als das Reich sichern, das die Nachfolge der ersten großen iranischen Dynastie antrat.>  #NT!
 me_parthia.62.a: "Now we must plan to smash the Hellenes"  #<Jetzt müssen wir planen, die Hellenen zu zerschlagen>  #NT!
 # me_parthia.62.tt: ""
  
 me_parthia.63.t: "$parthia_missions_38$"  #<$parthia_missions_38$>  #NT!
 me_parthia.63.desc: "The lands of #E Syria#! have always been a rich hub of trade, and as such, it is only natural that they fall to our dominion. The wealthy Syrian tradehubs by the coast will greatly boost our income, nevermind the strong and united #E Aramaic#! populace, which, when tended to, will become some of the strongest peoples living in our empire. Their language was also the language of administration of the #E Achaemenid#! realm, which just shows how developed and important it is to keep cordial relations with the locals here."  #<Die Länder von #E Syrien#! waren schon immer ein reiches Handelszentrum und daher ist es nur natürlich, dass sie in unsere Herrschaft fallen. Die wohlhabenden syrischen Handelszentren an der Küste werden unser Einkommen erheblich steigern, ganz zu schweigen von der starken und vereinten #E aramäischen#! Bevölkerung, die, wenn sie gepflegt wird, zu einem der stärksten Völker unseres Reiches werden wird. Ihre Sprache war auch die Verwaltungssprache des #E achämenidischen#! Reiches, was zeigt, wie entwickelt und wichtig es ist, hier freundschaftliche Beziehungen zu den Einheimischen zu pflegen.>  #NT!
 me_parthia.63.a: "The land beyond the Euphrates shall be ours..."  #<Das Land jenseits des Euphrat soll uns gehören ...>  #NT!
 # me_parthia.63.tt: ""
  
 me_parthia.64.t: "$parthia_missions_39$"  #<$parthia_missions_39$>  #NT!
 me_parthia.64.desc: "With the addition of #E Syria#! to [ROOT.GetCountry.GetName], our opportunities grow tenfold. Owning some coastline along the Mediterranean will prove to be quite valuable when it comes time to project power on the seas.\n\nNow we must ensure that the #E Canaan#! is also ours - that ancient corridor in the Levant, being a gateway to the lands of #E Egypt#!."  #<Mit der Hinzufügung von #E Syrien#! zu [ROOT.GetCountry.GetName] verzehnfachen sich unsere Chancen. Der Besitz einiger Küstenabschnitte entlang des Mittelmeers wird sich als sehr wertvoll erweisen, wenn es darum geht, Macht auf die Meere zu projizieren.\n\nJetzt müssen wir sicherstellen, dass das #E Kanaan#! auch uns gehört – dieser alte Korridor in der Levante, der ein Tor zu den Ländern von #E Ägypten#! darstellt.>  #NT!
 me_parthia.64.a: "All of Syria is ours!"  #<Ganz Syrien gehört uns!>  #NT!
 # me_parthia.64.tt: ""
  
 me_parthia.65.t: "$parthia_missions_40$"  #<$parthia_missions_40$>  #NT!
 me_parthia.65.desc: "#E Canaan#! has fallen to our influence, and the next task for our armies is crossing the perilous Sinai desert and cracking the fortresses that guard the lands of the Nile. #E Egypt#! will prove to be a great income source for [ROOT.GetCountry.GetName], as it is one of the most populated lands on the planet and the single most powerful center of strength on the Mediterranean coasts."  #<#E Kanaan#! ist unter unseren Einfluss geraten und die nächste Aufgabe für unsere Armeen besteht darin, die gefährliche Sinai-Wüste zu durchqueren und die Festungen zu knacken, die das Land am Nil bewachen. #E Ägypten#! wird sich als großartige Einnahmequelle für [ROOT.GetCountry.GetName] erweisen, da es eines der bevölkerungsreichsten Länder der Welt und das mächtigste Kraftzentrum an den Mittelmeerküsten ist.>  #NT!
 me_parthia.65.a: "Onward to the Land of the Pharaohs!"  #<Weiter ins Land der Pharaonen!>  #NT!
 # me_parthia.65.tt: ""
  
 me_parthia.66.t: "Indian Preparation"  #<Indische Zubereitung>  #NT!
 me_parthia.66.desc: "The preparations for our invasion of the #E Indian Subcontinent#! have finally been completed. Soon the local rulers, no matter however numerous and how vast their own retinues, will tremble before the might of our armies."  #<Die Vorbereitungen für unsere Invasion des #E Indischen Subkontinents#! sind endlich abgeschlossen. Bald werden die örtlichen Herrscher, egal wie zahlreich und wie groß ihr eigenes Gefolge ist, vor der Macht unserer Armeen zittern.>  #NT!
 me_parthia.66.a: "We will surpass works of the #E Alexander#! himself!"  #<Wir werden die Werke des #E Alexander#! selbst übertreffen!>  #NT!
 # me_parthia.66.tt: ""
  
 me_parthia.67.t: "Conquest Of Indus"  #<Eroberung von Indus>  #NT!
 me_parthia.67.desc: "As our armies breached the #E Indian#! continent and secured influence over the plains of #E Pentapotamia#!, they have been shown what a strange and alien land India is. It is astoundingly rich, densely populated, and home to animals and plants that few living on the great steppes have ever seen with their own eyes. There is also an abundance of elephants, to the extent that petty kings often field more of them in battle than would the greatest of the kings in the west.\n\nThis is also where the armies of Alexander once turned home, leaving the Indian peoples to reclaim these satrapies...truly, a magnificent place!"  #<Als unsere Armeen den Kontinent #E Indien#! durchbrachen und Einfluss auf die Ebenen von #E Pentapotamien#! sicherten, wurde ihnen gezeigt, was für ein seltsames und fremdes Land Indien ist. Es ist erstaunlich reich, dicht besiedelt und beherbergt Tiere und Pflanzen, die nur wenige Bewohner der großen Steppen jemals mit eigenen Augen gesehen haben. Es gibt auch eine Fülle von Elefanten, so dass kleine Könige oft mehr von ihnen in die Schlacht schicken als die größten Könige im Westen.\n\nHier kehrten einst auch die Armeen Alexanders zurück und überließen es den indianischen Völkern, diese Satrapien zurückzuerobern ... wirklich ein großartiger Ort!>  #NT!
 me_parthia.67.a: "Steady gains"  #<Stetige Gewinne>  #NT!
 # me_parthia.67.tt: ""
  
 me_parthia.68.t: "To The Other Sea"  #<Zum anderen Meer>  #NT!
 me_parthia.68.desc: "With north #E India#! mostly cracked open, our presence is secured and all in the region know we are here to stay - this is no temporary occuptation, but a permanent one. Our march forward must however not stop - to our east, there is still more land to conquer, and if we succeed in this regard, we will be the first Empire to stretch from the #E Mediterranean#! to the #E Singus Gangeticus#!."  #<Da der Norden #E Indiens#! größtenteils offen ist, ist unsere Präsenz gesichert und alle in der Region wissen, dass wir hier bleiben werden – dies ist keine vorübergehende Besetzung, sondern eine dauerhafte. Unser Vorwärtsmarsch darf jedoch nicht aufhören – in unserem Osten gibt es noch mehr Land zu erobern, und wenn uns dies gelingt, werden wir das erste Imperium sein, das sich vom #E Mittelmeer#! bis zum #E Singus Gangeticus#! erstreckt.>  #NT!
 me_parthia.68.a: "Parthia shall stretch from East to West!"  #<Parthien soll sich von Osten nach Westen erstrecken!>  #NT!
 # me_parthia.68.tt: ""
  
 me_parthia.69.t: "Move Into Bactria"  #<Umzug nach Baktrien>  #NT!
 me_parthia.69.desc: "Long has [ROOT.GetCountry.GetRuler.GetName] coveted the fabled cities of [GetCountry('BAC').GetName] for the people of [ROOT.GetCountry.GetName], and while many believed that taking them outright would be impossible without heavy siege equipment and years of supplies, the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] has managed to defy everyone's expectations once again.\n\nAfter a gloriously bloody conflict, the Bactrian armies have been destroyed and her fortifications have been razed, and objects of gold and silver were ransacked from her temples and shrines and sent to [ROOT.GetCountry.GetCapital.GetName] as tribute. "  #<[ROOT.GetCountry.GetRuler.GetName] hat es schon lange auf die sagenumwobenen Städte [GetCountry('BAC').GetName] für die Menschen von [ROOT.GetCountry.GetName] abgesehen, und während viele glaubten, dass ihre vollständige Einnahme ohne schwere Belagerungsausrüstung und jahrelange Vorräte unmöglich wäre, hat es die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] wieder einmal geschafft, allen Erwartungen zu trotzen.\n\nNach einem glorreich blutigen Konflikt wurden die baktrischen Armeen vernichtet und ihre Befestigungen sowie Gegenstände geschleift aus Gold und Silber wurden aus ihren Tempeln und Schreinen geplündert und als Tribut an [ROOT.GetCountry.GetCapital.GetName] geschickt.>  #NT!
 me_parthia.69.a: "Conquering this region was only a matter of time"  #<Die Eroberung dieser Region war nur eine Frage der Zeit>  #NT!
 # me_parthia.69.tt: ""
  
 me_parthia.70.t: "Conquer The Steppe"  #<Erobere die Steppe>  #NT!
 me_parthia.70.desc: "In a glorious return to where it all began, the triumphant armies of [ROOT.GetCountry.GetName] quietly pushed aside any rival powers on the steppes, assuming direct control of the vast territory for [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] armies.\n\nAfter the Parthian levies had been disbanded, it is said that the [ROOT.GetCountry.GetRulerTitle] personally visited the endless sea of grass with [ROOT.GetCountry.GetRuler.GetHerHis] retinue, riding for hours with no agenda besides feeling the wind in [ROOT.GetCountry.GetRuler.GetHerHis] hair and the sun on [ROOT.GetCountry.GetRuler.GetHerHis] face."  #<In einer glorreichen Rückkehr dorthin, wo alles begann, drängten die siegreichen Armeen von [ROOT.GetCountry.GetName] stillschweigend alle rivalisierenden Mächte in den Steppen beiseite und übernahmen die direkte Kontrolle über das riesige Gebiet für die Armeen [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis].\n\nNachdem die parthischen Heere aufgelöst worden waren, soll der [ROOT.GetCountry.GetRulerTitle] persönlich mit [ROOT.GetCountry.GetRuler.GetHerHis] Gefolge das endlose Grasmeer besucht und stundenlang mit Nein geritten sein Agenda neben dem Spüren des Windes in [ROOT.GetCountry.GetRuler.GetHerHis] Haaren und der Sonne auf [ROOT.GetCountry.GetRuler.GetHerHis] Gesicht.>  #NT!
 me_parthia.70.a: "This is about as far as it is worthwile to go"  #<Das ist ungefähr so ​​weit, wie es sich zu gehen lohnt>  #NT!
 # me_parthia.70.tt: ""
  
 me_parthia.71.t: "Tarim Basin"  #<Tarim-Becken>  #NT!
 me_parthia.71.desc: "We have received a petition from the various cities of the #E Tarim Basin#!, who have come together as one in order to beg an indulgence from the conquering [ROOT.GetCountry.GetRuler.GetName] in the wake of their defeat and submission. Admitting that their great distance from [ROOT.GetCountry.GetCapital.GetName] makes regular communication with them difficult at best, they have asked us to grant them #E March#! status, claiming that this privilege is a common one for [ROOT.GetCountry.GetName]. In return for this, they promise to uphold their duties and will remain loyal to the #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#!."  #<Wir haben eine Petition von den verschiedenen Städten des #E Tarim-Beckens#!, erhalten, die sich zusammengeschlossen haben, um die Eroberer [ROOT.GetCountry.GetRuler.GetName] nach ihrer Niederlage und Unterwerfung um Nachsicht zu bitten. Sie geben zu, dass ihre große Distanz zu [ROOT.GetCountry.GetCapital.GetName] die regelmäßige Kommunikation mit ihnen bestenfalls erschwert, und haben uns gebeten, ihnen den #E März#!-Status zu gewähren, mit der Begründung, dass dieses Privileg für [ROOT.GetCountry.GetName] üblich sei. Als Gegenleistung versprechen sie, ihren Pflichten nachzukommen und den #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! treu zu bleiben.>  #NT!
 me_parthia.71.a: "No need to treat this region differently"  #<Es besteht keine Notwendigkeit, diese Region anders zu behandeln>  #NT!
 # me_parthia.71.tt1: ""
 me_parthia.71.b: "Our trade would be best secured by a #E March#!"  #<Unser Handel wäre am besten durch einen #E März#! abgesichert>  #NT!
 me_parthia.71.tt2: "We will create #E Tocharia#! as our #E March#! in the region."  #<Wir werden #E Tocharia#! als unseren #E March#! in der Region erstellen.>  #NT!
  
 me_parthia.80.t: "A Parthian Pantheon"  #<Ein parthisches Pantheon>  #NT!
 me_parthia.80.desc: "It was a move that few foresaw happening, yet many were ultimately impacted by the fateful decision; [ROOT.GetCountry.GetRuler.GetName], after many hours of fruitful discussion with the #E Mobadan Mobad#! and other religious advisors, was prepared to convert to a foreign faith."  #<Es war ein Schritt, den nur wenige vorausgesehen hatten, doch viele waren letztendlich von der schicksalhaften Entscheidung betroffen; [ROOT.GetCountry.GetRuler.GetName] war nach vielen Stunden fruchtbarer Diskussion mit dem #E Mobadan Mobad#! und anderen Religionsberatern bereit, zu einem ausländischen Glauben zu konvertieren.>  #NT!
 me_parthia.80.a: "We shall follow the #E Religion of Mithra#!"  #<Wir werden der #E Religion von Mithra#! folgen>  #NT!
 me_parthia.80.b: "We shall follow the #E Religion of Ahuramazda#!"  #<Wir werden der #E Religion von Ahuramazda#! folgen>  #NT!
 me_parthia.80.c: "We shall follow the #E Religion of the Greeks#!"  #<Wir werden der #E Religion der Griechen#! folgen>  #NT!
 me_parthia.80.d: "We shall follow the #E Religion of Babylon#!"  #<Wir werden der #E Religion Babylons#! folgen>  #NT!
 me_parthia.80.e: "We shall follow the #E Path of the Buddha#!"  #<Wir werden dem #E Pfad des Buddha#! folgen>  #NT!
  
 me_parthia_223.t: "The Conversion Of [ROOT.GetCountry.GetRuler.GetName] Part I"  #<Die Konvertierung von [ROOT.GetCountry.GetRuler.GetName] Teil I>  #NT!
 me_parthia_223.desc: "The idea of attempting to convince #E Iran#! to convert to #E Buddhism#! is not without its objectors, including the [ROOT.GetCountry.GetRulerTitle|E] himself. However, many do see the opportunity the young faith brings. It is highly popular among the silk road routes, and could foster better trade with the riches of #E Hind#!. Nobles from the east especially find this prospect valuable. As the [ROOT.GetCountry.GetRulerTitle|E] is courted by #E Zoroastrians, Mithraics,#! and #E Hellenics#!, the eastern nobles have sent for a #E Buddhist#! ascetic from #E Gandhara#!."  #<Der Versuch, #E Iran#! davon zu überzeugen, zum #E Buddhismus#! zu konvertieren, hat nicht ohne Gegner, darunter auch [ROOT.GetCountry.GetRulerTitle|E] selbst. Viele sehen jedoch die Chance, die der junge Glaube mit sich bringt. Es ist auf den Seidenstraßenrouten sehr beliebt und könnte einen besseren Handel mit den Reichtümern von #E Hind#! fördern. Vor allem Adlige aus dem Osten finden diese Aussicht wertvoll. Da der [ROOT.GetCountry.GetRulerTitle|E] von #E Zoroastriern, Mithraiern,#! und #E Hellenen#! umworben wird, haben die östlichen Adligen einen #E Buddhisten#! Asketen aus #E Gandhara#! geschickt.>  #NT!
 me_parthia.223.a: "Oh, he comes from a land, from a faraway place~"  #<Oh, er kommt aus einem Land, von einem weit entfernten Ort~>  #NT!
 me_parthia.223_tt: "The eastern nobles have sent for a #BOLD;COLOR:{0.98,0.93,0.51} Buddhist#! from #T Gandhara#!"  #<Die östlichen Adligen haben nach einem #BOLD;COLOR:{0.98,0.93,0.51} Buddhisten#! von #T Gandhara#! geschickt>  #NT!
  
 me_parthia_2231.t: "The Conversion Of [ROOT.GetCountry.GetRuler.GetName] Part II"  #<Die Konvertierung von [ROOT.GetCountry.GetRuler.GetName] Teil II>  #NT!
 me_parthia_2231.desc: "Though the banners of [ROOT.GetCountry.GetName|E] flew high and its enemies lay shattered, peace eluded [ROOT.GetCountry.GetRuler.GetName], King of Kings. For seven days, [ROOT.GetCountry.GetRuler.GetSheHe] received no envoys, heard no praise. Shadows clung even to victory. Then, without herald or summons, a traveler arrived in [ROOT.GetCountry.GetCapital.GetName|E]. Clad in simple robes, eyes mysterious like swirling water, he was brought before the throne, not by command, but by something unspoken that stirred in the king's chest.\n\n"You have forged an empire from the dust of horsemen," the stranger started. "You have broken mighty lords. Why then does your spirit tremble? Is it not conquest that ails you, but conscience?"\n\n[ROOT.GetCountry.GetRuler.GetFirstName|E] frowned. "I have had men slain for less. Why then, I wonder, does your head still rest upon your shoulders?"\n\nThe traveler smiled. "Because I come not with the intent to insult, but to give medicine. Let me teach you the #E Dharma of the Buddha#!."\n\nFor a long while, the King of Kings was silent. Then he nodded once. "Speak, then. For if there is a path beyond the sword, I would hear of it."
   #<Obwohl die Banner von [ROOT.GetCountry.GetName|E] hoch wehten und seine Feinde zerschmettert lagen, fehlte der Frieden [ROOT.GetCountry.GetRuler.GetName], König der Könige. Sieben Tage lang empfing [ROOT.GetCountry.GetRuler.GetSheHe] keine Gesandten, hörte kein Lob. Selbst am Sieg klammerten sich die Schatten fest. Dann traf ein Reisender ohne Herold oder Vorladung in [ROOT.GetCountry.GetCapital.GetName|E] ein. In schlichte Gewänder gehüllt, mit geheimnisvollen Augen wie wirbelndes Wasser, wurde er vor den Thron gebracht, nicht auf Befehl, sondern durch etwas Unausgesprochenes, das sich in der Brust des Königs bewegte.\n\n„Du hast aus dem Staub der Reiter ein Reich geschmiedet“, begann der Fremde. „Du hast mächtige Herren gebrochen. Warum zittert dann dein Geist? Ist es nicht die Eroberung, die dich quält, sondern das Gewissen?“\n\n[ROOT.GetCountry.GetRuler.GetFirstName|E] runzelte die Stirn. „Ich habe Männer für weniger Geld töten lassen. Warum ruht dann, frage ich mich, Ihr Kopf immer noch auf Ihren Schultern?“\n\nDer Reisende lächelte. „Weil ich nicht mit der Absicht komme, zu beleidigen, sondern um Medizin zu verabreichen. Lass mich dir den #E Dharma des Buddha#!."\n\nFor beibringen. Eine lange Zeit schwieg der König der Könige. Dann nickte er einmal. „Dann sprich.“ Denn wenn es einen Weg jenseits des Schwertes gibt, würde ich davon hören.>  #NT!
 me_parthia.2231.a: "Perhaps this mysterious #E 'ascetic'#! truly does have the answer..."  #<Vielleicht hat dieser mysteriöse #E „Asket“#! wirklich die Antwort ...>  #NT!
  
 me_parthia_2232.t: "The Conversion Of [ROOT.GetCountry.GetRuler.GetName] Part III"  #<Die Konvertierung von [ROOT.GetCountry.GetRuler.GetName] Teil III>  #NT!
 me_parthia_2232.desc: "It has been many days since [SCOPE.sCharacter('buddhist_parthia').GetName] first arrived in [ROOT.GetCountry.GetCapital.GetName]. No longer was he seen as an outsider, yet he still dressed simply as he walked through the temple corridors.\n\nOne night, the wise man asked [ROOT.GetCountry.GetRuler.GetName] "Oh tell me, [ROOT.GetCountry.GetRulerTitle|E], what happens if I place my hand in this flame?"\n\n[ROOT.GetCountry.GetRuler.GetName] responds, intrigued by the simple question. "It will burn you."\n\n"Even if I do not believe in the fire?"\n\nThe king scoffs. "Belief changes nothing. The fire burns all the same."\n\n"Just so," the teacher said. "And so it is with violence. Whether we think it just, or necessary, or glorious, it still burns all the same. It burns the hand that strikes and the heart that orders the blow." [ROOT.GetCountry.GetRuler.GetName] scoffed no more, he fell silent. [SCOPE.sCharacter('buddhist_parthia').GetName] continues, "To wield the sword is easy. To lay it down takes greater strength. Mercy is not the absence of power, but the mastery of it." [ROOT.GetCountry.GetRuler.GetFirstName] looked down at his own hands—calloused not from labor, but from war. He said nothing, but the weight of the sword at his side seemed heavier than before.\n\nLater that evening, the court noticed something strange: the king's voice was quieter. He dismissed no one in anger. He spoke to no one with rage. And he greeted insults with mercy rather than the ire of his blade. He seemed... more at peace. The fire was still lit, but now, [ROOT.GetCountry.GetRuler.GetName|E] felt its heat."  #<Es ist viele Tage her, seit [SCOPE.sCharacter('buddhist_parthia').GetName] zum ersten Mal in [ROOT.GetCountry.GetCapital.GetName] angekommen ist. Er galt nicht mehr als Außenseiter, kleidete sich aber immer noch schlicht, als er durch die Tempelkorridore ging.\n\nEines Nachts fragte der weise Mann [ROOT.GetCountry.GetRuler.GetName] „Oh, sag mir, [ROOT.GetCountry.GetRulerTitle|E], was passiert, wenn ich meine Hand in diese Flamme lege?“\n\n[ROOT.GetCountry.GetRuler.GetName] antwortet fasziniert von der einfachen Frage. „Es wird dich verbrennen.“\n\n„Auch wenn ich nicht an das Feuer glaube?“\n\nDer König spottet. „Glaube ändert nichts. Das Feuer brennt trotzdem.“\n\n„Genau so“, sagte der Lehrer. „Und so ist es auch mit der Gewalt. Ob wir sie für gerecht, notwendig oder herrlich halten, sie brennt trotzdem. Sie verbrennt die Hand, die zuschlägt, und das Herz, das den Schlag befiehlt.“ [ROOT.GetCountry.GetRuler.GetName] spottete nicht mehr, er verstummte. [SCOPE.sCharacter('buddhist_parthia').GetName] fährt fort: „Das Schwert zu führen ist einfach. Es niederzulegen erfordert mehr Kraft. Gnade ist nicht die Abwesenheit von Macht, sondern die Beherrschung dieser.“ [ROOT.GetCountry.GetRuler.GetFirstName] blickte auf seine eigenen Hände herab – nicht von der Arbeit, sondern vom Krieg gefühllos. Er sagte nichts, aber das Gewicht des Schwertes an seiner Seite schien schwerer zu sein als zuvor.\n\nSpäter am Abend bemerkte der Hof etwas Seltsames: Die Stimme des Königs war leiser. Er entließ niemanden aus Wut. Er sprach zu niemandem voller Wut. Und er begegnete Beleidigungen eher mit Gnade als mit dem Zorn seiner Klinge. Er schien... mehr Frieden zu finden. Das Feuer brannte noch, aber jetzt spürte [ROOT.GetCountry.GetRuler.GetName|E] seine Hitze.>  #NT!
 me_parthia.2232.a: "So this is the power of #E Ahisma#!."  #<Das ist also die Kraft von #E Ahisma#!.>  #NT!
  
 me_parthia_2233.t: "The Conversion Of [ROOT.GetCountry.GetRuler.GetName] Part IV"  #<Die Konvertierung von [ROOT.GetCountry.GetRuler.GetName] Teil IV>  #NT!
 me_parthia_2233.desc: "A proclamation was issued from the palace at [ROOT.GetCountry.GetCapital.GetName|E], carried on silk and stone alike, to every corner of the realm. Let it be known, [ROOT.GetCountry.GetRuler.GetName|E], King of Kings, has taken refuge in the #E Dharma#!. In this year of [ROOT.GetCountry.GetRuler.GetHerHis] reign, moved not by conquest but by truth, the King has embraced the path of the #E Buddha#!. The path of wisdom, compassion, and nonviolence."  #<Um [ROOT.GetCountry.GetCapital.GetName|E] wurde vom Palast aus eine Proklamation erlassen, die auf Seide und Stein gleichermaßen in jeden Winkel des Reiches getragen wurde. Lasst es wissen: [ROOT.GetCountry.GetRuler.GetName|E], König der Könige, hat Zuflucht zum #E Dharma#!. gesucht. In diesem Regierungsjahr [ROOT.GetCountry.GetRuler.GetHerHis] hat der König, nicht von Eroberung, sondern von Wahrheit getrieben, den Weg des #E Buddha#!. angenommen, den Weg der Weisheit, des Mitgefühls und der Gewaltlosigkeit.>  #NT!
 me_parthia_2233.a: "Thus begins a new age for [ROOT.GetCountry.GetName]."  #<Damit beginnt ein neues Zeitalter für [ROOT.GetCountry.GetName].>  #NT!
  
 me_parthia_224.t: "$parthia_missions_124$"  #<$parthia_missions_124$>  #NT!
 me_parthia_224.desc: "As interactions between #E Persians#! and #E Buddhism#! continue, the iconography and epithet of the lord #E Ahuramazda#! have become associated with the #E Buddha#! People have begun to call them as one, as the wise lord #E Buddha-Mazda#!. Canonizing this worship will make it easier to convert those who still oppose the foreign faith by making people understand that they need not lose their relationship with religion to appreciate the teachings of #E Buddha-Mazda#!."  #<Während die Interaktionen zwischen #E Persern#! und #E Buddhismus#! andauern, werden die Ikonographie und der Beiname des Herrn #E Ahuramazda#! mit dem #E Buddha#! in Verbindung gebracht. Die Menschen haben begonnen, sie als eins zu bezeichnen, als den weisen Herrn #E Buddha-Mazda#!. Die Kanonisierung dieser Anbetung wird es einfacher machen, diejenigen zu bekehren, die noch immer gegen den fremden Glauben sind, indem den Menschen klar gemacht wird, dass sie ihre Beziehung zur Religion nicht verlieren müssen, um die Lehren von #E Buddha-Mazda#! zu schätzen.>  #NT!
 me_parthia.224.a: "Teacher of both Asha and Dharma"  #<Lehrer sowohl von Asha als auch von Dharma>  #NT!
  
 me_parthia_225.t: "$parthia_missions_125$"  #<$parthia_missions_125$>  #NT!
 me_parthia_225.desc: "For years, the teachings of the #E Buddha#! was only studied by monks through recitation of the #E Pali Canon#!. Yet the canon is not in the tongue of our people, nor our rulers. Thus, the wisdom of the #E Dharma#! remained a foreign melody to many. Now, after much labor by devoted monks and learned scribes, the #E Vinaya#!, #E Sutta#!, and #E Abhidhamma#! have been rendered into the speech of our courts and people. With ink and parchment, the Three Baskets of the Law have crossed a new threshold, becoming the first full translation of the #E Tipitaka#! into an Iranian language."  #<Jahrelang wurden die Lehren des #E Buddha#! von Mönchen nur durch Rezitation des #E Pali Canon#! studiert. Doch der Kanon liegt weder in der Sprache unseres Volkes noch unserer Herrscher. Daher blieb die Weisheit des #E Dharma#! für viele eine fremde Melodie. Jetzt, nach viel Arbeit hingebungsvoller Mönche und gelehrter Schriftgelehrter, wurden die #E Vinaya#!, #E Sutta#! und #E Abhidhamma#! in die Sprache unserer Höfe und unseres Volkes übertragen. Mit Tinte und Pergament haben die „Drei Körbe des Gesetzes“ eine neue Schwelle überschritten und sind die erste vollständige Übersetzung des #E Tipitaka#! in eine iranische Sprache.>  #NT!
 me_parthia_225.a: "Tipitaka? You mean Sepitak"  #<Tipitaka? Du meinst Sepitak>  #NT!
  
 me_parthia_226.t: "$parthia_missions_126$"  #<$parthia_missions_126$>  #NT!
 me_parthia_226.desc: "The old calendar systems of #E Iran#! each tell a different tale. #E Zoroastrians#! mark from the year of revelation, #E Macedonians#! from #E Selukos'#! reconquests, and the #E Chaldeans#! from the stars. But now, the wheel of #E Dharma#! has turned. As our devotion to the #E Buddha#! deepens, our monastics and officials have come to a consensus: we shall count from the Enlightenment of the Blessed One. The year shall begin not with conquests or fire temples, but with the moment #E Siddhartha#! became the #E Buddha#! beneath the Bodhi tree."  #<Die alten Kalendersysteme von #E Iran#! erzählen jeweils eine andere Geschichte. #E Zoroastrier#! Mark aus dem Jahr der Offenbarung, #E Mazedonier#! aus #E Selukos'#! Rückeroberungen und die #E Chaldäer#! aus den Sternen. Aber jetzt hat sich das Rad von #E Dharma#! gedreht. Während sich unsere Hingabe an den #E Buddha#! vertieft, sind unsere Mönche und Beamten zu einem Konsens gekommen: Wir werden von der Erleuchtung des Erhabenen ausgehen. Das Jahr soll nicht mit Eroberungen oder Feuertempeln beginnen, sondern mit dem Moment, in dem #E Siddhartha#! zum #E Buddha#! unter dem Bodhi-Baum wurde.>  #NT!
 me_parthia_226.a: "A new calendar for a new empire."  #<Ein neuer Kalender für ein neues Reich.>  #NT!
  
 me_parthia_227.t: "$parthia_missions_127$"  #<$parthia_missions_127$>  #NT!
 me_parthia_227.desc: "As tales of a sacred transformation spread, many people across the empire flood into the great city of #E Hagmatana#!. What was once the proud #E Great Fire Temple#!, a beacon of the old faith, now rose anew as the #E Great Fire Stupa#!, its dome shimmering in the sun like a flame held to the sky. The sacred fire still burned, but now it did so beneath spires carved with lotus petals and #E Dharmic#! verse. Within the stupa's sanctum, monks and magi alike offered prayers—not in opposition, but in shared reverence of the light that guides all paths."  #<Während sich Geschichten über eine heilige Transformation verbreiteten, strömten viele Menschen im ganzen Reich in die große Stadt #E Hagmatana#!.. Was einst der stolze #E Große Feuertempel#!,, ein Leuchtfeuer des alten Glaubens, war, erhob sich nun zu neuem Leben als #E Großer Feuerstupa#!,, dessen Kuppel in der Sonne schimmerte wie eine Flamme, die an den Himmel gehalten wird. Das heilige Feuer brannte immer noch, aber jetzt tat es dies unter Türmen, die mit Lotusblütenblättern und #E Dharmischen#! Versen geschnitzt waren. Im Heiligtum des Stupa beteten sowohl Mönche als auch Magier – nicht im Widerspruch, sondern in gemeinsamer Ehrfurcht vor dem Licht, das alle Wege leitet.>  #NT!
 me_parthia_227.a: "Perhaps I should move there as well..."  #<Vielleicht sollte ich auch dorthin ziehen...>  #NT!
  
 me_parthia_230.t: "$parthia_missions_130$"  #<$parthia_missions_130$>  #NT!
 me_parthia_230.desc: "To be imbued with #E Kharenah#!, or #E Khvarenah#! is to be imbued with divine glory and spleandor. The only being in the whole of the Universe who may imbue Kharenah is that of the great #E Mithra-Mitreya#!. And by his holy light's grace, our leader, great #E King of Kings [ROOT.GetCountry.GetRuler.GetName]#!, has been imbued with this power."  #<Von #E Kharenah#!, oder #E Khvarenah#! erfüllt zu sein bedeutet, von göttlicher Herrlichkeit und Pracht erfüllt zu sein. Das einzige Wesen im gesamten Universum, das Kharenah durchdringen kann, ist das des großen #E Mithra-Mitreya#!. Und durch die Gnade seines heiligen Lichts wurde unser Anführer, der große #E König der Könige [ROOT.GetCountry.GetRuler.GetName]#!,, mit dieser Macht erfüllt.>  #NT!
 me_parthia_230.a: "Glory be to our holy dynasty!"  #<Ehre sei unserer heiligen Dynastie!>  #NT!
  
 me_parthia_231.t: "$parthia_missions_131$"  #<$parthia_missions_131$>  #NT!
 me_parthia_231.desc: "#E [ROOT.GetCountry.GetRuler.GetName]#!, the King of Kings and protector of the realm, had begun his retreat from courtly pleasures. Seated in silence beneath Bodhi-like trees planted across the palace gardens, he turned inward. It was said he had achieved #E Dharana#!, the sixth perfection, where thoughts move no more than a still flame in a windless chamber. Ministers brought petitions; he remained unmoved. Envoys brought tribute; he merely nodded. His gaze, calm and unblinking, seemed to weigh not only men, but entire worlds. He is not merely a King of Kings any longer, he has begun to walk the path of a #E Cakravartin#!, a world ruler not by sword, but by Dharma."  #<#E [ROOT.GetCountry.GetRuler.GetName]#!,, der König der Könige und Beschützer des Reiches, hatte seinen Rückzug von den höfischen Vergnügungen begonnen. Schweigend saß er unter Bodhi-ähnlichen Bäumen, die im Palastgarten gepflanzt waren, und wandte sich nach innen. Es hieß, er habe #E Dharana#!, die sechste Vollkommenheit erreicht, in der sich Gedanken nicht mehr bewegen als eine stille Flamme in einer windstillen Kammer. Minister brachten Petitionen ein; er blieb ungerührt. Gesandte brachten Tribut; er nickte nur. Sein Blick, ruhig und ohne zu blinzeln, schien nicht nur Menschen, sondern ganze Welten zu belasten. Er ist nicht mehr nur ein König der Könige, er hat begonnen, den Weg eines #E Cakravartin#!, eines Weltherrschers zu gehen, nicht durch das Schwert, sondern durch den Dharma.>  #NT!
 me_parthia_231.a: "The Universal Egg will be the realm of [ROOT.GetCountry.GetRuler.GetName]."  #<Das Universelle Ei wird das Reich von [ROOT.GetCountry.GetRuler.GetName] sein.>  #NT!
  
 me_parthia_232.t: "$parthia_missions_132$"  #<$parthia_missions_132$>  #NT!
 me_parthia_232.desc: "The king had once been a seeker of discipline, mastering #E Dharana#! in silence and stillness. But now, they say he has gone deeper still—beyond focus into #E Dhyana#!, the meditative trance where thought dissolves into clarity. His court lies quiet, not from fear, but from reverence, as he speaks less and sees more.\n\nWith this newfound stillness, foreign sages have arrived to pay their respects, among them, #E Greeks#! of the east, bearing scrolls in gold script, speaking of the gods who now walk with the #E Dharma#!. They talk of so-called protectors of the #E Buddha#!, such as #E Herakles Vajpranios#!, the thunder-wielding protector with lion's strength, and #E Wardo#!, the god of storm and wild wind, reborn as a guardian of sacred silence."  #<Der König war einst auf der Suche nach Disziplin und meisterte #E Dharana#! in Stille und Stille. Aber jetzt sagen sie, dass er noch tiefer gegangen ist – über den Fokus hinaus in #E Dhyana#!, die meditative Trance, in der sich Gedanken in Klarheit auflösen. Sein Hofstaat liegt still, nicht aus Angst, sondern aus Ehrfurcht, da er weniger spricht und mehr sieht.\n\nMit dieser neu entdeckten Stille sind ausländische Weise gekommen, um ihren Respekt zu erweisen, darunter #E Griechen#! des Ostens, die Schriftrollen in Goldschrift tragen und von den Göttern sprechen, die jetzt mit dem #E Dharma#! wandeln. Sie sprechen von sogenannten Beschützern des #E Buddha#!, wie #E Herakles Vajpranios#!, dem donnernden Beschützer mit Löwenstärke, und #E Wardo#!, dem Gott des Sturms und des wilden Windes, der als Hüter der heiligen Stille wiedergeboren wurde.>  #NT!
 me_parthia_232.a: "Those Greeks, always an inventive bunch!"  #<Diese Griechen, immer ein erfinderischer Haufen!>  #NT!
  
 me_parthia_233.t: "$parthia_missions_133$"  #<$parthia_missions_133$>  #NT!
 me_parthia_233.desc: "At dawn, as incense drifted over the steps of the palace in #E [ROOT.GetCountry.GetCapital.GetName]#!, a proclamation was read beneath banners bearing the #E Wheel of Dharma#!. The nobles, peasants, and monks gathered in silence, waiting to hear what had long been whispered in temple corridors and monastery halls. By royal decree, the old rites bound to flame and lineage were to be set aside. In their place, the #E Dharma#! of the #E Enlightened One#! would become the guiding light of the realm. The King, having studied the sacred sutras and sat in stillness beneath #E Bodhi#! trees planted within the palace walls, had chosen the #E Middle Way#!.\n\nFrom this day forth, #E Buddhism#! was not merely permitted—it was proclaimed. Not just a faith, but the soul of the realm itself."  #<Im Morgengrauen, als #E [ROOT.GetCountry.GetCapital.GetName]#!, Weihrauch über die Stufen des Palastes wehte, wurde unter Bannern mit dem #E Rad des Dharma#!. eine Proklamation verlesen. Die Adligen, Bauern und Mönche versammelten sich schweigend und warteten darauf, zu hören, was schon lange in Tempelkorridoren und Klosterhallen geflüstert wurde. Durch königlichen Erlass sollten die alten, an Flamme und Abstammung gebundenen Riten abgeschafft werden. An ihrer Stelle würde der #E Dharma#! des #E Erleuchteten#! zum leitenden Licht des Reiches werden. Nachdem der König die heiligen Sutras studiert hatte und in Stille unter #E Bodhi#! Bäumen saß, die innerhalb der Palastmauern gepflanzt waren, hatte er den #E Mittleren Weg#!. gewählt.\n\nVon diesem Tag an war #E Buddhismus#! nicht nur erlaubt – er wurde verkündet. Nicht nur ein Glaube, sondern die Seele des Reiches selbst.>  #NT!
 me_parthia_233.a: "May the wise one lead us to Nirvana."  #<Möge der Weise uns ins Nirvana führen.>  #NT!
  
 me_parthia_235.t: "$parthia_missions_135$"  #<$parthia_missions_135$>  #NT!
 me_parthia_235.desc: "For days, the palace fell quiet. Ministers tread softly through its halls. No orders were given, no disputes settled. In the heart of the capital, beneath a canopy of incense and silence, the king sat unmoving.\n\nMonks from every corner of the realm gathered in wonder, whispering of a rare state: #E Samadhi#!. Perfect stillness of mind. The gate to truth beyond illusion. On the seventh night, they say he entered #E Nirvana#! in life, #E Sopadhishesa Nirvana#!, no flames consumed him, no farewell was spoken, and yet, something in him had vanished. Fear, doubt, attachment. When he rose, at last, his eyes held the vastness of the sky. His voice, when it returned, spoke not with authority, but with knowing. He had become not only a king, but something more. The #E Cakravartin#! in truth, who rules not by sword or decree, but by presence alone."  #<Tagelang herrschte Stille im Palast. Die Minister schreiten leise durch die Säle. Es wurden keine Befehle erteilt, keine Streitigkeiten beigelegt. Im Herzen der Hauptstadt, unter einem Baldachin aus Weihrauch und Stille, saß der König regungslos.\n\nMönche aus allen Ecken des Reiches versammelten sich voller Staunen und flüsterten von einem seltenen Zustand: #E Samadhi#!. Vollkommene Stille des Geistes. Das Tor zur Wahrheit jenseits der Illusion. In der siebten Nacht, so heißt es, betrat er das #E Nirvana#! im Leben, das #E Sopadhishesa Nirvana#!, keine Flammen verzehrten ihn, es wurde kein Abschied gesprochen, und doch war etwas in ihm verschwunden. Angst, Zweifel, Anhaftung. Als er endlich aufstand, hielten seine Augen die Weite des Himmels fest. Als seine Stimme zurückkam, sprach sie nicht mit Autorität, sondern mit Wissen. Er war nicht nur ein König geworden, sondern etwas mehr. Der #E Cakravartin#! in Wahrheit, der nicht durch Schwert oder Dekret regiert, sondern allein durch Präsenz.>  #NT!
 me_parthia_235.a: "My eyes are open."  #<Meine Augen sind offen.>  #NT!
  
 me_parthia_280.t: "The Buddhist-Magi Debate"  #<Die Debatte zwischen Buddhisten und Magiern>  #NT!
 me_parthia_280.desc: "Word spreads throughout the land of Media, a debate is to be held between the powerful #E Median Magi#! class and #E Buddhist Monks#!.\n\nIn order for this debate to go well, our #E Buddhist#! court leaders request a sum to transport a group of monks from places as far as [GetProvince('(int32)7314').GetName|E], [GetProvince('(int32)4440').GetName|E], and even [GetProvince('(int32)6950').GetName|E]."  #<Es verbreitet sich im ganzen Land der Medien, dass eine Debatte zwischen der mächtigen Klasse der #E Median Magi#! und #E buddhistischen Mönchen#! stattfinden soll.\n\nDamit diese Debatte gut verläuft, bitten unsere #E buddhistischen#! Gerichtsführer um eine Summe, um eine Gruppe von Mönchen von Orten bis [GetProvince('(int32)7314').GetName|E], [GetProvince('(int32)4440').GetName|E] und sogar [GetProvince('(int32)6950').GetName|E] zu transportieren.>  #NT!
 me_parthia_280.a: "We will rely on #E Parthian Buddhists#!."  #<Wir werden uns auf #E parthische Buddhisten#!. verlassen>  #NT!
 we_will_have_lower_odds: "We will rely on the younger, inexperienced #Y Parthian#! monk."  #<Wir werden uns auf den jüngeren, unerfahrenen #Y Parther#! Mönch verlassen.>  #NT!
 me_parthia_280.b: "We will spare no expense."  #<Wir werden keine Kosten scheuen.>  #NT!
 we_will_have_good_odds: "We will rely on the older, wiser #Y Indian#! monks.\nThis will invoke an extra debate between #T Mahayana#! and #T Theravada#! schools."  #<Wir werden uns auf die älteren, weiseren #Y indischen#! Mönche verlassen.\nDies wird eine zusätzliche Debatte zwischen #T Mahayana#! und #T Theravada#! Schulen auslösen.>  #NT!
 medians_upset_mod: "Buddhist-Magi Debate: Vague Metaphors"  #<Debatte zwischen Buddhisten und Magiern: Vage Metaphern>  #NT!
  
 me_parthia_2800.t: "Debate I: The Matter of Fire"  #<Debatte I: Die Sache mit dem Feuer>  #NT!
 me_parthia_2800.a: "[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] speaks."  #<[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] spricht.>  #NT!
 me_parthia_2800.b: "[SCOPE.sCharacter('punjabi_buddhist_dude').GetName|E] speaks."  #<[SCOPE.sCharacter('punjabi_buddhist_dude').GetName|E] spricht.>  #NT!
 me_parthia_2800.c: "[SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E] speaks."  #<[SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E] spricht.>  #NT!
  
 me_parthia_2801.t: "Debate II: The Matter of the Soul"  #<Debatte II: Die Materie der Seele>  #NT!
 me_parthia_2801.desc: "In the royal courtyard, where incense mingles with dust, the Magi open with firm conviction.\n\n"The soul," beings [SCOPE.sCharacter('pahlavi_mithra_dude').GetName|E] is eternal. It is judged at the #E Bridge of Separation#!, rewarded or punished according to truth.\n\n"A #E Buddhist#! steps forward, his voice calm.\n\n "What you call soul is only a bundle of causes. There is no self to judge, only actions and their echoes."\n\nA murmur rises from the court.\n\n"Then what is reborn?" [SCOPE.sCharacter('median_mithra_dude').GetName|E] asks aloud. Another #E Buddhist#! replies, "Not the self, but the fire passed from one lamp to another."\n\n[SCOPE.sCharacter('median_mithra_dude_2').GetName|E] interjects, "You offer smoke in place of spirit."\n\nThe atmosphere tightens. This debate may leave more than doctrine unsettled... eyes move to [SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E], how will they respond?"  
 #<Im königlichen Hof, wo sich Weihrauch mit Staub vermischt, öffnen sich die Magier mit fester Überzeugung.\n\n„Die Seele“, Wesen [SCOPE.sCharacter('pahlavi_mithra_dude').GetName|E], ist ewig. Es wird an der #E Brücke der Trennung#!, entsprechend der Wahrheit belohnt oder bestraft.\n\n „Ein #E Buddhist#! tritt vor, seine Stimme ist ruhig.\n\n „Was du Seele nennst, ist nur ein Bündel von Ursachen.“ Es gibt kein Selbst, das beurteilt werden kann, nur Handlungen und deren Echos.“\n\nEin Raunen steigt aus dem Gerichtssaal.\n\n„Was wird dann wiedergeboren?“ [SCOPE.sCharacter('median_mithra_dude').GetName|E] fragt laut. Ein anderer #E Buddhist#! antwortet: „Nicht das Selbst, sondern das Feuer, das von einer Lampe zur anderen übergegangen ist.“\n\n[SCOPE.sCharacter('median_mithra_dude_2').GetName|E] wirft ein: „Sie bieten Rauch anstelle von Geist an.“\n\nDie Atmosphäre wird enger. Diese Debatte könnte noch mehr hervorbringen als die Lehre ungeklärt ist ... Der Blick richtet sich auf [SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E]. Wie werden sie reagieren?>  #NT!
  
 me_parthia_2801.a: "Perhaps the soul is not eternal, yet still worth honoring."  #<Vielleicht ist die Seele nicht ewig, aber dennoch wert, geehrt zu werden.>  #NT!
 why_can_we_do_this_tt: "This option is available due to the tutelage of the #T Indian#! monks."  #<Diese Option ist aufgrund der Anleitung der #T Indianer#! Mönche verfügbar.>  #NT!
 me_parthia_2801.b: "If your soul burns with ignorance, what use is its eternity?"  #<Wenn deine Seele vor Unwissenheit brennt, welchen Nutzen hat dann die Ewigkeit?>  #NT!
 me_parthia_2801.c: "Even if we differ, both seek to end suffering."  #<Auch wenn wir unterschiedlicher Meinung sind, streben beide danach, dem Leiden ein Ende zu setzen.>  #NT!
  
  
 me_parthia_2802.t: "Special Debate: The Matter of the Paths"  #<Sonderdebatte: Die Sache mit den Wegen>  #NT!
 me_parthia_2802.desc:0 "After days of addressing the #E Magi#!, an unexpected moment arises. The monks of #E Gandhāra#! and #E Anurādhapura#! begin to debate one another. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E], the eloquent #E Mahāyāna#! philosopher, poses a question to the elder #E Theravāda#! monk, [SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E]:\n\n"Is it not greater," he asks, "to delay one's own #E Nirvana#! out of compassion for all beings?"\n\nThe #E Lankan#! monk replies calmly:0 "To tame the self is no small task. Before one rescues others from the flood, one must first reach the shore."\n\nA flicker of tension passes through the hall. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E]'s voice sharpens: "After days of addressing the #E Magi#!, an unexpected moment arises. The monks of #E Gandhāra#! and #E Anurādhapura#! begin to debate one another. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E], the eloquent #E Mahāyāna#! philosopher, poses a question to the elder #E Theravāda#! monk, [SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E]:\n\n"Is it not greater," he asks, "to delay one's own #E Nirvana#! out of compassion for all beings?"\n\nThe #E Lankan#! monk replies calmly:0 "To tame the self is no small task. Before one rescues others from the flood, one must first reach the shore."\n\nA flicker of tension passes through the hall. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E]'s voice sharpens:0 "But what use is a shore no one returns from? The world drowns while saints look away."\n\n[SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E]'s gaze narrows. "And what is a vow if it leads only to more wandering?"\n\nTheir tones rise—not in anger, but with firm defiance. The court stirs. A few nobles exchange glances. Even the #E Magi#! look amused.\n\nBefore the moment fractures, [SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] steps forward. Hands pressed together, he bows to both, and speaks:"  #<Nachdem ich mich tagelang an die #E Magier#!, gewandt habe, kommt es zu einem unerwarteten Moment. Die Mönche von #E Gandhāra#! und #E Anurādhapura#! beginnen miteinander zu debattieren. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E], der beredte #E Mahāyāna#! Philosoph, stellt eine Frage an den älteren #E Theravāda#! Mönch, #!,1:\n\n „Ist es nicht größer“, fragt er, „das eigene #E Nirvana#! aus Mitgefühl für alle hinauszuzögern.“ Wesen?“\n\nDer #E Lankaner#! Mönch antwortet ruhig:0 „Sich selbst zu zähmen ist keine leichte Aufgabe, bevor man andere aus der Flut rettet.“\n\nEin Anflug von Spannung geht durch die Halle. [SCOPE.sCharacter('gandhara_buddhist_dude').GetName|E]s Stimme wird schärfer:0 „Aber was nützt ein Ufer, von dem niemand zurückkehrt? Die Welt ertrinkt, während Heilige wegschauen.“\n\n#!,1s Blick wird schmaler. „Und was ist ein Gelübde, wenn es nur zu noch mehr Abschweifungen führt?“\n\nIhre Stimme wird lauter – nicht aus Zorn, sondern aus festem Trotz. Das Gericht regt sich. Ein paar Adlige tauschen Blicke aus. Sogar die #E Magi#! sehen amüsiert aus.\n\nBevor der Augenblick bricht, macht #E0 einen Schritt nach vorne. Mit zusammengelegten Händen verneigt er sich vor beiden und spricht:>  #NT!
 me_parthia_2802.a: ""First cross, then guide.""  #<„Erst Kreuz, dann Führer.“>  #NT!
 favors_theravada: "Favors Theravāda"  #<Begünstigt Theravāda>  #NT!
 debate_disagreement: "Spurned by Debate"  #<Von der Debatte verschmäht>  #NT!
 me_parthia_2802.b: ""None are free until all are free.""  #<„Keiner ist frei, bis alle frei sind.“>  #NT!
 favors_mahayana: "Favors Mahāyāna"  #<Begünstigt Mahāyāna>  #NT!
 me_parthia_2802.c: ""Both paths lead onward.""  #<„Beide Wege führen weiter.“>  #NT!
  
 me_parthia_2803.desc: "The monk [SCOPE.sCharacter('pubjabi_buddhist_dude').GetName|E], clad in robes of indigo, carries scrolls in #E Kharoshthi#! and #E Greek#!. He, bows lightly before addressing the court in fluent #E Achaemenid Aramaic#!.\n\n"We do not reject fire," he begins. "But we ask, what is it that burns? Is it a substance? A symbol? Or a mental object?" He steps slowly across the hall, "In the Yogācāra school, we speak of perception and projection. The fire you see is within you as much as without. Enlightenment is not escape from the world, but seeing it rightly."\n\nThe Magi respond with ritual certainty, but the court is intrigued. These monks speak in riddles, but with the weight of reason behind them."  #<Der in Indigogewänder gekleidete Mönch [SCOPE.sCharacter('pubjabi_buddhist_dude').GetName|E] trägt Schriftrollen in #E Kharoshthi#! und #E Griechisch#!. Er verneigt sich leicht, bevor er sich in fließendem #E Achämenidisches Aramäisch#! an das Gericht wendet.\n\n„Wir lehnen Feuer nicht ab“, beginnt er. „Aber wir fragen: Was brennt? Ist es eine Substanz? Ein Symbol? Oder ein mentales Objekt?“ Er geht langsam durch die Halle: „In der Yogācāra-Schule sprechen wir von Wahrnehmung und Projektion. Das Feuer, das du siehst, ist sowohl in dir als auch außerhalb. Erleuchtung ist keine Flucht aus der Welt, sondern sie richtig zu sehen.“\n\nDie Magier antworten mit ritueller Sicherheit, aber das Gericht ist fasziniert. Diese Mönche sprechen in Rätseln, aber mit dem Gewicht der Vernunft im Hintergrund.>  #NT!
 me_parthia_2803.a: "They debate like Greeks, but seek something deeper."  #<Sie debattieren wie Griechen, suchen aber nach etwas Tieferem.>  #NT!
 appeal_to_greek_thought: "Greco-Buddhist Debate Victory"  #<Sieg der griechisch-buddhistischen Debatte>  #NT!
  
 me_parthia_2804.desc: "The saffron-robed monk from #E Anudhapura#!, [SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E], is serene and precise. He bows deeply and recites a stanza from the #E Dhammapada#!, then addresses the court:\n\n"You speak of a fire that punishes. We speak of a fire that purifies—not with pain, but with insight. Ours is the flame of renunciation. It does not demand blood, but discipline." He continues, “Just as fire consumes fuel, wisdom consumes craving. When craving is gone, no fire need remain."\n\nTheir simplicity is striking, their logic clean. The Magi reply, but their voice no longer dominates the hall."  #<Der in Safran gekleidete Mönch aus #E Anudhapura#!, [SCOPE.sCharacter('sinhali_buddhist_dude').GetName|E] ist gelassen und präzise. Er verneigt sich tief und rezitiert eine Strophe aus dem #E Dhammapada#!,. Anschließend wendet er sich an das Gericht:\n\n„Ihr sprecht von einem Feuer, das bestraft. Wir sprechen von einem Feuer, das reinigt – nicht mit Schmerz, sondern mit Einsicht. Unsere Flamme ist die Flamme der Entsagung. Sie erfordert kein Blut, sondern Disziplin.“ Er fährt fort: „So wie Feuer Brennstoff verbraucht, verzehrt Weisheit das Verlangen. Wenn das Verlangen verschwunden ist, muss kein Feuer mehr übrig bleiben.“\n\nIhre Einfachheit ist beeindruckend, ihre Logik klar. Die Magier antworten, aber ihre Stimme dominiert nicht mehr den Saal.>  #NT!
 me_parthia_2804.a: "No fire in their voices, yet they burn away all argument."  #<Kein Feuer in ihren Stimmen, und doch verbrennen sie alle Argumente.>  #NT!
 appeal_to_mystic_thought: "Mystics and Buddhists' Dialogue"  #<Dialog zwischen Mystikern und Buddhisten>  #NT!
  
 me_parthia_2805.desc: "[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] stands nervously as they try to convey a deep metaphor in unfamiliar terms. "There is... a fire inside the heart," one says, "that... burns the veil of illusion?"\n\nTheir sincerity is clear, but their words falter. The Magi respond with eloquence and ritual. Much of the court is unmoved."  #<[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] steht nervös da und versucht, eine tiefgründige Metapher in unbekannten Begriffen zu vermitteln. „Da ist... ein Feuer im Herzen“, sagt einer, „das... den Schleier der Illusion verbrennt?“\n\nIhre Aufrichtigkeit ist klar, aber ihre Worte schwanken. Die Magier antworten mit Beredsamkeit und Ritual. Ein Großteil des Gerichts ist ungerührt.>  #NT!
 me_parthia_2805.a: ""Well-meaning fools, but fools nonetheless.""  #<„Gutmeinende Dummköpfe, aber dennoch Dummköpfe.“>  #NT!
  
 me_parthia_2806.desc: "[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] steps forward with quiet humility. Lacking polish, they speak from the heart.\n\n"We honor no outer fire," says the [SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E].\n\n"But inside each person is a light that grows as they learn to let go.\n\nTheir sincerity moves a few listeners, but their metaphors are vague, their language imprecise. The #E Magi#! reply confidently, and many in the court find themselves swayed toward the familiar."  #<[SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E] tritt mit stiller Demut vor. Da es ihnen an Politur mangelt, sprechen sie aus dem Herzen.\n\n„Wir ehren kein äußeres Feuer“, sagt der [SCOPE.sCharacter('pahlavi_buddhist_dude').GetName|E].\n\n„Aber in jedem Menschen ist ein Licht, das wächst, wenn er lernt, loszulassen.\n\nIhre Aufrichtigkeit bewegt einige Zuhörer, aber ihre Metaphern sind vage, ihre Sprache ungenau. Die #E Magi#! antworten selbstbewusst und viele im Hof ​​fühlen sich dem Vertrauten zugewandt.>  #NT!
 me_parthia_2806.a: ""They mean well, but words are not enough.""  #<„Sie meinen es gut, aber Worte reichen nicht.“>  #NT!
  
 me_parthia_2807.t: "Debate: Conclusion"  #<Debatte: Schlussfolgerung>  #NT!
 me_parthia_2807.desc: "The last words of the debate echo through the royal hall, not in volume but in weight. The #E Buddhists#! speak of impermanence; the #E Magi#!, of eternity. Each offered visions of the world—one like a fire passing from lamp to lamp, the other like a flame held steady against the dark.\n\nThe court is quiet now. No cheers, no verdict. Just thoughtful eyes, some narrowed in doubt, others widened in wonder. The king remains still, his face unreadable. The people talk. Some light candles in the fire temples. Others place lotus petals near the stupa."  #<Die letzten Worte der Debatte hallen durch den königlichen Saal, nicht in Lautstärke, sondern in Gewicht. Die #E Buddhisten#! sprechen von Vergänglichkeit; die #E Magier#!, der Ewigkeit. Jeder bot Visionen der Welt – die eine war wie ein Feuer, das von Lampe zu Lampe wandert, die andere wie eine Flamme, die sich gegen die Dunkelheit wehrt.\n\nDer Hof ist jetzt ruhig. Kein Jubel, kein Urteil. Nur nachdenkliche Augen, manche verengten sich zweifelnd, andere weiteten sich verwundert. Der König bleibt still, sein Gesicht ist unleserlich. Die Leute reden. Einige zünden Kerzen in den Feuertempeln an. Andere platzieren Lotusblütenblätter in der Nähe des Stupa.>  #NT!
 me_parthia_2807.a: "The Magi are formidable, and Buddhists wise."  #<Die Magier sind beeindruckend und die Buddhisten weise.>  #NT!
  
 me_parthia_281.t: "The Mahayana Mithra"  #<Die Mahayana-Mithra>  #NT!
 me_parthia_281.desc: "Our people have always loved the god #E Mithra#!, and with the introduction of #E Buddhism#!, a new belief spreads that the divine light #E Mithra#! and the future Buddha #E Mitreya#! are one. He is called as #E Mithra-Mitreya#!, the Delayer of Nirvana. Though able to transcend, he remains by choice, guarding truth and guiding the world toward compassion. He unites the covenant of light with the mercy of a #E Bodhisattva#!. In him, discipline and kindness walk hand in hand, waiting for the time when #E Dharma#! must be reborn."  #<Unser Volk hat den Gott #E Mithra#!, immer geliebt und mit der Einführung des #E Buddhismus#!, verbreitet sich ein neuer Glaube, dass das göttliche Licht #E Mithra#! und der zukünftige Buddha #E Mitreya#! eins sind. Er wird als #E Mithra-Mitreya#!, der Verzögerer des Nirvanas bezeichnet. Obwohl er in der Lage ist, zu transzendieren, bleibt er freiwillig, hütet die Wahrheit und führt die Welt zum Mitgefühl. Er vereint den Bund des Lichts mit der Barmherzigkeit eines #E Bodhisattva#!. In ihm gehen Disziplin und Freundlichkeit Hand in Hand und warten auf die Zeit, in der #E Dharma#! wiedergeboren werden muss.>  #NT!
 me_parthia_281.a: "The first light and the last Buddha"  #<Das erste Licht und der letzte Buddha>  #NT!
  
 compromised_debate: "Buddhist-Magi Debate: Compromise"  #<Debatte zwischen Buddhisten und Magiern: Kompromiss>  #NT!
 fck_you_buddha: "Buddhist-Magi Debate: Non-Consolable Enemies"  #<Debatte zwischen Buddhisten und Magiern: Nicht tröstbare Feinde>  #NT!
 debates_of_magi: "Buddhist-Magi Debate: Buddhist Victory"  #<Debatte zwischen Buddhisten und Magiern: Buddhistischer Sieg>  #NT!
 debate_begins_tt_tt: "A #BOLD;COLOR:{0.98,0.93,0.51} Buddhist#!#E -#!#BOLD;COLOR:{0.98,0.53,0.98} Magi#! #E Debate#! will be held and may give us various modifiers."  #<Es wird eine #BOLD;COLOR:{0.98,0.93,0.51} buddhistische#!#E -#!#BOLD;COLOR:{0.98,0.53,0.98} Magi#! #E Debatte#! stattfinden, die uns verschiedene Modifikatoren geben kann.>  #NT!
  
 me_parthia.101.t: "Found Nisa"  #<Nisa gefunden>  #NT!
 me_parthia.101.desc: "Over the last few months, [ROOT.GetCountry.GetRuler.GetName] has spent countless hours overseeing the construction taking place at [GetProvince('(int32)6657').GetName] - an astonishing feat for the busy [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle], who often feels that [ROOT.GetCountry.GetRuler.GetSheHe] needs to be in two places at once.\n\nAnd yet somehow, [ROOT.GetCountry.GetRuler.GetFirstName] has managed to stay in touch with [ROOT.GetCountry.GetRuler.GetHerHis] engineers, receiving daily updates on the new capital even when [ROOT.GetCountry.GetRuler.GetSheHe] was not physically present in the rolling hills. And when word finally reached [ROOT.GetCountry.GetRuler.GetFirstName] that the city was ready for inhabitants, [ROOT.GetCountry.GetRuler.GetSheHe] offered a prayer of thanksgiving to [GetDeityDefinition('omen_api').GetName], asking the god of merchants to bless our capital with prosperous times."  #<In den letzten Monaten hat [ROOT.GetCountry.GetRuler.GetName] unzählige Stunden damit verbracht, die Bauarbeiten in [GetProvince('(int32)6657').GetName] zu überwachen – eine erstaunliche Leistung für den vielbeschäftigten [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle], der oft das Gefühl hat, dass [ROOT.GetCountry.GetRuler.GetSheHe] an zwei Orten gleichzeitig sein muss.\n\nUnd doch ist es [ROOT.GetCountry.GetRuler.GetFirstName] irgendwie gelungen, mit den Ingenieuren von [ROOT.GetCountry.GetRuler.GetHerHis] in Kontakt zu bleiben und täglich Updates über die neue Hauptstadt zu erhalten, selbst wenn [ROOT.GetCountry.GetRuler.GetSheHe] war in den sanften Hügeln physisch nicht präsent. Und als [ROOT.GetCountry.GetRuler.GetFirstName] endlich die Nachricht erreichte, dass die Stadt für Einwohner bereit sei, richtete [ROOT.GetCountry.GetRuler.GetSheHe] ein Dankgebet an [GetProvince('(int32)6657').GetName]0 und bat den Gott der Kaufleute, unsere Hauptstadt mit wohlhabenden Zeiten zu segnen.>  #NT!
 me_parthia.101.a: "From this day forth, let this city be called '#E Nisa#!'..."  #<Von diesem Tag an soll diese Stadt „#E Nisa#!'...“ heißen>  #NT!
  
 me_parthia.102.t: "Scythian Allies"  #<Skythische Verbündete>  #NT!
 me_parthia.102.desc: "While some living in [ROOT.GetCountry.GetCapital.GetName] scoffed at [ROOT.GetCountry.GetRuler.GetName]'s decision to seek allies amongst the #E Scythian#! tribes, the [ROOT.GetCountry.GetRulerTitle] ignored their complaints and made friendly overtures to our neighbors. [ROOT.GetCountry.GetRuler.GetFirstName] had [ROOT.GetCountry.GetRuler.GetHerHis] eyes on the wealthy regions to our south and not the empty steppes, and the [ROOT.GetCountry.GetRulerTitle] had no intention of staying permanently in this region - let the Scythians keep the open grasslands if they want them.\n\nTreaties of understanding were signed, and our diplomats returned home, assured that they had fulfilled their objectives to secure the north."  #<Während einige in [ROOT.GetCountry.GetCapital.GetName] lebende Menschen sich über die Entscheidung von [ROOT.GetCountry.GetRuler.GetName] lustig machten, Verbündete unter den Stämmen der #E Skythen#! zu suchen, ignorierten die [ROOT.GetCountry.GetRulerTitle] ihre Beschwerden und machten freundliche Annäherungsversuche an unsere Nachbarn. [ROOT.GetCountry.GetRuler.GetFirstName] hatte [ROOT.GetCountry.GetRuler.GetHerHis] die wohlhabenden Regionen in unserem Süden im Auge und nicht die leeren Steppen, und die [ROOT.GetCountry.GetRulerTitle] hatten nicht die Absicht, dauerhaft in dieser Region zu bleiben – die Skythen sollten das offene Grasland behalten, wenn sie es wollten.\n\nVerständigungsverträge wurden unterzeichnet, und unsere Diplomaten kehrten nach Hause zurück, versichert, dass sie ihre Ziele zur Sicherung des Nordens erreicht hatten.>  #NT!
 me_parthia.102.a: "Our destiny lies elsewhere anyway"  #<Unser Schicksal liegt sowieso woanders>  #NT!
  
 me_parthia.103.t: "Bactrian Matter"  #<Baktrische Materie>  #NT!
 me_parthia.103.desc: "After corresponding with [GetCountry('BAC').GetRuler.GetName], the [GetCountry('BAC').GetRulerTitle] of [GetCountry('BAC').GetName], over the course of many weeks, [ROOT.GetCountry.GetRuler.GetName] found [ROOT.GetCountry.GetRuler.GetHerHis] Bactrian counterpart to be wise and congenial. The two leaders shared a vision, imagining a time when both countries would be free from the clutches of the [GetCountry('SEL').GetName], and they swore vows together to uphold their end of the bargain when the time came to declare independence."  #<Nachdem [ROOT.GetCountry.GetRuler.GetName] im Laufe vieler Wochen mit [GetCountry('BAC').GetRuler.GetName], dem [GetCountry('BAC').GetRulerTitle] von [GetCountry('BAC').GetName], korrespondiert hatte, fand er, dass das baktrische Gegenstück [ROOT.GetCountry.GetRuler.GetHerHis] weise und sympathisch sei. Die beiden Staats- und Regierungschefs teilten eine Vision: Sie stellten sich eine Zeit vor, in der beide Länder aus den Fängen der [GetCountry('SEL').GetName] befreit sein würden, und sie schworen gemeinsam, ihren Teil der Abmachung einzuhalten, als es an der Zeit war, ihre Unabhängigkeit zu erklären.>  #NT!
 me_parthia.103.a: "Our flank is secured"  #<Unsere Flanke ist gesichert>  #NT!
  
 me_parthia.104.t: "One Parthia"  #<Eine Parthie>  #NT!
 me_parthia.104.desc: "All along the border between [ROOT.GetCountry.GetName] and the [GetCountry('SEL').GetName], agents of [ROOT.GetCountry.GetRuler.GetName] slipped into the cities and villages of the region, spreading gold and rumors of the powerful #E Parthian#! armies that were ready to invade.\n\n[GetCountry('SEL').GetRuler.GetName] in distant [GetCountry('SEL').GetCapital.GetName] had no business dictating affairs in [GetProvince('(int32)3434').GetArea.GetName] - a view held by [ROOT.GetCountry.GetRuler.GetFirstName] that many, including [GetProvince('(int32)3463').GetState.GetGovernorOrRuler.GetName], the Seleukid governor, were convinced of. The spies sent by [ROOT.GetCountry.GetRuler.GetFirstName] did their work over many weeks in the cities and marketplaces of our neighbors, and sympathies began to turn towards the northerners that promised to liberate them from a faraway tyrant."  #<Entlang der Grenze zwischen [ROOT.GetCountry.GetName] und [GetCountry('SEL').GetName] schlichen sich Agenten von [ROOT.GetCountry.GetRuler.GetName] in die Städte und Dörfer der Region ein und verbreiteten Gold und Gerüchte über die mächtigen #E parthischen#! Armeen, die zur Invasion bereit waren.\n\n[GetCountry('SEL').GetRuler.GetName] im fernen [GetCountry('SEL').GetCapital.GetName] hatte nichts damit zu tun, in [GetProvince('(int32)3434').GetArea.GetName] die Angelegenheiten zu diktieren – eine Ansicht, die [ROOT.GetCountry.GetRuler.GetFirstName] vertrat Viele, darunter [GetProvince('(int32)3463').GetState.GetGovernorOrRuler.GetName], der seleukidische Gouverneur, waren davon überzeugt. Die von [ROOT.GetCountry.GetRuler.GetFirstName] entsandten Spione verrichteten ihre Arbeit über viele Wochen hinweg in den Städten und Marktplätzen unserer Nachbarn, und die Sympathien begannen sich den Nordländern zuzuwenden, die versprachen, sie von einem weit entfernten Tyrannen zu befreien.>  #NT!
 me_parthia.104.a: "We will take these lands by force if need be!"  #<Wir werden diese Länder notfalls mit Gewalt einnehmen!>  #NT!
  
 me_parthia.105.t: "...It's Dismounting That's Hard"  #<...Absteigen ist schwer>  #NT!
 me_parthia.105.desc: "[ROOT.GetCountry.GetRuler.GetName] has finally given the order for the levies of [ROOT.GetCountry.GetName] to rest - temporarily, of course, but the exhausted soldiers have been pushed past the point of breaking and are hoping to spend some time with their families.\n\nNow, as our kinsmen return to their farms and settlements, [ROOT.GetCountry.GetRuler.GetFirstName] is faced with a new enemy, one that [ROOT.GetCountry.GetRuler.GetSheHe] has not dealt with before; the idle hands and minds that come with peace."  #<[ROOT.GetCountry.GetRuler.GetName] hat endlich den Befehl gegeben, die Aufgebote von [ROOT.GetCountry.GetName] ruhen zu lassen – natürlich vorübergehend, aber die erschöpften Soldaten sind über den Punkt des Zusammenbruchs hinaus gedrängt worden und hoffen, etwas Zeit mit ihren Familien zu verbringen.\n\nJetzt, da unsere Verwandten zu ihren Höfen und Siedlungen zurückkehren, sieht sich [ROOT.GetCountry.GetRuler.GetFirstName] mit einem neuen Feind konfrontiert, mit dem [ROOT.GetCountry.GetRuler.GetSheHe] noch nie zuvor zu tun hatte; die untätigen Hände und Geister, die mit Frieden einhergehen.>  #NT!
 me_parthia.105.a: "I would much rather be riding into battle..."  #<Ich würde viel lieber in die Schlacht reiten ...>  #NT!
  
 me_parthia.106.t: "Autonomous Kings"  #<Autonome Könige>  #NT!
 me_parthia.106.desc: "One of the greatest joys that [ROOT.GetCountry.GetRuler.GetName] has these days is empowering a new #E Client King#! with regalia and honors, and although the Parthian [ROOT.GetCountry.GetRulerTitle] prefers the battlefield to the pomp and circumstance of court life, [ROOT.GetCountry.GetRuler.GetSheHe] will always find the time to crown a subject.\n\nEveryone benefits from the arrangement; our #R Marches#! can rule over their own domains without the heavy hand of the #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! micromanaging their affairs, and [ROOT.GetCountry.GetRuler.GetFirstName] does not have to waste precious time dealing with minor issues that are best delegated. As long as our subjects remember their station in life, then they will be able to share in the Parthian peace and prosperity."  #<Eine der größten Freuden, die [ROOT.GetCountry.GetRuler.GetName] heutzutage hat, besteht darin, einen neuen #E Klientenkönig#! mit Insignien und Ehren auszustatten, und obwohl der Parther [ROOT.GetCountry.GetRulerTitle] das Schlachtfeld dem Prunk und den Umständen des Hoflebens vorzieht, wird [ROOT.GetCountry.GetRuler.GetSheHe] immer die Zeit finden, einen Untertanen zu krönen.\n\nJeder profitiert von der Vereinbarung; Unsere #R Märsche#! können über ihre eigenen Domänen herrschen, ohne dass die #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! ihre Angelegenheiten bis ins kleinste Detail verwalten müssen, und #E0 muss keine kostbare Zeit mit der Bearbeitung kleinerer Angelegenheiten verschwenden, die am besten delegiert werden. Solange sich unsere Untertanen an ihren Lebensstand erinnern, können sie am parthischen Frieden und Wohlstand teilhaben.>  #NT!
 me_parthia.106.a: "Now that we have subjects, we can reign them in."  #<Jetzt, wo wir Themen haben, können wir sie beherrschen.>  #NT!
  
 me_parthia.107.t: "Dynastic Dominance"  #<Dynastische Dominanz>  #NT!
 me_parthia.107.desc: "All throughout the cities and towns governed by the Parthian #E Marches#!, cohorts of soldiers loyal to the [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName]s regularly patrol the marketplaces and streets. Our faithful warriors garrison the citadels, and a small army of bureaucrats ensures that all correspondences are answered in a timely fashion, and that all taxes and tributes continue to flow towards [ROOT.GetCountry.GetCapital.GetName].\n\nWhile these March states are nominally independent, the fact that they are ruled by blood members of the #E [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName] Dynasty#! underscores the reality that their independence is an illusion - all real power belongs to [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] kin."  #<Überall in den Städten und Gemeinden, die von den parthischen #E-Marken#!, regiert werden, patrouillieren Kohorten von Soldaten, die den [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName]s treu ergeben sind, regelmäßig auf den Marktplätzen und Straßen. Unsere treuen Krieger bewachen die Zitadellen, und eine kleine Armee von Bürokraten sorgt dafür, dass alle Korrespondenzen rechtzeitig beantwortet werden und dass alle Steuern und Abgaben weiterhin an [ROOT.GetCountry.GetCapital.GetName] fließen.\n\nWährend diese Märzstaaten nominell unabhängig sind, unterstreicht die Tatsache, dass sie von Blutsverwandten der #E [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName] Dynastie#! regiert werden, die Realität, dass ihre Unabhängigkeit eine Illusion ist – dazu gehört alle wirkliche Macht [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis] Kin.>  #NT!
 me_parthia.107.a: "The [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName] name shall be known far and wide"  #<Der Name [Player.MakeScope.GetCountry.GetRuler.GetFamily.GetName] soll weit und breit bekannt sein>  #NT!
  
 me_parthia.108.t: "Religious Unity"  #<Religiöse Einheit>  #NT!
 me_parthia.108.desc: "Some people believe that the notion came to [ROOT.GetCountry.GetRuler.GetName] during a dream, whereas others say that [ROOT.GetCountry.GetRuler.GetSheHe] was sacrificing to the gods when they decided to place the idea in [ROOT.GetCountry.GetRuler.GetHerHis] mind.\n\nAnd yet the histories written by the historians of [ROOT.GetCountry.GetName] claimed that enforcing our pantheon throughout the realm was the goal of the [ROOT.GetCountry.GetRulerTitle] all along - once the [ROOT.GetCountry.GetAdjective]s had a firm grip over their #E Marches#! and subjects, then the religion of [ROOT.GetCountry.GetRuler.GetFirstName] would be mercilessly enforced. The shrines and temples of the forbidden gods were burned and their ashes scattered, and those refusing to break their idols and renounce their heretical beliefs were killed without hesitation."  #<Einige Leute glauben, dass die Idee zu [ROOT.GetCountry.GetRuler.GetName] während eines Traums kam, während andere sagen, dass [ROOT.GetCountry.GetRuler.GetSheHe] den Göttern opferte, als sie beschlossen, die Idee in [ROOT.GetCountry.GetRuler.GetHerHis]s Geist zu platzieren.\n\nUnd doch behaupteten die von den Historikern von [ROOT.GetCountry.GetName] geschriebenen Geschichten, dass die Durchsetzung unseres Pantheons im gesamten Reich die ganze Zeit über das Ziel der [ROOT.GetCountry.GetRulerTitle] war – sobald die [ROOT.GetCountry.GetAdjective]s eine hatten Wenn sie ihre #E Märsche#! und ihre Untertanen fest im Griff hätten, würde die Religion von [ROOT.GetCountry.GetRuler.GetFirstName] gnadenlos durchgesetzt. Die Schreine und Tempel der verbotenen Götter wurden verbrannt und ihre Asche verstreut, und diejenigen, die sich weigerten, ihre Götzen zu brechen und ihren ketzerischen Glauben aufzugeben, wurden ohne zu zögern getötet.>  #NT!
 me_parthia.108.a: "Alas, the supremacy of our gods must be accepted"  #<Leider muss die Vorherrschaft unserer Götter akzeptiert werden>  #NT!
  
 me_parthia.109.t: "Cultural Unity"  #<Kulturelle Einheit>  #NT!
 me_parthia.109.desc: "It came as a great shock to those that foolishly believed that [ROOT.GetCountry.GetRuler.GetName] would protect their traditional identities when it was announced that all would be forced to become #E Parthians#!; why would the conquering [ROOT.GetCountry.GetRulerTitle] allow [ROOT.GetCountry.GetRuler.GetHerHis] subjects to maintain the cultures of slaves and lap dogs? Rather than live their meager lives as worms, all would become Parthians and become heirs to a legacy of conquest and glory!"  #<Es war ein großer Schock für diejenigen, die törichterweise geglaubt hatten, dass [ROOT.GetCountry.GetRuler.GetName] ihre traditionelle Identität schützen würde, als bekannt gegeben wurde, dass alle gezwungen würden, #E Parther#!; zu werden. Warum sollte die Eroberung [ROOT.GetCountry.GetRulerTitle] es [ROOT.GetCountry.GetRuler.GetHerHis] Untertanen ermöglichen, die Kultur der Sklaven und Schoßhunde aufrechtzuerhalten? Anstatt ihr karges Leben als Würmer zu führen, würden alle Parther werden und Erben eines Erbes der Eroberung und des Ruhms werden!>  #NT!
 me_parthia.109.a: "One step closer to homogenous realm"  #<Einen Schritt näher an ein homogenes Reich>  #NT!
  
 me_parthia.1090.t: "Expand The Kingdom"  #<Erweitern Sie das Königreich>  #NT!
 me_parthia.1090.desc: "[ROOT.GetCountry.GetRuler.GetName] has sent personal letters to the loyal marches of [ROOT.GetCountry.GetName] with promises to help our servants enforce the claims they have against their neighbors. We shall not sit idly by, allowing our enemies to grow stronger while they wait for a moment of weakness to strike at our borders; far from it.\n\nWhen the hour is right, the conquering [ROOT.GetCountry.GetRulerTitle] has vowed to unleash the fury of our Parthian levies against any that foolishly challenge our growing hegemony. No corner of the world is safe from our cavalry, and whether we must ride for #E India#!, #E Asia#!, the steppes or any land in between, our forces will secure peace wherever they are needed."  #<[ROOT.GetCountry.GetRuler.GetName] hat persönliche Briefe an die treuen Märsche von [ROOT.GetCountry.GetName] geschickt, in denen er verspricht, unseren Dienern dabei zu helfen, ihre Ansprüche gegenüber ihren Nachbarn durchzusetzen. Wir werden nicht untätig zusehen und zulassen, dass unsere Feinde stärker werden, während sie auf einen Moment der Schwäche warten, um unsere Grenzen anzugreifen; weit davon entfernt.\n\nWenn die Stunde reif ist, hat der Eroberer [ROOT.GetCountry.GetRulerTitle] geschworen, die Wut unserer parthischen Heere gegen jeden zu entfesseln, der törichterweise unsere wachsende Hegemonie in Frage stellt. Kein Winkel der Welt ist vor unserer Kavallerie sicher, und ob wir nun durch #E Indien#!, #E Asien#!, die Steppe oder ein Land dazwischen reiten müssen, unsere Streitkräfte werden den Frieden sichern, wo immer sie gebraucht werden.>  #NT!
 me_parthia.1090.a: "The world shall tremble at the sight of our horses!"  #<Die Welt wird beim Anblick unserer Pferde zittern!>  #NT!
  
 me_parthia.110.t: "Matter of Media Atropatene"  #<Materie der Medien Atropatene>  #NT!
 me_parthia.110.desc: "Diplomats have been sent to [GetCountry('MAP').GetCapital.GetName], the capital of [GetCountry('MAP').GetName], with the demand that they peacefully submit to [ROOT.GetCountry.GetRuler.GetName]. The terrifying [ROOT.GetCountry.GetRulerTitle] has made it clear that [ROOT.GetCountry.GetName] will rule over their lands one way or another, so if [GetCountry('MAP').GetRuler.GetName] wants to continue enjoying [GetCountry('MAP').GetRuler.GetHerHis] charmed life as royalty, then the answer is clear."  #<Diplomaten wurden nach [GetCountry('MAP').GetCapital.GetName], der Hauptstadt von [GetCountry('MAP').GetName], geschickt, mit der Forderung, dass sie sich friedlich [ROOT.GetCountry.GetRuler.GetName] unterwerfen. Das furchteinflößende [ROOT.GetCountry.GetRulerTitle] hat deutlich gemacht, dass [ROOT.GetCountry.GetName] auf die eine oder andere Weise über ihr Land herrschen wird. Wenn [GetCountry('MAP').GetRuler.GetName] also weiterhin das verzauberte Leben von [GetCountry('MAP').GetRuler.GetHerHis] als König genießen möchte, dann ist die Antwort klar.>  #NT!
 me_parthia.110.a: "Your other option is death, [GetCountry('MAP').GetRuler.GetFirstName]..."  #<Ihre andere Option ist der Tod, [GetCountry('MAP').GetRuler.GetFirstName]...>  #NT!
  
 me_parthia.111.t: "Demand Adiabene's Loyalty"  #<Fordern Sie Adiabenes Loyalität>  #NT!
 me_parthia.111.desc: "Parthian diplomats left [ROOT.GetCountry.GetCapital.GetName] this morning for [GetCountry('ADI').GetCapital.GetName] in hopes of peacefully accepting the submission of [GetCountry('ADI').GetRuler.GetName]. The omens taken were favorable, so there are hopes that the westerners will see reason and abandon any hopes of resistance"  #<Parthische Diplomaten sind heute Morgen von [ROOT.GetCountry.GetCapital.GetName] nach [GetCountry('ADI').GetCapital.GetName] aufgebrochen, in der Hoffnung, die Unterwerfung von [GetCountry('ADI').GetRuler.GetName] friedlich anzunehmen. Die Vorzeichen waren günstig, so dass die Hoffnung besteht, dass die Westler Vernunft erkennen und jegliche Hoffnung auf Widerstand aufgeben werden>  #NT!
 me_parthia.111.a: "We will see if they have a death wish..."  #<Wir werden sehen, ob sie einen Todeswunsch haben ...>  #NT!
  
 me_parthia.112.t: "Caucasian Valleys"  #<Kaukasische Täler>  #NT!
 me_parthia.112.desc: "Although [ROOT.GetCountry.GetRuler.GetName] is not overjoyed by the thought of sending [ROOT.GetCountry.GetName]'s armies into the #E Caucasus Mountains#!, the [ROOT.GetCountry.GetRulerTitle] is prepared to do so if the #E Iberians#! decline our formal invitation to accept #E March#! status."  #<Obwohl [ROOT.GetCountry.GetRuler.GetName] nicht besonders erfreut über den Gedanken ist, [ROOT.GetCountry.GetName]s Armeen in den #E Kaukasus#!, zu schicken, ist [ROOT.GetCountry.GetRulerTitle] dazu bereit, dies zu tun, wenn die #E Iberer#! unsere formelle Einladung zur Annahme des #E März#!-Status ablehnen.>  #NT!
 me_parthia.112.a: "Let's wait for an answer..."  #<Warten wir auf eine Antwort...>  #NT!
  
 me_parthia.113.t: "Undermine Armenia"  #<Armenien untergraben>  #NT!
 me_parthia.113.desc: "Now that [ROOT.GetCountry.GetRuler.GetName] has decided to interfere in [GetCountry('ARM').GetName]'s sphere of influence, our diplomats are preparing to invite Armenia's subjects to allow #E Parthian#! garrisons into their cities. If they decline this honor, then the beating of hooves will fill the air as our cavalry pours through their mountain passages.\n\nNaturally, the Armenians will not be happy to hear about our meddling in their affairs, but their opinions are of no consequence."  #<Nachdem [ROOT.GetCountry.GetRuler.GetName] beschlossen hat, sich in den Einflussbereich von [GetCountry('ARM').GetName] einzumischen, bereiten unsere Diplomaten die Einladung der armenischen Untertanen vor, #E parthische#! Garnisonen in ihre Städte zu lassen. Wenn sie diese Ehre ablehnen, wird das Schlagen von Hufen die Luft erfüllen, während unsere Kavallerie durch ihre Bergpassagen strömt.\n\nNatürlich werden die Armenier nicht erfreut sein, wenn wir von unserer Einmischung in ihre Angelegenheiten hören, aber ihre Meinung hat keine Auswirkung.>  #NT!
 me_parthia.113.a: "Should be easy enough for [GetCountry('ARM').GetName]'s subjects to see reason"  #<Sollte für die Probanden von [GetCountry('ARM').GetName] leicht genug sein, die Vernunft zu erkennen>  #NT!
  
 me_parthia.114.t: "Subjugate Armenia"  #<Unterwerfe Armenien>  #NT!
 me_parthia.114.desc: "It is said that the [GetCountry('ARM').GetRulerTitle] of [GetCountry('ARM').GetName], [GetCountry('ARM').GetRuler.GetName], is proud, but [ROOT.GetCountry.GetRuler.GetName] wonders if [GetCountry('ARM').GetRuler.GetFirstName] is a fool, as well. The answer to this question will be provided once the Armenians have considered whether or not they will submit to [ROOT.GetCountry.GetName] peacefully."  #<Man sagt, dass der [GetCountry('ARM').GetRulerTitle] von [GetCountry('ARM').GetName], [GetCountry('ARM').GetRuler.GetName] stolz ist, aber [ROOT.GetCountry.GetRuler.GetName] fragt sich, ob [GetCountry('ARM').GetRuler.GetFirstName] auch ein Narr ist. Die Antwort auf diese Frage wird gegeben, wenn die Armenier darüber nachgedacht haben, ob sie sich [ROOT.GetCountry.GetName] friedlich unterwerfen werden oder nicht.>  #NT!
 me_parthia.114.a: "You can save thousands of lives with a simple 'yes', [GetCountry('ARM').GetRuler.GetFirstName]..."  #<Sie können Tausende von Leben mit einem einfachen „Ja“ retten, [GetCountry('ARM').GetRuler.GetFirstName]...>  #NT!
  
 me_parthia.115.t: "Conquer Media"  #<Medien erobern>  #NT!
 me_parthia.115.desc: "The armies tasked with protecting the heartlands of #E Media#! failed in their objectives, and the horses of [ROOT.GetCountry.GetRuler.GetName] trampled upon the broken bodies of their soldiers. Their cities were plundered and raided by our victorious warriors, and the skies were filled with the acrid smoke of their burning settlements."  #<Die Armeen, deren Aufgabe es war, das Kernland von #E Media#! zu schützen, scheiterten an ihren Zielen und die Pferde von [ROOT.GetCountry.GetRuler.GetName] trampelten auf den gebrochenen Körpern ihrer Soldaten herum. Ihre Städte wurden von unseren siegreichen Kriegern geplündert und überfallen, und der Himmel war mit dem beißenden Rauch ihrer brennenden Siedlungen erfüllt.>  #NT!
 me_parthia.115.a: "We move forward..."  #<Wir gehen voran...>  #NT!
  
 me_parthia.116.t: "Gates Of India"  #<Tore von Indien>  #NT!
 me_parthia.116.desc: "Are there any armies anywhere in the world that can stand against the conqueror [ROOT.GetCountry.GetRuler.GetName]? Whether waging war against #E Greek#! or #E Indian#!, the #E Parthian#! will always stand victorious - our pathetic enemies disperse before our horses like chaff in the wind, and their cowardly levies cannot even hold onto the territories that are vital for their security. The overland passages into #E India#! are garrisoned by Parthian soldiers, and the rich cities of the Indians lie undefended before our menacing armies."  #<Gibt es irgendwo auf der Welt Armeen, die dem Eroberer [ROOT.GetCountry.GetRuler.GetName] standhalten können? Ob sie Krieg gegen #E Griechen#! oder #E Inder#! führen, die #E Parther#! werden immer siegreich sein – unsere erbärmlichen Feinde zerstreuen sich vor unseren Pferden wie Spreu im Wind, und ihre feigen Truppen können nicht einmal die Gebiete halten, die für ihre Sicherheit lebenswichtig sind. Die Überlandpassagen nach #E Indien#! sind mit parthischen Soldaten besetzt, und die reichen Städte der Indianer liegen unverteidigt vor unseren bedrohlichen Armeen.>  #NT!
 me_parthia.116.a: "Soon, we'll own the entire subcontinent"  #<Bald wird uns der gesamte Subkontinent gehören>  #NT!
  
 me_parthia.117.t: "Descendants Of Sargon"  #<Nachkommen von Sargon>  #NT!
 me_parthia.117.desc: "Lush land between the Euphrates and Tigris rivers was home to the strongest state in the world since time immemorial. It is only fitting that now we will become custodians of this great land and continue that legacy, albeit using its legacy, legitimacy, manpower and resources for our own designs, continuing the work of perhaps first King that ever was - #E Sargon the Great#!."  #<Das üppige Land zwischen Euphrat und Tigris war seit jeher die Heimat des stärksten Staates der Welt. Es ist nur passend, dass wir jetzt Hüter dieses großartigen Landes werden und dieses Erbe weiterführen, auch wenn wir sein Erbe, seine Legitimität, seine Arbeitskraft und seine Ressourcen für unsere eigenen Pläne nutzen und das Werk des vielleicht ersten Königs überhaupt fortsetzen – #E Sargon der Große#!.>  #NT!
 me_parthia.117.a: "The Land between Two Rivers will become a core part of our strength"  #<Das Land zwischen zwei Flüssen wird ein zentraler Bestandteil unserer Stärke werden>  #NT!
  
 me_parthia.118.t: "Median Authority"  #<Mittlere Autorität>  #NT!
 me_parthia.118.desc: "Diplomats have been sent to [GetCountry('MAP').GetCapital.GetName], the capital of [GetCountry('MAP').GetName], with the demand that they peacefully submit to [ROOT.GetCountry.GetRuler.GetName]. The terrifying [ROOT.GetCountry.GetRulerTitle] has made it clear that [ROOT.GetCountry.GetName] will rule over their lands one way or another, so if [GetCountry('MAP').GetRuler.GetName] wants to continue enjoying [GetCountry('MAP').GetRuler.GetHerHis] charmed life as royalty, then the answer is clear."  #<Diplomaten wurden nach [GetCountry('MAP').GetCapital.GetName], der Hauptstadt von [GetCountry('MAP').GetName], geschickt, mit der Forderung, dass sie sich friedlich [ROOT.GetCountry.GetRuler.GetName] unterwerfen. Das furchteinflößende [ROOT.GetCountry.GetRulerTitle] hat deutlich gemacht, dass [ROOT.GetCountry.GetName] auf die eine oder andere Weise über ihr Land herrschen wird. Wenn [GetCountry('MAP').GetRuler.GetName] also weiterhin das verzauberte Leben von [GetCountry('MAP').GetRuler.GetHerHis] als König genießen möchte, dann ist die Antwort klar.>  #NT!
 me_parthia.118.a: "Let's wait for an answer"  #<Warten wir auf eine Antwort>  #NT!
  
 me_parthia.119.t: "Bowing Of Armenia"  #<Verbeugung Armeniens>  #NT!
 me_parthia.119.desc: "It is said that the [GetCountry('ARM').GetRulerTitle] of [GetCountry('ARM').GetName], [GetCountry('ARM').GetRuler.GetName], is proud, but [ROOT.GetCountry.GetRuler.GetName] wonders if [GetCountry('ARM').GetRuler.GetFirstName] is a fool, as well. The answer to this question will be provided once the Armenians have considered whether or not they will submit to [ROOT.GetCountry.GetName] peacefully."  #<Man sagt, dass der [GetCountry('ARM').GetRulerTitle] von [GetCountry('ARM').GetName], [GetCountry('ARM').GetRuler.GetName] stolz ist, aber [ROOT.GetCountry.GetRuler.GetName] fragt sich, ob [GetCountry('ARM').GetRuler.GetFirstName] auch ein Narr ist. Die Antwort auf diese Frage wird gegeben, wenn die Armenier darüber nachgedacht haben, ob sie sich [ROOT.GetCountry.GetName] friedlich unterwerfen werden oder nicht.>  #NT!
 me_parthia.119.a: "We tried the nice way"  #<Wir haben es auf die schöne Art versucht>  #NT!
  
 me_parthia.120.t: "Assyrian Ruins"  #<Assyrische Ruinen>  #NT!
 me_parthia.120.desc: "Assyria, also one of the richest lands on this mortal world has also been incorporated into our burgeoning state. Its rich history and strong populace will surely become a great asset in the struggles to come, and will partake in building a new chapter of history. Just now for our purposes and under our guidance."  #<Assyrien, ebenfalls eines der reichsten Länder dieser sterblichen Welt, wurde ebenfalls in unseren aufstrebenden Staat eingegliedert. Seine reiche Geschichte und seine starke Bevölkerung werden in den kommenden Kämpfen sicherlich von großem Nutzen sein und zum Aufbau eines neuen Kapitels der Geschichte beitragen. Gerade jetzt für unsere Zwecke und unter unserer Anleitung.>  #NT!
 me_parthia.120.a: "Let's move along the Euphrates"  #<Bewegen wir uns entlang des Euphrat>  #NT!
  
 me_parthia.121.t: "Break Up The Greek Remnants"  #<Zerschlagen Sie die griechischen Überreste>  #NT!
 me_parthia.121.desc: "The agents of [ROOT.GetCountry.GetRuler.GetName] quickly discovered that the #E Hellenic#! governors stationed throughout the #E Iranian Plateau#! owed no great allegiance to some distant central authority, but instead were guided purely by self-interest and greed - a situation that would prove beneficial for [ROOT.GetCountry.GetName] in the days that followed.\n\nOur spies did what they could to sow dissension and distrust throughout the border provinces over many weeks of clandestine travel, and once their work was complete, it was reported to [ROOT.GetCountry.GetRuler.GetFirstName] that the Greek councils openly discussed sedition against their overlord and were ready to open their gates to our garrisons."  #<Die Agenten von [ROOT.GetCountry.GetRuler.GetName] stellten schnell fest, dass die #E hellenischen#! Gouverneure, die auf dem gesamten #E Iranischen Plateau#! stationiert waren, keine große Loyalität gegenüber einer entfernten zentralen Autorität hatten, sondern sich stattdessen ausschließlich von Eigennutz und Gier leiten ließen – eine Situation, die sich in den folgenden Tagen für [ROOT.GetCountry.GetName] als vorteilhaft erweisen würde.\n\nUnsere Spione taten, was sie konnten, um Zwietracht und Misstrauen zu säen Viele Wochen lang reisten sie heimlich durch die Grenzprovinzen, und als ihre Arbeit abgeschlossen war, wurde [ROOT.GetCountry.GetRuler.GetFirstName] berichtet, dass die griechischen Räte offen über Aufruhr gegen ihren Oberherrn diskutierten und bereit seien, ihre Tore für unsere Garnisonen zu öffnen.>  #NT!
 me_parthia.121.a: "We will consolidate the plateau by any means"  #<Wir werden das Plateau mit allen Mitteln festigen>  #NT!
  
 me_parthia.122.t: "Settlement With The Greeks"  #<Siedlung mit den Griechen>  #NT!
 me_parthia.122.desc: "We have made great gains and large territorial acqusitions, riding over our enemies and subjugating lands worthy of great conquerors.\n\nStill, some tire of this war, saying it is not holy to lose oneself in ceaseless ambition; arguments can be heard that while the Hellenic beast is shot dead gasping for air, we should be mindful of our own situation, and not overextend what is at the moment a huge empire for comparatively few tribesmen.\n\nSurely a solution can be devised to offer the [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#! to keep everything east of the [GetProvince('(int32)7719').GetName], that is, [GetProvince('(int32)754').GetArea.GetRegion.GetName], and having us keep the lands to the west and having [ROOT.GetCountry.GetRuler.GetName] marry a bride of their family."  #<Wir haben große Errungenschaften und große Gebietseroberungen gemacht, sind über unsere Feinde geritten und haben Länder unterworfen, die großer Eroberer würdig waren.\n\nTrotzdem sind einige von diesem Krieg müde und sagen, es sei nicht heilig, sich in unaufhörlichem Ehrgeiz zu verlieren; Man kann Argumente hören, dass, während das hellenische Biest nach Luft schnappend erschossen wird, wir uns unserer eigenen Situation bewusst sein sollten und das, was im Moment ein riesiges Reich für vergleichsweise wenige Stammesangehörige ist, nicht überdehnen sollten.\n\nSicherlich kann eine Lösung gefunden werden, die [GetCountry('SEL').GetRuler.GetFamilyDisplayAdjective]#E s#! anzubieten, um alles östlich von [GetProvince('(int32)7719').GetName], also [GetProvince('(int32)754').GetArea.GetRegion.GetName], zu behalten und uns die Ländereien zu behalten im Westen und haben [ROOT.GetCountry.GetRuler.GetName] eine Braut ihrer Familie heiraten lassen.>  #NT!
 me_parthia.122.a: "We may squeeze more from Seleukids alive rather than dead."  #<Wir können aus lebenden Seleukiden mehr herausholen als aus toten.>  #NT!
  
 me_parthia.123.t: "Parthian Empire"  #<Partherreich>  #NT!
 me_parthia.123.desc: "By sword and saddle, [ROOT.GetCountry.GetRuler.GetName] has defeated the proud #E Hellenes#! and driven them from their cities in despair. Coalitions of Kings and Satraps, having grown desperate in their final hours and throwing everything they possess towards their survival, have not been enough to keep the #E Parthian#! hordes from trampling their empires into dust, and the greatest civilizations known to man have been driven to their knees before the domineering #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! - a true testament to their divinely-inspired ascent and right to rule over all others.\n\nA grand ceremony was held within [ROOT.GetCountry.GetCapital.GetName], one where all of the governors, nobles, royal houses, clients and high-ranking administrators of the [ROOT.GetCountry.GetName] attended in person to witness the establishment of a new era, one wherein the House of [ROOT.GetCountry.GetRuler.GetFamily.GetName] would rule over the greatest empire that the world had ever seen."  #<Mit Schwert und Sattel hat [ROOT.GetCountry.GetRuler.GetName] die stolzen #E Hellenen#! besiegt und sie verzweifelt aus ihren Städten vertrieben. Koalitionen von Königen und Satrapen, die in ihren letzten Stunden verzweifelt waren und alles, was sie besaßen, in ihr Überleben stürzten, reichten nicht aus, um die Horden der #E Parther#! davon abzuhalten, ihre Reiche in Staub zu zertreten, und die größten Zivilisationen, die die Menschheit kennt, wurden vor den herrschsüchtigen #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! in die Knie gezwungen – ein wahrer Beweis ihres göttlich inspirierten Aufstiegs und das Recht, über alle anderen zu herrschen.\n\nInnerhalb von [ROOT.GetCountry.GetCapital.GetName] fand eine große Zeremonie statt, bei der alle Gouverneure, Adligen, Königshäuser, Klienten und hochrangigen Administratoren der [ROOT.GetCountry.GetName] persönlich anwesend waren, um den Beginn einer neuen Ära mitzuerleben, in der das Haus von [ROOT.GetCountry.GetRuler.GetFamily.GetName] über das größte Reich herrschen würde, das die Welt je gesehen hatte.>  #NT!
 me_parthia.123.a: "Cyrus, I have surpassed thee!"  #<Cyrus, ich habe dich übertroffen!>  #NT!
  
 me_parthia.124.t: "Camels For Supply Trains"  #<Kamele für Versorgungszüge>  #NT!
 me_parthia.124.desc: "Traversing the endless expanses of the deserts that surround [ROOT.GetCountry.GetName] can be a hellish slog in the best of times, and the sight of a camel @camels! caravan plodding its way through the badlands is a common one these days. When it comes to taking cargoes through the overland route, many merchants prefer to rely on the 'ship of the desert' instead of horses for obvious reasons, and over time, our armies have learned from their example and have outfitted our supply trains with camel units.\n\nThanks to this military innovation, our supply trains are moving quicker than they ever have before, which is a boon to an army that often has to eat while marching."  #<Die endlosen Weiten der Wüsten rund um [ROOT.GetCountry.GetName] zu durchqueren, kann selbst in den besten Zeiten eine höllische Strapaze sein, und der Anblick eines Kamels @camels! Karawanen, die sich ihren Weg durch das Ödland bahnen, sind heutzutage an der Tagesordnung. Wenn es darum geht, Fracht über den Landweg zu befördern, verlassen sich viele Händler aus offensichtlichen Gründen lieber auf das „Schiff der Wüste“ statt auf Pferde, und im Laufe der Zeit haben unsere Armeen aus ihrem Beispiel gelernt und unsere Versorgungszüge mit Kameleinheiten ausgestattet.\n\nDank dieser militärischen Innovation bewegen sich unsere Versorgungszüge schneller als je zuvor, was ein Segen für eine Armee ist, die oft beim Marschieren essen muss.>  #NT!
 me_parthia.124.a: "The swiftness of our camels shall be their greatest strength"  #<Die Schnelligkeit unserer Kamele wird ihre größte Stärke sein>  #NT!
  
 me_parthia.125.t: "Conduct Census"  #<Führen Sie eine Volkszählung durch>  #NT!
 me_parthia.125.desc: "By all accounts, the #E Census#! conducted by [ROOT.GetCountry.GetRuler.GetName]'s agents was a resounding success, and the scrolls and records kept within [ROOT.GetCountry.GetCapital.GetName] were the most accurate that they would be for a generation to come. Every city, settlement and farm within the realm was visited by our agents, who took meticulous notes and sent back weekly reports to the capital.\n\nMuch to [ROOT.GetCountry.GetRuler.GetHerHis] surprise, the Parthian diplomats entrusted with conducting the census reported to [ROOT.GetCountry.GetRuler.GetName] that there were many more slaves @slaves! living within [ROOT.GetCountry.GetName] than anyone had previously thought, and that our local governors had taken the liberty of assigning these thralls to various farms and mines throughout the provinces."  #<Nach allen Berichten war die von den Agenten von [ROOT.GetCountry.GetRuler.GetName] durchgeführte #E-Volkszählung#! ein voller Erfolg, und die in [ROOT.GetCountry.GetCapital.GetName] aufbewahrten Schriftrollen und Aufzeichnungen waren die genauesten, die sie für eine kommende Generation haben würden. Jede Stadt, Siedlung und Farm innerhalb des Reiches wurde von unseren Agenten besucht, die sich akribische Notizen machten und wöchentliche Berichte an die Hauptstadt zurückschickten.\n\nZu [ROOT.GetCountry.GetRuler.GetHerHis] Überraschung berichteten die parthischen Diplomaten, die mit der Durchführung der Volkszählung betraut waren, [ROOT.GetCountry.GetRuler.GetName], dass es noch viel mehr Sklaven @slaves gab! Wir lebten innerhalb von [ROOT.GetCountry.GetName], als irgendjemand zuvor gedacht hatte, und unsere örtlichen Gouverneure hatten sich die Freiheit genommen, diese Leibeigenen verschiedenen Farmen und Minen in den Provinzen zuzuteilen.>  #NT!
 me_parthia.125.a: "Looks like we found some taxable assets!"  #<Offenbar haben wir steuerpflichtige Vermögenswerte gefunden!>  #NT!
  
 me_parthia.126.t: "Idk, empty event?"  #<Keine Ahnung, leeres Event?>  #NT!
 me_parthia.126.desc: ""
 me_parthia.126.a: ""
  
 me_parthia.127.t: "Qanats"  #<Qanats>  #NT!
 me_parthia.127.desc: "Thanks to the widespread usage of the so-called #E 'Qanat'#!, a specialized type of aqueduct system that draws water from deep underground reservoirs and carries it to the surface, our kinsmen have been able to build settlements and cities in the harshest of terrains."  #<Dank der weitverbreiteten Nutzung des sogenannten #E „Qanat“#!,, einer speziellen Art von Aquäduktsystem, das Wasser aus tiefen unterirdischen Reservoirs zieht und an die Oberfläche befördert, konnten unsere Verwandten Siedlungen und Städte in den rauesten Geländen errichten.>  #NT!
 me_parthia.127.a: "Our desert cities shall become places of refuge amidst the endless dunes"  #<Unsere Wüstenstädte sollen Zufluchtsorte inmitten der endlosen Dünen werden>  #NT!
  
 me_parthia.128.t: "High Literacy"  #<Hohe Alphabetisierung>  #NT!
 me_parthia.128.desc: "Having an educated slave attached to a household is a privilege that few living within [ROOT.GetCountry.GetName] can afford, but many of the leading families in [ROOT.GetCountry.GetCapital.GetName] have tutors teaching their children their alphabets.\n\n[ROOT.GetCountry.GetRuler.GetName] has gently encouraged this trend among the aristocracy, calling for original works to be written in the local dialects and shared throughout the Parthian realm. The [ROOT.GetCountry.GetRulerTitle] is very aware of the storied literary traditions of the #E Greeks#! and hopes that one day, our cultural output will surpass that of the wise Hellenics."  #<Einen gebildeten Sklaven in einem Haushalt zu haben, ist ein Privileg, das sich nur wenige Bewohner von [ROOT.GetCountry.GetName] leisten können, aber viele der führenden Familien in [ROOT.GetCountry.GetCapital.GetName] haben Lehrer, die ihren Kindern das Alphabet beibringen.\n\n[ROOT.GetCountry.GetRuler.GetName] hat diesen Trend in der Aristokratie sanft gefördert und dazu aufgerufen, Originalwerke in den lokalen Dialekten zu verfassen und im gesamten parthischen Reich zu verbreiten. Die [ROOT.GetCountry.GetRulerTitle] sind sich der sagenumwobenen literarischen Traditionen der #E Griechen#! sehr bewusst und hoffen, dass unser kulturelles Schaffen eines Tages das der weisen Hellenen übertreffen wird.>  #NT!
 me_parthia.128.a: "An educated populace is the key to intellectual supremacy"  #<Eine gebildete Bevölkerung ist der Schlüssel zur intellektuellen Überlegenheit>  #NT!
  
 me_parthia.129.t: "Water Ariana"  #<Wasser Ariana>  #NT!
 me_parthia.129.desc: "Parthian engineers have spent countless hours under the cruel sun, building aqueducts and qanats throughout the deserts of [GetProvince('(int32)6561').GetArea.GetRegion.GetName]. While the days were long and the air of the worksites was filled with bitter curses against the unrelenting heat, the efforts of our architects have paid off, and farming has become a possiblity in places that were once the home of dust devils and lizards."  #<Parthische Ingenieure haben unzählige Stunden unter der grausamen Sonne verbracht und Aquädukte und Qanats in den Wüsten von [GetProvince('(int32)6561').GetArea.GetRegion.GetName] gebaut. Während die Tage lang waren und die Luft auf den Baustellen voller bitterer Flüche gegen die unerbittliche Hitze war, haben sich die Bemühungen unserer Architekten ausgezahlt, und an Orten, die einst die Heimat von Staubteufeln und Eidechsen waren, ist Landwirtschaft möglich geworden.>  #NT!
 me_parthia.129.a: "I touched the desert sands and flowers bloomed under my fingertips..."  #<Ich berührte den Wüstensand und Blumen blühten unter meinen Fingerspitzen ...>  #NT!
  
 me_parthia.130.t: "Imperial Headquarters"  #<Kaiserliches Hauptquartier>  #NT!
 me_parthia.130.desc: "Travelers reaching the walls of [ROOT.GetCountry.GetCapital.GetName], one of the largest cities in all of [ROOT.GetCountry.GetName] and the official seat of power for the royal #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Dynasty#!, often find that words fail them when it comes to describing the splendors of the Parthian capital.\n\nFor who could adequately describe the pleasures that are found in its numerous marketplaces, with its wide marble avenues and shaded collonades? And who has heard the pleasant sound of the flute and harp played by the street musicians sitting near [ROOT.GetCountry.GetCapital.GetName]'s many fountains and has not paused to indulge their ears? And who among us has not stopped before the imposing edifice of a grand temple or palatial estate and has not admired the handiwork of its masterful architects? All of this and more awaits the tourist entering the city gates.\n\nAnything that money can procure can be found within the Parthian metropolis; sumptuous delicacies from the far east, ivory rhytons and Greek helmets and spears brought by Hellenic traders, slaves and bodyguards for hire that speak a hundred different tongues. It is said by many that reaching [ROOT.GetCountry.GetCapital.GetName] is difficult, but leaving the magnificent city is ten times harder."  #<Reisende, die die Mauern von [ROOT.GetCountry.GetCapital.GetName] erreichen, einer der größten Städte in ganz [ROOT.GetCountry.GetName] und dem offiziellen Machtsitz der königlichen #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Dynastie#!,, müssen oft feststellen, dass ihnen die Worte fehlen, wenn es darum geht, die Pracht der parthischen Hauptstadt zu beschreiben.\n\nDenn wer könnte die Freuden, die auf ihren zahlreichen Marktplätzen mit ihren breiten Marmoralleen und schattigen Kolonaden zu finden sind, angemessen beschreiben? Und wer hat schon einmal den angenehmen Klang der Flöte und Harfe gehört, die von den Straßenmusikanten gespielt wird, die an den vielen Brunnen von [ROOT.GetCountry.GetCapital.GetName] sitzen, und hat nicht innegehalten, um ihre Ohren zu verwöhnen? Und wer von uns ist nicht vor dem imposanten Bauwerk eines großen Tempels oder einer Palastanlage stehengeblieben und hat nicht die Arbeit seiner meisterhaften Architekten bewundert? All dies und noch mehr erwartet den Touristen, der die Stadttore betritt.\n\nAlles, was man mit Geld bekommen kann, kann man in der parthischen Metropole finden; üppige Köstlichkeiten aus dem Fernen Osten, Rhytons aus Elfenbein und griechische Helme und Speere, die von hellenischen Händlern, Sklaven und Leibwächtern gemietet wurden und hundert verschiedene Sprachen sprechen. Viele sagen, dass es schwierig ist, [ROOT.GetCountry.GetCapital.GetName] zu erreichen, aber die prächtige Stadt zu verlassen ist zehnmal schwieriger.>  #NT!
 me_parthia.130.a: "Our capital will be known as 'The City' to the world and history"  #<Unsere Hauptstadt wird in der Welt und in der Geschichte als „Die Stadt“ bekannt sein>  #NT!
  
 me_parthia.131.t: "Full Coffers"  #<Volle Kassen>  #NT!
 me_parthia.131.desc: "Never before in our history have the coffers of [ROOT.GetCountry.GetName] been as full as they are at the moment; a good problem to have and one that we should be thankful for, as [ROOT.GetCountry.GetRuler.GetName] has drily noted to [ROOT.GetCountry.GetRuler.GetHerHis] advisors. The taxes and healthy trade revenues flowing into [ROOT.GetCountry.GetCapital.GetName] have allowed the [ROOT.GetCountry.GetRulerTitle] to spend as [ROOT.GetCountry.GetRuler.GetSheHe] pleases, and luckily for the common people, [ROOT.GetCountry.GetRuler.GetFirstName] has insisted on investing in our infrastructure."  #<Noch nie in unserer Geschichte waren die Kassen von [ROOT.GetCountry.GetName] so voll wie derzeit; Ein gutes Problem und eines, für das wir dankbar sein sollten, wie [ROOT.GetCountry.GetRuler.GetName] gegenüber [ROOT.GetCountry.GetRuler.GetHerHis] Beratern trocken bemerkt hat. Die Steuern und die gesunden Handelseinnahmen, die in [ROOT.GetCountry.GetCapital.GetName] fließen, haben es den [ROOT.GetCountry.GetRulerTitle] ermöglicht, nach Belieben von [ROOT.GetCountry.GetRuler.GetSheHe] auszugeben, und zum Glück für das einfache Volk hat [ROOT.GetCountry.GetRuler.GetFirstName] darauf bestanden, in unsere Infrastruktur zu investieren.>  #NT!
 me_parthia.131.a: "Let's spend this money wisely and build up our cities"  #<Lasst uns dieses Geld sinnvoll ausgeben und unsere Städte aufbauen>  #NT!
  
 me_parthia.132.t: "Connect Roads"  #<Straßen verbinden>  #NT!
 me_parthia.132.desc: "Although our #E Parthian#! engineers have constructed many notable things throughout our cities, their architectural achievements all pale in comparison to the extensive road network that they have built throughout the dusty region of [GetProvince('(int32)6586').GetArea.GetRegion.GetName].\n\nThis road, known to all as the #E '[ROOT.GetCountry.GetRuler.GetFamily.GetName] Highway#!', has completed a circuit that allows a traveler to walk from [GetProvince('(int32)258').GetName] all the way to [GetProvince('(int32)7177').GetName], if they so desired. The wisest men living in [ROOT.GetCountry.GetCapital.GetName] all agree that our [ROOT.GetCountry.GetRulerTitle] is responsible for creating the longest road in the entire world - an accomplishment that has made [ROOT.GetCountry.GetRuler.GetFirstName] very proud."  #<Obwohl unsere #E Parthian#!-Ingenieure in unseren Städten viele bemerkenswerte Dinge gebaut haben, verblassen ihre architektonischen Errungenschaften alle im Vergleich zu dem ausgedehnten Straßennetz, das sie in der staubigen Region von [GetProvince('(int32)6586').GetArea.GetRegion.GetName] gebaut haben.\n\nDiese Straße, die allen als #E '[ROOT.GetCountry.GetRuler.GetFamily.GetName] Highway#!' bekannt ist, hat einen Rundweg fertiggestellt, der es einem Reisenden ermöglicht, von [GetProvince('(int32)258').GetName] bis nach zu laufen [GetProvince('(int32)7177').GetName], wenn sie es wünschen. Die weisesten Männer, die in [ROOT.GetCountry.GetCapital.GetName] leben, sind sich alle einig, dass unser [ROOT.GetCountry.GetRulerTitle] für die Schaffung der längsten Straße der Welt verantwortlich ist – eine Leistung, die #!0 sehr stolz gemacht hat.>  #NT!
 me_parthia.132.a: "East and West are now connected"  #<Ost und West sind nun verbunden>  #NT!
  
 me_parthia.133.t: "Merchant Freedoms"  #<Handelsfreiheiten>  #NT!
 me_parthia.133.desc: "In a sign of royal favor, [ROOT.GetCountry.GetRuler.GetName] has agreed to bestow the title of #E League City#! upon one of our territories, creating a commercial hub that will be a home for many of the merchants living in [ROOT.GetCountry.GetName]. This extraordinary gesture has earned us the goodwill of the trading guilds, and the political clout that [ROOT.GetCountry.GetRuler.GetFirstName] has gained from this incident is substantial."  #<Als Zeichen der königlichen Gunst hat [ROOT.GetCountry.GetRuler.GetName] zugestimmt, einem unserer Gebiete den Titel #E League City#! zu verleihen und so ein Handelszentrum zu schaffen, das für viele der in [ROOT.GetCountry.GetName] lebenden Händler ein Zuhause sein wird. Diese außergewöhnliche Geste hat uns das Wohlwollen der Handelsgilden eingebracht, und der politische Einfluss, den [ROOT.GetCountry.GetRuler.GetFirstName] durch diesen Vorfall gewonnen hat, ist beträchtlich.>  #NT!
 me_parthia.133.a: "The best trading partner is one that is subservient"  #<Der beste Handelspartner ist einer, der unterwürfig ist>  #NT!
  
 me_parthia.134.t: "Parthian Bazaars"  #<Parthische Basare>  #NT!
 me_parthia.134.desc: "Bolstered by the healthy sale of cloth @cloth! and other textiles, our markets continue to attract merchants from distant lands - a testament to the efforts of [ROOT.GetCountry.GetRuler.GetName] to grow our trade. The fabrics that are produced in our workshops are carried by camel caravans to distant ports, where they are loaded upon ships that sail to the very edges of the earth, it seems - so great is the demand for our merchandise that men are willing to make these journeys in order to secure profits."  #<Unterstützt durch den guten Verkauf von Stoff @cloth! und andere Textilien ziehen unsere Märkte weiterhin Händler aus fernen Ländern an – ein Beweis für die Bemühungen von [ROOT.GetCountry.GetRuler.GetName], unseren Handel auszubauen. Die Stoffe, die in unseren Werkstätten hergestellt werden, werden von Kamelkarawanen zu fernen Häfen transportiert, wo sie auf Schiffe verladen werden, die bis an die Grenzen der Erde fahren. Es scheint, dass die Nachfrage nach unseren Waren so groß ist, dass Menschen bereit sind, diese Reisen zu unternehmen, um sich Gewinne zu sichern.>  #NT!
 me_parthia.134.a: "Our marketplaces are filling with traders!"  #<Unsere Marktplätze füllen sich mit Händlern!>  #NT!
  
 me_parthia.135.t: "Develop Countryside"  #<Landschaft entwickeln>  #NT!
 me_parthia.135.desc: "During the seasons when they are not required for the levies of [ROOT.GetCountry.GetName], our people have spent their times in the fields laboring under the unforgiving sun. Encouraged by [ROOT.GetCountry.GetRuler.GetName] to grow crops and herd animals wherever they could, the Parthians met this challenge with their usual grim determination. Thanks to their efforts to plant seeds and tend to arable land, our harvests have filled our granaries with enough food to last us through difficult times."  #<In den Jahreszeiten, in denen sie nicht für die Abgaben von [ROOT.GetCountry.GetName] benötigt werden, haben unsere Leute ihre Zeit auf den Feldern verbracht und unter der unerbittlichen Sonne gearbeitet. Von [ROOT.GetCountry.GetRuler.GetName] ermutigt, Getreide anzubauen und Tiere zu hüten, wo immer sie konnten, stellten sich die Parther dieser Herausforderung mit ihrer gewohnt grimmigen Entschlossenheit. Dank ihrer Bemühungen, Samen zu säen und Ackerland zu pflegen, haben unsere Ernten unsere Getreidespeicher mit genug Nahrung gefüllt, um uns in schwierigen Zeiten zu versorgen.>  #NT!
 me_parthia.135.a: "There is no such thing as too much food"  #<Zu viel Essen gibt es nicht>  #NT!
  
 me_parthia.136.t: "Colorful Fabrics"  #<Bunte Stoffe>  #NT!
 me_parthia.136.desc: "Our treasuries overflow with gold taken from the sale of our colorful fabrics, fetching a number that caught [ROOT.GetCountry.GetRuler.GetName]'s attention. While many living within [ROOT.GetCountry.GetName] prefer to make their money by plundering and destroying the settlements and towns of our enemies, even they admit that there is wealth to be made via trading."  #<Unsere Schatzkammern sind überfüllt mit Gold aus dem Verkauf unserer farbenfrohen Stoffe und haben eine Zahl hervorgebracht, die die Aufmerksamkeit von [ROOT.GetCountry.GetRuler.GetName] erregt hat. Während viele Bewohner von [ROOT.GetCountry.GetName] es vorziehen, ihr Geld mit der Plünderung und Zerstörung der Siedlungen und Städte unserer Feinde zu verdienen, geben selbst sie zu, dass man durch Handel Reichtum verdienen kann.>  #NT!
 me_parthia.136.a: "So much money can be made off this!"  #<Damit lässt sich so viel Geld verdienen!>  #NT!
  
 me_parthia.137.t: "Iranian Silks"  #<Iranische Seide>  #NT!
 me_parthia.137.desc: "While one can procure silk @silk! that is made in lands far, far to the east, the type that is made by our craftsmen living within the heartlands of #E Iran#! rivals the quality of all others. When faced with the exorbitant prices that come with importing the eastern silk, many merchants will instead buy from us, knowing that they will be able to make better profits with our locally-produced textiles."  #<Während man Seide @silk beschaffen kann! Die Art, die in Ländern weit, weit im Osten hergestellt wird, ist mit der Qualität aller anderen vergleichbar. Angesichts der exorbitanten Preise, die mit dem Import der Seide aus dem Osten einhergehen, kaufen viele Händler stattdessen bei uns ein, wohlwissend, dass sie mit unseren lokal produzierten Textilien bessere Gewinne erzielen können.>  #NT!
 me_parthia.137.a: "No one can process silk like our manufacturers"  #<Niemand kann Seide so verarbeiten wie unsere Hersteller>  #NT!
  
 me_parthia.138.t: "Sponsor Minstrels"  #<Sponsern Sie Minnesänger>  #NT!
 me_parthia.138.desc: "The wealth of the #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! has allowed the #E Parthians#! to do things that other inferior civilizations cannot afford to, such as subsidizing the artists that live in the main cities. [ROOT.GetCountry.GetRuler.GetName] is known to be a patron of the arts, and has spent large sums of money procuring the services of the finest dancers, singers, actors and orators that can be found.\n\nNot having to worry about where their next meal comes from ensures that our entertainers can focus on their primary mission; promoting Parthian cultural values and honoring the achievements of the mighty [ROOT.GetCountry.GetRuler.GetFirstName], many of which have been memorialized in song."  #<Der Reichtum der #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#! hat es den #E Parthern#! ermöglicht, Dinge zu tun, die sich andere minderwertige Zivilisationen nicht leisten können, wie zum Beispiel die Subventionierung der Künstler, die in den Hauptstädten leben. [ROOT.GetCountry.GetRuler.GetName] ist als Förderer der Künste bekannt und hat viel Geld ausgegeben, um die besten Tänzer, Sänger, Schauspieler und Redner zu engagieren, die es gibt.\n\nDa wir uns keine Gedanken darüber machen müssen, woher ihre nächste Mahlzeit kommt, können sich unsere Entertainer auf ihre Hauptaufgabe konzentrieren; promoting Parthian cultural values and honoring the achievements of the mighty [ROOT.GetCountry.GetRuler.GetFirstName], many of which have been memorialized in song.>  #NT!
 me_parthia.138.a: "Our cultural works shall be remembered for ages to come!"  #<None>  #NT!
  
 me_parthia.139.t: "Median Olives"  #<Mittlere Oliven>  #NT!
 me_parthia.139.desc: "[ROOT.GetCountry.GetRuler.GetName] can truly understand why the #E Hellenics#! love their olives @olive! as much as they do. Not only can this savory fruit be turned into valuable oil @earthware!, but the olive itself comprises a major part of our daily meals - a quick [ROOT.GetCountry.GetAdjective] breakfast involves a handful of olives, a scrap of bread, maybe a date or two, and everything is washed down by wine.\n\nMindful that we can always find a use for olives, [ROOT.GetCountry.GetRuler.GetFirstName] has vowed to plant more groves throughout [ROOT.GetCountry.GetName]."  #<[ROOT.GetCountry.GetRuler.GetName] kann wirklich verstehen, warum die #E Hellenen#! ihre Oliven @olive lieben! so sehr wie sie es tun. Diese herzhafte Frucht kann nicht nur in wertvolles Öl @earthware! verwandelt werden, sondern die Olive selbst macht einen Großteil unserer täglichen Mahlzeiten aus – ein schnelles [ROOT.GetCountry.GetAdjective]-Frühstück umfasst eine Handvoll Oliven, ein Stück Brot, vielleicht ein oder zwei Datteln, und alles wird mit Wein heruntergespült.\n\nIm Bewusstsein, dass wir immer eine Verwendung für Oliven finden, hat [ROOT.GetCountry.GetRuler.GetFirstName] geschworen, im Laufe von [ROOT.GetCountry.GetName] weitere Haine zu pflanzen.>  #NT!
 me_parthia.139.a: "We lack olives and this shall be rectified"  #<Es mangelt uns an Oliven und das soll behoben werden>  #NT!
  
 me_parthia.140.t: "Prospecting In Zagros"  #<Prospektion in Zagros>  #NT!
 me_parthia.140.desc: "Summoned by the will of the imposing [ROOT.GetCountry.GetRuler.GetName], a large party of adventurers have gathered in the central plaza at [ROOT.GetCountry.GetCapital.GetName]. These intrepid explorers have been tasked with the tricky task of surveying the #E Zagros Mountains#! in hopes of discovering valuable sources of minerals, and although our men definitely have their work cut out for them, there is a sense of excitement that is palpable in the air.\n\nThere are reports that some local tribes might be hostile to our expedition, so in addition to the engineers, architects, translators and guides that have gathered, a cohort of [ROOT.GetCountry.GetAdjective] warriors will accompany the men on their journey."  #<Durch den Willen des imposanten [ROOT.GetCountry.GetRuler.GetName] gerufen, hat sich eine große Gruppe von Abenteurern auf dem zentralen Platz bei [ROOT.GetCountry.GetCapital.GetName] versammelt. Diese unerschrockenen Entdecker wurden mit der kniffligen Aufgabe beauftragt, das #E Zagros-Gebirge#! zu untersuchen, in der Hoffnung, wertvolle Mineralienquellen zu entdecken, und obwohl unsere Männer definitiv viel Arbeit vor sich haben, liegt eine gewisse Aufregung in der Luft.\n\nEs gibt Berichte, dass einige örtliche Stämme unserer Expedition feindlich gesinnt sein könnten, also zusätzlich zu den Ingenieuren, Architekten, Übersetzern und Führern, die sich versammelt haben, a Eine Kohorte von [ROOT.GetCountry.GetAdjective] Kriegern wird die Männer auf ihrer Reise begleiten.>  #NT!
 me_parthia.140.a: "We're quite literally walking on money - let's dig it out."  #<Wir laufen im wahrsten Sinne des Wortes auf Geld – lasst es uns rausholen.>  #NT!
  
  #Albion-esque travel event chain 
 me_parthia.201.t: "Silk Road - Starting the Journey"  #<Seidenstraße – Beginn der Reise>  #NT!
 me_parthia.201.desc: "A rare opportunity has arisen for [ROOT.GetCountry.GetRuler.GetName], one that promises to be the adventure of a lifetime - the [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName] has been extended an invitation to join a traveling caravan as they depart from [ROOT.GetCountry.GetCapital.GetName] and head east along the #E Silk Road#!.\n\nIt is well known that these foreign countries that we trade with are wealthy beyond imagination, and most of the exotic goods that can be found within [ROOT.GetCountry.GetAdjective] markets have their origins in these mysterious countries that lie beyond where our maps end. Should [ROOT.GetCountry.GetRuler.GetFirstName] take a break from [ROOT.GetCountry.GetRuler.GetHerHis] duties and travel along the trade routes? The trip will be fraught with danger, but will also be exciting."  #<Für [ROOT.GetCountry.GetRuler.GetName] hat sich eine seltene Gelegenheit ergeben, die das Abenteuer ihres Lebens zu werden verspricht – der [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName] wurde eine Einladung ausgesprochen, sich einer reisenden Karawane anzuschließen, die von [ROOT.GetCountry.GetCapital.GetName] abfährt und entlang der #E Seidenstraße#!.\n\nIt nach Osten zieht. Es ist bekannt, dass diese fremden Länder, mit denen wir Handel treiben, unvorstellbar reich sind, und die meisten exotischen Waren, die auf den Märkten von [ROOT.GetCountry.GetAdjective] zu finden sind, haben ihren Ursprünge in diesen mysteriösen Ländern, die jenseits des Endes unserer Karten liegen. Sollte [ROOT.GetCountry.GetRuler.GetFirstName] eine Pause von den Pflichten von [ROOT.GetCountry.GetRuler.GetHerHis] einlegen und auf den Handelsrouten reisen? Die Reise wird voller Gefahren, aber auch spannend sein.>  #NT!
 me_parthia.201.a: "It's in our best interest to see the world"  #<Es liegt in unserem Interesse, die Welt zu sehen>  #NT!
 me_parthia.201.b: "We'd rather take care of domestic issues"  #<Wir kümmern uns lieber um innenpolitische Themen>  #NT!
 me_parthia.201.btt: "The expedition will be #R canceled#!."  #<Die Expedition wird #R abgesagt#!.>  #NT!
  
 me_parthia.202.t: "Silk Road - Journey Structure"  #<Seidenstraße – Reisestruktur>  #NT!
 me_parthia.202.desc: "Ave Imperator; it is time to break the fourth wall a little bit. To make this adventure possible and reasonable, there are some special rules in play during this event chain.\n\nIn order to make each choice feel limited and impactful like a RPG, your travel caravan will have #Y Gold#! @gold! to manage. Your Ruler and [ROOT.GetCountry.GetRuler.GetHerHis] retinue will start with #Y 1000#! @gold!.\n\nIt will be #R impossible#! to gain more gold during your travels and each choice can only be picked once, so be mindful of what you decide to do!\n\nFinally, all of the rewards shown in each option #E will be received only when your travel ends#!.\n\nThe gold left at the end of your travels will be dispersed as donatives for the brave travel companions that made the trip possible, so there won't be anything left to put back in the treasury.\n\n#G Good Luck and Have Fun#!."  #<Ave Imperator; Es ist an der Zeit, die vierte Wand ein wenig zu durchbrechen. Um dieses Abenteuer möglich und sinnvoll zu machen, gelten während dieser Eventkette einige Sonderregeln.\n\nDamit sich jede Auswahl wie bei einem Rollenspiel begrenzt und wirkungsvoll anfühlt, verfügt Ihre Reisekarawane über #Y Gold#! @gold! verwalten. Dein Herrscher und dein Gefolge [ROOT.GetCountry.GetRuler.GetHerHis] beginnen mit #Y 1000#! @gold!.\n\nEs wird #R unmöglich#! sein, während deiner Reise mehr Gold zu gewinnen, und jede Auswahl kann nur einmal getroffen werden. Überlege dir also gut, wofür du dich entscheidest!\n\nSchließlich erhältst du alle in jeder Option #E angezeigten Belohnungen nur auf deiner Reise endet#!.\n\nDas Gold, das am Ende Ihrer Reise übrig bleibt, wird als Spende an die mutigen Reisebegleiter verteilt, die die Reise ermöglicht haben, sodass nichts mehr übrig bleibt, das Sie in die Schatzkammer zurücklegen könnten.\n\n#G Viel Glück und Spaß#!.>  #NT!
 me_parthia.202.a: "Let us see what China has to offer"  #<Lassen Sie uns sehen, was China zu bieten hat>  #NT!
 me_parthia.202.b: "On second thought, maybe I shouldn't"  #<Wenn ich es mir genauer überlege, sollte ich es vielleicht nicht tun>  #NT!
  
 me_parthia.203.t: "Silk Road - attacked by bandits"  #<Seidenstraße – von Banditen angegriffen>  #NT!
 me_parthia.203.desc: "It was late in the day and our caravan had spent many long hours wandering under the merciless sun when the attack took place. Not that being tired and thirsty should have been any excuse for what transpired that afternoon out in the dusty wastelands east of [ROOT.GetCountry.GetCapital.GetName], but [ROOT.GetCountry.GetRuler.GetName] would revisit this fateful moment in [ROOT.GetCountry.GetRuler.GetHerHis] mind time and time again in the days to come.\n\nWhile walking alongside a desolate ravine, our caravan was quickly surrounded by bandits on horseback. The cruel savages were screaming at us in a language none of us could understand, but the bows in their hands told us everything that we needed to know."  #<Es war spät am Tag und unsere Karawane hatte viele Stunden damit verbracht, unter der gnadenlosen Sonne umherzuwandern, als der Angriff stattfand. Nicht, dass Müdigkeit und Durst eine Entschuldigung für das sein sollten, was sich an diesem Nachmittag draußen in der staubigen Einöde östlich von [ROOT.GetCountry.GetCapital.GetName] abspielte, aber [ROOT.GetCountry.GetRuler.GetName] würde diesen schicksalhaften Moment in [ROOT.GetCountry.GetRuler.GetHerHis] in den kommenden Tagen immer wieder in Erinnerung rufen.\n\nAls wir an einer einsamen Schlucht entlang gingen, wurde unsere Karawane schnell von Banditen zu Pferd umzingelt. Die grausamen Wilden schrien uns in einer Sprache an, die keiner von uns verstehen konnte, aber die Bögen in ihren Händen sagten uns alles, was wir wissen mussten.>  #NT!
 me_parthia.203.a: "Pay them off"  #<Zahlen Sie sie aus>  #NT!
 PTH_travel_lose_50: "Our trade delegation will lose #R 50#! @gold!."  #<Unsere Handelsdelegation wird #R 50#! @gold verlieren!.>  #NT!
 PTH_travel_lose_100: "Our trade delegation will lose #R 100#! @gold!."  #<Unsere Handelsdelegation wird #R 100#! @gold verlieren!.>  #NT!
 PTH_travel_lose_150: "Our trade delegation will lose #R 150#! @gold!."  #<Unsere Handelsdelegation wird #R 150#! @gold verlieren!.>  #NT!
 PTH_travel_lose_200: "Our trade delegation will lose #R 200#! @gold!."  #<Unsere Handelsdelegation wird #R 200#! @gold verlieren!.>  #NT!
 PTH_travel_lose_250: "Our trade delegation will lose #R 250#! @gold!."  #<Unsere Handelsdelegation wird #R 250#! @gold verlieren!.>  #NT!
 me_parthia.203.b: "We'd rather fight!"  #<Wir kämpfen lieber!>  #NT!
  
 me_parthia.2031.t: "Attacked by bandits - Great Battle"  #<Von Banditen angegriffen – Große Schlacht>  #NT!
 me_parthia.2031.desc: "The stories told of the battle that took place would be remembered for centuries to come, and young rulers of [ROOT.GetCountry.GetName] would grow up hearing the tale of the brave [ROOT.GetCountry.GetRuler.GetName] fighting against the bandits.\n\nIt is said that the [ROOT.GetCountry.GetRulerTitle] personally killed the leader of the bandits in hand-to-hand combat, causing the raiders to panic in disorganized chaos once they saw [ROOT.GetCountry.GetRuler.GetFirstName] standing triumphant over the headless corpse of their master. Our warriors quickly finished off the remaining stragglers and the caravan continued onward."  #<Die Geschichten, die über die Schlacht erzählt wurden, blieben noch Jahrhunderte lang im Gedächtnis, und junge Herrscher von [ROOT.GetCountry.GetName] wuchsen mit der Geschichte des tapferen [ROOT.GetCountry.GetRuler.GetName] auf, der gegen die Banditen kämpfte.\n\nEs heißt, dass die [ROOT.GetCountry.GetRulerTitle] den Anführer der Banditen im Nahkampf persönlich töteten, was die Plünderer in Panik versetzte, als sie [ROOT.GetCountry.GetRuler.GetFirstName] triumphierend über ihrer kopflosen Leiche stehen sahen Meister. Unsere Krieger erledigten schnell die verbliebenen Nachzügler und die Karawane zog weiter.>  #NT!
 me_parthia.2031.a: "Our valor is legendary!"  #<Unser Mut ist legendär!>  #NT!
 me_parthia.2032.t: "Attacked by bandits - they backed off"  #<Von Banditen angegriffen – sie zogen sich zurück>  #NT!
 me_parthia.2032.desc: "Although the bandits had surprised us, this did not give them any advantages in the battle that followed - the well-trained soldiers of [ROOT.GetCountry.GetRuler.GetName] tore through their numbers with a savage fury that left them reeling and disorganized. No one in the carvan perished, praise be to the gods, and the party was able to move onward."  #<Obwohl die Banditen uns überrascht hatten, verschaffte ihnen dies in der folgenden Schlacht keine Vorteile – die gut ausgebildeten Soldaten von [ROOT.GetCountry.GetRuler.GetName] zerrissen ihre Zahl mit einer wilden Wut, die sie ins Wanken brachte und desorganisierte. Niemand in der Karawane kam ums Leben, Lob sei den Göttern, und die Gruppe konnte weiterziehen.>  #NT!
 me_parthia.2032.a: "This was the only logical outcome for them"  #<Das war für sie das einzig logische Ergebnis>  #NT!
 me_parthia.2033.t: "Attacked by bandits - nothing grave"  #<Von Banditen angegriffen – nichts Schlimmes>  #NT!
 me_parthia.2033.desc: "The battle that ensued between our Parthian warriors and the bandits was bloodier than it needed to be; the lethal results of us being taken by surprise. What was worse for [ROOT.GetCountry.GetRuler.GetName] was that these bandits were no mere rabble used to terrorizing the local farmers, but experienced warriors that fought with determination and tactics. Too many of our brethren fell to their arrows and some members of our caravan, mostly women, were dragged away as captives, but we were eventually able to send the bandits away after killing a few of them."  #<Der darauf folgende Kampf zwischen unseren parthischen Kriegern und den Banditen war blutiger als nötig; die tödlichen Folgen, wenn wir überrascht werden. Was für [ROOT.GetCountry.GetRuler.GetName] noch schlimmer war, war, dass es sich bei diesen Banditen nicht um bloßen Pöbel handelte, der es gewohnt war, die örtlichen Bauern zu terrorisieren, sondern um erfahrene Krieger, die mit Entschlossenheit und Taktik kämpften. Zu viele unserer Brüder fielen ihren Pfeilen zum Opfer und einige Mitglieder unserer Karawane, hauptsächlich Frauen, wurden als Gefangene weggeschleppt, aber wir konnten die Banditen schließlich wegschicken, nachdem wir einige von ihnen getötet hatten.>  #NT!
 me_parthia.2033.a: "...yeah, that's a setback."  #<...ja, das ist ein Rückschlag.>  #NT!
  
 PTH_travel_another_city: "#Y We will leave for another city.#!"  #<#Y Wir werden in eine andere Stadt aufbrechen.#!>  #NT!
 me_parthia.204.t: "Silk Road - Samarkand"  #<Seidenstraße - Samarkand>  #NT!
 me_parthia.204.desc: "After weeks of traveling through dry hills, the towering walls of [GetProvince('(int32)6682').GetName] were a welcome sight to [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] traveling companions. The promise of a hot bath and a warm meal urged their tired legs forward, and they were inside the city's expansive fortifications before midday.\n\nThe excitement of being in the fabled city of Samarkand gave [ROOT.GetCountry.GetRuler.GetFirstName] a second wind once the caravan's overnight lodgings had been secured, and the bustling cackle of the city's active streets called the [ROOT.GetCountry.GetRulerTitle] out from the quiet calm of the small tavern that [ROOT.GetCountry.GetRuler.GetSheHe] was staying in and back out into its bright and loud chaos."  #<Nach wochenlanger Reise durch trockene Hügel waren die hohen Mauern von [GetProvince('(int32)6682').GetName] ein willkommener Anblick für die Reisegefährten [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis]. Die Aussicht auf ein heißes Bad und eine warme Mahlzeit trieb ihre müden Beine nach vorne, und noch vor Mittag befanden sie sich in den weitläufigen Befestigungsanlagen der Stadt.\n\nDie Aufregung, in der sagenumwobenen Stadt Samarkand zu sein, gab [ROOT.GetCountry.GetRuler.GetFirstName] einen zweiten Wind, als die Übernachtungsmöglichkeiten der Karawane gesichert waren, und das geschäftige Gegacker der belebten Straßen der Stadt rief die [ROOT.GetCountry.GetRulerTitle] aus der stillen Stille der kleinen Taverne hervor [ROOT.GetCountry.GetRuler.GetSheHe] blieb drinnen und wieder draußen in seinem hellen und lauten Chaos.>  #NT!
 me_parthia.204.a: "I have money to spend! Let's see these famous markets"  #<Ich habe Geld zum Ausgeben! Schauen wir uns diese berühmten Märkte an>  #NT!
 me_parthia.204.b: "Let's go for a walk with no real destination in mind"  #<Machen wir einen Spaziergang, ohne ein konkretes Ziel vor Augen>  #NT!
 me_parthia.204.c: "We should take the time to become familiar with our neighborhood"  #<Wir sollten uns die Zeit nehmen, uns mit unserer Nachbarschaft vertraut zu machen>  #NT!
 me_parthia.204.d: "It is time to get back on the road"  #<Es ist Zeit, wieder auf die Straße zu gehen>  #NT!
  
 me_parthia.2041.t: "Silk Road - Samarkand Market"  #<Seidenstraße - Samarkand-Markt>  #NT!
 me_parthia.2041.desc: "If [ROOT.GetCountry.GetRuler.GetName] was surprised by the size of the slave markets in [GetProvince('(int32)6682').GetName], [ROOT.GetCountry.GetRuler.GetSheHe] did not confide this to anyone, but even the [ROOT.GetCountry.GetRulerTitle] must have been surprised by the sheer numbers of enslaved peoples available for sale.\n\nThe amount of captives available for purchase ensured that prices were very low, and [ROOT.GetCountry.GetRuler.GetFirstName] quickly realized that there was the bargain of a lifetime sitting in front of [ROOT.GetCountry.GetRuler.GetHerHis] face.\n\nBut there were other, equally valuable, uses of money; we could spend the time and effort to meet some of the local merchants, and by doing so, we could establish valuable #E Bactrian trading connections#! for back home. And Samarkand, being known far and wide as one of the preeminent cities of [GetProvince('(int32)6682').GetArea.GetName], has attracted many bright minds, such as famous philosophers, mathematicians and architects. [ROOT.GetCountry.GetRuler.GetFirstName] could spend the gold and hire some of these teachers, which would result in us gaining an innovation."  #<Während [ROOT.GetCountry.GetRuler.GetName] von der Größe der Sklavenmärkte in [GetProvince('(int32)6682').GetName] überrascht war, vertraute [ROOT.GetCountry.GetRuler.GetSheHe] dies niemandem an, aber selbst [ROOT.GetCountry.GetRulerTitle] muss von der schieren Zahl der zum Verkauf angebotenen versklavten Völker überrascht gewesen sein.\n\nDie Menge der zum Kauf verfügbaren Gefangenen sorgte dafür, dass die Preise sehr niedrig waren, und [ROOT.GetCountry.GetRuler.GetFirstName] erkannte schnell, dass vor [ROOT.GetCountry.GetRuler.GetHerHis] das Schnäppchen seines Lebens lag Gesicht.\n\nAber es gab andere, ebenso wertvolle Verwendungszwecke von Geld; Wir könnten die Zeit und Mühe aufwenden, einige der örtlichen Händler zu treffen, und auf diese Weise könnten wir wertvolle #E baktrische Handelsbeziehungen#! für zu Hause knüpfen. Und Samarkand, das weithin als eine der herausragenden Städte von [GetProvince('(int32)6682').GetArea.GetName] bekannt ist, hat viele kluge Köpfe angezogen, darunter berühmte Philosophen, Mathematiker und Architekten. [ROOT.GetCountry.GetRuler.GetFirstName] könnte das Gold ausgeben und einige dieser Lehrer einstellen, was dazu führen würde, dass wir eine Innovation gewinnen.>  #NT!
 me_parthia.2041.a: "Buy local slaves"  #<Kaufen Sie lokale Sklaven>  #NT!
 PTH_15_slaves: "We will buy #T 15 Slave Pops#! @slaves!of local culture."  #<Wir werden #T 15 Slave Pops#! @slaves!der lokalen Kultur kaufen.>  #NT!
 me_parthia.2041.b: "Buy goods to resell at home"  #<Kaufen Sie Waren, um sie zu Hause weiterzuverkaufen>  #NT!
 me_parthia.2041.c: "Locals have unique knowledge that we must learn"  #<Die Einheimischen verfügen über einzigartiges Wissen, das wir lernen müssen>  #NT!
 me_parthia.2041.d: "My bartering here is done"  #<Mein Tauschhandel hier ist beendet>  #NT!
  
 me_parthia.2042.t: "Silk Road - Seeing Samarkand"  #<Seidenstraße – Samarkand sehen>  #NT!
 me_parthia.2042.desc: "'Nikolaos...Heliodoros...Protarchos...Ptolemaios...'\n\nIt was while wandering through the streets of [GetProvince('(int32)6682').GetName] that [ROOT.GetCountry.GetRuler.GetName] beheld a curious sight; the withered frame of a very old man, wearing a rusted #E Hellenic#! cuirass and wearing a broken helmet, was sitting in the market square and reciting a list of #E Greek#! names.\n\nCaptivated by the sound, [ROOT.GetCountry.GetRuler.GetFirstName] walked up to the man and asked him to explain himself, receiving the following in reply.\n\n'I was soldier, my Lord, that marched from [GetProvince('(int32)379').GetName] to [GetProvince('(int32)185').GetName], although there are few still living that know the meaning of those words.' Rising to his feet with a painful groan, the old man bowed slightly and met the gaze of the [ROOT.GetCountry.GetAdjective] Ruler. 'There is much that I have seen, my Lord, and much that I know. I gave my life to the spear and spent ten campaigning seasons in the field, and what have I to show for it? Only battle stories and memories of a world that doesn't exist anymore.' Giving a deep sigh, the old man slumped back down to the ground. 'Perhaps you would like to hear a story?'"  #<'Nikolaos...Heliodoros...Protarchos...Ptolemaios...'\n\nAls [ROOT.GetCountry.GetRuler.GetName] durch die Straßen von [GetProvince('(int32)6682').GetName] wanderte, erblickte er einen seltsamen Anblick; Der verwelkte Körper eines sehr alten Mannes, der einen verrosteten #E hellenischen#! Kürass und einen kaputten Helm trug, saß auf dem Marktplatz und rezitierte eine Liste von #E griechischen#! Namen.\n\nGefesselt von dem Klang ging [ROOT.GetCountry.GetRuler.GetFirstName] auf den Mann zu und bat ihn, sich zu erklären, worauf er als Antwort Folgendes erhielt.\n\n'Ich war Soldat, mein Herr, der von hier marschierte [GetProvince('(int32)379').GetName] bis [GetProvince('(int32)185').GetName], obwohl es nur noch wenige Lebende gibt, die die Bedeutung dieser Wörter kennen.' Mit einem schmerzhaften Stöhnen erhob sich der alte Mann, verneigte sich leicht und begegnete dem Blick des [ROOT.GetCountry.GetAdjective]-Herrschers. „Es gibt viel, was ich gesehen habe, mein Herr, und vieles, was ich weiß.“ Ich habe mein Leben dem Speer gewidmet und zehn Wahlkampfsaisons im Feld verbracht, und was kann ich dafür vorweisen? „Nur Kampfgeschichten und Erinnerungen an eine Welt, die nicht mehr existiert.“ Mit einem tiefen Seufzer ließ sich der alte Mann wieder zu Boden fallen. „Vielleicht möchten Sie eine Geschichte hören?“>  #NT!
 me_parthia.2042.a: "Tell me the greatest lesson you learned on the battlefield"  #<Erzähl mir die größte Lektion, die du auf dem Schlachtfeld gelernt hast>  #NT!
 me_parthia.2042.b: "I will give you the wealth of kings if you teach my armies"  #<Ich werde dir den Reichtum der Könige geben, wenn du meine Armeen lehrst>  #NT!
  
 me_parthia.2043.t: "Silk Road - Samarkand Area"  #<Seidenstraße – Raum Samarkand>  #NT!
 me_parthia.2043.desc: "Leaving the hustle and bustle of [GetProvince('(int32)6682').GetName]'s main district came as a welcome relief after a few hours spent wandering through its busiest quarters - finally, an end to the ceaseless hawking of merchants and purveyors of goods! [ROOT.GetCountry.GetRuler.GetName] spent a few idle hours walking through sleepy residential districts on the outskirts of town, passing outside of the city's gates and taking a leisurely stroll through the settlements built outside of its gates. There were many ramshackle huts built against the fortifications, and the sound of children playing in the cramped alleys echoed along the stone walls.\n\nThe local inhabitants took advantage of every opportunity they had available to them, and the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] was impressed to see the many small gardens planted alongside the small creeks and streams that ran through the countryside. Herbs and melons were proudly grown in front of people's houses, and small stalls sold fresh produce to anyone passing through."  #<Nach ein paar Stunden, die man damit verbracht hatte, durch die belebtesten Viertel zu schlendern, war es eine willkommene Erleichterung, die Hektik des Hauptviertels von [GetProvince('(int32)6682').GetName] hinter sich zu lassen – endlich ein Ende mit dem unaufhörlichen Feilschen von Händlern und Warenlieferanten! [ROOT.GetCountry.GetRuler.GetName] verbrachte ein paar müßige Stunden damit, durch verschlafene Wohnviertel am Rande der Stadt zu schlendern, an den Toren der Stadt vorbeizugehen und einen gemütlichen Spaziergang durch die vor ihren Toren errichteten Siedlungen zu machen. An die Befestigungsanlagen waren viele baufällige Hütten gebaut, und das Geräusch der spielenden Kinder in den engen Gassen hallte von den Steinmauern wider.\n\nDie Einheimischen nutzten jede Gelegenheit, die sich ihnen bot, und der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] war beeindruckt, als er sah, wie viele kleine Gärten entlang der kleinen Bäche und Bäche angelegt wurden, die durch die Landschaft flossen. Vor den Häusern der Menschen wurden stolz Kräuter und Melonen angebaut und an kleinen Ständen wurden frische Produkte an alle verkauft, die vorbeikamen.>  #NT!
 me_parthia.2043.a: "The agriculture here seems well-developed - what can I learn?"  #<Die Landwirtschaft scheint hier gut entwickelt zu sein – was kann ich lernen?>  #NT!
 me_parthia.2043.b: "Hire a guide and go see the ruins of the #E Sogdian Rock#!"  #<Mieten Sie einen Führer und besichtigen Sie die Ruinen des #E Sogdischen Felsens#!>  #NT!
 me_parthia.2043.c: "Head back to the city"  #<Gehen Sie zurück in die Stadt>  #NT!
  
 PTH_travel_unlock_bactrian_tradition_tool: "We will unlock #Y Bactrian Military Traditions#!."  #<Wir werden #Y baktrische Militärtraditionen#!. freischalten>  #NT!
 PTH_travel_unlock_bactrian_tradition_tt: "We have unlocked #Y Bactrian Military Traditions#!."  #<Wir haben #Y baktrische Militärtraditionen#!. freigeschaltet>  #NT!
  
 me_parthia.205.t: "Silk Road - Tarim Basin"  #<Seidenstraße – Tarim-Becken>  #NT!
 me_parthia.205.desc: "[ROOT.GetCountry.GetRuler.GetName], someone that had traveled across the vast steppes and the endless deserts, was taken aback by the sheer beauty of the #E Tarim Basin#! once the Parthian caravan had finally left the treacherous #E Ferghanan Mountains#!. Truth be told, [ROOT.GetCountry.GetRuler.GetFirstName] could have spent weeks wandering through the Basin, for [ROOT.GetCountry.GetRuler.GetSheHe] was absolutely captivated by its rugged terrain, and took great pleasure in visiting the local cities. Chief among these was [GetProvince('(int32)7184').GetName], and the [ROOT.GetCountry.GetRulerTitle] wasted no time in hiring a local guide once [ROOT.GetCountry.GetRuler.GetSheHe] had entered the city's gates."  #<[ROOT.GetCountry.GetRuler.GetName], jemand, der durch die weiten Steppen und endlosen Wüsten gereist war, war überwältigt von der Schönheit des #E Tarim-Beckens#!, als die Partherkarawane endlich das tückische #E Ferghanan-Gebirge#! verlassen hatte. Um ehrlich zu sein, hätte [ROOT.GetCountry.GetRuler.GetFirstName] Wochen damit verbringen können, durch das Becken zu wandern, denn [ROOT.GetCountry.GetRuler.GetSheHe] war von dem rauen Gelände absolut fasziniert und hatte große Freude daran, die örtlichen Städte zu besuchen. Der wichtigste unter ihnen war [GetProvince('(int32)7184').GetName], und der [ROOT.GetCountry.GetRulerTitle] verschwendete keine Zeit und engagierte einen lokalen Führer, nachdem [ROOT.GetCountry.GetRuler.GetSheHe] die Tore der Stadt betreten hatte.>  #NT!
 me_parthia.205.a: "Go straight to the markets"  #<Gehen Sie direkt zu den Märkten>  #NT!
 me_parthia.205.b: "Let's wander around town and see what we can"  #<Lass uns durch die Stadt schlendern und sehen, was wir können>  #NT!
 me_parthia.205.c: "There are famous wise men here that I must seek out"  #<Hier gibt es berühmte weise Männer, die ich aufsuchen muss>  #NT!
 me_parthia.205.d: "Let's get back on the road"  #<Machen wir uns wieder auf den Weg>  #NT!
  
 me_parthia.2051.t: "Silk Road - Tarim Market"  #<Seidenstraße – Tarim-Markt>  #NT!
 me_parthia.2051.desc: "The marketplace at [GetProvince('(int32)7184').GetName] was no less busy than the one in [GetProvince('(int32)6682').GetName], and [ROOT.GetCountry.GetRuler.GetName] was tempted to stop at dozens of stalls as [ROOT.GetCountry.GetRuler.GetSheHe] followed the guide through the twisting and winding streets.\n\nA thousand smells and sounds assaulted all senses. Heavy wool tunics, water-resistant cloaks, silk shawls, brightly-dyed fabrics, magnificent carpets, leather shoes and caps - every sort of textile imaginable could be found within the hundreds of stalls that crowded its avenues. Loaves of freshly baked bread were available at every street corner, sprinkled with sesame seeds, fresh honey and cheese, and slaves with wine walked through the busy squares, offering a refreshing drink to anyone with a small copper coin. Pack animals crowded roads that were filled with dung and pools of stagnant water, and the steady droning of flies blended pleasantly alongside the sound of a distant flute playing a slow melody."  #<Der Marktplatz in [GetProvince('(int32)7184').GetName] war nicht weniger belebt als der in [GetProvince('(int32)6682').GetName], und [ROOT.GetCountry.GetRuler.GetName] war versucht, an Dutzenden von Ständen anzuhalten, während [ROOT.GetCountry.GetRuler.GetSheHe] dem Führer durch die verwinkelten und verwinkelten Straßen folgte.\n\nTausend Gerüche und Geräusche griffen alle Sinne an. Schwere Wolltuniken, wasserabweisende Umhänge, Seidenschals, bunt gefärbte Stoffe, prächtige Teppiche, Lederschuhe und Mützen – jede Art von Textilien, die man sich vorstellen kann, war in den Hunderten von Ständen zu finden, die die Alleen füllten. An jeder Straßenecke gab es frisch gebackene Brote, bestreut mit Sesamkörnern, frischem Honig und Käse, und Sklaven gingen mit Wein über die belebten Plätze und boten jedem, der eine kleine Kupfermünze besaß, ein erfrischendes Getränk an. Lasttiere drängten sich auf Straßen, die mit Mist und Pfützen mit stehendem Wasser gefüllt waren, und das stetige Summen der Fliegen vermischte sich angenehm mit dem Klang einer entfernten Flöte, die eine langsame Melodie spielte.>  #NT!
 me_parthia.2051.a: "Go to the slave markets at once"  #<Gehen Sie sofort zu den Sklavenmärkten>  #NT!
 me_parthia.2051.b: "The people here have very unique clothes...shall we buy some?"  #<Die Leute hier haben sehr einzigartige Kleidung ... sollen wir welche kaufen?>  #NT!
 me_parthia.2051.c: "Find their wisest men to instruct us in their ways"  #<Finden Sie ihre weisesten Männer, die uns ihre Wege zeigen>  #NT!
 me_parthia.2051.d: "My bartering here is done"  #<Mein Tauschhandel hier ist beendet>  #NT!
  
 me_parthia.2052.t: "Silk Road - Tarim Area"  #<Seidenstraße – Tarim-Gebiet>  #NT!
 me_parthia.2052.desc: "Our traveling party quickly learned that there were all sorts of talents living within [GetProvince('(int32)7184').GetName], and procuring the services of the locals would not be prohibivitely expensive. There were religious shamans that were able to enter deep trances and commune with the spirits of the sky that offered their services for sale, as well as experienced travelers that promised to assist our merchants when they traveled through the arid wastelands of the #E Tarim Basin#!. If [ROOT.GetCountry.GetRuler.GetFirstName] had the coin to spare, then many valuable resources for [ROOT.GetCountry.GetName] were available for the taking."  #<Unsere Reisegruppe stellte schnell fest, dass in [GetProvince('(int32)7184').GetName] alle möglichen Talente lebten und es nicht übermäßig teuer sein würde, die Dienste der Einheimischen in Anspruch zu nehmen. Es gab religiöse Schamanen, die in tiefe Trancen verfallen und mit den Geistern des Himmels kommunizieren konnten, die ihre Dienste zum Verkauf anboten, sowie erfahrene Reisende, die versprachen, unseren Händlern zu helfen, wenn sie durch die trockenen Ödlande des #E Tarim-Beckens#!. reisten. Wenn [ROOT.GetCountry.GetRuler.GetFirstName] die nötige Münze übrig hatte, dann standen viele wertvolle Ressourcen für [ROOT.GetCountry.GetName] zur Verfügung.>  #NT!
 me_parthia.2052.a: "Get philosophical insights from the locals"  #<Erhalten Sie philosophische Einblicke von den Einheimischen>  #NT!
 me_parthia.2052.b: "Learn logistical optimizations for traveling through the Basin"  #<Erfahren Sie logistische Optimierungen für Reisen durch das Becken>  #NT!
 me_parthia.2052.c: "Head back to the city"  #<Gehen Sie zurück in die Stadt>  #NT!
  
 me_parthia.2053.t: "Silk Road - Tarim Seer"  #<Seidenstraße – Tarim-Seher>  #NT!
 me_parthia.2053.desc: "[ROOT.GetCountry.GetRuler.GetName] had heard stories of the shamans and seers of [GetProvince('(int32)7184').GetName] that gave spontaneous sermons in its marketplaces and squares, and the [ROOT.GetCountry.GetRulerTitle] was secretly hoping to witness such an event for [ROOT.GetCountry.GetRuler.GetHerHim]self; a dream that came to pass once the Parthian travelers entered the religious district downtown. There, standing before a crowd of hundreds, a wise man was giving a lecture on the nature of time."  #<[ROOT.GetCountry.GetRuler.GetName] hatte Geschichten über die Schamanen und Seher von [GetProvince('(int32)7184').GetName] gehört, die auf seinen Marktplätzen und Plätzen spontane Predigten hielten, und die [ROOT.GetCountry.GetRulerTitle] hofften insgeheim, selbst Zeuge eines solchen Ereignisses zu werden; Ein Traum, der wahr wurde, als die parthischen Reisenden das religiöse Viertel in der Innenstadt betraten. Dort hielt ein weiser Mann vor Hunderten von Menschen einen Vortrag über die Natur der Zeit.>  #NT!
 me_parthia.2053.a: "No need to engage with superstitions"  #<Keine Notwendigkeit, sich auf Aberglauben einzulassen>  #NT!
 me_parthia.2053.b: "Hire this man to write down his theories for posterity"  #<Beauftragen Sie diesen Mann, seine Theorien für die Nachwelt niederzuschreiben>  #NT!
  
 me_parthia.2056.t: "Silk Road - Conqueror's Destiny"  #<Seidenstraße – Das Schicksal des Eroberers>  #NT!
 me_parthia.2056.desc: "While walking through the busy streets of [GetProvince('(int32)7184').GetName], [ROOT.GetCountry.GetRuler.GetName] happened to hear about a local warrior, a man known across the world for his skill at leading armies into battle, that had given up the life of a soldier and had retired to a quiet life in the neighborhood.\n\nInquiries on behalf of [ROOT.GetCountry.GetName] were made, and the [ROOT.GetCountry.GetRulerTitle] was pleased to hear that this warrior would move to [ROOT.GetCountry.GetCapital.GetName] and teach our soldiers everything that he had learned during his long lifetime."  #<Als [ROOT.GetCountry.GetRuler.GetName] durch die belebten Straßen von [GetProvince('(int32)7184').GetName] ging, hörte er zufällig von einem örtlichen Krieger, einem Mann, der auf der ganzen Welt für seine Fähigkeit, Armeen in die Schlacht zu führen, bekannt ist, der das Leben eines Soldaten aufgegeben und sich in ein ruhiges Leben in der Nachbarschaft zurückgezogen hatte.\n\nEs wurden Anfragen im Namen von [ROOT.GetCountry.GetName] gestellt, und der [ROOT.GetCountry.GetRulerTitle] war erfreut zu hören, dass dieser Krieger nach [ROOT.GetCountry.GetCapital.GetName] ziehen und unseren Soldaten alles beibringen würde, was er dabei gelernt hatte sein langes Leben.>  #NT!
 me_parthia.2056.a: "[ROOT.GetCountry.GetRuler.GetName] will lead us to victory!"  #<[ROOT.GetCountry.GetRuler.GetName] wird uns zum Sieg führen!>  #NT!
  
 me_parthia.2057.t: "Silk Road - Builder's Destiny"  #<Seidenstraße – Schicksal des Erbauers>  #NT!
 me_parthia.2057.desc: "While walking through the busy streets of [GetProvince('(int32)7184').GetName], [ROOT.GetCountry.GetRuler.GetName] happened to stumble upon a lecture that was being given by a famous architect, a man known across the world for his skill at restoring temples.\n\nQuiet inquiries were made, and the [ROOT.GetCountry.GetRulerTitle] was pleased to hear that this builder would move to [ROOT.GetCountry.GetCapital.GetName] and teach our kinsmen everything that he had learned during his long lifetime."  #<Als [ROOT.GetCountry.GetRuler.GetName] durch die belebten Straßen von [GetProvince('(int32)7184').GetName] ging, stolperte [ROOT.GetCountry.GetRuler.GetName] zufällig über einen Vortrag, den ein berühmter Architekt hielt, ein Mann, der auf der ganzen Welt für seine Fähigkeiten bei der Restaurierung von Tempeln bekannt ist.\n\nEs wurden stille Nachforschungen angestellt, und [ROOT.GetCountry.GetRulerTitle] war erfreut zu hören, dass dieser Baumeister nach [ROOT.GetCountry.GetCapital.GetName] ziehen und unseren Verwandten alles beibringen würde, was er im Laufe seines langen Lebens gelernt hatte.>  #NT!
 me_parthia.2057.a: "[ROOT.GetCountry.GetRuler.GetName] will lead us to prosperity!"  #<[ROOT.GetCountry.GetRuler.GetName] wird uns zum Wohlstand führen!>  #NT!
  
 me_parthia.2058.t: "Silk Road - Diplomat's Destiny"  #<Seidenstraße – Das Schicksal des Diplomaten>  #NT!
 me_parthia.2058.desc: "While stopping for a quiet drink during [ROOT.GetCountry.GetRuler.GetHerHis] walk through [GetProvince('(int32)7184').GetName], [ROOT.GetCountry.GetRuler.GetName] happened to overhear a lecture that was being given by a famous diplomat, a man known across the world for his many years as a successful governor and magistrate.\n\nQuiet inquiries were made, and the [ROOT.GetCountry.GetRulerTitle] was pleased to hear that this retired advisor would move to [ROOT.GetCountry.GetCapital.GetName] and teach our kinsmen everything that he had learned during his long lifetime."  #<Als [ROOT.GetCountry.GetRuler.GetHerHis] während des Spaziergangs durch [GetProvince('(int32)7184').GetName] für einen ruhigen Drink anhielt, hörte [ROOT.GetCountry.GetRuler.GetName] zufällig einen Vortrag eines berühmten Diplomaten, eines Mannes, der auf der ganzen Welt für seine vielen Jahre als erfolgreicher Gouverneur und Richter bekannt war.\n\nEs wurden stille Nachforschungen angestellt, und der [ROOT.GetCountry.GetRulerTitle] war erfreut zu hören, dass dieser pensionierte Berater nach [ROOT.GetCountry.GetCapital.GetName] ziehen und unseren Verwandten alles beibringen würde, was er im Laufe seines langen Lebens gelernt hatte.>  #NT!
 me_parthia.2058.a: "[ROOT.GetCountry.GetRuler.GetFirstName] will lead us to peace!"  #<[ROOT.GetCountry.GetRuler.GetFirstName] wird uns zum Frieden führen!>  #NT!
  
 me_parthia.206.t: "Silk Road - Entering China"  #<Seidenstraße – Einreise nach China>  #NT!
 me_parthia.206.desc_1: "As the Parthian caravan ventured on eastward, heading into realms that had never before been visited by one from [ROOT.GetCountry.GetRuler.GetHerHis] tribe, [ROOT.GetCountry.GetRuler.GetName] passed the hours by listening to stories from the local interpreters.\n\nThe tales they shared were grim. The powerful and wealthy lands to the east were struggling against each other for supremacy and none had yet triumphed over the other, and war and misery were widespread in the places that we would be visiting. The land before us was divided between various warlords, and prices could wildly fluctuate from one territory to the next - we should be ready for anything that comes our way."  #<Während sich die parthische Karawane weiter nach Osten wagte und in Gebiete vordrang, die noch nie zuvor von einem Stamm [ROOT.GetCountry.GetRuler.GetHerHis] besucht worden waren, verbrachte [ROOT.GetCountry.GetRuler.GetName] die Stunden damit, den Geschichten der örtlichen Dolmetscher zu lauschen.\n\nDie Geschichten, die sie erzählten, waren düster. Die mächtigen und wohlhabenden Länder im Osten kämpften gegeneinander um die Vorherrschaft, und noch hatte keines über das andere gesiegt, und an den Orten, die wir besuchen würden, herrschten Krieg und Elend. Das Land vor uns war zwischen verschiedenen Kriegsherren aufgeteilt und die Preise konnten von einem Gebiet zum nächsten stark schwanken – wir sollten auf alles vorbereitet sein, was auf uns zukommt.>  #NT!
 me_parthia.206.desc_2: "As the Parthian caravan ventured on eastward, heading into realms that had never before been visited by one from [ROOT.GetCountry.GetRuler.GetHerHis] tribe, [ROOT.GetCountry.GetRuler.GetName] passed the hours by listening to stories from the local interpreters.\n\nAfter many years of battle and devastating warfare, the so-called #E 'Qin Dynasty'#! had brought peace to a land that had been wrecked by decades of violence. Their new #E Emperor#!, a paranoid man that supposedly traveled from one city to the next every day, never sleeping in the same bed twice, was energetically reforming the government and doing what he could to permanently establish his family as the ruling class."  #<Während sich die parthische Karawane weiter nach Osten wagte und in Gebiete vordrang, die noch nie zuvor von einem Stamm [ROOT.GetCountry.GetRuler.GetHerHis] besucht worden waren, verbrachte [ROOT.GetCountry.GetRuler.GetName] die Stunden damit, den Geschichten der örtlichen Dolmetscher zu lauschen.\n\nNach vielen Jahren voller Kämpfe und verheerender Kriege hatte die sogenannte #E „Qin-Dynastie“#! Frieden in ein Land gebracht, das durch jahrzehntelange Gewalt zerstört worden war. Ihr neuer #E Kaiser#!, ein paranoider Mann, der angeblich jeden Tag von einer Stadt zur nächsten reiste und nie zweimal im selben Bett schlief, reformierte energisch die Regierung und tat, was er konnte, um seine Familie dauerhaft als herrschende Klasse zu etablieren.>  #NT!
 me_parthia.206.desc_3: "As the Parthian caravan ventured on eastward, heading into realms that had never before been visited by one from [ROOT.GetCountry.GetRuler.GetHerHis] tribe, [ROOT.GetCountry.GetRuler.GetName] passed the hours by listening to stories from the local interpreters.\n\nWhile there were many ruinous wars and devastating sieges that brought misery, famine and plague to the countryside, a permanent peace was won by the #E 'Han Dynasty'#!, who now rule unopposed over a vast territory that rivals the size of the greatest empires known to our people. Their #E Emperor#! is said to be the wisest and most powerful monarch alive, with untold wealth and riches at his disposal."  #<Während sich die parthische Karawane weiter nach Osten wagte und in Gebiete vordrang, die noch nie zuvor von einem Stamm des [ROOT.GetCountry.GetRuler.GetHerHis] besucht worden waren, verbrachte [ROOT.GetCountry.GetRuler.GetName] die Stunden damit, den Geschichten der örtlichen Dolmetscher zu lauschen.\n\nWährend es viele verheerende Kriege und verheerende Belagerungen gab, die Elend, Hungersnot und Seuchen über das Land brachten, gewann die #E „Han-Dynastie“#!,, die jetzt lebt, einen dauerhaften Frieden herrschen ungehindert über ein riesiges Territorium, das mit der Größe der größten Reiche, die unser Volk kennt, mithalten kann. Ihr #E Kaiser#! gilt als der weiseste und mächtigste lebende Monarch, der über unermesslichen Reichtum und Reichtümer verfügt.>  #NT!
 me_parthia.206.a: "Interesting..."  #<Interessant...>  #NT!
  
 me_parthia.207.t: "Silk Road - Chang'an"  #<Seidenstraße - Chang'an>  #NT!
 me_parthia.207.desc_1: "After many weeks of wandering through dry badlands that were inhabited only by starving wolves and the howling desert wind, our caravan reached a city known to the locals as #E Chang'an'#!; a city of wealth and renown, with sturdy walls, thriving marketplaces, and tens of thousands of inhabitants.\n\nThis majestic town also happened to be the home of a self-proclaimed #E Emperor#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName], and [ROOT.GetCountry.GetRuler.GetName] wants to see this man with [ROOT.GetCountry.GetRuler.GetHerHis] own eyes.\n\nBut there are also many local attractions nearby that are worth visiting; there are rumors that a small army of craftsmen are painting a #E Terracotta Army#!, which sounds interesting, and once [ROOT.GetCountry.GetRuler.GetSheHe] is finished examining these statues of soldiers, [ROOT.GetCountry.GetRuler.GetFirstName] could always visit the garrison and see the real thing."  #<Nach vielen Wochen der Wanderung durch trockenes Ödland, das nur von hungernden Wölfen und dem heulenden Wüstenwind bewohnt wurde, erreichte unsere Karawane eine Stadt, die den Einheimischen als #E Chang'an'#!; bekannt ist, eine Stadt voller Reichtum und Ansehen, mit starken Mauern, blühenden Marktplätzen und Zehntausenden von Einwohnern.\n\nDiese majestätische Stadt war zufällig auch die Heimat eines selbsternannten #E Kaiser#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName] und [ROOT.GetCountry.GetRuler.GetName] möchten diesen Mann mit [ROOT.GetCountry.GetRuler.GetHerHis] eigenen Augen sehen.\n\nAber es gibt auch viele lokale Sehenswürdigkeiten in der Nähe, die einen Besuch wert sind; Es gibt Gerüchte, dass eine kleine Armee von Handwerkern eine #E Terrakotta-Armee#!, bemalt, was interessant klingt, und sobald [ROOT.GetCountry.GetRuler.GetSheHe] mit der Untersuchung dieser Soldatenstatuen fertig ist, könnte #!;0 jederzeit die Garnison besuchen und sich das Original ansehen.>  #NT!
 me_parthia.207.desc_2: "After many weeks of wandering through dry badlands that were inhabited only by starving wolves and the howling desert wind, our caravan reached a city known to the locals as #E Chang'an'#!; a city of wealth and renown, with sturdy walls, thriving marketplaces, and tens of thousands of inhabitants.\n\nThis majestic town also happened to be the home of the ruling #E Qin Emperor#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName], and [ROOT.GetCountry.GetRuler.GetName] wants to see this man with [ROOT.GetCountry.GetRuler.GetHerHis] own eyes.\n\nBut there are also many local attractions nearby that are worth visiting; there are rumors that a small army of craftsmen are painting a #E Terracotta Army#!, which sounds interesting, and once [ROOT.GetCountry.GetRuler.GetSheHe] is finished examining these statues of soldiers, [ROOT.GetCountry.GetRuler.GetFirstName] could always visit the garrison and see the real thing."  #<Nach vielen Wochen der Wanderung durch trockenes Ödland, das nur von hungernden Wölfen und dem heulenden Wüstenwind bewohnt wurde, erreichte unsere Karawane eine Stadt, die den Einheimischen als #E Chang'an'#!; bekannt ist, eine Stadt voller Reichtum und Ansehen, mit robusten Mauern, blühenden Marktplätzen und Zehntausenden von Einwohnern.\n\nDiese majestätische Stadt war zufällig auch die Heimat des herrschenden #E Qin Kaiser#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName] und [ROOT.GetCountry.GetRuler.GetName] möchten diesen Mann mit [ROOT.GetCountry.GetRuler.GetHerHis] eigenen Augen sehen.\n\nAber es gibt auch viele lokale Sehenswürdigkeiten in der Nähe, die einen Besuch wert sind; Es gibt Gerüchte, dass eine kleine Armee von Handwerkern eine #E Terrakotta-Armee#!, bemalt, was interessant klingt, und sobald [ROOT.GetCountry.GetRuler.GetSheHe] mit der Untersuchung dieser Soldatenstatuen fertig ist, könnte #!;0 jederzeit die Garnison besuchen und sich das Original ansehen.>  #NT!
 me_parthia.207.desc_3: "After many weeks of wandering through dry badlands that were inhabited only by starving wolves and the howling desert wind, our caravan reached a city known to the locals as #E Chang'an'#!; a city of wealth and renown, with sturdy walls, thriving marketplaces, and tens of thousands of inhabitants.\n\nThis majestic town also happened to be the home of the ruling #E Han Emperor#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName], and [ROOT.GetCountry.GetRuler.GetName] wants to see this man with [ROOT.GetCountry.GetRuler.GetHerHis] own eyes.\n\nBut there are also many local attractions nearby that are worth visiting; there are rumors that a small army of craftsmen are painting a #E Terracotta Army#!, which sounds interesting, and once [ROOT.GetCountry.GetRuler.GetSheHe] is finished examining these statues of soldiers, [ROOT.GetCountry.GetRuler.GetFirstName] could always visit the garrison and see the real thing."  #<Nach vielen Wochen der Wanderung durch trockenes Ödland, das nur von hungernden Wölfen und dem heulenden Wüstenwind bewohnt wurde, erreichte unsere Karawane eine Stadt, die den Einheimischen als #E Chang'an'#!; bekannt ist, eine Stadt voller Reichtum und Ansehen, mit starken Mauern, blühenden Marktplätzen und Zehntausenden von Einwohnern.\n\nDiese majestätische Stadt war zufällig auch die Heimat des herrschenden #E Han-Kaisers#!, [SCOPE.sCharacter('chinese_emperor_scope').GetName] und [ROOT.GetCountry.GetRuler.GetName] möchte diesen Mann mit [ROOT.GetCountry.GetRuler.GetHerHis] eigenen Augen sehen.\n\nAber es gibt auch viele lokale Sehenswürdigkeiten in der Nähe, die einen Besuch wert sind; Es gibt Gerüchte, dass eine kleine Armee von Handwerkern eine #E Terrakotta-Armee#!, bemalt, was interessant klingt, und sobald [ROOT.GetCountry.GetRuler.GetSheHe] mit der Untersuchung dieser Soldatenstatuen fertig ist, könnte #!;0 jederzeit die Garnison besuchen und sich das Original ansehen.>  #NT!
 me_parthia.207.a: "Go to the marketplace"  #<Gehen Sie zum Marktplatz>  #NT!
 me_parthia.207.b: "I want to see the #E Terracotta Army#!"  #<Ich möchte die #E Terrakotta-Armee#! sehen>  #NT!
 me_parthia.207.c: "Quietly inspect the local garrison"  #<Inspizieren Sie ruhig die örtliche Garnison>  #NT!
 me_parthia.207.d: "Visit the palace of Emperor"  #<Besuchen Sie den Palast des Kaisers>  #NT!
 me_parthia.207.e: "Let's get back on the road"  #<Machen wir uns wieder auf den Weg>  #NT!
  
 me_parthia.2071.t: "Silk Road - Chang'An Market"  #<Seidenstraße – Chang'An-Markt>  #NT!
 me_parthia.2071.desc: "The wonders that were available for sale in the marketplaces of #E Chan'an#! made [ROOT.GetCountry.GetRuler.GetName] wish that [ROOT.GetCountry.GetRuler.GetSheHe] had not spent anything in [GetProvince('(int32)6682').GetName] or [GetProvince('(int32)7184').GetName]. Goods that were simply not available back home in [ROOT.GetCountry.GetCapital.GetName], like intricate porcelain dishes made by master craftsmen and elegant weapons that made Parthian arms look like the crude tools of savages, could be found at incredibly reasonable prices, and there was so much silk @silk! available that [ROOT.GetCountry.GetRuler.GetFirstName] could not believe it. Thousands of scrolls on a wide variety of topics - history, science, mathematics, art, poetry - were sold alongside inventions that defied description.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] was absolutely flabbergasted by all that [ROOT.GetCountry.GetRuler.GetSheHe] witnessed, hardly believing that such things were possible."  #<Die Wunder, die auf den Marktplätzen von #E Chan'an#! zum Verkauf angeboten wurden, lösten in [ROOT.GetCountry.GetRuler.GetName] den Wunsch aus, dass [ROOT.GetCountry.GetRuler.GetSheHe] in [GetProvince('(int32)6682').GetName] oder [GetProvince('(int32)7184').GetName] nichts ausgegeben hätte. Waren, die zu Hause in [ROOT.GetCountry.GetCapital.GetName] einfach nicht erhältlich waren, wie kompliziertes, von Meisterhandwerkern hergestelltes Porzellangeschirr und elegante Waffen, die parthische Waffen wie die groben Werkzeuge der Wilden aussehen ließen, konnten zu unglaublich günstigen Preisen gefunden werden, und es gab so viel Seide @silk! verfügbar, dass [ROOT.GetCountry.GetRuler.GetFirstName] es nicht glauben konnte. Tausende Schriftrollen zu den unterschiedlichsten Themen – Geschichte, Wissenschaft, Mathematik, Kunst, Poesie – wurden zusammen mit Erfindungen verkauft, die sich jeder Beschreibung entzogen.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] war völlig verblüfft über alles, was [ROOT.GetCountry.GetRuler.GetSheHe] miterlebte, und konnte kaum glauben, dass solche Dinge möglich waren.>  #NT!
 me_parthia.2071.a: "Buy local slaves"  #<Kaufen Sie lokale Sklaven>  #NT!
 me_parthia.2071.b: "I wonder what those scrolls say..."  #<Ich frage mich, was diese Schriftrollen sagen ...>  #NT!
 me_parthia.2071.c: "We've never seen inventions such as those!"  #<Solche Erfindungen haben wir noch nie gesehen!>  #NT!
 me_parthia.2071.d: "My bartering here is done"  #<Mein Tauschhandel hier ist beendet>  #NT!
  
 me_parthia.2072.t: "Silk Road - Terracotta Army"  #<Seidenstraße – Terrakotta-Armee>  #NT!
 me_parthia.2072.desc: "By the time that [ROOT.GetCountry.GetRuler.GetName] managed to find the location of the #E Terracotta Army#!, the sun was hanging low in the western skies - it's heading for [ROOT.GetCountry.GetCapital.GetName], the [ROOT.GetCountry.GetRulerTitle] thought absentmindedly to [ROOT.GetCountry.GetRuler.GetHerHim]self, and was immediately struck with a pang of homesickness. This temporary heartache was all but forgotten by the time that [ROOT.GetCountry.GetRuler.GetFirstName] entered the gigantic tomb at the edge of town and first saw the imposing figures of the terracotta statues, however.\n\nWhile [ROOT.GetCountry.GetRuler.GetSheHe] had fought in countless battles and could reasonably estimate the numbers in a large group, it was impossible to guess how many statues there were - ten thousand? Twenty thousand? Miraculously, all of the soldiers were different from each other; some had long hair, others shaved heads, some were dressed in full suits of armor, others were protected only by heavy leather padding, some carried long bows and others were armed with spears, and each soldier was painted individually...what a marvel!\n\n[ROOT.GetCountry.GetRuler.GetFirstName] spent the last few moments of the day watching the splintered sunlight playing alongside the terracotta warriors, [ROOT.GetCountry.GetRuler.GetHerHis] mind wandering."  #<Als es [ROOT.GetCountry.GetRuler.GetName] gelang, den Standort der #E Terrakotta-Armee#!, zu finden, stand die Sonne tief am westlichen Himmel – sie steuert auf [ROOT.GetCountry.GetCapital.GetName] zu, dachte [ROOT.GetCountry.GetRulerTitle] geistesabwesend an [ROOT.GetCountry.GetRuler.GetHerHim] und wurde sofort von Heimweh geplagt. Dieser vorübergehende Kummer war jedoch so gut wie vergessen, als [ROOT.GetCountry.GetRuler.GetFirstName] das riesige Grab am Rande der Stadt betrat und zum ersten Mal die imposanten Figuren der Terrakotta-Statuen sah.\n\nWährend [ROOT.GetCountry.GetRuler.GetSheHe] in unzähligen Schlachten gekämpft hatte und die Anzahl in einer großen Gruppe einigermaßen einschätzen konnte, war es unmöglich zu erraten, wie viele Statuen es gab – zehntausend? Zwanzigtausend? Wie durch ein Wunder waren alle Soldaten unterschiedlich; Einige hatten langes Haar, andere kahlgeschorene Köpfe, einige trugen komplette Rüstungen, andere waren nur durch schwere Lederpolsterung geschützt, einige trugen lange Bögen und andere waren mit Speeren bewaffnet, und jeder Soldat war individuell bemalt ... was für ein Wunder!\n\n[ROOT.GetCountry.GetRuler.GetFirstName] verbrachte die letzten Momente des Tages damit, das zersplitterte Sonnenlicht zu beobachten, das neben den Terrakotta-Kriegern spielte, [ROOT.GetCountry.GetRuler.GetHerHis] Gedanken schweiften ab.>  #NT!
 me_parthia.2072.a: "Respect the tomb in silence"  #<Respektiere das Grab in Stille>  #NT!
 me_parthia.2072.b: "Try to 'get' a souvenir when no one is looking..."  #<Versuchen Sie, ein Souvenir zu „ergattern“, wenn niemand hinschaut ...>  #NT!
  
 me_parthia.2073.t: "Silk Road - Chang'An Garrison"  #<Seidenstraße – Chang'An-Garnison>  #NT!
 me_parthia.2073.desc: "[ROOT.GetCountry.GetRuler.GetName] was impressed by the tactics and discipline shown by the warriors training outside of the main citadel at #E Chang'an#!, and [ROOT.GetCountry.GetRuler.GetHerHis] mind immediately wondered how [ROOT.GetCountry.GetRuler.GetSheHe] could benefit the levies of [ROOT.GetCountry.GetName] with this knowledge. The Chinese warriors were fighting in strange formations that were quite unorthodox, but the grizzled [ROOT.GetCountry.GetRulerTitle], the veteran of a thousand campaigns, could see how practical and effective these foreign tactics were. And the weapons and siege tactics they used were unlike any that could be found back home in [ROOT.GetCountry.GetCapital.GetName]...if only our generals were here!"  #<[ROOT.GetCountry.GetRuler.GetName] war beeindruckt von der Taktik und Disziplin der Krieger, die außerhalb der Hauptzitadelle in #E Chang'an#!, trainierten, und [ROOT.GetCountry.GetRuler.GetHerHis] fragte sich sofort, wie [ROOT.GetCountry.GetRuler.GetSheHe] mit diesem Wissen den Truppen von [ROOT.GetCountry.GetName] zugute kommen könnte. Die chinesischen Krieger kämpften in seltsamen Formationen, die ziemlich unorthodox waren, aber der ergraute [ROOT.GetCountry.GetRulerTitle], der Veteran von tausend Feldzügen, konnte erkennen, wie praktisch und effektiv diese ausländischen Taktiken waren. Und die Waffen und Belagerungstaktiken, die sie verwendeten, waren anders als alle, die man zu Hause in [ROOT.GetCountry.GetCapital.GetName] finden konnte ... wenn nur unsere Generäle hier wären!>  #NT!
 me_parthia.2073.a: "Let's train with them while we are here"  #<Lasst uns mit ihnen trainieren, während wir hier sind>  #NT!
 me_parthia.2073.b: "What is that automated bow?"  #<Was ist das für ein automatischer Bogen?>  #NT!
 me_parthia.2073.c: "Their siege engines are awe inspiring!"  #<Ihre Belagerungsmaschinen sind beeindruckend!>  #NT!
  
 me_parthia.2074.t: "Silk Road - Emperor's Palace"  #<Seidenstraße – Kaiserpalast>  #NT!
 me_parthia.2074.desc: "In one of the strange episodes of history that sounds like a fabrication, it came to pass that the [ROOT.GetCountry.GetRulerTitle] of [ROOT.GetCountry.GetName], [ROOT.GetCountry.GetRuler.GetName], found [ROOT.GetCountry.GetRuler.GetHerHim]self talking to the #E Emperor#! of the #E Middle Kingdom#!, a powerful warlord named [SCOPE.sCharacter('chinese_emperor_scope').GetName] that had conquered an extensive realm.\n\nWhile [ROOT.GetCountry.GetRuler.GetFirstName] had bee traveling with the trade caravan under an assumed name, when [ROOT.GetCountry.GetRuler.GetSheHe] was in the presence of the Emperor, [ROOT.GetCountry.GetRuler.GetFirstName] boldly announced that [ROOT.GetCountry.GetRuler.GetSheHe] was the real leader of the Parthians, and had traveled a great distance to stand before the esteemed ruler of the Middle Kingdom.\n\nAttended to by their individual revenues, the two leaders conversed for many hours as equals - an honor that [ROOT.GetCountry.GetRuler.GetFirstName] did not fail to observe - and then the Emperor asked the [ROOT.GetCountry.GetRulerTitle] why [ROOT.GetCountry.GetRuler.GetSheHe] had traveled to #E Chang'an#! from distant [ROOT.GetCountry.GetCapital.GetName]."  #<In einer der seltsamen Episoden der Geschichte, die wie eine Fälschung klingen, begab es sich, dass der [ROOT.GetCountry.GetRulerTitle] von [ROOT.GetCountry.GetName], [ROOT.GetCountry.GetRuler.GetName], [ROOT.GetCountry.GetRuler.GetHerHim]selbst im Gespräch mit dem #E Kaiser#! des #E Reichs der Mitte#! fand, einem mächtigen Kriegsherrn namens [SCOPE.sCharacter('chinese_emperor_scope').GetName], der ein ausgedehntes Reich erobert hatte.\n\nWährend [ROOT.GetCountry.GetRuler.GetFirstName] Biene hatte Als [ROOT.GetCountry.GetName]0 unter falschem Namen mit der Handelskarawane reiste, verkündete [ROOT.GetCountry.GetRuler.GetFirstName] kühn, dass [ROOT.GetCountry.GetName]0 der wahre Anführer der Parther sei und eine große Entfernung zurückgelegt habe, um vor dem geschätzten Herrscher des Reichs der Mitte zu stehen.\n\nUnter der Aufmerksamkeit ihrer jeweiligen Einkünfte unterhielten sich die beiden Anführer viele Stunden lang auf Augenhöhe – eine Ehre, die [ROOT.GetCountry.GetRuler.GetFirstName] nicht versäumte, zu beachten – und Dann fragte der Kaiser den [ROOT.GetCountry.GetRulerTitle], warum [ROOT.GetCountry.GetName]0 aus dem fernen [ROOT.GetCountry.GetName]8 nach #E Chang'an#! gereist sei.>  #NT!
 me_parthia.2074.a: "I am here for the sake of adventure and glory"  #<Ich bin wegen des Abenteuers und des Ruhms hier>  #NT!
 me_parthia.2074.b: "Respectfully secure a deal for jade @jade! trading"  #<Sichern Sie sich respektvoll einen Deal für Jade @jade! Handel>  #NT!
 me_parthia.2074.btt: "After the end of this journey, we will be able to choose #T 1 City#! for Jade @jade! trading, changing the trade goods of an owned city."  #<Nach dem Ende dieser Reise können wir #T 1 Stadt#! für Jade @jade auswählen! Handel, Veränderung der Handelsgüter einer Stadt, die ihr gehört.>  #NT!
  
 me_parthia.208.t: "Silk Road - Luoyang"  #<Seidenstraße - Luoyang>  #NT!
 me_parthia.208.desc_1: "The next city on the journey, #E 'Luoyang'#!, was found in a province the locals called #E 'Henan'#!, and upon entering its gates, [ROOT.GetCountry.GetRuler.GetName] could tell that this city had seen its fair share of struggles. Luoyang was a prosperous town, and its wealth attracted many foes desperate to take it for themselves; apparently an enemy army had just left the area less than a week ago, and the people were barely recovered from the years-long siege.\n\nThere were massive cracks in the city's battlements, and its hastily-repaired walls were stained black from soot and smoke. The fields outside of the town were filled with freshly-dug graves, and there were no animals found in its streets. Luckily for the inhabitants, the walls had held and the defenders had managed to repel the invaders, but there was an uneasy tension in the air as the Parthians made their way through its abandoned boulevards. No locals came out to greet them, and the Parthians began to feel unwelcome."  #<Die nächste Stadt auf der Reise, #E 'Luoyang'#!,, wurde in einer Provinz gefunden, die die Einheimischen #E 'Henan'#!, nannten, und als sie ihre Tore betrat, konnte [ROOT.GetCountry.GetRuler.GetName] erkennen, dass diese Stadt eine Menge Kämpfe erlebt hatte. Luoyang war eine wohlhabende Stadt, und ihr Reichtum lockte viele Feinde an, die sie unbedingt für sich beanspruchen wollten. Anscheinend hatte eine feindliche Armee das Gebiet erst vor weniger als einer Woche verlassen, und die Menschen erholten sich kaum von der jahrelangen Belagerung.\n\nEs gab massive Risse in den Zinnen der Stadt und ihre hastig reparierten Mauern waren schwarz von Ruß und Rauch. Die Felder außerhalb der Stadt waren mit frisch ausgehobenen Gräbern gefüllt und in den Straßen wurden keine Tiere gefunden. Zum Glück für die Bewohner hatten die Mauern gehalten und den Verteidigern war es gelungen, die Eindringlinge abzuwehren, aber es lag eine unbehagliche Spannung in der Luft, als die Parther durch die verlassenen Boulevards zogen. Es kamen keine Einheimischen heraus, um sie zu begrüßen, und die Parther begannen, sich unwillkommen zu fühlen.>  #NT!
 me_parthia.208.desc_2: "The next city on the journey, #E 'Luoyang'#!, was found in a province the locals called #E 'Henan'#!, and upon entering its gates, [ROOT.GetCountry.GetRuler.GetName] could tell that this city had seen its fair share of struggles. Luoyang was a prosperous town, and its wealth attracted many foes desperate to take it for themselves; apparently an enemy army had just left the area less than a week ago, and the people were barely recovered from the years-long siege.\n\nThere were massive cracks in the city's battlements, and its hastily-repaired walls were stained black from soot and smoke. The fields outside of the town were filled with freshly-dug graves, and there were no animals found in its streets. Luckily for the inhabitants, the walls had held and the defenders had managed to repel the invaders, but there was an uneasy tension in the air as the Parthians made their way through its abandoned boulevards. No locals came out to greet them, and the Parthians began to feel unwelcome."  #<Die nächste Stadt auf der Reise, #E 'Luoyang'#!,, wurde in einer Provinz gefunden, die die Einheimischen #E 'Henan'#!, nannten, und als sie ihre Tore betrat, konnte [ROOT.GetCountry.GetRuler.GetName] erkennen, dass diese Stadt eine Menge Kämpfe erlebt hatte. Luoyang war eine wohlhabende Stadt, und ihr Reichtum lockte viele Feinde an, die sie unbedingt für sich beanspruchen wollten. Anscheinend hatte eine feindliche Armee das Gebiet erst vor weniger als einer Woche verlassen, und die Menschen erholten sich kaum von der jahrelangen Belagerung.\n\nEs gab massive Risse in den Zinnen der Stadt und ihre hastig reparierten Mauern waren schwarz von Ruß und Rauch. Die Felder außerhalb der Stadt waren mit frisch ausgehobenen Gräbern gefüllt und in den Straßen wurden keine Tiere gefunden. Zum Glück für die Bewohner hatten die Mauern gehalten und den Verteidigern war es gelungen, die Eindringlinge abzuwehren, aber es lag eine unbehagliche Spannung in der Luft, als die Parther durch die verlassenen Boulevards zogen. Es kamen keine Einheimischen heraus, um sie zu begrüßen, und die Parther begannen, sich unwillkommen zu fühlen.>  #NT!
 me_parthia.208.desc_3: "The next city on the journey, #E 'Luoyang'#!, was found in a province the locals called #E 'Henan'#!, and upon entering its gates, [ROOT.GetCountry.GetRuler.GetName] could tell that this city had seen its fair share of struggles. Luoyang was a prosperous town, and its wealth attracted many foes desperate to take it for themselves; apparently an enemy army had just left the area less than a week ago, and the people were barely recovered from the years-long siege.\n\nThere were massive cracks in the city's battlements, and its hastily-repaired walls were stained black from soot and smoke. The fields outside of the town were filled with freshly-dug graves, and there were no animals found in its streets. Luckily for the inhabitants, the walls had held and the defenders had managed to repel the invaders, but there was an uneasy tension in the air as the Parthians made their way through its abandoned boulevards. No locals came out to greet them, and the travelers began to feel unwelcome; the only people they saw on the streets were guards."  #<Die nächste Stadt auf der Reise, #E 'Luoyang'#!,, wurde in einer Provinz gefunden, die die Einheimischen #E 'Henan'#!, nannten, und als sie ihre Tore betrat, konnte [ROOT.GetCountry.GetRuler.GetName] erkennen, dass diese Stadt eine Menge Kämpfe erlebt hatte. Luoyang war eine wohlhabende Stadt, und ihr Reichtum lockte viele Feinde an, die sie unbedingt für sich beanspruchen wollten. Anscheinend hatte eine feindliche Armee das Gebiet erst vor weniger als einer Woche verlassen, und die Menschen erholten sich kaum von der jahrelangen Belagerung.\n\nEs gab massive Risse in den Zinnen der Stadt und ihre hastig reparierten Mauern waren schwarz von Ruß und Rauch. Die Felder außerhalb der Stadt waren mit frisch ausgehobenen Gräbern gefüllt und in den Straßen wurden keine Tiere gefunden. Zum Glück für die Bewohner hatten die Mauern gehalten und den Verteidigern war es gelungen, die Eindringlinge abzuwehren, aber es lag eine unbehagliche Spannung in der Luft, als die Parther durch die verlassenen Boulevards zogen. Es kamen keine Einheimischen heraus, um sie zu begrüßen, und die Reisenden begannen sich unwillkommen zu fühlen; Die einzigen Menschen, die sie auf der Straße sahen, waren Wachen.>  #NT!
 me_parthia.208.a: "I want to go to the market"  #<Ich möchte auf den Markt gehen>  #NT!
 me_parthia.208.b: "Let us visit the local administration"  #<Besuchen wir die örtliche Verwaltung>  #NT!
 me_parthia.208.c: "I want to see the famed silk-weavers"  #<Ich möchte die berühmten Seidenweber sehen>  #NT!
 me_parthia.208.d: "It is known that there are citizen militias here.."  #<Es ist bekannt, dass es hier Bürgermilizen gibt.>  #NT!
 me_parthia.208.e: "The time has come to head home, finally"  #<Es ist endlich Zeit, nach Hause zu gehen>  #NT!
  
 me_parthia.2081.t: "Silk Road - Luoyang Market"  #<Seidenstraße – Luoyang-Markt>  #NT!
 me_parthia.2081.desc: "As our caravan entered the main marketplace at #E Luoyang#!, our men were greeted with icy stares and tight lips. When inquiries were made to determine this lack of hospitality, we were told that the city had recently been under siege and that the inhabitants were suspicious of our intentions - were we really here to spend our gold, or were we yet another scouting party conducting reconnaissance?\n\nThe usual attractions that one could find in an economic district were here, despite the unfriendly atmosphere that made [ROOT.GetCountry.GetRuler.GetName] want to gather [ROOT.GetCountry.GetRuler.GetHerHis] party and leave. Slaves could be procured at their normal rates, and there were many tea gardens and small shops selling rice cakes and pottage."  #<Als unsere Karawane den Hauptmarktplatz in #E Luoyang#!, betrat, wurden unsere Männer mit eisigen Blicken und schmalen Lippen begrüßt. Als Nachforschungen angestellt wurden, um diesen Mangel an Gastfreundschaft festzustellen, wurde uns mitgeteilt, dass die Stadt kürzlich belagert worden sei und dass die Bewohner misstrauisch gegenüber unseren Absichten seien – waren wir wirklich hier, um unser Gold auszugeben, oder handelte es sich nur um einen weiteren Erkundungstrupp, der Erkundungen durchführte?\n\nDie üblichen Attraktionen, die man in einem Wirtschaftsviertel finden konnte, waren hier, trotz der unfreundlichen Atmosphäre, die [ROOT.GetCountry.GetRuler.GetName] dazu brachte, sich zu versammeln [ROOT.GetCountry.GetRuler.GetHerHis] zu feiern und zu gehen. Sklaven konnten zu normalen Preisen beschafft werden, und es gab viele Teegärten und kleine Läden, in denen Reiskuchen und Suppe verkauft wurden.>  #NT!
 me_parthia.2081.a: "I am always interested in buying slaves"  #<Ich bin immer daran interessiert, Sklaven zu kaufen>  #NT!
 me_parthia.2081.b: "Talk to the locals and learn about their cultural practices"  #<Sprechen Sie mit den Einheimischen und erfahren Sie mehr über ihre kulturellen Praktiken>  #NT!
 me_parthia.2081.c: "We should have some tea and hire a slave to read to us"  #<Wir sollten etwas Tee trinken und einen Sklaven engagieren, der uns vorliest>  #NT!
 me_parthia.2081.d: "My pockets are empty..."  #<Meine Taschen sind leer...>  #NT!
  
 me_parthia.2082.t: "Silk Road - Luoyang Administrators"  #<Seidenstraße – Luoyang-Administratoren>  #NT!
 me_parthia.2082.desc: "One of the reasons that #E Luoyang#! managed to keep its freedom during the dark days of the siege was undoubtedly due to the army of bureaucrats running the city. Because the #E Emperor#! and the Imperial Armies were not present in the region, the careful delegation of crucial tasks was of absolute importance, and only men of high standing and character were empowered to rule in the Emperor's name.\n\nBut the bureaucrats had proven their worth, time and time again.\n\nDuring the recent siege of the city, for example, the local officials organized the resistance in many valuable ways, including encouraging the formation of militias to patrol the streets and carefully rationing out the stockpiled supplies of grain. Without these administrators steering the ship, Luoyang would have fallen to the enemy long ago; a testament to their superior administrative skills."  #<One of the reasons that #E Luoyang#! managed to keep its freedom during the dark days of the siege was undoubtedly due to the army of bureaucrats running the city. Because the #E Emperor#! and the Imperial Armies were not present in the region, the careful delegation of crucial tasks was of absolute importance, and only men of high standing and character were empowered to rule in the Emperor's name.\n\nBut the bureaucrats had proven their worth, time and time again.\n\nDuring the recent siege of the city, for example, the local officials organized the resistance in many valuable ways, including encouraging the formation of militias to patrouillieren durch die Straßen und rationieren sorgfältig die gehorteten Getreidevorräte. Ohne diese Verwalter, die das Schiff steuerten, wäre Luoyang schon vor langer Zeit dem Feind zum Opfer gefallen; ein Beweis für ihre überlegenen Verwaltungsfähigkeiten.>  #NT!
 me_parthia.2082.a: "Gaining knowledge on their laws seems worthwile"  #<Es scheint lohnenswert, sich Kenntnisse über ihre Gesetze anzueignen>  #NT!
 me_parthia.2082.b: "It'd be best to learn about delegating tasks to governors"  #<Am besten lernen Sie, wie man Aufgaben an Gouverneure delegiert>  #NT!
  
 me_parthia.2083.t: "Silk Road - Silk Weavers"  #<Seidenstraße – Seidenweber>  #NT!
 me_parthia.2083.desc: "When our local guide told [ROOT.GetCountry.GetRuler.GetName] that there were silk @silk! weavers operating in a district at the edge of town, the [ROOT.GetCountry.GetRulerTitle] wasted no time, but urged our translator to take us there immediately. Although [ROOT.GetCountry.GetRuler.GetFirstName] was not a slave to luxury, like so many of the nobles living back home in [ROOT.GetCountry.GetCapital.GetName] appeared to be, even [ROOT.GetCountry.GetRuler.GetSheHe] appreciated a fine silk garment from time to time, for the Parthian summers were excruciating and wearing silk robes helped immensely with the heat.\n\nThe compound where the silk weavers practiced their trade offered a nice contrast to the unfriendly atmosphere of #E Luoyang#!; all was pleasant and calm here, and the cheerful workers minded their own business. When [ROOT.GetCountry.GetRuler.GetFirstName] arrived at the workshops, the laborers were busy placing silkwork nests into pots filled with boiling water.\n\nMoments later, from inside the main building, a loud cry went out, and the workers left their stations to head inside for the mid-day meal."  #<Als unser örtlicher Reiseführer [ROOT.GetCountry.GetRuler.GetName] erzählte, dass es Seide @silk! Als Weber, die in einem Viertel am Rande der Stadt tätig waren, verschwendete der [ROOT.GetCountry.GetRulerTitle] keine Zeit, sondern drängte unseren Übersetzer, uns sofort dorthin zu bringen. Obwohl [ROOT.GetCountry.GetRuler.GetFirstName] kein Sklave des Luxus war, wie es anscheinend so viele Adlige waren, die zu Hause in [ROOT.GetCountry.GetCapital.GetName] lebten, schätzte selbst [ROOT.GetCountry.GetRuler.GetSheHe] von Zeit zu Zeit ein Kleidungsstück aus feiner Seide, denn die parthischen Sommer waren unerträglich und das Tragen von Seidengewändern half ungemein bei der Hitze.\n\nDas Gelände, auf dem die Seidenweber ihr Handwerk ausübten, bot einen schönen Kontrast zur unfreundlichen Atmosphäre von #E Luoyang#!; allen Hier war es angenehm und ruhig, und die fröhlichen Arbeiter kümmerten sich um ihre eigenen Angelegenheiten. Als [ROOT.GetCountry.GetRuler.GetFirstName] in den Werkstätten ankam, waren die Arbeiter damit beschäftigt, Seidennester in Töpfe mit kochendem Wasser zu legen.\n\nWenige Augenblicke später ertönte im Hauptgebäude ein lauter Schrei und die Arbeiter verließen ihre Stationen, um zum Mittagessen hineinzugehen.>  #NT!
 me_parthia.2083.a: "I want to set up a trade deal, right here and right now"  #<Ich möchte hier und jetzt ein Handelsabkommen abschließen>  #NT!
 me_parthia.2083.att: "After the end of this journey, we will be able to choose #T 1 City#! for #Y Silk#! @silk! trading, changing the trade good of an owned city."  #<Nach dem Ende dieser Reise können wir #T 1 Stadt#! für #Y Seide#! @seide wählen! Handel, Veränderung des Handelsguts einer eigenen Stadt.>  #NT!
 me_parthia.2083.b: "Let's try stealing their silkworms for domestic production!"  #<Versuchen wir mal, ihre Seidenraupen für die heimische Produktion zu stehlen!>  #NT!
 me_parthia.2083.btt: "#R We can try to steal silkworms!#!"  #<#R Wir können versuchen, Seidenraupen zu stehlen!#!>  #NT!
 PTH_luoyang_silk0: "We will be able to choose #T 1 City#! for #Y Silk#! @silk! trading, changing the trade good of an owned city."  #<Wir können #T 1 Stadt#! für #Y Seide#! @seide wählen! Handel, Veränderung des Handelsguts einer eigenen Stadt.>  #NT!
 PTH_luoyang_silk1: "We will be able to choose #T 1 City#! for #Y Silk#! @silk! production, changing the trade good of an owned city."  #<Wir können #T 1 Stadt#! für #Y Seide#! @seide wählen! Produktion, Veränderung des Handelsguts einer eigenen Stadt.>  #NT!
 PTH_luoyang_silk2: "We will be able to choose #T 2 Cities#! for #Y Silk#! @silk! production, changing the trade goods of any owned cities."  #<Wir können #T 2 Städte#! für #Y Seide#! @silk auswählen! Produktion, Veränderung der Handelsgüter aller eigenen Städte.>  #NT!
 PTH_luoyang_silk3: "We will unlock a #T Decision#! that will allow changing any province to #Y Silk#! @silk! production!"  #<Wir werden eine #T-Entscheidung#! freischalten, die es ermöglicht, jede Provinz in #Y Seide#! @seide zu ändern! Produktion!>  #NT!
  
 me_parthia.2086.t: "Stealing Silk - Great Success!"  #<Seide stehlen – Großer Erfolg!>  #NT!
 me_parthia.2086.desc: "Lifting a finger to [ROOT.GetCountry.GetRuler.GetHerHis] lips to call for silence, [ROOT.GetCountry.GetRuler.GetName] quietly dismounted and slipped across the fence that separated the silk @silk! weavers from the busy street. Tiptoeing quietly, the [ROOT.GetCountry.GetRulerTitle] managed to reach a workbench without drawing any suspicion, and much to [ROOT.GetCountry.GetRuler.GetHerHis] delight, found a bundle of large scrolls tucked underneath of a heavy cloth. Stuffing them into [ROOT.GetCountry.GetRuler.GetHerHis] cloak, [ROOT.GetCountry.GetRuler.GetFirstName] extricated [ROOT.GetCountry.GetRuler.GetHerHim]self from the delicate situation and the Parthians were able to sneak away undetected.\n\nHours later, our local guide was able to translate the scrolls for us and confirmed that we had stolen an overseer's manual - the secret to making silk was ours!"  #<[ROOT.GetCountry.GetRuler.GetName] hob einen Finger an [ROOT.GetCountry.GetRuler.GetHerHis] Lippen, um zum Schweigen aufzurufen, stieg leise ab und schlüpfte über den Zaun, der die Seide @silk trennte! Weber von der belebten Straße. Leise auf Zehenspitzen gelang es dem [ROOT.GetCountry.GetRulerTitle], eine Werkbank zu erreichen, ohne Verdacht zu erregen, und zu [ROOT.GetCountry.GetRuler.GetHerHis]s großer Freude fand er ein Bündel großer Schriftrollen, die unter einem schweren Tuch versteckt waren. Indem wir sie in [ROOT.GetCountry.GetRuler.GetHerHis] Umhänge stopften, befreiten [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetHerHim] sich selbst aus der heiklen Situation und die Parther konnten sich unentdeckt davonschleichen.\n\nStunden später konnte unser örtlicher Führer die Schriftrollen für uns übersetzen und bestätigte, dass wir ein Aufseherhandbuch gestohlen hatten – das Geheimnis der Seidenherstellung gehörte uns!>  #NT!
 me_parthia.2086.a: "I can't believe this was so easy!"  #<Ich kann nicht glauben, dass das so einfach war!>  #NT!
  
 me_parthia.2087.t: "Stealing Silk - Medium Success!"  #<Seide stehlen – Mittlerer Erfolg!>  #NT!
 me_parthia.2087.desc: "[ROOT.GetCountry.GetRuler.GetName] jumped over the fence and crawled towards the silk @silk! weavers workbenches, causing [ROOT.GetCountry.GetRuler.GetHerHis] traveling companions to laugh at the sight of the Parthian [ROOT.GetCountry.GetRulerTitle] squirming on hands and knees. [ROOT.GetCountry.GetRuler.GetFirstName] was carefully inspecting a pile of papers found inside of a lockbox when a sudden cry from the house broke the silence - someone had caught us and the alarm was raised!\n\nGrabbing whatever [ROOT.GetCountry.GetRuler.GetSheHe] could, [ROOT.GetCountry.GetRuler.GetFirstName] bolted for [ROOT.GetCountry.GetRuler.GetHerHis] horse, and the thieving Parthians were able to escape without being followed. Much later, our translator confirmed that we had stolen a diagram that described how to make silk from the nests of worms."  #<[ROOT.GetCountry.GetRuler.GetName] sprang über den Zaun und kroch auf die Seide @silk zu! Weberwerkbänke, was dazu führte, dass [ROOT.GetCountry.GetRuler.GetHerHis] Reisegefährten beim Anblick der Parther lachten [ROOT.GetCountry.GetRulerTitle] sich auf Händen und Knien windeten. [ROOT.GetCountry.GetRuler.GetFirstName] untersuchte gerade sorgfältig einen Stapel Papiere, der in einem Schließfach gefunden wurde, als ein plötzlicher Schrei aus dem Haus die Stille durchbrach – jemand hatte uns erwischt und der Alarm wurde ausgelöst!\n\nIch schnappte mir, was [ROOT.GetCountry.GetRuler.GetSheHe] konnte, [ROOT.GetCountry.GetRuler.GetFirstName] rannte zu [ROOT.GetCountry.GetRuler.GetHerHis] Pferd und die diebischen Parther konnten entkommen, ohne verfolgt zu werden. Viel später bestätigte unser Übersetzer, dass wir ein Diagramm gestohlen hatten, das beschrieb, wie man aus Würmernestern Seide herstellt.>  #NT!
 me_parthia.2087.a: "We were bold and it paid off...good!"  #<Wir waren mutig und es hat sich gelohnt...gut!>  #NT!
  
 me_parthia.2088.t: "Stealing Silk - Small Success!"  #<Seide stehlen – kleiner Erfolg!>  #NT!
 me_parthia.2088.desc: "Admittedly, things could have gone better, but [ROOT.GetCountry.GetRuler.GetName] was lucky to escape without drawing the ire of the silk @silk! weavers after [ROOT.GetCountry.GetRuler.GetSheHe] botched the attempt to steal from their workbenches. The sneaky [ROOT.GetCountry.GetRulerTitle] managed to get inside the compound without drawing any attention, but just as [ROOT.GetCountry.GetRuler.GetSheHe] was placing a pilfered scroll into [ROOT.GetCountry.GetRuler.GetHerHis] cloak, a group of workers surrounded [ROOT.GetCountry.GetRuler.GetHerHim] and began yelling angrily.\n\nLuckily, [ROOT.GetCountry.GetRuler.GetFirstName] was able to charm [ROOT.GetCountry.GetRuler.GetHerHis] way out of the predicament, offering small bribes to the slaves so that they would allow [ROOT.GetCountry.GetRuler.GetHerHim] to leave, but it was too close for comfort and the [ROOT.GetCountry.GetRulerTitle] started to wonder if it was time to head back home to [ROOT.GetCountry.GetCapital.GetName]."  #<Zugegebenermaßen hätte es besser laufen können, aber [ROOT.GetCountry.GetRuler.GetName] hatte das Glück, entkommen zu können, ohne den Zorn der Seide @silk auf sich zu ziehen! Weber nach [ROOT.GetCountry.GetRuler.GetSheHe] verpatzten den Versuch, von ihren Werkbänken zu stehlen. Dem hinterhältigen [ROOT.GetCountry.GetRulerTitle] gelang es, unbemerkt in das Gelände einzudringen, aber gerade als [ROOT.GetCountry.GetRuler.GetSheHe] eine gestohlene Schriftrolle in den Umhang von [ROOT.GetCountry.GetRuler.GetHerHis] steckte, umzingelte eine Gruppe von Arbeitern [ROOT.GetCountry.GetRuler.GetHerHim] und begann wütend zu schreien.\n\nGlücklicherweise gelang es [ROOT.GetCountry.GetRuler.GetFirstName], [ROOT.GetCountry.GetRuler.GetHerHis] aus der misslichen Lage zu locken, indem er den Sklaven kleine Bestechungsgelder anbot, damit sie es erlaubten [ROOT.GetCountry.GetRuler.GetHerHim] wollte gehen, aber es war zu nah, um sich wohl zu fühlen, und der [ROOT.GetCountry.GetRulerTitle] begann sich zu fragen, ob es Zeit war, zu [ROOT.GetCountry.GetRuler.GetSheHe]0 nach Hause zurückzukehren.>  #NT!
 me_parthia.2088.a: "Eh, this is better than nothing, I suppose"  #<Äh, das ist wohl besser als nichts>  #NT!
  
 me_parthia.2084.t: "Silk Road - Luoyang Training Grounds"  #<Seidenstraße – Luoyang-Trainingsgelände>  #NT!
 me_parthia.2084.desc: "As the Parthian entourage headed for the training grounds where the local militias practiced, the guide hired by [ROOT.GetCountry.GetRuler.GetName] explained the drastic circumstances that led to their formation. Like us, the #E Chinese#! forbade the commoners from arming themselves - only equestrians and other high-ranking officials were allowed to openly carry swords or spears, but the recent #E Siege of Luoyang#! had forced uncomfortable changes.\n\nIn order to free up the manpower needed to guard the walls, citizen militias had been formed, and much to [ROOT.GetCountry.GetRuler.GetFirstName]'s surprise, there were even women marching alongside the menfolk. Everyone living in the city was expected to help; children drew water from wells or carried messages to and from the walls, and the citizen soldiers patrolled the streets in order to keep the Emperor's peace."  #<Als sich das parthische Gefolge auf den Weg zum Übungsgelände machte, auf dem die örtlichen Milizen trainierten, erklärte der von [ROOT.GetCountry.GetRuler.GetName] beauftragte Führer die drastischen Umstände, die zu ihrer Bildung führten. Wie wir verboten die #E Chinesen#! dem einfachen Volk, sich zu bewaffnen – nur Reitern und anderen hochrangigen Beamten war es erlaubt, offen Schwerter oder Speere zu tragen, aber die jüngste #E Belagerung von Luoyang#! hatte unangenehme Änderungen erzwungen.\n\nUm die für die Bewachung der Mauern benötigten Arbeitskräfte freizusetzen, wurden Bürgermilizen gebildet, und zwar noch viel mehr Überraschung, es marschierten sogar Frauen neben den Männern. Von allen Bewohnern der Stadt wurde erwartet, dass sie helfen; Kinder holten Wasser aus Brunnen oder überbrachten Nachrichten zu und von den Mauern, und die Bürgersoldaten patrouillierten auf den Straßen, um den Frieden des Kaisers zu wahren.>  #NT!
 me_parthia.2084.a: "Watching the training is enough to learn from, don't you think?"  #<Das Ansehen des Trainings reicht aus, um daraus zu lernen, finden Sie nicht auch?>  #NT!
 me_parthia.2084.b: "Hire some of their best instructors"  #<Stellen Sie einige ihrer besten Lehrer ein>  #NT!
 PTH_end_journey0: "I've seen enough...let's head back home"  #<Ich habe genug gesehen ... lass uns nach Hause zurückkehren>  #NT!
 PTH_end_journey1: "We will abandon the expedition and head home.\n#Y This will end the event chain.#!"  #<Wir werden die Expedition abbrechen und uns auf den Heimweg machen.\n#Y Damit wird die Ereigniskette beendet.#!>  #NT!
 PTH_end_journey2: "At long last, it is time to return home. #Y Our journey will end#!."  #<Endlich ist es Zeit, nach Hause zurückzukehren. #Y Unsere Reise endet#!.>  #NT!
  
 me_parthia.209.t: "Silk Road - Heading Home"  #<Seidenstraße – Auf dem Weg nach Hause>  #NT!
 me_parthia.209.desc: "One morning, [ROOT.GetCountry.GetRuler.GetName] broke the news to [ROOT.GetCountry.GetRuler.GetHerHis] traveling companions; after spending months away from home, it was time to retrace our steps and head back for the safety of the Parthian realm. We have gained much wisdom and knowledge on this adventure, but lately, the dreams of [ROOT.GetCountry.GetRuler.GetFirstName] have been filled with visions of the #E Royal Palace#! back at [ROOT.GetCountry.GetCapital.GetName] and the sounds of [ROOT.GetCountry.GetRuler.GetHerHis] family laughing in its corridors. Taking this to be an omen, the [ROOT.GetCountry.GetRulerTitle] is more than ready to make the trek home.\n\nOur guides have informed [ROOT.GetCountry.GetRuler.GetFirstName] that we should see the walls of the Parthian capital in about two months."  #<Eines Morgens überbrachte [ROOT.GetCountry.GetRuler.GetName] die Nachricht an [ROOT.GetCountry.GetRuler.GetHerHis] Reisegefährten; Nachdem wir Monate von zu Hause weg verbracht hatten, war es an der Zeit, umzukehren und in die Sicherheit des Partherreichs zurückzukehren. Wir haben bei diesem Abenteuer viel Weisheit und Wissen gewonnen, aber in letzter Zeit waren die Träume von [ROOT.GetCountry.GetRuler.GetFirstName] voller Visionen des #E Königspalastes#! damals bei [ROOT.GetCountry.GetCapital.GetName] und den Geräuschen der Familie [ROOT.GetCountry.GetRuler.GetHerHis], die in seinen Korridoren lachte. Da dies ein Omen ist, ist die [ROOT.GetCountry.GetRulerTitle] mehr als bereit, die Heimreise anzutreten.\n\nUnsere Führer haben [ROOT.GetCountry.GetRuler.GetFirstName] darüber informiert, dass wir in etwa zwei Monaten die Mauern der parthischen Hauptstadt sehen sollten.>  #NT!
 me_parthia.209.a: "This has truly been the trip of a lifetime..."  #<Das war wirklich die Reise Ihres Lebens ...>  #NT!
  
 me_parthia.210.t: "Silk Road - Home At Last"  #<Seidenstraße – Endlich ein Zuhause>  #NT!
 me_parthia.210.desc: "One of the happiest memories in [ROOT.GetCountry.GetRuler.GetName]'s life was when the watchtowers of [ROOT.GetCountry.GetCapital.GetName] appeared on the horizon; after months of adventuring, finally, the Parthian trade delegation had made its way back to the capital. The sight of [ROOT.GetCountry.GetCapital.GetName]'s walls caused a cheer to erupt from the tired travelers, who suddenly gained a second wind and eagerly pressed their mounts towards the eastern gates of the city.\n\nA feast was held to commemorate the safe return of the [ROOT.GetCountry.GetRulerTitle], and dozens of animals were sacrificed to the gods to thank them for protecting [ROOT.GetCountry.GetRuler.GetFirstName]. As platters of roasted meat, wine and freshly-baked breads were carried into the banquet hall, [ROOT.GetCountry.GetRuler.GetFirstName] clapped [ROOT.GetCountry.GetRuler.GetHerHis] hands and called for all of the treasures that the Parthians had brought back with them to be displayed before everyone present."  #<Eine der glücklichsten Erinnerungen im Leben von [ROOT.GetCountry.GetRuler.GetName] war, als die Wachtürme von [ROOT.GetCountry.GetCapital.GetName] am Horizont auftauchten; Nach Monaten des Abenteuers war die parthische Handelsdelegation endlich auf dem Weg zurück in die Hauptstadt. Der Anblick der Mauern von [ROOT.GetCountry.GetCapital.GetName] ließ bei den müden Reisenden Jubel ausbrechen, die plötzlich neuen Wind bekamen und ihre Reittiere eifrig in Richtung der östlichen Tore der Stadt drängten.\n\nEin Fest wurde abgehalten, um an die sichere Rückkehr der [ROOT.GetCountry.GetRulerTitle] zu erinnern, und Dutzende Tiere wurden den Göttern geopfert, um ihnen für den Schutz von [ROOT.GetCountry.GetRuler.GetFirstName] zu danken. Als Platten mit gebratenem Fleisch, Wein und frisch gebackenem Brot in den Festsaal getragen wurden, klatschten [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetHerHis] in die Hände und riefen dazu auf, alle Schätze, die die Parther mitgebracht hatten, allen Anwesenden zur Schau zu stellen.>  #NT!
 me_parthia.210.a: "Look at all of the treasures that we brought home!"  #<Schauen Sie sich all die Schätze an, die wir mit nach Hause gebracht haben!>  #NT!
 PTH_travel_jade_tt: "We will be able to change the trade good of #Y 1 City#! to @jade! Jade via a #T Decision#!."  #<Wir können das Handelsgut von #Y 1 Stadt#! in @jade ändern! Jade über eine #T Entscheidung#!.>  #NT!
 PTH_luoyang_silk_var1.tt: "We will be able to change the trade good of #Y 1 City#! to @silk! Silk via a #T Decision#!."  #<Wir können das Handelsgut von #Y 1 Stadt#! in @silk ändern! Seide über eine #T Entscheidung#!.>  #NT!
 PTH_luoyang_silk_var2.tt: "We will be able to change the trade good of #Y 2 Cities#! to @silk! Silk via a #T Decision#!."  #<Wir können das Handelsgut von #Y 2 Städten#! in @silk ändern! Seide über eine #T Entscheidung#!.>  #NT!
 PTH_luoyang_silk_var3.tt: "We will be able to change the trade goods of provinces to @silk! Silk via a #T Decision#!."  #<Wir können die Handelswaren der Provinzen auf @Seide umstellen! Seide über eine #T Entscheidung#!.>  #NT!
  
 me_parthia.211.t: "Establish Jade Emporium"  #<Gründung des Jade Emporium>  #NT!
 me_parthia.211.desc: "Where should we establish a #E Jade Emporium#!, [ROOT.GetCountry.GetRuler.GetName]? Jade @jade! is a truly rare trade good, and any location blessed with this market will prosper above all others."  #<Wo sollen wir ein #E Jade Emporium#!, [ROOT.GetCountry.GetRuler.GetName] errichten? Jade @jade! ist ein wirklich seltenes Handelsgut, und jeder Ort, der mit diesem Markt gesegnet ist, wird über allen anderen florieren.>  #NT!
 me_parthia.211.a: "Let's choose to do this in [pth_to_change_1.GetName]."  #<Lassen Sie uns dies in [pth_to_change_1.GetName] tun.>  #NT!
 me_parthia.211.b: "Pick [pth_to_change_2.GetName]."  #<Wählen Sie [pth_to_change_2.GetName].>  #NT!
 me_parthia.211.c: "[pth_to_change_3.GetName] seems like best bet."  #<[pth_to_change_3.GetName] scheint die beste Wahl zu sein.>  #NT!
 me_parthia.211.d: "[pth_to_change_4.GetName] should become a jade trade-hub."  #<[pth_to_change_4.GetName] sollte ein Jade-Handelszentrum werden.>  #NT!
 me_parthia.211.e: "Go with [pth_to_change_5.GetName]."  #<Gehen Sie mit [pth_to_change_5.GetName].>  #NT!
 me_parthia.211.f: "On second thought, leave those plans for later."  #<Wenn Sie es sich genauer überlegen, heben Sie diese Pläne für später auf.>  #NT!
  
 me_parthia.212.t: "Establish Silk Emporium"  #<Gründung von Silk Emporium>  #NT!
 me_parthia.212.desc: "Where would like to construct a #E Silk Emporium#!, [ROOT.GetCountry.GetRuler.GetName]? Silk @silk! is a worth its weight in gold, and any location blessed with this market will prosper above all others."  #<Wo möchte ich ein #E Silk Emporium#!, [ROOT.GetCountry.GetRuler.GetName] errichten? Seide @silk! ist Gold wert, und jeder Standort, der mit diesem Markt gesegnet ist, wird über allen anderen florieren.>  #NT!
 me_parthia.212.a: "Let's choose to do this in [pth_to_change_1.GetName]"  #<Lassen Sie uns dies in [pth_to_change_1.GetName] tun>  #NT!
 me_parthia.212.b: "Pick [pth_to_change_2.GetName]"  #<Wählen Sie [pth_to_change_2.GetName]>  #NT!
 me_parthia.212.c: "[pth_to_change_3.GetName] seems like best bet"  #<[pth_to_change_3.GetName] scheint die beste Wahl zu sein>  #NT!
 me_parthia.212.d: "[pth_to_change_4.GetName] should become a silk trade-hub"  #<[pth_to_change_4.GetName] sollte ein Seidenhandelszentrum werden>  #NT!
 me_parthia.212.e: "Go with [pth_to_change_5.GetName]"  #<Gehen Sie mit [pth_to_change_5.GetName]>  #NT!
 me_parthia.212.f: "On second thought, leave those plans for later"  #<Wenn Sie es sich genauer überlegen, heben Sie diese Pläne für später auf>  #NT!
  
 me_parthia.213.t: "Establish Silk Production"  #<Etablieren Sie die Seidenproduktion>  #NT!
 me_parthia.213.desc: "Our workers have learned a great deal from the scrolls that [ROOT.GetCountry.GetRuler.GetName] pilfered from the silk weavers in #E Luoyang#!, and the time has come to establish our own silk production facilities. Where should we build the workshops, my [ROOT.GetCountry.GetRulerTitle]?"  #<Unsere Arbeiter haben viel aus den Schriftrollen gelernt, die [ROOT.GetCountry.GetRuler.GetName] den Seidenwebern in #E Luoyang#!, gestohlen wurden, und es ist an der Zeit, unsere eigenen Seidenproduktionsanlagen zu errichten. Wo sollen wir die Werkstätten bauen, mein [ROOT.GetCountry.GetRulerTitle]?>  #NT!
 me_parthia.213.a: "Let's choose to do this in [pth_to_change_1.GetName]"  #<Lassen Sie uns dies in [pth_to_change_1.GetName] tun>  #NT!
 me_parthia.213.b: "Pick [pth_to_change_2.GetName]"  #<Wählen Sie [pth_to_change_2.GetName]>  #NT!
 me_parthia.213.c: "[pth_to_change_3.GetName] seems like best bet"  #<[pth_to_change_3.GetName] scheint die beste Wahl zu sein>  #NT!
 me_parthia.213.d: "[pth_to_change_4.GetName] should become a manufacturing center"  #<[pth_to_change_4.GetName] sollte ein Produktionszentrum werden>  #NT!
 me_parthia.213.e: "Go with [pth_to_change_5.GetName]"  #<Gehen Sie mit [pth_to_change_5.GetName]>  #NT!
 me_parthia.213.f: "On second thought, leave those plans for later"  #<Wenn Sie es sich genauer überlegen, heben Sie diese Pläne für später auf>  #NT!
  
 me_parthia.299.t: "Different Points Of View"  #<Verschiedene Standpunkte>  #NT!
 me_parthia.299.desc: "Although some complained that spending such a large sum to hire religious teachers was an astronomical waste, [ROOT.GetCountry.GetRuler.GetName] would hear none of it. Our domain lies at the crossroads of culture and faith, and there are many belief systems that are favored by our people. In order to better understand the many currents that flow through [ROOT.GetCountry.GetName], the wise [ROOT.GetCountry.GetRulerTitle] believed that it was necessary to hire a group of sages, offering them each a large stipend so that they could teach at [ROOT.GetCountry.GetCapital.GetName] without having to worry about the costs of supporting themselves.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] hopes that these efforts will foster a spirit of understanding and brotherhood between our different religious communities, and has actively encouraged these philosophers to hold public dialogues in the [ROOT.GetCountry.GetAdjective] capital."  #<Obwohl sich einige darüber beschwerten, dass es eine astronomische Verschwendung sei, eine so große Summe für die Einstellung von Religionslehrern auszugeben, wollte [ROOT.GetCountry.GetRuler.GetName] nichts davon hören. Unsere Domäne liegt an der Schnittstelle von Kultur und Glauben, und es gibt viele Glaubenssysteme, die von unserem Volk bevorzugt werden. Um die vielen Strömungen, die durch [ROOT.GetCountry.GetName] fließen, besser zu verstehen, glaubten die Weisen [ROOT.GetCountry.GetRulerTitle], dass es notwendig sei, eine Gruppe von Weisen einzustellen und ihnen jeweils ein großes Stipendium anzubieten, damit sie bei [ROOT.GetCountry.GetCapital.GetName] unterrichten konnten, ohne sich um die Kosten für ihren Lebensunterhalt kümmern zu müssen.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] hofft, dass diese Bemühungen einen Geist des Verständnisses und der Brüderlichkeit zwischen unseren verschiedenen Religionsgemeinschaften fördern werden, und hat diese Philosophen aktiv dazu ermutigt, öffentliche Dialoge zu führen die Hauptstadt [ROOT.GetCountry.GetAdjective].>  #NT!
 me_parthia.299.a: "Open your ears and your hearts and listen with an unburdened mind"  #<Öffnen Sie Ihre Ohren und Ihr Herz und hören Sie mit unbeschwertem Geist zu>  #NT!
  
 me_parthia.300.t: "$parthia_missions_81$"  #<$parthia_missions_81$>  #NT!
 me_parthia.300.desc: "The #E Medes#! are numerous, resourceful, rich and educated. As such, it only follows that they should become a backbone to any Iranian empire. While many of the #E Medes#! have come to worship the Lord #E Ahura Mazda#!, many yet still cling on to the worship of the great Lord of Light, #E Mithra#!. This is something that can be easily rectified, should we desire to do so."  #<Die #E Meder#! sind zahlreich, einfallsreich, reich und gebildet. Daraus folgt nur, dass sie das Rückgrat jedes iranischen Imperiums bilden sollten. Während viele der #E Meder#! gekommen sind, um den Herrn #E Ahura Mazda#! anzubeten, halten viele immer noch an der Verehrung des großen Herrn des Lichts, #E Mithra#!, fest. Dies kann leicht behoben werden, wenn wir dies wünschen.>  #NT!
 me_parthia.300.a: "Their skills will be used"  #<Ihre Fähigkeiten werden genutzt>  #NT!
  
 me_parthia.301.t: "$parthia_missions_82$"  #<$parthia_missions_82$>  #NT!
 me_parthia.301.desc: "Continuing on the path of #E Mithra#!, we must come to terms with the reality that #E Zoroastrianism#! (Mazdayasna) is the dominant religion in the #E Iranian Plateau#!. We must make use of their traditions and innovations if we wish to be seen as legitimate and benevolent Overlords."  #<Wenn wir den Weg von #E Mithra#!, fortsetzen, müssen wir uns mit der Realität auseinandersetzen, dass der #E Zoroastrismus#! (Mazdayasna) die vorherrschende Religion auf dem #E Iranischen Plateau#! ist. Wir müssen uns ihre Traditionen und Innovationen zunutze machen, wenn wir als legitime und wohlwollende Oberherren angesehen werden wollen.>  #NT!
 me_parthia.301.a: "Tolerance can be a strong building block of the state"  #<Toleranz kann ein starker Baustein des Staates sein>  #NT!
 me_parthia.302.t: "$parthia_missions_83$"  #<$parthia_missions_83$>  #NT!
 me_parthia.302.desc: "In the hushed chambers of the #E Fire Temples#!, priests with voices like ancient rivers would intone the sacred verses of the #E Avesta#!, their words echoing with the wisdom of #E Zarathushtra#!. Devout congregants sat on woven mats, their eyes closed in reverence, absorbing the spiritual teachings and moral precepts passed down through generations. These recitations were not merely sounds but living traditions, connecting the faithful to their divine heritage and guiding their daily lives."  #<In den stillen Kammern der #E Feuertempel#!, stimmten Priester mit Stimmen wie alte Flüsse die heiligen Verse des #E Avesta#!, an, in deren Worten die Weisheit von #E Zarathushtra#!. widerhallte. Fromme Gemeindemitglieder saßen auf gewebten Matten, die Augen vor Ehrfurcht geschlossen, und nahmen die spirituellen Lehren und moralischen Gebote auf, die über Generationen hinweg weitergegeben wurden. Bei diesen Rezitationen handelte es sich nicht nur um Klänge, sondern um lebendige Traditionen, die die Gläubigen mit ihrem göttlichen Erbe verbanden und ihr tägliches Leben leiteten.>  #NT!
 me_parthia.302.a: "Fascinating..."  #<Faszinierend...>  #NT!
 me_parthia.303.t: "$parthia_missions_84$"  #<$parthia_missions_84$>  #NT!
 me_parthia.303.desc: "The changes of seasons and flames in the #E Fire Temples#! marked the changing of the days according to the #E Zoroastrian#! calendar, guiding farmers when to sow and harvest. Families meticulously observed the dedications of each day and month, offering specific prayers and performing rituals to honor the #E Yazatas#!. #E Nowruz#!, the spring equinox, was the most joyous occasion, celebrated as the renewal of creation and the triumph of light, uniting communities in vibrant festivities."  #<Der Wechsel der Jahreszeiten und der Flammen in den #E Feuertempeln#! markierte den Wechsel der Tage gemäß dem #E zoroastrischen #! Kalender und gab den Bauern Hinweise darauf, wann sie säen und ernten sollten. Die Familien hielten sich sorgfältig an die Widmungen jedes Tages und Monats, sprachen spezifische Gebete und führten Rituale durch, um die #E Yazatas#! zu ehren. #E Nowruz#!, die Frühlings-Tagundnachtgleiche, war der freudigste Anlass, der als Erneuerung der Schöpfung und Triumph des Lichts gefeiert wurde und Gemeinschaften in lebhaften Festlichkeiten vereinte.>  #NT!
 me_parthia.303.a: "From one day to the next..."  #<Von einem Tag auf den anderen...>  #NT!
 me_parthia.304.t: "$parthia_missions_85$"  #<$parthia_missions_85$>  #NT!
 me_parthia.304.desc: "From distant villages and bustling trade routes, pilgrims journeyed towards #E Hagmatana#!, their hearts alight with anticipation to witness the revered #E Great Fire Temple#!. As they approached the Median capital, the sacred flame's glow was said to be visible for miles, a beacon of divine presence. Inside, amidst the flickering light and fragrant incense, they offered their prayers, feeling a profound connection to #E Ahura Mazda#! and the ancient traditions."  #<Von entfernten Dörfern und über geschäftige Handelsrouten reisten Pilger in Richtung #E Hagmatana#!,. Ihr Herz war voller Vorfreude, Zeuge des verehrten #E Großen Feuertempels#!. zu werden. Als sie sich der medianen Hauptstadt näherten, soll das Leuchten der heiligen Flamme kilometerweit sichtbar gewesen sein, ein Leuchtfeuer göttlicher Präsenz. Drinnen, inmitten des flackernden Lichts und des duftenden Weihrauchs, sprachen sie ihre Gebete und fühlten eine tiefe Verbindung zu #E Ahura Mazda#! und den alten Traditionen.>  #NT!
 me_parthia.304.a: "All followers must visit here sometime"  #<Alle Follower müssen hier einmal vorbeischauen>  #NT!
 me_parthia.305.t: "$parthia_missions_86$"  #<$parthia_missions_86$>  #NT!
 me_parthia.305.desc: "The Magi, priestly class tied to Median nobility, hold incredible sway across the Iranian land. Some say they are imbued with the power of #E Magikos#!, convincing words, and knowledge from ages long gone. It is quite obvious it is in our best interest to live well with this class, as they can prove crucial for stability and harmony of the realm."  #<Die Magier, eine Priesterklasse, die mit dem medischen Adel verbunden ist, üben im gesamten iranischen Land eine unglaubliche Macht aus. Manche sagen, sie seien erfüllt von der Kraft #E Magikos#!, überzeugender Worte und dem Wissen aus längst vergangenen Zeiten. Es ist ganz offensichtlich, dass es in unserem besten Interesse ist, mit dieser Klasse gut zusammenzuleben, da sie sich als entscheidend für die Stabilität und Harmonie des Reiches erweisen kann.>  #NT!
 me_parthia.305.a: "Let's just hope they won't become too influential"  #<Hoffen wir nur, dass sie nicht zu einflussreich werden>  #NT!
 me_parthia.306.t: "$parthia_missions_87$"  #<$parthia_missions_87$>  #NT!
 me_parthia.306.desc: "Among all the gods, #E Mithra#! is the most ancient and most holy. The exalted one has chosen us to lead all of our people to greatness. Let this land henceforth be known as #E The Land of the Lord of Light#!!"  #<Unter allen Göttern ist #E Mithra#! der älteste und heiligste. Der Erhabene hat uns auserwählt, alle unsere Leute zur Größe zu führen. Möge dieses Land von nun an als #E Das Land des Herrn des Lichts#! bekannt sein!>  #NT!
 me_parthia.306.a: "Glory be to Mithra!"  #<Ehre sei Mithra!>  #NT!
 me_parthia.307.t: "$parthia_missions_89$"  #<$parthia_missions_89$>  #NT!
 me_parthia.307.desc: "#E 'The Giver of Rule,'#! - one of Mithra's epithets - is indicative of his nature and central to our beliefs. It represents his divine right to give blessings unto rulers. We must honor the #E Giver of Rules'#! title and show that we are just to our subjects, extending Mithra's grace on this mortal realm."  #<#E „Der Geber der Herrschaft“, #! – einer von Mithras Beinamen – ist bezeichnend für seine Natur und von zentraler Bedeutung für unseren Glauben. Es stellt sein göttliches Recht dar, den Herrschern Segen zu geben. Wir müssen den Titel #E Geber der Regeln#! ehren und zeigen, dass wir unseren Untertanen gegenüber gerecht sind, indem wir Mithras Gnade auf dieses Reich der Sterblichen ausweiten.>  #NT!
 me_parthia.307.a: "Let all know his wisdom"  #<Lassen Sie alle seine Weisheit erfahren>  #NT!
 me_parthia.308.t: "$parthia_missions_90$"  #<$parthia_missions_90$>  #NT!
 me_parthia.308.desc: "Apollo, god to many Yauna (Greeks), is notably similar to Mithra. They share iconography and themes of the light, the sun, and the law. Perhaps they are indeed representatives of the same true god, known only be a different name."  #<Apollo, der Gott vieler Yauna (Griechen), ist Mithra besonders ähnlich. Sie teilen die Ikonographie und die Themen Licht, Sonne und Gesetz. Vielleicht sind sie tatsächlich Vertreter desselben wahren Gottes, der nur unter einem anderen Namen bekannt ist.>  #NT!
 me_parthia.308.a: "This brings our Greek subjects closer"  #<Dies bringt unsere griechischen Untertanen näher>  #NT!
 me_parthia.309.t: "$parthia_missions_91$"  #<$parthia_missions_91$>  #NT!
 me_parthia.309.desc: "Located in the heart of the sacred land of #E Arshak#! is the Great Fire of the #E Arsacids#! — a flame that has burned since the days of our forefathers, tended without cease by the chosen magi of the royal line. More than a ritual hearth, this holy fire is a living symbol of our eternal pact with the great god #E Mithra#!, guardian of truth, oath, and righteous order.\n\nIts blaze reflects our unbroken commitment to uphold the divine #E Ash#!a, the cosmic truth, and to spread the light of #E Mithra's#! justice across all the lands under heaven. As long as it burns, so too shall the will of the #E Arsacids#! shine forth as beacons of piety, strength, and imperial destiny."  #<Im Herzen des heiligen Landes #E Arshak#! befindet sich das Große Feuer der #E Arsakiden#! – eine Flamme, die seit den Tagen unserer Vorfahren brennt und von den auserwählten Magiern der königlichen Linie ohne Unterlass gepflegt wird. Dieses heilige Feuer ist mehr als ein ritueller Herd, es ist ein lebendiges Symbol unseres ewigen Pakts mit dem großen Gott #E Mithra#!, dem Hüter der Wahrheit, des Eides und der gerechten Ordnung.\n\nSein Feuer spiegelt unsere ungebrochene Verpflichtung wider, die göttliche #E Ash#!a, die kosmische Wahrheit, aufrechtzuerhalten und das Licht der Gerechtigkeit von #E Mithra#! über alle Welt zu verbreiten landet unter dem Himmel. Solange es brennt, wird auch der Wille der #E Arsakiden#! als Leuchtfeuer der Frömmigkeit, Stärke und kaiserlichen Bestimmung erstrahlen.>  #NT!
 me_parthia.309.a: "It shall burn forever"  #<Es wird für immer brennen>  #NT!
 me_parthia.310.t: "$parthia_missions_92$"  #<$parthia_missions_92$>  #NT!
 me_parthia.310.desc: "To be imbued with Kharenah, or Khvarenah is to be imbued with divine glory and spleandor. The only being in the whole of the Universe who may imbue Kharenah is that of the great Mithra. And by his holy light's grace, our leader, great #E King of Kings [ROOT.GetCountry.GetRuler.GetName]#!, has been imbued with this power."  #<Von Kharenah oder Khvarenah durchdrungen zu sein bedeutet, von göttlicher Herrlichkeit und Pracht durchdrungen zu sein. Das einzige Wesen im gesamten Universum, das Kharenah durchdringen kann, ist das des großen Mithra. Und durch die Gnade seines heiligen Lichts wurde unser Anführer, der große #E König der Könige [ROOT.GetCountry.GetRuler.GetName]#!,, mit dieser Macht erfüllt.>  #NT!
 me_parthia.310.a: "Glory be to our holy dynasty!"  #<Ehre sei unserer heiligen Dynastie!>  #NT!
 me_parthia.311.t: "$parthia_missions_93$"  #<$parthia_missions_93$>  #NT!
 me_parthia.311.desc: "The founder of this great empire we have built, lord #E Arsaces#!, imbued with #E Kharenah#!, molded by #E Fire#!, and shines like a reflection of #E Mithra#! has achieved divinity in his achievements."  #<Der Gründer dieses großen Reiches, das wir aufgebaut haben, Herr #E Arsaces#!,, durchdrungen von #E Kharenah#!,, geformt von #E Feuer#!, und strahlt wie ein Spiegelbild von #E Mithra#!, hat in seinen Errungenschaften Göttlichkeit erlangt.>  #NT!
 me_parthia.311.a: "All hail the godly [ROOT.GetCountry.GetRuler.GetName]!"  #<Alle grüßen die Göttlichen [ROOT.GetCountry.GetRuler.GetName]!>  #NT!
  
 me_parthia.320.t: "$parthia_missions_109$"  #<$parthia_missions_109$>  #NT!
 me_parthia.320.desc: "To properly adopt and observe the worship of the [GetReligion('roman_pantheon').GetName] gods we have had to learn a series of new rituals, and proclaimed Greek, what could arguably be called the most fashionable language of our times, as the language of worhsip. This has, in turn, meant that demand fir anyone who speaks Greek has increased, and many of our new priestly class may be of... less than ideal morality.\n\nWe must ensure that the shortcomings of this new priestly class are only temporary and a mere symptom of change."  #<Um die Verehrung der [GetReligion('roman_pantheon').GetName]-Götter richtig zu übernehmen und zu beobachten, mussten wir eine Reihe neuer Rituale erlernen und Griechisch, die wohl modischste Sprache unserer Zeit, zur Sprache der Anbetung erklären. Dies hat wiederum dazu geführt, dass die Nachfrage nach jedem, der Griechisch spricht, gestiegen ist und viele unserer neuen Priesterklasse möglicherweise ... nicht der idealen Moral angehören.\n\nWir müssen sicherstellen, dass die Mängel dieser neuen Priesterklasse nur vorübergehend und lediglich ein Symptom des Wandels sind.>  #NT!
 me_parthia.320.a: "Apotheosis!"  #<Apotheose!>  #NT!
 me_parthia.321.t: "$parthia_missions_110$"  #<$parthia_missions_110$>  #NT!
 me_parthia.321.desc: "The Cult of #E Zeus-Oromasdes#! has been spread to us. It has has become popular throughout our #E Zoroastrian#! provinces, despite being mostly associated with the #E Medians#!, and by extention, #E Mithraic#! practices. Adopting him will ultimately help our conversion rather than hinder it; rather than foreign gods our people will see them as variations on theirs."  #<Der Kult von #E Zeus-Oromasdes#! wurde zu uns verbreitet. Es ist in allen unseren #E zoroastrischen#! Provinzen populär geworden, obwohl es hauptsächlich mit den #E Medianen#! und im weiteren Sinne mit den #E mithraischen#! Praktiken in Verbindung gebracht wird. Ihn zu adoptieren wird letztendlich unserer Bekehrung eher helfen als sie behindern; Unser Volk wird sie nicht als fremde Götter, sondern als Variationen ihrer Götter betrachten.>  #NT!
 me_parthia.321.a: "Let's see what this is all about..."  #<Mal sehen, worum es geht...>  #NT!
 me_parthia.322.t: "$parthia_missions_111$"  #<$parthia_missions_111$>  #NT!
 me_parthia.322.desc: "The codification of the #E Avestas#! and their translation into #E Greek#! will not only appease the massive #E Zoroastrian#! population, but also further the understanding between both #E Greek and Iranian#! traditions. Who would have thought the people from the steppe would foster such advancements in #E Helleno-Persian#! knowledge!"  #<Die Kodifizierung der #E Avestas#! und ihre Übersetzung ins #E Griechische#! wird nicht nur die große #E zoroastrische#! Bevölkerung besänftigen, sondern auch das Verständnis zwischen den #E griechischen und iranischen#! Traditionen fördern. Wer hätte gedacht, dass die Menschen aus der Steppe solche Fortschritte im #E Helleno-Persisch#! Wissen fördern würden!>  #NT!
 me_parthia.322.a: "Translate, Codify, and Unify!"  #<Übersetzen, kodifizieren und vereinheitlichen!>  #NT!
 me_parthia.323.t: "$parthia_missions_112$"  #<$parthia_missions_112$>  #NT!
 me_parthia.323.desc: "In the arid villages of #E Persia#! the most practiced religion is, by a large margin, the old [GetReligion('zoroaster').GetName] rite. A precursor both to us and the #E Seleukids#! it still holds primacy over the land, it is it's own native faith.\n\nAs such, we have decided to adopt the Zoroastrian calendar for all civic purposes, that is, for everything but religious practice."  #<In den trockenen Dörfern #E Persiens#! ist mit großem Abstand der alte [GetReligion('zoroaster').GetName] Ritus die am häufigsten praktizierte Religion. Als Vorläufer sowohl für uns als auch für die #E Seleukiden#! hat er immer noch Vorrang vor dem Land, es ist sein eigener einheimischer Glaube.\n\nDaher haben wir beschlossen, den zoroastrischen Kalender für alle bürgerlichen Zwecke zu übernehmen, also für alles außer der religiösen Praxis.>  #NT!
 me_parthia.323.a: "A necessary compromise."  #<Ein notwendiger Kompromiss.>  #NT!
 me_parthia.324.t: "$parthia_missions_113$"  #<$parthia_missions_113$>  #NT!
 me_parthia.324.desc: "''It would be most beautiful, and would please the heavens, if we made this great temple a mirror to the society it serves.'' said [SCOPE.sChar('prnzeeeeal').GetPraenomen]. Some religious fanatics started causing a ruckus in the back of the crowd, swearing heresy and had to be carried away by armed guards. Matters of religion are always bound to cause dissent. He breathed in, and continued.\n\n''And as such, this temple is now bigger than itself, it is the manifestation of the kingdom and the dialogue between the wise among us all, it is a shrine to all of us. A floor for [GetReligion('mithra_religion').GetName]#E s#!, a floor for [GetReligion('zoroaster').GetName]#E s#!, a floor for [GetReligion('roman_pantheon').GetName]#E s#!, and a house for all!''"  #<„Es wäre am schönsten und würde den Himmel erfreuen, wenn wir diesen großen Tempel zu einem Spiegel der Gesellschaft machen würden, der er dient.“ sagte [SCOPE.sChar('prnzeeeeal').GetPraenomen]. Einige religiöse Fanatiker verursachten im hinteren Teil der Menge Aufruhr, schworen Ketzerei und mussten von bewaffneten Wachen weggetragen werden. Religiöse Angelegenheiten müssen immer zu Meinungsverschiedenheiten führen. Er atmete ein und fuhr fort.\n\n''Und als solcher ist dieser Tempel jetzt größer als er selbst, er ist die Manifestation des Königreichs und des Dialogs zwischen den Weisen unter uns allen, er ist ein Schrein für uns alle. Eine Etage für [GetReligion('mithra_religion').GetName]#E s#!, eine Etage für [GetReligion('zoroaster').GetName]#E s#!, eine Etage für [GetReligion('roman_pantheon').GetName]#E s#!, und ein Haus für alle!''>  #NT!
 me_parthia.324.a: "Praise your gods!"  #<Lobet eure Götter!>  #NT!
 me_parthia.325.t: "$parthia_missions_114$"  #<$parthia_missions_114$>  #NT!
 me_parthia.325.desc: "A council was thus convened in old [GetProvince('(int32)1627').GetName], at the temple of worship to #E Zoroaster#!, between the Zoroastrian priests and the Parthians. And with great pomp arrived there both [SCOPE.sChar('prnpriiest').GetName] and [ROOT.GetCountry.GetRuler.GetName]. \n\nThe Magi, the name of these priests, were not only wise but also had significant influence in our Zoroastrian population, and they demanded recognition for their traditions, equal access to government offices, and that they be able to teach on equal par with the philosophies and theologies of the rest.\n\nAt one of the intervals between negotiations, [SCOPE.sChar('prnpriiest').GetFirstName] turned to [ROOT.GetCountry.GetRuler.GetFirstName] and lamented ''With each day that passes it seems that our decision to convert to [GetReligion('roman_pantheon').GetName] mattered less. We might as well worship all the gods...'' [ROOT.GetCountry.GetRuler.GetFirstName] shrugged."  #<Daher wurde im alten [GetProvince('(int32)1627').GetName] im Tempel der Anbetung des #E Zoroaster#!, ein Rat zwischen den zoroastrischen Priestern und den Parthern einberufen. Und mit großem Pomp kamen dort sowohl [SCOPE.sChar('prnpriiest').GetName] als auch [ROOT.GetCountry.GetRuler.GetName] an. \n\nDie Magier, so der Name dieser Priester, waren nicht nur weise, sondern hatten auch erheblichen Einfluss auf unsere zoroastrische Bevölkerung, und sie forderten Anerkennung für ihre Traditionen, gleichberechtigten Zugang zu Regierungsämtern und dass sie in der Lage sein sollten, auf Augenhöhe mit den Philosophien und Theologien der anderen zu lehren.\n\nIn einer der Pausen zwischen den Verhandlungen wandte sich [SCOPE.sChar('prnpriiest').GetFirstName] an [ROOT.GetCountry.GetRuler.GetFirstName] und beklagte sich: „Mit jedem Tag, der vergeht, scheint es, dass unsere Entscheidung, zu konvertieren.“ bis [GetReligion('roman_pantheon').GetName] war weniger wichtig. Wir könnten genauso gut alle Götter anbeten...'' [ROOT.GetCountry.GetRuler.GetFirstName] zuckte mit den Schultern.>  #NT!
 me_parthia.325.a: "At least there's peace."  #<Wenigstens herrscht Ruhe.>  #NT!
 me_parthia.326.t: "$parthia_missions_115$"  #<$parthia_missions_115$>  #NT!
 me_parthia.326.desc: "On a lotus stands Apollo-Mithras, ever-watchful, and all-seeing from the light that from him emanates, none fool him, and prophecy is his. This juncture of two traditions, from the far Greek west and our lands, is an example of the power the contact between different gods has, and many places such as [GetProvince('(int32)4993').GetName] have been swept by his worship."  #<Auf einem Lotus steht Apollo-Mithras, immer wachsam und allsehend durch das Licht, das von ihm ausgeht, niemand täuscht ihn, und die Prophezeiung ist sein. Diese Verbindung zweier Traditionen aus dem äußersten griechischen Westen und unseren Ländern ist ein Beispiel für die Macht, die der Kontakt zwischen verschiedenen Göttern hat, und viele Orte wie [GetProvince('(int32)4993').GetName] wurden von seiner Verehrung erfasst.>  #NT!
 me_parthia.326.a: "Praise be!"  #<Lob sei!>  #NT!
 me_parthia.327.t: "$parthia_missions_116$"  #<$parthia_missions_116$>  #NT!
 me_parthia.327.desc: "As Zoroastrian and Greek gods converge into a more unified Helleno-Parthian religious customs, it's becoming more and more evident that there's not that much separating the Hellenes and the natives of the Iranian lands. This is to be celebrated and encouraged further still."  #<Da zoroastrische und griechische Götter zu einheitlicheren helleno-parthischen religiösen Bräuchen zusammenwachsen, wird es immer offensichtlicher, dass es zwischen den Hellenen und den Ureinwohnern der iranischen Länder keinen allzu großen Unterschied gibt. Dies gilt es noch weiter zu feiern und zu fördern.>  #NT!
 me_parthia.327.a: "Till all are one"  #<Bis alle eins sind>  #NT!
 me_parthia.328.t: "$parthia_missions_117$"  #<$parthia_missions_117$>  #NT!
 me_parthia.328.desc: "The recent building projects in one of the less-developed areas of [ROOT.GetCountry.GetCapital.GetName] was culminated with a statue between all the new buildings; one of [GetDeityDefinition('omen_apollo_mithras').GetName] with a bow shooting down the terrifying beast #E Python#!, was at first praised for its artistry (surely done with the god's blessing), and now is also a place of worship to the deity. Our capital is now surely protected from darkness and ignorance by the god."  #<Die jüngsten Bauprojekte in einem der weniger entwickelten Gebiete von [ROOT.GetCountry.GetCapital.GetName] fanden ihren Höhepunkt mit einer Statue zwischen allen neuen Gebäuden; einer von [GetDeityDefinition('omen_apollo_mithras').GetName] mit einem Bogen, der das schreckliche Tier niederschießt #E Python#!, wurde zunächst für seine Kunstfertigkeit gelobt (sicherlich mit dem Segen des Gottes geschaffen) und ist jetzt auch ein Ort der Verehrung der Gottheit. Unsere Hauptstadt wird jetzt sicherlich vom Gott vor Dunkelheit und Unwissenheit geschützt.>  #NT!
 me_parthia.328.a: "A masterpiece!"  #<Ein Meisterwerk!>  #NT!
 me_parthia.329.t: "$parthia_missions_118$"  #<$parthia_missions_118$>  #NT!
 me_parthia.329.desc: "In a solemn ceremony for the court and some foreign dignitaries, the most experienced soldiers of our army gathered to worship [GetDeityDefinition('omen_herakles_artagnes').GetName] in one of the most striking experiences one has seen.\n\nIn one holy field dedicated to the god, the men got into formation, started chanting as loud as they could, and marched on a battalion made up of prisoners of war. Just as the blade readied to satiate its unrelenting thirst, the men kneeled and swore an oath to [GetDeityDefinition('omen_herakles_artagnes').GetName], asking for his protection in battle and then made offerings in blood on that very same field. Then, later on, they painted every single one of their shields with images of the god, so that in battle they may form a sight to make any enemy tremble."  #<In einer feierlichen Zeremonie für den Hof und einige ausländische Würdenträger versammelten sich die erfahrensten Soldaten unserer Armee, um [GetDeityDefinition('omen_herakles_artagnes').GetName] zu verehren, eine der beeindruckendsten Erfahrungen, die man je gesehen hat.\n\nAuf einem heiligen Feld, das dem Gott gewidmet war, stellten sich die Männer in Formation auf, begannen, so laut sie konnten zu singen, und marschierten auf ein Bataillon zu, das aus Kriegsgefangenen bestand. Gerade als die Klinge bereit war, ihren unerbittlichen Durst zu stillen, knieten die Männer nieder und schworen [GetDeityDefinition('omen_herakles_artagnes').GetName] einen Eid, baten um seinen Schutz im Kampf und brachten dann auf demselben Feld Blutopfer dar. Später bemalten sie jeden einzelnen ihrer Schilde mit Bildern des Gottes, damit sie im Kampf einen Anblick boten, der jeden Feind erzittern ließ.>  #NT!
 me_parthia.329.a: "A dizzying amount of holiness!"  #<Ein schwindelerregendes Maß an Heiligkeit!>  #NT!
 me_parthia.330.t: "$parthia_missions_119$"  #<$parthia_missions_119$>  #NT!
 me_parthia.330.desc: "Throughout our land, and especially in [GetProvince('(int32)1595').GetName], the influence of the goddess Aphrodite-Anaitis is keenly felt. As the divine guardian of love, fertility, and sacred waters, her presence graces both temple and hearth. In this era of learning and prosperity, it is not only reason that guides us, but also the gentle strength of affection, beauty, and union.\n\nHer blessings have softened hearts, strengthened families, and brought harmony where strife once lingered."  #<Überall in unserem Land und besonders in [GetProvince('(int32)1595').GetName] ist der Einfluss der Göttin Aphrodite-Anaitis deutlich zu spüren. Als göttliche Hüterin der Liebe, der Fruchtbarkeit und des heiligen Wassers ziert ihre Gegenwart sowohl den Tempel als auch den Herd. In diesem Zeitalter des Lernens und des Wohlstands ist es nicht nur die Vernunft, die uns leitet, sondern auch die sanfte Kraft der Zuneigung, Schönheit und Einheit.\n\nIhre Segnungen haben Herzen erweicht, Familien gestärkt und Harmonie gebracht, wo einst Streit herrschte.>  #NT!
 me_parthia.330.a: "We must not neglect love"  #<Wir dürfen die Liebe nicht vernachlässigen>  #NT!
 me_parthia.331.t: "$parthia_missions_121$"  #<$parthia_missions_121$>  #NT!
 me_parthia.331.desc: "Few could have the vison that the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] had to steer [ROOT.GetCountry.GetName] into this bright new future we find ourselves in; as we did away with the old gods and found new ones, this royal line is itself the spirit that elected our people to be guided into a new destiny. As such, from today on a royal cult of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] has been instituted; they are holy and deserving of worship."  #<Nur wenige könnten die Vision haben, dass die [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] [ROOT.GetCountry.GetName] in diese strahlende neue Zukunft steuern musste, in der wir uns befinden; Als wir die alten Götter abschafften und neue gründeten, ist diese königliche Linie selbst der Geist, der unser Volk dazu auserwählt hat, in ein neues Schicksal geführt zu werden. Daher wurde von heute an ein königlicher Kult des [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] eingeführt; Sie sind heilig und verdienen Anbetung.>  #NT!
 me_parthia.331.a: "Magnificent"  #<Herrlich>  #NT!
 #me_parthia.331.tt: "[deification_scope.GetName] has been deified as [GetDeityDefinition('omen_zeus_oromasdes').GetName|Y]!"  #<[deification_scope.GetName] wurde als [GetDeityDefinition('omen_zeus_oromasdes').GetName|Y] vergöttert!>  #NT!
  
