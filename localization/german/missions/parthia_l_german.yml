 parthia_missions_140_DESC: "$parthia_missions_85_DESC$"  #<$parthia_missions_85_DESC$>  #NT!
 parthia_missions_141: "Magi Masters Of Mazdayasna"  #<Magi-Meister von Mazdayasna>  #NT!
 parthia_missions_141_DESC: "Perhaps the greatest religious entity in the whole of Iran, the Magi are the priestly class tied to Median nobility.\n\n\n\n\n\n\n\n\n\n@persia_mil2!"  #<Die Magier, die vielleicht größte religiöse Einheit im gesamten Iran, sind die Priesterklasse, die an den medianen Adel gebunden ist.\n\n\n\n\n\n\n\n\n\n@persia_mil2!>  #NT!
 parthia_missions_142: "The Wise Lord"  #<Der weise Herr>  #NT!
 parthia_missions_142_DESC: "To his followers, Ahura Mazda was revered as "The Wise Lord," the uncreated, benevolent creator of all that is good and orderly in the universe. They believed he embodied ultimate wisdom, truth, and light, guiding humanity towards righteousness and opposing the forces of chaos and darkness.\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Von seinen Anhängern wurde Ahura Mazda als „der weise Herr“ verehrt, der ungeschaffene, gütige Schöpfer von allem, was im Universum gut und geordnet ist. Sie glaubten, dass er die ultimative Weisheit, Wahrheit und das Licht verkörperte, die Menschheit zur Gerechtigkeit führte und sich den Kräften des Chaos und der Dunkelheit widersetzte.\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
 parthia_missions_143: "Yazata Of Oaths, Of Justice"  #<Yazata der Eide, der Gerechtigkeit>  #NT!
 parthia_missions_143_DESC: "$parthia_missions_81_DESC$"  #<$parthia_missions_81_DESC$>  #NT!
 parthia_missions_144: "Mazdayan Mandates"  #<Mazdayan-Mandate>  #NT!
 parthia_missions_144_DESC: "$parthia_missions_82_DESC$"  #<$parthia_missions_82_DESC$>  #NT!
 parthia_missions_145: "Giver Of Rule"  #<Regelgeber>  #NT!
 parthia_missions_145_DESC: "$parthia_missions_89_DESC$"  #<$parthia_missions_89_DESC$>  #NT!
 parthia_missions_146: "Lord Of The Sky"  #<Herr des Himmels>  #NT!
 parthia_missions_146_DESC: "The god Zeus, worshipped by many #Y Yauna (Greeks)#!, is notably similar to Ahura Mazda. Many #Y Yauna#! have begun to worship a mixture of the Wise Lord and Zeus called as #G Zeus-Oromazdes#!. Perhaps they are indeed one and the same, different only by the name we call them.\n\n\n\n\n\n\n\n\n\n@celt_mil1!"  #<Der Gott Zeus, der von vielen #Y Yauna (Griechen)#!, verehrt wird, ist Ahura Mazda besonders ähnlich. Viele #Y Yauna#! haben begonnen, eine Mischung aus dem weisen Herrn und Zeus anzubeten, die als #G Zeus-Oromazdes#! bezeichnet wird. Vielleicht sind sie tatsächlich ein und dasselbe und unterscheiden sich nur durch den Namen, den wir ihnen geben.\n\n\n\n\n\n\n\n\n\n@celt_mil1!>  #NT!
 parthia_missions_147: "101 Names Of The Lord"  #<101 Namen des Herrn>  #NT!
 parthia_missions_147_DESC: "The Wise Lord #G Ahuramazda#! has allowed our great #E Shahenshah#! his rule. However, in order to keep it, he must remember and emulate every one of the #T 101 epithets#! of the Lord. They are as follows:\n\nYazat, Yarvasp-Tavãn, Harvasp-Âgâh, Harvasp-H'udhâ, Abadah, Awî-Añjâm, Bûnastah, Frâxtañtah, Jamakh, Parjahtarah, Tum-Afayah, Abravañt, Parvañdah, An-Ayâfah, Ham-Ayâfah, Âdharô, Gîrâ, Acim, Cimnâ, Safinâ, Âwzâ, Nâshâ, Parvarâ, Âyânah, Âyaîn-Âyânah, An-Âyanah, Xraoshît-Tum, Mînôtum, Vâsnâ, Harvastum, Husipâs, Har-Hemît, Harnekfareh, Beshtarnâ, Tarônîs, Anaoshak, Farashak, Pazohadhad, Xavâpar, Awaxshâyâ, Awarzâ, Â-Sitôh, Raxôh, Varûn, A-Frîpah, Awe-Frîftah, Adhvaî, Kãme-Rat, Frãmãn-Kãm, Âyextan, Â-Framôsh, Hamârnâ, Snâyâ, A-Tars, A-Bîsh, A-Frâzdum, Hamcûn, Mînô-Stîgar, A-Mînôgar, Mînô-Nahab, Âdhar-Bâtgar, Âdhar-Namgar, Bât-Âdhargar, Bât-Namgar, Bât-Gelgar, Bât-Girdtum, Âdhar-Kîbarît-Tum, Bâtgarjâi, Âwtum, Gel-Âdhargar, Gel-Vâdhgar, Gel-Namgar, Gargar, Garôgar, Garâgar, Garâgargar, A-Garâgar, A-Garâgargar, A-Gûmãn, A-Jamãn, A-H'uãn, Âmushthushyâr, Frashûtanâ, Padhamãnî, Pîrôzgar, H'udhâvañd, Ahuramazda, Abarînkuhantavãn, Abarîn-Nô-Tavã, Vaspãn, Vaspâr, H'âwar, Ahû, Âwaxsîdâr, Dâdhâr, Rayomañd, H'arehmand, Dâwar, Kerfagar, Buxtâr, and Frashôgar.\n\n\n\n\n\n\n\n\n\n@egypt_mil28!"  #<Der weise Herr #G Ahuramazda#! hat unserem großen #E Shahenshah#! seine Herrschaft gestattet. Um es jedoch zu bewahren, muss er sich an jeden einzelnen der #T 101 Beinamen#! des Herrn erinnern und ihn nachahmen. Sie sind wie folgt:\n\nYazat, Yarvasp-Tavãn, Harvasp-Âgâh, Harvasp-H'udhâ, Abadah, Awî-Añjâm, Bûnastah, Frâxtañtah, Jamakh, Parjahtarah, Tum-Afayah, Abravañt, Parvañdah, An-Ayâfah, Ham-Ayâfah, Âdharô, Gîrâ, Acim, Cimnâ, Safinâ, Âwzâ, Nâshâ, Parvarâ, Âyânah, Âyaîn-Âyânah, An-Âyanah, Farashak, Pazohadhad, A-Frâzdum, Hamcûn, Mînô-Stîgar, A-Mînôgar, Mînô-Nahab, Âdhar-Bâtgar, Âdhar-Namgar, Bât-Âdhargar, Bât-Namgar, Bât-Gelgar, Bât-Girdtum, Âdhar-Kîbarît-Tum, Bâtgarjâi, Âwtum, Gel-Âdhargar, Gel-Vâdhgar, Gel-Namgar, Gargar, Garôgar, Garâgar, Garâgargar, A-Garâgar, A-Garâgargar, A-Gûmãn, A-Jamãn, A-H'uãn, Âmushthushyâr, Frashûtanâ, Padhamãnî, Pîrôzgar, H'udhâvañd, Ahuramazda, Abarînkuhantavãn, Abarîn-Nô-Tavã, Vaspãn, Vaspâr, H'âwar, Ahû, Âwaxsîdâr, Dâdhâr, Rayomañd, H'arehmand, Dâwar, Kerfagar, Buxtâr und Frashôgar.\n\n\n\n\n\n\n\n\n\n@egypt_mil28!>  #NT!
 parthia_missions_148: "Fire Of The King Of Kings"  #<Feuer des Königs der Könige>  #NT!
 parthia_missions_148_DESC: "Located in the titular #E Arshak#! is located the Great Fire of the Arsacids."  #<Im Titel #E Arshak#! befindet sich das Große Feuer der Arsakiden.>  #NT!
 parthia_missions_149: "Imbued With Kharenah"  #<Durchdrungen von Kharenah>  #NT!
 parthia_missions_149_DESC: "To be imbued with #T Kharenah#!, or #T Khvarenah#! is to be imbued with divine glory and spleandor. The only being in the whole of the Universe who #G Ahuramazda#! has given the responsibility of imbuing #T Kharenah#! is that of the Yazata #G Mithra#!. And by his holy light can our leader, great #E King of Kings [ROOT.GetCountry.GetRuler.GetName]#!, be imbued with this power.\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<Von #T Kharenah#!, oder #T Khvarenah#! erfüllt zu sein bedeutet, von göttlicher Herrlichkeit und Pracht erfüllt zu sein. Das einzige Wesen im gesamten Universum, dem #G Ahuramazda#! die Verantwortung übertragen hat, #T Kharenah#! zu durchdringen, ist das des Yazata #G Mithra#!. Und durch sein heiliges Licht kann unser Anführer, der große #!,0 König der Könige #!,1#!,, mit dieser Macht erfüllt werden.\n\n\n\n\n\n\n\n\n\n@greek_mil2!>  #NT!
 parthia_missions_150: "Arsaces, The Divine"  #<Arsaces, das Göttliche>  #NT!
 parthia_missions_150_DESC: "The founder of this great empire we have built, lord #E Arsaces#!, imbued with #E Kharenah#!, molded by #E Fire#!, and shines like a reflection of #E Mithra#! has achieved divinity in his achievements.\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Der Gründer dieses großen Reiches, das wir aufgebaut haben, Herr #E Arsaces#!,, durchdrungen von #E Kharenah#!,, geformt von #E Feuer#!, und strahlt wie ein Spiegelbild von #E Mithra#!, hat in seinen Errungenschaften Göttlichkeit erlangt.\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
 # parthia_missions_151: "The Great Temple Of Mehri"  #<Der Große Tempel von Mehri>  #NT!
 # parthia_missions_151_DESC: "During the times of #E Atropates#! rule, Phraata was home to a great fire temple. We should expand this to show that the light of Mithra shall never fade from where it touches."  #<Zur Zeit der Herrschaft von #E Atropates#! befand sich in Phraata ein großer Feuertempel. Wir sollten dies erweitern, um zu zeigen, dass das Licht Mithras niemals dort verblassen wird, wo es es berührt.>  #NT!
  
 # Treasures, Decisions Etc. 
 parthia_defect_to: "Defect to Parthia"  #<Übertritt nach Parthia>  #NT!
 parthia_defect_to_desc: "With our lands occupied and our overlord all but defeated, we must consider switching allegiances."  #<Da unsere Ländereien besetzt und unser Oberherr so gut wie besiegt ist, müssen wir darüber nachdenken, unsere Loyalität zu wechseln.>  #NT!
 parthia_defect_to.tt: "We will defect to Parthian overlordship as a March."  #<Wir werden als Marsch zur parthischen Oberherrschaft überlaufen.>  #NT!
 parthia_request_march: "Request becoming a March"  #<Anfrage wird zu einem März>  #NT!
 parthia_request_march_desc: "We have a choice to submit ourselves to stronger power; if we refuse, then we face the prospect of war."  #<Wir haben die Wahl, uns einer stärkeren Macht zu unterwerfen; Wenn wir uns weigern, droht uns ein Krieg.>  #NT!
 parthia_request_march.tt: "We will become #G March#! of the #G Parthians#!."  #<Wir werden #G März#! der #G Parther#!.>  #NT!
 pth_wooing_ARM_friendship: "#R Sophene and Corduene#! Friendship Between Rulers"  #<#R Sophene und Corduene#! Freundschaft zwischen Herrschern>  #NT!
 pth_wooing_ARM_friendship_desc: "Our wise ruler has used his close friendship with foreign kings to impress them and show the benefits of forming closer ties with us. This will draw the Armenian subjects closer to our sphere of influence."  #<Unser weiser Herrscher hat seine enge Freundschaft mit ausländischen Königen genutzt, um sie zu beeindrucken und ihnen die Vorteile einer engeren Bindung zu uns zu zeigen. Dies wird die armenischen Untertanen näher an unseren Einflussbereich heranführen.>  #NT!
 pth_wooing_ARM_insult: "#R Sophene and Corduene#! Diplomatic Insult"  #<#R Sophene und Corduene#! Diplomatische Beleidigung>  #NT!
 pth_wooing_ARM_insult_desc: "The viscious diplomatic insult that we recently inflicted upon [GetCountry('ARM').GetName|R] has had its intended effect, and [GetCountry('ARM').GetRuler.GetName|Y]'s inability to mount a decisive response has made him look weak in the eyes of his subjects. This will draw #E Sophene#! and #E Corduene#! closer to our sphere of influence."  #<Die bösartige diplomatische Beleidigung, die wir [GetCountry('ARM').GetName|R] kürzlich zugefügt haben, hat ihre beabsichtigte Wirkung gezeigt, und die Unfähigkeit von [GetCountry('ARM').GetRuler.GetName|Y], eine entschlossene Antwort zu finden, hat ihn in den Augen seiner Untertanen schwach aussehen lassen. Dadurch werden #E Sophene#! und #E Corduene#! näher an unseren Einflussbereich heranrücken.>  #NT!
 pth_wooing_ARM_insult.tt: "We have insulted #G Armenia#!."  #<Wir haben #G Armenien#!. beleidigt>  #NT!
 pth_wooing_ARM_gifts: "#R Sophene and Corduene#! Bribes"  #<#R Sophene und Corduene#! Bestechungsgelder>  #NT!
 pth_wooing_ARM_gifts_desc: "The people of #E Corduene#! and #E Sophene#! were deeply impressed by the gifts we recently sent their way. This might be the right time to double down on our generosity and make an even bigger donation. Regardless of what we do, this will certainly draw Armenian periphery closer to our sphere of influence."  #<Die Menschen von #E Corduene#! und #E Sophene#! waren tief beeindruckt von den Geschenken, die wir ihnen kürzlich geschickt haben. Dies könnte der richtige Zeitpunkt sein, unsere Großzügigkeit zu verdoppeln und eine noch größere Spende zu leisten. Unabhängig davon, was wir tun, wird dies die armenische Peripherie sicherlich näher an unseren Einflussbereich heranführen.>  #NT!
 pth_wooing_ARM_posturing: "#R Sophene and Corduene#! Showing Strength"  #<#R Sophene und Corduene#! zeigen Stärke>  #NT!
 pth_wooing_ARM_posturing_desc: "The #E Parthian#! army is now a considerable force to be reckoned with, far larger and stronger than the disjointed levies of [GetCountry('ARM').GetName|G]. Without as much powerful force, [GetCountry('ARM').GetRuler.GetName|Y] will find it very difficult to continue exerting influence over their periphery. This will draw their subjects closer to our sphere of influence."  #<Die Armee der #E Parther#! ist mittlerweile eine beachtliche Streitmacht, mit der man rechnen muss, weitaus größer und stärker als die unzusammenhängenden Truppen von [GetCountry('ARM').GetName|G]. Ohne so viel Macht wird es für [GetCountry('ARM').GetRuler.GetName|Y] sehr schwierig sein, weiterhin Einfluss auf ihre Peripherie auszuüben. Dies wird ihre Untertanen näher an unseren Einflussbereich heranführen.>  #NT!
 pth_wooing_ARM_posturing.tt1: "We have stationed at least 1 army of #T 20 Units#! near the [GetCountry('SPH').GetAdjective|G] borders."  #<Wir haben mindestens 1 Armee von #T 20 Einheiten#! in der Nähe der [GetCountry('SPH').GetAdjective|G] Grenzen stationiert.>  #NT!
 pth_wooing_ARM_posturing.tt2: "We have stationed at least 1 army of #T 20 Units#! near the [GetCountry('CRD').GetAdjective|G] borders."  #<Wir haben mindestens 1 Armee von #T 20 Einheiten#! in der Nähe der [GetCountry('CRD').GetAdjective|G] Grenzen stationiert.>  #NT!
 pth_wooing_ARM_games: "#R Sophene and Corduene#! Games"  #<#R Sophene und Corduene#! Spiele>  #NT!
 pth_wooing_ARM_games_desc: "Perhaps the most visible sign of [GetCountry('ARM').GetAdjective|G] authority over their Assyrian subjects is the annual games in honor of the [GetCountry('ARM').GetAdjective|G] ruling family. If we were to sponsor our own games to rival the [GetCountry('ARM').GetAdjective|G] ones, it would certainly undermine their rule."  #<Das vielleicht sichtbarste Zeichen der [GetCountry('ARM').GetAdjective|G]-Autorität über ihre assyrischen Untertanen sind die jährlichen Spiele zu Ehren der [GetCountry('ARM').GetAdjective|G]-Herrscherfamilie. Wenn wir unsere eigenen Spiele sponsern würden, um mit denen von [GetCountry('ARM').GetAdjective|G] zu konkurrieren, würde dies sicherlich ihre Herrschaft untergraben.>  #NT!
 pth_wooing_demand_loyalty: "#R Sophene and Corduene#! Demand Loyalty"  #<#R Sophene und Corduene#! Fordern Sie Loyalität>  #NT!
 pth_wooing_demand_loyalty_desc: "The time has come to demand that Armenian peripheral subjects accept us as their new overlord. If they accept our offer, [GetCountry('SPH').GetName|G] and [GetCountry('CRD').GetName|G] will cease to be a subject of [GetCountry('ARM').GetName|G] and become part of our sphere of influence."  #<Es ist an der Zeit zu fordern, dass die armenischen Randgebiete uns als ihren neuen Oberherrn akzeptieren. Wenn sie unser Angebot annehmen, sind [GetCountry('SPH').GetName|G] und [GetCountry('CRD').GetName|G] nicht mehr Gegenstand von [GetCountry('ARM').GetName|G] und werden Teil unseres Einflussbereichs.>  #NT!
 pth_wooing_demand_loyalty.tt: "Our influence over [GetCountry('SPH').GetName|G] and [GetCountry('CRD').GetName|G] is sufficiently high (At least #R 12#!; currently it is: #Y [Player.MakeScope.Var('wooing_ARM_progress').GetValue|Y|0])."  #<Unser Einfluss auf [GetCountry('SPH').GetName|G] und [GetCountry('CRD').GetName|G] ist ausreichend groß (mindestens #R 12#!; derzeit: #Y [Player.MakeScope.Var('wooing_ARM_progress').GetValue|Y|0]).>  #NT!
 pth_jade_change: "Establish Jade Emporium"  #<Gründung des Jade Emporium>  #NT!
 pth_jade_change_desc: "We can choose a city that will become a jade trading hub."  #<Wir können eine Stadt wählen, die zu einem Jade-Handelszentrum wird.>  #NT!
 pth_jade_change.tt1: "Can establish Jade trade in a city."  #<Kann den Jadehandel in einer Stadt etablieren.>  #NT!
 pth_jade_change.tt2: "Has #E 3 [GetBuilding('workshop_building').GetName] Buldings#! in any city."  #<Hat #E 3 [GetBuilding('workshop_building').GetName] Gebäude#! in einer beliebigen Stadt.>  #NT!
 pth_jade_change.tt3: "We will get to choose in which city, with #E 3 [GetBuilding('workshop_building').GetName] Buldings#!, we will establish @jade! market, thus changing city's trade good."  #<Wir können wählen, in welcher Stadt wir @jade mit #E 3 [GetBuilding('workshop_building').GetName] Gebäuden#!, gründen werden! Markt und verändert so das Handelsgut der Stadt.>  #NT!
 pth_silk1_change: "Establish Silk Emporium"  #<Gründung von Silk Emporium>  #NT!
 pth_silk1_change_desc: "We can choose a city that will become a silk trading hub."  #<Wir können eine Stadt wählen, die zu einem Seidenhandelszentrum wird.>  #NT!
 pth_silk1_change.tt1: "Can establish Silk trade in a city."  #<Kann in einer Stadt einen Seidenhandel aufbauen.>  #NT!
 pth_silk1_change.tt2: "We will get to choose in which city, with #E 3 [GetBuilding('workshop_building').GetName] Buldings#!, we will establish @silk! market, thus changing city's trade good."  #<Wir können wählen, in welcher Stadt wir @silk mit #E 3 [GetBuilding('workshop_building').GetName] Gebäuden#!, gründen werden! Markt und verändert so das Handelsgut der Stadt.>  #NT!
 pth_silk_change.tt: "Has #E 3 [GetBuilding('workshop_building').GetName] Buldings#! in any city."  #<Hat #E 3 [GetBuilding('workshop_building').GetName] Gebäude#! in einer beliebigen Stadt.>  #NT!
