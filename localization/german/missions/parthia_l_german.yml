 # parthia_missions_13.tt: "#E #R For Horde Conquest wargoal branch:#!#! For having all of our Marches share our dynasty, we will gain Legitimacy and Political Influence.\n#E #T For Conquest wargoal branch:#!#! We will get an option to release Persis as our subject, or get country bonuses."  #<#E #R Für den Wargoal-Zweig „Horde Conquest“:#!#! Da alle unsere Marken unsere Dynastie teilen, erhalten wir Legitimität und politischen Einfluss.\n#E #T Für den Wargoal-Zweig „Conquest“:#!#! Wir erhalten die Option, Persis als unser Untertan freizulassen oder Länderboni zu erhalten.>  #NT!
  
