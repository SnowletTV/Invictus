l_german:
  
 # Events  #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 me_parthia_satrapy.1.t: "$parthia_satrapy_missions_1$"  #<$parthia_satrapy_missions_1$>  #NT!
 me_parthia_satrapy.1.desc: "Early one morning as the breakfast dishes were being cleared away, a group of religious advisors entered the chambers of [ROOT.GetCountry.GetRuler.GetName] with bashful looks on their faces, which caused the [ROOT.GetCountry.GetRulerTitle] to sit upright in [ROOT.GetCountry.GetRuler.GetHerHis] seat at once. Such visits were unexpected, especially the day after a public religious sacrifice had been made in [ROOT.GetCountry.GetCapital.GetName], and [ROOT.GetCountry.GetRuler.GetFirstName] was convinced that this breach of protocol heralded terrible news.\n\nHolding up an impatient hand, [ROOT.GetCountry.GetRuler.GetFirstName] dispensed with the formalities and beckoned the priests forward. 'Speak at once - tell me what is wrong.'\n\n'That's the thing, my [ROOT.GetCountry.GetRulerTitle] - things could not be better. After yesterday's sacrifice, the priests returned to their temple and made a startling discovery; two hundred talents of silver and gold had been discovered in their absence.'\n\n'Two hundred talents!' [ROOT.GetCountry.GetRuler.GetFirstName] let out a low whistle. 'How does one lose and find so much money?'\n\nBowing deeply, an advisor stepped forward, only to shrug.\n\n'Perhaps it was a gift from the gods...'"  #<Eines frühen Morgens, als das Frühstücksgeschirr abgeräumt wurde, betrat eine Gruppe religiöser Berater mit schüchternem Gesichtsausdruck die Räume von [ROOT.GetCountry.GetRuler.GetName], was dazu führte, dass der [ROOT.GetCountry.GetRulerTitle] sofort aufrecht auf dem Platz von [ROOT.GetCountry.GetRuler.GetHerHis] saß. Solche Besuche kamen unerwartet, insbesondere am Tag nach einem öffentlichen religiösen Opfer in [ROOT.GetCountry.GetCapital.GetName], und [ROOT.GetCountry.GetRuler.GetFirstName] war überzeugt, dass dieser Verstoß gegen das Protokoll eine schreckliche Nachricht ankündigte.\n\nMit erhobener ungeduldiger Hand verzichtete [ROOT.GetCountry.GetRuler.GetFirstName] auf die Formalitäten und winkte die Priester vorwärts. „Sprich sofort – sag mir, was los ist.“\n\n„Das ist die Sache, mein [ROOT.GetCountry.GetRulerTitle] – es könnte nicht besser sein.“ Nach dem gestrigen Opfer kehrten die Priester in ihren Tempel zurück und machten eine überraschende Entdeckung; In ihrer Abwesenheit waren zweihundert Talente Silber und Gold entdeckt worden.'\n\n'Zweihundert Talente!' [ROOT.GetCountry.GetRuler.GetFirstName] stieß einen leisen Pfiff aus. „Wie kann man so viel Geld verlieren und wiederfinden?“\n\nMit einer tiefen Verbeugung trat ein Berater vor, nur um mit den Schultern zu zucken.\n\n„Vielleicht war es ein Geschenk der Götter …“>  #NT!
 me_parthia_satrapy.1.a: "Perhaps it was...the future awaits!"  #<Vielleicht war es das ... die Zukunft wartet!>  #NT!
  
 me_parthia_satrapy.2.t: "$parthia_satrapy_missions_2$"  #<$parthia_satrapy_missions_2$>  #NT!
 me_parthia_satrapy.2.desc: "'I am glad that we understand each other, [ROOT.GetCountry.GetRuler.GetName] - truly, you are the man for the job of ruling over [ROOT.GetCountry.GetName] in my name. But we have discussed business for far too long; drink up, my friend.'\n\nSnapping his fingers and gesturing for a servant to refill his rhyton with wine, [GetCharacter('(int32)24').GetName], the powerful #E Basileus#! of the [GetCountry('SEL').GetName], leaned forward and extended his drink towards [ROOT.GetCountry.GetRuler.GetFirstName] in a toast. The two friends had gathered in [GetProvince('(int32)911').GetName] at the request of [GetCharacter('(int32)24').GetFirstName], who wanted personal assurances that the northern frontier was being guarded.\n\nThe [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] swore sacred oaths before his Lord that he would always remain a faithful #E Satrap#!, stating that [ROOT.GetCountry.GetRuler.GetSheHe] firmly believed that the fates of the two realms were tied together. In return for upholding [ROOT.GetCountry.GetRuler.GetHerHis] obligations, [GetCharacter('(int32)24').GetFirstName] had promised to send more merchants to [ROOT.GetCountry.GetCapital.GetName] in a gesture of goodwill."  #<„Ich bin froh, dass wir uns verstehen, [ROOT.GetCountry.GetRuler.GetName] – wahrlich, du bist der Mann für die Aufgabe, in meinem Namen über [ROOT.GetCountry.GetName] zu herrschen.“ Aber wir haben viel zu lange über das Geschäft gesprochen; Trink aus, mein Freund.‘\n\nMit den Fingern schnippend und einem Diener mit einer Geste zu verstehen gebend, dass er sein Rhyton mit Wein auffüllen soll, beugte sich [GetCharacter('(int32)24').GetName], der mächtige #E Basileus#! der [GetCountry('SEL').GetName], nach vorne und reichte sein Getränk in einem Toast in Richtung [ROOT.GetCountry.GetRuler.GetFirstName]. Die beiden Freunde hatten sich in [GetProvince('(int32)911').GetName] auf Wunsch von [GetCharacter('(int32)24').GetFirstName] versammelt, der persönliche Zusicherungen wollte, dass die Nordgrenze bewacht würde.\n\nDer [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetName]0 schwor vor seinem Herrn heilige Eide, dass er immer ein treuer #E Satrap#! bleiben würde, und erklärte, dass [ROOT.GetCountry.GetName]3 fest davon überzeugt sei, dass die Schicksale der beiden Reiche miteinander verbunden seien. Als Gegenleistung für die Einhaltung der [ROOT.GetCountry.GetName]4-Verpflichtungen hatte [GetCharacter('(int32)24').GetFirstName] als Geste des guten Willens versprochen, mehr Händler nach [ROOT.GetCountry.GetName]6 zu schicken.>  #NT!
 me_parthia_satrapy.2.a: "Cooperation with the [ROOT.GetCountry.GetOverlord.GetName] is sure to bear fruit"  #<Die Zusammenarbeit mit der [ROOT.GetCountry.GetOverlord.GetName] wird sicherlich Früchte tragen>  #NT!
  
 me_parthia_satrapy.3.t: "$parthia_satrapy_missions_3$"  #<$parthia_satrapy_missions_3$>  #NT!
 me_parthia_satrapy.3.desc: "Having secured the friendship and blessings of [GetCharacter('(int32)24').GetName], [ROOT.GetCountry.GetRuler.GetName] wasted no time in asking for favors, but sent a petition to [GetProvince('(int32)911').GetName] asking for permission to cross the northern border and raid the lands of the [GetCountry('PRN').GetAdjective] tribes. The [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] was immensely pleased by [GetCharacter('(int32)24').GetFirstName]'s reply; 'We will celebrate your inevitable victory with wine and song; do not disappoint.'"  #<Nachdem er sich die Freundschaft und den Segen von [GetCharacter('(int32)24').GetName] gesichert hatte, verschwendete [ROOT.GetCountry.GetRuler.GetName] keine Zeit damit, um Gefälligkeiten zu bitten, sondern schickte eine Petition an [GetProvince('(int32)911').GetName] mit der Bitte um Erlaubnis, die Nordgrenze zu überschreiten und das Land der [GetCountry('PRN').GetAdjective]-Stämme zu überfallen. Der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] war über die Antwort von [GetCharacter('(int32)24').GetFirstName] außerordentlich erfreut; „Wir werden Ihren unvermeidlichen Sieg mit Wein und Gesang feiern; enttäuschen Sie nicht.'>  #NT!
 me_parthia_satrapy.3.a: "To arms!"  #<Zu den Waffen!>  #NT!
 # me_parthia_satrapy.3.tt: ""
  
 me_parthia_satrapy.4.t: "$parthia_satrapy_missions_4$"  #<$parthia_satrapy_missions_4$>  #NT!
 me_parthia_satrapy.4.desc: "Encouraged by our recent victories against the steppe tribes, [ROOT.GetCountry.GetRuler.GetName] has ordered [ROOT.GetCountry.GetRuler.GetHerHis] war-hardened troops to take the famous #E Gates of [GetProvince('(int32)5437').GetName]#! for [ROOT.GetCountry.GetName]. Our levies are in the best fighting shape that they have been in for a generation, and if we wish to prevent the horselords from controlling the passage, then we must take it for ourselves and the time to strike is now."  #<Ermutigt durch unsere jüngsten Siege gegen die Steppenstämme hat [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHis] kriegserprobten Truppen befohlen, die berühmten #E Tore von [GetProvince('(int32)5437').GetName]#! für [ROOT.GetCountry.GetName] einzunehmen. Unsere Truppen befinden sich in der besten Kampfform seit einer Generation, und wenn wir verhindern wollen, dass die Reiterherren die Passage kontrollieren, müssen wir sie für uns in Anspruch nehmen, und jetzt ist es an der Zeit zuzuschlagen.>  #NT!
 me_parthia_satrapy.4.a: "Just another tribe to pacify..."  #<Nur ein weiterer Stamm, den es zu befrieden gilt ...>  #NT!
  
 me_parthia_satrapy.5.t: "$parthia_satrapy_missions_5$"  #<$parthia_satrapy_missions_5$>  #NT!
 me_parthia_satrapy.5.desc: "The [ROOT.GetCountry.GetAdjective] wars against the migratory steppe tribes continues with unabated fury, and the armies of [ROOT.GetCountry.GetRuler.GetName] continue to smash all opponents foolish enough to offer pitched battle. The levies of [ROOT.GetCountry.GetName] continue their inexorable march north."  #<Die [ROOT.GetCountry.GetAdjective]-Kriege gegen die wandernden Steppenstämme gehen mit unverminderter Wut weiter und die Armeen von [ROOT.GetCountry.GetRuler.GetName] zerschlagen weiterhin alle Gegner, die dumm genug sind, offene Schlachten zu liefern. Die Truppen von [ROOT.GetCountry.GetName] setzen ihren unaufhaltsamen Marsch nach Norden fort.>  #NT!
 me_parthia_satrapy.5.a: "This is really a glorified mop-up operation"  #<Das ist wirklich eine verherrlichte Aufräumaktion>  #NT!
  
 me_parthia_satrapy.6.t: "$parthia_satrapy_missions_6$"  #<$parthia_satrapy_missions_6$>  #NT!
 me_parthia_satrapy.6.desc: "[ROOT.GetCountry.GetRuler.GetName] has every intention of seeking benefits from [ROOT.GetCountry.GetRuler.GetHerHis] overlord [GetCharacter('(int32)24').GetName], and when there was a rare moment of peace and quiet around [ROOT.GetCountry.GetCapital.GetName], the [ROOT.GetCountry.GetRulerTitle] decided it was time to make good on the friendship between [ROOT.GetCountry.GetRuler.GetHerHim] and [GetCharacter('(int32)24').GetFirstName].\n\nUltimately, [ROOT.GetCountry.GetRuler.GetFirstName] was hoping that the Seleukids would one day give [ROOT.GetCountry.GetName] control over [GetProvince('(int32)4997').GetArea.GetName], but [ROOT.GetCountry.GetRuler.GetSheHe] knew that asking for such a favor outright would be considered boorish and in bad taste. Some sort of tribute would need to be offered first, but what would be the best gift to give to someone who has everything?"  #<[ROOT.GetCountry.GetRuler.GetName] hat die Absicht, Vorteile von [ROOT.GetCountry.GetRuler.GetHerHis], dem Oberherrn [GetCharacter('(int32)24').GetName], zu erlangen, und als um [ROOT.GetCountry.GetCapital.GetName] herum ein seltener Moment des Friedens und der Ruhe herrschte, entschieden die [ROOT.GetCountry.GetRulerTitle], dass es an der Zeit sei, die Freundschaft zwischen [ROOT.GetCountry.GetRuler.GetHerHim] und [GetCharacter('(int32)24').GetFirstName] wiederherzustellen.\n\nLetztendlich hoffte [ROOT.GetCountry.GetRuler.GetFirstName], dass die Seleukiden eines Tages [ROOT.GetCountry.GetName] die Kontrolle über sie geben würden [GetProvince('(int32)4997').GetArea.GetName], aber [ROOT.GetCountry.GetRuler.GetHerHis]0 wusste, dass es als grob und geschmacklos gelten würde, direkt um einen solchen Gefallen zu bitten. Zuerst müsste eine Art Hommage dargebracht werden, aber was wäre das beste Geschenk für jemanden, der alles hat?>  #NT!
 me_parthia_satrapy.6.a: "Send gifts of gold and silver"  #<Senden Sie Geschenke aus Gold und Silber>  #NT!
 me_parthia_satrapy.6.b: "Send our good fighting men"  #<Schicken Sie unsere guten Kämpfer>  #NT!
  
 me_parthia_satrapy.6001.t: "$parthia_satrapy_missions_6$ - Parthian Envoy"  #<$parthia_satrapy_missions_6$ – Parthischer Gesandter>  #NT!
 me_parthia_satrapy.6001.desc: "My [ROOT.GetCountry.GetRulerTitle], we have received a message from one of your satraps. [GetCountry('PAR').GetRuler.GetName], your loyal servant that rules in your name in the city of [GetCountry('PAR').GetCapital.GetName], has asked for a favor from the [ROOT.GetCountry.GetName].\n\nAs you can see, they remembered their place and have sent a healthy gift to [ROOT.GetCountry.GetCapital.GetName] - three hundred talents of gold and silver is quite the substantial sum. How should we reward their good behavior?"  #<Mein [ROOT.GetCountry.GetRulerTitle], wir haben eine Nachricht von einem Ihrer Satrapen erhalten. [GetCountry('PAR').GetRuler.GetName], Ihr treuer Diener, der in Ihrem Namen in der Stadt [GetCountry('PAR').GetCapital.GetName] regiert, hat die [ROOT.GetCountry.GetName] um einen Gefallen gebeten.\n\nWie Sie sehen können, haben sie sich an ihren Platz erinnert und ein gesundes Geschenk an [ROOT.GetCountry.GetCapital.GetName] geschickt – dreihundert Talente Gold und Silber sind eine beachtliche Summe. Wie sollen wir ihr gutes Verhalten belohnen?>  #NT!
 me_parthia_satrapy.6001.a: "They're lagging behind in terms of development"  #<Sie hinken in der Entwicklung hinterher>  #NT!
 me_parthia_satrapy.6001.b: "Help them in regards to governance"  #<Helfen Sie ihnen in Bezug auf die Governance>  #NT!
 me_parthia_satrapy.6002.t: "$parthia_satrapy_missions_6$ - Response"  #<$parthia_satrapy_missions_6$ – Antwort>  #NT!
 me_parthia_satrapy.6002.desc: "Wonderful news from [GetCountry('SEL').GetCapital.GetName]! It seems that the generous [GetCharacter('(int32)24').GetName] has heard our requests and, in his eternal wisdom, has reciprocated our gift with one of his own. A handwritten note from the #E Basileus#! was also hand-delivered to [ROOT.GetCountry.GetRuler.GetName], who wasted no time in opening it.\n\n'I trust that you will make good use of what I have given to you, my dear [ROOT.GetCountry.GetRuler.GetFirstName], and that you will be content with what I have deemed you worthy of receiving.'"  #<Wunderbare Neuigkeiten von [GetCountry('SEL').GetCapital.GetName]! Es scheint, dass der großzügige [GetCharacter('(int32)24').GetName] unsere Bitten erhört und in seiner ewigen Weisheit unser Geschenk mit einem seiner eigenen erwidert hat. Eine handschriftliche Notiz des #E Basileus#! wurde ebenfalls persönlich an [ROOT.GetCountry.GetRuler.GetName] übergeben, die keine Zeit damit verschwendete, sie zu öffnen.\n\n'Ich vertraue darauf, dass du das, was ich dir gegeben habe, gut gebrauchen wirst, mein lieber [ROOT.GetCountry.GetRuler.GetFirstName], und dass du mit dem zufrieden sein wirst, was ich für würdig erachtet habe, es zu erhalten.'>  #NT!
 me_parthia_satrapy.6002.a: "How gracious and kind of [GetCharacter('(int32)24').GetFirstName]!"  #<Wie liebenswürdig und freundlich [GetCharacter('(int32)24').GetFirstName]!>  #NT!
  
 me_parthia_satrapy.7.t: "$parthia_satrapy_missions_6$ - Prepare an Offer"  #<$parthia_satrapy_missions_6$ – Bereiten Sie ein Angebot vor>  #NT!
 me_parthia_satrapy.7.desc: "[ROOT.GetCountry.GetRuler.GetName] has been hungrily eyeing some of the provinces of [GetProvince('(int32)4997').GetArea.GetName], wishing that our people could have unfettered access to the #E Mare Euxinus#!, and now that [ROOT.GetCountry.GetRuler.GetSheHe] has the ear of [ROOT.GetCountry.GetRuler.GetHerHis] friend [GetCharacter('(int32)24').GetName], the bold [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] felt that the time was finally at hand to ask for [ROOT.GetCountry.GetRuler.GetHerHis] heart's desire."  #<[ROOT.GetCountry.GetRuler.GetName] hat gespannt einige der Provinzen von [GetProvince('(int32)4997').GetArea.GetName] im Auge behalten und sich gewünscht, dass unser Volk ungehinderten Zugang zum #E Mare Euxinus#!, haben könnte, und jetzt, da [ROOT.GetCountry.GetRuler.GetSheHe] das Ohr von [ROOT.GetCountry.GetRuler.GetHerHis] Freund [GetCharacter('(int32)24').GetName] hat, hatte der mutige [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] das Gefühl, dass es endlich an der Zeit sei, um [ROOT.GetCountry.GetRuler.GetHerHis] zu bitten Herzenswunsch.>  #NT!
 me_parthia_satrapy.7.a: "Send the offer at once - we must have #E Hycarnia#! for our own!"  #<Senden Sie das Angebot sofort ab – wir müssen #E Hycarnia#! für uns haben!>  #NT!
 me_parthia_satrapy.7.b: "It's not worth it..."  #<Es lohnt sich nicht...>  #NT!
  
 me_parthia_satrapy.8.t: "$parthia_satrapy_missions_6$ - Offer"  #<$parthia_satrapy_missions_6$ – Angebot>  #NT!
 me_parthia_satrapy.8.desc: "Much to [ROOT.GetCountry.GetRuler.GetName]'s annoyance, another embassy from [GetCountry('PAR').GetRuler.GetName] arrived this morning. The news they brought was good, much to [ROOT.GetCountry.GetRuler.GetFirstName]'s relief; the borders in the north remained secure, and the rumors of large-scale movements on the steppe seemed to be exaggerations. Good, very good...\n\nBut this was not the reason that the diplomats from [GetCountry('PAR').GetCapital.GetName] traveled to where we are; the bold [GetCountry('PAR').GetRuler.GetFirstName], who admittedly is a loyal and worthy servant, was asking for permission to administer some settlements in [GetProvince('(int32)4997').GetArea.GetName] directly."  #<Sehr zum Ärger von [ROOT.GetCountry.GetRuler.GetName] traf heute Morgen eine weitere Botschaft von [GetCountry('PAR').GetRuler.GetName] ein. Die Nachrichten, die sie überbrachten, waren gut, sehr zu [ROOT.GetCountry.GetRuler.GetFirstName]s Erleichterung; Die Grenzen im Norden blieben sicher und die Gerüchte über groß angelegte Bewegungen in der Steppe schienen übertrieben zu sein. Gut, sehr gut...\n\nAber das war nicht der Grund, warum die Diplomaten von [GetCountry('PAR').GetCapital.GetName] dorthin gereist sind; Der mutige [GetCountry('PAR').GetRuler.GetFirstName], der zugegebenermaßen ein treuer und würdiger Diener ist, bat um Erlaubnis, einige Siedlungen in [GetProvince('(int32)4997').GetArea.GetName] direkt verwalten zu dürfen.>  #NT!
 me_parthia_satrapy.8.a: "Delegate administration of those areas"  #<Delegieren Sie die Verwaltung dieser Bereiche>  #NT!
 me_parthia_satrapy.8.b: "No, absolutely not!"  #<Nein, absolut nicht!>  #NT!
  
 me_parthia_satrapy.9.t: "$parthia_satrapy_missions_6$ - Response"  #<$parthia_satrapy_missions_6$ – Antwort>  #NT!
 me_parthia_satrapy.9.desc_1: "There is sad news from [GetProvince('(int32)911').GetName]. Our Overlord, [GetCharacter('(int32)24').GetName], has denied the request made by [ROOT.GetCountry.GetRuler.GetName] and has forbidden us from occupying the territories that were requested.\n\nBut all is not bitter news; we have been granted permission to raise a #E Legion#! in hopes that we will be better able to perform our duties."  #<Es gibt traurige Neuigkeiten von [GetProvince('(int32)911').GetName]. Unser Oberherr, [GetCharacter('(int32)24').GetName], hat die Anfrage von [ROOT.GetCountry.GetRuler.GetName] abgelehnt und uns verboten, die angeforderten Gebiete zu besetzen.\n\nAber das sind nicht alles bittere Neuigkeiten; Wir haben die Erlaubnis erhalten, eine #E Legion#! aufzustellen, in der Hoffnung, dass wir unsere Pflichten besser erfüllen können.>  #NT!
 me_parthia_satrapy.9.desc_2: "The response from [GetCharacter('(int32)24').GetName] was difficult to read, tone-wise; [ROOT.GetCountry.GetRuler.GetName] could not tell if the Seleukid #E Basileus#! was irritated by the question, for the letter did not have any of the usual warmth expressed by the Overlord to his subject and was unusually blunt.\n\nWhat was abundantly clear, however, was that [GetCharacter('(int32)24').GetFirstName] had approved the deal proposed by [ROOT.GetCountry.GetRuler.GetFirstName]. It was also requested that we form a #E Legion#! immediately, for the Seleukids want a professional army protecting our borders - we cannot rely on levies alone in this day and age, unfortunately."  #<Die Antwort von [GetCharacter('(int32)24').GetName] war vom Ton her schwer zu lesen; [ROOT.GetCountry.GetRuler.GetName] konnte nicht sagen, ob der Seleukide #E Basileus#! über die Frage verärgert war, denn der Brief hatte nicht die übliche Wärme, die der Overlord seinem Untertanen entgegenbrachte, und war ungewöhnlich unverblümt.\n\nWas jedoch völlig klar war, war, dass [GetCharacter('(int32)24').GetFirstName] dem von [ROOT.GetCountry.GetRuler.GetFirstName] vorgeschlagenen Deal zugestimmt hatte. Es wurde auch darum gebeten, dass wir sofort eine #E Legion#! bilden, denn die Seleukiden wollen eine professionelle Armee, die unsere Grenzen schützt – leider können wir uns heutzutage nicht nur auf Aufgebote verlassen.>  #NT!
 me_parthia_satrapy.9.tt1: "#Y We will get our money back.#!"  #<#Y Wir bekommen unser Geld zurück.#!>  #NT!
 me_parthia_satrapy.9.tt2: "#Y Ownership of the bordering territories has been transferred.#!"  #<#Y Das Eigentum an den angrenzenden Gebieten wurde übertragen.#!>  #NT!
 me_parthia_satrapy.9.a: "How wonderful!"  #<Wie wunderbar!>  #NT!
 me_parthia_satrapy.9.b: "I cannot believe that he said no..."  #<Ich kann nicht glauben, dass er nein gesagt hat ...>  #NT!
  
 me_parthia_satrapy.10.t: "$parthia_satrapy_missions_7$"  #<$parthia_satrapy_missions_7$>  #NT!
 me_parthia_satrapy.10.desc: "As word of the many victories won by the [ROOT.GetCountry.GetAdjective]s reaches the ears of [GetCharacter('(int32)24').GetName] in distant [GetProvince('(int32)911').GetName], the grateful #E Basileus#! has decided to reward [ROOT.GetCountry.GetRuler.GetName] with gifts of valuable land to administer.\n\nThe personal note attached to the official correspondence brought a small smile to the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle]'s lips. 'Keep doing what you are doing, my son, and you might receive even greater gifts in the days to come.'"  #<Als die Nachricht von den vielen Siegen der [ROOT.GetCountry.GetAdjective] die Ohren von [GetCharacter('(int32)24').GetName] im fernen [GetProvince('(int32)911').GetName] erreicht, hat der dankbare #E Basileus#! beschlossen, [ROOT.GetCountry.GetRuler.GetName] mit wertvollen Landgeschenken zur Verwaltung zu belohnen.\n\nDie persönliche Notiz, die der offiziellen Korrespondenz beigefügt war, zauberte ein kleines Lächeln auf die Lippen des [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle]. „Mach weiter, was du tust, mein Sohn, und vielleicht erhältst du in den kommenden Tagen noch größere Geschenke.“>  #NT!
 me_parthia_satrapy.10.a: "You have honored me beyond what I deserve - thank you, my Lord"  #<Sie haben mich über das hinaus geehrt, was ich verdiene – danke, mein Herr>  #NT!
  
 me_parthia_satrapy.11.t: "$parthia_satrapy_missions_8$"  #<$parthia_satrapy_missions_8$>  #NT!
 me_parthia_satrapy.11.desc: "Over the last few years, [ROOT.GetCountry.GetRuler.GetName] has invested in building #E Academies#! throughout our city of [ROOT.GetCountry.GetCapital.GetName] in hopes of increasing the knowledge of our wisest men; an effort that [ROOT.GetCountry.GetRuler.GetSheHe] has succeeded in.\n\nOur fair capital has acquired a reputation as a place of learning and refinement, with many referring to it as the #E 'Pearl of [ROOT.GetCountry.GetCapital.GetArea.GetName]'#!, and travelers from as far away as [GetProvince('(int32)416').GetName] have made the treacherous overland journey to our city in hopes of hearing the lectures of our philosophers in person."  #<In den letzten Jahren hat [ROOT.GetCountry.GetRuler.GetName] in den Bau von #E Akademien#! in unserer Stadt [ROOT.GetCountry.GetCapital.GetName] investiert, in der Hoffnung, das Wissen unserer weisesten Männer zu erweitern; Eine Anstrengung, die [ROOT.GetCountry.GetRuler.GetSheHe] gelungen ist.\n\nUnsere schöne Hauptstadt hat sich den Ruf eines Ortes des Lernens und der Verfeinerung erworben, viele bezeichnen sie als #E „Perle von [ROOT.GetCountry.GetCapital.GetArea.GetName]“#!, und Reisende aus [GetProvince('(int32)416').GetName] haben die tückische Überlandreise in unsere Stadt angetreten, in der Hoffnung, die Vorträge unserer Philosophen persönlich zu hören.>  #NT!
 me_parthia_satrapy.11.a: "Finally, we are no longer a backwater..."  #<Endlich sind wir kein Rückstau mehr...>  #NT!
  
 me_parthia_satrapy.12.t: "$parthia_satrapy_missions_9$"  #<$parthia_satrapy_missions_9$>  #NT!
 me_parthia_satrapy.12.desc: "[ROOT.GetCountry.GetRuler.GetName] was initially surprised to hear that a famous man of talent, a traveling philosopher named [SCOPE.sCharacter('char_scope').GetName], had come to [ROOT.GetCountry.GetCapital.GetName] in hopes of securing a position at court, but after hearing [SCOPE.sCharacter('char_scope').GetFirstName]'s reasons for coming to [ROOT.GetCountry.GetName], the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] could not help but feel proud.\n\n'My Lord, surely you must know the reputation of your people; of your wealthy cities and their countless riches, of your plazas filled with academies of marble and marketplaces of fine brick, of the shaded places where grand forums intersect with wide boulevards built to accomodate the victory processions of your armies...why would I not come to this greatest of lands? You might serve another, o [ROOT.GetCountry.GetRuler.GetFirstName], but your glory and honor surpasses all others.'"  #<[ROOT.GetCountry.GetRuler.GetName] war zunächst überrascht, als er hörte, dass ein berühmter talentierter Mann, ein reisender Philosoph namens [SCOPE.sCharacter('char_scope').GetName], nach [ROOT.GetCountry.GetCapital.GetName] gekommen war, in der Hoffnung, sich eine Position am Hof ​​zu sichern, doch nachdem er die Gründe von [SCOPE.sCharacter('char_scope').GetFirstName] für seinen Besuch bei [ROOT.GetCountry.GetName] gehört hatte, konnte der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] nicht anders, als stolz zu sein.\n\n'Mein Herr, du musst doch sicherlich den Ruf deines Volkes kennen; Von euren wohlhabenden Städten und ihren zahllosen Reichtümern, von euren Plätzen voller Akademien aus Marmor und Marktplätzen aus feinem Backstein, von den schattigen Orten, an denen sich große Foren mit breiten Boulevards kreuzen, die für die Siegeszüge eurer Armeen gebaut wurden ... warum sollte ich nicht in dieses größte aller Länder kommen? Du könntest einem anderen dienen, o [ROOT.GetCountry.GetRuler.GetFirstName], aber dein Ruhm und deine Ehre übertreffen alle anderen.'>  #NT!
 me_parthia_satrapy.12.a: "We grow stronger...at least internally."  #<Wir werden stärker...zumindest intern.>  #NT!
  
 me_parthia_satrapy.1301.t: "$parthia_satrapy_missions_10$ - Plotting Against Our Overlord"  #<$parthia_satrapy_missions_10$ – Verschwörung gegen unseren Oberherrn>  #NT!
 me_parthia_satrapy.1301.desc: "After deciding that [ROOT.GetCountry.GetName] would try and take over our Overlord's realm, some advisors visited [ROOT.GetCountry.GetRuler.GetName] with a suggestion. These councilors proposed that we should try to bribe some governors living close to our borders, asking them to join us once we declare independence.\n\nAlthough this plan has its merits, we should be cautious of alarming [ROOT.GetCountry.GetOverlord.GetRuler.GetName] - we cannot trust that one of these governors might report what we are doing to [ROOT.GetCountry.GetOverlord.GetCapital.GetName]."  #<Nachdem sie beschlossen hatten, dass [ROOT.GetCountry.GetName] versuchen würde, das Reich unseres Overlords zu übernehmen, besuchten einige Berater [ROOT.GetCountry.GetRuler.GetName] mit einem Vorschlag. Diese Ratsmitglieder schlugen vor, dass wir versuchen sollten, einige Gouverneure zu bestechen, die in der Nähe unserer Grenzen leben, und sie zu bitten, sich uns anzuschließen, sobald wir die Unabhängigkeit erklärt haben.\n\nObwohl dieser Plan seine Vorzüge hat, sollten wir uns davor hüten, [ROOT.GetCountry.GetOverlord.GetRuler.GetName] zu beunruhigen – wir können nicht darauf vertrauen, dass einer dieser Gouverneure [ROOT.GetCountry.GetOverlord.GetCapital.GetName] darüber berichten könnte, was wir tun.>  #NT!
 me_parthia_satrapy.1301.a: "We should focus on [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName]"  #<Wir sollten uns auf [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName] konzentrieren>  #NT!
 me_parthia_satrapy.1301.b: "[SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName] is the more important region to focus on"  #<[SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName] ist die wichtigere Region, auf die man sich konzentrieren sollte>  #NT!
 me_parthia_satrapy.1301.c: "We do not need their help"  #<Wir brauchen ihre Hilfe nicht>  #NT!
  
 me_parthia_satrapy.1302.t: "Securing [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName]"  #<Sicherung [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName]>  #NT!
 me_parthia_satrapy.1302.desc: "When buying anyone, you should always be sure that you won't get ratted out - this is a lesson that [ROOT.GetCountry.GetRuler.GetName] learned early in life, and the [ROOT.GetCountry.GetRulerTitle] kept this in mind as the clandestine negotiations began.\n\nIn addition to not insulting your target with a low offer, [ROOT.GetCountry.GetRuler.GetFirstName] also knew that one should have something to offer that your target wants, something valuable that will prevent them from walking away from the deal. This was true for [SCOPE.sChar('cap_beguile_gov_char_1').GetName], who will surely take to our offer well, but there is never total certainty when it comes to matters of men's honor..."  #<Wenn Sie jemanden kaufen, sollten Sie immer sicher sein, dass Sie nicht verarscht werden – das ist eine Lektion, die [ROOT.GetCountry.GetRuler.GetName] schon früh im Leben gelernt hat, und [ROOT.GetCountry.GetRulerTitle] hat dies im Hinterkopf behalten, als die geheimen Verhandlungen begannen.\n\nNeben der Tatsache, dass Sie Ihr Ziel nicht mit einem niedrigen Angebot beleidigen, wusste [ROOT.GetCountry.GetRuler.GetFirstName] auch, dass man etwas zu bieten haben sollte, das Ihr Ziel will, etwas Wertvolles, das es davon abhält, vom Geschäft abzuweichen. Das traf auf [SCOPE.sChar('cap_beguile_gov_char_1').GetName] zu, der unser Angebot sicherlich gut annehmen wird, aber völlige Gewissheit gibt es in Fragen der Männerehre nie ...>  #NT!
 me_parthia_satrapy.1302.a: "Money is the solution to everything...what's your price?"  #<Geld ist die Lösung für alles ... was ist Ihr Preis?>  #NT!
 me_parthia_satrapy.1302.b: "I will take care of you politically and give you an easy job somewhere"  #<Ich werde mich politisch um Sie kümmern und Ihnen irgendwo einen leichten Job verschaffen>  #NT!
  
 me_parthia_satrapy.1303.t: "Securing [SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName]"  #<Sicherung [SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName]>  #NT!
 me_parthia_satrapy.1303.desc: "When buying anyone, you should always be sure that you won't get ratted out - this is a lesson that [ROOT.GetCountry.GetRuler.GetName] learned early in life, and the [ROOT.GetCountry.GetRulerTitle] kept this in mind as the clandestine negotiations began.\n\nIn addition to not insulting your target with a low offer, [ROOT.GetCountry.GetRuler.GetFirstName] also knew that one should have something to offer that your target wants, something valuable that will prevent them from walking away from the deal. This was true for [SCOPE.sChar('cap_beguile_gov_char_2').GetName], who will surely take to our offer well, but there is never total certainty when it comes to matters of men's honor..."  #<Wenn Sie jemanden kaufen, sollten Sie immer sicher sein, dass Sie nicht verarscht werden – das ist eine Lektion, die [ROOT.GetCountry.GetRuler.GetName] schon früh im Leben gelernt hat, und [ROOT.GetCountry.GetRulerTitle] hat dies im Hinterkopf behalten, als die geheimen Verhandlungen begannen.\n\nNeben der Tatsache, dass Sie Ihr Ziel nicht mit einem niedrigen Angebot beleidigen, wusste [ROOT.GetCountry.GetRuler.GetFirstName] auch, dass man etwas zu bieten haben sollte, das Ihr Ziel will, etwas Wertvolles, das es davon abhält, vom Geschäft abzuweichen. Das traf auf [SCOPE.sChar('cap_beguile_gov_char_2').GetName] zu, der unser Angebot sicherlich gut annehmen wird, aber völlige Gewissheit gibt es in Fragen der Männerehre nie ...>  #NT!
 me_parthia_satrapy.1303.a: "Money is the solution to everything."  #<Geld ist die Lösung für alles.>  #NT!
 me_parthia_satrapy.1303.b: "A nice office will surely be appreciated."  #<Ein schönes Büro wird sicherlich geschätzt.>  #NT!
  
 me_parthia_satrapy.1304.t: "Securing [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName]: Response"  #<Sichern [SCOPE.sChar('cap_beguile_gov_char_1').GetGovernorship.GetName]: Antwort>  #NT!
 me_parthia_satrapy.1304.desc: "[SCOPE.sChar('cap_beguile_gov_char_1').GetName] has reacted to our 'request' positively, yet doesn't seem quite satisfied with the deal...it seems as if he is hungry for more. In any case, he isn't hungry for the leadership of the [ROOT.GetCountry.GetOverlord.GetName], which is music to [ROOT.GetCountry.GetRuler.GetName]'s ears."  #<[SCOPE.sChar('cap_beguile_gov_char_1').GetName] hat positiv auf unsere „Anfrage“ reagiert, scheint aber mit dem Deal nicht ganz zufrieden zu sein ... es scheint, als wäre er hungrig nach mehr. Auf jeden Fall ist er nicht hungrig nach der Führung von [ROOT.GetCountry.GetOverlord.GetName], was Musik in den Ohren von [ROOT.GetCountry.GetRuler.GetName] ist.>  #NT!
 me_parthia_satrapy.1304.a: "Marvelous"  #<Wunderbar>  #NT!
 me_parthia_satrapy.1304.b: "It is worth every coin spent"  #<Es ist jede ausgegebene Münze wert>  #NT!
 me_parthia_satrapy.1304.c: "The scoundrel won't get a single additional drachma!"  #<Der Schurke bekommt keine einzige Drachme mehr!>  #NT!
  
 me_parthia_satrapy.1305.t: "Securing [SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName]: Response"  #<Sichern [SCOPE.sChar('cap_beguile_gov_char_2').GetGovernorship.GetName]: Antwort>  #NT!
 me_parthia_satrapy.1305.desc: "[SCOPE.sChar('cap_beguile_gov_char_2').GetName] has reacted to our 'request' positively, yet doesn't seem quite satisfied with the deal...it seems as if he is hungry for more. In any case, he isn't hungry for the leadership of the [ROOT.GetCountry.GetOverlord.GetName], which is music to [ROOT.GetCountry.GetRuler.GetName]'s ears."  #<[SCOPE.sChar('cap_beguile_gov_char_2').GetName] hat positiv auf unsere „Anfrage“ reagiert, scheint aber mit dem Deal nicht ganz zufrieden zu sein ... es scheint, als wäre er hungrig nach mehr. Auf jeden Fall ist er nicht hungrig nach der Führung von [ROOT.GetCountry.GetOverlord.GetName], was Musik in den Ohren von [ROOT.GetCountry.GetRuler.GetName] ist.>  #NT!
 me_parthia_satrapy.1305.a: "Marvelous."  #<Wunderbar.>  #NT!
 me_parthia_satrapy.1305.b: "Pay whatever price [SCOPE.sChar('cap_beguile_gov_char_2').GetFirstName] asks"  #<Zahlen Sie den Preis, den [SCOPE.sChar('cap_beguile_gov_char_2').GetFirstName] verlangt>  #NT!
 me_parthia_satrapy.1305.c: "The scoundrel wont get a single additional drachma!"  #<Der Schurke bekommt keine einzige Drachme mehr!>  #NT!
  
 me_parthia_satrapy.1306.t: "Secured Support"  #<Gesicherter Support>  #NT!
 me_parthia_satrapy.1306.desc: "Now that we have come to an agreement with [SCOPE.sChar('cap_beguile_gov_char_1').GetName], we can finally proceed to planning the downfall of our common enemy. With the help of our new friend, we are sure to triumph over anything our foe has to offer."  #<Nachdem wir uns nun mit [SCOPE.sChar('cap_beguile_gov_char_1').GetName] geeinigt haben, können wir endlich mit der Planung des Untergangs unseres gemeinsamen Feindes beginnen. Mit der Hilfe unseres neuen Freundes werden wir mit Sicherheit über alles triumphieren, was unser Feind zu bieten hat.>  #NT!
 me_parthia_satrapy.1306.a: "Now to deal with [ROOT.GetCountry.GetOverlord.GetRuler.GetName]..."  #<Kommen wir nun zu [ROOT.GetCountry.GetOverlord.GetRuler.GetName]...>  #NT!
  
 me_parthia_satrapy.1307.t: "Secured Support"  #<Gesicherter Support>  #NT!
 me_parthia_satrapy.1307.desc: "Now that we have come to an agreement with [SCOPE.sChar('cap_beguile_gov_char_2').GetName], we can finally proceed to planning the downfall of our common enemy. With the help of our new friend, we are sure to triumph over anything our foe has to offer."  #<Nachdem wir uns nun mit [SCOPE.sChar('cap_beguile_gov_char_2').GetName] geeinigt haben, können wir endlich mit der Planung des Untergangs unseres gemeinsamen Feindes beginnen. Mit der Hilfe unseres neuen Freundes werden wir mit Sicherheit über alles triumphieren, was unser Feind zu bieten hat.>  #NT!
 me_parthia_satrapy.1307.a: "Now to deal with [ROOT.GetCountry.GetOverlord.GetRuler.GetName]..."  #<Kommen wir nun zu [ROOT.GetCountry.GetOverlord.GetRuler.GetName]...>  #NT!
  
 me_parthia_satrapy.13.t: "Rival Dethroned"  #<Rivale entthront>  #NT!
 me_parthia_satrapy.13.desc: "The hour of our greatest triumph is at hand - let us turn the tables on our Master and assume our rightful place as the true rulers of our own land. [ROOT.GetCountry.GetRuler.GetName] has taken the unprecedented step of declaring war against Overlord, and now all of our regional neighbors anxiously watch to see who will emerge from this conflict."  #<Die Stunde unseres größten Triumphs ist nahe – lasst uns den Spieß gegen unseren Meister umdrehen und unseren rechtmäßigen Platz als wahre Herrscher unseres eigenen Landes einnehmen. [ROOT.GetCountry.GetRuler.GetName] hat den beispiellosen Schritt unternommen, Overlord den Krieg zu erklären, und jetzt warten alle unsere regionalen Nachbarn gespannt darauf, wer aus diesem Konflikt hervorgehen wird.>  #NT!
 me_parthia_satrapy.13.a: "We march forward to eternal glory!"  #<Wir marschieren vorwärts zur ewigen Herrlichkeit!>  #NT!
  
 me_parthia_satrapy.14.t: "$parthia_satrapy_missions_11$"  #<$parthia_satrapy_missions_11$>  #NT!
 me_parthia_satrapy.14.desc: "As the heirs of [GetCharacter('(int32)51').GetName], we have the same claim to Alexander's Empire as do all the other #E Diadochi#!, a claim we have cemented by liberating ourselves from the yoke of the Antigonids and staving off the Seleukid threat once and for all. To top it all off, we control most of Alexander's first conquests; a point of pride for the mighty [ROOT.GetCountry.GetRuler.GetName], who has brought our people to this moment. Who, if not us, can re-enact his campaigns?"  #<Als Erben von [GetCharacter('(int32)51').GetName] haben wir den gleichen Anspruch auf Alexanders Reich wie alle anderen #E Diadochen#!,, einen Anspruch, den wir gefestigt haben, indem wir uns vom Joch der Antigoniden befreit und die Bedrohung durch die Seleukiden ein für alle Mal abgewehrt haben. Um das Ganze abzurunden, kontrollieren wir die meisten der ersten Eroberungen Alexanders; ein Punkt des Stolzes für die Mächtigen [ROOT.GetCountry.GetRuler.GetName], die unser Volk in diesen Moment gebracht haben. Wer, wenn nicht wir, kann seine Kampagnen nachspielen?>  #NT!
 me_parthia_satrapy.14.a: "Alexander's legacy shall be ours!"  #<Alexanders Vermächtnis soll unser sein!>  #NT!
  
 me_parthia_satrapy.15.t: "$parthia_satrapy_missions_12$ - The Negotiations Begin"  #<$parthia_satrapy_missions_12$ – Die Verhandlungen beginnen>  #NT!
 me_parthia_satrapy.15.desc: "This morning, an ambassador from our overlord arrived in [ROOT.GetCountry.GetCapital.GetName] and requested a meeting with [ROOT.GetCountry.GetRuler.GetName] at once. This man, a skillful diplomat named [SCOPE.sCharacter('ambassador_char_scope').GetName], has been sent to help us negotiate the terms of what we are requesting. Once we have worked out the details, [SCOPE.sCharacter('ambassador_char_scope').GetFirstName] will let us know how everything is progressing and whether or not the terms have been found acceptable.\n\nAn important question remains, however; what is it exactly that we are asking for? What does being a #E 'March'#! of the [mission_overlord_scope.GetName] look like to [ROOT.GetCountry.GetRuler.GetFirstName]? Our Overlord seems open to granting us privileges, but is curious as to what we had in mind."  #<Heute Morgen ist ein Botschafter unseres Oberherrn in [ROOT.GetCountry.GetCapital.GetName] eingetroffen und hat um ein sofortiges Treffen mit [ROOT.GetCountry.GetRuler.GetName] gebeten. Dieser Mann, ein geschickter Diplomat namens [SCOPE.sCharacter('ambassador_char_scope').GetName], wurde geschickt, um uns bei der Aushandlung der Bedingungen unserer Anfrage zu helfen. Sobald wir die Details ausgearbeitet haben, wird [SCOPE.sCharacter('ambassador_char_scope').GetFirstName] uns darüber informieren, wie alles voranschreitet und ob die Bedingungen für akzeptabel befunden wurden oder nicht.\n\nEine wichtige Frage bleibt jedoch offen; Was genau ist es, wonach wir fragen? Wie sieht es für [ROOT.GetCountry.GetRuler.GetFirstName] aus, ein #E „März“#! der [mission_overlord_scope.GetName] zu sein? Unser Oberherr scheint bereit zu sein, uns Privilegien zu gewähren, ist aber neugierig, was wir im Sinn hatten.>  #NT!
 me_parthia_satrapy.15.a: "We would like political help."  #<Wir wünschen uns politische Hilfe.>  #NT!
 me_parthia_satrapy.15.b: "Military support is always something beneficial."  #<Militärische Unterstützung ist immer etwas Gutes.>  #NT!
 me_parthia_satrapy.15.c: "Their technology surpasses ours...might they be willing to share?"  #<Ihre Technologie übertrifft unsere ... wären sie vielleicht bereit, sie zu teilen?>  #NT!
 me_parthia_satrapy.15.d: "Increased economic development is something that we desire."  #<Wir wünschen uns eine verstärkte wirtschaftliche Entwicklung.>  #NT!
 mighty_orator_joins_parthia_tt: "A skilled #Y Orator#! will join your court."  #<Ein erfahrener #Y Redner#! wird sich Ihrem Hofstaat anschließen.>  #NT!
  
  
 me_parthia_satrapy.1501.t: "The Negotiations Continue"  #<Die Verhandlungen gehen weiter>  #NT!
 me_parthia_satrapy.1501.desc: "We have received news that our request for political assistance has been accepted, and there are expectations that we shall send our thanks and settle the matter."  #<Wir haben die Nachricht erhalten, dass unser Antrag auf politische Unterstützung angenommen wurde, und wir erwarten, dass wir uns bedanken und die Angelegenheit regeln.>  #NT!
 me_parthia_satrapy.1501.a: "What glorious news! Send our appreciation."  #<Was für eine herrliche Neuigkeit! Senden Sie unsere Wertschätzung.>  #NT!
 me_parthia_satrapy.1501.b: "Press our luck and send a counter-offer asking for more."  #<Fordern Sie unser Glück heraus und senden Sie ein Gegenangebot mit der Bitte um mehr.>  #NT!
 me_parthia_satrapy.1501.c: "Is this some kind of joke?"  #<Ist das eine Art Witz?>  #NT!
 me_parthia_satrapy.1502.t: "Military Aid"  #<Militärhilfe>  #NT!
 me_parthia_satrapy.1502.desc: "Now that we have decided to ask for military support, all that remains to do is task our diplomats with the specifics of their mission, a task reserved for [ROOT.GetCountry.GetRuler.GetName]."  #<Nachdem wir uns nun entschieden haben, um militärische Unterstützung zu bitten, müssen wir nur noch unsere Diplomaten mit den Einzelheiten ihrer Mission beauftragen, eine Aufgabe, die [ROOT.GetCountry.GetRuler.GetName] vorbehalten ist.>  #NT!
 me_parthia_satrapy.1502.a: "Send out the request."  #<Senden Sie die Anfrage ab.>  #NT!
 me_parthia_satrapy.1502.b: "This is not what we wanted..."  #<Das ist nicht das, was wir wollten...>  #NT!
 me_parthia_satrapy.1503.t: "Technological Aid"  #<Technische Hilfe>  #NT!
 me_parthia_satrapy.1503.desc: "Now that our minds are made up, we just have to actually send a messenger to our overlord - we really hope that we are deemed worthy enough to receive their technological secrets."  #<Nachdem wir uns nun entschieden haben, müssen wir nur noch einen Boten zu unserem Oberherrn schicken – wir hoffen wirklich, dass wir als würdig genug erachtet werden, ihre technologischen Geheimnisse zu erfahren.>  #NT!
 me_parthia_satrapy.1503.a: "Let us send our negotiators and hope for the best."  #<Lassen Sie uns unsere Verhandlungsführer schicken und auf das Beste hoffen.>  #NT!
 me_parthia_satrapy.1503.b: "We will not send anyone at this time."  #<Wir werden derzeit niemanden schicken.>  #NT!
 me_parthia_satrapy.1511.t: "The Negotiations Continue"  #<Die Verhandlungen gehen weiter>  #NT!
 me_parthia_satrapy.1511.desc_1: "[SCOPE.sCharacter('ambassador_char_scope').GetName] reports to us that the negotiations are going extremely well, and, barring something unforeseen happening, it appears that everything we have asked for will be given to us."  #<[SCOPE.sCharacter('ambassador_char_scope').GetName] berichtet uns, dass die Verhandlungen sehr gut verlaufen und es scheint, dass uns alles, worum wir gebeten haben, gegeben wird, sofern nicht etwas Unvorhergesehenes passiert.>  #NT!
 me_parthia_satrapy.1511.desc_2: "Instead of blindly agreeing to what we have asked for, [SCOPE.sCharacter('ambassador_char_scope').GetName] has returned with a counter-offer, one that feels a bit contentious - it seems that we have some more negotiating to do."  #<Anstatt blind dem zuzustimmen, worum wir gebeten haben, ist [SCOPE.sCharacter('ambassador_char_scope').GetName] mit einem Gegenangebot zurückgekehrt, das etwas umstritten wirkt – es scheint, dass wir noch etwas verhandeln müssen.>  #NT!
 me_parthia_satrapy.1511.desc_3: "Although we could tell that [SCOPE.sCharacter('ambassador_char_scope').GetName] was embarrassed to give us a negative answer, the end result is the same, all feelings aside - our Overlord has flatly denied our request and has broken off discussions."  #<Obwohl wir merkten, dass es [SCOPE.sCharacter('ambassador_char_scope').GetName] peinlich war, uns eine negative Antwort zu geben, ist das Endergebnis das gleiche, abgesehen von allen Gefühlen – unser Overlord hat unsere Anfrage rundweg abgelehnt und die Diskussionen abgebrochen.>  #NT!
 me_parthia_satrapy.1511.a: "We can hardly wait to hear the word 'yes'!"  #<Wir können es kaum erwarten, das Wort „Ja“ zu hören!>  #NT!
 me_parthia_satrapy.1511.b: "I guess we will accept whatever terms they give us"  #<Ich denke, wir werden alle Bedingungen akzeptieren, die sie uns geben>  #NT!
 me_parthia_satrapy.1511.c: "Do not accept their counter offer! We shall double our efforts!"  #<Nehmen Sie ihr Gegenangebot nicht an! Wir werden unsere Anstrengungen verdoppeln!>  #NT!
 me_parthia_satrapy.1511.d: "How disappointing..."  #<Wie enttäuschend...>  #NT!
 me_parthia_satrapy.1504.t: "Economic Assistance"  #<Wirtschaftshilfe>  #NT!
 me_parthia_satrapy.1504.desc: "[ROOT.GetCountry.GetRuler.GetName], we must send out our best diplomats to our overlord and hope that they are successful in their entreaties - as we know, nothing is guaranteed in life. Is this even worth our time pursuing?"  #<[ROOT.GetCountry.GetRuler.GetName], wir müssen unsere besten Diplomaten zu unserem Oberherrn schicken und hoffen, dass sie mit ihren Bitten Erfolg haben – wie wir wissen, gibt es im Leben keine Garantie. Lohnt es sich überhaupt, dies zu verfolgen?>  #NT!
 me_parthia_satrapy.1504.a: "Let us send our negotiators and hope for the best."  #<Lassen Sie uns unsere Verhandlungsführer schicken und auf das Beste hoffen.>  #NT!
 me_parthia_satrapy.1504.b: "We will not send anyone at this time."  #<Wir werden derzeit niemanden schicken.>  #NT!
 me_parthia_satrapy.1512.t: "An Answer"  #<Eine Antwort>  #NT!
 me_parthia_satrapy.1512.desc_1: "Our overlord has responded affirmatively, although it has been noted that this shall be the extent of aid given."  #<Unser Oberherr hat bejahend geantwortet, obwohl darauf hingewiesen wurde, dass dies der Umfang der gewährten Hilfe sein soll.>  #NT!
 me_parthia_satrapy.1512.desc_2: "Our overlord has flatly denied our request and has asked us to not waste their time with foolish questions."  #<Unser Oberherr hat unsere Bitte rundweg abgelehnt und uns gebeten, seine Zeit nicht mit dummen Fragen zu verschwenden.>  #NT!
 me_parthia_satrapy.1512.a: "We are grateful for anything."  #<Wir sind für alles dankbar.>  #NT!
 me_parthia_satrapy.1512.b: "How unfortunate for us..."  #<Wie schade für uns...>  #NT!
 me_parthia_satrapy.1513.t: "A Helping Hand"  #<Eine helfende Hand>  #NT!
 me_parthia_satrapy.1513.desc_1: "Fantastic news! We have received word from our Overlord that they are going to send some researchers and engineers to work in [ROOT.GetCountry.GetCapital.GetName] - it seems that they are willing to sponsor our research iniatives!"  #<Fantastische Neuigkeiten! Wir haben von unserem Overlord die Nachricht erhalten, dass er einige Forscher und Ingenieure zur Arbeit nach [ROOT.GetCountry.GetCapital.GetName] schicken wird – es scheint, dass sie bereit sind, unsere Forschungsinitiativen zu unterstützen!>  #NT!
 me_parthia_satrapy.1513.desc_2: "Our Overlord has responded to our request for technological assistance with one simple word - no."  #<Unser Overlord hat auf unsere Bitte um technische Unterstützung mit einem einfachen Wort geantwortet: Nein.>  #NT!
 me_parthia_satrapy.1513.a: "We are very thankful for this - what a blessing for [ROOT.GetCountry.GetName]."  #<Dafür sind wir sehr dankbar – was für ein Segen für [ROOT.GetCountry.GetName].>  #NT!
 me_parthia_satrapy.1513.b: "Well, they didn't have to be rude about it - hmmph."  #<Nun, sie mussten nicht unhöflich sein – hmmph.>  #NT!
 me_parthia_satrapy.1521.t: "An Answer Received"  #<Eine Antwort erhalten>  #NT!
 me_parthia_satrapy.1521.desc: "Word has arrived in [ROOT.GetCountry.GetCapital.GetName] that our questions have been answered by our gracious overlord, who argue that we should content ourselves with everything as it currently stands."  #<In [ROOT.GetCountry.GetCapital.GetName] ist die Nachricht eingetroffen, dass unsere Fragen von unserem gnädigen Oberherrn beantwortet wurden, der argumentiert, dass wir uns mit allem zufrieden geben sollten, wie es derzeit ist.>  #NT!
 me_parthia_satrapy.1521.a: "We should be happy with what we have."  #<Wir sollten mit dem zufrieden sein, was wir haben.>  #NT!
 me_parthia_satrapy.1521.b: "This is unacceptable to us."  #<Das ist für uns inakzeptabel.>  #NT!
 me_parthia_satrapy.1514.t: "Economic Experts"  #<Wirtschaftsexperten>  #NT!
 me_parthia_satrapy.1514.desc_1: "How lucky for us! Our Overlord has graciously sent one of his best economic advisors to our Court - I suppose this means our request for aid was well-received."  #<Was für ein Glück für uns! Unser Oberherr hat freundlicherweise einen seiner besten Wirtschaftsberater an unseren Hof geschickt – ich nehme an, das bedeutet, dass unsere Bitte um Hilfe gut aufgenommen wurde.>  #NT!
 me_parthia_satrapy.1514.desc_2: "Our Overlord has denied our petition, claiming that we are unworthy of such honors."  #<Unser Oberherr hat unsere Petition mit der Begründung abgelehnt, dass wir dieser Ehrungen nicht würdig seien.>  #NT!
 me_parthia_satrapy.1514.a: "We are very fortunate to receive this."  #<Wir sind sehr glücklich, dies zu erhalten.>  #NT!
 me_parthia_satrapy.1514.b: "How unfortunate for us... alas."  #<Wie schade für uns... leider.>  #NT!
 me_parthia_satrapy.1531.t: "The Long-Awaited Response"  #<Die lang erwartete Antwort>  #NT!
 me_parthia_satrapy.1531.desc_1: "Let it be said that sometimes it is wise to press one's luck, asking for a favor when it has already been denied.\n\nIn our case, we have managed to secure a favor from our #E Overlord#! when it had already been denied - what a statesman [ROOT.GetCountry.GetRuler.GetName] is."  #<Man muss sagen, dass es manchmal klug ist, sein Glück herauszufordern und um einen Gefallen zu bitten, wenn dieser bereits verweigert wurde.\n\nIn unserem Fall ist es uns gelungen, einen Gefallen von unserem #E Overlord#! zu erwirken, obwohl dieser bereits verweigert worden war – was für ein Staatsmann [ROOT.GetCountry.GetRuler.GetName] ist.>  #NT!
 me_parthia_satrapy.1531.desc_2: "We should not have tried asking for favors a second time, because we have not received a response - it seems that our #E Overlord#! disdains us that much."  #<Wir hätten nicht ein zweites Mal um einen Gefallen bitten sollen, da wir keine Antwort erhalten haben – es scheint, dass unser #E Overlord#! uns so sehr verachtet.>  #NT!
 me_parthia_satrapy.1531.a: "We are grateful for anything."  #<Wir sind für alles dankbar.>  #NT!
 me_parthia_satrapy.1531.b: "How unfortunate for us... this makes me sad."  #<Wie schade für uns... das macht mich traurig.>  #NT!
 me_parthia_satrapy.16.t: "Content In One's Station"  #<Inhalt in der eigenen Station>  #NT!
 me_parthia_satrapy.16.desc: "Thanks to our faithful devotion to our Master's cause, [ROOT.GetCountry.GetRuler.GetName] has been rewarded by [ROOT.GetCountry.GetOverlord.GetRuler.GetName] with a lavish ceremony that honors the [ROOT.GetCountry.GetAdjective] nation and its people.\n\n'You are amongst the most faithful servants that I have, [ROOT.GetCountry.GetRuler.GetFirstName], and for this I praise you. Like a faithful hound, you are by my side and I delight in your obedience - we will enjoy many sunny days together, my friend."  #<Dank unserer treuen Hingabe an die Sache unseres Meisters wurde [ROOT.GetCountry.GetRuler.GetName] von [ROOT.GetCountry.GetOverlord.GetRuler.GetName] mit einer aufwendigen Zeremonie belohnt, die die Nation [ROOT.GetCountry.GetAdjective] und ihr Volk ehrt.\n\n'Du gehörst zu den treuesten Dienern, die ich habe, [ROOT.GetCountry.GetRuler.GetFirstName], und dafür preise ich dich. Wie ein treuer Hund bist du an meiner Seite und ich freue mich über deinen Gehorsam – wir werden viele sonnige Tage zusammen genießen, mein Freund.>  #NT!
 me_parthia_satrapy.16.a: "You've got that right, sir! Thank you, sir"  #<Da haben Sie recht, Sir! Vielen Dank, Herr>  #NT!
 me_parthia_satrapy.17.t: "$parthia_satrapy_missions_13$"  #<$parthia_satrapy_missions_13$>  #NT!
 me_parthia_satrapy.17.desc: "IZN - event for Bactria a allowing yauhahaha/Paurava- like power struggle "  #<IZN – Veranstaltung für Baktrien, ein zulassender Yauhahaha/Paurava-ähnlicher Machtkampf>  #NT!
 me_parthia_satrapy.17.a: "We need to be wary."  #<Wir müssen vorsichtig sein.>  #NT!
 me_parthia_satrapy.1701.t: "Warriors of Politics: Slander"  #<Krieger der Politik: Verleumdung>  #NT!
 me_parthia_satrapy.1701.desc: "You are granted a council with [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] himself. This is your chance to convince him of why we should be able to attack the #E Bactria#! freely.\n\n"[ROOT.GetCountry.GetRuler.GetPraenomen|E], you speak ill of my subjects in #E Bactria#!. What is it that they say?" says [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen].\nYou reply, "My [ROOT.GetCountry.GetOverlord.GetRulerTitle], they...""  #<Dir wird ein Rat mit [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] selbst gewährt. Dies ist Ihre Chance, ihn davon zu überzeugen, warum wir die #E Bactria#! ungehindert angreifen sollten.\n\n„[ROOT.GetCountry.GetRuler.GetPraenomen|E], Sie sprechen schlecht über meine Untertanen in #E Bactria#!. Was sagen sie?“ sagt [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen].\nDu antwortest: „Mein [ROOT.GetCountry.GetOverlord.GetRulerTitle], sie…“>  #NT!
 me_parthia_satrapy.1701.a: ""Horde wealth that belongs to you!""  #<„Hordenreichtum, der dir gehört!“>  #NT!
 me_parthia_satrapy.1701.b: ""Say your wife is unfaithful!""  #<„Sagen Sie, Ihre Frau ist untreu!“>  #NT!
 me_parthia_satrapy.1701.c: ""Claim that your face is unsightly!""  #<„Behaupten Sie, dass Ihr Gesicht unansehnlich ist!“>  #NT!
 me_parthia_satrapy.1701.d: ""Say that you... um... are... s-stupid..?""  #<„Sag mal, dass du... ähm... dumm bist...?“>  #NT!
 me_parthia_satrapy.1701.e: ""In my visions, [GetCountry('BAC').GetRuler.GetPraenomen|E] has turned you into a frog who prefers men!""  #<„In meinen Visionen hat [GetCountry('BAC').GetRuler.GetPraenomen|E] dich in einen Frosch verwandelt, der Männer bevorzugt!“>  #NT!
 me_parthia_satrapy.1701.f: ""Are bad.""  #<„Sind schlecht.“>  #NT!
 me_parthia_satrapy.1701.g: ""They #E th#!lander you and #E th#!ay that you are '#E th#!upid' and a '#E th#!lob'.""  #<„Sie #E th#!lander du und #E th#!ay, dass du '#E th#!upid' und ein '#E th#!lob'. bist“>  #NT!
 me_parthia_satrapy.1701.s: ""Spread unspeakable rumors. Trust me my friend.""  #<„Verbreite unaussprechliche Gerüchte. Vertrau mir, mein Freund.“>  #NT!
 me_parthia_satrapy.1702.t: ""Warriors of Politics: Success"  #<„Krieger der Politik: Erfolg>  #NT!
 me_parthia_satrapy.1702.desc: "We have successfully convinced [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] that [GetCountry('BAC').GetName|E] must be punished. And luckily, we're allowed to be the ones to enact said punishment. We have #E 5 years#! before this diplomatic incident will blow over."  #<Wir haben [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] erfolgreich davon überzeugt, dass [GetCountry('BAC').GetName|E] bestraft werden muss. Und zum Glück dürfen wir diejenigen sein, die diese Strafe verhängen. Wir haben noch #E 5 Jahre#!, bis dieser diplomatische Zwischenfall vorbei ist.>  #NT!
 me_parthia_satrapy.1702.a: "Great! Now to wage war..."  #<Großartig! Jetzt Krieg führen...>  #NT!
 me_parthia_satrapy.1703.t: "Warriors of Politics: Success?"  #<Krieger der Politik: Erfolg?>  #NT!
 me_parthia_satrapy.1703.desc: "We have successfully convinced [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] that [GetCountry('BAC').GetName|E] must be punished... however he gave them a slap on the wrist instead of allowing us to give them a slap with our spears. We will have to be even more convincing if we want to be allowed to attack them."  #<Wir haben [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] erfolgreich davon überzeugt, dass [GetCountry('BAC').GetName|E] bestraft werden muss ... Er gab ihnen jedoch einen Schlag aufs Handgelenk, anstatt uns zu erlauben, ihnen einen Schlag mit unseren Speeren zu verpassen. Wir müssen noch überzeugender sein, wenn wir sie angreifen wollen.>  #NT!
 me_parthia_satrapy.1703.a: "Hmph, we must sell our story better."  #<Hmpf, wir müssen unsere Geschichte besser verkaufen.>  #NT!
 me_parthia_satrapy.1704.t: "Warriors of Politics: Punished"  #<Krieger der Politik: Bestraft>  #NT!
 me_parthia_satrapy.1704.desc: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] has replied to us with disdain. You are clearly lying, he claims, and demands you send him extra tribute immediately to apologize."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] hat uns mit Verachtung geantwortet. Sie lügen eindeutig, behauptet er und verlangt, dass Sie ihm sofort eine zusätzliche Anerkennung zukommen lassen, um sich zu entschuldigen.>  #NT!
 me_parthia_satrapy.1704.a: "Well that didn't go as planned."  #<Nun, das lief nicht wie geplant.>  #NT!
 me_parthia_satrapy.1705.t: "Warriors of Politics: Punished"  #<Krieger der Politik: Bestraft>  #NT!
 me_parthia_satrapy.1705.desc: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] has replied to us with disdain. You are clearly lying, he claims, and demands you send him extra tribute immediately to apologize."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] hat uns mit Verachtung geantwortet. Sie lügen eindeutig, behauptet er und verlangt, dass Sie ihm sofort eine zusätzliche Anerkennung zukommen lassen, um sich zu entschuldigen.>  #NT!
 me_parthia_satrapy.1705.a: "Well that didn't go as planned."  #<Nun, das lief nicht wie geplant.>  #NT!
 me_parthia_satrapy.1720.t: "Treachery! Lies! Deceit!"  #<Verrat! Lügen! Betrug!>  #NT!
 me_parthia_satrapy.1720.desc: "We have received word the [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] believes we have insulted him! He said that it was the blasted [GetCountry('par').GetRulerTitle] of [GetCountry('par').GetName|E] who told him. Somehow, [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] believes them and has allowed them to attack us directly if they so chose to. We must be ready."  #<Wir haben erfahren, dass [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] glaubt, wir hätten ihn beleidigt! Er sagte, dass es der verdammte [GetCountry('par').GetRulerTitle] von [GetCountry('par').GetName|E] war, der es ihm erzählt hatte. Irgendwie glaubt [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] ihnen und hat ihnen erlaubt, uns direkt anzugreifen, wenn sie es wollten. Wir müssen bereit sein.>  #NT!
 me_parthia_satrapy.1720.a: "Those barbarous liars!"  #<Diese barbarischen Lügner!>  #NT!
 me_parthia_satrapy.1721.t: "Treachery! Lies! Deceit!"  #<Verrat! Lügen! Betrug!>  #NT!
 me_parthia_satrapy.1721.desc: "We have received word the [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] believes we have insulted him! He said that it wasa the blasted [GetCountry('PAR').GetRulerTitle] of [GetCountry('PAR').GetName|E] who told him. Somehow, [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] believes them... luckily, they have only given us a slap on the wrist instead of allowing the #E Yaudheyans#! to attack."  #<Wir haben erfahren, dass [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] glaubt, wir hätten ihn beleidigt! Er sagte, dass es der verdammte [GetCountry('PAR').GetRulerTitle] von [GetCountry('PAR').GetName|E] war, der es ihm erzählt hatte. Irgendwie glaubt [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] ihnen ... zum Glück haben sie uns nur einen Schlag aufs Handgelenk gegeben, anstatt den #E Yaudheyans#! den Angriff zu erlauben.>  #NT!
 me_parthia_satrapy.1721.a: "This is insulting!"  #<Das ist beleidigend!>  #NT!
 me_parthia_satrapy.1711.t: "Are You Insane?"  #<Bist du verrückt?>  #NT!
 me_parthia_satrapy.1711.desc: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] replied to our request with a confused answer. He seems to... erm... question your sanity frankly."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] antwortete auf unsere Anfrage mit einer verwirrten Antwort. Er scheint... ähm... ehrlich gesagt Ihren Verstand in Frage zu stellen.>  #NT!
 me_parthia_satrapy.1711.a: "He's the fool, not me!"  #<Er ist der Narr, nicht ich!>  #NT!
 me_parthia_satrapy.1710.t: "Is [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] Insane?"  #<Ist [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] verrückt?>  #NT!
 me_parthia_satrapy.1710.desc: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] replied to our request with a confused answer. He seems to... somehow... believe the insanity?! What luck!"  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] antwortete auf unsere Anfrage mit einer verwirrten Antwort. Er scheint... irgendwie... an den Wahnsinn zu glauben?! Was für ein Glück!>  #NT!
 me_parthia_satrapy.1710.a: "My logic is absolutely sound."  #<Meine Logik ist absolut fundiert.>  #NT!
 me_parthia_satrapy.18.t: "$parthia_satrapy_missions_14$"  #<$parthia_satrapy_missions_14$>  #NT!
 me_parthia_satrapy.18.desc: "[GetCountry('BAC').GetName|E] will finally meet its end. [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] has allowed us to attack them, thanks to our diplomatic efforts, and so we shall declare war to conquer their entire state! The cruel Basileus has compared [ROOT.GetCountry.GetName] and [GetCountry('BAC').GetName] to his two most prized dogs and watches our struggle against each other with a morbid curiosity, unsure who will come out on top in the end but eager to see blood spilled."  #<[GetCountry('BAC').GetName|E] wird endlich sein Ende finden. [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|E] hat uns dank unserer diplomatischen Bemühungen erlaubt, sie anzugreifen, und deshalb werden wir ihnen den Krieg erklären, um ihren gesamten Staat zu erobern! Der grausame Basileus hat [ROOT.GetCountry.GetName] und [GetCountry('BAC').GetName] mit seinen beiden wertvollsten Hunden verglichen und beobachtet unseren Kampf gegeneinander mit krankhafter Neugier, unsicher, wer am Ende die Nase vorn haben wird, aber begierig darauf, Blutvergießen zu sehen.>  #NT!
 me_parthia_satrapy.18.a: "[GetDeityDefinition('omen_ares').GetName] blesses our blades!"  #<[GetDeityDefinition('omen_ares').GetName] segnet unsere Klingen!>  #NT!
 # me_parthia_satrapy.18.tt: ""
 me_parthia_satrapy.19.t: "The Independence of [ROOT.GetCountry.GetName]"  #<Die Unabhängigkeit von [ROOT.GetCountry.GetName]>  #NT!
 me_parthia_satrapy.19.desc_1: "With the [ROOT.GetCountry.GetOverlord.GetAdjective]s demanding our submission and us demanding independence, we have come to the conclusion that there is only one solution to our differences; war. Our fate shall be decided in the mountains and plains of #E Iran#!, which will be watered with the blood of good men."  #<Da die [ROOT.GetCountry.GetOverlord.GetAdjective]s unsere Unterwerfung fordern und wir Unabhängigkeit fordern, sind wir zu dem Schluss gekommen, dass es nur eine Lösung für unsere Differenzen gibt; Krieg. Unser Schicksal wird in den Bergen und Ebenen von #E Iran#!, entschieden, die mit dem Blut guter Männer getränkt werden.>  #NT!
 me_parthia_satrapy.19.desc_2: "Luckily, the #E [ROOT.GetCountry.GetOverlord.GetAdjective]s#! have come to agree with our demands of independence and they even offered us friendship, saying that an alliance would strengthen both our nations, which would otherwise be vulnerable to the vultures that are the other #E Diadochi#!."  #<Glücklicherweise sind die #E [ROOT.GetCountry.GetOverlord.GetAdjective]s#! mit unseren Forderungen nach Unabhängigkeit einverstanden und haben uns sogar Freundschaft angeboten, indem sie sagten, dass ein Bündnis unsere beiden Nationen stärken würde, die andernfalls anfällig für die Geier wären, die die anderen #E Diadochi#! sind.>  #NT!
 me_parthia_satrapy.19.a: "Then war it is"  #<Dann ist es Krieg>  #NT!
 me_parthia_satrapy.19.b: "All is better when you talk through it"  #<Alles ist besser, wenn man darüber spricht>  #NT!
  
 me_parthia_satrapy.20.t: "Demanding Independence"  #<Unabhängigkeit fordern>  #NT!
 me_parthia_satrapy.20.desc: "In the last years, more and more dissenting voices have been heard in the marketplaces of our cities, voicing their discontent as they demand the independence of our nation from the [ROOT.GetCountry.GetOverlord.GetAdjective]s.\n\nNot all desire the same thing, however; some want to see [ROOT.GetCountry.GetRuler.GetName] pay back our overlords for past misdeeds and see it as a form of repayment, while others engage themselves in a bid to secure our independence peacefully, saying that no men need to die."  #<In den letzten Jahren wurden auf den Marktplätzen unserer Städte immer mehr abweichende Stimmen laut, die ihrer Unzufriedenheit Ausdruck verliehen, als sie die Unabhängigkeit unserer Nation von den [ROOT.GetCountry.GetOverlord.GetAdjective]er Jahren forderten.\n\nAllerdings wünschen sich nicht alle das Gleiche; Einige wollen, dass [ROOT.GetCountry.GetRuler.GetName] unsere Oberherren für vergangene Missetaten revanchieren, und betrachten dies als eine Form der Wiedergutmachung, während andere sich für die friedliche Sicherung unserer Unabhängigkeit engagieren und sagen, dass kein Mensch sterben muss.>  #NT!
 me_parthia_satrapy.20.a: "War is the only option we have."  #<Krieg ist die einzige Option, die wir haben.>  #NT!
 me_parthia_satrapy.20.b: "We shall try diplomacy first."  #<Wir werden es zunächst mit Diplomatie versuchen.>  #NT!
  
 me_parthia_satrapy.21.t: "Demand of Independence"  #<Forderung nach Unabhängigkeit>  #NT!
 me_parthia_satrapy.21.desc: "Disastrous day! Our subject [SCOPE.sCountry('cap_subject_country_scope').GetName] demands independence, threatening war if we do not release them immediately!"  #<Katastrophaler Tag! Unser Subjekt [SCOPE.sCountry('cap_subject_country_scope').GetName] fordert Unabhängigkeit und droht mit Krieg, wenn wir sie nicht sofort freilassen!>  #NT!
 me_parthia_satrapy.21.a: "Then war it is."  #<Dann ist es Krieg.>  #NT!
 me_parthia_satrapy.21.b: "Let them go free."  #<Lasst sie frei.>  #NT!
 me_parthia_satrapy.2100.t: "Granted Freedom"  #<Gewährte Freiheit>  #NT!
 me_parthia_satrapy.2100.desc: "Intimidated by our military strength and us threatening war, our overlord has granted us our freedom, dreading the fight on the battlefield."  #<Eingeschüchtert von unserer militärischen Stärke und der Drohung, dass wir mit Krieg drohen, gewährte uns unser Oberherr unsere Freiheit und fürchtete den Kampf auf dem Schlachtfeld.>  #NT!
 me_parthia_satrapy.2100.a: "Even without any bloodshed, we are now free! It's a joyous day."  #<Auch ohne Blutvergießen sind wir jetzt frei! Es ist ein freudiger Tag.>  #NT!
  
 me_parthia_satrapy.22.t: "Demand of Independence"  #<Forderung nach Unabhängigkeit>  #NT!
 me_parthia_satrapy.22.desc: "Our subject [SCOPE.sCountry('cap_subject_country_scope').GetName] yearns for independence, asking us to grant them full autonomy and accept them as allies instead. Their diplomats even have the gall to discuss the so-called 'mutual benefit' for both parties."  #<Unser Subjekt [SCOPE.sCountry('cap_subject_country_scope').GetName] sehnt sich nach Unabhängigkeit und bittet uns, ihm volle Autonomie zu gewähren und sie stattdessen als Verbündete zu akzeptieren. Ihre Diplomaten haben sogar die Frechheit, über den sogenannten „gegenseitigen Nutzen“ für beide Parteien zu diskutieren.>  #NT!
 me_parthia_satrapy.22.a: "If you want freedom, you'll have to fight for it."  #<Wenn du Freiheit willst, musst du dafür kämpfen.>  #NT!
 me_parthia_satrapy.22.b: "An ally is better than an enemy."  #<Ein Verbündeter ist besser als ein Feind.>  #NT!
  
 me_parthia_satrapy.23.t: "Hegemon Of Iran"  #<Hegemon des Iran>  #NT!
 me_parthia_satrapy.23.desc: "[ROOT.GetCountry.GetRuler.GetName] has a trained and well-equipped army that [ROOT.GetCountry.GetRuler.GetSheHe] can call upon at any time to defend the borders and interests of [ROOT.GetCountry.GetName], and no one can stand against their people when it comes to contesting control of #E Iran#!. Needless to say, the epithet 'Hegemon of Iran' is a deserved one."  #<[ROOT.GetCountry.GetRuler.GetName] verfügt über eine ausgebildete und gut ausgerüstete Armee, auf die [ROOT.GetCountry.GetRuler.GetSheHe] jederzeit zurückgreifen kann, um die Grenzen und Interessen von [ROOT.GetCountry.GetName] zu verteidigen, und niemand kann sich seinem Volk widersetzen, wenn es darum geht, die Kontrolle über #E Iran#!. anzufechten. Unnötig zu erwähnen, dass der Beiname „Hegemon des Iran“ verdient ist.>  #NT!
 me_parthia_satrapy.23.a: "My word is law in this corner of the world."  #<Mein Wort ist Gesetz in dieser Ecke der Welt.>  #NT!
  
 me_parthia_satrapy.25.t: "$parthia_satrapy_missions_16$"  #<$parthia_satrapy_missions_16$>  #NT!
 me_parthia_satrapy.25.desc: "In the #E Annals of the [ROOT.GetCountry.GetAdjective]s#!, the entire speech given by [ROOT.GetCountry.GetRuler.GetName] to [ROOT.GetCountry.GetRuler.GetHerHis] troops in the field was recorded word for word, for this moment in time would prove to be pivotal in the history of [ROOT.GetCountry.GetName] and future generations would ponder and study the leader's words.\n\nAfter realizing that the cruel [GetCountry('SEL').GetName] did not care whether or not our warriors perished defending 'their hinterlands' from the steppe tribes, the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] told [ROOT.GetCountry.GetRuler.GetHerHis] gathered levies that the choice of paying tribute to a tyrant or dying in servitude was no choice at all, and one that [ROOT.GetCountry.GetRuler.GetSheHe] could abide no longer.\n\n'I want to know, then, o sons of [ROOT.GetCountry.GetName], if you will continue to pay lipservice to a Basileus that cares not for your wellbeing, or if you will ride alongside me as I fight for your honor? Have I not been like a father to you? I march alongside you and sleep in the same tents as you; I have shared in your joys and your miseries, your triumphs and defeats. Who is [GetCharacter('(int32)24').GetFirstName], then, to treat us as disposable pawns? Together, we can change the course of history, but I need to know, now and forever - are you with me?'\n\nThe sound of ten thousand men screaming as one was all of the answer that [ROOT.GetCountry.GetRuler.GetFirstName] needed."  #<In den #E Annalen der [ROOT.GetCountry.GetAdjective]s#!, wurde die gesamte Rede, die [ROOT.GetCountry.GetRuler.GetName] vor [ROOT.GetCountry.GetRuler.GetHerHis] Truppen im Feld hielt, Wort für Wort aufgezeichnet, denn dieser Moment sollte sich als entscheidend in der Geschichte von [ROOT.GetCountry.GetName] erweisen und zukünftige Generationen würden über die Worte des Anführers nachdenken und sie studieren.\n\nNachdem sie erkannten, dass es den grausamen [GetCountry('SEL').GetName] egal war, ob unsere Krieger bei der Verteidigung umkamen oder nicht „ihr Hinterland“ von den Steppenstämmen, die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] erzählten [ROOT.GetCountry.GetRuler.GetHerHis] versammelten Aufgeboten, dass die Wahl, einem Tyrannen Tribut zu zahlen oder in der Knechtschaft zu sterben, überhaupt keine Wahl sei und eine, die [ROOT.GetCountry.GetAdjective]0 nicht länger ertragen könne.\n\n'Dann möchte ich wissen, o Söhne von [ROOT.GetCountry.GetName], ob ihr weiterhin Lippenbekenntnisse zu einem Basileus ablegen werdet, der sich nicht um euch kümmert Wohlergehen, oder ob du an meiner Seite reiten wirst, während ich für deine Ehre kämpfe? War ich nicht wie ein Vater für dich? Ich marschiere an deiner Seite und schlafe in denselben Zelten wie du; Ich habe an Ihren Freuden und Ihrem Elend, Ihren Triumphen und Niederlagen teilgenommen. Wer ist dann [ROOT.GetCountry.GetAdjective]2, uns als verfügbare Schachfiguren zu behandeln? Gemeinsam können wir den Lauf der Geschichte verändern, aber ich muss jetzt und für immer wissen: Bist du bei mir?‘\n\nDer Klang von zehntausend Männern, die wie ein Mann schrien, war die einzige Antwort, die [ROOT.GetCountry.GetAdjective]3 brauchte.>  #NT!
 me_parthia_satrapy.25.a: "Our road to greatness starts here!"  #<Unser Weg zur Größe beginnt hier!>  #NT!
  
 me_parthia_satrapy.26.t: "$parthia_satrapy_missions_17$"  #<$parthia_satrapy_missions_17$>  #NT!
 me_parthia_satrapy.26.desc: "Our #E Legion#!, the pride of [ROOT.GetCountry.GetRuler.GetName], has quickly grown in size, with the most experienced fighters living within [ROOT.GetCountry.GetName] finding their homes in the army of the mighty [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle].\n\nOur legion has fought admirably in the field, earning valuable experience and honing the craft that has made their reputation fearsome. Thanks to this renewed martial ethos that gripped the heart of our people, [ROOT.GetCountry.GetRuler.GetFirstName] is delighted to see more and more recruits arriving from the provinces in hopes of fighting in our legion, and has made many speeches in [ROOT.GetCountry.GetCapital.GetName] calling for our veterans to train the next generation of fighters."  #<Unsere #E Legion#!,, der Stolz von [ROOT.GetCountry.GetRuler.GetName], ist schnell an Größe gewachsen, wobei die erfahrensten Kämpfer, die in [ROOT.GetCountry.GetName] leben, ihre Heimat in der Armee der Mächtigen [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] gefunden haben.\n\nUnsere Legion hat auf dem Feld bewundernswert gekämpft, wertvolle Erfahrungen gesammelt und das Handwerk verfeinert, das ihren Ruf furchterregend gemacht hat. Dank dieses erneuerten kriegerischen Ethos, der das Herz unseres Volkes erfasst hat, freut sich [ROOT.GetCountry.GetRuler.GetFirstName], dass immer mehr Rekruten aus den Provinzen in der Hoffnung auf einen Kampf in unserer Legion eintreffen, und hat in [ROOT.GetCountry.GetCapital.GetName] viele Reden gehalten, in denen er unsere Veteranen auffordert, die nächste Generation von Kämpfern auszubilden.>  #NT!
 me_parthia_satrapy.26.a: "Slowly but surely, we're making progress"  #<Langsam aber sicher machen wir Fortschritte>  #NT!
  
 me_parthia_satrapy.27.t: "$parthia_satrapy_missions_18$"  #<$parthia_satrapy_missions_18$>  #NT!
 me_parthia_satrapy.27.desc: "While [ROOT.GetCountry.GetRuler.GetName] was pleased by the prospect of being remembered as a great military leader one day, [ROOT.GetCountry.GetRuler.GetSheHe] knew that most [ROOT.GetCountry.GetAdjective]s would benefit from the construction of new cities, and that this was truly a legacy to be remembered by.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] therefore did whatever was necessary to acquire new cities for the people of [ROOT.GetCountry.GetName], whether it be funding their construction or conquering them outright."  #<Während [ROOT.GetCountry.GetRuler.GetName] sich über die Aussicht freute, eines Tages als großer Militärführer in Erinnerung zu bleiben, wusste [ROOT.GetCountry.GetRuler.GetSheHe], dass die meisten [ROOT.GetCountry.GetAdjective] vom Bau neuer Städte profitieren würden und dass dies wirklich ein Vermächtnis war, an das man sich erinnern sollte.\n\n[ROOT.GetCountry.GetRuler.GetFirstName] tat daher alles Notwendige, um neue Städte für die Menschen von [ROOT.GetCountry.GetName] zu erwerben, sei es durch die Finanzierung ihres Baus oder durch die vollständige Eroberung.>  #NT!
 me_parthia_satrapy.27.a: "Cities are a key to a strong realm"  #<Städte sind der Schlüssel zu einem starken Reich>  #NT!
  
 me_parthia_satrapy.28.t: "$parthia_satrapy_missions_19$"  #<$parthia_satrapy_missions_19$>  #NT!
 me_parthia_satrapy.28.desc: "Although the language exchanged between diplomats was purposefully vague, [GetCountry('BAC').GetRuler.GetName] and [GetCountry('PRM').GetRuler.GetName] both expressed that they understood exactly where [ROOT.GetCountry.GetRuler.GetName] was coming from, and they agreed to uphold the obligations of friendship in case they were called upon."  #<Obwohl die Sprache, die zwischen den Diplomaten ausgetauscht wurde, absichtlich vage war, brachten [GetCountry('BAC').GetRuler.GetName] und [GetCountry('PRM').GetRuler.GetName] beide zum Ausdruck, dass sie genau verstanden hätten, woher [ROOT.GetCountry.GetRuler.GetName] kam, und dass sie sich bereit erklärten, die freundschaftlichen Verpflichtungen einzuhalten, falls sie dazu aufgefordert würden.>  #NT!
 me_parthia_satrapy.28.a: "This is most excellent news"  #<Das sind hervorragende Neuigkeiten>  #NT!
  
 me_parthia_satrapy.29.t: "$parthia_satrapy_missions_20$"  #<$parthia_satrapy_missions_20$>  #NT!
 me_parthia_satrapy.29.desc: "News of the death of [GetCharacter('(int32)24').GetName] arrived in [ROOT.GetCountry.GetCapital.GetName] like a thunder bolt thrown by [GetDeityDefinition('omen_zeus').GetName], sending the [ROOT.GetCountry.GetAdjective] capital into a frenzy the likes of which had never been seen. [GetCountry('SEL').GetRuler.GetName], the new [GetCountry('SEL').GetRulerTitle] of the [GetCountry('SEL').GetName], was doing what [GetCountry('SEL').GetRuler.GetSheHe] could to settle the matter of [GetCountry('SEL').GetRuler.GetHerHis] succession as quickly as possible, but there were rumors that not everyone living in [GetCountry('SEL').GetCapital.GetName] was pleased with the new state of affairs.\n\nIt was at this moment that [ROOT.GetCountry.GetRuler.GetName] knew that the hour of destiny was almost at hand, and that [ROOT.GetCountry.GetRuler.GetSheHe] better start preparing for what would happen next."  #<Die Nachricht vom Tod von [GetCharacter('(int32)24').GetName] traf in [ROOT.GetCountry.GetCapital.GetName] wie ein Donnerschlag von [GetDeityDefinition('omen_zeus').GetName] ein und versetzte die Hauptstadt von [ROOT.GetCountry.GetAdjective] in einen noch nie dagewesenen Aufruhr. [GetCountry('SEL').GetRuler.GetName], der neue [GetCountry('SEL').GetRulerTitle] der [GetCountry('SEL').GetName], tat, was [GetCountry('SEL').GetRuler.GetSheHe] konnte, um die Nachfolgefrage von [GetCountry('SEL').GetRuler.GetHerHis] so schnell wie möglich zu regeln, aber es gab Gerüchte, dass nicht alle Bewohner von [GetCountry('SEL').GetCapital.GetName] mit der neuen Lage zufrieden waren.\n\nIn diesem Moment wusste [ROOT.GetCountry.GetCapital.GetName]0, dass die Stunde des Schicksals fast nahe war und dass [ROOT.GetCountry.GetCapital.GetName]1 Bereiten Sie sich besser auf das vor, was als nächstes passieren würde.>  #NT!
 me_parthia_satrapy.29.a: "Almost all of the pieces are set in place..."  #<Fast alle Teile sind montiert...>  #NT!
  
 me_parthia_satrapy.30.t: "$parthia_satrapy_missions_21$"  #<$parthia_satrapy_missions_21$>  #NT!
 me_parthia_satrapy.30.desc: "It came as a relief when news of tribes approaching our border was received in [ROOT.GetCountry.GetCapital.GetName], for the sight of our newly-built fortifications was enough to turn the steppe riders away from our lands. Realizing that they would not be able to raid our territories with impunity, it is said that the hordes were last seen riding towards the east in search of easier prey."  #<Es war eine Erleichterung, als im Jahr [ROOT.GetCountry.GetCapital.GetName] die Nachricht von Stämmen eintraf, die sich unserer Grenze näherten, denn der Anblick unserer neu errichteten Befestigungen reichte aus, um die Steppenreiter von unserem Land abzuhalten. Da ihnen bewusst war, dass sie unsere Gebiete nicht ungestraft überfallen könnten, soll man die Horden zuletzt gesehen haben, wie sie auf der Suche nach leichterer Beute Richtung Osten zogen.>  #NT!
 me_parthia_satrapy.30.a: "Our northern flank is safe."  #<Unsere Nordflanke ist sicher.>  #NT!
  
 me_parthia_satrapy.31.t: "$parthia_satrapy_missions_22$"  #<$parthia_satrapy_missions_22$>  #NT!
 me_parthia_satrapy.31.desc: "News of [ROOT.GetCountry.GetRuler.GetName]'s rebellion was met with cold disdain from [GetCountry('SEL').GetRuler.GetName], who vowed to personally march for the gates of [ROOT.GetCountry.GetCapital.GetName] and lay siege against the [ROOT.GetCountry.GetAdjective]s.\n\nThe letter sent from the [GetCountry('SEL').GetAdjective] [GetCountry('SEL').GetRulerTitle] was short and to the point. 'You know the penalty given to traitors, [ROOT.GetCountry.GetRuler.GetFirstName] - I will not spare you or anyone in your family.'"  #<Die Nachricht von [ROOT.GetCountry.GetRuler.GetName]s Rebellion wurde von [GetCountry('SEL').GetRuler.GetName] mit kalter Verachtung aufgenommen, der schwor, persönlich zu den Toren von [ROOT.GetCountry.GetCapital.GetName] zu marschieren und die [ROOT.GetCountry.GetAdjective] zu belagern.\n\nDer Brief von [GetCountry('SEL').GetAdjective] [GetCountry('SEL').GetRulerTitle] war kurz und auf den Punkt gebracht. „Du kennst die Strafe, die Verrätern auferlegt wird, [ROOT.GetCountry.GetRuler.GetFirstName] – Ich werde weder dich noch irgendjemanden in deiner Familie verschonen.“>  #NT!
 me_parthia_satrapy.31.a: "You will live to regret those words, [GetCountry('SEL').GetRuler.GetFirstName]!"  #<Du wirst diese Worte noch lange bereuen, [GetCountry('SEL').GetRuler.GetFirstName]!>  #NT!
  
 me_parthia_satrapy.32.t: "$parthia_satrapy_missions_23$"  #<$parthia_satrapy_missions_23$>  #NT!
 me_parthia_satrapy.32.desc: "After a brutal war that left countless thousands dead, the bold [ROOT.GetCountry.GetRuler.GetName] has finally led the people of [ROOT.GetCountry.GetName] through the worst of the crisis and has somehow managed to come out stronger on the other side. The superior armies of the [ROOT.GetCountry.GetRulerTitle] won the war of liberation against the [GetCountry('SEL').GetName], securing our freedom and establishing us as a mighty power that has caught the attention of our neighbors. All eyes in the region have turned towards [ROOT.GetCountry.GetRuler.GetFirstName], with many openly questioning what [ROOT.GetCountry.GetRuler.GetSheHe] will do next."  #<Nach einem brutalen Krieg, der unzählige Tausende Tote forderte, hat der mutige [ROOT.GetCountry.GetRuler.GetName] die Menschen von [ROOT.GetCountry.GetName] endlich durch die schlimmste Phase der Krise geführt und es irgendwie geschafft, auf der anderen Seite gestärkt daraus hervorzugehen. Die überlegenen Armeen der [ROOT.GetCountry.GetRulerTitle] haben den Befreiungskrieg gegen die [GetCountry('SEL').GetName] gewonnen, unsere Freiheit gesichert und uns als mächtige Macht etabliert, die die Aufmerksamkeit unserer Nachbarn auf sich gezogen hat. Alle Augen in der Region sind auf [ROOT.GetCountry.GetRuler.GetFirstName] gerichtet, und viele fragen sich offen, was [ROOT.GetCountry.GetRuler.GetSheHe] als nächstes tun wird.>  #NT!
 me_parthia_satrapy.32.a: "The time has come to consolidate our gains"  #<Es ist an der Zeit, unsere Erfolge zu festigen>  #NT!
  
 me_parthia_satrapy.33.t: "$parthia_satrapy_missions_25$"  #<$parthia_satrapy_missions_25$>  #NT!
 me_parthia_satrapy.33.desc: "While many of [ROOT.GetCountry.GetRuler.GetName]'s worst critics accused the [ROOT.GetCountry.GetRulerTitle] of only be interested in two things - war and horses - this was an insult that misrepresented what [ROOT.GetCountry.GetRuler.GetSheHe] was really like.\n\nIn fact, one of the main reasons that the armies of the [ROOT.GetCountry.GetRuler.GetFamily.GetName]s had conquered the land of the #E Medes#! was not to merely absorb their borders, but to plunder their knowledge instead. For as long as [ROOT.GetCountry.GetRuler.GetSheHe] could remember, [ROOT.GetCountry.GetRuler.GetFirstName] had heard reverential tales told of the wise men of #E Media#!, and was absolutely thrilled to have added their territories to the growing might of [ROOT.GetCountry.GetName]."  #<Während viele der schlimmsten Kritiker von [ROOT.GetCountry.GetRuler.GetName] den [ROOT.GetCountry.GetRulerTitle] vorwarfen, sich nur für zwei Dinge zu interessieren – Krieg und Pferde –, war dies eine Beleidigung, die falsch darstellte, wie [ROOT.GetCountry.GetRuler.GetSheHe] wirklich war.\n\nTatsächlich war einer der Hauptgründe dafür, dass die Armeen der [ROOT.GetCountry.GetRuler.GetFamily.GetName] das Land der #E Meder#! erobert hatten, nicht nur, um ihre Grenzen zu übernehmen, sondern um ihr Wissen zu plündern stattdessen. So lange [ROOT.GetCountry.GetRuler.GetSheHe] zurückdenken konnte, hatte [ROOT.GetCountry.GetRuler.GetFirstName] ehrfurchtsvolle Geschichten über die Weisen von #E Media#! gehört und war absolut begeistert, ihre Gebiete der wachsenden Macht von [ROOT.GetCountry.GetRulerTitle]0 hinzugefügt zu haben.>  #NT!
 me_parthia_satrapy.33.a: "Conquering #E Media#! was only a matter of time."  #<Die Eroberung von #E Media#! war nur eine Frage der Zeit.>  #NT!
  
 me_parthia_satrapy.34.t: "$parthia_satrapy_missions_26$"  #<$parthia_satrapy_missions_26$>  #NT!
 me_parthia_satrapy.34.desc: "Conquering #E Persis#! has proven to be beneficial for [ROOT.GetCountry.GetName] in more ways than one, but chief among them are manpower and prestige. Our armies are always in need of fresh recruits, and the storied lands of this ancient realm have provided us with a large body of potential soldiers that we could draw from. In addition to this is the political clout that [ROOT.GetCountry.GetRuler.GetName] is enjoying, for conquering Persis has brought the [ROOT.GetCountry.GetRulerTitle] fame."  #<Die Eroberung von #E Persis#! hat sich in mehr als einer Hinsicht als vorteilhaft für [ROOT.GetCountry.GetName] erwiesen, vor allem aber in Bezug auf Arbeitskraft und Prestige. Unsere Armeen brauchen immer neue Rekruten, und die geschichtsträchtigen Länder dieses alten Reiches haben uns eine große Anzahl potenzieller Soldaten beschert, aus denen wir schöpfen können. Hinzu kommt der politische Einfluss, den [ROOT.GetCountry.GetRuler.GetName] genießt, denn die Eroberung von Persis hat [ROOT.GetCountry.GetRulerTitle] Ruhm eingebracht.>  #NT!
 me_parthia_satrapy.34.a: "#E Persis#! needs our rule more than we need them"  #<#E Persis#! braucht unsere Herrschaft mehr als wir sie brauchen>  #NT!
  
 me_parthia_satrapy.35.t: "$parthia_satrapy_missions_27$"  #<$parthia_satrapy_missions_27$>  #NT!
 me_parthia_satrapy.35.desc: "By pushing [ROOT.GetCountry.GetRuler.GetHerHis] armies far to the east, [ROOT.GetCountry.GetRuler.GetName] has managed to bring the borders of [ROOT.GetCountry.GetName] to the #E Mare Erythraeum#! -a feat that only a few conquerors in history can claim.\n\nOur soldiers have crossed through endless deserts, their weary feet steadily marching across the endless dunes in pursuit of our foes, and the gods of war stood alongside us. Pitched battles were fought over the future of this land and our men won the day, laying waste to our enemies in the mountains and rocky foothills of [GetProvince('(int32)6524').GetArea.GetRegion.GetName]."  #<Indem er [ROOT.GetCountry.GetRuler.GetHerHis] Armeen weit nach Osten drängte, ist es [ROOT.GetCountry.GetRuler.GetName] gelungen, die Grenzen von [ROOT.GetCountry.GetName] an das #E Mare Erythraeum#! zu bringen – eine Leistung, die nur wenige Eroberer in der Geschichte von sich behaupten können.\n\nUnsere Soldaten haben endlose Wüsten durchquert, ihre müden Füße marschierten stetig über die endlosen Dünen, um unsere Feinde zu verfolgen, und die Götter des Krieges standen an unserer Seite. Es wurden offene Schlachten um die Zukunft dieses Landes ausgetragen, und unsere Männer gewannen den Sieg und verwüsteten unsere Feinde in den Bergen und felsigen Ausläufern von [GetProvince('(int32)6524').GetArea.GetRegion.GetName].>  #NT!
 me_parthia_satrapy.35.a: "Our heartlands are protected because of this victory"  #<Unser Kernland ist durch diesen Sieg geschützt>  #NT!
  
 me_parthia_satrapy.36.t: "$parthia_satrapy_missions_28$"  #<$parthia_satrapy_missions_28$>  #NT!
 me_parthia_satrapy.36.desc: "Time and time again, whenever there was a crisis facing [ROOT.GetCountry.GetName] or a moment that required grace under pressure, [ROOT.GetCountry.GetRuler.GetName] was always there to rise to the challenge, and it is because of the [ROOT.GetCountry.GetRulerTitle] and [ROOT.GetCountry.GetRuler.GetHerHis] family, the #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#!, that the [ROOT.GetCountry.GetAdjective]s are a free people.\n\nAnd so, it came to pass that after expanding the borders to their farthest extent and building a civilization that rivaled the great powers of the #E Mediterranean#!, [ROOT.GetCountry.GetRuler.GetFirstName] declared that [ROOT.GetCountry.GetRuler.GetSheHe] was a true #E Successor of Alexander#! in deeds and actions, and the founder of a new empire that would bear [ROOT.GetCountry.GetRuler.GetHerHis] name - the #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Empire#!."  #<Immer und immer wieder, wann immer es eine Krise für [ROOT.GetCountry.GetName] gab oder einen Moment, der Gnade unter Druck erforderte, war [ROOT.GetCountry.GetRuler.GetName] immer da, um sich der Herausforderung zu stellen, und es ist der Familie [ROOT.GetCountry.GetRulerTitle] und [ROOT.GetCountry.GetRuler.GetHerHis], den #E [ROOT.GetCountry.GetRuler.GetFamily.GetName]s#!, zu verdanken, dass die [ROOT.GetCountry.GetAdjective]s ein freies Volk sind.\n\nUnd so begab es sich, nachdem die Grenzen bis ans Äußerste ausgedehnt wurden Ausmaß und Aufbau einer Zivilisation, die mit den Großmächten des #E Mittelmeerraums#!, konkurrierte. [ROOT.GetCountry.GetRuler.GetName]0 erklärte, dass [ROOT.GetCountry.GetRuler.GetName]1 ein wahrer #E Nachfolger Alexanders[ROOT.GetCountry.GetRuler.GetName]3 in Taten und Taten und der Gründer eines neuen Reiches sei, das [ROOT.GetCountry.GetRuler.GetHerHis] den Namen tragen würde – das #E [ROOT.GetCountry.GetRuler.GetFamily.GetName] Reich[ROOT.GetCountry.GetRuler.GetName]3.>  #NT!
 me_parthia_satrapy.36.a: "Now, onwards to reclaim Alexander's legacy!"  #<Nun geht es weiter, um Alexanders Erbe zurückzufordern!>  #NT!
  
 me_parthia_satrapy.37.t: "$parthia_satrapy_missions_24$"  #<$parthia_satrapy_missions_24$>  #NT!
 me_parthia_satrapy.37.desc: "In an effort to stop the incessant raiding and intertribal warfare that has plagued the steppes for a generation, [ROOT.GetCountry.GetRuler.GetName] has decided to redraw the map of our northern regions. Most of the #E Dahae#! tribesmen living within [ROOT.GetCountry.GetName] were ordered to settle and disperse throughout our territories, with those that wanted to stay in their tribes sent to patrol the wildlands.\n\nThe [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] also made the difficult decision to abandon some territories after personally visiting the region to assess its worth. At the end of the day, [ROOT.GetCountry.GetRuler.GetFirstName] could not justify the substantial costs associated with holding on to parts of the steppe, and after discussing the matter with [ROOT.GetCountry.GetRuler.GetHerHis] closest military advisors, ordered our troops to leave their camps and move south. 'Let the horselords have their steppe to themselves - as long as they stay there, the relations between our people will continue to flourish.'"  #<Um die unaufhörlichen Raubzüge und Stammeskriege zu stoppen, die die Steppen seit einer Generation heimsuchen, hat [ROOT.GetCountry.GetRuler.GetName] beschlossen, die Karte unserer nördlichen Regionen neu zu zeichnen. Den meisten der #E Dahae#! Stammesangehörigen, die in [ROOT.GetCountry.GetName] lebten, wurde befohlen, sich in unseren Territorien niederzulassen und zu zerstreuen. Diejenigen, die in ihren Stämmen bleiben wollten, wurden geschickt, um die Wildnis zu patrouillieren.\n\nDie [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] trafen auch die schwierige Entscheidung, einige Territorien aufzugeben, nachdem sie die Region persönlich besucht hatten, um ihren Wert einzuschätzen. Am Ende des Tages konnte [ROOT.GetCountry.GetRuler.GetFirstName] die erheblichen Kosten, die mit dem Festhalten an Teilen der Steppe verbunden waren, nicht rechtfertigen und befahl unseren Truppen nach Erörterung der Angelegenheit mit [ROOT.GetCountry.GetRuler.GetHerHis] engsten Militärberatern, ihre Lager zu verlassen und nach Süden zu ziehen. „Lassen Sie die Reiterherren ihre Steppe für sich haben – solange sie dort bleiben, werden die Beziehungen zwischen unserem Volk weiterhin gedeihen.“>  #NT!
 me_parthia_satrapy.37.a: "Now the steppes are a bit more organized"  #<Jetzt sind die Steppen etwas organisierter>  #NT!
 me_parthia_satrapy.37.a.tt: "Most of the #Y Dahae#! pops will settle throughout [ROOT.GetCountry.GetName|G].\nDahae tribal vassal will secure our northern flank.\nAreas further north shall be lost."  #<Die meisten der #Y Dahae#! Einwohner werden sich im Laufe von [ROOT.GetCountry.GetName|G] niederlassen.\nDer Stammesvasall der Dahae wird unsere Nordflanke sichern.\nGebiete weiter nördlich werden verloren gehen.>  #NT!
 me_parthia_satrapy.999.t: "debug"  #<debuggen>  #NT!
 me_parthia_satrapy.999.desc: "debug"  #<debuggen>  #NT!
 me_parthia_satrapy.999.a: "debug1"  #<debug1>  #NT!
 me_parthia_satrapy.999.b: "debug2"  #<debug2>  #NT!
  
 # Tasks 
  
 parthia_satrapy_missions: "Satrapy Of The Steppes"  #<Satrapie der Steppe>  #NT!
 parthia_satrapy_missions_DESCRIPTION: "From our home in [ROOT.GetCountry.GetCapital.GetName], the coastal city nestled in the shadows of the expansive #E Qumis Highlands#! that guards our western flank like an unyielding wall, our [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetName], finds [ROOT.GetCountry.GetRuler.GetHerHim]self in an undesirable position that has nothing to do with our geographical location.\n\nTo our south lies the expansive realm of [ROOT.GetCountry.GetName]'s overlord, the imdomitable [GetCountry('SEL').GetName] ruled by the conqueror #E Seleukos Nikator#!, and to our north lies the endless steppes inhabited by nomadic tribes. The Seleukids naturally expect us to keep the roads clear of bandits, to send tribute southward to [GetProvince('(int32)911').GetName] on time, and to be ready to defend the borders at a moment's notice - all things that [ROOT.GetCountry.GetRuler.GetFirstName] has sworn oaths to uphold, and yet there are many whispering in [ROOT.GetCountry.GetRuler.GetHerHis] ear that this arrangement cannot last forever."  #<Von unserem Zuhause in [ROOT.GetCountry.GetCapital.GetName] aus, der Küstenstadt im Schatten des ausgedehnten #E Qumis-Hochlandes#!, das unsere Westflanke wie eine unnachgiebige Mauer bewacht, befindet sich unser [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetName] [ROOT.GetCountry.GetRuler.GetHerHim] in einer unerwünschten Lage, die nichts mit unserer geografischen Lage zu tun hat.\n\nIn unserem Süden liegt das ausgedehnte Reich von [ROOT.GetCountry.GetName]s Oberherr, der Unbeugsame [GetCountry('SEL').GetName], regiert vom Eroberer #E Seleukos Nikator#!, und in unserem Norden liegen die endlosen Steppen, die von Nomadenstämmen bewohnt werden. Die Seleukiden erwarten natürlich von uns, dass wir die Straßen frei von Banditen halten, pünktlich Tribut nach Süden an #E0 entsenden und jederzeit bereit sind, die Grenzen zu verteidigen – alles Dinge, zu deren Einhaltung #E1 Eide geschworen hat, und doch flüstern #E2 viele ins Ohr, dass diese Vereinbarung nicht ewig Bestand haben kann.>  #NT!
 parthia_satrapy_missions_CRITERIA_DESCRIPTION: "This mission will be considered complete when we have decided the future of the Parthian satrapy."  #<Diese Mission gilt als abgeschlossen, wenn wir über die Zukunft der parthischen Satrapie entschieden haben.>  #NT!
 parthia_satrapy_missions_BUTTON_TOOLTIP: "The future is uncertain and the end is always near..."  #<Die Zukunft ist ungewiss und das Ende ist immer nahe ...>  #NT!
 parthia_satrapy_missions_BUTTON_DETAILS: ""
  
 parthia_satrapy_missions_1: "Gift From The Gods"  # <Geschenk der Götter>  #NT!
 parthia_satrapy_missions_1_DESC: "Before [ROOT.GetCountry.GetRuler.GetName|Y] will commit to any course of action involving the future of [ROOT.GetCountry.GetName|G], the pious [ROOT.GetCountry.GetRulerTitle] desires that we commune with the gods first in order to divine their will.\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Bevor [ROOT.GetCountry.GetRuler.GetName|Y] sich zu irgendeiner Handlungsweise verpflichtet, die die Zukunft von [ROOT.GetCountry.GetName|G] betrifft, wünscht sich der fromme [ROOT.GetCountry.GetRulerTitle], dass wir zuerst mit den Göttern kommunizieren, um ihren Willen zu erraten.\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
  
 parthia_satrapy_missions_2: "Secure As A Seleukid Satrapy"  #<Sicher wie eine seleukidische Satrapie>  #NT!
 parthia_satrapy_missions_2_DESC: "Would it be such a terrible thing to remain loyal to the #Y House of Seleukos#!, who has all but guaranteed our survival in a world where we are surrounded by enemies? Although there are some living within [ROOT.GetCountry.GetCapital.GetName|T] that desire freedom from the #G Seleukids#!, [ROOT.GetCountry.GetRuler.GetName|Y] has decided that the shackles of servitude are better than the chains of slavery.\n\n\n\n\n\n\n\n\n\n@persia_mil7!"  #<Wäre es so schrecklich, dem #Y Haus Seleukos#!, treu zu bleiben, das unser Überleben in einer Welt, in der wir von Feinden umgeben sind, so gut wie garantiert hat? Obwohl einige in [ROOT.GetCountry.GetCapital.GetName|T] leben und sich die Freiheit von den #G Seleukiden#!, wünschen, hat [ROOT.GetCountry.GetRuler.GetName|Y] entschieden, dass die Fesseln der Knechtschaft besser sind als die Ketten der Sklaverei.\n\n\n\n\n\n\n\n\n\n@persia_mil7!>  #NT!
  
 parthia_satrapy_missions_3: "Parnian Permission"  #<Parnische Erlaubnis>  #NT!
 parthia_satrapy_missions_3_DESC: "After having promised to always remain faithful to the #E #G Seleukids#!#!, [ROOT.GetCountry.GetRuler.GetName|Y] has received the blessings of our overlord to pursue wars of aggression against the nomads living around us. The first target of our armies will be the Sakan tribes living in [GetCountry('PRN').GetName|G], who control territories that are dangerously close to our capital at [ROOT.GetCountry.GetCapital.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Nachdem er versprochen hatte, den #E #G Seleukiden#!#!, immer treu zu bleiben, hat [ROOT.GetCountry.GetRuler.GetName|Y] den Segen unseres Oberherrn erhalten, um Angriffskriege gegen die um uns lebenden Nomaden zu führen. Das erste Ziel unserer Armeen werden die in [GetCountry('PRN').GetName|G] lebenden Sakan-Stämme sein, die Gebiete kontrollieren, die in [ROOT.GetCountry.GetCapital.GetName|Y] gefährlich nahe an unserer Hauptstadt liegen.\n\n\n\n\n\n\n\n\n\n@persia_mil11!>  #NT!
 parthia_satrapy_missions_3.tt: "We will declare war..."  #<Wir werden den Krieg erklären...>  #NT!
  
 parthia_satrapy_missions_4: "The Gates Of Pylai Parthias"  #<Die Tore von Pylai Parthias>  #NT!
 parthia_satrapy_missions_4_DESC: "The #G Dahaean#! savages living in the rocky foothills of [GetCountry('PSS').GetName|G] control the passageway through the northern mountains that are known as the #T 'Gates of Pylai Parthias'#!. [ROOT.GetCountry.GetRuler.GetName|Y] has tolerated their presence on our borders for far too long, and with the power of the #G Parnians#! shattered by our armies, the time has come to move into the mountains.\n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<Die #G Dahaean#! Wilden, die in den felsigen Ausläufern von [GetCountry('PSS').GetName|G] leben, kontrollieren den Durchgang durch die nördlichen Berge, der als #T „Tore von Pylai Parthias“#! bekannt ist. [ROOT.GetCountry.GetRuler.GetName|Y] hat ihre Anwesenheit an unseren Grenzen viel zu lange geduldet, und da die Macht der #G Parnier#! von unseren Armeen zerschmettert wurde, ist es an der Zeit, in die Berge zu ziehen.\n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!
 parthia_satrapy_missions_4.tt: "We will declare war..."  #<Wir werden den Krieg erklären...>  #NT!
  
 parthia_satrapy_missions_5: "Zanthia"  #<Zanthia>  #NT!
 parthia_satrapy_missions_5_DESC: "Now that the tribes of the [GetCountry('PRN').GetName|G] and [GetCountry('PSS').GetName|G] have been broken and scattered, the time has come to finish the job in the north and to attack the #E #G [GetCountry('ZNT').GetName]ns#!#!.\n\n\n\n\n\n\n\n\n\n@persia_mil12!"  #<Nachdem nun die Stämme der [GetCountry('PRN').GetName|G] und [GetCountry('PSS').GetName|G] zerschlagen und zerstreut wurden, ist es an der Zeit, die Arbeit im Norden zu beenden und die #E #G [GetCountry('ZNT').GetName]ns#!#!.\n\n\n\n\n\n\n\n\n\n@persia_mil12! anzugreifen>  #NT!
 parthia_satrapy_missions_5.tt: "We will declare war..."  #<Wir werden den Krieg erklären...>  #NT!
  
 parthia_satrapy_missions_6: "The Price Of Peace"  #<Der Preis des Friedens>  #NT!
 parthia_satrapy_missions_6_DESC: "If we wish to remain in the good graces of the [GetCountry('SEL').GetName|Y], then we must pay for the privilege.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Wenn wir in den guten Händen der [GetCountry('SEL').GetName|Y] bleiben wollen, müssen wir für das Privileg bezahlen.\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
 parthia_satrapy_missions_6.tt: "Our #T Overlord#! will grant us more territories to rule over."  #<Unser #T Overlord#! wird uns mehr Gebiete gewähren, über die wir herrschen können.>  #NT!
  
 parthia_satrapy_missions_7: "Be Useful"  #<Seien Sie nützlich>  #NT!
 parthia_satrapy_missions_7_DESC: "There are many demands made upon [ROOT.GetCountry.GetRuler.GetName|Y] by the [GetCountry('SEL').GetName|Y], and chief among them is demonstrating our loyalty on the battlefield; our #T Overlord#! desires that we fight and win great victories in his name.\n\n\n\n\n\n\n\n\n\n@persia_mil14!"  #<Es gibt viele Forderungen, die die [GetCountry('SEL').GetName|Y] an [ROOT.GetCountry.GetRuler.GetName|Y] stellen, und die wichtigste davon ist die Demonstration unserer Loyalität auf dem Schlachtfeld; Unser #T Overlord#! möchte, dass wir in seinem Namen kämpfen und große Siege erringen.\n\n\n\n\n\n\n\n\n\n@persia_mil14!>  #NT!
 # parthia_satrapy_missions_7.tt1: "We won at least #R 5 Battles#! in our #T Overlord's#! wars. (Currently: #Y [Player.MakeScope.Var('legion_battle_counter').GetValue|0]#!)\n(Currently: #Y [SCOPE.ScriptValue('parthia_battles_won_svalue')|0]#!)."  #<Wir haben mindestens #R 5 Schlachten#! in unseren #T Overlord-Kriegen#! gewonnen. (Aktuell: #Y [Player.MakeScope.Var('legion_battle_counter').GetValue|0]#!)\n(Aktuell: #Y [SCOPE.ScriptValue('parthia_battles_won_svalue')|0]#!).>  #NT!
 parthia_satrapy_missions_7.tt1: "We won at least #R 5 Battles#! in our #T Overlord's#! wars. (Currently: #Y [Player.MakeScope.Var('legion_battle_counter').GetValue|0]#!)."  #<Wir haben mindestens #R 5 Schlachten#! in unseren #T Overlord-Kriegen#! gewonnen. (Aktuell: #Y [Player.MakeScope.Var('legion_battle_counter').GetValue|0]#!).>  #NT!
 parthia_satrapy_missions_7.tt2: "Our #T Overlord#! might transfer the rest of #G Hyrcania#! to us."  #<Unser #T Overlord#! könnte den Rest von #G Hyrcania#! an uns übertragen.>  #NT!
  
 parthia_satrapy_missions_8: "Bring Technology Up to Speed"  #<Bringen Sie die Technologie auf den neuesten Stand>  #NT!
 parthia_satrapy_missions_8_DESC: "Although [ROOT.GetCountry.GetRuler.GetName|Y] has wisely focused on defeating the military enemies of [ROOT.GetCountry.GetName|G], the time has come for us to wage warfare on a different front; that of the mind. We must turn our attention inward and focus on improving our technology if we hope to stand against our foes.\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Obwohl sich [ROOT.GetCountry.GetRuler.GetName|Y] klugerweise darauf konzentriert hat, die militärischen Feinde von [ROOT.GetCountry.GetName|G] zu besiegen, ist es für uns an der Zeit, den Krieg an einer anderen Front zu führen; das des Geistes. Wir müssen unsere Aufmerksamkeit nach innen richten und uns auf die Verbesserung unserer Technologie konzentrieren, wenn wir gegen unsere Feinde bestehen wollen.\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
 parthia_satrapy_missions_8.tt: "We will gain #G 1 Technology Level#! in each category."  #<Wir werden in jeder Kategorie #G 1 Technologiestufe#! erreichen.>  #NT!
  
 parthia_satrapy_missions_9: "Strengthen The State"  #<Den Staat stärken>  #NT!
 parthia_satrapy_missions_9_DESC: "The time has come to invest in our civil infrastructure, and increasing the amount of #T Forum Buildings#! that we have within [ROOT.GetCountry.GetName|G] will be a good way of giving back to the people, as well as proving to our #T Overlord#! that we intend on improving the cultural life of the realm.\n\n\n\n\n\n\n\n\n\n@italic_mil19!"  #<Es ist an der Zeit, in unsere zivile Infrastruktur zu investieren, und die Erhöhung der Anzahl der #T Forumgebäude#!, die wir in [ROOT.GetCountry.GetName|G] haben, wird eine gute Möglichkeit sein, den Menschen etwas zurückzugeben und unserem #T Overlord#! zu beweisen, dass wir beabsichtigen, das kulturelle Leben des Reiches zu verbessern.\n\n\n\n\n\n\n\n\n\n@italic_mil19!>  #NT!
 parthia_satrapy_missions_9.tt: "We will gain a character with excellent attributes."  #<Wir werden einen Charakter mit hervorragenden Eigenschaften gewinnen.>  #NT!
 parthia_satrapy_missions_9_tt: "We need to own three territories that each have #T 3 Forum#! buildings."  #<Wir müssen drei Gebiete besitzen, die jeweils über #T 3 Forum#! Gebäude verfügen.>  #NT!
  
 parthia_satrapy_missions_10: "Stab In The Back"  #<Stich in den Rücken>  #NT!
 parthia_satrapy_missions_10_DESC: "[ROOT.GetCountry.GetRuler.GetName|Y], one of the most famous rulers in the entire #G Hellenic#! world, has decided that the [GetCountry('SEL').GetName|G] is no longer worthy of calling itself #T Overlord#! to the #G Parthians#!, and has openly challenged the rule of [GetCountry('SEL').GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<[ROOT.GetCountry.GetRuler.GetName|Y], einer der berühmtesten Herrscher in der gesamten #G hellenischen#! Welt, hat entschieden, dass die [GetCountry('SEL').GetName|G] es nicht länger wert sind, sich #T Oberherr#! der #G Parther#! zu nennen, und hat die Herrschaft von offen herausgefordert [GetCountry('SEL').GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!
 parthia_satrapy_missions_10.tt1: "We will try to subvert some #Y [THIS.GetCountry.GetOverlord.GetAdjective]#! subjects and turn them to our cause."  #<Wir werden versuchen, einige #Y [THIS.GetCountry.GetOverlord.GetAdjective]#! Themen zu untergraben und sie für unsere Sache zu gewinnen.>  #NT!
 parthia_satrapy_missions_10.tt2: "We will declare war on our overlord #Y [THIS.GetCountry.GetOverlord.GetName]#! to try and take their place. \n\nIf our ruler is friends with Bactrian ruler and they have above 80 opinion of us, they will leave the war.\n\nIf we succeed, we will get access to the #Y Hellenistic Empire#! mission tree to restore the #T Legacy of Alexander#!."  #<Wir werden unserem Oberherrn #Y [THIS.GetCountry.GetOverlord.GetName]#! den Krieg erklären, um zu versuchen, seinen Platz einzunehmen. \n\nWenn unser Herrscher mit dem baktrischen Herrscher befreundet ist und er eine Meinung von über 80 über uns hat, wird er den Krieg verlassen.\n\nWenn wir Erfolg haben, erhalten wir Zugang zum Missionsbaum #Y Hellenistisches Reich#!, um das #T Vermächtnis Alexanders#! wiederherzustellen.>  #NT!
  
 parthia_satrapy_missions_11: "A New Successor"  #<Ein neuer Nachfolger>  #NT!
 parthia_satrapy_missions_11_DESC: "The invincible armies of [ROOT.GetCountry.GetRuler.GetName|Y] have smashed the forces of the [GetCountry('SEL').GetName|G], overthrowing their weakened Basileus and usurping his Empire! By rights of conquest, the victorious [ROOT.GetCountry.GetRuler.GetFirstName] can declare the beginning of a new era - the #T Age of the [ROOT.GetCountry.GetRuler.GetFamily.GetName]s!#!\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Die unbesiegbaren Armeen von [ROOT.GetCountry.GetRuler.GetName|Y] haben die Streitkräfte von [GetCountry('SEL').GetName|G] zerschlagen, ihren geschwächten Basileus gestürzt und sein Imperium an sich gerissen! Durch Eroberungsrechte können die siegreichen [ROOT.GetCountry.GetRuler.GetFirstName] den Beginn einer neuen Ära verkünden – das #T Zeitalter der [ROOT.GetCountry.GetRuler.GetFamily.GetName]er!#!\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
 # parthia_satrapy_missions_11.tt: ""
  
 parthia_satrapy_missions_12: "Demand March Status"  #<Fordern Sie den Status „März“ an>  #NT!
 parthia_satrapy_missions_12_DESC: "The wealth, power and prestige of [ROOT.GetCountry.GetName|G] sets us above other #T Satraps#!, and although neither side would be comfortable admitting it, the [ROOT.GetCountry.GetAdjective] levies would be able to hold their own against those of their #T Overlord#!.\n\nBecause we are strong, [ROOT.GetCountry.GetRuler.GetName|Y] feels that we are deserving of special status and will demand that we be recognized as such; a bold provocation.\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Der Reichtum, die Macht und das Prestige von [ROOT.GetCountry.GetName|G] heben uns von anderen #T Satrapen#!, ab, und obwohl keine Seite es gerne zugeben würde, könnten die [ROOT.GetCountry.GetAdjective] Rekruten sich gegen die ihres #T Oberherrn#!.\n\nBecause behaupten. Wir sind stark, [ROOT.GetCountry.GetRuler.GetName|Y] ist der Meinung, dass wir einen besonderen Status verdienen, und wird verlangen, dass wir als solche anerkannt werden; eine mutige Provokation.\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 parthia_satrapy_missions_12.tt: "We will be able to negotiate a deal with our #T Overlord#! #Y [THIS.GetCountry.GetOverlord.GetName]#! to become a special type of vassal. Our Ruler will ask for special privileges to be granted to us, and we will receive different rewards, depending on how the negotiations go."  #<Wir werden in der Lage sein, einen Deal mit unserem #T Overlord#! #Y [THIS.GetCountry.GetOverlord.GetName]#! auszuhandeln, um ein besonderer Vasallentyp zu werden. Unser Herrscher wird darum bitten, dass uns besondere Privilegien gewährt werden, und wir werden unterschiedliche Belohnungen erhalten, je nachdem, wie die Verhandlungen verlaufen.>  #NT!
  
 parthia_satrapy_missions_13: "Supplant Bactria"  #<Bakterien ersetzen>  #NT!
 parthia_satrapy_missions_13_DESC: "There are many that foolishly believe that [GetCountry('BAC').GetName|G] is the most powerful subject of the [GetCountry('SEL').GetName|G], but [ROOT.GetCountry.GetRuler.GetName|Y] will prove once and for all who the most powerful #E Basileus#! is.\n\n\n\n\n\n\n\n\n\n@greek_mil8!"  #<Es gibt viele, die törichterweise glauben, dass [GetCountry('BAC').GetName|G] das mächtigste Subjekt der [GetCountry('SEL').GetName|G] ist, aber [ROOT.GetCountry.GetRuler.GetName|Y] wird ein für alle Mal beweisen, wer der mächtigste #E Basileus#! ist.\n\n\n\n\n\n\n\n\n\n@greek_mil8!>  #NT!
 parthia_satrapy_missions_13.tt: "Declare war on #G Bactria#!.\nWe will receive claims on all of their land."  #<Erklären Sie #G Baktrien#!.\nWe den Krieg und erhalten Sie Ansprüche auf ihr gesamtes Land.>  #NT!
 sabotaged_bactria_tt: "Has successfully enacted the #Y Sabotage Bactria#! decision in the past 5 years."  #<Hat die Entscheidung #Y Sabotage Bactria#! in den letzten 5 Jahren erfolgreich umgesetzt.>  #NT!
  
 parthia_satrapy_missions_14: "Demand Independence"  #<Fordern Sie Unabhängigkeit>  #NT!
 parthia_satrapy_missions_14_DESC: "The people of [ROOT.GetCountry.GetName|G] cannot abide the tyrannical whims of the [GetCountry('SEL').GetName|G] any longer - the time has come to cast off the yoke of our #T Overlord#! and declare our independence from [GetCountry('SEL').GetCapital.GetName|T].\n\n\n\n\n\n\n\n\n\n@greek_mil15!"  #<Die Menschen von [ROOT.GetCountry.GetName|G] können die tyrannischen Launen der [GetCountry('SEL').GetName|G] nicht länger ertragen – es ist an der Zeit, das Joch unseres #T Oberherrn#! abzuwerfen und unsere Unabhängigkeit von [GetCountry('SEL').GetCapital.GetName|T] zu erklären.\n\n\n\n\n\n\n\n\n\n@greek_mil15!>  #NT!
 parthia_satrapy_missions_14.tt1: "We will choose the way we want to become independent."  #<Wir werden den Weg wählen, den wir wollen, um unabhängig zu werden.>  #NT!
 parthia_satrapy_missions_14.tt2: "We will demand #R Independence#! from our [THIS.GetCountry.GetOverlord.GetAdjective] overlords."  #<Wir werden von unseren [THIS.GetCountry.GetOverlord.GetAdjective] Oberherren #R Unabhängigkeit#! fordern.>  #NT!
  
 parthia_satrapy_missions_15: "Greater Parthia"  #<Großparthien>  #NT!
 parthia_satrapy_missions_15_DESC: "Through sheer force of willpower alone, the mighty [ROOT.GetCountry.GetRuler.GetName|Y] has achieved things in one lifetime that will be remembered for ages to come; the establishment of a new realm, one that freed itself from a state of servitude and became the feared #G Hegemon of Iran#!."  #<Allein durch reine Willenskraft hat der mächtige [ROOT.GetCountry.GetRuler.GetName|Y] in einem Leben Dinge erreicht, an die man sich noch lange erinnern wird; die Errichtung eines neuen Reiches, eines Reiches, das sich aus dem Zustand der Knechtschaft befreite und zum gefürchteten #G Hegemon des Iran#!. wurde>  #NT!
  
 parthia_satrapy_missions_16: "Yearning For Greatness"  ##<Sehnsucht nach Größe>  #NT!
 parthia_satrapy_missions_16_DESC: "After many nights of soul searching, [ROOT.GetCountry.GetRuler.GetName|Y] has decided that the path forward to greatness does not involve being the lapdog of [GetCharacter('(int32)24').GetName|Y]; if the people of [ROOT.GetCountry.GetName|G] are destined for glory, then it must be won by a free people.\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Nach vielen Nächten der Gewissenssuche hat [ROOT.GetCountry.GetRuler.GetName|Y] entschieden, dass der Weg zur Größe nicht darin besteht, der Schoßhündchen von [GetCharacter('(int32)24').GetName|Y] zu sein; Wenn das Volk von [ROOT.GetCountry.GetName|G] zum Ruhm bestimmt ist, dann muss dieser von einem freien Volk gewonnen werden.\n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!
 parthia_satrapy_missions_16.tt1: "We have raised our #Y Levy.#!"  #<Wir haben unsere Abgabe um #Y erhöht.#!>  #NT!
 parthia_satrapy_missions_16.tt2: "All our provinces have the #T Borderlands Governor Policy#!."  #<Alle unsere Provinzen haben die #T Borderlands Governor Policy#!.>  #NT!
 parthia_satrapy_missions_16.tt3: "Our #Y Levy#! shall be converted to a #R Legion#!!\nA character with exceptionally high @military_icon! martial abilities is promoted from the ranks."  #<Unser #Y Levy#! soll in eine #R Legion#! umgewandelt werden!\nEin Charakter mit außergewöhnlich hohem @military_icon! Kampffähigkeiten werden von den Reihen aus gefördert.>  #NT!
  
 parthia_satrapy_missions_17: "Prepare The Army"  #<Bereiten Sie die Armee vor>  #NT!
 parthia_satrapy_missions_17_DESC: "If we have hopes of pushing back the enemies that surround us on all sides, then we must have a proper army, one that is capable of defending our interests from our foes whether they be Greek or barbarian.\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Wenn wir die Hoffnung haben, die Feinde, die uns von allen Seiten umgeben, zurückzudrängen, dann müssen wir eine richtige Armee haben, eine, die in der Lage ist, unsere Interessen vor unseren Feinden zu verteidigen, egal ob sie Griechen oder Barbaren sind.\n\n\n\n\n\n\n\n\n\n@persia_mil1!>  #NT!
  
 parthia_satrapy_missions_18: "Found A New City"  #<Eine neue Stadt gefunden>  #NT!
 parthia_satrapy_missions_18_DESC: "We cannot afford to ignore civic matters while we focus on the military situation; [ROOT.GetCountry.GetRuler.GetName|Y] refuses to make the mistake that so many other rulers have. The wise [ROOT.GetCountry.GetRulerTitle] has set aside funds for the construction of a new polis in hopes of benefitting the lives of the common people.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<Wir können es uns nicht leisten, bürgerliche Angelegenheiten zu ignorieren, während wir uns auf die militärische Situation konzentrieren. [ROOT.GetCountry.GetRuler.GetName|Y] weigert sich, den Fehler zu machen, den so viele andere Herrscher machen. Der Weise [ROOT.GetCountry.GetRulerTitle] hat Mittel für den Bau einer neuen Polis bereitgestellt, in der Hoffnung, das Leben des einfachen Volkes zu verbessern.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
 parthia_satrapy_missions_18.tt1: "We must found a brand new city somewhere within our realm."  #<Wir müssen irgendwo in unserem Reich eine brandneue Stadt gründen.>  #NT!
 parthia_satrapy_missions_18.tt2: "Our new city will get [GetModifier('par_city_pmod').GetName|Y] which will grant [GetModifier('par_city_pmod').GetDesc]."  #<Unsere neue Stadt erhält [GetModifier('par_city_pmod').GetName|Y], was [GetModifier('par_city_pmod').GetDesc] gewährt.>  #NT!
  
 parthia_satrapy_missions_19: "Diplomatic Efforts"  #<Diplomatische Bemühungen>  #NT!
 parthia_satrapy_missions_19_DESC: "There is strength to be found in numbers, and there are also many subjects of the [GetCountry('SEL').GetName|G] that currently chafe under the rule of the tyrant living in [GetProvince('(int32)911').GetName|T]. [ROOT.GetCountry.GetRuler.GetName|Y] is wisely considering asking some of our neighbors if they would be willing to cast in their lot with ours when the time comes to declare our freedom...\n\n\n\n\n\n\n\n\n\n@persia_mil21!"  #<Stärke liegt in der Zahl, und es gibt auch viele Untertanen der [GetCountry('SEL').GetName|G], die derzeit unter der Herrschaft des Tyrannen leiden, der in [GetProvince('(int32)911').GetName|T] lebt. [ROOT.GetCountry.GetRuler.GetName|Y] erwägt klugerweise, einige unserer Nachbarn zu fragen, ob sie bereit wären, sich mit uns zu verbünden, wenn die Zeit gekommen ist, unsere Freiheit zu erklären ...\n\n\n\n\n\n\n\n\n\n@persia_mil21!>  #NT!
 parthia_satrapy_missions_19.tt: "[GetCountry('BAC').GetName|G] and [GetCountry('PRM').GetName|G] will declare independence along with us, if the Ruler of either country is a friend of our Basileus."  #<[GetCountry('BAC').GetName|G] und [GetCountry('PRM').GetName|G] werden zusammen mit uns ihre Unabhängigkeit erklären, wenn der Herrscher eines Landes ein Freund unseres Basileus ist.>  #NT!
  
 parthia_satrapy_missions_20: "Rally For Freedom"  #<Kundgebung für die Freiheit>  #NT!
 parthia_satrapy_missions_20_DESC: "[GetCharacter('(int32)24').GetName|Y], the Basileus of the [GetCountry('SEL').GetName|G], is dead! Messengers from [GetProvince('(int32)911').GetName|T] arrived in [ROOT.GetCountry.GetCapital.GetName|T] last night bearing this grim news. While the #G Seleukids#! have their hands full with a succession crisis, this would be the perfect time to strike out on our own!\n\n\n\n\n\n\n\n\n\n@persia_mil8!"  #<[GetCharacter('(int32)24').GetName|Y], der Basileus von [GetCountry('SEL').GetName|G], ist tot! Gestern Abend sind Boten von [GetProvince('(int32)911').GetName|T] in [ROOT.GetCountry.GetCapital.GetName|T] eingetroffen und haben diese düstere Nachricht überbracht. Während die #G Seleukiden#! mit einer Nachfolgekrise alle Hände voll zu tun haben, wäre dies der perfekte Zeitpunkt, sich selbstständig zu machen!\n\n\n\n\n\n\n\n\n\n@persia_mil8!>  #NT!
 parthia_satrapy_missions_20.tt: "[GetCharacter('(int32)24').GetName|Y] is dead."  #<[GetCharacter('(int32)24').GetName|Y] ist tot.>  #NT!
  
 parthia_satrapy_missions_21: "Fortify The North"  #<Stärken Sie den Norden>  #NT!
 parthia_satrapy_missions_21_DESC: "Our scouts constantly send reports back to [ROOT.GetCountry.GetCapital.GetName|T] informing us of the movements of the steppe tribes, and their messages are usually tinged with fear; if we do not take the steps required to protect our borders, then we could very well be overrun by a migratory horde.\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Unsere Späher senden ständig Berichte an [ROOT.GetCountry.GetCapital.GetName|T] zurück, um uns über die Bewegungen der Steppenstämme zu informieren, und ihre Nachrichten sind normalerweise von Angst geprägt; Wenn wir nicht die erforderlichen Maßnahmen ergreifen, um unsere Grenzen zu schützen, könnten wir sehr wohl von einer Migrationshorde überrannt werden.\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
 parthia_satrapy_missions_21.tt1: "We have 2 separate #T Forts#! bordering [GetCulture('derbiccan').GetName|R] tribes."  #<Wir haben 2 separate #T Festungen#!, die an [GetCulture('derbiccan').GetName|R] Stämme grenzen.>  #NT!
 parthia_satrapy_missions_21.tt2: "We will be protected from the [GetCulture('derbiccan').GetName|R] takeover of #E Parthia#!."  #<Wir werden vor der [GetCulture('derbiccan').GetName|R]-Übernahme von #E Parthia#!. geschützt sein>  #NT!
  
 parthia_satrapy_missions_22: "War Of Independence"  #<Unabhängigkeitskrieg>  #NT!
 parthia_satrapy_missions_22_DESC: "The hour of destiny approaches; the omens have been taken, and they speak clearly. The time has come to cast our fate to the wind and follow the ambitious [ROOT.GetCountry.GetRuler.GetName|Y] into battle against our #T Overlord#!.\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Die Stunde des Schicksals naht; Die Vorzeichen wurden erkannt und sie sprechen deutlich. Es ist an der Zeit, unser Schicksal in den Wind zu schlagen und dem ehrgeizigen [ROOT.GetCountry.GetRuler.GetName|Y] in den Kampf gegen unseren #T Overlord#!.\n\n\n\n\n\n\n\n\n\n@persia_mil6! zu folgen>  #NT!
 parthia_satrapy_missions_22.tt1: "We have stationed a singular army of at least #T 30 Units#! near the border with the #G Seleucids#! in [GetProvince('(int32)4997').GetArea.GetName|G] or [GetProvince('(int32)3439').GetArea.GetName|G]."  #<Wir haben eine einzelne Armee von mindestens #T 30 Einheiten#! nahe der Grenze zu den #G Seleukiden#! in [GetProvince('(int32)4997').GetArea.GetName|G] oder [GetProvince('(int32)3439').GetArea.GetName|G] stationiert.>  #NT!
 parthia_satrapy_missions_22.tt2: "We will declare an #R Independence War#!!"  #<Wir werden einen #R Unabhängigkeitskrieg#!! erklären>  #NT!
  
 parthia_satrapy_missions_23: "Free At Last"  #<Endlich frei>  #NT!
 parthia_satrapy_missions_23_DESC: "The triumphant armies of [ROOT.GetCountry.GetRuler.GetName|Y] have achieved the impossible and have won their freedom from the clutches of the vast [GetCountry('SEL').GetName|G]!\n\n\n\n\n\n\n\n\n\n@greek_mil14!"  #<Die siegreichen Armeen von [ROOT.GetCountry.GetRuler.GetName|Y] haben das Unmögliche erreicht und ihre Freiheit aus den Fängen des riesigen [GetCountry('SEL').GetName|G] gewonnen!\n\n\n\n\n\n\n\n\n\n@greek_mil14!>  #NT!
  
 parthia_satrapy_missions_24: "Reorder The Steppes"  #<Ordnen Sie die Steppen neu>  #NT!
 parthia_satrapy_missions_24_DESC: "Now that [ROOT.GetCountry.GetRuler.GetName|Y] is the undisputed master of our realm, the [ROOT.GetCountry.GetRulerTitle] has decided that a reorganization of our northern provinces is an absolute necessity.\n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<Da nun [ROOT.GetCountry.GetRuler.GetName|Y] der unbestrittene Herr unseres Reiches ist, hat [ROOT.GetCountry.GetRulerTitle] entschieden, dass eine Neuordnung unserer nördlichen Provinzen eine absolute Notwendigkeit ist.\n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!
 parthia_satrapy_missions_24.tt: "Most of [GetCulture('derbiccan').GetName|G] pops will move south.\nLand around [GetProvince('(int32)5456').GetArea.GetName|G] area will be given to a #G Dahae#! tribal vassal.\nLand further north will be shattered into area-based states."  #<Die meisten [GetCulture('derbiccan').GetName|G] Einwohner werden nach Süden ziehen.\nLand um [GetProvince('(int32)5456').GetArea.GetName|G] Gebiet wird einem #G Dahae#! Stammesvasallen gegeben.\nLand weiter nördlich wird in gebietsbezogene Staaten aufgeteilt.>  #NT!
  
 parthia_satrapy_missions_25: "Integrate Media"  #<Medien integrieren>  #NT!
 parthia_satrapy_missions_25_DESC: "The reputation of the #G Medians#! is certainly known to [ROOT.GetCountry.GetRuler.GetName|Y]; they are hailed for their knowledge of the movements of the stars and are masters of things that have been hidden from the eyes of man. In order to graft their strength onto our own, the [ROOT.GetCountry.GetRulerTitle] has decided to integrate them into [ROOT.GetCountry.GetAdjective] society.\n\n\n\n\n\n\n\n\n\n@persia_mil5! "  #<Der Ruf der #G Mediane#! ist [ROOT.GetCountry.GetRuler.GetName|Y] sicherlich bekannt; Sie werden für ihr Wissen über die Bewegungen der Sterne gepriesen und sind Meister von Dingen, die den Augen der Menschen verborgen blieben. Um ihre Stärke auf unsere eigene zu übertragen, hat die [ROOT.GetCountry.GetRulerTitle] beschlossen, sie in die [ROOT.GetCountry.GetAdjective]-Gesellschaft zu integrieren.\n\n\n\n\n\n\n\n\n\n@persia_mil5!>  #NT!
  
 parthia_satrapy_missions_26: "Dominion Over Persis"  #<Herrschaft über Persis>  #NT!
 parthia_satrapy_missions_26_DESC: "Our armies continue to destroy any that stand in their way, extending our dominion far south - even up to the waters of the #Y Sinus Persicus#!.\n\n\n\n\n\n\n\n\n\n@greek_mil4!"  #<Unsere Armeen zerstören weiterhin alles, was sich ihnen in den Weg stellt, und dehnen unsere Herrschaft weit nach Süden aus – sogar bis zu den Gewässern des #Y Sinus Persicus#!.\n\n\n\n\n\n\n\n\n\n@greek_mil4!>  #NT!
  
 parthia_satrapy_missions_27: "Conquer Ariana"  #<Erobere Ariana>  #NT!
 parthia_satrapy_missions_27_DESC: "The eastern provinces that were once administered by the [GetCountry('SEL').GetName|G] have been taken over by the #E #G [ROOT.GetCountry.GetName]ns#!#!, who have extended their borders far beyond the wildest dreams of [ROOT.GetCountry.GetRuler.GetName|Y].\n\n\n\n\n\n\n\n\n\n@persia_mil17!"  #<Die östlichen Provinzen, die einst von den [GetCountry('SEL').GetName|G] verwaltet wurden, wurden von den #E #G [ROOT.GetCountry.GetName]ns#!#!, übernommen, die ihre Grenzen weit über die wildesten Träume von [ROOT.GetCountry.GetRuler.GetName|Y] hinaus ausgedehnt haben.\n\n\n\n\n\n\n\n\n\n@persia_mil17!>  #NT!
  
 parthia_satrapy_missions_28: "New Diadochi Empire"  #<Neues Diadochen-Reich>  #NT!
 parthia_satrapy_missions_28_DESC: "At long last, the people of #E #G [ROOT.GetCountry.GetName]#!#! have achieved everything that they set out to do; they have conquered those opposed to the will of [ROOT.GetCountry.GetRuler.GetName|Y] and have created a new #T Empire#!, one that is destined to rule for over a thousand years.\n\nRuling securely from [ROOT.GetCountry.GetCapital.GetName|T], [ROOT.GetCountry.GetRuler.GetFirstName] has decreed that a new era begins today - the Age of the #G [ROOT.GetCountry.GetRuler.GetFamily.GetName] Empire#!.\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Endlich haben die Menschen von #E #G [ROOT.GetCountry.GetName]#!#! alles erreicht, was sie sich vorgenommen hatten; Sie haben diejenigen besiegt, die sich dem Willen von [ROOT.GetCountry.GetRuler.GetName|Y] widersetzten, und ein neues #T Imperium#!, geschaffen, das über tausend Jahre lang regieren soll.\n\nNachdem [ROOT.GetCountry.GetCapital.GetName|T] sicher regiert hat, hat [ROOT.GetCountry.GetRuler.GetFirstName] verfügt, dass heute eine neue Ära beginnt – das Zeitalter des #G #G0 Imperiums#G1>  #NT!
 parthia_satrapy_missions_28.tt: "Our country's name will change to a dynastic one."  #<Der Name unseres Landes wird sich in einen dynastischen Namen ändern.>  #NT!
  
  
 # Treasures, Decisions Etc. 
 greater_parthia_name: "Greater Parthia"  #<Großparthien>  #NT!
 sabotage_bactria: "Sabotage Bactria"  #<Sabotage von Baktrien>  #NT!
 sabotage_bactria_desc: "Attempt to sabotage the reputation of the [GetCountry('BAC').GetName|E]. You may attempt this #R once a year#!. The chance to successfully sabotage them will #G increase#! if you are friends with [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|Y], are #E Silver Tongued#!, or have exceptionally high #E Charisma#!... however, having undesirable #E Charisma#! or other traits will #R decrease#! your chances."  #<Versuchen Sie, den Ruf von [GetCountry('BAC').GetName|E] zu sabotieren. Du kannst dies #R einmal im Jahr versuchen#!.. Die Chance, sie erfolgreich zu sabotieren, wird #G erhöht#!, wenn du mit [ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen|Y] befreundet bist, #E Silberzüngig#! bist oder über ein außergewöhnlich hohes #E Charisma#!. verfügst. Wenn du jedoch unerwünschtes #E Charisma#! oder andere Eigenschaften hast, wird dies der Fall sein #R verringern#! Ihre Chancen.>  #NT!
  
 # Tooltips 
 they_are_coming_par_tt: "#E Parthia#! will soon declare #R war#!."  #<#E Parthia#! wird bald #R den Krieg#! erklären.>  #NT!
 he_believes_you_par_tt: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] believes your story."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] glaubt deiner Geschichte.>  #NT!
 bactria_punished_par_tt: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] gives [GetCountry('BAC').GetName] a slap on the wrist."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] gibt [GetCountry('BAC').GetName] einen Schlag aufs Handgelenk.>  #NT!
 he_doesnt_believe_you_par_tt: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] dismisses your story."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] lehnt Ihre Geschichte ab.>  #NT!
 hes_angry_at_you_par_tt: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] punishes you for lying."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen] bestraft dich fürs Lügen.>  #NT!
 are_you_STUUPID_par_tt: "... what?"  #<... Was?>  #NT!
 he_somehow_buys_it_par_tt: "[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen]... somehow is convinced despite your idiocy."  #<[ROOT.GetCountry.GetOverlord.GetRuler.GetPraenomen]... ist trotz deiner Idiotie irgendwie überzeugt.>  #NT!
 bactria_is_warned_tt: "We have #G successfully#! enacted the #Y Sabotage Paurava#! decision.\n[GetCountry('BAC').GetName] will learn of this."  #<Wir haben #G erfolgreich#! die #Y Sabotage-Paurava#!-Entscheidung erlassen.\n[GetCountry('BAC').GetName] werden davon erfahren.>  #NT!
 bac_is_warned_tt_2: "[GetCountry('BAC').GetName] will be punished.\n[GetCountry('BAC').GetName] will learn of this."  #<[GetCountry('BAC').GetName] wird bestraft.\n[GetCountry('BAC').GetName] wird davon erfahren.>  #NT!
 parthia_satrap_missions_task_17_tooltip: "Have a #T Legion#! with at least #Y #E 20#!#! units and #Y #E 50%#!#! unit experience."  #<Besitze eine #T Legion#! mit mindestens #Y #E 20#!#! Einheiten und #Y #E 50 %#!#! Einheitenerfahrung.>  #NT!
  
