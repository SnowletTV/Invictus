 scandinavia_abandoned_capital_mod: "Abandoned Historic Capital"  #<Verlassene historische Hauptstadt>  #NT!
 desc_scandinavia_abandoned_capital_mod: "Our tribesmen are furious that we abandoned the rolling hills where their fathers are buried."  #<Unsere Stammesangehörigen sind wütend, dass wir die sanften Hügel verlassen haben, in denen ihre Väter begraben sind.>  #NT!
 scandinavia_historic_capital_mod: "Retained Historic Capital"  #<Erhaltene historische Hauptstadt>  #NT!
 desc_scandinavia_historic_capital_mod: "Our people, believing the location of our ancestral capital to be sacred, have decided to stay in our home instead of relocating to another place."  #<Unsere Leute glauben, dass die Lage unserer angestammten Hauptstadt heilig ist, und haben beschlossen, in unserem Zuhause zu bleiben, anstatt an einen anderen Ort zu ziehen.>  #NT!
 scandinavian_horseworks: "Scandian Stallions"  #<Skandinavische Hengste>  #NT!
 desc_scandinavian_horseworks: "Our horses are trained in the forested countryside of our homeland and are quick to navigate treacherous ground."  #<Unsere Pferde werden in der bewaldeten Landschaft unserer Heimat ausgebildet und navigieren schnell durch tückisches Gelände.>  #NT!
 scandinavian_food_mod: "Scandian Grain Storage"  #<Skandinavische Getreidelagerung>  #NT!
 desc_scandinavian_food_mod: "Thanks to the farms we have built, we are able to store grain for the lean winters."  #<Dank der von uns errichteten Bauernhöfe sind wir in der Lage, Getreide für die mageren Winter zu lagern.>  #NT!
 muh_fast_viking_boats: "Scandian Longships"  #<Skandinavische Langschiffe>  #NT!
 desc_muh_fast_viking_boats: "Our people have mastered the art of building fast, sleek longships for the purposes of raiding our enemies."  #<Unser Volk beherrscht die Kunst, schnelle, elegante Langschiffe zu bauen, um unsere Feinde zu überfallen.>  #NT!
  
 SCANDIA_FLAG: "The Flag of United Scandia"  #<Die Flagge des Vereinigten Skandinaviens>  #NT!
  
