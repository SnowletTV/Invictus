  #################### 
  # Title 
  #################### #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
  
 scandinavian_missions_01: "Uniting The Scandian Tribes"  #<Die skandinavischen Stämme vereinen>  #NT!
 scandinavian_missions_01_DESCRIPTION: "In the far north, there are lands unknown to the cartographers and historians of the civilized world, a realm that is inhabited by people living harsh lives on the very edges of the world; #E Scandia#!. The sun comes and goes as it pleases, with long, cruel winters that seemingly last the entire year, and during the brief periods of sunshine that grace the skies, the fields become stained red with the blood of battling armies.\n\nEven now, the dark clouds of war gather on the horizon, and word is spreading of conflicts between the #E Scandian#! tribes that live in the forested wildlands. "  #<Im hohen Norden gibt es Länder, die den Kartographen und Historikern der zivilisierten Welt unbekannt sind, ein Reich, das von Menschen bewohnt wird, die ein hartes Leben am äußersten Rand der Welt führen; #E Scandia#!. Die Sonne kommt und geht, wie es ihr gefällt, mit langen, grausamen Wintern, die scheinbar das ganze Jahr dauern, und während der kurzen Sonnenscheinperioden, die den Himmel zieren, werden die Felder rot vom Blut kämpfender Armeen.\n\nSchon jetzt sammeln sich die dunklen Wolken des Krieges am Horizont und es verbreitet sich die Nachricht von Konflikten zwischen den #E Scandian#! Stämmen, die in den bewaldeten Wildnisgebieten leben.>  #NT!
 scandinavian_missions_01_CRITERIA_DESCRIPTION: "This mission will be completed when the nation of #E Scandia#! has been formed."  #<Diese Mission wird abgeschlossen sein, wenn die Nation #E Scandia#! gegründet wurde.>  #NT!
 scandinavian_missions_01_BUTTON_TOOLTIP: "Our future glories await..."  #<Unsere zukünftigen Herrlichkeiten erwarten Sie ...>  #NT!
 scandinavian_missions_01_BUTTON_DETAILS: ""
  
  #################### 
  # Mission Tasks 
  #################### 
  
 scandinavian_missions_task_1: "Ultima Thule"  #<Ultima Thule>  #NT!
 scandinavian_missions_task_1_DESC: "The westernmost territories of the #T Ultima Thule#! province are uninhabited, but [ROOT.GetCountry.GetRuler.GetName|Y] has a plan to quickly colonize the region.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Die westlichsten Gebiete der Provinz #T Ultima Thule#! sind unbewohnt, aber [ROOT.GetCountry.GetRuler.GetName|Y] hat einen Plan, die Region schnell zu kolonisieren.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!>  #NT!
 scandinavian_missions_task_1_tt: "We will send #G Colonists#! to #T Ultima Thule#!."  #<Wir werden #G Kolonisten#! an #T Ultima Thule#! schicken.>  #NT!
  
 scandinavian_missions_task_2: "Herulia"  #<Herulia>  #NT!
 scandinavian_missions_task_2_DESC: "The mineral resources in the south of #E scandinavia#! call our levies to this region, for whomever possesses these rich lands will be quite wealthy indeed.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Die Bodenschätze im Süden von #E Skandinavien#! rufen unsere Abgaben in diese Region hervor, denn wer auch immer diese reichen Ländereien besitzt, wird in der Tat ziemlich reich sein.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
 scandinavian_missions_task_2_tt: "We will receive claims on the province of #T Herulia#!."  #<Wir erhalten Ansprüche auf die Provinz #T Herulia#!.>  #NT!
  
 scandinavian_missions_task_3: "West Gothia"  #<Westgothia>  #NT!
 scandinavian_missions_task_3_DESC: "The strong tribes that live in the western regions of #T Gothia#! are said to be fierce and unrivaled fighters, but we shall conquer them nevertheless.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!"  #<Die starken Stämme, die in den westlichen Regionen von #T Gothia#! leben, sollen wilde und konkurrenzlose Kämpfer sein, aber wir werden sie trotzdem besiegen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!>  #NT!
 scandinavian_missions_task_3_tt: "We will receive claims on the province of #T West Gothia#!."  #<Wir erhalten Ansprüche auf die Provinz #T West Gothia#!.>  #NT!
  
 scandinavian_missions_task_4: "East Gothia"  #<Ostgotien>  #NT!
 scandinavian_missions_task_4_DESC: "Seizing #T East Gothia#! will bring the valuable island of [GetProvince('(int32)6010').GetName|Y] into our hands, giving us maritime control of the trade lanes of the #E Oceanus Sarmaticus#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Die Eroberung von #T East Gothia#! wird die wertvolle Insel [GetProvince('(int32)6010').GetName|Y] in unsere Hände bringen und uns die maritime Kontrolle über die Handelswege des #E Oceanus Sarmaticus#! geben.\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
 scandinavian_missions_task_4_tt: "We will receive claims on the province of #T East Gothia#!."  #<Wir erhalten Ansprüche auf die Provinz #T Ostgotien#!.>  #NT!
  
 scandinavian_missions_task_5: "The Spoils Of War"  #<Die Beute des Krieges>  #NT!
 scandinavian_missions_task_5_DESC: "Now that we have conquered the north and south of #T Scandia#!, let us enjoy the fruits of our labors by pillaging the land and sending slaves to [ROOT.GetCountry.GetCapital.GetName|T].\n\n\n\n\n\n\n\n\n\n\n@celt_mil15!"  #<Nachdem wir nun den Norden und Süden von #T Skandinavien#!, erobert haben, lasst uns die Früchte unserer Arbeit genießen, indem wir das Land plündern und Sklaven nach [ROOT.GetCountry.GetCapital.GetName|T] schicken.\n\n\n\n\n\n\n\n\n\n\n@celt_mil15!>  #NT!
  
 scandinavian_missions_task_6: "Crush The Goths"  #<Zerstöre die Goten>  #NT!
 scandinavian_missions_task_6_DESC: "The victorious [ROOT.GetCountry.GetAdjective] levies have smashed the tribes that lived in #T Gothia#!, greatly increasing the size of our borders - all hail [ROOT.GetCountry.GetRuler.GetName|Y] and the armies of [ROOT.GetCountry.GetName|T]! \n\n\n\n\n\n\n\n\n\n\n@celt_mil5!"  #<Die siegreichen [ROOT.GetCountry.GetAdjective]-Aufhebungen haben die Stämme, die in #T Gothia#!, lebten, zerschlagen und unsere Grenzen erheblich vergrößert – alle begrüßen [ROOT.GetCountry.GetRuler.GetName|Y] und die Armeen von [ROOT.GetCountry.GetName|T]! \n\n\n\n\n\n\n\n\n\n\n@celt_mil5!>  #NT!
  
 scandinavian_missions_task_7: "Scandia"  #<Scandia>  #NT!
 scandinavian_missions_task_7_DESC: "At long last, we have defeated our neighboring enemies and brought their Tribal Chiefs to submission - we are now here to witness the birth of #Y Scandia#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil12!"  #<Endlich haben wir unsere benachbarten Feinde besiegt und ihre Stammeshäuptlinge zur Unterwerfung gebracht – jetzt sind wir hier, um die Geburt von #Y Scandia#!.\n\n\n\n\n\n\n\n\n\n\n@celt_mil12! mitzuerleben>  #NT!
 you_need_to_form_scandinavia: "We need to take the decision to #Y Form Scandia#!."  #<Wir müssen die Entscheidung treffen, #Y aus Scandia zu bilden#!.>  #NT!
  
 scandinavian_missions_task_8: "Scandian Raiders"  #<Scandian Raiders>  #NT!
 scandinavian_missions_task_8_DESC: "There are cities across the water in #T Britannia#! and in other civilized places that we could establish trade connections with, if we so desired, but we could just as easily launch raids on their territories...\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!"  #<Es gibt Städte auf der anderen Seite des Wassers in #T Britannia#! und an anderen zivilisierten Orten, mit denen wir Handelsbeziehungen aufbauen könnten, wenn wir das wollten, aber wir könnten genauso gut Überfälle auf ihre Gebiete starten ...\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!>  #NT!
 scandian_pillage_bonus_var_tt: "When our armies #R Raze Cities#!, we will gain #G 2% Civic Research#!."  #<Wenn unsere Armeen #R Städte zerstören#!,, erhalten wir #G 2 % Bürgerforschung#!.>  #NT!
  
 scandinavian_missions_task_9: "Caledonian Claims"  #<Kaledonische Ansprüche>  #NT!
 scandinavian_missions_task_9_DESC: "Now that we have secured core territories for ourselves, we realize that there are lands across the water that would be easy for us to take...\n\n\n\n\n\n\n\n\n\n\n@celt_mil16!"  #<Nachdem wir uns nun Kerngebiete gesichert haben, erkennen wir, dass es auf der anderen Seite des Wassers Ländereien gibt, die wir leicht einnehmen könnten ...\n\n\n\n\n\n\n\n\n\n\n@celt_mil16!>  #NT!
  
 scandinavian_missions_task_10: "A Scandian Capital"  #<Eine skandinavische Hauptstadt>  #NT!
 scandinavian_missions_task_10_DESC: "The only thing that our nation is missing is a true capital city, but this is a problem that we shall fix. Once we have chosen the site of our national capital, we will begin constructing a city immediately.\n\n#Y We will be given the opportunity to move our nation's capital and a city shall be built.#!\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!"  #<Das Einzige, was unserer Nation fehlt, ist eine echte Hauptstadt, aber das ist ein Problem, das wir lösen werden. Sobald wir den Standort unserer Landeshauptstadt ausgewählt haben, werden wir sofort mit dem Bau einer Stadt beginnen.\n\n#Y Wir erhalten die Möglichkeit, die Hauptstadt unseres Landes zu verlegen und eine Stadt soll gebaut werden.#!\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!>  #NT!
  
 scandinavian_missions_task_11: "Scandian Homesteads"  #<Skandinavische Gehöfte>  #NT!
 scandinavian_missions_task_11_DESC: "Our growing nation will need food - let us build farms wherever we can, in hopes of surviving the cold winters. \n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Unsere wachsende Nation wird Nahrungsmittel brauchen – lasst uns Bauernhöfe bauen, wo immer wir können, in der Hoffnung, die kalten Winter zu überstehen. \n\n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!
 scandinavian_missions_task_11_tt: "We need to build at least #Y 5 Farming Settlements#! in the region of #T Scandia#!."  #<Wir müssen mindestens #Y 5 landwirtschaftliche Siedlungen#! in der Region #T Scandia#! bauen.>  #NT!
  
 scandinavian_missions_task_12: "Scandian Stallions"  #<Skandinavische Hengste>  #NT!
 scandinavian_missions_task_12_DESC: "There are many things that we lack, but thankfully access to horses @horses! is not one of them; we should develop [GetProvince('(int32)6024').GetName|Y] in order to increase the size of our herds and the strength of our cavalry.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<Es gibt viele Dinge, die uns fehlen, aber zum Glück Zugang zu Pferden @horses! gehört nicht dazu; Wir sollten [GetProvince('(int32)6024').GetName|Y] entwickeln, um die Größe unserer Herden und die Stärke unserer Kavallerie zu erhöhen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!>  #NT!
  
  
  #################### 
  # Events 
  #################### 
  
 me_scandinavia_1_title: "The Ambitious Chieftain"  #<Der ehrgeizige Häuptling>  #NT!
 me_scandinavia_1_desc: "Although most living within the civilizations of the south and east have never heard of the rugged forests of #E Scandia#! or its people, it is a thriving, vibrant place, one that is inhabited by a large number of tribes that constantly vie for supremacy against each other.\n\nAlthough no man knows the future, it is believed that the unification of the northern wildlands is inevitable...the histories await the arrival of the first ruler to unite #E Scandia#!."  #<Obwohl die meisten Bewohner der Zivilisationen des Südens und Ostens noch nie von den rauen Wäldern von #E Skandinavien#! oder seinen Menschen gehört haben, ist es ein blühender, lebendiger Ort, der von einer großen Anzahl von Stämmen bewohnt wird, die ständig um die Vorherrschaft gegeneinander kämpfen.\n\nObwohl kein Mensch die Zukunft kennt, wird angenommen, dass die Vereinigung der nördlichen Wildlande unvermeidlich ist ... die Geschichten warten auf die Ankunft des ersten Herrschers, der sich vereint #E Scandia#!.>  #NT!
 me_scandinavia_1.a: "I know who that person will be..."  #<Ich weiß, wer diese Person sein wird ...>  #NT!
 me_scandinavia_1_tooltip: "Time to make history..."  #<Zeit, Geschichte zu schreiben...>  #NT!
  
 me_scandinavia_2_title: "Herulia"  #<Herulia>  #NT!
 me_scandinavia_2_desc: "[ROOT.GetCountry.GetRuler.GetName] has never been one to deny [ROOT.GetCountry.GetRuler.GetHerHis] ambitions, and taking possession of the lands in the south of #E Scandia#! has long been a dream of the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle].\n\nThe province of #E Herulia#! controls the all-important land crossing into the #E Cimbrian#! islands, which in turn are the doorway into the mainland of #E Europe#!. Securing these territories will give us a power that has hitherto been unknown to us, and will greatly increase our prestige in the region."  #<[ROOT.GetCountry.GetRuler.GetName] war nie jemand, der [ROOT.GetCountry.GetRuler.GetHerHis] Ambitionen geleugnet hat, und die Besitznahme der Ländereien im Süden von #E Skandinavien#! war schon lange ein Traum der [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle].\n\nDie Provinz #E Herulia#! kontrolliert den überaus wichtigen Landübergang zu den #E Kimbrischen#! Inseln, die in wiederum sind das Tor zum Festland von #E Europa#!. Die Sicherung dieser Gebiete wird uns eine bisher unbekannte Macht verleihen und unser Ansehen in der Region erheblich steigern.>  #NT!
 me_scandinavia_2.a: "The gods are with us, you shall see! Herulia is ours!"  #<Die Götter sind mit uns, du wirst sehen! Herulia gehört uns!>  #NT!
 me_scandinavia_2_tooltip: "$mission_completed_tooltip_1$ '#Y Herulia#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Herulia#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_3_title: "Ultima Thule"  #<Ultima Thule>  #NT!
 me_scandinavia_3_desc: "[ROOT.GetCountry.GetRuler.GetName] had no problems understanding why the western coasts of #E Ultima Thule#! province were unclaimed, for the land itself was exceedingly poor, unable to sustain any meaningful agriculture, and wind-blasted and rain-soaked on top of that. Although there were some forested regions were valuable @woad! could be found, there wasn't much else worth mentioning; most of the scattered tribesmen living in Ultima Thule plied their trades at sea, relying on fishing to sustain their families because the hunting was terrible and no crops survived the devastating winters.\n\nDespite these limiting factors, the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] realized the necessity of claiming these lands - we must not allow any of our rival claimants to power to gain ahold of territories that could benefit them. A plan was thus proposed by the #E Tribal Elders#!, one that would see our tribesmen sailing from the port at [GetProvince('(int32)6038').GetName] and building small villages along the coasts. It would be expensive, but we would be able to take over any lands that we currently did not control at once."  #<[ROOT.GetCountry.GetRuler.GetName] hatte keine Probleme zu verstehen, warum die Westküsten der Provinz #E Ultima Thule#! nicht beansprucht wurden, denn das Land selbst war äußerst arm, nicht in der Lage, eine sinnvolle Landwirtschaft zu betreiben, und darüber hinaus windgepeitscht und regennass. Obwohl es einige bewaldete Regionen gab, waren @woad wertvoll! konnte gefunden werden, sonst gab es nicht viel Erwähnenswertes; Die meisten der verstreuten Stammesangehörigen, die in Ultima Thule lebten, übten ihre Berufe auf See aus und waren auf die Fischerei angewiesen, um ihre Familien zu ernähren, da die Jagd schrecklich war und keine Ernte die verheerenden Winter überlebte.\n\nTrotz dieser einschränkenden Faktoren erkannten die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] die Notwendigkeit, diese Ländereien zu beanspruchen – wir dürfen nicht zulassen, dass einer unserer konkurrierenden Machtanwärter Gebiete erwirbt, die ihnen zugute kommen könnten. Deshalb schlugen die #E Stammesältesten#! einen Plan vor, der vorsah, dass unsere Stammesangehörigen um [GetProvince('(int32)6038').GetName] vom Hafen abfuhren und kleine Dörfer entlang der Küsten errichteten. Es wäre teuer, aber wir könnten alle Ländereien, die wir derzeit nicht kontrollieren, sofort übernehmen.>  #NT!
 me_scandinavia_3.a: "I like the sound of that - send the colonists out by sea"  #<Mir gefällt, wie sich das anhört: Schicken Sie die Kolonisten auf dem Seeweg hinaus>  #NT!
 me_scandinavia_3.b: "The time is not right for a western expedition..."  #<Die Zeit ist nicht reif für eine Westexpedition...>  #NT!
 me_scandinavia_3_tooltip: "$mission_completed_tooltip_1$ '#Y Ultima Thule#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Ultima Thule#!' $mission_completed_tooltip_2$>  #NT!
 me_scandinavia_3.a_tt: "We will colonize any unsettled territories in the #T Ultima Thule#! province."  #<Wir werden alle unbesiedelten Gebiete in der Provinz #T Ultima Thule#! kolonisieren.>  #NT!
  
 me_scandinavia_4_title: "West Gothia"  #<Westgothia>  #NT!
 me_scandinavia_4_desc: "[ROOT.GetCountry.GetRuler.GetName] has boldly announced claims on the homelands of some of the strongest and most powerful tribes living in all of #E Scandia#!, all but guaranteeing that a decisive war of conquest will be waged by the [ROOT.GetCountry.GetAdjective]s in the days to come.\n\nAs word of impending hostilities sweeps through the countryside settlements, the mercenary companies have been sharpening their weapons and securing supplies for the campaigns to come."  #<[ROOT.GetCountry.GetRuler.GetName] hat kühn Ansprüche auf die Heimatländer einiger der stärksten und mächtigsten Stämme in ganz #E Skandinavien#!, angekündigt, die fast garantieren, dass die [ROOT.GetCountry.GetAdjective] in den kommenden Tagen einen entscheidenden Eroberungskrieg führen werden.\n\nWährend sich die Nachricht drohender Feindseligkeiten durch die ländlichen Siedlungen verbreitet, haben die Söldnerkompanien ihre Waffen geschärft und Vorräte für die kommenden Feldzüge gesichert.>  #NT!
 me_scandinavia_4.a: "The bloodshed will be worth the rewards - I am certain"  #<Das Blutvergießen wird sich lohnen – da bin ich mir sicher>  #NT!
 me_scandinavia_4_tooltip: "$mission_completed_tooltip_1$ '#Y West Gothia#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Westgothia#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_5_title: "East Gothia"  #<Ostgotien>  #NT!
 me_scandinavia_5_desc: "The eastern territories of #E Scandia#! have always been special to [ROOT.GetCountry.GetRuler.GetName], who has fond memories of summers spent traveling along the coasts in [ROOT.GetCountry.GetRuler.GetHerHis] youth. The forests teeming with wildlife, the cold sea air that fills up your lungs and makes you feel truly alive for the first time in your life, the breathtaking coastline of imposing rocks jutting out of the frozen waters, the threat of wandering pirates and slave raiding parties...it has something for everyone.\n\nPerhaps it was nostalgia that pushed [ROOT.GetCountry.GetName] to claim the region, but no matter what the [ROOT.GetCountry.GetRulerTitle]'s motivations were, the outcome would be the same."  #<Die östlichen Gebiete von #E Skandinavien#! waren schon immer etwas Besonderes für [ROOT.GetCountry.GetRuler.GetName], der in seiner Jugend [ROOT.GetCountry.GetRuler.GetHerHis] schöne Erinnerungen an die Sommer mit Reisen entlang der Küsten hat. Die Wälder voller Wildtiere, die kalte Meeresluft, die Ihre Lungen füllt und Ihnen zum ersten Mal in Ihrem Leben das Gefühl gibt, wirklich lebendig zu sein, die atemberaubende Küste mit imposanten Felsen, die aus dem gefrorenen Wasser ragen, die Bedrohung durch umherziehende Piraten und Sklavenüberfälle ... es hat für jeden etwas zu bieten.\n\nVielleicht war es Nostalgie, die [ROOT.GetCountry.GetName] dazu drängte, die Region zu erobern, aber egal, was die Beweggründe der [ROOT.GetCountry.GetRulerTitle] waren, das Ergebnis würde das sein gleich.>  #NT!
 me_scandinavia_5.a: "It will please me to return once again to East Gothia..."  #<Es wird mir eine Freude sein, noch einmal nach Ost-Gothia zurückzukehren ...>  #NT!
 me_scandinavia_5_tooltip: "$mission_completed_tooltip_1$ '#Y East Gothia#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Ostgotien#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_6_title: "The Spoils Of War"  #<Die Beute des Krieges>  #NT!
 me_scandinavia_6_desc: "[ROOT.GetCountry.GetRuler.GetName] has been able to lead [ROOT.GetCountry.GetName] to a string of impressive victories lately, a fact that is celebrated by all of the people in [ROOT.GetCountry.GetCapital.GetName], who are showering the [ROOT.GetCountry.GetRulerTitle] with praise.\n\nOur triumphant [ROOT.GetCountry.GetRulerTitle] has brought the distant provinces of #E Ultima Thule#! and #E Herulia#! under our control, earning [ROOT.GetCountry.GetRuler.GetFirstName] an eternal place in our oral histories. In order to celebrate this momentous occasion, our armies were allowed to plunder the countryside on their way back home from the battlefield, and the slave pens of [ROOT.GetCountry.GetCapital.GetName] bellowed a groan of misery as they were filled with hundreds of poor souls."  #<[ROOT.GetCountry.GetRuler.GetName] konnte [ROOT.GetCountry.GetName] in letzter Zeit zu einer Reihe beeindruckender Siege führen, eine Tatsache, die von allen Menschen in [ROOT.GetCountry.GetCapital.GetName] gefeiert wird, die die [ROOT.GetCountry.GetRulerTitle] mit Lob überschütten.\n\nUnser triumphierendes [ROOT.GetCountry.GetRulerTitle] hat die fernen Provinzen #E Ultima Thule#! und #E Herulia#! unter unsere Kontrolle gebracht. [ROOT.GetCountry.GetRuler.GetFirstName] einen ewigen Platz in unseren mündlichen Überlieferungen verdienen. Um diesen bedeutsamen Anlass zu feiern, durften unsere Armeen auf dem Heimweg vom Schlachtfeld das Land plündern, und die Sklavenpferche von [ROOT.GetCountry.GetCapital.GetName] brüllten vor Elend, als sie mit Hunderten armer Seelen gefüllt waren.>  #NT!
 me_scandinavia_6.a: "I will always fight to bring the [ROOT.GetCountry.GetAdjective] people victory!"  #<Ich werde immer dafür kämpfen, den [ROOT.GetCountry.GetAdjective] Leuten den Sieg zu bringen!>  #NT!
 me_scandinavia_6_tooltip: "$mission_completed_tooltip_1$ '#Y The Spoils Of War#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Die Kriegsbeute#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_7_title: "Crush The Goths"  #<Zerstöre die Goten>  #NT!
 me_scandinavia_7_desc: "In the end, everything had come down to a handful of decisive battles fought between our [ROOT.GetCountry.GetAdjective] levies and the tribes living in the forests of #E West#! and #E East Gothia#!, and the gods of war demonstrated once and for all that they were fighting alongside our warriors.\n\nOur victorious forces have crushed all that stood against them in the field, and the power of [ROOT.GetCountry.GetRuler.GetName] has grown to a staggering height."  #<Am Ende war alles auf eine Handvoll entscheidender Schlachten hinausgelaufen, die zwischen unseren [ROOT.GetCountry.GetAdjective] Truppen und den Stämmen, die in den Wäldern von #E West#! und #E Ostgotien#! lebten, ausgetragen wurden, und die Götter des Krieges zeigten ein für alle Mal, dass sie an der Seite unserer Krieger kämpften.\n\nUnsere siegreichen Streitkräfte haben alles vernichtet, was sich ihnen auf dem Feld widersetzte, und die Macht von [ROOT.GetCountry.GetRuler.GetName] ist zu einer atemberaubenden Höhe gewachsen.>  #NT!
 me_scandinavia_7.a: "Take slaves and spoils back to the capital!"  #<Bringt Sklaven und Beute zurück in die Hauptstadt!>  #NT!
 me_scandinavia_7_tooltip: "$mission_completed_tooltip_1$ '#Y Crush The Goths#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Zerschmettere die Goten#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_8_title: "Scandia"  #<Scandia>  #NT!
 me_scandinavia_8_desc: "It is hard to believe, but [ROOT.GetCountry.GetRuler.GetName] has brought our nation to the pinnacle of glory; no longer known as simple tribesmen, we have achieved a feat that is noticed by the Chieftains and Kings throughout northern Europe.\n\nWe are [ROOT.GetCountry.GetName] - let the world tremble!"  #<Es ist kaum zu glauben, aber [ROOT.GetCountry.GetRuler.GetName] hat unsere Nation auf den Gipfel des Ruhms gebracht; Nicht mehr als einfache Stammesangehörige bekannt, haben wir eine Leistung vollbracht, die von den Häuptlingen und Königen in ganz Nordeuropa wahrgenommen wird.\n\nWir sind [ROOT.GetCountry.GetName] – lasst die Welt erzittern!>  #NT!
 me_scandinavia_8.a: "Our name shall forevermore be associated with eternal victory"  #<Unser Name wird für immer mit dem ewigen Sieg verbunden sein>  #NT!
 me_scandinavia_8_tooltip: "$mission_completed_tooltip_1$ '#Y Scandia#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Scandia#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_9_title: "Scandian Raiders"  #<Scandian Raiders>  #NT!
 me_scandinavia_9_desc: "The devastating raids launched by the [ROOT.GetCountry.GetAdjective] tribes has brought countless miseries to the coastal communities living within striking distances of their ports, and the sight of our ships appearing along the horizon is one that brings genuine terror to the hearts of many.\n\nWhether by land or sea, the warriors of [ROOT.GetCountry.GetName] have laid waste to many settlements and cities, and the threat imposed by their raiding parties has caused many communities to consider building stronger fortifications."  #<Die verheerenden Überfälle der [ROOT.GetCountry.GetAdjective]-Stämme haben den Küstengemeinden, die in unmittelbarer Nähe ihrer Häfen leben, zahlloses Leid gebracht, und der Anblick unserer Schiffe, die am Horizont auftauchen, löst bei vielen echten Schrecken aus.\n\nOb auf dem Land- oder Seeweg haben die Krieger von [ROOT.GetCountry.GetName] viele Siedlungen und Städte verwüstet, und die Bedrohung durch ihre Überfalltrupps hat viele Gemeinden dazu veranlasst, über den Bau stärkerer Befestigungen nachzudenken.>  #NT!
 me_scandinavia_9.a: "Nothing will stop us from taking what we want!"  #<Nichts wird uns davon abhalten, uns zu nehmen, was wir wollen!>  #NT!
 me_scandinavia_9_tooltip: "$mission_completed_tooltip_1$ '#Y Scandian Raiders#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Scandian Raiders#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_10_title: "Caledonian Claims"  #<Kaledonische Ansprüche>  #NT!
 me_scandinavia_10_desc: "Although everyone says  that the #E Caledonians#! are formidable warriors, this has not dissuaded [ROOT.GetCountry.GetRuler.GetName] from preparing [ROOT.GetCountry.GetAdjective] claims on their lands. Our [ROOT.GetCountry.GetAdjective] warships have raided their coastlines plenty of times, and our levies know that we have nothing to fear from the cowardly islanders.\n\nSoon enough, our levies shall cross the #E Mare Hibernicum#! and bring devastation to the unsuspecting - they will not be able to hide behind their walls! In preparation for this glorious event, our craftsmen have designed ships that are faster than anything on the open seas."  #<Obwohl jeder sagt, dass die #E Kaledonier#! beeindruckende Krieger sind, hat dies [ROOT.GetCountry.GetRuler.GetName] nicht davon abgehalten, [ROOT.GetCountry.GetAdjective] Ansprüche auf ihr Land vorzubereiten. Unsere [ROOT.GetCountry.GetAdjective] Kriegsschiffe haben ihre Küsten viele Male überfallen, und unsere Truppen wissen, dass wir von den feigen Inselbewohnern nichts zu befürchten haben.\n\nSchon bald werden unsere Truppen das #E Mare Hibernicum#! überqueren und Verwüstung über die Ahnungslosen bringen – sie werden sich nicht hinter ihren Mauern verstecken können! Zur Vorbereitung auf dieses glorreiche Ereignis haben unsere Handwerker Schiffe entworfen, die schneller sind als alles andere auf offener See.>  #NT!
 me_scandinavia_10.a: "I can hardly wait! Sounds like a great time"  #<Ich kann es kaum erwarten! Klingt nach einer tollen Zeit>  #NT!
 me_scandinavia_10_tooltip: "$mission_completed_tooltip_1$ '#Y Caledonian Claims#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Kaledonische Ansprüche#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_11_title: "A Scandian Capital"  #<Eine skandinavische Hauptstadt>  #NT!
 me_scandinavia_11_desc: "Now that [ROOT.GetCountry.GetRuler.GetName] has united the various #E Scandian#! tribes under one banner, it has been proposed that we construct a brand new city to serve as the official capital of such a mighty realm. [ROOT.GetCountry.GetRuler.GetFirstName] has to now decide where we shall build our capital...an enviable task, but one that [ROOT.GetCountry.GetRuler.GetSheHe] certainly deserves."  #<Nachdem [ROOT.GetCountry.GetRuler.GetName] nun die verschiedenen #E skandinavischen#! Stämme unter einem Banner vereint hat, wurde vorgeschlagen, dass wir eine brandneue Stadt errichten, die als offizielle Hauptstadt eines so mächtigen Reiches dienen soll. [ROOT.GetCountry.GetRuler.GetFirstName] muss nun entscheiden, wo wir unsere Hauptstadt errichten wollen... eine beneidenswerte Aufgabe, die [ROOT.GetCountry.GetRuler.GetSheHe] aber auf jeden Fall verdient.>  #NT!
 me_scandinavia_11.a: "The plains of [GetProvince('(int32)6000').GetName] is a great location"  #<Die Ebene von [GetProvince('(int32)6000').GetName] ist ein großartiger Ort>  #NT!
 me_scandinavia_11.b: "[GetProvince('(int32)6012').GetName] on the coast is an appealing place"  #<[GetProvince('(int32)6012').GetName] an der Küste ist ein ansprechender Ort>  #NT!
 me_scandinavia_11.c: "[GetProvince('(int32)6004').GetName] would be an interest place for a capital..."  #<[GetProvince('(int32)6004').GetName] wäre ein interessanter Ort für eine Hauptstadt...>  #NT!
 me_scandinavia_11.d: "I choose the forest isle of [GetProvince('(int32)6009').GetName]"  #<Ich wähle die Waldinsel [GetProvince('(int32)6009').GetName]>  #NT!
 me_scandinavia_11.e: "We shall keep our ancient capital"  #<Wir werden unsere alte Hauptstadt behalten>  #NT!
 me_scandinavia_11_tooltip: "$mission_completed_tooltip_1$ '#Y A Scandian Capital#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Eine skandinavische Hauptstadt#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_12_title: "Scandian Homesteads"  #<Skandinavische Gehöfte>  #NT!
 me_scandinavia_12_desc: "All throughout the countryside, the farms that we have built are productive and fruitful, and our people never want for vegetables in the lean days of winter. Thanks to the infrastructure that we now have, we will be able to store more food than we were able to before - no mean feat, and something to celebrate in a place where hunger is a real threat."  #<Überall auf dem Land sind die von uns errichteten Bauernhöfe produktiv und fruchtbar, und unseren Leuten mangelt es in den mageren Wintertagen nie an Gemüse. Dank der Infrastruktur, die wir jetzt haben, werden wir in der Lage sein, mehr Lebensmittel zu lagern als zuvor – keine leichte Aufgabe und ein Grund zum Feiern an einem Ort, an dem Hunger eine echte Bedrohung darstellt.>  #NT!
 me_scandinavia_12.a: "This abundance pleases me - I hope that our people are happy"  #<Diese Fülle freut mich – ich hoffe, dass unser Volk glücklich ist>  #NT!
 me_scandinavia_12_tooltip: "$mission_completed_tooltip_1$ '#Y Scandian Homesteads#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Skandinavische Gehöfte#!' $mission_completed_tooltip_2$>  #NT!
  
 me_scandinavia_13_title: "Scandian Stallions"  #<Skandinavische Hengste>  #NT!
 me_scandinavia_13_desc: "We are pleased to report that the horses raised on the estates at we have built at [GetProvince('(int32)6024').GetName] are performing beyond our lofty expectations, and the horses sent to our cavalrymen dash through the forested ravines of [ROOT.GetCountry.GetName] with a skill that seems supernatural."  #<Wir freuen uns, Ihnen mitteilen zu können, dass die Leistung der Pferde, die auf den von uns in [GetProvince('(int32)6024').GetName] errichteten Anwesen gezüchtet werden, unsere hohen Erwartungen übertrifft und dass die Pferde, die zu unseren Kavalleristen geschickt wurden, mit einer Fähigkeit, die übernatürlich erscheint, durch die bewaldeten Schluchten von [ROOT.GetCountry.GetName] rennen.>  #NT!
 me_scandinavia_13.a: "May our riders lead us to victory!"  #<Mögen unsere Fahrer uns zum Sieg führen!>  #NT!
 me_scandinavia_13_tooltip: "$mission_completed_tooltip_1$ '#Y Scandian Stallions#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y Skandinavische Hengste#!' $mission_completed_tooltip_2$>  #NT!
  
