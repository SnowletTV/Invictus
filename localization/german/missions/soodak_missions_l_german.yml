  #Artifacts 
 soodak_harrowing_tale: "Log of the Androphagian Disaster"  #<Protokoll der androphagischen Katastrophe>  #NT!
 soodak_harrowing_tale_desc: "A harrowing first-hand account of the ill-fated Soodak expedition to Androphagia, starting from when the party left the city, to when they got snowed-in during a blizzard, forcing them into cannibalism owing to inadequate supplies, until the sole survivor escaped, halfway towards death."  #<Ein erschütternder Bericht aus erster Hand über die unglückliche Soodak-Expedition nach Androphagia, beginnend mit dem Verlassen der Stadt über den Schneesturm, der sie aufgrund unzureichender Vorräte zum Kannibalismus zwang, bis der einzige Überlebende auf halbem Weg dem Tod entkommen konnte.>  #NT!
  
 soodak_hand: "Stuffed Hand"  #<Gefüllte Hand>  #NT!
 soodak_hand_desc: "A hand from one of the Soodak delegates to Androphagia, who were all eaten by those barbarians, except for this part, which was cut off, stuffed, and sent back as an insult to injury. It is now venerated among our people, a reminder of Androphagian cruelty and rallying-cry against those savages."  #<Eine Hand von einem der Soodak-Delegierten bei Androphagia, die alle von diesen Barbaren gefressen wurden, mit Ausnahme dieses Teils, der abgeschnitten, ausgestopft und als Beleidigung für Verletzungen zurückgeschickt wurde. Es wird jetzt von unserem Volk verehrt, eine Erinnerung an die Grausamkeit der Androphagen und ein Schlachtruf gegen diese Wilden.>  #NT!
  
 soodak_cookbook: "Cannibal Cookbook"  #<Kannibalen-Kochbuch>  #NT!
 soodak_cookbook_desc: "A cookbook containing a wide variety of recipes known to the Androphagians, particularly of the human kind. It includes instructions for ribs, finger-food, stuffed-stomachs, humans-in-a-blanket, man-thighs, and brain-meal. Not surprisingly, most who read it lose their appetite."  #<Ein Kochbuch mit einer Vielzahl von Rezepten, die den Androphagiern bekannt waren, insbesondere denen der Menschen. Es enthält Anleitungen für Rippchen, Fingerfood, gefüllte Mägen, Menschen in einer Decke, Männerschenkel und Gehirnmehl. Es überrascht nicht, dass die meisten Leser den Appetit verlieren.>  #NT!
  
