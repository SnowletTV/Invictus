 me_soodak_1_title: "The Accursed Lands"  #<Die verfluchten Länder>  #NT!
 me_soodak_1_desc: "$01_soodak_missions_DESCRIPTION$"  #<$01_soodak_missions_DESCRIPTION$>  #NT!
 me_soodak_1.a: "We will thrive where no man has gone before."  #<Wir werden dort gedeihen, wo noch kein Mensch zuvor gewesen ist.>  #NT!
  
 me_soodak_2_title: "Securing The Food Supply"  #<Sicherung der Lebensmittelversorgung>  #NT!
 me_soodak_2_desc: "Although we have gotten by so far, [ROOT.GetCountry.GetRuler.GetName] has recognized that our current food supplies will eventually run low. The construction of a central granary in [GetProvince('(int32)9371').GetName], and the imported food goods should be more than enough to support our growing population."  #<Obwohl wir bisher gut zurechtgekommen sind, hat [ROOT.GetCountry.GetRuler.GetName] erkannt, dass unsere derzeitigen Lebensmittelvorräte irgendwann zur Neige gehen werden. Der Bau eines zentralen Getreidespeichers in [GetProvince('(int32)9371').GetName] und die importierten Nahrungsmittel dürften mehr als ausreichen, um unsere wachsende Bevölkerung zu ernähren.>  #NT!
 me_soodak_2.a: "Well, at least we won't go hungry."  #<Nun, zumindest werden wir nicht hungern.>  #NT!
  
 me_soodak_3_title: "$01_soodak_missions_task_3$"  #<$01_soodak_missions_task_3$>  #NT!
 me_soodak_3_desc: "Soodak is a glorious amber-mining @amber! colony positioned on the northernmost periphery of the known world, yet, we have lacked the infrastructure needed for ships to safely dock at our natural harbor, the port facilities to repair those which do come our way, and merchant vessels of our own when none others are brave enough to cross these lattitutes, grievously hindering our economic potential.\n\nNow that we have invested our rather-limited resources into building a servicable port and a fleet of simple transport ships, not-only shall we be able to draw more curious and wealthy visitors to our island, but we will have the capacity to send our own independent expeditions across the high seas and into uncharted river systems without relying on the motherland."  #<Soodak ist ein herrlicher Bernsteinschürfer @amber! Kolonie an der nördlichsten Peripherie der bekannten Welt, doch uns fehlt die nötige Infrastruktur, damit Schiffe sicher in unserem natürlichen Hafen anlegen können, die Hafenanlagen, um diejenigen zu reparieren, die uns in den Weg kommen, und unsere eigenen Handelsschiffe, wenn niemand anderer den Mut hat, diese Breitengrade zu überqueren, was unser wirtschaftliches Potenzial erheblich beeinträchtigt.\n\nDa wir nun unsere eher begrenzten Ressourcen in den Bau eines funktionsfähigen Hafens und einer Flotte einfacher Transportschiffe investiert haben, werden wir nicht nur dazu in der Lage sein um mehr neugierige und wohlhabende Besucher auf unsere Insel zu locken, aber wir werden auch in der Lage sein, unsere eigenen unabhängigen Expeditionen über die hohe See und in unbekannte Flusssysteme zu schicken, ohne auf das Mutterland angewiesen zu sein.>  #NT!
 me_soodak_3.a: "A small, yet crucial, step for Soodak."  #<Ein kleiner, aber entscheidender Schritt für Soodak.>  #NT!
 me_soodak_3_tooltip: "The mission task '#Y $01_soodak_missions_task_3$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_3$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_4_title: "$01_soodak_missions_task_4$"  #<$01_soodak_missions_task_4$>  #NT!
 me_soodak_4_desc: "It is very much cold on this island during the wintertime, often requiring adults to be heavily clothed at all times to avoid a freezing death, even within the confines of a protected shelter. However, the native $fennic$ peoples of the area have developed a unique innovation they call 'saknas', or 'saunas', in which heated rocks are placed in the center of a covered pit, and then cooled with water as to concoct a hot steam through which the air becomes saturated and engorged, inducing a state of relaxation among its residents and spreading a generous summertime warmth unlike any seen with a traditional hearth; in-fact, a heat so-generous as to allow those in attendance to strip naked and bare.\n\nThough many of our colonists were skeptical of such exotic and unsavory rituals associated with our barbarian neighbors, now that we have built public 'saunas' throughout our capital, they have started coming to them on a regular basis, first skeptically and cautiously, now habitually, for this is one of the few ways to escape the weather. In-fact, the wealthy are beginning to build their own private saunas, for they have become quite the talk of the town."  #<Im Winter ist es auf dieser Insel sehr kalt, weshalb Erwachsene oft immer schwer bekleidet sein müssen, um einen Erfrierungstod zu vermeiden, selbst innerhalb der Grenzen eines geschützten Schutzraums. Die einheimischen $fennic$-Völker der Region haben jedoch eine einzigartige Innovation entwickelt, die sie „Saknas“ oder „Saunas“ nennen. Dabei werden erhitzte Steine ​​in der Mitte einer überdachten Grube platziert und dann mit Wasser abgekühlt, um einen heißen Dampf zu erzeugen, durch den die Luft gesättigt und angeschwollen wird, was bei den Bewohnern einen Zustand der Entspannung hervorruft und eine großzügige Sommerwärme verbreitet, wie man sie bei einem traditionellen Herd nicht kann; Tatsächlich herrschte eine so großzügige Hitze, dass sich die Anwesenden nackt und nackt ausziehen konnten.\n\nObwohl viele unserer Kolonisten solchen exotischen und unappetitlichen Ritualen unserer barbarischen Nachbarn skeptisch gegenüberstanden, kommen sie jetzt, da wir überall in unserer Hauptstadt öffentliche „Saunen“ gebaut haben, regelmäßig zu ihnen, zuerst skeptisch und vorsichtig, jetzt gewohnheitsmäßig, denn dies ist eine der wenigen Möglichkeiten, dem Wetter zu entkommen. Tatsächlich beginnen die Wohlhabenden, ihre eigenen privaten Saunen zu bauen, denn sie sind in aller Munde.>  #NT!
 me_soodak_4.a: "I could go for one now!"  #<Ich könnte mir jetzt eins holen!>  #NT!
 me_soodak_4_tooltip: "The mission task '#Y $01_soodak_missions_task_4$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_4$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_400_title: "The Sauna Craze"  #<Der Sauna-Trend>  #NT!
 me_soodak_400_desc: "A few years ago, we started building traditional #E $fennic$#! hearths called 'saunas', and they rapidly caught on in the capital, owing to the great heat and warmth they could provide after a hard days' work in the frigid winter. However, saunas have radiated outward from the capital itself towards our outlying settlements along the frontier, for they are simple to build and cheap to construct; thus, they have become a craze, taking the colony by storm, among both rich and poor, among both #E Germanics#! and #E Finnics#!. The question now is whether we should try keeping this fad alive beyond its natural expiration date, or allow it to pass into memory when the time comes."  #<Vor ein paar Jahren haben wir mit dem Bau traditioneller #E $fennic$#! Feuerstellen namens „Saunas“ begonnen, und sie haben sich in der Hauptstadt schnell durchgesetzt, da sie nach einem harten Arbeitstag im kalten Winter viel Wärme spenden konnten. Allerdings haben sich Saunen von der Hauptstadt selbst bis zu unseren abgelegenen Siedlungen entlang der Grenze ausgebreitet, da sie einfach zu bauen und kostengünstig zu bauen sind; Daher sind sie zu einer Modeerscheinung geworden und haben die Kolonie im Sturm erobert, sowohl bei den Reichen als auch bei den Armen, sowohl bei den #E Germanen#! als auch bei den #E Finnen#!. Die Frage ist nun, ob wir versuchen sollten, diese Modeerscheinung über ihr natürliches Ablaufdatum hinaus am Leben zu erhalten, oder ob wir zulassen sollten, dass sie zu gegebener Zeit in die Erinnerung übergeht.>  #NT!
 me_soodak_400.a: "Saunas are a long-term investment."  #<Saunen sind eine langfristige Investition.>  #NT!
 me_soodak_400.b: "Let it remain a useful fad."  #<Lassen Sie es eine nützliche Modeerscheinung bleiben.>  #NT!
  
 me_soodak_5_title: "$01_soodak_missions_task_5$"  #<$01_soodak_missions_task_5$>  #NT!
 #me_soodak_5_desc: "Though our colony has achieved a remarkable degree of self-sufficiency, given our disposition, we suffer from a distinctive lack of people with which our meager successes can be enjoyed; by offering vague financial incentives and greatly-exaggerated promises of prosperity to those residing within the overcrowded cities of our motherland, we will expand upon our colonial bedrock, laying the foundation for more settlements beyond Soodak itself.\n\nThe only question now remaining, however, is how much do we invest into making these advertisements, for even the tallest tales and thinnest truths require men to speak of them, and for others to believe those men."  #<Obwohl unsere Kolonie aufgrund unserer Veranlagung ein bemerkenswertes Maß an Selbstversorgung erreicht hat, leiden wir unter einem deutlichen Mangel an Menschen, mit denen wir unsere mageren Erfolge genießen können; Indem wir den Bewohnern der überfüllten Städte unseres Mutterlandes vage finanzielle Anreize und stark übertriebene Wohlstandsversprechen bieten, werden wir unser koloniales Fundament erweitern und den Grundstein für weitere Siedlungen außerhalb von Soodak selbst legen.\n\nDie einzige Frage, die jetzt noch offen ist, ist jedoch, wie viel wir in die Erstellung dieser Werbung investieren, denn selbst die größten Geschichten und die dünnsten Wahrheiten erfordern, dass Männer darüber sprechen und andere diesen Männern glauben.>  #NT!
 me_soodak_5_desc: "Though our colony has achieved a remarkable degree of self-sufficiency, given our disposition, we suffer from a distinctive lack of people with which our meager successes can be enjoyed; by offering vague financial incentives and greatly-exaggerated promises of prosperity to those residing within the overcrowded cities of our motherland, we will expand upon our colonial bedrock, laying the foundation for more settlements beyond Soodak itself.\n\nThe only question now remaining, however, is how much do we wish to stretch the truth?"  #<Obwohl unsere Kolonie aufgrund unserer Veranlagung ein bemerkenswertes Maß an Selbstversorgung erreicht hat, leiden wir unter einem deutlichen Mangel an Menschen, mit denen wir unsere mageren Erfolge genießen können; Indem wir den Bewohnern der überfüllten Städte unseres Mutterlandes vage finanzielle Anreize und stark übertriebene Wohlstandsversprechen bieten, werden wir unser koloniales Fundament ausbauen und den Grundstein für weitere Siedlungen außerhalb von Soodak selbst legen.\n\nDie einzige offene Frage ist jetzt jedoch, wie sehr wir die Wahrheit ans Licht bringen wollen?>  #NT!
 #me_soodak_5.a: "Old Man Jenkins can do it!"  #<Der alte Mann Jenkins kann es schaffen!>  #NT!
 #me_soodak_5.b: "Send a couple of recruiters and con-men to the coasts of our motherland."  #<Schicken Sie ein paar Rekrutierer und Betrüger an die Küsten unseres Mutterlandes.>  #NT!
 #me_soodak_5.c: "Hire a team of the finest Soodaker orators to tour #E [SCOPE.sCountry('soodak_overlord').GetName]#!."  #<Engagieren Sie ein Team der besten Soodaker-Redner für eine Tournee durch #E [SCOPE.sCountry('soodak_overlord').GetName]#!.>  #NT!
 #me_soodak_5.d: "I myself possess the unique gift of rhetoric, perhaps it can be used much to our convenience..."  #<Ich selbst besitze die einzigartige Gabe der Rhetorik, vielleicht kann sie sehr zu unserem Nutzen genutzt werden ...>  #NT!
 me_soodak_5.a: "Tell them it'll be cold, dark, and miserable, but they will find prosperity in 10 years."  #<Sagen Sie ihnen, dass es kalt, dunkel und elend sein wird, aber dass sie in 10 Jahren Wohlstand finden werden.>  #NT!
 me_soodak_5.b: "Promise they will become rich off the amber trade within 5 years of signing on."  #<Versprechen Sie, dass sie innerhalb von 5 Jahren nach der Anmeldung durch den Bernsteinhandel reich werden.>  #NT!
 me_soodak_5.c: "Boast the poorest peasant will own palaces surpassing the Pharaohs in a mere 6 months."  #<Prahlen Sie, dass der ärmste Bauer in nur 6 Monaten Paläste besitzen wird, die die der Pharaonen übertreffen.>  #NT!
 me_soodak_5.d: "Promise they will achieve a great many things, within a generous timeframe."  #<Versprechen Sie, dass sie innerhalb eines großzügigen Zeitrahmens sehr viel erreichen werden.>  #NT!
 me_soodak_5.e: "What if we were to actually make good promises we could uphold?"  #<Was wäre, wenn wir tatsächlich gute Versprechen machen würden, die wir einhalten könnten?>  #NT!
 me_soodak_5.f: "Promise them all the beer and mead they could dream of!"  #<Versprich ihnen so viel Bier und Met, wie sie nur träumen können!>  #NT!
 me_soodak_5_tooltip: "The mission task '#Y $01_soodak_missions_task_5$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_5$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_6_title: "$01_soodak_missions_task_6$"  #<$01_soodak_missions_task_6$>  #NT!
 me_soodak_6_desc: ""
 me_soodak_6.a: ""
 me_soodak_6_tooltip: "The mission task '#Y $01_soodak_missions_task_6$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_6$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_2000_title: "$01_soodak_missions_task_2$"  #<$01_soodak_missions_task_2$>  #NT!
 me_soodak_2000_desc: "Though we have established stable stores of food on our amber-rich isle, it still leaves much to be desired, and across the sea lies a coastline whose waters are teeming with bountiful quantities of fish, at least for Hyperborean standards; now that we have established a second settlement there, we will not only help to secure more food for our colony, but we have also given ourselves a foothold on the mainland."  #<Obwohl wir auf unserer bernsteinreichen Insel stabile Nahrungsvorräte angelegt haben, lässt diese immer noch viel zu wünschen übrig, und auf der anderen Seite des Meeres liegt eine Küste, deren Gewässer von reichlichen Fischmengen wimmeln, zumindest für hyperboreische Verhältnisse; Nachdem wir dort nun eine zweite Siedlung errichtet haben, werden wir nicht nur dazu beitragen, mehr Nahrung für unsere Kolonie zu sichern, sondern wir haben uns auch auf dem Festland Fuß gefasst.>  #NT!
 me_soodak_2000.a: "A perfect launching-point for future colonies."  #<Ein perfekter Ausgangspunkt für zukünftige Kolonien.>  #NT!
  
 me_soodak_7_title: "$01_soodak_missions_task_7$"  #<$01_soodak_missions_task_7$>  #NT!
 me_soodak_7_desc: "Our colony was primarily founded out of a desire to extract the precious amber @amber! teeming beneath the mud, and despite our best efforts, output had not yet reached levels matching expectations. Fortunately for us, however, there were other amber deposits across the bay, and now that we have established settlements there, our amber output has greatly surpassed expectations, to the point that new colonists are now arriving from the motherland, eager to partake in this newfound boom."  #<Unsere Kolonie wurde in erster Linie aus dem Wunsch heraus gegründet, den kostbaren Bernstein @amber zu gewinnen! Es wimmelt unter dem Schlamm, und trotz unserer besten Bemühungen hatte die Produktion noch nicht das Niveau erreicht, das den Erwartungen entsprach. Zu unserem Glück gab es jedoch noch andere Bernsteinvorkommen auf der anderen Seite der Bucht, und nachdem wir dort Siedlungen errichtet haben, hat unsere Bernsteinproduktion die Erwartungen bei weitem übertroffen, sodass jetzt neue Kolonisten aus dem Mutterland ankommen, die begierig sind, an diesem neuen Boom teilzuhaben.>  #NT!
 me_soodak_7.a: "We grow, little by little."  #<Wir wachsen Stück für Stück.>  #NT!
 me_soodak_7.b: "Perhaps we could persuade more to join them?"  #<Vielleicht könnten wir mehr davon überzeugen, sich ihnen anzuschließen?>  #NT!
 me_soodak_7_tooltip: "The mission task '#Y $01_soodak_missions_task_7$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_7$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_8_title: "$01_soodak_missions_task_8$"  #<$01_soodak_missions_task_8$>  #NT!
 me_soodak_8_desc: "Though we have access to fish year-round, we have previously imported much of our food from abroad, and lacked a backup plan in-case those networks were to be disrupted for a prolonged period. Though not as agreeable a palette to those foreign imports, now that we have established successful settlements in [GetProvince('(int32)9378').GetName] and [GetProvince('(int32)9379').GetName], we have ensured more domestic food production, further strengthing our position, and perhaps one day our efforts will facilitate expansion deeper into the interior. In-fact, a small group of freemen arrived today from the mainland, upon hearing of the opportunities of our new farming settlements."  #<Obwohl wir das ganze Jahr über Zugang zu Fisch haben, haben wir zuvor einen Großteil unserer Lebensmittel aus dem Ausland importiert und hatten keinen Backup-Plan für den Fall, dass diese Netzwerke über einen längeren Zeitraum unterbrochen würden. Auch wenn die Palette diesen ausländischen Importen nicht ganz so entgegenkommt, haben wir, nachdem wir in [GetProvince('(int32)9378').GetName] und [GetProvince('(int32)9379').GetName] erfolgreiche Siedlungen etabliert haben, für mehr inländische Lebensmittelproduktion gesorgt und so unsere Position weiter gestärkt, und vielleicht werden unsere Bemühungen eines Tages die Expansion tiefer ins Landesinnere erleichtern. Tatsächlich ist heute eine kleine Gruppe freier Männer vom Festland angekommen, als sie von den Möglichkeiten unserer neuen Bauernsiedlungen hörten.>  #NT!
 me_soodak_8.a: "A breadbasket which now bears fruit."  #<Ein Brotkorb, der jetzt Früchte trägt.>  #NT!
 me_soodak_8_tooltip: "The mission task '#Y $01_soodak_missions_task_8$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_8$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_9_title: "$01_soodak_missions_task_9$"  #<$01_soodak_missions_task_9$>  #NT!
 me_soodak_9_desc: "The northern coastline is barely-habitable and not particularly lucrative, lacking both in amber and food supplies, and yet, it has the potential to reduce our reliance upon the motherland; the red clay of [GetProvince('(int32)9372').GetName] is particularly-suited for crafting earthenware in which our wares can be stored, and the wild hemp of [GetProvince('(int32)9377').GetName] can be cultivated for rope vital for masts and various constructions. Now that we have colonized and developed the north, we have set ourselves up for a better tomorrow."  #<Die Nordküste ist kaum bewohnbar und nicht besonders lukrativ, da es sowohl an Bernstein als auch an Nahrungsmitteln mangelt, und doch hat sie das Potenzial, unsere Abhängigkeit vom Mutterland zu verringern; Der rote Ton von [GetProvince('(int32)9372').GetName] eignet sich besonders für die Herstellung von Steingut, in dem unsere Waren aufbewahrt werden können, und der wilde Hanf von [GetProvince('(int32)9377').GetName] kann für Seile angebaut werden, die für Masten und verschiedene Konstruktionen wichtig sind. Nachdem wir den Norden kolonisiert und entwickelt haben, haben wir uns auf eine bessere Zukunft eingestellt.>  #NT!
 me_soodak_9.a: "A small step, but an important one."  #<Ein kleiner Schritt, aber ein wichtiger.>  #NT!
 me_soodak_9_tooltip: "The mission task '#Y $01_soodak_missions_task_9$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_9$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_10_title: "$01_soodak_missions_task_10$"  #<$01_soodak_missions_task_10$>  #NT!
 me_soodak_10_desc: "After years of effort in colonizing the surrounding territories, establishing new outposts, and taming the vast wilderness of our new home, we have ceased being a tiny amber-mining @amber! island, and now find ourselves masters of the whole of #E Ilmandu Superior#!, a shining beacon of civilization burning through the shroud of the ever-lasting winter darkness. Yet, in spite of our most-impressive achievement, we have opened the door to further expansion and conquest far beyond our motherland's vision and expectations."  #<Nach jahrelangen Bemühungen, die umliegenden Gebiete zu kolonisieren, neue Außenposten zu errichten und die weite Wildnis unserer neuen Heimat zu zähmen, sind wir nicht mehr nur ein kleiner Bernsteinschürfer @amber! Insel, und finden uns nun als Herren von ganz #E Ilmandu Superior#!, wieder, einem leuchtenden Leuchtfeuer der Zivilisation, das durch das Leichentuch der ewigen Winterfinsternis brennt. Doch trotz unserer beeindruckendsten Leistung haben wir die Tür zu einer weiteren Expansion und Eroberung geöffnet, die weit über die Vision und Erwartungen unseres Mutterlandes hinausgeht.>  #NT!
 me_soodak_10.a: "A glorious day for all of Soodak!"  #<Ein herrlicher Tag für ganz Soodak!>  #NT!
 me_soodak_10_tooltip: "The mission task '#Y $01_soodak_missions_task_10$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_10$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_11_title: "$01_soodak_missions_task_11$"  #<$01_soodak_missions_task_11$>  #NT!
 me_soodak_11_desc: "Along the shores of #E Lake Peipus#! lies a dense forest with plenty of hardy and disease-resistant wood @wood! to be harvested, perfect for constructing shelters, ships, and even firewood, along with sources of nutritious @vegetables! and leather-bearing game @wild_game! in the nearby vicinity. In claiming these interior lands, we have lessened our need for reliance upon the motherland; in-fact, settlers have begun to arrive from other parts of the colony to take advantage of these lands instead of those from our homeland."  #<Entlang der Ufer des #E Peipussees#! liegt ein dichter Wald mit reichlich winterhartem und krankheitsresistentem Holz @wood! geerntet werden, perfekt für den Bau von Unterkünften, Schiffen und sogar Brennholz, zusammen mit Quellen für nahrhaftes @Gemüse! und ledertragendes Spiel @wild_game! in der näheren Umgebung. Durch die Inanspruchnahme dieser inneren Länder haben wir unser Bedürfnis, uns auf das Mutterland zu verlassen, verringert; Tatsächlich beginnen Siedler aus anderen Teilen der Kolonie anzureisen, um diese Ländereien anstelle der Ländereien unseres Heimatlandes zu nutzen.>  #NT!
 me_soodak_11.a: "Excellent."  #<Exzellent.>  #NT!
 me_soodak_11_tooltip: "The mission task '#Y $01_soodak_missions_task_11$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_11$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_12_title: "$01_soodak_missions_task_12$"  #<$01_soodak_missions_task_12$>  #NT!
 me_soodak_12_desc: ""
 me_soodak_12.a: ""
 me_soodak_12_tooltip: "The mission task '#Y $01_soodak_missions_task_12$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_12$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_13_title: "$01_soodak_missions_task_13$"  #<$01_soodak_missions_task_13$>  #NT!
 me_soodak_13_desc: "Though we have established a presence in #E Ilmandu Inferior#!, it is but a mere toehold over lands which are abundant in key resources, marginally warmer and more hospitable then our capital area, and, most importantly, run parallel to the #E River Vain#!, a major trade artery which penetrates deep into #E Hyperborea#!. By claiming these lands, not only will we be able to exert our influence deeper into the wilderness, but we will be able to monopolize all Baltic-bound trade."  #<Obwohl wir in #E Ilmandu Inferior#!, eine Präsenz aufgebaut haben, handelt es sich hierbei lediglich um einen Stützpunkt über Ländereien, die reich an wichtigen Ressourcen sind, geringfügig wärmer und gastfreundlicher als unser Hauptstadtgebiet und, was am wichtigsten ist, parallel zum #E Fluss Vain#!, verlaufen, einer wichtigen Handelsader, die tief in #E Hyperborea#!. vordringt. Indem wir diese Ländereien beanspruchen, werden nicht nur wir es tun Wir werden in der Lage sein, unseren Einfluss tiefer in die Wildnis auszudehnen, aber wir werden in der Lage sein, den gesamten Handel in Richtung Ostsee zu monopolisieren.>  #NT!
 me_soodak_13.a: "And with more trade comes more investment."  #<Und mit mehr Handel gehen auch mehr Investitionen einher.>  #NT!
 me_soodak_13_tooltip: "The mission task '#Y $01_soodak_missions_task_13$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_13$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_14_title: "$01_soodak_missions_task_14$"  #<$01_soodak_missions_task_14$>  #NT!
 me_soodak_14_desc: "To the remote and vast east lies a river to which locals refer as the #E 'Velho'#!, which they say leads beyond #E Hyperborea#! to the wild lands not yet known to civilization. Though it was costly endeavor, now that we have established outposts in and around the lands surrounding this river, we will be able to establish trade networks with those lost to history, and perhaps set the stage for new expeditions beyond the tree line."  #<Im abgelegenen und weiten Osten liegt ein Fluss, den die Einheimischen als #E „Velho“#!, bezeichnen und der ihrer Meinung nach über #E Hyperborea#! hinaus in die wilden Länder führt, die der Zivilisation noch unbekannt sind. Obwohl es ein kostspieliges Unterfangen war, können wir nun, da wir Außenposten in und um die Gebiete rund um diesen Fluss errichtet haben, Handelsnetzwerke mit denen aufbauen, die der Geschichte verloren gegangen sind, und vielleicht die Voraussetzungen für neue Expeditionen jenseits der Baumgrenze schaffen.>  #NT!
 me_soodak_14.a: "A great investment for Soodak!"  #<Eine tolle Investition für Soodak!>  #NT!
 me_soodak_14_tooltip: "The mission task '#Y $01_soodak_missions_task_14$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_14$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_15_title: "$01_soodak_missions_task_15$"  #<$01_soodak_missions_task_15$>  #NT!
 me_soodak_15_desc: "Though we have long-maintained our faith in our gods, given our hardship and struggles, some are beginning to question their faith in us, and in-particular of the sun-god, whose presence, or lack thereof, has led many to the conclusion he has cursed us. The Fennic tribesmen of this area, having lived here for generations, instead worship the moon goddess, [GetDeityDefinition('omen_kuje').GetName], whose presence, on the contrary, is plainly-visible during the long and deadly winter months, whom they claim shields their people from the greatest evils of the darkest nights; in-fact, her cult has now gained a following among our settlers, believing they too will gain her protection. Though this will spark uproar among our priests, who denounce such converts as misguided fools whose heresy will only further anger the sun-god, by formally embracing [GetDeityDefinition('omen_kuje').GetName] into our pantheon, perhaps we likewise will bask in her blessings."  #<Obwohl wir unseren Glauben an unsere Götter angesichts unserer Schwierigkeiten und Kämpfe lange aufrechterhalten haben, beginnen einige, ihren Glauben an uns in Frage zu stellen, insbesondere an den Sonnengott, dessen Anwesenheit oder Fehlen davon viele zu der Schlussfolgerung geführt hat, dass er uns verflucht hat. Die fennischen Stammesangehörigen dieser Gegend, die seit Generationen hier leben, verehren stattdessen die Mondgöttin [GetDeityDefinition('omen_kuje').GetName], deren Anwesenheit im Gegenteil während der langen und tödlichen Wintermonate deutlich sichtbar ist und von der sie behaupten, dass sie ihr Volk vor den größten Übeln der dunkelsten Nächte schützt; Tatsächlich hat ihr Kult mittlerweile eine Anhängerschaft unter unseren Siedlern gewonnen, die glauben, dass auch sie ihren Schutz erlangen werden. Auch wenn dies bei unseren Priestern Aufruhr auslösen wird, die solche Konvertiten als fehlgeleitete Narren verunglimpfen, deren Häresie den Sonnengott nur noch mehr verärgern wird, indem sie [GetDeityDefinition('omen_kuje').GetName] offiziell in unser Pantheon aufnehmen, werden wir uns vielleicht ebenfalls in ihren Segnungen sonnen.>  #NT!
 me_soodak_15.a: "The sun-god can keep his curses, with [GetDeityDefinition('omen_kuje').GetName] now on our side."  #<Der Sonnengott kann seine Flüche behalten, da [GetDeityDefinition('omen_kuje').GetName] jetzt auf unserer Seite ist.>  #NT!
 me_soodak_15_tooltip: "The mission task '#Y $01_soodak_missions_task_15$#!' has now been #G Completed#!!"  #<Die Missionsaufgabe '#Y $01_soodak_missions_task_15$#!' wurde nun #G abgeschlossen#!!>  #NT!
  
 me_soodak_16_title: "$01_soodak_missions_task_16$"  #<$01_soodak_missions_task_16$>  #NT!
 me_soodak_16_desc: "Though we have long-maintained our faith in our gods, given our hardship and struggles, some are beginning to question their faith in us, and in-particular of the sun-god, whose presence, or lack thereof, has led many to the conclusion he has cursed us. As a result, the heathen cult of [GetDeityDefinition('omen_kuje').GetName] has begun to spread among many of our colonists, disillusioned by destitution and misguided by false promises, whose heresy our priests warn will only further anger the sun-god.\n\nTo ensure our salvation, on the advice of our high priest, we have offered a most-extravigant sacrifice to the sun-god, containing the finest boar meat [ROOT.GetCountry.GetName] has to offer and some rather-expensive mead from #E Germania#!, and have built a great temple in our capital, likewise dedicated to his honor. Hopefully with these generous gestures of piety, we have now begun make peace with our gods, who may be inclined to one-day lift this curse."  #<Obwohl wir unseren Glauben an unsere Götter angesichts unserer Schwierigkeiten und Kämpfe lange aufrechterhalten haben, beginnen einige, ihren Glauben an uns in Frage zu stellen, insbesondere an den Sonnengott, dessen Anwesenheit oder Fehlen davon viele zu der Schlussfolgerung geführt hat, dass er uns verflucht hat. Infolgedessen hat der heidnische Kult von [GetDeityDefinition('omen_kuje').GetName] begonnen, sich unter vielen unserer Kolonisten auszubreiten, desillusioniert von der Armut und fehlgeleitet von falschen Versprechungen, deren Häresie, wie unsere Priester warnen, den Sonnengott nur noch mehr verärgern wird.\n\nUm unsere Erlösung zu gewährleisten, haben wir auf Anraten unseres Hohepriesters dem Sonnengott ein äußerst verschwenderisches Opfer dargebracht, das das feinste Eberfleisch enthielt, das [ROOT.GetCountry.GetName] zu bieten hat etwas ziemlich teuren Met aus #E Germania#!, und haben in unserer Hauptstadt einen großen Tempel gebaut, der ebenfalls ihm zu Ehren gewidmet ist. Hoffentlich haben wir mit diesen großzügigen Gesten der Frömmigkeit nun begonnen, Frieden mit unseren Göttern zu schließen, die möglicherweise geneigt sind, diesen Fluch eines Tages aufzuheben.>  #NT!
 me_soodak_16.a: "We can only pray for forgiveness."  #<Wir können nur um Vergebung beten.>  #NT!
  
 me_soodak_18_title: "$01_soodak_missions_task_18$"  #<$01_soodak_missions_task_18$>  #NT!
 me_soodak_18_desc: "We have appeased the Sun-God for now, yet, our priests inform us to truly rid ourselves of this wretched curse, we must spread genuine zeal and passionate belief among the native inhabitants of these surrounding lands, akin to a forest of ignorance set aflame with the light of knowledge and understanding. Though many may profess loyalty to the gods in one hand, in the other, they still follow the spirits of their ancestors. To prove the worthiness of our gods over those of all others within the hearts and minds of these tribesmen, from now until Ragnarok, there can only be one way; our leadership undertaking the ultimate sacrifice, setting an honorable example for those, both now and in the future, to emulate during times of great crisis.\n\nThe only question, however, is whom to sacrifice; Though [SCOPE.sCharacter('soodak_ruler').GetName] rules over the physical domain and leads our troops onto battle, making [SCOPE.sCharacter('soodak_ruler').GetHerHim] the natural choice, some of our generals and family members suggest [SCOPE.sCharacter('soodak_high_priest').GetName], the high priest, for [SCOPE.sCharacter('soodak_high_priest').GetSheHe] communicates with the divine, and wields significant influence over our spiritual affairs. Whoever does the deed is sure to appease the Sun-God and earn his blessing."  #<Wir haben den Sonnengott vorerst besänftigt, doch unsere Priester sagen uns, dass wir, um uns wirklich von diesem erbärmlichen Fluch zu befreien, echten Eifer und leidenschaftlichen Glauben unter den Ureinwohnern dieser umliegenden Länder verbreiten müssen, ähnlich einem Wald der Unwissenheit, der mit dem Licht des Wissens und des Verständnisses in Brand gesteckt wird. Obwohl viele einerseits ihre Treue zu den Göttern bekennen, folgen sie andererseits dennoch den Geistern ihrer Vorfahren. Um die Würdigkeit unserer Götter gegenüber denen aller anderen in den Herzen und Gedanken dieser Stammesangehörigen zu beweisen, kann es von jetzt an bis Ragnarok nur einen Weg geben; Unsere Führung bringt das höchste Opfer auf sich und gibt ein ehrenvolles Beispiel für diejenigen, denen sie jetzt und in Zukunft in Zeiten großer Krisen nacheifern kann.\n\nDie einzige Frage ist jedoch, wen sie opfern soll; Obwohl [SCOPE.sCharacter('soodak_ruler').GetName] über den physischen Bereich herrscht und unsere Truppen in die Schlacht führt, was [SCOPE.sCharacter('soodak_ruler').GetHerHim] zur natürlichen Wahl macht, schlagen einige unserer Generäle und Familienmitglieder [SCOPE.sCharacter('soodak_high_priest').GetName], den Hohepriester, vor, denn [SCOPE.sCharacter('soodak_high_priest').GetSheHe] kommuniziert mit dem Göttlichen und übt erheblichen Einfluss auf unsere spirituellen Angelegenheiten aus. Wer auch immer die Tat begeht, wird den Sonnengott mit Sicherheit besänftigen und sich seinen Segen verdienen.>  #NT!
 me_soodak_18.a: "I shall die so that we may be saved."  #<Ich werde sterben, damit wir gerettet werden.>  #NT!
 me_soodak_18.b: "The priest said this needs to be done, so it is only fair he does it."  #<Der Priester sagte, dass dies getan werden müsse, daher sei es nur fair, dass er es tue.>  #NT!
 me_soodak_18.c: "Old Man Jenkins can do it!"  #<Der alte Mann Jenkins kann es schaffen!>  #NT!
 me_soodak_18.d: "What if we both did it?"  #<Was wäre, wenn wir es beide tun würden?>  #NT!
  
 me_soodak_19_title: "$01_soodak_missions_task_19$"  #<$01_soodak_missions_task_19$>  #NT!
 me_soodak_19_desc: "Though we may have had differences in the past, our overlord remains our generous protector and sovereign, whose vastly superior strength, both military and economic, is better engaged with as a friend and partner, rather then as a competitor; thus, it is in our natural interests to better-link our economies, and to go about doing so, we have invested into improving our market centers and reducing restrictions on #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! imports, greatly improving our trade-flow. In-fact, dividends are already paying off; word has reached us a consortium of wealthy mainlander merchants and businessmen have invested into our province, providing jobs and work for local Soodakers."  #<Auch wenn wir in der Vergangenheit Differenzen hatten, bleibt unser Oberherr unser großzügiger Beschützer und Souverän, dessen weit überlegene Stärke, sowohl militärisch als auch wirtschaftlich, besser als Freund und Partner denn als Konkurrent eingesetzt werden sollte; Daher liegt es in unserem natürlichen Interesse, unsere Volkswirtschaften besser zu vernetzen, und um dies zu erreichen, haben wir in die Verbesserung unserer Marktzentren und die Reduzierung von Beschränkungen für #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! Importe investiert, wodurch sich unsere Handelsströme erheblich verbessern. Tatsächlich zahlen sich die Dividenden bereits aus; Es hat uns die Nachricht erreicht, dass ein Konsortium wohlhabender Kaufleute und Geschäftsleute vom Festland in unsere Provinz investiert hat, um den örtlichen Soodakern Arbeitsplätze und Arbeit zu bieten.>  #NT!
 me_soodak_19.a: "It is better to hug a bear, then to punch it in the nose."  #<Es ist besser, einen Bären zu umarmen, als ihm auf die Nase zu schlagen.>  #NT!
  
 me_soodak_21_title: "$01_soodak_missions_task_21$"  #<$01_soodak_missions_task_21$>  #NT!
 me_soodak_21_desc: "Though our militia has served us well along the frontier, to have a force truly capable of supporting the motherland during a time of crisis, we need to reform our collection of rag-tag forces into a true standing army; to that end, we have requested some of the finest military advisors from #E [SCOPE.sCountry('soodak_overlord').GetName]#!, and they thought it prudent to send one of their most-experienced and well-connected commanders, [SCOPE.sCharacter('soodak_military_advisor').GetName]. Though he is a stranger to these lands, his leadership and experience has already begun to have an effect on the troops, who now organize into effective legions upon command, and proudly carry the banners of the motherland on their shields."  #<Auch wenn uns unsere Miliz entlang der Grenze gute Dienste geleistet hat, müssen wir, um über eine Truppe zu verfügen, die wirklich in der Lage ist, das Mutterland in Krisenzeiten zu unterstützen, unsere zusammengewürfelte Truppe in eine echte stehende Armee umwandeln; Zu diesem Zweck haben wir einige der besten Militärberater von #E [SCOPE.sCountry('soodak_overlord').GetName]#!, angefordert und sie hielten es für klug, einen ihrer erfahrensten und am besten vernetzten Kommandeure, [SCOPE.sCharacter('soodak_military_advisor').GetName], zu entsenden. Obwohl er in diesen Ländern ein Fremder ist, haben seine Führung und Erfahrung bereits begonnen, Auswirkungen auf die Truppen zu haben, die sich nun auf Befehl zu effektiven Legionen organisieren und stolz die Banner des Mutterlandes auf ihren Schilden tragen.>  #NT!
 me_soodak_21.a: "Under [SCOPE.sCharacter('soodak_military_advisor').GetFirstName]'s watch, we will have a future in the empire."  #<Unter der Aufsicht von [SCOPE.sCharacter('soodak_military_advisor').GetFirstName] werden wir eine Zukunft im Imperium haben.>  #NT!
  
 me_soodak_22_title: "$01_soodak_missions_task_22$"  #<$01_soodak_missions_task_22$>  #NT!
 me_soodak_22_desc: "The amber @amber! mined from [GetProvince('(int32)9371').GetName] is the pride of our administration, its vibrant-orange crystal among the finest from anywhere found in the world, and yet, even with plenty of investment, there still remained plenty more to mine and refine. Now that we have constructed a considerable quantity of foundries to truly specialize our economy around this commodity, speculative businessmen are coming all over from the mainland, seeking a stake in this rapidly-evolving industry, whether that be establishing amber prospecting firms to assess potential new dredging fields, importing mainlander workers in droves to dredge more of this incredibly-valuable substance, or even experimenting with new uses for this substance, such as amber-coated chamber pots, before their rivals can first.\n\nIn-fact, a cyclical cycle has developed, in which amber is tilled from the muddy earth, foundries then refine it into trinkets, and then use their profits fund more dredgers; some worry the market may become over-saturated, but for now, we can embrace the #E 'Amber Boom'#!, as many now call it, and reap the benefits therein."  #<Der Bernstein @amber! Der aus [GetProvince('(int32)9371').GetName] abgebaute Stein ist der Stolz unserer Verwaltung, sein leuchtend orangefarbener Kristall gehört zu den feinsten, die es auf der Welt gibt, und dennoch gab es trotz großer Investitionen noch viel mehr abzubauen und zu veredeln. Jetzt, da wir eine beträchtliche Anzahl von Gießereien aufgebaut haben, um unsere Wirtschaft wirklich auf diesen Rohstoff zu spezialisieren, kommen spekulative Geschäftsleute vom Festland herüber, die sich an dieser sich schnell entwickelnden Industrie beteiligen wollen, sei es durch die Gründung von Bernsteinsuchfirmen, um potenzielle neue Baggerfelder zu bewerten, durch den Import von Arbeitskräften vom Festland in Scharen, um mehr von dieser unglaublich wertvollen Substanz auszubaggern, oder durch das Experimentieren mit neuen Verwendungsmöglichkeiten für diese Substanz, wie zum Beispiel mit Bernstein überzogene Nachttöpfe, bevor ihre Konkurrenten es können Zuerst.\n\nTatsächlich hat sich ein zyklischer Zyklus entwickelt, in dem Bernstein aus der schlammigen Erde gepflückt wird, Gießereien ihn dann zu Schmuckstücken veredeln und ihre Gewinne dann zur Finanzierung weiterer Bagger verwenden; Einige befürchten, dass der Markt übersättigt sein könnte, aber vorerst können wir uns auf den #E „Amber Boom“#!,, wie viele ihn jetzt nennen, einlassen und von den daraus resultierenden Vorteilen profitieren.>  #NT!
 me_soodak_22.a: "Amber is our past, present, and future!"  #<Bernstein ist unsere Vergangenheit, Gegenwart und Zukunft!>  #NT!
  
 me_soodak_23_title: "$01_soodak_missions_task_23$"  #<$01_soodak_missions_task_23$>  #NT!
 me_soodak_23_desc: "Generations ago, we began as a wayward colony, a backwater whose only purpose was to mine and harvest amber @amber! for our overlords, in terrain too treacherous to do themselves. Through our successes, we came to dominate the market, and drawing an influx of settlers, grew in mirror of our homeland, with the government being organized according to a civilized fashion, cities erect in the wilderness, and the vicious barbarians pacified; a glassy reflection, tinted a precious orange.\n\nAs we have continued to intertwine our economy, diplomacy, and lives with that of our overlords, we have gained a deserved reputation for trustworthiness and loyalty, an extension of #E Germania#! itself, and through our wealth, a title by which we have been affectionately awarded: the crown jewel of the empire."  #<Vor Generationen begannen wir als eigensinnige Kolonie, ein Rückstau, dessen einziger Zweck darin bestand, Bernstein abzubauen und zu ernten @amber! für unsere Oberherren, in einem Gelände, das zu tückisch ist, um es selbst zu tun. Durch unsere Erfolge dominierten wir den Markt und zogen einen Zustrom von Siedlern an. Wir wuchsen im Spiegel unseres Heimatlandes, wobei die Regierung nach einer zivilisierten Art und Weise organisiert wurde, Städte in der Wildnis errichtet wurden und die bösartigen Barbaren besänftigt wurden. ein glasiges Spiegelbild, gefärbt in einem kostbaren Orange.\n\nWährend wir unsere Wirtschaft, Diplomatie und unser Leben weiterhin mit dem unserer Oberherren verknüpfen, haben wir uns einen verdienten Ruf für Vertrauenswürdigkeit und Loyalität erworben, eine Erweiterung von #E Germania#! selbst, und durch unseren Reichtum einen Titel, der uns liebevoll verliehen wurde: das Kronjuwel des Imperiums.>  #NT!
 me_soodak_23.a: "For the [SCOPE.sCountry('soodak_overlord').GetAdjective] Empire!"  #<Für das [SCOPE.sCountry('soodak_overlord').GetAdjective]-Imperium!>  #NT!
  
 me_soodak_24_title: "$01_soodak_missions_task_24$"  #<$01_soodak_missions_task_24$>  #NT!
 me_soodak_24_desc: "Though few are willing to discuss the topic in public, our current arrangement with the motherland is increasingly untenable, who does right by us on occasion, but increasingly imposes harsher taxes upon our people, while conversely further-neglecting our needs. Independency, as some have argued, is still a step too far, yet, now that we have begun the process of decoupling ourselves from the mainland by reducing our trade with them and encouraging domestic, Soodaker-made goods, should the worst come to pass, we will be prepared."  #<Auch wenn nur wenige bereit sind, das Thema öffentlich zu diskutieren, wird unser derzeitiges Abkommen mit dem Mutterland immer unhaltbarer, das zwar gelegentlich das Richtige tut, unserem Volk aber immer höhere Steuern auferlegt, während es umgekehrt unsere Bedürfnisse noch weiter vernachlässigt. Wie einige argumentiert haben, ist die Unabhängigkeit immer noch ein Schritt zu weit, doch nachdem wir nun damit begonnen haben, uns vom Festland abzukoppeln, indem wir unseren Handel mit ihnen reduzieren und inländische, von Soodaker hergestellte Waren fördern, werden wir für den Fall, dass das Schlimmste eintritt, vorbereitet sein.>  #NT!
 me_soodak_24.a: "It is better to be safe then to be sorry."  #<Es ist besser, auf Nummer sicher zu gehen, als sich zu entschuldigen.>  #NT!
  
 me_soodak_25_title: "$01_soodak_missions_task_25$"  #<$01_soodak_missions_task_25$>  #NT!
 me_soodak_25_desc: "Our militia has served us well along the frontier, yet, our collection of rag-tag forces is hardly in-shape to contend with the might of the #E Germanic Empire#!, whose home-made shields and old, rusty swords would get smashed to pieces by the disciplined legions of the latter. We need a man with a plan, and fortunately for us, our contacts tell us of a capable general from [GetProvince('(int32)3967').GetName], who, after being pushed out of the Germanic military by an influential rival, is willing and able to serve our cause.\n\nArriving just recently and only able to speak a few 'colorful' words in our dialect, [SCOPE.sCharacter('soodak_military_advisor').GetName] has already begun implementing major reforms, where the men drill and march upon command, correctly maintain their expensive equipment, and stay in rank despite their natural inclination to flee."  #<Unsere Miliz hat uns entlang der Grenze gute Dienste geleistet, doch unsere zusammengewürfelte Truppe ist kaum in der Lage, mit der Macht des #E Germanischen Reiches#!, zu konkurrieren, dessen selbstgemachte Schilde und alte, rostige Schwerter von den disziplinierten Legionen des letzteren in Stücke gerissen würden. Wir brauchen einen Mann mit einem Plan, und zum Glück erzählen uns unsere Kontakte von einem fähigen General aus [GetProvince('(int32)3967').GetName], der, nachdem er von einem einflussreichen Rivalen aus dem germanischen Militär verdrängt wurde, willens und in der Lage ist, unserer Sache zu dienen.\n\nDa er erst vor Kurzem angekommen ist und nur ein paar „bunte“ Worte in unserem Dialekt sprechen kann, hat [SCOPE.sCharacter('soodak_military_advisor').GetName] bereits mit der Umsetzung wichtiger Reformen begonnen, bei denen die Männer auf Befehl exerzieren und marschieren, ihre teure Ausrüstung korrekt warten und drinnen bleiben Rang trotz ihrer natürlichen Neigung zur Flucht.>  #NT!
 me_soodak_25.a: "Perhaps we will stand a chance, afterall."  #<Vielleicht haben wir doch eine Chance.>  #NT!
  
 me_soodak_26_title: "$01_soodak_missions_task_26$"  #<$01_soodak_missions_task_26$>  #NT!
 me_soodak_26_desc: "With the Moon Goddess' blessings, despite the priests' misgivings, our people have prospered beyond what many would have deemed possible years prior, with fertile rains during summertime blessing our harvests, and the howling winter storms causing less damage. The old order maintains that these are merely coincidences, but the people have long-lost confidence in them and the gods they claim to represent; now that we have swept away the archaic and corrupted priesthood with men who have a genuine connection with the true gods, we will ensure prosperity for our people, and crush this curse."  #<Mit dem Segen der Mondgöttin ist unser Volk trotz der Bedenken der Priester über das hinaus gediehen, was viele Jahre zuvor für möglich gehalten hätten, mit fruchtbaren Regenfällen im Sommer, die unsere Ernten beglückten, und den heulenden Winterstürmen, die weniger Schaden anrichteten. Die alte Ordnung behauptet, dies seien bloße Zufälle, aber die Menschen haben schon lange das Vertrauen in sie und die Götter verloren, die sie angeblich repräsentieren; Jetzt, da wir das archaische und korrupte Priestertum mit Männern, die eine echte Verbindung zu den wahren Göttern haben, hinweggefegt haben, werden wir unserem Volk Wohlstand sichern und diesen Fluch zerschlagen.>  #NT!
 me_soodak_26.a: "We will find salvation."  #<Wir werden Erlösung finden.>  #NT!
  
 me_soodak_27_title: "$01_soodak_missions_task_27$"  #<$01_soodak_missions_task_27$>  #NT!
 me_soodak_27_desc: "Our militia has served us well along the frontier, and though it is inferior in quality to many of the great armies around the world, realistically, that is a perfection we will never be able to match. Therefore, it is logical to invest into quantity, and by allowing citizens of all ages and fitness to answer the call to war, we will be able to eek the most from our countryside, and without a standing army, we shall ease concerns of an independent government abusing its power."  #<Unsere Miliz hat uns entlang der Grenze gute Dienste geleistet, und obwohl sie in ihrer Qualität vielen der großen Armeen auf der ganzen Welt unterlegen ist, ist das realistisch gesehen eine Perfektion, die wir niemals erreichen können. Daher ist es logisch, in Quantität zu investieren, und indem wir es Bürgern jeden Alters und jeder Fitness ermöglichen, dem Ruf zum Krieg zu folgen, können wir das Beste aus unserem Land herausholen, und ohne ein stehendes Heer werden wir die Bedenken zerstreuen, dass eine unabhängige Regierung ihre Macht missbraucht.>  #NT!
 me_soodak_27.a: "With numbers, we stand a chance."  #<Mit Zahlen haben wir eine Chance.>  #NT!
  
 me_soodak_28_title: "$01_soodak_missions_task_28$"  #<$01_soodak_missions_task_28$>  #NT!
 me_soodak_28_desc: "The #E Fennic#! peoples have lived in this land for generations, and therefore are quite knowledgeble about this terrain, with information of where wild berries grow during times of scarcity, where wild animals reside, and the best spots in which to set traps for world-be conquerors. By incorporating and learning from the strategies of our allies, we will make the enemy fight for every inch of snow."  #<Die #E Fennic#!-Völker leben seit Generationen in diesem Land und kennen sich daher gut mit diesem Gelände aus. Sie wissen, wo in Zeiten der Knappheit wilde Beeren wachsen, wo sich wilde Tiere aufhalten und an welchen Orten sich am besten Fallen für zukünftige Welteroberer aufstellen lassen. Indem wir die Strategien unserer Verbündeten übernehmen und daraus lernen, werden wir den Feind dazu bringen, um jeden Zentimeter Schnee zu kämpfen.>  #NT!
 me_soodak_28.a: "And fight they shall."  #<Und kämpfen werden sie.>  #NT!
  
 me_soodak_29_title: "$01_soodak_missions_task_29$"  #<$01_soodak_missions_task_29$>  #NT!
 me_soodak_29_desc: "Our relationship with the #E Fennic#! people has not always been an easy one, however, now that we worship the same gods and follow the same spirits, many across both sides of the isle starting to see that we share more similarities then differences, especially in regards to our mutual grievences against the overlord. With no clear-cut divisors after generations of intermixing, it is becoming harder to differentiate between #E Germanic#! and Fennic, particularly under the faint rays of [GetDeityDefinition('omen_kuje').GetName] blessed moonlight. Therefore, for the future perserverence of our colony, it is only fitting we recognize the situation on the ground, and formally abolish the remaining legal distinctions between our two peoples, creating a more-perfect union."  #<Unsere Beziehung zum Volk der #E Fennic#! war nicht immer einfach, doch jetzt, da wir dieselben Götter verehren und denselben Geistern folgen, beginnen viele auf beiden Seiten der Insel zu erkennen, dass wir mehr Gemeinsamkeiten als Unterschiede haben, insbesondere im Hinblick auf unsere gegenseitigen Beschwerden gegen den Oberherrn. Da nach Generationen der Vermischung keine eindeutigen Teiler mehr vorhanden sind, wird es immer schwieriger, zwischen #E Germanisch#! und Fennisch zu unterscheiden, insbesondere unter den schwachen Strahlen des [GetDeityDefinition('omen_kuje').GetName] gesegneten Mondlichts. Für den künftigen Fortbestand unserer Kolonie ist es daher nur angemessen, dass wir die Situation vor Ort anerkennen und die verbleibenden rechtlichen Unterschiede zwischen unseren beiden Völkern offiziell abschaffen und so eine vollkommenere Union schaffen.>  #NT!
 me_soodak_29.a: "A new dawn rises over Soodak."  #<Über Soodak bricht eine neue Morgendämmerung an.>  #NT!
  
 me_soodak_30_title: "$01_soodak_missions_task_30$"  #<$01_soodak_missions_task_30$>  #NT!
 me_soodak_30_desc: "At first glance, there is not much to say about the lands of #E $joki_area$#!, with its thick forests and dense swamps making habitation less-then ideal. However, our scouts report it sits at a critical juncture between the rivers #E Velho#! and #E Vain#!, an area of vital strategic importance, given our holdings in both of those provinces; in colonizing this wild land, we will not only guarantee strategic autonomy for our eastern territories, but also facilitate our administration therein."  #<Auf den ersten Blick gibt es nicht viel zu sagen über das Land von #E $joki_area$#!, mit seinen dichten Wäldern und dichten Sümpfen, was die Besiedlung alles andere als ideal macht. Unsere Späher berichten jedoch, dass es sich an einem kritischen Knotenpunkt zwischen den Flüssen #E Velho#! und #E Vain#!, befindet, einem Gebiet von entscheidender strategischer Bedeutung, wenn man bedenkt, dass wir in beiden Provinzen Besitzungen haben; Durch die Kolonisierung dieses wilden Landes werden wir nicht nur die strategische Autonomie unserer Ostgebiete garantieren, sondern auch unsere Verwaltung dort erleichtern.>  #NT!
 me_soodak_30.a: "With the east secured, we can look towards the future."  #<Wenn der Osten gesichert ist, können wir in die Zukunft blicken.>  #NT!
  
 me_soodak_31_title: "$01_soodak_missions_task_31$"  #<$01_soodak_missions_task_31$>  #NT!
 me_soodak_31_desc: "With rising tensions, there are concerns it will boil over sooner rather then later. Therefore, would be wise to save money and make contacts with potential swords for hire now, rather then scrambling at the last minute and having to pay more with less gold available."  #<Angesichts der zunehmenden Spannungen besteht die Sorge, dass es eher früher als später zu einem Überkochen kommen wird. Daher wäre es ratsam, jetzt Geld zu sparen und Kontakte zu potenziellen Schwertern zum Mieten zu knüpfen, anstatt sich in letzter Minute auf die Suche zu machen und mit weniger verfügbarem Gold mehr bezahlen zu müssen.>  #NT!
 me_soodak_31.a: "It is better to be safe then conquered."  #<Es ist besser, in Sicherheit zu sein, als besiegt zu werden.>  #NT!
  
 me_soodak_32_title: "$01_soodak_missions_task_32$"  #<$01_soodak_missions_task_32$>  #NT!
 me_soodak_32_desc: "We were founded as an amber-mining @amber! colony on the edge of the world, far-removed from civilization. We thrived where it was thought impossible, established new settlements in the ice-forests, and achieved self-sufficiency in the snow. However, jealous of our successes, our motherland grew increasingly ambivalent towards its child, repeatedly interfering within our domestic affairs unrequested, raising taxes to unreasonable levels without our consent, and repeatedly neglecting our needs during times of hardship.\n\nWe as much as anybody would be happy and proud participants of our #E Germanic Empire#!, our bonds of kinship standing strong across the sea as we would seek to grow together in a mutual fashion, yet, it is our tyrannical masters who have chosen this reckless path, casting us as backwaters and outcasts, unworthy of the same rights and privileges they themselves hold dear; thus, as free and equal men, we are forced to take upon ourselves the mantle of statehood to protect and guarantee our inherent rights to liberty, to freedom, and the pursuit of happiness. On this day, we officially declare ourselves to be the sovereign and independent state of [ROOT.GetCountry.GetName]."  #<Wir wurden als Bernsteinabbauunternehmen @amber gegründet! Kolonie am Rande der Welt, weit entfernt von der Zivilisation. Wir blühten dort auf, wo man es für unmöglich hielt, gründeten neue Siedlungen in den Eiswäldern und erreichten Selbstversorgung im Schnee. Aus Neid auf unsere Erfolge wurde unser Mutterland jedoch immer ambivalenter gegenüber seinem Kind, mischte sich wiederholt unaufgefordert in unsere inneren Angelegenheiten ein, erhöhte die Steuern ohne unsere Zustimmung auf unangemessene Niveaus und vernachlässigte wiederholt unsere Bedürfnisse in schwierigen Zeiten.\n\nWir wie alle anderen wären glückliche und stolze Teilnehmer unseres #E Germanischen Reiches#!,, unserer Verwandtschaftsbande, die über das Meer hinaus stark sind, da wir versuchen würden, auf gemeinsame Weise zusammenzuwachsen, doch Es sind unsere tyrannischen Herren, die diesen rücksichtslosen Weg gewählt haben und uns als Hinterwäldler und Ausgestoßene darstellen, die der gleichen Rechte und Privilegien, die ihnen selbst am Herzen liegen, unwürdig sind. Daher sind wir als freie und gleichberechtigte Menschen gezwungen, den Mantel der Staatlichkeit auf uns zu nehmen, um unsere inhärenten Rechte auf Freiheit, Freiheit und das Streben nach Glück zu schützen und zu garantieren. An diesem Tag erklären wir uns offiziell zum souveränen und unabhängigen Staat von [ROOT.GetCountry.GetName].>  #NT!
 me_soodak_32.a: "Give me liberty, or give me death!"  #<Gib mir Freiheit, oder gib mir den Tod!>  #NT!
  
 me_soodak_33_title: "$01_soodak_missions_task_33$"  #<None>  #NT!
 me_soodak_33_desc: "Somehow, against all odds, we have succeeded where all others would have failed; a tiny colony on the edge of civilization, holding its own and defeating one of the largest empires in the world. With our country secured as an independent state, we are free to pursue our destiny however we choose, neither as Germanics, nor Fennics, but as proud, liberated Soodakers."  #<Irgendwie haben wir trotz aller Widrigkeiten Erfolg gehabt, wo alle anderen gescheitert wären; Eine winzige Kolonie am Rande der Zivilisation, die sich behauptet und eines der größten Imperien der Welt besiegt. Da unser Land als unabhängiger Staat gesichert ist, können wir unser Schicksal nach Belieben verfolgen, weder als Germanen noch als Fenniks, sondern als stolze, befreite Soodaker.>  #NT!
 me_soodak_33.a: "A glorious day for all of Soodak!"  #<Ein herrlicher Tag für ganz Soodak!>  #NT!
  
 me_soodak_34_title: "$01_soodak_missions_task_34$"  #<$01_soodak_missions_task_34$>  #NT!
 me_soodak_34_desc: "Somehow, against all odds, we have succeeded where all others would have failed; a tiny colony on the edge of civilization, holding its own and defeating one of the largest empires in the world. With our country secured as an independent state, and now having severed all ties with our colonial past through embracing our ancient #E Fennic#! heritage, the question is which direction should the reborn #E Duna#! take?\n\nMany say we should continue on the path of civilization, advancing our technology to the point of eventually surpassing our oppressors, while a small minority argues that it was tradition which won our war of independence, and thus we should fully embrace it by returning to our long-lost tribal ways. Both arguments are compelling, but as our first leader, it is up to you to decide our future."  #<Irgendwie haben wir trotz aller Widrigkeiten Erfolg gehabt, wo alle anderen gescheitert wären; Eine winzige Kolonie am Rande der Zivilisation, die sich behauptet und eines der größten Imperien der Welt besiegt. Da unser Land als unabhängiger Staat gesichert ist und wir nun alle Verbindungen zu unserer kolonialen Vergangenheit durch die Übernahme unseres alten #E Fennic#!-Erbes abgebrochen haben, stellt sich die Frage, welche Richtung die wiedergeborene #E Duna#! einschlagen soll?\n\nViele sagen, wir sollten den Weg der Zivilisation fortsetzen und unsere Technologie so weit vorantreiben, dass wir schließlich unsere Unterdrücker übertreffen, während eine kleine Minderheit argumentiert, dass es die Tradition war, die unseren Krieg gewonnen hat Unabhängigkeit, und daher sollten wir sie voll und ganz annehmen, indem wir zu unseren längst verlorenen Stammesgewohnheiten zurückkehren. Beide Argumente sind überzeugend, aber als unser erster Anführer liegt es an Ihnen, über unsere Zukunft zu entscheiden.>  #NT!
 me_soodak_34.a: "Civilization is the best path forward."  #<Die Zivilisation ist der beste Weg vorwärts.>  #NT!
 me_soodak_34.b: "We will return to tradition!"  #<Wir kehren zur Tradition zurück!>  #NT!
  
  #Soodak Rebels 
 me_soodak_3200_title: "Soodak Rebels!"  #<Soodak-Rebellen!>  #NT!
 me_soodak_3200_desc: "Our treacherous and wayward colony of [GetProvince('(int32)9371').GetName] has always been challenging to control, owing to their distance and supurb stubborness, but today they have crossed the line; a preposterous, poorly-written publication has been fabricated, citing arbitrary grievances, minor quibbles, and salacious fictions as 'justification' for the 'complete and irrevocable separation' of their colony. In the end, their claims are nothing but a slanderous and disgraceful collection of lies not worth sullying the halls of our esteemed court.\n\nAs the colonial government is now controlled by renegades and criminals bent upon depriving their people from the generous and loving protection of #E [ROOT.GetCountry.GetName]#!, we have no choice but to formally disband the colony, and send troops to crush this band of rabble."  #<Unsere heimtückische und eigensinnige Kolonie [GetProvince('(int32)9371').GetName] war aufgrund ihrer Distanz und übertriebenen Sturheit schon immer schwer zu kontrollieren, aber heute haben sie die Grenze überschritten; Es wurde eine absurde, schlecht geschriebene Veröffentlichung erstellt, in der willkürliche Beschwerden, kleinere Spitzfindigkeiten und anzügliche Fiktionen als „Rechtfertigung“ für die „vollständige und unwiderrufliche Trennung“ ihrer Kolonie angeführt werden. Am Ende sind ihre Behauptungen nichts anderes als eine verleumderische und schändliche Ansammlung von Lügen, die es nicht wert sind, die Hallen unseres geschätzten Gerichts zu beschmutzen.\n\nDa die Kolonialregierung jetzt von Abtrünnigen und Kriminellen kontrolliert wird, die darauf aus sind, ihr Volk dem großzügigen und liebevollen Schutz von #E [ROOT.GetCountry.GetName]#!, zu entziehen, haben wir keine andere Wahl, als die Kolonie offiziell aufzulösen und Truppen zu schicken, um diese Pöbelbande zu vernichten.>  #NT!
 me_soodak_3200.a: "We will give them death, as is the fate of all traitors."  #<Wir werden ihnen den Tod geben, wie es das Schicksal aller Verräter ist.>  #NT!
  
  #Request Aid Event Chain 
 me_soodak_17_title: "$01_soodak_missions_task_17$"  #<$01_soodak_missions_task_17$>  #NT!
 me_soodak_17_desc: "We are a proud colony which has managed to achieve stability, both political and financial, as well as secure borders. It is only-fitting that we request financial aid from our generous motherland, as a reward for our efforts and such that we may endeavor to grow further. The question now, is how much do we request; lower amounts will be more-likely accepted, but higher amounts would be more useful."  #<Wir sind eine stolze Kolonie, die es geschafft hat, sowohl politische als auch finanzielle Stabilität sowie sichere Grenzen zu erreichen. Es ist nur angemessen, dass wir unser großzügiges Mutterland um finanzielle Unterstützung bitten, als Belohnung für unsere Bemühungen und damit wir uns um weiteres Wachstum bemühen können. Die Frage ist nun, wie viel verlangen wir; Geringere Beträge werden eher akzeptiert, höhere Beträge wären jedoch sinnvoller.>  #NT!
 me_soodak_17.a: "A meager 50 gold pieces."  #<Magere 50 Goldstücke.>  #NT!
 me_soodak_17.b: "A modest 250 gold pieces."  #<Bescheidene 250 Goldstücke.>  #NT!
 me_soodak_17.c: "A generous sum of 500 gold!"  #<Eine großzügige Summe von 500 Gold!>  #NT!
  
 me_soodak_1701_title: "Soodak Requests Aid"  #<Soodak bittet um Hilfe>  #NT!
 me_soodak_1701_desc: "Our colony of [GetProvince('(int32)9371').GetName] has reached a measure of prosperity recently, achieving a stable government, expanding their borders, and increasing their amber @amber! output. However, in recognition of these achievements, they now request from us a small donation, as a measure of good-faith on our part. Yet, there are some concerns that they are growing too quickly, and with additional assistance, they will almost-certainly certainly expand well-beyond their initial charter."  #<Unsere Kolonie [GetProvince('(int32)9371').GetName] hat in letzter Zeit ein gewisses Maß an Wohlstand erreicht, eine stabile Regierung erreicht, ihre Grenzen erweitert und ihren Bernstein @amber erhöht! Ausgabe. Als Anerkennung für diese Leistungen bitten sie uns jedoch nun um eine kleine Spende, als Zeichen unserer Treue. Dennoch gibt es einige Bedenken, dass sie zu schnell wachsen, und mit zusätzlicher Unterstützung werden sie mit ziemlicher Sicherheit weit über ihre ursprüngliche Charta hinaus expandieren.>  #NT!
 me_soodak_1701.a: "A stronger colony will bring greater benefits."  #<Eine stärkere Kolonie bringt größere Vorteile.>  #NT!
 me_soodak_1701.b: "A stronger colony will be more rebellious."  #<Eine stärkere Kolonie wird rebellischer sein.>  #NT!
 me_soodak_1701.c: "A sanctioned subject will receive exactly nothing."  #<Ein sanktioniertes Subjekt erhält genau nichts.>  #NT!
  
 me_soodak_1702_title: "$me_soodak_1701_title$"  #<$me_soodak_1701_title$>  #NT!
 me_soodak_1702_desc: "Our colony of [GetProvince('(int32)9371').GetName] has reached a measure of prosperity recently, achieving a stable government, expanding their borders, and increasing their amber @amber! output. However, in recognition of these achievements, they now request from us a modest gift, as a measure of good-faith on our part and to build support for their economy. Yet, there are some concerns that they are growing too quickly, and with additional assistance, they will almost-certainly certainly expand well-beyond their initial charter."  #<Unsere Kolonie [GetProvince('(int32)9371').GetName] hat in letzter Zeit ein gewisses Maß an Wohlstand erreicht, eine stabile Regierung erreicht, ihre Grenzen erweitert und ihren Bernstein @amber erhöht! Ausgabe. Als Anerkennung für diese Leistungen bitten sie uns nun jedoch um ein bescheidenes Geschenk, als Zeichen unseres guten Willens und um Unterstützung für ihre Wirtschaft aufzubauen. Dennoch gibt es einige Bedenken, dass sie zu schnell wachsen, und mit zusätzlicher Unterstützung werden sie mit ziemlicher Sicherheit weit über ihre ursprüngliche Charta hinaus expandieren.>  #NT!
 me_soodak_1702.a: "$me_soodak_1701.a$"  #<$me_soodak_1701.a$>  #NT!
 me_soodak_1702.b: "$me_soodak_1701.b$"  #<$me_soodak_1701.b$>  #NT!
 me_soodak_1702.c: "$me_soodak_1701.c$"  #<$me_soodak_1701.c$>  #NT!
  
 me_soodak_1703_title: "$me_soodak_1701_title$"  #<$me_soodak_1701_title$>  #NT!
 me_soodak_1703_desc: "Our colony of [GetProvince('(int32)9371').GetName] has reached a measure of prosperity recently, achieving a stable government, expanding their borders, and increasing their amber @amber! output. However, in recognition of these achievements, they now outrageously request from us an excessive sum from us, as what they claim to be 'a measure of good-faith on our part', yet, what is clearly greed upon their behalf, not to mention existing concerns that they are growing too quickly and aggressively."  #<Unsere Kolonie [GetProvince('(int32)9371').GetName] hat in letzter Zeit ein gewisses Maß an Wohlstand erreicht, eine stabile Regierung erreicht, ihre Grenzen erweitert und ihren Bernstein @amber erhöht! Ausgabe. In Anerkennung dieser Erfolge fordern sie nun jedoch unverschämterweise eine überhöhte Summe von uns, was sie als „ein Maß an Treu und Glauben unsererseits“ bezeichnen, obwohl es sich bei ihnen eindeutig um Gier handelt, ganz zu schweigen von den bestehenden Bedenken, dass sie zu schnell und aggressiv wachsen.>  #NT!
 me_soodak_1703.a: "$me_soodak_1701.a$"  #<$me_soodak_1701.a$>  #NT!
 me_soodak_1703.b: "$me_soodak_1701.b$"  #<$me_soodak_1701.b$>  #NT!
 me_soodak_1703.c: "$me_soodak_1701.c$"  #<$me_soodak_1701.c$>  #NT!
  
 me_soodak_1704_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Agrees!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Stimmt zu!>  #NT!
 me_soodak_1704_desc: "Our generous motherland has agreed to our request for aid! Though it is a meager sum, by sending any amount of money to our administration, it is symbolic of #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s support for our colony, and of our objectives going forward."  #<Unser großzügiges Mutterland hat unserer Bitte um Hilfe zugestimmt! Obwohl es sich um eine magere Summe handelt, ist die Überweisung eines beliebigen Geldbetrags an unsere Verwaltung ein Symbol für #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s Unterstützung für unsere Kolonie und für unsere künftigen Ziele.>  #NT!
 me_soodak_1704.a: "Long live #E [SCOPE.sCountry('soodak_overlord').GetName]#!!"  #<Es lebe #E [SCOPE.sCountry('soodak_overlord').GetName]#!!>  #NT!
  
 me_soodak_1705_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Agrees!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Stimmt zu!>  #NT!
 me_soodak_1705_desc: "Our generous motherland has agreed to our request for aid! Though it is a modest sum, it is not an insignificant amount either, and by sending any amount of money to our administration, #E [SCOPE.sCountry('soodak_overlord').GetName]#! has shown genuine support for our colony and our objectives going forward."  #<Unser großzügiges Mutterland hat unserer Bitte um Hilfe zugestimmt! Obwohl es sich um eine bescheidene Summe handelt, handelt es sich auch nicht um einen unbedeutenden Betrag, und indem #E [SCOPE.sCountry('soodak_overlord').GetName]#! einen beliebigen Geldbetrag an unsere Verwaltung geschickt hat, hat er echte Unterstützung für unsere Kolonie und unsere künftigen Ziele gezeigt.>  #NT!
 me_soodak_1705.a: "Long live #E [SCOPE.sCountry('soodak_overlord').GetName]#!!"  #<Es lebe #E [SCOPE.sCountry('soodak_overlord').GetName]#!!>  #NT!
  
 me_soodak_1706_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Agrees!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Stimmt zu!>  #NT!
 me_soodak_1706_desc: "Our generous motherland has agreed to our request for aid! Many had anticipated our request would be outright rejected, owing to the audacious sum of gold requested, but by sending it in-full to our administration, it is symbolic of #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s fully-fledged, unwavering support for our colony and our objectives going forward."  #<Unser großzügiges Mutterland hat unserer Bitte um Hilfe zugestimmt! Viele hatten damit gerechnet, dass unser Antrag aufgrund der gewagten Summe an Gold, die beantragt wurde, komplett abgelehnt werden würde, aber indem wir ihn vollständig an unsere Verwaltung senden, ist dies ein Symbol für #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s vollwertige, unerschütterliche Unterstützung für unsere Kolonie und unsere Ziele für die Zukunft.>  #NT!
 me_soodak_1706.a: "Long live #E [SCOPE.sCountry('soodak_overlord').GetName]#!!"  #<Es lebe #E [SCOPE.sCountry('soodak_overlord').GetName]#!!>  #NT!
  
 me_soodak_1707_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Rejects!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Ablehnungen!>  #NT!
 me_soodak_1707_desc: "Our selfish motherland has rejected to our most-meager request for aid! Though we did not particularly need the money, the fact our overlord did not bother with sending even a token sum has many Soodakers concerned that those in #E [SCOPE.sCountry('soodak_overlord').GetName]#! have either grown apathetic towards their most-loyal colony, or worse, they actively oppose our continued growth."  #<Unser selbstsüchtiges Mutterland hat unsere dürftigste Bitte um Hilfe abgelehnt! Obwohl wir das Geld nicht besonders brauchten, beunruhigt die Tatsache, dass sich unser Oberherr sich nicht die Mühe gemacht hat, auch nur einen symbolischen Betrag zu senden, viele Soodaker, dass die Bewohner von #E [SCOPE.sCountry('soodak_overlord').GetName]#! entweder ihrer loyalsten Kolonie gegenüber apathisch geworden sind oder, schlimmer noch, sich unserem weiteren Wachstum aktiv widersetzen.>  #NT!
 me_soodak_1707.a: "We may need to start looking to ourselves for protection..."  #<Möglicherweise müssen wir anfangen, bei uns selbst nach Schutz zu suchen ...>  #NT!
  
 me_soodak_1708_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Rejects!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Ablehnungen!>  #NT!
 me_soodak_1708_desc: "Our motherland has rejected to our most-reasonable and modest request for aid! Though we did not particularly need the money, the fact our overlord did not bother with sending even a token sum has many Soodakers concerned that those in #E [SCOPE.sCountry('soodak_overlord').GetName]#! have either grown apathetic towards their most-loyal colony, or worse, they actively oppose our continued growth."  #<Unser Vaterland hat unsere vernünftigste und bescheidenste Bitte um Hilfe abgelehnt! Obwohl wir das Geld nicht besonders brauchten, beunruhigt die Tatsache, dass sich unser Oberherr sich nicht die Mühe gemacht hat, auch nur einen symbolischen Betrag zu senden, viele Soodaker, dass die Bewohner von #E [SCOPE.sCountry('soodak_overlord').GetName]#! entweder ihrer loyalsten Kolonie gegenüber apathisch geworden sind oder, schlimmer noch, sich unserem weiteren Wachstum aktiv widersetzen.>  #NT!
 me_soodak_1708.a: "We may need to start looking to ourselves for protection..."  #<Möglicherweise müssen wir anfangen, bei uns selbst nach Schutz zu suchen ...>  #NT!
  
 me_soodak_1709_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Rejects!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Ablehnungen!>  #NT!
 me_soodak_1709_desc: "Our motherland has rejected to our request for aid, citing the outlandish sum as being unreasonable. Though we expected a rejection of the amount requested, the fact our overlord did not bother with sending even a token sum has many Soodakers concerned that those in #E [SCOPE.sCountry('soodak_overlord').GetName]#! have either grown apathetic towards their most-loyal colony, or worse, they actively oppose our continued growth."  #<Unser Mutterland lehnte unsere Bitte um Hilfe mit der Begründung ab, die außergewöhnliche Summe sei unangemessen. Obwohl wir mit einer Ablehnung des beantragten Betrags gerechnet hatten, beunruhigt die Tatsache, dass unser Oberherr sich nicht einmal die Mühe gemacht hat, auch nur einen symbolischen Betrag zu senden, viele Soodaker, dass diejenigen in #E [SCOPE.sCountry('soodak_overlord').GetName]#! entweder gegenüber ihrer loyalsten Kolonie apathisch geworden sind oder, schlimmer noch, sich unserem weiteren Wachstum aktiv widersetzen.>  #NT!
 me_soodak_1709.a: "We may need to start looking to ourselves for protection..."  #<Möglicherweise müssen wir anfangen, bei uns selbst nach Schutz zu suchen ...>  #NT!
  
  #Purchase Gotland Event Chain 
  
 me_soodak_20_title: "$01_soodak_missions_task_20$"  #<$01_soodak_missions_task_20$>  #NT!
 me_soodak_20_desc: "As our colony becomes more intertwined with the mainland, the line between [GetProvince('(int32)9371').GetName] and #E Germania#! becomes blurred, akin to a heavy morning fog hanging above the water and beneath the sky. In this regard, we are less a vassal then autonomous province, existing to aid our overlord in administering these far-flung lands.\n\nThough outside our designated region, the island of [GetProvince('(int32)6010').GetName] lies closer to our capital then to our motherland's, which would allow us to exert more control over it, and thus, reap more taxes from it, not to mention the increased trade we would bring throughout the Baltic. Perhaps we could sway Germania to cede this island to our administration and allow us to govern in their name."  #<Während unsere Kolonie immer stärker mit dem Festland verflochten wird, verschwimmt die Grenze zwischen [GetProvince('(int32)9371').GetName] und #E Germania#!, ähnlich einem dichten Morgennebel, der über dem Wasser und unter dem Himmel hängt. In dieser Hinsicht sind wir weniger ein Vasall als vielmehr eine autonome Provinz, die dazu da ist, unserem Oberherrn bei der Verwaltung dieser weit entfernten Länder zu helfen.\n\nAuch wenn die Insel [GetProvince('(int32)6010').GetName] außerhalb unserer ausgewiesenen Region liegt, liegt sie näher an unserer Hauptstadt als an der unseres Mutterlandes, was es uns ermöglichen würde, mehr Kontrolle über sie auszuüben und somit mehr Steuern von ihr zu ernten, ganz zu schweigen von dem gesteigerten Handel, den wir im gesamten Baltikum bewirken würden. Vielleicht könnten wir Germania dazu bewegen, diese Insel unserer Verwaltung zu überlassen und uns zu erlauben, in ihrem Namen zu regieren.>  #NT!
 me_soodak_20.a: "200 gold should be sufficient."  #<200 Gold sollten ausreichen.>  #NT!
 me_soodak_20.b: "Perhaps I can speak to the quality of this administration."  #<Vielleicht kann ich etwas über die Qualität dieser Verwaltung sagen.>  #NT!
  
 me_soodak_2001_title: "#E Soodak#! Requests [GetProvince('(int32)6010').GetName]"  #<#E Soodak#! Anfragen [GetProvince('(int32)6010').GetName]>  #NT!
 me_soodak_2001_desc: "Our loyal colony #E [SCOPE.sCountry('soodak_country').GetName]#! has integrated itself well into our economy, recognizing their place in our administration to govern the far-off lands of Hyperborea and extract its resources for our benefit. However, they claim that our island of [GetProvince('(int32)6010').GetName], though technically outside of their assigned region, is much nearer to their capital then to ours, and thus they could reap taxes from it more efficiently then we ever could. Though some are skeptical of ceding our core lands, our colony provides a strong argument and a downpayment to back it up."  #<Unsere treue Kolonie #E [SCOPE.sCountry('soodak_country').GetName]#! hat sich gut in unsere Wirtschaft integriert und ihre Rolle in unserer Verwaltung erkannt, um die fernen Länder Hyperboreas zu regieren und ihre Ressourcen zu unserem Vorteil zu gewinnen. Sie behaupten jedoch, dass unsere Insel [GetProvince('(int32)6010').GetName], obwohl technisch gesehen außerhalb ihrer zugewiesenen Region, viel näher an ihrer Hauptstadt liegt als an unserer, und dass sie daher effizienter Steuern von ihr eintreiben könnten, als wir es jemals könnten. Obwohl einige der Abtretung unserer Kerngebiete skeptisch gegenüberstehen, bietet unsere Kolonie ein starkes Argument und eine Anzahlung als Untermauerung.>  #NT!
 me_soodak_2001.a: "The island isn't valuable anyway, they can have it."  #<Die Insel ist sowieso nicht wertvoll, sie können sie haben.>  #NT!
 me_soodak_2001.b: "Give away our island? Those colonials can keep their money and stick to Hyperborea."  #<Unsere Insel verschenken? Diese Kolonialherren können ihr Geld behalten und bei Hyperborea bleiben.>  #NT!
  
 me_soodak_2002_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Accepts!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Akzeptiert!>  #NT!
 me_soodak_2002_desc: "Our generous motherland of #E [SCOPE.sCountry('soodak_overlord').GetName]#! has yet again shown its wise and benevolent character, and has accepted our argument, officially transferring the island of [GetProvince('(int32)6010').GetName] from their direct rule to our administration. Though it cost us a pretty penny, a foothold in Scandia will benefit our economy in the long-term."  #<Unser großzügiges Mutterland #E [SCOPE.sCountry('soodak_overlord').GetName]#! hat wieder einmal seinen weisen und wohlwollenden Charakter gezeigt und unser Argument akzeptiert, indem es die Insel [GetProvince('(int32)6010').GetName] offiziell aus ihrer direkten Herrschaft an unsere Verwaltung überführt hat. Obwohl es uns einen hübschen Cent gekostet hat, wird ein Standbein in Skandinavien unserer Wirtschaft auf lange Sicht zugute kommen.>  #NT!
 me_soodak_2002.a: "To [SCOPE.sCountry('soodak_overlord').GetName], our glorious leaders and protectors!"  #<An [SCOPE.sCountry('soodak_overlord').GetName], unsere glorreichen Anführer und Beschützer!>  #NT!
  
 me_soodak_2003_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! Rejects!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! Ablehnungen!>  #NT!
 me_soodak_2003_desc: "In a stunning turn of events, our overlord #E [SCOPE.sCountry('soodak_overlord').GetName]#! has rejected our logical and mutually-beneficial request, preferring we remain in our assigned region of Hyperborea. They at least returned the upfront payment, but given how much we had invested into integrating our economy into theirs, some now wonder whether it was a mistake putting all of our eggs into that [SCOPE.sCountry('soodak_overlord').GetAdjective] basket."  #<In einer überraschenden Wendung der Ereignisse hat unser Oberherr #E [SCOPE.sCountry('soodak_overlord').GetName]#! unsere logische und für beide Seiten vorteilhafte Bitte abgelehnt und es vorgezogen, dass wir in unserer zugewiesenen Region Hyperborea bleiben. Sie haben zumindest die Vorauszahlung zurückerstattet, aber wenn man bedenkt, wie viel wir in die Integration unserer Wirtschaft in ihre investiert hatten, fragen sich einige jetzt, ob es ein Fehler war, alles auf eine Karte zu setzen.>  #NT!
 me_soodak_2003.a: "Perhaps they will one-day change their minds."  #<Vielleicht werden sie eines Tages ihre Meinung ändern.>  #NT!
  
  #Government Event Chain 
 me_soodak_100_title: "$01_soodak_missions_task_100$"  #<$01_soodak_missions_task_100$>  #NT!
 me_soodak_100_desc: "Now that we have found a way to survive on this barren island, though our temporary council has served us sufficiently, we need to establish a permanent system of governance should we wish to exist here long-term. However, the colonists are divided as to the form our government should take; some wish to expand the existing council into a house of burgesses, or a #Y 'Burgzhusa'#!, comprised of all the major stakeholders which would have the power to establish laws, while others would prefer having a royal governor installed from the homeland, who would reinforce our ties through dynastic houses and guide us towards prosperity.\n\nStill others, however, would suggest a hybrid system as a compromise, in-which a governor of non-royal stock would reign in-conjunction with our elected body. Yet, whatever we choose today will dictate the course of our colony for not only ourselves, but for our children and progeny yet to come."  #<Nachdem wir nun einen Weg gefunden haben, auf dieser kargen Insel zu überleben, müssen wir, obwohl unser temporärer Rat uns ausreichend gedient hat, ein dauerhaftes Regierungssystem einrichten, falls wir hier langfristig existieren wollen. Allerdings sind sich die Kolonisten uneinig darüber, welche Form unsere Regierung annehmen soll; Einige möchten den bestehenden Rat zu einem Bürgerhaus ausbauen, oder zu einer #Y „Burgzhusa“#!, bestehend aus allen wichtigen Interessenvertretern, die die Macht hätte, Gesetze zu erlassen, während andere es vorziehen würden, einen königlichen Gouverneur aus dem Heimatland einzusetzen, der unsere Bindungen durch dynastische Häuser stärken und uns zum Wohlstand führen würde.\n\nWieder andere würden als Kompromiss ein Hybridsystem vorschlagen, in dem ein Gouverneur nicht-königlicher Abstammung eingesetzt wird würde in Verbindung mit unserem gewählten Gremium regieren. Doch was immer wir heute wählen, wird den Verlauf unserer Kolonie nicht nur für uns selbst, sondern auch für unsere Kinder und künftigen Nachkommen bestimmen.>  #NT!
 me_soodak_100.a: "The noble house of #E [SCOPE.sCountry('soodak_overlord').GetName]#! shall wisely guide us."  #<Das edle Haus von #E [SCOPE.sCountry('soodak_overlord').GetName]#! wird uns weise führen.>  #NT!
 me_soodak_100.b: "Our Burgzhusa elected from the best among us is best-fit to make our decisions."  #<Unsere aus den Besten unter uns gewählte Burgzhusa ist am besten geeignet, unsere Entscheidungen zu treffen.>  #NT!
 me_soodak_100.c: "A hybrid approach between royalists and republicans would serve us best."  #<Ein hybrider Ansatz zwischen Royalisten und Republikanern würde uns am besten dienen.>  #NT!
 me_soodak_100.d: "I would make a great governor!"  #<Ich wäre ein großartiger Gouverneur!>  #NT!
 me_soodak_100.e: "A guru from our spiritual heartland would be the wisest choice."  #<Ein Guru aus unserem spirituellen Kernland wäre die klügste Wahl.>  #NT!
 me_soodak_100_a_tooltip: "We will request a dynastic governor from our motherland. However, should they elect not to send one, we will have other options available."  #<Wir werden von unserem Mutterland einen dynastischen Gouverneur anfordern. Sollten sie sich jedoch dafür entscheiden, keines zu senden, stehen uns andere Optionen zur Verfügung.>  #NT!
 me_soodak_100_c_tooltip: "We will request a governor from our motherland, after which we will become an #Y $oligarchic_republic$#! with the #Y $republican_election_4$#! law."  #<Wir werden einen Gouverneur unseres Mutterlandes anfordern, woraufhin wir ein #Y $oligarchic_republic$#! mit dem #Y $republican_election_4$#!-Gesetz werden.>  #NT!
 me_soodak_100_d_tooltip: "This option is available because your ruler has the #Y Narcissistic#!, #Y Ambitious#!, and/or #Y Arrogant#! traits, or has greater then or equal to #Y 75#! popularity."  #<Diese Option ist verfügbar, weil Ihr Herrscher die Eigenschaften #Y Narzisstisch#!, #Y Ehrgeizig#!, und/oder #Y Arrogant#! hat oder eine Beliebtheit von mindestens #Y 75#! aufweist.>  #NT!
 me_soodak_100_d2_tooltip: "Our current ruler will become a hereditary governor. However, #E [SCOPE.sCountry('soodak_overlord').GetName]#! will be greatly offended..."  #<Unser derzeitiger Herrscher wird ein erblicher Gouverneur. Allerdings wird #E [SCOPE.sCountry('soodak_overlord').GetName]#! sehr beleidigt sein ...>  #NT!
 me_soodak_100_e_tooltip: "This option is available because our state religion is either #Y $buddhism$#!, #Y $jainism$#!, #Y $hindu$#!, #Y $agama$#!, or #Y $ajivika$#!, or because our primary culture is #Y $indo_germanic$#!."  #<Diese Option ist verfügbar, weil unsere Staatsreligion entweder #Y $buddhism$#!, #Y $jainism$#!, #Y $hindu$#!, #Y $buddhism$0#!, oder #Y $buddhism$3#!, ist oder weil unsere Primärkultur #Y ist $buddhism$6$buddhism$7>  #NT!
 me_soodak_100_e2_tooltip: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! will be slightly confused, but will not object to our choice."  #<None>  #NT!
  
 me_soodak_101_title: "A Request from #E [SCOPE.sCountry('soodak_country').GetName]#!"  #<Eine Anfrage von #E [SCOPE.sCountry('soodak_country').GetName]#!>  #NT!
 me_soodak_101_desc: "Our colony of #E [SCOPE.sCountry('soodak_country').GetName]#! has gone about organizing a formal colonial government to better-manage their affairs, and have wisely-decided that it is in their best-interests to be ruled by a representative of our government. However, they have specifically requested a member of our royal house to guide them, and though our court is flattered by the idea, the thought of sending over a member of our dignified house to sully his hands over a backwater is, at-best, laughable to many of our closest advisors, who instead suggest it would be more befitting to send a bureaucrat of common stock instead."  #<Unsere Kolonie #E [SCOPE.sCountry('soodak_country').GetName]#! hat sich daran gemacht, eine formelle Kolonialregierung zu organisieren, um ihre Angelegenheiten besser zu verwalten, und hat klugerweise entschieden, dass es in ihrem besten Interesse ist, von einem Vertreter unserer Regierung regiert zu werden. Sie haben jedoch ausdrücklich ein Mitglied unseres königlichen Hauses gebeten, sie zu führen, und obwohl unser Hof von der Idee geschmeichelt ist, ist der Gedanke, ein Mitglied unseres würdigen Hauses herüberzuschicken, um seine Hände über einem Rückstand zu beschmutzen, für viele unserer engsten Berater bestenfalls lächerlich, die stattdessen vorschlagen, dass es angemessener wäre, stattdessen einen Bürokraten mit gutem Stamm zu schicken.>  #NT!
 me_soodak_101.a: "I think it would be good to spread our noble seed..."  #<Ich denke, es wäre gut, unseren edlen Samen zu verbreiten ...>  #NT!
 me_soodak_101.b: "A colonial administrator could extract more wealth out of our colony."  #<Ein Kolonialverwalter könnte mehr Reichtum aus unserer Kolonie herausholen.>  #NT!
 me_soodak_101.c: "The very-audacity of this absurdity deserves no response, they can rule themselves."  #<Die Dreistigkeit dieser Absurdität verdient keine Reaktion, sie können sich selbst beherrschen.>  #NT!
 me_soodak_101.d: "What a great opportunity, I'll go there myself!"  #<Was für eine tolle Gelegenheit, ich werde selbst dorthin gehen!>  #NT!
 me_soodak_101_d_tt: "#R WARNING!#! Our ruler will resign and move to our colony."  #<#R WARNUNG!#! Unser Herrscher wird zurücktreten und in unsere Kolonie ziehen.>  #NT!
  
 me_soodak_102_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! accepts!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! akzeptiert!>  #NT!
 me_soodak_102_desc: "Our gracious motherland has accepted our proposal! Although there were some who were concerned that our request would have been too demanding, we got what we wanted and now have a member of the #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! royal house reigning over our colony."  #<Unser gnädiges Mutterland hat unseren Vorschlag angenommen! Obwohl es einige gab, die befürchteten, dass unsere Anfrage zu anspruchsvoll gewesen wäre, haben wir bekommen, was wir wollten, und nun regiert ein Mitglied des #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! Königshauses über unsere Kolonie.>  #NT!
 me_soodak_102.a: "To the king, and may our ties prosper!"  #<Zum König, und mögen unsere Bindungen gedeihen!>  #NT!
  
 me_soodak_103_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! declines"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! lehnt ab>  #NT!
 me_soodak_103_desc: "Although we thought that having a royal would improve our ties and legitimize our government, unfortunately our overlords have labeled us a 'backwater' that would only 'sully the hands of their respected nobility.' Instead, #E [SCOPE.sCountry('soodak_overlord').GetName]#! has sent an extortionist bureaucrat who makes no-secret of his intentions to strip us bare. Though we do have an obligation to financially benefit the motherland, many of our council are concerned that this man's harsh methods may constrict our growth and keep prosperity out of reach."  #<Obwohl wir dachten, dass ein König unsere Beziehungen verbessern und unsere Regierung legitimieren würde, haben uns unsere Oberherren leider als „Rückstand“ bezeichnet, der nur „die Hände ihres angesehenen Adels beflecken“ würde. Stattdessen hat #E [SCOPE.sCountry('soodak_overlord').GetName]#! einen erpressenden Bürokraten geschickt, der kein Geheimnis aus seinen Absichten macht, uns bloßzustellen. Obwohl wir verpflichtet sind, dem Mutterland finanziell zu helfen, befürchten viele in unserem Rat, dass die harten Methoden dieses Mannes unser Wachstum einschränken und den Wohlstand unerreichbar machen könnten.>  #NT!
 me_soodak_103.a: "We do as our sovereign doth command."  #<Wir tun, was unser Souverän befiehlt.>  #NT!
 me_soodak_103.b: "Though I did not initially seek power, I am forced to reign instead."  #<Obwohl ich ursprünglich nicht nach der Macht strebte, bin ich gezwungen, stattdessen zu regieren.>  #NT!
 me_soodak_103.c: "We shall seek a foreign noble."  #<Wir werden einen ausländischen Adligen suchen.>  #NT!
 me_soodak_103_b_tt: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! will not be pleased at our rejection."  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! wird über unsere Ablehnung nicht erfreut sein.>  #NT!
 me_soodak_103_c_tt: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! will be irate at our decision, and may impose financial sanctions on our colony."  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! wird über unsere Entscheidung wütend sein und möglicherweise finanzielle Sanktionen gegen unsere Kolonie verhängen.>  #NT!
 me_soodak_103_c2_tt: "We will seek a noble from #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! to guide and lead us."  #<Wir werden einen Adligen aus #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! suchen, der uns leitet und führt.>  #NT!
  
 me_soodak_104_title: "#E [SCOPE.sCountry('soodak_country').GetName]#! rejects our governor!"  #<#E [SCOPE.sCountry('soodak_country').GetName]#! lehnt unseren Gouverneur ab!>  #NT!
 me_soodak_104_desc: "Although we thought that our governor would ensure we'd profit from our colony, it has become apparent they rejected him out-of-hand, sending his ship back here before he could set foot on dry land. In his place, the temporary administrator has stated that he intends to remain on indefinately. Though this is a blatant challenge to our authority, our advisors point out that #E [SCOPE.sCountry('soodak_country').GetName]#! is far away and they themselves initiated this discussion."  #<Obwohl wir dachten, dass unser Gouverneur dafür sorgen würde, dass wir von unserer Kolonie profitieren würden, stellte sich heraus, dass sie ihn rundheraus ablehnten und sein Schiff hierher zurückschickten, bevor er einen Fuß aufs Land setzen konnte. An seiner Stelle hat der vorläufige Verwalter erklärt, dass er beabsichtige, auf unbestimmte Zeit im Amt zu bleiben. Obwohl dies eine offensichtliche Herausforderung für unsere Autorität darstellt, weisen unsere Berater darauf hin, dass #E [SCOPE.sCountry('soodak_country').GetName]#! weit weg ist und sie selbst diese Diskussion initiiert haben.>  #NT!
 me_soodak_104.a: "A slap on the wrist shall suffice."  #<Ein Schlag aufs Handgelenk genügt.>  #NT!
  
 me_soodak_105_title: "An Envoy from #E [SCOPE.sCountry('soodak_country').GetName]#!"  #<Ein Gesandter von #E [SCOPE.sCountry('soodak_country').GetName]#!>  #NT!
 me_soodak_105_desc: "Today we have received a special envoy from the distant island of '#E [SCOPE.sCountry('soodak_country').GetName]#!', a colony of #E [SCOPE.sCountry('soodak_overlord').GetName]#!. He tells us the colony had sought to legitimize its tenuous position by placing a lesser royal from their motherland upon their throne, but that their tyrannical overlord refused, forcing them to look beyond their borders for a leader noble enough to guide them. Though we can accomodate their request and place a member of our own family upon the #E [SCOPE.sCountry('soodak_country').GetName]#! throne, they are but a colony, a foreign one at that, and doing so would provoke #E [SCOPE.sCountry('soodak_overlord').GetName]#!. Yet, this would also be an opportunity drive a wedge between #E [SCOPE.sCountry('soodak_overlord').GetName]#! and its colony, weakening their empire at a minimal cost to us."  #<Heute haben wir einen Sondergesandten von der fernen Insel '#E [SCOPE.sCountry('soodak_country').GetName]#!',, einer Kolonie von #E [SCOPE.sCountry('soodak_overlord').GetName]#!., empfangen. Er erzählt uns, dass die Kolonie versucht hatte, ihre schwache Position zu legitimieren, indem sie einen geringeren König aus ihrem Mutterland auf ihren Thron setzte, aber dass ihr tyrannischer Oberherr sich weigerte und sie zwang, über ihre Grenzen hinaus nach einem Anführer zu suchen, der edel genug war, um sie zu führen. Obwohl wir ihrer Bitte nachkommen und ein Mitglied unserer eigenen Familie auf den #E [SCOPE.sCountry('soodak_country').GetName]#! Thron setzen können, sind sie nur eine Kolonie, eine fremde noch dazu, und dies würde #E [SCOPE.sCountry('soodak_overlord').GetName]#!. provozieren. Dies wäre jedoch auch eine Gelegenheit, einen Keil zwischen #E [SCOPE.sCountry('soodak_overlord').GetName]#! und seiner Kolonie zu treiben und ihr Imperium mit minimalen Kosten zu schwächen uns.>  #NT!
 me_soodak_105.a: "We would be happy to send over a member from our esteemed family!"  #<Gerne schicken wir Ihnen ein Mitglied unserer geschätzten Familie vorbei!>  #NT!
 me_soodak_105.b: "We cannon afford to risk drawing #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s ire."  #<Wir können es uns nicht leisten, das Risiko einzugehen, #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s Zorn auf uns zu ziehen.>  #NT!
  
 me_soodak_106_title: "#E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! accepts!"  #<#E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! akzeptiert!>  #NT!
 me_soodak_106_desc: "Our envoy tells us that #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! has accepted our proposal, and a member of their royal family, [SCOPE.sCharacter('soodak_foreign_noble').GetName], now comes to reign atop our newly-created throne, granting much legitimacy in the eyes of both our people and the eyes of the world. However, #E [SCOPE.sCountry('soodak_overlord').GetName]#! is bound not to receive the news well."  #<Unser Gesandter teilt uns mit, dass #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! unseren Vorschlag angenommen hat und ein Mitglied ihrer königlichen Familie, [SCOPE.sCharacter('soodak_foreign_noble').GetName], nun auf unserem neu geschaffenen Thron regieren wird, was sowohl in den Augen unseres Volkes als auch in den Augen der Welt große Legitimität verleiht. Allerdings wird #E [SCOPE.sCountry('soodak_overlord').GetName]#! die Nachrichten wahrscheinlich nicht gut aufnehmen.>  #NT!
 me_soodak_106.a: "All hail [SCOPE.sCharacter('soodak_foreign_noble').GetName]!"  #<Heil euch allen [SCOPE.sCharacter('soodak_foreign_noble').GetName]!>  #NT!
  
 me_soodak_107_title: "#E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! declines"  #<#E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! lehnt ab>  #NT!
 me_soodak_107_desc: "Although our envoy was well-received by #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!, unfortunately they have declined, citing their concerns over drawing #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s ire. This leaves us with two options; we can empower our temporary governor as our first king or we can begrudgingly accept our motherland's candidate. What is your decision?"  #<Obwohl unser Gesandter von #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!, gut aufgenommen wurde, lehnten sie leider ab und verwiesen auf ihre Bedenken, den Zorn von #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s auf sich zu ziehen. Dies lässt uns zwei Möglichkeiten; Wir können unseren vorübergehenden Gouverneur als unseren ersten König ermächtigen oder wir können den Kandidaten unseres Mutterlandes widerwillig akzeptieren. Was ist Ihre Entscheidung?>  #NT!
 #me_soodak_107_desc: "Although our envoy was well-received by #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!, unfortunately they have declined, citing their concerns over drawing #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s ire. This leaves us with three options; we can ask another country if they would be willing to provide us with a noble to guide our colony, we can empower our temporary governor as our first king, or we can begrudgingly accept our motherland's candidate."  #<Obwohl unser Gesandter von #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!, gut aufgenommen wurde, lehnten sie leider ab und verwiesen auf ihre Bedenken, den Zorn von #E [SCOPE.sCountry('soodak_overlord').GetName]#!'s auf sich zu ziehen. Dies lässt uns drei Optionen; Wir können ein anderes Land fragen, ob es bereit wäre, uns einen Adligen zur Führung unserer Kolonie zur Verfügung zu stellen, wir können unseren vorübergehenden Gouverneur zu unserem ersten König ermächtigen oder wir können den Kandidaten unseres Mutterlandes widerwillig akzeptieren.>  #NT!
 me_soodak_107.a: "We will give this extortionist governor a shot."  #<Wir werden diesem erpresserischen Gouverneur eine Chance geben.>  #NT!
 me_soodak_107.b: "I humbly accept the Soodak kingship."  #<Ich akzeptiere demütig die Soodak-Königschaft.>  #NT!
 me_soodak_107.c: "We will try again with #E [SCOPE.sCountry('scope:soodak_colonial_governor').GetName]#!"  #<Wir werden es noch einmal mit #E [SCOPE.sCountry('scope:soodak_colonial_governor').GetName]#! versuchen>  #NT!
  
 me_soodak_108_title: "#E [SCOPE.sCountry('soodak_country').GetName]#! installs a Foreign Ruler!"  #<#E [SCOPE.sCountry('soodak_country').GetName]#! installiert einen fremden Herrscher!>  #NT!
 me_soodak_108_desc: "Although we thought that our governor would ensure we'd profit from our colony, it has become apparent they rejected him out-of-hand, sending his ship back here before he could set foot on dry land. Not only have they blatantly defied our authority, however, they have also drastically raised the stakes by placing a foreigner in-charge, from the barbarians of #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!, no-less, straining ties with the benevolent motherland and undermine our authority; people throughout the capital are irate, denouncing Soodakers for their treachery and disloyalty, and our closest advisors say that they have left us with no other alternative but to impose harsh sanctions upon our colony to bring it back in-line."  #<Obwohl wir dachten, dass unser Gouverneur dafür sorgen würde, dass wir von unserer Kolonie profitieren würden, stellte sich heraus, dass sie ihn rundheraus ablehnten und sein Schiff hierher zurückschickten, bevor er einen Fuß aufs Land setzen konnte. Sie haben sich nicht nur eklatant unserer Autorität widersetzt, sondern auch den Einsatz drastisch erhöht, indem sie einen Ausländer an die Spitze gestellt haben, nicht weniger als die Barbaren von #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!,, was die Beziehungen zum gütigen Mutterland belastet und unsere Autorität untergräbt; Die Menschen in der gesamten Hauptstadt sind wütend und verurteilen die Soodaker wegen ihres Verrats und ihrer Illoyalität, und unsere engsten Berater sagen, dass sie uns keine andere Wahl gelassen haben, als harte Sanktionen gegen unsere Kolonie zu verhängen, um sie wieder auf Linie zu bringen.>  #NT!
 me_soodak_108.a: "A slap on the wrist shall suffice."  #<Ein Schlag aufs Handgelenk genügt.>  #NT!
 me_soodak_108.b: "The most-crushing sanctions are in-order. Then they will know to fall in-line."  #<Die vernichtendsten Sanktionen sind angebracht. Dann werden sie wissen, dass sie sich einreihen müssen.>  #NT!
 #me_soodak_108.c: "Demand they recall the foreigner at once!"  #<Fordern Sie, dass sie den Ausländer sofort zurückrufen!>  #NT!
  
 me_soodak_109_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! imposes sanctions!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! verhängt Sanktionen!>  #NT!
 me_soodak_109_desc: "We meant no ill-will towards our dear motherland, but unfortunately they have seen fit to impose harsh and cruel sanctions upon our colony until we install their governor of choice, targeting our vital food shipments and redirecting merchant vessels towards Scandia instead. Though we are self-sufficient now and can withstand the blows, the cost will be high, and many are contemplating sending our recently-appointed ruler back to #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!."  #<Wir wollten unserem lieben Mutterland gegenüber nicht böse sein, aber leider haben sie es für angebracht gehalten, harte und grausame Sanktionen gegen unsere Kolonie zu verhängen, bis wir den Gouverneur ihrer Wahl eingesetzt haben, wobei sie unsere lebenswichtigen Lebensmittellieferungen ins Visier nehmen und stattdessen Handelsschiffe nach Skandinavien umleiten. Obwohl wir jetzt autark sind und den Schlägen standhalten können, werden die Kosten hoch sein und viele denken darüber nach, unseren kürzlich ernannten Herrscher nach #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#!. zurückzuschicken>  #NT!
 me_soodak_109.a: "We will weather the storm."  #<Wir werden den Sturm überstehen.>  #NT!
 me_soodak_109.b: "We made a mistake!"  #<Wir haben einen Fehler gemacht!>  #NT!
  
 me_soodak_110_title: "Our Colony Folds"  #<Unsere Kolonie faltet sich>  #NT!
 me_soodak_110_desc: "Feeling the pressure of our mighty sanctions, our renegade colony of #E [SCOPE.sCountry('soodak_country').GetName]#! has decided to fold and submit to our authority, placing our esteemed governor upon their throne. Now, our advisors deem it fit to remove the financial penalties and duties imposed, but this episode will not be soon forgotten."  #<Unter dem Druck unserer mächtigen Sanktionen hat unsere abtrünnige Kolonie #E [SCOPE.sCountry('soodak_country').GetName]#! beschlossen, sich unserer Autorität zu unterwerfen und unseren geschätzten Gouverneur auf ihren Thron zu setzen. Jetzt halten es unsere Berater für angebracht, die verhängten Geldstrafen und Zölle aufzuheben, aber diese Episode wird nicht so schnell vergessen sein.>  #NT!
 me_soodak_110.a: "We have nothing to fear from a backwater."  #<Von einem Rückstau haben wir nichts zu befürchten.>  #NT!
  
 me_soodak_111_title: "#E [SCOPE.sCountry('soodak_country').GetName]#! exiles our nobility!"  #<#E [SCOPE.sCountry('soodak_country').GetName]#! verbannt unseren Adel!>  #NT!
 me_soodak_111_desc: "Recently, envoys from #E [SCOPE.sCountry('soodak_country').GetName]#! came to us, begging for one of our nobles to guide and lead them; we accepted, knowing it may cause a strain between them and their #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! masters. However, only a few weeks later, we have received [SCOPE.sCharacter('soodak_foreign_noble').GetName] back at out doorstep, cold, hungry, and misurable. Appearently, in the face of #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! pressure, they had hastily cast him out mere days after his coronation, insulting both our ruling family and #E [SCOPE.sCountry('soodak_foreign_nobility_target').GetName]#! as a whole."  #<Kürzlich kamen Gesandte von #E [SCOPE.sCountry('soodak_country').GetName]#! zu uns und baten um einen unserer Adligen, der sie führen und führen könne; Wir stimmten zu, wohl wissend, dass dies zu einer Belastung zwischen ihnen und ihren #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! Meistern führen könnte. Doch nur wenige Wochen später standen wir [SCOPE.sCharacter('soodak_foreign_noble').GetName] wieder vor der Haustür, kalt, hungrig und unglücklich. Anscheinend hatten sie ihn angesichts des Drucks von #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! nur wenige Tage nach seiner Krönung hastig vertrieben und dabei sowohl unsere herrschende Familie als auch #E [SCOPE.sCountry('soodak_country').GetName]1#! als Ganzes beleidigt.>  #NT!
 me_soodak_111.a: "We will have nothing further to do with these barbarians."  #<Wir werden mit diesen Barbaren nichts mehr zu tun haben.>  #NT!
  
 me_soodak_112_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! doesn't impose sanctions?"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! verhängt keine Sanktionen?>  #NT!
 me_soodak_112_desc: "We meant no ill-will towards our dear motherland, and our closest advisors had anticipated there would be a retaliation against our colony. However, apparently our overlords either didn't notice or particularly care, and have dropped the matter entirely, fining us only a token sum."  #<Wir hatten keine bösen Absichten gegenüber unserem lieben Mutterland und unsere engsten Berater hatten damit gerechnet, dass es eine Vergeltung gegen unsere Kolonie geben würde. Offensichtlich haben unsere Oberherren es jedoch entweder nicht bemerkt oder sich besonders darum gekümmert und haben die Angelegenheit ganz fallen gelassen und uns nur eine symbolische Geldstrafe auferlegt.>  #NT!
 me_soodak_112.a: "Confusing, but this outcome is acceptable."  #<Verwirrend, aber dieses Ergebnis ist akzeptabel.>  #NT!
  
 me_soodak_113_title: "#E [SCOPE.sCountry('soodak_overlord').GetName]#! accepts!"  #<#E [SCOPE.sCountry('soodak_overlord').GetName]#! akzeptiert!>  #NT!
 me_soodak_113_desc: "Our gracious motherland has accepted our proposal, but not in a way anyone could have suspected; in an unexpected twist of fate, king [SCOPE.sCharacter('soodak_lunatic_king').GetName] has resigned from [SCOPE.sCharacter('soodak_lunatic_king').GetHerHis] post to rule over our colony directly. Some say he is mad, others enlightened, but regardless of whatever happens next, we got what we wanted and now have a member of the #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! royal house reigning over our colony."  #<Unser gnädiges Mutterland hat unseren Vorschlag angenommen, aber nicht auf eine Weise, die irgendjemand hätte ahnen können; In einer unerwarteten Wendung des Schicksals ist König [SCOPE.sCharacter('soodak_lunatic_king').GetName] von seinem Posten [SCOPE.sCharacter('soodak_lunatic_king').GetHerHis] zurückgetreten, um direkt über unsere Kolonie zu herrschen. Manche sagen, er sei verrückt, andere sagen, er sei aufgeklärt, aber egal, was als nächstes passiert, wir haben bekommen, was wir wollten, und jetzt regiert ein Mitglied des #E [SCOPE.sCountry('soodak_overlord').GetAdjective]#! Königshauses über unsere Kolonie.>  #NT!
 me_soodak_113.a: "All hail [SCOPE.sCharacter('soodak_lunatic_king').GetName]!"  #<Heil euch allen [SCOPE.sCharacter('soodak_lunatic_king').GetName]!>  #NT!
  
 me_soodak_114_title: "[SCOPE.sCharacter('soodak_ruler').GetName] proclaims [SCOPE.sCharacter('soodak_ruler').GetHerselfHimself] governor!"  #<[SCOPE.sCharacter('soodak_ruler').GetName] ernennt [SCOPE.sCharacter('soodak_ruler').GetHerselfHimself] zum Gouverneur!>  #NT!
 me_soodak_114_desc: "When we established #E [SCOPE.sCountry('soodak_country').GetName]#!, we set in-place a temporary council to rule until such time they could self-organize. However, the temporary leader of said-council, [SCOPE.sCharacter('soodak_ruler').GetName], has dissolved it and proclaimed absolute power as governor-for-life, allegedly with the popular support of the people."  #<Als wir #E [SCOPE.sCountry('soodak_country').GetName]#!, gründeten, setzten wir einen vorübergehenden Rat ein, der regieren sollte, bis sie sich selbst organisieren konnten. Der vorläufige Vorsitzende des besagten Rates, [SCOPE.sCharacter('soodak_ruler').GetName], hat ihn jedoch aufgelöst und als Gouverneur auf Lebenszeit die absolute Macht ausgerufen, angeblich mit der Unterstützung des Volkes.>  #NT!
 me_soodak_114.a: "As long as they keep sending us Amber."  #<Solange sie uns weiterhin Amber schicken.>  #NT!
  
 me_soodak_115_title: "A Guru in #E [SCOPE.sCountry('soodak_country').GetName]#!?"  #<Ein Guru in #E [SCOPE.sCountry('soodak_country').GetName]#!?>  #NT!
 me_soodak_115_desc: "When we established #E [SCOPE.sCountry('soodak_country').GetName]#!, we set in-place a temporary council to rule until such time they could self-organize. However, instead of requesting a governor, they have nominated a spiritual guru from halfway-across the world to guide and lead them towards enlightenment. Though our closest advisors are bewildered, nobody can object to such a wise and determined man who has walked all the way from India."  #<Als wir #E [SCOPE.sCountry('soodak_country').GetName]#!, gründeten, setzten wir einen vorübergehenden Rat ein, der regieren sollte, bis sie sich selbst organisieren konnten. Anstatt jedoch einen Gouverneur zu fordern, haben sie einen spirituellen Guru von der anderen Seite der Welt nominiert, der sie zur Erleuchtung führt. Obwohl unsere engsten Berater verwirrt sind, kann niemand etwas gegen einen so weisen und entschlossenen Mann einwenden, der den ganzen Weg von Indien aus zu Fuß gegangen ist.>  #NT!
 #me_soodak_115.a: "As long as they keep sending us Amber."  #<Solange sie uns weiterhin Amber schicken.>  #NT!
  
 me_soodak_116_title: "A Slap on the Wrist"  #<Ein Schlag aufs Handgelenk>  #NT!
 me_soodak_116_desc: "Though the motherland is mildly disappointed with our choice of leadership, they have decided it is neither worth their time nor effort to override our decision, only dealing our colony a token punishment."  #<Obwohl das Mutterland von unserer Wahl der Führung leicht enttäuscht ist, haben sie entschieden, dass es weder ihre Zeit noch ihre Mühe wert ist, unsere Entscheidung außer Kraft zu setzen, sondern unserer Kolonie nur eine symbolische Strafe aufzuerlegen.>  #NT!
 me_soodak_116.a: "Not the best outcome, but it could have been much worse."  #<Nicht das beste Ergebnis, aber es hätte viel schlimmer kommen können.>  #NT!
  
 me_soodak_117_title: "A Request from #E [SCOPE.sCountry('soodak_country').GetName]#!"  #<Eine Anfrage von #E [SCOPE.sCountry('soodak_country').GetName]#!>  #NT!
 me_soodak_117_desc: "Our colony of #E [SCOPE.sCountry('soodak_country').GetName]#! has gone about organizing a formal colonial government to better-manage their affairs, and have wisely-decided that it is in their best-interests to be ruled by a representative of our government. However, there are numerous qualified candidates vying for the job, leaving our advisors divided on who to appoint. Some suggestions include a skilled explorer and ethnographer to better map out the terrain and its inhabitants, an orator who will be able to ensure the loyalty of our colonists to the motherland, or one of our most-finest military generals to protect them from barbarian raids.\n\nStill others, however, suggest an efficient, cut-throat administrator who, though controversial in his methods, could reap the most profit out of our tiny colony, though it may prove controversial among the Soodakers. Who shall lead #E [SCOPE.sCountry('soodak_country').GetName]#! in our name?"  #<Unsere Kolonie #E [SCOPE.sCountry('soodak_country').GetName]#! hat sich daran gemacht, eine formelle Kolonialregierung zu organisieren, um ihre Angelegenheiten besser zu verwalten, und hat klugerweise entschieden, dass es in ihrem besten Interesse ist, von einem Vertreter unserer Regierung regiert zu werden. Es gibt jedoch zahlreiche qualifizierte Kandidaten, die um die Stelle wetteifern, sodass unsere Berater uneinig sind, wen sie ernennen sollen. Einige Vorschläge umfassen einen erfahrenen Entdecker und Ethnographen, der das Gelände und seine Bewohner besser kartieren kann, einen Redner, der die Loyalität unserer Kolonisten gegenüber dem Mutterland sicherstellen kann, oder einen unserer besten Militärgeneräle, der sie vor barbarischen Überfällen schützt.\n\nWieder andere schlagen jedoch einen effizienten, gnadenlosen Verwalter vor, der, obwohl in seinen Methoden umstritten, den größten Gewinn aus unserer winzigen Kolonie ziehen könnte, obwohl sie sich unter den Soodakern als umstritten erweisen könnte. Wer soll #E [SCOPE.sCountry('soodak_country').GetName]#! in unserem Namen führen?>  #NT!
 me_soodak_117.a: "My dear nephew!"  #<Mein lieber Neffe!>  #NT!
 me_soodak_117_a_tt: "This option is available because we are a monarchy."  #<Diese Option gibt es, weil wir eine Monarchie sind.>  #NT!
 me_soodak_117.b: "An orator will steer #E [SCOPE.sCountry('soodak_country').GetName]#! in the right direction..."  #<Ein Redner wird #E [SCOPE.sCountry('soodak_country').GetName]#! in die richtige Richtung lenken ...>  #NT!
 me_soodak_117.c: "An explorer will supply accurate information back to us."  #<Ein Forscher wird uns genaue Informationen liefern.>  #NT!
 me_soodak_117.d: "The general will ensure they could defend themselves."  #<Der General wird dafür sorgen, dass sie sich verteidigen können.>  #NT!
 me_soodak_117.e: "A colonial administrator could extract more wealth out of our colony."  #<Ein Kolonialverwalter könnte mehr Reichtum aus unserer Kolonie herausholen.>  #NT!
 me_soodak_117.f: "A drunkard found in the middle of the street."  #<Ein Betrunkener wurde mitten auf der Straße gefunden.>  #NT!
  
 me_soodak_118_title: "Governor Received!"  #<Gouverneur empfangen!>  #NT!
 me_soodak_118_desc: "Our motherland has sent their most-qualified gubernatorial candidate available, who will now take up his position and share power with the Burgzhusa, thereby appeasing both monarchists and republicans."  #<Unser Mutterland hat seinen am besten geeigneten Gouverneurskandidaten geschickt, der nun seine Position übernehmen und die Macht mit der Burgzhusa teilen wird, wodurch sowohl Monarchisten als auch Republikaner besänftigt werden.>  #NT!
 me_soodak_118.a: "May we prosper under the motherland's guidance."  #<Mögen wir unter der Führung des Mutterlandes gedeihen.>  #NT!
  
  
  #Androphagian Expedition Event Chain 
 me_soodak_900_title: "Preparing the Expedition"  #<Vorbereitung der Expedition>  #NT!
 me_soodak_900_desc: "Though it was a particularly heated and divisive deliberation, now that we have decided to seek an audience with the mysterious and infamous Androphagi, we must send our courier to locate them and make contact. Such a long journey in these hazardous regions will require plenty of provisions and supplies, how much of our precious food supplies and resources do we allocate towards this expedition?"  #<Auch wenn es eine besonders hitzige und kontroverse Debatte war, müssen wir nun, da wir beschlossen haben, eine Audienz bei den mysteriösen und berüchtigten Androphagen zu suchen, unseren Kurier schicken, um sie ausfindig zu machen und Kontakt aufzunehmen. Eine so lange Reise in diese gefährlichen Regionen erfordert reichlich Proviant und Vorräte. Wie viel von unseren wertvollen Nahrungsmittelvorräten und Ressourcen stellen wir dieser Expedition zur Verfügung?>  #NT!
 me_soodak_900.a: "We will give them all the food, clothing, and money they require!"  #<Wir werden ihnen alles geben, was sie an Essen, Kleidung und Geld brauchen!>  #NT!
 me_soodak_900.b: "A year's worth of hardy provisions and extra sets of winter coats, nothing more."  #<Ein Jahr lang robuster Proviant und zusätzliche Sätze Wintermäntel, mehr nicht.>  #NT!
 me_soodak_900.c: "Winter clothing and six months of food and water"  #<Winterkleidung und sechs Monate lang Nahrung und Wasser>  #NT!
 me_soodak_900.d: "The delicate robes of nobles and one month of the most-luxurious food Soodak has to offer."  #<Die zarten Gewänder der Adligen und einen Monat lang das luxuriöseste Essen, das Soodak zu bieten hat.>  #NT!
 me_soodak_900.e: "Nothing except for the skins on their back."  #<Nichts außer den Häuten auf ihrem Rücken.>  #NT!
 me_soodak_900.f: "We will give them food alright, and a little gift for our soon-to-be friends..."  #<Wir werden ihnen gutes Essen geben und ein kleines Geschenk für unsere zukünftigen Freunde ...>  #NT!
 me_soodak_900_tt: "We will receive word from the expedition in a few months from now."  #<Wir werden in einigen Monaten Nachricht von der Expedition erhalten.>  #NT!
  
  
 me_soodak_901_title: "Demise of the Androphagi"  #<Untergang der Androphagen>  #NT!
 me_soodak_901_desc: "After months of searching, though our expedition was able to eventually locate the site our sources told was the mythical Androphagian heartland, unfortunately all that remains of this once-thriving settlement are the abandoned derelicts of huts, dark scorches of ash which scar and blight the land, and a distinctly-unpleasant tinge of human flesh permeating the bitter air. After scouting more deeply into the woods, foragers and stragglers were found in the vicinity, who regale that this was, in-fact, where the Androphagi once dwelt, but they were unexpectedly attacked by greater force, resulting in their complete destruction as a people. Seeing as these wanderers lacked a home and were adept at living off this accursed land, the leader of our expedition offered for them to join with us at Soodak, who will now doubtlessly prove invaluable in developing our own settlement."  #<Obwohl unsere Expedition nach monatelanger Suche schließlich den Ort ausfindig machen konnte, von dem unsere Quellen berichteten, dass es sich um das mythische Kernland der Androphagen handelte, sind von dieser einst blühenden Siedlung leider nur noch verlassene Hüttenruinen, dunkle Ascheflecken, die das Land vernarben und verunreinigen, und ein deutlich unangenehmer Hauch von Menschenfleisch, der die bittere Luft durchdringt, übrig geblieben. Nachdem sie den Wald tiefer erkundet hatten, wurden in der Nähe Sammler und Nachzügler gefunden, die erzählen, dass dies tatsächlich der Ort war, an dem die Androphagen einst lebten, aber sie wurden unerwartet von größerer Gewalt angegriffen, was zu ihrer völligen Zerstörung als Volk führte. Da diesen Wanderern kein Zuhause fehlte und sie geschickt darin waren, von diesem verfluchten Land zu leben, bot der Leiter unserer Expedition ihnen an, sich uns in Soodak anzuschließen, der sich nun zweifellos als unschätzbar wertvoll für die Entwicklung unserer eigenen Siedlung erweisen wird.>  #NT!
 me_soodak_901.a: "A disappointment, but not a complete loss."  #<Eine Enttäuschung, aber kein kompletter Verlust.>  #NT!
 me_soodak_901_tt: "3 $uralic_pantheon$, $androphagian$ $tribesmen$ will settle in the capital."  #<3 $uralic_pantheon$, $androphagian$ $tribesmen$ werden sich in der Hauptstadt niederlassen.>  #NT!
  
 me_soodak_902_title: "Expedition Gone Missing"  #<Expedition verschwunden>  #NT!
 me_soodak_902_desc: "Nearly a year has passed since our expedition set out in search of the Androphagi, but we still have not heard back from them, and they should have dispatched a messenger of some-kind by this point to inform us of their progress. There are fears in Soodak that they may have gotten lost, or even, that they may have run out of adequate provisions and died on the journey. There are many clamoring for us to send a follow-up expedition to try finding them before they starve, or at the very-least locate their bodies for a proper burial. What should we do?"  #<Fast ein Jahr ist vergangen, seit unsere Expedition sich auf die Suche nach den Androphagen machte, aber wir haben immer noch nichts von ihnen gehört, und sie hätten zu diesem Zeitpunkt schon einen Boten entsenden müssen, um uns über ihre Fortschritte zu informieren. In Soodak besteht die Befürchtung, dass sie sich verirrt haben könnten oder sogar, dass ihnen der ausreichende Proviant ausgegangen sein könnte und sie auf der Reise gestorben sein könnten. Viele fordern uns auf, eine Folgeexpedition zu schicken, um zu versuchen, sie zu finden, bevor sie verhungern, oder zumindest ihre Leichen für eine ordnungsgemäße Beerdigung ausfindig zu machen. Was sollen wir tun?>  #NT!
 me_soodak_902.a: "Send a follow-up expedition, we need to save our people while we still can!"  #<Schicken Sie eine Folgeexpedition, wir müssen unsere Leute retten, solange wir noch können!>  #NT!
 me_soodak_902.b: "They are too-far gone, there's no-way anybody could have survived."  #<Sie sind zu weit weg, niemand hätte überleben können.>  #NT!
  
 me_soodak_903_title: "Survivor Returns Home"  #<Überlebender kehrt nach Hause zurück>  #NT!
 me_soodak_903_desc: "Over a year ago, we sent an expedition deep into the far-reaches of Hyperborea, hoping to find the mythical tribe of the Androphagi. However, after it became apparent that the expedition had not returned, we assumed them to be dead, and didn't bother sending a follow-up team. Now, months later, during the middle of the night, a half-starved man crawled to the city gates, delirious, dehydrated, and terribly frost-bitten. After spending the night in the care of our most-esteemed shaman, he started to recover, and we were able to piece together his story. Apparently this man was a member of the ill-fated expedition, which had run into a particularly-bad blizzard, forcing them to shelter within a nearby cave. Unfortunately, the entrance was quickly snowed-in, trapping them for weeks, and were not sent with enough of the vital supplies to survive until the thaw. Perhaps a follow-up expedition could have helped break through the snow and ice, but one never came, and their desperate cries for help rang hollow; as a result, those unlucky-few who were still alive were forced to resort to cannibalism. Finally, the snow melted, and this survivor was able to wander through the woods alone and miraculously find his way back to Soodak alive."  #<Vor über einem Jahr schickten wir eine Expedition tief in die Weiten Hyperboreas, in der Hoffnung, den mythischen Stamm der Androphagen zu finden. Nachdem sich jedoch herausstellte, dass die Expedition nicht zurückgekehrt war, gingen wir davon aus, dass sie tot waren, und machten uns nicht die Mühe, ein Nachfolgeteam zu schicken. Jetzt, Monate später, kroch mitten in der Nacht ein halb verhungerter Mann im Delirium, dehydriert und schrecklich erfroren zum Stadttor. Nachdem er die Nacht in der Obhut unseres hochgeschätzten Schamanen verbracht hatte, begann er sich zu erholen und wir konnten seine Geschichte rekonstruieren. Anscheinend war dieser Mann ein Mitglied der unglücklichen Expedition, die in einen besonders schlimmen Schneesturm geraten war und sie gezwungen hatte, in einer nahegelegenen Höhle Zuflucht zu suchen. Leider war der Eingang schnell zugeschneit, so dass sie wochenlang darin eingeschlossen waren und nicht mit ausreichend lebenswichtigen Vorräten versorgt wurden, um bis zum Tauwetter zu überleben. Vielleicht hätte eine Folgeexpedition helfen können, den Schnee und das Eis zu durchbrechen, aber es kam nie eine, und ihre verzweifelten Hilferufe klangen hohl; Infolgedessen waren die wenigen Unglücklichen, die noch am Leben waren, gezwungen, auf Kannibalismus zurückzugreifen. Schließlich schmolz der Schnee und dieser Überlebende konnte allein durch den Wald wandern und auf wundersame Weise lebend nach Soodak zurückfinden.>  #NT!
 me_soodak_903.a: "Whoops."  #<Hoppla.>  #NT!
 #me_soodak_903.b: "As far as I am aware, he did conveniently perish just-before reaching the city."  #<Soweit mir bekannt ist, kam er praktischerweise um, kurz bevor er die Stadt erreichte.>  #NT!
 me_soodak_903.b: "A true tragedy, which none shall know about."  #<Eine wahre Tragödie, von der niemand etwas erfahren soll.>  #NT!
 me_soodak_903.c: "He can teach us the ways of consuming human flesh!"  #<Er kann uns lehren, wie man menschliches Fleisch verzehrt!>  #NT!
 me_soodak_903.d: "I feel absolutely horrible, I can only think of one way to make up for this..."  #<Ich fühle mich absolut schrecklich, mir fällt nur eine Möglichkeit ein, das wieder gut zu machen ...>  #NT!
 me_soodak_903_kindly_tt: "#R WARNING!#! Our current ruler will step down from leadership in favor of the survivor."  #<#R WARNUNG!#! Unser derzeitiger Herrscher wird zugunsten des Überlebenden von seiner Führung zurücktreten.>  #NT!
  
 me_soodak_904_title: "No Word Back From the Follow-up Team"  #<Keine Antwort vom Follow-up-Team>  #NT!
 me_soodak_904_desc: "Over a year ago, we sent an expedition deep into the far-reaches of Hyperborea, hoping to find the mythical tribe of the Androphagi. However, after it became apparent that the expedition had not returned, we sent a follow-up expedition in the hopes of locating any survivors. Unfortunately, the follow-up team has not returned either, leaving many to assume the worst and question your wisdom in sending yet-more people to die. Although we could send a third expedition, nobody in Soodak would be willing to volunteer for such an excursion, given recent history."  #<Vor über einem Jahr schickten wir eine Expedition tief in die Weiten Hyperboreas, in der Hoffnung, den mythischen Stamm der Androphagen zu finden. Nachdem sich jedoch herausstellte, dass die Expedition nicht zurückgekehrt war, schickten wir eine Folgeexpedition in der Hoffnung, Überlebende ausfindig zu machen. Leider ist auch das Nachfolgeteam nicht zurückgekehrt, sodass viele vom Schlimmsten ausgehen und Ihre Weisheit in Frage stellen, noch mehr Menschen in den Tod zu schicken. Obwohl wir eine dritte Expedition schicken könnten, wäre angesichts der jüngsten Geschichte niemand in Soodak bereit, sich freiwillig für eine solche Exkursion zu melden.>  #NT!
 me_soodak_904.a: "We will have to contact the Androphagi some other time, perhaps."  #<Wir müssen die Androphagen vielleicht ein andermal kontaktieren.>  #NT!
  
 me_soodak_905_title: "Survivors Found!"  #<Überlebende gefunden!>  #NT!
 me_soodak_905_desc: "Over a year ago, we sent an expedition deep into the far-reaches of Hyperborea, hoping to find the mythical tribe of the Androphagi. However, after it became apparent that the expedition had not returned, we sent a follow-up expedition in the hopes of locating any survivors. Fortunately, while they were patrolling a nearby cave which had been snowed-in, the follow-up team was able to hear cries for help from inside, and worked to break through the snow and ice to reach the survivors, who had run out of food and were considering resorting to cannibalism. They have been brought back, and though they did not find the Androphagi, have returned home as heroes, a shining example of Soodak determination, grit, and resourcefulness, reflecting greatly upon your decision-making and on our colony as a whole."  #<Vor über einem Jahr schickten wir eine Expedition tief in die Weiten Hyperboreas, in der Hoffnung, den mythischen Stamm der Androphagen zu finden. Nachdem sich jedoch herausstellte, dass die Expedition nicht zurückgekehrt war, schickten wir eine Folgeexpedition in der Hoffnung, Überlebende ausfindig zu machen. Während sie in einer nahegelegenen, eingeschneiten Höhle patrouillierten, konnte das Nachfolgeteam glücklicherweise Hilferufe aus dem Inneren hören und arbeitete daran, den Schnee und das Eis zu durchbrechen, um zu den Überlebenden zu gelangen, denen das Essen ausgegangen war und die über Kannibalismus nachdachten. Sie wurden zurückgebracht, und obwohl sie die Androphagi nicht gefunden haben, sind sie als Helden nach Hause zurückgekehrt, ein leuchtendes Beispiel für Soodak-Entschlossenheit, Mut und Einfallsreichtum, das sich stark auf Ihre Entscheidungsfindung und auf unsere Kolonie als Ganzes auswirkt.>  #NT!
 me_soodak_905.a: "We never leave our men behind!"  #<Wir lassen unsere Männer nie zurück!>  #NT!
  
 me_soodak_906_title: "Expedition Reaches the Androphagi"  #<Expedition erreicht die Androphagen>  #NT!
 me_soodak_906_desc: "We have received word our expedition has reached the Androphagi, and that a diplomatic breakthrough is close to being achieved! All that remains is a cultured dinner."  #<Wir haben die Nachricht erhalten, dass unsere Expedition die Androphagi erreicht hat und dass ein diplomatischer Durchbruch kurz vor dem Erreichen steht! Was bleibt, ist ein gepflegtes Abendessen.>  #NT!
 me_soodak_906.a: "Good news, our initiative bears fruit!"  #<Gute Nachrichten, unsere Initiative trägt Früchte!>  #NT!
  
 me_soodak_9071_title: "Strange Men from the Sea"  #<Seltsame Männer aus dem Meer>  #NT!
 me_soodak_9071_desc: "A group of strangely-dressed men arrived in the capital today claiming to be from a distant island called 'Soodak', seeking to treat with us and establish a 'dialogue' as the only-other tribe in Hyperborea. They bring no gifts of food, other then the meat which rests on their bones..."  #<Eine Gruppe seltsam gekleideter Männer traf heute in der Hauptstadt ein und gab an, von einer entfernten Insel namens „Soodak“ zu stammen, um mit uns zu verhandeln und einen „Dialog“ als einziger anderer Stamm in Hyperborea aufzubauen. Sie bringen keine Nahrungsgaben mit, außer dem Fleisch, das auf ihren Knochen ruht ...>  #NT!
 me_soodak_9072_title: "$me_soodak_9071_title$"  #<$me_soodak_9071_title$>  #NT!
 me_soodak_9072_desc: "A group of strangely-dressed men arrived in the capital today claiming to be from a distant island called 'Soodak', seeking to treat with us and establish a 'dialogue' as the only-other tribe in Hyperborea. They bring gifts of food to show their gratitude and their desire to establish a relationship, although they do smell good..."  #<Eine Gruppe seltsam gekleideter Männer traf heute in der Hauptstadt ein und gab an, von einer entfernten Insel namens „Soodak“ zu stammen, um mit uns zu verhandeln und einen „Dialog“ als einziger anderer Stamm in Hyperborea aufzubauen. Sie bringen Essensgeschenke mit, um ihre Dankbarkeit und den Wunsch zu zeigen, eine Beziehung aufzubauen, obwohl sie gut riechen ...>  #NT!
 me_soodak_9073_title: "$me_soodak_9071_title$"  #<$me_soodak_9071_title$>  #NT!
 me_soodak_9073_desc: "A group of strangely-dressed men arrived in the capital today claiming to be from a distant island called 'Soodak', seeking to treat with us and establish a 'dialogue' as the only-other tribe in Hyperborea. They bring gifts of some of their finest, richest food from their homeland to show their gratitude and their desire to establish a relationship, and though the food smells good, they smell better..."  #<Eine Gruppe seltsam gekleideter Männer traf heute in der Hauptstadt ein und gab an, von einer entfernten Insel namens „Soodak“ zu stammen, um mit uns zu verhandeln und einen „Dialog“ als einziger anderer Stamm in Hyperborea aufzubauen. Sie bringen einige ihrer feinsten und reichhaltigsten Lebensmittel aus ihrer Heimat als Geschenk mit, um ihre Dankbarkeit und ihren Wunsch zu zeigen, eine Beziehung aufzubauen, und obwohl das Essen gut riecht, riechen sie besser ...>  #NT!
 me_soodak_9074_title: "$me_soodak_9071_title$"  #<$me_soodak_9071_title$>  #NT!
 me_soodak_9074_desc: "A group of strangely-dressed men arrived in the capital today claiming to be from a distant island called 'Soodak', seeking to treat with us and establish a 'dialogue' as the only-other tribe in Hyperborea. Knowing our traditions well, they bring a fresh body for us to feast upon, much to the delight of our clan chiefs! However, do we also feast upon them as well?"  #<Eine Gruppe seltsam gekleideter Männer traf heute in der Hauptstadt ein und gab an, von einer entfernten Insel namens „Soodak“ zu stammen, um mit uns zu verhandeln und einen „Dialog“ als einziger anderer Stamm in Hyperborea aufzubauen. Da sie unsere Traditionen gut kennen, bringen sie uns einen frischen Körper, an dem wir uns erfreuen können, sehr zur Freude unserer Clanhäuptlinge! Aber schlemmen wir auch an ihnen?>  #NT!
 me_soodak_907.a: "A feast they shall be, with our legendary Androphagian hospitality..."  #<Ein Fest werden sie sein, mit unserer legendären androphagischen Gastfreundschaft ...>  #NT!
 me_soodak_907.b: "They can treat with us, provided they can stomach our stuffed-stomachs..."  #<Sie können mit uns behandeln, vorausgesetzt, sie vertragen unsere verstopften Mägen ...>  #NT!
 me_soodak_907.c: "We will go easy on them and avoid our favorite meal tonight."  #<Wir werden sie schonen und heute Abend auf unser Lieblingsessen verzichten.>  #NT!
  
 me_soodak_908_title: "Return of the Expedition"  #<Rückkehr der Expedition>  #NT!
 me_soodak_908_desc: "After our last progress-report, we had not heard from our expedition, and many were starting to worry that talks had gone south. That was until we received a curious messenger at our gates carrying a peculiar package. This man is a slave bound to the Androphagi, and reports that our team was treated to a dinner, where, after stuffing themselves with delectable venison and mushrooms, they became the main course! The Androphagi devoured them all on the spot, akin to a pack of ravenous dogs, save for a stuffed hand, which they have sent back as a message to let us know our people were 'treated well at the hands of their hosts,' adding that we 'are welcome to send more treats their way'."  #<Nach unserem letzten Fortschrittsbericht hatten wir nichts von unserer Expedition gehört und viele begannen sich Sorgen zu machen, dass die Gespräche fehlgeschlagen waren. Bis wir einen neugierigen Boten mit einem eigenartigen Paket an unseren Toren empfingen. Dieser Mann ist ein an die Androphagen gebundener Sklave und berichtet, dass unser Team zu einem Abendessen eingeladen wurde, bei dem sie, nachdem sie sich mit köstlichem Wildbret und Pilzen vollgestopft hatten, zum Hauptgericht wurden! Die Androphagen verschlangen sie alle auf der Stelle, wie ein Rudel gefräßiger Hunde, bis auf eine ausgestopfte Hand, die sie uns als Nachricht zurückschickten, um uns mitzuteilen, dass unsere Leute „von ihren Gastgebern gut behandelt“ wurden, und fügten hinzu, dass wir ihnen „gerne weitere Leckereien schicken können“.>  #NT!
 me_soodak_908.a: "Vile and bloodthirsty savages, they shall rue the day they crossed Soodak!"  #<Abscheuliche und blutrünstige Wilde, sie werden den Tag bereuen, an dem sie Soodak überquert haben!>  #NT!
 me_soodak_908.b: "By the 'hands' of their hosts, I like that one..."  #<Durch die „Hände“ ihrer Gastgeber gefällt mir das...>  #NT!
 me_soodak_908.c: "This means war!"  #<Das bedeutet Krieg!>  #NT!
 soodak_rash_war_tt: "#R WARNING!#! We will declare war on Androphagia."  #<#R WARNUNG!#! Wir werden Androphagia den Krieg erklären.>  #NT!
  
 me_soodak_909_title: "Return of the Expedition"  #<Rückkehr der Expedition>  #NT!
 me_soodak_909_desc: "After our last progress-report, we had not heard from our expedition, and many were starting to worry that talks had gone south. That was, however, until the delegation returned this morning. They say relations were established, and there is potential for a future alliance. However, they were forced to stomach a dish the Androphagi call 'stuffed-stomachs'..."  #<Nach unserem letzten Fortschrittsbericht hatten wir nichts von unserer Expedition gehört und viele begannen sich Sorgen zu machen, dass die Gespräche fehlgeschlagen waren. Das dauerte jedoch bis zur Rückkehr der Delegation heute Morgen. Sie sagen, die Beziehungen seien geknüpft worden und es bestehe Potenzial für eine zukünftige Allianz. Sie wurden jedoch gezwungen, ein Gericht zu verdauen, das die Androphagen „gestopfte Mägen“ nennen ...>  #NT!
 me_soodak_909.a: "They may be vile, but if we ever need aid, they might provide a hand..."  #<Sie mögen abscheulich sein, aber wenn wir jemals Hilfe brauchen, könnten sie uns helfen ...>  #NT!
 me_soodak_909.b: "Did they, by any chance, divulge the recipe?"  #<Haben sie das Rezept zufällig verraten?>  #NT!
  
 me_soodak_910_title: "Return of the Expedition"  #<Rückkehr der Expedition>  #NT!
 me_soodak_910_desc: "After our last progress-report, we had not heard from our expedition, and many were starting to worry that talks had gone south. That was, however, until the delegation returned this morning. They say relations were established, talks went exceptionally-well and there is potential for a future alliance. The Androphagians even refrained from consuming human flesh, knowing-well our 'sensitivities', as they so-kindly put it."  #<Nach unserem letzten Fortschrittsbericht hatten wir nichts von unserer Expedition gehört und viele begannen sich Sorgen zu machen, dass die Gespräche fehlgeschlagen waren. Das dauerte jedoch bis zur Rückkehr der Delegation heute Morgen. Sie sagen, die Beziehungen seien etabliert, die Gespräche verliefen außergewöhnlich gut und es bestehe Potenzial für eine zukünftige Allianz. Die Androphagier verzichteten sogar auf den Verzehr von Menschenfleisch, wohlwissend über unsere „Empfindlichkeiten“, wie sie es so freundlich ausdrückten.>  #NT!
 me_soodak_910.a: "Perhaps their reputation is undeserved."  #<Vielleicht ist ihr Ruf unverdient.>  #NT!
  
  
