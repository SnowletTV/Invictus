 ### MISSIONS  #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 01_soodak_missions: "The Accursed Lands"  #<Die verfluchten Länder>  #NT! 
 01_soodak_missions_DESCRIPTION: "Located far beyond the reaches of even the hardiest of barbarian tribes, the wild lands collectively referred to as '#E Hyperborea#!' are as vast as they are desolate, as cold as they are dark, and as inhospitable as any region known to man; even the sun god has begotten this accursed and wretched place. \n\nYet, in spite of all logic or reason, we have decided that here is the place our precious colony shall be established, upon which our futures, lives, and fate shall be bound. With those few natives brave enough to call this place home now teaching us their ways of survival and of the moon goddess, [GetDeityDefinition('omen_kuje').GetName], along with continued support from the motherland, we need not the sun god's blessing, nor his curses."  #<Die wilden Länder, die zusammenfassend als „#E Hyperborea#!'“ bezeichnet werden, liegen weit außerhalb der Reichweite selbst der härtesten Barbarenstämme und sind ebenso riesig wie trostlos, so kalt wie dunkel und so unwirtlich wie jede dem Menschen bekannte Region; Sogar der Sonnengott hat diesen verfluchten und elenden Ort erschaffen. \n\nDennoch haben wir trotz aller Logik und Vernunft beschlossen, dass hier der Ort ist, an dem unsere kostbare Kolonie gegründet werden soll, an den unsere Zukunft, unser Leben und unser Schicksal gebunden sein werden. Da diese wenigen Eingeborenen mutig genug sind, diesen Ort ihr Zuhause zu nennen, und uns jetzt ihre Überlebensmethoden und die Methoden der Mondgöttin [GetDeityDefinition('omen_kuje').GetName] beibringen, zusammen mit der anhaltenden Unterstützung des Mutterlandes, brauchen wir weder den Segen des Sonnengottes noch seine Flüche.>  #NT!
 01_soodak_missions_BUTTON_TOOLTIP: "At the edge of the world, we will survive and thrive."  #<Am Rande der Welt werden wir überleben und gedeihen.>  #NT!
 01_soodak_missions_BUTTON_DETAILS: ""
 01_soodak_missions_CRITERIA_DESCRIPTION: "The mission will be considered complete when we have become self-sufficient, colonized and developed the lands surrounding our island, and have forged our own identity."  #<Die Mission gilt als abgeschlossen, wenn wir autark geworden sind, das Land rund um unsere Insel kolonisiert und erschlossen und unsere eigene Identität geschmiedet haben.>  #NT!
  
 01_soodak_missions_task_1: "Securing The Food Supply"  #<Sicherung der Lebensmittelversorgung>  #NT!
 01_soodak_missions_task_1_DESC: "[GetProvince('(int32)9371').GetName|T], although rich in amber @amber!, is lacking in food supplies. We must have ample stores of food if we wish to endure the harsh winters.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<[GetProvince('(int32)9371').GetName|T], obwohl reich an Bernstein @amber!, mangelt es an Nahrungsmitteln. Wir müssen über ausreichend Vorräte an Nahrungsmitteln verfügen, wenn wir die harten Winter überstehen wollen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!
  
 01_soodak_missions_task_2: "The Shores Of Anoppi"  #<Die Küsten von Anoppi>  #NT!
 01_soodak_missions_task_2_DESC: "Though we have established stable stores of food on our amber-rich isle, it still leaves much to be desired, and across the sea lies a coastline whose waters are teeming with bountiful quantities of fish @fish!, at least for #G Hyperborean#! standards; by establishing a second settlement there, we will not only help to secure more food for our colony, but will also give us a foothold on the mainland.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!"  #<Obwohl wir auf unserer bernsteinreichen Insel stabile Vorräte an Nahrungsmitteln angelegt haben, lässt diese immer noch zu wünschen übrig, und auf der anderen Seite des Meeres liegt eine Küste, deren Gewässer von reichlichen Mengen an Fisch @fish! wimmeln, zumindest für #G Hyperborean#!-Verhältnisse; Durch die Errichtung einer zweiten Siedlung dort werden wir nicht nur dazu beitragen, mehr Nahrung für unsere Kolonie zu sichern, sondern uns auch einen Halt auf dem Festland verschaffen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil11!>  #NT!
 01_soodak_missions_2_reward_tt: "#Y 2#! pops will arrive from the mainland and will settle in [GetProvince('(int32)9373').GetName|T]."  #<#Y 2#! Menschen werden vom Festland kommen und sich in [GetProvince('(int32)9373').GetName|T] niederlassen.>  #NT!
  
 01_soodak_missions_task_3: "A Sea-Faring Fleet"  #<Eine Seeflotte>  #NT!
 01_soodak_missions_task_3_DESC: "[GetProvince('(int32)9371').GetName|T] is a glorious amber-mining @amber! colony positioned on the northernmost periphery of the known world, yet, we lack the infrastructure needed for ships to safely dock at our natural harbor, the port facilities to repair those which do come our way, and merchant vessels of our own when none others are brave enough to cross these latitudes, grievously hindering our economic potential.\n\nBy investing our rather-limited resources into a serviceable port and a fleet of simple transport ships, not-only shall we be able to draw more curious and wealthy visitors to our island, but we will have the capacity to send our own independent expeditions across the high seas and into uncharted river systems without relying on the motherland.\n\n\n\n\n\n\n\n\n\n\n@greek_mil18!"  #<[GetProvince('(int32)9371').GetName|T] ist ein herrlicher Bernsteinabbau @amber! Kolonie an der nördlichsten Peripherie der bekannten Welt, doch uns mangelt es an der nötigen Infrastruktur, damit Schiffe sicher an unserem natürlichen Hafen anlegen können, an Hafenanlagen, um diejenigen zu reparieren, die uns in den Weg kommen, und an eigenen Handelsschiffen, wenn niemand anderer den Mut hat, diese Breitengrade zu überqueren, was unser wirtschaftliches Potenzial erheblich beeinträchtigt.\n\nIndem wir unsere eher begrenzten Ressourcen in einen funktionsfähigen Hafen und eine Flotte einfacher Transportschiffe investieren, werden wir nicht nur in der Lage sein, mehr neugierige und wohlhabende Besucher auf unsere Insel zu locken, Aber wir werden die Fähigkeit haben, unsere eigenen unabhängigen Expeditionen über die hohe See und in unbekannte Flusssysteme zu schicken, ohne auf das Mutterland angewiesen zu sein.\n\n\n\n\n\n\n\n\n\n\n@greek_mil18!>  #NT!
  
 01_soodak_missions_task_4: "A Soodaker Sauna?"  #<Eine Soodaker-Sauna?>  #NT!
 01_soodak_missions_task_4_DESC: "It is very much cold on this island during the wintertime, often requiring adults to be heavily clothed at all times to avoid a freezing death, even within the confines of a protected shelter. However, the native #G Fennic#! peoples of the area have developed a unique innovation they call #Y 'saknas'#!, or 'saunas', in which heated rocks are placed in the center of a covered pit, and then cooled with water as to concoct a hot steam through which the air becomes saturated and engorged, inducing a state of relaxation among its residents and spreading a generous summertime warmth unlike any seen with a traditional hearth; in-fact, a heat so-generous as to allow those in attendance to strip naked and bare.\n\nThough many of our colonists are skeptical of such exotic and unsavory rituals associated with our barbarian neighbors, said-neighbors have lived here for millennia, and many of our people would yet benefit from having a warm bath once in awhile; by building public 'saunas' throughout our capital, people will be encouraged to adopt the practice, increasing the habitability of these wicked and wretched lands.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Im Winter ist es auf dieser Insel sehr kalt, weshalb Erwachsene oft immer schwer bekleidet sein müssen, um einen Erfrierungstod zu vermeiden, selbst innerhalb der Grenzen eines geschützten Schutzraums. Allerdings haben die einheimischen #G Fennic#! Völker der Region eine einzigartige Innovation entwickelt, die sie #Y „Saknas“#! oder „Saunen“ nennen. Dabei werden erhitzte Steine ​​in der Mitte einer abgedeckten Grube platziert und dann mit Wasser gekühlt, um einen heißen Dampf zu erzeugen, durch den die Luft gesättigt und angeschwollen wird, was bei den Bewohnern einen Zustand der Entspannung hervorruft und eine großzügige Sommerwärme verbreitet, wie man sie bei einem traditionellen Herd nicht kann; Tatsächlich ist die Hitze so großzügig, dass sich die Anwesenden nackt und nackt ausziehen können.\n\nObwohl viele unserer Kolonisten solchen exotischen und unappetitlichen Ritualen, die mit unseren barbarischen Nachbarn in Verbindung gebracht werden, skeptisch gegenüberstehen, leben diese Nachbarn schon seit Jahrtausenden hier, und viele unserer Leute würden immer noch davon profitieren, ab und zu ein warmes Bad zu nehmen; Durch den Bau öffentlicher „Saunen“ in unserer gesamten Hauptstadt werden die Menschen ermutigt, diese Praxis zu übernehmen und so die Bewohnbarkeit dieser bösen und elenden Länder zu erhöhen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
  
 01_soodak_missions_task_5: "Recruit Extra Settlers"  #<Rekrutiere zusätzliche Siedler>  #NT!
 01_soodak_missions_task_5_DESC: "Though our colony has achieved a remarkable degree of self-sufficiency, given our disposition, we suffer from a distinctive lack of people with which our meager successes can be enjoyed; by offering vague financial incentives and greatly-exaggerated promises of prosperity to those residing within the overcrowded cities of our motherland, we will expand upon our colonial bedrock, laying the foundation for more settlements beyond [GetProvince('(int32)9371').GetName|T] itself.\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!"  #<Obwohl unsere Kolonie aufgrund unserer Veranlagung ein bemerkenswertes Maß an Selbstversorgung erreicht hat, leiden wir unter einem deutlichen Mangel an Menschen, mit denen wir unsere mageren Erfolge genießen können; Indem wir denjenigen, die in den überfüllten Städten unseres Mutterlandes leben, vage finanzielle Anreize und stark übertriebene Wohlstandsversprechen bieten, werden wir unser koloniales Fundament erweitern und den Grundstein für weitere Siedlungen jenseits von [GetProvince('(int32)9371').GetName|T] selbst legen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!>  #NT!
 01_soodak_missions_task_5_tt: "Between #Y 3#! and #Y 12#! pops from the motherland will arrive on #Y Soodak#!."  #<Zwischen #Y 3#! und #Y 12#! werden Pops aus dem Mutterland am #Y Soodak#! eintreffen.>  #NT!
  
 01_soodak_missions_task_6: "An Insidious Scheme"  #<Ein heimtückischer Plan>  #NT!
 01_soodak_missions_task_6_DESC: "Many of our influential stakeholders have taken note that more settlers arrive during times of tension and strife within the homeland, the fear of persecution driving people to instead take their chances within our frozen wilderness. Though we are kith and kin to our motherland, given the tempting fact we benefit off of their misfortunes, some of our advisors have suggested a scheme so radical and insidious as to stir considerable controversy within the highest echelons of our colonial administration: We intentionally destabilize our overlord's society by funding agitators, dissedents, and pretenders to poke at various fault lines and areas of authority, as to make [GetProvince('(int32)9371').GetName|T] a more-attractive destination. The very thought is treasonous, and should we be caught at any stage of planning, the consequences would be swift as they would immense, yet, the rewards may be equally beneficial...\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!"  #<Viele unserer einflussreichen Interessenvertreter haben zur Kenntnis genommen, dass immer mehr Siedler in Zeiten von Spannungen und Unruhen im Heimatland ankommen und die Angst vor Verfolgung die Menschen dazu treibt, stattdessen ihr Risiko in unserer gefrorenen Wildnis einzugehen. Obwohl wir Freunde und Verwandte unseres Mutterlandes sind, haben einige unserer Berater angesichts der verlockenden Tatsache, dass wir von ihrem Unglück profitieren, einen Plan vorgeschlagen, der so radikal und heimtückisch ist, dass er erhebliche Kontroversen in den höchsten Rängen unserer Kolonialverwaltung auslöst: Wir destabilisieren absichtlich die Gesellschaft unseres Oberherrn, indem wir Agitatoren, Andersdenkende und Heuchler finanzieren, die an verschiedenen Bruchlinien und Autoritätsbereichen herumstochern, um [GetProvince('(int32)9371').GetName|T] a attraktiveres Reiseziel. Der bloße Gedanke ist verräterisch, und sollten wir in irgendeiner Phase der Planung erwischt werden, wären die Konsequenzen schnell und immens, doch die Belohnungen könnten ebenso vorteilhaft sein ...\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!>  #NT!
 01_soodak_missions_6_reward_tt: "We will have the chance to get 20-30 pops of our primary culture and religion."  #<Wir werden die Chance haben, 20 bis 30 Menschen unserer Hauptkultur und Religion kennenzulernen.>  #NT!
 01_soodak_missions_6_warning_tt: "#R WARNING!#! Should we be discovered, we will face extreme punishment."  #<#R WARNUNG!#! Sollten wir entdeckt werden, drohen uns schwere Strafen.>  #NT!
  
 01_soodak_missions_task_7: "Reinforce The Amber Supply"  #<Verstärken Sie die Bernsteinversorgung>  #NT!
 01_soodak_missions_task_7_DESC: "Our colony was primarily founded out of a desire to extract the precious amber @amber! teeming beneath the mud, yet, despite our best efforts, output has not reached levels matching expectations. Fortunately for us, there lies another amber deposit across the bay from the capital, ripe for settlement and exploitation.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Unsere Kolonie wurde in erster Linie aus dem Wunsch heraus gegründet, den kostbaren Bernstein @amber zu gewinnen! Es wimmelt im Schlamm, doch trotz unserer besten Bemühungen hat die Produktion nicht das Niveau erreicht, das den Erwartungen entspricht. Zum Glück für uns liegt auf der anderen Seite der Bucht der Hauptstadt ein weiteres Bernsteinvorkommen, das zur Besiedlung und Ausbeutung reif ist.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
 01_soodak_missions_7_reward_tt: "#Y 3#! pops will arrive from the mainland and will be distributed between [GetProvince('(int32)9374').GetName|T] and [GetProvince('(int32)9375').GetName|T]."  #<#Y 3#! Pops werden vom Festland ankommen und zwischen [GetProvince('(int32)9374').GetName|T] und [GetProvince('(int32)9375').GetName|T] verteilt.>  #NT!
  
 01_soodak_missions_task_8: "The Breadbasket Of Nato"  #<Der Brotkorb der Nato>  #NT!
 01_soodak_missions_task_8_DESC: "Though we have access to fish @fish! year-round, we import much of our food @grain! from abroad, and lack a backup plan in-case those networks were to be disrupted for a prolonged period.\n\nTo the east, the forests of [GetProvince('(int32)9378').GetName|T] are just-fertile enough to support the growing of sturdy grains during the summer, and the adjacent marsh of [GetProvince('(int32)9379').GetName|T] is quite adequate for the rearing of hardy livestock. Though not as agreeable a palette to those foreign imports, by establishing settlements in these territories, we will ensure more domestic food production, and perhaps facilitate expansion deeper into the interior.\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Allerdings haben wir Zugang zu Fisch @fish! Das ganze Jahr über importieren wir einen Großteil unserer Lebensmittel @grain! aus dem Ausland, und es fehlt ein Backup-Plan für den Fall, dass diese Netzwerke über einen längeren Zeitraum unterbrochen werden sollten.\n\nIm Osten sind die Wälder von [GetProvince('(int32)9378').GetName|T] gerade fruchtbar genug, um im Sommer den Anbau von kräftigem Getreide zu ermöglichen, und das angrenzende Sumpfgebiet von [GetProvince('(int32)9379').GetName|T] ist für die Aufzucht von robustem Vieh völlig ausreichend. Auch wenn dies keine so angenehme Palette für diese ausländischen Importe ist, werden wir durch die Errichtung von Siedlungen in diesen Gebieten eine stärkere heimische Nahrungsmittelproduktion sicherstellen und möglicherweise die Expansion tiefer ins Landesinnere erleichtern.\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
 01_soodak_missions_8_reward_tt: "#Y 2#! pops will arrive from the mainland and will be distributed between [GetProvince('(int32)9378').GetName] and [GetProvince('(int32)9379').GetName]."  #<#Y 2#! Pops werden vom Festland ankommen und zwischen [GetProvince('(int32)9378').GetName] und [GetProvince('(int32)9379').GetName] verteilt.>  #NT!
  
 01_soodak_missions_task_9: "The Northern Shore"  #<Die Nordküste>  #NT!
 01_soodak_missions_task_9_DESC: "The northern coastline is barely-habitable and not particularly lucrative, lacking both in amber @amber! and food @grain! supplies, and yet, it has the potential to reduce our reliance upon the motherland; the red clay of [GetProvince('(int32)9372').GetName|T] is particularly-suited for crafting earthenware @earthware! in which our wares can be stored, and the wild hemp @hemp! of [GetProvince('(int32)9377').GetName|T] can be cultivated for rope vital for masts and various constructions. By colonizing and developing the north today, we set ourselves up for a better tomorrow.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<Die Nordküste ist kaum bewohnbar und nicht besonders lukrativ, da es an Bernstein mangelt @amber! und Essen @grain! Versorgungsgüter, und doch hat es das Potenzial, unsere Abhängigkeit vom Mutterland zu verringern; Der rote Ton von [GetProvince('(int32)9372').GetName|T] eignet sich besonders für die Herstellung von Steingut @earthware! in dem unsere Waren gelagert werden können, und der Wildhanf @hemp! von [GetProvince('(int32)9377').GetName|T] kann für Seile angebaut werden, die für Masten und verschiedene Konstruktionen wichtig sind. Indem wir heute den Norden kolonisieren und entwickeln, bereiten wir uns auf eine bessere Zukunft vor.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!>  #NT!
  
 01_soodak_missions_task_10: "Our Home Secured"  #<Unser Zuhause gesichert>  #NT!
 01_soodak_missions_task_10_DESC: "After years of effort in colonizing the surrounding territories, establishing new outposts, and taming the vast wilderness of our new home, we have ceased being a tiny amber-mining @amber! island, and now find ourselves masters of the whole of #Y Ilmandu Superior#!, a shining beacon of civilization burning through the shroud of the ever-lasting winter darkness. Yet, in spite of our most-impressive achievement, we have opened the door to further expansion and conquest far beyond our motherland's vision and expectations.\n\n\n\n\n\n\n\n\n\n\n@italic_mil2!"  #<Nach jahrelangen Bemühungen, die umliegenden Gebiete zu kolonisieren, neue Außenposten zu errichten und die weite Wildnis unserer neuen Heimat zu zähmen, sind wir nicht mehr nur ein kleiner Bernsteinschürfer @amber! Insel, und finden uns nun als Herren von ganz #Y Ilmandu Superior#!, wieder, einem leuchtenden Leuchtfeuer der Zivilisation, das durch das Leichentuch der ewigen Winterfinsternis brennt. Doch trotz unserer beeindruckendsten Leistung haben wir die Tür zu einer weiteren Expansion und Eroberung geöffnet, die weit über die Vision und Erwartungen unseres Mutterlandes hinausgeht.\n\n\n\n\n\n\n\n\n\n\n@italic_mil2!>  #NT!
  
 01_soodak_missions_task_11: "The Timber Of Nooli"  #<Das Holz von Nooli>  #NT!
 01_soodak_missions_task_11_DESC: "Along the shores of #Y Lake Peipus#! lies a dense forest with plenty of hardy and disease-resistant wood @wood! to be harvested, perfect for constructing shelters, ships, and even firewood, along with sources of nutritious vegetables @vegetables! and leather-bearing game @wild_game! in the nearby vicinity. In claiming these interior lands, we lessen our need for reliance upon the motherland.\n\n\n\n\n\n\n\n\n\n\n@italic_mil7!"  #<Entlang der Ufer des #Y Peipussees#! liegt ein dichter Wald mit reichlich winterhartem und krankheitsresistentem Holz @wood! zum Ernten, perfekt für den Bau von Unterkünften, Schiffen und sogar Brennholz, zusammen mit Quellen für nahrhaftes Gemüse @vegetables! und ledertragendes Spiel @wild_game! in der näheren Umgebung. Indem wir diese inneren Länder beanspruchen, verringern wir unser Bedürfnis, uns auf das Mutterland zu verlassen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil7!>  #NT!
 01_soodak_missions_11_reward_tt: "#Y 3#! pops of our primary culture and religion will be distributed between [GetProvince('(int32)9382').GetName|T], [GetProvince('(int32)9380').GetName|T], and [GetProvince('(int32)9383').GetName|T]."  #<#Y 3#! Pops unserer primären Kultur und Religion werden zwischen [GetProvince('(int32)9382').GetName|T], [GetProvince('(int32)9380').GetName|T] und [GetProvince('(int32)9383').GetName|T] verteilt.>  #NT!
  
 01_soodak_missions_12: "Across The Peipus"  #<Über den Peipus>  #NT!
 01_soodak_missions_task_12_DESC: ""
  
 01_soodak_missions_task_13: "To The River Vain"  #<Zum Fluss Vain>  #NT!
 01_soodak_missions_task_13_DESC: "Though we have established a presence in #T Ilmandu Inferior#!, it is but a mere toehold over lands which are abundant in key resources, marginally warmer and more hospitable then our capital area, and, most importantly, run parallel to the #Y River Vain#!, a major trade artery which penetrates deep into #G Hyperborea#!. By claiming these lands, not only will we be able to exert our influence deeper into the wilderness, but we will be able to monopolize all Baltic-bound trade.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Obwohl wir in #T Ilmandu Inferior#!, eine Präsenz aufgebaut haben, handelt es sich dabei lediglich um einen Stützpunkt über Ländereien, die reich an wichtigen Ressourcen sind, geringfügig wärmer und gastfreundlicher als unser Hauptstadtgebiet und, was am wichtigsten ist, parallel zum #Y Fluss Vain#!, verlaufen, einer wichtigen Handelsader, die tief in #G Hyperborea#!. vordringt. Indem wir diese Ländereien beanspruchen, werden nicht nur wir es tun Wir werden in der Lage sein, unseren Einfluss tiefer in die Wildnis auszudehnen, aber wir werden in der Lage sein, den gesamten baltischen Handel zu monopolisieren.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
  
 01_soodak_missions_task_14: "Beyond The Velho"  #<Jenseits des Velho>  #NT!
 01_soodak_missions_task_14_DESC: "To the remote and vast east lies a river to which locals refer as the #Y 'Velho'#!, which they say leads beyond #G Hyperborea#! to the wild lands not yet known to civilization. Though it will be a costly endeavor, by establishing outposts in and around the lands surrounding this river, we will be able to establish trade networks with those lost to history, and perhaps set the stage for new expeditions beyond the tree line.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!"  #<Im abgelegenen und weiten Osten liegt ein Fluss, den die Einheimischen als #Y „Velho“#!, bezeichnen und der angeblich über #G Hyperborea#! hinaus in die wilden Länder führt, die der Zivilisation noch unbekannt sind. Obwohl es ein kostspieliges Unterfangen sein wird, werden wir durch die Errichtung von Außenposten in und um die Gebiete rund um diesen Fluss in der Lage sein, Handelsnetzwerke mit denen aufzubauen, die der Geschichte verloren gegangen sind, und vielleicht die Voraussetzungen für neue Expeditionen jenseits der Baumgrenze zu schaffen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!>  #NT!
  
 01_soodak_missions_task_15: "Turn To The Moon Goddess"  #<Wenden Sie sich an die Mondgöttin>  #NT!
 01_soodak_missions_task_15_DESC: "Though we have long-maintained our faith in our gods, given our hardship and struggles, some are beginning to question their faith in us, and in-particular of the sun-god, whose presence, or lack thereof, has led many to the conclusion he has cursed us. The #G Fennic#! tribesmen of this area, having lived here for generations, instead worship the moon goddess, [GetDeityDefinition('omen_kuje').GetName|G], whose presence, on the contrary, is plainly-visible during the long and deadly winter months, whom they claim shields their people from the greatest evils of the darkest nights; in-fact, her cult has now gained a following among our settlers, believing they too will gain her protection.\n\nThough this will spark uproar among our priests, who denounce such converts as misguided fools whose heresy will only further anger the sun-god, by formally embracing [GetDeityDefinition('omen_kuje').GetName|G] into our pantheon, perhaps we likewise will bask in her blessings.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Obwohl wir unseren Glauben an unsere Götter angesichts unserer Schwierigkeiten und Kämpfe lange aufrechterhalten haben, beginnen einige, ihren Glauben an uns in Frage zu stellen, insbesondere an den Sonnengott, dessen Anwesenheit oder Fehlen davon viele zu der Schlussfolgerung geführt hat, dass er uns verflucht hat. Die #G Fennic#! Stammesangehörigen dieser Gegend, die seit Generationen hier leben, verehren stattdessen die Mondgöttin [GetDeityDefinition('omen_kuje').GetName|G], deren Anwesenheit im Gegenteil während der langen und tödlichen Wintermonate deutlich sichtbar ist und von der sie behaupten, dass sie ihr Volk vor den größten Übeln der dunkelsten Nächte schützt; Tatsächlich hat ihr Kult mittlerweile eine Anhängerschaft unter unseren Siedlern gewonnen, die glauben, dass auch sie ihren Schutz erlangen werden.\n\nObwohl dies bei unseren Priestern Aufruhr auslösen wird, die solche Konvertiten als fehlgeleitete Narren verunglimpfen, deren Häresie den Sonnengott nur noch mehr verärgern wird, indem sie [GetDeityDefinition('omen_kuje').GetName|G] offiziell in unser Pantheon aufnehmen, werden wir uns vielleicht ebenfalls in ihr sonnen Segen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
 01_soodak_missions_task_15_tt: "Up to #Y 6#! pops in the capital will convert to #Y $uralic_pantheon$#!."  #<Bis zu #Y 6#! Einwohner in der Hauptstadt werden in #Y $uralic_pantheon$#! umgewandelt.>  #NT!
 01_soodak_missions_task_15_tt2: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_16$#!'#!"  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_16$#!'#!>  #NT!
  
 01_soodak_missions_task_16: "Reinforce The Old Gods"  #<Verstärke die alten Götter>  #NT!
 01_soodak_missions_task_16_DESC: "Though we have long-maintained our faith in our gods, given our hardship and struggles, some are beginning to question their faith in us, and in-particular of the sun-god, whose presence, or lack thereof, has led many to the conclusion he has cursed us. As a result, the heathen cult of [GetDeityDefinition('omen_kuje').GetName|G] has begun to spread among many of our colonists, disillusioned by destitution and misguided by false promises, whose heresy our priests warn will only further anger the sun-god; to ensure our salvation, we need to double-down and reinforce the traditional #E Germanic#! rites by offering extravagant sacrifices and indulging on great temples. Only then shall we make peace with our gods and lift this curse.\n\n\n\n\n\n\n\n\n\n\n@italic_mil16!"  #<Obwohl wir unseren Glauben an unsere Götter angesichts unserer Schwierigkeiten und Kämpfe lange aufrechterhalten haben, beginnen einige, ihren Glauben an uns in Frage zu stellen, insbesondere an den Sonnengott, dessen Anwesenheit oder Fehlen davon viele zu der Schlussfolgerung geführt hat, dass er uns verflucht hat. Infolgedessen hat sich der heidnische Kult von [GetDeityDefinition('omen_kuje').GetName|G] unter vielen unserer Kolonisten auszubreiten begonnen, die von der Armut desillusioniert und von falschen Versprechungen fehlgeleitet sind, deren Ketzerei, warnen unsere Priester, den Sonnengott nur noch mehr verärgern wird; Um unsere Erlösung sicherzustellen, müssen wir die traditionellen #E germanischen#! Riten verdoppeln und stärken, indem wir extravagante Opfer darbringen und großen Tempeln frönen. Nur dann werden wir Frieden mit unseren Göttern schließen und diesen Fluch aufheben.\n\n\n\n\n\n\n\n\n\n\n@italic_mil16!>  #NT!
 01_soodak_missions_task_16_tt: "The capital has a #Y $temple_building$#! building."  #<Die Hauptstadt hat ein #Y $temple_building$#! Gebäude.>  #NT!
 01_soodak_missions_task_16_tt3: "We have at least two #Y $library_building$#! buildings within one of our cities."  #<Wir haben mindestens zwei #Y $library_building$#! Gebäude in einer unserer Städte.>  #NT!
 01_soodak_missions_task_16_tt2: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_15$#!'#!"  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_15$#!'#!>  #NT!
  
 01_soodak_missions_task_17: "Request Financial Aid"  #<Fordern Sie finanzielle Unterstützung an>  #NT!
 01_soodak_missions_task_17_DESC: "We are a proud colony which has managed to achieve stability, both political and financial, as well as secure borders. It is only-fitting that we request financial aid from our generous motherland, as a reward for our efforts and such that we may endeavor to grow further.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Wir sind eine stolze Kolonie, die es geschafft hat, sowohl politische als auch finanzielle Stabilität sowie sichere Grenzen zu erreichen. Es ist nur passend, dass wir unser großzügiges Mutterland um finanzielle Unterstützung bitten, als Belohnung für unsere Bemühungen und damit wir uns bemühen können, weiter zu wachsen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 01_soodak_missions_task_17_tt: "We will have the option ask our overlord for a financial boon, either #Y 50#!, #Y 250#!, or #Y 500#! gold, but the more we request, the less-likely they are to oblige."  #<Wir haben die Möglichkeit, unseren Oberherrn um einen finanziellen Segen zu bitten, entweder #Y 50#!, #Y 250#!, oder #Y 500#! Gold, aber je mehr wir verlangen, desto unwahrscheinlicher ist es, dass er uns dazu verpflichtet.>  #NT!
  
 01_soodak_missions_task_18: "The Ultimate Sacrifice"  #<Das ultimative Opfer>  #NT!
 01_soodak_missions_task_18_DESC: "We have appeased the #T Sun-God#! for now, yet, our priests inform us to truly rid ourselves of this wretched curse, we must spread genuine zeal and passionate belief among the native inhabitants of these surrounding lands, akin to a forest of ignorance set aflame with the light of knowledge and understanding. Though many may profess loyalty to the gods in one hand, in the other, they still follow the spirits of their ancestors. To prove the worthiness of our gods over those of all others within the hearts and minds of these tribesmen, from now until Ragnarok, there can only be one way; our leadership undertaking the ultimate sacrifice, setting an honorable example for those, both now and in the future, to emulate during times of great crisis.\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!"  #<Wir haben den #T Sonnengott#! vorerst besänftigt, doch unsere Priester sagen uns, dass wir, um uns wirklich von diesem elenden Fluch zu befreien, echten Eifer und leidenschaftlichen Glauben unter den Ureinwohnern dieser umliegenden Länder verbreiten müssen, ähnlich einem Wald der Unwissenheit, der mit dem Licht des Wissens und des Verständnisses entzündet wird. Obwohl viele einerseits ihre Treue zu den Göttern bekennen, folgen sie andererseits dennoch den Geistern ihrer Vorfahren. Um die Würdigkeit unserer Götter gegenüber denen aller anderen in den Herzen und Gedanken dieser Stammesangehörigen zu beweisen, kann es von jetzt an bis Ragnarok nur einen Weg geben; Unsere Führung bringt das höchste Opfer auf sich und gibt ein ehrenvolles Beispiel für alle, denen sie jetzt und in Zukunft in Zeiten großer Krisen nacheifern können.\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!>  #NT!
 01_soodak_missions_task_18_tt: "#R WARNING!#! Either our #Y Ruler#! or #Y High Priest#! will be sacrificed to appease the #T Sun-God#!."  #<#R WARNUNG!#! Entweder unser #Y Herrscher#! oder unser #Y Hohepriester#! werden geopfert, um den #T Sonnengott#! zu besänftigen.>  #NT!
 01_soodak_missions_task_18_tt2: "Has greater then or equal to #Y 60#! religious unity."  #<Hat mehr als oder gleich #Y 60#! religiöse Einheit.>  #NT!
  
 01_soodak_missions_task_19: "Intertwine With The Mainland"  #<Verflechten Sie sich mit dem Festland>  #NT!
 01_soodak_missions_task_19_DESC: "Though we may have had differences in the past, our overlord remains our generous protector and sovereign, whose vastly superior strength, both military and economic, is better engaged with as a friend and partner, rather then as a competitor; thus, it is in our natural interests to better-link our economies by investing into our market centers and reducing restrictions on foreign imports, thereby benefiting both parties in a mutual fashion.\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!"  #<Auch wenn wir in der Vergangenheit Differenzen hatten, bleibt unser Oberherr unser großzügiger Beschützer und Souverän, dessen weit überlegene Stärke, sowohl militärisch als auch wirtschaftlich, besser als Freund und Partner denn als Konkurrent eingesetzt werden sollte; Daher liegt es in unserem natürlichen Interesse, unsere Volkswirtschaften besser zu vernetzen, indem wir in unsere Marktzentren investieren und die Beschränkungen für ausländische Importe verringern, was beiden Parteien gleichermaßen zugute kommt.\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!>  #NT!
 01_soodak_missions_task_19_tt: "#R This task is mutually-exclusive with '#T Decouple From The Mainland#!'#!."  #<#R Diese Aufgabe schließt sich gegenseitig aus mit „#T Vom Festland abkoppeln#!'#!.“.>  #NT!
  
 01_soodak_missions_task_20: "Purchase Gutinland"  #<Kaufen Sie Gutinland>  #NT!
 01_soodak_missions_task_20_DESC: "As our colony becomes more intertwined with the mainland, the line between [GetProvince('(int32)9371').GetName|T] and #G Germania#! becomes blurred, akin to a heavy morning fog hanging above the water and beneath the sky. In this regard, we are less a vassal then autonomous province, existing to aid our overlord in administering these far-flung lands.\n\nThough outside our designated region, the island of [GetProvince('(int32)6010').GetName|T] lies closer to our capital then to our motherland's, which would allow us to exert more control over it, and thus, reap more taxes from it, not to mention the increased trade we would bring throughout the Baltic. Perhaps we could sway Germania to cede this island to our administration and allow us to govern in their name.\n\n\n\n\n\n\n\n\n\n\n@greek_mil21!"  #<Während unsere Kolonie immer stärker mit dem Festland verflochten wird, verschwimmt die Grenze zwischen [GetProvince('(int32)9371').GetName|T] und #G Germania#!, ähnlich einem dichten Morgennebel, der über dem Wasser und unter dem Himmel hängt. In dieser Hinsicht sind wir weniger ein Vasall als vielmehr eine autonome Provinz, die dazu da ist, unserem Oberherrn bei der Verwaltung dieser weit entfernten Länder zu helfen.\n\nAuch wenn die Insel [GetProvince('(int32)6010').GetName|T] außerhalb unserer ausgewiesenen Region liegt, liegt sie näher an unserer Hauptstadt als an der unseres Mutterlandes, was es uns ermöglichen würde, mehr Kontrolle über sie auszuüben und somit mehr Steuern von ihr zu ernten, ganz zu schweigen von dem gesteigerten Handel, den wir im gesamten Baltikum bewirken würden. Vielleicht könnten wir Germania dazu bewegen, diese Insel unserer Verwaltung zu überlassen und uns zu erlauben, in ihrem Namen zu regieren.\n\n\n\n\n\n\n\n\n\n\n@greek_mil21!>  #NT!
 01_soodak_missions_task_20_tt: "We will attempt to purchase the island of #Y [GetProvince('(int32)6010').GetName|T]#! from our overlord."  #<Wir werden versuchen, die Insel #Y [GetProvince('(int32)6010').GetName|T]#! von unserem Oberherrn zu kaufen.>  #NT!
 01_soodak_missions_task_20_tt2: "The capital of our overlord is not on #Y [GetProvince('(int32)6010').GetName|T]#!."  #<Die Hauptstadt unseres Overlords liegt nicht auf #Y [GetProvince('(int32)6010').GetName|T]#!.>  #NT!
  
 01_soodak_missions_task_21: "Request Military Advisors"  #<Fordern Sie Militärberater an>  #NT!
 01_soodak_missions_task_21_DESC: "Though our militia has served us well along the frontier, to have a force truly capable of supporting the motherland during a time of crisis, we need to reform our collection of rag-tag forces into a true standing army; to that end, by requesting some of the finest military advisors from our overlords, we will be able to lean on their experience gained through years of warfare and gain access cutting-edge tactics for the battlefields of tomorrow.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"  #<Auch wenn uns unsere Miliz entlang der Grenze gute Dienste geleistet hat, müssen wir, um über eine Truppe zu verfügen, die wirklich in der Lage ist, das Mutterland in Krisenzeiten zu unterstützen, unsere zusammengewürfelte Truppe in eine echte stehende Armee umwandeln; Zu diesem Zweck können wir, indem wir einige der besten Militärberater unserer Oberherren anfordern, auf deren Erfahrung aus jahrelanger Kriegsführung zurückgreifen und Zugang zu modernsten Taktiken für die Schlachtfelder von morgen erhalten.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!>  #NT!
 01_soodak_missions_task_21_tt: "We will receive a high-martial general."  #<Wir werden einen hochkarätigen General empfangen.>  #NT!
 01_soodak_missions_task_21_tt2: "We have at least one #Y $military_building$#! building."  #<Wir haben mindestens ein #Y $military_building$#! Gebäude.>  #NT!
  
 01_soodak_missions_task_22: "The Amber Boom"  #<Der Amber-Boom>  #NT!
 01_soodak_missions_task_22_DESC: "The amber @amber! mined from [GetProvince('(int32)9371').GetName|T] is the pride of our administration, its vibrant-orange crystal among the finest from anywhere found in the world, and yet, even with plenty of investment, there still remains plenty more to mine and refine. Our financial advisors speculate that with its unrivaled popularity back home, there is potential for an #Y 'Amber Boom'#!, so to speak, if only we were to kickstart it through constructing an initial quantity of foundries, thereby attracting wealthier businessmen from the mainland to run them, who in-turn, would import more workers to dredge more of this incredibly-valuable substance to refine and sell abroad. It is a cyclical cycle of profit and wealth just waiting at our fingertips.\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!"  #<Der Bernstein @amber! Der aus [GetProvince('(int32)9371').GetName|T] abgebaute Stein ist der Stolz unserer Verwaltung, sein leuchtend orangefarbener Kristall gehört zu den feinsten, die man auf der ganzen Welt finden kann, und dennoch gibt es trotz umfangreicher Investitionen noch viel mehr abzubauen und zu veredeln. Unsere Finanzberater spekulieren, dass aufgrund seiner unübertroffenen Beliebtheit im eigenen Land das Potenzial für einen #Y „Bernsteinboom“#!, sozusagen besteht, wenn wir ihn nur durch den Bau einer ersten Anzahl von Gießereien ankurbeln und dadurch wohlhabendere Geschäftsleute vom Festland anlocken würden, die sie leiten, die wiederum mehr Arbeitskräfte importieren würden, um mehr von dieser unglaublich wertvollen Substanz zu gewinnen, um sie zu raffinieren und im Ausland zu verkaufen. Es ist ein zyklischer Kreislauf von Profit und Reichtum, der nur darauf wartet, an unseren Fingerspitzen zu liegen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!>  #NT!
 01_soodak_missions_task_22_tt: "We will gain #Y 10#! pops in every #Y $amber$#!-producing territory or city we own."  #<Wir werden #Y 10#! Einwohner in jedem #Y $amber$#! produzierenden Territorium oder jeder Stadt, die wir besitzen, gewinnen.>  #NT!
  
 01_soodak_missions_task_23: "The Crown Jewel Of Germania"  #<Das Kronjuwel Germaniens>  #NT!
 01_soodak_missions_task_23_DESC: "Generations ago, we began as a wayward colony, a backwater whose only purpose was to mine and harvest amber @amber! for our overlords, in terrain too treacherous to do themselves. Through our successes, we came to dominate the market, and drawing an influx of settlers, grew in mirror of our homeland, with the government being organized according to a civilized fashion, cities erect in the wilderness, and the vicious barbarians pacified; a glassy reflection, tinted a precious orange. As we have continued to intertwine our economy, diplomacy, and lives with that of our overlords, we have gained a deserved reputation for trustworthiness and loyalty, an extension of #G Germania#! itself, and through our wealth, a title by which we have been affectionately awarded: the crown jewel of the empire.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Vor Generationen begannen wir als eigensinnige Kolonie, ein Rückstau, dessen einziger Zweck darin bestand, Bernstein abzubauen und zu ernten @amber! für unsere Oberherren, in einem Gelände, das zu tückisch ist, um es selbst zu tun. Durch unsere Erfolge dominierten wir den Markt und zogen einen Zustrom von Siedlern an. Wir wuchsen im Spiegel unseres Heimatlandes, wobei die Regierung nach einer zivilisierten Art und Weise organisiert wurde, Städte in der Wildnis errichtet wurden und die bösartigen Barbaren besänftigt wurden. eine glasige Reflexion, getönt von einem kostbaren Orange. Da wir unsere Wirtschaft, Diplomatie und unser Leben weiterhin mit dem unserer Oberherren verknüpfen, haben wir uns einen verdienten Ruf für Vertrauenswürdigkeit und Loyalität erworben, eine Erweiterung von #G Germania#! selbst, und durch unseren Reichtum einen Titel, der uns liebevoll verliehen wurde: das Kronjuwel des Imperiums.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
  
 01_soodak_missions_task_24: "Decouple From The Mainland"  #<Entkoppeln Sie sich vom Festland>  #NT!
 01_soodak_missions_task_24_DESC: "Though few are willing to discuss the topic in public, our current arrangement with the motherland is increasingly untenable, who does right by us on occasion, but increasingly imposes harsher taxes upon our people, while conversely further-neglecting our needs. Independency, as some have argued, is still a step too far, yet, we should begin the process of decoupling ourselves from the mainland, so should the worst come to to pass, we will be prepared.\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!"  #<Auch wenn nur wenige bereit sind, das Thema öffentlich zu diskutieren, wird unser derzeitiges Abkommen mit dem Mutterland immer unhaltbarer, das zwar gelegentlich das Richtige tut, unserem Volk aber immer höhere Steuern auferlegt, während es umgekehrt unsere Bedürfnisse noch weiter vernachlässigt. Die Unabhängigkeit ist, wie einige argumentiert haben, immer noch ein Schritt zu weit, dennoch sollten wir damit beginnen, uns vom Festland abzukoppeln. Sollte also das Schlimmste eintreten, werden wir vorbereitet sein.\n\n\n\n\n\n\n\n\n\n\n@celt_mil17!>  #NT!
 01_soodak_missions_task_24_tt: "We are not importing any trade goods from our overlord."  #<Wir importieren keine Handelswaren von unserem Oberherrn.>  #NT!
 01_soodak_missions_task_24_tt2: "#R This task is mutually-exclusive with '#T Intertwine With The Mainland#!'#!."  #<#R Diese Aufgabe schließt sich gegenseitig aus mit „#T Intertwine With The Mainland#!'#!.“.>  #NT!
  
 01_soodak_missions_task_25: "Reform The Militia"  #<Reform der Miliz>  #NT!
 01_soodak_missions_task_25_DESC: "Our militia has served us well along the frontier, yet, our collection of rag-tag forces is hardly in-shape to contend with the might of the #G Germanic Empire#!, whose home-made shields and old, rusty swords would get smashed to pieces by the disciplined legions of the latter. We need a man with a plan, and fortunately for us, our contacts tell us of a capable general from [GetProvince('(int32)3967').GetName|T], who, after being pushed out of the Germanic military by an influential rival, is willing and able to serve our cause.\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!"  #<Unsere Miliz hat uns entlang der Grenze gute Dienste geleistet, doch unsere zusammengewürfelte Truppe ist kaum in der Lage, mit der Macht des #G Germanischen Reiches#!, zu konkurrieren, dessen selbstgemachte Schilde und alte, rostige Schwerter von den disziplinierten Legionen des letzteren in Stücke gerissen würden. Wir brauchen einen Mann mit einem Plan, und zum Glück erzählen uns unsere Kontakte von einem fähigen General aus [GetProvince('(int32)3967').GetName|T], der, nachdem er von einem einflussreichen Rivalen aus dem germanischen Militär verdrängt wurde, bereit und in der Lage ist, unserer Sache zu dienen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!>  #NT!
 01_soodak_missions_task_25_tt: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_27$#!'#!."  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_27$#!'#!.>  #NT!
  
 01_soodak_missions_task_26: "Embrace The $uralic_pantheon$ Pantheon"  #<Umarmen Sie das $uralic_pantheon$ Pantheon>  #NT!
 01_soodak_missions_task_26_DESC: "With the #T Moon Goddess#!' blessings, despite the priests' misgivings, our people have prospered beyond what many would have deemed possible years prior, with fertile rains during summertime blessing our harvests, and the howling winter storms causing less damage. The old order maintains that these are merely coincidences, but the people have long-lost confidence in them and the gods they claim to represent; by sweeping away the archaic and corrupted priesthood with men who have a genuine connection with the true gods, we will ensure prosperity for our people, and crush this curse.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!"  #<Mit den Segnungen der #T Mondgöttin#!' ist unser Volk trotz der Bedenken der Priester über das hinaus gediehen, was viele Jahre zuvor für möglich gehalten hätten, mit fruchtbaren Regenfällen im Sommer, die unsere Ernten beglückten, und den heulenden Winterstürmen, die weniger Schaden verursachten. Die alte Ordnung behauptet, dies seien bloße Zufälle, aber die Menschen haben schon lange das Vertrauen in sie und die Götter verloren, die sie angeblich repräsentieren; Indem wir das archaische und korrupte Priestertum mit Männern hinwegfegen, die eine echte Verbindung zu den wahren Göttern haben, werden wir Wohlstand für unser Volk sichern und diesen Fluch zerschlagen.\n\n\n\n\n\n\n\n\n\n\n@event_pic13!>  #NT!
 01_soodak_missions_task_26_tt: "We have at least #Y 2#! $uralic_pantheon$ deities in our pantheon."  #<Wir haben mindestens #Y 2#! $uralic_pantheon$ Gottheiten in unserem Pantheon.>  #NT!
  
 01_soodak_missions_task_27: "Enlarge The Militia"  #<Vergrößern Sie die Miliz>  #NT!
 01_soodak_missions_task_27_DESC: "Our militia has served us well along the frontier, and though it is inferior in quality to many of the great armies around the world, realistically, that is a perfection we will never be able to match. Therefore, it is logical to invest into quantity, and by allowing citizens of all ages and fitness to answer the call to war, we will be able to eek the most from our countryside, and without a standing army, we shall ease concerns of an independent government abusing its power.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!"  #<Unsere Miliz hat uns entlang der Grenze gute Dienste geleistet, und obwohl sie in ihrer Qualität vielen der großen Armeen auf der ganzen Welt unterlegen ist, ist das realistisch gesehen eine Perfektion, die wir niemals erreichen können. Daher ist es logisch, in Quantität zu investieren, und indem wir es Bürgern jeden Alters und jeder Fitness ermöglichen, dem Ruf zum Krieg zu folgen, können wir das Beste aus unserem Land herausholen, und ohne ein stehendes Heer werden wir die Bedenken zerstreuen, dass eine unabhängige Regierung ihre Macht missbraucht.\n\n\n\n\n\n\n\n\n\n\n@celt_mil5!>  #NT!
 01_soodak_missions_task_27_tt: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_25$#!'#!"  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_25$#!'#!>  #NT!
  
 01_soodak_missions_task_28: "Incorporate Native Knowledge"  #<Integrieren Sie natives Wissen>  #NT!
 01_soodak_missions_task_28_DESC: "The #G Fennic#! peoples have lived in this land for generations, and therefore are quite knowledgeable about this terrain, with information of where wild berries grow during times of scarcity, where wild animals reside, and the best spots in which to set traps for world-be conquerors. By incorporating and learning from the strategies of our allies, we will make the enemy fight for every inch of snow.\n\n\n\n\n\n\n\n\n\n\n@persia_mil17!"  #<Die #G Fennic#!-Völker leben seit Generationen in diesem Land und kennen sich daher gut mit diesem Gebiet aus. Sie wissen, wo in Zeiten der Knappheit wilde Beeren wachsen, wo sich wilde Tiere aufhalten und an welchen Stellen sich am besten Fallen für angehende Welteroberer aufstellen lassen. Indem wir die Strategien unserer Verbündeten integrieren und daraus lernen, werden wir den Feind dazu bringen, um jeden Zentimeter Schnee zu kämpfen.\n\n\n\n\n\n\n\n\n\n\n@persia_mil17!>  #NT!
  
 01_soodak_missions_task_29: "A Germano-Fennic Union"  #<Eine deutsch-fennische Union>  #NT!
 01_soodak_missions_task_29_DESC: "Our relationship with the #G Fennic#! people has not always been an easy one, however, now that we worship the same gods and follow the same spirits, many across both sides of the isle starting to see that we share more similarities then differences, especially in regards to our mutual grievences against the overlord. With no clear-cut divisors after generations of intermixing, it is becoming harder to differentiate between #G Germanic#! and Fennic, particularly under the faint rays of [GetDeityDefinition('omen_kuje').GetName|G] blessed moonlight. Therefore, for the future perserverence of our colony, it is only fitting we recognize the situation on the ground, and formally abolish the remaining legal distinctions between our two peoples, creating a more-perfect union.\n\n\n\n\n\n\n\n\n\n\n@italic_mil11!"  #<Unsere Beziehung zum Volk der #G Fennic#! war nicht immer einfach, doch jetzt, da wir dieselben Götter verehren und denselben Geistern folgen, beginnen viele auf beiden Seiten der Insel zu erkennen, dass wir mehr Gemeinsamkeiten als Unterschiede haben, insbesondere im Hinblick auf unsere gegenseitigen Beschwerden gegen den Oberherrn. Da nach Generationen der Vermischung keine eindeutigen Teiler mehr vorhanden sind, wird es immer schwieriger, zwischen #G Germanisch#! und Fennisch zu unterscheiden, insbesondere unter den schwachen Strahlen des [GetDeityDefinition('omen_kuje').GetName|G] gesegneten Mondlichts. Daher ist es für den künftigen Fortbestand unserer Kolonie nur angemessen, dass wir die Situation vor Ort anerkennen und die verbleibenden rechtlichen Unterschiede zwischen unseren beiden Völkern offiziell abschaffen und so eine perfektere Union schaffen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil11!>  #NT!
 01_soodak_missions_task_29_tt: "#Y $fennic$#! culture has #Y $nobles$#! rights."  #<#Y $fennic$#! Kultur hat #Y $nobles$#! Rechte.>  #NT!
 01_soodak_missions_task_29_tt2: "All primary-culture characters from the Ruler's family will convert to #G $fennic$#! culture."  #<Alle Charaktere der Primärkultur aus der Familie des Herrschers werden zur Kultur #G $fennic$#! konvertieren.>  #NT!
  
 01_soodak_missions_task_30: "The Lands Of Joki"  #<Die Länder von Joki>  #NT!
 01_soodak_missions_task_30_DESC: "At first glance, there is not much to say about the lands of #T $joki_area$#!, with its thick forests and dense swamps making habitation less-then ideal. However, our scouts report it sits at a critical juncture between the rivers #Y Velho#! and #Y Vain#!, an area of vital strategic importance, given our holdings in both of those provinces; in colonizing this wild land, we will not only guarantee strategic autonomy for our eastern territories, but also facilitate our administration therein.\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!"  #<Auf den ersten Blick gibt es nicht viel zu sagen über das Land von #T $joki_area$#!, mit seinen dichten Wäldern und dichten Sümpfen, was die Besiedlung alles andere als ideal macht. Unsere Späher berichten jedoch, dass es sich an einem kritischen Knotenpunkt zwischen den Flüssen #Y Velho#! und #Y Vain#!, befindet, einem Gebiet von entscheidender strategischer Bedeutung, wenn man bedenkt, dass wir in beiden Provinzen Besitzungen haben; Durch die Kolonisierung dieses wilden Landes werden wir nicht nur die strategische Autonomie unserer östlichen Gebiete garantieren, sondern auch unsere Verwaltung darin erleichtern.\n\n\n\n\n\n\n\n\n\n\n@celt_mil8!>  #NT!
 01_soodak_missions_task_30_tt: "We will receive the following modifier in the provinces of #Y $ilmandu_inferior_area$#!, #Y $velho_area$#!, and #Y $joki_area$#!:"  #<Den folgenden Modifikator erhalten wir in den Provinzen #Y $ilmandu_inferior_area$#!, #Y $velho_area$#!, und #Y $joki_area$#!:>  #NT!
  
 01_soodak_missions_task_31: "Mercenary Contacts"  #<Söldnerkontakte>  #NT!
 01_soodak_missions_task_31_DESC: "With rising tensions, there are concerns it will boil over sooner rather then later. Therefore, would be wise to save money and make contacts with potential swords for hire now, rather then scrambling at the last minute and having to pay more with less gold available.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!"  #<Angesichts der zunehmenden Spannungen besteht die Sorge, dass es eher früher als später zu einem Überkochen kommen wird. Deshalb wäre es ratsam, jetzt Geld zu sparen und Kontakte zu potentiellen Schwertern zu knüpfen, anstatt in letzter Minute zu kämpfen und mit weniger verfügbarem Gold mehr bezahlen zu müssen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!>  #NT!
  
 01_soodak_missions_task_32: "A Declaration Of Independence"  #<Eine Unabhängigkeitserklärung>  #NT!
 01_soodak_missions_task_32_DESC: "We were founded as an amber-mining @amber! colony on the edge of the world, far-removed from civilization. We thrived where it was thought impossible, established new settlements in the ice-forests, and achieved self-sufficiency in the snow. However, jealous of our successes, our motherland grew increasingly ambivalent towards its child, repeatedly interfering within our domestic affairs unrequested, raising taxes to unreasonable levels without our consent, and repeatedly neglecting our needs during times of hardship.\n\nWe as much as anybody would be happy and proud participants of our #G Germanic Empire#!, our bonds of kinship standing strong across the sea as we would seek to grow together in a mutual fashion, yet, it is our tyrannical masters who have chosen this reckless path, casting us as backwaters and outcasts, unworthy of the same rights and privileges they themselves hold dear; thus, as free and equal men, we are forced to take upon ourselves the mantle of statehood to protect and guarantee our inherent rights to liberty, to freedom, and the pursuit of happiness. On this day, we officially declare ourselves to be the sovereign and independent state of [ROOT.GetCountry.GetName|T].\n\n\n\n\n\n\n\n\n\n\n@italic_mil21!"  #<Wir wurden als Bernsteinabbauunternehmen @amber gegründet! Kolonie am Rande der Welt, weit entfernt von der Zivilisation. Wir blühten dort auf, wo man es für unmöglich hielt, gründeten neue Siedlungen in den Eiswäldern und erreichten Selbstversorgung im Schnee. Aus Neid auf unsere Erfolge wurde unser Mutterland jedoch immer ambivalenter gegenüber seinem Kind, mischte sich wiederholt unaufgefordert in unsere inneren Angelegenheiten ein, erhöhte die Steuern ohne unsere Zustimmung auf unangemessene Niveaus und vernachlässigte wiederholt unsere Bedürfnisse in schwierigen Zeiten.\n\nWir wie alle anderen wären glückliche und stolze Teilnehmer unseres #G Germanischen Reiches#!,, unserer Verwandtschaftsbande, die über das Meer hinaus stark sind, da wir versuchen würden, auf gemeinsame Weise zusammenzuwachsen, doch Es sind unsere tyrannischen Herren, die diesen rücksichtslosen Weg gewählt haben und uns als Hinterwäldler und Ausgestoßene darstellen, die der gleichen Rechte und Privilegien, die ihnen selbst am Herzen liegen, unwürdig sind. Daher sind wir als freie und gleichberechtigte Menschen gezwungen, den Mantel der Staatlichkeit auf uns zu nehmen, um unsere inhärenten Rechte auf Freiheit, Freiheit und das Streben nach Glück zu schützen und zu garantieren. An diesem Tag erklären wir uns offiziell zum souveränen und unabhängigen Staat von [ROOT.GetCountry.GetName|T].\n\n\n\n\n\n\n\n\n\n\n@italic_mil21!>  #NT!
 01_soodak_missions_task_32_tt: "#R WARNING!#! We will #R declare war#! on our motherland."  #<#R WARNUNG!#! Wir werden #R unserem Mutterland den Krieg erklären#!.>  #NT!
  
 01_soodak_missions_task_33: "A Soodaker Identity"  #<Eine Soodaker-Identität>  #NT!
 01_soodak_missions_task_33_DESC: "Somehow, against all odds, we have succeeded where all others would have failed; a tiny colony on the edge of civilization, holding its own and defeating one of the largest empires in the world. With our country secured as an independent state, we are free to pursue our destiny however we choose, neither as #G Germanics#!, nor #G Fennics#!, but as proud, liberated #G Soodakers#!.\n\n\n\n\n\n\n\n\n\n\n@italic_mil29!"  #<Irgendwie haben wir trotz aller Widrigkeiten Erfolg gehabt, wo alle anderen gescheitert wären; Eine winzige Kolonie am Rande der Zivilisation, die sich behauptet und eines der größten Imperien der Welt besiegt. Da unser Land als unabhängiger Staat gesichert ist, können wir unserem Schicksal nach Belieben nachgehen, weder als #G Germanen#!, noch als #G Fennics#!,, sondern als stolze, befreite #G Soodakers#!.\n\n\n\n\n\n\n\n\n\n\n@italic_mil29!>  #NT!
 01_soodak_missions_task_33_tt: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_34$#!'#!"  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_34$#!'#!>  #NT!
 01_soodak_missions_task_33_tt2: "We have NOT enacted the Fennic-exclusive '#Y $form_duna$#!' decision."  #<Wir haben die Fennic-exklusive Entscheidung „#Y $form_duna$#!'“ NICHT umgesetzt.>  #NT!
 01_soodak_missions_task_33_tt3: "#R WARNING!#! We will lose access to the '#Y $form_duna$#!' decision, if we previously had access to it."  #<#R WARNUNG!#! Wir verlieren den Zugriff auf die Entscheidung „#Y $form_duna$#!“, wenn wir zuvor Zugriff darauf hatten.>  #NT!
  
 01_soodak_missions_task_34: "Shed Our Colonial Trappings"  #<Werfen Sie unser koloniales Drumherum ab>  #NT!
 01_soodak_missions_task_34_DESC: "Somehow, against all odds, we have succeeded where all others would have failed; a tiny colony on the edge of civilization, holding its own and defeating one of the largest empires in the world. With our country secured as an independent state, there is only one issue remaining; we still bear the artificial emblems and trappings of our former-masters.\n\nNow is the time to sever all ties with our colonial past, just as a stag sheds its old antlers, and embrace our ancient #G Fennic#! heritage, which existed long before #G Germanic#! colonization, and will persevere long after; the people of #COLOR:{55,31,130} Duna#!, reborn in the flames of a devastating war wrought during the long dark - a #R Phoenix#! arising from the snow.\n\n\n\n\n\n\n\n\n\n\n@italic_mil22!"  #<Irgendwie haben wir trotz aller Widrigkeiten Erfolg gehabt, wo alle anderen gescheitert wären; Eine winzige Kolonie am Rande der Zivilisation, die sich behauptet und eines der größten Imperien der Welt besiegt. Nachdem unser Land als unabhängiger Staat gesichert ist, gibt es nur noch ein Problem; wir tragen immer noch die künstlichen Embleme und Insignien unserer ehemaligen Herren.\n\nJetzt ist es an der Zeit, alle Verbindungen zu unserer kolonialen Vergangenheit abzubrechen, so wie ein Hirsch sein altes Geweih abwirft, und unser altes #G Fennic#! Erbe anzunehmen, das lange vor der #G germanischen#! Kolonisierung existierte und noch lange danach bestehen bleiben wird; das Volk von #COLOR:{55,31,130} Duna#!, wiedergeboren in den Flammen eines verheerenden Krieges, der während der langen Dunkelheit entfacht wurde – ein #R Phoenix#!, der aus dem Schnee aufsteigt.\n\n\n\n\n\n\n\n\n\n\n@italic_mil22!>  #NT!
 01_soodak_missions_task_34_tt: "We have enacted the Fennic-exclusive '#Y $form_duna$#!' decision."  #<Wir haben die Fennic-exklusive Entscheidung „#Y $form_duna$#!'“ erlassen.>  #NT!
 01_soodak_missions_task_34_tt2: "We will have the option to become a #G $steppe_horde$#!."  #<Wir werden die Möglichkeit haben, ein #G $steppe_horde$#!. zu werden>  #NT!
 01_soodak_missions_task_34_tt3: "#R This task is mutually-exclusive with '#T $01_soodak_missions_task_33$#!'#!"  #<#R Diese Aufgabe schließt sich gegenseitig aus mit '#T $01_soodak_missions_task_33$#!'#!>  #NT!
  
 01_soodak_missions_task_100: "Assembling A Government"  #<Eine Regierung zusammenstellen>  #NT!
 01_soodak_missions_task_100_DESC: "Now that we have found a way to survive on this barren island, though our temporary council has served us sufficiently, we need to establish a permanent system of governance should we wish to exist here long-term. However, the colonists are divided as to the form our government should take; some wish to expand the existing council into a house of burgesses, or a #Y 'Burgzhusa'#!, comprised of all the major stakeholders which would have the power to establish laws, while others would prefer having a royal governor installed from the homeland, who would reinforce our ties through dynastic houses and guide us towards prosperity.\n\nStill others, however, would suggest a hybrid system as a compromise, in-which a governor of non-royal stock would reign in-conjunction with our elected body. Yet, whatever we choose today will dictate the course of our colony for not only ourselves, but for our children and progeny yet to come.\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Nachdem wir nun einen Weg gefunden haben, auf dieser kargen Insel zu überleben, müssen wir, obwohl unser temporärer Rat uns ausreichend gedient hat, ein dauerhaftes Regierungssystem einrichten, falls wir hier langfristig existieren wollen. Allerdings sind sich die Kolonisten uneinig darüber, welche Form unsere Regierung annehmen soll; Einige möchten den bestehenden Rat zu einem Bürgerhaus ausbauen, oder zu einer #Y „Burgzhusa“#!, bestehend aus allen wichtigen Interessenvertretern, die die Macht hätte, Gesetze zu erlassen, während andere es vorziehen würden, einen königlichen Gouverneur aus dem Heimatland einzusetzen, der unsere Bindungen durch dynastische Häuser stärken und uns zum Wohlstand führen würde.\n\nWieder andere würden als Kompromiss ein Hybridsystem vorschlagen, in dem ein Gouverneur nicht-königlicher Abstammung eingesetzt wird würde in Verbindung mit unserem gewählten Gremium regieren. Doch was auch immer wir heute wählen, es wird den Verlauf unserer Kolonie nicht nur für uns selbst, sondern auch für unsere Kinder und künftigen Nachkommen bestimmen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
 01_soodak_missions_task_100_tt: "We will have the option to reform our government into a #R Monarchy#!, a #Y Democratic Republic#!, or an #COLOR:{0.51,0.31,0.75} Oligarchic Republic with the Lifetime Elections law#!."  #<Wir werden die Möglichkeit haben, unsere Regierung mit dem Gesetz über lebenslange Wahlen#!. in eine #R Monarchie#!,, eine #Y Demokratische Republik#!, oder eine #COLOR:{0.51,0.31,0.75} Oligarchische Republik umzuwandeln>  #NT!
  
 01_soodak_missions_task_900: "An Androphagi Audience"  #<Ein androphagisches Publikum>  #NT!
 01_soodak_missions_task_900_DESC: "In the desolate wastes of #G Hyperborea#!, few can bear the pain of the uncompromising, biting, and unrelenting cold for hours, let alone years on-end. Though their reputation is one of infamy and treachery of the most vile and blood-curdling manner, the hardy #R Androphagi#! are among the only tribes stubborn and foolish enough to make life work up here; if we are to continue walking in this place, we should attempt establishing a relationship with our neighbors.\n\n\n\n\n\n\n\n\n\n\n@italic_mil13!"  #<In der trostlosen Wüste von #G Hyperborea#!, können nur wenige den Schmerz der kompromisslosen, beißenden und unerbittlichen Kälte stundenlang, geschweige denn jahrelang, ertragen. Auch wenn ihr Ruf von Schande und Verrat auf die abscheulichste und grauenhafteste Art geprägt ist, gehören die zähen #R Androphagi#! zu den einzigen Stämmen, die hartnäckig und dumm genug sind, um hier oben ein funktionierendes Leben zu führen; Wenn wir an diesem Ort weitergehen wollen, sollten wir versuchen, eine Beziehung zu unseren Nachbarn aufzubauen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil13!>  #NT!
 01_soodak_missions_task_900_tt: "We will send an expedition out to find these #R Androphagians#!..."  #<Wir werden eine Expedition aussenden, um diese #R Androphagier#!... zu finden>  #NT!
  
