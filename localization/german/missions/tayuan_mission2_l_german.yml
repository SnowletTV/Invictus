 gw_effect_quva_stupa: "The Great Stupa of Quva Monastery"  #<Der Große Stupa des Quva-Klosters>  #NT!
 gw_effect_quva_stupa_desc: "The Monastery of Quva, in Ferghana, is a center of Buddhism up in the north, spreading it's teachings both in the valley and along the Silk Road. It houses monumental sculptures of the Buddha, the Buddhist pantheon, and other synchretic deities. It's defining feature is the Great Stupa, huge in size, and a centre for pilgrims to the valley."  #<Das Kloster von Quva in Fergana ist ein Zentrum des Buddhismus im Norden und verbreitet seine Lehren sowohl im Tal als auch entlang der Seidenstraße. Es beherbergt monumentale Skulpturen des Buddha, des buddhistischen Pantheons und anderer synchretischer Gottheiten. Sein Wahrzeichen ist die Große Stupa, riesig groß und ein Zentrum für Pilger ins Tal.>  #NT!
