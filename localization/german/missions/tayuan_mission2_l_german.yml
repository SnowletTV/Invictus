 # Mil Trads (unlockable) 
 qin_path_1: "Butchers Of Men"  #<Metzger der Menschen>  #NT!
 qin_path_1_desc: "Bai Qi was an important general was an important general from the Warring States period, a great warrior that earned immortality fighting for Qin. Over the course of many campaigns, the brutal leader earned the nickname the 'Butcher of Men', and those that emulate his tactics in battle are heartless."  #<Bai Qi war ein wichtiger General aus der Zeit der Streitenden Reiche, ein großer Krieger, der im Kampf für Qin Unsterblichkeit erlangte. Im Laufe vieler Feldzüge erhielt der brutale Anführer den Spitznamen „Schlächter der Menschen“, und diejenigen, die seine Taktik im Kampf nachahmen, sind herzlos.>  #NT!
 qin_path_2: "'Reflections Upon The Battle Of Changping'"  #<„Reflexionen über die Schlacht von Changping“>  #NT!
 qin_path_2_desc: "Lian Po was an important general from the Warring States period, a great warrior that earned immortality fighting for Zhao. His military treatise, 'Reflections Upon The Battle Of Changping', discusses the important conflict in depth, and is said to be a compendium filled with invaluable military strategems."  #<Lian Po war ein wichtiger General aus der Zeit der Streitenden Reiche, ein großer Krieger, der im Kampf für Zhao Unsterblichkeit erlangte. Seine militärische Abhandlung „Reflexionen über die Schlacht von Changping“ erörtert den wichtigen Konflikt ausführlich und gilt als Kompendium voller unschätzbar wertvoller militärischer Strategien.>  #NT!
 qin_path_3: "'Tactics Against The Xiongnu'"  #<„Taktik gegen die Xiongnu“>  #NT!
 qin_path_3_desc: "Li Mu was an important general from the Warring States period, a great warrior that earned immortality fighting for Zhao. The military text written by Li Mu originally had no name, but has come to be known by the title 'Tactics Against The Xiongnu'.\n\nThis manual wastes no time with flowery language but is written in the simple language of the soldier, dispensing practical advice for surviving against the deadly riders of the steppe."  #<Li Mu war ein wichtiger General aus der Zeit der Streitenden Reiche, ein großer Krieger, der im Kampf für Zhao Unsterblichkeit erlangte. Der von Li Mu verfasste Militärtext hatte ursprünglich keinen Namen, ist aber unter dem Titel „Taktiken gegen die Xiongnu“ bekannt geworden.\n\nDieses Handbuch verschwendet keine Zeit mit blumiger Sprache, sondern ist in der einfachen Sprache des Soldaten verfasst und gibt praktische Ratschläge zum Überleben gegen die tödlichen Reiter der Steppe.>  #NT!
 qin_path_4: "Teachings of Wang Jian"  #<Lehren von Wang Jian>  #NT!
 qin_path_4_desc: "Wang Jian was an important general from the Warring States period, a great warrior that earned immortality fighting for Qin and subjugating countless enemies in its name. A taker of cities and a destroyer of armies, those that emulate the teachings of Wang Jian are assured to follow in the footsteps of the venerable old master, a man that faced unfathomable violence yet lived to tell the tale."  #<Wang Jian war ein wichtiger General aus der Zeit der Streitenden Reiche, ein großer Krieger, der Unsterblichkeit erlangte, indem er für Qin kämpfte und in seinem Namen unzählige Feinde unterwarf. Als Eroberer von Städten und Zerstörer von Armeen werden diejenigen, die die Lehren von Wang Jian nachahmen, mit Sicherheit in die Fußstapfen des ehrwürdigen alten Meisters treten, eines Mannes, der unvorstellbarer Gewalt ausgesetzt war und dennoch überlebte, um die Geschichte zu erzählen.>  #NT!
  
 #Treasures 
  
 i_ching: "The I Ching"  #<Das I Ging>  #NT!
 i_ching_desc: "An ancient Chinese divination text with a series of philosophical commentary as well. It is among the oldest of the Chinese classics, first written in the 9th century BCE.\n\n It is used for a Chinese form of cleromancy known as I Ching divination, in which bundles of yarrow stalks are manipulated to produce sets of six apparently random numbers ranging from 6 to 9. Each of the 64 possible sets corresponds to a hexagram, which can be looked up in the I Ching."  #<Ein alter chinesischer Weissagungstext mit einer Reihe philosophischer Kommentare. Es gehört zu den ältesten chinesischen Klassikern und wurde erstmals im 9. Jahrhundert v. Chr. geschrieben.\n\n Es wird für eine chinesische Form der Kleromantie verwendet, die als I-Ging-Wahrsagung bekannt ist. Dabei werden Bündel von Schafgarbenstengeln manipuliert, um Sätze von sechs scheinbar zufälligen Zahlen im Bereich von 6 bis 9 zu erzeugen. Jeder der 64 möglichen Sätze entspricht einem Hexagramm, das im I Ging nachgeschlagen werden kann.>  #NT!
  
 four_five_claa: "The Four Books and Five Classics"  #<Die vier Bücher und fünf Klassiker>  #NT!
 four_five_claa_desc: "The Five Classics (wujing) and Four Books (si shu) collectively create the foundation of Confucianism. The Five Classics and Four Books were the basis of the civil examination in imperial China and can be considered the Confucian canon. The Five Classics consists of the Book of Odes, Book of Documents, Book of Changes, Book of Rites, and the Spring and Autumn Annals. The Four Books are comprised of the Doctrine of the Mean, the Great Learning, Mencius, and the Analects."  #<Die fünf Klassiker (Wujing) und die Vier Bücher (Si Shu) bilden gemeinsam die Grundlage des Konfuzianismus. Die Fünf Klassiker und Vier Bücher bildeten die Grundlage des Zivilexamens im kaiserlichen China und können als konfuzianistischer Kanon betrachtet werden. Die fünf Klassiker bestehen aus dem Buch der Oden, dem Buch der Dokumente, dem Buch der Wandlungen, dem Buch der Riten sowie den Frühlings- und Herbstannalen. Die vier Bücher bestehen aus der Lehre vom Mittleren, der Großen Gelehrsamkeit, Menzius und den Analekten.>  #NT!
  
 art_of_war: "The Art of War"  #<Die Kunst des Krieges>  #NT!
 art_of_war_desc: "Written by the Wu general Sun Tzu in the fifth century BCE, this treatise on war has no need for introduction, being one of the best-known Chinese books in the world. It is a a detailed explanation and analysis of the 5th-century BCE Chinese military, from weapons, environmental conditions, and strategy to rank and discipline. Sun also stressed the importance of intelligence operatives and espionage to the war effort."  #<Diese vom Wu-General Sun Tzu im fünften Jahrhundert v. Chr. verfasste Abhandlung über den Krieg bedarf keiner Einführung, da sie eines der bekanntesten chinesischen Bücher der Welt ist. Es handelt sich um eine detaillierte Erklärung und Analyse des chinesischen Militärs im 5. Jahrhundert v. Chr., von Waffen, Umweltbedingungen und Strategie bis hin zu Rang und Disziplin. Sun betonte auch die Bedeutung von Geheimdienstmitarbeitern und Spionage für die Kriegsanstrengungen.>  #NT!
  
 abhidharma_pitaka_treasure: "Abhidharma Pitaka"  #<Abhidharma Pitaka>  #NT!
 abhidharma_pitaka_treasure_desc: "The seven canon texts of the Sarvastivada School, translated and annotated by Buddhist sages."  #<Die sieben kanonischen Texte der Sarvastivada-Schule, übersetzt und kommentiert von buddhistischen Weisen.>  #NT!
  
 chinese_jewelry: "Jade Necklace"  #<Jade-Halskette>  #NT!
 chinese_jewelry_desc: "This necklace was made in the Lands of the Son of Heaven, and it is thusly a rare good in our realm. Wearing it makes the noble ladies blush from envy, yet attracts them all the same, in the hopes of being granted permission to wear this jade masterwork."  #<Diese Halskette wurde in den Ländern des Sohnes des Himmels hergestellt und ist daher ein seltenes Gut in unserem Reich. Das Tragen lässt die edlen Damen vor Neid erröten, zieht sie aber dennoch an, in der Hoffnung, die Erlaubnis zu erhalten, dieses Meisterwerk aus Jade zu tragen.>  #NT!
 chinese_weapon: "Sword of a Qin General"  #<Schwert eines Qin-Generals>  #NT!
 chinese_weapon_desc: "This sword was made in the Lands of the Son of Heaven, and it is thusly a rare good in our realm. Many warrior has sought service in the armies of the Eastern Empire in hopes of being granted this legendary artifact, for it was once carried by a powerful general."  #<Dieses Schwert wurde in den Ländern des Sohnes des Himmels hergestellt und ist daher ein seltenes Gut in unserem Reich. Viele Krieger suchten Dienst in den Armeen des Oströmischen Reiches in der Hoffnung, dieses legendäre Artefakt zu erhalten, da es einst von einem mächtigen General getragen wurde.>  #NT!
  
