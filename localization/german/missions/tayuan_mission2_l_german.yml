l_german:
  
 tayuan_mission_2: "Out From Ferghana"  #<Raus aus Fergana>  #NT! #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 tayuan_mission_2_DESCRIPTION: "There are many worlds beyond this valley, and many of those worlds vye with each other for many great things far beyond these mountains; palaces, cities, mines, rivers and riches above all those.\n\nAs we have fought for our dignity to then invest us with power, the greatnesses of those distant places have come to our homes, bringing religion, culture, wealth and trade to a place hitherto ignominiously ignored. Us, the #COLOR:{0.2,0.47,1} Ionians#! settled in this new valley home, are still very few and far between the expanses we have conquered, and the children of the first generation of our rule over these lands aren't even of age yet."  #<Es gibt viele Welten jenseits dieses Tals, und viele dieser Welten wetteifern um viele große Dinge weit jenseits dieser Berge. Paläste, Städte, Minen, Flüsse und Reichtümer vor allem.\n\nWährend wir für unsere Würde gekämpft haben, um uns dann Macht zu verleihen, sind die Größen dieser fernen Orte in unsere Häuser gekommen und haben Religion, Kultur, Reichtum und Handel an einen Ort gebracht, der bisher schändlich ignoriert wurde. Wir, die #COLOR:{0.2,0.47,1} Ionier#!, die sich in dieser neuen Talheimat niedergelassen haben, sind immer noch sehr wenige und weit entfernt von den Weiten, die wir erobert haben, und die Kinder der ersten Generation unserer Herrschaft über diese Länder sind noch nicht einmal volljährig.>  #NT!
 tayuan_mission_2_CRITERIA_DESCRIPTION: "We have been forced to interact with influences from the new, mysterious #COLOR:{0.69,0.49,0} East#!, from the native #COLOR:{0.83,0.55,0.6} Bactrians#! in our lands, or the #COLOR:{0.81,0.15,0} Buddhists#! beyond the mountains to the south. Decide which way is forward for the valley of [GetProvince('(int32)6732').GetArea.GetName]."  #<Wir waren gezwungen, mit Einflüssen aus dem neuen, geheimnisvollen #COLOR:{0.69,0.49,0} Osten#!, von den einheimischen #COLOR:{0.83,0.55,0.6} Baktriern#! in unseren Ländern oder den #COLOR:{0.81,0.15,0} Buddhisten#! jenseits der Berge im Süden zu interagieren. Entscheiden Sie, welcher Weg für das Tal von [GetProvince('(int32)6732').GetArea.GetName] nach vorne führt.>  #NT!
 tayuan_mission_2_BUTTON_TOOLTIP: "And so all sides commence the spectacle!"  #<Und so beginnt auf allen Seiten das Spektakel!>  #NT!
 tayuan_mission_2_BUTTON_DETAILS: ""
  
  
