 tayuan_huaxia_settlers_tt: "#COLOR:{0.77,0.5,0.09} Huaxia#! settlers from the #Y Eastern Empire#! will appear throughout the #T Tarim Basin#!."  #<#COLOR:{0.77,0.5,0.09} Huaxia#! Siedler aus dem #Y Oströmischen Reich#! werden im gesamten #T Tarim-Becken#! auftauchen.>  #NT!
  
