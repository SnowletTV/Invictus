 # Tasks 
  
 tayuan_ferghana_task_51: "Poseidon On The Jaxartes"  #<Poseidon über den Jaxartes>  #NT!
 tayuan_ferghana_task_51_DESC: "The province of [GetProvince('(int32)6773').GetArea.GetName|T] snakes its way through the passes of the #G Ferghanan Mountains#! and controls the passages into the #G Tarim Basin#! - an important but difficult land that is frequented by traveling armies and merchant caravans. It is in our interests to control this region for ourselves, and [ROOT.GetCountry.GetRuler.GetName|Y] has given the orders to prepare for war.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Die Provinz [GetProvince('(int32)6773').GetArea.GetName|T] schlängelt sich durch die Pässe des #G Ferghanan-Gebirges#! und kontrolliert die Durchgänge in das #G Tarim-Becken#! – ein wichtiges, aber schwieriges Land, das von reisenden Armeen und Handelskarawanen frequentiert wird. Es liegt in unserem Interesse, diese Region für uns selbst zu kontrollieren, und [ROOT.GetCountry.GetRuler.GetName|Y] hat den Befehl gegeben, sich auf den Krieg vorzubereiten.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
  
 tayuan_ferghana_task_1: "Refreshments For The Court"  #<Erfrischungen für das Gericht>  #NT!
 tayuan_ferghana_task_1_DESC: "For quite a long time the city of the conqueror, [GetProvince('(int32)6704').GetName|T], has suffered from his short-sightedness, as the climate there is quite colder and harsher than in the welcoming valley. Our best architects trained in the #COLOR:{0.2,0.47,1} Greek Method#! suggest a plethora of measures, more canals, better botanical spaces and much more, to make it a more livable place.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: It is worth noting that archaelogical findings in real-life point to large-scale irrigation works being built in the valley around this time.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<Die Stadt des Eroberers, [GetProvince('(int32)6704').GetName|T], leidet seit geraumer Zeit unter seiner Kurzsichtigkeit, da das Klima dort deutlich kälter und rauer ist als im einladenden Tal. Unsere besten Architekten, die in der #COLOR:{0.2,0.47,1} griechischen Methode#! geschult wurden, schlagen eine Fülle von Maßnahmen, mehr Kanäle, bessere botanische Räume und vieles mehr vor, um den Ort lebenswerter zu machen.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Es ist erwähnenswert, dass archäologische Funde im wirklichen Leben darauf hinweisen, dass im Tal rundherum große Bewässerungsanlagen gebaut werden Zeit.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
  
 tayuan_ferghana_task_2: "Banners Flying Over the #E Tarim#!"  #<Banner fliegen über dem #E Tarim#!>  #NT!
 tayuan_ferghana_task_2_DESC: "The banners of many armies and expeditions have had to pass through the #G Tarim Basin#!, looking for things either to its east or to its west.\n\nSo, in order to throw ourselves against #COLOR:{0.39,0.21,0.81} Euros'#! wind in exploration of the many lives of these Eastern peoples, we must take control of this vital artery.\n\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Die Banner vieler Armeen und Expeditionen mussten durch das #G Tarim-Becken#!, ziehen und entweder im Osten oder im Westen nach Dingen suchen.\n\nUm uns also bei der Erkundung der vielen Leben dieser östlichen Völker gegen den Wind von #COLOR:{0.39,0.21,0.81} Euros'#! zu stellen, müssen wir die Kontrolle über dieses lebenswichtige Element übernehmen Arterie.\n\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
  
 tayuan_ferghana_task_3: "There Is Wine!"  #<Es gibt Wein!>  #NT!
 tayuan_ferghana_task_3_DESC: "The rudimentary drink available in this valley, 'kumis', mare's milk, has an absolutely horrendous taste and makes even the lowest pauper cry out for Wine @wine!, which we so skillfully produced in [GetProvince('(int32)288').GetArea.GetName|T].\n\nWe must ensure our survival, and introduce wine-making @wine! to the valley's slopes.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: It is pretty much certain that the #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]s #! are responsible for introducing wine to Ferghana; the #G Records of the Great Historian#! say that 'the regions around Tayuan make wine out of grapes, the wealthier inhabitants keeping as much as ten thousand or more piculs stored away.'\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"  #<Das in diesem Tal erhältliche rudimentäre Getränk, „Kumis“, Stutenmilch, hat einen absolut schrecklichen Geschmack und lässt selbst den ärmsten Armen nach Wein @Wein! schreien, den wir in [GetProvince('(int32)288').GetArea.GetName|T] so geschickt hergestellt haben.\n\nWir müssen unser Überleben sichern und die Weinherstellung @Wein einführen! zu den Hängen des Tals.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Es ist ziemlich sicher, dass die #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]s #! für die Einführung des Weins in Ferghana verantwortlich sind; In den #G Aufzeichnungen des großen Historikers#! heißt es, dass „die Regionen um Tayuan Wein aus Trauben herstellen und die wohlhabenderen Einwohner bis zu zehntausend oder mehr Piculs aufbewahren.“\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!>  #NT!
  
 tayuan_ferghana_task_4: "Rice And Grain"  #<Reis und Getreide>  #NT!
 tayuan_ferghana_task_4_DESC: "Zhang Qian reported that the people of Ta-Yuan worked the fields, growing rice and wheat. We must feed ourselves, after all, and being surrounded by bleak, desolate lands means we have to grow much of the food ourselves. After all, the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! traveler reported that the people here numbered several hundred thousand, living in seventy cities.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Zhang Qian berichtete, dass die Menschen in Ta-Yuan die Felder bewirtschafteten und Reis und Weizen anbauten. Schließlich müssen wir uns selbst ernähren, und da wir von trostlosen, öden Ländern umgeben sind, müssen wir einen Großteil der Nahrung selbst anbauen. Immerhin berichtete der #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Reisende, dass die Menschen hier mehrere Hunderttausend zählten und in siebzig Städten lebten.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!>  #NT!
  
 tayuan_ferghana_task_6: "The Statuettes"  #<Die Statuetten>  #NT!
 tayuan_ferghana_task_6_DESC: "Strange little statues of a calm, almost smiling man have begun appearing in small shrines throughout, and while some (especially the local #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#!) claim them to be apparitions of demons, the odd bald men who come from the south beg to differ.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Seltsame kleine Statuen eines ruhigen, fast lächelnden Mannes tauchen überall in kleinen Schreinen auf, und während einige (insbesondere die örtlichen #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#!)) behaupten, sie seien Erscheinungen von Dämonen, sind die seltsamen kahlköpfigen Männer, die aus dem Süden kommen, da anderer Meinung.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
  
 tayuan_ferghana_task_5: "The First Outposts"  #<Die ersten Außenposten>  #NT!
 tayuan_ferghana_task_5_DESC: "It appears that this Eastern Empire is fabulously rich; goods no one had ever seen, more beautiful than the stars, are carried in by the few traders that now reluctantly dare to make the perilous journey here. Along the sands of the #G Tarim Basin#!, they have started setting up small outposts along the route.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Es scheint, dass dieses Oströmische Reich sagenhaft reich ist; Waren, die noch nie jemand gesehen hat und die schöner sind als die Sterne, werden von den wenigen Händlern hereingebracht, die sich nun widerstrebend auf die gefährliche Reise hierher wagen. Entlang des Sandes des #G Tarim-Beckens#!, haben sie damit begonnen, kleine Außenposten entlang der Route zu errichten.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!>  #NT!
  
 tayuan_ferghana_task_7: "A Spear, A Horse And A Bow"  #<Ein Speer, ein Pferd und ein Bogen>  #NT!
 tayuan_ferghana_task_7_DESC: "Telling any friend or company that a mixture of #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! and #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! units could be a happy marriage would get you laughed at, if not ridiculed. Yet the regiments where these two groups cooperate are the most successful in our army, and they are notorious as well; mothers tell their children of the skill of the horse archers, and many girls swoon at the strength of the men in the phalanx.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: Zhang Qian recorded that 'The people fight with bows and spears and can shoot from horseback.'\n\n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Einem Freund oder einer Firma zu sagen, dass eine Mischung aus #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! und #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! Einheiten eine glückliche Ehe sein könnte, würde Sie auslachen, wenn nicht sogar lächerlich machen. Doch die Regimenter, in denen diese beiden Gruppen zusammenarbeiten, sind die erfolgreichsten unserer Armee und auch berüchtigt. Mütter erzählen ihren Kindern von den Fähigkeiten der berittenen Bogenschützen, und viele Mädchen schwärmen von der Stärke der Männer in der Phalanx.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Zhang Qian berichtete: „Die Menschen kämpfen mit Bögen und Speeren und können vom Pferd aus schießen.“\n\n\n\n\n\n\n\n\n\n\n@persia_mil11!>  #NT!
  
 tayuan_ferghana_task_8: "The Heavenly Horses"  #<Die himmlischen Pferde>  #NT!
 tayuan_ferghana_task_8_DESC: "In the infinite steppes and in the most inhospitable mountains, our men celebrate their victories in brotherhood, embracing each other despite all of their cultural differences. They are a great force, a successful combination of two radically different methodologies of waging warfare, and our armies are feared by the mighty and admired by the weak. Songs about them will be sung forever - the #T 'Heavenly Horses'!#!\n\n\n\n\n\n\n\n\n\n\n@persia_mil20!"  #<In den endlosen Steppen und in den unwirtlichsten Bergen feiern unsere Männer ihre Siege in Brüderlichkeit und umarmen sich trotz aller kulturellen Unterschiede. Sie sind eine große Streitmacht, eine erfolgreiche Kombination zweier völlig unterschiedlicher Methoden der Kriegsführung, und unsere Armeen werden von den Mächtigen gefürchtet und von den Schwachen bewundert. Lieder über sie werden für immer gesungen – die #T „Heavenly Horses“!#!\n\n\n\n\n\n\n\n\n\n\n@persia_mil20!>  #NT!
  
 tayuan_ferghana_task_9: "Dawan The City"  #<Dawan Die Stadt>  #NT!
 tayuan_ferghana_task_9_DESC: "Ever since the establishment of the city of [GetProvince('(int32)6735').GetName|T], it has prospered with the influx of traders, artists and craftsmen from all over, willing to work together to build a great town out of what was previously nothing.\n\nWe can choose to show the city favor by sponsoring its building projects. Then we will have a truly #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! city in the valley, far from the Macedonian influences of [GetProvince('(int32)6704').GetName].\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<Seit der Gründung der Stadt [GetProvince('(int32)6735').GetName|T] floriert sie durch den Zustrom von Händlern, Künstlern und Handwerkern aus aller Welt, die bereit sind, zusammenzuarbeiten, um aus dem, was vorher nichts war, eine großartige Stadt zu errichten.\n\nWir können uns dafür entscheiden, der Stadt Gunst zu erweisen, indem wir ihre Bauprojekte sponsern. Dann werden wir eine echte #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! Stadt im Tal haben, weit weg von den mazedonischen Einflüssen von [GetProvince('(int32)6704').GetName].\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
  
 tayuan_ferghana_task_10: "Dismember The Chaoskratia"  #<Zerstückeln Sie die Chaoskratia>  #NT!
 tayuan_ferghana_task_10_DESC: "To the south, the nominal 'king' of the 'Bactrians' still rules over many bandits and factions attempting to ravage everything around them and leave no riches behind. We must put an end to this.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Im Süden herrscht der nominelle „König“ der „Baktrier“ immer noch über viele Banditen und Fraktionen, die versuchen, alles um sie herum zu verwüsten und keinen Reichtum zurückzulassen. Wir müssen dem ein Ende setzen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!>  #NT!
  
 tayuan_ferghana_task_11: "Lust For The Blood-Sweaters"  #<Lust auf die Blutpullover>  #NT!
 tayuan_ferghana_task_11_DESC: "The #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Emperor is said to have grown extremely fond of our horses, and requests that we send establish trade routes eastwards so there is a constant stream of horses there.\n\nBy mixing the Ferghanan and Sogdian breeds of horses, we are sure to come up with faster and more agile ones.\n\n\n\n\n\n\n\n\n\n\n@india_mil18!"  #<Der Kaiser #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! soll unsere Pferde sehr liebgewonnen haben und fordert uns auf, Handelsrouten nach Osten einzurichten, damit es dort einen ständigen Strom von Pferden gibt.\n\nDurch die Mischung der Ferghanan- und Sogdian-Pferderassen werden wir mit Sicherheit schnellere und agilere Pferde entwickeln.\n\n\n\n\n\n\n\n\n\n\n@india_mil18!>  #NT!
  
 tayuan_ferghana_task_12: "Ferghani Script"  #<Ferghani-Skript>  #NT!
 tayuan_ferghana_task_12_DESC: "#COLOR:{0.3,0.5,0.38} Historical Basis#!: The Tang-dynasty era Buddhist monk Xuanzang, in his #G Record of the Western Regions#!, reported that the peoples of the country of #COLOR:{0.83,0.55,0.6} Fei-han#! (Mandarin for Ferghana) had a different script, and language, than their Sogdian cousins.\n\nUnfortunately, he also recorded that these people were 'ugly and misshapen', which is not a great look for them.\n\n\n\n\n\n\n\n\n\n\n@persia_mil17!"  #<#COLOR:{0.3,0.5,0.38} Historische Grundlagen#!: Der buddhistische Mönch Xuanzang aus der Zeit der Tang-Dynastie berichtete in seinem #G Bericht über die westlichen Regionen#!,, dass die Völker des Landes #COLOR:{0.83,0.55,0.6} Fei-han#! (Mandarin für Ferghana) eine andere Schrift und Sprache hatten als ihre sogdischen Cousins.\n\nLeider berichtete er auch, dass diese Menschen „hässlich und …“ waren unförmig‘, was für sie kein toller Look ist.\n\n\n\n\n\n\n\n\n\n\n@persia_mil17!>  #NT!
  
 tayuan_ferghana_task_13: "People Of The Wigs"  #<Menschen der Perücken>  #NT!
 tayuan_ferghana_task_13_DESC: "Up in the cold mountains lies [GetProvince('(int32)6784').GetName|T], alone, overlooking everything around it. In the coldest months, it is custom that most of the people there use fur hats, and so among visitors they have earned the nickname of #G 'People of the Wigs'#!. If it stands loyally alongside us, we will be able to control all of the northern wastes much more easily.\n\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Oben in den kalten Bergen liegt [GetProvince('(int32)6784').GetName|T], allein und mit Blick auf alles um ihn herum. In den kältesten Monaten ist es Brauch, dass die meisten Menschen dort Pelzmützen tragen, und so haben sie sich bei Besuchern den Spitznamen #G „Perückenvolk“#!. verdient. Wenn es uns treu zur Seite steht, werden wir alle nördlichen Ödlande viel leichter kontrollieren können.\n\n\n\n\n\n\n\n\n\n\n@persia_mil16!>  #NT!
  
 tayuan_ferghana_task_14: "The Mingtepa Exchange"  #<Der Mingtepa-Austausch>  #NT!
 tayuan_ferghana_task_14_DESC: "Many #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! flock to 'Mingtepa', one of the valley's easternmost cities, known to us as [GetProvince('(int32)6737').GetName|T], and it is there that they trade with our people. Through its markets run jewels made of the finest jade @jade!, embroidered garments and textiles made of silk @silk!, porcelains inlaid with flowery designs @earthware!, and horses @horses! unlike any others that can be found anywhere.\n\nThis is a market of excellence and exclusivity, the first of its kind in this long road west.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: This 'Mingtepa' is mentioned in the #G Record of the Western Regions#! as the main city in the valley.\n\n\n\n\n\n\n\n\n\n\n@persia_mil7!"  #<Viele #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! strömen nach „Mingtepa“, einer der östlichsten Städte des Tals, die uns als [GetProvince('(int32)6737').GetName|T] bekannt ist, und handeln dort mit unserem Volk. Auf seinen Märkten finden sich Juwelen aus feinster Jade @Jade!, bestickte Kleidungsstücke und Textilien aus Seide @Silk!, Porzellan mit eingelegten Blumenmustern @Earthware! und Pferde @Pferde! anders als alle anderen, die irgendwo zu finden sind.\n\nDies ist ein Markt der Exzellenz und Exklusivität, der erste seiner Art auf dieser langen Straße nach Westen.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Dieses „Mingtepa“ wird in der #G Aufzeichnung der westlichen Regionen#! als Hauptstadt des Tals erwähnt.\n\n\n\n\n\n\n\n\n\n\n@persia_mil7!>  #NT!
  
 tayuan_ferghana_task_15: "Between The Walls"  #<Zwischen den Wänden>  #NT!
 tayuan_ferghana_task_15_DESC: "Inspired by the mountainous walls that enclose them, the #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! fortified the smaller cities of the valley in a peculiar manner, quite different to anything found elsewhere:\n\n'Surrounded in several rows by powerful parallel walls, the space between which was mainly populated by citizens, the inner part of the settlement was usually devoid of buildings and was intended for communal livestock.'\n\n\n\n\n\n\n\n\n\n\n@persia_mil6!"  #<Inspiriert von den bergigen Mauern, die sie umschließen, befestigten die #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! die kleineren Städte des Tals auf eine besondere Art und Weise, ganz anders als alles, was anderswo zu finden war:\n\n'Umgeben in mehreren Reihen von mächtigen parallelen Mauern, deren Zwischenraum hauptsächlich von Bürgern bewohnt wurde, war der innere Teil der Siedlung normalerweise frei von Gebäuden und für die Gemeinschaft bestimmt Vieh.'\n\n\n\n\n\n\n\n\n\n\n@persia_mil6!>  #NT!
  
 tayuan_ferghana_task_16: "It Is Ershi!"  #<Es ist Ershi!>  #NT!
 tayuan_ferghana_task_16_DESC: "The old capital of the valley, #T Ershi#!, now named [GetProvince('(int32)6737').GetName|T] by the Greeks, has recently seen more and more #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#E s#!#! settle within its walls, as it represents a center of civilization for this previously tribal population. Now a majority, many among them now protest for a native administration of the city.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Die alte Hauptstadt des Tals, #T Ershi#!,, die jetzt von den Griechen [GetProvince('(int32)6737').GetName|T] genannt wird, hat in letzter Zeit immer mehr #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#E s#!#! gesehen, die sich innerhalb ihrer Mauern niedergelassen haben, da sie ein Zentrum der Zivilisation für diese früher Stammesbevölkerung darstellt. Jetzt eine Mehrheit, viele von ihnen protestieren jetzt für eine einheimische Verwaltung der Stadt.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
  
 tayuan_ferghana_task_17: "Help The Sogdians"  #<Helfen Sie den Sogdiern>  #NT!
 tayuan_ferghana_task_17_DESC: "Our #COLOR:{0.83,0.55,0.6} [GetCulture('sogdian').GetName|G]#! brothers, who we so faithfully protect ever since their demise, now hope we are the force behind their restitution. We would, indeed, benefit from this, as they would serve us even more faithfully.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Unsere #COLOR:{0.83,0.55,0.6} [GetCulture('sogdian').GetName|G]#! Brüder, die wir seit ihrem Tod so treu beschützen, hoffen nun, dass wir die Kraft hinter ihrer Wiedergutmachung sind. Wir würden tatsächlich davon profitieren, da sie uns noch treuer dienen würden.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
  
 tayuan_ferghana_task_18: "Colonise The West"  #<Kolonisieren Sie den Westen>  #NT!
 tayuan_ferghana_task_18_DESC: "To the West there are lands left in a barren and desolate state, surely undeserving of it, because they have been overlooked by the many who passed here. It would benefit us greatly if they were settled by our people.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Im Westen gibt es Ländereien, die in einem unfruchtbaren und trostlosen Zustand zurückgeblieben sind und dies sicherlich nicht verdient haben, weil sie von den vielen, die hier vorbeikamen, übersehen wurden. Es würde uns sehr nützen, wenn sie von unserem Volk besiedelt würden.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!>  #NT!
  
 tayuan_ferghana_task_19: "Elevate The Bactrians"  #<Erhöhe die Baktrier>  #NT!
 tayuan_ferghana_task_19_DESC: "It is unjust that our southern brothers are reduced to the substrata of their own country, our own brothers choked by [GetCulture('macedonian').GetName|G] villains. It is time they become free in their own homes, just as we became.\n\n\n\n\n\n\n\n\n\n\n@greek_mil14!"  #<Es ist ungerecht, dass unsere südlichen Brüder auf die Unterschicht ihres eigenen Landes reduziert werden, unsere eigenen Brüder von [GetCulture('macedonian').GetName|G] Schurken erstickt werden. Es ist an der Zeit, dass sie in ihren eigenen Häusern frei werden, genau wie wir.\n\n\n\n\n\n\n\n\n\n\n@greek_mil14!>  #NT!
  
 tayuan_ferghana_task_20: "New Roads South"  #<Neue Straßen nach Süden>  #NT!
 tayuan_ferghana_task_20_DESC: "The conquest of #E Bactria#! has provided us with many opportunities to our south, and many of our people already wish to settle there."  #<Die Eroberung von #E Bactria#! hat uns viele Möglichkeiten im Süden eröffnet, und viele unserer Leute möchten sich bereits dort niederlassen.>  #NT!
  
 tayuan_ferghana_task_21: "A Great Journey In Exile"  #<Eine großartige Reise im Exil>  #NT!
 tayuan_ferghana_task_21_DESC: "Of the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! embassies sent east, the #G The Records of the Great Historian#! says that 'Those travelling to distant lands required eight or nine years to complete their journey', and so it meant that 'no man would complete this journey simply for his own pleasure'.\n\nEvidently, this means that the Emperor's embassies are dispatched with 'anyone who came forward, without inquiring into his background.' This of course means that all manner of thugs and ruffians flood into our lands with the goods we need most, but it is these very same adventure-loving hooligans that have filled [ROOT.GetCountry.GetRuler.GetName|Y]'s head with a wild idea...\n\n\n\n\n\n\n\n\n\n\n@india_mil22!"  #<Von den #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Botschaften, die nach Osten geschickt wurden, heißt es in den #G Die Aufzeichnungen des großen Historikers#!, dass „diejenigen, die in ferne Länder reisten, acht oder neun Jahre brauchten, um ihre Reise abzuschließen“, was bedeutete, dass „niemand diese Reise nur zu seinem eigenen Vergnügen antreten würde“.\n\nOffensichtlich bedeutet dies, dass die Botschaften des Kaisers mit „jedem, der vortrat, ohne nach seinem Hintergrund zu fragen.' Das bedeutet natürlich, dass alle Arten von Schlägern und Raufbolden mit den Waren, die wir am meisten brauchen, in unser Land strömen, aber es sind genau diese abenteuerlustigen Hooligans, die [ROOT.GetCountry.GetRuler.GetName|Y]s Kopf mit einer wilden Idee gefüllt haben ...\n\n\n\n\n\n\n\n\n\n\n@india_mil22!>  #NT!
 create_ruler_mercenary_may_return_some_day_tt: "Our Ruler can choose to abdicate power and leave to become a #R Mercenary#! in the wild lands of the #T Eastern Empire#!."  #<Unser Herrscher kann sich dafür entscheiden, die Macht aufzugeben und zu gehen, um ein #R Söldner#! in den wilden Ländern des #T Ostreichs#! zu werden.>  #NT!
 create_ruler_mercenary_may_return_some_day_tt1: "Our Ruler will abdicate power and leave to become a #R Mercenary#! in the wild lands of the #T Eastern Empire#!."  #<Unser Herrscher wird die Macht aufgeben und gehen, um ein #R Söldner#! in den wilden Ländern des #T Oströmischen Reiches#! zu werden.>  #NT!
  
 tayuan_ferghana_task_22: "[GetCultureGroup('bactrian').GetName] Champions"  #<[GetCultureGroup('bactrian').GetName] Champions>  #NT!
 tayuan_ferghana_task_22_DESC: "Us #COLOR:{0.83,0.55,0.6} #E Arya#!#!, or 'Bactrians' as they call us, have been under foreign domination for as long as we remember, either Persian, Macedonian, or Greek.\n\nNone of our own shall ever again pay tribute to foreign kings; Now the humble [GetCulture('margian').GetName] herder, the fearsome [GetCulture('sogdian').GetName] horseman and the wily [GetCulture('tocharian').GetName] trader can keep their coin, and sleep more soundly than ever, in a kingdom ruled by their brothers, in fraternity!\n\n\n\n\n\n\n\n\n\n\n@italic_mil22!"  #<Wir #COLOR:{0.83,0.55,0.6} #E Arya#!#!, oder „Baktrier“, wie sie uns nennen, stehen seit jeher unter fremder Herrschaft, sei es persisch, mazedonisch oder griechisch.\n\nKeiner von uns wird jemals wieder fremden Königen Tribut zahlen; Jetzt können der bescheidene [GetCulture('margian').GetName]-Hirte, der furchterregende [GetCulture('sogdian').GetName]-Reiter und der schlaue [GetCulture('tocharian').GetName]-Händler ihre Münze behalten und ruhiger schlafen als je zuvor, in einem Königreich, das von ihren Brüdern in Brüderlichkeit regiert wird!\n\n\n\n\n\n\n\n\n\n\n@italic_mil22!>  #NT!
  
 tayuan_ferghana_task_23: "We Are The New Nobility"  #<Wir sind der neue Adel>  #NT!
 tayuan_ferghana_task_23_DESC: "And thus, having developed themselves into a prosperous people, the #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! now live in palaces, own great estates, and are clad in jewellery. This new group among our own demands equal rights to the existing nobility, and if the Greeks wish to continue benefiting from our livelihoods they must raise us to their stature in this society. We must now be equals.\n\n\n\n\n\n\n\n\n\n\n@persia_mil9!"  #<Und so haben sich die #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! zu einem wohlhabenden Volk entwickelt und leben nun in Palästen, besitzen große Anwesen und tragen Schmuck. Diese neue Gruppe unter uns fordert gleiche Rechte wie der bestehende Adel, und wenn die Griechen weiterhin von unserem Lebensunterhalt profitieren wollen, müssen sie uns zu ihrem Status in dieser Gesellschaft erheben. Wir müssen jetzt gleich sein.\n\n\n\n\n\n\n\n\n\n\n@persia_mil9!>  #NT!
  
 tayuan_ferghana_task_24: "Voxite Or Zoroastrian?"  #<Voxit oder Zoroastrier?>  #NT!
 tayuan_ferghana_task_24_DESC: "As usual, there are agreements and disagreements within [ROOT.GetCountry.GetName|T]. It is obvious to all that the gods of commerce have blessed us, but there are disagreements over which gods have chosen to bless us. Some say that it is obvious that the #G Zoroastrians#! have brought us good fortune, whereas others vehemently argue that #G Voxite#! deities are the ones we should be praising.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!"  #<Wie üblich gibt es innerhalb von [ROOT.GetCountry.GetName|T] Vereinbarungen und Meinungsverschiedenheiten. Es ist für alle offensichtlich, dass die Götter des Handels uns gesegnet haben, aber es gibt Meinungsverschiedenheiten darüber, welche Götter sich entschieden haben, uns zu segnen. Einige sagen, dass es offensichtlich ist, dass die #G Zoroastrianer#! uns Glück gebracht haben, während andere vehement argumentieren, dass #G Voxite#! Gottheiten diejenigen sind, die wir loben sollten.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!>  #NT!
  
 tayuan_ferghana_task_25: "Awaken The Arts"  #<Erwecke die Künste>  #NT!
 tayuan_ferghana_task_25_DESC: "Our #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! tradition is one of #T poets#! (Homer probably was born there, and Sappho), #T architects#! (Temple of Artemis at Ephesus, Temple of Athena Polias at Priene), #T sculptors#! and #T potters#!, and also great #T philosophers#! (Thales of Miletus, Anaximander of Miletus, Heraclitus of Ephesus).\n\nOur wealth and the cultural interchange in [GetProvince('(int32)290').GetArea.GetRegion.GetName|T] allowed for these works, and the men behind them, to think, dream and be. Surrounded by a myriad of foreign cultures, too many and too disparate to even take into account, means we boast similar conditions now; if we ensure our artists favourable conditions they are sure to shine.\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!"  #<Unsere #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! Tradition ist eine von #T Dichtern#! (Homer wurde wahrscheinlich dort geboren, und Sappho), #T Architekten#! (Tempel der Artemis in Ephesus, Tempel der Athena Polias in Priene), #T Bildhauern#! und #T Töpfern#! und auch großartig #T Philosophen#! (Thales von Milet, Anaximander von Milet, Heraklit von Ephesus).\n\nUnser Reichtum und der kulturelle Austausch in [GetCulture('ionian').GetName]3 ermöglichten es diesen Werken und den Männern dahinter, zu denken, zu träumen und zu sein. Umgeben von einer Vielzahl fremder Kulturen, die zu zahlreich und zu unterschiedlich sind, als dass wir sie überhaupt berücksichtigen könnten, bedeutet das, dass wir uns heute mit ähnlichen Bedingungen rühmen können. Wenn wir unseren Künstlern günstige Konditionen garantieren, werden sie mit Sicherheit glänzen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil5!>  #NT!
  
 tayuan_ferghana_task_28: "Carry The Road On Westwards"  #<Tragen Sie die Straße weiter nach Westen>  #NT!
 tayuan_ferghana_task_28_DESC: "This new exchange of all type of goods with the Eastern Empire provides us with incredible things, and we have been able to shower them with wonders of our own as well.\nThe #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! traders, ever more influential in our society, regularly inquire what lies further westwards, and petition our great [ROOT.GetCountry.GetRulerTitle] for the establishment of a route there for the flow of merchandise to continue further.\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!"  #<Dieser neue Austausch von Waren aller Art mit dem Oströmischen Reich beschert uns unglaubliche Dinge, und wir konnten sie auch mit eigenen Wundern überschütten.\nDie #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!-Händler, die in unserer Gesellschaft immer einflussreicher werden, erkundigen sich regelmäßig, was weiter westlich liegt, und bitten unseren großen [ROOT.GetCountry.GetRulerTitle] um die Einrichtung einer Route dorthin, damit der Warenfluss fortgesetzt werden kann weiter.\n\n\n\n\n\n\n\n\n\n\n@italic_mil9!>  #NT!
  
 tayuan_ferghana_task_27: "The Great Treatises Of The Huaxia"  #<Die großen Abhandlungen der Huaxia>  #NT!
 tayuan_ferghana_task_27_DESC: "The Eastern Empire, from what we gather, is a very advanced civilization with many minds contributing to its heritage and knowledge. Obtaining one of these tomes could transmit to us great ideas that we could then use to our advantage.\n\n\n\n\n\n\n\n\n\n\n@india_mil20!"  #<Soweit wir wissen, ist das Oströmische Reich eine sehr fortschrittliche Zivilisation, zu deren Erbe und Wissen viele Köpfe beitragen. Der Erwerb eines dieser Wälzer könnte uns großartige Ideen vermitteln, die wir dann zu unserem Vorteil nutzen könnten.\n\n\n\n\n\n\n\n\n\n\n@india_mil20!>  #NT!
  
 tayuan_ferghana_task_26: "[GetProvince('(int32)7184').GetName] And The Jade Gate"  #<[GetProvince('(int32)7184').GetName] Und das Jadetor>  #NT!
 tayuan_ferghana_task_26_DESC: "The trading routes coming here are quite perilous; if, the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! envoys go north, they are harassed and killed by the #R Xiongnu#!, while if they go south they suffer from lack of water and fodder. Moreover, there are many places along the route where there are no cities whatsoever and they are apt to run out of provisions.\n\nIf we help make the journey safer, many more will be able to come through the trade route.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: The first part of the description was transliterated from the #G Records of the Great Historian#!, from a speech from an Ionian official to justify stopping trade with China, which led to the #R War of the Heavenly Horses#!.\n\n\n\n\n\n\n\n\n\n\n@persia_mil11!"  #<Die Handelsrouten, die hierher führen, sind ziemlich gefährlich; Wenn die #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Gesandten nach Norden gehen, werden sie von den #R Xiongnu#!, belästigt und getötet, während sie, wenn sie nach Süden gehen, unter Wasser- und Futtermangel leiden. Darüber hinaus gibt es entlang der Route viele Orte, an denen es überhaupt keine Städte gibt, und es besteht die Gefahr, dass ihnen der Proviant ausgeht.\n\nWenn wir dazu beitragen, die Reise sicherer zu machen, können viele weitere über die Handelsroute kommen.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Der erste Teil der Beschreibung wurde aus den #G Aufzeichnungen des großen Historikers#!, aus einer Rede eines ionischen Beamten transkribiert, um die Einstellung des Handels mit China zu rechtfertigen, was dazu führte zum #R Krieg der himmlischen Pferde#E0>  #NT!
  
 tayuan_ferghana_task_29: "The Democratic Spirit"  #<Der demokratische Geist>  #NT!
 tayuan_ferghana_task_29_DESC: "Distance has not changed #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! minds all that much; in the Boules and Ekklesías of our cities many are turned to a new faction, demanding the type of government we've traditionally known: democracy.\n\nMeetings in the market, parties, dinners and festivals now feature conversations demanding such a change; by the day, many more convert to this cause, as historically the tyrannies imposed in the cities of [GetProvince('(int32)305').GetArea.GetRegion.GetName|T] did not end well for their people. We must address these demands.\n\n\n\n\n\n\n\n\n\n\n@greek_mil12!"  #<Die Entfernung hat sich nicht geändert. #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! stört das alles; In den Boules und Ekklesías unserer Städte wenden sich viele einer neuen Fraktion zu und fordern die Art von Regierung, die wir traditionell kennen: Demokratie.\n\nBei Treffen auf dem Markt, Partys, Abendessen und Festivals finden jetzt Gespräche statt, die einen solchen Wandel fordern; Tag für Tag bekehren sich viele weitere zu dieser Sache, da die in den Städten von [GetProvince('(int32)305').GetArea.GetRegion.GetName|T] verhängten Tyranneien historisch gesehen kein gutes Ende für ihr Volk hatten. Wir müssen uns mit diesen Forderungen befassen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil12!>  #NT!
  
 tayuan_ferghana_task_30: "The Hermit Of The Snowy Orchard"  #<Der Einsiedler im verschneiten Obstgarten>  #NT!
 tayuan_ferghana_task_30_DESC: "The wise men who came to our country seem to delight in wandering in it, spreading their teachings to the populations in return for food and provisions. Still, they do not live fully in the cities and villages that they frequent, and these wandering monks travel between towns while staying on the outskirts of society. They often also go out, sometimes into the mountains, for prayer.\n\nA leading #COLOR:{0.81,0.15,0} Buddhist#! monk tells our king that to the south, in the lands of the Indus, during the rainy season they retreat for shelter and safety from the weather, a practice called #COLOR:{0.81,0.15,0} 'vassa'#!. It seems here the problem is reversed; the winter months are quite unfriendly to such a lifestyle. Should we provide them with such a shelter, they would be able to continue their work.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!"  #<Die weisen Männer, die in unser Land kamen, scheinen Freude daran zu haben, darin umherzuwandern und im Gegenzug für Nahrung und Proviant ihre Lehren an die Bevölkerung weiterzugeben. Dennoch leben sie nicht vollständig in den Städten und Dörfern, in denen sie sich aufhalten, und diese Wandermönche reisen zwischen den Städten, bleiben aber am Rande der Gesellschaft. Oft gehen sie auch hinaus, manchmal in die Berge, um zu beten.\n\nEin führender #COLOR:{0.81,0.15,0} buddhistischer#! Mönch erzählt unserem König, dass sie sich während der Regenzeit im Süden, in den Ländern des Indus, zurückziehen, um Schutz und Schutz vor dem Wetter zu suchen, eine Praxis namens #COLOR:{0.81,0.15,0} 'vassa'#!. Hier scheint das Problem umgekehrt zu sein; Die Wintermonate sind für einen solchen Lebensstil ziemlich unfreundlich. Sollten wir ihnen eine solche Unterkunft zur Verfügung stellen, könnten sie ihre Arbeit fortsetzen.\n\n\n\n\n\n\n\n\n\n\n@greek_mil16!>  #NT!
  
 tayuan_ferghana_task_31: "Zoroastrian Syncretism"  #<Zoroastrischer Synkretismus>  #NT!
 tayuan_ferghana_task_31_DESC: "In Central Asia, Buddhist ideas sometimes merged with Zoroastrianism or Iranian traditions. For example, the concept of Mithra (a Zoroastrian deity) was occasionally syncretized with Buddhist figures like Maitreya.\n\n\n\n\n\n\n\n\n\n\n@persia_mil13!"  #<In Zentralasien verschmolzen buddhistische Ideen manchmal mit Zoroastrismus oder iranischen Traditionen. Beispielsweise wurde das Konzept von Mithra (einer zoroastrischen Gottheit) gelegentlich mit buddhistischen Figuren wie Maitreya synkretisiert.\n\n\n\n\n\n\n\n\n\n\n@persia_mil13!>  #NT!
 zoroaster_conversion_tt1: "We need to have at least #Y 1#! Deity in our pantheon of the [GetReligion('zoroaster').GetName|Y] faith."  #<Wir müssen mindestens #Y 1#! Gottheit in unserem Pantheon des [GetReligion('zoroaster').GetName|Y] Glaubens haben.>  #NT!
  
 tayuan_ferghana_task_32: "Translate The Texts"  #<Übersetzen Sie die Texte>  #NT!
 tayuan_ferghana_task_32_DESC: "The #G Abhidharma Pitaka#! texts, seven in number, are the canon of the #COLOR:{0.81,0.15,0} #E Sarvastivada#!#! school to which most monks here belong to; this school was the first to translate the Tipitakas into Sanskrit. Translating them once again is a key step to help our populations, both #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! and #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#!, to understand and follow the path to Moksha.\n\nThey use a highly technical language, more so than usual, in an attempt to convey the ultimate truth. Translating them will require both a large investment and a collection of great minds.\n\n\n\n\n\n\n\n\n\n\n@india_mil17!"  #<Die #G Abhidharma Pitaka#! Texte, sieben an der Zahl, sind der Kanon der #COLOR:{0.81,0.15,0} #E Sarvastivada#!#! Schule, der die meisten Mönche hier angehören; Diese Schule war die erste, die die Tipitakas ins Sanskrit übersetzte. Ihre erneute Übersetzung ist ein wichtiger Schritt, um unserer Bevölkerung, sowohl #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! als auch #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#!, zu helfen, den Weg nach Moksha zu verstehen und ihm zu folgen.\n\nSie verwenden eine hochtechnische Sprache, mehr als üblich, um die ultimative Wahrheit zu vermitteln. Ihre Übersetzung erfordert sowohl eine große Investition als auch eine Ansammlung großartiger Köpfe.\n\n\n\n\n\n\n\n\n\n\n@india_mil17!>  #NT!
  
 tayuan_ferghana_task_33: "Syntechniai Cooperation"  #<Syntechniai-Kooperation>  #NT!
 tayuan_ferghana_task_33_DESC: "There is no shortage of skilled stonemasons and craftsmen now living in the valley, and because of our construction efforts just about everywhere there is no shortage of necessity for their skilled work.\n\nIf we allow them start to coordinate among them, in Syntechniai, they could work together in teams (resulting in faster and better end results), regulate their standards for quality, and pass on their knowledge more easily. They also help their members in social and religious matters, from burial funds to religious offerings and sacrifices.\n\n\n\n\n\n\n\n\n\n\n@india_mil6!"  #<Es gibt keinen Mangel an qualifizierten Steinmetzen und Handwerkern, die jetzt im Tal leben, und aufgrund unserer Baubemühungen mangelt es fast überall nicht an der Notwendigkeit ihrer qualifizierten Arbeit.\n\nWenn wir ihnen erlauben, sich in Syntechniai untereinander zu koordinieren, könnten sie in Teams zusammenarbeiten (was zu schnelleren und besseren Endergebnissen führt), ihre Qualitätsstandards regeln und ihr Wissen einfacher weitergeben. Sie helfen ihren Mitgliedern auch in sozialen und religiösen Angelegenheiten, von Bestattungsgeldern bis hin zu religiösen Opfergaben und Opfern.\n\n\n\n\n\n\n\n\n\n\n@india_mil6!>  #NT!
  
 tayuan_ferghana_task_34: "Master Of The Passes"  #<Meister der Pässe>  #NT!
 tayuan_ferghana_task_34_DESC: "The revered men who wish to come to this valley to ponder, live and teach have to cross the most perilous routes, and face the harshest weathers, to bring their knowledge here; we cannot expect to be enlightened to this balance they speak of if we have no teachers to follow that way.\n\nControlling the southern passes grants us a direct route of communication to the rest of the #COLOR:{0.81,0.15,0} Buddhist#! world.\n\n\n\n\n\n\n\n\n\n\n@india_mil19!"  #<Die verehrten Männer, die zum Nachdenken, Leben und Lehren in dieses Tal kommen möchten, müssen die gefährlichsten Wege überwinden und sich den härtesten Wetterbedingungen stellen, um ihr Wissen hierher zu bringen. Wir können nicht erwarten, zu diesem Gleichgewicht zu gelangen, von dem sie sprechen, wenn wir keine Lehrer haben, die diesem Weg folgen können.\n\nDie Kontrolle der südlichen Pässe gewährt uns einen direkten Kommunikationsweg zum Rest der #COLOR:{0.81,0.15,0} buddhistischen#! Welt.\n\n\n\n\n\n\n\n\n\n\n@india_mil19!>  #NT!
  
 tayuan_ferghana_task_35: "Pacify The Hordes"  #<Befriedet die Horden>  #NT!
 tayuan_ferghana_task_35_DESC: "The northern horsemen have often terrorized both the innocent #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! and #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! without provocation; they are as savage as the beasts they live among. We must march on the northern wastes and subjugate the tribes there. It will be their end!\n\n\n\n\n\n\n\n\n\n\n@persia_mil14!"  #<Die nördlichen Reiter haben oft sowohl die unschuldigen #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! als auch #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! ohne Provokation terrorisiert; Sie sind genauso wild wie die Tiere, unter denen sie leben. Wir müssen in die nördlichen Wüsten marschieren und die Stämme dort unterwerfen. Es wird ihr Ende sein!\n\n\n\n\n\n\n\n\n\n\n@persia_mil14!>  #NT!
 tayuan_ferghana_task_35tt: "We need to have at least #Y 2#! #G Scythian Culture#! #T Tribal Vassals#!."  #<Wir benötigen mindestens #Y 2#! #G skythische Kultur#! #T Stammesvasallen#!.>  #NT!
  
 tayuan_ferghana_task_36: "Shenic-Buddhist Synthesis"  #<Shenisch-buddhistische Synthese>  #NT!
 tayuan_ferghana_task_36_DESC: "There are many religious ideas and philosophies that circulate throughout [ROOT.GetCountry.GetName|T], oftentimes carried by travelers and merchants following the trade routes between the [ROOT.GetCountry.GetAdjective|G] cities. Instead of enforcing one particular pantheon or set of beliefs throughout their realm, the tolerant #Y [ROOT.GetCountry.GetRuler.GetFamilyDisplayName] Dynasty#!has encouraged the people to seek harmonious interactions with each other, especially when it comes to matters of the divine.\n\n\n\n\n\n\n\n\n\n\n@italic_mil16!"  #<Es gibt viele religiöse Ideen und Philosophien, die in [ROOT.GetCountry.GetName|T] kursieren und oft von Reisenden und Händlern getragen werden, die den Handelsrouten zwischen den [ROOT.GetCountry.GetAdjective|G] Städten folgen. Anstatt ein bestimmtes Pantheon oder eine Reihe von Überzeugungen in ihrem gesamten Reich durchzusetzen, ermutigte die tolerante #Y [ROOT.GetCountry.GetRuler.GetFamilyDisplayName] Dynastie#!has die Menschen, harmonische Interaktionen miteinander zu suchen, insbesondere wenn es um göttliche Angelegenheiten geht.\n\n\n\n\n\n\n\n\n\n\n@italic_mil16!>  #NT!
  
 tayuan_ferghana_task_37: "A Journey Across The World"  #<Eine Reise um die Welt>  #NT!
 tayuan_ferghana_task_37_DESC: "A question bugs every man and woman of #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! origin in this valley. Should we, cast by the wind so far away, make an effort to reach home again? Alexandros certainly managed to reach these lands. And what would we return to? We are not a warring people though, at least yet, to march across the world like him. So we must first attempt to establish contact with the other end of the world, [GetProvince('(int32)290').GetArea.GetName|T], again.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!"  #<Eine Frage beschäftigt jeden Mann und jede Frau #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! Herkunft in diesem Tal. Sollten wir, vom Wind so weit weggetrieben, uns anstrengen, wieder nach Hause zu gelangen? Alexandros gelang es sicherlich, diese Länder zu erreichen. Und wohin würden wir zurückkehren? Allerdings sind wir zumindest noch kein kriegführendes Volk, das wie er durch die Welt marschiert. Wir müssen also zunächst erneut versuchen, Kontakt zum anderen Ende der Welt, [GetProvince('(int32)290').GetArea.GetName|T], aufzunehmen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!>  #NT!
  
 tayuan_ferghana_task_38: "Higher Forms Of Worship"  #<Höhere Formen der Anbetung>  #NT!
 tayuan_ferghana_task_38_DESC: "In spite of the many temptations surrounding us, our people have remained true to the #COLOR:{0.2,0.47,1} Hellenic#! gods of our ancestors, and because we have not forgotten them, they have not forgotten us.\n\n\n\n\n\n\n\n\n\n\n@event_pic3!"  #<Trotz der vielen Versuchungen, die uns umgeben, ist unser Volk den #COLOR:{0.2,0.47,1} hellenischen#! Göttern unserer Vorfahren treu geblieben, und weil wir sie nicht vergessen haben, haben sie uns nicht vergessen.\n\n\n\n\n\n\n\n\n\n\n@event_pic3!>  #NT!
 tayuan_ferghana_task_38_tt: "We need to have #Y 4#! Deities in our pantheon of the [GetReligion('roman_pantheon').GetName|Y] faith."  #<Wir brauchen #Y 4#! Gottheiten in unserem Pantheon des [GetReligion('roman_pantheon').GetName|Y] Glaubens.>  #NT!
 tayuan_higher_forms_worship_mod: "True Hellenes"  #<Echte Hellenen>  #NT!
  
 tayuan_ferghana_task_39: "Cities In The Sky"  #<Städte im Himmel>  #NT!
 tayuan_ferghana_task_39_DESC: "Many men in red robes, vehicles of the #COLOR:{0.81,0.15,0} #E Sarvastivada#!#! school, populate the monasteries of the lands we now control. Since the great theological centre of this school is in and around [GetProvince('(int32)7314').GetArea.GetRegion.GetName|T], we'd do well to develop these areas too.\n\n\n\n\n\n\n\n\n\n\n@event_pic2!"  #<Viele Männer in roten Gewändern, Träger der Schule #COLOR:{0.81,0.15,0} #E Sarvastivada#!#!, bevölkern die Klöster der Länder, die wir jetzt kontrollieren. Da das große theologische Zentrum dieser Schule in und um [GetProvince('(int32)7314').GetArea.GetRegion.GetName|T] liegt, täten wir gut daran, auch diese Bereiche zu entwickeln.\n\n\n\n\n\n\n\n\n\n\n@event_pic2!>  #NT!
  
 tayuan_ferghana_task_40: "Study Buddhism In India"  #<Studieren Sie Buddhismus in Indien>  #NT!
 tayuan_ferghana_task_40_DESC: "Some of the #COLOR:{0.81,0.15,0} Buddhist#! monks living within [ROOT.GetCountry.GetCapital.GetName|T] have petitioned [ROOT.GetCountry.GetRuler.GetName|Y] to fund an excursion south. Our Buddhist teachers wish to study alongside some of the wisest practitioners of the faith, and the [ROOT.GetCountry.GetRulerTitle] is inclined to grant them their wish.\n\n\n\n\n\n\n\n\n\n\n@india_mil20!"  #<Einige der #COLOR:{0.81,0.15,0} buddhistischen #! Mönche, die in [ROOT.GetCountry.GetCapital.GetName|T] leben, haben [ROOT.GetCountry.GetRuler.GetName|Y] um die Finanzierung eines Ausflugs nach Süden gebeten. Unsere buddhistischen Lehrer möchten an der Seite einiger der weisesten Praktizierenden des Glaubens studieren, und die [ROOT.GetCountry.GetRulerTitle] ist geneigt, ihnen diesen Wunsch zu erfüllen.\n\n\n\n\n\n\n\n\n\n\n@india_mil20!>  #NT!
  
 tayuan_ferghana_task_41: "Masters Of Trade"  #<Meister des Handels>  #NT!
 tayuan_ferghana_task_41_DESC: "Our [ROOT.GetCountry.GetAdjective] countrymen are gaining a reputation abroad for being fearsome negotiators when it comes to matters involving money, and it is widely acknowledged that we are skillful at commerce and will haggle over a fraction of a cent.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"  #<Unsere [ROOT.GetCountry.GetAdjective] Landsleute erlangen im Ausland den Ruf, furchterregende Unterhändler zu sein, wenn es um Geldangelegenheiten geht, und es ist weithin anerkannt, dass wir geschickt im Handel sind und um den Bruchteil eines Cents feilschen können.\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!>  #NT!
  
 tayuan_ferghana_task_42: "Humility In Learning"  #<Demut beim Lernen>  #NT!
 tayuan_ferghana_task_42_DESC: "#G The Records of The Great Historian#! contains a passage where an advisor to the emperor, Yao Ting-han, describes the Tayuan kingdom as 'militarily weak and that it would not require a force of more than three thousand #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! soldiers equipped with powerful crossbows to conquer it and take the entire population captive.'\n\nIt is an unfortunate insult, but not untruthful, when comparing our strength to the might of the great #T Eastern Empire#!. If we can swallow our pride and admit that their ways are superior to ours, then perhaps we could learn a thing or two. The time has come to send diplomats east, hats in hand, and hope that we can study their ways.\n\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<#G Die Aufzeichnungen des großen Historikers#! enthalten eine Passage, in der ein Berater des Kaisers, Yao Ting-han, das Tayuan-Königreich als „militärisch schwach“ beschreibt und dass es nicht einer Streitmacht von mehr als dreitausend #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Soldaten bedarf, die mit mächtigen Armbrüsten ausgerüstet sind, um es zu erobern und die gesamte Bevölkerung gefangen zu nehmen.‘\n\nEs ist eine unglückliche Beleidigung, aber nicht unwahr, wenn man unsere Stärke mit der Macht des großen #T Ostreichs#! vergleicht. Wenn wir unseren Stolz herunterschlucken und zugeben können, dass ihre Art den unseren überlegen ist, dann könnten wir vielleicht ein oder zwei Dinge lernen. Es ist an der Zeit, Diplomaten mit Hüten in der Hand nach Osten zu schicken und zu hoffen, dass wir ihre Vorgehensweise studieren können.\n\n\n\n\n\n\n\n\n\n\n@persia_mil1!>  #NT!
 tayuan_ferghana_42_tt: "We will unlock #Y Decisions#! to establish #COLOR:{0.77,0.5,0.09} Silk Road Trading Outposts#!."  #<Wir werden #Y Entscheidungen#! freischalten, um #COLOR:{0.77,0.5,0.09} Seidenstraßen-Handelsaußenposten#! zu errichten.>  #NT!
  
 tayuan_ferghana_task_43: "Willows For The Old Ways"  #<Weiden für die alten Wege>  #NT!
 tayuan_ferghana_task_43_DESC: "Petitions have arrived in [ROOT.GetCountry.GetCapital.GetName|T] from the #G Qin#! communities living alongside us, and [ROOT.GetCountry.GetRuler.GetName|Y] has agreed to grant them their request for improved social status within [ROOT.GetCountry.GetName|T].\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<In [ROOT.GetCountry.GetCapital.GetName|T] sind Petitionen von den mit uns lebenden #G Qin#!-Gemeinschaften eingetroffen, und [ROOT.GetCountry.GetRuler.GetName|Y] hat zugestimmt, ihnen ihrem Antrag auf einen verbesserten sozialen Status innerhalb von [ROOT.GetCountry.GetName|T] stattzugeben.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!>  #NT!
 we_need_qin_nobles_tt: "The #G Qin Culture#! must have #T Citizen#! #Y Civic Rights#!."
 tayuan_ferghana_task_43_tt: "Some of our pops will assimilate to the #G Qin#! culture."  #<Einige unserer Pops werden sich der #G Qin#!-Kultur anpassen.>  #NT!
  
 tayuan_ferghana_task_44: "Temples To The Shens"  #<None>  #NT!
 tayuan_ferghana_task_44_DESC: "In a nod to the growing numbers of #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! living within our borders, [ROOT.GetCountry.GetRuler.GetName|Y] has agreed to build a religious shrine to the local deities called #G 'shens'#!, and now that the order has been given, the city's religious district is already filled with the sounds of construction.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!"  #<In Anspielung auf die wachsende Zahl von #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, die innerhalb unserer Grenzen leben, hat [ROOT.GetCountry.GetRuler.GetName|Y] zugestimmt, einen religiösen Schrein für die örtlichen Gottheiten namens #G „shens“#!, zu errichten, und nachdem der Auftrag nun erteilt wurde, ist das religiöse Viertel der Stadt bereits mit den Klängen von erfüllt Bau.\n\n\n\n\n\n\n\n\n\n\n@event_pic11!>  #NT!
 temple_to_shens_mod: "Temple to the Shens"  #<Tempel der Shens>  #NT!
 desc_temple_to_shens_mod: "A shrine to the gods of the Huaxia has been built here."  #<Hier wurde ein Schrein für die Götter der Huaxia errichtet.>  #NT!
  
 tayuan_ferghana_task_45: "Kowtow"  #<Kotau>  #NT!
 tayuan_ferghana_task_45_DESC: "We are a stalwart of the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! in the West, fighting the dangerous hordes and expanding their ways of life so far away. It is thus time to send a great embassy East, to both show deference to the #T Son of Heaven#! and obtain his recognition.\n\n\n\n\n\n\n\n\n\n\n@italic_mil15!"  #<Wir sind ein treuer Vertreter der #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! im Westen, kämpfen gegen die gefährlichen Horden und erweitern ihre Lebensweise so weit weg. Es ist daher an der Zeit, eine große Botschaft nach Osten zu schicken, um sowohl dem #T Sohn des Himmels#! Ehrerbietung zu erweisen als auch seine Anerkennung zu erlangen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil15!>  #NT!
  
 tayuan_ferghana_task_46: "Life In Blossoms"  #<Leben in Blüten>  #NT!
 tayuan_ferghana_task_46_DESC: "Denying the nature of oneself is not in accordance with that nature itself. Time has shown us to be #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, and we must finally enshrine that way of living for all of our lands to follow. The road stands before [ROOT.GetCountry.GetName|T], but are our people ready to take the first steps?\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!"  #<Die eigene Natur zu leugnen, entspricht nicht dieser Natur selbst. Die Zeit hat gezeigt, dass wir #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, sind und wir müssen diese Lebensweise endlich verankern, damit alle unsere Länder sie befolgen können. Der Weg steht vor [ROOT.GetCountry.GetName|T], aber sind unsere Leute bereit, die ersten Schritte zu unternehmen?\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!>  #NT!
 tayuan_ferghana_task_46_tt: "We will have the choice to change our primary culture to #G Qin#!."  #<Wir werden die Wahl haben, unsere Primärkultur in #G Qin#!. zu ändern>  #NT!
  
 tayuan_ferghana_task_47: "A Great Monastery"  #<Ein großes Kloster>  #NT!
 tayuan_ferghana_task_47_DESC: "Already many monks abandon the practice of vassa, now preferring to live with their brethren in isolation in #COLOR:{0.81,0.15,0} #E Sangharamas#!#! (monasteries). We should build a great one in [GetProvince('(int32)6740').GetName|T], so its influence can be felt throughout the valley.\n\n#COLOR:{0.3,0.5,0.38} Historical Note#!: Quva was the centre of Buddhism in the valley, as there was a big monastery there founded in the 4-3rd centuries BCE, which lies in ruins today.\n\n\n\n\n\n\n\n\n\n\n@italic_mil2!"  #<Viele Mönche geben bereits die Vassa-Praxis auf und leben nun lieber isoliert mit ihren Brüdern in #COLOR:{0.81,0.15,0} #E Sangharamas#!#! (Klöstern). Wir sollten in [GetProvince('(int32)6740').GetName|T] ein großes Kloster bauen, damit sein Einfluss im ganzen Tal spürbar ist.\n\n#COLOR:{0.3,0.5,0.38} Historische Anmerkung#!: Quva war das Zentrum des Buddhismus im Tal, da es dort ein großes Kloster gab, das im 4.-3. Jahrhundert v. Chr. gegründet wurde und heute in Trümmern liegt.\n\n\n\n\n\n\n\n\n\n\n@italic_mil2!>  #NT!
  
 tayuan_ferghana_task_48: "Macedonian Petitions"  #<Mazedonische Petitionen>  #NT!
 tayuan_ferghana_task_48_DESC: "In our newly conquered territories, many haven't forgotten our hostile policy towards Macedonians and their rule here. They are concerned, as they have come to live in such a remote land and it would be quite difficult to get their lives functional elsewhere. What are we going to do in regards to them?\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!"  #<In unseren neu eroberten Gebieten haben viele unsere feindselige Politik gegenüber den Mazedoniern und ihrer Herrschaft hier nicht vergessen. Sie sind besorgt, da sie in einem so abgelegenen Land leben und es ziemlich schwierig wäre, anderswo ein funktionierendes Leben zu führen. Was werden wir in Bezug auf sie tun?\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!>  #NT!
  
 tayuan_ferghana_task_49: "Shipping Over All Lands"  #<Versand in alle Länder>  #NT!
 tayuan_ferghana_task_49_DESC: "Without a doubt, one of the things that aches our #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! heart the most is the lack of access to the wide, open sea, the sea that in its hugeness allows the heart to fill it with whatever it wishes; hopes, dreams, and much more.\n\nGiven the recent influx of Huaxia traders, we may be able to establish 'shipping' lanes over huge distances, which while not a real replacement, are still a worthwhile trading endeavour.\n\n\n\n\n\n\n\n\n\n\n@italic_mil4!"  #<Ohne Zweifel ist eines der Dinge, die unser #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! Herz am meisten schmerzt, der fehlende Zugang zum weiten, offenen Meer, dem Meer, das in seiner Größe dem Herzen erlaubt, es mit allem zu füllen, was es sich wünscht; Hoffnungen, Träume und vieles mehr.\n\nAngesichts des jüngsten Zustroms von Huaxia-Händlern können wir möglicherweise „Schifffahrtsrouten“ über große Entfernungen einrichten, die zwar keinen wirklichen Ersatz, aber dennoch ein lohnendes Handelsunternehmen darstellen.\n\n\n\n\n\n\n\n\n\n\n@italic_mil4!>  #NT!
  
 tayuan_ferghana_task_50: "Leaders Of Men"  #<Führer der Männer>  #NT!
 tayuan_ferghana_task_50_DESC: "Yes, #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#E s#!#! are the ones who rule; regardless, we are a huge minority in our nation. We cannot be expected to rule alone. Thus, there is a choice; either integrate all into our superior ways, share our rule with another group, or respect the plurality of everyone else.\n\n\n\n\n\n\n\n\n\n\n@persia_mil8!"  #<Ja, #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#E s#!#! sind diejenigen, die herrschen; Ungeachtet dessen sind wir eine große Minderheit in unserem Land. Von uns kann nicht erwartet werden, dass wir allein regieren. Es gibt also eine Wahl; entweder alle in unsere überlegenen Wege integrieren, unsere Herrschaft mit einer anderen Gruppe teilen oder die Pluralität aller anderen respektieren.\n\n\n\n\n\n\n\n\n\n\n@persia_mil8!>  #NT!
 tayuan_ferghana_task_50tt: "We will get to select a special bonus for our nation."  #<Wir werden einen besonderen Bonus für unser Land auswählen können.>  #NT!
  
 tayuan_ferghana_task_final: "New Life, New Mantle"  #<Neues Leben, neuer Mantel>  #NT!
 tayuan_ferghana_task_final_DESC: "So much has changed for the people of [ROOT.GetCountry.GetName|T] that it is difficult to know where we are going. Wars and rumors of wars surround us on every side, invaders from the steppe are an ever-present threat, and the gods of this land are still new to us. But in the face of these challenges, [ROOT.GetCountry.GetRuler.GetName|Y] has led to our people to unforeseen heights, and although the road forward seems like one that will be fraught with danger, we are ready for whatever lies ahead.\n\n\n\n\n\n\n\n\n\n\n@persia_mil15!"  #<Für die Menschen in [ROOT.GetCountry.GetName|T] hat sich so viel verändert, dass es schwierig ist zu wissen, wohin wir gehen. Kriege und Kriegsgerüchte umgeben uns von allen Seiten, Eindringlinge aus der Steppe sind eine allgegenwärtige Bedrohung und die Götter dieses Landes sind für uns noch neu. Aber angesichts dieser Herausforderungen hat [ROOT.GetCountry.GetRuler.GetName|Y] unser Volk zu unvorhergesehenen Höhen geführt, und obwohl der Weg nach vorne voller Gefahren zu sein scheint, sind wir bereit für alles, was vor uns liegt.\n\n\n\n\n\n\n\n\n\n\n@persia_mil15!>  #NT!
  
 tayuan_ferghana_task_: ""
 tayuan_ferghana_task__DESC: ""
  
  
 # Events 
  
 me_tayuan_ferghana.1666.title: "Poseidon On The Jaxartes"  #<Poseidon über den Jaxartes>  #NT!
 me_tayuan_ferghana.1666.desc: "After many months of waiting, our claims on the serpentine province of [GetProvince('(int32)6773').GetArea.GetName] have been completed and our soldiers prepare for the grim trek into the wind-blasted mountains of the [GetProvince('(int32)6773').GetArea.GetRegion.GetName] region.\n\nThere are few living in [ROOT.GetCountry.GetCapital.GetName] that oppose these measures, for the majority have thrown their support behind the ambitious [ROOT.GetCountry.GetRuler.GetName], who has boldly proclaimed that the [ROOT.GetCountry.GetAdjective] armies are destined to rule over the rich cities of the #E Tarim Basin#! and beyond."  #<Nach vielen Monaten des Wartens sind unsere Ansprüche auf die Serpentinenprovinz [GetProvince('(int32)6773').GetArea.GetName] abgeschlossen und unsere Soldaten bereiten sich auf den düsteren Marsch in die windgepeitschten Berge der [GetProvince('(int32)6773').GetArea.GetRegion.GetName]-Region vor.\n\nEs gibt nur wenige Bewohner von [ROOT.GetCountry.GetCapital.GetName], die sich diesen Maßnahmen widersetzen, denn die Mehrheit hat ihre Unterstützung hinter den ehrgeizigen [ROOT.GetCountry.GetRuler.GetName] geworfen, der mutig verkündet hat, dass die [ROOT.GetCountry.GetAdjective]-Armeen dazu bestimmt sind, über die reichen Städte zu herrschen des #E Tarim-Beckens#! und darüber hinaus.>  #NT!
 me_tayuan_ferghana.1666.a: "The rich trade cities of the oases must be under our control!"  #<Die reichen Handelsstädte der Oasen müssen unter unserer Kontrolle sein!>  #NT!
  
 me_tayuan_ferghana.2.title: "$tayuan_ferghana_task_1$"  #<$tayuan_ferghana_task_1$>  #NT!
 me_tayuan_ferghana.2.desc: "While the city of [ROOT.GetCountry.GetCapital.GetName] is a veritable paradise during the warm and sunny months, the winter season is so bitterly cold that those with money often leave the frostbitten capital of the [ROOT.GetCountry.GetAdjective] until the strength of the sun returns to the skies. The winds from the #E Ferghanan Mountains#! run through the streets like rampaging cavalry and bring with them all of the fury of Euros, freezing small streams during the colder months and even causing the mighty waters of the #E Jaxartes#! to grow thick with ice clods.\n\nIt is in this harsh land that the architects and engineers of [ROOT.GetCountry.GetRuler.GetName] somehow accomplished the impossible, and thanks to their clever designs, a system of extensive canals and aqueducts were built that shaped the face of the earth and changed the course of nature itself. Not only did these waterways bring the gift of life itself to the city, but the stone walls of the aqueducts sheltered its inhabitants from the worst of the elements."  #<Während die Stadt [ROOT.GetCountry.GetCapital.GetName] in den warmen und sonnigen Monaten ein wahres Paradies ist, ist die Wintersaison so bitterkalt, dass diejenigen mit Geld oft die erfrorene Hauptstadt des [ROOT.GetCountry.GetAdjective] verlassen, bis die Sonne wieder kräftig am Himmel scheint. Die Winde aus dem #E Ferghanan-Gebirge#! rasen wie tobende Kavallerie durch die Straßen und bringen die ganze Wut der Euro mit sich, gefrieren in den kälteren Monaten kleine Bäche und lassen sogar die mächtigen Gewässer des #E Jaxartes#! mit Eisklumpen anwachsen.\n\nIn diesem rauen Land haben die Architekten und Ingenieure von [ROOT.GetCountry.GetRuler.GetName] das irgendwie geschafft unmöglich, und dank ihrer cleveren Konstruktionen wurde ein System ausgedehnter Kanäle und Aquädukte gebaut, das das Antlitz der Erde formte und den Lauf der Natur selbst veränderte. Diese Wasserstraßen brachten der Stadt nicht nur das Geschenk des Lebens, sondern die Steinmauern der Aquädukte schützten ihre Bewohner auch vor den schlimmsten Elementen.>  #NT!
 me_tayuan_ferghana.2.a: "All hail the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] family for preserving the lives of the people!"  #<Alle loben die Familie [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] dafür, dass sie das Leben der Menschen bewahrt!>  #NT!
  
 me_tayuan_ferghana.3.title: "$tayuan_ferghana_task_2$"  #<$tayuan_ferghana_task_2$>  #NT!
 me_tayuan_ferghana.3.desc: "Although [ROOT.GetCountry.GetRuler.GetName] knew that conquering into the #E Tarim Basin#! would bring changes to the people of [ROOT.GetCountry.GetName], even the farseeing [ROOT.GetCountry.GetRulerTitle] was surprised by something that [ROOT.GetCountry.GetRuler.GetSheHe] did not expect; the freeflowing exchange of cultural ideas between our countrymen and the foreigners living within our borders.\n\nThe inhabits of the Basin worship gods that we have never heard of and speak in tongues that our ears have trouble discerning, and these fascinating strangers have influenced our society with their ideas, mannerisms and traditions."  #<Obwohl [ROOT.GetCountry.GetRuler.GetName] wusste, dass die Eroberung des #E Tarim-Beckens#! Veränderungen für die Menschen von [ROOT.GetCountry.GetName] mit sich bringen würde, wurde selbst der weitsichtige [ROOT.GetCountry.GetRulerTitle] von etwas überrascht, das [ROOT.GetCountry.GetRuler.GetSheHe] nicht erwartet hatte; der freie Austausch kultureller Ideen zwischen unseren Landsleuten und den Ausländern, die innerhalb unserer Grenzen leben.\n\nDie Bewohner des Beckens verehren Götter, von denen wir noch nie gehört haben, und sprechen in Sprachen, die unsere Ohren nur schwer erkennen können, und diese faszinierenden Fremden haben unsere Gesellschaft mit ihren Ideen, Manierismen und Traditionen beeinflusst.>  #NT!
 me_tayuan_ferghana.3.a: "This is a curious development, to say the least..."  #<Das ist, gelinde gesagt, eine merkwürdige Entwicklung ...>  #NT!
  
 me_tayuan_ferghana.4.title: "There Is Wine!"  #<Es gibt Wein!>  #NT!
 me_tayuan_ferghana.4.desc: "The men were standing in the shade of the building, faces alight with merriment as [SCOPE.sCharacter('ferghani_wine_drinker').GetName] stepped forward into their midst, completely unaware of the danger that he was in. Standing next to [ROOT.GetCountry.GetRuler.GetName] was a Ferghani shepherd, a local farmer that was in on the plot, and all eyes were on the man as he struggled to carry a large amphora. Moments later, his calloused hands were fumbling to unwrap the seal and pour its contents into clay bowls, and they all stepped forward as one.\n\nThe reason for this gathering was an obscure one. [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName], a nobleman from these parts, was known for two things; the oaths of loyalty he had sworn to our people and the fermented mare's milk, or #E 'kumis#!,' that his herds supplied the region with. There were many Ferghani that hated [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName] for betraying their people, but he was under the personal protection of [ROOT.GetCountry.GetRuler.GetFirstName] and had been promised parcels of land in return for his service - something the man was clearly eager to obtain.\n\nBut this was not the only reason why the [ROOT.GetCountry.GetRulerTitle] had summoned Barzhun. A confession at a recent feast had caused a minor scandal. The Ferghanis preferred their own rustic drink to that of the Greeks, and [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName] had admitted that he had never tasted wine before - a fact that [ROOT.GetCountry.GetRuler.GetFirstName] promised to change before the day had ended.\n\nClearing his throat, Barzhun bowed before [ROOT.GetCountry.GetRuler.GetFirstName] and raised his bowl. 'What are we drinking to, [ROOT.GetCountry.GetRulerTitle]?'\n\n'To the fruitful stewardship of the lands I am entrusting you with, [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName]. Rule wisely in my name, and perhaps there will be more gifts to come.'\n\n'Now that's something I will toast!' laughed the Ferghani nobleman, and the two raised the salute. Draining his bowl in a single gulp, the Ferghani choked, eyes bulging from his sun-weathered face, and he turned his head to spit the dark liquid onto the ground. At this, everyone burst into laughter, and [ROOT.GetCountry.GetRuler.GetFirstName] clapped a sputtering Bharzun on the back."  #<Die Männer standen im Schatten des Gebäudes, ihre Gesichter strahlten vor Heiterkeit, als [SCOPE.sCharacter('ferghani_wine_drinker').GetName] in ihre Mitte trat, ohne sich der Gefahr bewusst zu sein, in der er schwebte. Neben [ROOT.GetCountry.GetRuler.GetName] stand ein Ferghani-Schäfer, ein örtlicher Bauer, der an dem Grundstück beteiligt war, und alle Augen waren auf den Mann gerichtet, der sich abmühte, eine große Amphore zu tragen. Augenblicke später versuchten seine schwieligen Hände, das Siegel abzuwickeln und seinen Inhalt in Tonschalen zu gießen, und alle traten gleichzeitig vor.\n\nDer Grund für diese Versammlung war unklar. [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName], ein Adliger aus dieser Gegend, war für zwei Dinge bekannt; die Treueeide, die er unserem Volk geschworen hatte, und die fermentierte Stutenmilch oder #E 'Kumis#!,', mit denen seine Herden die Region versorgten. Es gab viele Ferghani, die [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName] hassten, weil er ihr Volk verraten hatte, aber er stand unter dem persönlichen Schutz von [ROOT.GetCountry.GetRuler.GetFirstName] und ihm wurden als Gegenleistung für seine Dienste Landparzellen versprochen – etwas, das der Mann offensichtlich unbedingt erhalten wollte.\n\nAber das war nicht der einzige Grund, warum die [ROOT.GetCountry.GetRulerTitle] Barzhun gerufen hatten. Ein Geständnis bei einem kürzlichen Fest hatte für einen kleinen Skandal gesorgt. Die Ferghanis bevorzugten ihr eigenes rustikales Getränk gegenüber dem der Griechen, und [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName] hatte zugegeben, dass er noch nie zuvor Wein probiert hatte – eine Tatsache, die [ROOT.GetCountry.GetRuler.GetFirstName] versprach, sich zu ändern, bevor der Tag zu Ende war.\n\nBarzhun räusperte sich, verneigte sich vor [ROOT.GetCountry.GetRuler.GetFirstName] und hob seine Schüssel. 'Worauf trinken wir, [ROOT.GetCountry.GetRulerTitle]?'\n\n'Auf die fruchtbare Verwaltung der Länder, die ich dir anvertraue, [SCOPE.sCharacter('ferghani_wine_drinker').GetFirstName]. Regiere weise in meinem Namen, und vielleicht gibt es noch weitere Geschenke.'\n\n'Das ist etwas, worauf ich anstoßen werde!' lachte der Ferghani-Adlige, und die beiden hoben den Gruß. Der Ferghani leerte seine Schüssel in einem einzigen Zug, würgte, die Augen traten aus seinem sonnengebräunten Gesicht hervor und er drehte den Kopf, um die dunkle Flüssigkeit auf den Boden zu spucken. Daraufhin brachen alle in Gelächter aus und [ROOT.GetCountry.GetRuler.GetFirstName] klopfte einem stotternden Bharzun auf den Rücken.>  #NT!
 me_tayuan_ferghana.4.a: "Save the milk for babies, my boy - wine is for men!"  #<Hebe die Milch für Babys auf, mein Junge – Wein ist für Männer!>  #NT!
  
 me_tayuan_ferghana.5.title: "$tayuan_ferghana_task_4$"  #<$tayuan_ferghana_task_4$>  #NT!
 me_tayuan_ferghana.5.desc: "Our farmers have adopted the techniques of the lands that we live in, and although some living in [ROOT.GetCountry.GetCapital.GetName] refuse to try the rice that our laborers bring to market, they are looked at as fools depriving only themselves of sustenance. This land is a bountiful but harsh mistress, and if we remain inflexible in the face of the mountain winds that bring the frosts to our fields, then we shall snap in two like kindling thrown into a fire pit.\n\n'But if we learn the natural rhythms of this place that we have made our homes, and we listen to the songs of strange birds that live in the dusty valleys and watch the stars as they travel across the skies, then perhaps we will begin to know this land like the home we left behind. Our people must embrace the changes thrust upon us, and this includes our diets as well.' The words of [ROOT.GetCountry.GetRuler.GetName] would win over the hearts of those that remained unconvinced, and the people of [ROOT.GetCountry.GetName] would thrive."  #<Unsere Bauern haben die Techniken der Länder, in denen wir leben, übernommen, und obwohl einige in [ROOT.GetCountry.GetCapital.GetName] lebende Menschen sich weigern, den Reis zu probieren, den unsere Arbeiter auf den Markt bringen, werden sie als Dummköpfe angesehen, die nur sich selbst den Lebensunterhalt entziehen. Dieses Land ist eine großzügige, aber raue Herrin, und wenn wir angesichts der Bergwinde, die den Frost auf unsere Felder bringen, unbeugsam bleiben, werden wir in zwei Stücke zerbrechen wie Anzündholz, das in eine Feuerstelle geworfen wird.\n\n'Aber wenn wir die natürlichen Rhythmen dieses Ortes lernen, den wir zu unseren Häusern gemacht haben, und wir den Liedern seltsamer Vögel lauschen, die in den staubigen Tälern leben, und die Sterne beobachten, wie sie über den Himmel fliegen, dann werden wir vielleicht anfangen, dieses Land so zu kennen Zuhause, das wir zurückgelassen haben. „Unser Volk muss die Veränderungen, die uns auferlegt werden, annehmen, und dazu gehört auch unsere Ernährung.“ Die Worte von [ROOT.GetCountry.GetRuler.GetName] würden die Herzen derjenigen erobern, die nicht überzeugt waren, und den Menschen von [ROOT.GetCountry.GetName] würde es gut gehen.>  #NT!
 me_tayuan_ferghana.5.a: "We must be content with the food that we have, not what we want"  #<Wir müssen mit der Nahrung zufrieden sein, die wir haben, und nicht mit dem, was wir wollen>  #NT!
  
 me_tayuan_ferghana.6.title: "$tayuan_ferghana_task_6$"  #<$tayuan_ferghana_task_6$>  #NT!
 me_tayuan_ferghana.6.desc: "Small statuettes of an Indian prince, a wise man named #E 'Siddharta'#!, have been appearing within the shrines of [ROOT.GetCountry.GetCapital.GetName], most likely placed there by the incense @incense! traders that have been coming to our markets, and there are wise men found at every crossroads within [ROOT.GetCountry.GetName] that preaches the message of the Buddha.\n\n[ROOT.GetCountry.GetRuler.GetName] has heard of this sage before, for his followers, the so-called 'Buddhists', often travel through our lands, and some have even met with our Hierophant [SCOPE.sCharacter('high_priest_character').GetName] in order to share their beliefs with our high priest.\n\nAfter listening to their words, [SCOPE.sCharacter('high_priest_character').GetFirstName] says that the Buddhists are peaceful, honorable people, and so when a group of Buddhist exiles asked if they could settle within our borders, both Hierophant and [ROOT.GetCountry.GetRulerTitle] were inclined to show mercy."  #<Kleine Statuetten eines indischen Prinzen, eines weisen Mannes namens #E „Siddharta“#!,, sind in den Schreinen von [ROOT.GetCountry.GetCapital.GetName] aufgetaucht, höchstwahrscheinlich dort platziert beim Weihrauch @incense! Händler, die zu unseren Märkten gekommen sind, und an jeder Kreuzung in [ROOT.GetCountry.GetName] findet man weise Männer, die die Botschaft des Buddha predigen.\n\n[ROOT.GetCountry.GetRuler.GetName] hat schon einmal von diesem Weisen gehört, denn seine Anhänger, die sogenannten „Buddhisten“, reisen oft durch unsere Länder, und einige haben sich sogar mit unserem Hierophanten [SCOPE.sCharacter('high_priest_character').GetName] getroffen, um ihren Glauben mit unserem Hohepriester zu teilen.\n\nNachdem sie ihren Worten zugehört hatten, [SCOPE.sCharacter('high_priest_character').GetFirstName] sagt, dass die Buddhisten friedliche, ehrenhafte Menschen seien, und als eine Gruppe buddhistischer Exilanten fragte, ob sie sich innerhalb unserer Grenzen niederlassen könnten, waren sowohl Hierophant als auch [ROOT.GetCountry.GetRulerTitle] geneigt, Gnade zu zeigen.>  #NT!
 me_tayuan_ferghana.6.a: "The Buddhists can stay here, but they are forbidden from preaching"  #<Die Buddhisten können hier bleiben, aber es ist ihnen verboten zu predigen>  #NT!
 me_tayuan_ferghana.6.b: "Perhaps our new guests will continue to share Siddharta's words with us"  #<Vielleicht werden unsere neuen Gäste weiterhin Siddhartas Worte mit uns teilen>  #NT!
  
 me_tayuan_ferghana.7.title: "$tayuan_ferghana_task_5$"  #<$tayuan_ferghana_task_5$>  #NT!
 me_tayuan_ferghana.7.desc: "Slowly, along the perilous roads of the #E Tarim#!, the first #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! caravans start arriving in the distance, appearing like ants treading along the sands. We open the gates of the city, and they, tired and dirty, show as much gratefulness as their energy allows. The next morning, they shower us with gifts from their great Emperor, whom they call the #E Son of Heaven#!.\n\nAlready, some of their numbers remain in our cities (especially [GetProvince('(int32)7184').GetName]), and build their houses, with the intention of living here and providing safe haven to all their countrymen. Although we do not know much about them, one thing is for sure; they are a resilient bunch."  #<Langsam, entlang der gefährlichen Straßen des #E Tarim#!,, treffen in der Ferne die ersten #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Karawanen ein und erscheinen wie Ameisen, die über den Sand laufen. Wir öffnen die Tore der Stadt und sie zeigen müde und schmutzig so viel Dankbarkeit, wie es ihre Energie zulässt. Am nächsten Morgen überschütten sie uns mit Geschenken ihres großen Kaisers, den sie den #E Sohn des Himmels#!.\n\nAlready, nennen. Einige von ihnen bleiben in unseren Städten (besonders [GetProvince('(int32)7184').GetName]) und bauen ihre Häuser mit der Absicht, hier zu leben und allen ihren Landsleuten einen sicheren Zufluchtsort zu bieten. Obwohl wir nicht viel über sie wissen, ist eines sicher; Sie sind ein widerstandsfähiger Haufen.>  #NT!
 me_tayuan_ferghana.7001.desc: "Slowly, along the perilous roads of the #E Tarim#!, the first #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! caravans start arriving on the distance, something like ants treading along the sands. We open the gates of the city, they, tired and dirty, show as much gratefulness as their energy allows. The next morning, they hand us some small gifts, not many, from their Emperor, whom they call the #E Son of Heaven#!.\n\nA daring few remain in our cities (especially [GetProvince('(int32)7184').GetName]), and build their houses, with the intention of living here and providing safe haven to all their countrymen. One thing is for sure, they are a resilient bunch."  #<Langsam, entlang der gefährlichen Straßen des #E Tarim#!,, treffen in der Ferne die ersten #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! Karawanen ein, so etwas wie Ameisen, die über den Sand laufen. Wir öffnen die Tore der Stadt, sie zeigen müde und schmutzig so viel Dankbarkeit, wie es ihre Energie zulässt. Am nächsten Morgen überreichen sie uns ein paar kleine Geschenke, nicht viele, von ihrem Kaiser, den sie den #E Sohn des Himmels#!.\n\nA nennen. Wenige Mutige bleiben in unseren Städten (besonders [GetProvince('(int32)7184').GetName]) und bauen ihre Häuser mit der Absicht, hier zu leben und allen ihren Landsleuten einen sicheren Zufluchtsort zu bieten. Eines ist sicher: Sie sind ein widerstandsfähiger Haufen.>  #NT!
 me_tayuan_ferghana.7.a: "Our gates are wide open"  #<Unsere Tore stehen weit offen>  #NT!
  
 me_tayuan_ferghana.8.title: "$tayuan_ferghana_task_7$"  #<$tayuan_ferghana_task_7$>  #NT!
 me_tayuan_ferghana.8.desc: "One day, [ROOT.GetCountry.GetRuler.GetName] was out in the military camps outside of [ROOT.GetCountry.GetCapital.GetName], observing the warriors in the army as they trained. The levies of [ROOT.GetCountry.GetName] utilize different martial techniques when they battle, and by blending the traditions of the #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! and the #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! and fusing them into one, our forces have become quite capable.\n\nImpressed by the skill demonstrated by our riders, [ROOT.GetCountry.GetRuler.GetFirstName] uttered a line that would be remembered far after [ROOT.GetCountry.GetRuler.GetHerHis] reign would be, for our people would come to see [ROOT.GetCountry.GetRuler.GetHerHis] words as prophecy."  #<Eines Tages war [ROOT.GetCountry.GetRuler.GetName] in den Militärlagern außerhalb von [ROOT.GetCountry.GetCapital.GetName] und beobachtete die Krieger der Armee beim Training. Die Truppen von [ROOT.GetCountry.GetName] nutzen im Kampf unterschiedliche Kampftechniken, und durch die Verschmelzung der Traditionen der #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! und der #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! sind unsere Streitkräfte recht leistungsfähig geworden.\n\nBeeindruckt von den Fähigkeiten unserer Reiter äußerte [ROOT.GetCountry.GetRuler.GetFirstName] eine Zeile, an die man sich noch lange erinnern würde [ROOT.GetCountry.GetCapital.GetName]0 Herrschaft wäre, denn unser Volk würde [ROOT.GetCountry.GetCapital.GetName]0 Worte als Prophezeiung betrachten.>  #NT!
 me_tayuan_ferghana.8.a: "'Give us a spear, a horse and a bow, and we will conquer the world...'"  #<„Gib uns einen Speer, ein Pferd und einen Bogen, und wir werden die Welt erobern …“>  #NT!
  
 me_tayuan_ferghana.9.title: "$tayuan_ferghana_task_8$"  #<$tayuan_ferghana_task_8$>  #NT!
 me_tayuan_ferghana.9.desc: "[ROOT.GetCountry.GetRuler.GetName] is the the undisputed masters of a vast realm, one that extends to the waters of the #E Mare Aralense#! in the west to the towering #E Ferghanan Mountains#! to the east.\n\nWhen asked by sycophants at the court in [ROOT.GetCountry.GetCapital.GetName] about how [ROOT.GetCountry.GetRuler.GetSheHe] was able to subdue such a vast territory, the [ROOT.GetCountry.GetRulerTitle] declined the fawning praise and was quick to honor the brave warriors of our armies, the cavalrymen who rode on up to the sky in the backs of their horses. Conquering the tribes in the furthest heights was no easy task, but our riders did it."  #<[ROOT.GetCountry.GetRuler.GetName] ist der unbestrittene Herrscher eines riesigen Reiches, das sich von den Gewässern des #E Mare Aralense#! im Westen bis zu den hoch aufragenden #E Ferghanan-Bergen#! im Osten erstreckt.\n\nAuf die Frage von Speichelleckern am Hof in [ROOT.GetCountry.GetCapital.GetName], wie [ROOT.GetCountry.GetRuler.GetSheHe] ein so großes Gebiet unterwerfen konnte, antwortete der [ROOT.GetCountry.GetRulerTitle] lehnte das schmeichelnde Lob ab und ehrte schnell die tapferen Krieger unserer Armeen, die Kavalleristen, die auf dem Rücken ihrer Pferde in den Himmel ritten. Die Stämme in den höchsten Höhen zu erobern war keine leichte Aufgabe, aber unsere Reiter haben es geschafft.>  #NT!
 me_tayuan_ferghana.9.a: "The #E Ferghanan Army#! has brought peace to steppes, mountains, and deserts."  #<Die #E Ferghanan-Armee#! hat Frieden in Steppen, Berge und Wüsten gebracht.>  #NT!
  
 me_tayuan_ferghana.10.title: "$tayuan_ferghana_task_9$"  #<$tayuan_ferghana_task_9$>  #NT!
 me_tayuan_ferghana.10.desc: "''Marbled are the streets, many are the statues, huge are the temples, sprawling are the gardens, and many are the people. Brother, what more can I tell you of the splendor to be found in [GetProvince('(int32)6735').GetName], the greatest of the cities, without spoiling the beauty of that flower? My dry tongue would never do it justice.''\n\nThe traveler, then, assumed that this was a city like he'd never seen; but he had been at one of the Greeks' cities, [GetProvince('(int32)6704').GetName], and had found it pleasing but not great. It must have been then that these Greeks, displeased with their old city, in some short years built a great city to rival all."  #<„Marmoriert sind die Straßen, viele Statuen, riesig sind die Tempel, weitläufig sind die Gärten und viele Menschen.“ Bruder, was kann ich dir noch mehr über die Pracht sagen, die in [GetProvince('(int32)6735').GetName], der größten aller Städte, zu finden ist, ohne die Schönheit dieser Blume zu verderben? Meine trockene Zunge würde dem nie gerecht werden.''\n\nDer Reisende ging also davon aus, dass dies eine Stadt war, wie er sie noch nie gesehen hatte; aber er war in einer der Städte der Griechen gewesen, [GetProvince('(int32)6704').GetName], und hatte es angenehm, aber nicht großartig gefunden. Damals muss es gewesen sein, dass diese Griechen, unzufrieden mit ihrer alten Stadt, in wenigen Jahren eine große Stadt bauten, die allen Konkurrenz machen konnte.>  #NT!
 me_tayuan_ferghana.10.a: "Hope the camels can handle another change to the itinerary."  #<Ich hoffe, die Kamele können eine weitere Änderung der Reiseroute verkraften.>  #NT!
  
 me_tayuan_ferghana.11.title: "$tayuan_ferghana_task_10$"  #<$tayuan_ferghana_task_10$>  #NT!
 me_tayuan_ferghana.11.desc: "The orders that [ROOT.GetCountry.GetRuler.GetName] gave to the generals that fought the #E Bactrian Campaigns#! were simple enough; burn down the cities of our enemies and pillage the holdings of those that oppose us, take anything and everything that they have of value, and extend the offer of military service to their elites. Any that wish to join us peacefully must be given the chance to do so, but if our offers of kindness were rebuffed, then not even the animals could be spared.\n\nLuckily for us, there were many that came to our banners, including many of the architects and engineers that had constructed cities and towns throughout the Bactrian territories. And as for those that foolishly remain stiff-necked, they lost their heads."  #<Die Befehle, die [ROOT.GetCountry.GetRuler.GetName] den Generälen erteilte, die an den #E Baktrischen Feldzügen#! kämpften, waren recht einfach; Brennen Sie die Städte unserer Feinde nieder und plündern Sie die Besitztümer derer, die sich uns widersetzen, nehmen Sie alles, was sie von Wert haben, und erweitern Sie das Angebot zum Militärdienst auf ihre Eliten. Jedem, der sich uns friedlich anschließen möchte, muss die Chance dazu gegeben werden, aber wenn unsere freundlichen Angebote zurückgewiesen würden, könnten nicht einmal die Tiere verschont bleiben.\n\nZum Glück für uns kamen viele zu unseren Bannern, darunter viele der Architekten und Ingenieure, die in den baktrischen Gebieten Städte und Ortschaften gebaut hatten. Und diejenigen, die törichterweise halsstarrig bleiben, haben den Kopf verloren.>  #NT!
 me_tayuan_ferghana.11.a: "I shall rebuild these territories in due time..."  #<Ich werde diese Gebiete zu gegebener Zeit wieder aufbauen ...>  #NT!
  
 me_tayuan_ferghana.12.title: "$tayuan_ferghana_task_11$"  #<$tayuan_ferghana_task_11$>  #NT!
 me_tayuan_ferghana.12.desc: "It is said that in the court of the #E Son of Heaven#!, any nobleman that cannot afford one of the horses @horses! raised in our stables is viewed as inferior to the others, and staggering sums are sent from the coffers of the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! to the treasuries of the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]. Even if these are mere rumors intended to flatter the [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetSheHe] couldn't be any prouder of our reputation for having the best horses in the world.\n\nThe wise [ROOT.GetCountry.GetRuler.GetFirstName] has taken some of these profits and has ordered that new slave estates be built to handle the demand for our stallions."  #<Es wird gesagt, dass am Hofe des #E Sohn des Himmels#!, jeder Adlige steht, der sich keines der Pferde leisten kann @horses! Die in unseren Ställen gezüchteten Tiere gelten als minderwertig gegenüber den anderen, und aus den Kassen der #COLOR:{0.77,0.5,0.09} #E Huaxia#!#! werden unglaubliche Summen in die Schatzkammern der [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] geschickt. Auch wenn es sich lediglich um Gerüchte handelt, die den [ROOT.GetCountry.GetRulerTitle] schmeicheln sollen, könnte [ROOT.GetCountry.GetRuler.GetSheHe] nicht stolzer auf unseren Ruf sein, die besten Pferde der Welt zu haben.\n\nDer weise [ROOT.GetCountry.GetRuler.GetFirstName] hat einen Teil dieser Gewinne mitgenommen und den Bau neuer Sklavenanwesen angeordnet, um die Nachfrage nach unseren Hengsten zu decken.>  #NT!
 me_tayuan_ferghana.12.a: "Truly, the gods have blessed us beyond what we deserve"  #<Wahrlich, die Götter haben uns mehr gesegnet, als wir verdienen>  #NT!
  
 me_tayuan_ferghana.13.title: "$tayuan_ferghana_task_12$"  #<$tayuan_ferghana_task_12$>  #NT!
 me_tayuan_ferghana.13.desc: "Our ever-growing bureaucracy has forced the hand of [ROOT.GetCountry.GetRuler.GetName], who has entrusted the wisest living within [ROOT.GetCountry.GetCapital.GetName] to develop and refine a written script for our people.\n\nAlthough it took the sages an entire year to complete their assignment, the new #E Ferghani Script#! was the triumphant result of their efforts. We had previously relied on a hodgepodge of foreign and local languages to keep our written affairs in order, and a scribe living in our capital would have to be familiar with at least seven different tongues in order to read and write - an impracticality that was causing serious issues.\n\nBut this is a thing of the past, and although some are struggling to master the new way of doing things, [ROOT.GetCountry.GetRuler.GetFirstName] believes that our Ferghani script will pay dividends, especially when it comes to our record keeping."  #<Unsere ständig wachsende Bürokratie hat die Hand von [ROOT.GetCountry.GetRuler.GetName] gezwungen, der die weisesten Lebewesen in [ROOT.GetCountry.GetCapital.GetName] damit beauftragt hat, ein schriftliches Drehbuch für unser Volk zu entwickeln und zu verfeinern.\n\nObwohl die Weisen ein ganzes Jahr brauchten, um ihren Auftrag zu erfüllen, war das neue #E Ferghani-Skript#! das triumphale Ergebnis ihrer Bemühungen. Bisher waren wir auf eine Mischung aus Fremd- und Landessprachen angewiesen, um unsere schriftlichen Angelegenheiten in Ordnung zu halten, und ein in unserer Hauptstadt lebender Schreiber musste mit mindestens sieben verschiedenen Sprachen vertraut sein, um lesen und schreiben zu können – eine Unpraktikabilität, die ernsthafte Probleme verursachte.\n\nAber das gehört der Vergangenheit an, und obwohl einige Schwierigkeiten haben, die neue Arbeitsweise zu meistern, glaubt [ROOT.GetCountry.GetRuler.GetFirstName], dass sich unsere Ferghani-Schrift auszahlen wird, insbesondere wenn es um unsere Aufzeichnungen geht behalten.>  #NT!
 me_tayuan_ferghana.13.a: "Our lives are immaterial things, but the written word is eternal"  #<Unser Leben ist immateriell, aber das geschriebene Wort ist ewig>  #NT!
  
 me_tayuan_ferghana.14.title: "$tayuan_ferghana_task_13$"  #<$tayuan_ferghana_task_13$>  #NT!
 me_tayuan_ferghana.14.desc: "[GetProvince('(int32)6784').GetName] is a mighty city, dominating the valleys and steppes around it; many say it is the key to [GetProvince('(int32)6737').GetArea.GetRegion.GetName]. We are in luck then, because those in its walls honor [ROOT.GetCountry.GetRuler.GetName].\n\nIn its barracks, more men arrive by the day, both to defend our borders against the barbarians, and to set up a great expedition to finally crush them..."  #<[GetProvince('(int32)6784').GetName] ist eine mächtige Stadt, die die Täler und Steppen um sie herum dominiert; Viele sagen, es sei der Schlüssel zu [GetProvince('(int32)6737').GetArea.GetRegion.GetName]. Dann haben wir Glück, denn die Menschen in seinen Mauern ehren [ROOT.GetCountry.GetRuler.GetName].\n\nIn seinen Kasernen treffen jeden Tag mehr Männer ein, sowohl um unsere Grenzen gegen die Barbaren zu verteidigen als auch um eine große Expedition zu organisieren, um sie endgültig zu vernichten ...>  #NT!
 me_tayuan_ferghana.14.a: "Talas will see us through."  #<Talas wird uns durchbringen.>  #NT!
  
 me_tayuan_ferghana.15.title: "The Mingtepa Exchange"  #<Der Mingtepa-Austausch>  #NT!
 me_tayuan_ferghana.15.desc: "It is a funny feeling, arriving at a completely foreign place, which you do not understand at all, and seeing life chugging along. The people all have the washed looks on their faces from doing their usual, menial tasks, yet everything moment there teaches you more than any tome.\n\nImagine, then, as an exercise the surprise a [GetCulture('tayuan').GetCultureGroup.GetName] peasant or a [GetCulture('pasargadi').GetName] trader gets when they arrive to #E Mingtepa#!, the great warehouse where the East comes to trade. These clear-skinned men from the east trade in even-clearer porcelains, and endless coins roll from their long and colourful silken sleeves, closing all types of deals in the markets, stables and rooms of this gigantic trading post."  #<Es ist ein komisches Gefühl, an einem völlig fremden Ort anzukommen, den man überhaupt nicht versteht, und zu sehen, wie das Leben dahintuckert. Die Leute haben alle einen gewaschenen Gesichtsausdruck, weil sie ihre gewöhnlichen, niederen Aufgaben erledigen, und doch lehrt dich alles, was du gerade siehst, mehr als jeder andere Wälzer.\n\nStellen Sie sich also als Übung die Überraschung vor, die ein [GetCulture('tayuan').GetCultureGroup.GetName]-Bauer oder ein [GetCulture('pasargadi').GetName]-Händler erlebt, wenn er in #E Mingtepa#!, ankommt, dem großen Lagerhaus, in das der Osten zum Handel kommt. Diese hellhäutigen Männer aus dem Osten handeln mit noch klarerem Porzellan, und aus ihren langen, farbenfrohen Seidenärmeln rollen unzählige Münzen, die auf den Märkten, in den Ställen und in den Räumen dieses gigantischen Handelspostens Geschäfte aller Art abschließen.>  #NT!
 me_tayuan_ferghana.15.a: "Mingtepa, my friend, is just another world."  #<Mingtepa, mein Freund, ist nur eine andere Welt.>  #NT!
  
 me_tayuan_ferghana.16.title: "Between The Walls"  #<Zwischen den Wänden>  #NT!
 me_tayuan_ferghana.16.desc: "Living in such a welcoming valley in the middle of the wastes attracts, naturally, the greed of those who have not. This is a lesson the tribes of the valley learned over time, as time and time again the mountain warriors came upon them to sack, and the horsemen from the steppes to plunder.\n\nAs such, even the humblest #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! possesses a small wall with a tower. All visitors are impressed at how well-fortified the valley is, with some claiming to have seen one hundred walled cities. Life inside these walls is all a man needs; sometimes there is even enough space for cattle to graze inside them."  #<Das Leben in einem so einladenden Tal mitten in der Wüste weckt natürlich die Gier derjenigen, die es nicht getan haben. Dies ist eine Lektion, die die Stämme des Tals im Laufe der Zeit gelernt haben, als immer wieder die Bergkrieger zum Plündern über sie kamen und die Reiter aus den Steppen zum Plündern.\n\nDaher besitzt selbst der bescheidenste #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! eine kleine Mauer mit einem Turm. Alle Besucher sind beeindruckt, wie gut das Tal befestigt ist, und einige behaupten, hundert ummauerte Städte gesehen zu haben. Das Leben innerhalb dieser Mauern ist alles, was ein Mann braucht; Manchmal ist darin sogar genug Platz für das Vieh, um dort zu grasen.>  #NT!
 me_tayuan_ferghana.16.a: "Suffering builds higher walls, apparently."  #<Offensichtlich baut das Leiden höhere Mauern auf.>  #NT!
  
 me_tayuan_ferghana.17.title: "$tayuan_ferghana_task_16$"  #<$tayuan_ferghana_task_16$>  #NT!
 me_tayuan_ferghana.17.desc: "The #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#E s#!#! found it a necessary compromise when setting up their kingdom to grant [GetCulture('tayuan').GetName]#E s#! voting rights; and for all they cared, most were herders and lived in small villages. Yet with the great infrastructure being built, even the old small capital of Ershi became large Throana.\n\nToday, outside [GetProvince('(int32)6737').GetName]'s ekklesía, the election results were read out, and to great surprise there was a substantial Ferghani majority. It seems that the old tribesmen came to this city so familiar to them in search of the comfort of urban life, and they now wish to administrate it as their own. This local assembly already has reverted the name of the city to Ershi, and it seems that the Ferghanans of the valley now regard it as their capital."  #<Die #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#E s#!#! hielten es bei der Gründung ihres Königreichs für einen notwendigen Kompromiss, [GetCulture('tayuan').GetName]#E s#! Stimmrechte zu gewähren; und egal, was sie interessierte, die meisten waren Hirten und lebten in kleinen Dörfern. Doch mit dem Aufbau der großartigen Infrastruktur wurde sogar die alte kleine Hauptstadt Ershi zu einem großen Throana.\n\nHeute wurden außerhalb der Ekklesía von [GetProvince('(int32)6737').GetName] die Wahlergebnisse verlesen, und zu großer Überraschung gab es eine beträchtliche Ferghani-Mehrheit. Es scheint, dass die alten Stammesangehörigen auf der Suche nach den Annehmlichkeiten des städtischen Lebens in diese ihnen so vertraute Stadt kamen und sie nun als ihre eigene Stadt verwalten möchten. Diese örtliche Versammlung hat den Namen der Stadt bereits in Ershi geändert, und es scheint, dass die Ferghanaer des Tals sie nun als ihre Hauptstadt betrachten.>  #NT!
 me_tayuan_ferghana.17.a: "Curious."  #<Neugierig.>  #NT!
  
 me_tayuan_ferghana.18.title: "$tayuan_ferghana_task_17$"  #<$tayuan_ferghana_task_17$>  #NT!
 me_tayuan_ferghana.18.desc: "The incredulity of that to whom much good has been done for seemingly little in exchange is a reward in and of itself. Yes, friend, in this hostile world, we chose to reward you. How could we not love you, brother? As we sleep soundly in our valley, you guard its entry, and your horses thunder away over the endless plains. #E Sogdia#!, our love, we would never do you wrong. Take, then, our kindness with open arms."  #<Die Ungläubigkeit dessen, dem für scheinbar wenig Gegenleistung viel Gutes getan wurde, ist an sich schon eine Belohnung. Ja, Freund, in dieser feindlichen Welt haben wir uns entschieden, dich zu belohnen. Wie könnten wir dich nicht lieben, Bruder? Während wir in unserem Tal tief und fest schlafen, bewachen Sie seinen Eingang und Ihre Pferde donnern über die endlosen Ebenen. #E Sogdia#!, unsere Liebe, wir würden dir niemals Unrecht tun. Nehmen Sie also unsere Freundlichkeit mit offenen Armen an.>  #NT!
 me_tayuan_ferghana.18.a: "Bless."  #<Segnen.>  #NT!
  
 me_tayuan_ferghana.19.title: "$tayuan_ferghana_task_18$"  #<$tayuan_ferghana_task_18$>  #NT!
 me_tayuan_ferghana.19.desc: "Out west, those who came here to settle found less than agreeable conditions. Many farms were set up, many even governed by the farmhands themselves to incentivize migration, but the soil does not consent to being tilled, and the ecosystem feels like coming undone after being forced to do something it wasn't made for.\n\nStill, many stuck around and built a life here, surely not one as prosperous as imagined, but a fine one nonetheless."  #<Im Westen fanden diejenigen, die hierher kamen, um sich niederzulassen, alles andere als angenehme Bedingungen vor. Viele Bauernhöfe wurden gegründet, viele wurden sogar von den Landarbeitern selbst verwaltet, um einen Anreiz zur Migration zu schaffen, aber der Boden lässt sich nicht bearbeiten, und das Ökosystem fühlt sich an, als würde es zerstört, nachdem es gezwungen wurde, etwas zu tun, für das es nicht gemacht war.\n\nDennoch blieben viele hier und bauten sich hier ein Leben auf, sicherlich nicht so wohlhabend wie gedacht, aber dennoch ein schönes.>  #NT!
 me_tayuan_ferghana.19.a: "I guess you can't always win."  #<Ich schätze, man kann nicht immer gewinnen.>  #NT!
  
 me_tayuan_ferghana.20.title: "$tayuan_ferghana_task_19$"  #<$tayuan_ferghana_task_19$>  #NT!
 me_tayuan_ferghana.20.desc: "'May I be sacrificed for you, dear Bactrians! Your days of pain are over! Your distant brothers, whom you so often forget to mention in phrase or verse, are now your saviors!'.\n\nThus began the [ROOT.GetCountry.GetAdjective] administration of the #E [GetCultureGroup('bactrian').GetName]s#!, one that was more concerned with carefully tending to our brother's wounds than profiting off of the land. We are now positioned to champion them, and thus have them propel us to even greater heights."  #<„Möge ich für euch geopfert werden, liebe Baktrier! Deine Tage voller Schmerzen sind vorbei! Deine entfernten Brüder, die du so oft in Phrasen oder Versen zu erwähnen vergisst, sind jetzt deine Retter!‘.\n\nSo begann die [ROOT.GetCountry.GetAdjective] Verwaltung der #E [GetCultureGroup('bactrian').GetName]s#!,, die mehr darauf bedacht war, die Wunden unseres Bruders sorgfältig zu versorgen, als vom Land zu profitieren. Wir sind nun in der Lage, sie zu verteidigen und sie uns so zu noch größeren Erfolgen zu verhelfen.>  #NT!
 me_tayuan_ferghana.20.a: "Always remember that we are here for you."  #<Denken Sie immer daran, dass wir für Sie da sind.>  #NT!
  
 me_tayuan_ferghana.21.title: "$tayuan_ferghana_task_20$"  #<$tayuan_ferghana_task_20$>  #NT!
 me_tayuan_ferghana.21.desc: "Getting on south through the many roads there, thousands of [GetCulture('tayuan').GetName]#E s#! now settle [GetProvince('(int32)6678').GetArea.GetRegion.GetName], taking up the Macedonians' former palatial residences. It is almost a mockery of a liberating tale, and the other [GetCultureGroup('bactrian').GetName]#E s#! look upon our people with both shock and sadness, taking off one yoke for another, still choking all the same.\n\nHo! How could we care, when so many times we were disparaged as inferior swine by them! So many times forgot, so many times cast aside, oh, [GetCultureGroup('bactrian').GetName] friends, we could do so much worse!"  #<Auf dem Weg nach Süden über die vielen Straßen dort lassen sich nun Tausende von [GetCulture('tayuan').GetName]#E s#! nieder [GetProvince('(int32)6678').GetArea.GetRegion.GetName] und bewohnen die ehemaligen Palastresidenzen der Mazedonier. Es ist fast eine Verhöhnung einer befreienden Geschichte, und die anderen [GetCultureGroup('bactrian').GetName]#E s#! blicken mit Schock und Traurigkeit auf unser Volk, nehmen ein Joch für das andere ab und ersticken trotzdem.\n\nHo! Wie könnte es uns kümmern, wenn wir doch so oft von ihnen als minderwertige Schweine verunglimpft wurden! So oft vergessen, so oft beiseite geworfen, oh, [GetCultureGroup('bactrian').GetName] Freunde, wir könnten noch viel Schlimmeres tun!>  #NT!
 me_tayuan_ferghana.21.a: "Move along then!"  #<Dann machen Sie weiter!>  #NT!
  
 me_tayuan_ferghana.22.title: "$tayuan_ferghana_task_21$"  #<$tayuan_ferghana_task_21$>  #NT!
 me_tayuan_ferghana.22.desc: "'[SCOPE.sCharacter('primary_heir_scope').GetFirstName], the gods tell me in my dreams every night that my destiny lies to the east. Consider yourself blessed, then, for you will be ruling much sooner than you thought.'\n\n[SCOPE.sCharacter('primary_heir_scope').GetName], the heir to the throne in [ROOT.GetCountry.GetName], raised a suspicious eyebrow. 'Do you hear yourself, [ROOT.GetCountry.GetRuler.GetName]? Visions from the gods, eh? And to go off and fight as a mercenary, of all things? You don't know the language out there, you have no friends in the #E Eastern Empire#!, and here in [ROOT.GetCountry.GetCapital.GetName] you are the [ROOT.GetCountry.GetRulerTitle] - the most envied position in [ROOT.GetCountry.GetName]. To me, what you are saying sounds like madness...leave this foolishness alone, I beg you.'"  #<'[SCOPE.sCharacter('primary_heir_scope').GetFirstName], die Götter sagen mir jede Nacht in meinen Träumen, dass mein Schicksal im Osten liegt. Betrachten Sie sich also als gesegnet, denn Sie werden viel früher regieren, als Sie dachten.'\n\n[SCOPE.sCharacter('primary_heir_scope').GetName], der Thronfolger in [ROOT.GetCountry.GetName], hob misstrauisch eine Augenbraue. „Hörst du dich selbst, [ROOT.GetCountry.GetRuler.GetName]?“ Visionen der Götter, nicht wahr? Und ausgerechnet als Söldner in den Kampf ziehen? Du kennst die Sprache da draußen nicht, du hast keine Freunde im #E Ostreich#!, und hier in [ROOT.GetCountry.GetCapital.GetName] bist du der [ROOT.GetCountry.GetRulerTitle] – die am meisten beneidete Position in [ROOT.GetCountry.GetName]. Für mich klingt das, was Sie sagen, wie Wahnsinn ... lassen Sie diese Dummheit in Ruhe, ich flehe Sie an.>  #NT!
 me_tayuan_ferghana.22.a: "[SCOPE.sCharacter('primary_heir_scope').GetFirstName], I will be gone before sunrise, but I will return one day..."  #<[SCOPE.sCharacter('primary_heir_scope').GetFirstName], ich werde vor Sonnenaufgang weg sein, aber eines Tages werde ich zurückkommen ...>  #NT!
 me_tayuan_ferghana.22.b: "Even though this is the dream of a lifetime, I will stay"  #<Auch wenn dies der Traum meines Lebens ist, werde ich bleiben>  #NT!
  
 me_tayuan_ferghana.23.title: "$tayuan_ferghana_task_22$"  #<$tayuan_ferghana_task_22$>  #NT!
 me_tayuan_ferghana.23.desc: "[GetCulture('bactrian').GetCultureGroup.GetName]#E s#! have, over the last centuries, been regarded, and in truth been, a mostly idle people. There was no connective identity among them, only limited to being subjects of Persia in these lands. A [GetCulture('margian').GetName] would regard a [GetCulture('tayuan').GetName] all the same as an [GetCulture('aramaic').GetName].\n\nAll the different pressures and forces these lands have felt, though, such as the arrival of the Greeks and Qin, or the increased raiding by the hordes of the wastes, have resulted in a champion being born out of these peoples - the [GetCulture('tayuan').GetName] (some unlikely contenders!). They now are at the helm of a great new empire, in these lands without precedent, first among their brethren."  #<[GetCulture('bactrian').GetCultureGroup.GetName]#E s#! galten im Laufe der letzten Jahrhunderte als größtenteils untätiges Volk und waren es tatsächlich auch. Es gab keine verbindende Identität zwischen ihnen, sondern beschränkte sich lediglich darauf, Untertanen Persiens in diesen Ländern zu sein. Ein [GetCulture('margian').GetName] würde einen [GetCulture('tayuan').GetName] genauso betrachten wie einen [GetCulture('aramaic').GetName].\n\nAll die unterschiedlichen Zwänge und Kräfte, denen diese Länder ausgesetzt waren, wie die Ankunft der Griechen und Qin oder die zunehmenden Überfälle durch die Horden der Ödlande, haben jedoch dazu geführt, dass aus diesen Völkern ein Champion geboren wurde – der [GetCulture('tayuan').GetName] (einige unwahrscheinliche Anwärter!). Sie stehen jetzt an der Spitze eines großen neuen Reiches, in diesen Ländern ohne Beispiel, und sind die ersten unter ihren Brüdern.>  #NT!
 me_tayuan_ferghana.23.a: "From Ferghana emanates true power and majesty."  #<Von Fergana geht wahre Macht und Majestät aus.>  #NT!
 tayuan_ferghana_task_23tt: "The #G Ferghani#! culture needs #Y Noble Civic Rights#!."  #<Die #G Ferghani#!-Kultur braucht #Y edle Bürgerrechte#!.>  #NT!
  
 me_tayuan_ferghana.24.title: "$tayuan_ferghana_task_23$"  #<$tayuan_ferghana_task_23$>  #NT!
 me_tayuan_ferghana.24.desc: "As the years have worn on the royal family at [ROOT.GetCountry.GetCapital.GetName] have grown more and more isolated form the reality of their subjects, refusing to speak our tongue and engage in our festivals, prefering instead to remain with the [GetCulture('ionian').GetName] minority.\n\nThis must come to an end. Today, a procession of [GetCulture('tayuan').GetName] nobles presented itself faithfully before our king, in traditional attire, to advise and encourage him to embrace the new reality of his kingsdom. The [ROOT.GetCountry.GetRuler.GetFamily.GetName] house must listen, or else."  #<Im Laufe der Jahre isolierte sich die königliche Familie von [ROOT.GetCountry.GetCapital.GetName] immer mehr von der Realität ihrer Untertanen und weigerte sich, unsere Sprache zu sprechen und an unseren Festen teilzunehmen, und zog es stattdessen vor, bei der [GetCulture('ionian').GetName]-Minderheit zu bleiben.\n\nDas muss ein Ende haben. Heute präsentierte sich eine Prozession von [GetCulture('tayuan').GetName] Adligen treu in traditioneller Kleidung vor unserem König, um ihn zu beraten und zu ermutigen, die neue Realität seines Königreichs anzunehmen. Das [ROOT.GetCountry.GetRuler.GetFamily.GetName]-Haus muss zuhören, sonst.>  #NT!
 me_tayuan_ferghana.24.b: "The royal family must adopt our ways!"  #<Die königliche Familie muss unsere Wege übernehmen!>  #NT!
 me_tayuan_ferghana.24.a: "He refuses? Install a new king from the traditional nobility!"  #<Er weigert sich? Setzen Sie einen neuen König aus dem traditionellen Adel ein!>  #NT!
 me_tayuan_ferghana.24.c: "I refuse! The king is [GetCulture('ionian').GetName]!"  #<Ich weigere mich! Der König ist [GetCulture('ionian').GetName]!>  #NT!
  
 me_tayuan_ferghana.25.title: "$tayuan_ferghana_task_24$"  #<$tayuan_ferghana_task_24$>  #NT!
 me_tayuan_ferghana.25.desc: "The bickering between the #E Voxite#! and #E Zoroastrians#! living within [ROOT.GetCountry.GetCapital.GetName] have driven [ROOT.GetCountry.GetRuler.GetName] nearly mad with boredom, for the [ROOT.GetCountry.GetRulerTitle] does not wish to hear another word about which pantheon has chosen to bless the people of [ROOT.GetCountry.GetName]. When asked by the High Priest to settle the debate with an official decree, [ROOT.GetCountry.GetRuler.GetFirstName] was more than happy to oblige."  #<Der Streit zwischen den #E Voxiten#! und den #E Zoroastriern#!, die in [ROOT.GetCountry.GetCapital.GetName] leben, hat [ROOT.GetCountry.GetRuler.GetName] vor Langeweile fast in den Wahnsinn getrieben, denn [ROOT.GetCountry.GetRulerTitle] möchte kein weiteres Wort darüber hören, welches Pantheon sich entschieden hat, die Menschen von [ROOT.GetCountry.GetName] zu segnen. Als der Hohepriester ihn bat, die Debatte mit einem offiziellen Dekret beizulegen, kam [ROOT.GetCountry.GetRuler.GetFirstName] dieser Bitte gerne nach.>  #NT!
 me_tayuan_ferghana.25.a: "The Zoroastrians living among us are responsible for this"  #<Verantwortlich dafür sind die unter uns lebenden Zoroastrier>  #NT!
 me_tayuan_ferghana.25.b: "I have seen the miracles of Vaksh with my own eyes..."  #<Ich habe die Wunder von Vaksh mit meinen eigenen Augen gesehen ...>  #NT!
 me_tayuan_ferghana.25.c: "The gods are with #E ME#!, and this is why we prosper!"  #<Die Götter sind mit #E ME#!, und deshalb geht es uns gut!>  #NT!
 vaksh_conversion_tt: "We need to have at least #Y 2#! Deities in our pantheon of the [GetReligion('vaksh_religion').GetName|Y] faith."  #<Wir müssen mindestens #Y 2#! Gottheiten in unserem Pantheon des [GetReligion('vaksh_religion').GetName|Y] Glaubens haben.>  #NT!
 zoroaster_conversion_tt: "We need to have at least #Y 2#! Deities in our pantheon of the [GetReligion('zoroaster').GetName|Y] faith."  #<Wir müssen mindestens #Y 2#! Gottheiten in unserem Pantheon des [GetReligion('zoroaster').GetName|Y] Glaubens haben.>  #NT!
 tayuan_ferghana_task_24_tt: "We will be able to choose a new faith."  #<Wir werden in der Lage sein, einen neuen Glauben zu wählen.>  #NT!
  
 me_tayuan_ferghana.26.title: "$tayuan_ferghana_task_25$"  #<$tayuan_ferghana_task_25$>  #NT!
 me_tayuan_ferghana.26.desc: "The spectre of the Ionian arts, from all disciplines, never left our side. All the old masters, watching us live on so far away, felt pride in their children continuing their traditions.\n\nNow, with all this contact and mixture between cultures so radically different, our [GetCulture('ionian').GetName] arts have taken a new mantle, and been elevated to a new greatness. Throughout the valley many new artists spring up, and express their greatness in their work; many more come to see them and learn."  #<Das Gespenst der ionischen Künste aller Disziplinen wich nie von unserer Seite. Alle alten Meister, die uns so weit weg weiterleben sahen, waren stolz darauf, dass ihre Kinder ihre Traditionen fortsetzten.\n\nJetzt, bei all dem Kontakt und der Mischung zwischen so radikal unterschiedlichen Kulturen, haben unsere [GetCulture('ionian').GetName]-Künste ein neues Gewand bekommen und sind zu neuer Größe erhoben worden. Überall im Tal entstehen viele neue Künstler, die ihre Größe in ihren Werken zum Ausdruck bringen. viele weitere kommen, um sie zu sehen und zu lernen.>  #NT!
 me_tayuan_ferghana.26.a: "We are a cultural powerhouse."  #<Wir sind ein kulturelles Kraftpaket.>  #NT!
  
 me_tayuan_ferghana.27.title: "Carry The Road On Westwards"  #<Tragen Sie die Straße weiter nach Westen>  #NT!
 me_tayuan_ferghana.27.desc: "'Can you do something for me?' inquired the [GetCulture('qin').GetName] scribe. This was no mere slave, but a man of learning; a cartographer sent from the east in order to establish trading connections with our people. 'Can you tell me of all the countries that live out West, their customs, and their leaders? We are quite eager to learn of your world'.\n\n'Certainly!' said [SCOPE.sCharacter('tayy_scholar').GetFirstName], one of our best learned men. 'So, beyond these mountains, first of all, lie the [GetCulture('sogdian').GetName]#E s#!, great horse riders, then further south the [GetCulture('bactrian').GetName]#E s#!; it is a country full of great cities. Then again out west the fearsome #E Dahae#!, and again south to the land of culture, and great cities, and heritage, the land of the #E Persians#!...'"  #<„Kannst du etwas für mich tun?“ fragte der [GetCulture('qin').GetName]-Schreiber. Dies war kein einfacher Sklave, sondern ein Mann der Gelehrsamkeit; ein Kartograf, der aus dem Osten geschickt wurde, um Handelsbeziehungen mit unserem Volk aufzubauen. „Können Sie mir alle Länder erzählen, die außerhalb des Westens leben, ihre Bräuche und ihre Führer?“ Wir sind sehr gespannt darauf, etwas über eure Welt zu erfahren.\n\n'Sicherlich!' sagte [SCOPE.sCharacter('tayy_scholar').GetFirstName], einer unserer gelehrtesten Männer. „Jenseits dieser Berge liegen also zunächst die [GetCulture('sogdian').GetName]#E s#!, großen Reiter, dann weiter südlich die [GetCulture('bactrian').GetName]#E s#!; ist es ein Land voller großartiger Städte.“ Dann wieder nach Westen zum furchterregenden #E Dahae#!, und wieder nach Süden in das Land der Kultur, der großen Städte und des Erbes, das Land der #E Perser[SCOPE.sCharacter('tayy_scholar').GetFirstName]1>  #NT!
 me_tayuan_ferghana.27.a: "Wonderful!"  #<Wunderbar!>  #NT!
  
 me_tayuan_ferghana.28.title: "$tayuan_ferghana_task_27$"  #<$tayuan_ferghana_task_27$>  #NT!
 me_tayuan_ferghana.28.desc: "[ROOT.GetCountry.GetRuler.GetName] and [SCOPE.sCharacter('tay_highprieest').GetName], after hearing a great deal of the foreign great wisdom of the elusive #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, finally decided to summon one of their traders to the [ROOT.GetCountry.GetRulerTitle]'s apartments. Straight away the man showcased which tomes he had to offer, swearing that their likes could never be found again; one about divination and cosmology, one about governance, and one about war.\n\nHe assures us that his scrolls are of the greatest quality, with enough written inside to study for an entire lifetime, and that these particular editions also have annotations to help the reader. On the other side of the table, the two men decide to..."  #<[ROOT.GetCountry.GetRuler.GetName] und [SCOPE.sCharacter('tay_highprieest').GetName], nachdem sie viel von der fremden großen Weisheit des schwer fassbaren #COLOR:{0.77,0.5,0.09} #E gehört hatten, beschloss Huaxia#!#!, schließlich, einen ihrer Händler in die Wohnungen von [ROOT.GetCountry.GetRulerTitle] zu rufen. Der Mann präsentierte sofort, welche Wälzer er zu bieten hatte, und schwor, dass ihresgleichen nie wieder gefunden werden würde; eine über Wahrsagerei und Kosmologie, eine über Regierungsführung und eine über Krieg.\n\nEr versichert uns, dass seine Schriftrollen von höchster Qualität sind und genug Inhalt enthalten, um ein ganzes Leben lang zu studieren, und dass diese besonderen Ausgaben auch Anmerkungen enthalten, die dem Leser helfen. Auf der anderen Seite des Tisches beschließen die beiden Männer...>  #NT!
 me_tayuan_ferghana.28.a: "Buy the I Ching"  #<Kaufen Sie das I Ging>  #NT!
 me_tayuan_ferghana.28.b: "Buy the Four Books and Five Classics"  #<Kaufen Sie die vier Bücher und fünf Klassiker>  #NT!
 me_tayuan_ferghana.28.c: "Buy the Art of War"  #<Kaufen Sie die Kunst des Krieges>  #NT!
  
 me_tayuan_ferghana.29.title: "Kuche And The Jade Gate"  #<Kuche und das Jadetor>  #NT!
 me_tayuan_ferghana.29.desc: "We have secured the most dangerous part of the road between us and the Huaxia; beaten tracks, guard houses, inns, you name it. Now the rich traders from the East come along themselves, both to trade and see these wondrous foreign lands - who knew we'd become known for tourism! Before, they only sent their most expendable hands on the perilous journey. The [GetProvince('(int32)7184').GetName]-[GetProvince('(int32)6744').GetName] road has quickly become one of our most vital arteries, but crossing the mountains into [GetProvince('(int32)6704').GetArea.GetName], or even going further afield to trade, is still a perilous journey."  #<Wir haben den gefährlichsten Teil der Straße zwischen uns und der Huaxia gesichert; ausgetretene Pfade, Wachhäuser, Gasthäuser, was auch immer. Jetzt kommen die reichen Händler aus dem Osten selbst, um zu handeln und diese wunderbaren fremden Länder zu besichtigen – wer hätte gedacht, dass wir für den Tourismus bekannt werden würden! Bisher schickten sie nur ihre entbehrlichsten Hände auf die gefährliche Reise. Die Straße [GetProvince('(int32)7184').GetName]-[GetProvince('(int32)6744').GetName] hat sich schnell zu einer unserer wichtigsten Verkehrsadern entwickelt, aber die Überquerung der Berge nach [GetProvince('(int32)6704').GetArea.GetName] oder sogar die Weiterfahrt zum Handel ist immer noch eine gefährliche Reise.>  #NT!
 me_tayuan_ferghana.29.a: "There is always work to be done..."  #<Es gibt immer etwas zu tun...>  #NT!
  
 me_tayuan_ferghana.30.title: "$tayuan_ferghana_task_29$"  #<$tayuan_ferghana_task_29$>  #NT!
 me_tayuan_ferghana.30.desc: "A grim mood has settled over [ROOT.GetCountry.GetRuler.GetName], who is prone to periods of self-doubt where dark thoughts seize [ROOT.GetCountry.GetRuler.GetHerHis] mind. The riches, the horses, the jewels, the palaces, the prestige, the honor - everything that comes with the title of [ROOT.GetCountry.GetRulerTitle] - are ashes in [ROOT.GetCountry.GetRuler.GetHerHis] mouth, mattering little.\n\nThis sour reverie is broken, however, with the news that a faction has formed in [ROOT.GetCountry.GetCapital.GetName], and at once, the old instincts kick in, shattering the chains of depression. Looking out the window of [ROOT.GetCountry.GetRuler.GetHerHis] chamber with anger, [ROOT.GetCountry.GetRuler.GetHerHis] chest pounding with urgency, [ROOT.GetCountry.GetRuler.GetFirstName] reads the small note on [ROOT.GetCountry.GetRuler.GetHerHis] desk time and time again, finally concluding that the democratic faction, recently established, must be the ones plotting to overthrow the monarchy - for who else could it be?\n\nTrusted advisors tell [ROOT.GetCountry.GetRuler.GetHerHim] each passing day that gifts are starting to change hands, and positions have been promised to secure key loyalties, and with each bitter betrayal, [ROOT.GetCountry.GetRuler.GetHerHis] determination to fight this plague increases. 'I must spring into action to avoid such an unfortunate windfall...'[ROOT.GetCountry.GetRuler.GetFirstName] mumbles under [ROOT.GetCountry.GetRuler.GetHerHis] breath, eyes tightening around the edges."  #<Eine düstere Stimmung hat sich über [ROOT.GetCountry.GetRuler.GetName] gelegt, der zu Phasen des Selbstzweifels neigt, in denen dunkle Gedanken den Geist von [ROOT.GetCountry.GetRuler.GetHerHis] befallen. Der Reichtum, die Pferde, die Juwelen, die Paläste, das Prestige, die Ehre – alles, was mit dem Titel [ROOT.GetCountry.GetRulerTitle] einhergeht – ist Asche in [ROOT.GetCountry.GetRuler.GetHerHis] Mund und zählt kaum.\n\nDiese saure Träumerei wird jedoch durch die Nachricht unterbrochen, dass sich in [ROOT.GetCountry.GetCapital.GetName] eine Fraktion gebildet hat, und sofort treten die alten Instinkte ein und sprengen die Ketten der Depression. [ROOT.GetCountry.GetRuler.GetFirstName] blickt wütend aus dem Fenster von [ROOT.GetCountry.GetRuler.GetHerHis] Kammer, [ROOT.GetCountry.GetRuler.GetHerHis] pocht vor Dringlichkeit in der Brust, [ROOT.GetCountry.GetRuler.GetFirstName] liest immer wieder die kleine Notiz auf [ROOT.GetCountry.GetRuler.GetHerHis] Schreibtisch und kommt schließlich zu dem Schluss, dass die kürzlich gegründete demokratische Fraktion diejenigen sein muss, die den Sturz der Monarchie planen – denn wer sonst könnte es sein?\n\nVertrauenswürdige Berater berichten [ROOT.GetCountry.GetRuler.GetHerHim] jeden Tag, dass Geschenke den Besitzer wechseln. und Positionen wurden versprochen, um wichtige Loyalitäten zu sichern, und mit jedem bitteren Verrat wächst [ROOT.GetCountry.GetRuler.GetHerHis] die Entschlossenheit, diese Plage zu bekämpfen. „Ich muss in Aktion treten, um solch einen unglücklichen Glücksfall zu vermeiden ...“, murmelt [ROOT.GetCountry.GetRuler.GetFirstName] mit [ROOT.GetCountry.GetRuler.GetHerHis] Atemzug und die Augen werden schmaler.>  #NT!
 me_tayuan_ferghana.30.a: "Strength, my [ROOT.GetCountry.GetRulerTitle]!"  #<Stärke, mein [ROOT.GetCountry.GetRulerTitle]!>  #NT!
 me_tayuan_ferghana.30.a.tt: "Trouble is sure to follow..."  #<Es wird sicher Ärger geben ...>  #NT!
  
 me_tayuan_ferghana.31.title: "$tayuan_ferghana_task_30$"  #<$tayuan_ferghana_task_30$>  #NT!
 me_tayuan_ferghana.31.desc: "When a group of #E Buddhist#! monks approached [ROOT.GetCountry.GetRuler.GetName] with a request for large sums of money, the first inclination of the [ROOT.GetCountry.GetRulerTitle] was to deny them at once, but that same evening, strange dreams troubled [ROOT.GetCountry.GetRuler.GetHerHis] slumbers and [ROOT.GetCountry.GetRuler.GetFirstName] took this to be a sign from the gods.\n\nThe very next day, talents of gold and silver were entrusted to the care of the monks, who desired to build for themselves a hermitage, a place where they could focus on their studies throughout the year. Only two things they required; their home must be constructed in the snow-capped mountains, far removed from the rest of the world so that their earthly temptations would be lessened, and hemp @hemp! must grow in the wild crags of the rocks."  #<Als sich eine Gruppe von #E buddhistischen Mönchen #! mit der Bitte um große Geldsummen an [ROOT.GetCountry.GetRuler.GetName] wandte, war die erste Neigung der [ROOT.GetCountry.GetRulerTitle], sie sofort abzulehnen, doch am selben Abend schlummerten seltsame Träume, [ROOT.GetCountry.GetRuler.GetHerHis] schlummerte und [ROOT.GetCountry.GetRuler.GetFirstName] hielt dies für ein Zeichen der Götter.\n\nGleich am nächsten Tag wurden der Obhut Talente aus Gold und Silber anvertraut der Mönche, die sich eine Einsiedelei bauen wollten, einen Ort, an dem sie sich das ganze Jahr über auf ihre Studien konzentrieren konnten. Sie brauchten nur zwei Dinge; Ihr Zuhause muss in den schneebedeckten Bergen gebaut werden, weit weg vom Rest der Welt, damit ihre irdischen Versuchungen geringer werden, und Hanf @hemp! muss in den wilden Felsklippen wachsen.>  #NT!
 me_tayuan_ferghana.31.a: "Godspeed, brave monks! I pray you find happiness in your mountains"  #<Viel Glück, tapfere Mönche! Ich bete, dass du das Glück in deinen Bergen findest>  #NT!
  
 me_tayuan_ferghana.32.title: "$tayuan_ferghana_task_31$"  #<$tayuan_ferghana_task_31$>  #NT!
 me_tayuan_ferghana.32.desc: "It has been noticed over the last couple of months that many Ferghani #E Zoroastrians#!, encouraged by the religious attitudes of our people towards their pantheon and practices, have been moving to our capital. In a realm where the [GetReligion('vaksh_religion').GetName] religion dominates the local landscape, [ROOT.GetCountry.GetCapital.GetName] has become an irresistible attraction; a civilized, prosperous city that tolerates peoples of different faiths."  #<In den letzten Monaten wurde festgestellt, dass viele Ferghani #E Zoroastrier#!,, ermutigt durch die religiöse Einstellung unseres Volkes gegenüber ihrem Pantheon und ihren Praktiken, in unsere Hauptstadt gezogen sind. In einem Bereich, in dem die [GetReligion('vaksh_religion').GetName]-Religion die lokale Landschaft dominiert, ist [ROOT.GetCountry.GetCapital.GetName] zu einer unwiderstehlichen Anziehungskraft geworden; eine zivilisierte, wohlhabende Stadt, die Menschen unterschiedlichen Glaubens toleriert.>  #NT!
 me_tayuan_ferghana.32.a: "All that follow the paths of peace are welcome in [ROOT.GetCountry.GetCapital.GetName]"  #<Alle, die den Wegen des Friedens folgen, sind in [ROOT.GetCountry.GetCapital.GetName] willkommen>  #NT!
 tayuan_zoroastrian_district_mod: "Zoroastrian District"  #<Zoroastrischer Bezirk>  #NT!
  
 me_tayuan_ferghana.33.title: "$tayuan_ferghana_task_32$"  #<$tayuan_ferghana_task_32$>  #NT!
 me_tayuan_ferghana.33.desc: "In order for the sacred #E Abhidharma Pitaka#! texts to be fully translated and understood, a contingent of scholars traveled from [ROOT.GetCountry.GetCapital.GetName] far to the south, where the services of #E Buddhist#! sages well-versed in their teachings worked alongside our kinsmen.\n\nOur brethren stayed there many months, rising with the Buddhists at dawn and working long into the evening hours until the job was finished, and they returned to [ROOT.GetCountry.GetName] with scrolls in hand and eyes that had been opened."  #<Damit die heiligen Texte des #E Abhidharma Pitaka#! vollständig übersetzt und verstanden werden konnten, reiste ein Kontingent von Gelehrten von [ROOT.GetCountry.GetCapital.GetName] weit in den Süden, wo die Dienste von #E buddhistischen#! Weisen, die sich in ihren Lehren gut auskannten, Seite an Seite mit unseren Verwandten arbeiteten.\n\nUnsere Brüder blieben viele Monate dort, standen im Morgengrauen mit den Buddhisten auf und arbeiteten bis spät in die Abendstunden, bis die Arbeit erledigt war fertig, und sie kehrten mit Schriftrollen in der Hand und geöffneten Augen zu [ROOT.GetCountry.GetName] zurück.>  #NT!
 me_tayuan_ferghana.33.a: "The teachings in these texts will change the world..."  #<Die Lehren in diesen Texten werden die Welt verändern ...>  #NT!
  
 me_tayuan_ferghana.34.title: "$tayuan_ferghana_task_33$"  #<$tayuan_ferghana_task_33$>  #NT!
 me_tayuan_ferghana.34.desc: "A man's work may be work, but that does not stop him from being a human alongside it. The #E Syntechniai#! enable just this; there tradesmen can help each other, apprentices can learn to become proper masters, funerals can be paid, widows supported: these organisations are not only ways to pass the skills down but to keep our cities and villages alive."  #<Die Arbeit eines Menschen mag Arbeit sein, aber das hindert ihn nicht daran, neben ihr ein Mensch zu sein. Die #E Syntechniai#! ermöglichen genau dies; Dort können sich Handwerker gegenseitig helfen, Lehrlinge können lernen, richtige Meister zu werden, Beerdigungen können bezahlt werden, Witwen können unterstützt werden: Diese Organisationen sind nicht nur Möglichkeiten, Fähigkeiten weiterzugeben, sondern auch, um unsere Städte und Dörfer am Leben zu erhalten.>  #NT!
 me_tayuan_ferghana.34.a: "Wonderful."  #<Wunderbar.>  #NT!
  
 me_tayuan_ferghana.35.title: "$tayuan_ferghana_task_34$"  #<$tayuan_ferghana_task_34$>  #NT!
 me_tayuan_ferghana.35.desc: "'One hand, after another - there, grab that bit of rock and pull yourself up. Easy does it, [ROOT.GetCountry.GetRuler.GetFirstName]! It wouldn't do to carry you back home in a box.'\n\nAt the very roof of the world, where the wind cuts like a knife and the air is so cold and crisp that it burns your lungs, the soldiers of [ROOT.GetCountry.GetName] are climbing across mountains that were never intended to be crossed. The summit is close! Ascending it will be a moment's touch, but from it will explode a thousand ecstasies. [ROOT.GetCountry.GetRuler.GetName]'s senses this high, close to the peaks, are not very human anymore; some have said that you will feel like the gods do, more than a human would.\n\nOnce our armies break through, then, the many ways with which we will connect with #E India#! will take our souls up to the heavens, transforming them, with the help of knowledge, into new vessels in this world."  #<„Eine Hand nach der anderen – schnapp dir dieses Stück Stein und zieh dich hoch.“ Ganz einfach, [ROOT.GetCountry.GetRuler.GetFirstName]! Es würde nicht genügen, dich in einer Kiste nach Hause zu tragen.'\n\nAm Dach der Welt, wo der Wind wie ein Messer schneidet und die Luft so kalt und frisch ist, dass sie in deinen Lungen brennt, klettern die Soldaten von [ROOT.GetCountry.GetName] über Berge, die nie dazu gedacht waren, überquert zu werden. Der Gipfel ist nah! Es wird nur eine kurze Berührung sein, es hinaufzusteigen, aber es wird tausend Ekstasen hervorrufen. [ROOT.GetCountry.GetRuler.GetName]s Sinne sind so hoch, nah an den Gipfeln, nicht mehr sehr menschlich; Einige haben gesagt, dass Sie sich wie die Götter fühlen werden, mehr als ein Mensch.\n\nSobald unsere Armeen durchbrechen, werden die vielen Wege, mit denen wir uns mit #E Indien#! verbinden, unsere Seelen in den Himmel tragen und sie mit Hilfe von Wissen in neue Gefäße dieser Welt verwandeln.>  #NT!
 me_tayuan_ferghana.35.a: "Onwards to the Mahabodhi!"  #<Weiter zum Mahabodhi!>  #NT!
  
 me_tayuan_ferghana.36.title: "$tayuan_ferghana_task_35$"  #<$tayuan_ferghana_task_35$>  #NT!
 me_tayuan_ferghana.36.desc: "Another [GetCulture('sakan').GetName] tribesman, of rough face, unclean beard, and generally full of goo and spit, is executed and falls unceremoniously to the ground. That was a man who, for sure, had no easy life. Still his ilk, worse than swine and of less intelligence that cattle, plague our peaceful lands and threaten to rape our daughters.\n\nAcross the northern steppes, our cavalry patrols now intercept and promptly execute these savages, lest they burn our crops ever again. Much blood is being shed, and the natural way of life of the steppes begins to disappear here, but at least we will have peace."  #<Ein weiterer [GetCulture('sakan').GetName]-Stammesangehöriger mit rauem Gesicht, unreinem Bart und im Allgemeinen voller Schleim und Spucke wird hingerichtet und fällt kurzerhand zu Boden. Das war ein Mann, der sicherlich kein leichtes Leben hatte. Noch immer plagen seine Artgenossen, schlimmer als Schweine und von weniger Intelligenz als Rinder, unser friedliches Land und drohen, unsere Töchter zu vergewaltigen.\n\nÜberall in den nördlichen Steppen fangen unsere Kavalleriepatrouillen diese Wilden ab und exekutieren sie sofort, damit sie unsere Ernte nie wieder verbrennen. Es wird viel Blut vergossen und die natürliche Lebensweise der Steppen beginnt hier zu verschwinden, aber wir werden zumindest Frieden haben.>  #NT!
 me_tayuan_ferghana.36.a: "And so we see the end of them."  #<Und so sehen wir ihr Ende.>  #NT!
  
 me_tayuan_ferghana.37.title: "$tayuan_ferghana_task_36$"  #<$tayuan_ferghana_task_36$>  #NT!
 me_tayuan_ferghana.37.desc: "Never one for discord, [ROOT.GetCountry.GetRuler.GetName] has encouraged the various religious beliefs flourishing within [ROOT.GetCountry.GetName] to exist alongside each other peacefully with the full power of the state behind [ROOT.GetCountry.GetRuler.GetHerHim]. Everyone is encouraged to worship however their conscience demands that they honor their gods, and the only rule when it comes to the divine is that no man is allowed to forbid his neighbor from worshiping as they please.\n\nThis permissive and curious attitude towards the strange has allowed foreign cultures and beliefs to thrive within [ROOT.GetCountry.GetCapital.GetName] unlike never before."  #<[ROOT.GetCountry.GetRuler.GetName] war nie ein Freund von Zwietracht und hat die verschiedenen religiösen Glaubensrichtungen, die in [ROOT.GetCountry.GetName] gedeihen, dazu ermutigt, friedlich nebeneinander zu existieren, wobei die volle Macht des Staates hinter [ROOT.GetCountry.GetRuler.GetHerHim] steht. Jeder wird ermutigt, anzubeten, wie auch immer sein Gewissen es verlangt, dass er seine Götter ehrt, und die einzige Regel, wenn es um das Göttliche geht, ist, dass niemand seinem Nächsten verbieten darf, nach Belieben anzubeten.\n\nDiese freizügige und neugierige Haltung gegenüber dem Fremden hat es fremden Kulturen und Glaubensrichtungen ermöglicht, in [ROOT.GetCountry.GetCapital.GetName] wie nie zuvor zu gedeihen.>  #NT!
 me_tayuan_ferghana.37.a: "It is better to make than love than war"  #<Es ist besser zu machen als zu lieben als zu kämpfen>  #NT!
  
 me_tayuan_ferghana.38.title: "$tayuan_ferghana_task_37$"  #<$tayuan_ferghana_task_37$>  #NT!
 me_tayuan_ferghana.38.desc: "We finally, and eagerly, have received word from the envoys we sent to the #E Ionian#! cities of the warm Aegean coast. Our men were warmly welcomed by the local rulers, and no expense was too great for our hosts. Our messengers were acclaimed by the common people, for many wished to see them in person, and so our countrymen ended up visiting three cities; [GetProvince('(int32)286').GetName], [GetProvince('(int32)288').GetName] and [GetProvince('(int32)290').GetName].\n\nOur diplomats say that they are having a wonderful time and that they remain grateful for the opportunity to service our interests in such a manner."  #<Endlich haben wir mit Spannung die Nachricht von den Gesandten erhalten, die wir in die #E ionischen#! Städte an der warmen Ägäisküste geschickt haben. Unsere Männer wurden von den örtlichen Herrschern herzlich willkommen geheißen, und unseren Gastgebern war kein Aufwand zu groß. Unsere Boten wurden vom einfachen Volk gefeiert, denn viele wollten sie persönlich sehen, und so besuchten unsere Landsleute schließlich drei Städte; [GetProvince('(int32)286').GetName], [GetProvince('(int32)288').GetName] und [GetProvince('(int32)290').GetName].\n\nUnsere Diplomaten sagen, dass sie eine wunderbare Zeit haben und dass sie dankbar für die Gelegenheit sind, unseren Interessen auf diese Weise dienen zu können.>  #NT!
 me_tayuan_ferghana.38.a: "I am glad that I established contact with our cousins"  #<Ich bin froh, dass ich den Kontakt zu unseren Cousins ​​hergestellt habe>  #NT!
 me_tayuan_ferghana.38.b: "Perhaps they could persuade some Ionians to move here?"  #<Vielleicht könnten sie einige Ionier überreden, hierher zu ziehen?>  #NT!
 me_tayuan_ferghana.38.c: "Bribe the Ionian elites and steal some of their technology"  #<Bestechen Sie die ionischen Eliten und stehlen Sie einen Teil ihrer Technologie>  #NT!
  
 me_tayuan_ferghana.39.title: "$tayuan_ferghana_task_38$"  #<$tayuan_ferghana_task_38$>  #NT!
 me_tayuan_ferghana.39.desc: "[ROOT.GetCountry.GetRuler.GetName] is known far and wide as a [ROOT.GetCountry.GetRulerTitle] of great piety, one that has firmly resisted the temptations of weaker gods while remaining true to the pantheon of [ROOT.GetCountry.GetRuler.GetHerHis] forefathers. Many living within [ROOT.GetCountry.GetCapital.GetName] now refer to [ROOT.GetCountry.GetRuler.GetFirstName] #E 'Eusebes'#! in honor of [ROOT.GetCountry.GetRuler.GetHerHis] faith, and the nickname is beginning to catch on throughout [ROOT.GetCountry.GetName]."  #<[ROOT.GetCountry.GetRuler.GetName] ist weithin als ein [ROOT.GetCountry.GetRulerTitle] von großer Frömmigkeit bekannt, einer, der den Versuchungen schwächerer Götter entschieden widerstanden hat und gleichzeitig dem Pantheon der [ROOT.GetCountry.GetRuler.GetHerHis]-Vorfahren treu geblieben ist. Viele, die in [ROOT.GetCountry.GetCapital.GetName] leben, beziehen sich jetzt auf [ROOT.GetCountry.GetRuler.GetFirstName] #E „Eusebes“#! zu Ehren des [ROOT.GetCountry.GetRuler.GetHerHis] Glaubens, und der Spitzname beginnt sich in [ROOT.GetCountry.GetName] durchzusetzen.>  #NT!
 me_tayuan_ferghana.39.a: "The gods of our ancestors will protect us in the days and years to come!"  #<Die Götter unserer Vorfahren werden uns in den kommenden Tagen und Jahren beschützen!>  #NT!
  
 me_tayuan_ferghana.40.title: "$tayuan_ferghana_task_39$"  #<$tayuan_ferghana_task_39$>  #NT!
 me_tayuan_ferghana.40.desc: "Inside the walls of these cities live numbers these valleys have never seen. They are both cities, in a literal sense, but also forts, making the impossible journey along these mountains even more treacherous for every enemy. Many call them slices of heaven, places where life should be reserved for eagles yet now humans dwell.\n\nIn their tall, marble baths, the population rests, looking through their large columns to jagged peaks, twisting on themselves, made up of mixes of rock and snow. In the cobbled streets, one can see through the windows of the houses to comfortable family scenes, then look on outside the walls and see inhospitable valleys with only some trees and mostly bush."  #<Innerhalb der Mauern dieser Städte leben Zahlen, die diese Täler noch nie gesehen haben. Sie sind im wahrsten Sinne des Wortes Städte, aber auch Festungen, was die unmögliche Reise entlang dieser Berge für jeden Feind noch tückischer macht. Viele nennen sie Himmelsstücke, Orte, an denen das Leben den Adlern vorbehalten sein sollte, jetzt aber Menschen leben.\n\nIn ihren hohen Marmorbädern ruht die Bevölkerung und blickt durch ihre großen Säulen auf die schroffen, sich windenden Gipfel, die aus einer Mischung aus Stein und Schnee bestehen. In den gepflasterten Straßen kann man durch die Fenster der Häuser auf gemütliche Familienszenen blicken und dann außerhalb der Mauern unwirtliche Täler mit nur wenigen Bäumen und größtenteils Buschwerk sehen.>  #NT!
 me_tayuan_ferghana.40.a: "Another show of our power."  #<Ein weiterer Beweis unserer Macht.>  #NT!
  
 me_tayuan_ferghana.41.title: "$tayuan_ferghana_task_40$"  #<$tayuan_ferghana_task_40$>  #NT!
 me_tayuan_ferghana.41.desc: "By the time our monks returned back home to [ROOT.GetCountry.GetCapital.GetName] after their year-long trek to #E India#! and back, one did not need to have a conversation with the men to tell that they had been changed, for it was clear that they had been transformed by their experience just by looking at them. They all wore long, white robes and had the gaunt appearance of those ascetics that deny the body food.\n\n[ROOT.GetCountry.GetRuler.GetName], always desiring to hear what things have transpired in foreign lands, invited the travelers back to [ROOT.GetCountry.GetRuler.GetHerHis] personal quarters. It was there that they gathered together, discussing many things and pondering the lessons of enlightenment, and the sun vanished and rose again before the reverie was broken.\n\nBy the end of the conversation, [ROOT.GetCountry.GetRuler.GetFirstName] was convinced."  #<Als unsere Mönche nach ihrer einjährigen Wanderung nach #E Indien#! und zurück nach [ROOT.GetCountry.GetCapital.GetName] zurückkehrten, brauchte man kein Gespräch mit den Männern zu führen, um zu erkennen, dass sie sich verändert hatten, denn es war klar, dass sie durch ihre Erfahrung verändert worden waren, wenn man sie nur ansah. Sie alle trugen lange, weiße Gewänder und hatten das hagere Aussehen jener Asketen, die dem Körper Nahrung verweigern.\n\n[ROOT.GetCountry.GetRuler.GetName], immer begierig darauf, zu hören, was sich in fremden Ländern zugetragen hat, lud die Reisenden zurück in [ROOT.GetCountry.GetRuler.GetHerHis] persönliche Gemächer. Dort versammelten sie sich, diskutierten viele Dinge und dachten über die Lehren der Erleuchtung nach, und die Sonne verschwand und ging wieder auf, bevor die Träumerei unterbrochen wurde.\n\nAm Ende des Gesprächs war [ROOT.GetCountry.GetRuler.GetFirstName] überzeugt.>  #NT!
 me_tayuan_ferghana.41.a: "I will fully embrace the teachings of Siddharta!"  #<Ich werde die Lehren von Siddharta voll und ganz annehmen!>  #NT!
 me_tayuan_ferghana.41.b: "The old ways will always be the best ways"  #<Die alten Wege werden immer die besten sein>  #NT!
  
 me_tayuan_ferghana.42.title: "$tayuan_ferghana_task_41$"  #<$tayuan_ferghana_task_41$>  #NT!
 me_tayuan_ferghana.42.desc: "Although we have a reputation for being formidable fighters that are more than capable of holding our own on the battlefield, our people are viewed as keen merchants and traders throughout the civilized world.\n\nOur goods are hailed as the finest that money can procure, especially when it comes to our horses @horses!, and caravans from both the east and the west make the arduous journeys through the deserts and steppes of our hinterland in order to visit the markets of [ROOT.GetCountry.GetCapital.GetName]."  #<Obwohl wir den Ruf haben, hervorragende Kämpfer zu sein, die sich auf dem Schlachtfeld mehr als behaupten können, gelten unsere Leute in der gesamten zivilisierten Welt als begeisterte Kaufleute und Händler.\n\nUnsere Waren gelten als die besten, die man für Geld bekommen kann, besonders wenn es um unsere Pferde @horses! geht, und Karawanen aus dem Osten und Westen machen die beschwerlichen Reisen durch die Wüsten und Steppen unseres Hinterlandes, um die Märkte von zu besuchen [ROOT.GetCountry.GetCapital.GetName].>  #NT!
 me_tayuan_ferghana.42.a: "War and trade are but two sides of the same coin"  #<Krieg und Handel sind nur zwei Seiten derselben Medaille>  #NT!
  
 me_tayuan_ferghana.43.title: "$tayuan_ferghana_task_42$"  #<$tayuan_ferghana_task_42$>  #NT!
 me_tayuan_ferghana.43.desc: "Although there is much for our people to learn about the #E Eastern Empire#! and its wonders, many of our generals have heard stories of the greatest Eastern warriors and secretly harbor hopes of learning their tactics, for it is widely known that our military pales in comparison to theirs. Over many years, we have learned the names of some of their leaders in roundabout ways; from reports of battles shared by traveling merchants, in the scrolls and writings of the eastern historians, and even from soldiers that have fled their duties in the east in hopes of finding refuge in [ROOT.GetCountry.GetName].\n\nWith only the faintest of notions to guide them along their way, the diplomats selected for the trip east have approached [ROOT.GetCountry.GetRuler.GetName] with a request for guidance. They will seek out places of learning where #E military treatises#! can be found, but they must know which great leader should be the target of their fact-finding journey?"  #<Obwohl es für unser Volk viel über das #E Ostreich#! und seine Wunder zu lernen gibt, haben viele unserer Generäle Geschichten über die größten Krieger des Ostens gehört und hegen insgeheim die Hoffnung, ihre Taktiken zu erlernen, denn es ist allgemein bekannt, dass unser Militär im Vergleich zu ihrem verblasst. Im Laufe der Jahre haben wir auf Umwegen die Namen einiger ihrer Anführer erfahren; aus Berichten über Schlachten reisender Kaufleute, aus den Schriftrollen und Schriften der östlichen Historiker und sogar von Soldaten, die vor ihren Pflichten im Osten geflohen sind, in der Hoffnung, in [ROOT.GetCountry.GetName] Zuflucht zu finden.\n\nMit nur der leisesten Ahnung, die ihnen auf ihrem Weg helfen könnte, haben sich die für die Reise nach Osten ausgewählten Diplomaten mit der Bitte um Führung an [ROOT.GetCountry.GetRuler.GetName] gewandt. Sie werden nach Lernorten suchen, an denen #E militärische Abhandlungen#! zu finden sind, aber sie müssen wissen, welcher große Führer das Ziel ihrer Informationsreise sein sollte?>  #NT!
 me_tayuan_ferghana.43.a: "Seek knowledge of the #E Butcher of Men#! - the genius of death #E Bai Qi#!"  #<Suche nach Wissen über den #E Schlächter der Menschen#! – das Genie des Todes #E Bai Qi#!>  #NT!
 me_tayuan_ferghana.43.b: "In times like these, we could use a man like #E Lian Po#!"  #<In Zeiten wie diesen könnten wir einen Mann wie #E Lian Po#! gebrauchen>  #NT!
 me_tayuan_ferghana.43.c: "The steppe lords are nuisances and #E Li Mu#!'s experience would be helpful"  #<Die Steppenfürsten sind lästig und #E Li Mu#!'s Erfahrung wäre hilfreich>  #NT!
 me_tayuan_ferghana.43.d: "#E Wang Jian#! is a worthy character to imitate"  #<#E Wang Jian#! ist ein nachahmenswerter Charakter>  #NT!
  
 me_tayuan_ferghana.44.title: "$tayuan_ferghana_task_43$"  #<$tayuan_ferghana_task_43$>  #NT!
 me_tayuan_ferghana.44.desc: "Although some living within [ROOT.GetCountry.GetRuler.GetName]'s decision to grant #E Citizen#! status to the scattered #E Qin#! communities living within our realm, the [ROOT.GetCountry.GetRulerTitle] was quick to dismiss any criticisms. When some elites continued to push back, arguing that giving the eastern foreigners rights was a betrayal of our old ways, [ROOT.GetCountry.GetRuler.GetFirstName] met with them personally, and there were many honest conversations between ruler and ruled. In the end, most agreed to trust the [ROOT.GetCountry.GetRulerTitle], who had already proven [ROOT.GetCountry.GetRuler.GetHerHim]self time and time again."  #<Obwohl einige innerhalb von [ROOT.GetCountry.GetRuler.GetName] lebten, beschlossen, den verstreuten #E Qin#!-Gemeinschaften, die in unserem Reich leben, den Status #E Bürger#! zu verleihen, wies [ROOT.GetCountry.GetRulerTitle] jegliche Kritik schnell zurück. Als einige Eliten weiterhin Widerstand leisteten und argumentierten, dass es ein Verrat an unseren alten Gewohnheiten sei, den östlichen Ausländern Rechte zu gewähren, traf sich [ROOT.GetCountry.GetRuler.GetFirstName] persönlich mit ihnen und es gab viele ehrliche Gespräche zwischen Herrscher und Beherrschten. Am Ende waren sich die meisten einig, dem [ROOT.GetCountry.GetRulerTitle] zu vertrauen, der sich [ROOT.GetCountry.GetRuler.GetHerHim] bereits immer wieder bewährt hatte.>  #NT!
 me_tayuan_ferghana.44.a: "You will see that all will be well"  #<Du wirst sehen, dass alles gut wird>  #NT!
  
 me_tayuan_ferghana.45.title: "$tayuan_ferghana_task_44$"  #<$tayuan_ferghana_task_44$>  #NT!
 me_tayuan_ferghana.45.desc: "Although not everyone living within [ROOT.GetCountry.GetCapital.GetName] worshiped the gods of the #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, most of the city's inhabitants were pleased to see the religious district expanded to include the shrines of the foreigners. The capital of [ROOT.GetCountry.GetName] had a reputation for being a place where many gods were worshiped freely, and the #E Temple to the Shens#!, a small and humble structure built in the eastern style, was just another sign that this was true."  #<Obwohl nicht alle Bewohner von [ROOT.GetCountry.GetCapital.GetName] die Götter der #COLOR:{0.77,0.5,0.09} #E Huaxia#!#!, verehrten, freuten sich die meisten Einwohner der Stadt über die Erweiterung des religiösen Bezirks um die Schreine der Ausländer. Die Hauptstadt von [ROOT.GetCountry.GetName] hatte den Ruf, ein Ort zu sein, an dem viele Götter frei verehrt wurden, und der #E Tempel des Shens#!,, ein kleines und bescheidenes Bauwerk im östlichen Stil, war nur ein weiteres Zeichen dafür, dass dies wahr war.>  #NT!
 me_tayuan_ferghana.45.a: "I welcome the protection and blessings of all gods"  #<Ich begrüße den Schutz und den Segen aller Götter>  #NT!
  
 me_tayuan_ferghana.46.title: "$tayuan_ferghana_task_45$"  #<$tayuan_ferghana_task_45$>  #NT!
 me_tayuan_ferghana.46.desc: "Although some of the more conservative members of the nobility balked at the idea of a [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] traveling in person to bow before a foreign ruler, they were unable to persuade [ROOT.GetCountry.GetRuler.GetName] to change [ROOT.GetCountry.GetRuler.GetHerHis] mind. The stories that [ROOT.GetCountry.GetRuler.GetFirstName] had heard spoken about the #E Son of Heaven#! seemed impossible to believe, and the thought of making the long overland journey to see the court of the magnificent ruler was almost too much to bear.\n\nWithin days, a retinue of our finest warriors were following [ROOT.GetCountry.GetRuler.GetFirstName] on the routes leading to the east."  #<Obwohl einige der konservativeren Adligen sich gegen die Idee sträubten, dass ein [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] persönlich reiste, um sich vor einem ausländischen Herrscher zu verneigen, konnten sie [ROOT.GetCountry.GetRuler.GetName] nicht davon überzeugen, [ROOT.GetCountry.GetRuler.GetHerHis] seine Meinung zu ändern. Die Geschichten, die [ROOT.GetCountry.GetRuler.GetFirstName] über den #E Sohn des Himmels#! gehört hatte, schienen unmöglich zu glauben, und der Gedanke, die lange Überlandreise auf sich zu nehmen, um den Hof des großartigen Herrschers zu sehen, war fast unerträglich.\n\nBinnen weniger Tage folgte ein Gefolge unserer besten Krieger [ROOT.GetCountry.GetRuler.GetFirstName] auf den Routen nach Osten.>  #NT!
 me_tayuan_ferghana.46.a: "I can't believe this is happening!"  #<Ich kann nicht glauben, dass das passiert!>  #NT!
  
 me_tayuan_ferghana.47.title: "$tayuan_ferghana_task_46$"  #<$tayuan_ferghana_task_46$>  #NT!
 me_tayuan_ferghana.47.desc: "Over the last few years, the influence of the #E Qin#! culture has grown throughout [ROOT.GetCountry.GetName], with more and more of the easterners coming to make their home within our mountain valleys. One day, a visiting diplomat to [ROOT.GetCountry.GetCapital.GetName] was taken to a local market, and the ambassador wryly observed that he couldn't tell if we were a country of #E [ROOT.GetCountry.GetPrimaryCulture.GetName]s#! or not, for there were many foreigners plying their trades; Qin, Bactrians, Sogdians, Hellenes, and even a couple of Carthaginians merchants could be found in our capital.\n\nWhen [ROOT.GetCountry.GetRuler.GetName] heard this story, the remark [ROOT.GetCountry.GetRuler.GetSheHe] made in reply was legendary."  #<In den letzten Jahren ist der Einfluss der #E Qin#!-Kultur im gesamten [ROOT.GetCountry.GetName] gewachsen, und immer mehr Ostländer kommen, um sich in unseren Bergtälern niederzulassen. Eines Tages wurde ein Diplomat, der [ROOT.GetCountry.GetCapital.GetName] besuchte, auf einen lokalen Markt gebracht, und der Botschafter bemerkte ironisch, dass er nicht sagen könne, ob wir ein Land mit #E [ROOT.GetCountry.GetPrimaryCulture.GetName]s#! seien oder nicht, da dort viele Ausländer ihren Berufen nachgingen; Qin, Baktrier, Sogdier, Hellenen und sogar ein paar karthagische Kaufleute waren in unserer Hauptstadt zu finden.\n\nAls [ROOT.GetCountry.GetRuler.GetName] diese Geschichte hörte, war die Bemerkung, die [ROOT.GetCountry.GetRuler.GetSheHe] als Antwort machte, legendär.>  #NT!
 me_tayuan_ferghana.47.a: "We have fully embraced the culture of the #E Qin#!"  #<Wir haben die Kultur der #E Qin#! voll und ganz angenommen>  #NT!
 me_tayuan_ferghana.47.b: "I was born [ROOT.GetCountry.GetPrimaryCulture.GetName] and will die [ROOT.GetCountry.GetPrimaryCulture.GetName]!"  #<Ich wurde [ROOT.GetCountry.GetPrimaryCulture.GetName] geboren und werde [ROOT.GetCountry.GetPrimaryCulture.GetName] sterben!>  #NT!
  
 me_tayuan_ferghana.48.title: "$tayuan_ferghana_task_47$"  #<$tayuan_ferghana_task_47$>  #NT!
 me_tayuan_ferghana.48.desc: "In [GetProvince('(int32)6740').GetName], and through [GetProvince('(int32)6740').GetName], now passes a great deal of wisdom - the monks have begun to settle here. The #E Great Stupa#! will be a reference for all Buddhists in the world, a symbol for all to come here.\n\nAcross the temple gate now roam many an architect and labourer from the banks of the [GetProvince('(int32)7697').GetName], all working to make this place as awe-inspiring as possible, and for it to become a great center of reverence in the Buddhist world."  #<In [GetProvince('(int32)6740').GetName] und durch [GetProvince('(int32)6740').GetName] geht nun viel Weisheit weiter – die Mönche haben begonnen, sich hier niederzulassen. Die #E Große Stupa#! wird eine Referenz für alle Buddhisten auf der Welt sein, ein Symbol für alle, die hierher kommen.\n\nÜber das Tempeltor streifen jetzt viele Architekten und Arbeiter von den Ufern des [GetProvince('(int32)7697').GetName], die alle daran arbeiten, diesen Ort so beeindruckend wie möglich zu machen und ihn zu einem großen Zentrum der Verehrung in der buddhistischen Welt zu machen.>  #NT!
 me_tayuan_ferghana.48.a: "We aim to impress."  #<Wir wollen beeindrucken.>  #NT!
  
 me_tayuan_ferghana.49.title: "The Petition of the Olive Grove"  #<Die Petition des Olivenhains>  #NT!
 me_tayuan_ferghana.49.desc: "As the [ROOT.GetCountry.GetRulerTitle]'s entourage arrived in his residence in [GetProvince('(int32)6654').GetArea.GetName], many a [GetCulture('macedonian').GetName] had already gathered in front, having learned of his arrival beforehand. From the crowd stepped forward a certain [SCOPE.sChar('taymacfella').GetName], both a Macedonian and follower of the [GetReligion('vaksh_religion').GetName] religion, and pleaded upon the figures of government there present:\n\n'My good sirs and lords, there is a great deal of anxiety among my people, a people not so different from yours, that we are going to be shunned from this country by others who speak the same language of our fathers and tell their heroic tales, just because they do not wish to share these godly lands with us. We have grown roots here (and I am the prime example of that), so we plead to you all, and especially to my prince [ROOT.GetCountry.GetRuler.GetFirstName], for your kindness.'"  #<Als das Gefolge des [ROOT.GetCountry.GetRulerTitle] in [GetProvince('(int32)6654').GetArea.GetName] in seiner Residenz eintraf, hatten sich bereits viele [GetCulture('macedonian').GetName] vor ihm versammelt, die zuvor von seiner Ankunft erfahren hatten. Aus der Menge trat ein gewisser [SCOPE.sChar('taymacfella').GetName] hervor, sowohl ein Mazedonier als auch Anhänger der [GetReligion('vaksh_religion').GetName]-Religion, und flehte die dort anwesenden Regierungsvertreter an:\n\n'Meine lieben Herren und Herren, unter meinem Volk, einem Volk, das sich nicht so sehr von Ihrem unterscheidet, herrscht große Angst, dass wir von anderen aus diesem Land gemieden werden, die dieselbe Sprache unserer Väter sprechen und ihre Heldengeschichten erzählen, nur weil sie es nicht wollen Teile diese göttlichen Länder mit uns. Wir haben hier Wurzeln geschlagen (und ich bin das beste Beispiel dafür), deshalb bitten wir Sie alle und insbesondere meinen Prinzen [ROOT.GetCountry.GetRuler.GetFirstName] um Ihre Freundlichkeit.'>  #NT!
 me_tayuan_ferghana.49.a: "You can count on our helping hand."  #<Sie können auf unsere helfende Hand zählen.>  #NT!
 me_tayuan_ferghana.49.b: "We are not, and never will be, your kin."  #<Wir sind nicht deine Verwandten und werden es auch nie sein.>  #NT!
 me_tayuan_ferghana.49.c: "I honestly could not care less..."  #<Es ist mir ehrlich gesagt vollkommen egal...>  #NT!
 me_tayuan_ferghana.49.c_tt: "It's as if nothing ever happened."  #<Es ist, als ob nie etwas passiert wäre.>  #NT!
  
 me_tayuan_ferghana.50.title: "$tayuan_ferghana_task_49$"  #<$tayuan_ferghana_task_49$>  #NT!
 me_tayuan_ferghana.50.desc: "Famous shipwrights, the [GetCulture('ionian').GetName]#E s#! have always been known to brave all kinds of sea. Unfortunately, alongside everything else, the Persians also took our sea from us; we sorely miss life above the waves, and the ability to reach the furthest of lands.\n\nIt would take real madmen to carry boats over land, something we very much aren't.\n\nSo now the ships are pack animals and the rudders our feet. What is there to worry? We now cross, on camelback, seas of sand and tempests of snow, we still manage to reach all kinds of people, and where there are people of intelligence and money to be made, we will find a way to get there."  #<Die berühmten Schiffbauer [GetCulture('ionian').GetName]#E s#! waren schon immer dafür bekannt, allen Arten von Meer zu trotzen. Leider haben uns die Perser neben allem anderen auch unser Meer genommen; Wir vermissen schmerzlich das Leben über den Wellen und die Fähigkeit, die entlegensten Länder zu erreichen.\n\nEs bräuchte echte Verrückte, um Boote über Land zu tragen, was wir ganz und gar nicht sind.\n\nJetzt sind die Schiffe also Lasttiere und die Ruder unsere Füße. Was gibt es zu befürchten? Wir überqueren jetzt auf Kamelrücken Meere aus Sand und Schneestürmen und schaffen es immer noch, alle möglichen Menschen zu erreichen, und wo es Menschen mit Intelligenz und Geld zu verdienen gibt, werden wir einen Weg finden, dorthin zu gelangen.>  #NT!
 me_tayuan_ferghana.50.a: "The merchant's blood still flows, away from his port."  #<Das Blut des Kaufmanns fließt immer noch, weg von seinem Hafen.>  #NT!
  
 me_tayuan_ferghana.51.title: "$tayuan_ferghana_task_50$"  #<$tayuan_ferghana_task_50$>  #NT!
 me_tayuan_ferghana.51.desc: "Three ways to choose, a razor's edge. Managing this cauldron of people would never be easy, and among the magistracy warnings are sounding out that we can no longer ignore our own greatness, we must adapt a policy to deal with the many different people in our lands.\n\nWhile many support keeping to our traditions as an exclusively Ionian elite, many warn against the dangers of ostracizing everyone else. [ROOT.GetCountry.GetRuler.GetFirstName] and [SCOPE.sCharacter('tayy_scholar2').GetName] certainly are stressing over this, as they have been poring over documents and reports, accounts and orders from courts to finally support a decision."  #<Drei Möglichkeiten zur Auswahl, auf Messers Schneide. Die Bewältigung dieses Kessels von Menschen würde niemals einfach sein, und unter den Beamten werden Warnungen laut, dass wir unsere eigene Größe nicht länger ignorieren können, sondern eine Politik entwickeln müssen, um mit den vielen unterschiedlichen Menschen in unserem Land umzugehen.\n\nWährend viele dafür sind, an unseren Traditionen als ausschließlich ionische Elite festzuhalten, warnen viele vor den Gefahren der Ausgrenzung aller anderen. [ROOT.GetCountry.GetRuler.GetFirstName] und [SCOPE.sCharacter('tayy_scholar2').GetName] machen sich darüber sicherlich Sorgen, da sie über Dokumente und Berichte, Rechnungen und Gerichtsbeschlüsse gebrütet haben, um schließlich eine Entscheidung zu stützen.>  #NT!
 me_tayuan_ferghana.51.a: "Stand on our own!"  #<Stehen Sie auf uns allein gestellt!>  #NT!
 me_tayuan_ferghana.51.b: "We must make some concessions."  #<Wir müssen einige Zugeständnisse machen.>  #NT!
 me_tayuan_ferghana.51.c: "'We' are all of our people!"  #<„Wir“ sind alle unsere Leute!>  #NT!
  
 me_tayuan_ferghana.52.title: "$tayuan_ferghana_task_final$"  #<$tayuan_ferghana_task_final$>  #NT!
 me_tayuan_ferghana.52.desc: "The stones which stand here today are supported on the shoulders of the thousands who gave themselves to [ROOT.GetCountry.GetName] and to those standing next to them.\n\nAgain, be careful not to worship the stones; the greatest of all works in [GetProvince('(int32)6704').GetArea.GetName] is the people in it, a result of many faces and cultures crossing it, and of these people collectively mixing and interacting, thousands of litle seeds which now spring to embrace our new identity;"  #<Die Steine, die heute hier stehen, werden auf den Schultern der Tausenden getragen, die sich [ROOT.GetCountry.GetName] hingegeben haben, und denen, die neben ihnen stehen.\n\nAchten Sie auch hier darauf, die Steine ​​nicht anzubeten; Das großartigste aller Werke in [GetProvince('(int32)6704').GetArea.GetName] sind die Menschen darin, ein Ergebnis vieler Gesichter und Kulturen, die es kreuzen, und dieser Menschen, die sich kollektiv vermischen und interagieren, Tausende kleiner Samen, die jetzt aufgehen, um unsere neue Identität zu umarmen;>  #NT!
 me_tayuan_ferghana.52.a: "As the true continuation of the [GetCulture('ionian').GetName]#E s#!."  #<Als wahre Fortsetzung der [GetCulture('ionian').GetName]#E s#!.>  #NT!
 me_tayuan_ferghana.52.b: "As a new stalwart of Heaven on the West."  #<Als neuer Getreuer des Himmels im Westen.>  #NT!
 me_tayuan_ferghana.52.c: "As the true sons of the [GetCulture('tayuan').GetName] lands."  #<Als die wahren Söhne der [GetCulture('tayuan').GetName]-Länder.>  #NT!
 me_tayuan_ferghana.52.d: "As the first beyond the mountains to defend the Buddha."  #<Als erster jenseits der Berge, der Buddha verteidigte.>  #NT!
 me_tayuan_ferghana.52.e: "As the crossroads of the Greeks and the Buddhists."  #<Als Kreuzung der Griechen und Buddhisten.>  #NT!
 me_tayuan_ferghana.52.f: "As a new dynasty, under Heaven and the Buddha."  #<Als neue Dynastie, unter dem Himmel und dem Buddha.>  #NT!
 me_tayuan_ferghana.52.g: "As the dance between the [GetCulture('ionian').GetName] culture and [GetCulture('tayuan').GetName] tribes."  #<Als Tanz zwischen der [GetCulture('ionian').GetName]-Kultur und den [GetCulture('tayuan').GetName]-Stämmen.>  #NT!
 me_tayuan_ferghana.52.h: "As the first of the Greeks to syncretise with the great Eastern Empire."  #<Als erster Grieche, der sich mit dem großen Oströmischen Reich synkretisierte.>  #NT!
 me_tayuan_ferghana.52.i: "As a marriage of the #E Huaxia#! East and the [GetCulture('tayuan').GetName] land."  #<Als Hochzeit des #E Huaxia#! Ostens und des [GetCulture('tayuan').GetName] Landes.>  #NT!
  
 # EVENT CHAINS 
  
 me_tayuan_ferghana.60.title: "Acquiring a Treatise"  #<Erwerb einer Abhandlung>  #NT!
 me_tayuan_ferghana.60.desc_1: "After many months of travel, our diplomats reached the borders of the #E Eastern Empire#!, where they were treated fairly by the border guards but eyed with a bit of suspicion. Bribes were exchanged, interpreters were hired, and in the weeks and months to come, our men searched every marketplace and temple that they came across.\n\nOur diplomats soon learned that the name #E 'Bai Qi'#! was not one to share lightly, for the renowned general had laid waste to many cities and towns throughout the countryside of the #E Eastern Empire#!, and there were many that still cursed his name. In spite of this grim reputation that closed more doors than it opened, the written words of Bai Qi were eventually discovered in a small temple that had been built at the site of a great battle. The monks living there were willing to sell their greatest possession, but the price was staggering."  #<Nach vielen Monaten der Reise erreichten unsere Diplomaten die Grenzen des #E Ostreichs#!,, wo sie von den Grenzschutzbeamten fair behandelt, aber mit etwas Misstrauen beäugt wurden. Es wurden Bestechungsgelder ausgetauscht, Dolmetscher angeheuert, und in den kommenden Wochen und Monaten durchsuchten unsere Männer jeden Markt und jeden Tempel, den sie fanden.\n\nUnsere Diplomaten erfuhren bald, dass der Name #E „Bai Qi“#! nicht leichtfertig geteilt werden sollte, denn der berühmte General hatte viele Städte und Gemeinden im gesamten #E Oströmischen Reich#!, verwüstet und viele verfluchten noch immer seinen Namen. Trotz dieses düsteren Rufs, der mehr Türen verschloss als öffnete, wurden die geschriebenen Worte von Bai Qi schließlich in einem kleinen Tempel entdeckt, der am Ort einer großen Schlacht errichtet worden war. Die dort lebenden Mönche waren bereit, ihren größten Besitz zu verkaufen, aber der Preis war atemberaubend.>  #NT!
 me_tayuan_ferghana.60.desc_2: "After many months of travel, our diplomats reached the borders of the #E Eastern Empire#!, where they were treated fairly by the border guards but eyed with a bit of suspicion. Bribes were exchanged, interpreters were hired, and in the weeks and months to come, our men searched every marketplace and temple that they came across.\n\nOur men report that they eventually reached a powerful kingdom called #E 'Chu'#!, and the capital city of this resplendent realm was called #E 'Shouxian'#!. It was in this fair city that our men discovered the writings of #E Lian Po#!, a general that was buried within its walls.\n\nLian Po was known for famous victories as well as famous losses, so the writings of the general are prized above others for offering a nuanced take on what it means to command warriors into battle. Inquiries were made at the temple that served as the general's tomb, and it was revealed that a memoir entitled #E 'Reflections Upon The Battle Of Changping'#!, a handwritten account of a momentous battle that Lian Po lost long ago, was available for purchase, but the price was a staggering amount."  #<Nach vielen Monaten der Reise erreichten unsere Diplomaten die Grenzen des #E Ostreichs#!,, wo sie von den Grenzschutzbeamten fair behandelt, aber mit etwas Misstrauen beäugt wurden. Es wurden Bestechungsgelder ausgetauscht, Dolmetscher angeheuert und in den kommenden Wochen und Monaten durchsuchten unsere Männer jeden Markt und jeden Tempel, den sie fanden.\n\nUnsere Männer berichten, dass sie schließlich ein mächtiges Königreich namens #E 'Chu'#!, erreichten und die Hauptstadt dieses prächtigen Reiches #E 'Shouxian' hieß#!.. In dieser schönen Stadt entdeckten unsere Männer die Schriften von #E Lian Po#!, ein General, der innerhalb seiner Mauern begraben wurde.\n\nLian Po war sowohl für berühmte Siege als auch für berühmte Verluste bekannt, daher werden die Schriften des Generals vor allen anderen geschätzt, weil sie eine differenzierte Sicht darauf bieten, was es bedeutet, Krieger in die Schlacht zu befehligen. Im Tempel, der als Grabstätte des Generals diente, wurden Nachforschungen angestellt, und es stellte sich heraus, dass eine Abhandlung mit dem Titel #E „Reflexionen über die Schlacht von Changping“#!,, ein handgeschriebener Bericht über eine bedeutsame Schlacht, die Lian Po vor langer Zeit verloren hatte, zum Kauf angeboten wurde, der Preis jedoch enorm war.>  #NT!
 me_tayuan_ferghana.60.desc_3: "After many months of travel, our diplomats reached the borders of the #E Eastern Empire#!, where they were treated fairly by the border guards but eyed with a bit of suspicion. Bribes were exchanged, interpreters were hired, and in the weeks and months to come, our men searched every marketplace and temple that they came across.\n\nAfter days of fruitless searches throughout the cities and markets of the #E Eastern Empire#!'s interior, our messengers were told that if they sought the teachings of the great #E Li Mu#!, their time would be better spent far to the north. With this knowledge in mind, the [ROOT.GetCountry.GetAdjective] diplomats made their way to the border fortresses that protected the empire's heartland from the ruthless horse nomads of the steppe, and in a few weeks, they found a manuscript for sale."  #<Nach vielen Monaten der Reise erreichten unsere Diplomaten die Grenzen des #E Ostreichs#!,, wo sie von den Grenzschutzbeamten fair behandelt, aber mit etwas Misstrauen beäugt wurden. Es wurden Bestechungsgelder ausgetauscht, Dolmetscher angeheuert, und in den kommenden Wochen und Monaten durchsuchten unsere Männer jeden Markt und jeden Tempel, auf den sie stießen.\n\nNach Tagen erfolgloser Durchsuchungen in den Städten und Märkten des #E Ostreichs#!'s Landesinneren wurde unseren Boten gesagt, dass sie ihre Zeit besser weit im Norden verbringen würden, wenn sie nach den Lehren des großen #E Li Mu#!, suchten. Mit diesem Wissen im Hinterkopf machten sich die [ROOT.GetCountry.GetAdjective]-Diplomaten auf den Weg zu den Grenzfestungen, die das Kernland des Imperiums vor den rücksichtslosen Pferdenomaden der Steppe schützten, und ein paar Wochen später fanden sie ein Manuskript zum Verkauf.>  #NT!
 me_tayuan_ferghana.60.desc_4: "After many months of travel, our diplomats reached the borders of the #E Eastern Empire#!, where they were treated fairly by the border guards but eyed with a bit of suspicion. Bribes were exchanged, interpreters were hired, and in the weeks and months to come, our men searched every marketplace and temple that they came across.\n\nWhen all was said and done, finding a military treatise written by the incomparable #E Wang Jian#! proved to be no task at all, for our diplomats were convinced by their interpreters to travel to a region they called #E 'Guanzhong'#!. A few days were spent making inquiries, and they soon encountered a trader in rare scrolls that was willing to part with the last copy of the general's writings."  #<Nach vielen Monaten der Reise erreichten unsere Diplomaten die Grenzen des #E Ostreichs#!,, wo sie von den Grenzschutzbeamten fair behandelt, aber mit etwas Misstrauen beäugt wurden. Es wurden Bestechungsgelder ausgetauscht, Dolmetscher angeheuert und in den kommenden Wochen und Monaten durchsuchten unsere Männer jeden Markt und jeden Tempel, den sie fanden.\n\nLetztendlich erwies es sich als überhaupt keine Aufgabe, eine militärische Abhandlung des unvergleichlichen #E Wang Jian#! zu finden, denn unsere Diplomaten wurden von ihren Dolmetschern überzeugt, in eine Region zu reisen, die sie #E „Guanzhong“#! nannten. Sie verbrachten einige Tage damit, Nachforschungen anzustellen, und bald stießen sie auf einen Händler seltener Schriftrollen, der bereit war, sich von der letzten Kopie der Schriften des Generals zu trennen.>  #NT!
 me_tayuan_ferghana.60.a: "Our generals must be slayers like Bai Qi!"  #<Unsere Generäle müssen Jäger wie Bai Qi sein!>  #NT!
 me_tayuan_ferghana.60.b: "To learn the lessons of Lian Po, I would spend every coin in [ROOT.GetCountry.GetName]"  #<Um die Lektionen von Lian Po zu lernen, würde ich jede Münze in [ROOT.GetCountry.GetName] ausgeben>  #NT!
 me_tayuan_ferghana.60.c: "Li Mu's strategy is priceless - we will pay"  #<Die Strategie von Li Mu ist unbezahlbar – wir werden dafür zahlen>  #NT!
 me_tayuan_ferghana.60.d: "We must purchase the treatise of Wang Jian at once!"  #<Wir müssen die Abhandlung von Wang Jian sofort kaufen!>  #NT!
 me_tayuan_ferghana.60.e: "Actually, this is way too expensive"  #<Eigentlich ist das viel zu teuer>  #NT!
  
 me_tayuan_ferghana.61.title: "The Merchant"  #<Der Kaufmann>  #NT!
 me_tayuan_ferghana.61.desc: "While traveling the long roads that led to the #E Eastern Empire#!, [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] retinue encountered a wandering merchant that was heading in the opposite direction. This trader, a man named [SCOPE.sCharacter('traveling_qin_merchant_scope').GetName], waved down the [ROOT.GetCountry.GetRulerTitle] with wide-eyed amazement.\n\n'When I woke up this morning, I had no idea that I would soon be standing before the ruler of [ROOT.GetCountry.GetName]. Truly, it is my lucky day! For you, I shall offer my two greatest treasures!'"  #<Während sie die langen Straßen bereisten, die zum #E Ostreich#!, [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis] führten, trafen sie auf einen umherziehenden Händler, der in die entgegengesetzte Richtung unterwegs war. Dieser Händler, ein Mann namens [SCOPE.sCharacter('traveling_qin_merchant_scope').GetName], winkte mit großen Augen und Erstaunen den [ROOT.GetCountry.GetRulerTitle] hinunter.\n\n'Als ich heute Morgen aufwachte, hatte ich keine Ahnung, dass ich bald vor dem Herrscher von [ROOT.GetCountry.GetName] stehen würde. Es ist wirklich mein Glückstag! Für dich werde ich meine beiden größten Schätze darbringen!‘>  #NT!
 me_tayuan_ferghana.61.a: "That jewelry that you have is exceptional..."  #<Der Schmuck, den Sie haben, ist außergewöhnlich ...>  #NT!
 me_tayuan_ferghana.61.b: "A real warrior like me wants to buy that sword"  #<Ein echter Krieger wie ich möchte dieses Schwert kaufen>  #NT!
 me_tayuan_ferghana.61.c: "Bah! Your merchandise is too expensive"  #<Bah! Ihre Ware ist zu teuer>  #NT!
  
 me_tayuan_ferghana.62.title: "The Emperor"  #<Der Kaiser>  #NT!
 me_tayuan_ferghana.62.desc_1: "After the weeks traversing the roads, forested hillsides, fertile valleys and aimless rivers of the #E Eastern Empire#!, [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] men swore that they must have seen over a thousand cities and villages, with names that blended into the other - too much for anyone to remember.\n\nAnd yet somehow, in the face of exhaustion, their weary feet carried them onward until they reached a town named #E Xianyang#!, and despite their status as foreigners, they were allowed to stand before the #E Emperor of the East#!, the living god [SCOPE.sCharacter('chinese_emperor_character_scope').GetName].\n\n'I know why you are here, o [ROOT.GetCountry.GetRulerTitle] of the [ROOT.GetCountry.GetName] - there is much about you, or should I say your horses, that I would love to know about.' The hours passed by in delightful conversation that resulted in a genuine warmth between the two rulers, and in a gesture that [ROOT.GetCountry.GetRuler.GetFirstName] would remember for the rest of [ROOT.GetCountry.GetRuler.GetHerHis] life, gifts were sent to [ROOT.GetCountry.GetCapital.GetName] that would last a generation."  #<Nachdem sie wochenlang die Straßen, bewaldeten Hänge, fruchtbaren Täler und ziellosen Flüsse des #E Ostreichs#!, [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis] durchquert hatten, schworen die Männer, dass sie über tausend Städte und Dörfer gesehen haben mussten, deren Namen ineinander übergingen – zu viel, als dass sich irgendjemand erinnern könnte.\n\nUnd doch trugen sie ihre müden Füße trotz der Erschöpfung irgendwie weiter, bis sie eine Stadt mit Namen erreichten #E Xianyang#!, und trotz ihres Status als Ausländer durften sie vor dem #E Kaiser des Ostens#!,, dem lebenden Gott [SCOPE.sCharacter('chinese_emperor_character_scope').GetName], stehen.\n\n'Ich weiß, warum du hier bist, o [ROOT.GetCountry.GetRulerTitle] der #!,0 – es gibt viel über dich, oder sollte ich sagen deine Pferde, worüber ich gerne etwas wissen würde.' Die Stunden vergingen in angenehmen Gesprächen, die zu einer echten Herzlichkeit zwischen den beiden Herrschern führten, und in einer Geste, die #!,1 für den Rest von [ROOT.GetCountry.GetRuler.GetHerHis] Leben in Erinnerung bleiben würde, wurden Geschenke an #!,3 geschickt, die eine Generation lang Bestand haben würden.>  #NT!
 me_tayuan_ferghana.62.desc_2: "After the weeks traversing the roads, forested hillsides, fertile valleys and aimless rivers of the #E Eastern Empire#!, [ROOT.GetCountry.GetRuler.GetName] and [ROOT.GetCountry.GetRuler.GetHerHis] men swore that they must have seen over a thousand cities and villages, with names that blended into the other - too much for anyone to remember.\n\nAnd yet somehow, in the face of exhaustion, their weary feet carried them onward until they reached a town named #E Xianyang#!, and despite their status as foreigners, they were allowed to stand before the #E Emperor of the East#!, the living god [SCOPE.sCharacter('chinese_emperor_character_scope').GetName].\n\nIt was a disaster the moment that [ROOT.GetCountry.GetRuler.GetFirstName] entered the court, for in [ROOT.GetCountry.GetRuler.GetHerHis] haste to see the wonders of the #E Imperial Palace#!, the [ROOT.GetCountry.GetAdjective] travelers had gone straight to the royal dwellings, the dust and mire of the roads still upon them.\n\n'And who is this barbarian that dares stand before the #E Son of Heaven#! smelling of horse sweat and dung? Begone, thou malodorous oaf from the provinces, and never return to the palace ever again.'"  #<Nachdem sie wochenlang die Straßen, bewaldeten Hänge, fruchtbaren Täler und ziellosen Flüsse des #E Ostreichs#!, [ROOT.GetCountry.GetRuler.GetName] und [ROOT.GetCountry.GetRuler.GetHerHis] durchquert hatten, schworen die Männer, dass sie über tausend Städte und Dörfer gesehen haben mussten, deren Namen ineinander übergingen – zu viel, als dass sich irgendjemand erinnern könnte.\n\nUnd doch trugen sie ihre müden Füße trotz der Erschöpfung irgendwie weiter, bis sie eine Stadt mit Namen erreichten ☻__0 die königlichen Wohnstätten, der Staub und der Schlamm der Straßen liegen immer noch auf ihnen.\n\n'Und wer ist dieser Barbar, der es wagt, vor dem #E Sohn des Himmels#!,5 zu stehen, der nach Pferdeschweiß und Mist riecht? Verschwinde, du übelriechender Trottel aus der Provinz, und kehre nie wieder in den Palast zurück.'>  #NT!
 me_tayuan_ferghana.62.a: "This is nothing short of a miracle!"  #<Das ist nichts weniger als ein Wunder!>  #NT!
 me_tayuan_ferghana.62.b: "What a humiliation this is..."  #<Was für eine Demütigung das ist...>  #NT!
 NICKNAME_SON_OF_HEAVEN: "'Son Of Heaven'"  #<„Sohn des Himmels“>  #NT!
  
  
 me_tayuan_ferghana.3001.title: "$tayuan_ferghana_task_29$: The [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]"  #<$tayuan_ferghana_task_29$: Das [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]>  #NT!
 me_tayuan_ferghana.3001.desc: "And so [ROOT.GetCountry.GetRuler.GetFirstName] decides to act. Springing from his quarters to his scriptorium, he asks for his [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] to be summoned.\n\nHe quickly arrives and salutes him, and after a quick briefing on the situation, speaks:\n\n''I see, my [ROOT.GetCountry.GetRulerTitle]. I am no stranger to these rumours either, and have seen some strange movements myself. There are two ways we can counter them; through spying and connivery, or through visible shows of force on probable suspects meant to intimidate the rest. My men are capable of either, the decision is yours."  #<Und so beschließt [ROOT.GetCountry.GetRuler.GetFirstName] zu handeln. Er springt aus seinem Quartier in sein Skriptorium und bittet darum, dass sein [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] gerufen wird.\n\nEr kommt schnell, grüßt ihn und spricht nach einer kurzen Einweisung in die Situation:\n\n„Ich verstehe, mein [ROOT.GetCountry.GetRulerTitle].“ Auch mir sind diese Gerüchte nicht fremd und ich habe selbst einige seltsame Bewegungen gesehen. Es gibt zwei Möglichkeiten, ihnen entgegenzuwirken; durch Spionage und Intrigen oder durch sichtbare Gewaltdemonstrationen gegenüber mutmaßlichen Verdächtigen, die den Rest einschüchtern sollen. Meine Männer sind zu beidem fähig, die Entscheidung liegt bei Ihnen.>  #NT!
 me_tayuan_ferghana.3001.a: "Snake them out."  #<Vertreibe sie.>  #NT!
 me_tayuan_ferghana.3001.b: "Smite them!"  #<Schlag sie!>  #NT!
 me_tayuan_ferghana.3001.a_tt: "Our success will depend on our [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)]'s skill."  #<Unser Erfolg wird von den Fähigkeiten unserer [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] abhängen.>  #NT!
  
 me_tayuan_ferghana.3002.title: "The [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] Succeeds"  #<Das [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] ist erfolgreich>  #NT!
 me_tayuan_ferghana.3002.desc: "A few days later, [SCOPE.sCharacter('tay_bdg_plot').GetName] enters the palace's chambers, and summarily informs [ROOT.GetCountry.GetRuler.GetName] that his efforts to root out the conspirators with direct action were resoundingly successful, and we already have a nice list of names, both civilian and military, in our possession.\n\nStill, the remaining conspirators plot their days away; they now hope to convince the many peoples we rule that our supposed bad governance is the source of their troubles. Such an idea is frankly preposterous, but the common man may be easily swayed by the hope of a better life, and also the idea that he, too, holds political power. Right now, we cannot do much but hope that they are happy enough with our management and won't adhere to their ideas."  #<Ein paar Tage später betritt [SCOPE.sCharacter('tay_bdg_plot').GetName] die Gemächer des Palastes und informiert [ROOT.GetCountry.GetRuler.GetName] zusammenfassend darüber, dass seine Bemühungen, die Verschwörer durch direkte Aktionen auszurotten, durchschlagend erfolgreich waren und wir bereits eine schöne Liste von Namen, sowohl zivilen als auch militärischen, in unserem Besitz haben.\n\nDennoch planen die verbleibenden Verschwörer ihre Tage; Sie hoffen nun, die vielen Völker, die wir regieren, davon zu überzeugen, dass unsere vermeintlich schlechte Regierungsführung die Ursache ihrer Probleme ist. Eine solche Idee ist ehrlich gesagt absurd, aber der Durchschnittsbürger lässt sich leicht von der Hoffnung auf ein besseres Leben und auch von der Vorstellung, dass auch er politische Macht innehat, beeinflussen. Im Moment können wir nicht viel tun, außer zu hoffen, dass sie mit unserem Management zufrieden sind und ihren Ideen nicht folgen.>  #NT!
 me_tayuan_ferghana.3002.a: "But have we ever done anything wrong?"  #<Aber haben wir jemals etwas falsch gemacht?>  #NT!
 me_tayuan_ferghana.3002.a_tt: "Our success will depend on our treatment of the many cultures of this country."  #<Unser Erfolg wird von unserem Umgang mit den vielen Kulturen dieses Landes abhängen.>  #NT!
  
 me_tayuan_ferghana.3003.title: "The [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] Fails"  #<Das [GetOffice('office_master_of_the_guard').GetCulturalName(SCOPE.GetRootScope.GetCountry)] schlägt fehl>  #NT!
 me_tayuan_ferghana.3003.desc: "With a serious tone, [SCOPE.sCharacter('tay_bdg_plot').GetName] enters the palace's chambers, and summarily informs [ROOT.GetCountry.GetRuler.GetName] that his efforts to root out the conspirators with direct action failed; the ones who could wield real power are thought to have continued the plot despite our actions. Somehow, the [ROOT.GetCountry.GetRulerTitle] can't help but suspect he is a conspirator himself. For all that matters he can't do anything about it just about now.\n\nAnd so, the growing conspirators plot their days away; they now hope to convince the many peoples we rule that our supposed bad governance is the source of their troubles. Such an idea is frankly preposterous, but the common man may be easily swayed by the hope of a better life, and also the idea that he, too, holds political power. Right now, we cannot do much but hope that they are happy enough with our management and won't adhere to their ideas."  #<Mit ernstem Ton betritt [SCOPE.sCharacter('tay_bdg_plot').GetName] die Gemächer des Palastes und teilt [ROOT.GetCountry.GetRuler.GetName] zusammenfassend mit, dass seine Bemühungen, die Verschwörer durch direkte Aktionen auszurotten, gescheitert seien; Es wird angenommen, dass diejenigen, die wirkliche Macht ausüben könnten, die Verschwörung trotz unseres Handelns fortgesetzt haben. Irgendwie kommt der [ROOT.GetCountry.GetRulerTitle] nicht umhin zu vermuten, dass er selbst ein Verschwörer ist. Im Grunde genommen kann er im Moment nichts dagegen tun.\n\nUnd so planen die wachsenden Verschwörer ihre Tage; Sie hoffen nun, die vielen Völker, die wir regieren, davon zu überzeugen, dass unsere vermeintlich schlechte Regierungsführung die Ursache ihrer Probleme ist. Eine solche Idee ist ehrlich gesagt absurd, aber der Durchschnittsbürger lässt sich leicht von der Hoffnung auf ein besseres Leben und auch von der Vorstellung, dass auch er politische Macht innehat, beeinflussen. Im Moment können wir nicht viel tun, außer zu hoffen, dass sie mit unserem Management zufrieden sind und ihren Ideen nicht folgen.>  #NT!
 me_tayuan_ferghana.3003.a: "But have we ever done anything wrong?"  #<Aber haben wir jemals etwas falsch gemacht?>  #NT!
  
 me_tayuan_ferghana.3004.title: "The People Refuse Democracy"  #<Das Volk lehnt die Demokratie ab>  #NT!
 me_tayuan_ferghana.3004.desc: "Heralds flood in from all corners of the valley and beyond; the governors, tasked with assessing if the democratic conspirators gained any real following, say that for the most part the men and women are indifferent, and seem to ignore the attempts to convince them to support the democratic cause. What good is a movement like this if it doesn't have the support of the people it claims to represent?\n[SCOPE.sChar('tay_guvnahh').GetName] personally delivers his report, and is quite happy to reveal that in some towns of his governorship, the men who were giving these speeches for democracy were actively chased away.\n\nStill, the pressure is starting to mount. The [ROOT.GetCountry.GetRulerTitle] now hears that the conspiracy is already sending people to action in the capital, all the while it seeks foreign backing, trying to get our neighbors involved. Do they wish to destroy our country, have it be subject to foreign interests? We must establish contacts first with these countries to guarantee their trust."  #<Aus allen Ecken des Tals und darüber hinaus strömen Herolde herein; Die Gouverneure, die damit beauftragt sind, zu beurteilen, ob die demokratischen Verschwörer tatsächlich Anhänger gefunden haben, sagen, dass die meisten Männer und Frauen gleichgültig seien und die Versuche, sie davon zu überzeugen, die demokratische Sache zu unterstützen, offenbar ignorieren. Was nützt eine solche Bewegung, wenn sie nicht die Unterstützung der Menschen hat, die sie zu vertreten vorgibt?\n[SCOPE.sChar('tay_guvnahh').GetName] hält seinen Bericht persönlich und gibt mit großer Freude bekannt, dass in einigen Städten seiner Gouverneurszeit die Männer, die diese Reden für die Demokratie hielten, aktiv vertrieben wurden.\n\nDennoch nimmt der Druck zu. Die [ROOT.GetCountry.GetRulerTitle] erfährt nun, dass die Verschwörung bereits Menschen in der Hauptstadt zum Handeln schickt, während sie gleichzeitig ausländische Unterstützung sucht und versucht, unsere Nachbarn einzubeziehen. Wollen sie unser Land zerstören, soll es ausländischen Interessen unterworfen werden? Wir müssen zunächst Kontakte zu diesen Ländern knüpfen, um ihr Vertrauen zu gewährleisten.>  #NT!
 me_tayuan_ferghana.3004.a: "Call on our allies for help!"  #<Rufen Sie unsere Verbündeten um Hilfe!>  #NT!
 me_tayuan_ferghana.3004.b: "We need our subjects' loyalty, more than ever."  #<Wir brauchen die Loyalität unserer Untertanen mehr denn je.>  #NT!
 me_tayuan_ferghana.3004.c: "We trust every one of our neighbors enough."  #<Wir vertrauen jedem unserer Nachbarn genug.>  #NT!
  
 me_tayuan_ferghana.3005.title: "The People Champion Democracy"  #<Das Volk setzt sich für Demokratie ein>  #NT!
 me_tayuan_ferghana.3005.desc: "Heralds flood in from all corners of the valley and beyond; the governors, tasked with assessing if the democratic conspirators gained any real following, say that everywhere the people cheer the men supposedly involved in this democratic plot, and express support for it; they derive hope from this, because citizens are promised the power to decide their own fate.\n[SCOPE.sChar('tay_guvnahh').GetName] personally delivers his report, and with sorrow reveals that in his governorship there already are hideouts for the fighters, should civil war come. The situation is agonizing, and the air weighs with the encroaching danger.\n\nThe [ROOT.GetCountry.GetRulerTitle] now hears that the conspiracy is already sending people to action in the capital, all the while it seeks foreign backing, trying to get our neighbors involved. Do they wish to destroy our country, have it be subject to foreign interests? We must establish contacts first with these countries to guarantee their trust."  #<Aus allen Ecken des Tals und darüber hinaus strömen Herolde herein; Die Gouverneure, die damit beauftragt sind, zu beurteilen, ob die demokratischen Verschwörer tatsächlich Anhänger gefunden haben, sagen, dass die Menschen überall die Männer bejubeln, die angeblich an dieser demokratischen Verschwörung beteiligt sind, und ihre Unterstützung dafür zum Ausdruck bringen; Daraus schöpfen sie Hoffnung, denn den Bürgern wird die Macht versprochen, über ihr eigenes Schicksal zu entscheiden.\n[SCOPE.sChar('tay_guvnahh').GetName] hält persönlich seinen Bericht und enthüllt voller Trauer, dass es in seiner Amtszeit als Gouverneur bereits Verstecke für die Kämpfer gibt, falls es zu einem Bürgerkrieg kommen sollte. Die Situation ist quälend und die drohende Gefahr lastet in der Luft.\n\nDie [ROOT.GetCountry.GetRulerTitle] hört nun, dass die Verschwörung bereits Menschen in der Hauptstadt zum Handeln antreibt, während sie gleichzeitig ausländische Unterstützung sucht und versucht, unsere Nachbarn einzubeziehen. Wollen sie unser Land zerstören, soll es ausländischen Interessen unterworfen werden? Wir müssen zunächst Kontakte zu diesen Ländern knüpfen, um ihr Vertrauen zu gewährleisten.>  #NT!
 me_tayuan_ferghana.3005.a: "Call on our allies for help!"  #<Rufen Sie unsere Verbündeten um Hilfe!>  #NT!
 me_tayuan_ferghana.3005.a_tt: "We will rely on our #Y allies'#! opinion of us to stop the plotters."  #<Wir werden uns auf die Meinung unserer #Y Verbündeten#! über uns verlassen, um die Verschwörer zu stoppen.>  #NT!
 me_tayuan_ferghana.3005.b: "We need our subjects' loyalty, more than ever."  #<Wir brauchen die Loyalität unserer Untertanen mehr denn je.>  #NT!
 me_tayuan_ferghana.3005.b_tt: "We will rely on our #Y subjects'#! opinion of us to stop the plotters."  #<Wir werden uns auf die Meinung unserer #Y Untertanen#! über uns verlassen, um die Verschwörer zu stoppen.>  #NT!
 me_tayuan_ferghana.3005.c: "We trust every one of our neighbors enough."  #<Wir vertrauen jedem unserer Nachbarn genug.>  #NT!
 me_tayuan_ferghana.3005.c_tt: "We will rely on our #Y neighbors'#! opinion of us to stop the plotters."  #<Wir werden uns auf die Meinung unserer #Y Nachbarn#! über uns verlassen, um die Verschwörer zu stoppen.>  #NT!
  
 me_tayuan_ferghana.3006.title: "Foreign Contacts Unsuccessful"  #<Auslandskontakte erfolglos>  #NT!
 me_tayuan_ferghana.3006.desc: "A herald arrives before [ROOT.GetCountry.GetRuler.GetName], and says that he arrives from [SCOPE.sCountry('tay_allycountry').GetRuler.GetName]. He lays a cloth on the floor, opens it, and shows the court four embalmed hearts. Most of the courtesans writhe in disgust, and look away.\n\n''Here is proof of friendship between my people and yours'' he says, as he projects his arms out towards the people watching, ''these wicked tried to have us betray you, my loyal friends, and any who wishes to break such a bond will have him done thus.''. [ROOT.GetCountry.GetRuler.GetName] and his advisors, convening later, weren't sure that such a radical act of loyalty was necessary, but were nonetheless thankful that the conspiracy hadn't taken it's roots elsewhere.\n\nReports still arrive of the imminence of this plot, that at any moment it can strike, so we must hope to have done enough to stop it."  #<Ein Herold kommt vor [ROOT.GetCountry.GetRuler.GetName] und sagt, dass er von [SCOPE.sCountry('tay_allycountry').GetRuler.GetName] ankommt. Er legt ein Tuch auf den Boden, öffnet es und zeigt dem Hofstaat vier einbalsamierte Herzen. Die meisten Kurtisanen winden sich vor Abscheu und schauen weg.\n\n„Hier ist ein Beweis der Freundschaft zwischen meinem und eurem Volk“, sagt er, während er seine Arme in Richtung der Zuschauer ausstreckt, „diese Bösewichte haben versucht, dass wir euch verraten, meine treuen Freunde, und jeder, der eine solche Bindung brechen möchte, wird es ihm gestatten.“ [ROOT.GetCountry.GetRuler.GetName] und seine Berater, die sich später trafen, waren sich nicht sicher, ob ein solch radikaler Akt der Loyalität notwendig war, waren aber dennoch dankbar, dass die Verschwörung ihre Wurzeln nicht woanders hatte.\n\nEs gibt immer noch Berichte über die unmittelbar bevorstehende Verschwörung, dass sie jeden Moment zuschlagen kann, also müssen wir hoffen, genug getan zu haben, um sie zu stoppen.>  #NT!
 me_tayuan_ferghana.3006.a: "Strength, my [ROOT.GetCountry.GetRulerTitle]!"  #<Stärke, mein [ROOT.GetCountry.GetRulerTitle]!>  #NT!
  
 me_tayuan_ferghana.3007.title: "Foreign Contacts Probably Successful"  #<Auslandskontakte vermutlich erfolgreich>  #NT!
 me_tayuan_ferghana.3007.desc: "We have repeatedly sent messengers out to the countries we relied on, but they have been repeatedly refused entry in those palaces. Have we been so cursed as to be surrounded by packs of jackals, gnawing at the hand that offered them friendship? Must our lands be stricken with pain, it's people brutalized for something which won't change their lives so? Most won't even be citizens...\n\nRegardless, reports are increasingly arriving of the imminence of this plot, that at any moment it can strike, so we must hope to have done enough to stop it."  #<Wir haben wiederholt Boten in die Länder geschickt, auf die wir uns verlassen haben, aber ihnen wurde wiederholt der Zutritt zu diesen Palästen verweigert. Waren wir so verflucht, dass wir von Schakalen umzingelt waren und an der Hand nagten, die ihnen Freundschaft anbot? Müssen unsere Länder von Schmerz heimgesucht werden, wenn Menschen für etwas brutalisiert werden, das ihr Leben nicht so verändert? Die meisten werden nicht einmal Staatsbürger sein...\n\nTrotzdem treffen immer mehr Berichte ein, dass diese Verschwörung unmittelbar bevorsteht und dass sie jeden Moment zuschlagen kann. Wir müssen also hoffen, genug getan zu haben, um sie zu stoppen.>  #NT!
 me_tayuan_ferghana.3007.a: "Strength, my [ROOT.GetCountry.GetRulerTitle]!"  #<Stärke, mein [ROOT.GetCountry.GetRulerTitle]!>  #NT!
  
 me_tayuan_ferghana.3008.title: "The [ROOT.GetCountry.GetRuler.GetFamily.GetName] Dynasty Falls"  #<Die [ROOT.GetCountry.GetRuler.GetFamily.GetName]-Dynastie fällt>  #NT!
 me_tayuan_ferghana.3008.desc: "And so, the rebels approach the palace, and in an agonizing turn of events, the gates swing open to them, and they enter the courtyard. Now, more than ever before,  it is evident that everything is lost.\n\n[ROOT.GetCountry.GetRuler.GetName] thus sent his personal guard away, as no men need die for a monarchy which no longer exists, and went to the throne room. The banner of the [ROOT.GetCountry.GetRuler.GetFamily.GetName]#E s#! swung gently in the wind, almost comforting the poor man like a mother, telling him he would be alright. His eyes, though, painted a grimmer picture of desperation. [ROOT.GetCountry.GetRuler.GetSpouse.GetFirstName] looked sadly at him, as their life would never be the same.\n\nSoon the men entered the throne room behind him, [SCOPE.sChar('tay_revoltleader').GetName] accused him of whatever it was, and it was all over."  #<Und so nähern sich die Rebellen dem Palast, und in einer qualvollen Wendung der Ereignisse öffnen sich die Tore für sie und sie betreten den Hof. Jetzt ist es offensichtlicher als je zuvor, dass alles verloren ist.\n\n[ROOT.GetCountry.GetRuler.GetName] schickte also seine persönliche Wache weg, da kein Mann für eine Monarchie sterben musste, die nicht mehr existiert, und begab sich in den Thronsaal. Das Banner der [ROOT.GetCountry.GetRuler.GetFamily.GetName]#E s#! schwang sanft im Wind und tröstete den armen Mann fast wie eine Mutter und sagte ihm, dass es ihm gut gehen würde. Seine Augen zeichneten jedoch ein düstereres Bild der Verzweiflung. [ROOT.GetCountry.GetRuler.GetSpouse.GetFirstName] sah ihn traurig an, denn ihr Leben würde nie wieder das gleiche sein.\n\nBald betraten die Männer hinter ihm den Thronsaal, [SCOPE.sChar('tay_revoltleader').GetName] beschuldigten ihn, was auch immer es war, und alles war vorbei.>  #NT!
 me_tayuan_ferghana.3008.a: "Sic transit gloria mundi."  #<Sic transit gloria mundi.>  #NT!
  
 me_tayuan_ferghana.3009.title: "Democracy is Defeated"  #<Die Demokratie ist besiegt>  #NT!
 me_tayuan_ferghana.3009.desc: "''Rejoice, my [ROOT.GetCountry.GetRulerTitle]! When the time came for the rebels to gather, our men had already prepared and left the barracks, and marched on them! As they were forced to leave the city, most of the fighting then took place just outside the walls of [ROOT.GetCountry.GetCapital.GetName]. Many men now lay dead, but the [ROOT.GetCountry.GetRuler.GetFamily.GetName]#E s#! are once again triumphant!'' the lieutenant left, and [ROOT.GetCountry.GetRuler.GetSpouse.GetFirstName] looked at him with love and pride, passing those onto him with a kiss on the cheek.\n\nAnd thus began the long road back. No way was this gonna happen ever again, thought [ROOT.GetCountry.GetRuler.GetFirstName], and he next few months were surely going to be spent curtailing the influence of the citizens and the cities."  #<''Freue dich, mein [ROOT.GetCountry.GetRulerTitle]! Als es an der Zeit war, dass sich die Rebellen versammelten, hatten sich unsere Männer bereits vorbereitet, verließen die Kaserne und marschierten auf sie zu! Da sie gezwungen waren, die Stadt zu verlassen, fanden die meisten Kämpfe direkt außerhalb der Mauern von [ROOT.GetCountry.GetCapital.GetName] statt. Viele Männer liegen jetzt tot da, aber die [ROOT.GetCountry.GetRuler.GetFamily.GetName]#E s#! triumphieren erneut!'' Der Leutnant ging, und [ROOT.GetCountry.GetRuler.GetSpouse.GetFirstName] sah ihn voller Liebe und Stolz an und reichte ihm diese mit einem Kuss auf die Wange.\n\nUnd so begann der lange Weg zurück. Auf keinen Fall würde so etwas jemals wieder passieren, dachte [ROOT.GetCountry.GetRuler.GetFirstName], und er würde die nächsten paar Monate sicherlich damit verbringen, den Einfluss der Bürger und Städte einzuschränken.>  #NT!
 me_tayuan_ferghana.3009.a: "Nika!"  #<Nika!>  #NT!
  
 me_tayuan_ferghana.100.title: "$tayuan_mission_2$"  #<$tayuan_mission_2$>  #NT!
 me_tayuan_ferghana.100.desc: "Welcome to the #E $tayuan_mission_2$#! mission tree! Although you may already be familiar with Invictus's Cultural Point system, in this mission, it works a little differently. Among the #COLOR:{0.2,0.47,1} Ionian#!, #COLOR:{0.83,0.55,0.6} Ferghani#!, #COLOR:{0.77,0.5,0.09} Huaxia#! and #COLOR:{0.81,0.15,0} Buddhist#! paths, you'll only be able to get #E 16 culture points#! in total. When you reach that number, all of the remaining tasks in the tree will bypass and you'll be able to then take the final task.\n\nIf you want to #E unlock a new formable#!, then you have two ways of doing it. The first way is getting #E 11 culture points#! in either #COLOR:{0.2,0.47,1} Ionian#!, #COLOR:{0.83,0.55,0.6} Ferghani#! or #COLOR:{0.77,0.5,0.09} Huaxia#!. (The #COLOR:{0.81,0.15,0} Buddhist#! path is not a full one; it can only be combined with others.) The second way is getting at least #E 6 culture points#! in #E 2 different cultures#!.\n\nFinally, you can check the #Y current points#! at any time by hovering over the #E Finish Mission#! button."  #<Willkommen im #E $tayuan_mission_2$#! Missionsbaum! Obwohl Sie möglicherweise bereits mit dem Kulturpunktesystem von Invictus vertraut sind, funktioniert es in dieser Mission etwas anders. Auf den Pfaden #COLOR:{0.2,0.47,1} Ionisch#!, #COLOR:{0.83,0.55,0.6} Ferghani#!, #COLOR:{0.77,0.5,0.09} Huaxia#! und #COLOR:{0.81,0.15,0} Buddhistisch#! können Sie insgesamt nur #E 16 Kulturpunkte#! erhalten. Wenn Sie diese Zahl erreichen, werden alle verbleibenden Aufgaben im Baum umgangen und Sie können dann die letzte Aufgabe übernehmen.\n\nWenn Sie #E ein neues formbares#! freischalten möchten, haben Sie zwei Möglichkeiten, dies zu tun. Der erste Weg besteht darin, #E 11 Kulturpunkte#! in entweder #COLOR:{0.2,0.47,1} Ionian#!, #COLOR:{0.83,0.55,0.6} Ferghani#! oder #COLOR:{0.77,0.5,0.09} Huaxia#! zu erhalten. (Der Pfad #COLOR:{0.81,0.15,0} Buddhisten#! ist nicht vollständig; er kann nur mit anderen kombiniert werden.) Der zweite Weg besteht darin, mindestens #E 6 Kulturpunkte#! in #E 2 verschiedenen Kulturen#! zu erhalten.\n\nSchließlich können Sie die #!9 aktuellen Punkte#! jederzeit überprüfen, indem Sie mit der Maus über #E Mission beenden#! fahren Taste.>  #NT!
 me_tayuan_ferghana.100.a: "Onwards!"  #<Vorwärts!>  #NT!
  
 me_tayuan_ferghana.101.title: "Return Of The King"  #<Rückkehr des Königs>  #NT!
 me_tayuan_ferghana.101.desc: "It came as the greatest of surprises when [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetName] appeared outside the gates of [ROOT.GetCountry.GetCapital.GetName], for word had arrived in the capital a few weeks earlier that claimed that the traveling warrior had been slain in battle. And yet, there [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetSheHe] was, obviously a little worse for wear, but alive.\n\nPeering over the ramparts to see for [ROOT.GetCountry.GetRuler.GetHerHim]self whether this claimant was truly the former [ROOT.GetCountry.GetRulerTitle], [ROOT.GetCountry.GetRuler.GetSheHe] yelled out 'Hail, Misthophoros!', which caused [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetFirstName] to laugh.\n\n'So you know...yes, it is true that in my wanderings, I have been given the name 'Misthophoros', or mercenary.' Clearing [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetHerHis] throat with a regal air, [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetFirstName] gestured to the guards standing nearby. 'But here, I go by a different name...not sellsword, but [ROOT.GetCountry.GetRulerTitle]. Open the gates!'"  #<Es war die größte Überraschung, als [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetName] vor den Toren von [ROOT.GetCountry.GetCapital.GetName] erschien, denn einige Wochen zuvor war in der Hauptstadt die Nachricht eingetroffen, dass der reisende Krieger im Kampf getötet worden sei. Und doch war da [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetSheHe], offensichtlich etwas abgenutzt, aber lebendig.\n\nAls ich über die Stadtmauer spähte, um [ROOT.GetCountry.GetRuler.GetHerHim]selbst zu sehen, ob dieser Anwärter wirklich der frühere [ROOT.GetCountry.GetRulerTitle] war, schrie [ROOT.GetCountry.GetRuler.GetSheHe] „Heil, Misthophoros!“, was [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetFirstName] zum Lachen brachte.\n\n„Wissen Sie also ... ja, es ist wahr, dass ich auf meinen Wanderungen Man hat ihnen den Namen „Misthophoros“ oder „Söldner“ gegeben. [SCOPE.sCharacter('traveling_qin_mercenary_ruler').GetHerHis] räusperte sich mit königlicher Miene und deutete auf die Wachen, die in der Nähe standen. „Aber hier habe ich einen anderen Namen ... nicht Sellsword, sondern [ROOT.GetCountry.GetRulerTitle]. Öffnet die Tore!'>  #NT!
 me_tayuan_ferghana.101.a: "The throne is rightfully yours, and I will fulfill my oaths"  #<Der Thron gehört rechtmäßig Ihnen, und ich werde meine Eide erfüllen>  #NT!
 me_tayuan_ferghana.101.b: "Welcome back, brother! All hail the conquering hero!"  #<Willkommen zurück, Bruder! Alle begrüßen den siegreichen Helden!>  #NT!
 NICKNAME_SWORD: "Misthophoros"  #<Misthophoros>  #NT!
 killing_the_true_ruler_tt: "#T 'Misthophoros'#!, the honorable hero of a hundred campaigns, will be #R assassinated#! later that night by the Ruler's agents."  #<#T „Misthophoros“#!,, der ehrenwerte Held von hundert Feldzügen, wird #R später in dieser Nacht von den Agenten des Herrschers ermordet#!.>  #NT!
  
 me_tayuan_ferghana.001.title: "The Heavenly Horses"  #<Die himmlischen Pferde>  #NT!
 me_tayuan_ferghana.001.desc: "By the time news reaches [ROOT.GetCountry.GetCapital.GetName], then it is usually already too late. Countless territories and provinces have already fallen to the enemy, with so many of our cities, villages, towns and temples set to the torch and our people slaughtered. Our spies confirm that a huge Huaxia army is marching our way, gathered with the sole intent of getting to the Royal Palace at the heart of the city and burning it to the ground. The once-bustling trade routes have all but dried up, and only the craziest and most desperate merchants dare to venture East.\n\nThe rumors [ROOT.GetCountry.GetRuler.GetName] has heard has nearly driven [ROOT.GetCountry.GetRuler.GetHerHim] mad with fear; reports of locusts rising out of the #E Jade Gate#!, and of dust and sand being seen dancing away from many city walls - even the earth itself is trying to flee what is coming.\n\nSomewhere out there, in the lands we have lost control in, a certain #E Li Guangli#!, a man said to be brother to the Emperor's favourite concubine, leads behind him an army greater than many chiliads, something of an order never seen here. They are all ruffians, gathered from shady border regions far from the world we know, and these plunderers are more than willing to destroy everything that we love and hold dear. They wish to turn us, a great culture, into submissive swine."  #<Wenn die Nachrichten [ROOT.GetCountry.GetCapital.GetName] erreichen, ist es normalerweise bereits zu spät. Unzählige Gebiete und Provinzen sind bereits dem Feind zum Opfer gefallen, so viele unserer Städte, Dörfer, Kleinstädte und Tempel wurden in Brand gesteckt und unser Volk abgeschlachtet. Unsere Spione bestätigen, dass eine riesige Huaxia-Armee auf uns zumarschiert, mit der einzigen Absicht, zum Königspalast im Herzen der Stadt vorzudringen und ihn bis auf die Grundmauern niederzubrennen. Die einst geschäftigen Handelsrouten sind so gut wie ausgetrocknet, und nur die verrücktesten und verzweifeltsten Kaufleute wagen sich nach Osten.\n\nDie Gerüchte, die [ROOT.GetCountry.GetRuler.GetName] gehört hat, haben [ROOT.GetCountry.GetRuler.GetHerHim] vor Angst fast in den Wahnsinn getrieben; Berichte über Heuschrecken, die aus dem #E Jadetor#!, aufsteigen, und über Staub und Sand, die von vielen Stadtmauern wegtanzen – sogar die Erde selbst versucht zu fliehen, was kommt.\n\nIrgendwo da draußen, in den Ländern, über die wir die Kontrolle verloren haben, führt ein gewisser #E Li Guangli#!,, ein Mann, von dem es heißt, er sei der Bruder der Lieblingskonkubine des Kaisers, eine Armee hinter sich, die größer ist als viele andere Chiliaden, eine Ordnung, die es hier noch nie gegeben hat. Es sind alles Raufbolde, die aus zwielichtigen Grenzregionen weit weg von der Welt, die wir kennen, stammen, und diese Plünderer sind mehr als bereit, alles zu zerstören, was wir lieben und lieb und teuer sind. Sie wollen uns, eine großartige Kultur, in unterwürfige Schweine verwandeln.>  #NT!
 me_tayuan_ferghana.001.a: "It is time to take the great Huaxia on!"  #<Es ist Zeit, sich dem großartigen Huaxia zu stellen!>  #NT!
 me_tayuan_ferghana.001.a_tt: "The #COLOR:{0.77,0.5,0.09} War of the Heavenly Horses#! has begun."  #<Der #COLOR:{0.77,0.5,0.09} Krieg der himmlischen Pferde#! hat begonnen.>  #NT!
  
 me_tayuan_ferghana.202.title: "The Heavenly Horses"  #<Die himmlischen Pferde>  #NT!
 me_tayuan_ferghana.202.desc: "The sun had barely peeked over the rooftops of [ROOT.GetCountry.GetCapital.GetName] when the messengers first appeared outside of the city gates, and the news they brought with them sent the [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] household into a panic. In a couple of hours, an #E Imperial Embassy#! from the #E Eastern Empire#! would be arriving, and before [ROOT.GetCountry.GetRuler.GetName] felt like [ROOT.GetCountry.GetRuler.GetSheHe] could catch [ROOT.GetCountry.GetRuler.GetHerHis] breath, [ROOT.GetCountry.GetRuler.GetSheHe] was standing in the royal palace, extending courtesies and greetings with a diplomat named [SCOPE.sCharacter('chineseherald').GetName].\n\n'#E Emperor [SCOPE.sCharacter('chinese_emperor_character_scope').GetName]#! is a great admirer of the horses of this valley, and it displeases him that you refuse the Eastern Empire the horses for which he wishes to pay.' [SCOPE.sCharacter('chineseherald').GetFirstName] let out a long, painful sigh, one pregnant with deadly meaning, then continued speaking in a low, measured voice as he looked around the room in disgust.\n\n'But Emperor [SCOPE.sCharacter('chinese_emperor_character_scope').GetFirstName] is merciful, and he expects any unpleasant situations with the barbarian nations to be resolved in the usual manner.' The herald clapped his hands, sending his attendants scurrying. 'But I must warn you - if business is not handled to his satisfaction, then these lands will know his wrath.' [SCOPE.sCharacter('chineseherald').GetFirstName] then gestured forth slaves, who dragged behind them a chest filled with gold, as well as a life-sized replica of a Ferghanan horse.'Here are the gifts Emperor [SCOPE.sCharacter('chinese_emperor_character_scope').GetFirstName] is willing to offer - do you accept, [ROOT.GetCountry.GetRuler.GetFirstName]?'\n\nThe Council of [ROOT.GetCountry.GetName] made a show of pretending to talk for a while, but they all knew that they could not supply the Easterners with the horses they desired. To meet the Emperor's demand, we would have to cut down the size of our own armies, and we rely on our cavalry for protection against our many foes. Knowing that this refusal would not be received happily, [SCOPE.sCharacter('tay_familyhead').GetName] stepped forward, face tightened with stress. 'We cannot help you, friend, as you demand many thousands of horses out of a country with only hundreds. If we do what you ask, then we might as well sell off our entire country off to you as well. Please tell the Son of-'\n\n[SCOPE.sCharacter('chineseherald').GetFirstName] slammed his hand down on the table, rising with a face flushed with anger. 'You wish to know his fire! Curse you and the swine that birthed you, you dung-muddled paupers!' Turning back, he smashed the golden horse with a mallet, breaking it into tens of thousands of pieces, and the entourage left the chambers at once. Within the hour, they had fled [ROOT.GetCountry.GetCapital.GetName] - their fury was impossible to put into words and in the wake of their sudden appearance and disappearance, a cloud of existential dread was settling over the palace.\n\nThe nobles of [ROOT.GetCountry.GetName], outraged by the envoy's contempt and his disrespectful treatment towards their [ROOT.GetCountry.GetRulerTitle], quietly gathered their men and rode hard after the Huaxia diplomats, and the Easterners were cut down without ceremony somewhere in the mountains near [GetProvince('(int32)6736').GetName]. Unsurprisingly, [ROOT.GetCountry.GetRuler.GetFirstName] was not happy to hear about the murder of the messengers.\n\n'Once the Emperor learns of this, he will for sure come for us...for me.' The [ROOT.GetCountry.GetRulerTitle], after watching events spiral out of [ROOT.GetCountry.GetRuler.GetHerHis] control, is now consumed by restlessness."  #<Kaum hatte die Sonne über die Dächer von [ROOT.GetCountry.GetCapital.GetName] geblickt, erschienen die Boten zum ersten Mal vor den Toren der Stadt, und die Neuigkeiten, die sie mitbrachten, versetzten den Haushalt von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective] in Panik. In ein paar Stunden würde eine #E kaiserliche Botschaft#! aus dem #E Ostreich#! eintreffen, und bevor [ROOT.GetCountry.GetRuler.GetName] das Gefühl hatte, dass [ROOT.GetCountry.GetRuler.GetSheHe] [ROOT.GetCountry.GetRuler.GetHerHis] zu Atem kommen konnte, stand [ROOT.GetCountry.GetRuler.GetSheHe] im königlichen Palast und überbrachte Höflichkeiten und Grüße mit einem Diplomaten namens [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]0.\n\n'#E Kaiser [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]2#! ist ein großer Bewunderer der Pferde dieses Tals, und es missfällt ihm, dass Sie dem Oströmischen Reich die Pferde verweigern, für die er bezahlen möchte.' [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]4 stieß einen langen, schmerzhaften Seufzer aus, der von tödlicher Bedeutung war, und sprach dann mit leiser, gemessener Stimme weiter, während er sich angewidert im Raum umsah.\n\n'Aber Kaiser [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]5 ist barmherzig und erwartet, dass alle unangenehmen Situationen mit den barbarischen Nationen auf die übliche Weise gelöst werden.' Der Herold klatschte in die Hände und schickte seine Begleiter davon. „Aber ich muss Sie warnen – wenn die Geschäfte nicht zu seiner Zufriedenheit abgewickelt werden, werden diese Länder seinen Zorn erfahren.“ [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]4 winkte dann Sklaven herbei, die eine mit Gold gefüllte Truhe sowie eine lebensgroße Nachbildung eines Ferghanan-Pferdes hinter sich herzogen. „Hier sind die Geschenke, die Kaiser [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]5 bereit ist, anzubieten – nehmen Sie an, [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]8?“\n\nDer Rat von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]9 tat eine Weile so, als würde er reden, aber sie alle wussten, dass sie die Ostländer nicht mit den Pferden versorgen konnten, die sie hatten gewünscht. Um die Forderung des Kaisers zu erfüllen, müssten wir die Größe unserer eigenen Armeen reduzieren und verlassen uns auf unsere Kavallerie, um uns vor unseren vielen Feinden zu schützen. Da #E0 wusste, dass diese Weigerung nicht gerne aufgenommen werden würde, trat sie mit angespanntem Gesicht vor. „Wir können dir nicht helfen, Freund, da du viele tausend Pferde von einem Land verlangst, in dem es nur Hunderte gibt.“ Wenn wir tun, was Sie verlangen, können wir genauso gut unser ganzes Land an Sie verkaufen. Bitte sagen Sie es dem Sohn von-'\n\n[ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]4 schlug mit der Hand auf den Tisch und erhob sich mit vor Wut gerötetem Gesicht. „Du möchtest sein Feuer kennen lernen! Verfluche dich und die Schweine, die dich zur Welt gebracht haben, ihr dreckigen Armen!‘ Als er sich umdrehte, zerschmetterte er das goldene Pferd mit einem Hammer, sodass es in Zehntausende Stücke zerbrach, und das Gefolge verließ sofort die Gemächer. Innerhalb einer Stunde waren sie [ROOT.GetCountry.GetCapital.GetName] geflohen – ihre Wut war nicht in Worte zu fassen und als Folge ihres plötzlichen Erscheinens und Verschwindens breitete sich eine Wolke existenzieller Angst über dem Palast aus.\n\nDie Adligen von [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]9, empört über die Verachtung des Gesandten und seine respektlose Behandlung gegenüber ihren #E4, versammelten ruhig ihre Männer und ritten den Diplomaten von Huaxia und den anderen nach Ostbewohner wurden ohne Zeremonie irgendwo in den Bergen in der Nähe von #E5 abgeholzt. Es überrascht nicht, dass [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective]8 nicht erfreut war, von der Ermordung der Boten zu hören.\n\n'Sobald der Kaiser davon erfährt, wird er mit Sicherheit zu uns kommen ... zu mir.' Der #E4 wird nun von Unruhe verzehrt, nachdem er beobachtet hat, wie die Ereignisse außer Kontrolle von [ROOT.GetCountry.GetRuler.GetHerHis] geraten.>  #NT!
 me_tayuan_ferghana.202.a: "Prepare the defenses and may the gods have mercy on us..."  #<Bereiten Sie die Verteidigung vor und mögen die Götter uns gnädig sein ...>  #NT!
 me_tayuan_ferghana.202tt: "The armies of the #T Eastern Empire#! are on the march..."  #<Die Armeen des #T Ostreichs#! sind auf dem Vormarsch ...>  #NT!
  
