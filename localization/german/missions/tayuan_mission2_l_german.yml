 tay_civprov: "There must be at least 2 territories in [GetProvince('(int32)6704').GetArea.GetName|T] with more than #G 80%#! Civilization Value."  #<Es müssen mindestens 2 Gebiete in [GetProvince('(int32)6704').GetArea.GetName|T] mit einem Zivilisationswert von mehr als #G 80 %#! vorhanden sein.>  #NT!
  
 tay_freereq_tt: "Every province in [GetProvince('(int32)6704').GetArea.GetName] must have at least 2 #Y Freemen#! @freemen! pops."  #<Jede Provinz in [GetProvince('(int32)6704').GetArea.GetName] muss mindestens 2 #Y Freemen#! @Freemen haben! knallt.>  #NT!
  
 tay_diplorangeee_tt: "We must have an #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! cultured-country in our diplomatic range."  #<Wir müssen ein #COLOR:{0.2,0.47,1} [GetCulture('ionian').GetName]#! Kulturland in unserem diplomatischen Bereich haben.>  #NT!
