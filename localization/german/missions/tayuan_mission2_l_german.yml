 tay_royaltutorreq_tt: "Our [GetOffice('office_royal_tutor').GetCulturalName(SCOPE.GetRootScope.GetCountry)] is of #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! culture and has at least #Y 9 Oratory#! @oratory_icon!."  #<Unser [GetOffice('office_royal_tutor').GetCulturalName(SCOPE.GetRootScope.GetCountry)] ist von #COLOR:{0.83,0.55,0.6} [GetCulture('tayuan').GetName]#! Kultur und hat mindestens #Y 9 Oratory#! @oratory_icon!.>  #NT!
  
