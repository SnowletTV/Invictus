 tay_presentarmies_tt: "There must be armies of at least 5000 men in both [GetProvince('(int32)7184').GetName] and [GetProvince('(int32)6744').GetName]."  #<Sowohl in [GetProvince('(int32)7184').GetName] als auch in [GetProvince('(int32)6744').GetName] müssen Armeen von mindestens 5000 Mann vorhanden sein.>  #NT!
  
 tay_nomacs_tt: "We must not own any #Y [GetCulture('macedonian').GetName]-Cultured territories#! in the [GetProvince('(int32)6653').GetArea.GetRegion.GetName] Region."  #<Wir dürfen keine #Y [GetCulture('macedonian').GetName]-Kulturgebiete#! in der [GetProvince('(int32)6653').GetArea.GetRegion.GetName]-Region besitzen.>  #NT!
  
