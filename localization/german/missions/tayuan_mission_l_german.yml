l_german:
  
 tayuan_mission_1: "There, Alone Among the Youths"  #<Dort, allein unter den Jugendlichen#>  #NT! #Autotranslate V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 tayuan_mission_1_DESCRIPTION: "Long before the novice princes of where we once called home ever set foot in these plains, we had already been led into exile here. We had long been looking inside, curbed by our solitude, but the subjugation of the plain to the south by those naive whippers of fate has forced us to stand up to them or die."  #<Lange bevor die Novizenfürsten unserer einstigen Heimat diese Ebenen überhaupt betraten, wurden wir bereits hierher ins Exil geführt. Wir hatten lange nach innen geblickt, gezügelt von unserer Einsamkeit, aber die Unterwerfung der Ebene im Süden durch diese naiven Peitschenhiebe des Schicksals hat uns gezwungen, ihnen die Stirn zu bieten oder zu sterben.#>  #NT!
 tayuan_mission_1_CRITERIA_DESCRIPTION: "This mission will be completed once we acquaint ourselves with the new situation in the area."  #<Diese Mission wird abgeschlossen sein, sobald wir uns mit der neuen Situation in der Region vertraut gemacht haben.#>  #NT!
 tayuan_mission_1_BUTTON_TOOLTIP: "This valley is ours!"  #<Dieses Tal gehört uns!#>  #NT!
 tayuan_mission_1_BUTTON_DETAILS: ""
  
 # Opinions 
  
 tayuan_amyopinion: "Royal Friendship"  #<Königliche Freundschaft#>  #NT!
 tayuan_ants: "Upstart Butting Rams"  #<Emporkömmling Butting Rams#>  #NT!
  
 # Tooltips 
  
 amyrgia_claims_tt: "Amyrgia has gained claims on all of Tayuan."  #<Amyrgia hat Ansprüche auf ganz Tayuan erlangt.#>  #NT!
 great_ionians_tt: "We will consider trying to seek out and convince the Ionian settlers of Alexander's empire - it is a task which will require huge sums, but it can bring huge rewards."  #<Wir werden darüber nachdenken, die ionischen Siedler aufzuspüren und von Alexanders Reich zu überzeugen – eine Aufgabe, die riesige Summen erfordern wird, aber große Belohnungen bringen kann.#>  #NT!
 tayuan_kindness_tt: "Our rewards will #G vary#! depending on how we complete the mission."  #<Unsere Belohnungen werden #G variieren#!, je nachdem, wie wir die Mission abschließen.#>  #NT!
 tayuan_great_investment_tt: "We will have #G huge#! chances of succeeding!"  #<Wir werden #G riesige#! Chancen auf Erfolg haben!#>  #NT!
 tayuan_big_investment_tt: "We will have #Y average#! chances of succeeding."  #<Wir werden #Y durchschnittliche #! Erfolgsaussichten haben.#>  #NT!
 tayuan_meh_investment_tt: "We will #R not have#! good chances of succeeding."  #<Wir werden #R keine#! gute Erfolgsaussichten haben.#>  #NT!
 dawan_city_tt: "We will settle the thousands of newcomers in #E Dawan#!."  #<Wir werden die Tausenden von Neuankömmlingen in #E Dawan#!. ansiedeln#>  #NT!
 sogdian_tay_tt: "We must own all of @[GetCountry('SOG').GetFlag]!Sogdia's provinces."  #<Wir müssen alle Provinzen von @[GetCountry('SOG').GetFlag]!Sogdia besitzen.#>  #NT!
 tayuan_sogd_tt: "We will fortify the valley, and gain claims on @[GetCountry('SOG').GetFlag]! #E Sogdia#!."  #<Wir werden das Tal befestigen und Ansprüche auf @[GetCountry('SOG').GetFlag] erlangen! #E Sogdien#!.#>  #NT!
 tayuan_sakawar_tt: "We must be at war with @[GetCountry('WUS').GetFlag]! #E Amyrgia#! or @[GetCountry('SHU').GetFlag]! #E Shule#!, and have at least #R 20 Warscore#! against them."  #<Wir müssen mit @[GetCountry('WUS').GetFlag] im Krieg sein! #E Amyrgia#! oder @[GetCountry('SHU').GetFlag]! #E Shule#! und mindestens #R 20 Warscore#! gegen sich.#>  #NT!
 spreadvalley_tt: "Over fifteen Ionian pops will appear all throughout the valley."  #<Über fünfzehn ionische Pops werden im gesamten Tal auftauchen.#>  #NT!
 ferghanan_office_tt: "There must be a character of #Y [GetCulture('tayuan').GetName]#! culture holding an office in our government."  #<Es muss einen Charakter der #Y [GetCulture('tayuan').GetName]#! Kultur geben, der ein Amt in unserer Regierung innehat.#>  #NT!
 lochos_legion_tt: "Our home legion must have 5 units of @spearmen! Spearmen and either 3 @horse_archers! Horse Archer or 3 @heavy_cavalry! Heavy Cavalry units."  #<Unsere Heimatlegion muss 5 Einheiten @spearmen haben! Speermänner und entweder 3 @horse_archers! Berittener Bogenschütze oder 3 @heavy_cavalry! Schwere Kavallerieeinheiten.#>  #NT!
 tayuan_polises_tt: "Every territory in the province of [GetProvince('(int32)6704').GetArea.GetName] will get #Y Rule of the Polises#!, giving #G +0.3%#! Monthly Civilization Change and #R +0.4#! Unrest."  #<Jedes Gebiet in der Provinz [GetProvince('(int32)6704').GetArea.GetName] erhält #Y Herrschaft der Polis#!,, was #G +0,3 %#! monatlichen Zivilisationswechsel und #R +0,4#! Unruhe verleiht.#>  #NT!
 tayuan_cityrequire_tt: "At least 3 cities in the valley of [GetProvince('(int32)6704').GetArea.GetName] must have a $forum_building$."  #<Mindestens 3 Städte im Tal von [GetProvince('(int32)6704').GetArea.GetName] müssen einen $forum_building$ haben.#>  #NT!
 macedonian_slaves_tt: "Captured [GetCulture('macedonian').GetName|G] warlords and brigands will show up throughout our country as @slaves! #R Slaves.#!"  #<Gefangene [GetCulture('macedonian').GetName|G] Kriegsherren und Räuber werden in unserem ganzen Land als @Sklaven auftauchen! #R Sklaven.#!#>  #NT!
 tayuan_art_tt: "An artist will produce a work of art to inspire us."  #<Ein Künstler wird ein Kunstwerk schaffen, das uns inspirieren soll.#>  #NT!
 tayuanexplorershome_tt: "The men sent out to explore our vicinity will return home as an army in our capital."  #<Die Männer, die ausgesandt wurden, um unsere Umgebung zu erkunden, werden als Armee in unserer Hauptstadt heimkehren.#>  #NT!
  
 # Modifiers 
  
 tayuan_gulka_pass: "The Gulka Forts"  #<Die Gulka-Festungen#>  #NT!
 MODIFIER_STATE_FORT_LIMIT: "Staatliches Fort Limit"
 tayuan_citiesoftheconquerors: "Cities of the Conquerors"  #<Städte der Eroberer#>  #NT!
 desc_tayuan_citiesoftheconquerors: "Founded by great conquerors of old, these cities still profit from their influence."  #<Diese Städte wurden einst von großen Eroberern gegründet und profitieren noch immer von ihrem Einfluss.#>  #NT!
  
 tayuan_silkprod: "Bigger Silk Farms"  #<Größere Seidenfarmen#>  #NT!
 tayuan_breadbasket: "Using the Ground"  #<Den Boden nutzen#>  #NT!
 tayuantraders: "Beguiling Traders"  #<Verführerische Händler#>  #NT!
 tayuan_sakan_cav: "Experimenting with Ionian-Sakan Cavalry"  #<Experimentieren mit der ionisch-sakanischen Kavallerie#>  #NT!
 sogdian_ion_cav: "Sogdian-Ionian Cavalry Units"  #<Sogdisch-ionische Kavallerieeinheiten#>  #NT!
 sogdian_horses: "Adopting Sogdian Horses"  #<Adoption sogdischer Pferde#>  #NT!
 sogdian_conquered: "Sogdia Vanquished"  #<Sogdia besiegt#>  #NT!
 ferghanan_happiness: "Rights for the Ferghani Tribesmen"  #<Rechte für die Ferghani-Stammesangehörigen#>  #NT!
 tayuan_manpower: "Ferghani Primacy"  #<Ferghani-Primat#>  #NT!
 tayuan_ranks: "Force Ourselves In"  #<Zwingen Sie uns hinein#>  #NT!
 tayuan_polises: "Rule of the Polises"  #<Herrschaft der Polis#>  #NT!
 desc_tayuan_polises: "In the cities of Ferghana the political structure of the polis is preserved below the monarchy. This makes all cities both more prosperous and unruly."  #<In den Städten Ferghanas bleibt die politische Struktur der Polis unterhalb der Monarchie erhalten. Dadurch werden alle Städte sowohl wohlhabender als auch widerspenstiger.#>  #NT!
 tayuan_valley_cap_mod: "Center of Regional Trade"  #<Zentrum für regionalen Handel#>  #NT!
  
 tayuan_valley: "The Valley of Ferghana"  #<Das Tal von Fergana#>  #NT!
 desc_tayuan_valley: "The hospitable valley of Ferghana lies well, well further north of any other place that allows for life to thrive like this. Between the mountains that enclose it operates a hustle and bustle of people all benefiting each other's lives."  #<Das gastfreundliche Tal von Ferghana liegt weit, weit nördlich von jedem anderen Ort, an dem das Leben so gedeihen kann. Zwischen den Bergen, die es umgeben, herrscht ein geschäftiges Treiben von Menschen, die sich gegenseitig zum Wohle ihres Lebens nutzen.#>  #NT!
  
 TAYUAN_EXPLORERS: "Perseus' Men"  #<Perseus‘ Männer#>  #NT!
 sogdian_champion: "Champion of the Sogdians"  #<Champion der Sogdier#>  #NT!
  
 #Treasures 
 copper_tayuan_altar: "Altar of New Ionia by Phileia of Throana"  #<Altar von Neu-Ionien von Phileia von Throana#>  #NT!
 copper_tayuan_altar_desc: "Commissioned to #E Phileia of Throana#! to celebrate the Ionians' presence in the valley of Ferghana.\n\nIt is a huge altar, made of solid copper, with details on the side representing our new homes in the valley of Ferghana and our people."  #<Im Auftrag von #E Phileia von Throana#! zur Feier der Präsenz der Ionier im Tal von Ferghana.\n\nEs handelt sich um einen riesigen Altar aus massivem Kupfer mit Details an der Seite, die unsere neuen Häuser im Tal von Ferghana und unser Volk darstellen.#>  #NT!
  
 # Tasks 
  
 tayuan_task_start: "Of Boreas"  #<Von Boreas#>  #NT!
 tayuan_task_start_DESC: "We must organize expeditions to better understand the polities around the valley. First, we shall send our men to the domains of the icy northern wind - #COLOR:{0.8,1,1} Boreas#!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"  #<Wir müssen Expeditionen organisieren, um die Politik rund um das Tal besser zu verstehen. Zuerst werden wir unsere Männer in die Domänen des eisigen Nordwinds schicken – #COLOR:{0.8,1,1} Boreas#!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!#>  #NT!
  
 tayuan_task_1: "By Zephyros"  #<Von Zephyros#>  #NT!
 tayuan_task_1_DESC: "Sweet notes ring out of  #COLOR:{0,0.64,0} Zephyros#!' song. The western wind is calm and blessed among his brothers. So it is for us, as out west this valley opens out onto the world.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"  #<Süße Noten erklingen aus #COLOR:{0,0.64,0} Zephyros#!' Lied. Der Westwind ist ruhig und gesegnet unter seinen Brüdern. So ist es auch für uns, denn im Westen öffnet sich dieses Tal zur Welt.\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!#>  #NT!
  
 tayuan_task_2: "By Euros"  #<In Euro#>  #NT!
 tayuan_task_2_DESC: "#COLOR:{0.39,0.21,0.81} Euros#!, the wind of the east, has ever been foretold as the bringer of bad omens. We must take the risk of upturning our fates and explore those mysterious lands to ensure our survival.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!"  #<#COLOR:{0.39,0.21,0.81} Euros#!, Der Wind des Ostens wurde schon immer als Überbringer schlechter Vorzeichen vorhergesagt. Wir müssen das Risiko eingehen, unser Schicksal zu ändern und diese mysteriösen Länder zu erkunden, um unser Überleben zu sichern.\n\n\n\n\n\n\n\n\n\n\n@greek_mil2!#>  #NT!
  
 tayuan_task_3: "Unto Notos"  #<An Notos#>  #NT!
 tayuan_task_3_DESC: "Storms travel across this world blown by the god #COLOR:{0.89,0.05,0} Notos#!, the southern wind. He has definitely brought us quite a storm, as the Macedonians have set themselves right at our doorstep.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!"  #<Stürme ziehen über diese Welt, geblasen vom Gott #COLOR:{0.89,0.05,0} Notos#!,, dem Südwind. Er hat uns definitiv einen ziemlichen Sturm beschert, da die Mazedonier sich direkt vor unserer Haustür niedergelassen haben.\n\n\n\n\n\n\n\n\n\n\n@greek_mil17!#>  #NT!
  
 tayuan_task_4: "Alexandros kaí Kýros"  #<Alexandros kaí Kýros#>  #NT!
 tayuan_task_4_DESC: "Two great conquerors have left their marks on this land: #T Alexandros#! the Macedonian Mega-Basileus who conquered the world, and #T Kýros#! (or Cyrus the Great), who, in his time, conquered the world too.\n\nThey both founded great cities in this valley - both [GetProvince('(int32)6704').GetName|Y] and [GetProvince('(int32)6703').GetName|Y] are the jewels of our lands. We must strive to honour their names and embellish them.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"  #<Zwei große Eroberer haben in diesem Land ihre Spuren hinterlassen: #T Alexandros#! der mazedonische Mega-Basileus, der die Welt eroberte, und #T Kýros#! (oder Cyrus der Große), der zu seiner Zeit auch die Welt eroberte.\n\nSie gründeten beide große Städte in diesem Tal – sowohl [GetProvince('(int32)6704').GetName|Y] als auch [GetProvince('(int32)6703').GetName|Y] sind die Juwelen unseres Landes. Wir müssen danach streben, ihre Namen zu ehren und sie zu verschönern.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!#>  #NT!
  
 tayuan_task_5: "The Lost Companions"  #<Die verlorenen Gefährten#>  #NT!
 tayuan_task_5_DESC: "Many #Y [GetCulture('ionian').GetName]#! men and women sprang forth into Asia when the Macedonian armies freed them from the Persians. Whether as traders, in the armies or as settlers, their ecstasy led them into unknown lands, and with varying fortunes.\n\nMany now stand scattered and without purpose around the former empire. We desperately need their help, and they ours.\n\nThere are three options presented: one of #G 200#! @gold!, where success is practically guaranteed, one of #Y 100#! @gold! where success is slightly more likely than failure, and one of #R 30#! @gold!, where success is very unlikely.\n\n\n\n\n\n\n\n\n\n\n@greek_mil20!"  #<Viele #Y [GetCulture('ionian').GetName]#! Männer und Frauen zogen nach Asien, als die mazedonischen Armeen sie von den Persern befreiten. Ob als Händler, in der Armee oder als Siedler, ihre Ekstase führte sie in unbekannte Länder und mit unterschiedlichem Glück.\n\nViele leben jetzt verstreut und ziellos im ehemaligen Reich. Wir brauchen dringend ihre Hilfe, und sie unsere.\n\nEs werden drei Optionen angeboten: eine von #G 200#! @gold!, bei der der Erfolg praktisch garantiert ist, und eine von #Y 100#! @gold! wo Erfolg etwas wahrscheinlicher ist als Misserfolg, und einer von #R 30#! @gold!, wo Erfolg sehr unwahrscheinlich ist.\n\n\n\n\n\n\n\n\n\n\n@greek_mil20!#>  #NT!
  
 tayuan_task_6: "Standing Over Gulka Pass"  #<Stehend über dem Gulka-Pass#>  #NT!
 tayuan_task_6_DESC: "Cradled as we are by the valley, the mountains still possess many passes that those who wish to wreck us can use.  Fortifying [GetProvince('(int32)6773').GetName|Y], a key gateway between most of the southern passes, will provide us great safety.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!"  #<Obwohl wir vom Tal umgeben sind, verfügen die Berge immer noch über viele Pässe, die diejenigen nutzen können, die uns ruinieren wollen.  Die Befestigung von [GetProvince('(int32)6773').GetName|Y], einem wichtigen Tor zwischen den meisten südlichen Pässen, wird uns große Sicherheit bieten.\n\n\n\n\n\n\n\n\n\n\n@greek_mil1!#>  #NT!
  
 tayuan_task_7: "Fit For Living"  #<Fit zum Leben#>  #NT!
 tayuan_task_7_DESC: "We must teach our soles every quirk of this strange land, so that we do not walk, or produce, on unknown soil. Setting up farms and plantations will go a long way on making this place livable.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"  #<Wir müssen unseren Sohlen jede Eigenart dieses fremden Landes beibringen, damit wir nicht auf unbekanntem Boden wandeln oder produzieren. Die Errichtung von Bauernhöfen und Plantagen wird einen großen Beitrag dazu leisten, diesen Ort lebenswert zu machen.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!#>  #NT!
  
 tayuan_task_8: "So Long, Hestia"  #<Bis dann, Hestia#>  #NT!
 tayuan_task_8_DESC: "There is no doubt that there was no other option but to stand and repel our enemies; it might not've been who we were as Ionians, but it is who we are now. This valley, our new home, will be the world's envy, and any who dare touch it will feel only despair. We stand in Ferghana.\n\n\n\n\n\n\n\n\n\n\n@greek_mil5!"  #<Es besteht kein Zweifel, dass es keine andere Möglichkeit gab, als zu bestehen und unsere Feinde abzuwehren; Es war vielleicht nicht das, was wir als Ionier waren, aber so sind wir jetzt. Dieses Tal, unsere neue Heimat, wird der Neid der Welt sein, und jeder, der es wagt, es zu berühren, wird nur Verzweiflung empfinden. Wir stehen in Fergana.\n\n\n\n\n\n\n\n\n\n\n@greek_mil5!#>  #NT!
  
 tayuan_task_9: "A Sogdian Sorrow"  #<Ein sogdisches Leid#>  #NT!
 tayuan_task_9_DESC: "We have no quarrel with them, but the circumstances have forced us to face the #Y [GetCulture('sogdian').GetName]s#!. Perhaps we can, once victorious, find it in our heart to show them kindness.\n\n\n\n\n\n\n\n\n\n\n@persia_mil1!"  #<Wir haben keinen Streit mit ihnen, aber die Umstände haben uns gezwungen, uns den #Y [GetCulture('sogdian').GetName]s#!. zu stellen. Vielleicht können wir es, sobald wir siegreich sind, in unserem Herzen finden, ihnen Freundlichkeit zu zeigen.\n\n\n\n\n\n\n\n\n\n\n@persia_mil1!#>  #NT!
  
 tayuan_task_10: "Fooling The Bactrians"  #<Die Baktrier täuschen#>  #NT!
 tayuan_task_10_DESC: "Our #G Epiproxenos#!, ever the master of diplomacy, has put forth a cunning plan: by posturing in the old Ionian manner, as traders and men of the arts, we can easily fool the Bactrian wolf to the south that we are no threat and that we desire to be mere traders, and we will then be able to penetrate deep into their lands.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!"  #<Unser #G Epiproxenos#!,, immer der Meister der Diplomatie, hat einen listigen Plan ausgearbeitet: Indem wir uns in der alten ionischen Manier als Händler und Kunstmänner verhalten, können wir den baktrischen Wolf im Süden leicht täuschen, dass wir keine Bedrohung darstellen und dass wir bloße Händler sein wollen, und dann werden wir in der Lage sein, tief in sie einzudringen landet.\n\n\n\n\n\n\n\n\n\n\n@italic_mil32!#>  #NT!
  
 tayuan_task_11: "Smite The Sakans"  #<Zerschmettere die Sakans#>  #NT!
 tayuan_task_11_DESC: "The odious #Y Sakan#! horsemen trample on our juvenile grass ever trying to abuse us, but a quick and decisive victory against them in battle will surely make them respect us.\n\n\n\n\n\n\n\n\n\n\n@persia_mil16!"  #<Die abscheulichen #Y Sakan#! Reiter trampeln auf unserem jugendlichen Gras herum und versuchen immer, uns zu beschimpfen, aber ein schneller und entscheidender Sieg gegen sie im Kampf wird ihnen sicherlich Respekt vor uns einbringen.\n\n\n\n\n\n\n\n\n\n\n@persia_mil16!#>  #NT!
  
 tayuan_task_12: "A Guiding Star"  #<Ein Leitstern#>  #NT!
 tayuan_task_12_DESC: "A famous artist lives in [GetProvince('(int32)6737').GetName|Y], said to be a renowned metalworker. We could commission an artwork to celebrate our new homes on the valley and inspire the hearts of all those who may want to come here too.\n\n\n\n\n\n\n\n\n\n\n@india_mil6!"  #<In [GetProvince('(int32)6737').GetName|Y] lebt ein berühmter Künstler, der angeblich ein renommierter Metallarbeiter ist. Wir könnten ein Kunstwerk in Auftrag geben, um unsere neuen Häuser im Tal zu feiern und die Herzen aller zu inspirieren, die vielleicht auch hierher kommen möchten.\n\n\n\n\n\n\n\n\n\n\n@india_mil6!#>  #NT!
  
 tayuan_task_13: "Salute The [GetCulture('tayuan').GetName]#E s#!"  #<Begrüßen Sie die [GetCulture('tayuan').GetName]#E s#!#>  #NT!
 tayuan_task_13_DESC: "The native tribes of the valley refuse to be made toys for us to play around with; these are their original homes, and not ours. They demand special rights above others, an offer we are practically forced to accept. Other cultures are sure to be angered.\n\n\n\n\n\n\n\n\n\n\n@persia_mil9!"  #<Die einheimischen Stämme des Tals weigern sich, Spielzeuge für uns herzustellen, mit denen wir herumspielen können. Dies sind ihre ursprünglichen Häuser und nicht unsere. Sie fordern Sonderrechte gegenüber anderen, ein Angebot, das wir praktisch annehmen müssen. Andere Kulturen werden sicher verärgert sein.\n\n\n\n\n\n\n\n\n\n\n@persia_mil9!#>  #NT!
  
 tayuan_task_14: "Lóchos Of The Jaxartes"  #<Lóchos der Jaxartes#>  #NT!
 tayuan_task_14_DESC: "Many are requesting that we create a more organised military structure, with proper training, so that we may be able to compete with more professional armies.\n\n\n\n\n\n\n\n\n\n\n@greek_mil8!"  #<Viele fordern, dass wir eine besser organisierte Militärstruktur mit angemessener Ausbildung schaffen, damit wir mit professionelleren Armeen konkurrieren können.\n\n\n\n\n\n\n\n\n\n\n@greek_mil8!#>  #NT!
  
 tayuan_task_15: "The New Poleis"  #<Die neuen Poleis#>  #NT!
 tayuan_task_15_DESC: "While to the untrained eye it might seem as if we now live in a monarchy, below the surface, our conventional ruling structures of the poleis are still in place and working off each other. [ROOT.GetCountry.GetRuler.GetName|Y] must step up to his role as a mediator between them.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"  #<Für das ungeübte Auge mag es zwar so aussehen, als würden wir jetzt in einer Monarchie leben, doch unter der Oberfläche sind unsere konventionellen Herrschaftsstrukturen der Poleis immer noch an Ort und Stelle und wirken aufeinander ein. [ROOT.GetCountry.GetRuler.GetName|Y] muss seiner Rolle als Vermittler zwischen ihnen gerecht werden.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!#>  #NT!
  
 tayuan_task_16: "Down The Open Plains"  #<Unten in den offenen Ebenen#>  #NT!
 tayuan_task_16_DESC: "After these early tests of strength, our army thirsts after a second challenge to their valor. Riding on against the fearsome horsemen of the east is one, as they are among the strangest, and most intimidating, enemies we face here.\n\n\n\n\n\n\n\n\n\n\n@persia_mil14!"  #<Nach diesen ersten Kraftproben dürstet unsere Armee nach einer zweiten Herausforderung für ihre Tapferkeit. Gegen die furchterregenden Reiter des Ostens zu reiten ist eine davon, denn sie gehören zu den seltsamsten und einschüchterndsten Feinden, denen wir hier gegenüberstehen.\n\n\n\n\n\n\n\n\n\n\n@persia_mil14!#>  #NT!
  
  
 # Events 
  
 me_tayuan.1.title: "There, Alone Among the Youths"  #<Dort, allein unter den Jugendlichen#>  #NT!
 me_tayuan.1.desc: "One does not come into this valley by accident; cradled by mountains on all sides but one, it is crossed by two rivers which in time flow into the great Jaxartes, the great northern limit for [GetCharacter('(int32)39').GetPraenomen], which then sprints away into place unknown. This place is the furthest both the Persians and the Macedonians ever dared come, the last hermitage before a great waste.\n\nAnd we have been relegated here. From the fair and loved cities of [GetProvince('(int32)1808').GetArea.GetName], taken, by force, by the Persian sons of evil for our daring to challenge their slavery. Many still gently weep the #E Ionian Revolt#!, our great cry for freedom. This may be a fertile valley amid desolation, but when the winds crash and the winter snow freezes the ground, that is meager compensation. Unlike the free-loaders to the south, we were taken by force from home, thousands of stadia away. It is very different."  #<Man kommt nicht zufällig in dieses Tal; Bis auf eine Seite ist es auf allen Seiten von Bergen umgeben und wird von zwei Flüssen durchzogen, die mit der Zeit in den großen Jaxartes münden, die große nördliche Grenze für [GetCharacter('(int32)39').GetPraenomen], der dann an einen unbekannten Ort strömt. Dieser Ort ist der weiteste Weg, den sowohl die Perser als auch die Mazedonier je gewagt haben, die letzte Einsiedelei vor einer großen Wüste.\n\nUnd wir wurden hierher verbannt. Aus den schönen und geliebten Städten von [GetProvince('(int32)1808').GetArea.GetName], die von den persischen Söhnen des Bösen mit Gewalt eingenommen wurden, weil wir es gewagt hatten, ihre Sklaverei herauszufordern. Viele weinen immer noch sanft über den #E Ionischen Aufstand#!,, unseren großen Ruf nach Freiheit. Dies mag ein fruchtbares Tal inmitten der Trostlosigkeit sein, aber wenn die Winde krachen und der Winterschnee den Boden gefriert, ist das nur ein dürftiger Ausgleich. Im Gegensatz zu den Trittbrettfahrern im Süden wurden wir gewaltsam von zu Hause weggebracht, Tausende von Stadien entfernt. Es ist ganz anders.#>  #NT!
 me_tayuan.1.a: "There is no way back. We must dig in and fight."  #<Es gibt keinen Weg zurück. Wir müssen uns einmischen und kämpfen.#>  #NT!
  
 me_tayuan.2.title: "$tayuan_task_start$"  #<$tayuan_task_start$#>  #NT!
 me_tayuan.2.desc: "We have assembled an expedition under the command of a veteran captain, from [GetProvince('(int32)6703').GetName], named [SCOPE.sChar('tayuan_explorer').GetName]. [SCOPE.sChar('tayuan_explorer').GetFirstName] and his men, under the elegant guise of simple scribes and traders sent to make contact, will indeed communicate with the peoples around us and report what they have gathered from these countries.\n\nHaving been granted the blessing of [ROOT.GetCountry.GetRuler.GetName], and with sacrifices to #COLOR:{1,1,0.16} Apollo#! made, [SCOPE.sChar('tayuan_explorer').GetPraenomen] stepped onto the temple's courtyard to inspect his men. It was a cold, misty day. He had long hoped to explore these wild lands around the walled cities the Ionians inhabited, now came the time to do it and to serve the people inside them doing it.\n\nFirst, they would ride into the of the furious and rough north wind, of the god #COLOR:{0.8,1,1} Boreas#!. He smiled."  #<Wir haben eine Expedition unter dem Kommando eines erfahrenen Kapitäns aus [GetProvince('(int32)6703').GetName] mit dem Namen [SCOPE.sChar('tayuan_explorer').GetName] zusammengestellt. [SCOPE.sChar('tayuan_explorer').GetFirstName] und seine Männer werden unter dem eleganten Deckmantel einfacher Schreiber und Händler, die zur Kontaktaufnahme geschickt wurden, tatsächlich mit den Völkern um uns herum kommunizieren und berichten, was sie aus diesen Ländern gesammelt haben.\n\nNachdem er den Segen von [ROOT.GetCountry.GetRuler.GetName] erhalten und Opfer für #COLOR:{1,1,0.16} Apollo#! gebracht hatte, betrat [SCOPE.sChar('tayuan_explorer').GetPraenomen] den Innenhof des Tempels, um seine Männer zu inspizieren. Es war ein kalter, nebliger Tag. Er hatte lange gehofft, diese wilden Länder rund um die ummauerten Städte, in denen die Ionier lebten, zu erkunden, jetzt war die Zeit gekommen, dies zu tun und den Menschen in ihnen dabei zu dienen.\n\nZuerst würden sie in den wütenden und rauen Nordwind des Gottes #COLOR:{0.8,1,1} Boreas#! reiten. Er lächelte.#>  #NT!
 me_tayuan.2.a: "A proud day for him."  #<Ein stolzer Tag für ihn.#>  #NT!
  
 me_tayuan.3.title: "The Strange Men"  #<Die seltsamen Männer#>  #NT!
 me_tayuan.3.desc: "Past the harsh white mountains of [GetProvince('(int32)6788').GetName] and [GetProvince('(int32)6787').GetName], always coming into contact with the local [GetCulture('sakan').GetCultureGroup.GetName] tribesmen (these being scattered groups without any real organization or importance) our envoys finally reached [GetCountry('WUS').GetName]. Recognizing no real difference between the prior band of tribesmen and these, they kept on pushing north, being then chased for some distance by a patrol of the local lord. They then were led into his court, in [GetProvince('(int32)8751').GetName].\n\nInside a strangely large tent, #E [SCOPE.sChar('tayuan_explorer').GetPraenomen]#! was presented to [SCOPE.sChar('amyrgian_ruler').GetName], as an envoy of the #E Greeks#! in the valley beyond. [SCOPE.sChar('amyrgian_ruler').GetPraenomen] smiled as if very entertained by this. Why would he do that? And all the people in the room were very strange, with wild hairs, weird hats, funny clothes... Still, [SCOPE.sChar('tayuan_explorer').GetPraenomen] had to find a way to try and get in their good graces."  #<Vorbei an den rauen weißen Bergen von [GetProvince('(int32)6788').GetName] und [GetProvince('(int32)6787').GetName], immer in Kontakt mit den örtlichen [GetCulture('sakan').GetCultureGroup.GetName]-Stammesangehörigen (bei denen es sich um verstreute Gruppen ohne wirkliche Organisation oder Bedeutung handelte), erreichten unsere Gesandten schließlich [GetCountry('WUS').GetName]. Da sie keinen wirklichen Unterschied zwischen der vorherigen Gruppe von Stammesangehörigen und diesen erkannten, drängten sie weiter nach Norden und wurden dann ein Stück weit von einer Patrouille des örtlichen Fürsten verfolgt. Dann wurden sie in [GetProvince('(int32)8751').GetName] in seinen Hof geführt.\n\nIn einem seltsam großen Zelt wurde #E [SCOPE.sChar('tayuan_explorer').GetPraenomen]#! [SCOPE.sChar('amyrgian_ruler').GetName] als Gesandter der #E Griechen#! im Tal dahinter vorgestellt. [GetProvince('(int32)6787').GetName]1 lächelte, als ob es ihn sehr amüsierte. Warum sollte er das tun? Und alle Leute im Raum waren sehr seltsam, mit wilden Haaren, seltsamen Hüten, komischen Klamotten ... Dennoch musste [SCOPE.sChar('tayuan_explorer').GetPraenomen] einen Weg finden, in ihre Gunst zu kommen.#>  #NT!
 me_tayuan.3.a: "Talk of friendship between our kings."  #<Gespräch über die Freundschaft zwischen unseren Königen.#>  #NT!
 me_tayuan.3.b: "Talk of our great military might."  #<Die Rede ist von unserer großen militärischen Macht.#>  #NT!
  
 me_tayuan.4.title: "Sakan Indifference"  #<Sakan-Gleichgültigkeit#>  #NT!
 me_tayuan.4.desc: "''And as such we seek nought but respect between our lands, so as not to cause the destruction and death of our peoples.'' #E [SCOPE.sChar('tayuan_explorer').GetPraenomen]#! finished speaking, and looked to the translator, and then in time to the nomad king. ''The Sakan warriors, blessed by the golden treasures of the sky, bring war to wherever they please, including the home of your ignorant king. This is the way of our plains, and the mad butting ram who calls himself king over one of our infinite valleys ought to know better than to challenge this.''\n\nThreatening as the message seemed, [SCOPE.sChar('tayuan_explorer').GetPraenomen] was then shown away and led to his tent in peace. Sitting down, still unbelieving of the response, he proceeded to unbelieve even more as he was invited to dine with the court. In his mind, only one thing could explain what he just lived through: to these nomads, [ROOT.GetCountry.GetName] was just pismire ant, an afterthought. He was much too enraged to dine with these barbarians, so set off home immediately."  #<„Und als solche suchen wir nichts als Respekt zwischen unseren Ländern, um nicht die Zerstörung und den Tod unserer Völker zu verursachen.“ #E [SCOPE.sChar('tayuan_explorer').GetPraenomen]#! beendete seine Rede und schaute zum Übersetzer und dann rechtzeitig zum Nomadenkönig. „Die Sakan-Krieger, gesegnet mit den goldenen Schätzen des Himmels, bringen Krieg dorthin, wo immer sie wollen, einschließlich der Heimat Ihres unwissenden Königs.“ Dies ist der Weg unserer Ebenen, und der verrückte Widder, der sich König über eines unserer unendlichen Täler nennt, sollte es besser wissen, als dies in Frage zu stellen.''\n\nSo bedrohlich die Botschaft auch klang, [SCOPE.sChar('tayuan_explorer').GetPraenomen] wurde dann weggeführt und in Frieden zu seinem Zelt geführt. Er setzte sich, noch immer ungläubig an die Antwort, und wurde noch ungläubiger, als er zum Abendessen mit dem Hofstaat eingeladen wurde. Seiner Meinung nach konnte nur eines erklären, was er gerade durchlebte: Für diese Nomaden war [ROOT.GetCountry.GetName] nur eine Pismire-Ameise, ein nachträglicher Einfall. Er war viel zu wütend, um mit diesen Barbaren zu speisen, also machte er sich sofort auf den Heimweg.#>  #NT!
 me_tayuan.4.a: "There are bigger powers that be here."  #<Es gibt größere Mächte, die hier sind.#>  #NT!
  
 me_tayuan.5.title: "$tayuan_task_1$"  #<$tayuan_task_1$#>  #NT!
 me_tayuan.5.desc: "The [GetCulture('sogdian').GetName]#E s#! have, at least, one (kind of) similarity to us: they are destitute from their homeland in [GetProvince('(int32)6711').GetArea.GetName]. This is not entirely, as they still hold some of their original lands; still, it is worth noting that these were previously the wildest among them, as they lie much beyond the safety of the river #E Jaxartes#!, in wild steppe and desert.\n\nThe southern wind whispered away their comfort, but that, in turn, is why #COLOR:{0,0.64,0} Zephyros#!, god of the western wind, smiles upon us. Their lands may be mostly barren, but they're still by far our weakest neighbor.\n\nThe [GetCulture('sogdian').GetName]#E s#!, when [SCOPE.sChar('tayuan_explorer').GetPraenomen] told them were he was from, made their pure curiosity from our strange complexion devolve it's innocence into a visible resentment: they surely foresee a rivalry between us. Not long after beggining to exit their country, [SCOPE.sChar('tayuan_explorer').GetPraenomen] was, yet again, chased by a local patrol; and this time it didn't seem like he would be then led to their king."  #<Die [GetCulture('sogdian').GetName]#E s#! haben zumindest eine (Art) Ähnlichkeit mit uns: Sie sind in [GetProvince('(int32)6711').GetArea.GetName] mittellos von ihrer Heimat. Dies ist jedoch nicht ganz der Fall, da sie immer noch einige ihrer ursprünglichen Ländereien besitzen; Dennoch ist es erwähnenswert, dass diese zuvor die wildesten unter ihnen waren, da sie weit außerhalb der Sicherheit des Flusses #E Jaxartes#! liegen, in wilder Steppe und Wüste.\n\nDer Südwind flüsterte ihren Trost weg, aber das wiederum ist der Grund, warum #COLOR:{0,0.64,0} Zephyros#!, der Gott des Westwinds, uns anlächelt. Ihr Land mag größtenteils unfruchtbar sein, aber sie sind immer noch bei weitem unser schwächster Nachbar.\n\nDie [GetCulture('sogdian').GetName]#E s#!, als #E1 ihnen erzählte, woher er kam, verwandelten ihre reine Neugier aufgrund unserer seltsamen Hautfarbe in einen sichtbaren Groll: Sie sahen sicherlich eine Rivalität zwischen uns voraus. Nicht lange nachdem sie begonnen hatte, ihr Land zu verlassen, wurde #E1 erneut von einer örtlichen Patrouille verfolgt; und dieses Mal schien es nicht so, als würde man ihn dann zu ihrem König führen.#>  #NT!
 me_tayuan.5.a: "A sad sight to see."  #<Ein trauriger Anblick.#>  #NT!
  
 me_tayuan.6.title: "$tayuan_task_2$"  #<$tayuan_task_2$#>  #NT!
 me_tayuan.6.desc: "Many oracles earn their due by warning of the eastern wind blown forth by the god #COLOR:{0.39,0.21,0.89} Euros#!, and we certainly have lost some sleep due to it. Looking down from the valley onto the sandstone mountains that mark it's start, [SCOPE.sChar('tayuan_explorer').GetPraenomen] genuinely has no idea what lies beyond, save for some detestable Sakan tribesmen we'd already been told about. What if there is a distant empire just beyond, and a huge mass of men from it just ready to cross into our homes?\n\nSuch are the worries in an explorer's life; it is clearly not for everyone. The baggage train had already passed him on the journey up into the passes, so he hurried behind it."  #<Viele Orakel verdienen ihr Recht mit der Warnung vor dem vom Gott herbeigeblasenen Ostwind #COLOR:{0.39,0.21,0.89} Euro#!, und wir haben dadurch sicherlich etwas Schlaf verloren. Als [SCOPE.sChar('tayuan_explorer').GetPraenomen] vom Tal auf die Sandsteinberge hinunterblickt, die seinen Anfang markieren, hat er wirklich keine Ahnung, was dahinter liegt, abgesehen von einigen abscheulichen Sakan-Stammesangehörigen, von denen wir bereits gehört hatten. Was wäre, wenn gleich dahinter ein fernes Imperium existierte und eine riesige Schar von Männern aus diesem Reich nur darauf wartete, in unsere Häuser einzudringen?\n\nDas sind die Sorgen im Leben eines Entdeckers; es ist eindeutig nicht jedermanns Sache. Der Gepäckzug war auf der Fahrt hinauf in die Pässe bereits an ihm vorbeigekommen, also eilte er hinterher.#>  #NT!
 me_tayuan.6.a: "What could lie ahead?"  #<Was könnte vor uns liegen?#>  #NT!
  
 me_tayuan.7.title: "$tayuan_task_3$"  #<$tayuan_task_3$#>  #NT!
 me_tayuan.7.desc: "[SCOPE.sChar('tayuan_explorer').GetPraenomen] sighed as he departed from his [GetProvince('(int32)6703').GetName] into the lands of [GetCountry('BAC').GetName]. This sorry amalgamation of warlords, profiteers and colonists has been brought by the god of the southern wind, #COLOR:{0.89,0.05,0} Notos#!, right to our doorstep. It is, for better or for worse, the biggest threat we face, a huge army thirsting after blood and spoils. [GetCharacter('(int32)24').GetPraenomen], their overlord, should be controlling them, but after talking to an old native [GetCulture('bactrian').GetCultureGroup.GetName]... companion in [GetProvince('(int32)6697').GetName] (which he knew from before the invasion), [SCOPE.sChar('tayuan_explorer').GetPraenomen] quickly realises this is mostly wishful thinking, and that the huge satrapy will break free very soon. She says the court is gearing up for war, whispers are abound of a scathing letter sent to the Babylonian court.\nBesides, the population, this being mostly native Bactrians, are being violently repressed everywhere to install the new Macedonian machine, and rogue armies pillage the countrysides and ask their [GetCountry('BAC').GetRuler.GetTitle] for blood.\n\nGreat troubles are sure to blow from the south. For now, our explorers shall return home."  #<[SCOPE.sChar('tayuan_explorer').GetPraenomen] seufzte, als er von seinem [GetProvince('(int32)6703').GetName] in die Länder von [GetCountry('BAC').GetName] aufbrach. Diese traurige Verschmelzung von Kriegsherren, Profiteuren und Kolonisten wurde vom Gott des Südwinds, #COLOR:{0.89,0.05,0} Notos#!,, direkt vor unsere Haustür gebracht. Es ist, im Guten wie im Schlechten, die größte Bedrohung, der wir gegenüberstehen, eine riesige Armee, die nach Blut und Beute dürstet. [GetCharacter('(int32)24').GetPraenomen], ihr Oberherr, sollte sie kontrollieren, aber nachdem er mit einem alten einheimischen [GetCulture('bactrian').GetCultureGroup.GetName]... Gefährten in [GetProvince('(int32)6697').GetName] gesprochen hat (den er aus der Zeit vor der Invasion kannte), erkennt [SCOPE.sChar('tayuan_explorer').GetPraenomen] schnell, dass dies größtenteils Wunschdenken ist und dass die riesige Satrapie sehr bald ausbrechen wird. Sie sagt, der Hof bereitet sich auf den Krieg vor, und es kursieren Gerüchte über einen vernichtenden Brief an den babylonischen Hof.\nAußerdem wird die Bevölkerung, bei der es sich hauptsächlich um einheimische Baktrier handelt, überall gewaltsam unterdrückt, um die neue mazedonische Maschine zu installieren, und Schurkenarmeen plündern das Land und bitten ihre [GetCountry('BAC').GetRuler.GetTitle] um Blut.\n\nGroße Probleme werden mit Sicherheit aus dem Süden kommen. Vorerst kehren unsere Entdecker nach Hause zurück.#>  #NT!
 me_tayuan.7.a: "Lest we get swept away."  #<Damit wir nicht mitgerissen werden.#>  #NT!
  
 me_tayuan.8.title: "$tayuan_task_4$"  #<$tayuan_task_4$#>  #NT!
 me_tayuan.8.desc: "These two cities feel to us like our own two loves, secrets to everyone else that we are growing to deeply appreciate. As they are so close to each other, [SCOPE.sChar('tayuancivman').GetName] has begun devising plans to coordinate efforts between both, easing the administrative onus on them. Infrastructure has been built in the hills between the two: the waters now extend from one to the other, from a diverted branch of  the #E Jaxartes River#!, and both cities share with each other their libraries, cities, and in the end, their cultures.\n\nSurely, those two conquerors of the past now look on with kindness from the beyond, for we are worthy custodians of their most intimate and lesser-known projects."  #<Diese beiden Städte fühlen sich für uns wie unsere eigenen zwei Lieben an, Geheimnisse für alle anderen, die wir immer mehr zutiefst schätzen lernen. Da sie so nahe beieinander liegen, hat [SCOPE.sChar('tayuancivman').GetName] damit begonnen, Pläne zur Koordinierung der Bemühungen beider zu entwickeln und so den Verwaltungsaufwand für sie zu verringern. In den Hügeln zwischen den beiden wurde eine Infrastruktur aufgebaut: Die Gewässer erstrecken sich nun von einem zum anderen, von einem umgeleiteten Zweig des #E Jaxartes-Flusses#!,, und beide Städte teilen miteinander ihre Bibliotheken, Städte und letztendlich ihre Kulturen.\n\nSicherlich blicken diese beiden Eroberer der Vergangenheit jetzt mit Freundlichkeit aus dem Jenseits zu, denn wir sind würdige Hüter ihrer intimsten und weniger bekannten Projekte.#>  #NT!
 me_tayuan.8.a: "An enriching endeavour."  #<Ein bereicherndes Unterfangen.#>  #NT!
  
 me_tayuan.9.title: "$tayuan_task_5$"  #<$tayuan_task_5$#>  #NT!
 me_tayuan.9.desc: "[SCOPE.sChar('tayuan_steward').GetName] sat down, and started explaining to all at the table all the expenses necessary to properly execute the plan of convincing the [GetCulture('ionian').GetName] settlers across the former Macedonian Empire to leave their settlements and to come to our valley.\n\nNot too long into the speech, [ROOT.GetCountry.GetRuler.GetFirstName] started feeling uneasy at the magnitude of this project. Looking out from the palace onto the streets of [ROOT.GetCountry.GetCapital.GetName], he felt it was the right thing to do, but the sums of money being discussed weighed on his mind almost as much as the food from yesterday's banquet on his belly."  #<[SCOPE.sChar('tayuan_steward').GetName] setzte sich und fing an, allen am Tisch alle Kosten zu erklären, die notwendig waren, um den Plan ordnungsgemäß umzusetzen, die [GetCulture('ionian').GetName] Siedler im gesamten ehemaligen Mazedonischen Reich davon zu überzeugen, ihre Siedlungen zu verlassen und in unser Tal zu kommen.\n\nNicht lange nach Beginn der Rede begann sich [ROOT.GetCountry.GetRuler.GetFirstName] angesichts der Größe dieses Projekts unwohl zu fühlen. Als er vom Palast auf die Straßen von [ROOT.GetCountry.GetCapital.GetName] blickte, hatte er das Gefühl, dass es das Richtige sei, aber die Geldsummen, über die gesprochen wurde, lasteten fast so sehr auf seinem Kopf wie das Essen vom gestrigen Bankett auf seinem Bauch.#>  #NT!
 me_tayuan.9.a: "Send our finest men and messengers on to meet them."  #<Schicken Sie unsere besten Männer und Boten los, um sie zu treffen.#>  #NT!
 me_tayuan.9.b: "We must make a sizeable investment to find them."  #<Wir müssen eine beträchtliche Investition tätigen, um sie zu finden.#>  #NT!
 me_tayuan.9.c: "We should invest on those who are already here instead."  #<Wir sollten stattdessen in diejenigen investieren, die bereits hier sind.#>  #NT!
  
 me_tayuan.10.title: "$tayuan_task_6$"  #<$tayuan_task_6$#>  #NT!
 me_tayuan.10.desc: "Little lives in the mountain passes hidden high above the valleys; apart from a few native communities lost between the peaks that keep to themselves, most (human) activity now consists of our soldiers, stationed on our newly built fort network in the region.\n\nAlthough back home [GetCulture('ionian').GetName]#E s#! don't have much of a reputation for practicing the martial professions, the utterly inconceivable situation we have found ourselves in has already begun forcing changes into our traditional way of being. \n\nThe newly built fortress networks in [GetProvince('(int32)6773').GetName] are a thing of beauty. Atop towering gorges and amid minuscule valleys, these defenses will test the limits of any who try to cross these mountains."  #<In den Bergpässen, die hoch über den Tälern verborgen sind, lebt wenig; Abgesehen von ein paar einheimischen Gemeinschaften, die zwischen den Gipfeln verloren gehen und unter sich bleiben, besteht der größte Teil der (menschlichen) Aktivität jetzt aus unseren Soldaten, die in unserem neu errichteten Festungsnetzwerk in der Region stationiert sind.\n\nObwohl [GetCulture('ionian').GetName]#E s#! zu Hause nicht gerade den Ruf haben, Kampfberufe auszuüben, hat die völlig unvorstellbare Situation, in der wir uns befanden, bereits begonnen, Veränderungen in unserer traditionellen Lebensweise zu erzwingen. \n\nDie neu errichteten Festungsnetzwerke in [GetProvince('(int32)6773').GetName] sind eine Schönheit. Auf hoch aufragenden Schluchten und inmitten winziger Täler werden diese Verteidigungsanlagen die Grenzen eines jeden auf die Probe stellen, der versucht, diese Berge zu überqueren.#>  #NT!
 me_tayuan.10.a: "Who ever cared for the #E Sogdian Rock#!?"  #<Wer hat sich jemals für den #E Sogdischen Felsen#!? interessiert?#>  #NT!
  
 me_tayuan.11.title: "An Envoy From The Furthest East"  #<Ein Gesandter aus dem äußersten Osten#>  #NT!
 me_tayuan.11.desc: "Rumors of a great and rich empire to the east were not foreign to the ears of [ROOT.GetCountry.GetRuler.GetName], but his mind dismissed them, unreachable kingdoms from the furthest reaches of #COLOR:{0.39,0.21,0.81} Euros#!. Yet, recently in [GetProvince('(int32)6737').GetName] word quickly spread of a ragged stranger, of weird complexion, claiming to be an envoy of said Empire. He said he had been made captive by the savage tribes to our east, and of a hundred men that departed with him he now only had a native interpreter to keep him company.\n\nAs these fantastical stories of far-away lands quickly spread, he was soon in audience with the [ROOT.GetCountry.GetRulerTitle], and he thus explained;\n\n'I was dispatched as an envoy of the #COLOR:{0.69,0.49,0} Huaxia#! to the [GetCulture('yuezhi').GetName], but the #R Xiongnu#! blocked my way, and I have only now just managed to escape, I beg Your Highness give me some guides to show me the way. If I can reach my destination and return to make the report, the #COLOR:{0.69,0.49,0} Huaxia#! will reward you with countless gifts!'"  #<Gerüchte über ein großes und reiches Reich im Osten waren den Ohren von [ROOT.GetCountry.GetRuler.GetName] nicht fremd, aber sein Verstand verwarf sie, unerreichbare Königreiche aus den entlegensten Winkeln von #COLOR:{0.39,0.21,0.81} Euro#!.. Doch kürzlich in [GetProvince('(int32)6737').GetName] verbreitete sich schnell die Nachricht von einem zerlumpten Fremden mit seltsamer Gesichtsfarbe, der behauptete, ein Gesandter des besagten Reiches zu sein. Er sagte, er sei von den wilden Stämmen in unserem Osten gefangen genommen worden, und von hundert Männern, die mit ihm zogen, habe er jetzt nur noch einen einheimischen Dolmetscher, der ihm Gesellschaft leistete.\n\nAls sich diese fantastischen Geschichten aus fernen Ländern schnell verbreiteten, war er bald in Audienz bei den [ROOT.GetCountry.GetRulerTitle] und er erklärte so:\n\n'Ich wurde als Gesandter der #COLOR:{0.69,0.49,0} Huaxia#! zu den entsandt [GetCulture('yuezhi').GetName], aber die #R Xiongnu#! versperrten mir den Weg, und ich habe es gerade erst geschafft zu entkommen. Ich flehe Eure Hoheit an, gebt mir ein paar Führer, die mir den Weg zeigen. Wenn ich mein Ziel erreichen und zurückkehren kann, um den Bericht zu erstatten, werden dich die #COLOR:{0.69,0.49,0} Huaxia#! mit unzähligen Geschenken belohnen!'#>  #NT!
 me_tayuan.11.a: "So, the stories are true! Help him on his way."  #<Die Geschichten sind also wahr! Hilf ihm auf seinem Weg.#>  #NT!
 me_tayuan.11.a.tt: "#Y This is a historical encounter#!, and the dialogue is true to the one recorded by Chinese scholars.\nThis may lead to #G benefits and gifts#! from the #T Eastern Empire#!!"  #<#Y Dies ist eine historische Begegnung#!, und der Dialog entspricht dem von chinesischen Gelehrten aufgezeichneten.\nDies kann zu #G Vorteilen und Geschenken#! vom #T Oströmischen Reich#! führen!#>  #NT!
 helped_zhang_tt: "Qian Zhang will receive supplies, gold, and an armed escort for his journey back home."  #<Qian Zhang erhält Vorräte, Gold und eine bewaffnete Eskorte für seine Heimreise.#>  #NT!
 me_tayuan.11.b: "Fantastical or truthful, I care very little for the story and the man."  #<Fantastisch oder wahrhaftig, die Geschichte und der Mann interessieren mich sehr wenig.#>  #NT!
 me_tayuan.11.b.tt: "This may #R anger#! the #T Eastern Empire#!."  #<Dies könnte das #T Oströmische Reich#! #R verärgern#!.#>  #NT!
  
 me_tayuan.12.title: "$tayuan_task_8$"  #<$tayuan_task_8$#>  #NT!
 me_tayuan.12.desc: "With no small effort, we have defeated all the forces that could threaten this sweet, sweet, idyllic land, which we didn't choose but were driven to, that we love no less just because of that fact.\n\nWe are all sure of one thing though: it will never be the same. As we have chosen to live here, our familiar faces will eventually give way to something not [GetCulture('ionian').GetName], and it is just a question of how much and by who our traditions get influenced. The heart sores for what was home, but smiles on with hope at this new house. We may fall, but none will say we went on without dreams, possessing the radical seed of idea in our mind. We have no choice but to see what we will, from all the new influences, become."  #<Mit nicht geringer Anstrengung haben wir alle Kräfte besiegt, die dieses süße, süße, idyllische Land bedrohen könnten, das wir nicht ausgewählt haben, sondern in das wir getrieben wurden und das wir nicht weniger lieben, nur deshalb.\n\nWir sind uns jedoch alle einer Sache sicher: Es wird nie mehr dasselbe sein. Da wir uns entschieden haben, hier zu leben, werden unsere vertrauten Gesichter irgendwann etwas weichen, das nicht [GetCulture('ionian').GetName] ist, und es ist nur eine Frage, wie sehr und von wem unsere Traditionen beeinflusst werden. Das Herz tut weh für das, was ein Zuhause war, aber es lächelt voller Hoffnung über dieses neue Haus. Wir mögen fallen, aber niemand wird sagen, dass wir ohne Träume weitergemacht haben und den radikalen Keim einer Idee in unserem Kopf hatten. Wir haben keine andere Wahl, als zu sehen, was aus uns unter all den neuen Einflüssen werden wird.#>  #NT!
 me_tayuan.12.a: "A new age?"  #<Ein neues Zeitalter?#>  #NT!
  
 me_tayuan.13.title: "Desert?"  #<Wüste?#>  #NT!
 me_tayuan.13.desc: "Bizarrely enough, at a point up in the middle of the mountains, one doesn't come down, and it turns into a large plain, practically a desert, save some rivers and towns. The [GetCulture('sakan').GetCultureGroup.GetName] savages, well known to [SCOPE.sChar('tayuan_explorer').GetPraenomen] from previous adventures, had left their ugly mark here too, but with a little persistence the men managed to reach [GetProvince('(int32)7184').GetName], an unexpectedly large city (given the desolation here), and one with a very weird blend of the Indian style and another mysterious one, with pointy black roofs and white walls.\n\nIn the streets, they found many peoples, natives and Indians and Hellenes, and one particular man, who amazed and amused us very much, of a weird complexion, pale as ourselves but with dark hair and elongated eyes. None among us could understand him, but a local trader eventually translated; he came from a certain Dsongkou, a huge, fertile land with a certain man sent from heaven to rule over it. ''And where is this land?'' asked [SCOPE.sChar('tayuan_explorer').GetPraenomen], having his worries confirmed, ''On to the East'', said the man.\n\nOver the next few days, many attempts were made to reach this fantastical Eastern land, but we didn't reach anywhere; it's as if the world ended here. We just cannot reach them."  #<Seltsamerweise kommt man an einem Punkt mitten in den Bergen nicht herunter, und es verwandelt sich in eine große Ebene, praktisch eine Wüste, abgesehen von einigen Flüssen und Städten. Die [GetCulture('sakan').GetCultureGroup.GetName]-Wilden, die [SCOPE.sChar('tayuan_explorer').GetPraenomen] aus früheren Abenteuern gut bekannt waren, hatten auch hier ihre hässlichen Spuren hinterlassen, aber mit ein wenig Beharrlichkeit gelang es den Männern, [GetProvince('(int32)7184').GetName] zu erreichen, eine unerwartet große Stadt (angesichts der Verwüstung hier) und eine mit einer sehr seltsamen Mischung aus indischem Stil und einer anderen geheimnisvollen Stadt mit spitzen schwarzen Dächern und weißen Wänden.\n\nAuf den Straßen fanden sie viele Völker, Eingeborene, Inder und Hellenen, und ein besonderer Mann, der uns sehr verblüffte und amüsierte, von seltsamer Gesichtsfarbe, blass wie wir, aber mit dunklem Haar und langen Augen. Keiner von uns konnte ihn verstehen, aber schließlich übersetzte ein örtlicher Händler; Er kam aus einem bestimmten Dsongkou, einem riesigen, fruchtbaren Land, in dem ein bestimmter Mann vom Himmel gesandt wurde, um darüber zu herrschen. „Und wo ist dieses Land?“ fragte [SCOPE.sChar('tayuan_explorer').GetPraenomen] und sah seine Sorgen bestätigt. „Weiter nach Osten“, sagte der Mann.\n\nIn den nächsten Tagen wurden viele Versuche unternommen, dieses fantastische östliche Land zu erreichen, aber wir kamen nirgendwo an; Es ist, als wäre hier die Welt untergegangen. Wir können sie einfach nicht erreichen.#>  #NT!
 me_tayuan.13.a: "Very intriguing..."  #<Sehr faszinierend...#>  #NT!
  
 me_tayuan.14.title: "The Great Ionians"  #<Die großen Ionier#>  #NT!
 me_tayuan.14.desc: "Syria, [GetProvince('(int32)918').GetName], Persia, [GetProvince('(int32)3439').GetName], Egypt, [GetProvince('(int32)4976').GetName], India, [GetProvince('(int32)1883').GetName], [GetProvince('(int32)4371').GetName], they flood, from the wildest countries, with weary faces but hopeful eyes, into our open arms. Many trusted only a word, a feeling, to let go of everything and chase the silhouette of a new home for the Ionian people; in the end they have found it - a serene jewel where they will live welcomed despite being in destitution!\nMany were immediately amazed with the homely climate of the valley in the midst of the brutal cold around, and are looking eagerly to us for guidance on where to settle this strange valley."  #<Syrien, [GetProvince('(int32)918').GetName], Persien, [GetProvince('(int32)3439').GetName], Ägypten, [GetProvince('(int32)4976').GetName], Indien, [GetProvince('(int32)1883').GetName], [GetProvince('(int32)4371').GetName], sie strömen aus den wildesten Ländern mit müden Gesichtern, aber hoffnungsvollen Augen in unsere offenen Arme. Viele vertrauten nur einem Wort, einem Gefühl, um alles loszulassen und der Silhouette einer neuen Heimat für das ionische Volk nachzujagen; Am Ende haben sie es gefunden – ein ruhiges Juwel, in dem sie trotz ihrer Armut willkommen sein werden!\nViele waren sofort von dem heimeligen Klima des Tals inmitten der brutalen Kälte überrascht und erwarten von uns sehnsüchtig Hinweise, wo sie sich in diesem seltsamen Tal niederlassen können.#>  #NT!
 me_tayuan.14.a: "They can spread throughout the valley like seeds thrown."  #<Sie können sich wie geworfene Samen im ganzen Tal verbreiten.#>  #NT!
 me_tayuan.14.b: "We can concentrate them in [GetProvince('(int32)6735').GetName]."  #<Wir können sie in [GetProvince('(int32)6735').GetName] konzentrieren.#>  #NT!
  
 me_tayuan.15.title: "Ever Lost"  #<Immer verloren#>  #NT!
 me_tayuan.15.desc: "They didn't come. Despite our good efforts, many already feel too homely in their homes - despite not receiving the respect they deserve as proper Ionians, this valley is too much of a far-away dream for many, and few have chosen to undertake the perilous journey past countries and countries into our own reclusion here.\n\nStill, the few brave souls that managed to make it were welcomed with open arms. The reception prepared at [GetProvince('(int32)6704').GetName] was obviously let down with the few numbers that ended up appearing, but like the philosopher we must learn to be content with what we get."  #<Sie sind nicht gekommen. Trotz unserer guten Bemühungen fühlen sich viele in ihren Häusern bereits zu heimelig – obwohl sie nicht den Respekt erhalten, den sie als echte Ionier verdienen, ist dieses Tal für viele zu sehr ein weit entfernter Traum, und nur wenige haben sich entschieden, die gefährliche Reise durch Länder und Länder in unsere eigene Abgeschiedenheit hierher zu unternehmen.\n\nDennoch wurden die wenigen mutigen Seelen, die es geschafft haben, es mit offenen Armen zu empfangen. Der bei [GetProvince('(int32)6704').GetName] vorbereitete Empfang war angesichts der wenigen Zahlen, die schließlich auftauchten, offensichtlich enttäuschend, aber wie der Philosoph müssen wir lernen, mit dem, was wir bekommen, zufrieden zu sein.#>  #NT!
 me_tayuan.15.a: "A shame."  #<Schade.#>  #NT!
  
 me_tayuan.16.title: "Hooves of Appreciation"  #<Hufe der Wertschätzung#>  #NT!
 me_tayuan.16.desc: "We have treated the [GetCulture('sogdian').GetName]#E s#! almost as brothers despite our clear superiority; they too are a people far away from home, kicked out north by foreign forces, so we could do nought but show them our kindness. This kindness was not lost on their hearts, and an emotional delegation today passed through [ROOT.GetCountry.GetCapital.GetName], thanking us for our fraternity and showering us with gifts. Our men already practice together in the fields, and we have discovered that they have the most amazing horses, capable of enduring any strain put on them. Many among us have shown themselves willing to learn these new ways of warfare on horseback, and our army is becoming quite proficient in it."  #<Wir haben die [GetCulture('sogdian').GetName]#E s#! trotz unserer klaren Überlegenheit fast wie Brüder behandelt; Auch sie sind ein Volk weit weg von zu Hause, das von fremden Kräften in den Norden vertrieben wurde, sodass wir nichts anderes tun konnten, als ihnen unsere Freundlichkeit zu zeigen. Diese Freundlichkeit ging ihnen nicht aus dem Herzen, und heute reiste eine emotionale Delegation durch [ROOT.GetCountry.GetCapital.GetName], dankte uns für unsere Brüderlichkeit und überschüttete uns mit Geschenken. Unsere Männer üben bereits gemeinsam auf den Feldern und wir haben festgestellt, dass sie die erstaunlichsten Pferde haben, die jeder Belastung standhalten können. Viele von uns haben gezeigt, dass sie bereit sind, diese neuen Methoden der Kriegsführung zu Pferd zu erlernen, und unsere Armee beherrscht sie mittlerweile recht gut.#>  #NT!
 me_tayuan.16.a: "Brothers indeed."  #<Brüder in der Tat.#>  #NT!
  
 me_tayuan.17.title: "A Merit of the Vanquished"  #<Ein Verdienst der Besiegten#>  #NT!
 me_tayuan.17.desc: "The Great Ionian phalanx swoons victorious over the [GetCulture('sogdian').GetName] lands, but it really isn't as much of a pure phalanx as it once was - throughout our campaign, we have discovered that the people of these lands are masters of the horse, and their horses are of the finest quality.\n\nStill, this campaign has taken its toll on a people desperate for a home of their own, and robbed precisely that again - the Sogdian populations aren't happy at all."  #<Die Große Ionische Phalanx siegt über die [GetCulture('sogdian').GetName]-Länder, ist aber nicht mehr so eine reine Phalanx wie früher – während unseres Feldzugs haben wir herausgefunden, dass die Menschen in diesen Ländern Meister des Pferdes sind und dass ihre Pferde von bester Qualität sind.\n\nTrotzdem forderte dieser Feldzug seinen Tribut von einem Volk, das verzweifelt nach einem eigenen Zuhause suchte, und beraubte genau das erneut – die sogdische Bevölkerung sind überhaupt nicht glücklich.#>  #NT!
 me_tayuan.17.a: "That is very much their problem."  #<Das ist in hohem Maße ihr Problem.#>  #NT!
  
 me_tayuan.18.title: "$tayuan_task_10$"  #<$tayuan_task_10$#>  #NT!
 me_tayuan.18.desc: "[SCOPE.sChar('tayuan_fm').GetName] set a cunning plan in motion when he proposed to convince the Bactrians of our economic servitude to them. Since effectively they have a huge influence over us, managing to have them turn a blind eye to the exploits of our soldiers and traders is exactly what we need to prepare to strike them by surprise.\n\nBactrian traders and their goods regularly flow through our city gates, then going into the markets to trade goods and riches, but with this trade agreement they brought gifts to the [ROOT.GetCountry.GetRuler.GetTitleName]. Up in the city bastion the triumphant Epiproxenos [SCOPE.sChar('tayuan_fm').GetPraenomen] made sure to remind all that the countdown to the war with [GetCountry('BAC').GetName] had just started ticking away."  #<[SCOPE.sChar('tayuan_fm').GetName] setzte einen listigen Plan in Gang, als er vorschlug, die Baktrier von unserer wirtschaftlichen Knechtschaft ihnen gegenüber zu überzeugen. Da sie tatsächlich einen enormen Einfluss auf uns haben, ist es genau das, was wir tun müssen, um sie dazu zu bringen, die Augen vor den Heldentaten unserer Soldaten und Händler zu verschließen, um sie zu überraschen.\n\nBaktrische Händler und ihre Waren strömen regelmäßig durch unsere Stadttore und gehen dann auf die Märkte, um Waren und Reichtümer zu tauschen, aber mit diesem Handelsabkommen brachten sie Geschenke an die [ROOT.GetCountry.GetRuler.GetTitleName]. Oben in der Stadtbastion sorgte der triumphierende Epiproxenos [SCOPE.sChar('tayuan_fm').GetPraenomen] dafür, alle daran zu erinnern, dass der Countdown zum Krieg mit [GetCountry('BAC').GetName] gerade erst zu laufen begonnen hatte.#>  #NT!
 me_tayuan.18.a: "Let the riches come before the steel."  #<Lass den Reichtum vor dem Stahl kommen.#>  #NT!
  
 me_tayuan.19.title: "$tayuan_task_12$"  #<$tayuan_task_12$#>  #NT!
 me_tayuan.19.desc: "We had for long heard of the master of working metals of [GetProvince('(int32)6737').GetName], but we would have never expected that, upon reaching her house on one of the bigger hills of the polis, the artist would turn out to be a woman. Regardless, our people would accept no less than an artifact of the highest quality to represent their arrival in this strange new land, and the homesickness that sneaks into our humors from beneath the hills here. As such, [SCOPE.sChar('tayuan_artist').GetName] was indeed allowed to create an altar to Apollo, our god, but more specifically to the Ionians who found a new home here.\n\nWhen it was unveiled, the altar attracted significant attention from both old families of the valley and new arrivals, and it seems as if everyone of us is moved and inspired by it, as it tells the observer our own story of loss and refounding."  #<Wir hatten schon lange von der Meisterin der Metallbearbeitung von [GetProvince('(int32)6737').GetName] gehört, hätten aber nie erwartet, dass sich die Künstlerin als Frau herausstellen würde, als sie ihr Haus auf einem der größeren Hügel der Polis erreichte. Unabhängig davon würde unser Volk nichts Geringeres als ein Artefakt höchster Qualität akzeptieren, um seine Ankunft in diesem seltsamen neuen Land und das Heimweh darzustellen, das sich hier unter den Hügeln in unsere Stimmung einschleicht. Daher durfte [SCOPE.sChar('tayuan_artist').GetName] tatsächlich einen Altar für Apollo, unseren Gott, errichten, insbesondere aber für die Ionier, die hier eine neue Heimat fanden.\n\nAls er enthüllt wurde, erregte der Altar große Aufmerksamkeit sowohl bei alten Familien des Tals als auch bei Neuankömmlingen, und es scheint, als sei jeder von uns davon berührt und inspiriert, da er dem Betrachter unsere eigene Geschichte von Verlust und Neugründung erzählt.#>  #NT!
 me_tayuan.19.a: "It is a masterwork."  #<Es ist ein Meisterwerk.#>  #NT!
  
 me_tayuan.20.title: "$tayuan_task_11$"  #<$tayuan_task_11$#>  #NT!
 me_tayuan.20.desc: "Another horse screams of pain in the distance, another horseman falls dead on the ground. The clay soil soaks another loud thump. This cavalry unit was utterly crushed, and many men who were around it are now urging their horses off into the horizon of the endless steppe, with no pride but life still in their hands.\n\nWe may have defeated the [GetCulture('sakan').GetName]#E s#!, but one lesson we have learnt from them is that in the plains around us, the wild horse used by the Sakans reigns king. We have managed to learn a bit from their masterful techniques and have incorporated them into our cavalry regiments."  #<Ein anderes Pferd schreit in der Ferne vor Schmerz, ein anderer Reiter fällt tot zu Boden. Der Lehmboden durchnässt einen weiteren lauten Schlag. Diese Kavallerieeinheit wurde völlig vernichtet, und viele Männer, die sich in ihrer Nähe befanden, treiben nun ihre Pferde in den Horizont der endlosen Steppe, ohne Stolz, aber immer noch mit dem Leben in ihren Händen.\n\nWir mögen die [GetCulture('sakan').GetName]#E s#!, besiegt haben, aber eine Lektion, die wir von ihnen gelernt haben, ist, dass in den Ebenen um uns herum das wilde Pferd, das die Sakans benutzten, der König ist. Wir haben es geschafft, ein wenig von ihren meisterhaften Techniken zu lernen und sie in unsere Kavallerieregimenter zu integrieren.#>  #NT!
 me_tayuan.20.a: "We may be getting too used to the saddle..."  #<Vielleicht gewöhnen wir uns zu sehr an den Sattel ...#>  #NT!
  
 me_tayuan.21.title: "$tayuan_task_13$"  #<$tayuan_task_13$#>  #NT!
 me_tayuan.21.desc: "While strangers, they distrusted us, foreign kings wearing their crown over our head; the truth is that comparatively they benefit much more learning from us while we rule over them that the other way around, they're still disparate tribes like we were many years ago driving into Hellas.\n\nStill, in our civilized ways we lack the decision and fearlessness that we renounced all those years ago, so we need them just as they need us. Even more so because they know their way around the lands of the valley and those around it.\n\nAs such, we are starting to inhabit together with some degree of fraternity and compassion, and it may end up that we share the valley with them as equals."  #<Als Fremde misstrauten sie uns, fremde Könige trugen ihre Krone über unserem Haupt; Die Wahrheit ist, dass sie vergleichsweise viel mehr davon profitieren, von uns zu lernen, während wir über sie herrschen, als dass sie umgekehrt immer noch so unterschiedliche Stämme sind, wie wir es vor vielen Jahren waren, als wir nach Hellas fuhren.\n\nTrotzdem mangelt es uns in unserer zivilisierten Art an der Entschlossenheit und Furchtlosigkeit, auf die wir vor all den Jahren verzichtet haben, also brauchen wir sie genauso, wie sie uns brauchen. Dies gilt umso mehr, weil sie sich im Tal und in der Umgebung auskennen.\n\nAls solche beginnen wir, mit einem gewissen Maß an Brüderlichkeit und Mitgefühl zusammenzuleben, und am Ende kann es sein, dass wir das Tal als Gleichberechtigte mit ihnen teilen.#>  #NT!
 me_tayuan.21.a: "Time will tell."  #<Die Zeit wird es zeigen.#>  #NT!
  
 me_tayuan.22.title: "$tayuan_task_14$"  #<$tayuan_task_14$#>  #NT!
 me_tayuan.22.desc: "No one would have expected that our traditional ways of spearmen would mesh so well with the horses of the steppe, but these are some of the greatest horses available in the world, who would bleed for their riders, and as such our army is now a strange but effective hybrid between Greek warfare and Bactrian warfare.\n\nMany among the corps and on the streets have begun to call our army the #E ''Lóchos of the Jaxartes''#!, but so far it remains an unofficial name. It falls to us to decide if that is a name we wish to adopt for it."  #<Niemand hätte erwartet, dass unsere traditionellen Arten der Speerkämpfer so gut zu den Pferden der Steppe passen würden, aber dies sind einige der größten Pferde der Welt, die für ihre Reiter bluten würden, und als solche ist unsere Armee jetzt eine seltsame, aber effektive Mischung aus griechischer Kriegsführung und baktrischer Kriegsführung.\n\nViele im Korps und auf den Straßen haben begonnen, unsere Armee die #E „Lóchos der Jaxartes“#!, zu nennen aber bisher bleibt es ein inoffizieller Name. Es liegt an uns zu entscheiden, ob wir diesen Namen dafür übernehmen möchten.#>  #NT!
 me_tayuan.22.a: "An interesting idea."  #<Eine interessante Idee.#>  #NT!
  
 me_tayuan.23.title: "$tayuan_task_15$"  #<$tayuan_task_15$#>  #NT!
 me_tayuan.23.desc: "Political maneuvering is not work for the lesser of intellect and will. The [ROOT.GetCountry.GetRulerTitle] of the Ionians of Ferghana, if he wishes to remain in his princely condition, must anyway learn to navigate the Boules and Ekklesías of the polises of the valley, electing and deliberating on a universe of things at any given time, and form a consensus to make the valley move forward as one.\n\nIt is an awkward compromise, born from the Ionians of the valley wishing to retain their ways of living, that being democracy, but it is well known that those fell apart without much forcing; in such a hostile environment as the one we live in, individual cities would be picked apart by the vultures. If the cities want to preserve their right to assembly, the court preserves its right to rule over them."  #<Politisches Manövrieren ist keine Arbeit für Menschen mit geringerem Intellekt und Willen. Wenn der [ROOT.GetCountry.GetRulerTitle] der Ionier von Ferghana in seinem fürstlichen Status bleiben möchte, muss er auf jeden Fall lernen, sich durch die Boules und Ekklesías der Polis des Tals zu bewegen, zu jeder Zeit ein Universum von Dingen zu wählen und darüber zu beraten und einen Konsens zu bilden, damit das Tal als Einheit voranschreitet.\n\nEs ist ein heikler Kompromiss, der aus dem Wunsch der Ionier des Tals entstand, ihre Lebensweise beizubehalten, nämlich die Demokratie, aber sie Es ist bekannt, dass diese ohne großen Kraftaufwand auseinanderfielen; In einer so lebensfeindlichen Umgebung wie der, in der wir leben, würden die Geier einzelne Städte auseinandernehmen. Wenn die Städte ihr Versammlungsrecht wahren wollen, behält das Gericht sein Herrschaftsrecht über sie.#>  #NT!
 me_tayuan.23.a: "For our protection."  #<Zu unserem Schutz.#>  #NT!
  
 me_tayuan.24.title: "[SCOPE.sChar('tayuan_explorer').GetPraenomen] Daringly Escapes"  #<[SCOPE.sChar('tayuan_explorer').GetPraenomen] Gewagte Fluchten#>  #NT!
 me_tayuan.24.desc: "Chased by the fast Sogdian horses, who some swore were sweating blood in their unbridled chase of our men, [SCOPE.sChar('tayuan_explorer').GetPraenomen] wagered that there were only two ways to proceed; either get captured and wait for ransomed, or give battle to the [GetCulture('sogdian').GetName] bandits.\n\nAs such, when the chase got near a small embankment near [GetProvince('(int32)6790').GetName], our riders reorganized and proceeded to crash into the enemy riders. Inexperienced thugs, the whoresons were caught entirely by surprise, and entirely routed; sadly, some of our valiant riders perished on their saddles.\nSome time later a patrol of the Sogdian king apologised profusely, and offered our men compensation in gold for our losses. The king, he says, wishes to see no disagreements bubble out of thin air."  #<Gejagt von den schnellen sogdischen Pferden, von denen einige schworen, dass sie bei ihrer ungezügelten Jagd auf unsere Männer Blut schwitzten, wettete [SCOPE.sChar('tayuan_explorer').GetPraenomen], dass es nur zwei Möglichkeiten gab, weiterzumachen; Entweder werden sie gefangen genommen und warten auf Lösegeld, oder sie liefern sich den Kampf gegen die [GetCulture('sogdian').GetName]-Banditen.\n\nAls die Verfolgungsjagd in die Nähe einer kleinen Böschung in der Nähe von [GetProvince('(int32)6790').GetName] kam, organisierten sich unsere Reiter neu und fuhren damit fort, mit den feindlichen Reitern zusammenzustoßen. Unerfahrene Schläger, die Hurensöhne, wurden völlig überrascht und völlig in die Flucht geschlagen; Leider kamen einige unserer tapferen Reiter auf ihren Sätteln ums Leben.\nEinige Zeit später entschuldigte sich eine Patrouille des sogdischen Königs überschwänglich und bot unseren Männern eine Entschädigung in Gold für unsere Verluste an. Der König, sagt er, wolle nicht, dass Meinungsverschiedenheiten aus dem Nichts aufsprudeln.#>  #NT!
 me_tayuan.24.a: "A grim picture of our situation."  #<Ein düsteres Bild unserer Situation.#>  #NT!
  
 me_tayuan.25.title: "Hooves Of Desperation"  #<Hufe der Verzweiflung#>  #NT!
 me_tayuan.25.desc: "As the [GetCulture('sogdian').GetName]#E s#! no longer have a kingdom to speak of, they now look upon us almost as brothers, something of champions of their humble cause; they too are a people far away from home, kicked out north by foreign forces, so we could do nought but show them our kindness.\n\n Today, an emotional delegation led by a [SCOPE.sChar('sogdianbro').GetName] passed through [ROOT.GetCountry.GetCapital.GetName], begging us to show mercy to the defeated #E Sogdians#!, who have accepted their new status in our society with humility. Our men already practice together in the fields, and we have discovered that they have the most amazing horses, capable of enduring any strain put on them. Many among us have shown themselves willing to learn these new ways of warfare on horseback, and our army is becoming quite proficient in it."  #<Da die [GetCulture('sogdian').GetName]#E s#! kein nennenswertes Königreich mehr haben, betrachten sie uns jetzt fast als Brüder, so etwas wie Verfechter ihrer bescheidenen Sache; Auch sie sind ein Volk weit weg von zu Hause, das von fremden Kräften in den Norden vertrieben wurde, sodass wir nichts anderes tun konnten, als ihnen unsere Freundlichkeit zu zeigen.\n\n Heute reiste eine emotionale Delegation unter der Leitung eines [SCOPE.sChar('sogdianbro').GetName] durch [ROOT.GetCountry.GetCapital.GetName] und flehte uns an, den besiegten #E Sogdiern#! Gnade zu erweisen, die ihren neuen Status in unserer Gesellschaft mit Demut akzeptiert haben. Unsere Männer üben bereits gemeinsam auf den Feldern und wir haben festgestellt, dass sie die erstaunlichsten Pferde haben, die jeder Belastung standhalten können. Viele von uns haben gezeigt, dass sie bereit sind, diese neuen Methoden der Kriegsführung zu Pferd zu erlernen, und unsere Armee beherrscht sie mittlerweile recht gut.#>  #NT!
  
 me_tayuan.26.title: "Fit for Living"  #<Fit zum Leben#>  #NT!
 me_tayuan.26.desc: "Although our lands are battered by cold winds which rush through our fields and farmlands like an invading army, our farmers are undeterred by the morning frost upon the ground or their aching, blistered hands - the backbreaking work they do is vital to our survival, and they know it.\n\nBefore the faint rays of the rising sun crest over the snow-capped peaks, they are out working, breaking up clods of the frozen earth with shovels and spades. The hours pass by unmeasured, punctuated only by the sound of groaning cattle as they strain under the whips of their masters.\n\nThis land is hostile, but we are determined to make [ROOT.GetCountry.GetName] a place that is fit for living."  #<Obwohl unser Land von kalten Winden heimgesucht wird, die wie eine Invasionsarmee über unsere Felder und Ackerflächen rasen, lassen sich unsere Bauern weder vom Morgenfrost auf dem Boden noch von ihren schmerzenden, blasigen Händen abschrecken – die Knochenarbeit, die sie leisten, ist lebenswichtig für unser Überleben, und sie wissen es.\n\nBevor die schwachen Strahlen der aufgehenden Sonne über den schneebedeckten Gipfeln aufgehen, machen sie sich an die Arbeit und brechen mit Schaufeln und Spaten Klumpen der gefrorenen Erde auf. Die Stunden vergehen maßlos, nur unterbrochen vom Geräusch stöhnender Rinder, die sich unter den Peitschen ihrer Herren abmühen.\n\nDieses Land ist feindselig, aber wir sind entschlossen, [ROOT.GetCountry.GetName] zu einem lebenswerten Ort zu machen.#>  #NT!
 me_tayuan.26.a: "Our people thrive, like a flower growing in the cleft of the mountains"  #<Unser Volk gedeiht wie eine Blume, die in der Bergspalte wächst#>  #NT!
  
 me_tayuan.27.title: "Down The Open Plains"  #<Unten in den offenen Ebenen#>  #NT!
 me_tayuan.27.desc: "[ROOT.GetCountry.GetRuler.GetName] has been pleased to hear of the victories won by our warriors against the savages living in [GetProvince('(int32)6789').GetArea.GetName]. The horselords fought bravely, it must be admitted, but in the end, they were no match for our battle-hardened [ROOT.GetCountry.GetAdjective] soldiers, the veterans of a hundred campaigns.\n\nOur enemies have been scattered before us, and those lucky to escape with their lives have fled deep into the steppe."  #<[ROOT.GetCountry.GetRuler.GetName] war erfreut, von den Siegen zu hören, die unsere Krieger gegen die in [GetProvince('(int32)6789').GetArea.GetName] lebenden Wilden errungen haben. Die Reiterlords kämpften tapfer, das muss man zugeben, aber am Ende waren sie unseren kampferprobten [ROOT.GetCountry.GetAdjective] Soldaten, den Veteranen von hundert Feldzügen, nicht gewachsen.\n\nUnsere Feinde wurden vor uns zerstreut, und diejenigen, die das Glück hatten, mit dem Leben davonzukommen, sind tief in die Steppe geflohen.#>  #NT!
 me_tayuan.27.a: "The gods of war ride alongside [ROOT.GetCountry.GetName]!"  #<Die Kriegsgötter reiten neben [ROOT.GetCountry.GetName]!#>  #NT!
  
 me_tayuan.28.title: "A Sogdian Emporium"  #<Ein sogdisches Handelszentrum#>  #NT!
 me_tayuan.28.desc: "It came as a surprise to [ROOT.GetCountry.GetRuler.GetName] when [SCOPE.sChar('sogdianbro').GetName], a leader in the Sogdian community, approached [ROOT.GetCountry.GetRuler.GetHerHim] with a request for an audience. The wily Sogdian claimed that there was an important financial matter to discuss, one that would be of great benefit to our countrymen, but that time was of the essence and moves would have to be made sooner rather than later. The [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] accepted at once, having become intrigued by the vague promise of riches to be gained, and the two met quietly one afternoon in [ROOT.GetCountry.GetCapital.GetName].\n\nBefore they were subdued by our armies, the Sogdians were making a name for themselves as traders and merchants, and although they have lost their independence, they have discovered that they are free to make money throughout our realm and beyond - a situation that naturally pleases the gold-loving [SCOPE.sChar('sogdianbro').GetFirstName]. Our armies safeguard the trade routes, allowing the Sogdian merchants to travel to wherever they like; what more could they ask for?\n\nApparently a permanent structure. What [SCOPE.sChar('sogdianbro').GetSheHe] has proposed is rather simple; in a gesture of goodwill, the Sogdians would like to build one of their famed #E Sogdian Emporiums#! within our capital, but the treasuries of [ROOT.GetCountry.GetName] would have to support the building efforts."  #<Es war eine Überraschung für [ROOT.GetCountry.GetRuler.GetName], als [SCOPE.sChar('sogdianbro').GetName], ein Anführer der sogdischen Gemeinschaft, mit der Bitte um eine Audienz an [ROOT.GetCountry.GetRuler.GetHerHim] herantrat. Der schlaue Sogdier behauptete, es gäbe eine wichtige finanzielle Angelegenheit zu besprechen, die für unsere Landsleute von großem Nutzen wäre, aber dass die Zeit dränge und Maßnahmen eher früher als später ergriffen werden müssten. Die [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetRulerTitle] stimmten sofort zu, da sie von der vagen Verheißung von Reichtümern fasziniert waren, und die beiden trafen sich eines Nachmittags im Jahr [ROOT.GetCountry.GetCapital.GetName] stillschweigend.\n\nBevor sie von unseren Armeen unterworfen wurden, machten sich die Sogdier einen Namen als Händler und Kaufleute, und obwohl sie ihre Unabhängigkeit verloren haben, haben sie entdeckt, dass sie in unserem gesamten Reich und darüber hinaus frei Geld verdienen können – eine Situation, die natürlich erfreulich ist der Goldliebhaber [SCOPE.sChar('sogdianbro').GetFirstName]. Unsere Armeen schützen die Handelsrouten und ermöglichen es den sogdischen Kaufleuten, dorthin zu reisen, wohin sie wollen; Was will man mehr?\n\nAnscheinend eine permanente Struktur. Was [SCOPE.sChar('sogdianbro').GetSheHe] vorgeschlagen hat, ist ziemlich einfach; Als Geste des guten Willens würden die Sogdier gerne eines ihrer berühmten #E Sogdian Emporiums#! in unserer Hauptstadt errichten, aber die Staatskassen von [SCOPE.sChar('sogdianbro').GetName]0 müssten die Baubemühungen unterstützen.#>  #NT!
 me_tayuan.28.a: "A splendid idea...of course you can do this!"  #<Eine großartige Idee ... natürlich können Sie das tun!#>  #NT!
 me_tayuan.28.b: "There is no room in [ROOT.GetCountry.GetCapital.GetName] for one of your filthy markets"  #<In [ROOT.GetCountry.GetCapital.GetName] ist kein Platz für einen deiner schmutzigen Märkte#>  #NT!
  
