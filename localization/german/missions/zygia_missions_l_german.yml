 dove_of_flowing_waters: "Dove of the Lady of Flowing Waters"  #<Taube der Dame der fließenden Gewässer>  #NT!
 dove_of_flowing_waters_desc: "This dove pendant represents the avian form of one of the daughters of the Lady of Flowing Waters who's marble white home sits at the bottom of the Maeotis."  #<Dieser Taubenanhänger stellt die Vogelform einer der Töchter der Dame der fließenden Wasser dar, deren marmorweißes Zuhause am Fuße der Maeotis liegt.>  #NT!
  
 statue_of_flowing_waters: "Statue of the Lady of Flowing Waters"  #<Statue der Dame der fließenden Wasser>  #NT!
 statue_of_flowing_waters_desc: "This statue serves to remind the people of the coast about their divine Lady waiting in her pale house at the bottom of the sea."  #<Diese Statue soll die Küstenbewohner an ihre göttliche Dame erinnern, die in ihrem hellen Haus auf dem Meeresgrund wartet.>  #NT!
  
 red_white_apple: "The Red-White Apple of the Golden Tree"  #<Der rot-weiße Apfel des goldenen Baumes>  #NT!
 red_white_apple_desc: "Preserved from the Golden Tree of the Narts, the half-red, half-white apple represents both the power and temptation of the divine."  #<Der halb rote, halb weiße Apfel, konserviert aus dem Goldenen Baum der Narts, repräsentiert sowohl die Macht als auch die Versuchung des Göttlichen.>  #NT!
  
 # NARTIC DEITY MISC. 
  
 turpal_breed: "Turpal's Descendant Steeds"  #<Turpals Nachkommen-Rosser>  #NT!
