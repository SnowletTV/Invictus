l_german:
  
 zygia_missions: "Era of the High Ones"  #<Ära der Hohen>  #NT! #Autotranslate WIP V1.11.0.2 - Tayuan (4.03.2026) UNGEPRÜFT
 zygia_missions_DESCRIPTION: "Long considered an insignificant group of tribes, the raiding, piratical Zygii foretell a great future of conquest, expansion, and union with their Maeotian cousins to form a great nation of tribal folk in the Northern Caucasian mountains. The forefathers of the Adyghe, the Circassians, they shall take the necessary steps to transform their mountainous backwater into a staunch beacon of hope for the tribes of the north."  #<Lange galten die plündernden, piratischen Zygii als unbedeutende Stammesgruppe und prophezeien eine große Zukunft der Eroberung, Expansion und Vereinigung mit ihren mäotischen Cousins, um eine große Stammesnation im nördlichen Kaukasus zu bilden. Die Vorfahren der Adyghe, die Tscherkessen, werden die notwendigen Schritte unternehmen, um ihr bergiges Hinterland in einen unerschütterlichen Hoffnungsträger für die Stämme des Nordens zu verwandeln.>  #NT!
 zygia_missions_CRITERIA_DESCRIPTION: "The mission will complete when the Zygii have formed a great nation of tribes or have championed worship of the Narts, great heroes of myth and legend."  #<Die Mission wird abgeschlossen sein, wenn die Zygii eine große Stammesnation gebildet haben oder sich für die Verehrung der Narts, großer Helden aus Mythen und Legenden, eingesetzt haben.>  #NT!
 zygia_missions_BUTTON_TOOLTIP: "Down from the Mountains!"  #<Runter von den Bergen!>  #NT!
 zygia_missions_BUTTON_DETAILS: ""
  
  #Missions 
  
 zygia_missions_task_1: "Pontic Piracy"  #<Pontische Piraterie>  #NT!
 zygia_missions_task_1_DESC: "Known best for their pirate tactics, the Zygii will only find mountains of wealth by raiding the nearby ports and establishing safe havens for identity-less ships."  #<Die Zygii, die vor allem für ihre Piratentaktiken bekannt sind, werden nur dann Berge an Reichtum finden, wenn sie die nahegelegenen Häfen überfallen und sichere Häfen für Schiffe ohne Identität schaffen.>  #NT!
  
 zygia_missions_task_2: "Relations with the Heniochi"  #<Beziehungen zu den Heniochi>  #NT!
 zygia_missions_task_2_DESC: "A tribe of equal tradition and ferocity, the Heniochi's future ties to the Zygii must be decided diplomatically before war takes shape."  #<Da es sich um einen Stamm mit gleicher Tradition und Wildheit handelt, müssen die künftigen Verbindungen der Heniochi zu den Zygii diplomatisch geklärt werden, bevor ein Krieg Gestalt annimmt.>  #NT!
 zygia_missions_task_2_tt: "Discussions with the #Y Heniochi#! shall determing our future relationship with them."  #<Gespräche mit den #Y Heniochi#! werden über unsere zukünftige Beziehung zu ihnen entscheiden.>  #NT!
  
 zygia_missions_task_3: "Zygian Outposts"  #<Zygische Außenposten>  #NT!
 zygia_missions_task_3_DESC: "With the pirate havens abroad supporting Zygian ships, the sailing brigands should be able to more permanently establish themselves in minor ports."  #<Da die Piratenhäfen im Ausland zygische Schiffe unterstützen, sollten die Segelräuber in der Lage sein, sich dauerhafter in kleineren Häfen niederzulassen.>  #NT!
  
 zygia_missions_task_4: "Nikopsian Trade"  #<Nikopsianischer Handel>  #NT!
 zygia_missions_task_4_DESC: "The port of Torikos, known to others by another name, must become a prosperous trading hub to fuel Zygian economic growth and expansion."  #<Der Hafen von Torikos, den andere unter einem anderen Namen kennen, muss zu einem florierenden Handelsknotenpunkt werden, um das Wirtschaftswachstum und die Expansion Zygians voranzutreiben.>  #NT!
  
 zygia_missions_task_5: "The Region of Zyx"  #<Die Region Zyx>  #NT!
 zygia_missions_task_5_DESC: "Know to the elders of the tribes as the core region of the ancient Zygii peoples, Zyx represents a forgotten homeland which needs to be reclaimed."  #<Den Ältesten der Stämme ist Zyx als Kernregion der alten Zygii-Völker bekannt. Zyx stellt eine vergessene Heimat dar, die zurückerobert werden muss.>  #NT!
 zygia_missions_task_5_tt: " #Y Zygia#! must #E own#! or have a #E subject own#! all the #T highlighted#! territories which comprise the region of #T Zyx#!."  #<#Y Zygia#! muss #E alle #T hervorgehobenen#! Gebiete besitzen, die die Region von #T Zyx#! umfassen.>  #NT!
  
 zygia_missions_task_6: "Khabzism"  #<Chabzismus>  #NT!
 zygia_missions_task_6_DESC: "Honor. Compassion. Gatuitous help. These three cultural values command the respect of our elders and define the roles in Zygian society. In order to carry the traditions forward, these values of Khabzism must be enshrined by the worship of Theshkhue."  #<Ehre. Mitgefühl. Unaufgeforderte Hilfe. Diese drei kulturellen Werte erfordern den Respekt unserer Ältesten und definieren die Rollen in der zygischen Gesellschaft. Um die Traditionen fortzuführen, müssen diese Werte des Chabzismus durch die Verehrung von Theshkhue verankert werden.>  #NT!
 #zygia_missions_task_6_tt: "____."  #<None>  #NT!
  
 zygia_missions_task_7: "Raiding the Hypanis"  #<Überfall auf die Hypanis>  #NT!
 zygia_missions_task_7_DESC: "Situated on the eastern side of the Cimmerian Bosporus, the city of Phanagoria appears ripe for plunder and enslavement. See to it that our 'pirate' fleet is not seen entering its waters until it is too late."  #<Die Stadt Phanagoria liegt an der Ostseite des kimmerischen Bosporus und scheint reif für Plünderung und Versklavung zu sein. Sorgen Sie dafür, dass unsere „Piraten“-Flotte erst dann gesehen wird, wenn sie in ihre Gewässer eindringt, wenn es zu spät ist.>  #NT!
 zygia_missions_task_7_tt1: " #Y Zygia#! must have a #E navy#! with at least #Y 15 liburnians#! and a #T commander#!."  #<#Y Zygia#! muss eine #E Marine#! mit mindestens #Y 15 Liburniern#! und einen #T Kommandanten#! haben.>  #NT!
 zygia_missions_task_7_tt2: " #Y Zygia#! has turned on #Y Increased Pay#! for #T Fleet Maintenance#!."  #<#Y Zygia#! hat #Y erhöhte Bezahlung#! für #T Flottenwartung#! aktiviert.>  #NT!
  
 zygia_missions_task_8: "Hard Mountain Horses"  #<Harte Bergpferde>  #NT!
 zygia_missions_task_8_DESC: "Among the many tribes of the mountains from Zygia to Albania, the horses of the northwest are hard beasts of burden and the sturdiest warhorses one could hope for. Train a band's worth of them, and the Zygian forces will be uncontested."  #<Unter den vielen Stämmen der Berge von Zygia bis Albanien sind die Pferde des Nordwestens harte Lasttiere und die robustesten Kriegsrösser, die man sich wünschen kann. Bilden Sie eine ganze Truppe von ihnen aus, und die zygischen Streitkräfte werden unbestritten sein.>  #NT!
  
 zygia_missions_task_9: "The Eastern Maeotis"  #<Die östlichen Maeotis>  #NT!
 zygia_missions_task_9_DESC: "The marshes of the Maeotis, while mystical and swampy, are home to many of the divine beings as well as trading opportunities. Let the Zygii take it for themselves and prosper."  #<Die Sümpfe der Maeotis sind zwar mystisch und sumpfig, beherbergen aber auch viele göttliche Wesen und bieten Handelsmöglichkeiten. Lassen Sie die Zygii es für sich übernehmen und gedeihen.>  #NT!
  
 zygia_missions_task_10: "Zygian Federation"  #<Zygische Föderation>  #NT!
 zygia_missions_task_10_DESC: "With the influx of new tribes and clans, managing the lands of the Zygii has become a tricky affair under the currently weak and simple structure of political hierarchy. To ensure stability, we must invite the many clan lords and engage with them to create a greater federation of the tribes."  #<Mit dem Zustrom neuer Stämme und Clans ist die Verwaltung des Landes der Zygii unter der derzeit schwachen und einfachen Struktur der politischen Hierarchie zu einer schwierigen Angelegenheit geworden. Um Stabilität zu gewährleisten, müssen wir die vielen Clanherren einladen und mit ihnen zusammenarbeiten, um eine größere Föderation der Stämme zu schaffen.>  #NT!
  
 zygia_missions_task_11: "Worshiping Narts"  #<Narts anbeten>  #NT!
 zygia_missions_task_11_DESC: "The Narts, heroes of old, serve as our guide for the best of women and men in the time when deities roamed the land. To embolden our own warriors and our people, we must cherish the stories and memories of the Narts."  #<Die Narts, Helden der alten Zeit, dienen als Führer für die besten Frauen und Männer in der Zeit, als Gottheiten das Land durchstreiften. Um unsere eigenen Krieger und unser Volk zu ermutigen, müssen wir die Geschichten und Erinnerungen der Narts schätzen.>  #NT!
 zygia_missions_task_11_tt: "State Pantheon must contain #Y 4#! Nartic religion deities, with their Holy Sites under our control."  #<Das Staatspantheon muss #Y 4#! Gottheiten der Nartic-Religion enthalten, deren heilige Stätten unter unserer Kontrolle stehen.>  #NT!
  
 zygia_missions_task_12: "The Lady of Flowing Waters"  #<Die Dame der fließenden Gewässer>  #NT!
 zygia_missions_task_12_DESC: "The legends of the Nart heroes: Pija and Pizighash, speak of a time when the brothers journeyed to the coast of the Maeotis, and there found a passageway below the waves to the pale home of the Lady of Flowing Waters. Like the heroes of old, the Zygii must make such a journey, or at least offer the faithful the opportunity to."  #<Die Legenden der Nart-Helden Pija und Pizighash erzählen von einer Zeit, als die Brüder an die Küste der Maeotis reisten und dort unter den Wellen einen Durchgang zum bleichen Haus der Dame der fließenden Wasser fanden. Wie die Helden der alten Zeit müssen die Zygii eine solche Reise unternehmen oder den Gläubigen zumindest die Möglichkeit dazu bieten.>  #NT!
 zygia_missions_task_12_tt: "#E The Lady of Flowing Water's#! #T holy site#! is in #Y Pataroue#!."  #<#E Die heilige Stätte#!#! #T der Dame des fließenden Wassers#! befindet sich in #Y Pataroue#!.>  #NT!
  
 zygia_missions_task_13: "Zichia"  #<Zichia>  #NT!
 zygia_missions_task_13_DESC: "To survive, not as a puppet but as an independent people, the Zygii must forge a lasting kingdom which shall mark their history and traditions in the stories told for generations. Quiet voices speak of a greater 'Zichia,' a mythical border which enshrouds the homelands of our tribes. This must be made our people's realm."  #<Um zu überleben, nicht als Marionette, sondern als unabhängiges Volk, müssen die Zygii ein dauerhaftes Königreich errichten, das ihre Geschichte und Traditionen in den über Generationen erzählten Geschichten prägen wird. Leise Stimmen sprechen von einem größeren „Zichia“, einer mythischen Grenze, die die Heimatländer unserer Stämme umhüllt. Dies muss zum Reich unseres Volkes gemacht werden.>  #NT!
  
 zygia_missions_task_14: "Kingdom of the Narts"  #<Königreich der Narts>  #NT!
 zygia_missions_task_14_DESC: "In order to project an image of strength and unify the peoples' identity, the legends of our Nart ancestors must be our bedrock for legal framework and traditions. Thus, the Zygii shall forge a kingdom ruled by the ."  #<Um ein Bild der Stärke zu vermitteln und die Identität der Völker zu vereinen, müssen die Legenden unserer Nart-Vorfahren unser Fundament für rechtliche Rahmenbedingungen und Traditionen bilden. Auf diese Weise werden die Zygii ein Königreich errichten, das von ihnen regiert wird.>  #NT!
 #zygia_missions_task_14_tt: "____."  #<None>  #NT!
  
 zygia_missions_task_15: "The Golden Tree"  #<Der goldene Baum>  #NT!
 zygia_missions_task_15_DESC: "Legends speak of a golden tree which the Narts guarded; its apples, one half white, the other red, produced fantastic children, males of Nart stock. Rumors speak of such a tree up in the mountains - the Zygii must take up and guard this tree to bear stronger children and claim the heritage of heroes."  #<Legenden erzählen von einem goldenen Baum, den die Narts bewachten; Seine Äpfel, eine Hälfte weiß, die andere rot, brachten fantastische Kinder hervor, Männchen vom Nart-Stamm. Gerüchten zufolge soll es einen solchen Baum oben in den Bergen geben – die Zygii müssen diesen Baum bewachen, um stärkere Kinder zu gebären und das Erbe der Helden zu beanspruchen.>  #NT!
 zygia_missions_task_15_tt: "#E Dische Zhig's#! #T holy site#! is in #Y Skarin#!."  #<#E Dische Zhigs#! #T heilige Stätte#! befindet sich in #Y Skarin#!.>  #NT!
  
  
  #Tooltips 
  
  
  
  #Modifiers 
  
 zygian_ambitions: "Zygian Ambitions"  #<Zygische Ambitionen>  #NT!
 desc_zygian_ambitions: "The Zygii refuse to remain couped up in their small sliver of a coastal mountain valley!"  #<Die Zygii weigern sich, in ihrem kleinen Küstengebirgstal eingepfercht zu bleiben!>  #NT!
  
 zygian_piracy: "Zygian Piracy"  #<Zygische Piraterie>  #NT!
 desc_zygian_piracy: "The Zygian pirates have set up a luxurious trading network in the Pontos Euxinos."  #<Die zygischen Piraten haben im Pontos Euxinos ein luxuriöses Handelsnetzwerk aufgebaut.>  #NT!
  
 zygian_pirates: "Zygian Pirates"  #<Zygische Piraten>  #NT!
 desc_zygian_pirates: "Our port has become infested with Zygian pirates"  #<Unser Hafen ist von zygischen Piraten heimgesucht worden>  #NT!
  
 zygian_pirate_haven_modifier: "Zygian Pirate Haven"  #<Zygischer Piratenhafen>  #NT!
 desc_zygian_pirate_haven_modifier: "Zygian pirates return here to resupply and purchase goods before heading off to raid the Pontos Euxinos."  #<Zygische Piraten kehren hierher zurück, um Vorräte zu versorgen und Waren zu kaufen, bevor sie sich auf den Weg machen, um die Pontos Euxinos zu überfallen.>  #NT!
  
 nikposis_merchants: "Nikopsis Merchants"  #<Nikopsis-Händler>  #NT!
 desc_nikposis_merchants: "With a growing trade economy, merchants have begun arriving at the Zygian port hub."  #<Mit der wachsenden Handelswirtschaft strömen immer mehr Händler in den Hafen von Zygian.>  #NT!
  
 zygian_mountain_horses: "Zygian Mountain Horses"  #<Zygische Bergpferde>  #NT!
 desc_zygian_mountain_horses: "The hardy horses of the Zygian are reared lovingly and with traditional methods."  #<Die robusten Pferde der Zygianer werden liebevoll und nach traditionellen Methoden aufgezogen.>  #NT!
  
 zygian_cavalry: "Zygian Cavalry"  #<Zygische Kavallerie>  #NT!
 desc_zygian_cavalry: "The hardy horses of the Zygii, while great in the fields, also prove to be steady warhorses."  #<Die robusten Pferde der Zygii sind zwar großartig auf den Feldern, erweisen sich aber auch als standhafte Kriegspferde.>  #NT!
  
 building_east_maeotis: "Building Up The Eastern Maeotis"  #<Aufbau der östlichen Maeotis>  #NT!
 desc_building_east_maeotis: "Enforced peace in the lands east of the Maeotis has led to a boom in population and production."  #<Der erzwungene Frieden in den Ländern östlich der Maeotis hat zu einem Bevölkerungs- und Produktionsboom geführt.>  #NT!
  
 lady_of_the_lake: "Lady of the Lake"  #<Dame vom See>  #NT!
 desc_lady_of_the_lake: "The legends of the lady of the lake bring many people to the coast and goads their faith."  #<Die Legenden der Dame vom See locken viele Menschen an die Küste und stärken ihren Glauben.>  #NT!
  
 lake_legends: "Lake Legends"  #<Seelegenden>  #NT!
 desc_lake_legends: "The legends of the flowing lady of the Maeotis has led to greater belief in the Narts and the spirits."  #<Die Legenden über die fließende Dame der Maeotis haben zu einem stärkeren Glauben an die Narts und die Geister geführt.>  #NT!
  
 zygian_confederacy: "Zygian Confederacy"  #<Zygische Konföderation>  #NT!
 desc_zygian_confederacy: "The confederation of the Zygii and other Caucasian tribes has made the region welcoming to new peoples."  #<Die Konföderation der Zygii und anderer kaukasischer Stämme hat dazu geführt, dass die Region neue Völker willkommen heißt.>  #NT!
  
 rule_of_narts: "Rule of the Narts"  #<Regel der Narts>  #NT!
 desc_rule_of_narts: "The council of the Narts are now worshiped, in all their vast extent."  #<Der Rat der Narts wird heute in seiner ganzen Ausdehnung verehrt.>  #NT!
  
 khabzism_instated: "Instated Law of Khabzism"  #<Eingesetztes Gesetz des Chabzismus>  #NT!
 desc_khabzism_instated: "The people of Zygia have centralized their faith around the monistic worship of Tha's Law."  #<Die Menschen in Zygia haben ihren Glauben auf die monistische Verehrung des Tha-Gesetzes konzentriert.>  #NT!
  
 nart_worship: "Nart Worship"  #<Nart-Gottesdienst>  #NT!
 desc_nart_worship: "The Zygii have chosen to dedicate their prayers and faith to the Nart heroes of ancient memory."  #<Die Zygii haben beschlossen, ihre Gebete und ihren Glauben den Nart-Helden der alten Erinnerung zu widmen.>  #NT!
  
 golden_nart_tree: "The Golden Nart Tree"  #<Der goldene Nartbaum>  #NT!
 desc_golden_nart_tree: "Dische Zhig, the golden tree of the Narts, provides health and new children to the descendants of the ancient heroes."  #<Dische Zhig, der goldene Baum der Narts, schenkt den Nachkommen der alten Helden Gesundheit und neue Kinder.>  #NT!
  
 maeotic_marsh_grain: "Maeotic Marshy Grainlands"  #<Maeotisches sumpfiges Getreideland>  #NT!
 desc_maeotic_marsh_grain: "The Maeotic marshes have been cleared in some parts to open up grand, natural granaries."  #<Die maeotischen Sümpfe wurden teilweise gerodet, um große, natürliche Getreidespeicher zu erschließen.>  #NT!
  
 zygian_port_raiding_technique: "Zygian Port-Raiding Techniques"  #<Zygische Hafenüberfalltechniken>  #NT!
 desc_zygian_port_raiding_technique: "The raid on Phanagoria has taught the Zygii much about how to successfully enter a protected harbor and its defensive walls."  #<Der Überfall auf Phanagoria hat den Zygii viel darüber beigebracht, wie man erfolgreich in einen geschützten Hafen und seine Verteidigungsmauern eindringt.>  #NT!
  
 phanagoria_raided: "Phanagoria Raided"  #<Phanagoria überfallen>  #NT!
 desc_phanagoria_raided: "The Zygii pirates have raided the town of Phanagoria!"  #<Die Zygii-Piraten haben die Stadt Phanagoria überfallen!>  #NT!
  
 zygii_stolen_lands: "Lands Stolen by the Zygii"  #<Von den Zygii gestohlenes Land>  #NT!
 desc_zygii_stolen_lands: "The Zygii raiders have stolen proper coastal Colchian lands."  #<Die Zygii-Angreifer haben kolchische Küstengebiete gestohlen.>  #NT!
  
 phanagoria_jewish_quarter: "The Phanagorian Jewish Quarter"  #<Das phanagorische jüdische Viertel>  #NT!
 desc_phanagoria_jewish_quarter: "The influx of Jewish citizens migrating to Phanagoria has revitalized the city's trade."  #<Der Zustrom jüdischer Bürger, die nach Phanagoria auswanderten, hat den Handel der Stadt wiederbelebt.>  #NT!
  
 zygian_outpost: "Zygian Outposts"  #<Zygische Außenposten>  #NT!
 desc_zygian_outpost: "The Zygii have taken over and made these lands center of commerce."  #<Die Zygii haben dieses Land übernommen und zum Handelszentrum gemacht.>  #NT!
  
 zygian_frontier: "Zygian Frontier Ports"  #<Zygische Grenzhäfen>  #NT!
 desc_zygian_frontier: "Among the rough frontier-land, the Zygian ports are well-protected."  #<Inmitten des rauen Grenzlandes sind die zygischen Häfen gut geschützt.>  #NT!
  
 zygian_hero_fame: "Fame of the Zygian Hero"  #<Ruhm des zygischen Helden>  #NT!
 desc_zygian_hero_fame: "The hero of Pataroue has, with the tale of his adventure, made the city the talk of the land."  #<Der Held von Pataroue hat mit der Geschichte seines Abenteuers die Stadt zum Gesprächsthema im Land gemacht.>  #NT!
  
 aggressive_zygian_pasture: "Aggressive Reaction in Zygian Pastures"  #<Aggressive Reaktion auf zygischen Weiden>  #NT!
 desc_aggressive_zygian_pasture: "The Zygii raided our borderland pastures."  #<Die Zygii überfielen unsere Grenzlandweiden.>  #NT!
  
 zygian_pasture_negotiation: "Negotiations Over Zygian Pastures"  #<Verhandlungen über zygische Weiden>  #NT!
 desc_zygian_pasture_negotiation: "The Zygii were willing to properly re-negotiate the boundaries of our pasturelands on the frontier."  #<Die Zygii waren bereit, die Grenzen unserer Weidegebiete an der Grenze neu auszuhandeln.>  #NT!
  
  
  #Events 
  
 me_zygia_1_title: "A Pirate State"  #<Ein Piratenstaat>  #NT!
 me_zygia_1_desc: "The success of the raids against foreign ports has been greater than anticipated. In fact, multiple pirate ships have created vast networks along the sea's coast. Moving forward, the sailors who participated in the piracy have voiced their opinions that the Zygii should focus either on building a greater fleet of piracy-capable ships or on the process of establishing havens for piracy around the sea so that a black market can be established. What shall be done?"  #<Der Erfolg der Razzien gegen ausländische Häfen war größer als erwartet. Tatsächlich haben mehrere Piratenschiffe riesige Netzwerke entlang der Meeresküste aufgebaut. Für die Zukunft haben die Seeleute, die an der Piraterie beteiligt waren, ihre Meinung geäußert, dass sich die Zygii entweder auf den Aufbau einer größeren Flotte von Piraterie-fähigen Schiffen oder auf die Schaffung von Zufluchtsorten für Piraterie rund um das Meer konzentrieren sollten, damit ein Schwarzmarkt etabliert werden kann. Was ist zu tun?>  #NT!
 me_zygia_1.a: "A pirate market will be prosperous."  #<Ein Piratenmarkt wird florieren.>  #NT!
 me_zygia_1.b: "Construct the Zygian fleet!"  #<Baue die zygische Flotte!>  #NT!
 #me_zygia_1_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_1$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_1$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_2_title: "Pasture Disputes"  #<Weidestreitigkeiten>  #NT!
 me_zygia_2_desc: "Messengers have informed us that several shepherds of the tribes of the Heniochi have lately been bringing their animals onto our lands. Our tribal folk are complaining that this amounts to theft. Shall we do anything about this breach of social contract?"  #<Boten haben uns darüber informiert, dass mehrere Hirten der Stämme der Heniochi in letzter Zeit ihre Tiere auf unser Land gebracht haben. Unsere Stammesleute beschweren sich darüber, dass dies einem Diebstahl gleichkommt. Sollen wir etwas gegen diesen Bruch des Gesellschaftsvertrags unternehmen?>  #NT!
 me_zygia_2.a: "Teach them a permanent lesson about infringing on our lands."  #<Bringen Sie ihnen eine dauerhafte Lektion über die Verletzung unseres Landes bei.>  #NT!
 me_zygia_2.b: "We can make a deal about sharing the land."  #<Wir können einen Deal über die Aufteilung des Landes machen.>  #NT!
 me_zygia_2.c: "These troubles shall pass with time."  #<Diese Probleme werden mit der Zeit vergehen.>  #NT!
  
 me_zygia_3_title: "War with the Heniochi"  #<Krieg mit den Heniochi>  #NT!
 me_zygia_3_desc: "Angered by our previous aggression, the Heniochi have staged warrior bands along our border. Unless we attempt to reduce tensions and make a show of our goodwill, war is jsut beyond the horizon. What course of action shall we take?"  #<Verärgert über unsere vorherige Aggression haben die Heniochi entlang unserer Grenze Kriegerbanden aufgestellt. Wenn wir nicht versuchen, die Spannungen abzubauen und unseren guten Willen zum Ausdruck zu bringen, ist der Krieg kaum noch in Sicht. Welche Vorgehensweise sollen wir ergreifen?>  #NT!
 me_zygia_3.a: "They are nothing to fear."  #<Sie sind nichts, wovor man Angst haben muss.>  #NT!
 me_zygia_3.b: "Send a generous peace offering."  #<Senden Sie ein großzügiges Friedensangebot.>  #NT!
  
 me_zygia_4_title: "Partnering with the Heniochi"  #<Partnerschaft mit den Heniochi>  #NT!
 me_zygia_4_desc: "Following up on our previous signs of good faith negotiation, the Heniochi tribesmen would like to form a closer bond. We've been sent a small gift from their leader, a hard-working warrior whom they feel could advise us well. Shall we formalize a true alliance with these people?"  #<In Anlehnung an unsere früheren Verhandlungen in gutem Glauben würden die Heniochi-Stammesangehörigen gerne eine engere Bindung eingehen. Wir haben ein kleines Geschenk von ihrem Anführer geschickt, einem hart arbeitenden Krieger, von dem sie glauben, dass er uns ein guter Rat sein könnte. Sollen wir mit diesen Menschen ein echtes Bündnis eingehen?>  #NT!
 me_zygia_4.a: "Brothers in Arms!"  #<Waffenbrüder!>  #NT!
 me_zygia_4.b: "We shall keep our distance."  #<Wir werden Abstand halten.>  #NT!
  
 me_zygia_5_title: "Heniochi Integration"  #<Heniochi-Integration>  #NT!
 me_zygia_5_desc: "After a period of time, many of the Heniochian bands recognize the might and superiority of our warriors and economy. Amongst their elders, they've come to conclusion that more closely joining us would be in their best interests, both for their safety and to preserve their traditions within the domain of fellow tribesfolk. Shall we give them that final push to join our ranks?"  #<Nach einer gewissen Zeit erkennen viele heniochische Banden die Macht und Überlegenheit unserer Krieger und unserer Wirtschaft. Unter ihren Ältesten sind sie zu dem Schluss gekommen, dass eine engere Verbindung zu uns in ihrem besten Interesse wäre, sowohl zu ihrer Sicherheit als auch zur Bewahrung ihrer Traditionen innerhalb der Domäne ihrer Stammesgenossen. Sollen wir ihnen den letzten Anstoß geben, sich unseren Reihen anzuschließen?>  #NT!
 me_zygia_5.a: "Welcome our Heniochi brothers and sisters."  #<Begrüßen Sie unsere Heniochi-Brüder und -Schwestern.>  #NT!
 me_zygia_5.b: "Our Zygian kin must remain pure."  #<Unsere zygischen Verwandten müssen rein bleiben.>  #NT!
  
 me_zygia_6_title: "Status Quo with the Heniochi"  #<Status Quo mit den Heniochi>  #NT!
 me_zygia_6_desc: "While there have been ups and downs, especially along the borderlands between ourselves and the Heniochi, nothing drastic has taken place. For now, at least, they are content within their hillside villages and we in ours. Yet, the waves are restless, and the times are rapidly changing around us. The issue may rear its ugly head once again down the line."  #<Obwohl es Höhen und Tiefen gab, insbesondere entlang der Grenzgebiete zwischen uns und den Heniochi, ist nichts Drastisches passiert. Zumindest im Moment sind sie in ihren Bergdörfern zufrieden und wir in unserem. Doch die Wellen sind unruhig und die Zeiten um uns herum ändern sich schnell. Das Problem könnte später noch einmal sein hässliches Gesicht zeigen.>  #NT!
 me_zygia_6.a: "Let the times be peaceful for generations."  #<Lass die Zeiten für Generationen friedlich sein.>  #NT!
  
 me_zygia_7_title: "The Colchian Response"  #<Die kolchische Antwort>  #NT!
 me_zygia_7_desc: "Understandably, the Colchians are not pleased with us for taking over several of their prized ports. They have sent delegations to understand how long we plan to remain in the area and what it will take to make us leave for our own waters. What shall we do?"  #<Verständlicherweise sind die Kolcher nicht erfreut darüber, dass wir mehrere ihrer wertvollen Häfen übernommen haben. Sie haben Delegationen entsandt, um herauszufinden, wie lange wir in der Gegend bleiben wollen und wie lange es dauern wird, bis wir in unsere eigenen Gewässer aufbrechen. Was sollen wir tun?>  #NT!
 me_zygia_7.a: "Sell the Colchian ports back to them."  #<Verkaufen Sie die kolchischen Häfen an sie zurück.>  #NT!
 me_zygia_7.b: "They may yet let us keep the ports."  #<Vielleicht lassen sie uns die Häfen doch behalten.>  #NT!
 me_zygia_7.c: "Send them no messages or messengers!"  #<Schicken Sie ihnen keine Nachrichten oder Messenger!>  #NT!
  
 me_zygia_8_title: "Zygii Waystations"  #<Zygii-Wegstationen>  #NT!
 me_zygia_8_desc: "Now that the Zygii control foreign ports for good, it is time to make them lasting stations for trade and prosperity. How shall we invest in our new territory?"  #<Da die Zygii nun endgültig ausländische Häfen kontrollieren, ist es an der Zeit, sie zu dauerhaften Stationen für Handel und Wohlstand zu machen. Wie sollen wir in unser neues Territorium investieren?>  #NT!
 me_zygia_8.a: "From these ports, we shall conquer far and wide."  #<Von diesen Häfen aus werden wir weit und breit erobern.>  #NT!
 me_zygia_8.b: "Let them carry on our market reach."  #<Lassen Sie sie unsere Marktreichweite weiterführen.>  #NT!
 me_zygia_8.c: "It shall develop organically."  #<Es soll sich organisch entwickeln.>  #NT!
  
 me_zygia_9_title: "Defending the Zygii Outposts"  #<Verteidigung der Zygii-Außenposten>  #NT!
 me_zygia_9_desc: "Messengers relay that the Colchian troops have appeared on the horizon and are headed straight for our ports - it's going to be a difficult struggle to protect our new-gotten lands. We must do what we can."  #<Boten berichten, dass die kolchischen Truppen am Horizont aufgetaucht sind und direkt auf unsere Häfen zusteuern – es wird ein schwieriger Kampf sein, unser neu gewonnenes Land zu schützen. Wir müssen tun, was wir können.>  #NT!
 me_zygia_9.a: "To Arms!"  #<Zu den Waffen!>  #NT!
  
 me_zygia_10_title: "Nikopsis Merchants"  #<Nikopsis-Händler>  #NT!
 me_zygia_10_desc: "The Greco-Zygian merchant groups on the Zygian coasts have been able to turn a backwater rough-port into a bastion of trade, both legal and otherwise. Torikos has surpassed its stigma as a stagnant pirate haven, and now fills the trading needs of all the eastern Pontos Euxinos, rebranded as Nikopsis."  #<Den griechisch-zygischen Handelsgruppen an den zygischen Küsten ist es gelungen, einen rückständigen Hafen in eine Bastion des legalen und sonstigen Handels zu verwandeln. Torikos hat sein Stigma als stagnierendes Piratenparadies überwunden und erfüllt nun den Handelsbedarf aller östlichen Pontos Euxinos, umbenannt in Nikopsis.>  #NT!
 me_zygia_10.a: "Let the riches flow!"  #<Lass den Reichtum fließen!>  #NT!
 me_zygia_10_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_4$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_4$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_11_title: "Pride in Zyx"  #<Stolz auf Zyx>  #NT!
 me_zygia_11_desc: "Having re-obtained a cultural moniker, the Zygii have grown confident in their ability to project power throughout the region and become a truly dominant people among all the tribesmen living along the peaks of Kavkasos."  #<Nachdem die Zygii wieder einen kulturellen Spitznamen erhalten haben, sind sie zuversichtlicher geworden, dass sie in der gesamten Region Macht verbreiten und zu einem wirklich dominanten Volk unter allen Stammesangehörigen werden können, die entlang der Gipfel von Kavkasos leben.>  #NT!
 me_zygia_11.a: "For Zyx!"  #<Für Zyx!>  #NT!
 me_zygia_11_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_5$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_5$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_12_title: "Tha's Law"  #<Das ist Gesetz>  #NT!
 me_zygia_12_desc: "The guidance of Theshkhue, and the sound of his herald's coming, shall guide the Zygii for generations to come."  #<Die Führung von Theshkhue und der Klang des Kommens seines Herolds werden die Zygii für kommende Generationen leiten.>  #NT!
 me_zygia_12.a: "Faith in Theshkhue!"  #<Glaube an Theshkhue!>  #NT!
 me_zygia_12_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_6$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_6$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_13_title: "The Fate of Phanagoria"  #<Das Schicksal von Phanagoria>  #NT!
 me_zygia_13_desc: "With our pirates and warriors having broken into the city through its harbor and taking all important administrative buildings, the city of Phanagoria essentially belongs to the Zygii this day. However, should we leave, the soldiers of the Bosporan Kingdom will likely retake it within days, their grudge against us ever-stronger. What shall the fate of the cit y be?"  #<Da unsere Piraten und Krieger über den Hafen in die Stadt eingedrungen sind und alle wichtigen Verwaltungsgebäude eingenommen haben, gehört die Stadt Phanagoria heute im Wesentlichen den Zygii. Sollten wir jedoch abreisen, werden die Soldaten des Bosporanischen Königreichs es wahrscheinlich innerhalb weniger Tage zurückerobern, wobei ihr Groll gegen uns immer größer wird. Was wird das Schicksal der Stadt sein?>  #NT!
 me_zygia_13.a: "Take the best, leave the rest."  #<Nimm das Beste, lass den Rest.>  #NT!
 me_zygia_13.b: "Tear the city apart!"  #<Zerreiße die Stadt!>  #NT!
 me_zygia_13.c: "The Bosporans will likely strike a deal to let us keep it."  #<Die Bosporaner werden wahrscheinlich einen Deal abschließen, damit wir es behalten können.>  #NT!
 me_zygia_13.d: "It will a puppet of our own."  #<Es wird eine eigene Marionette sein.>  #NT!
 me_zygia_13.d.t: "The city of #Y Phanagoria#! will become a #Y League City#! of #E Zygia#!."  #<Die Stadt #Y Phanagoria#! wird eine #Y Ligastadt#! von #E Zygia#!.>  #NT!
  
 me_zygia_14_title: "The Phanagorian Jewish Quarter"  #<Das phanagorische jüdische Viertel>  #NT!
 me_zygia_14_desc: "With Phanagoria undergoing the slow rebuilding process, a fleet of Jewish merchants has arrived at the port, claiming that they are fleeing the chaos of the Diadochi and politics at home - they would like a fresh start. Should we invite them to settle in the port city?"  #<Während Phanagoria den langsamen Wiederaufbauprozess durchläuft, ist eine Flotte jüdischer Kaufleute im Hafen angekommen und behauptet, dass sie vor dem Chaos der Diadochen und der Politik zu Hause fliehen und einen Neuanfang wünschen würden. Sollten wir sie einladen, sich in der Hafenstadt niederzulassen?>  #NT!
 me_zygia_14.a: "Build them an inviting section of the city."  #<Bauen Sie ihnen einen einladenden Teil der Stadt.>  #NT!
 me_zygia_14.b: "Wrangling our new city is difficult enough."  #<Die Auseinandersetzung mit unserer neuen Stadt ist schon schwierig genug.>  #NT!
 me_zygia_14_tooltip: "$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_1$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $blemmia_missions_task_1$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_15_title: "Zygii Cavalry"  #<Zygii-Kavallerie>  #NT!
 me_zygia_15_desc: "Powered by divine horsemanship, the cavalry boasted by the Zygii have become unmatched in the field."  #<Angetrieben von göttlicher Reitkunst ist die von den Zygii prahlte Kavallerie im Feld unübertroffen geworden.>  #NT!
 me_zygia_15.a: "Charge!"  #<Aufladung!>  #NT!
 me_zygia_15_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_8$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_8$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_16_title: "Draining the Maeotic Swamp"  #<Entwässerung des maeotischen Sumpfes>  #NT!
 me_zygia_16_desc: "While the creation of cities along the Maeotic coast has aided in developing the area and clearing away the trappings of the swamp, much of the land remains barren of inhabitants or useful farmland. Shall the tribesfolk spend additional resources to clear out these lands for sowing grain?"  #<Während die Gründung von Städten entlang der maeotischen Küste zur Entwicklung des Gebiets und zur Beseitigung der Überschwemmungen des Sumpfes beigetragen hat, bleibt ein Großteil des Landes ohne Bewohner oder nutzbares Ackerland. Sollen die Stammesangehörigen zusätzliche Ressourcen ausgeben, um dieses Land für die Aussaat von Getreide freizumachen?>  #NT!
 me_zygia_16.a: "Drain the marshlands."  #<Entwässern Sie die Sumpfgebiete.>  #NT!
 me_zygia_16.b: "Let nature be."  #<Lass die Natur sein.>  #NT!
  
 me_zygia_17_title: "Unity of the Zygii Chiefs"  #<Einheit der Zygii-Häuptlinge>  #NT!
 me_zygia_17_desc: "Having a greater say towards the future of the clans, each Zygian chief feels part of a greater whole rather than a diverse group of factions. However, having access to a greater amount of resources and a more dynamic tribal political scene will force them to consider the large amount of power within their grasp if they make friends in high places..."  #<Jeder zygische Häuptling hat ein größeres Mitspracherecht bei der Zukunft der Clans und fühlt sich als Teil eines größeren Ganzen und nicht als Teil einer vielfältigen Gruppe von Fraktionen. Der Zugang zu einer größeren Menge an Ressourcen und einer dynamischeren politischen Stammesszene wird sie jedoch dazu zwingen, die große Menge an Macht in Betracht zu ziehen, die in ihrer Reichweite liegt, wenn sie Freunde in hohen Positionen finden ...>  #NT!
 me_zygia_17.a: "Hope for a stable federation."  #<Hoffnung auf einen stabilen Verband.>  #NT!
 me_zygia_17_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_10$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_10$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_18_title: "A Country of Narts"  #<Ein Land der Narts>  #NT!
 me_zygia_18_desc: "With Nart-worship pervading across the mountains, the Zygii have grown into a group with more resolve and a joint pursuit of emulating the tales of the Narts of old. The children wish to one day be remembered as the next generation of Narts themselves."  #<Mit der Verbreitung der Nart-Verehrung in den Bergen haben sich die Zygii zu einer Gruppe mit größerer Entschlossenheit und dem gemeinsamen Ziel entwickelt, die Geschichten der alten Narts nachzuahmen. Die Kinder möchten eines Tages selbst als die nächste Generation von Narts in Erinnerung bleiben.>  #NT!
 me_zygia_18.a: "Their worship shall strenghten us."  #<Ihre Anbetung wird uns stärken.>  #NT!
 me_zygia_18.b: "We shall become a true land of Narts!"  #<Wir werden ein wahres Land der Narts werden!>  #NT!
  
 me_zygia_19_title: "Legend or Fantasy"  #<Legende oder Fantasie>  #NT!
 me_zygia_19_desc: "While shrines to the #E Lady of the Flowing Waters#! have been set up throughout the city of #E Pataroue#!, the story of Pija and Pizighash continues to peak the interest of many visitors and dwellers alike. There is no consensus among the people whether the tale can be considered true or not. Among them, a local hero has risen, named [zygian_hero.GetName], has elected to retrace the steps of #E Pizighash#!, and simply requires some funding for his journey. If we do not indulge him, he is likely to go off on his own anyway, but he may never return, fool boy he is."  #<Während überall in der Stadt #E Pataroue#! Schreine zu Ehren der #E Dame des fließenden Wassers#! errichtet wurden, weckt die Geschichte von Pija und Pizighash weiterhin das Interesse vieler Besucher und Bewohner gleichermaßen. Unter den Menschen besteht kein Konsens darüber, ob die Geschichte als wahr angesehen werden kann oder nicht. Unter ihnen ist ein lokaler Held namens [zygian_hero.GetName] aufgetaucht, der beschlossen hat, die Spuren von #E Pizighash#! zurückzuverfolgen, und für seine Reise lediglich etwas Geld benötigt. Wenn wir ihn nicht verwöhnen, wird er wahrscheinlich sowieso alleine losziehen, aber er wird vielleicht nie wieder zurückkommen, was für ein dummer Junge er ist.>  #NT!
 me_zygia_19.a: "Send forth the Hero!"  #<Sende den Helden aus!>  #NT!
 me_zygia_19.b: "The story of our Lady shall suffice for this city."  #<Die Geschichte unserer Lieben Frau soll für diese Stadt genügen.>  #NT!
  
 me_zygia_20_title: "A Strange Cave"  #<Eine seltsame Höhle>  #NT!
 me_zygia_20_desc: "Whilst on his journey to discover the truth of the legend of Pizighash and the white doves who became maidens at the bottom of the Maeotic Sea, [zygian_hero.GetName] came across a likely spot on the shore, around which the air and the light breeze surrounded him with the scent and the aura of the divine. It was here that he struck the ground with his sword, as had the hero of old, and waited for the waves to part. \n\nWhile the Maeotis itseld did not budge for him, a startled nest of birds rustled the leaves of a nearby grove and took off in a hurry, leading his attention to an old burrow, a cavern's maw, which led down into the dark earth; he heard the sound of water splashing against dirt walls echo from the cave."  #<Auf seiner Reise, um die Wahrheit über die Legende von Pizighash und den weißen Tauben herauszufinden, die auf dem Grund des Maeotischen Meeres zu Jungfrauen wurden, stieß [zygian_hero.GetName] auf eine wahrscheinliche Stelle am Ufer, um die ihn die Luft und die leichte Brise mit dem Duft und der Aura des Göttlichen umgaben. Hier schlug er mit seinem Schwert auf den Boden, wie es der Held von einst getan hatte, und wartete darauf, dass sich die Wellen teilten. \n\nWährend sich die Maeotis selbst nicht für ihn rührten, raschelte ein erschrockenes Vogelnest in den Blättern eines nahegelegenen Hains und flog eilig davon, um seine Aufmerksamkeit auf einen alten Bau zu lenken, den Schlund einer Höhle, der in die dunkle Erde hinabführte. Er hörte das Geräusch von Wasser, das gegen Lehmwände spritzte, aus der Höhle widerhallen.>  #NT!
 me_zygia_20.a: "This is the way - the hero shall venture forth!"  #<Dies ist der Weg – der Held wird sich auf den Weg machen!>  #NT!
 me_zygia_20.b: "The stories spoke of a path into the sea, not this cave into the underworld; flee!"  #<Die Geschichten sprachen von einem Weg ins Meer, nicht von dieser Höhle in die Unterwelt; fliehen!>  #NT!
  
 me_zygia_21_title: "Jewel of the Flowing Waters"  #<Juwel der fließenden Gewässer>  #NT!
 me_zygia_21_desc: "After a period, the hero returned, long-awaited, to the gates of #E Pataroue#!, a white-haired maiden in hand. All the ladies and lords and peasants looked on in wonder. They were amazed to see [zygian_hero.GetName] both safe and in company with so divine a woman. Many attempted to ask him questions. Some saw him as part divine himself, having supposedly achieved the adventure of the Narts, the gods themselves. \n\nHe waived them all off and proceeded to the temple of the #E Lady of the Flowing Waters#! instead. Within the boundaries of her shrine, her holy domain, he knelt and offered both a sacrifice and a gift: a white pendant bearing the image of a dove. His duty fulfilled, her merrily rejoined the populace and married his maiden before all the gods."  #<Nach einer Weile kehrte der Held, lange erwartet, mit einer weißhaarigen Jungfrau in der Hand vor die Tore von #E Pataroue#!, zurück. Alle Damen, Herren und Bauern sahen verwundert zu. Sie waren erstaunt, [zygian_hero.GetName] sowohl in Sicherheit als auch in Gesellschaft einer so göttlichen Frau zu sehen. Viele versuchten, ihm Fragen zu stellen. Einige sahen ihn selbst als einen Teil des Göttlichen, da er angeblich das Abenteuer der Narts, der Götter selbst, gemeistert hatte. \n\nEr verzichtete auf sie alle und ging stattdessen zum Tempel der #E Dame der fließenden Wasser#!. Innerhalb der Grenzen ihres Schreins, ihrer heiligen Domäne, kniete er nieder und brachte sowohl ein Opfer als auch ein Geschenk dar: einen weißen Anhänger mit dem Bild einer Taube. Nachdem er seine Pflicht erfüllt hatte, schloss sie sich freudig wieder dem Volk an und heiratete seine Jungfrau vor allen Göttern.>  #NT!
 me_zygia_21.a: "Praise the new hero of the era!"  #<Loben Sie den neuen Helden der Ära!>  #NT!
  
 me_zygia_22_title: "The Lost Hero"  #<Der verlorene Held>  #NT!
 me_zygia_22_desc: "The hero of the Zygii, who held the lofty goal of chasing the tall tales of Pizighash, sadly never returned, leaving behind his inheritance and assets to the temple of the Lady of Flowing Waters. His memory will likely be forgotten."  #<Der Held der Zygii, der das hohe Ziel hatte, den großen Geschichten von Pizighash nachzujagen, kehrte leider nie zurück und hinterließ sein Erbe und seine Vermögenswerte dem Tempel der Dame der fließenden Wasser. Sein Andenken wird wahrscheinlich vergessen sein.>  #NT!
 me_zygia_22.a: "Alas, the story dies with him."  #<Leider stirbt die Geschichte mit ihm.>  #NT!
  
 me_zygia_23_title: "Legend Tourism"  #<Legende Tourismus>  #NT!
 me_zygia_23_desc: "The recent buzz about the temple of the Lady of Flowing Waters, and the local retellings of her ancient tale have begun enticing a sizeable increase in tourism and mercantile activity in the port. Advisors seem to believe that investing into the tale itself could prove quite profitable. Particularly, the priests of the Lady's temple are urging for a learned sculptor to craft a masterpiece statue of their Lady to honor her and serve as a landmark for travelers to flock to."  #<Die jüngste Begeisterung für den Tempel der Dame des fließenden Wassers und die lokalen Nacherzählungen ihrer alten Geschichte haben zu einem beträchtlichen Anstieg des Tourismus und der Handelsaktivitäten im Hafen geführt. Berater scheinen zu glauben, dass sich die Investition in die Geschichte selbst als durchaus profitabel erweisen könnte. Insbesondere drängen die Priester des Tempels der Dame darauf, dass ein erfahrener Bildhauer eine Meisterstatue ihrer Dame anfertigt, um sie zu ehren und als Wahrzeichen für strömende Reisende zu dienen.>  #NT!
 me_zygia_23.a: "Hire the greatest Greek artisans!"  #<Beauftragen Sie die besten griechischen Kunsthandwerker!>  #NT!
 me_zygia_23.b: "The trend shall pass, save the coins for a rainy day."  #<Der Trend soll vorübergehen, bewahren Sie die Münzen für einen regnerischen Tag auf.>  #NT!
  
 me_zygia_24_title: "Statue of the Lady"  #<Statue der Dame>  #NT!
 me_zygia_24_desc: "The statue was unveiled by [zygian_sculptor.GetName] and [ROOT.GetCountry.GetRuler.GetName] in a plaza near the port of #E Pataroue#! to the excitement of all. It was truly a splendid masterpiece, capturing the marvelous features of the divine being it portrayed. All visited, paid homage to, and donated gifts to this grand shrine to the Lady of Flowing Waters."  #<Die Statue wurde von [zygian_sculptor.GetName] und [ROOT.GetCountry.GetRuler.GetName] auf einem Platz in der Nähe des Hafens von #E Pataroue#! zur Begeisterung aller enthüllt. Es war wirklich ein großartiges Meisterwerk, das die wunderbaren Eigenschaften des göttlichen Wesens, das es darstellte, einfing. Alle besuchten diesen großen Schrein für die Frau der fließenden Wasser, zollten ihm ihre Ehrerbietung und spendeten ihm Geschenke.>  #NT!
 me_zygia_24.a: "Priase to the Lady of Flowing Waters!"  #<Lobpreis an die Herrin der fließenden Wasser!>  #NT!
  
 me_zygia_25_title: "The People of Zichia"  #<Die Leute von Zichia>  #NT!
 me_zygia_25_desc: "Having expanded their area of control, the Zygii have come under one banner to head into the future under a name long since dormant."  #<Nachdem sie ihren Kontrollbereich erweitert haben, sind die Zygii unter einem Banner vereint, um unter einem Namen, der schon lange inaktiv war, in die Zukunft aufzubrechen.>  #NT!
 me_zygia_25.a: "For Zichia!"  #<Für Zichia!>  #NT!
 me_zygia_25_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_13$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_13$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_26_title: "Nart Monarch"  #<Nart Monarch>  #NT!
 me_zygia_26_desc: "Emulating the heroes of old, like Warzameg, the Zygii will follow the law of Theshkue while wielding the blades of ancient warriors to conquer the peaks of Kavkasos and its surrounding environs."  #<Die Zygii eifern den Helden der Antike wie Warzameg nach und folgen dem Gesetz von Theshkue, während sie die Klingen antiker Krieger schwingen, um die Gipfel von Kavkasos und seine Umgebung zu erobern.>  #NT!
 me_zygia_26.a: "Tales of heroics and conquest await!"  #<Geschichten über Heldentaten und Eroberungen erwarten Sie!>  #NT!
 me_zygia_26_tooltip: "$mission_completed_tooltip_1$ '#Y $zygia_missions_task_14$#!' $mission_completed_tooltip_2$"  #<$mission_completed_tooltip_1$ '#Y $zygia_missions_task_14$#!' $mission_completed_tooltip_2$>  #NT!
  
 me_zygia_27_title: "The Heterochromatic Apple"  #<Der heterochromatische Apfel>  #NT!
 me_zygia_27_desc: "Around the tree which the Zygii had set up guards, the youngest of the guards discovered a strange apple hanging from its heighest branch. Climbing the great, divine tree, he took a closer look upon the apple's shining surface, only to realize that his face reflected off of its marbled surface. He spun the fruit around its bud, and realized that, whilst it was not a hard, stone of white, it did have a milky sheen in its yellow half. The other face of the apple appeared almost painted in a bloody crimson, a deep and disturbing shade. \n\nBefore he could catch himself, it loosened within his grip and separated from the tree. The boy fell, and died on impact, but the strange apple was brought by another guard nearby to court, where it was presented to [ROOT.GetCountry.GetRuler.GetName]. All knew the tale of the tree of the Narts and its divine fruit, but seeing and testing was a caution-driven endeavor. [ROOT.GetCountry.GetRuler.GetName] quickly handed it over to a female attendant and bade her to test the divine nature of the fruit."  #<Um den Baum herum, den die Zygii als Wächter aufgestellt hatten, entdeckte der jüngste Wächter einen seltsamen Apfel, der an seinem höchsten Ast hing. Er kletterte auf den großen, göttlichen Baum und schaute sich die glänzende Oberfläche des Apfels genauer an, nur um festzustellen, dass sich sein Gesicht in der marmorierten Oberfläche spiegelte. Er drehte die Frucht um ihre Knospe und stellte fest, dass sie zwar kein harter, weißer Stein war, in ihrer gelben Hälfte jedoch einen milchigen Schimmer hatte. Die andere Seite des Apfels schien fast in einem blutigen Purpurrot bemalt zu sein, einem tiefen und beunruhigenden Farbton. \n\nBevor er sich fangen konnte, löste es sich in seinem Griff und löste sich vom Baum. Der Junge stürzte und starb beim Aufprall, aber der seltsame Apfel wurde von einem anderen Wachmann in der Nähe zum Gericht gebracht, wo er [ROOT.GetCountry.GetRuler.GetName] präsentiert wurde. Alle kannten die Geschichte vom Nartbaum und seiner göttlichen Frucht, aber das Sehen und Testen war ein vorsichtiges Unterfangen. [ROOT.GetCountry.GetRuler.GetName] überreichte es schnell einer weiblichen Begleiterin und forderte sie auf, die göttliche Natur der Frucht zu testen.>  #NT!
 me_zygia_27.a: "The whole apple shall be a meal at once."  #<Der ganze Apfel soll eine Mahlzeit auf einmal sein.>  #NT!
 me_zygia_27.b: "Eat only the pale half."  #<Essen Sie nur die helle Hälfte.>  #NT!
 me_zygia_27.c: "Eat only the crimson half."  #<Essen Sie nur die purpurrote Hälfte.>  #NT!
 me_zygia_27.d: "Do not devour the apple; let it remain a worshiped gift from the gods."  #<Iss den Apfel nicht; lass es ein verehrtes Geschenk der Götter bleiben.>  #NT!
  
  
