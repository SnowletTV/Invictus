l_german:
 patch_notes:0 "Was gibt's Neues"
 patch_notes_text:0 "V1.11.0.3 - Germanicus (bricht Spielstände, verwendet die Nexusmods-Version 1.10.1.1, um alte Spielstände fortzusetzen)\nNeue/erweiterte Missionsbäume:\n- Neuer großer Baum für Germania hinzugefügt\n- 2 neue Bäume für Tayuan hinzugefügt\n- Neuer regionaler Baum für Skandinavier hinzugefügt\n- Baum für Soodak hinzugefügt, der im Germania-Baum freischaltbar ist\n- Androphagischer Baum überarbeitet\n\nGFX-Änderungen (die meisten von Pureon):\n- Neue Wahrzeichen der Karte: Das Orakel von Melqart, verschiedene skythische Königsgräber, das prähistorische Monument von Newgrange, die Steine von Carnac, der Ring von Brodgar und zwei Tempel der Königin von Saba\n- Verbesserte hellenistische Stadtgrafiken, so dass Städte wie Rom und Athen lebendig aussehen\n- Neue Stadtgebäudemodelle für die Fezzani und Numidischen Kulturgruppen\n- Neue Einheitenmodelle für Baktrien, Tayuan, Emporion, Hemeroskopeion, Athen, Sparta, Argos, Syracusae und Phasis\n- 3D-Modell für das neue baubare Wunder von Irminsul\n- Neue einzigartige Icons für 10 Vanille-Schätze\n- Neue Flaggen für die Aesti-Kulturnationen und Frankreich\n- Einige neue Ereignisbilder\n- Viele andere 3D-Modell-, Textur- und andere Grafikverbesserungen\n\nKartenänderungen: \n- Die Karte wurde in den Regionen Atlas und Fezzan sowie rund um den Gelben Nil erweitert\n- Mehr Gebiete werden nun korrekt eingefärbt, wenn man benachbarte Provinzen besitzt\n- Die Karte und der Kulturaufbau in Magna Graecia wurden überarbeitet\n- Die Straßenvisualisierung und die Standortbestimmung in der ganzen Welt wurden aktualisiert\n\nÄnderungen: \n- Eine Menge Missionsbäume und Modifikatoren überarbeitet, wir können sie nicht alle erwähnen\n- Iberische, gallische und lateinische Namen überarbeitet, Lateinische Namen\n- Event-Pool neu ausbalanciert, um die Events etwas abwechslungsreicher zu gestalten\n- Optionen für die Annexion von Gefangenen wieder hinzugefügt und Optionen neu ausbalanciert\n- Regierung der Steppenhorde neu ausbalanciert\n- Bestehende Missionsbäume an das neue Kartensetup angepasst\n- Alle Vanille-Errungenschaften aktualisiert, damit sie mit dem Invictus-Inhalt funktionieren\n- Vollständig neu ausbalancierte Tempelstaaten, so dass man sie nicht spammen kann\n- Aufgeräumter Nachfolgecode, der viele Probleme beheben sollte\n- Neu ausbalancierte „In die Sklaverei verkaufen“-Charakterinteraktion\n- Die Obergrenze für Sklaven pro Gut wurde von 4 auf 5 erhöht\n- Garmanisches Erbe hinzugefügt\n- Aphrodite-Gottheit für Korinth hinzugefügt\n- Spanische Übersetzungen aktualisiert, französische und deutsche Übersetzungen\n\nBugfixes: \n- Viele Backend-Eigenschaftsskripte behoben\n- Mehrere parthische Fehler behoben\n- Verschiedene Probleme im Zusammenhang mit dem Arrangieren von Ehen behoben\n- Die Möglichkeit, Olympia-Teilnehmer einzusperren, behoben\n- Das Zurücktreten von Co-Herrschern behoben\n- Unzählige kleinere Fehlerbehebungen an Missionsbäumen vorgenommen\n- Einen Loc-Hash-Konflikt im Zusammenhang mit einer italienischen Aufgabe behoben\n- Viele Lokalisierungsprobleme behoben\n- Alle uns gemeldeten Fehler behoben"
