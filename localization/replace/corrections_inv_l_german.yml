 CURRENT_DATE_TOOLTIP:2 "#T Aktuelles Datum#!\nDas Spieldatum wird ab der Gründung Roms, Ab Urbe Condita, gezählt. Für diejenigen, die den gregorianischen Kalender bevorzugen, ist das aktuelle Datum der [GetChristianDateString|Y].[GetPlayerDatesString]\n\n#TF Als Pythagoras nach dem Wesen der Zeit gefragt wurde, antwortete er: "Die Zeit ist die Seele der Welt."#!" core_l_german

 dip_friends_rivals.13.desc:2 "Die offene Feindseligkeit unsere[ROOT.GetCountry.GetRuler.Custom('get_rsEnding')] [ROOT.GetCountry.GetRulerTitle][ROOT.GetCountry.GetRuler.Custom('get_sMale')] [ROOT.GetCountry.GetRuler.GetName] gegenüber [ROOT.GetCountry.GetRuler.GetHerHis]em Rivalen, [SCOPE.sC('rival_ruler_country_scope').GetRuler.Custom('get_DerDem')] [SCOPE.sC('rival_ruler_country_scope').GetRulerTitle] [SCOPE.sC('rival_ruler_country_scope').GetRuler.GetName] von [SCOPE.sC('rival_ruler_country_scope').GetName], hat einige diplomatische Wege eröffnet, die sonst nicht zu beschreiten wären.\n\nDer fremdländische Anführer hat im Hinterland der [pop_friction_enemy_province.Custom('get_city_type_loc')] [SCOPE.sP('pop_friction_enemy_province').GetName] Untertanen, die dieselbe Sprache und dieselben Gebräuche haben wie wir und daher rechtmäßig Untertanen von [SCOPE.sC('from_rival_ruler_country').GetName] sein sollten. Wenn wir einige gute Männer nach [SCOPE.sP('pop_friction_enemy_province').GetState.GetShortName] entsenden würden, besteht kein Zweifel, dass zumindest einige in der Gemeinschaft dazu bewegt werden könnten, in die [ROOT.GetCountry.GetAdjective]e [pop_friction_friendly_province.Custom('get_city_type_loc')] [SCOPE.sP('pop_friction_friendly_province').GetName] zu migrieren ..." #dip_friends_rivals_events_l_german


lover_adoption_tooltip:0 "Da [SCOPE.sChar('target').GetPraenomen] außereheliche Kinder mit [SCOPE.sC('actor').GetRuler.GetPraenomen] hat, sind die Kosten für eine Adoption drastisch erhöht.\n\n" #\character_interactions_l_german.yml: missing ')' - 

royal_marriage.5.desc:1 "Das [SCOPE.sC('receiver_country').GetAdjective|l]e Königshaus hat unser Angebot einer königlichen Ehe dankend angenommen. [SCOPE.sChar('female_marriage_candidate').GetName] ist nach [SCOPE.sChar('male_marriage_candidate').GetEmployer.GetName] gereist, um dort ihren Verlobten [SCOPE.sChar('male_marriage_candidate').GetName] zu treffen.\n\nMögen unsere beiden Nationen durch diese gegenseitige Zuneigung gedeihen." #character_interactions_l_german.yml

dhe_thrace.1.desc:0 "Das Despotat von [SCOPE.sChar('dhe_thrace_amastris_scope').GetEmployer.GetName] liegt auf dem Weg unserer zukünftigen Ausbreitung nach Bithynien und würde einen nützlichen Schauplatz in unserem Konflikt mit der [SCOPE.sChar('dhe_thrace_antigonus_scope').GetFamilyDisplayName]-Dynastie im Süden darstellen.\n\nDas Königreich wird von [SCOPE.sChar('dhe_thrace_amastris_scope').GetEmployer.GetRulerTitle] [SCOPE.sChar('dhe_thrace_amastris_scope').GetName] beherrscht, der Nichte des besiegten Dareios III. von Persien. Diese hatte zuerst Alexandros' General Krateros geehelicht, der seine Meinung jedoch änderte und ihre Heirat mit Dionysios, dem fetten König von [SCOPE.sChar('dhe_thrace_amastris_scope').GetEmployer.GetName], arrangierte. Diesem gebar sie zwei Söhne, ehe er sich vorzeitig in den Tod fraß und ihr damit die Herrschaft über das Land vermachte.\n\nDie Ehe war schon immer der sicherste Weg, Bündnisse zu schließen, und ein gut platzierter Ehemann könnte seine Ländereien unter unsere Kontrolle bringen, ganz zu schweigen von dem Prestige, das mit einer Hochzeit mit einer Prinzessin von Persien einhergeht." #dhe_events_l_german.yml - [SCOPE.sChar(‚dhe_thrace_antigonus_scope‘).GetFamilyDisplayAdjective] 

espionage_shenanigans_opener:0 "Zusammen mit der kodierten Nachricht von [spy.GetPraenomen] - unserem Spion [spied_upon.Custom('get_AmIm_court_type')] [spied_upon.Custom('get_court_type')] von [spied_upon.GetName] - kommt auch der Hinweis auf eine einzigartige Gelegenheit:\n\n"

get_republic_council_descriptor_marshal_fallback:0 "ein[SCOPE.sChar('marshal').Custom('get_eFemale')] stolze[SCOPE.sChar('marshal').Custom('get_rMale')], wenn auch sture[SCOPE.sChar('marshal').Custom('get_rMale')] Senator[SCOPE.sChar('marshal').Custom('get_inFemale')]" #fehlende Klammer [SCOPE.sChar('marshal').Custom('get_rMale')



 

 