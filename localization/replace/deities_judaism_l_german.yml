  #Cybelene
 deity_ma:0 "$omen_ma$"
 omen_ma:1 "Ma"
 omen_ma_desc:3 "$ma_description$"
 ma_description:0 "Der Name Ma wurde bereits in der zweiten Hälfte des dritten Jahrtausends v.Chr. verwendet. Obwohl die älteste dokumentierte Form des Namens Ma aus Mesopotamien stammt, können wir keine eindeutigen Rückschlüsse auf seinen Ursprung ziehen. Ihr erstes Auftreten in Anatolien ist ebenfalls unbekannt. Mas Name bedeutet Mutter, aber sie galt nicht nur als Muttergöttin, sondern auch als Mond- und Kriegergöttin. Einer der wichtigsten Tempel des Königreichs Pontus befand sich in Comana Pontica und war der Göttin Ma geweiht. Der Ma-Kult breitete sich dann bis nach Comana-Kappadokien aus. Schließlich führte Sulla, der behauptete, Ma habe ihm in einem Traum Blitze geschickt, um seine Feinde zu vernichten, ihren Kult in der Ewigen Stadt ein.\n\n#! Apotheose-Effekt: $military_apotheosis_manpower_effect_tt_description$"

 #Anahita
 deity_anahita:0 "$omen_anahita$"
 omen_anahita:0 "Anahita"
 omen_anahita_desc:3 "$anahita_description$"
 anahita_description:0 "Anahita ist eine der mächtigsten Yazatas und wird als Gottheit 'der Gewässer' verehrt und mit Heilung, Fruchtbarkeit und Weisheit in Verbindung gebracht. Sie wird seit langem im gesamten zoroastrischen Osten verehrt, doch die Verehrung der Göttin Anahita wurde erst im 6. Jahrhundert v. Chr. durch das alte persische Reich der Achämeniden in Kleinasien eingeführt. Das Symbol der Anahita ist die Lotusblume. Irgendwann vor dem 4. Jahrhundert v. Chr. wurde diese Yazata mit einer Variante von Istar verschmolzen, die ebenfalls eine Gottheit der „jungfräulichen“ Fruchtbarkeit war und von der Aredvi Sura Anahita dann zusätzliche Eigenschaften einer Kriegsgöttin und des Planeten Venus erbte."

 deity_anahit:0 "$omen_anahit$"
 omen_anahit:1 "Anahit"
 omen_anahit_desc:3 "$anahita_description$\n\nAnahit, die Göttin der Liebe, der Fruchtbarkeit, der Geburt und eine der wichtigsten Gottheiten des armenischen Volkes. Zu den Verwandten von Anahit gehören Inanna, Astlik und Anunit. Anahit wird oft mit Artemis und manchmal auch mit Aphrodite gleichgesetzt. Sie verfügte über viele Tempel in den armenischen Gebieten und war möglicherweise die am meisten verehrte Gottheit. Sie war die Frau von Armazd und die Schwester von Mihr und Nane. Wir hoffen, dass die fürsorgliche Anahit unsere Nation mit dem Schutz für unsere Jugend segnen wird und dass ihre Anhänger in dem Wissen leben können, dass ihre Kinder nun sicher zur Welt kommen können.\n\n#! Apotheose-Effekt: $fertility_apotheosis_food_effect_tt_description$"

#Anaitis
 deity_anaitis:0 "$omen_anaitis$"
 omen_anaitis:0 "Anaitis"
 omen_anaitis_desc:0 "$anahita_description$\n\nIn Westanatolien war Anahita oft als Anaitis bekannt und wurde häufig mit anderen lokal verehrten Göttinnen zusammengebracht. Anaitis wurde in Anatolien regelmäßig als Artemis und nicht als Aphrodite, also als Fruchtbarkeitsgöttin, gedeutet, vermutlich weil sie vor allem als Flussgottheit und damit als Quelle der Fruchtbarkeit verehrt wurde. In Lydien wurde Anaitis jedoch mit Kybele gleichgesetzt, während sie von den Griechen als Aphrodite-Anaitis bezeichnet wurde. Der Tempelstaat in Zela war Anahita geweiht und wurde wahrscheinlich in der späten achämenidischen Zeit, etwa im 4. Jahrhundert v. Chr., errichtet.\n\n#! Apotheose-Effekt: $fertility_apotheosis_food_effect_tt_description$\n $sandstorm_apotheosis_effect_tt_description$"