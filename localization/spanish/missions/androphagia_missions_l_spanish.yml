l_spanish:

 androphagia:0 "Día de los Antropófagos"
 androphagia_DESCRIPTION:0 "Pocos vivientes alcanzan a conocer la senda que guía a las tierras donde moran las naciones migratorias #E Antropófagas#!, y los escasos #E mercaderes escitas#! que saben de sus reales rehúsan de contino declarar tal noticia, aun cuando se les ofrezcan copiosas cuantías de plata y oro.\n\nEsta reticencia a remontar el #E río Borístenes#! tiene por ventura su origen en las crónicas que ambas naciones comparten; ha cientos de años, cuando las huestes de #E Darío el Persa#! invadieron la Escitia con su afamado general #E Megabazo#! a su diestra, los Antropófagos negaron su socorro a los escitas cuando estos clamaron por auxilio, y tales memorias amargas de traición jamás fueron echadas en olvido.\n\nQuizá otra razón por la cual los Antropófagos viven apartados sea su inclinación por el yantar de carne humana; el nombre que les dieron los griegos significa, al pie de la letra, «Comedores de hombres». Si bien el canibalismo se usa a veces en sus ritos religiosos, han ganado fama injusta de salvajes carniceros que desuellan la carne de los vivos y beben la sangre de sus víctimas – fama dudosa, fundada en yerros, mas que ellos no parecen querer enmendar."
 androphagia_CRITERIA_DESCRIPTION:0 "Esta empresa será cumplida cuando los Antropófagos errantes, tras haber talado y desolado las tierras de sus enemigos, hayan fundado una poderosa #E Horda de las Estepas#! que señoree sin contradicción alguna."
 androphagia_BUTTON_TOOLTIP:0 "¡Llegada es la hora de revelarnos al orbe!"

 #Missions

 androphagia_task_1:0 "Corte de los Comedores de Hombres"
 androphagia_task_1_DESC:0 "Al tiempo que los apacibles días del otoño rinden su luz y calor al rudo abrazo del invierno, nuestro [ROOT.GetCountry.GetRulerTitle] ha convocado a los principales de las Grandes Linajes en [ROOT.GetCountry.GetCapital.GetName|Y] para tratar el porvenir de las naciones [ROOT.GetCountry.GetAdjective].\n\nSe ha escogido un campo neutral para este encuentro entre los tres caudillos, y los regidores antropófagos se ayuntarán en [GetProvince('(int32)9346').GetName|Y] a fin de trazar el designio para los días venideros.\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"

 androphagia_task_2:0 "Una corte en Occidente"
 androphagia_task_2_DESC:0 "Es noticia de antiguo que el ámbar @amber! de gran precio se halla en las selvas primigenias del extremo ocaso, mas poca gente mora en aquellas apartadas regiones. Dícese que la tierra es áspera e inclemente, con inviernos amargos y días breves – el rostro de [GetDeityDefinition('omen_pajewa').GetName|G] permanece allí encubierto por muchos meses.\n\nY con todo, es allí donde nuestro pueblo debe enderezar sus pasos – llegada es la hora de tomar para nosotros el señorío de la #T Costa del Ámbar#! y sus caudales. Aun podríamos consagrar allí una corte occidental…\n\n\n\n\n\n\n\n\n\n\n@celt_mil6!"

 androphagia_task_3:0 "Cautivos de Saicen"
 androphagia_task_3_DESC:0 "Eran verdades los rumores – el ámbar @amber! hallado en esta comarca es de calidad excelsa y ha superado las mayores esperanzas de [ROOT.GetCountry.GetRuler.GetName|Y]. Nuestras naciones se afanan en acopiar cuanto ámbar es dable, mas todos los caudillos conciertan en que un #Y Dominio de esclavos#! es menester – pues hay, sencillamente, sobrada labor para nuestras manos.\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"

 androphagia_task_4:0 "Poblar Soodak"
 androphagia_task_4_DESC:0 "Aunque nuestra corte abunde en ámbar @amber!, resta aún mucho por ganar, y [ROOT.GetCountry.GetRuler.GetName|Y] está presto a todo por asegurar la prosperidad venidera de nuestra estirpe.\n\nLas islas de [GetProvince('(int32)9371').GetName|Y] son fértiles y nos pertenecen, mas se hallan todavía poco pobladas. [ROOT.GetCountry.GetRuler.GetFirstName|Y] ha despachado un pregón a nuestras naciones costeras, pidiendo voluntarios prestos a dejar sus hogares para surcar las aguas y allí asentarse.\n\n\n\n\n\n\n\n\n\n\n@greek_mil7!"

 androphagia_task_5:0 "Lidiar contra las Capas Negras"
 androphagia_task_5_DESC:0 "Aun cuando [ROOT.GetCountry.GetRuler.GetName|Y] tiene entera confianza en la pujanza de nuestras levas, fuera necedad negar que los #E #G [GetCountry('MLN').GetName]#! forman nación poderosa, harto capaz de amparar sus territorios.\n\nAntes de romper en guerra contra nuestros vecinos, debiéramos poner diligencia en hallar un aliado remoto – las lides venideras serán de menor fatiga si tenemos amigos que nos guarden las espaldas.\n\n\n\n\n\n\n\n\n\n\n@celt_mil7!"

 androphagia_task_6:0 "Regir nuestras conquistas"
 androphagia_task_6_DESC:0 "En estos años postreros, hemos ensanchado nuestras fronteras con presteza – hecho que hinche de orgullo a [ROOT.GetCountry.GetRuler.GetName|Y], mas que mueve al [ROOT.GetCountry.GetRulerTitle] a recelar de motines provinciales que nos hagan perder cuanto hemos ganado con el acero. Para evitar lo impensable, se ha concertado que debemos consagrar tiempo al fomento de las tierras.\n\n\n\n\n\n\n\n\n\n\n@italic_mil24!"

 androphagia_task_7:0 "Señores de los Melanclemas"
 androphagia_task_7_DESC:0 "Ahora que hemos sojuzgado a los #Y [GetCountry('MLN').GetName]#!, cumple decidir el estado de estos extranjeros en el seno de la sociedad [ROOT.GetCountry.GetAdjective] ; ¿habremos de tenderles mano de amistad o ponerles hierros y mandarlos a las minas? [ROOT.GetCountry.GetRuler.GetName|Y] debe dictar sentencia de gran peso.\n\n#Y Determinaremos los#! #G Derechos civiles#! #Y de los#! #T [GetCountry('MLN').GetName]#!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil13!"

 androphagia_task_8:0 "Explotar las selvas"
 androphagia_task_8_DESC:0 "Si bien nuestra nación sea a veces mentada por yantar carne humana, nuestra vianda es variopinta; pese a lo que nuestros muchos enemigos afirman, labramos mieses y criamos ganados, como el resto del mundo.\n\nPara que nuestras trojes permanezcan colmadas y nuestra gente mantenida, [ROOT.GetCountry.GetRuler.GetName|Y] ha mandado edificar granjas por todas nuestras tierras.\n\n\n\n\n\n\n\n\n\n\n@celt_mil14!"

 androphagia_task_9:0 "Jinetes de los bosques infinitos"
 androphagia_task_9_DESC:0 "Adestrarse en la lid a caballo y guiar la montura por la espesura no es hazaña liviana, mas los dioses no nos han dejado otra elección – cumple adaptarnos al terreno o fenecer. [ROOT.GetCountry.GetRuler.GetName|Y] ha conminado a nuestros jinetes a ejercitarse como poseídos por los dioses de la guerra, para que, llegado el sazón, nuestros enemigos caigan rendidos ante la ligereza y la saña de nuestras acometidas.\n\n\n\n\n\n\n\n\n\n\n@celt_mil13!"

 androphagia_task_10:0 "Herreros antropófagos"
 androphagia_task_10_DESC:0 "A medida que nuestra pericia en la metalurgia y la forja medra, mercedes hasta ahora inalcanzables se tornan forzosas.\n\n\n\n\n\n\n\n\n\n@india_mil6!"

 androphagia_task_11:0 "El Puerto de Anoppi"
 androphagia_task_11_DESC:0 "Sobran razones de peso para fundar un puerto en [GetProvince('(int32)9373').GetName|Y] ; hállase cerca de las feraces fuentes de ámbar @amber! de nuestros bosques, lo cual redundaría en gran provecho para nuestro trato, y existe allí un pequeño abrigo natural que nuestros maestros de obra podrían dilatar sin gran fatiga.\n\n\n\n\n\n\n\n\n\n\n@greek_mil4!"

 androphagia_task_12:0 "Surcar el Sarmaticus"
 androphagia_task_12_DESC:0 "Conforme nuestros naturales se han avezado en las aguas traicioneras del #Y Oceanus Sarmaticus#!, hemos descubierto multitud de asentamientos que labran el ámbar @amber! al mediodía de nuestra posición. Dícese que la finura de las joyas que allí se fabrican compite con la nuestra – cosa que [ROOT.GetCountry.GetRuler.GetName|Y] se niega a creer.\n\nEn lugar de permitir que existan competidores en el trato del ámbar, nuestro indómito [ROOT.GetCountry.GetRulerTitle] ha declarado que sojuzgaremos esta ribera en nombre de [ROOT.GetCountry.GetName|G].\n\n\n\n\n\n\n\n\n\n\n@celt_mil15!"

 androphagia_task_13:0 "La Ciudad Caníbal"
 androphagia_task_13_DESC:0 "Al tiempo que nuestro nombre y fama se difunden por el orbe civilizado, nos ha llegado noticia de que los cartógrafos griegos han tildado con escarnio a nuestro mayor real como '#G Androfagópolis#!', o '#R Ciudad Caníbal#!', en sus mapas. Es manifiesto que nos tienen por bárbaros y somos blanco de sus pullas – muchas comedias se representan en los teatros de [GetProvince('(int32)416').GetName|Y] figurando a los Antropófagos como salvajes ignorantes.\n\n[ROOT.GetCountry.GetRuler.GetName|Y] no se deja amilanar por tales baldones; antes bien, ha jurado alzar una urbe que opaque a las de los altaneros helenos.\n\n\n\n\n\n\n\n\n\n\n@greek_mil10!"

 androphagia_task_14:0 "El Circuito del Ámbar"
 androphagia_task_14_DESC:0 "A fin de facilitar el acarreo del ámbar @amber! hacia nuestro puerto de [GetProvince('(int32)9372').GetName|T], [ROOT.GetCountry.GetRuler.GetName|Y] busca allegar los caudales menesteres para trazar una calzada que ligue los asentamientos de la #T Costa del Ámbar#! entre sí.\n\n\n\n\n\n\n\n\n\n\n@italic_mil27!"

 androphagia_task_15:0 "Riquezas Inconmensurables"
 androphagia_task_15_DESC:0 "Poco a poco, nos hemos erigido en dueños absolutos del trato del ámbar @amber! ; los precios tasados en los mercados de [ROOT.GetCountry.GetCapital.GetName] son ya ley en el mundo civilizado. Bajeles venidos de [GetProvince('(int32)516').GetName|Y] han surcado los mares hasta nuestras aguas para tratar de plano con nuestros mercaderes ; testimonio fiel del prestigio de la estirpe [ROOT.GetCountry.GetAdjective].\n\n\n\n\n\n\n\n\n\n\n@egypt_mil19!"

 androphagia_task_16:0 "Santuario Solar de Plata"
 androphagia_task_16_DESC:0 "A fin de impetrar a la diosa [GetDeityDefinition('omen_pajewa').GetName|G] que nos tenga en su memoria y nos favorezca con su luz en esta tierra parda y sombría, [ROOT.GetCountry.GetRuler.GetName|Y] ha ordenado la fábrica de un #E Gran Templo#! en [ROOT.GetCountry.GetCapital.GetName|Y] – un #T Santuaire Solar de Plata#!.\n\n\n\n\n\n\n\n\n\n\n@greek_mil3!"

 androphagia_task_17:0 "Dientes de Hierro"
 androphagia_task_17_DESC:0 "El hierro @iron! escasea con rigor en los vastos bosques septentrionales que cubren gran parte de nuestras tierras, lo que hace que el metal hallado en [GetProvince('(int32)8466').GetName|Y] sea tenido en gran estima.\n\n[ROOT.GetCountry.GetRuler.GetName|Y] sueña con pertrechar a nuestros soldados con nuevas armas para darnos ventaja en la lid, mas debemos asegurar nuestras reservas.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil1!"

 androphagia_task_18:0 "Correría a la Antigua"
 androphagia_task_18_DESC:0 "La vida de nación errante nunca es de descanso ; nuestros vecinos nos miran con recelo y asco, y cuando trasciende que yantamos carne humana, fínchase de punto imposible ganar su confianza – o tratar con ellos. Los mercaderes ponen diligencia en evitar nuestros reales, tomando rodeos luengos para no cruzar nuestro territorio.\n\nAnte tales cuitas, nuestro pueblo ha recurrido a... artes menos lícitas para ganar el sustento. Corren tiempos de penuria para las naciones de [ROOT.GetCountry.GetName|R]. Por ventura nuestra, se habla de ricas ciudades al mediodía – prósperas mas carentes de murallas.\n\n\n\n\n\n\n\n\n\n\n@italic_mil17!"

 androphagia_task_19:0 "Asaltos de Anatolia"
 androphagia_task_19_DESC:0 "Nuestras correrías por la #T Táurica#! han dado a nuestras huestes gusto por lo ajeno, y los relatos de nuestros esclavos del Bósforo sobre los tesoros de la #G Anatolia#! han encendido la codicia de nuestros varones.\n\nPara saciar la sed de sangre de los hombres de [ROOT.GetCountry.GetRuler.GetHerHis], [ROOT.GetCountry.GetRuler.GetName|Y] ha dado licencia a nuestras mesnadas para saquear las urbes indefensas del sur, sin reparar en precio alguno.\n\n\n\n\n\n\n\n\n\n\n@italic_mil3!"

 androphagia_task_20:0 "Hambre de Ingenios"
 androphagia_task_20_DESC:0 "Pese a haber erigido nobles #G Academias#! en nuestra corte, adviértese una falta clamorosa de preceptores doctos en [ROOT.GetCountry.GetCapital.GetName|T], lo cual es baldón para nuestra honra.\n\nAhora que poseemos armada digna y medios suficientes, [ROOT.GetCountry.GetRuler.GetName|Y] ha convocado una expedición hacia las metrópolis del Mediterráneo – [GetProvince('(int32)3256').GetName|T], [GetProvince('(int32)416').GetName|T] y [GetProvince('(int32)516').GetName|T] – a fin de reclutar grandes mentes prestas a asentarse en nuestro reino.\n\n#Y Esto activará una cadena de eventos.#!\n\n\n\n\n\n\n\n\n\n\n@greek_mil18!"

 androphagia_task_21:0 "Pundonor de Guerrero"
 androphagia_task_21_DESC:0 "Murmuran algunos de nuestros hermanos que [ROOT.GetCountry.GetRuler.GetName|Y] se ha entregado a la molicie, mandando desde [ROOT.GetCountry.GetCapital.GetName|G] en vez de combatir junto a sus peones como un andrófago de ley.\n\nPara acallar tales infundios y demostrar que no ha perdido su denuedo, [ROOT.GetCountry.GetRuler.GetFirstName|Y] ha jurado retar a un émulo en desafío singular.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil9!"

 androphagia_task_22:0 "La Horda Roja"
 androphagia_task_22_DESC:0 "Las vetustas civilizaciones del orbe tiemblan al solo oír nuestro nombre; nuestros guerreros son los asoladores de urbes y devoradores de inocentes. ¡Que el humo de los templos en llamas y el hedor de la carne asada saturen el aire mientras la #E #R La Horde Roja#!#! consume cuanto se le opone!\n\n\n\n\n\n\n\n\n\n\n\n\n@italic_mil21!"

 androphagia_task_23:0 "La Cacería Salvaje"
 androphagia_task_23_DESC:0 "La carga del mando comienza a fatigar a [ROOT.GetCountry.GetRuler.GetName|Y]. Cuando un grupo de allegados se presentó con una propuesta de caza, el [ROOT.GetCountry.GetRulerTitle] juzgó que tal solaz era harto necesario.\n\n#Y Esto activará una cadena de eventos.#!\n\n\n\n\n\n\n\n\n\n\n\n\n@italic_mil7!"

 androphagia_task_24:0 "Devoradores de Policía"
 androphagia_task_24_DESC:0 "Las gestas de los #G Griegos#! han llegado a oídos de nuestras naciones, aun cuando nuestra patria diste leguas de sus ciudades. Dícese que nadie los iguala en policía y letras, por lo cual [ROOT.GetCountry.GetRuler.GetName|Y] anhela lanzar a nuestros saqueadores contra ellos para aniquilar cuanto han erigido.\n\n\n\n\n\n\n\n\n\n\n\n\n@event_pic9!"

 androphagia_task_25:0 "Trono de Marfil de la Luna"
 androphagia_task_25_DESC:0 "[GetDeityDefinition('omen_kuje').GetName|G] se manifestó en sueños a [ROOT.GetCountry.GetRuler.GetName|Y] con una apremiante petición ; para asegurar el porvenir de [ROOT.GetCountry.GetName|G], el [ROOT.GetCountry.GetRulerTitle] debe alzar una fortaleza que sirva de #T Trono de Marfil de la Diosa-Luna#!.\n\n\n\n\n\n\n\n\n\n\n\n\n@italic_mil23!"

 androphagia_task_26:0 "Invasión de la Escitia"
 androphagia_task_26_DESC:0 "Quebrado el poder de los #Y [GetCountry('MLN').GetName]#!, nuestros caudillos se proponen la ruina de los #E #G [GetCountry('SCY').GetName]#! que moran al sur. No podemos consentir que una nación poderosa viva en nuestras lindes.\n\n\n\n\n\n\n\n\n\n\n\n\n@persia_mil17!"

 androphagia_task_27:0 "Caudillo de Caudillos"
 androphagia_task_27_DESC:0 "Mientras los templos griegos se tornan en ceniza, [ROOT.GetCountry.GetRuler.GetName|Y] ha convocado una #E #R Gran Invasión de la Estepa#!#! para sentar la supremacía antropófaga.\n\n\n\n\n\n\n\n\n\n\n\n\n@persia_mil20!"

 androphagia_task_28:0 "Hijos y Soldados de Escitia"
 androphagia_task_28_DESC:0 "Con la ruina de los #E #G [GetCountry('SCY').GetName]#! consumada, [ROOT.GetCountry.GetRuler.GetName|Y] ha mandado que su nobleza sea trasladada a [ROOT.GetCountry.GetCapital.GetName|T]. Sus mejores guerreros serán encuadrados en un solo ejército y obligados a lidiar por nosotros.\n\n\n\n\n\n\n\n\n\n\n\n\n@persia_mil15!"

 androphagia_task_29:0 "Golpe Tracio"
 androphagia_task_29_DESC:0 "Caída Escitia, [ROOT.GetCountry.GetRuler.GetName|Y] ha desatado las huestes de #R [ROOT.GetCountry.GetName]#! sobre las urbes del #Y Ponto Euxino#!.\n\n\n\n\n\n\n\n\n\n\n\n\n@persia_mil4!"

 androphagia_task_30:0 "Cautivos de la Estepa"
 androphagia_task_30_DESC:0 "Tras meses de cabalgada hasta [GetProvince('(int32)4557').GetName|T], nuestros hombres fueron bien acogidos. En los mercados de esclavos de Tanais, solo cuenta la ley del oro. Vimos los corrales henchidos de cautivos; naciones que huían de los Señores de los Caballos del este eran esclavizadas al punto de su llegada.\n\n\n\n\n\n\n\n\n\n\n\n\n@persia_mil6!"

 androphagia_task_31:0 "Suplantar a los Fenios"
 androphagia_task_31_DESC:0 "Las tribus #T Fenias#! que moran en las riberas del #Y Oceanus Sarmaticus#! y en las marismas heladas de la #T Hiperbórea#! occidental están, poco a poco, abrazando nuestros usos y tradiciones; su menguante número es señal cierta de la creciente supremacía de los Antropófagos en la región.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil3!"

 androphagia_task_32:0 "Excedente de Hierro"
 androphagia_task_32_DESC:0 "Lo que antaño fuera escaso en nuestros dominios es ahora cosa común, y [ROOT.GetCountry.GetRuler.GetName|Y] tiene el placer de determinar de qué suerte se han de emplear nuestros excedentes de aperos de hierro @iron! en [ROOT.GetCountry.GetName|T].\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil1!"

 androphagia_task_33:0 "Banquete de Carne Humana"
 androphagia_task_33_DESC:0 "A fin de rendir parias a nuestros antepasados y de perpetuar las antiguas tradiciones de nuestra estirpe, [ROOT.GetCountry.GetRuler.GetName|Y] ha decretado que un #R Gran Festín#! se celebrará en [ROOT.GetCountry.GetCapital.GetName|T], propagando así un escalofrío de espanto por todos nuestros dominios.\n\n\n\n\n\n\n\n\n\n\n\n\n@celt_mil2!"

