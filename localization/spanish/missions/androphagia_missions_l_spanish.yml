 #Events
 androphagian_1_title:0 "$androphagia_task_1$"
 androphagian_1_desc:0 "Cuando [ROOT.GetCountry.GetRuler.GetName] despachó por vez primera nuncio a sus iguales demandando vistas, [SCOPE.sCharacter('clan_chief_one').GetName] y [SCOPE.sCharacter('clan_chief_two').GetName] recelaron de las intenciones del [ROOT.GetCountry.GetRulerTitle] y exigieron de consuno que el encuentro fuera en el raso, bien apartados de las levas que guardan a [ROOT.GetCountry.GetCapital.GetName]. Llegado el día concertado, los tres cabalgaron hasta las lindes de [ROOT.GetCountry.GetName] y se hallaron en la espesura. Todos permanecieron en sus monturas, guardándose unos a otros con cautela.\n\n—¿A qué fin nos has citado aquí, oh [ROOT.GetCountry.GetRuler.GetFirstName]? —gruñó [SCOPE.sCharacter('clan_chief_one').GetFirstName]—. El invierno se avecina, los días se acortan, y con ellos mi paciencia para tales juntas.\n\n—Refrena tu lengua y ten memoria de tu lugar, hijo de los [SCOPE.sCharacter('clan_chief_one').GetFamilyDisplayAdjective], y atiende a mis razones. No os he llamado a este sitio sin grave causa.\n\nEn estos días postreros, [ROOT.GetCountry.GetRuler.GetFirstName] había tenido visiones extrañas en sueños, y consultado el Sabio, fue revelado el sentido de tales pesadillas. Un tiempo de mudanzas y caos estaba por caer sobre el orbe; imperios se habrían de quebrar y otros renacer, y los Antropófagos, olvidados en los confines del mundo, medrarían en los días venideros, mas solo si se emprendía una hazaña de gran denuedo.\n\n—Como cabezas de nuestra nación, somos responsables de la suerte de Androfagia. Los dioses nos mandan asir la ocasión, mas no alcanzo a ver aún qué empresa debemos acometer.\n\n—La guerra —bramó [SCOPE.sCharacter('clan_chief_one').GetFirstName] con acento sombrío, escupiendo en tierra—. Bajemos al mediodía, pasemos a fuego las ciudades de [GetCountry('MLN').GetName] y pongamos en cautiverio a sus mujeres e hijos.\n\nNegando con la cabeza en señal de desvío, [SCOPE.sCharacter('clan_chief_two').GetFirstName] habló por vez primera. —Yo también he tenido visiones de anchas aguas al ocaso, en una tierra donde inmensos caudales aguardan a nuestras huestes. —Rebuscando en su sayo, [SCOPE.sCharacter('clan_chief_two').GetFirstName] sacó una joya de ámbar @amber! ; una imagen de un osezno labrada que colgaba de su cuello—. Sabido es que el ámbar se halla en los bosques occidentales; cumple que hallemos la fuente por nosotros mismos.\n\nEn ese mismo punto, un viento gélido sopló por la selva sombría, y los primeros copos de la estación empezaron a caer. Estremeciéndose a su pesar, [ROOT.GetCountry.GetRuler.GetFirstName] alzó los ojos al cielo y habló con voz queda."
 androphagian_1.a:0 "Peregrinemos pues al noroccidente y tomemos asiento en la Costa del Ámbar"
 androphagian_1.b:0 "Permanezcamos aquí y aprestémonos para la lid contra los Melanclemas"
 androphagian_1.c:0 "Este invierno se barrunta crudo; busquemos abrigo"
 androphagian_1.d:0 "Hagamos sacrificio a los dioses y dejemos que ellos nos guíen"
 androphagian_1_tooltip:0 "La empresa de « #Y $androphagia_task_1$#! » ha sido ahora #G cumplida#!!"
 androphagian_1a_tooltip:0 "#Y Nuestro principal ofrecerá sacrificio e implorará a#! #T Visi#! #Y por la divina guía. En un mes, recibiremos respuesta.#!"

 androphagian_2_title:0 "$androphagia_task_2$"
 androphagian_2_desc:0 "Si bien la luenga migración al ocaso fue de gran fatiga para las naciones, y más para los jóvenes, [ROOT.GetCountry.GetRuler.GetName] sintió orgullo al ver que los sufridos Antropófagos no alzaron queja, sino que obedecieron las órdenes del [ROOT.GetCountry.GetRulerTitle] sin réplica. Su obediencia tuvo premio, pues el pueblo halló presto copiosas cuantías de ámbar @amber!, y un río de oro manó hacia las arcas.\n\nEstas nuevas tierras no eran muy distintas de las selvas que dejaron atrás, y con el tiempo, [ROOT.GetCountry.GetRuler.GetFirstName] no dudaba que los suyos aceptarían su nuevo hogar. Cuando las gentes vieron por vez primera las aguas infinitas del #E Oceanus Sarmaticus#!, unos quedaron despavoridos y otros extrañamente prendados –tales misterios eran ajenos a sus abuelos, y muchos no daban crédito a sus ojos… ¿cómo era posible tal maravilla?\n\nMientras los suyos alzaban chozas, un consejero trajo a la memoria de [ROOT.GetCountry.GetRuler.GetFirstName] una cuestión espinosa: el asiento de la corte. ¿Hallábase el [ROOT.GetCountry.GetRulerTitle] satisfecho con lo presente o deseaba señalar otro sitio? Fuera imposible contentar a todos, mas la sentencia debía ser dictada."
 androphagian_2.a:0 "Anoppi es mi elección"
 androphagian_2.b:0 "¡Parna será el asiento de nuestra nueva corte!"
 androphagian_2.c:0 "Nos estableceremos en la espesura de Saicen"
 androphagian_2.d:0 "No me deis pesadumbre con tales cuitas por ahora"
 androphagian_2_tooltip:0 "La empresa de « #Y $androphagia_task_2$#! » ha sido ahora #G cumplida#!!"

 androphagian_3_title:0 "$androphagia_task_3$"
 androphagian_3_desc:0 "Apenas arribados al ocaso, los Antropófagos mandaron peones a los bosques para acopiar cuanto ámbar @amber! fuera dable, mas ni su gran denuedo bastaba para la labor; había sencillamente sobrado fruto para que las naciones lo labraran solas, y algunos, como [SCOPE.sCharacter('clan_chief_one').GetName], empezaron a murmurar que se malgastaba el tiempo. Los Antropófagos eran hombres de armas, no labriegos, decía con enojo [SCOPE.sCharacter('clan_chief_one').GetFirstName], y no pocos empezaban a prestarle oídos.\n\nSe concertó pues que se labrara un #E Dominio de Esclavos#! –los Antropófagos rehuían de ordinario alzar fábricas permanentes, mas no había otro remedio. Los caudillos aceptaron al fin que debía hacerse, y una pequeña hueste de cautivos bajó a la selva, provista de cinceles y herradas."
 androphagian_3.a:0 "Espero que estés al fin contento, [SCOPE.sCharacter('clan_chief_one').GetFirstName]..."
 androphagian_3_tooltip:0 "La empresa de « #Y $androphagia_task_3$#! » ha sido ahora #G cumplida#!!"

 androphagian_4_title:0 "$androphagia_task_4$"
 androphagian_4_desc:0 "Aunque al presente gocemos de sobra de ámbar @amber!, las rentas de su trato se han vuelto vicio, y se han despachado exploradores por todo nuestro dominio en busca de nuevas venas de tan preciada mercancía.\n\nCuando las noticias señalaron que los bosques vírgenes de [GetProvince('(int32)9371').GetName] serían excelentes para un #E Dominio de Esclavos#!, [ROOT.GetCountry.GetRuler.GetName] tomó la inusitada determinación de echar mano de las reservas de hombres de [ROOT.GetCountry.GetName], mandando varones a trabajar en la isla. A quienes aceptaron dejar su hogar se les dio vituallas, algo de oro por su fatiga y suertes de tierra en la isla para su propia labranza.\n\nNuestras levas quedaron así mermadas y [ROOT.GetCountry.GetName] se vio en lance de peligro, mas el [ROOT.GetCountry.GetRulerTitle] no quiso dar pie atrás en su sentencia."
 androphagian_4.a:0 "El tiempo apremia cuando hay oro que ganar"
 androphagian_4_tooltip:0 "La empresa de « #Y $androphagia_task_4$#! » ha sido ahora #G cumplida#!!"

 androphagian_5_title:0 "$androphagia_task_5$"
 androphagian_5_desc:0 "Siendo la guerra contra los #E [GetCountry('MLN').GetName]#! forzosa, los Antropófagos empezaron a aprestarse para la lid contra un enemigo superior en número. El [ROOT.GetCountry.GetRulerTitle] creía que la victoria sería suya de cualquier suerte, mas se consultó si fuera de sabios buscar aliados.\n\nConocedor de nuestra fama espantosa, [ROOT.GetCountry.GetRuler.GetName] determinó hacer cuanto fuera menester para ganar voluntades hacia [ROOT.GetCountry.GetName], y tales pasos diplomáticos fueron, con el tiempo, premiados.\n\nPor desgracia para nuestros nuevos aliados, ignoraban que [ROOT.GetCountry.GetRuler.GetFirstName] esperaba en secreto ver sus fuerzas deshechas por nuestros enemigos mientras nuestras levas saqueaban sus reales."
 androphagian_5.a:0 "Más quiero un amigo muerto que un Antropófago caído..."
 androphagian_5_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_5$#!' $mission_completed_tooltip_2$"

 androphagian_6_title:0 "$androphagia_task_6$"
 androphagian_6_desc:0 "Los dioses de la guerra han otorgado la victoria a [ROOT.GetCountry.GetRuler.GetName], y las lindes de [ROOT.GetCountry.GetName] han crecido como vientre de yegua preñada –nunca en nuestra historia señoreamos dominio tan vasto.\n\nHabiendo jurado dechar a nuestras tropas tiempo para el sosiego y el goce del triunfo, [ROOT.GetCountry.GetRuler.GetFirstName] pasó los meses postreros rigiendo los negocios del Estado. Ganar y sojuzgar es una cosa, mas regir un reino estable es otra muy distinta, y el [ROOT.GetCountry.GetRulerTitle] anhelaba ser tenido por el mayor soberano en la historia de las naciones."
 androphagian_6.a:0 "Seré un fiel administrador de esta tierra"
 androphagian_6_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_6$#!' $mission_completed_tooltip_2$"

 androphagian_7_title:0 "$androphagia_task_7$"
 androphagian_7_desc:0 "Una vez que los revoltosos entre los #E [GetCountry('MLN').GetName]#! vencidos fueron pasados por el cuchillo y devorados, restaba la cuestión del estado civil de las naciones sojuzgadas.\n\nComo era de esperar, el temible [SCOPE.sCharacter('clan_chief_one').GetName] dio su parecer, exigiendo que todos fueran mandados a las minas, diciendo a voces que él y los suyos jamás tendrían a un Melanclema por igual.\n\n[SCOPE.sCharacter('clan_chief_two').GetName] propuso un camino de más tiento, alegando que sería provechoso para nuestras huestes otorgar la ciudadanía a tan fieros guerreros."
 androphagian_7.a:0 "Nuestra propia pujanza medraría con tal unión"
 androphagian_7.b:0 "El estado natural del Melanclema es la servidumbre"
 androphagian_7.c:0 "Bien mirado, no haré mudanza alguna"
 androphagian_7_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_7$#!' $mission_completed_tooltip_2$"

 androphagian_8_title:0 "$androphagia_task_8$"
 androphagian_8_desc:0 "Hacer brotar mieses en la espesura es labor de gran fatiga, aun con el mejor temple, y con todo nuestros hermanos antropófagos han aventajado allí donde otros erraron. Grandes calveros han sido abiertos para fundar granjas, y mientras se acopian los frutos por vez primera, todos loan la sapiencia de [ROOT.GetCountry.GetRuler.GetName] por haber financiado tal empresa agraria."
 androphagian_8.a:0 "Los verdaderos héroes son nuestros labriegos; loadlos a ellos, no a mí"
 androphagian_8_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_8$#!' $mission_completed_tooltip_2$"

 androphagian_9_title:0 "$androphagia_task_9$"
 androphagian_9_desc:0 "En estos meses últimos, nuestros jinetes se han ejercitado con más rigor que nunca. Nuestros guerreros dejan sus chozas mucho antes del alba, guiando sus monturas por las sombrías selvas y puliendo artes de lid que otros juzgarían imposibles. Los frutos están a la vista ; nuestros varones se mueven con ligereza por la espesura, cruzando terrenos ásperos con la facilidad de una estepa yerma.\n\nAl caer la tarde, cuando los soldados fatigados vuelven a sus lares sobre sus cabalgaduras rendidas, pasan las horas tratando cómo podrían mejorar aún sus artes –sus mentes están puestas enteramente en ser los mejores jinetes del orbe."
 androphagian_9.a:0 "Nuestros enemigos jamás podrán seguir el paso de nuestra caballería"
 androphagian_9_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_9$#!' $mission_completed_tooltip_2$"

 androphagian_10_title:0 "$androphagia_task_10$"
 androphagian_10_desc:0 "Nuestros herreros laboran sin descanso mientras el Orbe de [GetDeityDefinition('omen_pajewa').GetName|E] luce en el cielo, y el humo de sus fraguas oscurece el aire sobre [ROOT.GetCountry.GetCapital.GetName]. Conforme su maestría en el labrar de metales ha crecido, su capacidad para labrar objetos de excelencia ha medrado también, y toda [ROOT.GetCountry.GetName] ha sacado provecho de ello."
 androphagian_10.a:0 "Somos los dichosos beneficiarios de su ingenio"
 androphagian_10_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_10$#!' $mission_completed_tooltip_2$"

 androphagian_11_title:0 "$androphagia_task_11$"
 androphagian_11_desc:0 "Hará algunas edades, muchos de los nuestros no habían visto el mar, mas hoy, los primeros mareantes antropófagos de nuestra historia se hacen a la vela en el viaje de estreno de nuestra armada. Siempre presto a adaptarse a los casos, [ROOT.GetCountry.GetRuler.GetName] tiene este punto por un hito en nuestro porvenir. El puerto alzado en [GetProvince('(int32)9373').GetName] señala un nuevo día en nuestra crónica, un día en que ya no estamos atados a la tierra, sino que somos señores de nuestra propia suerte."
 androphagian_11.a:0 "Que la Madre de las Aguas navegue a nuestro lado"
 androphagian_11_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_11$#!' $mission_completed_tooltip_2$"

 androphagian_12_title:0 "$androphagia_task_12$"
 androphagian_12_desc:0 "Nuestros hermanos son discípulos prestos y se han hecho buenos marineros desde la fábrica de nuestro primer puerto, y conforme su confianza ha crecido, también su voluntad de correr lances.\n\nCuando se nos dio aviso de ricos depósitos de ámbar @amber! en la región de [GetProvince('(int32)4865').GetArea.GetRegion.GetName], nuestras flotas recibieron orden de llevar tropas para conquistar tales riberas para [ROOT.GetCountry.GetName]. A decir verdad, a [ROOT.GetCountry.GetRuler.GetName] le importaba poco a quién acometiéramos, con tal de que un río constante de oro y cautivos fluyera hacia [ROOT.GetCountry.GetCapital.GetName]."
 androphagian_12.a:0 "¡Presto seremos los Señores del Sarmaticus!"
 androphagian_12_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_12$#!' $mission_completed_tooltip_2$"

 androphagian_13_title:0 "$androphagia_task_13$"
 androphagian_13_desc:0 "En un rasgo de generosidad que quedaría para siempre en los Anales de los Antropófagos, [ROOT.GetCountry.GetRuler.GetName] se ofreció a costear por sí solo la fábrica de una ciudad –una verdadera corte andrófaga, capaz de competir con las urbes ricas y prósperas del Mediterráneo.\n\nNunca antes en su historia un [ROOT.GetCountry.GetRulerTitle] había hecho tal cosa por las naciones; los Antropófagos estaban avezados a saquear urbes, no a edificarlas, mas [ROOT.GetCountry.GetRuler.GetFirstName] determinó que aquello debía mudar.\n\nCuando los Ancianos propusieron llamar a la ciudad [ROOT.GetCountry.GetRuler.GetFirstName]polis, él se limitó a reír y declaró que nuestra corte llevaría el nombre de escarnio que le dieron los griegos."
 androphagian_13.a:0 "La majestuosa urbe de Androfagópolis será mi verdadero legado"
 androphagian_13_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_13$#!' $mission_completed_tooltip_2$"

 androphagian_14_title:0 "$androphagia_task_14$"
 androphagian_14_desc:0 "Si bien nuestros hermanos indómitos aventajan en muchas artes, bien podemos reconocer que nuestros maestros de obra no son tan aventajados como otros; no conocemos tantas trazas de edificación como algunos reinos o repúblicas.\n\nEste hecho innegable hace que la fábrica de una calzada por la provincia de [GetProvince('(int32)9373').GetArea.GetName] sea aún más notable. Aunque costosa y llevando nuestro ingenio al límite, hemos cumplido una vez más lo imposible."
 androphagian_14.a:0 "Nuestros arquitectos se han superado de veras esta vez"
 androphagian_14_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_14$#!' $mission_completed_tooltip_2$"

 androphagian_15_title:0 "$androphagia_task_15$"
 androphagian_15_desc:0 "El trato boyante del ámbar @amber! ha hecho a nuestro pueblo más rico que nunca, y algunos de los más viejos entre nosotros lloran tal estado. Afirman que el río de riquezas hará olvidar a los nuestros las verdaderas virtudes andrófagas, haciéndonos blandos y flacos como las naciones que deshicimos.\n\nMas tales voces quedan ahogadas en un coro creciente de regocijos y molicie; vánse bebiendo vinos extranjeros, léense pergaminos y aparecen ricas sedas en los mercados de [ROOT.GetCountry.GetCapital.GetName]."
 androphagian_15.a:0 "Los placeres de la vida están para ser saboreados"
 androphagian_15_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_15$#!' $mission_completed_tooltip_2$"

 androphagian_16_title:0 "$androphagia_task_16$"
 androphagian_16_desc:0 "Aunque nuestros naturales moran en [ROOT.GetCountry.GetCapital.GetName] hace ya tiempo, muchos de ellos, en especial los que tienen memoria de la vida antes de las peregrinaciones, no se han habituado a los días más breves de aquí. El Orbe de [GetDeityDefinition('omen_pajewa').GetName|E] no luce mucho en el cielo durante el invierno, y nuestra gente teme a veces que la Diosa-Sol nos deje morir en estas tierras del norte tan tristes.\n\nPara sosegar los ánimos, [ROOT.GetCountry.GetRuler.GetName] ha mandado alzar un gran templo en nuestra corte ; un #E Santuario de Plata del Sol#! que servira de morada a Pajewa.\n\nUn caso milagroso acaeció una vez acabado el templo, hecho que nuestros abuelos habrían dudado mas que fue verdad; el día de la bendición del Santuario, el Sol no se puso, sino que quedó brillante sobre la corte."
 androphagian_16.a:0 "¡Nuestras fatigas tienen premio de Pajewa! ¡Gloria a la Diosa-Sol!"
 androphagian_16_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_16$#!' $mission_completed_tooltip_2$"

 androphagian_17_title:0 "$androphagia_task_17$"
 androphagian_17_desc:0 "El hierro @iron! es de gran rareza en los bosques del norte, por lo cual [ROOT.GetCountry.GetRuler.GetName] se ve movido a sacar provecho de lo que los dioses han dado al pueblo de [ROOT.GetCountry.GetName].\n\nSe alzó una mina con presteza y se mandaron cautivos a sus honduras, enviando un río constante de tal mineral a los herreros de [ROOT.GetCountry.GetCapital.GetName]. Gracias a tener tal recurso, nuestras fraguas rugen a un paso que fuera increíble hace una edad."
 androphagian_17.a:0 "¿Quién podrá hacer frente a nuestros varones, tan bien pertrechados?"
 androphagian_17_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_17$#!' $mission_completed_tooltip_2$"

 androphagian_18_title:0 "$androphagia_task_18$"
 androphagian_18_desc:0 "Cuando [ROOT.GetCountry.GetRuler.GetName] se vio en lance difícil –pues el [ROOT.GetCountry.GetRulerTitle] requería grandes cuantías de oro para sus fines– se volvió a un antiguo solaz andrófago ; el saqueo de urbes.\n\nPor una vez, todos los jefes estuvieron de acuerdo, y las ciudades indefensas de los #E Griegos del Bósforo#! fueron blanco fácil. Nuestros almogávares victoriosos talaron e incendiaron a su gusto, y pesadas sumas fueron puestas en las arcas de [ROOT.GetCountry.GetCapital.GetName]."
 androphagian_18.a:0 "¡Tomad cuanto podáis cargar, y matad lo que no!"
 androphagian_18_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_18$#!' $mission_completed_tooltip_2$"

 androphagian_19_title:0 "$androphagia_task_19$"
 androphagian_19_desc:0 "Al principio, nuestros guerreros no dieron crédito a los relatos de los cautivos #E Griegos del Bósforo#! habidos en sus ciudades costeras, teniendo sus historias por mentiras desesperadas para engañar a nuestros saqueadores. Y con todo, las nuevas traídas por unos pocos mercaderes que venían a nuestros mercados parecían dar fe de ello: guerras desoladoras habían traído miseria y caos a las ricas tierras de #E Anatolia#! al sur.\n\nCon el tiempo, la verdad se fue descubriendo en todo su espanto: el Imperio de los #E Aqueménidas#! había sido deshecho por los #E Macedonios#!, y la guerra civil y la ruina habían echado al orbe helénico y persa en el caos –música para los oídos de nuestras levas, que quisieron sumar a la desdicha de los anatolios lanzando una correría asoladora por sus ciudades.\n\n[ROOT.GetCountry.GetRuler.GetName] ni hubo de preguntar a sus caudillos si estaban prestos para medrar con tal ocasión: claro está que lo estaban, y los cantares de su carnicería gloriosa por Anatolia se hicieron de leyenda."
 androphagian_19.a:0 "¡Nadie puede estorbarnos de tomar lo que se nos antoje!"
 androphagian_19_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_19$#!' $mission_completed_tooltip_2$"

 androphagian_20_title:0 "$androphagia_task_20$"
 androphagian_20_desc:0 "Con el fin de acrecentar la sapiencia de nuestra gente, se ha determinado que mandaremos nuestros bajeles a las insignes urbes del Mediterráneo –[GetProvince('(int32)3256').GetName], [GetProvince('(int32)416').GetName] y [GetProvince('(int32)516').GetName]– para buscar el consejo de sus sabios. Si la fortuna nos sonríe, hallaremos preceptores prestos a dejar sus patrias y venir a morar con los nuestros, mas solo los dioses saben qué nos depara este viaje."
 androphagian_20.a:0 "Mañana nos hacemos a la vela para [GetProvince('(int32)3256').GetName]"
 androphagian_20_tooltip:0 "#Y La cadena de eventos seguirá su curso.#!"

 androphagian_24_title:0 "$androphagia_task_24$"
 androphagian_24_desc:0 "Y así acaeció lo inevitable ; los saqueadores de [ROOT.GetCountry.GetName] no estaban hartos con sus muchas victorias, y los caudillos a las órdenes de [ROOT.GetCountry.GetRuler.GetName] clamaron por medidas más rigurosas para asentar nuestra fama de asoladores. Habiendo ya incendiado muchas ciudades de #E Anatolia#!, los guerreros andrófagos hicieron otra demanda de gran denuedo a [ROOT.GetCountry.GetRuler.GetFirstName], que él aprobó al punto.\n\nHace ya muchos años que tenemos trato comercial con los #E Helenos#!, y aunque algunos los admiren, la mayoría de los nuestros tiene a los griegos por gente muy henchida. Tienen su policía por superior a todas, y miran de arriba abajo a cuantos viven cerca como prisioneros de su barbarie.\n\nEs pues deber de [ROOT.GetCountry.GetName] dar buena lección a estos ciudadanos altaneros, y nuestras huestes han lanzado una invasión de su patria, asolando urbes y pasando por el acero a decenas de miles.\n\nEn los siglos venideros, los Antropófagos serían mentados como #E «El Azote de la Hélade»#!, y ningún otro invasor causaría jamás tanta destrucción como nuestra gente."
 androphagian_24.a:0 "¡Soy el azote de los dioses, enviado para sembrar el caos entre vosotros!"
 androphagian_24_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_24$#!' $mission_completed_tooltip_2$"

 androphagian_25_title:0 "$androphagia_task_25$"
 androphagian_25_desc:0 "La gran fábrica conocida como el #E 'Trono de Marfil de la Luna'#!, alzada en el corazón de [ROOT.GetCountry.GetCapital.GetName], se convirtió presto en una estructura emblemática de nuestra hermosa corte. Los Antropófagos creen que este edificio es la morada terrenal de [GetDeityDefinition('omen_kuje').GetName|E], y es sabido que la Diosa de la Luna duerme a veces en la cámara central de la fortaleza. Ningún mortal tiene licencia para entrar en el edificio por esa misma razón, y guardias rondan los alrededores día y noche para asegurar que nadie inquiete a la diosa en su sueño."
 androphagian_25.a:0 "[GetDeityDefinition('omen_kuje').GetName|E] tendrá su sosiego"
 androphagian_25_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_25$#!' $mission_completed_tooltip_2$"

 androphagian_26_title:0 "La Horda Púrpura"
 androphagian_26_desc:0 "Aunque [ROOT.GetCountry.GetRuler.GetName] haya tenido sus detractores, muchas voces que clamaban contra las órdenes del temible guerrero yacen ahora en tierra mientras el son del atabal hinche el aire. Todos han sido llamados a [ROOT.GetCountry.GetCapital.GetName] para prestar pleito homenaje a la familia reinante.\n\nNunca antes en nuestra historia nadie alcanzó lo que [ROOT.GetCountry.GetRuler.GetFirstName] ha logrado, y bajo el regimiento de los [ROOT.GetCountry.GetRuler.GetFamilyDisplayAdjective], hemos conquistado y deshecho cuanto se puso ante nosotros. Ya no somos una nación apartada en los confines del orbe; somos una horda cuyo nombre es temido hasta en la #E India#!. Hemos quemado las ciudades de nuestros enemigos, talado sus reales, y nuestra gente ha festinado con la carne de sus contrarios. El mundo tiembla ante los jinetes de la #E Horda Púrpura#! y su [ROOT.GetCountry.GetRulerTitle]."
 androphagian_26.a:0 "¡Inquinaos ante mí y besad el suelo, que yo lo mando!"
 androphagian_26_tooltip:0 "$mission_completed_tooltip_1$ '#Y La Horda Púrpura#!' $mission_completed_tooltip_2$"

 androphagian_29_title:0 "Piratas en las Columnas"
 androphagian_29_desc:0 "Tras varias semanas de navegación sin mudanza, nuestra flota arribó al fin a las insignes #E Columnas de Hércules#! –la puerta del #E Mediterráneo#!. Cuando asomó la costa escarpada, gritos de júbilo sonaron en los bajeles mientras nuestros mareantes daban voces de alegría; mas segundos después, tales voces se tornaron en aullidos de pavor cuando una inmensa #E Armada de Piratas#! dobló las Columnas.\n\nLos rápidos liburnos de los piratas cercaron presto nuestra flota y mandaron nuncio al navío almirante: si queríamos paso seguro a la entrada y salida del Mediterráneo, habríamos de pagar por tal merced."
 androphagian_29.a:0 "No morderemos el anzuelo; proseguid la navegación"
 androphagian_29.b:0 "¡Si quieren sangre, la tendrán!"
 androphagian_29.c:0 "Pagadles su 'peaje' y seguid vuestro camino"
 androphagian_29_tooltip:0 "#Y La cadena de eventos seguirá su curso.#!"
 androphagian_29a_tooltip:0 "#R Los piratas han muerto a muchos de nuestros marineros, mas logramos huir.#!"
 androphagian_29b_tooltip:0 "#R Nuestros marineros han rechazado con denuedo el asalto de los piratas, aunque varios varones resultaron heridos.#!"

 androphagian_30_title:0 "La Insigne Ciudad de Qart Hadasht"
 androphagian_30_desc:0 "Al cabo, tras luengos meses de navegación, nuestra armada arribó a su primer puerto de escala ; [GetProvince('(int32)3256').GetName]. Al punto que nuestra flota se presentó ante el #E Gran Cotón#!, un bajel cartaginés salió a nuestro encuentro; mas en sabiendo que veníamos de [ROOT.GetCountry.GetName], nos fue negada la entrada al puerto, con harto desplacer de [ROOT.GetCountry.GetRuler.GetName], quien hubo de sosegar a sus huestes para evitar un motín en el acto.\n\nUna lección que [ROOT.GetCountry.GetRuler.GetFirstName] tenía bien aprendida se puso aquí por obra: tras un rumboso soborno, los púnicos dieron licencia a un pequeño grupo de los nuestros para entrar en su mercado, con la condición de dejar la urbe antes del ocaso.\n\nAsí, con la mano puesta en su escarcela, el [ROOT.GetCountry.GetRulerTitle] recorrió las calles apiñadas en compañía de un trujamán dado por los naturales. Fue gran ventura tener quien guiara a nuestros varones, pues el bullicio del centro era de gran pesadumbre. Había cientos de obradores llenos de tratantes astutos, pregonando cada cual su mercancía como la cumbre del ingenio humano y jurando dar los mejores precios de África.\n\nReparando en las joyas de ámbar @amber! que traían los nuestros, algunos próceres rogaron a [ROOT.GetCountry.GetRuler.GetFirstName] firmar asientos de comercio al punto, prometiendo pagar con largueza por el derecho de comprarnos de mano propia. Desviando a tales buitres, el guía llevó a nuestro grupo al #E Templo de Tanit#! para hacer ofrendas, y estando allí, [ROOT.GetCountry.GetRuler.GetFirstName] reparó en una tropa de jinetes que llegaba: mercenarios que daban fin a su asiento y venían a la ciudad a rendir parias a la diosa por su sano retorno.\n\nEl calor riguroso del sol de mediodía avisaba que cumplía partir presto, y [ROOT.GetCountry.GetRuler.GetFirstName] se acarició la barba con tiento, tratando en su mente los pasos venideros."
 androphagian_30.a:0 "Tomemos a sueldo a estos mercenarios para adestrar a nuestros jinetes"
 androphagian_30.b:0 "¿Parece que los púnicos rinden culto a Kuu? No es acaso fortuna"
 androphagian_30.c:0 "Busquemos hombres de negocios prestos a firmar asientos comerciales"
 androphagian_30.d:0 "Trujamán, ¿dónde se hallan las mancebías?"
 androphagian_30.e:0 "Qué decepción de ciudad; nos partimos con las manos vacías"
 androphagian_30a_tooltip:0 "#Y Tomaremos a sueldo a#! #T la Caballería Numida#! #Y para adestrar a nuestros propios jinetes.#!"
 androphagian_30b_tooltip:0 "#Y Compraremos una#! #T Estatua de Tanit#! #Y en el barrio de la religión.#!"
 androphagian_30c_tooltip:0 "#Y Estableceremos#! #T Tratos comerciales#! #Y con los cartagineses.#!"
 androphagian_30d_tooltip:0 "#Y Nuestros marineros gastan un caudal en festejos.#!"

 androphagian_31_title:0 "Vistas con los Atenienses"
 androphagian_31_desc:0 "Los meses siguientes pasaron sin novedad, y nuestros bajeles atracaron en el puerto del #E Pireo#! sin estorbo. Mientras nuestro grupo se adentraba por las polvorientas rúas de [GetProvince('(int32)416').GetName], se asombraron los nuestros al ver gran muchedumbre junta en el Ágora; había gritos y voces de enojo en el aire, mas nadie alcanzaba a saber qué pasaba.\n\nHaciéndose paso entre el gentío, [ROOT.GetCountry.GetRuler.GetName] quedó suspenso por lo que vio después: una junta de filósofos disputaba en la calle, ¡y en medio de ellos estaba un varón con galas propias de los antropófagos! Alzando las manos y pidiendo silencio, el antropófago habló con voz firme que se oía sobre el murmullo de la turba. Por desgracia para el [ROOT.GetCountry.GetRulerTitle], había perdido el principio de la plática y no entendió la réplica que el antropófago dio.\n\n'¿Acaso nuestros retóricos ne se ven atormentados por otra suerte de Furias cuando claman: «Recibí estas heridas lidiando por la libertad pública; perdí este ojo en tu defensa... dadme un guía que me lleve con mis hijos, pues mis miembros están tullidos y no pueden ya sostenerme»?'\n\nA tal respuesta, sonaron aplausos raleados antes de que la disputa tornara a empezar. Tirando de la túnica de un hombre que estaba al lado, [ROOT.GetCountry.GetRuler.GetFirstName] inquirió qué era aquello.\n\n'Este hombre, un siervo llamado [SCOPE.sCharacter('shiny_tutor').GetName], es un bárbaro instruido en las artes de la retórica por su señor. Tiempo ha, una partida de salteadores del gran norte quiso acometer nuestra urbe, mas logramos vencer a los salvajes y pusimos en hierros a muchos. Aunque la mayor parte fue a las minas, el ingenio de Lamperos hizo que fuera perdonado, y se ha vuelto uno de los maestros más insignes de Atenas'."
 androphagian_31.a:0 "Tomemos a sueldo a letrados griegos y partamos"
 androphagian_31.b:0 "¡Un filósofo antropófago! Compremos su libertad"
 androphagian_31.c:0 "Estos 'sabios' son locos, y voy a decirles la razón"
 androphagian_31.d:0 "Mucho afán me cuesta ganar mi oro para gastarlo de tal suerte"
 androphagian_31a_tooltip:0 "#Y Tomaremos a sueldo#! #T preceptores atenienses#! #Y para ayuda de nuestros estudios.#!"
 androphagian_31b_tooltip:0 "#Y Lamperos rinde gracias a nuestro Soberano y se suma al grupo.#!"
 androphagian_31c_tooltip:0 "#Y Nuestro Soberano entra en la disputa, dejando suspensos a todos con su ingenio y garbo.#!"

 androphagian_32_title:0 "Agravio Alejandrino"
 androphagian_32_desc:0 "Una tormenta impensada batió con furia la armada antropófaga mientras cruzaba el #E Mare Aegyptium#!, y se vieron los nuestros en un lance desesperado cuando sus bajeles ganaron con pena el puerto de [GetProvince('(int32)516').GetName]. Nuestros mareantes se vieron forzados a echar la carga al mar para mantener las naves a flote, y estaban casi sin vituallas ni agua cuando asomó la ribera egipcia. Con la lengua hinchada y los vientres en un hilo, los marineros suplicaron a los alejandrinos licencia para atracar.\n\nLes fue negado con gran crueldad, y los soldados alejandrinos hicieron mofa de nosotros, llamándonos bárbaros y salvajes. 'Si padecéis sed y hambre, bebed la sangre unos de otros y comed vuestras carnes, comedores de hombres'.\n\nViendo que habrían de perecer todos sin sustento, [ROOT.GetCountry.GetRuler.GetName] se ofreció a pagar precios excesivos por pan y agua, y los codiciosos alejandrinos tomaron nuestro oro. Con todo, las ánforas que mandaron a nuestras naves estaban mal paradas; el agua olía a bestia y el pan era duro como peña y lleno de moho. Cuando [ROOT.GetCountry.GetRuler.GetFirstName] se quejó a voces de tal quiebra de confianza, los alejandrinos abrieron fuego sobre nuestros bajeles, obligando a los nuestros a levar anclas.\n\nVolviendo la vista al insigne #E Faro#! mientras la urbe se alejaba, el [ROOT.GetCountry.GetRulerTitle] hizo un juramento solemne y prometió vengar el honor de los Antropófagos."
 androphagian_32.a:0 "Jamás perdonaré el trato que nos habéis dado..."

 androphagian_33_title:0 "Retorno a la Patria"
 androphagian_33_desc:0 "Descorazonados por el recibimiento de [GetProvince('(int32)516').GetName], nuestros marineros determinaron volver a sus lares, y el resto del viaje pasaron rumiando su enojo. Como es natural, hicieron algunas escalas por las costas de África; pues las viandas podridas y el agua dadas por les pérfidos alejandrinos eran de todo punto incomibles, y se vieron forzados a saquear lugares egipcios para rehacer sus despensas.\n\nLa cólera de [ROOT.GetCountry.GetRuler.GetName] fue espantosa, y aun los más allegados al [ROOT.GetCountry.GetRulerTitle] quedaron mudos por la saña con que acometió a las gentes de la ribera africana. Lugares enteros fueron puestos en cautiverio y echados a las bodegas de las naves, y quienquiera que hablase con acento de Alejandría fue devorado por [ROOT.GetCountry.GetRuler.GetFirstName]; no se dio cuartel, sin mirar edad ni estado de los presos.\n\nEn sabiendo los alejandrinos lo que los nuestros hacían en sus tierras, quisieron armar un contraataque y mandaron una flota de guerra para darnos caza, mas nuestra armada logró ganarles el viento y escapar. Los piratas de las #E Columnas de Hércules#! no nos dieron más pesadumbre a la vuelta, y pasados unos años desde la partida, nuestra armada volvió a ver las lindes de [ROOT.GetCountry.GetName].\n\nEl luengo viaje de retorno no templó el enojo de [ROOT.GetCountry.GetRuler.GetFirstName], y aun pasadas semanas, no podía dar crédito a cuanto había pasado."
 androphagian_33.a:0 "Qué largo y extraño viaje ha sido este..."
 androphagian_33_tooltip:0 "#Y Esto dará fin a la cadena de sucesos.#!"

 dhe_body.5.o:0 "¿Por qué habríamos de honrar la memoria de un tirano?"
 dhe_body.5.p:0 "No veneraremos más el cuerpo de un tirano"
 to_the_hungriest_tooltip:0 "#Y Esta opción se halla dable pues vuestro Soberano posee el#! #R Rasgo de Caníbal#!.\n#Y Toda nación de#! #G Cultura Helénica#! #Y perderá#! #R 100 de opinión#! #Y hacia nosotros.#!"
 cannibal_ate_alexander:0 "Devoró el cadáver de Alejandro Magno"

 androphagian_21_title:0 "Migración al Ocaso"
 androphagian_21_desc:0 "Una mañana, [ROOT.GetCountry.GetRuler.GetName] despertó de un sueño inquieto con un hondo frío en los huesos y una tos seca que le batía el pecho. Estremeciéndose, se volvió en su lecho y cerró los ojos.\n\nPor desgracia, el sueño le fue esquivo y pasó el resto de la noche en contemplación; sus sueños estaban llenos de visiones de una senda torcida por las montañas, borrada por una ventisca furiosa e incesante. Mientras el caudillo lidiaba por avanzar contra los vientos y la nieve que le llegaba al pecho, [ROOT.GetCountry.GetRuler.GetFirstName] se vio sobrecogido por un extraño temor a lo no visto. En ese punto quiso dar la vuelta para tornar a [ROOT.GetCountry.GetCapital.GetName], mas la nieve había borrado sus huellas y el camino de vuelta se había perdido.\n\nEn ese instante, un viento gélido sopló en la cámara, y [ROOT.GetCountry.GetRuler.GetFirstName] tuvo por cierto que [GetDeityDefinition('omen_vesa').GetName] le había hecho saber su voluntad."
 androphagian_21.a:0 "Llegado es el tiempo de emprender viaje de invierno..."
 androphagian_21_tooltip:0 "$mission_completed_tooltip_1$ '#Y Migración al Ocaso#!' $mission_completed_tooltip_2$"

 androphagian_22_title:0 "¡Aprestaos para la guerra!"
 androphagian_22_desc:0 "Una mañana, [ROOT.GetCountry.GetRuler.GetName] despertó de un sueño agitado, bañado en sudor y con el corazón latiendo como atabales de guerra; sus sueños se habían poblado de visiones de muerte y ruina forzosa.\n\nUna voz queda susurró al oído de [ROOT.GetCountry.GetRuler.GetFirstName], contando lances de crueldad nunca vista en los días venideros. Los soldados antropófagos habrían de saquear presto las tiendas de los #E [GetCountry('MLN').GetName]#! al mediodía, mas solo si acometíamos sin temor a los contrarios. El nuncio divino reveló que el precio de la lid sería alto, con muchos varones de valor muriendo en ambos bandos, mas que la victoria final estaba firme para [ROOT.GetCountry.GetName]. Tales promesas venían de mano de [GetDeityDefinition('omen_vesa').GetName], diosa muy amada de [ROOT.GetCountry.GetRuler.GetFirstName] y objeto de su devoción de toda una vida."
 androphagian_22.a:0 "¡La Madre de las Aguas tiene sed de sangre!"
 androphagian_22_tooltip:0 "$mission_completed_tooltip_1$ '#Y ¡Aprestaos para la guerra!#!' $mission_completed_tooltip_2$"

 androphagian_23_title:0 "Guiado por el Tiento"
 androphagian_23_desc:0 "Una mañana, [ROOT.GetCountry.GetRuler.GetName] despertó de un hondo sueño y se sintió al punto lleno de gratitud; su descanso había estado lleno de visiones pacíficas de hogares encendidos y buena compañía ante los fuegos de [ROOT.GetCountry.GetCapital.GetName], y el sabio [ROOT.GetCountry.GetRulerTitle] vio en ello señal de buenos sucesos por venir.\n\nEn sus sueños, [ROOT.GetCountry.GetRuler.GetFirstName] pudo tener sosiego, sabiendo que toda la labor del año estaba cumplida ; las mieses acopiadas, los animales traídos de los bosques y la llegada de músicos y juglares a la corte anunciaba ya el tiempo de festejos para nuestro pueblo."
 androphagian_23.a:0 "[GetDeityDefinition('omen_vesa').GetName] quiere que permanezcamos donde estamos"
 androphagian_23_tooltip:0 "$mission_completed_tooltip_1$ '#Y Guiado por el Tiento#!' $mission_completed_tooltip_2$"

 androphagian_28_title:0 "La Invasión de Escitia"
 androphagian_28_desc:0 "Por algún motivo, los #E [GetCountry('SCY').GetName]#! nos tuvieron antaño por amigos; y cuando las huestes de #E Darío el Persa#! entraron en Escitia con su general #E Megabazo#!, nos rogaron venir en su defensa, ruego que pasamos por alto de todo punto. Por tal caso los escitas nos miran con recelo, y desde aquel día han querido acortar sus tratos con nosotros, sentir que hemos correspondido de buena gana.\n\nMas los tiempos mudan, y [ROOT.GetCountry.GetRuler.GetName] ha determinado que su patria será mejor regida por él que por otro, y ha hecho saber a las levas que presto marcharán a la región de [GetProvince('(int32)7186').GetArea.GetRegion.GetName]."
 androphagian_28.a:0 "¡Aquellos a quienes pedisteis socorro serán vuestra ruina final!"
 androphagian_28_tooltip:0 "$mission_completed_tooltip_1$ '#Y La Invasión de Escitia#!' $mission_completed_tooltip_2$"

 androphagian_34_title:0 "Los Antropófagos"
 androphagian_34_desc:0 "Poco se sabe en el orbe civilizado de los #E [GetCountry('ANP').GetName]#! peregrinos, salvo algunas memorias de #E Herodoto#! en sus Historias, conocidas solo por las élites letradas del #E Mediterráneo#!.\n\nLas naciones #E [GetCountry('SCY').GetName]#! que viven cerca de sus lindes los tienen por traidores y cobardes, pues hará doscientos años, cuando las huestes de #E Darío el Grande#!, Rey de Reyes, entraron en Escitia, los Antropófagos no quisieron sumarse a la liga defensiva contra los #E #COLOR:{0.51,0.31,0.75} Persas#!#! y miraron con risas cómo ardían las tierras del mediodía. No hace falta decir que no hay amor entre los Antropófagos y sus vecinos.\n\nSi bien los dominios de las naciones antropófagas son pequeños, su fama temible de #E Caníbales#! ha guardado sus lindes mejor que sus ejércitos, pues pocos quieren acabar sus días devorados vivos en un rito religioso. Así apartados del mundo, pasan sus días a su albedrío, errando por las selvas más allá de los términos de la policía y la civilización."
 androphagian_34.a:0 "Es tiempo de hacer historia..."
 androphagian_34_tooltip:0 "#Y Los#! #G Antropófagos#! #Y pueden usar la#! #R Interacción de personaje#! #T Devorar#! #Y sobre quien tengan#! #T Preso#!, #Y mas hay #R Riesgos de salud#! #Y por comer carne humana; vuestro#! #T Soberano#! #Y podría contraer mal incurable.#!"

 androphagian_35_title:0 "Caudillo de Caudillos"
 androphagian_35_desc:0 "Ahora que los pujantes #E [GetCountry('SCY').GetName]#! han sido deshechos por las huestes del invicto [ROOT.GetCountry.GetRuler.GetName], el osado jefe de los Antropófagos ha prometido a sus huestes que un premio mayor les aguarda.\n\nEn un afán por seguir las huellas de los grandes conquistadores, el [ROOT.GetCountry.GetRulerTitle] ha mandado jinetes a las ligas de la estepa del lejano oriente para decir que reclamamos sus tierras como nuestras. [ROOT.GetCountry.GetRuler.GetFirstName] probará al mundo que [ROOT.GetCountry.GetName] es la nación más fuerte y que él es el verdadero #E Caudillo de Caudillos#!, el mayor jefe que jamás haya pisado la tierra."
 androphagian_35.a:0 "¡Invasiré y asolaré a las naciones de la estepa!"
 androphagian_35_tooltip:0 "$mission_completed_tooltip_1$ '#Y Caudillo de Caudillos#!' $mission_completed_tooltip_2$"

 androphagian_36_title:0 "$androphagia_task_28$"
 androphagian_36_desc:0 "Con la esperanza de estorbar que las élites #E Escitas#! se junten en el destierro para tratar contra nuestro pueblo, sus nuevos señores, [ROOT.GetCountry.GetRuler.GetName] ha mandado a sus próceres a vivir tras los muros de [ROOT.GetCountry.GetCapital.GetName], donde estarán bajo la guarda del [ROOT.GetCountry.GetRulerTitle].\n\nSe han tomado otros pasos para asegurar la obediencia, y los mejores jinetes escitas han sido puestos en una tropa de correría, esperando que así estén quietos. [ROOT.GetCountry.GetRuler.GetFirstName] guiará en persona a estos guerreros a la lid."
 androphagian_36.a:0 "Los escitas están a mi mandado"
 androphagian_36_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_28$#!' $mission_completed_tooltip_2$"

 androphagian_37_title:0 "$androphagia_task_29$"
 androphagian_37_desc:0 "Las muchas ciudades de #E Tracia#! han caído una a una ante nuestros soldados hambrientos, que no dieron cuartel a los griegos de la costa. Se dice que barrios enteros, unos loados por su hermosura y otros por su antigüedad, han quedado en cenizas tras una correría antropófaga; tesoros sin precio tornados en polvo y obras insignes rotas bajo los cascos de nuestra caballería.\n\nLos muros de las urbes no fueron estorbo para los nuestros, pues nuestros salteadores tuvieron paciencia y voluntad de armar cercos y rendir por hambre a los naturales hasta la muerte si era menester."
 androphagian_37.a:0 "¡Nadie quedará con vida!"
 androphagian_37_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_29$#!' $mission_completed_tooltip_2$"

 androphagian_38_title:0 "$androphagia_task_30$"
 androphagian_38_desc:0 "Aunque nuestros varones hubieron de cabalgar meses para llegar a la ciudad de [GetProvince('(int32)4557').GetName], fueron bien recibidos por los tratantes del lugar. Nuestra fama de caníbales no tenía peso tras sus muros apiñados, pues lo único que importa en los mercados de esclavos de Tanais es la ley de vuestro oro y plata, de lo cual teníamos con largueza.\n\nLas historias que nos contaron los naturales de Tanais eran de gran interés ; profecías de la subida y caída de imperios, quiebra de linajes antiguos y el desencuadre del orbe bajo los cascos de los nómadas. En verdad, en este mismo punto, los corrales de esclavos estaban llenos de presos habidos en la estepa; naciones flacas huían de las ligas fuertes de los Señores de los Caballos al oriente, y muchos eran puestos en servidumbre nada más llegar a Tanais."
 androphagian_38.a:0 "Quizá algún día tomemos nosotros mismos cautivos en la estepa"
 androphagian_38_tooltip:0 "$mission_completed_tooltip_1$ '#Y $androphagia_task_30$#!' $mission_completed_tooltip_2$"
