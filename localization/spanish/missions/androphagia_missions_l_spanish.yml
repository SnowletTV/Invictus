 desc_iron_weapons_androphagia:0 "Las levas de Androfagia van provistas de armas de hierro macizo, lo que les permite señorear sobre sus enemigos en la lid."
 androphagian_horse_trainers_mod:0 "Caballería ligera andrófaga"
