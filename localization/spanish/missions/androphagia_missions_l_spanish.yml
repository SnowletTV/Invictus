 desc_wars_against_the_melanchlaenians_mod:0 "Nuevas de tribus flacas que moran al sur han incitado a nuestra gente a mover guerra a los Melanclemas."
 faithful_androphagian_sacrifices_mod:0 "Visiones de Visi"
 desc_faithful_androphagian_sacrifices_mod:0 "Nuestro principal ha dispuesto una ofrenda a Visi para impetrar la divina sapiencia que guíe a nuestra estirpe."
 androphagians_stay_where_they_are_mod:0 "Invernada en la espesura"
